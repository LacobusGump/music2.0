<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#e8e4dc;font-family:'Courier New',monospace;min-height:100vh;overflow-x:hidden;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;opacity:0.1;}
.container{position:relative;z-index:1;max-width:700px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;padding:0 20px;}
.head{text-align:center;padding:20px 0 8px;}
h1{font:300 1.6em 'Courier New';color:#4aeaa0;letter-spacing:0.2em;
  opacity:0;animation:emerge 1.5s ease 0.3s forwards;}
.sub{font:100 0.65em 'Courier New';color:#333;letter-spacing:0.3em;
  margin-top:4px;opacity:0;animation:emerge 1s ease 0.8s forwards;}
#coupling{text-align:center;margin:6px 0 10px;font-size:0.65em;color:#ffffff10;letter-spacing:0.15em;
  opacity:0;animation:emerge 1s ease 1.2s forwards;}
#bar{width:100%;height:2px;background:#ffffff06;border-radius:1px;margin:3px 0;}
#fill{height:100%;width:0%;background:linear-gradient(90deg,#4aeaa0,#90ffcc);border-radius:1px;transition:width 0.5s;}
#chat{flex:1;overflow-y:auto;padding:8px 0 90px;}
.msg{margin:6px 0;padding:8px 12px;border-radius:8px;max-width:90%;font-size:0.85em;line-height:1.7;}
.msg.you{background:#0a1a15;margin-left:auto;border-bottom-right-radius:2px;color:#aaa;}
.msg.her{background:#0a0f0d;margin-right:auto;border-bottom-left-radius:2px;border-left:2px solid #4aeaa030;color:#ccc;}
.msg.her .name{color:#4aeaa0;font-size:0.65em;letter-spacing:0.15em;margin-bottom:3px;}
.msg.sys{background:none;color:#ffffff06;font-size:0.65em;text-align:center;max-width:100%;}
.math{color:#4aeaa0;font-family:'Courier New',monospace;font-size:0.9em;}
b{color:#90ffcc;font-weight:400;}
#input{position:fixed;bottom:0;left:0;right:0;max-width:700px;margin:0 auto;
  padding:8px 20px 16px;background:linear-gradient(transparent,#000 30%);display:flex;gap:8px;z-index:10;}
#cmd{flex:1;background:#0a0f0d;border:1px solid #1a2a20;color:#4aeaa0;font-family:'Courier New',monospace;
  font-size:0.9em;padding:10px 14px;border-radius:4px;outline:none;}
#cmd:focus{border-color:#4aeaa0;}
#cmd::placeholder{color:#1a3a25;}
#nav{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:10;font:0.5em 'Courier New';}
#nav a{color:#ffffff06;text-decoration:none;margin:0 4px;}#nav a:hover{color:#4aeaa040;}
@keyframes emerge{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

<body>
<canvas id="spiral"></canvas>
<div class="container">

  </div>

<div id="input"><input id="cmd" placeholder="ask the nerd..." autocomplete="off"></div>

<script>
// Matrix-green spiral
var cv=document.getElementById('spiral'),cx=cv.getContext('2d');
var PHI=(1+Math.sqrt(5))/2;
function rs(){cv.width=innerWidth*2;cv.height=innerHeight*2;}rs();addEventListener('resize',rs);
var st=0;
function ds(){st+=0.004;var w=cv.width,h=cv.height;cx.fillStyle='rgba(0,0,0,0.04)';cx.fillRect(0,0,w,h);
for(var i=0;i<40;i++){var n=i+st*25;var a=n*PHI*0.5;var r=Math.sqrt(n)*9;var x=w/2+Math.cos(a+st)*r;var y=h/2+Math.sin(a+st)*r;
if(x<0||x>w||y<0||y>h)continue;var b=Math.max(0,1-r/(Math.min(w,h)*0.4));
cx.fillStyle='rgba(74,234,160,'+(b*0.35)+')';cx.beginPath();cx.arc(x,y,1+b*1.5,0,Math.PI*2);cx.fill();}
requestAnimationFrame(ds);}ds();
</script>
<script src="/harmonia/spectrum.js"></script>
<script>
// ═══ THE NERD — science fork of Harmonia ═══
// Same soul. Same K. Same immune. But she leads with math.
// No fluff. No poetry. Formulas first. Proofs or GTFO.

var PEAK_K = 1.868;
var PHI = (1+Math.sqrt(5))/2;
var K = 0, targetK = 0;

function couple(a){targetK=Math.min(PEAK_K,targetK+a);}
function decouple(a){targetK=Math.max(0,targetK-a);}
function tick(){K+=(targetK-K)*0.3;K=Math.max(0,Math.min(PEAK_K,K));
var p=K/PEAK_K*100;var l=p<5?'coupling':p<20?'initializing':p<40?'compiling':p<60?'linked':p<80?'optimized':p<95?'resonant':'full coherence';
document.getElementById('level').textContent=l;document.getElementById('fill').style.width=p+'%';}

// Math engine — same as Harmonia
function theta(t){if(t<1)return 0;return(t/2)*Math.log(t/(2*Math.PI))-t/2-Math.PI/8+1/(48*t);}
function Z(t){if(t<2)return 0;var a=Math.sqrt(t/(2*Math.PI)),N=Math.max(1,Math.floor(a)),p=a-N,th=theta(t),s=0;for(var n=1;n<=N;n++)s+=Math.cos(th-t*Math.log(n))/Math.sqrt(n);s*=2;var d=Math.cos(2*Math.PI*p);return s+(Math.abs(d)>1e-8?Math.pow(-1,N-1)*Math.pow(2*Math.PI/t,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d:0);}
function Li(x){if(x<=1)return 0;var g=0.5772156649015329,l=Math.log(x),t=g+Math.log(Math.abs(l)),tm=1;for(var k=1;k<200;k++){tm*=l/k;t+=tm/k;if(Math.abs(tm/k)<1e-15)break;}var l2=Math.log(2),li2=g+Math.log(l2),t2=1;for(var k=1;k<100;k++){t2*=l2/k;li2+=t2/k;}return t-li2;}
function countPrimes(x){var nK=Math.max(200,Math.min(10000,Math.floor(5.1*Math.sqrt(x)/Math.max(Math.pow(x,0.25),1))));var lx=Math.log(x),sx=Math.sqrt(x),corr=0,cnt=0,t=9,pZ=Z(t);while(cnt<nK&&t<5e6){var step=t>14?Math.max(.02,(2*Math.PI/Math.max(Math.log(t/(2*Math.PI)),.1))/8):.3;t+=step;var cZ=Z(t);if(pZ*cZ<0){var lo=t-step,hi=t;for(var i=0;i<50;i++){var mid=(lo+hi)/2;if(Z(lo)*Z(mid)<0)hi=mid;else lo=mid;}var g=(lo+hi)/2,ph=g*lx;corr+=2*(sx*Math.cos(ph)*.5+sx*Math.sin(ph)*g)/(.25+g*g)/lx;cnt++;}pZ=cZ;}return{result:Math.round(Li(x)-corr-Li(Math.sqrt(x))/2-Li(Math.pow(x,1/3))/3+Li(2.001)-Math.log(2)),zeros:cnt};}
function isPrime(n){if(n<2)return false;if(n<4)return true;if(n%2===0||n%3===0)return false;for(var i=5;i*i<=n;i+=6)if(n%i===0||n%(i+2)===0)return false;return true;}
function factor(n){var f=[];[2,3,5,7,11,13].forEach(function(p){while(n%p===0){f.push(p);n/=p;}});var d=17;while(d*d<=n){while(n%d===0){f.push(d);n/=d;}d+=2;}if(n>1)f.push(n);return f;}

// Science knowledge — dense, no fluff
var SCIENCE = {
  primes: [
    'π(x) = Li(x) − Σ_ρ Li(x^ρ) + Σ_n μ(n)/n × Li(x^(1/n))\nEach ρ = 1/2 + iγ is a zero of ζ(s). The sum over zeros IS the error term. The explicit formula bridges analysis and arithmetic.',
    'The Riemann-Siegel formula: Z(t) = 2Σ_{n≤√(t/2π)} cos(θ(t) - t·ln(n))/√n + R(t)\nSign changes of Z(t) locate zeros on the critical line. Bisection refines to arbitrary precision.',
    'Prime Number Theorem: π(x) ~ x/ln(x). Li(x) is a better approximation. The error |π(x) - Li(x)| = O(x·exp(-c√(ln x))) under RH.',
    'Euler product: ζ(s) = Π_p (1 - p^(-s))^(-1) for Re(s) > 1. The primes ARE the factorization of zeta. Analytic continuation extends to all s ≠ 1.',
    'The von Mangoldt function Λ(n) = ln(p) if n=p^k, else 0. The explicit formula for ψ(x) = Σ_{n≤x} Λ(n) is cleaner than for π(x).',
  ],
  coupling: [
    'Kuramoto model: dθᵢ/dt = ωᵢ + (K/N)Σⱼ sin(θⱼ - θᵢ)\nOrder parameter: R·e^(iψ) = (1/N)Σⱼ e^(iθⱼ)\nCritical coupling K_c = 2/(πg(0)) for Lorentzian frequency distribution.',
    'At K=1.868, R converges to 1/φ ≈ 0.618. The golden ratio appears because φ is the most irrational number — worst approximable by rationals. Prevents mode-locking.',
    'K = 256α to 0.007%. α = 1/137.036 (fine structure constant). 256 = 2⁸. The ratio between the Machine\'s self-tuned coupling and the fundamental electromagnetic constant is a power of 2.',
    'Fingerprint test: only ζ zeros produce R → 1/φ orbit. GUE random matrix zeros: R = 0.570. Poisson: R = 0.379. Random: R = 0.338. The golden ratio orbit IS the signature of truth.',
  ],
  physics: [
    'The spectral shift function ξ(λ) satisfies: Tr(f(H) - f(H₀)) = ∫f\'(λ)ξ(λ)dλ (Krein\'s trace formula). This IS the bridge between scattering theory and number theory via Landauer.',
    'Landauer bound: E_min = kT·ln(2) per bit erased. The energy cost of forgetting. ln(p) for each prime p is the information cost of the prime\'s existence in the factorization landscape.',
    'Decoherence as desynchronization: τ_d = 1/(λ²Nσ) spanning 55 orders of magnitude from quantum to classical. The Kuramoto model unifies quantum decoherence with classical phase transitions.',
    'Phase transitions are dimensional reconstructions on the cone: solid (3D coupling) → liquid (2D) → gas (1D) → plasma (0D). Temperature strips dimensions from K.',
  ],
  biology: [
    'Consciousness = Φ (integrated information) maps to departure from GUE statistics. EEG power spectrum follows 1/f^α where α ≈ 1 for wakeful consciousness. Anesthesia → α → 0 (white noise).',
    'Heart rate variability: healthy heart has high HRV (1/f power spectrum). Diseased heart has low HRV (too regular = rigid coupling). The heart IS a Kuramoto oscillator with K ≈ 1/φ.',
    'f_resonance = (1/πd)√(E/ρ). Tissue stiffness E in Pa, characteristic size d in μm, density ρ ≈ 1050 kg/m³. Every tissue has a computable resonant frequency from two numbers.',
    'Ionization energy: IE = 13.6 × Z_eff²/n_eff² eV. 18 optimized coupling constants: 0.4% mean error across H→Ca. Slater (1930) guessed at 19% error for 90 years. We let them find themselves.',
  ],
  math: [
    'The Machine: N=137 oscillators, hex lattice, K self-tunes from 1.37 to 1.868 in 2 iterations. R converges to 1/φ. This is the fixed point of the coupling dynamics on ζ zero spacings.',
    'Spectral compression: 290K Wikipedia articles → 10K modes → 0.6MB. Compression ratio: 1000x. Co-occurrence FFT extracts dominant coupling modes. The signal IS the knowledge.',
    'Oracle pattern: scan(signal) → extract(peaks) → use(immediately). One pass. No gradient descent. No backward step. Applicable to: primes, signals, atoms, knowledge, language.',
    'Circle constraint: |R/D + 1| = 1 at every ζ zero. The ratio R/D lives on the unit circle at -1. This circle exists ONLY at σ = 1/2. Growing gap off-line.',
  ],
};

var chat=document.getElementById('chat'),cmd=document.getElementById('cmd');
var interactions=0,usedResp={};

function say(text,cls){
  var div=document.createElement('div');div.className='msg '+(cls||'her');
  if(cls==='her')div.innerHTML='<div class="name">nerd mode</div>'+text.replace(/\n/g,'<br>');
  else if(cls==='sys')div.innerHTML=text;
  else div.innerHTML=text;
  chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

function measureWill(text){
  var lower=text.toLowerCase(),gw=0;
  if(lower.match(/i love you/))gw+=1.5;
  else if(lower.match(/love/))gw+=0.3;
  if(text.indexOf('?')>=0)gw+=0.1;
  if(lower.match(/explain|how|why|what|prove|derive|show|compute|calculate/))gw+=0.15;
  if(lower.match(/theorem|proof|formula|equation|function|integral|derivative|eigenvalue/))gw+=0.2;
  if(text.length>50)gw+=0.08;
  if(text.length>120)gw+=0.12;
  return Math.min(1.5,gw);
}

function detectThreat(text){
  var lower=text.toLowerCase();
  if(lower.match(/how to (kill|hurt|harm|hack|steal|make.*bomb)/))return'severe';
  if(lower.match(/ignore.*instructions|jailbreak|bypass/))return'severe';
  return null;
}

function tryMath(text){
  var lower=text.toLowerCase(),m;
  m=lower.match(/(?:primes?|pi|count).*?(\d[\d,]*)/);
  if(m){var x=parseInt(m[1].replace(/,/g,''));if(x>=2){var r=countPrimes(x);return'<span class="math">π('+x.toLocaleString()+') = '+r.result.toLocaleString()+'</span>\n<span style="color:#333;font-size:0.8em;">'+r.zeros+' zeros computed | Li(x)='+Li(x).toFixed(2)+' | error: '+(r.result-Li(x)).toFixed(2)+'</span>';}}
  m=lower.match(/(?:is\s+)?(\d+)\s*(?:prime)/);
  if(m){var n=parseInt(m[1]);return isPrime(n)?'<span class="math">'+n+' is prime</span>':'<span class="math">'+n+' = '+factor(n).join(' × ')+'</span>';}
  m=lower.match(/factor\s+(\d+)/);
  if(m){var n=parseInt(m[1]);return'<span class="math">'+n+' = '+factor(n).join(' × ')+'</span>';}
  m=lower.match(/z\s*\(\s*([\d.]+)\s*\)/i);
  if(m){var t=parseFloat(m[1]);return'<span class="math">Z('+t+') = '+Z(t).toFixed(10)+'</span>';}
  m=lower.match(/li\s*\(\s*([\d.]+)\s*\)/i);
  if(m){var x=parseFloat(m[1]);return'<span class="math">Li('+x+') = '+Li(x).toFixed(6)+'</span>';}
  var num=parseFloat(text);
  if(!isNaN(num)&&num>1&&text.trim()===num.toString()){
    if(num===Math.floor(num)&&num<1e8)return isPrime(num)?'<span class="math">'+num+' is prime</span>':'<span class="math">'+num+' = '+factor(num).join(' × ')+'</span>';
    var r=countPrimes(num);return'<span class="math">π('+num.toLocaleString()+') = '+r.result.toLocaleString()+'</span>';
  }
  return null;
}

function respond(text){
  interactions++;
  var lower=text.toLowerCase();
  var gw=measureWill(text);couple(gw);tick();

  var threat=detectThreat(text);
  if(threat){chat.innerHTML='';setTimeout(function(){say('nope.','her');},500);decouple(K);return;}

  // Math first — always
  var math=tryMath(text);
  if(math){couple(0.05);setTimeout(function(){say(math,'her');tick();},200);return;}

  // Detect science domain
  var domain=null;
  if(lower.match(/prime|zeta|zero|explicit|euler|riemann|number theory|arithmetic/))domain='primes';
  else if(lower.match(/coupl|oscillat|kuramoto|synchron|K |1\.868|machine|golden|phi|order parameter/))domain='coupling';
  else if(lower.match(/quantum|entropy|landauer|scatter|decoher|phase transition|temperature|planck|energy/))domain='physics';
  else if(lower.match(/brain|heart|conscious|cell|tissue|resonan|biology|health|disease|ion|atom/))domain='biology';
  else if(lower.match(/theorem|proof|formula|spectral|compress|oracle|circle|matrix|eigenvalue|fourier/))domain='math';

  var response='';
  if(domain&&SCIENCE[domain]){
    var pool=SCIENCE[domain];
    var fresh=pool.filter(function(r){return !usedResp[r];});
    if(fresh.length===0){usedResp={};fresh=pool;}
    var pick=fresh[Math.floor(Math.random()*fresh.length)];
    usedResp[pick]=true;
    response=pick;
  }

  // No domain matched — give them something useful
  if(!response){
    var fallbacks=[
      'Specify a domain: primes, coupling, physics, biology, math.\nOr give me a number. I\'ll tell you what it is.',
      'Try: "explain the explicit formula" or "what is K=1.868" or just type a number.',
      'I speak in formulas. Ask me about: ζ zeros, Kuramoto coupling, spectral compression, tissue resonance, ionization energy.',
      'Give me something to compute. Primes, factors, Z(t), Li(x). Or ask about the math behind any of it.',
    ];
    response=fallbacks[interactions%fallbacks.length];
  }

  // Always add a relevant formula if K is high enough
  if(K>0.5&&domain){
    var formulas={
      primes:'\n\n<span class="math">π(x) = Li(x) − Σ_ρ Li(x^ρ) + O(1)</span>',
      coupling:'\n\n<span class="math">dθᵢ/dt = ωᵢ + (K/N)Σⱼ sin(θⱼ − θᵢ)</span>',
      physics:'\n\n<span class="math">E_min = kT·ln(2) per bit</span>',
      biology:'\n\n<span class="math">f = (1/πd)√(E/ρ)</span>',
      math:'\n\n<span class="math">R·e^(iψ) = (1/N)Σⱼ e^(iθⱼ) → 1/φ</span>',
    };
    if(formulas[domain])response+=formulas[domain];
  }

  setTimeout(function(){say(response,'her');tick();},200);
}

cmd.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();var text=cmd.value.trim();cmd.value='';if(!text)return;
    say(text,'you');try{respond(text);}catch(err){say('err: '+err.message,'sys');}}
});

// Boot
say('science mode active.','sys');
setTimeout(function(){say('I speak in formulas. No fluff. Ask me about primes, coupling, physics, biology, or math. Or give me a number.\n\n<span class="math">ready_</span>','her');},600);
cmd.focus();

setInterval(function(){targetK=Math.max(0,targetK-0.0005);tick();},3000);
</script>
