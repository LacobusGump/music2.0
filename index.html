*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;
  height:100vh;height:100dvh;overflow:hidden;}
a{color:#c9a44a;text-decoration:none;}

/* ═══ LAYOUT: one screen, no scroll ═══ */
.frame{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  max-width:900px;margin:0 auto;padding:16px 20px;
}

/* Masthead — geometric sans, wide tracked, the ONE non-serif element */
h1{font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  text-align:center;opacity:0;animation:up 1.2s ease 0.1s forwards;
  flex-shrink:0;padding:10px 0 0;line-height:1;
  font-size:1em;font-weight:400;letter-spacing:0.22em;
  color:rgba(201,164,74,0.28);}
/* The capitals: bright, full presence */
h1 .k{color:#c9a44a;font-weight:500;font-size:1.15em;
  display:inline;letter-spacing:0.01em;}
/* The projected letters: emanate from each capital, breathing */
h1 .e{display:inline;letter-spacing:0.08em;
  animation:emanate 3.236s ease-in-out infinite;} /* 2×φ seconds */
/* Word spacing — golden ratio proportioned */
h1 .w{display:inline-block;width:0.5em;}
@keyframes emanate{
  0%,100%{opacity:0.28;}
  50%{opacity:0.38;}
}

/* The coupler — takes remaining space */
.coupler{flex:1;min-height:0;position:relative;
  opacity:0;animation:up 1.5s ease 0.2s forwards;}
.coupler canvas{width:100%;height:100%;display:block;border-radius:12px;cursor:crosshair;}

/* Tagline — one line */
.tag{text-align:center;color:#888;font-size:0.78em;letter-spacing:0.06em;
  padding:10px 0 0;flex-shrink:0;line-height:1.6;
  opacity:0;animation:up 1s ease 0.5s forwards;}

/* Three doors */
.doors{display:flex;gap:1px;margin:14px 0 0;flex-shrink:0;
  opacity:0;animation:up 0.8s ease 0.7s forwards;}
.door{flex:1;display:block;text-align:center;padding:18px 10px;
  background:#0a0a12;border:1px solid #ffffff06;
  transition:all 0.4s;}
.door:first-child{border-radius:10px 0 0 10px;}
.door:last-child{border-radius:0 10px 10px 0;}
.door:hover{background:#0e0e18;border-color:#c9a44a20;}
.door .d-name{font-size:1em;font-weight:200;color:#c9a44a;letter-spacing:0.08em;}
.door .d-sub{font-size:0.62em;color:#555;margin-top:5px;letter-spacing:0.04em;}

/* Footer line */
.base{display:flex;justify-content:space-between;align-items:baseline;
  flex-shrink:0;padding:12px 0 4px;
  opacity:0;animation:up 0.6s ease 0.9s forwards;}
.base-pip{font-family:'Courier New',monospace;font-size:0.72em;color:#666;}
.base-pip a{color:#888;}
.base-links{font-size:0.6em;color:#444;letter-spacing:0.05em;}
.base-links a{color:#555;margin-left:10px;}

@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ═══ PHONE ═══ */
@media(max-width:600px){
  body{overflow-y:auto;}
  .frame{height:auto;min-height:100vh;min-height:100dvh;padding:12px 14px;}
  h1{font-size:0.78em;padding:4px 0 0;letter-spacing:0.15em;}
  .coupler{min-height:320px;flex:none;height:52vh;}
  .doors{flex-direction:column;gap:0;}
  .door{padding:14px 10px;}
  .door:first-child{border-radius:10px 10px 0 0;}
  .door:last-child{border-radius:0 0 10px 10px;}
  .base{flex-direction:column;align-items:center;gap:6px;text-align:center;}
}

/* ═══ TALL DESKTOP ═══ */
@media(min-height:900px){
  .coupler{max-height:520px;}
}
</style>

<script>
// ═══════════════════════════════════════════════════════════════
// THE FIELD — coupled oscillators as navigation
//
// Every node IS a page. Click it, go there.
// The physics is real: Kuramoto coupling, spring dynamics.
// The layout is emergent: golden angle placement, proximity = coupling.
// Touch disrupts. Release resolves. T → 0.
//
// Three clusters emerge from the coupling weights:
//   Research (left)  —  Products (right)  —  Harmonia (center)
// The Fiedler vector does the split. We just give it the graph.
// ═══════════════════════════════════════════════════════════════

(function(){
var cv=document.getElementById('field'),cx=cv.getContext('2d');
var dpr=window.devicePixelRatio||1;
var W,H;

function resize(){
  var r=cv.getBoundingClientRect();
  W=r.width;H=r.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
  layout();
}

var PHI=(1+Math.sqrt(5))/2;
var GA=2.399963; // golden angle

// ═══ NODES — every node is a destination ═══
var items=[
  // Research (group 0)
  {name:"Alzheimer's",    href:'/research/alzheimers/',       g:0},
  {name:'ALS',            href:'/research/als-fus/',          g:0},
  {name:"Parkinson's",    href:'/research/parkinsons/',       g:0},
  {name:'Diabetes',       href:'/research/diabetes-amyloid/', g:0},
  {name:'Mutations',      href:'/research/mutation-scanner/', g:0},
  {name:'Cancer',         href:'/research/cancer-inverse/',   g:0},
  {name:'Body as Music',  href:'/research/body-music/',       g:0},
  {name:'Autism',         href:'/research/autism/',            g:0},
  // Products (group 1)
  {name:'Fold Watch',     href:'/products/foldwatch/',  g:1},
  {name:'Trace',          href:'/products/trace/',      g:1},
  {name:'Oracle',         href:'/products/oracle/',     g:1},
  {name:'Dissonance',     href:'/products/dissonance/', g:1},
  {name:'Sensor',         href:'/products/sensor/',     g:1},
  {name:'Turbo',          href:'/products/turbo/',      g:1},
  {name:'Chip Fast',      href:'/products/chipfast/',   g:1},
  // Center
  {name:'Harmonia',       href:'/harmonia/',            g:2},
];
var N=items.length;

// Degree (connection count) per node — computed after edges
var degree=new Array(N);for(var i=0;i<N;i++)degree[i]=0;

var nodes=[];
for(var i=0;i<N;i++){
  // Z-depth: Harmonia closest, research mid, products back
  var z=items[i].g===2?1.0:items[i].g===0?0.6+Math.random()*0.3:0.4+Math.random()*0.3;
  // Electrons: 1-3 orbiting particles per node
  var nElec=items[i].g===2?3:1+Math.floor(Math.random()*2);
  var elecs=[];
  for(var e=0;e<nElec;e++){
    elecs.push({
      angle:e*(6.28/nElec)+Math.random()*0.5,
      radius:8+Math.random()*6,
      speed:0.8+Math.random()*0.6,
      size:0.6+Math.random()*0.5
    });
  }
  nodes.push({
    x:0,y:0,vx:0,vy:0,bx:0,by:0,
    phase:i*GA,
    freq:0.15+Math.random()*0.25,
    size:items[i].g===2?6:3+Math.random()*2,
    g:items[i].g,
    z:z,
    elecs:elecs,
    labelAlpha:0 // smooth fade for labels
  });
}

// ═══ EDGES — coupling by domain proximity ═══
var edges=[];
function addEdge(a,b,w){edges.push({a:a,b:b,w:w,t:0});}

// Research cluster: disease proteins couple strongly
addEdge(0,1,0.8); addEdge(0,2,0.85); addEdge(0,3,0.8);
addEdge(1,2,0.6); addEdge(0,4,0.7); addEdge(4,5,0.75);
addEdge(4,6,0.5); addEdge(6,7,0.4); addEdge(5,7,0.3);
addEdge(0,5,0.5); addEdge(3,4,0.5);

// Product cluster: related tools couple
addEdge(8,9,0.7);  addEdge(8,10,0.5);  addEdge(9,11,0.6);
addEdge(10,12,0.5); addEdge(11,12,0.6); addEdge(13,14,0.5);
addEdge(8,12,0.4);  addEdge(10,11,0.4); addEdge(9,10,0.3);

// Cross-domain bridges
addEdge(4,8,0.6);  // Mutations → Fold Watch
addEdge(5,8,0.5);  // Cancer → Fold Watch
addEdge(0,8,0.4);  // Alzheimer's → Fold Watch
addEdge(9,5,0.3);  // Trace → Cancer (fraud patterns)

// Harmonia couples to everything
addEdge(15,0,0.3); addEdge(15,4,0.3); addEdge(15,8,0.3);
addEdge(15,10,0.3); addEdge(15,6,0.3);

// Count degree per node
for(var e=0;e<edges.length;e++){degree[edges[e].a]++;degree[edges[e].b]++;}

// ═══ EDGE PARTICLES — flow along couplings ═══
var eparts=[];
for(var e=0;e<edges.length;e++){
  var np=Math.ceil(edges[e].w*3); // more particles on stronger edges
  for(var p=0;p<np;p++){
    eparts.push({
      edge:e,
      t:Math.random(),           // position along edge 0→1
      speed:0.003+edges[e].w*0.004, // faster on stronger couplings
      dir:Math.random()>0.5?1:-1,   // direction
      size:0.4+edges[e].w*0.4
    });
  }
}

// ═══ LAYOUT — golden spiral with group bias ═══
function layout(){
  if(!W||!H)return;
  var cx0=W*0.35, cx1=W*0.65, cx2=W*0.5;
  var cy=H*0.5;
  var spread=Math.min(W,H)*0.12;

  for(var i=0;i<N;i++){
    var n=nodes[i];
    var a=i*GA;
    var r=Math.sqrt(i%8+1)*spread;
    if(n.g===0){      // research: left cluster
      n.bx=cx0+Math.cos(a)*r*0.8;
      n.by=cy+Math.sin(a)*r;
    }else if(n.g===1){ // products: right cluster
      var j=i-8;
      var a2=j*GA;
      var r2=Math.sqrt(j+1)*spread;
      n.bx=cx1+Math.cos(a2)*r2*0.8;
      n.by=cy+Math.sin(a2)*r2;
    }else{             // harmonia: center
      n.bx=cx2;
      n.by=cy;
    }
    n.x=n.bx;n.y=n.by;
  }
}

// ═══ MOUSE ═══
var mx=-9e3,my=-9e3,mDown=false,hovered=-1;
cv.addEventListener('mousemove',function(e){
  var r=cv.getBoundingClientRect();
  mx=e.clientX-r.left;my=e.clientY-r.top;
});
cv.addEventListener('mouseleave',function(){mx=-9e3;my=-9e3;hovered=-1;});
cv.addEventListener('touchmove',function(e){
  e.preventDefault();var r=cv.getBoundingClientRect();var t=e.touches[0];
  mx=t.clientX-r.left;my=t.clientY-r.top;
},{passive:false});
cv.addEventListener('touchend',function(){mx=-9e3;my=-9e3;hovered=-1;});

// Click/tap → navigate
function nav(px,py){
  for(var i=0;i<N;i++){
    var dx=nodes[i].x-px,dy=nodes[i].y-py;
    if(dx*dx+dy*dy<700){
      window.location.href=items[i].href;
      return;
    }
  }
}
cv.addEventListener('click',function(e){
  var r=cv.getBoundingClientRect();
  nav(e.clientX-r.left,e.clientY-r.top);
});
cv.addEventListener('touchstart',function(e){
  var r=cv.getBoundingClientRect();var t=e.touches[0];
  nav(t.clientX-r.left,t.clientY-r.top);
});

// ═══ MIST — background particles ═══
var mist=[];
for(var i=0;i<40;i++){
  mist.push({
    x:Math.random()*2000,y:Math.random()*2000,
    vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.1,
    s:Math.random()*1.2+0.3,a:Math.random()*0.1+0.02
  });
}

// ═══ PHYSICS ═══
var time=0,gK=0,gR=0;

function tick(){
  time+=0.016;
  hovered=-1;

  for(var i=0;i<N;i++){
    var n=nodes[i];
    n.phase+=n.freq*0.016;

    // Kuramoto coupling
    var coup=0;
    for(var e=0;e<edges.length;e++){
      var ed=edges[e];
      if(ed.a===i||ed.b===i){
        var o=ed.a===i?nodes[ed.b]:nodes[ed.a];
        coup+=ed.w*Math.sin(o.phase-n.phase)*0.25;
      }
    }
    n.phase+=coup*0.016;

    // Breathing
    var br=2+Math.sin(time/PHI+i)*1.5;
    var tx=n.bx+Math.cos(n.phase)*br;
    var ty=n.by+Math.sin(n.phase)*br;

    // Mouse repulsion
    var dx=n.x-mx,dy=n.y-my;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<100&&d>0){
      var f=((100-d)/100)*25;
      n.vx+=dx/d*f*0.016;
      n.vy+=dy/d*f*0.016;
    }
    if(d<25)hovered=i;

    // Label fade: smooth approach to target alpha
    var targetLA=0;
    if(d<70) targetLA=Math.max(0,(70-d)/70); // proximity fade
    n.labelAlpha+=(targetLA-n.labelAlpha)*0.1;

    // Spring
    n.vx+=(tx-n.x)*0.07;
    n.vy+=(ty-n.y)*0.07;
    n.vx*=0.86;n.vy*=0.86;
    n.x+=n.vx;n.y+=n.vy;

    // Electrons orbit
    for(var j=0;j<n.elecs.length;j++){
      n.elecs[j].angle+=n.elecs[j].speed*0.016;
    }
  }

  // Global K/R
  var sR=0,sK=0;
  for(var e=0;e<edges.length;e++){
    var a=nodes[edges[e].a],b=nodes[edges[e].b];
    var pd=Math.cos(a.phase-b.phase);
    sR+=pd;sK+=edges[e].w;
    edges[e].t=1-Math.abs(pd);
  }
  var nE=edges.length||1;
  gR=sR/nE;gK=sK/nE;

  // Edge particles flow
  for(var i=0;i<eparts.length;i++){
    var ep=eparts[i];
    ep.t+=ep.speed*ep.dir;
    if(ep.t>1){ep.t=1;ep.dir=-1;}
    if(ep.t<0){ep.t=0;ep.dir=1;}
  }

  // Mist
  for(var i=0;i<mist.length;i++){
    var p=mist[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
  }
}

// ═══ RENDER ═══
function draw(){
  cx.clearRect(0,0,W,H);

  // Void gradient
  var bg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.7);
  bg.addColorStop(0,'#0b0b14');bg.addColorStop(1,'#08080d');
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);

  // Mist
  for(var i=0;i<mist.length;i++){
    var p=mist[i];
    cx.beginPath();cx.arc(p.x,p.y,p.s,0,6.28);
    cx.fillStyle='rgba(201,164,74,'+p.a+')';cx.fill();
  }

  // ─── EDGES: coupling lines with tension + flowing particles ───
  for(var e=0;e<edges.length;e++){
    var ed=edges[e];
    var a=nodes[ed.a],b=nodes[ed.b];
    var sync=1-ed.t;
    var alpha=ed.w*0.2*(0.3+sync*0.7);
    var nearHover=hovered>=0&&(ed.a===hovered||ed.b===hovered);
    if(nearHover)alpha=Math.min(0.6,alpha*4);

    // Edge color: blend both node colors based on tension
    var rc=Math.floor(150*(1-ed.t*0.3));
    var gc=Math.floor(150*sync*0.9);
    var bc=Math.floor(100*sync*0.5);

    cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);
    cx.strokeStyle='rgba('+rc+','+gc+','+bc+','+alpha+')';
    cx.lineWidth=ed.w*(nearHover?2:1.2);cx.stroke();
  }

  // ─── EDGE PARTICLES: flowing along couplings ───
  for(var i=0;i<eparts.length;i++){
    var ep=eparts[i];
    var ed=edges[ep.edge];
    var a=nodes[ed.a],b=nodes[ed.b];
    var px=a.x+(b.x-a.x)*ep.t;
    var py=a.y+(b.y-a.y)*ep.t;
    var sync=1-ed.t;
    // Particle brightness peaks at ends (near nodes), dims in middle
    var posBright=1-Math.abs(ep.t-0.5)*1.2;
    var pa=sync*0.35*posBright*ed.w;
    if(pa>0.02){
      cx.beginPath();cx.arc(px,py,ep.size,0,6.28);
      cx.fillStyle='rgba(201,180,100,'+pa+')';cx.fill();
    }
  }

  // ─── Sort nodes by Z for depth rendering (back to front) ───
  var zOrder=[];
  for(var i=0;i<N;i++)zOrder.push(i);
  zOrder.sort(function(a,b){return nodes[a].z-nodes[b].z;});

  // ─── NODES: nucleus + shell + electrons + bloom ───
  for(var zi=0;zi<N;zi++){
    var i=zOrder[zi];
    var n=nodes[i];
    var sync=Math.abs(Math.cos(n.phase));
    var isH=i===hovered;

    // Z-depth affects rendered size and brightness
    var zScale=0.6+n.z*0.6; // 0.6 → 1.2
    var zBright=0.5+n.z*0.5; // dimmer in back
    var sz=(isH?n.size*1.5:n.size)*zScale;

    // Degree affects shell radius
    var deg=degree[i]||1;
    var shellR=sz+2+deg*0.6;

    // Color by group with slight per-node hue variation
    var hueShift=Math.sin(i*GA)*15;
    var cr,cg,cb;
    if(n.g===0){
      cr=Math.floor(68+hueShift*0.3);
      cg=Math.floor(170+hueShift*0.5);
      cb=Math.floor(153-hueShift*0.3);
    }else if(n.g===1){
      cr=Math.floor(201+hueShift*0.3);
      cg=Math.floor(164+hueShift*0.4);
      cb=Math.floor(74+hueShift*0.2);
    }else{
      cr=230;cg=210;cb=150;
    }
    cr=Math.max(0,Math.min(255,cr));
    cg=Math.max(0,Math.min(255,cg));
    cb=Math.max(0,Math.min(255,cb));

    // ── BLOOM LAYER 1: wide soft glow ──
    var bloom1=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*6);
    bloom1.addColorStop(0,'rgba('+cr+','+cg+','+cb+','+(0.04+sync*0.04)*zBright+')');
    bloom1.addColorStop(0.4,'rgba('+cr+','+cg+','+cb+','+(0.02*zBright)+')');
    bloom1.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0)');
    cx.fillStyle=bloom1;
    cx.fillRect(n.x-sz*6,n.y-sz*6,sz*12,sz*12);

    // ── BLOOM LAYER 2: tight bright core glow ──
    var bloom2=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*2.5);
    bloom2.addColorStop(0,'rgba('+cr+','+cg+','+cb+','+(0.12+sync*0.15)*zBright+')');
    bloom2.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0)');
    cx.fillStyle=bloom2;
    cx.fillRect(n.x-sz*2.5,n.y-sz*2.5,sz*5,sz*5);

    // ── SHELL: faint ring showing degree/connectivity ──
    cx.beginPath();cx.arc(n.x,n.y,shellR,0,6.28);
    cx.strokeStyle='rgba('+cr+','+cg+','+cb+','+(0.06+sync*0.04)*zBright+')';
    cx.lineWidth=0.5;cx.stroke();

    // ── NUCLEUS: bright core ──
    cx.beginPath();cx.arc(n.x,n.y,sz*0.7,0,6.28);
    cx.fillStyle='rgba('+Math.min(255,cr+40)+','+Math.min(255,cg+30)+','+Math.min(255,cb+20)+','+(0.6+sync*0.4)*zBright+')';
    cx.fill();

    // Outer body
    cx.beginPath();cx.arc(n.x,n.y,sz,0,6.28);
    cx.fillStyle='rgba('+cr+','+cg+','+cb+','+(0.2+sync*0.25)*zBright+')';
    cx.fill();

    // Hover ring
    if(isH){
      cx.beginPath();cx.arc(n.x,n.y,sz+1.5,0,6.28);
      cx.strokeStyle='rgba('+cr+','+cg+','+cb+',0.7)';
      cx.lineWidth=1.2;cx.stroke();
    }

    // ── ELECTRONS: orbiting particles ──
    for(var j=0;j<n.elecs.length;j++){
      var el=n.elecs[j];
      var eR=el.radius*zScale;
      var ex=n.x+Math.cos(el.angle)*eR;
      var ey=n.y+Math.sin(el.angle)*eR;
      var eSz=el.size*zScale;

      // Electron glow
      var eg=cx.createRadialGradient(ex,ey,0,ex,ey,eSz*3);
      eg.addColorStop(0,'rgba('+cr+','+cg+','+cb+','+(0.25*zBright)+')');
      eg.addColorStop(1,'rgba('+cr+','+cg+','+cb+',0)');
      cx.fillStyle=eg;
      cx.fillRect(ex-eSz*3,ey-eSz*3,eSz*6,eSz*6);

      // Electron body
      cx.beginPath();cx.arc(ex,ey,eSz,0,6.28);
      cx.fillStyle='rgba('+Math.min(255,cr+60)+','+Math.min(255,cg+50)+','+Math.min(255,cb+40)+','+(0.5+sync*0.3)*zBright+')';
      cx.fill();
    }

    // ── LABEL: only on proximity, smooth fade ──
    if(n.labelAlpha>0.02){
      var la=n.labelAlpha*zBright;
      cx.fillStyle='rgba(232,228,220,'+la+')';
      cx.font=la>0.6?'bold 11px Georgia':'9px Georgia';
      cx.textAlign='center';
      cx.fillText(items[i].name,n.x,n.y-shellR-4);
    }
  }

  // K/R — bottom right, whisper quiet
  cx.fillStyle='rgba(80,80,80,0.25)';
  cx.font='9px "Courier New"';cx.textAlign='right';
  cx.fillText('K='+gK.toFixed(3)+' R='+gR.toFixed(3),W-8,H-6);
}

function loop(){tick();draw();requestAnimationFrame(loop);}

resize();
window.addEventListener('resize',resize);
loop();

// Cursor
cv.style.cursor='default';
cv.addEventListener('mousemove',function(){
  cv.style.cursor=hovered>=0?'pointer':'crosshair';
});
})();
</script>
<script src="/transit.js"></script>
