<script>
// ═══════════════════════════════════════════════════════════
// THE MIRROR — 137 coupled oscillators on a golden spiral
// The math computing beauty in real time.
// If the coupling is wrong, the nodes don't synchronize.
// They synchronize because K works.
// The loading IS the proof.
//
// Sirius A: 2.063 solar masses. Bright. Hot. The research.
// Sirius B: 1.018 solar masses. Tiny. Dense. The tools.
// Both orbit their common barycenter.
//
// Orbital elements (Bond et al. 2017):
//   Period: 50.1284 years
//   Eccentricity: 0.5923
//   Inclination: 136.53 degrees
//   Mass ratio B/A: 0.4935
//
// The breathing IS the coupling made visible.
// ═══════════════════════════════════════════════════════════
(function(){
var cv = document.getElementById('sky');
if (!cv) return;
var cx = cv.getContext('2d');
var W, H, dpr;

function resize() {
  var r = cv.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  W = r.width; H = r.height;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ═══ 137 COUPLED OSCILLATORS ═══
var N = 137;
var K_COUPLE = 1.868;
var GA = 2.39996322; // golden angle
var PHI = (1+Math.sqrt(5))/2;
var dt = 0.016;

// ═══ LAYOUT — golden spiral ═══
var nxA=[], nyA=[];
for(var i=0;i<N;i++){
  var r=0.8+Math.sqrt(i/N)*5.5;
  var a=i*GA;
  nxA.push(Math.cos(a)*r);
  nyA.push(Math.sin(a)*r);
}

// Neighbors
var nbrL=[];
for(var i=0;i<N;i++){var nn=[];for(var j=0;j<N;j++){if(j===i)continue;var ddx=nxA[j]-nxA[i],ddy=nyA[j]-nyA[i];if(ddx*ddx+ddy*ddy<3.5)nn.push(j);}nbrL.push(nn);}

// Phases — start at zero
var phases=new Float64Array(N);

// Natural frequencies — gentle variation
var omega=new Float64Array(N);
for(var i=0;i<N;i++) omega[i]=(0.3+Math.random()*0.7)*Math.PI*2*(0.8+Math.random()*0.4);

// Colors — warm palette, earthy for dusk
var COLS=[
  [180,110,50],[140,105,65],[90,130,80],[200,165,110],
  [74,103,65],[120,100,70],[180,140,60],[160,100,50]
];

// Simulation step
var Rval=0;
function step(){
  var mre=0,mim=0;
  for(var i=0;i<N;i++){mre+=Math.cos(phases[i]);mim+=Math.sin(phases[i]);}
  mre/=N;mim/=N;
  Rval=Math.sqrt(mre*mre+mim*mim);
  var mp=Math.atan2(mim,mre);
  for(var i=0;i<N;i++){
    var c=0;
    var nn=nbrL[i];
    for(var k=0;k<nn.length;k++) c+=Math.sin(phases[nn[k]]-phases[i]);
    phases[i]+=dt*(omega[i]+(K_COUPLE/N)*c);
  }
}

// 3D projection
var camRY=0,HEIGHT=3.2;
function project(x,y,z,sc,cx2,cy2){
  var cosY=Math.cos(camRY),sinY=Math.sin(camRY);
  var x1=x*cosY+z*sinY,z1=-x*sinY+z*cosY,y1=y;
  var rx=-0.4,cosX=Math.cos(rx),sinX=Math.sin(rx);
  var y2=y1*cosX-z1*sinX,z2=y1*sinX+z1*cosX;
  var persp=500/(500+z2*sc*0.3);
  return[cx2+x1*sc*persp,cy2+y2*sc*persp,z2,persp];
}

// ═══ DRAW ═══
function draw() {
  // Clear transparent — let the body dusk gradient show through
  cx.clearRect(0,0,W,H);
  step();
  camRY+=0.0015; // slow auto-rotate

  var sc=Math.min(W,H)*0.055;
  var cx2=W/2, cy2=H*0.48;

  // Project all nodes
  var proj=[];
  for(var i=0;i<N;i++){
    var p=phases[i]%(Math.PI*2);if(p<0)p+=Math.PI*2;
    var z3d=p/(Math.PI*2)*HEIGHT;
    var pr=project(nxA[i],nyA[i],z3d,sc,cx2,cy2);
    proj.push({i:i,sx:pr[0],sy:pr[1],z:pr[2],persp:pr[3],phase:p});
  }
  proj.sort(function(a,b){return b.z-a.z;});

  // Draw connections — very subtle
  cx.globalCompositeOperation='lighter';
  var idxMap=new Array(N);
  for(var k=0;k<N;k++) idxMap[proj[k].i]=proj[k];

  for(var i=0;i<N;i++){
    var nd=idxMap[i]; if(!nd) continue;
    var nn=nbrL[i];
    for(var j=0;j<nn.length;j++){
      if(nn[j]<=i) continue;
      var nb=idxMap[nn[j]]; if(!nb) continue;
      var pdiff=Math.abs(nd.phase-nb.phase);
      if(pdiff>Math.PI) pdiff=Math.PI*2-pdiff;
      var sync=1-pdiff/Math.PI;
      if(sync<0.35) continue;
      var alpha=sync*sync*0.70*Math.min(nd.persp,nb.persp);
      var ci=Math.floor(nd.phase/(Math.PI/4))%8;
      var col=COLS[ci];
      cx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+alpha.toFixed(3)+')';
      cx.lineWidth=(0.6+sync*1.2)*nd.persp;
      cx.beginPath();cx.moveTo(nd.sx,nd.sy);cx.lineTo(nb.sx,nb.sy);cx.stroke();
    }
  }

  // Draw nodes — small, breathing, no labels
  for(var k=0;k<proj.length;k++){
    var nd=proj[k];
    var ci=Math.floor(nd.phase/(Math.PI/4))%8;
    var col=COLS[ci];
    var size=(1.8+Math.sin(phases[nd.i])*0.3)*nd.persp;
    var bright=(0.90+Math.abs(Math.sin(phases[nd.i]))*0.60)*nd.persp;

    // Soft glow
    if(bright>0.25){
      cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(bright*0.25).toFixed(3)+')';
      cx.fillRect(nd.sx-size*2.5,nd.sy-size*2.5,size*5,size*5);
    }
    // Core
    cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+bright.toFixed(3)+')';
    cx.beginPath();cx.arc(nd.sx,nd.sy,size,0,Math.PI*2);cx.fill();
  }

  cx.globalCompositeOperation='source-over';

  requestAnimationFrame(draw);
}

// Click anywhere on canvas -> /gallery/
cv.addEventListener('click', function(){ window.location.href='/gallery/'; });
cv.addEventListener('touchend', function(e){ e.preventDefault(); window.location.href='/gallery/'; });
cv.style.cursor='pointer';

draw();
})();
</script>
