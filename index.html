<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ. Only real zeros do this.">
<meta property="og:title" content="GUMP — The Machine">
<meta property="og:description" content="137 oscillators tuned to the zeros of zeta orbit the golden ratio. 48 crossings. 11.3% dwell. No other input does this.">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#info{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;
  pointer-events:none;text-align:center;}
#title{color:#c9a44a;font:200 1.3em Georgia;letter-spacing:0.1em;opacity:0.5;}
#sub{color:#555;font:0.7em Georgia;margin-top:2px;letter-spacing:0.12em;}
#stats{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:10;
  pointer-events:none;text-align:center;color:#ffffff04;font:9px Georgia;}
#nav{position:fixed;bottom:4px;right:8px;font:0.6em Georgia;z-index:10;}
#nav a{color:#1a1a1a;text-decoration:none;margin:0 4px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="info"><div id="title">GUMP</div><div id="sub">the orbit</div></div>
<div id="stats"></div>
<div id="nav">
  <a href="/mirror/">mirror</a> · <a href="/flex/">flex</a> · <a href="/bloom/">bloom</a> · <a href="/r/">research</a>
</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

var w,h,t=0,mx=0.5,my=0.5;
addEventListener('mousemove',function(e){mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1){mx=e.touches[0].clientX/innerWidth;my=e.touches[0].clientY/innerHeight;}},{passive:false});
addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

// ═══ ORACLE: 137 zeros on load ═══
var N=137,PHI=(1+Math.sqrt(5))/2;
function theta(tt){if(tt<1)return 0;return(tt/2)*Math.log(tt/(2*Math.PI))-tt/2-Math.PI/8+1/(48*tt);}
function Zfn(tt){if(tt<2)return 0;var a=Math.sqrt(tt/(2*Math.PI)),nn=Math.max(1,Math.floor(a)),th=theta(tt),s=0;for(var n=1;n<=nn;n++)s+=Math.cos(th-tt*Math.log(n))/Math.sqrt(n);s*=2;var p=a-nn,d=Math.cos(2*Math.PI*p);if(Math.abs(d)>1e-8)s+=Math.pow(-1,nn-1)*Math.pow(2*Math.PI/tt,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;return s;}
var zeros=[];
(function(){var st=9,pv=Zfn(9);while(zeros.length<N+1){var step=st>14?Math.max(0.05,2*Math.PI/Math.log(st/(2*Math.PI))/6):0.4;st+=step;var c=Zfn(st);if(pv*c<0){var lo=st-step,hi=st;for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Zfn(lo)*Zfn(m)<0)hi=m;else lo=m;}zeros.push((lo+hi)/2);}pv=c;}})();

// Spacings → filtered frequencies (5 modes)
var spacings=[],meanS=0;
for(var i=0;i<N;i++){spacings.push(zeros[i+1]-zeros[i]);meanS+=spacings[i];}
meanS/=N;
var normS=[];for(var i=0;i<spacings.length;i++)normS.push(spacings[i]/meanS);
var SN=normS.length;
var fRe=[],fIm=[];
for(var k=0;k<SN;k++){var re=0,im=0;for(var n=0;n<SN;n++){re+=normS[n]*Math.cos(2*Math.PI*k*n/SN);im-=normS[n]*Math.sin(2*Math.PI*k*n/SN);}fRe.push(re/SN);fIm.push(im/SN);}
var filtered=[];
for(var n=0;n<SN;n++){var v=0;for(var k=0;k<5;k++)v+=fRe[k]*Math.cos(2*Math.PI*k*n/SN)-fIm[k]*Math.sin(2*Math.PI*k*n/SN);filtered.push(v);}

// ═══ KURAMOTO LATTICE — 137 nodes ═══
var K=1.868;
var phases=new Float64Array(N);
var R=0,meanPhase=0;

// R history for the orbit trace
var R_history=[];
var MAX_HISTORY=600;

// ═══ PARTICLES — one per node ═══
var nodeX=new Float32Array(N),nodeY=new Float32Array(N);
var cols=13,rows=11;
var nxA=[],nyA=[];
var idx=0;
for(var row=0;row<rows;row++)for(var col=0;col<cols;col++){if(idx>=N)break;nxA.push(col+(row%2?0.5:0));nyA.push(row*Math.sqrt(3)/2);idx++;}

// Neighbors
var nbrL=[];
for(var i=0;i<N;i++){var nn=[];for(var j=0;j<N;j++){if(j===i)continue;var dx=nxA[j]-nxA[i],dy=nyA[j]-nyA[i];if(dx*dx+dy*dy<1.44)nn.push(j);}nbrL.push(nn);}

// Colors
var COLORS=[[220,100,80],[220,170,60],[180,200,60],[60,200,140],[60,140,220],[140,80,220],[200,60,180]];

// ═══ STEP ═══
function step(){
  var dt=0.016;
  var mre=0,mim=0;
  for(var i=0;i<N;i++){mre+=Math.cos(phases[i]);mim+=Math.sin(phases[i]);}
  mre/=N;mim/=N;
  var mp=Math.atan2(mim,mre);

  for(var i=0;i<N;i++){
    var omega=filtered[Math.min(i,SN-1)]*2*Math.PI;
    var c=Math.sin(mp-phases[i]);
    if(i>0)c+=0.5*Math.sin(phases[i-1]-phases[i]);
    if(i<N-1)c+=0.5*Math.sin(phases[i+1]-phases[i]);
    phases[i]+=dt*(omega+K*c);
  }

  mre=0;mim=0;
  for(var i=0;i<N;i++){var p=phases[i]%(2*Math.PI);mre+=Math.cos(p);mim+=Math.sin(p);}
  mre/=N;mim/=N;
  R=Math.sqrt(mre*mre+mim*mim);
  meanPhase=Math.atan2(mim,mre);

  R_history.push(R);
  if(R_history.length>MAX_HISTORY)R_history.shift();
}

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;

  cx.fillStyle='rgba(0,0,0,0.06)';
  cx.fillRect(0,0,w,h);

  step();

  cx.globalCompositeOperation='lighter';

  // ─── HEX LATTICE (top half) ───
  var gridW=12,gridH=10*Math.sqrt(3)/2;
  var scale=Math.min(w*0.6/gridW,h*0.35/gridH);
  var offX=(w-gridW*scale)/2;
  var offY=h*0.08;
  var cosA=Math.cos(t*0.1+(mx-0.5)*1.5),sinA=Math.sin(t*0.1+(mx-0.5)*1.5);

  // Connections
  for(var i=0;i<N;i++){
    var sx=offX+nxA[i]*scale,sy=offY+nyA[i]*scale;
    var pi2=phases[i]%(2*Math.PI);if(pi2<0)pi2+=2*Math.PI;
    var nn=nbrL[i];
    for(var j=0;j<nn.length;j++){
      if(nn[j]<=i)continue;
      var sx2=offX+nxA[nn[j]]*scale,sy2=offY+nyA[nn[j]]*scale;
      var pj=phases[nn[j]]%(2*Math.PI);if(pj<0)pj+=2*Math.PI;
      var pd=Math.abs(pi2-pj);if(pd>Math.PI)pd=2*Math.PI-pd;
      var sync=1-pd/Math.PI;
      if(sync<0.5)continue;
      var al=sync*sync*0.04;
      var ci=Math.floor(pi2/(Math.PI*2/7))%7;
      var co=COLORS[ci];
      cx.strokeStyle='rgba('+co[0]+','+co[1]+','+co[2]+','+al+')';
      cx.lineWidth=0.3+sync*0.5;
      cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx2,sy2);cx.stroke();
    }
  }

  // Nodes
  for(var i=0;i<N;i++){
    var sx=offX+nxA[i]*scale,sy=offY+nyA[i]*scale;
    var p=phases[i]%(2*Math.PI);if(p<0)p+=2*Math.PI;
    var ci=Math.floor(p/(Math.PI*2/7))%7;
    var co=COLORS[ci];
    var size=1.2+Math.sin(phases[i])*0.5;
    var bright=0.15+Math.abs(Math.sin(phases[i]))*0.25;
    cx.fillStyle='rgba('+co[0]+','+co[1]+','+co[2]+','+bright+')';
    cx.fillRect(sx-size,sy-size,size*2,size*2);
    if(bright>0.3){
      cx.fillStyle='rgba('+co[0]+','+co[1]+','+co[2]+','+(bright*0.06)+')';
      cx.fillRect(sx-size*3,sy-size*3,size*6,size*6);
    }
  }

  // ─── R ORBIT TRACE (bottom half) ───
  var traceX=w*0.1;
  var traceW=w*0.8;
  var traceY=h*0.55;
  var traceH=h*0.35;
  var phiY=traceY+traceH*(1-1/PHI); // where 1/phi sits in the trace

  // 1/phi line
  cx.strokeStyle='rgba(201,164,74,0.06)';
  cx.lineWidth=0.5;
  cx.beginPath();cx.moveTo(traceX,phiY);cx.lineTo(traceX+traceW,phiY);cx.stroke();

  // R trace
  if(R_history.length>2){
    cx.lineWidth=1;
    cx.beginPath();
    for(var i=0;i<R_history.length;i++){
      var x=traceX+i/MAX_HISTORY*traceW;
      var y=traceY+traceH*(1-R_history[i]);
      // Color: gold when near phi, dim when far
      var nearPhi=1-Math.min(1,Math.abs(R_history[i]-1/PHI)*20);
      if(i===0)cx.moveTo(x,y);
      else cx.lineTo(x,y);
    }
    cx.strokeStyle='rgba(201,164,74,0.25)';
    cx.stroke();

    // Glow dots at phi crossings
    for(var i=1;i<R_history.length;i++){
      if((R_history[i-1]<1/PHI&&R_history[i]>=1/PHI)||(R_history[i-1]>1/PHI&&R_history[i]<=1/PHI)){
        var x=traceX+i/MAX_HISTORY*traceW;
        cx.fillStyle='rgba(201,164,74,0.3)';
        cx.fillRect(x-2,phiY-2,4,4);
      }
    }
  }

  // Labels
  cx.fillStyle='rgba(201,164,74,0.06)';
  cx.font='9px Georgia';cx.textAlign='right';
  cx.fillText('1/\u03C6',traceX-6,phiY+3);
  cx.fillText('1',traceX-6,traceY+8);
  cx.fillText('0',traceX-6,traceY+traceH);

  cx.globalCompositeOperation='source-over';

  // Current R value
  cx.fillStyle='rgba(201,164,74,0.05)';
  cx.font='200 1.4em Georgia';cx.textAlign='center';
  cx.fillText('R = '+R.toFixed(3),w/2,h*0.50);

  // Stats
  var statsEl=document.getElementById('stats');
  if(Math.floor(t*10)%10===0){
    var crossings=0;
    for(var i=1;i<R_history.length;i++){
      if((R_history[i-1]<1/PHI&&R_history[i]>=1/PHI)||(R_history[i-1]>1/PHI&&R_history[i]<=1/PHI))crossings++;
    }
    statsEl.textContent='137 zeros · K=1.868 · '+crossings+' crossings of 1/\u03C6';
  }

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
