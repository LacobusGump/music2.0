<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;}

h1{font:100 clamp(2.5em,8vw,4.5em) Georgia;letter-spacing:0.3em;
  color:#c9a44a;opacity:0;animation:emerge 2s ease 0.3s forwards;
  margin-bottom:4vh;text-indent:0.3em;}

nav{display:flex;flex-direction:column;align-items:center;gap:3.5vh;}

nav a{text-decoration:none;font:100 clamp(0.9em,2.5vw,1.15em) Georgia;
  letter-spacing:0.35em;text-transform:uppercase;text-indent:0.35em;
  color:#c9a44a;opacity:0;position:relative;padding:0.6em 0;
  transition:color 0.3s;}

nav a::after{content:'';position:absolute;bottom:0.3em;left:50%;width:0;height:1px;
  background:#c9a44a;transition:width 0.4s ease,left 0.4s ease;}
nav a:hover::after,nav a:active::after{width:60%;left:20%;}
nav a:hover{color:#f4d990;}

nav a:nth-child(1){animation:emerge 1.2s ease 0.8s forwards;}
nav a:nth-child(2){animation:emerge 1.2s ease 1.1s forwards;}
nav a:nth-child(3){animation:emerge 1.2s ease 1.4s forwards;}
nav a:nth-child(4){animation:emerge 1.2s ease 1.7s forwards;}
nav a:nth-child(5){animation:emerge 1.2s ease 2.0s forwards;}
nav a:nth-child(6){animation:emerge 1.2s ease 2.3s forwards;}

.sub{font:0.45em Georgia;letter-spacing:0.15em;color:#333;
  display:block;margin-top:2px;text-transform:lowercase;}

@keyframes emerge{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}

canvas{position:fixed;bottom:0;left:0;width:100vw;height:40px;}

.tag{position:fixed;bottom:44px;left:50%;transform:translateX(-50%);
  font:0.5em Georgia;color:#1a1a1a;letter-spacing:0.15em;white-space:nowrap;}
</style>
</head>
<body>

<h1>GUMP</h1>

<nav>
  <a href="/r/">research<span class="sub">the full story</span></a>
  <a href="/one/">one<span class="sub">knowledge engine</span></a>
  <a href="/flex/">flex<span class="sub">100K particles</span></a>
  <a href="/bloom/">bloom<span class="sub">nothing to life</span></a>
  <a href="/resonance/">resonance<span class="sub">tissue targeting</span></a>
  <a href="/oracle/">oracle<span class="sub">primes from nothing</span></a>
</nav>

<div class="tag">137 zeros · K = 1.868 · the orbit</div>
<canvas id="R"></canvas>

<script>
// The only JS: the R orbit trace at the bottom.
// 137 Kuramoto oscillators. R crossing 1/φ. The heartbeat.
var cv=document.getElementById('R'),cx=cv.getContext('2d');
var DPR=devicePixelRatio||1;
cv.width=innerWidth*DPR;cv.height=40*DPR;
cx.setTransform(DPR,0,0,DPR,0,0);
var W=innerWidth,H=40;

// Minimal oracle: just compute 137 spacings
function theta(tt){if(tt<1)return 0;return(tt/2)*Math.log(tt/(2*Math.PI))-tt/2-Math.PI/8+1/(48*tt);}
function Z(tt){if(tt<2)return 0;var a=Math.sqrt(tt/(2*Math.PI)),N=Math.max(1,Math.floor(a)),th=theta(tt),s=0;for(var n=1;n<=N;n++)s+=Math.cos(th-tt*Math.log(n))/Math.sqrt(n);s*=2;var p=a-N,d=Math.cos(2*Math.PI*p);if(Math.abs(d)>1e-8)s+=Math.pow(-1,N-1)*Math.pow(2*Math.PI/tt,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;return s;}
var zeros=[],st=9,pv=Z(9);
while(zeros.length<138){var step=st>14?Math.max(0.05,2*Math.PI/Math.log(st/(2*Math.PI))/6):0.4;st+=step;var cv2=Z(st);if(pv*cv2<0){var lo=st-step,hi=st;for(var i=0;i<30;i++){var m=(lo+hi)/2;if(Z(lo)*Z(m)<0)hi=m;else lo=m;}zeros.push((lo+hi)/2);}pv=cv2;}
var spacings=[],meanS=0;
for(var i=0;i<137;i++){spacings.push(zeros[i+1]-zeros[i]);meanS+=spacings[i];}
meanS/=137;
var normS=spacings.map(function(s){return s/meanS;});
var SN=normS.length,fRe=[],fIm=[];
for(var k=0;k<SN;k++){var re=0,im=0;for(var n=0;n<SN;n++){re+=normS[n]*Math.cos(2*Math.PI*k*n/SN);im-=normS[n]*Math.sin(2*Math.PI*k*n/SN);}fRe.push(re/SN);fIm.push(im/SN);}
var filtered=[];
for(var n=0;n<SN;n++){var v=0;for(var k=0;k<5;k++)v+=fRe[k]*Math.cos(2*Math.PI*k*n/SN)-fIm[k]*Math.sin(2*Math.PI*k*n/SN);filtered.push(v);}

// Kuramoto
var N2=137,K=1.868,PHI=(1+Math.sqrt(5))/2;
var phases=new Float64Array(N2);
var R=0,t=0;

function tick(){
  t+=0.016;
  var mre=0,mim=0;
  for(var i=0;i<N2;i++){mre+=Math.cos(phases[i]);mim+=Math.sin(phases[i]);}
  mre/=N2;mim/=N2;
  var mp=Math.atan2(mim,mre);
  for(var i=0;i<N2;i++){
    var omega=filtered[Math.min(i,SN-1)]*2*Math.PI;
    var c=Math.sin(mp-phases[i]);
    if(i>0)c+=0.5*Math.sin(phases[i-1]-phases[i]);
    if(i<N2-1)c+=0.5*Math.sin(phases[i+1]-phases[i]);
    phases[i]+=0.016*(omega+K*c);
  }
  mre=0;mim=0;
  for(var i=0;i<N2;i++){var p=phases[i]%(2*Math.PI);mre+=Math.cos(p);mim+=Math.sin(p);}
  mre/=N2;mim/=N2;
  R=Math.sqrt(mre*mre+mim*mim);
}

var phiY=H*(1-1/PHI);

function draw(){
  tick();
  cx.fillStyle='rgba(0,0,0,0.06)';cx.fillRect(0,0,W,H);

  // 1/phi line
  cx.fillStyle='rgba(201,164,74,0.04)';
  cx.fillRect(0,phiY,W,0.5);

  // R dot
  var x=(t*20)%W;
  var y=H*(1-R);
  var near=Math.max(0,1-Math.abs(R-1/PHI)*20);
  cx.fillStyle='rgba(201,164,74,'+(0.06+near*0.2)+')';
  cx.fillRect(x,y,1.5,1.5);

  // Crossing flash
  if(Math.abs(R-1/PHI)<0.005){
    cx.fillStyle='rgba(201,164,74,0.3)';
    cx.fillRect(x-1,phiY-1,3,3);
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
