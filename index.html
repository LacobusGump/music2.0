<script>
// ═══════════════════════════════════════════════════════════
// SIRIUS A + B — real orbital mechanics
//
// Sirius A: 2.063 solar masses. Bright. Hot. The research.
// Sirius B: 1.018 solar masses. Tiny. Dense. The tools.
// Both orbit their common barycenter.
//
// Orbital elements (Bond et al. 2017):
//   Period: 50.1284 years
//   Eccentricity: 0.5923
//   Inclination: 136.53 degrees
//   Mass ratio B/A: 0.4935
//
// The wobble IS the coupling made visible.
// ═══════════════════════════════════════════════════════════
(function(){
var cv = document.getElementById('sky');
if (!cv) return;
var cx = cv.getContext('2d');
var W, H, dpr;

function resize() {
  var r = cv.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  W = r.width; H = r.height;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ═══ ORBITAL PARAMETERS (real) ═══
var e = 0.5923;           // eccentricity
var incl = 136.53 * Math.PI / 180;  // inclination
var cosI = Math.cos(incl);  // -0.7257 (orbit appears tilted)
var massRatio = 0.4935;   // M_B / M_A — how much A wobbles

// Visual period: 45 seconds per orbit (50 years compressed)
var period = 45;

// ═══ BACKGROUND STARS ═══
var stars = [];
for (var i = 0; i < 300; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    size: Math.random() * 1.2 + 0.3,
    bright: 0.15 + Math.random() * 0.25,
    twinkleSpeed: 1 + Math.random() * 3,
    twinklePhase: Math.random() * Math.PI * 2
  });
}

// ═══ KEPLER SOLVER — real elliptical orbit ═══
function solveKepler(M, e) {
  // Solve M = E - e*sin(E) for E using Newton's method
  var E = M;
  for (var j = 0; j < 10; j++) {
    E = E - (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
  }
  return E;
}

function getOrbitalPosition(t, semiMajor) {
  // Mean anomaly
  var M = (t / period) * Math.PI * 2;
  // Eccentric anomaly
  var E = solveKepler(M, e);
  // True anomaly
  var cosV = (Math.cos(E) - e) / (1 - e * Math.cos(E));
  var sinV = (Math.sqrt(1 - e * e) * Math.sin(E)) / (1 - e * Math.cos(E));
  // Radius
  var r = semiMajor * (1 - e * Math.cos(E));
  // Position in orbital plane
  var x = r * cosV;
  var y = r * sinV;
  // Project through inclination (tilt the orbit)
  return { x: x, y: y * cosI, z: y * Math.sin(incl), r: r };
}

function draw() {
  cx.clearRect(0, 0, W, H);
  var time = Date.now() * 0.001;
  var centerX = W * 0.5;
  var centerY = H * 0.48;
  var scale = Math.min(W, H) * 0.18;

  // ═══ BACKGROUND ═══
  // Subtle radial gradient — not pure black
  var bg = cx.createRadialGradient(centerX, centerY * 0.9, 0, centerX, centerY, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0a0908');
  bg.addColorStop(0.5, '#060504');
  bg.addColorStop(1, '#030303');
  cx.fillStyle = bg;
  cx.fillRect(0, 0, W, H);

  // ═══ STARS ═══
  for (var i = 0; i < stars.length; i++) {
    var s = stars[i];
    var twinkle = s.bright + 0.1 * Math.sin(time * s.twinkleSpeed + s.twinklePhase);
    cx.beginPath();
    cx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(200,195,180,' + twinkle + ')';
    cx.fill();
  }

  // ═══ ORBITAL TRAIL — faint ellipse showing B's path ═══
  cx.strokeStyle = 'rgba(201,164,74,0.04)';
  cx.lineWidth = 0.8;
  cx.beginPath();
  for (var i = 0; i <= 200; i++) {
    var tt = (i / 200) * period;
    var pos = getOrbitalPosition(tt, scale);
    var px = centerX + pos.x;
    var py = centerY - pos.y;
    if (i === 0) cx.moveTo(px, py);
    else cx.lineTo(px, py);
  }
  cx.closePath();
  cx.stroke();

  // ═══ POSITIONS — both orbit barycenter ═══
  // B orbits at full distance, A wobbles at massRatio * distance (opposite direction)
  var posB = getOrbitalPosition(time, scale);
  var posA = getOrbitalPosition(time, -scale * massRatio);

  var ax = centerX + posA.x;
  var ay = centerY - posA.y;
  var bx = centerX + posB.x;
  var by = centerY - posB.y;

  // Depth for rendering order (z-axis from inclination)
  var aInFront = posA.z < posB.z;

  // ═══ DRAW BACK STAR FIRST ═══
  function drawA() {
    // SIRIUS A — huge, bright, white-blue, the research
    var pulseA = 1 + 0.03 * Math.sin(time * 1.2);
    var radiusA = Math.min(W, H) * 0.04 * pulseA;

    // Outer glow
    var glowA = cx.createRadialGradient(ax, ay, radiusA * 0.3, ax, ay, radiusA * 8);
    glowA.addColorStop(0, 'rgba(220,230,255,0.12)');
    glowA.addColorStop(0.3, 'rgba(200,210,240,0.04)');
    glowA.addColorStop(0.6, 'rgba(180,190,220,0.01)');
    glowA.addColorStop(1, 'rgba(150,160,200,0)');
    cx.fillStyle = glowA;
    cx.beginPath();
    cx.arc(ax, ay, radiusA * 8, 0, Math.PI * 2);
    cx.fill();

    // Mid glow
    var midA = cx.createRadialGradient(ax, ay, 0, ax, ay, radiusA * 3);
    midA.addColorStop(0, 'rgba(240,245,255,0.5)');
    midA.addColorStop(0.4, 'rgba(220,230,255,0.15)');
    midA.addColorStop(1, 'rgba(200,210,240,0)');
    cx.fillStyle = midA;
    cx.beginPath();
    cx.arc(ax, ay, radiusA * 3, 0, Math.PI * 2);
    cx.fill();

    // Core
    var coreA = cx.createRadialGradient(ax, ay, 0, ax, ay, radiusA);
    coreA.addColorStop(0, '#ffffff');
    coreA.addColorStop(0.3, '#eef2ff');
    coreA.addColorStop(0.7, '#ccd5ee');
    coreA.addColorStop(1, 'rgba(180,190,220,0)');
    cx.fillStyle = coreA;
    cx.beginPath();
    cx.arc(ax, ay, radiusA, 0, Math.PI * 2);
    cx.fill();

    // Label
    cx.font = '9px Georgia';
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(200,210,240,0.15)';
    cx.fillText('research', ax, ay + radiusA + 14);
  }

  function drawB() {
    // SIRIUS B — tiny, dense, warm white, the tools
    var pulseB = 1 + 0.05 * Math.sin(time * 2.3);
    var radiusB = Math.min(W, H) * 0.008 * pulseB;

    // Glow — warm, smaller
    var glowB = cx.createRadialGradient(bx, by, 0, bx, by, radiusB * 12);
    glowB.addColorStop(0, 'rgba(255,240,220,0.25)');
    glowB.addColorStop(0.3, 'rgba(255,230,200,0.08)');
    glowB.addColorStop(0.6, 'rgba(240,220,180,0.02)');
    glowB.addColorStop(1, 'rgba(220,200,160,0)');
    cx.fillStyle = glowB;
    cx.beginPath();
    cx.arc(bx, by, radiusB * 12, 0, Math.PI * 2);
    cx.fill();

    // Core — bright point
    var coreB = cx.createRadialGradient(bx, by, 0, bx, by, radiusB * 2);
    coreB.addColorStop(0, '#ffffff');
    coreB.addColorStop(0.5, '#ffeedd');
    coreB.addColorStop(1, 'rgba(255,230,200,0)');
    cx.fillStyle = coreB;
    cx.beginPath();
    cx.arc(bx, by, radiusB * 2, 0, Math.PI * 2);
    cx.fill();

    // Hard bright center
    cx.beginPath();
    cx.arc(bx, by, radiusB, 0, Math.PI * 2);
    cx.fillStyle = '#fff';
    cx.fill();

    // Label
    cx.font = '8px Georgia';
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(255,230,200,0.12)';
    cx.fillText('tools', bx, by + radiusB + 12);
  }

  // Draw back-to-front based on z-depth
  if (aInFront) { drawB(); drawA(); }
  else { drawA(); drawB(); }

  // ═══ BARYCENTER — the invisible point they both orbit ═══
  // Tiny pulse at the center of mass
  var barPulse = 0.04 + 0.02 * Math.sin(time * 3);
  cx.beginPath();
  cx.arc(centerX, centerY, 1.5, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(201,164,74,' + barPulse + ')';
  cx.fill();

  // ═══ CONNECTION LINE — faint coupling ═══
  cx.strokeStyle = 'rgba(201,164,74,0.03)';
  cx.lineWidth = 0.5;
  cx.beginPath();
  cx.moveTo(ax, ay);
  cx.lineTo(bx, by);
  cx.stroke();

  requestAnimationFrame(draw);
}

draw();
})();
</script>
</body>
