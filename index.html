<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GUMP — Grand Unified Music Project</title>
<meta name="description" content="Two wings. Come for the music — songs written from the work, not about it — or come for the ideas: a whole house of them, every room a piece of the known world, the same coupling under all of it.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#f3eee4;--muted:rgba(243,238,228,.6)}
html,body{height:100%}
body{
  height:100%;color:var(--paper);font-family:Georgia,"Times New Roman",serif;overflow:hidden;
  background:linear-gradient(180deg,#120f22,#171327 46%,#1d1726 78%,#241b1d);
  -webkit-font-smoothing:antialiased;
}
.fut{font-family:Futura,"Century Gothic",sans-serif;letter-spacing:.18em;text-transform:uppercase}

#wingCanvas{position:fixed;inset:0;z-index:0;display:block}

.head{position:fixed;top:0;left:0;right:0;z-index:5;text-align:center;padding:26px 16px;pointer-events:none}
.head .k{font-size:12px;color:var(--muted)}
.head .ask{margin-top:7px;font-size:clamp(20px,3vw,30px);font-weight:400}
.head .ask em{font-style:italic;color:#f3dcae}

.wings{display:flex;height:100%;position:relative;z-index:2}
.wing{
  position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-decoration:none;color:inherit;overflow:hidden;cursor:pointer;
}
.wing:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.10));pointer-events:none}

.c{position:relative;z-index:1;text-align:center;padding:0 22px;transform:translateY(6px);transition:transform .5s ease}
.lbl{font-size:clamp(20px,2.6vw,30px)}
.wing.music .lbl{color:#f4d79a}
.wing.ideas .lbl{color:#c8c2ec}
.sub{margin-top:12px;font-size:14.5px;line-height:1.5;color:var(--muted);max-width:20rem;margin-inline:auto}
.arrow{margin-top:18px;font-size:20px;opacity:.45;transition:opacity .35s,transform .35s}
.wing.music .arrow{color:#f4d79a}
.wing.ideas .arrow{color:#c8c2ec}

@media(hover:hover) and (min-width:721px){
  .wing:hover .c{transform:translateY(0)}
  .wing:hover .arrow{opacity:1;transform:translateX(3px)}
}

.foot{position:fixed;bottom:0;left:0;right:0;z-index:5;text-align:center;padding:20px;font-size:11px;color:rgba(243,238,228,.4);pointer-events:none}
.readout{position:fixed;bottom:20px;right:20px;z-index:5;font-size:10px;letter-spacing:.1em;color:rgba(243,238,228,.22);pointer-events:none}

@media(max-width:720px){
  /* Two halves meeting in the middle only reads as one body if both halves
     are on screen at once — stacking them top/bottom broke that (each
     block taller than a phone viewport, canvas tracking scroll position
     of blocks that were never both visible together). Stay side-by-side
     at every width instead; just tighten the columns and drop the long
     description so two ~45vw columns have room to breathe. */
  .wing{padding:16px 8px}
  .sub{display:none}
  .arrow{margin-top:10px}
  .readout{display:none}
}
@media(max-width:420px){
  .lbl{font-size:15px}
  .head .ask{font-size:17px}
}
</style>
</head>
<body>
<canvas id="wingCanvas"></canvas>

<div class="head">
  <div class="k fut">begump</div>
  <div class="ask">what makes music <em>good?</em></div>
</div>

<div class="wings">
  <a class="wing music" href="/field/" id="wingMusic">
    <div class="c">
      <div class="lbl fut">hear the idea</div>
      <div class="sub">Hear what the work sounds like — songs written <em>from</em> it, not about it. The whole thing, sung.</div>
      <div class="arrow">→</div>
    </div>
  </a>
  <a class="wing ideas" href="/research/" id="wingIdeas">
    <div class="c">
      <div class="lbl fut">read the idea</div>
      <div class="sub">A whole house of them — every room a piece of the known world, same coupling under all of it.</div>
      <div class="arrow">→</div>
    </div>
  </a>
</div>

<div class="foot fut">two wings · there's no wrong one · everything free</div>
<div class="readout fut" id="readout"></div>

<script>
(function(){
'use strict';
// ═══════════════════════════════════════════════════════════════════
// TWO WINGS — one butterfly, two coupled oscillator systems.
//
// Each wing is ~68 nodes filling a wing-shaped silhouette (golden-ratio
// / plastic-number quasi-random fill — the same family of math this
// site uses elsewhere for organic point placement). Within a wing,
// every node is a Kuramoto oscillator entrained (mean-field) to that
// wing's own master phase — this is what gives the wing its living,
// slightly unsynchronized shimmer instead of being a rigid drawn shape.
//
// The two wings' master phases are themselves a two-oscillator Kuramoto
// pair — the same "two separate clocks, they hesitate and fight" system
// from an earlier homepage (two dancing shapes, June 2026). Their phase
// difference no longer drives a rigid rotation (that read as two separate
// mechanical pivots, not one body) — it feeds Kcross, the node brightness
// ("lit", how close each node's phase sits to its wing's own master phase),
// and the shared spine glow. Coupling made visible in the texture and the
// glow, not decorated on top as a spin.
// ═══════════════════════════════════════════════════════════════════

var cv=document.getElementById('wingCanvas'),cx=cv.getContext('2d');
var W=0,H=0,dpr=1,t=0;
var reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
// Separate from prefers-reduced-motion — that flag is an accessibility
// preference most phones don't set, but the O(n^2) force-directed repulsion
// added tonight is real per-frame CPU work that a mobile chip pays a much
// higher price for than a desktop does. Gate node count and connectivity on
// actual device class, not just an accessibility setting nobody toggled.
var isMobile=/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||innerWidth<700;
var TAU=Math.PI*2;
var PHI=0.6180339887498949,PLASTIC=0.6823278038280194; // frac parts used as a 2D low-discrepancy fill

var NW=reduced?27:(isMobile?38:69); // nodes PER WING — see wingTemplate below for why both wings use the same count

var goldC=[238,176,92],roseC=[210,150,120],violC=[150,142,224],inkC=[200,196,224];

// A real wing isn't a symmetric lens — the leading edge is one smooth,
// convex sweep and the trailing edge tapers to a point. s0 sets where the
// widest point sits (off-center, toward the leading-edge side); the two
// halves use different curve shapes instead of one symmetric formula.
// Shared between node placement (makeWing) and the drawn outline (drawWing)
// so they always agree on the same silhouette.
function wingWidth(s){
  var s0=-0.22;
  if(s<s0){
    var t=(s+1)/(s0+1); // 0 at tip, 1 at the widest point
    return Math.pow(Math.max(0,Math.sin(t*Math.PI*0.5)),0.8);
  }else{
    var t2=(s-s0)/(1-s0); // 0 at the widest point, 1 at the other tip
    return Math.pow(Math.max(0,Math.cos(t2*Math.PI*0.5)),1.5);
  }
}

function makeWing(count){
  var arr=[];
  for(var i=0;i<count;i++){
    var u=(i*PHI)%1;                               // -1..1 span position (tip to tip)
    var s=u*2-1;
    var v=(i*PLASTIC)%1;                            // 0..1 depth from spine to outer edge
    var width=wingWidth(s);                        // asymmetric wing envelope — see wingWidth()
    // tiny random offset, not exactly (0,0) — with a force-directed repulsion
    // step, perfectly coincident points have a degenerate (zero) direction
    // vector despite a huge force magnitude, so they'd never actually push
    // apart on their own. This breaks that symmetry.
    arr.push({s:s,v:v,width:width,phase:Math.random()*TAU,omega:1.1+Math.random()*1.0,nbrs:[],curLx:(Math.random()-0.5)*2,curLy:(Math.random()-0.5)*2,vlx:0,vly:0});
  }
  // veins should follow the wing's actual surface, not array order (the placement
  // sequence above is a low-discrepancy fill, not spatially sorted — connecting
  // index-neighbors draws chords across the whole shape instead of local texture).
  // Precompute each node's true nearest spatial neighbors once, in nominal
  // (v*width, s) local space.
  var K_NBR=isMobile?3:5;
  for(var a=0;a<arr.length;a++){
    var na=arr[a],ax=na.v*na.width,ay=na.s;
    var dists=[];
    for(var b=0;b<arr.length;b++){
      if(b===a)continue;
      var nb=arr[b],dx=ax-nb.v*nb.width,dy=ay-nb.s;
      dists.push({j:b,d:dx*dx+dy*dy});
    }
    dists.sort(function(p,q){return p.d-q.d;});
    for(var k=0;k<Math.min(K_NBR,dists.length);k++)na.nbrs.push(dists[k].j);
  }
  return arr;
}

// Two halves of one whole — a real butterfly's wings, a brain's two
// hemispheres, are the SAME structure mirrored, not two independent random
// clouds that happen to sit near each other (which is what wingL/wingR were:
// each its own makeWing() call, own randomness, own topology — never
// actually symmetric, just statistically similar). Build the shape once and
// clone it for both sides — place() mirrors the geometry via `side` — so
// the two wings are structurally identical. What's NOT shared is each
// node's phase/omega: same body, independent life, free to fall in and out
// of sync with its mirror twin. That's the meeting-in-the-middle idea —
// one form, two lives, reaching for each other.
var wingTemplate=makeWing(NW);
function cloneWing(template){
  return template.map(function(n){
    return{s:n.s,v:n.v,width:n.width,nbrs:n.nbrs,phase:Math.random()*TAU,omega:1.1+Math.random()*1.0,curLx:n.curLx,curLy:n.curLy,vlx:0,vly:0};
  });
}
var wingL=cloneWing(wingTemplate),wingR=cloneWing(wingTemplate);

// master phases — one per wing, mutually Kuramoto-coupled
var masterL=0,masterR=Math.PI*0.85,K_now=0.65;
var RL=0,RR=0; // smoothed (Machine does this too — raw R jitters frame to frame)
var smL={re:1,im:0},smR={re:1,im:0}; // persistent smoothing state, one per wing
var hoverL=0,hoverR=0; // smoothed 0..1 hover boost per wing

// formT: 0→1 ramp on load — nodes start collapsed at the hinge and spring
// outward into the wing shape as stiffness ramps up (same principle /deep/
// uses for shape transitions: emerge, don't snap). pulseL/R: a heartbeat —
// each wing pulses once per full revolution of its own master phase, decaying
// fast, same shape as /deep/'s heart pulse (1+max(0,sin(t*5))*0.15) but
// triggered by an actual phase-wrap instead of a decorative fixed clock.
var formT=0,pulseL=0,pulseR=0,prevCycleL=0,prevCycleR=0;

var reducedScale=reduced?0.6:1;

function resize(){
  // full-screen canvas at 2x DPR is a lot of fill-rate (clearRect + many
  // radial gradients + arcs, every frame) — fine for a desktop GPU, a real
  // cost on a phone's. 1.5x still reads sharp on a phone at arm's length.
  dpr=Math.min(devicePixelRatio||1,isMobile?1.5:2);
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
addEventListener('resize',resize,{passive:true});

var wingMusic=document.getElementById('wingMusic'),wingIdeas=document.getElementById('wingIdeas');
var hoverTargetL=0,hoverTargetR=0;
wingMusic.addEventListener('mouseenter',function(){hoverTargetL=1});
wingMusic.addEventListener('mouseleave',function(){hoverTargetL=0});
wingIdeas.addEventListener('mouseenter',function(){hoverTargetR=1});
wingIdeas.addEventListener('mouseleave',function(){hoverTargetR=0});
wingMusic.addEventListener('touchstart',function(){hoverTargetL=1},{passive:true});
wingMusic.addEventListener('touchend',function(){hoverTargetL=0},{passive:true});
wingMusic.addEventListener('touchcancel',function(){hoverTargetL=0},{passive:true});
wingIdeas.addEventListener('touchstart',function(){hoverTargetR=1},{passive:true});
wingIdeas.addEventListener('touchend',function(){hoverTargetR=0},{passive:true});
wingIdeas.addEventListener('touchcancel',function(){hoverTargetR=0},{passive:true});

// Pink (1/f) noise — the timing signature of living systems (Hennig 2011),
// used the same way elsewhere on this site. Drives K's natural fluctuation
// instead of a clean sine — coupling strength that wanders like weather,
// not one that was tuned to a target.
function makePink(){
  var s=[0,0,0,0,0,0,0];
  return function(){
    var w=Math.random()*2-1;
    s[0]=0.99886*s[0]+w*0.0555179;s[1]=0.99332*s[1]+w*0.0750759;
    s[2]=0.96900*s[2]+w*0.1538520;s[3]=0.86650*s[3]+w*0.3104856;
    s[4]=0.55000*s[4]+w*0.5329522;s[5]=-0.7616*s[5]-w*0.0168980;
    var o=s[0]+s[1]+s[2]+s[3]+s[4]+s[5]+s[6]+w*0.5362;
    s[6]=w*0.115926;return o*0.11;
  };
}
var pinkL=makePink(),pinkR=makePink();
var psiRawPrevL=0,psiRawPrevR=0;

// Cheap multi-octave sine-sum ("Fourier pseudo-noise") — a lightweight stand-in
// for curl noise. Real curl noise (Tyler Hobbs et al.'s flow-field technique)
// needs a 2D gradient-noise field and its curl; three non-commensurate sine
// waves per node, phase-seeded per node, gets the same qualitative property
// that actually matters here — smooth, non-repeating-looking, non-mechanical
// motion — at a fraction of the cost. Named honestly: this is not curl noise,
// it's the cheap approximation of its one relevant property.
function pseudoFlow(seed,t){
  return Math.sin(t*0.71+seed*3.1)*0.5+Math.sin(t*1.33+seed*7.7)*0.3+Math.sin(t*2.09+seed*1.9)*0.2;
}

// One "Machine" per wing (see /flex/'s Machine tab): nodes couple only to
// their real spatial neighbors, normalized by actual neighbor count — not
// mean-field to one imposed master phase. Coherence (R, psi) EMERGES from
// that local structure instead of being simulated as a separate variable.
//
// Force-directed layout (Fruchterman-Reingold-family): sync strength is now
// an actual spring force, not just a line color. Connected nodes that agree
// in phase physically pull together; nodes that disagree relax apart under
// repulsion. "Coupled" becomes something the shape visibly DOES, not
// something a gold line claims. At ~69 nodes/wing this is trivially cheap —
// O(n^2) repulsion is ~4,700 pairs/wing/frame, no Barnes-Hut tree needed;
// that optimization only pays off at node counts orders of magnitude past
// what a wing silhouette actually needs.
function stepWingMachine(nodes,otherPsi,Kbase,pink,reach,span,pulseScale,damp,dt,bias,sm,t,formT){
  // K wanders on pink noise, way down from a "tuned" coupling constant —
  // nature doesn't hold K at a fixed value, it drifts near a low baseline.
  var Know=Math.max(0.02,Kbase+pink()*Kbase*2.6);

  // raw instantaneous order parameter — reacts in real time, drives the physics
  var mre=0,mim=0;
  for(var i=0;i<nodes.length;i++){mre+=Math.cos(nodes[i].phase);mim+=Math.sin(nodes[i].phase);}
  mre/=nodes.length;mim/=nodes.length;

  // smoothed on the (re,im) pair, not the angle — Machine does this for R
  // ("smooth R for visual stability"); doing it before atan2 smooths the
  // phase too, with no wraparound artifacts.
  sm.re+=(mre-sm.re)*0.10;sm.im+=(mim-sm.im)*0.10;
  var R=Math.sqrt(sm.re*sm.re+sm.im*sm.im),psi=Math.atan2(sm.im,sm.re);

  // cross-wing pull — strong enough to actually see the two wings arrive
  // at sync and drift apart again, not just a theoretical nudge
  var Kcross=0.10;
  var breath=0.80+R*0.32; // Machine's trick: coherence visibly expands the shape, not just glows

  // phase update — unchanged: local Kuramoto coupling to real spatial neighbors
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i],c=0,nn=n.nbrs;
    for(var k=0;k<nn.length;k++)c+=Math.sin(nodes[nn[k]].phase-n.phase);
    if(nn.length>0)c/=nn.length;
    n.phase+=dt*(n.omega+bias+Know*c+Kcross*Math.sin(otherPsi-n.phase));
  }

  // force-directed position update. kHome ramps with formT — near-zero at
  // load, so nodes start as a loose repulsion-only cluster near the hinge
  // (the emergence effect from before) and only get pulled into the
  // recognizable wing shape as stiffness ramps up over ~2.5s.
  var kRepel=140,kSpring=0.09,kHome=formT*(0.020+0.05*(1-R)), minD=6;
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i],fx=0,fy=0;

    // repulsion from every other node in the wing — keeps it from collapsing
    // into a point even when sync (and therefore attraction) runs high
    for(var j=0;j<nodes.length;j++){
      if(j===i)continue;
      var m=nodes[j],dx=n.curLx-m.curLx,dy=n.curLy-m.curLy;
      var d2=dx*dx+dy*dy,d=Math.sqrt(d2)||0.001;
      if(d<minD*8){var f=kRepel/(d2+minD*minD);fx+=dx/d*f;fy+=dy/d*f;}
    }

    // sync-weighted spring to real neighbors — THIS is the actual "coupled"
    // mechanism: high phase agreement pulls neighbors physically closer,
    // low agreement lets repulsion win and they drift apart
    var nn=n.nbrs,restLen=reach*0.16;
    for(var k=0;k<nn.length;k++){
      var b=nodes[nn[k]];
      var pd=Math.abs(n.phase-b.phase)%TAU;if(pd>Math.PI)pd=TAU-pd;
      var sync=1-pd/Math.PI;
      var dx2=b.curLx-n.curLx,dy2=b.curLy-n.curLy,d3=Math.sqrt(dx2*dx2+dy2*dy2)||0.001;
      var spring=kSpring*sync*sync*(d3-restLen);
      fx+=dx2/d3*spring;fy+=dy2/d3*spring;
    }

    // weak envelope "home" pull — keeps the whole thing recognizable as a
    // wing instead of an arbitrary blob; weak enough that the sync-driven
    // clustering above is what actually reads, this just bounds it
    var homeX=n.v*n.width*reach*breath,homeY=n.s*span*breath;
    fx+=(homeX-n.curLx)*kHome;fy+=(homeY-n.curLy)*kHome;

    // organic fine motion — cheap flow-field stand-in instead of a clean sine
    var flow=pseudoFlow(i*0.37,t)*reach*0.05;
    fx+=flow*Math.cos(i*2.4);fy+=flow*Math.sin(i*2.4);

    n.vlx=(n.vlx+fx*dt)*damp;n.vly=(n.vly+fy*dt)*damp;
    n.curLx+=n.vlx*pulseScale;n.curLy+=n.vly*pulseScale;
  }
  return {R:R,psi:psi,K:Know};
}

function step(dt,span){
  hoverL+=(hoverTargetL-hoverL)*0.04;
  hoverR+=(hoverTargetR-hoverR)*0.04;
  formT=Math.min(1,formT+dt*0.4); // ~2.5s to fully gather into shape on load

  // ── heartbeat: fires when this wing's emergent phase wraps a full turn ──
  // (edge-detected on the atan2 wrap boundary, since psi itself is never
  // unwrapped — it's recomputed fresh from the nodes every frame)
  function detectPulse(psiRaw,prevRaw){return (psiRaw-prevRaw)<-Math.PI;}
  if(detectPulse(masterL,psiRawPrevL))pulseL=1;
  if(detectPulse(masterR,psiRawPrevR))pulseR=1;
  pulseL*=0.90;pulseR*=0.90;

  // ── per-node local coupling + force-directed gathering into the wing shape ──
  // formT ramps 0→1 over ~2.5s on load (same idea as /deep/'s shape morph:
  // emerge, don't snap) and is fed into stepWingMachine to ramp the envelope
  // "home" pull specifically — see there for why.
  var damp=0.86;
  var Kbase=0.24*(1+hoverL*0.8),KbaseR=0.24*(1+hoverR*0.8); // "way down" from 2.2, not starved
  var reachL=span*(0.86+hoverL*0.16),reachR=span*(0.86+hoverR*0.16);
  // Two wings built the same way naturally drift at nearly the same bulk rate,
  // so even modest cross-coupling snaps them together and never lets go. Give
  // each wing its own slowly, independently wandering bulk bias ("two separate
  // clocks that hesitate and fight") so Kcross actually has to work to bring
  // them into sync — real cycling, not a coincidence of near-identical inputs.
  // Scaled up alongside the faster omega baseline so the fight stays balanced.
  var biasL=0.10+0.22*Math.sin(t*0.071),biasR=-0.10+0.22*Math.sin(t*0.113+1.3);
  var outL=stepWingMachine(wingL,masterR,Kbase,pinkL,reachL,span,1+pulseL*0.16,damp,dt,biasL,smL,t,formT);
  var outR=stepWingMachine(wingR,masterL,KbaseR,pinkR,reachR,span,1+pulseR*0.16,damp,dt,biasR,smR,t,formT);
  psiRawPrevL=masterL;psiRawPrevR=masterR;
  masterL=outL.psi;masterR=outR.psi;
  RL=outL.R;RR=outR.R;
  K_now=(outL.K+outR.K)*0.5;
}

var GOLD_SYNC=[230,190,100]; // Machine's "phase-locked" thread color

function drawWing(nodes,side,hingeX,hingeY,span,masterPhase,hover,baseCol,tipCol,R){
  // side: -1/+1, left/right wing — layout is always side-by-side now (see
  // CSS), so there's no vertical/stacked case to handle.
  // No rigid rotation of the wing as a whole — that was a designed animation
  // (flap = sin(masterPhase) spun around the hinge) sitting on top of an
  // otherwise emergent system, and with two wings each spinning on their own
  // hinge it reads exactly like what it is: two mechanical pivots rocking,
  // not one body. /flex/'s Machine never rotates its shape at all — every
  // bit of its motion comes from individual node phase and the coupling
  // physics. Matching that here: the wing's "life" is 100% the force-
  // directed node positions, sync-graded veins, and R-driven breathing —
  // nothing is spun on top of them anymore.
  function place(lx,ly){
    return[hingeX+side*lx,hingeY+ly];
  }

  // the outline — the node constellation alone doesn't read as a wing at a
  // glance, so trace a boundary the eye can anchor on. Trace the REAL edge
  // of the swarm, not a fixed formula: bucket nodes by their intrinsic spine
  // position (n.s, set once at creation, stable even as curLx/curLy move)
  // and in each bucket take whichever node the coupling/repulsion physics
  // actually pushed farthest out right now. The boundary is wherever the
  // swarm really is this frame — it breathes with R and dents where sync is
  // low and repulsion wins, same as the node cloud it's tracing, instead of
  // an idealized curve rescaled on top of it.
  var OUT_STEPS=32,buckets=new Array(OUT_STEPS+1).fill(null);
  for(var bi=0;bi<nodes.length;bi++){
    var bn=nodes[bi],bidx=Math.round((bn.s+1)/2*OUT_STEPS);
    if(!buckets[bidx]||bn.curLx>buckets[bidx].curLx)buckets[bidx]=bn;
  }
  // fill any spine slices with no node in them from the nearest filled
  // neighbor so the traced boundary stays closed instead of tearing
  for(var fi=0,lastGood=null;fi<=OUT_STEPS;fi++){if(buckets[fi])lastGood=buckets[fi];else buckets[fi]=lastGood;}
  for(var fi2=OUT_STEPS,lastGood2=null;fi2>=0;fi2--){if(buckets[fi2])lastGood2=buckets[fi2];else buckets[fi2]=lastGood2;}
  // a single farthest-node-per-bucket trace is noisy (real particle jitter,
  // not a smooth curve) — average each point with its neighbors so the
  // membrane reads as one continuous edge, not a spiky trace of individuals
  var rawPts=buckets.map(function(pn){return[pn.curLx,pn.curLy];});
  var outerPts=[];
  for(var oi=0;oi<=OUT_STEPS;oi++){
    var p0=rawPts[Math.max(0,oi-1)],p1=rawPts[oi],p2=rawPts[Math.min(OUT_STEPS,oi+1)];
    outerPts.push(place((p0[0]+p1[0]*2+p2[0])/4,(p0[1]+p1[1]*2+p2[1])/4));
  }
  cx.beginPath();
  cx.moveTo(hingeX,hingeY);
  cx.lineTo(outerPts[0][0],outerPts[0][1]);
  // quadratic-through-midpoints — cheap Catmull-Rom-ish smoothing so the
  // traced membrane curves between points instead of a faceted polygon
  for(var oj=1;oj<outerPts.length-1;oj++){
    var mx=(outerPts[oj][0]+outerPts[oj+1][0])/2,my=(outerPts[oj][1]+outerPts[oj+1][1])/2;
    cx.quadraticCurveTo(outerPts[oj][0],outerPts[oj][1],mx,my);
  }
  cx.lineTo(outerPts[outerPts.length-1][0],outerPts[outerPts.length-1][1]);
  cx.closePath();
  cx.strokeStyle='rgba('+baseCol[0]+','+baseCol[1]+','+baseCol[2]+','+(0.14+R*0.20+hover*0.09).toFixed(3)+')';
  cx.lineWidth=1.0;
  cx.stroke();

  // connective veins — sync-graded exactly like /flex/'s Machine: dim copper
  // for loosely related neighbors, bright gold only for genuinely phase-locked
  // pairs. That three-tier jump is what makes "locking" visible instead of a
  // uniform haze.
  cx.lineWidth=0.6;
  for(var i=0;i<nodes.length;i++){
    var a=nodes[i];
    for(var k=0;k<a.nbrs.length;k++){
      var b=nodes[a.nbrs[k]];
      var pd=Math.abs(a.phase-b.phase)%TAU;if(pd>Math.PI)pd=TAU-pd;
      var sync=1-pd/Math.PI;
      if(sync<0.35)continue;
      var pa=place(a.curLx,a.curLy),pb=place(b.curLx,b.curLy);
      var col=sync>0.72?GOLD_SYNC:baseCol;
      var alpha=sync>0.72?(0.22+sync*0.55):(sync*sync*0.28);
      cx.lineWidth=sync>0.72?1.1:0.6;
      cx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+alpha.toFixed(3)+')';
      cx.beginPath();cx.moveTo(pa[0],pa[1]);cx.lineTo(pb[0],pb[1]);cx.stroke();
    }
  }

  // nodes — lit by how close their own phase is to their wing's master phase,
  // boosted overall by this wing's own coherence R (Machine's "breath")
  for(var n2=0;n2<nodes.length;n2++){
    var nd=nodes[n2];
    var p=place(nd.curLx,nd.curLy);
    var lit=0.5+0.5*Math.cos(nd.phase-masterPhase);
    var col=nd.v>0.66?tipCol:baseCol;
    var r=(0.8+lit*1.4+hover*0.6+R*1.4)*reducedScale;
    var a2=(0.14+lit*0.26+hover*0.18+R*0.30);
    cx.beginPath();cx.arc(p[0],p[1],r,0,TAU);
    cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+a2.toFixed(3)+')';
    cx.fill();
  }

  // center glow — quadratic in R like Machine's rGlow, so coherence reads as
  // a visible bloom, not just a marginal brightness shift
  var glowR=span*(0.42+R*0.28);
  var rInt=R*R;
  var g=cx.createRadialGradient(hingeX,hingeY,0,hingeX,hingeY,glowR);
  g.addColorStop(0,'rgba('+GOLD_SYNC[0]+','+GOLD_SYNC[1]+','+GOLD_SYNC[2]+','+(0.04+rInt*0.22+hover*0.05).toFixed(3)+')');
  g.addColorStop(0.4,'rgba('+baseCol[0]+','+baseCol[1]+','+baseCol[2]+','+(0.02+rInt*0.08).toFixed(3)+')');
  g.addColorStop(1,'rgba('+baseCol[0]+','+baseCol[1]+','+baseCol[2]+',0)');
  cx.fillStyle=g;cx.fillRect(hingeX-glowR,hingeY-glowR,glowR*2,glowR*2);
}

var last=0;
function draw(now){
  var dtReal=Math.min(0.05,(now-last)/1000||0.016);last=now;
  t+=dtReal;

  // Measure the real wing anchors every frame — getBoundingClientRect is
  // viewport-relative, same coordinate space as the fixed canvas, so this
  // self-corrects for font reflow and viewport size with no guesswork.
  // Layout is always side-by-side now (see CSS), both anchors on screen
  // together at every width, so there's no scroll-tracking or stacked-vs-
  // row branch to carry anymore.
  var rectL=wingMusic.getBoundingClientRect(),rectR=wingIdeas.getBoundingClientRect();
  // Both wings share one hinge point — a real butterfly's two wings (a
  // brain's two hemispheres, two halves of one soul) meet at a single
  // shared point, they don't hover near each other with a gap. Each wing's
  // shape only ever extends outward from its hinge (lx>=0, see
  // wingWidth/makeWing), so one shared point is what makes the two sides
  // actually meet there and fan outward oppositely.
  var midX=(rectL.left+rectL.width/2+rectR.left+rectR.width/2)/2;
  var midY=(rectL.top+rectL.height/2+rectR.top+rectR.height/2)/2;
  var span=Math.min(rectL.width,rectL.height,rectR.width,rectR.height)*0.66;

  step(dtReal*(reduced?0.6:1),span);

  cx.clearRect(0,0,W,H);
  cx.globalCompositeOperation='lighter';

  // phase-difference glow at the shared spine — bright when the wings are in sync
  var pd=Math.abs(masterL-masterR)%TAU;if(pd>Math.PI)pd=TAU-pd;
  var syncAmt=1-pd/Math.PI;
  var sg=cx.createRadialGradient(midX,midY,0,midX,midY,span*0.55);
  sg.addColorStop(0,'rgba(243,220,174,'+(0.03+syncAmt*syncAmt*0.10).toFixed(3)+')');
  sg.addColorStop(1,'rgba(243,220,174,0)');
  cx.fillStyle=sg;cx.fillRect(midX-span*0.55,midY-span*0.55,span*1.1,span*1.1);

  drawWing(wingL,-1,midX,midY,span,masterL,hoverL,goldC,roseC,RL);
  drawWing(wingR,1,midX,midY,span,masterR,hoverR,violC,inkC,RR);

  cx.globalCompositeOperation='source-over';

  var ro=document.getElementById('readout');
  if(ro)ro.textContent='K='+K_now.toFixed(2)+' · sync='+syncAmt.toFixed(2);

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
