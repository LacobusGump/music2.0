<script>
// ═══════════════════════════════════════════════════════════
// GUMP — THE MACHINE
// 137 oscillators. Hex-packed. Clocked by zeros of zeta.
// Your body is the coupling constant.
// Ordered disorder. 1/φ. The groove.
// ═══════════════════════════════════════════════════════════

var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

// ═══ ORACLE: 137 zeros on load ═══
var N=137,PHI=(1+Math.sqrt(5))/2;
function theta(tt){if(tt<1)return 0;return(tt/2)*Math.log(tt/(2*Math.PI))-tt/2-Math.PI/8+1/(48*tt);}
function Zfn(tt){if(tt<2)return 0;var a=Math.sqrt(tt/(2*Math.PI)),nn=Math.max(1,Math.floor(a)),th=theta(tt),s=0;for(var n=1;n<=nn;n++)s+=Math.cos(th-tt*Math.log(n))/Math.sqrt(n);s*=2;var p=a-nn,d=Math.cos(2*Math.PI*p);if(Math.abs(d)>1e-8)s+=Math.pow(-1,nn-1)*Math.pow(2*Math.PI/tt,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;return s;}
var zeros=[];
(function(){var st=9,pv=Zfn(9);while(zeros.length<N){var step=st>14?Math.max(0.05,2*Math.PI/Math.log(st/(2*Math.PI))/6):0.4;st+=step;var c=Zfn(st);if(pv*c<0){var lo=st-step,hi=st;for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Zfn(lo)*Zfn(m)<0)hi=m;else lo=m;}zeros.push((lo+hi)/2);}pv=c;}})();

// ═══ SPACINGS → FILTERED FREQUENCIES (5 modes) ═══
var spacings=[],meanS=0;
for(var i=0;i<N-1;i++){spacings.push(zeros[i+1]-zeros[i]);meanS+=spacings[i];}
meanS/=(N-1);
var normS=[];for(var i=0;i<spacings.length;i++)normS.push(spacings[i]/meanS);
var SN=normS.length;
var fRe=[],fIm=[];
for(var k=0;k<SN;k++){var re=0,im=0;for(var n=0;n<SN;n++){re+=normS[n]*Math.cos(2*Math.PI*k*n/SN);im-=normS[n]*Math.sin(2*Math.PI*k*n/SN);}fRe.push(re/SN);fIm.push(im/SN);}
var filtered=[];
for(var n=0;n<SN;n++){var v=0;for(var k=0;k<5;k++)v+=fRe[k]*Math.cos(2*Math.PI*k*n/SN)-fIm[k]*Math.sin(2*Math.PI*k*n/SN);filtered.push(v);}

// ═══ HEX LATTICE ═══
var cols=13,rows=11;
var nxA=[],nyA=[];
var idx=0;
for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){if(idx>=N)break;nxA.push(c+(r%2?0.5:0));nyA.push(r*Math.sqrt(3)/2);idx++;}
var nbrL=[];
for(var i=0;i<N;i++){var nn=[];for(var j=0;j<N;j++){if(j===i)continue;var dx=nxA[j]-nxA[i],dy=nyA[j]-nyA[i];if(dx*dx+dy*dy<1.44)nn.push(j);}nbrL.push(nn);}

// ═══ STATE: LEMNISCATE — two loops ═══
var N1=69,N2=68; // two halves of the 8
var phases=new Float64Array(N);
var K=0,Ktarget=0,Kvel=0;
var R=0,RA=0,RB=0,meanPhase=0;
var crossPhase=0; // phase diff at the crossing
var t=0,w,h;
var started=false;

// ═══ INPUT: body → K ═══
var sensorK=0;
var beta=0,gamma2=0,accel=0;
var hasSensors=false;
var touchY=0.5; // touch position 0-1

var sensorsAdded=false;
function addSensorListeners(){
  if(sensorsAdded)return;
  sensorsAdded=true;
  addEventListener('deviceorientation',function(e){
    if(e.beta!==null){hasSensors=true;beta=e.beta||0;gamma2=e.gamma||0;}
  });
  addEventListener('devicemotion',function(e){
    var a=e.accelerationIncludingGravity;
    if(a&&a.x!==null){
      hasSensors=true;
      var mag=Math.sqrt((a.x||0)*(a.x||0)+(a.y||0)*(a.y||0)+(a.z||0)*(a.z||0));
      accel=Math.abs(mag-9.8);
    }
  });
}

function initSensors(){
  // Port of battle-tested iOS permission from sensor.js
  var needsRequest=typeof DeviceMotionEvent!=='undefined'&&
    typeof DeviceMotionEvent.requestPermission==='function';

  if(!needsRequest){
    // Android / desktop — just add listeners
    addSensorListeners();
    return;
  }

  // Chrome iOS: requestPermission lies. Add listeners first, check if events arrive.
  var isChrome=/CriOS/.test(navigator.userAgent||'');
  if(isChrome){
    addSensorListeners();
    var countBefore=hasSensors;
    setTimeout(function(){
      if(!hasSensors){
        // No events. Try requestPermission as last resort.
        DeviceMotionEvent.requestPermission().then(function(r){
          if(r==='granted')addSensorListeners();
        }).catch(function(){});
      }
    },2000);
    return;
  }

  // Safari iOS: request both permissions. MUST be in user gesture (we are — this is the tap handler).
  function withTimeout(p,ms){
    return Promise.race([p,new Promise(function(r){setTimeout(function(){r('timeout');},ms);})]);
  }

  var motionP=withTimeout(
    DeviceMotionEvent.requestPermission().catch(function(){return 'error';}),
    5000
  );

  var orientP;
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    orientP=withTimeout(
      DeviceOrientationEvent.requestPermission().catch(function(){return 'error';}),
      5000
    );
  } else {
    orientP=Promise.resolve('granted');
  }

  Promise.all([motionP,orientP]).then(function(results){
    if(results[0]==='granted'||results[1]==='granted'){
      addSensorListeners();
    }
  });
}

// Touch/mouse — disabled, dial controls K now

// ═══ AUDIO ENGINE ═══
var audioCtx=null,masterGain=null,warmthFilter=null;
var clusterOscs=[],clusterGains=[];
var MAX_VOICES=8;
var subOsc=null,subGain=null;
var vibratoLFOs=[];

function initAudio(){
  // BRIDGE: force iOS "playback" audio session to bypass silent switch
  // A real <audio> element playing silence switches the session category
  var silentAudio=document.createElement('audio');
  silentAudio.setAttribute('playsinline','');
  silentAudio.setAttribute('webkit-playsinline','');
  // Tiny MP3 of silence (base64 encoded, 0.1s)
  silentAudio.src='data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjU0AAAAAAAAAAAAAAAAJAAAAAAAAAABhkGqnBgAAAAAAAAAAAAAAAAAAAAAAAAAAAD/+1DEAAAH0ANX0AAAIgoAbmgAABCqqqqqqqqqqqqqqqqqqqqqqAAAAAExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV';
  silentAudio.play().catch(function(){});

  // iOS requires AudioContext created AND resumed from user gesture
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();

  // iOS unlock: play a silent buffer to unblock the audio graph
  var unlock=audioCtx.createBuffer(1,1,22050);
  var unlockSrc=audioCtx.createBufferSource();
  unlockSrc.buffer=unlock;
  unlockSrc.connect(audioCtx.destination);
  unlockSrc.start(0);

  // Force resume (iOS suspends by default)
  if(audioCtx.state==='suspended'){
    audioCtx.resume();
  }

  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.12;

  var compressor=audioCtx.createDynamicsCompressor();
  compressor.threshold.value=-20;
  compressor.ratio.value=4;

  // STEREO: split left (loop A) and right (loop B)
  var merger=audioCtx.createChannelMerger(2);
  var gainL=audioCtx.createGain();gainL.gain.value=1;
  var gainR=audioCtx.createGain();gainR.gain.value=1;
  gainL.connect(merger,0,0); // left
  gainR.connect(merger,0,1); // right
  merger.connect(compressor);
  compressor.connect(audioCtx.destination);

  // Store for updateAudio
  window._gainL=gainL;
  window._gainR=gainR;

  // Reverb: feedback delay for space
  var delay=audioCtx.createDelay(1.0);
  delay.delayTime.value=0.4;
  var feedback=audioCtx.createGain();
  feedback.gain.value=0.3;
  var reverbFilter=audioCtx.createBiquadFilter();
  reverbFilter.type='lowpass';
  reverbFilter.frequency.value=2000;
  masterGain.connect(delay);
  delay.connect(reverbFilter);
  reverbFilter.connect(feedback);
  feedback.connect(delay);
  delay.connect(compressor);

  // Low-pass on master for warmth — R controls this
  warmthFilter=audioCtx.createBiquadFilter();
  warmthFilter.type='lowpass';
  warmthFilter.frequency.value=800;
  warmthFilter.Q.value=0.7;
  var warmth=warmthFilter;

  // Rewire: voices → warmth → masterGain
  // (masterGain already connects to compressor + delay)

  // SUB BASS: one sine at root/2. Felt, not heard.
  subOsc=audioCtx.createOscillator();
  subGain=audioCtx.createGain();
  subOsc.type='sine';
  subOsc.frequency.value=55;
  subGain.gain.value=0;
  subOsc.connect(subGain);
  subGain.connect(masterGain);
  subOsc.start(0);

  // Voices: triangle + sine pairs with PER-VOICE vibrato
  vibratoLFOs=[]; // per-voice LFO for vibrato
  var PHI_RATE=1.618*1.2; // vibrato base rate ~1.9 Hz

  for(var i=0;i<MAX_VOICES;i++){
    var osc1=audioCtx.createOscillator();
    var osc2=audioCtx.createOscillator();
    var gain=audioCtx.createGain();

    osc1.type='triangle';
    osc2.type='sine';
    osc1.frequency.value=220+i*30;
    osc2.frequency.value=220+i*30;
    osc1.detune.value=-4;
    osc2.detune.value=4+Math.random()*3;
    gain.gain.value=0;

    // PER-VOICE VIBRATO via LFO → detune
    var lfo=audioCtx.createOscillator();
    var lfoGain=audioCtx.createGain();
    lfo.type='sine';
    lfo.frequency.value=PHI_RATE+i*0.13; // slightly different rate per voice
    lfoGain.gain.value=30; // ±30 cents (~1/phi of a semitone)
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.detune);
    lfoGain.connect(osc2.detune);
    lfo.start(0);
    vibratoLFOs.push({lfo:lfo,gain:lfoGain});

    osc1.connect(gain);
    osc2.connect(gain);
    // First 4 voices → left (loop A), next 4 → right (loop B)
    if(i<4){gain.connect(warmth);} // warmth → masterGain → L+R for now
    else{gain.connect(warmth);}    // will split in updateAudio via pan
    osc1.start(0);
    osc2.start(0);

    clusterOscs.push(osc1);
    clusterOscs.push(osc2);
    clusterGains.push(gain);
  }
  warmth.connect(masterGain);

  // Confirm audio is running
  console.log('Audio state:',audioCtx.state);
  setTimeout(function(){
    console.log('Audio state after 500ms:',audioCtx.state);
    if(audioCtx.state==='suspended')audioCtx.resume();
  },500);
}

// ═══ CLUSTER COUNT → CHORD (just intonation) ═══

// The machine says HOW MANY notes. The scale says WHICH notes.
// Just intonation ratios: pure, no beating.
var CHORDS=[
  [1],                           // 1 cluster: unison
  [1, 2],                        // 2: octave
  [1, 3/2, 2],                   // 3: power chord
  [1, 5/4, 3/2, 2],             // 4: major triad + octave
  [1, 9/8, 5/4, 3/2, 5/3],     // 5: pentatonic
  [1, 9/8, 5/4, 4/3, 3/2, 5/3],// 6: major scale minus 7th
  [1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8], // 7: full major
  [1, 16/15, 9/8, 6/5, 5/4, 4/3, 3/2, 8/5], // 8: chromatic
];

var prevClusterCount=0;
var stableCount=0;
var activeChordIdx=0;

// THRUSH: three-note phrases from zero spacings
var phraseIdx=0;       // which three-group we're on
var noteInPhrase=0;    // 0,1,2 within the phrase
var noteTimer=0;       // countdown to next note
var currentNoteFreq=0;
var currentNoteDur=0;

function updateAudio(){
  if(!audioCtx)return;

  // THRUSH MELODY: step through zero spacings as three-note phrases
  noteTimer-=0.016*3; // 3x frame rate for timing
  if(noteTimer<=0){
    var sIdx=phraseIdx*3+noteInPhrase;
    if(sIdx>=spacings.length-1){phraseIdx=0;noteInPhrase=0;sIdx=0;}

    var s=spacings[sIdx];
    var ms=meanS;
    currentNoteFreq=220*(ms/s); // inverse: short gap = high pitch
    currentNoteDur=s*0.12;      // duration from spacing
    noteTimer=currentNoteDur;

    // Set the FIRST voice pair to the melody note
    var t2=audioCtx.currentTime;
    clusterOscs[0].frequency.setTargetAtTime(currentNoteFreq,t2,0.06);
    clusterOscs[1].frequency.setTargetAtTime(currentNoteFreq,t2,0.06);
    // Brief volume swell for each note (attack)
    clusterGains[0].gain.setTargetAtTime(0.18,t2,0.02);
    clusterGains[0].gain.setTargetAtTime(0.08,t2+0.05,currentNoteDur*0.7);

    noteInPhrase++;
    if(noteInPhrase>=3){noteInPhrase=0;phraseIdx++;noteTimer+=0.15;} // pause between phrases
  }

  // CHORD FROM K, NOT CLUSTERS
  // K determines the chord. R drives the dynamics.
  // The lattice breathes — that's volume/brightness, not chord changes.
  var chordIdx;
  if(K<0.3)chordIdx=7;      // very low: chromatic wash (will be quiet anyway)
  else if(K<0.8)chordIdx=6; // low: full scale
  else if(K<1.2)chordIdx=4; // moderate: pentatonic
  else if(K<1.6)chordIdx=3; // sweet: major triad + octave
  else if(K<2.2)chordIdx=2; // strong: power chord
  else if(K<3.5)chordIdx=1; // high: octave
  else chordIdx=0;           // max: unison

  // Just set it. The dial is intentional — no hysteresis needed.
  activeChordIdx=chordIdx;
  var activeChordA=activeChordIdx;
  var activeChordB=Math.max(0,activeChordIdx-1); // B is one step simpler (higher sync)

  // BREATHING ROOT: 110Hz ± 2% over phi*2pi seconds
  var root=110*(1+Math.sin(t/1.618*0.3)*0.02);

  var t2=audioCtx.currentTime;

  // DRONE FROM CHORD: K picks the chord, drone plays it
  var chordA=CHORDS[activeChordA];
  var chordB=CHORDS[activeChordB];
  var droneVol=0.04+R*0.06;

  // Left: voices 1-3 play chord A
  for(var i=1;i<4;i++){
    var ci=i-1;
    if(ci<chordA.length){
      var f=root*chordA[ci];
      clusterOscs[i*2].frequency.setTargetAtTime(f,t2,0.5);
      clusterOscs[i*2+1].frequency.setTargetAtTime(f,t2,0.5);
      clusterGains[i].gain.setTargetAtTime(droneVol*(1-ci*0.2),t2,0.3);
    } else {
      clusterGains[i].gain.setTargetAtTime(0,t2,0.3);
    }
  }

  // Right: voices 4-7 play chord B (slightly detuned)
  for(var i=4;i<MAX_VOICES;i++){
    var ci=i-4;
    if(ci<chordB.length){
      var f=root*chordB[ci]*1.003; // 5 cents sharp for binaural
      clusterOscs[i*2].frequency.setTargetAtTime(f,t2,0.5);
      clusterOscs[i*2+1].frequency.setTargetAtTime(f,t2,0.5);
      clusterGains[i].gain.setTargetAtTime(droneVol*(1-ci*0.2),t2,0.3);
    } else {
      clusterGains[i].gain.setTargetAtTime(0,t2,0.3);
    }
  }

  // SUB BASS
  if(subOsc){
    subOsc.frequency.setTargetAtTime(root/2,t2,0.5);
    subGain.gain.setTargetAtTime(K>0.1?0.03*R:0,t2,0.3);
  }

  // VIBRATO: per-loop R controls depth
  for(var i=0;i<vibratoLFOs.length;i++){
    var lr=i<4?RA:RB;
    vibratoLFOs[i].gain.gain.setTargetAtTime(15+35*(1-lr),t2,0.3);
  }

  // Brightness
  if(warmthFilter){warmthFilter.frequency.setTargetAtTime(400+R*R*4000,t2,0.25);}

  // Master
  masterGain.gain.setTargetAtTime(K>0.1?(0.08+R*0.2):0,t2,0.2);

  prevClusterCount=nc;
}

// ═══ PHYSICS STEP ═══
function step(){
  t+=0.016;

  // K from dial
  K=dialK;
  var humanPhase=0;

  // LEMNISCATE Kuramoto: two loops, A tighter coupling to tame its wild zeros
  var dt=0.016;
  var humanWeight=K*0.3;
  var KA=K*1.4; // loop A needs stronger coupling (wider spread)
  var KB=K;     // loop B is naturally tighter

  // Loop A mean field (nodes 0..N1-1)
  var mreA=0,mimA=0;
  for(var i=0;i<N1;i++){mreA+=Math.cos(phases[i]);mimA+=Math.sin(phases[i]);}
  mreA=(mreA+Math.cos(humanPhase)*humanWeight)/(N1+humanWeight);
  mimA=(mimA+Math.sin(humanPhase)*humanWeight)/(N1+humanWeight);
  var mpA=Math.atan2(mimA,mreA);

  // Loop B mean field (nodes N1..N-1)
  var mreB=0,mimB=0;
  for(var i=N1;i<N;i++){mreB+=Math.cos(phases[i]);mimB+=Math.sin(phases[i]);}
  mreB=(mreB+Math.cos(humanPhase)*humanWeight)/(N2+humanWeight);
  mimB=(mimB+Math.sin(humanPhase)*humanWeight)/(N2+humanWeight);
  var mpB=Math.atan2(mimB,mreB);

  for(var i=0;i<N;i++){
    var omega=filtered[Math.min(i,SN-1)]*2*Math.PI;
    var isA=i<N1;
    var mp=isA?mpA:mpB;
    var Kloop=isA?KA:KB;
    var c=Math.sin(mp-phases[i]);
    var nn=nbrL[i];
    for(var j=0;j<nn.length;j++)c+=0.5*Math.sin(phases[nn[j]]-phases[i]);
    c/=Math.max(1,nn.length+1);
    // THE CROSSING
    if(i===0)c+=K*0.5*Math.sin(phases[N1]-phases[0]);
    if(i===N1)c+=K*0.5*Math.sin(phases[0]-phases[N1]);
    // Human
    c+=0.3*Math.sin(humanPhase-phases[i]);
    phases[i]+=dt*(omega+Kloop*c);
  }

  // Order parameters — separate for each loop
  mreA=0;mimA=0;
  for(var i=0;i<N1;i++){var p=phases[i]%(2*Math.PI);mreA+=Math.cos(p);mimA+=Math.sin(p);}
  mreA/=N1;mimA/=N1;
  RA=Math.sqrt(mreA*mreA+mimA*mimA);

  mreB=0;mimB=0;
  for(var i=N1;i<N;i++){var p=phases[i]%(2*Math.PI);mreB+=Math.cos(p);mimB+=Math.sin(p);}
  mreB/=N2;mimB/=N2;
  RB=Math.sqrt(mreB*mreB+mimB*mimB);

  R=(RA+RB)/2;
  meanPhase=Math.atan2((mimA+mimB)/2,(mreA+mreB)/2);
  crossPhase=Math.abs((phases[0]-phases[N1])%(2*Math.PI));
  if(crossPhase>Math.PI)crossPhase=2*Math.PI-crossPhase;

  // Update audio every 3rd frame
  if(Math.floor(t*60)%3===0)updateAudio();
}

// ═══ DIAL: rotary knob for K ═══
var dialK=1.868;
var dialAngle=Math.PI*0.6; // starting angle (maps to 1.868)
var dialDragging=false;
var dialLastY=0;
var knobCv=document.getElementById('knob');
var knobCx=knobCv.getContext('2d');

function drawDial(){
  var s=120;knobCx.clearRect(0,0,s,s);
  // Ring
  knobCx.strokeStyle='rgba(201,164,74,0.12)';
  knobCx.lineWidth=2;
  knobCx.beginPath();knobCx.arc(60,60,45,Math.PI*0.75,Math.PI*2.25);knobCx.stroke();
  // Pointer
  var px=60+Math.cos(dialAngle-Math.PI/2)*38;
  var py=60+Math.sin(dialAngle-Math.PI/2)*38;
  knobCx.fillStyle='rgba(201,164,74,0.5)';
  knobCx.beginPath();knobCx.arc(px,py,4,0,Math.PI*2);knobCx.fill();
  // Value
  knobCx.fillStyle='rgba(201,164,74,0.15)';
  knobCx.font='200 16px Georgia';knobCx.textAlign='center';
  knobCx.fillText(dialK.toFixed(2),60,65);
}

function dialToK(angle){
  // angle 0 to 2pi maps to K 0.3 to 4.0
  var norm=angle/(Math.PI*2);
  return 0.3+norm*3.7;
}
function kToDial(k){
  return((k-0.3)/3.7)*Math.PI*2;
}
dialAngle=kToDial(1.868);

knobCv.addEventListener('touchstart',function(e){
  e.preventDefault();e.stopPropagation();
  dialDragging=true;dialLastY=e.touches[0].clientY;
},{passive:false});
knobCv.addEventListener('mousedown',function(e){
  dialDragging=true;dialLastY=e.clientY;
});
addEventListener('touchmove',function(e){
  if(!dialDragging)return;
  e.preventDefault();
  var dy=dialLastY-e.touches[0].clientY;
  dialAngle+=dy*0.02;
  dialAngle=Math.max(0,Math.min(Math.PI*2,dialAngle));
  dialK=dialToK(dialAngle);
  dialLastY=e.touches[0].clientY;
  drawDial();
},{passive:false});
addEventListener('mousemove',function(e){
  if(!dialDragging)return;
  var dy=dialLastY-e.clientY;
  dialAngle+=dy*0.02;
  dialAngle=Math.max(0,Math.min(Math.PI*2,dialAngle));
  dialK=dialToK(dialAngle);
  dialLastY=e.clientY;
  drawDial();
});
addEventListener('touchend',function(){dialDragging=false;});
addEventListener('mouseup',function(){dialDragging=false;});
drawDial();

// ═══ RENDER ═══
var COLORS=[
  [220,100,80],[220,170,60],[180,200,60],[60,200,140],
  [60,140,220],[140,80,220],[200,60,180]
];

function render(){
  w=W/DPR;h=H/DPR;

  if(!started){requestAnimationFrame(render);return;}

  cx.fillStyle='rgba(0,0,0,0.06)';
  cx.fillRect(0,0,w,h);

  step();

  var gridW=12,gridH=10*Math.sqrt(3)/2;
  var scale=Math.min(w*0.8/gridW,h*0.7/gridH);
  var offX=(w-gridW*scale)/2;
  var offY=(h-gridH*scale)/2;

  cx.globalCompositeOperation='lighter';

  // Connections
  for(var i=0;i<N;i++){
    var sx=offX+nxA[i]*scale,sy=offY+nyA[i]*scale;
    var pi2=phases[i]%(2*Math.PI);if(pi2<0)pi2+=2*Math.PI;
    var nn=nbrL[i];
    for(var j=0;j<nn.length;j++){
      if(nn[j]<=i)continue;
      var sx2=offX+nxA[nn[j]]*scale,sy2=offY+nyA[nn[j]]*scale;
      var pj=phases[nn[j]]%(2*Math.PI);if(pj<0)pj+=2*Math.PI;
      var pd=Math.abs(pi2-pj);if(pd>Math.PI)pd=2*Math.PI-pd;
      var sync=1-pd/Math.PI;
      if(sync<0.5)continue;
      var al=sync*sync*0.04;
      var ci=Math.floor(pi2/(Math.PI*2/7))%7;
      var co=COLORS[ci];
      cx.strokeStyle='rgba('+co[0]+','+co[1]+','+co[2]+','+al+')';
      cx.lineWidth=0.3+sync*0.5;
      cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx2,sy2);cx.stroke();
    }
  }

  // Nodes
  for(var i=0;i<N;i++){
    var sx=offX+nxA[i]*scale,sy=offY+nyA[i]*scale;
    var p=phases[i]%(2*Math.PI);if(p<0)p+=2*Math.PI;
    var ci=Math.floor(p/(Math.PI*2/7))%7;
    var co=COLORS[ci];
    var size=1.2+Math.sin(phases[i])*0.5;
    var bright=0.15+Math.abs(Math.sin(phases[i]))*0.25;
    cx.fillStyle='rgba('+co[0]+','+co[1]+','+co[2]+','+bright+')';
    cx.fillRect(sx-size,sy-size,size*2,size*2);
    if(bright>0.3){
      cx.fillStyle='rgba('+co[0]+','+co[1]+','+co[2]+','+(bright*0.06)+')';
      cx.fillRect(sx-size*3,sy-size*3,size*6,size*6);
    }
  }

  cx.globalCompositeOperation='source-over';

  // K and R display (almost invisible)
  var info=document.getElementById('info');
  if(Math.floor(t*10)%5===0){
    info.textContent='K='+K.toFixed(2)+' R='+R.toFixed(3)+' · 137 zeros · tilt to play';
  }

  requestAnimationFrame(render);
}

// ═══ START ═══
function begin(){
  if(started)return;
  document.getElementById('start').style.display='none';
  started=true;
  // SENSORS FIRST — permission must happen in direct gesture stack
  initSensors();
  // Audio second — still in gesture context
  initAudio();
  setTimeout(function(){
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
  },300);
}
// Both click AND touchend — covers all devices
document.getElementById('start').addEventListener('click',begin);
document.getElementById('start').addEventListener('touchend',begin);

render();
</script>
