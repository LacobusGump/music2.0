<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<meta property="og:title" content="GUMP — The Machine">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#hitboxes{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
#hitboxes a{pointer-events:auto;position:absolute;display:block;left:0;width:100%;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="hitboxes"></div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var DPR=devicePixelRatio||1,w,h;
function resize(){w=innerWidth;h=innerHeight;cv.width=w*DPR;cv.height=h*DPR;cx.setTransform(DPR,0,0,DPR,0,0);if(needsSample)sampleText();}
resize();addEventListener('resize',resize);

var PAGES=[
  {name:'research',  url:'/r/',         c:[201,164,74]},
  {name:'one',       url:'/one/',       c:[140,184,122]},
  {name:'flex',      url:'/flex/',      c:[184,104,160]},
  {name:'bloom',     url:'/bloom/',     c:[92,184,136]},
  {name:'resonance', url:'/resonance/', c:[200,104,88]},
  {name:'oracle',    url:'/oracle/',    c:[168,160,104]},
];

var t=0,phase=0; // 0=assembling, 1=holding, 2=consuming, 3=cycling
var NP=10000;
var px=new Float32Array(NP),py=new Float32Array(NP);
var pvx=new Float32Array(NP),pvy=new Float32Array(NP);
var ptx=new Float32Array(NP),pty=new Float32Array(NP);
var pr=new Float32Array(NP),pg=new Float32Array(NP),pb=new Float32Array(NP);
var passigned=new Uint8Array(NP); // has a text target

// Ether: particles continuously born at random positions
var born=new Float32Array(NP);
for(var i=0;i<NP;i++){
  px[i]=Math.random()*2000;py[i]=Math.random()*2000;
  pvx[i]=(Math.random()-0.5)*2;pvy[i]=(Math.random()-0.5)*2;
  pr[i]=0.15;pg[i]=0.13;pb[i]=0.1;
  born[i]=-Math.random()*3; // stagger
}

// Text sampling with organic scatter
var textTargets=[];
var wordRegions=[];
var needsSample=true;

function sampleText(){
  needsSample=false;
  var oc=document.createElement('canvas');
  oc.width=w;oc.height=h;
  var ox=oc.getContext('2d');
  ox.fillStyle='#000';ox.fillRect(0,0,w,h);
  ox.textAlign='center';ox.fillStyle='#fff';

  wordRegions=[];

  // GUMP at top
  var ts=Math.min(w*0.13,55);
  ox.font='100 '+ts+'px Georgia';
  ox.letterSpacing='0.25em';
  ox.fillText('GUMP',w/2,h*0.1+ts*0.35);
  wordRegions.push({y:h*0.1-ts*0.3,h:ts*1.2,ci:-1});

  // Pages
  var fs=Math.min(w*0.05,22);
  var startY=h*0.26;
  var gap=(h*0.65)/PAGES.length;
  ox.font='100 '+fs+'px Georgia';
  ox.letterSpacing='0.25em';

  for(var i=0;i<PAGES.length;i++){
    var y=startY+i*gap;
    ox.fillText(PAGES[i].name,w/2,y);
    wordRegions.push({y:y-fs*0.8,h:fs*1.6,ci:i,cy:y});
  }

  // Sample pixels — with organic scatter
  var imgData=ox.getImageData(0,0,w,h).data;
  textTargets=[];
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      if(imgData[(y*w+x)*4]>100){
        // Only sample ~1 in 3 for organic density
        if(Math.random()>0.35)continue;
        var ci=-1;
        for(var j=0;j<wordRegions.length;j++){
          if(y>wordRegions[j].y&&y<wordRegions[j].y+wordRegions[j].h)ci=wordRegions[j].ci;
        }
        // Organic scatter: offset each target slightly
        var scatter=1.5;
        textTargets.push({
          x:x+(Math.random()-0.5)*scatter,
          y:y+(Math.random()-0.5)*scatter,
          ci:ci
        });
      }
    }
  }

  // Assign particles to targets
  for(var i=0;i<NP;i++){
    if(i<textTargets.length){
      var tt=textTargets[i];
      ptx[i]=tt.x;pty[i]=tt.y;
      passigned[i]=1;
      if(tt.ci>=0){
        pr[i]=PAGES[tt.ci].c[0]/255;
        pg[i]=PAGES[tt.ci].c[1]/255;
        pb[i]=PAGES[tt.ci].c[2]/255;
      } else {
        pr[i]=0.79;pg[i]=0.64;pb[i]=0.29; // GUMP gold
      }
    } else {
      passigned[i]=0;
      ptx[i]=Math.random()*w;pty[i]=Math.random()*h;
      pr[i]=0.1;pg[i]=0.09;pb[i]=0.07;
    }
  }

  // Hitboxes
  var hb=document.getElementById('hitboxes');hb.innerHTML='';
  for(var i=0;i<PAGES.length;i++){
    var a=document.createElement('a');
    a.href=PAGES[i].url;
    a.style.top=(startY+i*gap-fs*0.8)+'px';
    a.style.height=(fs*1.6)+'px';
    hb.appendChild(a);
  }
}
sampleText();

var holdTimer=0;
var consumeStarted=false;
var cycleIdx=0,cycleTimer=0;

function render(){
  w=innerWidth;h=innerHeight;t+=0.016;
  cx.fillStyle='rgba(0,0,0,0.07)';
  cx.fillRect(0,0,w,h);

  // Phase management
  if(phase===0){
    // Assembling — check if most particles arrived
    var arrived=0;
    for(var i=0;i<NP;i++){
      if(passigned[i]&&Math.abs(px[i]-ptx[i])<3&&Math.abs(py[i]-pty[i])<3)arrived++;
    }
    if(arrived>textTargets.length*0.85)phase=1;
  } else if(phase===1){
    holdTimer+=0.016;
    if(holdTimer>12){phase=2;} // 12 seconds idle → consume
  } else if(phase===2){
    // Consuming: all particles flow to center
    if(!consumeStarted){
      consumeStarted=true;
      for(var i=0;i<NP;i++){ptx[i]=w/2;pty[i]=h*0.1;}
    }
    cycleTimer+=0.016;
    if(cycleTimer>3){
      // Navigate to first page
      window.location.href=PAGES[0].url;
    }
  }

  cx.globalCompositeOperation='lighter';

  // Continuously spawn new ether particles at edges
  for(var i=0;i<NP;i++){
    if(!passigned[i]&&Math.random()<0.001){
      // Respawn at edge
      var edge=Math.random()*4;
      if(edge<1){px[i]=Math.random()*w;py[i]=-5;}
      else if(edge<2){px[i]=w+5;py[i]=Math.random()*h;}
      else if(edge<3){px[i]=Math.random()*w;py[i]=h+5;}
      else{px[i]=-5;py[i]=Math.random()*h;}
      pvx[i]=(Math.random()-0.5)*1;pvy[i]=(Math.random()-0.5)*1;
    }
  }

  for(var i=0;i<NP;i++){
    var age=t-born[i];
    if(age<0)continue;

    if(passigned[i]){
      // Spring toward text target
      var k=phase===2?0.01:0.015+Math.min(0.03,age*0.005);
      pvx[i]+=(ptx[i]-px[i])*k;
      pvy[i]+=(pty[i]-py[i])*k;
      pvx[i]*=0.88;pvy[i]*=0.88;
    } else {
      // Ether: gentle drift toward center with wander
      pvx[i]+=(w/2-px[i])*0.00005+Math.sin(t+i)*0.005;
      pvy[i]+=(h/2-py[i])*0.00005+Math.cos(t*0.7+i*0.5)*0.005;
      pvx[i]*=0.995;pvy[i]*=0.995;
    }

    px[i]+=pvx[i];py[i]+=pvy[i];

    // Alpha: assigned = brighter, ether = dim
    var alpha=passigned[i]?Math.min(0.35,age*0.15):0.03;

    cx.fillStyle='rgba('+Math.floor(pr[i]*255)+','+Math.floor(pg[i]*255)+','+Math.floor(pb[i]*255)+','+alpha+')';
    cx.fillRect(px[i],py[i],1,1);
  }

  cx.globalCompositeOperation='source-over';

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
