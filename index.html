<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Music 2.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ── SCREENS ── */
.screen{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity 0.8s ease;
  will-change:opacity;
}
.screen.active{opacity:1;pointer-events:auto}

/* ── LISTEN SCREEN ── */
#screen-listen{z-index:3}

.breath-circle{
  width:120px;height:120px;
  border:1.5px solid rgba(255,255,255,0.15);
  border-radius:50%;
  animation:breathe 6s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(0.85);opacity:0.3}
  50%{transform:scale(1.15);opacity:0.7}
}

.listen-word{
  margin-top:32px;
  font-size:18px;letter-spacing:6px;
  color:rgba(255,255,255,0.4);
  font-weight:300;text-transform:lowercase;
}

/* ── LENS SCREEN ── */
#screen-lens{z-index:2;flex-direction:column}

.lens-title{
  font-size:11px;letter-spacing:4px;text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  margin-bottom:24px;
}

.lens-scroll{
  display:flex;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  gap:16px;
  padding:0 calc(50vw - 130px);
  width:100%;
  scrollbar-width:none;
}
.lens-scroll::-webkit-scrollbar{display:none}

.lens-card{
  flex:0 0 260px;
  scroll-snap-align:center;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:28px 24px;
  cursor:pointer;
  transition:border-color 0.3s,transform 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.lens-card:active{transform:scale(0.97)}
.lens-card.selected{border-color:var(--accent,rgba(255,255,255,0.4))}

.lens-card-name{
  font-size:16px;font-weight:600;letter-spacing:1px;
  margin-bottom:8px;
}
.lens-card-desc{
  font-size:13px;color:rgba(255,255,255,0.45);
  line-height:1.4;
}
.lens-card-accent{
  width:32px;height:3px;border-radius:2px;
  margin-top:16px;
  opacity:0.6;
}

.lens-go{
  margin-top:32px;
  font-size:13px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);
  transition:color 0.3s,opacity 0.3s;
  opacity:0;
  cursor:pointer;
  padding:12px 24px;
}
.lens-go.visible{opacity:1;color:rgba(255,255,255,0.6)}

/* ── PLAY SCREEN ── */
#screen-play{z-index:1}
#canvas{position:absolute;inset:0;width:100%;height:100%}

.lens-indicator{
  position:absolute;top:env(safe-area-inset-top,12px);
  left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.2);
  padding-top:12px;
  pointer-events:none;
  transition:opacity 0.5s;
}

.swipe-hint{
  position:absolute;bottom:max(20px,env(safe-area-inset-bottom,20px));
  left:0;right:0;text-align:center;
  font-size:10px;letter-spacing:2px;
  color:rgba(255,255,255,0.15);
  pointer-events:none;
  opacity:1;
  transition:opacity 2s;
}

/* ── DEBUG ── */
#debug{
  position:absolute;top:0;left:0;right:0;
  background:rgba(0,0,0,0.85);
  color:#0f0;font-size:10px;font-family:monospace;
  padding:max(env(safe-area-inset-top,8px),8px) 8px 8px;
  white-space:pre;line-height:1.5;
  display:none;z-index:100;
  pointer-events:none;
}
#debug.visible{display:block}
</style>
</head>
<body>

<!-- SCREEN 1: LISTEN -->
<div id="screen-listen" class="screen active">
  <div class="breath-circle"></div>
  <div class="listen-word">listen</div>
</div>

<!-- SCREEN 2: LENS -->
<div id="screen-lens" class="screen">
  <div class="lens-title">choose your world</div>
  <div class="lens-scroll" id="lens-scroll"></div>
  <div class="lens-go" id="lens-go">play</div>
</div>

<!-- SCREEN 3: PLAY -->
<div id="screen-play" class="screen">
  <canvas id="canvas"></canvas>
  <div class="lens-indicator" id="lens-indicator"></div>
  <div class="swipe-hint" id="swipe-hint">swipe to change lens</div>
</div>

<!-- DEBUG -->
<div id="debug"></div>

<script src="js/sensor.js?v=9"></script>
<script src="js/brain.js?v=9"></script>
<script src="js/audio.js?v=9"></script>
<script src="js/score.js?v=9"></script>
<script src="js/lens.js?v=9"></script>
<script src="js/organism.js?v=9"></script>
<script src="js/app.js?v=9"></script>
</body>
</html>
