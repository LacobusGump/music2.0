<!-- Force reload when build changes. iOS WebKit caches index.html aggressively.
     BUILD must match follow.js version. Bump both together on every deploy. -->
<script>
(function(){
  var BUILD = 157;
  window.GUMP_BUILD = BUILD;
  try {
    var stored = parseInt(localStorage.getItem('gump_build') || '0', 10);
    if (stored !== BUILD) {
      localStorage.setItem('gump_build', BUILD);
      if (stored > 0) location.reload(true);
    }
  } catch(e) {}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Golden ratio */
  --phi:1.618;

  /* Time-of-day — updated by JS, defaults to night */
  --bg-h:240;
  --bg-s:8;
  --bg-l:3;

  /* Warm palette — no green, no cold white */
  --fg:rgba(255,252,245,0.92);
  --fg-dim:rgba(255,252,245,0.55);
  --fg-ghost:rgba(255,252,245,0.25);
  --fg-whisper:rgba(255,252,245,0.12);
  --accent:rgba(255,220,170,0.65);
  --accent-warm:rgba(255,200,140,0.5);
  --surface:rgba(255,252,245,0.04);
  --border:rgba(255,252,245,0.08);
  --border-active:rgba(255,220,170,0.18);
  --glow:rgba(255,210,150,0.06);
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;

  /* Fibonacci spacing scale: 1, 2, 3, 5, 8, 13, 21, 34, 55 */
  --sp-1:1px; --sp-2:2px; --sp-3:3px; --sp-5:5px;
  --sp-8:8px; --sp-13:13px; --sp-21:21px; --sp-34:34px; --sp-55:55px;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000000;
  color:var(--fg);
  font-family:var(--sans);
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  font-weight:300;
}

/* ── SCREENS ── */
.screen{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
  will-change:opacity;
  background:#000000;
}
.screen.active{opacity:1;pointer-events:auto}

/* ── BOOT SCREEN ── */
#screen-listen{
  z-index:3;
  display:flex;align-items:center;justify-content:center;
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
}

/* Subtle breathing gradient behind boot */
#screen-listen::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(
    ellipse 61.8% 61.8% at 50% 38.2%,
    rgba(255,210,150,0.03) 0%,
    transparent 100%
  );
  animation:boot-breathe 8s ease-in-out infinite;
}
@keyframes boot-breathe{
  0%,100%{opacity:0.3;transform:scale(1)}
  50%{opacity:1;transform:scale(1.02)}
}

#boot-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

/* Phi symbol / logo */
.boot-logo{
  position:absolute;
  top:38.2%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
  font-weight:200;
  color:rgba(255,220,170,0.12);
  letter-spacing:0.02em;
  pointer-events:none;
  font-family:serif;
}

.boot-touch-hint{
  position:absolute;
  bottom:calc(100% / var(--phi) / var(--phi));
  left:0;right:0;
  text-align:center;
  font-size:12px;
  font-weight:200;
  letter-spacing:0.35em;
  text-transform:lowercase;
  color:var(--fg-dim);
  animation:breathe 5s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{opacity:0.15;transform:translateY(0)}
  50%{opacity:0.45;transform:translateY(-2px)}
}
/* Pulse for legacy compat */
@keyframes pulse-text{
  0%,100%{opacity:0.25}
  50%{opacity:0.55}
}

/* ── LENS SELECT SCREEN ── */
#screen-lens{
  z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 var(--sp-34);
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
}

.sys-header{
  font-family:var(--sans);
  font-size:18px;
  font-weight:200;
  letter-spacing:0.12em;
  text-transform:none;
  color:var(--fg);
  margin-bottom:var(--sp-34);
  text-align:center;
}
.sys-header em{font-style:normal;color:var(--accent);}

.protocol-list{
  width:100%;max-width:340px;
  display:flex;flex-direction:column;
  gap:var(--sp-5);
}

.protocol-item{
  display:flex;align-items:center;
  padding:var(--sp-13) var(--sp-21);
  border:none;
  border-radius:var(--sp-8);
  cursor:pointer;
  transition:background 0.35s ease, box-shadow 0.35s ease;
  -webkit-tap-highlight-color:transparent;
  gap:var(--sp-13);
  background:transparent;
}
.protocol-item:active{background:var(--surface);}
.protocol-item.selected{
  background:var(--glow);
  box-shadow:0 0 34px rgba(255,210,150,0.04), inset 0 0 21px rgba(255,210,150,0.02);
}
.protocol-item.selected .p-cursor{opacity:1;}

.p-cursor{
  font-size:6px;color:var(--accent);opacity:0;
  flex-shrink:0;
  transition:opacity 0.25s;
}
.p-num{
  display:none; /* kill terminal numbering */
}
.p-body{flex:1;}
.p-name{
  font-family:var(--sans);
  font-size:15px;font-weight:300;
  letter-spacing:0.06em;
  color:var(--fg);
  margin-bottom:var(--sp-2);
}
.p-desc{
  font-size:10px;font-weight:200;
  letter-spacing:0.01em;line-height:1.6;
  color:var(--fg-dim);
}

/* COMMAND BAR — lens screen: minimal, no terminal aesthetic */
.cmd-bar{
  margin-top:var(--sp-34);
  width:100%;max-width:340px;
  display:flex;align-items:center;
  border:1px solid var(--border);
  border-radius:var(--sp-8);
  padding:var(--sp-13) var(--sp-21);
  gap:var(--sp-8);
  background:var(--surface);
}
.cmd-gt{display:none;} /* kill >_ */
#cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--fg);
  font-family:var(--sans);
  font-size:13px;font-weight:200;
  letter-spacing:0.04em;
  flex:1;
  caret-color:var(--accent);
  -webkit-appearance:none;
}
#cmd-input::placeholder{color:var(--fg-ghost);font-weight:200;}

/* Hidden go button kept for JS compat */
#lens-go{display:none}

/* ── PLAY SCREEN ── */
#screen-play{
  z-index:1;
  background:#000000;
}
#canvas{position:absolute;inset:0;width:100%;height:100%;}

/* Lens name — top left, whisper weight, elegant */
#lens-indicator{
  position:absolute;
  top:max(env(safe-area-inset-top,16px),16px);
  left:var(--sp-21);
  font-family:var(--sans);
  font-size:10px;
  font-weight:200;
  letter-spacing:0.22em;
  color:var(--fg-dim);
  pointer-events:none;
  opacity:0.5;
  transition:opacity 0.6s;
}

/* Dance button — top right, warm */
#ask-dance-btn{
  position:absolute;
  top:max(env(safe-area-inset-top,16px),16px);
  right:var(--sp-21);
  font-family:var(--sans);
  font-size:10px;
  font-weight:200;
  letter-spacing:0.22em;
  color:var(--fg-ghost);
  pointer-events:auto;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  padding:var(--sp-8) 0 var(--sp-8) var(--sp-21);
  transition:color 0.3s;
  z-index:20;
}
#ask-dance-btn:active{color:var(--accent);}
#ask-dance-btn.connected{
  color:var(--accent);
  animation:breathe 3s ease-in-out infinite;
}

/* COMMAND BAR — play screen: hidden, no clutter */
#play-cmd{
  position:absolute;
  bottom:0;left:0;right:0;
  display:none; /* killed — clutter on play screen */
  align-items:center;
  padding:10px 18px;
  padding-bottom:max(env(safe-area-inset-bottom,10px),10px);
  border-top:1px solid var(--border);
  background:rgba(5,5,5,0.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  gap:10px;
  z-index:20;
}
.play-gt{color:var(--fg-ghost);font-size:11px;flex-shrink:0;font-family:var(--mono);}
#play-cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--fg-dim);
  font-family:var(--mono);
  font-size:11px;font-weight:300;
  letter-spacing:0.05em;
  flex:1;
  caret-color:var(--accent);
  -webkit-appearance:none;
}
#play-cmd-input::placeholder{color:var(--fg-whisper);}
#play-cmd-input:focus{color:var(--fg);}

/* ── VOICE CAPTION — audio only, no text on screen ── */
#voice-caption{ display:none; }

/* ── FLASH OVERLAY ── */
#flash{
  position:fixed;inset:0;
  pointer-events:none;
  opacity:0;
  z-index:800;
  transition:opacity 0.08s;
}

/* ── OUTFIT OVERLAY — Ask to Dance ── */
#outfit-overlay{
  position:fixed;inset:0;
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
  z-index:60;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1);
}
#outfit-overlay.active{opacity:1;pointer-events:auto;}

/* Close — barely there, top right */
#outfit-close{
  position:absolute;
  top:max(env(safe-area-inset-top,20px),20px);right:20px;
  background:none;border:none;outline:none;
  font-size:18px;color:var(--fg-ghost);
  cursor:pointer;padding:var(--sp-13);
  font-family:var(--sans);
  font-weight:200;
  -webkit-tap-highlight-color:transparent;
  transition:color 0.3s;
  line-height:1;
}
#outfit-close:active{color:var(--accent);}

/* QR phase */
#outfit-qr-view{
  display:flex;flex-direction:column;
  align-items:center;
  transition:opacity 0.4s ease;
}

/* The QR frame */
#outfit-qr-wrap{
  position:relative;
  padding:var(--sp-21);
  border:1px solid var(--border);
  border-radius:var(--sp-8);
  margin-bottom:var(--sp-34);
}
#outfit-qr-wrap::after{display:none;}
#outfit-qr-canvas{display:block;}

#outfit-room-code{
  font-family:var(--mono);
  font-size:20px;font-weight:200;letter-spacing:0.4em;
  color:var(--fg);
  margin-bottom:var(--sp-8);text-align:center;
}
#outfit-scan-label{
  font-family:var(--sans);
  font-size:9px;font-weight:200;letter-spacing:0.4em;
  color:var(--fg-ghost);
  text-transform:lowercase;
  margin-bottom:var(--sp-55);text-align:center;
}
#outfit-waiting{
  font-family:var(--sans);
  font-size:9px;font-weight:200;letter-spacing:0.3em;
  color:var(--fg-dim);
  text-align:center;
  animation:breathe 4s ease-in-out infinite;
}

#outfit-conn-view{
  display:none;flex-direction:column;
  align-items:center;gap:var(--sp-21);
  text-align:center;
}
#outfit-conn-view.show{display:flex;}

#outfit-conn-glyph{
  font-size:42px;color:var(--accent);
  opacity:0;transform:scale(0.82);
  transition:opacity 0.65s ease,transform 0.65s ease;
  line-height:1;
}
#outfit-conn-glyph.show{opacity:1;transform:scale(1);}

#outfit-conn-label{
  font-family:var(--sans);
  font-size:9px;font-weight:200;letter-spacing:0.45em;
  color:var(--fg-ghost);
  text-transform:lowercase;
}
#outfit-conn-partner{
  font-family:var(--sans);
  font-size:13px;font-weight:200;letter-spacing:0.2em;
  color:var(--fg);
}

/* ── VERSION BADGE ── */
#version-badge{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,8px),8px);
  right:var(--sp-21);
  font-family:var(--mono);
  font-size:8px;font-weight:200;
  letter-spacing:0.15em;
  color:var(--fg-ghost);
  opacity:0.5;
  pointer-events:none;z-index:9999;
}

/* ── DEBUG ── */
#debug{
  position:absolute;top:0;left:0;right:0;
  background:rgba(5,5,5,0.75);
  color:var(--fg-dim);
  font-size:9px;font-family:var(--mono);font-weight:300;
  padding:max(env(safe-area-inset-top,8px),8px) var(--sp-13) var(--sp-8);
  white-space:pre;line-height:1.6;
  display:none;z-index:100;
  pointer-events:none;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
#debug.visible{display:block;}
</style>
</head>

<script>
/* Time-of-day ambient color — barely perceptible, felt more than seen */
(function(){
  function updateTimeColor(){
    var h=new Date().getHours(),m=new Date().getMinutes();
    var t=h+m/60; /* fractional hour */
    var hue,sat,lit;
    if(t>=5&&t<9){       /* morning: warm amber */
      hue=30;sat=12;lit=4;
    }else if(t>=9&&t<16){ /* day: clean white-blue */
      hue=210;sat=6;lit=5;
    }else if(t>=16&&t<20){/* evening: golden */
      hue=35;sat=14;lit=4;
    }else{                /* night: deep indigo */
      hue=240;sat=8;lit=3;
    }
    document.documentElement.style.setProperty('--bg-h',hue);
    document.documentElement.style.setProperty('--bg-s',sat);
    document.documentElement.style.setProperty('--bg-l',lit);
  }
  updateTimeColor();
  setInterval(updateTimeColor,60000);
})();
</script>
<script>
// ── DIAGNOSTIC OVERLAY — triple-tap or ?diag in URL ──
// Shows permission state, motion events, browser info ON SCREEN.
// Triple-tap anywhere to toggle. Copy text to paste to Claude Code.
(function(){
  var tapCount=0, tapTimer=0, diagEl=null, diagInterval=null;
  var log=[];
  function dlog(msg){log.push('['+((performance.now()/1000).toFixed(1))+'s] '+msg);if(log.length>30)log.shift();}

  window._dlog=dlog;

  function show(){
    if(diagEl){hide();return;}
    diagEl=document.createElement('div');
    diagEl.id='diag-overlay';
    diagEl.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);color:#0f0;font:11px/1.6 monospace;padding:20px;z-index:99999;overflow:auto;-webkit-user-select:text;user-select:text;touch-action:auto;';
    document.body.appendChild(diagEl);
    diagInterval=setInterval(refresh,500);
    refresh();
  }
  function hide(){
    if(diagEl){diagEl.remove();diagEl=null;}
    if(diagInterval){clearInterval(diagInterval);diagInterval=null;}
  }
  function refresh(){
    if(!diagEl)return;
    var ua=navigator.userAgent||'';
    var isChrome=/CriOS/.test(ua);
    var isSafari=/Safari/.test(ua)&&!isChrome;
    var isFirefox=/FxiOS/.test(ua);
    var browser=isChrome?'Chrome iOS':isFirefox?'Firefox iOS':isSafari?'Safari':'Unknown';

    var hasDME=typeof DeviceMotionEvent!=='undefined';
    var hasRP=hasDME&&typeof DeviceMotionEvent.requestPermission==='function';
    var hasDOE=typeof DeviceOrientationEvent!=='undefined';
    var hasORP=hasDOE&&typeof DeviceOrientationEvent.requestPermission==='function';

    var sensorState='N/A';
    if(typeof Sensor!=='undefined'){sensorState=Sensor.permissionState||'unknown';}

    var lines=[
      '=== GUMP DIAGNOSTIC ===',
      'BUILD: '+(window.GUMP_BUILD||'?'),
      'Browser: '+browser,
      '',
      '--- PERMISSION ---',
      'DeviceMotionEvent exists: '+hasDME,
      'requestPermission exists: '+hasRP,
      'DeviceOrientationEvent exists: '+hasDOE,
      'orient requestPermission exists: '+hasORP,
      'Sensor.permissionState: '+sensorState,
      '',
      '--- MOTION DATA ---',
      'motionEvents: '+(window._diagMotionCount||0),
      'orientEvents: '+(window._diagOrientCount||0),
      'lastBeta: '+(window._diagLastBeta||'none'),
      'lastGamma: '+(window._diagLastGamma||'none'),
      '',
      '--- LOG ---',
      log.join('\n'),
      '',
      '(tap to select all + copy)',
    ];
    diagEl.textContent=lines.join('\n');
  }

  // Count motion/orientation events globally
  window._diagMotionCount=0;
  window._diagOrientCount=0;
  window.addEventListener('devicemotion',function(){window._diagMotionCount++;},{passive:true});
  window.addEventListener('deviceorientation',function(e){
    window._diagOrientCount++;
    window._diagLastBeta=(e.beta||0).toFixed(1);
    window._diagLastGamma=(e.gamma||0).toFixed(1);
  },{passive:true});

  // Only show with ?debug=1 in URL — hidden from users
  if(location.search.indexOf('debug=1')>=0) setTimeout(show,1000);

  // Log permission attempts
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    var origRP=DeviceMotionEvent.requestPermission;
    DeviceMotionEvent.requestPermission=function(){
      dlog('requestPermission() CALLED');
      return origRP.apply(this,arguments).then(function(r){
        dlog('requestPermission() RESULT: '+r);
        return r;
      }).catch(function(e){
        dlog('requestPermission() ERROR: '+e);

      });
    };
  }

  window.gumpDiag=show;
})();
