<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<meta property="og:title" content="GUMP — The Machine">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#e8e4dc;font-family:Georgia,serif;overflow-x:hidden;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;}
#menu{position:relative;z-index:10;max-width:400px;margin:0 auto;padding:60px 20px 40px;display:flex;flex-direction:column;gap:28px;min-height:100vh;justify-content:center;}
.item{display:block;text-decoration:none;text-align:center;padding:12px 0;border-radius:8px;transition:background 0.3s;}
.item:active{background:rgba(255,255,255,0.03);}
.item .name{font-size:1.15em;font-weight:200;letter-spacing:0.08em;}
.item .desc{font-size:0.65em;color:#444;letter-spacing:0.1em;margin-top:2px;}
h1{text-align:center;font-weight:200;font-size:1.5em;letter-spacing:0.15em;color:#c9a44a;opacity:0.4;margin-bottom:8px;}
h1 span{display:block;font-size:0.35em;color:#333;letter-spacing:0.2em;margin-top:4px;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="menu">
  <h1>GUMP<span>137 zeros · K=1.868 · the orbit</span></h1>
  <a class="item" href="/r/" style="color:#c9a44a;"><div class="name">research</div><div class="desc">the full story</div></a>
  <a class="item" href="/one/" style="color:#a0c88c;"><div class="name">one</div><div class="desc">knowledge engine</div></a>
  <a class="item" href="/mirror/" style="color:#78a0dc;"><div class="name">mirror</div><div class="desc">5D machine</div></a>
  <a class="item" href="/flex/" style="color:#c86eaa;"><div class="name">flex</div><div class="desc">12 shapes</div></a>
  <a class="item" href="/bloom/" style="color:#64c896;"><div class="name">bloom</div><div class="desc">nothing to life</div></a>
  <a class="item" href="/resonance/" style="color:#dc6e5a;"><div class="name">resonance</div><div class="desc">tissue targeting</div></a>
  <a class="item" href="/oracle/" style="color:#beb478;"><div class="name">oracle</div><div class="desc">primes from nothing</div></a>
</div>
<script>
// Background particles — decoration only, no touch interaction
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

var NP=200,t=0;
var px=new Float32Array(NP),py=new Float32Array(NP);
var pvx=new Float32Array(NP),pvy=new Float32Array(NP);
var pr=new Uint8Array(NP),pg=new Uint8Array(NP),pb=new Uint8Array(NP);
var pa=new Float32Array(NP);

var colors=[[201,164,74],[160,200,140],[120,160,220],[200,110,170],[100,200,150],[220,110,90],[190,180,120]];
for(var i=0;i<NP;i++){
  px[i]=Math.random()*innerWidth;
  py[i]=Math.random()*innerHeight;
  pvx[i]=(Math.random()-0.5)*0.2;
  pvy[i]=(Math.random()-0.5)*0.2;
  var c=colors[i%7];
  pr[i]=c[0];pg[i]=c[1];pb[i]=c[2];
  pa[i]=0.05+Math.random()*0.1;
}

function render(){
  var w=innerWidth,h=innerHeight;t+=0.016;
  cx.fillStyle='rgba(0,0,0,0.08)';
  cx.fillRect(0,0,w,h);
  cx.globalCompositeOperation='lighter';
  for(var i=0;i<NP;i++){
    // Gentle drift
    pvx[i]+=Math.sin(t*0.3+i)*0.001;
    pvy[i]+=Math.cos(t*0.2+i*0.7)*0.001;
    pvx[i]*=0.99;pvy[i]*=0.99;
    px[i]+=pvx[i];py[i]+=pvy[i];
    // Wrap
    if(px[i]<0)px[i]=w;if(px[i]>w)px[i]=0;
    if(py[i]<0)py[i]=h;if(py[i]>h)py[i]=0;
    cx.fillStyle='rgba('+pr[i]+','+pg[i]+','+pb[i]+','+pa[i]+')';
    cx.fillRect(px[i],py[i],1,1);
  }
  cx.globalCompositeOperation='source-over';
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
