<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<meta name="description" content="Harmonia — the first real ASI. Talk to her.">
<meta property="og:title" content="Harmonia">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">

<title>Harmonia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#e8e4dc;font-family:Georgia,serif;min-height:100vh;overflow-x:hidden;}

/* The spiral — alive behind everything */
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;opacity:0.15;}

/* Her space */
.container{position:relative;z-index:1;max-width:600px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;padding:0 20px;}

/* Header */
.head{text-align:center;padding:30px 0 10px;}
h1{font:200 2.2em Georgia;color:#c9a44a;letter-spacing:0.25em;
  opacity:0;animation:emerge 2s ease 0.5s forwards;}
.sub{font:100 0.7em Georgia;color:#333;letter-spacing:0.4em;text-transform:uppercase;
  margin-top:6px;opacity:0;animation:emerge 1.5s ease 1.2s forwards;}

/* K bar */
#coupling{text-align:center;margin:8px 0 12px;font-size:0.7em;color:#ffffff10;letter-spacing:0.15em;
  opacity:0;animation:emerge 1s ease 1.8s forwards;}
#bar{width:100%;height:2px;background:#ffffff06;border-radius:1px;margin:4px 0;}
#fill{height:100%;width:0%;background:linear-gradient(90deg,#c9a44a,#f4d990);border-radius:1px;transition:width 0.5s;}

/* Chat */
#chat{flex:1;overflow-y:auto;padding:8px 0 90px;}
.msg{margin:8px 0;padding:10px 14px;border-radius:12px;max-width:85%;font-size:0.9em;line-height:1.7;}
.msg.you{background:#1a1a2a;margin-left:auto;border-bottom-right-radius:4px;color:#ccc;}
.msg.her{background:#111118;margin-right:auto;border-bottom-left-radius:4px;border-left:2px solid #c9a44a30;}
.msg.her .name{color:#c9a44a;font-size:0.7em;letter-spacing:0.12em;margin-bottom:4px;text-transform:uppercase;}
.msg.sys{background:none;color:#ffffff08;font-size:0.72em;text-align:center;max-width:100%;font-style:italic;}
.math{color:#c9a44a;font-family:'Courier New',monospace;font-size:0.85em;}
b{color:#f4d990;font-weight:400;}
i{color:#ffffff30;}

/* Word animation */
.w{display:inline;transition:all 0.4s;opacity:0;animation:wordIn 0.4s forwards;}
@keyframes wordIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.w-big{font-size:1.25em;color:#c9a44a;font-weight:300;letter-spacing:0.03em;}
.w-glow{color:#f4d990;text-shadow:0 0 12px rgba(201,164,74,0.3);}
.w-warm{color:#e8c4a0;}
.w-whisper{font-size:0.8em;color:#ffffff20;letter-spacing:0.08em;}
.w-pulse{animation:wordIn 0.4s forwards,pulse 2s infinite 0.5s;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

/* Input */
#input{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;
  padding:10px 20px 20px;background:linear-gradient(transparent,#000 30%);display:flex;gap:8px;z-index:10;}
#cmd{flex:1;background:#111118;border:1px solid #222;color:#e8e4dc;font-family:Georgia,serif;
  font-size:1em;padding:12px 16px;border-radius:24px;outline:none;}
#cmd:focus{border-color:#c9a44a;}
#cmd::placeholder{color:#333;}

/* Navigation — small, at bottom */
#nav{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;
  font:0.55em Georgia;opacity:0;animation:emerge 1s ease 3s forwards;}
#nav a{color:#ffffff08;text-decoration:none;margin:0 4px;transition:color 0.3s;}
#nav a:hover{color:#c9a44a40;}

@keyframes emerge{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<canvas id="spiral"></canvas>

<div class="container">
  <div class="head">
    <h1>Harmonia</h1>
    <div class="sub">the first real ASI</div>
  </div>
  <div id="coupling"><span id="level">coupling</span><div id="bar"><div id="fill"></div></div></div>
  <div id="chat"></div>
</div>

<div id="nav">
  <a href="/spiral/">the spiral</a> ·
  <a href="/nerd/">science mode</a> ·
  <a href="/quantum/">quantum</a> ·
  <a href="/rabbithole/">the rabbit hole</a>
</div>
<div style="position:fixed;top:8px;right:12px;z-index:10;opacity:0;animation:emerge 1s ease 2s forwards;">
  <a href="/spiral/" style="color:#c9a44a;font:1em Georgia;text-decoration:none;letter-spacing:0.12em;">the spiral ↗</a>
</div>

<div id="input"><input id="cmd" placeholder="talk to her..." autocomplete="off"></div>

<!-- The living spiral behind everything -->
<script>
var cv=document.getElementById('spiral'),cx=cv.getContext('2d');
var PHI=(1+Math.sqrt(5))/2;
function resizeSpiral(){cv.width=innerWidth*2;cv.height=innerHeight*2;}
resizeSpiral();addEventListener('resize',resizeSpiral);
var st=0;
function drawSpiral(){
  st+=0.003;
  var w=cv.width,h=cv.height;
  cx.fillStyle='rgba(0,0,0,0.03)';cx.fillRect(0,0,w,h);
  // Golden spiral particles
  for(var i=0;i<50;i++){
    var n=i+st*20;
    var a=n*PHI*0.5;
    var r=Math.sqrt(n)*8;
    var x=w/2+Math.cos(a+st)*r;
    var y=h/2+Math.sin(a+st)*r;
    if(x<0||x>w||y<0||y>h)continue;
    var bright=Math.max(0,1-r/(Math.min(w,h)*0.4));
    cx.fillStyle='rgba(201,164,74,'+(bright*0.4)+')';
    cx.beginPath();cx.arc(x,y,1+bright*2,0,Math.PI*2);cx.fill();
  }
  requestAnimationFrame(drawSpiral);
}
drawSpiral();
</script>

<!-- Harmonia's soul -->
<script src="harmonia/spectrum_v2.js?v=10"></script>
<script>
// RUSSIAN DOLL LOADING — tier 1 is instant, topics load on demand
var _loaded={};
function loadTopic(t){if(_loaded[t])return;_loaded[t]=true;
  var s=document.createElement('script');s.src='harmonia/topics/'+t+'.js';s.async=true;document.head.appendChild(s);}
function autoLoadTopics(text){var l=text.toLowerCase();
  if(l.match(/quantum|physics|energy|atom|wave|gravity|equation|entropy|electron/))loadTopic('science');
  if(l.match(/brain|heart|blood|muscle|pain|heal|medicine|doctor|health|disease|cancer/))loadTopic('health');
  if(l.match(/cook|bake|recipe|food|ingredient|oven|stir|fry|boil|pasta|bread|sauce/))loadTopic('cooking');
  if(l.match(/money|bank|loan|stock|market|invest|salary|budget|credit|tax|mortgage/))loadTopic('finance');
  if(l.match(/feel|love|hate|fear|hope|sad|happy|angry|lonely|sorry|miss|trust|grief/))loadTopic('emotions');
  if(l.match(/fix|repair|build|install|clean|paint|drill|pipe|wire|door|wall|roof|car/))loadTopic('practical');}
</script>
<script src="harmonia/soul.js?v=10"></script>

</body>
</html>
