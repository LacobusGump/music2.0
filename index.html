<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas#C{display:block;width:100vw;height:100vh;}
#hitboxes{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
#hitboxes a{pointer-events:auto;position:absolute;display:block;left:0;width:100%;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="fps" style="position:fixed;top:8px;right:8px;color:#ffffff06;font:9px monospace;z-index:20;pointer-events:none;"></div>
<div id="hitboxes"></div>
<div id="textlayer" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;display:flex;flex-direction:column;align-items:center;"></div>
<script>
var cv=document.getElementById('C');
var gl=cv.getContext('webgl',{antialias:false,alpha:false});
if(!gl){document.body.innerHTML='<p style="color:#c9a44a;padding:40px;">WebGL required</p>';throw 0;}
var DPR=devicePixelRatio||1,w,h;
function resize(){w=innerWidth;h=innerHeight;cv.width=w*DPR;cv.height=h*DPR;cv.style.width=w+'px';cv.style.height=h+'px';gl.viewport(0,0,cv.width,cv.height);}
resize();addEventListener('resize',resize);

var PAGES=[
  {name:'research',  url:'/r/',         c:[201,164,74]},
  {name:'one',       url:'/one/',       c:[140,184,122]},
  {name:'flex',      url:'/flex/',      c:[184,104,160]},
  {name:'bloom',     url:'/bloom/',     c:[92,184,136]},
  {name:'resonance', url:'/resonance/', c:[200,104,88]},
  {name:'oracle',    url:'/oracle/',    c:[168,160,104]},
];

// Shaders
var vsrc=`
attribute vec3 aPos;
attribute vec3 aCol;
uniform vec2 uRes;
varying vec3 vCol;
varying float vAlpha;
void main(){
  // aPos is in PIXELS (screen space). Convert to clip space [-1,1].
  // Z gives subtle parallax only — no rotation.
  float parallax=1.0+aPos.z*0.0003; // very subtle depth shift
  float sx=(aPos.x/uRes.x-1.0)*parallax;
  float sy=-(aPos.y/uRes.y-1.0)*parallax;
  gl_Position=vec4(sx,sy,0.0,1.0);
  gl_PointSize=clamp(1.5+aPos.z*0.01,0.5,4.0);
  vCol=aCol;
  vAlpha=0.4;
}`;
var fsrc=`
precision mediump float;
varying vec3 vCol;
varying float vAlpha;
void main(){gl_FragColor=vec4(vCol,vAlpha);}`;

function compile(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
var prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,vsrc));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,fsrc));
gl.linkProgram(prog);gl.useProgram(prog);
var aPos=gl.getAttribLocation(prog,'aPos');
var aCol=gl.getAttribLocation(prog,'aCol');
var uRes=gl.getUniformLocation(prog,'uRes');
gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
gl.clearColor(0,0,0,1);

// Particles
var NP=12000;
var posArr=new Float32Array(NP*3);
var colArr=new Float32Array(NP*3);
var homeX=new Float32Array(NP),homeY=new Float32Array(NP),homeZ=new Float32Array(NP);
var curX=new Float32Array(NP),curY=new Float32Array(NP),curZ=new Float32Array(NP);
var velX=new Float32Array(NP),velY=new Float32Array(NP),velZ=new Float32Array(NP);
var assigned=new Uint8Array(NP);
var posBuf=gl.createBuffer(),colBuf=gl.createBuffer();

var t=0,phase=0,holdTimer=0;

// Sample text and assign 3D positions
function sampleAndBuild(){
  var oc=document.createElement('canvas');oc.width=w;oc.height=h;
  var ox=oc.getContext('2d');
  ox.fillStyle='#000';ox.fillRect(0,0,w,h);
  ox.textAlign='center';ox.fillStyle='#fff';

  // Draw text with manual letter spacing (letterSpacing not supported everywhere)
  function drawSpaced(ctx,text,cx2,cy,size,spacing){
    ctx.font='100 '+size+'px Georgia';
    ctx.textAlign='left'; // we position manually
    var totalW=0;
    for(var i=0;i<text.length;i++)totalW+=ctx.measureText(text[i]).width+spacing;
    totalW-=spacing;
    var x=cx2-totalW/2;
    for(var i=0;i<text.length;i++){
      ctx.fillText(text[i],x,cy);
      x+=ctx.measureText(text[i]).width+spacing;
    }
    ctx.textAlign='center'; // restore
  }

  var ts=Math.min(w*0.15,60);
  drawSpaced(ox,'GUMP',w/2,h*0.12+ts*0.35,ts,ts*0.3);

  var fs=Math.min(w*0.06,24);
  var startY=h*0.28;
  var gap=(h*0.62)/PAGES.length;
  for(var i=0;i<PAGES.length;i++) drawSpaced(ox,PAGES[i].name,w/2,startY+i*gap,fs,fs*0.3);

  // Readable text layer underneath particles
  var tl=document.getElementById('textlayer');tl.innerHTML='';
  var gumpEl=document.createElement('div');
  gumpEl.style.cssText='position:absolute;top:'+(h*0.12-ts*0.2)+'px;width:100%;text-align:center;font:100 '+(ts*0.85)+'px Georgia;letter-spacing:0.25em;color:rgba(160,150,130,0.06);';
  gumpEl.textContent='GUMP';tl.appendChild(gumpEl);
  for(var i=0;i<PAGES.length;i++){
    var el=document.createElement('div');
    var c=PAGES[i].c;
    el.style.cssText='position:absolute;top:'+(startY+i*gap-fs*0.4)+'px;width:100%;text-align:center;font:100 '+(fs*0.85)+'px Georgia;letter-spacing:0.25em;color:rgba('+c[0]+','+c[1]+','+c[2]+',0.06);text-transform:lowercase;';
    el.textContent=PAGES[i].name;tl.appendChild(el);
  }

  // Hitboxes
  var hb=document.getElementById('hitboxes');hb.innerHTML='';
  for(var i=0;i<PAGES.length;i++){
    var a=document.createElement('a');a.href=PAGES[i].url;
    a.style.top=(startY+i*gap-fs)+'px';a.style.height=(fs*2)+'px';
    hb.appendChild(a);
  }

  var img=ox.getImageData(0,0,w,h).data;
  var targets=[];
  var totalWhite=0;
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      if(img[(y*w+x)*4]>100){totalWhite++;if(Math.random()>0.3)continue;
        var ci=-1;
        if(y<h*0.17)ci=-1;
        else{for(var j=0;j<PAGES.length;j++){if(Math.abs(y-(startY+j*gap))<fs)ci=j;}}
        targets.push({x:x,y:y,ci:ci});
      }
    }
  }

  // Assign particles
  for(var i=0;i<NP;i++){
    // Start scattered across the screen + beyond edges
    var angle=Math.random()*Math.PI*2;
    var dist=Math.random()*Math.max(w,h)*0.6;
    curX[i]=w/2+Math.cos(angle)*dist;
    curY[i]=h/2+Math.sin(angle)*dist;
    curZ[i]=(Math.random()-0.5)*30;
    velX[i]=velY[i]=velZ[i]=0;

    if(i<targets.length){
      var tt=targets[i];
      homeX[i]=tt.x;homeY[i]=tt.y;
      assigned[i]=1;

      // 3D depth: each letter gets orbital Z based on its shape
      // Distance from letter center → depth (rounded letters)
      // Plus: each particle orbits slightly in Z
      var letterCenterX=w/2; // approximate
      var dx=tt.x-letterCenterX;
      homeZ[i]=Math.sin(dx*0.05)*15+Math.sin(tt.y*0.03)*10;

      if(tt.ci>=0){
        var c=PAGES[tt.ci].c;
        colArr[i*3]=c[0]/255;colArr[i*3+1]=c[1]/255;colArr[i*3+2]=c[2]/255;
      } else {
        colArr[i*3]=0.79;colArr[i*3+1]=0.64;colArr[i*3+2]=0.29;
      }
    } else {
      // Ether particle
      homeX[i]=Math.random()*w;homeY[i]=Math.random()*h;homeZ[i]=(Math.random()-0.5)*80;
      assigned[i]=0;
      colArr[i*3]=0.06;colArr[i*3+1]=0.05;colArr[i*3+2]=0.04;
    }
  }

  gl.bindBuffer(gl.ARRAY_BUFFER,colBuf);
  gl.bufferData(gl.ARRAY_BUFFER,colArr,gl.STATIC_DRAW);
}
// Delay build until layout is stable
setTimeout(sampleAndBuild,100);

function render(){
  t+=0.016;

  // Phase: assemble → hold → consume
  if(phase===0){
    var arrived=0;
    for(var i=0;i<NP;i++){
      if(assigned[i]&&Math.abs(curX[i]-homeX[i])<4&&Math.abs(curY[i]-homeY[i])<4)arrived++;
    }
    if(arrived>NP*0.3)phase=1; // most text particles arrived
  } else if(phase===1){
    holdTimer+=0.016;
    if(holdTimer>20){phase=2;} // 20 seconds → consume
  } else if(phase===2){
    // All flow to GUMP center
    holdTimer+=0.016;
    if(holdTimer>25)window.location.href='/r/';
  }

  // Physics
  for(var i=0;i<NP;i++){
    var tx,ty,tz;
    if(phase===2){
      tx=w/2;ty=h*0.1;tz=0;
    } else {
      tx=homeX[i];ty=homeY[i];tz=homeZ[i];
    }

    // Spring — slower, more organic
    var k=assigned[i]?0.02:0.002;
    if(phase===2)k=0.008;
    velX[i]+=(tx-curX[i])*k;
    velY[i]+=(ty-curY[i])*k;
    velZ[i]+=(tz-curZ[i])*k;

    // Orbital wobble when settled
    if(phase>=1&&assigned[i]){
      velX[i]+=Math.sin(t*1.5+i*0.07)*0.02;
      velY[i]+=Math.cos(t*1.2+i*0.09)*0.02;
      velZ[i]+=Math.sin(t*0.8+i*0.13)*0.05;
    }

    velX[i]*=0.95;velY[i]*=0.95;velZ[i]*=0.95;
    curX[i]+=velX[i];curY[i]+=velY[i];curZ[i]+=velZ[i];

    // Ether respawn
    if(!assigned[i]&&(curX[i]<-50||curX[i]>w+50||curY[i]<-50||curY[i]>h+50)){
      var edge=Math.random()*4;
      if(edge<1){curX[i]=Math.random()*w;curY[i]=-20;}
      else if(edge<2){curX[i]=w+20;curY[i]=Math.random()*h;}
      else if(edge<3){curX[i]=Math.random()*w;curY[i]=h+20;}
      else{curX[i]=-20;curY[i]=Math.random()*h;}
      velX[i]=velY[i]=velZ[i]=0;
    }

    posArr[i*3]=curX[i];posArr[i*3+1]=curY[i];posArr[i*3+2]=curZ[i];
  }

  // Render
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.uniform2f(uRes,w/2,h/2);

  gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
  gl.bufferData(gl.ARRAY_BUFFER,posArr,gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);

  gl.bindBuffer(gl.ARRAY_BUFFER,colBuf);
  gl.enableVertexAttribArray(aCol);
  gl.vertexAttribPointer(aCol,3,gl.FLOAT,false,0,0);

  gl.drawArrays(gl.POINTS,0,NP);

  // FPS
  var now=performance.now();
  if(!render.lastT)render.lastT=now;
  if(!render.fc)render.fc=0;
  render.fc++;
  if(render.fc%15===0){
    var fps=Math.round(1000/(now-render.lastT));
    document.getElementById('fps').textContent=NP.toLocaleString()+' · '+fps+'fps';
  }
  render.lastT=now;

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
