<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GUMP - The Instrument</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ═══════════════════════════════════════════════════════════════════
           LOADING SCREEN
           ═══════════════════════════════════════════════════════════════════ */

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading h1 {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 12px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading .status {
            margin-top: 30px;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.15);
        }

        /* ═══════════════════════════════════════════════════════════════════
           ENTRY SCREEN
           ═══════════════════════════════════════════════════════════════════ */

        #entry {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 100;
            cursor: pointer;
            transition: opacity 0.8s ease;
        }

        #entry.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #entry h1 {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 10px;
            color: rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        #entry .circle {
            width: 100px;
            height: 100px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            transition: all 0.6s ease;
            position: relative;
        }

        #entry .circle::before {
            content: '';
            position: absolute;
            inset: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
        }

        #entry:hover .circle {
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #entry p {
            margin-top: 50px;
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.12);
            text-align: center;
            line-height: 2;
            max-width: 300px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           MAIN CANVAS
           ═══════════════════════════════════════════════════════════════════ */

        #world {
            position: fixed;
            inset: 0;
            display: none;
            background: #000;
        }

        #world.visible {
            display: block;
        }

        #c {
            position: fixed;
            inset: 0;
        }

        /* ═══════════════════════════════════════════════════════════════════
           NOTIFICATION
           ═══════════════════════════════════════════════════════════════════ */

        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 10px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 200;
        }

        #notification.visible {
            opacity: 1;
        }

        /* ═══════════════════════════════════════════════════════════════════
           DEBUG PANEL
           ═══════════════════════════════════════════════════════════════════ */

        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            display: none;
            z-index: 300;
        }

        #debug.visible {
            display: block;
        }

        /* ═══════════════════════════════════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════════════════════════════════ */

        @media (max-width: 600px) {
            #entry h1 {
                font-size: 10px;
                letter-spacing: 6px;
            }

            #entry p {
                font-size: 8px;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Version indicator (single, always visible) -->
    <div id="version" style="position:fixed;bottom:10px;left:10px;color:#0f0;font-size:14px;font-family:monospace;z-index:9999;">v38</div>

    <!-- Loading Screen -->
    <div id="loading">
        <h1>Loading</h1>
        <div class="spinner"></div>
        <div class="status">Initializing audio engine...</div>
    </div>

    <!-- Entry Screen -->
    <div id="entry" class="hidden">
        <h1>The Instrument</h1>
        <div class="circle"></div>
        <p>
            tilt to shape the sound<br>
            touch to play<br>
            move to feel
        </p>
    </div>

    <!-- Main Canvas -->
    <div id="world">
        <canvas id="c"></canvas>
    </div>

    <!-- Notification -->
    <div id="notification"></div>

    <!-- Debug Panel -->
    <div id="debug"></div>


    <!-- Load Core Modules (kept) -->
    <script src="js/core/events.js?v=38"></script>
    <script src="js/core/motion.js?v=38"></script>
    <script src="js/core/memory.js?v=38"></script>
    <script src="js/core/context.js?v=38"></script>

    <!-- Load Audio Engine -->
    <script src="js/audio/engine.js?v=38"></script>

    <!-- Load Visual Modules (kept) -->
    <script src="js/visuals/organism.js?v=38"></script>

    <!-- Load Journey System -->
    <script src="js/journey/conductor.js?v=38"></script>
    <script src="js/journey/musical-dna.js?v=38"></script>
    <script src="js/journey/lens.js?v=38"></script>

    <!-- Load Main Application -->
    <script src="js/main.js?v=38"></script>

    <!-- Application Bootstrap -->
    <script>
        (function() {
            'use strict';

            // ═══════════════════════════════════════════════════════════════
            // DOM ELEMENTS
            // ═══════════════════════════════════════════════════════════════

            const loadingScreen = document.getElementById('loading');
            const loadingStatus = loadingScreen.querySelector('.status');
            const entryScreen = document.getElementById('entry');
            const worldContainer = document.getElementById('world');

            const notification = document.getElementById('notification');
            const debugPanel = document.getElementById('debug');

            // ═══════════════════════════════════════════════════════════════
            // INITIALIZATION
            // ═══════════════════════════════════════════════════════════════

            let isStarted = false;

            async function bootstrap() {
                try {
                    updateLoadingStatus('Loading modules...');
                    await sleep(200);

                    updateLoadingStatus('Ready');
                    await sleep(300);

                    // Show entry screen
                    loadingScreen.classList.add('hidden');
                    entryScreen.classList.remove('hidden');

                } catch (error) {
                    console.error('Bootstrap error:', error);
                    updateLoadingStatus('Error: ' + error.message);
                }
            }

            function updateLoadingStatus(text) {
                loadingStatus.textContent = text;
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            // ═══════════════════════════════════════════════════════════════
            // START APPLICATION
            // ═══════════════════════════════════════════════════════════════

            async function startApplication() {
                if (isStarted) return;
                isStarted = true;

                // ── PERMISSIONS FIRST (G7 pattern) ──
                // Must happen in the tap handler BEFORE anything else
                try {
                    if (typeof DeviceMotionEvent !== 'undefined' &&
                        typeof DeviceMotionEvent.requestPermission === 'function') {
                        const mp = await DeviceMotionEvent.requestPermission();
                        if (mp === 'granted') {
                            window._motionGranted = true;
                            console.log('[Bootstrap] Motion permission granted');
                        }
                    } else {
                        window._motionGranted = true; // Android/desktop — no permission needed
                    }
                } catch (e) {
                    console.log('[Bootstrap] Motion permission denied:', e.message);
                }

                try {
                    if (typeof DeviceOrientationEvent !== 'undefined' &&
                        typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const op = await DeviceOrientationEvent.requestPermission();
                        if (op === 'granted') {
                            window._orientationGranted = true;
                            console.log('[Bootstrap] Orientation permission granted');
                        }
                    } else {
                        window._orientationGranted = true;
                    }
                } catch (e) {
                    console.log('[Bootstrap] Orientation permission denied:', e.message);
                }

                // ── AUDIO CONTEXT ──
                try {
                    const iosAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = iosAudioCtx.createOscillator();
                    const gain = iosAudioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(iosAudioCtx.destination);
                    gain.gain.value = 0.001;
                    osc.start();
                    osc.stop(iosAudioCtx.currentTime + 0.1);
                    window._iosAudioContext = iosAudioCtx;
                } catch (e) {
                    console.log('iOS audio unlock:', e.message);
                }

                // Hide entry, show world
                entryScreen.classList.add('hidden');
                worldContainer.classList.add('visible');

                try {
                    await GUMP.start();
                    setupUIUpdates();
                    showNotification('Play');
                } catch (error) {
                    console.error('Failed to start:', error);
                    showNotification('Error: ' + error.message);
                }
            }

            // ═══════════════════════════════════════════════════════════════
            // UI UPDATES
            // ═══════════════════════════════════════════════════════════════

            function setupUIUpdates() {
                // Debug toggle (press 'D')
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'd' || e.key === 'D') {
                        GUMP.toggleDebug();
                        debugPanel.classList.toggle('visible');
                    }
                });
            }

            // ═══════════════════════════════════════════════════════════════
            // NOTIFICATIONS
            // ═══════════════════════════════════════════════════════════════

            let notificationTimeout = null;

            function showNotification(text, duration = 2000) {
                notification.textContent = text;
                notification.classList.add('visible');

                if (notificationTimeout) {
                    clearTimeout(notificationTimeout);
                }

                notificationTimeout = setTimeout(() => {
                    notification.classList.remove('visible');
                }, duration);
            }

            // ═══════════════════════════════════════════════════════════════
            // EVENT LISTENERS
            // ═══════════════════════════════════════════════════════════════

            // Start on entry click
            entryScreen.addEventListener('click', startApplication);
            entryScreen.addEventListener('touchstart', (e) => {
                e.preventDefault();
                startApplication();
            }, { passive: false });

            // Prevent context menu
            document.addEventListener('contextmenu', (e) => e.preventDefault());

            // Handle visibility change
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (GUMP.isRunning) {
                        GUMP.pause();
                    }
                } else {
                    if (GUMP.isRunning && GUMP.isPaused) {
                        GUMP.resume();
                    }
                }
            });

            // ═══════════════════════════════════════════════════════════════
            // BOOTSTRAP
            // ═══════════════════════════════════════════════════════════════

            // Start when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bootstrap);
            } else {
                bootstrap();
            }

        })();
    </script>
</body>
</html>
