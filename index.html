<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#hitboxes{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
#hitboxes a{pointer-events:auto;position:absolute;display:block;left:0;width:100%;}
#fps{position:fixed;top:8px;right:8px;color:#ffffff06;font:9px monospace;z-index:20;pointer-events:none;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="hitboxes"></div>
<div id="fps"></div>
<script>
// ═══════════════════════════════════════════════════════════
// HOME — fluid dynamics. Particles flow everywhere.
// Letters are ABSENCE — particles orbit around letter shapes,
// lighting them up by proximity. The text is the interference.
// ═══════════════════════════════════════════════════════════

var cv=document.getElementById('C'),cx=cv.getContext('2d');
var DPR=devicePixelRatio||1,w,h;
function resize(){w=innerWidth;h=innerHeight;cv.width=w*DPR;cv.height=h*DPR;cx.setTransform(DPR,0,0,DPR,0,0);buildMask();}
resize();addEventListener('resize',resize);

var PAGES=[
  {name:'RESEARCH',  url:'/r/',         c:[201,164,74]},
  {name:'ONE',       url:'/one/',       c:[140,184,122]},
  {name:'FLEX',      url:'/flex/',      c:[184,104,160]},
  {name:'BLOOM',     url:'/bloom/',     c:[92,184,136]},
  {name:'RESONANCE', url:'/resonance/', c:[200,104,88]},
  {name:'ORACLE',    url:'/oracle/',    c:[168,160,104]},
];

var t=0,frame=0,lastT=performance.now();

// ═══ TEXT MASK: where the letters ARE ═══
// We build a low-res mask of which pixels are "inside" a letter.
// Particles that touch a letter pixel glow bright in that letter's color.
var MASK_SCALE=2; // 1 mask pixel = 2 screen pixels
var mask=null; // Uint8Array: 0=empty, 1-7=which word (1=GUMP, 2-7=pages)
var maskW=0,maskH=0;
var wordColors=[[201,164,74]]; // index 0 unused, 1=GUMP
for(var i=0;i<PAGES.length;i++)wordColors.push(PAGES[i].c);

function buildMask(){
  maskW=Math.ceil(w/MASK_SCALE);
  maskH=Math.ceil(h/MASK_SCALE);
  mask=new Uint8Array(maskW*maskH);

  var oc=document.createElement('canvas');
  oc.width=w;oc.height=h;
  var ox=oc.getContext('2d');
  ox.fillStyle='#000';ox.fillRect(0,0,w,h);
  ox.textAlign='center';ox.textBaseline='middle';

  // Draw ALL text WHITE — identify by Y position, not color
  var ts=Math.min(w*0.18,70);
  ox.font='bold '+ts+'px Georgia';
  ox.fillStyle='#fff';
  ox.fillText('GUMP',w/2,h*0.1);

  var fs=Math.min(w*0.065,28);
  var startY=h*0.26;
  var gap=(h*0.64)/PAGES.length;
  ox.font='bold '+fs+'px Georgia';
  for(var i=0;i<PAGES.length;i++){
    ox.fillText(PAGES[i].name,w/2,startY+i*gap);
  }

  // Word Y regions for identification
  var wordYs=[{y:h*0.1,h:ts,ci:1}]; // GUMP = 1
  for(var i=0;i<PAGES.length;i++){
    wordYs.push({y:startY+i*gap,h:fs,ci:i+2}); // pages = 2-7
  }

  // Read into mask — white pixels > 128 = on letter
  var img=ox.getImageData(0,0,w,h).data;
  for(var my=0;my<maskH;my++){
    for(var mx=0;mx<maskW;mx++){
      var sx=mx*MASK_SCALE,sy=my*MASK_SCALE;
      var idx=(sy*w+sx)*4;
      if(img[idx]>128){
        // Which word by Y
        var ci=0;
        for(var j=0;j<wordYs.length;j++){
          if(Math.abs(sy-wordYs[j].y)<wordYs[j].h)ci=wordYs[j].ci;
        }
        mask[my*maskW+mx]=ci||1;
      }
    }
  }

  // Hitboxes
  var hb=document.getElementById('hitboxes');hb.innerHTML='';
  for(var i=0;i<PAGES.length;i++){
    var a=document.createElement('a');a.href=PAGES[i].url;
    a.style.top=(startY+i*gap-fs)+'px';a.style.height=(fs*2)+'px';
    hb.appendChild(a);
  }
}
buildMask();

// ═══ FLUID PARTICLES — 20K flowing across the screen ═══
var NP=20000;
var px=new Float32Array(NP),py=new Float32Array(NP);
var pvx=new Float32Array(NP),pvy=new Float32Array(NP);

for(var i=0;i<NP;i++){
  px[i]=Math.random()*w;
  py[i]=Math.random()*h;
  pvx[i]=(Math.random()-0.5)*1;
  pvy[i]=(Math.random()-0.5)*0.5;
}

// ═══ RENDER ═══
function render(){
  t+=0.016;frame++;

  // Fade — creates trails
  cx.fillStyle='rgba(0,0,0,0.08)';
  cx.fillRect(0,0,w,h);

  cx.globalCompositeOperation='lighter';

  // Fluid: global flow field + letter boundary forces
  var flowAngle=t*0.15;
  var flowX=Math.cos(flowAngle)*0.4;
  var flowY=Math.sin(flowAngle*0.7)*0.3;

  for(var i=0;i<NP;i++){
    // Global flow
    pvx[i]+=flowX*0.01+Math.sin(t*0.3+py[i]*0.005)*0.015;
    pvy[i]+=flowY*0.01+Math.cos(t*0.25+px[i]*0.005)*0.015;

    // Check mask: is this particle near a letter?
    var mx=Math.floor(px[i]/MASK_SCALE);
    var my=Math.floor(py[i]/MASK_SCALE);
    var onLetter=0;
    if(mx>=0&&mx<maskW&&my>=0&&my<maskH){
      onLetter=mask[my*maskW+mx];
    }

    if(onLetter>0){
      // ON a letter: slow down + glow bright in word color
      pvx[i]*=0.8;pvy[i]*=0.8; // friction on letters — particles linger
      var c=wordColors[onLetter]||[150,140,120];
      cx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.3)';
      cx.fillRect(px[i]-0.5,py[i]-0.5,1.5,1.5);
    } else {
      // In the void: dim, flowing
      cx.fillStyle='rgba(50,45,35,0.04)';
      cx.fillRect(px[i],py[i],1,1);
    }

    // Damping
    pvx[i]*=0.96;pvy[i]*=0.96;
    px[i]+=pvx[i];py[i]+=pvy[i];

    // Wrap
    if(px[i]<-10)px[i]=w+10;if(px[i]>w+10)px[i]=-10;
    if(py[i]<-10)py[i]=h+10;if(py[i]>h+10)py[i]=-10;
  }

  cx.globalCompositeOperation='source-over';

  // FPS
  var now=performance.now();
  if(frame%15===0){
    var fps=Math.round(1000/(now-lastT));
    document.getElementById('fps').textContent=NP.toLocaleString()+' · '+fps+'fps';
  }
  lastT=now;

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
