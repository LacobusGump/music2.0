<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<meta property="og:title" content="GUMP — The Machine">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;}
#links{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}
#links a{pointer-events:auto;position:absolute;text-decoration:none;
  font:100 0.85em Georgia;letter-spacing:0.3em;text-transform:uppercase;
  opacity:0;transition:opacity 0.3s;}
#links a:active{opacity:0.3!important;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="links"></div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var DPR=devicePixelRatio||1,w,h;
function resize(){w=innerWidth;h=innerHeight;cv.width=w*DPR;cv.height=h*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

var PAGES=[
  {name:'RESEARCH',  url:'/r/',         color:'#c9a44a'},
  {name:'ONE',       url:'/one/',       color:'#8cb87a'},
  {name:'FLEX',      url:'/flex/',      color:'#b868a0'},
  {name:'BLOOM',     url:'/bloom/',     color:'#5cb888'},
  {name:'RESONANCE', url:'/resonance/', color:'#c86858'},
  {name:'ORACLE',    url:'/oracle/',    color:'#a8a068'},
];

var t=0;
var NP=8000; // particles
var px=new Float32Array(NP),py=new Float32Array(NP);
var pvx=new Float32Array(NP),pvy=new Float32Array(NP);
var ptx=new Float32Array(NP),pty=new Float32Array(NP); // targets
var pr=new Uint8Array(NP),pg=new Uint8Array(NP),pb=new Uint8Array(NP);
var pstate=new Uint8Array(NP); // 0=flying in, 1=in letter, 2=flowing to GUMP

// Text sampling: render text offscreen, sample positions
var textTargets=[]; // [{x,y,colorIdx}] for each letter position

function sampleText(){
  var offCv=document.createElement('canvas');
  offCv.width=w;offCv.height=h;
  var oc=offCv.getContext('2d');
  oc.fillStyle='#000';oc.fillRect(0,0,w,h);

  // Layout: GUMP at top, 6 words spread vertically below
  var items=[];

  // GUMP title
  var titleSize=Math.min(w*0.12,60);
  oc.font='100 '+titleSize+'px Georgia';oc.textAlign='center';
  oc.fillStyle='#fff';
  oc.fillText('GUMP',w/2,h*0.12);
  items.push({y:h*0.12-titleSize,h:titleSize*1.2,label:'GUMP',colorIdx:-1});

  // Page names
  var startY=h*0.25;
  var spacing=(h*0.7)/(PAGES.length);
  var fontSize=Math.min(w*0.06,28);
  oc.font='100 '+fontSize+'px Georgia';
  oc.letterSpacing='0.3em';

  for(var i=0;i<PAGES.length;i++){
    var y=startY+i*spacing;
    oc.fillStyle='#fff';
    oc.fillText(PAGES[i].name,w/2,y);
    items.push({y:y-fontSize,h:fontSize*1.5,label:PAGES[i].name,colorIdx:i,cy:y});
  }

  // Sample white pixels
  var imgData=oc.getImageData(0,0,w,h);
  var data=imgData.data;
  textTargets=[];

  for(var y=0;y<h;y+=2){
    for(var x=0;x<w;x+=2){
      var idx=(y*w+x)*4;
      if(data[idx]>128){
        // Which word does this pixel belong to?
        var ci=-1;
        if(y<h*0.17)ci=-1; // GUMP
        else{
          for(var j=0;j<PAGES.length;j++){
            var wy=startY+j*spacing;
            if(Math.abs(y-wy)<fontSize)ci=j;
          }
        }
        textTargets.push({x:x,y:y,ci:ci});
      }
    }
  }

  // Create clickable link elements positioned over each word
  var linksDiv=document.getElementById('links');
  linksDiv.innerHTML='';
  for(var i=0;i<PAGES.length;i++){
    var a=document.createElement('a');
    a.href=PAGES[i].url;
    a.style.color=PAGES[i].color;
    a.style.left='0';a.style.width='100%';
    a.style.top=(startY+i*spacing-fontSize*0.8)+'px';
    a.style.height=(fontSize*1.6)+'px';
    a.style.textAlign='center';
    a.style.lineHeight=(fontSize*1.6)+'px';
    a.textContent=''; // invisible — particles form the letters
    linksDiv.appendChild(a);
  }

  return {startY:startY,spacing:spacing,fontSize:fontSize};
}

var layout=sampleText();

// Initialize particles: start at random edge positions
function hexColor(hex){
  return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
}
var gumpColor=hexColor('#c9a44a');

for(var i=0;i<NP;i++){
  // Random edge position
  var edge=Math.random()*4;
  if(edge<1){px[i]=Math.random()*w;py[i]=-10;}
  else if(edge<2){px[i]=w+10;py[i]=Math.random()*h;}
  else if(edge<3){px[i]=Math.random()*w;py[i]=h+10;}
  else{px[i]=-10;py[i]=Math.random()*h;}
  pvx[i]=pvy[i]=0;

  // Assign to a text target
  if(i<textTargets.length){
    var tt=textTargets[i%textTargets.length];
    ptx[i]=tt.x;pty[i]=tt.y;
    var ci=tt.ci;
    if(ci>=0&&ci<PAGES.length){
      var c=hexColor(PAGES[ci].color);
      pr[i]=c[0];pg[i]=c[1];pb[i]=c[2];
    } else {
      pr[i]=gumpColor[0];pg[i]=gumpColor[1];pb[i]=gumpColor[2];
    }
  } else {
    // Extra particles: target random position, dim
    ptx[i]=Math.random()*w;pty[i]=Math.random()*h;
    pr[i]=40;pg[i]=35;pb[i]=25;
  }
  pstate[i]=0;
}

// Stagger arrival: particles arrive over 3 seconds
var arrivalTime=new Float32Array(NP);
for(var i=0;i<NP;i++)arrivalTime[i]=Math.random()*2.5;

var allArrived=false;
var flowStarted=false;
var flowT=0;

function render(){
  w=innerWidth;h=innerHeight;t+=0.016;

  cx.fillStyle='rgba(0,0,0,0.12)';
  cx.fillRect(0,0,w,h);

  cx.globalCompositeOperation='lighter';

  var arrived=0;

  for(var i=0;i<NP;i++){
    if(t<arrivalTime[i])continue; // not arrived yet

    var age=t-arrivalTime[i];

    if(pstate[i]===0){
      // Flying toward letter target
      var k=0.03+Math.min(0.05,age*0.01);
      pvx[i]+=(ptx[i]-px[i])*k;
      pvy[i]+=(pty[i]-py[i])*k;
      pvx[i]*=0.85;pvy[i]*=0.85;
      px[i]+=pvx[i];py[i]+=pvy[i];

      // Arrived?
      if(Math.abs(px[i]-ptx[i])<2&&Math.abs(py[i]-pty[i])<2){
        pstate[i]=1;arrived++;
      }
    } else if(pstate[i]===1){
      // In letter — gentle wobble
      px[i]=ptx[i]+Math.sin(t*2+i*0.1)*0.3;
      py[i]=pty[i]+Math.cos(t*1.7+i*0.13)*0.3;
      arrived++;
    } else if(pstate[i]===2){
      // Flowing to GUMP
      var gumpY=h*0.12;
      pvy[i]+=(gumpY-py[i])*0.002;
      pvx[i]+=(w/2-px[i])*0.001;
      pvx[i]*=0.98;pvy[i]*=0.98;
      px[i]+=pvx[i];py[i]+=pvy[i];
    }

    var alpha=Math.min(0.4,age*0.3);
    cx.fillStyle='rgba('+pr[i]+','+pg[i]+','+pb[i]+','+alpha+')';
    cx.fillRect(px[i],py[i],1,1);
  }

  cx.globalCompositeOperation='source-over';

  // Check if all text particles arrived
  if(!allArrived&&arrived>textTargets.length*0.9){
    allArrived=true;
    // Show link hover areas
    var links=document.querySelectorAll('#links a');
    for(var i=0;i<links.length;i++)links[i].style.opacity='0';
  }

  // After sitting for 5 seconds, start flow to GUMP
  if(allArrived&&!flowStarted){
    flowT+=0.016;
    if(flowT>5){
      flowStarted=true;
      // Non-GUMP particles start flowing up
      for(var i=0;i<NP;i++){
        if(i<textTargets.length&&textTargets[i%textTargets.length].ci>=0){
          // Slowly release from letters
          setTimeout((function(idx){return function(){pstate[idx]=2;};})(i),Math.random()*8000);
        }
      }
    }
  }

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
