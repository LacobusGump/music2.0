<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#050505">
<!-- Cache-busting: tell iOS Chrome not to serve stale HTML -->
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>GUMP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<!-- Force reload when build changes. iOS WebKit caches index.html aggressively.
     BUILD must match follow.js version. Bump both together on every deploy. -->
<script>
(function(){
  var BUILD = 106;
  window.GUMP_BUILD = BUILD;
  try {
    var stored = parseInt(localStorage.getItem('gump_build') || '0', 10);
    if (stored !== BUILD) {
      localStorage.setItem('gump_build', BUILD);
      if (stored > 0) location.reload(true);
    }
  } catch(e) {}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Golden ratio palette — warm neutrals, not hacker green */
  --phi:1.618;
  --fg:rgba(255,255,255,0.88);
  --fg-dim:rgba(255,255,255,0.35);
  --fg-ghost:rgba(255,255,255,0.14);
  --fg-whisper:rgba(255,255,255,0.07);
  --accent:rgba(255,255,255,0.6);
  --accent-warm:rgba(255,220,180,0.5);
  --surface:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.06);
  --border-active:rgba(255,255,255,0.18);
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#050505;
  color:var(--fg);
  font-family:var(--sans);
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  font-weight:300;
}

/* No scanlines — clean, modern */

/* ── SCREENS ── */
.screen{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1);
  will-change:opacity;
  background:#050505;
}
.screen.active{opacity:1;pointer-events:auto}

/* ── BOOT SCREEN ── */
#screen-listen{z-index:3;display:flex;align-items:center;justify-content:center;}

#boot-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

.boot-touch-hint{
  position:absolute;
  bottom:calc(100% / var(--phi) / var(--phi));
  left:0;right:0;
  text-align:center;
  font-size:13px;
  font-weight:200;
  letter-spacing:0.25em;
  text-transform:lowercase;
  color:var(--fg-dim);
  animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{opacity:0.2;transform:translateY(0)}
  50%{opacity:0.5;transform:translateY(-3px)}
}
/* Pulse for legacy compat */
@keyframes pulse-text{
  0%,100%{opacity:0.25}
  50%{opacity:0.55}
}

/* ── PROTOCOL SELECT SCREEN ── */
#screen-lens{
  z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 24px;
}

.sys-header{
  font-family:var(--sans);
  font-size:10px;
  font-weight:400;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--fg-dim);
  margin-bottom:34px;
  text-align:center;
}
.sys-header em{font-style:normal;color:var(--fg);}

.protocol-list{
  width:100%;max-width:380px;
  display:flex;flex-direction:column;
  gap:2px;
}

.protocol-item{
  display:flex;align-items:flex-start;
  padding:14px 18px;
  border:1px solid var(--border);
  border-radius:2px;
  cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
  -webkit-tap-highlight-color:transparent;
  gap:14px;
}
.protocol-item:active{background:var(--surface);}
.protocol-item.selected{
  border-color:var(--border-active);
  background:var(--surface);
}
.protocol-item.selected .p-cursor{opacity:1;}

.p-cursor{
  font-size:8px;color:var(--fg-dim);opacity:0;
  flex-shrink:0;margin-top:3px;
  transition:opacity 0.15s;
}
.p-num{
  font-family:var(--mono);
  font-size:9px;font-weight:300;
  letter-spacing:0.12em;
  color:var(--fg-ghost);
  flex-shrink:0;margin-top:2px;
}
.p-body{flex:1;}
.p-name{
  font-family:var(--sans);
  font-size:14px;font-weight:400;
  letter-spacing:0.08em;
  color:var(--fg);
  margin-bottom:4px;
}
.p-desc{
  font-size:10px;font-weight:300;
  letter-spacing:0.02em;line-height:1.55;
  color:var(--fg-ghost);
}

/* COMMAND BAR — lens screen */
.cmd-bar{
  margin-top:28px;
  width:100%;max-width:380px;
  display:flex;align-items:center;
  border:1px solid var(--border);
  border-radius:2px;
  padding:12px 16px;
  gap:10px;
}
.cmd-gt{color:var(--fg-ghost);font-size:12px;flex-shrink:0;font-family:var(--mono);}
#cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--fg);
  font-family:var(--mono);
  font-size:12px;font-weight:300;
  letter-spacing:0.06em;
  flex:1;
  caret-color:var(--accent);
  -webkit-appearance:none;
}
#cmd-input::placeholder{color:var(--fg-ghost);}

/* Hidden go button kept for JS compat */
#lens-go{display:none}

/* ── PLAY SCREEN ── */
#screen-play{z-index:1;}
#canvas{position:absolute;inset:0;width:100%;height:100%;}

/* Lens name — top left, whisper weight */
#lens-indicator{
  position:absolute;
  top:max(env(safe-area-inset-top,16px),16px);
  left:18px;
  font-family:var(--sans);
  font-size:11px;
  font-weight:300;
  letter-spacing:0.18em;
  color:var(--fg-dim);
  pointer-events:none;
  opacity:0.7;
  transition:opacity 0.4s;
}

/* Dance button — top right */
#ask-dance-btn{
  position:absolute;
  top:max(env(safe-area-inset-top,16px),16px);
  right:18px;
  font-family:var(--sans);
  font-size:10px;
  font-weight:400;
  letter-spacing:0.22em;
  color:var(--fg-ghost);
  pointer-events:auto;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  padding:8px 0 8px 16px;
  transition:color 0.25s;
  z-index:20;
}
#ask-dance-btn:active{color:var(--fg-dim);}
#ask-dance-btn.connected{
  color:var(--fg-dim);
  animation:breathe 3s ease-in-out infinite;
}

/* COMMAND BAR — play screen */
#play-cmd{
  position:absolute;
  bottom:0;left:0;right:0;
  display:flex;align-items:center;
  padding:10px 18px;
  padding-bottom:max(env(safe-area-inset-bottom,10px),10px);
  border-top:1px solid var(--border);
  background:rgba(5,5,5,0.7);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  gap:10px;
  z-index:20;
}
.play-gt{color:var(--fg-ghost);font-size:11px;flex-shrink:0;font-family:var(--mono);}
#play-cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--fg-dim);
  font-family:var(--mono);
  font-size:11px;font-weight:300;
  letter-spacing:0.05em;
  flex:1;
  caret-color:var(--accent);
  -webkit-appearance:none;
}
#play-cmd-input::placeholder{color:var(--fg-whisper);}
#play-cmd-input:focus{color:var(--fg);}

/* ── VOICE CAPTION — audio only, no text on screen ── */
#voice-caption{ display:none; }

/* ── FLASH OVERLAY ── */
#flash{
  position:fixed;inset:0;
  pointer-events:none;
  opacity:0;
  z-index:800;
  transition:opacity 0.08s;
}

/* ── OUTFIT OVERLAY — Ask to Dance ── */
#outfit-overlay{
  position:fixed;inset:0;
  background:#050505;
  z-index:60;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1);
}
#outfit-overlay.active{opacity:1;pointer-events:auto;}

/* Close — barely there, top right */
#outfit-close{
  position:absolute;
  top:max(env(safe-area-inset-top,20px),20px);right:20px;
  background:none;border:none;outline:none;
  font-size:16px;color:var(--fg-ghost);
  cursor:pointer;padding:12px;
  font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;
  transition:color 0.2s;
  line-height:1;
}
#outfit-close:active{color:var(--fg);}

/* QR phase */
#outfit-qr-view{
  display:flex;flex-direction:column;
  align-items:center;
  transition:opacity 0.35s ease;
}

/* The QR frame */
#outfit-qr-wrap{
  position:relative;
  padding:16px;
  border:1px solid var(--border);
  border-radius:2px;
  margin-bottom:28px;
}
#outfit-qr-wrap::after{display:none;}
#outfit-qr-canvas{display:block;}

#outfit-room-code{
  font-family:var(--mono);
  font-size:20px;font-weight:300;letter-spacing:0.4em;
  color:var(--fg);
  margin-bottom:10px;text-align:center;
}
#outfit-scan-label{
  font-family:var(--sans);
  font-size:9px;font-weight:400;letter-spacing:0.4em;
  color:var(--fg-ghost);
  text-transform:uppercase;
  margin-bottom:36px;text-align:center;
}
#outfit-waiting{
  font-family:var(--sans);
  font-size:9px;font-weight:300;letter-spacing:0.3em;
  color:var(--fg-dim);
  text-align:center;
  animation:breathe 3s ease-in-out infinite;
}

#outfit-conn-view{
  display:none;flex-direction:column;
  align-items:center;gap:16px;
  text-align:center;
}
#outfit-conn-view.show{display:flex;}

#outfit-conn-glyph{
  font-size:48px;color:var(--fg-dim);
  opacity:0;transform:scale(0.82);
  transition:opacity 0.65s ease,transform 0.65s ease;
  line-height:1;
}
#outfit-conn-glyph.show{opacity:1;transform:scale(1);}

#outfit-conn-label{
  font-family:var(--sans);
  font-size:9px;font-weight:400;letter-spacing:0.45em;
  color:var(--fg-ghost);
  text-transform:uppercase;
}
#outfit-conn-partner{
  font-family:var(--sans);
  font-size:13px;font-weight:300;letter-spacing:0.2em;
  color:var(--fg);
}

/* ── VERSION BADGE ── */
#version-badge{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,8px),8px);
  right:16px;
  font-family:var(--mono);
  font-size:9px;font-weight:300;
  letter-spacing:0.15em;
  color:var(--fg-ghost);
  pointer-events:none;z-index:9999;
}

/* ── DEBUG ── */
#debug{
  position:absolute;top:0;left:0;right:0;
  background:rgba(5,5,5,0.95);
  color:var(--fg-dim);
  font-size:10px;font-family:var(--mono);font-weight:300;
  padding:max(env(safe-area-inset-top,8px),8px) 10px 8px;
  white-space:pre;line-height:1.6;
  display:none;z-index:100;
  pointer-events:none;
  border-bottom:1px solid var(--border);
}
#debug.visible{display:block;}
</style>
</head>
<body>

<!-- SCREEN FLASH — RUN commands -->
<div id="flash"></div>

<!-- VOICE CAPTION — always on top -->
<div id="voice-caption"></div>

<!-- ─── SCREEN 1: BOOT ─────────────────────────────────── -->
<div id="screen-listen" class="screen active">
  <canvas id="boot-canvas"></canvas>
  <div class="boot-touch-hint">touch to begin</div>
</div>

<!-- ─── SCREEN 2: PROTOCOL SELECT ─────────────────────── -->
<div id="screen-lens" class="screen">
  <div class="sys-header">select <em>lens</em></div>
  <div class="protocol-list" id="lens-scroll"></div>
  <div class="cmd-bar">
    <span class="cmd-gt">&gt;_</span>
    <input id="cmd-input" type="text"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      placeholder="run [lens]" />
  </div>
  <!-- hidden for JS compat -->
  <div id="lens-go"></div>
</div>

<!-- ─── SCREEN 3: PLAY ─────────────────────────────────── -->
<div id="screen-play" class="screen">
  <canvas id="canvas"></canvas>
  <div id="lens-indicator"></div>
  <div id="ask-dance-btn">dance</div>
  <div id="play-cmd">
    <span class="play-gt">&gt;</span>
    <input id="play-cmd-input" type="text"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      placeholder="" />
  </div>
</div>

<!-- OUTFIT OVERLAY — outside the screen stack, covers everything -->
<div id="outfit-overlay">
  <button id="outfit-close">×</button>

  <!-- Phase 1: QR code + waiting -->
  <div id="outfit-qr-view">
    <div id="outfit-qr-wrap">
      <canvas id="outfit-qr-canvas"></canvas>
    </div>
    <div id="outfit-room-code"></div>
    <div id="outfit-scan-label">scan to dance</div>
    <div id="outfit-waiting">awaiting partner</div>
  </div>

  <!-- Phase 2: Connected ceremony (auto-shows when partner arrives) -->
  <div id="outfit-conn-view">
    <div id="outfit-conn-glyph">∿</div>
    <div id="outfit-conn-label">connected</div>
    <div id="outfit-conn-partner"></div>
  </div>
</div>

<!-- DEBUG -->
<div id="debug"></div>

<!-- VERSION BADGE — always visible, always trustworthy -->
<div id="version-badge"></div>

<script src="js/voice.js?v=35"></script>
<script src="js/sensor.js?v=26"></script>
<script src="js/brain.js?v=26"></script>
<script src="js/audio.js?v=59"></script>
<script src="js/follow.js?v=97"></script>
<script src="js/lens.js?v=60"></script>
<script src="js/organism.js?v=29"></script>
<script src="js/pattern.js?v=38"></script>
<script src="js/gesture.js?v=1"></script>
<script src="js/weather.js?v=1"></script>
<script src="js/wx.js?v=1"></script>
<script src="js/outfit.js?v=1"></script>
<script src="js/app.js?v=57"></script>
</body>
</html>
