<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<meta property="og:title" content="GUMP — The Machine">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0;

// ═══ PAGES ═══
var PAGES=[
  {name:'research',  url:'/r/',         c:[201,164,74],  desc:'the full story'},
  {name:'one',       url:'/one/',       c:[160,200,140], desc:'knowledge engine'},
  {name:'mirror',    url:'/mirror/',    c:[120,160,220], desc:'5D machine'},
  {name:'flex',      url:'/flex/',      c:[200,110,170], desc:'12 shapes'},
  {name:'bloom',     url:'/bloom/',     c:[100,200,150], desc:'nothing to life'},
  {name:'resonance', url:'/resonance/', c:[220,110,90],  desc:'tissue targeting'},
  {name:'oracle',    url:'/oracle/',    c:[190,180,120], desc:'primes from nothing'},
];

// ═══ PARTICLES: 40 per page, simple ═══
var NP=40;
var px=[],py=[],pvx=[],pvy=[],pp=[],psz=[];
var boxes=[];

function build(){
  w=innerWidth;h=innerHeight;
  px=[];py=[];pvx=[];pvy=[];pp=[];psz=[];
  boxes=[];

  // Single column, evenly spaced
  var n=PAGES.length;
  var margin=h*0.1;
  var spacing=(h-margin*2)/(n-1||1);

  for(var p=0;p<n;p++){
    var cy=margin+p*spacing;
    var bx=0,by=cy-spacing*0.35,bw=w,bh=spacing*0.7;
    boxes.push({x:bx,y:by,w:bw,h:bh,cx:w/2,cy:cy,page:p});

    for(var i=0;i<NP;i++){
      var a=Math.random()*Math.PI*2;
      var r=10+Math.random()*20;
      px.push(w/2+Math.cos(a)*r);
      py.push(cy+Math.sin(a)*r*0.3);
      pvx.push(0);pvy.push(0);
      pp.push(p);
      psz.push(0.4+Math.random()*1.2);
    }
  }
}
build();

// ═══ TOUCH: tap navigates, no hover needed ═══
var tapX=-1,tapY=-1,tapTime=0;

addEventListener('touchstart',function(e){
  e.preventDefault();
  tapX=e.touches[0].clientX;
  tapY=e.touches[0].clientY;
  tapTime=Date.now();
},{passive:false});

addEventListener('touchend',function(e){
  e.preventDefault();
  // Only navigate if it was a quick tap (not a drag)
  if(Date.now()-tapTime<300&&tapX>0){
    navigate(tapX,tapY);
  }
  tapX=-1;tapY=-1;
},{passive:false});

addEventListener('click',function(e){
  navigate(e.clientX,e.clientY);
});

function navigate(ex,ey){
  for(var i=0;i<boxes.length;i++){
    var b=boxes[i];
    if(ey>b.y&&ey<b.y+b.h){
      window.location.href=PAGES[b.page].url;
      return;
    }
  }
}

// ═══ RENDER ═══
function render(){
  w=innerWidth;h=innerHeight;t+=0.016;

  cx.fillStyle='rgba(0,0,0,0.1)';
  cx.fillRect(0,0,w,h);

  cx.globalCompositeOperation='lighter';

  // Update + draw particles
  var total=px.length;
  for(var i=0;i<total;i++){
    var p=pp[i];
    var b=boxes[p];
    var c=PAGES[p].c;

    // Gentle orbit
    var angle=t*0.3+i*0.5;
    var orbitR=15+Math.sin(t*0.2+i)*8;
    var tx=b.cx+Math.cos(angle+i*0.1)*orbitR;
    var ty=b.cy+Math.sin(angle+i*0.1)*orbitR*0.25;

    pvx[i]+=(tx-px[i])*0.02;
    pvy[i]+=(ty-py[i])*0.02;
    pvx[i]*=0.9;pvy[i]*=0.9;
    px[i]+=pvx[i];py[i]+=pvy[i];

    var alpha=0.2+Math.sin(t+i)*0.08;
    var sz=psz[i];

    cx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+alpha+')';
    cx.fillRect(px[i]-sz/2,py[i]-sz/2,sz,sz);
  }

  cx.globalCompositeOperation='source-over';

  // Labels
  for(var i=0;i<boxes.length;i++){
    var b=boxes[i];
    var c=PAGES[i].c;

    cx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.18)';
    cx.font='200 1.1em Georgia';
    cx.textAlign='center';
    cx.fillText(PAGES[i].name,b.cx,b.cy+4);

    cx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+',0.06)';
    cx.font='0.6em Georgia';
    cx.fillText(PAGES[i].desc,b.cx,b.cy+18);
  }

  // Title
  cx.fillStyle='rgba(201,164,74,0.04)';
  cx.font='200 1.4em Georgia';
  cx.textAlign='center';
  cx.fillText('GUMP',w/2,28);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
