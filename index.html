var vsrc=`
attribute vec3 aPos;

attribute float aSize;
uniform mat4 uMVP;
uniform float uScale;
varying vec3 vCol;
varying float vAlpha;

  vec4 p=uMVP*vec4(aPos,1.0);
  gl_Position=p;
  vCol=aCol;
  // Depth: near particles bright + bigger, far particles dim + smaller.
  // The depth multiplier now feeds INTO the size before the clamp, not after —
  // it used to apply after clamping, so a near particle could reach ~2x the
  // clamp ceiling (up to ~19px) and wash out into a soft glowing blob wherever
  // points overlapped, which is what was actually reading as "blurry."
  float depthFade=clamp(1.5/max(0.5,p.w),0.1,1.0);

// Fixed-timestep accumulator — sim advances by real time, so transitions stay
// locked to the music whether the device runs 30fps or 60fps (mobile timing fix)
var _acc=0,_lastMs=performance.now();
function update(){
  var nowMs=performance.now(),dt=(nowMs-_lastMs)/1000;_lastMs=nowMs;
  if(dt>0.1)dt=0.1;

  var steps=0;
  while(_acc>=0.016&&steps<5){simStep();_acc-=0.016;steps++;}
}
function simStep(){
  t+=0.016;

  if(shape===17) stepMystify(); // persistent vertex physics, once per frame not per particle

  // uses the canvas instead of floating in the middle third of it.
  view=mat4_translate(view,(Math.random()-0.5)*shk,(Math.random()-0.5)*shk,-camDist*3.15);
  view=mat4_rotateX(view,(my-0.5)*1.5+(Math.random()-0.5)*(nuts*0.07+mosh*0.12));
  view=mat4_rotateY(view,t*0.15+(mx-0.5)*2+SEED*6.2832+(Math.random()-0.5)*(nuts*0.07+mosh*0.12));
  var mvp=mat4_mul(proj,view);

  // Upload positions + colors to GPU
  for(var i=0;i<N;i++){
    gpuPos[i*3]=px[i];gpuPos[i*3+1]=py[i]+(bendAmt!==0?Math.sin(px[i]*1.4+t*7.0)*bendAmt:0);gpuPos[i*3+2]=pz[i];
    gpuCol[i*3]=cr[i];gpuCol[i*3+1]=cg2[i];gpuCol[i*3+2]=cb[i];
  }

  var trailFade=TRAIL_SHAPES[shape];
  if(trailFade!==undefined && morphT>=1){
    // real persistence — draw a translucent dark quad instead of clearing.
    // Trail-shapes own the whole screen (no gallery art layered under them).
    gl.useProgram(fadeProg);
    gl.disable(gl.BLEND); gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
    gl.uniform4f(uFadeCol,0.039,0.027,0.02,trailFade);
    gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
    gl.enableVertexAttribArray(aQ);
    gl.vertexAttribPointer(aQ,2,gl.FLOAT,false,0,0);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    gl.useProgram(prog);
    gl.blendFunc(gl.SRC_ALPHA,gl.ONE); // back to additive for the particles
  } else {
    gl.clearColor(0,0,0,isAlbumMode()?0:1); // album=transparent (art shows through), math=opaque black
    gl.clear(gl.COLOR_BUFFER_BIT);
  }

  if(shape===21 && morphT>=1){
    // Real solid geometry instead of particles — see buildPipeTubeGeometry().
    // Needs actual depth testing to read as a solid object (particles never
    // used depth at all, additive blending doesn't need it); switched off
    // again immediately after so every other shape renders exactly as before.
    buildPipeTubeGeometry();
    gl.useProgram(tubeProg);
    gl.enable(gl.DEPTH_TEST); gl.depthFunc(gl.LEQUAL);
    gl.clear(gl.DEPTH_BUFFER_BIT);
    gl.disable(gl.BLEND);
    gl.uniformMatrix4fv(tUMVP,false,mvp);
    gl.uniform3f(tULightDir,0.5,0.85,0.35);
    gl.uniform3f(tUEyePos,0,0,camDist*4); // matches the view translate(...,-camDist*4) convention below

    gl.bindBuffer(gl.ARRAY_BUFFER,tubePosBuf);
    gl.bufferData(gl.ARRAY_BUFFER,tubePos.subarray(0,tubeVertCount*3),gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(tAPos);
    gl.vertexAttribPointer(tAPos,3,gl.FLOAT,false,0,0);

    gl.bindBuffer(gl.ARRAY_BUFFER,tubeNormBuf);
    gl.bufferData(gl.ARRAY_BUFFER,tubeNorm.subarray(0,tubeVertCount*3),gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(tANorm);
    gl.vertexAttribPointer(tANorm,3,gl.FLOAT,false,0,0);

    gl.bindBuffer(gl.ARRAY_BUFFER,tubeColBuf);
    gl.bufferData(gl.ARRAY_BUFFER,tubeCol.subarray(0,tubeVertCount*3),gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(tACol);
    gl.vertexAttribPointer(tACol,3,gl.FLOAT,false,0,0);

    gl.drawArrays(gl.TRIANGLES,0,tubeVertCount);

    gl.disable(gl.DEPTH_TEST);
    gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE); // restore additive for every other shape
    gl.useProgram(prog);
  } else {
    gl.uniformMatrix4fv(uMVP,false,mvp);
    gl.uniform1f(uScale,Math.min(w,h)*DPR*(MOB?0.062:0.03)*(1+beatPulse*0.13+nuts*0.22+mosh*0.25));
    gl.uniform1f(uBright,MOB?0.72:0.66); // the field is the whole show now, not a 22%-opacity accent under a painting

    gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
    gl.bufferData(gl.ARRAY_BUFFER,gpuPos,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);

    gl.bindBuffer(gl.ARRAY_BUFFER,colBuf);
    gl.bufferData(gl.ARRAY_BUFFER,gpuCol,gl.DYNAMIC_DRAW);
    gl.enableVertexAttribArray(aCol);
    gl.vertexAttribPointer(aCol,3,gl.FLOAT,false,0,0);

    gl.bindBuffer(gl.ARRAY_BUFFER,sizeBuf);
    gl.bufferData(gl.ARRAY_BUFFER,psize,gl.STATIC_DRAW);
    gl.enableVertexAttribArray(aSize);
    gl.vertexAttribPointer(aSize,1,gl.FLOAT,false,0,0);

    gl.drawArrays(gl.POINTS,0,N);
  }

  // Stats
  var now=performance.now();
  var fps=Math.round(1000/(now-lastT));lastT=now;
  if(frame%10===0){
    (document.getElementById('stats')||{}).textContent=N.toLocaleString()+' particles · '+fps+'fps · WebGL';
    (document.getElementById('whisper')||{}).textContent=NAMES[shape]+' — '+EQNS[shape];
  }

  requestAnimationFrame(render);
}

render();
})();
</script>

<script>
// ── ALBUM SEQUENCER + MODE TOGGLE ──────────────────────────
(function(){
  var alb=document.getElementById('alb');
  var cdr=document.getElementById('cdr');
  var tog=document.getElementById('mode-tog');
  var rd=document.getElementById('readout');
  // one song, randomly chosen per page load, paired with its shape, waiting —
  // not the entire album committed on the first stray tap, and never the same open twice.
  // ?shape=N forces a specific shape's track for testing — no more gambling on refresh luck.
  var _forceShape = new URLSearchParams(location.search).get('shape');
  var idx;
  if(_forceShape!==null && window.RADIO && window.RADIO.list){
    var _want=parseInt(_forceShape,10);
    var _found=-1;
    for(var _si=0;_si<ALB_SHAPES.length;_si++){ if(ALB_SHAPES[_si]===_want){_found=_si;break;} }
    idx = _found>=0 ? _found : 0;
  } else {
    idx = (window.RADIO && window.RADIO.list && window.RADIO.list.length) ? Math.floor(Math.random()*totalTracks()) : 0;
  }
  window._albIdx=idx;

  // combined index space: 0..32 = the free 33-track album, 33..45 = the 13 locked
  // anagramusic bonus beats. Same pool, same shape system — the paywall is enforced
  // at the moment of play, not by hiding these tracks from the rotation.
  var LINK_ALBUM='https://buy.stripe.com/fZu00jfy05ctdNz1zGfIs0g';
  function isFreeDay(){ var d=new Date().getDate(); return d===1||d===3||d===7; }
  function isUnlocked(){ return window.gumpUnlockAll ? window.gumpUnlockAll() : false; }
  function totalTracks(){ return (window.RADIO&&window.RADIO.list?window.RADIO.list.length:0) + (window.RADIO&&window.RADIO.beats?window.RADIO.beats.length:0); }
  function trackForIdx(i){
    var list=window.RADIO.list, beats=window.RADIO.beats||[];
    if(i<list.length) return {t:list[i], locked:false, src:window.RADIO.cdn+list[i].f};
    var b=beats[(i-list.length)%beats.length];
    return {t:b, locked:!!b.locked, src:b.f};
  }
  function load(i){
    if(!window.RADIO||!alb) return;
    var n=totalTracks(); if(!n) return;
    i=((i%n)+n)%n;
    var entry=trackForIdx(i);
    if(entry.locked && !isFreeDay() && !isUnlocked()){
      sessionStorage.setItem('gump_album_pend',JSON.stringify({ts:Date.now()}));
      location.href=LINK_ALBUM; // same unlock flow as /radio/ — consistent, not a new pattern
      return;
    }
    idx=i;
    window._albIdx=idx;
    window._curTrackFile=entry.t.f.split('/').pop();
    alb.src=entry.src; alb.load();
    alb.play().then(function(){
      // the whole point: once a song is actually live, the page becomes the
      // visual immediately, not after 4s of nobody touching the mouse
      document.body.classList.add('playing');
      document.body.classList.remove('presenter-active');
    }).catch(function(){});
    if(rd) rd.textContent=entry.t.t+' — '+entry.t.s;
  }

  if(alb){
    alb.addEventListener('ended',function(){load(idx+1);});
    alb.addEventListener('pause',function(){ document.body.classList.remove('playing'); });
    alb.addEventListener('play',function(){ document.body.classList.add('playing'); document.body.classList.remove('presenter-active'); });
  }

  function setMode(point,start){
    document.body.classList.toggle('point-mode',point);
    localStorage.setItem('gump_mode',point?'point':'math');
    if(tog) tog.textContent=point?'the math':'the point';
    if(point){
      if(cdr&&!cdr.paused) cdr.pause();
      if(start) load(0);            // music starts only on a real user gesture — never on bare load
    } else {
      if(alb&&!alb.paused){alb.pause();alb.currentTime=0;}
      var fieldCv2=document.getElementById('field');
      if(fieldCv2){ fieldCv2.style.pointerEvents=''; fieldCv2.style.opacity=''; }
      if(rd) rd.textContent='K=1.868 · R=0.000 · T=1.000';
    }
  }

  if(tog) tog.addEventListener('click',function(e){
    e.preventDefault();
    setMode(!document.body.classList.contains('point-mode'),true);
  });

  // load calm — set the mode visually, but DON'T autoplay (browsers block it; it fails silently)
  if(localStorage.getItem('gump_mode')==='math') setMode(false,false); else setMode(true,false);
  // waiting-room readout — name what's queued up before anyone touches anything
  if(rd && window.RADIO && window.RADIO.list && document.body.classList.contains('point-mode')){
    var _q = trackForIdx(idx);
    if(_q&&_q.t) rd.textContent = _q.t.t+' — '+_q.t.s+(_q.locked?' 🔒':'')+' · click to begin';
  }
  // one tap into the music — gesture-gated, so the music + visual slide in every single time
  (function(){
    var begun=false;
    document.addEventListener('pointerdown',function(e){
      if(begun) return;
      if(e.target.closest('a,h1,.door,#mode-tog,#cdr-btn,button,iframe')) return; // let nav + controls do their job
      if(!document.body.classList.contains('point-mode')) return;
      begun=true; load(idx); // the song that was already queued and previewed — not always track 0
    });
  })();
  window._setMode=setMode; // the-show (?show) starts the album from track 0 on the begin gesture

  // Presenter: hidden until cursor moves, fades out after 4s of stillness.
  // Once a song is actually playing, this used to fire on ANY mouse movement —
  // meaning every time someone checked the page (moved the mouse to screenshot
  // it, to scroll, to do anything at all) the UI chrome came back and covered
  // the immersive visual, making "is this actually full-page now" impossible to
  // verify by looking, since looking itself re-triggered the thing being checked
  // for. Once playing, only a deliberate move to the top edge reveals it again —
  // incidental movement elsewhere on the page no longer un-hides the frame.
  (function(){
    var hideTimer;
    var bd=document.body;
    function show(e){
      if(!bd.classList.contains('point-mode')) return;
      // The top-90px restriction exists to stop constant INCIDENTAL mouse
      // movement (which happens just from using a trackpad) from spamming
      // the UI back open. That reasoning doesn't apply to touch — a tap is
      // already a deliberate action, there's no "incidental touch" the way
      // there's incidental mouse movement. Restricting touch to the same
      // top-90px strip meant mobile had no discoverable way back to the
      // nav at all once a song started, which reads exactly like being
      // stuck in fullscreen with no exit. Any tap now reveals the UI.
      var isTouch=e&&e.type==='touchstart';
      if(bd.classList.contains('playing')&&!isTouch){
        var y=(e&&e.clientY!=null?e.clientY:null);
        if(y==null||y>90) return; // mouse: deliberate move to the top edge only, while a song is live
      }
      bd.classList.add('presenter-active');
      clearTimeout(hideTimer);
      hideTimer=setTimeout(function(){bd.classList.remove('presenter-active');},4000);
    }
    document.addEventListener('mousemove',show);
    document.addEventListener('touchstart',show,{passive:true});
  })();
})();

<script>
// ═══ DOOR GLYPHS — each door is a small living thing, not a static circle. One shared RAF loop. ═══
(function(){
'use strict';
var reduceM = matchMedia('(prefers-reduced-motion: reduce)').matches;
var COL = {research:[190,140,200], tools:[201,164,74], harmonia:[210,150,120]};
var WORLD_COL = [[201,164,74],[122,160,138],[184,117,58],[190,140,200],[168,138,176]]; // data,bio,music,art,build
var items = [];
document.querySelectorAll('.door-glyph, .door-preview').forEach(function(cv){
  var role = cv.classList.contains('door-preview') ? 'preview' : 'glyph';
  var kind = cv.dataset.glyph || cv.dataset.preview;

  var it = {cv:cv, cx:cv.getContext('2d'), kind:kind, role:role, col:col, dpr:dpr, w:0, h:0, t:Math.random()*10};
  if(role==='glyph'){

      // enclosing net (not random scatter), plus radial spokes from center

      var nR=12;
      for(var i=0;i<nR;i++){ var a=i*2.399963229728653; it.nodes.push({a0:a, rBase:0.35+((i*13)%37)/37*0.55, ph:Math.random()*6.283, sp:0.08+Math.random()*0.1, wob:0.5+Math.random()*0.5}); }
    } else if(kind==='tools'){
      // Lissajous phase-portrait — a live oscilloscope trace of actual Kuramoto coupling,
      // not dots on a ring. Shape simplifies as the oscillators lock into sync.
      it.osc = [];
      for(var i=0;i<6;i++){ it.osc.push({ph:Math.random()*6.283, base: i*2*Math.PI/6}); }
      it.trail = [];
    } else if(kind==='harmonia'){

      it.harm = [{f:2,amp:0.14,ph:Math.random()*6.283,sp:0.5},{f:3,amp:0.09,ph:Math.random()*6.283,sp:0.7},{f:5,amp:0.05,ph:Math.random()*6.283,sp:0.9}];
    }

    if(kind==='research'){

      for(var i=0;i<20;i++){ var a=i*2.399963229728653, r=0.2+((i*17)%41)/41*0.72; it.nodes.push({a:a, r:r, ph:Math.random()*6.283, sp:0.1+Math.random()*0.12}); }
    } else if(kind==='tools'){

    } else if(kind==='harmonia'){

function rgba(c,a){ return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a.toFixed(3)+')'; }

function drawResearch(it){
  // geodesic web, ghosted — a faint glowing lattice glimpsed through glass, not a
  // crisp technical diagram. One ring, softly lit. No cross-braces, no spokes —
  // those read as busy. The glow itself is the point, not the linework.
  var cx=it.cx, w=it.w, h=it.h, cxp=w/2, cyp=h/2, R=Math.min(w,h)*0.46, col=it.col;

  cx.closePath(); cx.stroke();
  cx.restore();

  for(var i=0;i<pts.length;i++){
    var br=0.4+0.4*Math.sin(it.t*0.8+i*1.3);
    var g=cx.createRadialGradient(pts[i].x,pts[i].y,0,pts[i].x,pts[i].y,5+br*3);

function drawTools(it){
  // live Lissajous phase-portrait, ghosted — a soft luminous wisp of an oscilloscope
  // trace, not a bold drawn oval. Shorter trail, heavier glow, dimmer stroke.
  var cx=it.cx, w=it.w, h=it.h, cxp=w/2, cyp=h/2, R=Math.min(w,h)*0.4, col=it.col;
  var meanSin=0, meanCos=0;
  for(var i=0;i<it.osc.length;i++){ meanSin+=Math.sin(it.osc[i].ph); meanCos+=Math.cos(it.osc[i].ph); }
  var meanPh=Math.atan2(meanSin,meanCos);

  for(var i=0;i<it.osc.length;i++){ var o=it.osc[i]; o.ph += (0.09+i*0.011) + K*Math.sin(meanPh-o.ph); }
  var x=cxp+Math.cos(it.osc[0].ph)*R*0.5+Math.cos(it.osc[1].ph)*R*0.4;
  var y=cyp+Math.sin(it.osc[2].ph)*R*0.5+Math.sin(it.osc[3].ph)*R*0.4;
  it.trail.push({x:x,y:y});
  if(it.trail.length>36) it.trail.shift();
  cx.fillStyle='rgba(10,7,6,0.26)'; cx.fillRect(0,0,w,h);
  cx.globalCompositeOperation='lighter';
  cx.save();
  cx.shadowBlur=7; cx.shadowColor=rgba(col,0.6);
  cx.beginPath();
  for(var i=0;i<it.trail.length;i++){ var p=it.trail[i]; if(i===0)cx.moveTo(p.x,p.y); else cx.lineTo(p.x,p.y); }
  cx.strokeStyle=rgba(col,0.28); cx.lineWidth=1; cx.stroke();
  cx.restore();
  var head=it.trail[it.trail.length-1];
  if(head){ var g=cx.createRadialGradient(head.x,head.y,0,head.x,head.y,6); g.addColorStop(0,rgba(col,0.6)); g.addColorStop(1,rgba(col,0)); cx.fillStyle=g; cx.beginPath(); cx.arc(head.x,head.y,6,0,6.283); cx.fill(); }
  cx.globalCompositeOperation='source-over';
}

function drawHarmonia(it){
  // breathing polar voice-contour, ghosted — the border IS the instrument now.
  // No fill. A soft glowing rim tracing the breath, like light on the edge of glass.
  var cx=it.cx, w=it.w, h=it.h, cxp=w/2, cyp=h/2, baseR=Math.min(w,h)*0.3, col=it.col;
  cx.clearRect(0,0,w,h);
  cx.globalCompositeOperation='lighter';
  var N=48, pts=[];
  for(var i=0;i<=N;i++){
    var a=(i/N)*6.283;
    var r=baseR;
    for(var k=0;k<it.harm.length;k++){ var hm=it.harm[k]; r += baseR*hm.amp*Math.sin(a*hm.f+it.t*hm.sp+hm.ph); }
    pts.push({x:cxp+Math.cos(a)*r,y:cyp+Math.sin(a)*r});
  }
  cx.save();
  cx.shadowBlur=10; cx.shadowColor=rgba(col,0.7);
  cx.beginPath();
  for(var i=0;i<pts.length;i++){ if(i===0)cx.moveTo(pts[i].x,pts[i].y); else cx.lineTo(pts[i].x,pts[i].y); }
  cx.closePath();
  cx.strokeStyle=rgba(col,0.4); cx.lineWidth=1; cx.stroke();
  cx.restore();
  // center listening pulse, faint
  var breathe=0.55+0.45*Math.sin(it.t*0.7);
  var pr=2+breathe*3;
  var g=cx.createRadialGradient(cxp,cyp,0,cxp,cyp,pr*3);
  g.addColorStop(0,rgba(col,0.3*breathe)); g.addColorStop(1,rgba(col,0));
  cx.fillStyle=g; cx.beginPath(); cx.arc(cxp,cyp,pr*3,0,6.283); cx.fill();
  cx.globalCompositeOperation='source-over';
}

// previews — a genuine peek at the destination underneath the peeled corner,
// not the same glyph again: denser research graph, the actual 5-world grid, real chat bubbles
function drawResearchPreview(it){
  var cx=it.cx, w=it.w, h=it.h, cxp=w/2, cyp=h/2, R=Math.min(w,h)*0.46, col=it.col;
  cx.clearRect(0,0,w,h);
  cx.globalCompositeOperation='lighter';
  var pts=[];
  for(var i=0;i<it.nodes.length;i++){
    var n=it.nodes[i];
    var ang=n.a+it.t*n.sp*0.2;
    var rad=R*n.r*(0.88+0.12*Math.sin(it.t*0.5+n.ph));
    pts.push({x:cxp+Math.cos(ang)*rad,y:cyp+Math.sin(ang)*rad});
  }
  cx.strokeStyle=rgba(col,0.16); cx.lineWidth=0.5;
  for(var i=0;i<pts.length;i++){
    for(var j=i+1;j<pts.length;j++){
      var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<R*0.55){cx.globalAlpha=Math.max(0,1-d/(R*0.55))*0.4;cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.stroke();}
    }
  }
  cx.globalAlpha=1;
  for(var i=0;i<pts.length;i++){
    var br=0.4+0.5*Math.sin(it.t*0.7+i*1.1);
    cx.fillStyle=rgba(col,0.6*br); cx.beginPath(); cx.arc(pts[i].x,pts[i].y,1.6,0,6.283); cx.fill();
  }
  cx.globalCompositeOperation='source-over';
}
function drawToolsPreview(it){
  var cx=it.cx, w=it.w, h=it.h, col=it.col;
  cx.clearRect(0,0,w,h);
  var pad=w*0.16, gap=w*0.05, cols=3, cellW=(w-pad*2-gap*2)/cols;
  for(var i=0;i<it.cells.length;i++){
    var c=it.cells[i];
    var cxp=pad+ (i%cols)*(cellW+gap) + cellW/2;
    var cyp=pad+ Math.floor(i/cols)*(cellW+gap) + cellW/2;
    var br=0.5+0.5*Math.sin(it.t*0.6+c.ph);
    cx.fillStyle='rgba('+c.col[0]+','+c.col[1]+','+c.col[2]+','+(0.22+br*0.28).toFixed(3)+')';
    var r=3;
    cx.beginPath();
    cx.moveTo(cxp-cellW/2+r,cyp-cellW/2);
    cx.arcTo(cxp+cellW/2,cyp-cellW/2,cxp+cellW/2,cyp+cellW/2,r);
    cx.arcTo(cxp+cellW/2,cyp+cellW/2,cxp-cellW/2,cyp+cellW/2,r);
    cx.arcTo(cxp-cellW/2,cyp+cellW/2,cxp-cellW/2,cyp-cellW/2,r);
    cx.arcTo(cxp-cellW/2,cyp-cellW/2,cxp+cellW/2,cyp-cellW/2,r);
    cx.closePath(); cx.fill();
  }
}
function drawHarmoniaPreview(it){
  var cx=it.cx, w=it.w, h=it.h, col=it.col;
  cx.clearRect(0,0,w,h);
  cx.globalCompositeOperation='lighter';
  for(var i=0;i<it.bubbles.length;i++){
    var b=it.bubbles[i];
    var br=0.5+0.5*Math.sin(it.t*0.55+b.ph);
    var x=w/2+b.x*w, y=h/2+b.y*h, r=b.r*w*(0.9+0.1*br);
    var g=cx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,rgba(col,0.28*br)); g.addColorStop(1,rgba(col,0));
    cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r,0,6.283); cx.fill();
    cx.fillStyle=rgba(col,0.15+0.1*br);
    cx.beginPath(); cx.arc(x,y,r*0.55,0,6.283); cx.fill();
  }
  cx.globalCompositeOperation='source-over';
}

var DRAW = {research:drawResearch, tools:drawTools, harmonia:drawHarmonia};
var DRAW_PREVIEW = {research:drawResearchPreview, tools:drawToolsPreview, harmonia:drawHarmoniaPreview};

function doorDrawOne(it){
  var map = it.role==='preview' ? DRAW_PREVIEW : DRAW;
  (map[it.kind]||DRAW.tools)(it);
}
function doorFrame(){
  for(var i=0;i<items.length;i++){
    var it=items[i];
    it.t += 0.016;
    doorDrawOne(it);
  }
  if(!reduceM && items.length) requestAnimationFrame(doorFrame);
}
if(items.length){
  if(reduceM){ for(var i=0;i<items.length;i++){ items[i].t=2; doorDrawOne(items[i]); } }
  else doorFrame();
}
})();
</script>
