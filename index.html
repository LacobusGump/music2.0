<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<!-- Cache-busting: tell iOS Chrome not to serve stale HTML -->
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>GENESIS // MUSIC 2.0</title>
<!-- Force reload when build changes. iOS WebKit caches index.html aggressively.
     BUILD must match follow.js version. Bump both together on every deploy. -->
<script>
(function(){
  var BUILD = 76;
  window.GUMP_BUILD = BUILD;
  try {
    var stored = parseInt(localStorage.getItem('gump_build') || '0', 10);
    if (stored !== BUILD) {
      localStorage.setItem('gump_build', BUILD);
      if (stored > 0) location.reload(true);
    }
  } catch(e) {}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --green:#00FF41;
  --green-dim:rgba(0,255,65,0.18);
  --green-mid:rgba(0,255,65,0.45);
  --green-faint:rgba(0,255,65,0.07);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:#000;
  color:var(--green);
  font-family:'Courier New',Courier,monospace;
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}

/* SCANLINES — the ambient texture of the machine */
body::after{
  content:'';
  position:fixed;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 3px,
    rgba(0,255,65,0.018) 3px,rgba(0,255,65,0.018) 4px
  );
  pointer-events:none;z-index:9000;
}

/* ── SCREENS ── */
.screen{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;
  will-change:opacity;
  background:#000;
}
.screen.active{opacity:1;pointer-events:auto}

/* ── BOOT SCREEN ── */
#screen-listen{z-index:3;display:flex;align-items:center;justify-content:center;}

#boot-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

.boot-touch-hint{
  position:absolute;
  bottom:12%;
  left:0;right:0;
  text-align:center;
  font-size:28px;
  letter-spacing:0;
  color:rgba(0,255,65,0.22);
  animation:pulse-text 3.5s ease-in-out infinite;
}
@keyframes pulse-text{
  0%,100%{opacity:0.25}
  50%{opacity:0.55}
}

/* ── PROTOCOL SELECT SCREEN ── */
#screen-lens{
  z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 24px;
}

.sys-header{
  font-size:9px;letter-spacing:0.4em;text-transform:uppercase;
  color:rgba(0,255,65,0.3);
  margin-bottom:28px;
  text-align:center;
}
.sys-header em{font-style:normal;color:var(--green);}

.protocol-list{
  width:100%;max-width:420px;
  display:flex;flex-direction:column;
  gap:1px;
}

.protocol-item{
  display:flex;align-items:flex-start;
  padding:13px 16px;
  border:1px solid rgba(0,255,65,0.06);
  cursor:pointer;
  transition:border-color 0.12s,background 0.12s;
  -webkit-tap-highlight-color:transparent;
  gap:14px;
}
.protocol-item:active{background:var(--green-faint);}
.protocol-item.selected{
  border-color:var(--green-mid);
  background:rgba(0,255,65,0.04);
}
.protocol-item.selected .p-cursor{opacity:1;}

.p-cursor{
  font-size:11px;color:var(--green);opacity:0;
  flex-shrink:0;margin-top:1px;
  transition:opacity 0.1s;
}
.p-num{
  font-size:9px;letter-spacing:0.15em;
  color:rgba(0,255,65,0.3);
  flex-shrink:0;margin-top:2px;
}
.p-body{flex:1;}
.p-name{
  font-size:13px;letter-spacing:0.12em;
  color:var(--green);
  margin-bottom:3px;
}
.p-desc{
  font-size:9px;letter-spacing:0.04em;line-height:1.5;
  color:rgba(0,255,65,0.28);
}

/* COMMAND BAR — lens screen */
.cmd-bar{
  margin-top:24px;
  width:100%;max-width:420px;
  display:flex;align-items:center;
  border:1px solid rgba(0,255,65,0.2);
  padding:11px 14px;
  gap:10px;
}
.cmd-gt{color:var(--green);font-size:13px;flex-shrink:0;}
#cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--green);
  font-family:'Courier New',Courier,monospace;
  font-size:13px;letter-spacing:0.08em;
  flex:1;
  caret-color:var(--green);
  -webkit-appearance:none;
}
#cmd-input::placeholder{color:rgba(0,255,65,0.18);}

/* Hidden go button kept for JS compat */
#lens-go{display:none}

/* ── PLAY SCREEN ── */
#screen-play{z-index:1;}
#canvas{position:absolute;inset:0;width:100%;height:100%;}

/* Protocol ID in play — top left, tiny */
#lens-indicator{
  position:absolute;
  top:max(env(safe-area-inset-top,14px),14px);
  left:16px;
  font-size:9px;letter-spacing:0.3em;
  color:rgba(0,255,65,0.22);
  pointer-events:none;
  font-family:'Courier New',Courier,monospace;
}

/* Ask to Dance — top right, mirror of lens-indicator */
/* Deliberately faint. If you find it, you're ready for it. */
#ask-dance-btn{
  position:absolute;
  top:max(env(safe-area-inset-top,14px),14px);
  right:16px;
  font-size:9px;letter-spacing:0.3em;
  color:rgba(0,255,65,0.16);
  pointer-events:auto;cursor:pointer;
  font-family:'Courier New',Courier,monospace;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  /* oversized tap target — the text is small but the finger lands */
  padding:8px 0 8px 16px;
  transition:color 0.2s;
  z-index:20;
}
#ask-dance-btn:active{color:rgba(0,255,65,0.6);}
#ask-dance-btn.connected{
  color:rgba(0,255,65,0.42);
  animation:pulse-text 3s ease-in-out infinite;
}

/* COMMAND BAR — play screen */
#play-cmd{
  position:absolute;
  bottom:0;left:0;right:0;
  display:flex;align-items:center;
  padding:10px 18px;
  padding-bottom:max(env(safe-area-inset-bottom,10px),10px);
  border-top:1px solid rgba(0,255,65,0.07);
  background:rgba(0,0,0,0.6);
  gap:10px;
  z-index:20;
}
.play-gt{color:rgba(0,255,65,0.3);font-size:12px;flex-shrink:0;}
#play-cmd-input{
  background:transparent;border:none;outline:none;
  color:rgba(0,255,65,0.45);
  font-family:'Courier New',Courier,monospace;
  font-size:11px;letter-spacing:0.08em;
  flex:1;
  caret-color:var(--green);
  -webkit-appearance:none;
}
#play-cmd-input::placeholder{color:rgba(0,255,65,0.12);}
#play-cmd-input:focus{color:var(--green);}

/* ── VOICE CAPTION — audio only, no text on screen ── */
#voice-caption{ display:none; }

/* ── FLASH OVERLAY ── */
#flash{
  position:fixed;inset:0;
  pointer-events:none;
  opacity:0;
  z-index:800;
  transition:opacity 0.08s;
}

/* ── OUTFIT OVERLAY — Ask to Dance ── */
/* This is a ritual, not a settings panel. */
#outfit-overlay{
  position:fixed;inset:0;
  background:#000;
  z-index:60;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease;
}
#outfit-overlay.active{opacity:1;pointer-events:auto;}

/* Close — barely there, top right */
#outfit-close{
  position:absolute;
  top:max(env(safe-area-inset-top,20px),20px);right:20px;
  background:none;border:none;outline:none;
  font-size:18px;color:rgba(0,255,65,0.20);
  cursor:pointer;padding:12px;
  font-family:'Courier New',Courier,monospace;
  -webkit-tap-highlight-color:transparent;
  transition:color 0.15s;
  line-height:1;
}
#outfit-close:active{color:var(--green);}

/* QR phase */
#outfit-qr-view{
  display:flex;flex-direction:column;
  align-items:center;
  transition:opacity 0.35s ease;
}

/* The QR frame — a window into the dance */
#outfit-qr-wrap{
  position:relative;
  padding:16px;
  border:1px solid rgba(0,255,65,0.15);
  margin-bottom:28px;
  /* barely-there inner glow */
  box-shadow:0 0 80px rgba(0,255,65,0.03),
             inset 0 0 30px rgba(0,255,65,0.015);
}
/* scanlines live on the QR too — it's part of this world */
#outfit-qr-wrap::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 3px,
    rgba(0,0,0,0.20) 3px,rgba(0,0,0,0.20) 4px
  );
  pointer-events:none;z-index:1;
}
#outfit-qr-canvas{display:block;}

/* Room code — the address of the dance */
#outfit-room-code{
  font-size:22px;letter-spacing:0.45em;
  color:var(--green);
  margin-bottom:10px;text-align:center;
  font-family:'Courier New',Courier,monospace;
}
#outfit-scan-label{
  font-size:8px;letter-spacing:0.55em;
  color:rgba(0,255,65,0.20);
  text-transform:uppercase;
  margin-bottom:36px;text-align:center;
}
#outfit-waiting{
  font-size:9px;letter-spacing:0.35em;
  color:rgba(0,255,65,0.35);
  text-align:center;
  animation:pulse-text 2.5s ease-in-out infinite;
}

/* Connected ceremony — replaces QR when partner connects */
#outfit-conn-view{
  display:none;flex-direction:column;
  align-items:center;gap:16px;
  text-align:center;
}
#outfit-conn-view.show{display:flex;}

#outfit-conn-glyph{
  font-size:54px;color:var(--green);
  opacity:0;transform:scale(0.82);
  transition:opacity 0.65s ease,transform 0.65s ease;
  line-height:1;
}
#outfit-conn-glyph.show{opacity:1;transform:scale(1);}

#outfit-conn-label{
  font-size:8px;letter-spacing:0.55em;
  color:rgba(0,255,65,0.25);
  text-transform:uppercase;
}
#outfit-conn-partner{
  font-size:13px;letter-spacing:0.25em;
  color:var(--green);
}

/* ── VERSION BADGE ── */
#version-badge{
  position:fixed;
  bottom:max(env(safe-area-inset-bottom,8px),8px);
  right:14px;
  font-size:8px;letter-spacing:0.25em;
  color:rgba(0,255,65,0.18);
  font-family:'Courier New',Courier,monospace;
  pointer-events:none;z-index:9999;
}

/* ── DEBUG ── */
#debug{
  position:absolute;top:0;left:0;right:0;
  background:rgba(0,0,0,0.92);
  color:var(--green);
  font-size:10px;font-family:'Courier New',monospace;
  padding:max(env(safe-area-inset-top,8px),8px) 10px 8px;
  white-space:pre;line-height:1.6;
  display:none;z-index:100;
  pointer-events:none;
  border-bottom:1px solid rgba(0,255,65,0.12);
}
#debug.visible{display:block;}
</style>
</head>
<body>

<!-- SCREEN FLASH — RUN commands -->
<div id="flash"></div>

<!-- VOICE CAPTION — always on top -->
<div id="voice-caption"></div>

<!-- ─── SCREEN 1: BOOT ─────────────────────────────────── -->
<div id="screen-listen" class="screen active">
  <canvas id="boot-canvas"></canvas>
  <div class="boot-touch-hint">∞</div>
</div>

<!-- ─── SCREEN 2: PROTOCOL SELECT ─────────────────────── -->
<div id="screen-lens" class="screen">
  <div class="sys-header">GENESIS ENGINE &nbsp;//&nbsp; SELECT <em>PROTOCOL</em></div>
  <div class="protocol-list" id="lens-scroll"></div>
  <div class="cmd-bar">
    <span class="cmd-gt">&gt;_</span>
    <input id="cmd-input" type="text"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      placeholder="RUN [PROTOCOL NAME]" />
  </div>
  <!-- hidden for JS compat -->
  <div id="lens-go"></div>
</div>

<!-- ─── SCREEN 3: PLAY ─────────────────────────────────── -->
<div id="screen-play" class="screen">
  <canvas id="canvas"></canvas>
  <div id="lens-indicator"></div>
  <div id="ask-dance-btn">DANCE</div>
  <div id="play-cmd">
    <span class="play-gt">&gt;</span>
    <input id="play-cmd-input" type="text"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      placeholder="RUN [PROTOCOL] / STOP" />
  </div>
</div>

<!-- OUTFIT OVERLAY — outside the screen stack, covers everything -->
<div id="outfit-overlay">
  <button id="outfit-close">×</button>

  <!-- Phase 1: QR code + waiting -->
  <div id="outfit-qr-view">
    <div id="outfit-qr-wrap">
      <canvas id="outfit-qr-canvas"></canvas>
    </div>
    <div id="outfit-room-code"></div>
    <div id="outfit-scan-label">scan to dance</div>
    <div id="outfit-waiting">awaiting partner</div>
  </div>

  <!-- Phase 2: Connected ceremony (auto-shows when partner arrives) -->
  <div id="outfit-conn-view">
    <div id="outfit-conn-glyph">∿</div>
    <div id="outfit-conn-label">connected</div>
    <div id="outfit-conn-partner"></div>
  </div>
</div>

<!-- DEBUG -->
<div id="debug"></div>

<!-- VERSION BADGE — always visible, always trustworthy -->
<div id="version-badge"></div>

<script src="js/voice.js?v=35"></script>
<script src="js/sensor.js?v=26"></script>
<script src="js/brain.js?v=26"></script>
<script src="js/audio.js?v=44"></script>
<script src="js/follow.js?v=75"></script>
<script src="js/lens.js?v=54"></script>
<script src="js/organism.js?v=26"></script>
<script src="js/pattern.js?v=38"></script>
<script src="js/gesture.js?v=1"></script>
<script src="js/weather.js?v=1"></script>
<script src="js/wx.js?v=1"></script>
<script src="js/outfit.js?v=1"></script>
<script src="js/app.js?v=53"></script>
</body>
</html>
