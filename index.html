<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050505">
<meta name="description" content="GUMP — 137 coupled oscillators on zeta zeros orbit 1/φ.">
<meta property="og:title" content="GUMP — The Machine">
<meta property="og:image" content="https://begump.com/og-image.png">
<link rel="canonical" href="https://begump.com/">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.png">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;}
#menu{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;gap:0;padding:20px;}
.item{display:block;text-decoration:none;text-align:center;padding:14px 40px;
  opacity:0;transform:translateY(20px);transition:opacity 1.2s ease,transform 1.2s ease;}
.item.show{opacity:1;transform:translateY(0);}
.item .name{font:200 1.3em Georgia;letter-spacing:0.12em;}
.item .desc{font:0.6em Georgia;letter-spacing:0.1em;margin-top:2px;opacity:0.3;}
.item:active{opacity:0.5;}
h1{font:200 1.8em Georgia;letter-spacing:0.2em;color:#c9a44a;opacity:0;
  transform:scale(0.8);transition:opacity 2s ease,transform 2s ease;text-align:center;}
h1.show{opacity:0.5;transform:scale(1);}
h1 span{display:block;font-size:0.25em;color:#333;letter-spacing:0.3em;margin-top:6px;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="menu">
  <h1 id="title">GUMP<span>137 zeros · K=1.868 · the orbit</span></h1>
  <a class="item" href="/r/" style="color:#c9a44a;"><div class="name">research</div><div class="desc">the full story</div></a>
  <a class="item" href="/one/" style="color:#a0c88c;"><div class="name">one</div><div class="desc">knowledge engine</div></a>
  <a class="item" href="/flex/" style="color:#c86eaa;"><div class="name">flex</div><div class="desc">100K particles · 16 shapes</div></a>
  <a class="item" href="/bloom/" style="color:#64c896;"><div class="name">bloom</div><div class="desc">nothing to life</div></a>
  <a class="item" href="/resonance/" style="color:#dc6e5a;"><div class="name">resonance</div><div class="desc">tissue targeting</div></a>
  <a class="item" href="/oracle/" style="color:#beb478;"><div class="name">oracle</div><div class="desc">primes from nothing</div></a>
</div>
<script>
// Background: particles emerge from center, drift outward, form a field
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var DPR=devicePixelRatio||1;
function resize(){cv.width=innerWidth*DPR;cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

var NP=300,t=0;
var px=new Float32Array(NP),py=new Float32Array(NP);
var pvx=new Float32Array(NP),pvy=new Float32Array(NP);
var pr=new Uint8Array(NP),pg=new Uint8Array(NP),pb=new Uint8Array(NP);
var born=new Float32Array(NP); // birth time — particles emerge over time

var colors=[[201,164,74],[160,200,140],[200,110,170],[100,200,150],[220,110,90],[190,180,120]];
var w=innerWidth,h=innerHeight;

for(var i=0;i<NP;i++){
  // All start at center, drift out
  px[i]=w/2;py[i]=h/2;
  var a=Math.random()*Math.PI*2;
  var spd=0.2+Math.random()*0.5;
  pvx[i]=Math.cos(a)*spd;pvy[i]=Math.sin(a)*spd;
  var c=colors[i%6];
  pr[i]=c[0];pg[i]=c[1];pb[i]=c[2];
  born[i]=i*0.02; // staggered births over 6 seconds
}

function render(){
  w=innerWidth;h=innerHeight;t+=0.016;
  cx.fillStyle='rgba(0,0,0,0.06)';
  cx.fillRect(0,0,w,h);
  cx.globalCompositeOperation='lighter';
  for(var i=0;i<NP;i++){
    if(t<born[i])continue; // not born yet
    var age=t-born[i];
    var fade=Math.min(1,age*0.5); // fade in over 2 seconds
    px[i]+=pvx[i];py[i]+=pvy[i];
    pvx[i]*=0.998;pvy[i]*=0.998; // slow drift
    // Gentle gravity toward center
    pvx[i]+=(w/2-px[i])*0.00003;
    pvy[i]+=(h/2-py[i])*0.00003;
    // Wrap
    if(px[i]<0)px[i]=w;if(px[i]>w)px[i]=0;
    if(py[i]<0)py[i]=h;if(py[i]>h)py[i]=0;
    cx.fillStyle='rgba('+pr[i]+','+pg[i]+','+pb[i]+','+(fade*0.08)+')';
    cx.fillRect(px[i],py[i],1,1);
  }
  cx.globalCompositeOperation='source-over';
  requestAnimationFrame(render);
}
render();

// Staggered reveal of menu items
var items=document.querySelectorAll('.item');
var title=document.getElementById('title');
setTimeout(function(){title.classList.add('show');},300);
for(var i=0;i<items.length;i++){
  (function(el,delay){
    setTimeout(function(){el.classList.add('show');},delay);
  })(items[i],800+i*400);
}
</script>
</body>
</html>
