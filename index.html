<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#050505">
<meta name="description" content="Your body is the instrument. Tilt, move, be still — GUMP turns motion into music.">

<!-- Open Graph — link previews in iMessage, social, etc. -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://begump.com/">
<meta property="og:title" content="GUMP — Your Body Is the Instrument">
<meta property="og:description" content="Tilt, move, be still. Your phone becomes a musical instrument that follows your body.">
<meta property="og:image" content="https://begump.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter / X card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="GUMP — Your Body Is the Instrument">
<meta name="twitter:description" content="Tilt, move, be still. Your phone becomes a musical instrument that follows your body.">
<meta name="twitter:image" content="https://begump.com/og-image.png">

<!-- Icons -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">

<!-- Cache-busting: tell iOS Chrome not to serve stale HTML -->
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>GUMP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<!-- Force reload when build changes. iOS WebKit caches index.html aggressively.
     BUILD must match module versions. Bump on every deploy. -->
<script>
(function(){
  var BUILD = 204;
  window.GUMP_BUILD = BUILD;
  try {
    var stored = parseInt(localStorage.getItem('gump_build') || '0', 10);
    if (stored !== BUILD) {
      localStorage.setItem('gump_build', BUILD);
      if (stored > 0) location.reload(true);
    }
  } catch(e) {}
})();
</script>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   GUMP — Fibonacci Minimalism
   A beautiful research paper meets a luxury instrument.
   Golden ratio proportions. Warm scientific. The beauty of discovering truth.
   ═══════════════════════════════════════════════════════════════════════ */

*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* Golden ratio */
  --phi:1.618;

  /* Time-of-day background — updated by JS */
  --bg-h:240;
  --bg-s:8;
  --bg-l:3;

  /* ── Warm palette ── */
  --fg:rgba(255,252,245,0.92);
  --fg-dim:rgba(255,252,245,0.55);
  --fg-ghost:rgba(255,252,245,0.18);
  --fg-whisper:rgba(255,252,245,0.08);
  --accent:rgba(255,210,150,0.65);
  --accent-warm:rgba(255,200,140,0.5);
  --accent-glow:rgba(255,210,150,0.12);
  --surface:rgba(255,252,245,0.03);
  --surface-hover:rgba(255,252,245,0.05);
  --border:rgba(255,252,245,0.06);
  --border-active:rgba(255,210,150,0.18);
  --glow:rgba(255,210,150,0.06);
  --glow-strong:rgba(255,210,150,0.10);

  /* Fonts */
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;

  /* Fibonacci spacing scale */
  --sp-1:1px; --sp-2:2px; --sp-3:3px; --sp-5:5px;
  --sp-8:8px; --sp-13:13px; --sp-21:21px; --sp-34:34px;
  --sp-55:55px; --sp-89:89px;

  /* Fibonacci type scale */
  --fs-8:8px; --fs-13:13px; --fs-21:21px; --fs-34:34px;

  /* Safe areas */
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --safe-left:env(safe-area-inset-left, 0px);
  --safe-right:env(safe-area-inset-right, 0px);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
  color:var(--fg);
  font-family:var(--sans);
  touch-action:none;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-weight:300;
  line-height:1.618; /* phi */
}


/* ═══════════════════════════════════════════════════════════════════════
   SCREENS — Three states: BOOT, LENS PICKER, PLAY
   ═══════════════════════════════════════════════════════════════════════ */

.screen{
  position:absolute;inset:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease;
  will-change:opacity;
}
.screen.active{
  opacity:1;pointer-events:auto;
}


/* ═══════════════════════════════════════════════════════════════════════
   BOOT SCREEN — The first page of a beautiful research paper.
   A single note in an empty cathedral.
   ═══════════════════════════════════════════════════════════════════════ */

#screen-listen{
  z-index:3;
  display:flex;
  align-items:center;
  justify-content:center;
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
  overflow:hidden;
}

/* Radial breathing — golden-ratio ellipse, warm amber glow */
#screen-listen::before{
  content:'';
  position:absolute;
  inset:-21%;
  background:radial-gradient(
    ellipse 61.8% 61.8% at 50% 38.2%,
    rgba(255,210,150,0.04) 0%,
    rgba(255,210,150,0.015) 38.2%,
    transparent 100%
  );
  animation:boot-breathe 8s ease-in-out infinite;
  pointer-events:none;
}

/* Secondary, deeper breathing layer */
#screen-listen::after{
  content:'';
  position:absolute;
  inset:-8%;
  background:radial-gradient(
    ellipse 50% 50% at 50% 50%,
    rgba(255,200,140,0.02) 0%,
    transparent 61.8%
  );
  animation:boot-breathe 13s ease-in-out infinite reverse;
  pointer-events:none;
}

@keyframes boot-breathe{
  0%,100%{opacity:0.3;transform:scale(1)}
  50%{opacity:1;transform:scale(1.03)}
}

/* Boot canvas — animation surface, fills screen */
#boot-canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:1;
}

/* Phi symbol — golden ratio position from top */
.boot-logo{
  position:absolute;
  top:38.2%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;

  font-family:'Georgia','Times New Roman',serif;
  font-size:55px;
  font-weight:200;
  color:rgba(255,210,150,0.10);
  letter-spacing:0.02em;
  pointer-events:none;

  /* Subtle text shadow for warmth */
  text-shadow:0 0 55px rgba(255,210,150,0.04);
}

/* "touch to begin" — breathing at the bottom, barely visible */
.boot-touch-hint{
  position:absolute;
  bottom:calc(var(--safe-bottom) + 89px);
  left:0;right:0;
  z-index:2;

  text-align:center;
  font-family:var(--sans);
  font-size:var(--fs-13);
  font-weight:200;
  letter-spacing:0.3em;
  text-transform:lowercase;
  color:rgba(255,252,245,0.35);
  animation:breathe 5s ease-in-out infinite;
}

@keyframes breathe{
  0%,100%{opacity:0.12;transform:translateY(0)}
  50%{opacity:0.4;transform:translateY(-3px)}
}

/* Legacy compat */
@keyframes pulse-text{
  0%,100%{opacity:0.25}
  50%{opacity:0.55}
}


/* ═══════════════════════════════════════════════════════════════════════
   LENS PICKER — Choose your world. Each lens is a chapter.
   ═══════════════════════════════════════════════════════════════════════ */

#screen-lens{
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
  padding-top:calc(var(--safe-top) + 55px);
  padding-bottom:calc(var(--safe-bottom) + 34px);
  padding-left:var(--sp-34);
  padding-right:var(--sp-34);
  overflow:hidden;
}

/* Header — ultra-light, generous letter spacing */
.sys-header{
  font-family:var(--sans);
  font-size:var(--fs-13);
  font-weight:200;
  letter-spacing:0.3em;
  text-transform:lowercase;
  color:rgba(255,252,245,0.35);
  margin-bottom:var(--sp-34);
  text-align:center;
  flex-shrink:0;
}
.sys-header em{
  font-style:normal;
  color:var(--accent);
}

/* Lens list container — scrollable */
.protocol-list{
  width:100%;
  max-width:340px;
  display:flex;
  flex-direction:column;
  gap:var(--sp-3);
  overflow-y:auto;
  overflow-x:hidden;
  flex:1;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  -ms-overflow-style:none;
  padding:var(--sp-5) 0;

  /* Mask the scroll edges */
  mask-image:linear-gradient(
    to bottom,
    transparent 0%,
    black 3%,
    black 97%,
    transparent 100%
  );
  -webkit-mask-image:linear-gradient(
    to bottom,
    transparent 0%,
    black 3%,
    black 97%,
    transparent 100%
  );
}
.protocol-list::-webkit-scrollbar{display:none}

/* Individual lens card */
.protocol-item{
  display:flex;
  align-items:center;
  padding:var(--sp-13) var(--sp-21);
  border:1px solid transparent;
  border-radius:var(--sp-8);
  cursor:pointer;
  transition:
    background 0.3s ease,
    border-color 0.3s ease,
    box-shadow 0.3s ease,
    transform 0.3s ease;
  -webkit-tap-highlight-color:transparent;
  gap:var(--sp-13);
  background:transparent;
  position:relative;
}

.protocol-item:active{
  background:var(--surface-hover);
  transform:scale(0.985);
}

/* Selected card — warm glow, glass surface, slightly elevated */
.protocol-item.selected{
  background:var(--glow);
  border-color:var(--border-active);
  box-shadow:
    0 0 34px rgba(255,210,150,0.05),
    0 2px 21px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,252,245,0.03);
}
.protocol-item.selected .p-cursor{opacity:1;}
.protocol-item.selected .p-name{color:rgba(255,252,245,0.95);}
.protocol-item.selected .p-desc{color:rgba(255,252,245,0.50);}

/* Selection cursor — warm amber dot */
.p-cursor{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
  flex-shrink:0;
  transition:opacity 0.3s ease;
}

.p-num{
  display:none;
}

.p-body{flex:1;min-width:0;}

.p-name{
  font-family:var(--sans);
  font-size:15px;
  font-weight:300;
  letter-spacing:0.08em;
  color:rgba(255,252,245,0.75);
  margin-bottom:var(--sp-2);
  transition:color 0.3s ease;
}

.p-desc{
  font-family:var(--sans);
  font-size:10px;
  font-weight:200;
  letter-spacing:0.02em;
  line-height:1.618;
  color:rgba(255,252,245,0.30);
  transition:color 0.3s ease;
}


/* ── Command bar (lens screen) — vestigial, nearly invisible ── */

.cmd-bar{
  margin-top:var(--sp-21);
  width:100%;
  max-width:340px;
  display:flex;
  align-items:center;
  border:1px solid rgba(255,252,245,0.03);
  border-radius:var(--sp-8);
  padding:var(--sp-8) var(--sp-21);
  gap:var(--sp-8);
  background:rgba(255,252,245,0.015);
  opacity:0.4;
  transition:opacity 0.3s ease;
  flex-shrink:0;
}
.cmd-bar:focus-within{
  opacity:0.7;
  border-color:rgba(255,252,245,0.06);
}

.cmd-gt{display:none;}

#cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--fg-dim);
  font-family:var(--sans);
  font-size:var(--fs-13);
  font-weight:200;
  letter-spacing:0.06em;
  flex:1;
  caret-color:var(--accent);
  -webkit-appearance:none;
}
#cmd-input::placeholder{
  color:var(--fg-ghost);
  font-weight:200;
}

/* Hidden go button kept for JS compat */
#lens-go{display:none}


/* ═══════════════════════════════════════════════════════════════════════
   PLAY SCREEN — Pure black canvas. The music IS the interface.
   ═══════════════════════════════════════════════════════════════════════ */

#screen-play{
  z-index:1;
  background:#000000;
}

#canvas{
  position:absolute;inset:0;
  width:100%;height:100%;
}

/* Lens name — top left, whisper weight */
#lens-indicator{
  position:absolute;
  top:calc(max(var(--safe-top), 16px) + var(--sp-5));
  left:var(--sp-21);
  font-family:var(--sans);
  font-size:9px;
  font-weight:200;
  letter-spacing:0.22em;
  text-transform:lowercase;
  color:rgba(255,252,245,0.25);
  pointer-events:none;
  transition:opacity 0.6s ease;
}

/* Dance button — top right, ghost until tapped */
#ask-dance-btn{
  position:absolute;
  top:calc(max(var(--safe-top), 16px) + var(--sp-5));
  right:var(--sp-21);
  font-family:var(--sans);
  font-size:9px;
  font-weight:200;
  letter-spacing:0.22em;
  text-transform:lowercase;
  color:rgba(255,252,245,0.15);
  pointer-events:auto;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
  padding:var(--sp-8) 0 var(--sp-8) var(--sp-21);
  transition:color 0.3s ease;
  z-index:20;
}
#ask-dance-btn:active{
  color:var(--accent);
}
#ask-dance-btn.connected{
  color:var(--accent);
  animation:breathe 3s ease-in-out infinite;
}

/* Swipe hint — gentle, fades after CSS animation */
.swipe-hint{
  position:absolute;
  bottom:calc(var(--safe-bottom) + 55px);
  left:0;right:0;
  text-align:center;
  font-family:var(--sans);
  font-size:11px;
  font-weight:200;
  letter-spacing:0.15em;
  color:rgba(255,252,245,0.25);
  pointer-events:none;
  z-index:10;
  animation:swipe-hint-fade 4s ease-in-out forwards;
}

@keyframes swipe-hint-fade{
  0%{opacity:0}
  15%{opacity:1}
  70%{opacity:1}
  100%{opacity:0}
}


/* ── Play command bar — hidden during play ── */

#play-cmd{
  position:absolute;
  bottom:0;left:0;right:0;
  display:none;
  align-items:center;
  padding:10px 18px;
  padding-bottom:max(var(--safe-bottom),10px);
  border-top:1px solid var(--border);
  background:rgba(5,5,5,0.7);
  backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);
  gap:10px;
  z-index:20;
}

.play-gt{
  color:var(--fg-ghost);
  font-size:11px;
  flex-shrink:0;
  font-family:var(--mono);
}

#play-cmd-input{
  background:transparent;border:none;outline:none;
  color:var(--fg-dim);
  font-family:var(--mono);
  font-size:11px;font-weight:300;
  letter-spacing:0.05em;
  flex:1;
  caret-color:var(--accent);
  -webkit-appearance:none;
}
#play-cmd-input::placeholder{color:var(--fg-whisper);}
#play-cmd-input:focus{color:var(--fg);}


/* ═══════════════════════════════════════════════════════════════════════
   VOICE CAPTION — hidden (audio only)
   ═══════════════════════════════════════════════════════════════════════ */

#voice-caption{display:none}


/* ═══════════════════════════════════════════════════════════════════════
   FLASH OVERLAY — screen-wide color flash on RUN commands
   ═══════════════════════════════════════════════════════════════════════ */

#flash{
  position:fixed;inset:0;
  pointer-events:none;
  opacity:0;
  z-index:800;
  transition:opacity 0.08s;
}


/* ═══════════════════════════════════════════════════════════════════════
   OUTFIT OVERLAY — Ask to Dance (P2P pairing)
   ═══════════════════════════════════════════════════════════════════════ */

#outfit-overlay{
  position:fixed;inset:0;
  background:hsl(var(--bg-h), var(--bg-s)%, var(--bg-l)%);
  z-index:60;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.6s cubic-bezier(0.4,0,0.2,1);
}
#outfit-overlay.active{opacity:1;pointer-events:auto;}

/* Close button — barely there, top right */
#outfit-close{
  position:absolute;
  top:calc(max(var(--safe-top), 21px) + var(--sp-5));
  right:var(--sp-21);
  background:none;border:none;outline:none;
  font-size:21px;
  color:rgba(255,252,245,0.18);
  cursor:pointer;
  padding:var(--sp-13);
  font-family:var(--sans);
  font-weight:200;
  -webkit-tap-highlight-color:transparent;
  transition:color 0.3s ease;
  line-height:1;
}
#outfit-close:active{color:var(--accent);}

/* QR phase */
#outfit-qr-view{
  display:flex;flex-direction:column;
  align-items:center;
  transition:opacity 0.4s ease;
}

/* QR frame — glass surface */
#outfit-qr-wrap{
  position:relative;
  padding:var(--sp-21);
  border:1px solid var(--border);
  border-radius:var(--sp-13);
  margin-bottom:var(--sp-34);
  background:var(--surface);
}
#outfit-qr-wrap::after{display:none}
#outfit-qr-canvas{display:block}

#outfit-room-code{
  font-family:var(--mono);
  font-size:21px;
  font-weight:200;
  letter-spacing:0.4em;
  color:rgba(255,252,245,0.75);
  margin-bottom:var(--sp-8);
  text-align:center;
}

#outfit-scan-label{
  font-family:var(--sans);
  font-size:9px;font-weight:200;
  letter-spacing:0.4em;
  color:var(--fg-ghost);
  text-transform:lowercase;
  margin-bottom:var(--sp-55);
  text-align:center;
}

#outfit-waiting{
  font-family:var(--sans);
  font-size:9px;font-weight:200;
  letter-spacing:0.3em;
  color:rgba(255,252,245,0.30);
  text-align:center;
  animation:breathe 4s ease-in-out infinite;
}

/* Connected phase */
#outfit-conn-view{
  display:none;
  flex-direction:column;
  align-items:center;
  gap:var(--sp-21);
  text-align:center;
}
#outfit-conn-view.show{display:flex}

#outfit-conn-glyph{
  font-size:42px;
  color:var(--accent);
  opacity:0;
  transform:scale(0.82);
  transition:opacity 0.65s ease, transform 0.65s ease;
  line-height:1;
}
#outfit-conn-glyph.show{opacity:1;transform:scale(1)}

#outfit-conn-label{
  font-family:var(--sans);
  font-size:9px;font-weight:200;
  letter-spacing:0.45em;
  color:var(--fg-ghost);
  text-transform:lowercase;
}

#outfit-conn-partner{
  font-family:var(--sans);
  font-size:var(--fs-13);
  font-weight:200;
  letter-spacing:0.2em;
  color:var(--fg);
}


/* ═══════════════════════════════════════════════════════════════════════
   VERSION BADGE — fixed bottom-right, always trustworthy
   ═══════════════════════════════════════════════════════════════════════ */

#version-badge{
  position:fixed;
  bottom:calc(max(var(--safe-bottom), 8px) + var(--sp-3));
  right:var(--sp-21);
  font-family:var(--mono);
  font-size:var(--fs-8);
  font-weight:300;
  letter-spacing:0.15em;
  color:rgba(255,252,245,0.10);
  pointer-events:none;
  z-index:9999;
}


/* ═══════════════════════════════════════════════════════════════════════
   DEBUG PANEL
   ═══════════════════════════════════════════════════════════════════════ */

#debug{
  position:absolute;top:0;left:0;right:0;
  background:rgba(5,5,5,0.82);
  color:var(--fg-dim);
  font-size:9px;
  font-family:var(--mono);
  font-weight:300;
  padding:calc(max(var(--safe-top), 8px) + var(--sp-5)) var(--sp-13) var(--sp-8);
  white-space:pre;
  line-height:1.618;
  display:none;
  z-index:100;
  pointer-events:none;
  border-bottom:1px solid rgba(255,252,245,0.04);
  backdrop-filter:blur(13px);-webkit-backdrop-filter:blur(13px);
}
#debug.visible{display:block}
</style>
</head>
<body>

<!-- SCREEN FLASH — RUN commands -->
<div id="flash"></div>

<!-- VOICE CAPTION — always on top -->
<div id="voice-caption"></div>

<!-- ─── SCREEN 1: BOOT ─────────────────────────────────── -->
<div id="screen-listen" class="screen active">
  <canvas id="boot-canvas"></canvas>
  <div class="boot-logo">&phi;</div>
  <div class="boot-touch-hint">touch to begin</div>
</div>

<!-- ─── SCREEN 2: LENS PICKER ──────────────────────────── -->
<div id="screen-lens" class="screen">
  <div class="sys-header">lenses</div>
  <div class="protocol-list" id="lens-scroll"></div>
  <div class="cmd-bar">
    <span class="cmd-gt">&gt;_</span>
    <input id="cmd-input" type="text"
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false"
      placeholder="search" />
  </div>
  <!-- hidden for JS compat -->
  <div id="lens-go"></div>
</div>

<!-- ─── SCREEN 3: PLAY ─────────────────────────────────── -->
<div id="screen-play" class="screen">
  <canvas id="canvas"></canvas>

<!-- v1→v2 compatibility shim: pattern.js, voice.js, outfit.js reference old module names -->
<script>
(function(){
  // Follow → Flow + Harmony bridge
  if (typeof Flow !== 'undefined' || typeof Harmony !== 'undefined') {
    window.Follow = {
      scaleFreq: function(d,o) { return typeof Harmony !== 'undefined' ? Harmony.freq(d,o) : 440; },
      get tempo() { return typeof Rhythm !== 'undefined' ? Rhythm.tempo : 0; },
      get confidence() { return typeof Rhythm !== 'undefined' && Rhythm.tempoLocked ? 1 : 0; },
      get archetype() { return typeof Body !== 'undefined' ? Body.archetype : 'exploring'; },
      get phase() { return typeof Flow !== 'undefined' ? (Flow.sessionPhase || 0) : 0; },
      get groovePlaying() { return typeof Rhythm !== 'undefined' && Rhythm.drumPresence > 0; },
      triggerCompression: function() {},
      applyLens: function(l) { if (typeof Flow !== 'undefined') Flow.applyLens(l); },
      init: function() { if (typeof Flow !== 'undefined') Flow.init(); },
      update: function(s,t) { if (typeof Flow !== 'undefined') Flow.update(s,t); },
    };
  }
  // Audio → Sound bridge
  if (typeof Sound !== 'undefined') {
    window.Audio = window.Audio || {};
    if (!window.Audio.ctx) {
      Object.defineProperty(window.Audio, 'ctx', { get: function() { return Sound.ctx; } });
    }
    window.Audio.synth = { play: function(v,t,f,vel,d) { Sound.play(v,t,f,vel,d); } };
    window.Audio.configure = function(l) { Sound.configure(l); };
    window.Audio.init = function(c) { Sound.init(c); };
  }
  // Brain → Body bridge
  if (typeof Body !== 'undefined') {
    window.Brain = {
      init: function() { Body.init(); },
      process: function(s,t) { Body.process(s,t); },
      short: { energy: function() { return Body.energy; } },
    };
  }
})();
</script>

<script>
/* Time-of-day ambient color — barely perceptible, felt more than seen */
(function(){
  function updateTimeColor(){
    var h=new Date().getHours(),m=new Date().getMinutes();
    var t=h+m/60; /* fractional hour */
    var hue,sat,lit;
    if(t>=5&&t<9){       /* morning: warm amber */
      hue=30;sat=12;lit=4;
    }else if(t>=9&&t<16){ /* day: clean white-blue */
      hue=210;sat=6;lit=5;
    }else if(t>=16&&t<20){/* evening: golden */
      hue=35;sat=14;lit=4;
    }else{                /* night: deep indigo */
      hue=240;sat=8;lit=3;
    }
    document.documentElement.style.setProperty('--bg-h',hue);
    document.documentElement.style.setProperty('--bg-s',sat);
    document.documentElement.style.setProperty('--bg-l',lit);
  }
  updateTimeColor();
  setInterval(updateTimeColor,60000);
})();
</script>
<script>
// ── DIAGNOSTIC OVERLAY — triple-tap or ?diag in URL ──
// Shows permission state, motion events, browser info ON SCREEN.
// Triple-tap anywhere to toggle. Copy text to paste to Claude Code.
(function(){
  var tapCount=0, tapTimer=0, diagEl=null, diagInterval=null;
  var log=[];
  function dlog(msg){log.push('['+((performance.now()/1000).toFixed(1))+'s] '+msg);if(log.length>30)log.shift();}

  window._dlog=dlog;

  function show(){
    if(diagEl){hide();return;}
    diagEl=document.createElement('div');
    diagEl.id='diag-overlay';
    diagEl.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);color:#0f0;font:11px/1.6 monospace;padding:20px;z-index:99999;overflow:auto;-webkit-user-select:text;user-select:text;touch-action:auto;';
    document.body.appendChild(diagEl);
    diagInterval=setInterval(refresh,500);
    refresh();
  }
  function hide(){
    if(diagEl){diagEl.remove();diagEl=null;}
    if(diagInterval){clearInterval(diagInterval);diagInterval=null;}
  }
  function refresh(){
    if(!diagEl)return;
    var ua=navigator.userAgent||'';
    var isChrome=/CriOS/.test(ua);
    var isSafari=/Safari/.test(ua)&&!isChrome;
    var isFirefox=/FxiOS/.test(ua);
    var browser=isChrome?'Chrome iOS':isFirefox?'Firefox iOS':isSafari?'Safari':'Unknown';

    var hasDME=typeof DeviceMotionEvent!=='undefined';
    var hasRP=hasDME&&typeof DeviceMotionEvent.requestPermission==='function';
    var hasDOE=typeof DeviceOrientationEvent!=='undefined';
    var hasORP=hasDOE&&typeof DeviceOrientationEvent.requestPermission==='function';

    var sensorState='N/A';
    if(typeof Sensor!=='undefined'){sensorState=Sensor.permissionState||'unknown';}

    var lines=[
      '=== GUMP DIAGNOSTIC ===',
      'BUILD: '+(window.GUMP_BUILD||'?'),
      'Browser: '+browser,
      '',
      '--- PERMISSION ---',
      'DeviceMotionEvent exists: '+hasDME,
      'requestPermission exists: '+hasRP,
      'DeviceOrientationEvent exists: '+hasDOE,
      'orient requestPermission exists: '+hasORP,
      'Sensor.permissionState: '+sensorState,
      '',
      '--- MOTION DATA ---',
      'motionEvents: '+(window._diagMotionCount||0),
      'orientEvents: '+(window._diagOrientCount||0),
      'lastBeta: '+(window._diagLastBeta||'none'),
      'lastGamma: '+(window._diagLastGamma||'none'),
      '',
      '--- LOG ---',
      log.join('\n'),
      '',
      '(tap to select all + copy)',
    ];
    diagEl.textContent=lines.join('\n');
  }

  // Count motion/orientation events globally
  window._diagMotionCount=0;
  window._diagOrientCount=0;
  window.addEventListener('devicemotion',function(){window._diagMotionCount++;},{passive:true});
  window.addEventListener('deviceorientation',function(e){
    window._diagOrientCount++;
    window._diagLastBeta=(e.beta||0).toFixed(1);
    window._diagLastGamma=(e.gamma||0).toFixed(1);
  },{passive:true});

  // Only show with ?debug=1 in URL — hidden from users
  if(location.search.indexOf('debug=1')>=0) setTimeout(show,1000);

  // Log permission attempts
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    var origRP=DeviceMotionEvent.requestPermission;
    DeviceMotionEvent.requestPermission=function(){
      dlog('requestPermission() CALLED');
      return origRP.apply(this,arguments).then(function(r){
        dlog('requestPermission() RESULT: '+r);
        return r;
      }).catch(function(e){
        dlog('requestPermission() ERROR: '+e);
        throw e;
      });
    };
  }

  window.gumpDiag=show;
})();
</script>
