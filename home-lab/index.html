) 70%,transparent 100%);filter:blur(2px);z-index:-1;pointer-events:none}h1{font-family:Futura,'Century Gothic',Avenir,system-ui,sans-serif;font-size:clamp(3rem,13vw,10rem);font-weight:100;line-height:.78;letter-spacing:.16em;text-indent:.16em;color:rgba(232,207,160,.82);text-shadow:0 0 12px rgba(7,4,3,.95),0 0 34px rgba(184,117,58,.28),0 0 75px rgba(184,117,58,.12);mix-blend-mode:screen;opacity:.92}.sub{margin-top:22px;font-size:.86em;line-height:1.8;color:rgba(232,207,160,.62);max-width:520px;text-shadow:0 0 10px rgba(7,4,3,.95),0 0 20px rgba(7,4,3,.9)}.gate{display:inline-flex;align-items:center;gap:10px;margin-top:20px;padding:8px 14px;border:1px solid rgba(210,150,120,.22);border-radius:999px;background:rgba(7,4,3,.58);color:rgba(232,207,160,.70);font-family:'Courier New',monospace;font-size:.68em;pointer-events:auto;backdrop-filter:blur(5px);box-shadow:0 0 22px rgba(7,4,3,.75)}.dot{width:6px;height:6px;border-radius:50%;background:#d29678;box-shadow:0 0 14px rgba(210,150,120,.55);animation:dot 2.4s ease-in-out infinite}.doors{display:flex;justify-content:center;gap:10px;pointer-events:auto}.door{position:relative;width:74px;height:74px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(var(--c),.18);background:radial-gradient(circle,rgba(0,0,0,.78),rgba(var(--c),.065) 58%,rgba(0,0,0,.22));color:rgba(var(--c),.80);font-family:Futura,'Century Gothic',Avenir,system-ui,sans-serif;font-size:.52em;letter-spacing:.08em;text-transform:uppercase;transition:.25s;overflow:hidden;box-shadow:0 0 18px rgba(7,4,3,.82)}.door:before{content:"";position:absolute;inset:20%;border-radius:50%;background:rgba(var(--c),.13);filter:blur(12px);opacity:.55}.door span{position:relative;text-shadow:0 0 8px rgba(0,0,0,.9)}.door:hover,.door.on{transform:translateY(-4px) scale(1.08);border-color:rgba(var(--c),.45);box-shadow:0 0 34px rgba(var(--c),.14),0 0 20px rgba(7,4,3,.85);color:rgba(232,207,160,.88)}.research{--c:190,140,220}.tools{--c:201,164,74}.harmonia{--c:210,150,120}.human{--c:184,117,58}.gallery{--c:126,170,238}.hint{font-family:'Courier New',monospace;color:rgba(232,207,160,.45);text-shadow:0 0 10px rgba(7,4,3,.95)}@keyframes dot{0%,100%{opacity:.35;transform:scale(.7)}50%{opacity:1;transform:scale(1.25)}}@media(max-width:700px){.ui{padding:14px}.top,.bottom{font-size:.48em}.doors{gap:6px}.door{width:58px;height:58px;font-size:.43em}h1{font-size:clamp(2.5rem,17vw,5.8rem)}.sub{font-size:.72em}.center{transform:translateY(-1vh)}.center:before{height:260px;width:92vw}}</style></head><body><canvas id="field"></canvas><div class="grain"></div><div class="ui"><div class="top"><a href="/">live</a><span>home-lab / radical field</span><a href="/home-lab/v2/">old</a></div><main class="center"><h1>GUMP</h1><div class="sub">Two fields do not blend. They strike, phase-lock, and leave a third body glowing between them.</div><a class="gate" href="/harmonia/"><span class="dot"></span><span id="gate">i'm here</span></a></main><div class="bottom"><nav class="doors"><a class="door research" data-tune="research" href="/research/doors/"><span>research</span></a><a class="door tools" data-tune="tools" href="/products/"><span>tools</span></a><a class="door harmonia" data-tune="harmonia" href="/harmonia/"><span>harmonia</span></a><a class="door human" data-tune="human" href="/music/"><span>human</span></a><a class="door gallery" data-tune="gallery" href="/gallery/"><span>art</span></a></nav><span class="hint" id="hint">0 + 0 → 1</span></div></div><script>(function(){'use strict';var cv=document.getElementById('field'),cx=cv.getContext('2d'),doors=[].slice.call(document.querySelectorAll('.door')),hint=document.getElementById('hint'),gate=document.getElementById('gate');var W=0,H=0,D=1,t=0,TAU=Math.PI*2,GA=2.399963229728653,N=137,nodes=[],sparks=[],hover=-1,mouse={x:0,y:0,on:false},zones=[];var C={gold:[184,117,58],blue:[80,132,168],rose:[210,150,120],white:[232,207,160],violet:[190,140,220],green:[122,154,106],art:[126,170,238],dark:[7,4,3]};var R=0,phase=0,third=0,shock=0,cycle=0,zTick=0;function clamp(x,a,b){return Math.max(a,Math.min(b,x))}function smooth(x){x=clamp(x,0,1);return x*x*(3-2*x)}function mix(a,b,u){return a+(b-a)*u}function rgba(c,a){return'rgba('+c[0]+','+c[1]+','+c[2]+','+clamp(a,0,1).toFixed(4)+')'}function S(){return Math.min(W,H)}function refreshZones(){var els=[document.querySelector('h1'),document.querySelector('.sub'),document.querySelector('.gate')].concat(doors).filter(Boolean);zones=els.map(function(el){var r=el.getBoundingClientRect(),pad=el.classList&&el.classList.contains('door')?18:44;return{x:r.left-pad,y:r.top-pad,w:r.width+pad*2,h:r.height+pad*2,cx:r.left+r.width/2,cy:r.top+r.height/2,r:Math.max(r.width+pad*2,r.height+pad*2)*.72,door:el.classList&&el.classList.contains('door')}})}function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*D;cv.height=H*D;cx.setTransform(D,0,0,D,0,0);refreshZones();if(!nodes.length)init()}function seedPos(i,side){var k=side?i-69:i,count=side?68:69,a=k*GA,r=Math.sqrt(k+1)/Math.sqrt(count)*S()*.25;return{x:W/2+(side?1:-1)*S()*.18+Math.cos(a)*r*.76,y:H*.49+Math.sin(a)*r*.82}}function init(){nodes=[];sparks=[];for(var i=0;i<N;i++){var side=i>=69,p=seedPos(i,side);nodes.push({i:i,side:side?1:0,x:p.x,y:p.y,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,phase:Math.random()*TAU,w:.25+Math.random()*.9,heat:.1,lock:0,seed:Math.random()*TAU,size:.7+Math.random()*1.7,trail:[]})}}function order(){var re=0,im=0;for(var i=0;i<N;i++){re+=Math.cos(nodes[i].phase);im+=Math.sin(nodes[i].phase)}re/=N;im/=N;R=Math.sqrt(re*re+im*im);phase=Math.atan2(im,re);third+=(R-third)*.025}function attractor(i){var n=nodes[i],side=n.side?1:-1,stage=(t/9)%4,st=Math.floor(stage),u=smooth(stage%1),x=0,y=0,s=S();if(st===0){var p=seedPos(i,n.side);x=mix(p.x,W/2+side*s*.12,u);y=mix(p.y,H*.49+Math.sin(n.seed+t*.3)*s*.04,u)}else if(st===1){var a=i*GA+t*.25,r=Math.sqrt(i/N)*s*.36;x=W/2+Math.cos(a)*r;y=H*.49+Math.sin(a)*r*.72}else if(st===2){var k=i/N,a2=k*TAU*3+t*.58,r2=s*(.12+k*.26);x=W/2+Math.cos(a2)*r2;y=H*.49+Math.sin(a2)*r2*.62}else{var k2=i/N,th=-Math.PI*.92+k2*Math.PI*1.84;x=W/2+side*(s*.08+Math.cos(th)*s*.20);y=H*.49+Math.sin(th)*s*.17}return{x:x,y:y}}function doorField(n){var out={x:0,y:0,g:0};if(hover<0)return out;var r=doors[hover].getBoundingClientRect(),x=r.left+r.width/2,y=r.top+r.height/2,dx=x-n.x,dy=y-n.y,d=Math.hypot(dx,dy)||1,rad=360;if(d<rad){var g=1-d/rad,p=.038*g*g;out.x=dx/d*p;out.y=dy/d*p;out.g=g}return out}function repelText(n){for(var i=0;i<zones.length;i++){var z=zones[i],nx=clamp(n.x,z.x,z.x+z.w),ny=clamp(n.y,z.y,z.y+z.h),dx=n.x-nx,dy=n.y-ny,d=Math.hypot(dx,dy)||.001,inf=z.door?58:120;if(d<inf){var f=(1-d/inf);n.vx+=dx/d*f*(z.door?.035:.115);n.vy+=dy/d*f*(z.door?.035:.115);n.heat=Math.min(1,n.heat+f*.015)}}}function inRect(p,z){return p.x>=z.x&&p.x<=z.x+z.w&&p.y>=z.y&&p.y<=z.y+z.h}function ccw(ax,ay,bx,by,cx0,cy0){return(cy0-ay)*(bx-ax)>(by-ay)*(cx0-ax)}function seg(ax,ay,bx,by,cx0,cy0,dx,dy){return ccw(ax,ay,cx0,cy0,dx,dy)!==ccw(bx,by,cx0,cy0,dx,dy)&&ccw(ax,ay,bx,by,cx0,cy0)!==ccw(ax,ay,bx,by,dx,dy)}function lineHits(a,b,z){if(inRect(a,z)||inRect(b,z))return true;var x=z.x,y=z.y,w=z.w,h=z.h;return seg(a.x,a.y,b.x,b.y,x,y,x+w,y)||seg(a.x,a.y,b.x,b.y,x+w,y,x+w,y+h)||seg(a.x,a.y,b.x,b.y,x+w,y+h,x,y+h)||seg(a.x,a.y,b.x,b.y,x,y+h,x,y)}function blocked(a,b){for(var i=0;i<zones.length;i++)if(lineHits(a,b,zones[i]))return true;return false}function step(){t+=.016;cycle+=.016;if((zTick++%18)===0)refreshZones();order();if(cycle>7.5){shock=1;cycle=0;for(var s=0;s<44;s++)sparks.push({x:W/2,y:H*.49,a:Math.random()*TAU,v:1+Math.random()*4,life:1,col:Math.random()<.5?C.rose:C.white})}shock*=.965;for(var i=0;i<N;i++){var n=nodes[i],tar=attractor(i);n.phase+=.012*(n.w+1.868*Math.sin(phase-n.phase)+(.18+third*.55+shock*.7)*Math.sin(phase-n.phase));var dx=tar.x-n.x,dy=tar.y-n.y,d=Math.hypot(dx,dy)||1,lock=clamp(1-d/(28+shock*90),0,1);n.lock+=(lock-n.lock)*.055;var L=smooth(n.lock),pull=.0035+R*.004+L*.040+shock*.008;n.vx+=dx*pull;n.vy+=dy*pull;if(L>.15){n.vx*=1-L*.42;n.vy*=1-L*.42}for(var j=(i+13)%N,c=0;c<10;c++,j=(j+19)%N){if(j===i)continue;var m=nodes[j],xx=m.x-n.x,yy=m.y-n.y,dd=Math.hypot(xx,yy)||1;if(dd>140)continue;var pd=Math.abs(m.phase-n.phase)%TAU;if(pd>Math.PI)pd=TAU-pd;var sy=1-pd/Math.PI;if(dd<24){n.vx-=xx/dd*(24-dd)*.0012;n.vy-=yy/dd*(24-dd)*.0012}if(sy>.82&&dd>42){n.vx+=xx/dd*sy*.008;n.vy+=yy/dd*sy*.008}}var df=doorField(n);n.vx+=df.x;n.vy+=df.y;n.heat=Math.min(1,n.heat+df.g*.012+shock*.020+third*.002);if(mouse.on){var mx=mouse.x-n.x,my=mouse.y-n.y,md=Math.hypot(mx,my)||1;if(md<300){var f=(1-md/300)*.018;n.vx+=mx/md*f;n.vy+=my/md*f}}repelText(n);n.vx+=Math.cos(n.seed+t*.4)*.006*(1-L);n.vy+=Math.sin(n.seed+t*.34)*.006*(1-L);n.vx*=.925-L*.02;n.vy*=.925-L*.02;var sp=Math.hypot(n.vx,n.vy),max=1.4+shock*2.5;if(sp>max){n.vx*=max/sp;n.vy*=max/sp}n.x+=n.vx;n.y+=n.vy;n.heat+=(Math.max(R,L,third)-n.heat)*.008;n.trail.push({x:n.x,y:n.y,h:n.heat});if(n.trail.length>10)n.trail.shift()}for(var q=sparks.length-1;q>=0;q--){var spk=sparks[q];spk.x+=Math.cos(spk.a)*spk.v;spk.y+=Math.sin(spk.a)*spk.v;spk.v*=.985;spk.life*=.965;if(spk.life<.02)sparks.splice(q,1)}if(hint)hint.textContent=shock>.45?'third body event':third>.55?'1 + 1 → 3':'0 + 0 → 1';if(gate)gate.textContent=third>.62?'the 3 is glowing':"i'm here"}function line(a,b,c,al,w){if(blocked(a,b))return;cx.strokeStyle=rgba(c,al);cx.lineWidth=w;cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke()}function rawLine(a,b,c,al,w){cx.strokeStyle=rgba(c,al);cx.lineWidth=w;cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke()}function drawBg(){cx.fillStyle='rgba(7,4,3,.22)';cx.fillRect(0,0,W,H);cx.globalCompositeOperation='lighter';var cx0=W/2,cy0=H*.49,s=S();for(var r=0;r<6;r++){cx.strokeStyle=rgba(r%2?C.rose:C.gold,.012+r*.004+third*.018+shock*.035);cx.lineWidth=.6+shock*1.8;cx.beginPath();cx.ellipse(cx0,cy0,s*(.10+r*.055+third*.018+shock*.08),s*(.055+r*.034+third*.011+shock*.045),Math.sin(t*.15+r)*.4,0,TAU);cx.stroke()}var g=cx.createRadialGradient(cx0,cy0,0,cx0,cy0,s*(.12+third*.38+shock*.26));g.addColorStop(0,rgba(C.rose,.020+third*.090+shock*.12));g.addColorStop(.38,rgba(C.gold,.010+R*.035));g.addColorStop(1,'rgba(210,150,120,0)');cx.fillStyle=g;cx.fillRect(0,0,W,H)}function drawLinks(){for(var i=0;i<N;i++){var a=nodes[i];for(var j=i+5;j<N;j+=9){var b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);if(d>132)continue;var pd=Math.abs(a.phase-b.phase)%TAU;if(pd>Math.PI)pd=TAU-pd;var sync=1-pd/Math.PI;if(sync<.80)continue;var same=a.side===b.side,col=same?(a.side?C.blue:C.gold):C.rose;line(a,b,col,(1-d/132)*sync*sync*(same?.045:.060)*(1+third+shock*2),same?.45:.65+third*1.1)}}}function drawThird(){var ax=0,ay=0,ac=0,bx=0,by=0,bc=0;for(var i=0;i<N;i++){var n=nodes[i];if(n.side){bx+=n.x;by+=n.y;bc++}else{ax+=n.x;ay+=n.y;ac++}}ax/=ac;ay/=ac;bx/=bc;by/=bc;rawLine({x:ax,y:ay},{x:bx,y:by},C.rose,.05+third*.11+shock*.14,1.4+third*2.8+shock*5);var x=(ax+bx)/2,y=(ay+by)/2,s=S()*(.08+third*.17+shock*.10),g=cx.createRadialGradient(x,y,0,x,y,s);g.addColorStop(0,rgba(C.rose,.030+third*.18+shock*.22));g.addColorStop(.45,rgba(C.white,.010+third*.035+shock*.08));g.addColorStop(1,'rgba(210,150,120,0)');cx.fillStyle=g;cx.fillRect(x-s,y-s,s*2,s*2)}function drawNodes(){for(var i=0;i<N;i++){var n=nodes[i],col=n.side?C.blue:C.gold;if(hover>=0){var tune=doors[hover].dataset.tune;if(tune==='research')col=n.side?C.violet:C.blue;if(tune==='tools')col=n.side?C.green:C.gold;if(tune==='harmonia')col=n.side?C.rose:C.gold;if(tune==='human')col=n.side?C.gold:C.rose;if(tune==='gallery')col=n.side?C.art:C.rose}for(var k=1;k<n.trail.length;k++){var a=n.trail[k-1],b=n.trail[k],u=k/n.trail.length;line(a,b,col,u*u*.025*(1+n.heat),.35+u*.7)}var pulse=.5+.5*Math.sin(n.phase),L=smooth(n.lock),sz=n.size*(.9+pulse*.75)*(1+n.heat*.25+L*.35+shock*.55),al=.20+pulse*.22+n.heat*.13+L*.14+third*.06;cx.save();cx.translate(n.x,n.y);cx.rotate(n.phase+i*.02);cx.strokeStyle=rgba(col,al);cx.fillStyle=rgba(col,al);cx.lineWidth=.55+sz*.18;if(L>.45||third>.55){cx.beginPath();cx.arc(0,0,sz*1.85,0,TAU);cx.stroke()}if(shock>.15){cx.strokeStyle=rgba(C.rose,shock*.09);cx.beginPath();cx.moveTo(-sz*2.4,0);cx.lineTo(sz*2.4,0);cx.moveTo(0,-sz*2.4);cx.lineTo(0,sz*2.4);cx.stroke();cx.fillStyle=rgba(col,al)}if(n.lock>.55){cx.beginPath();cx.arc(0,0,sz*.65,0,TAU);cx.fill()}else{cx.beginPath();cx.arc(0,0,sz,0,TAU);cx.fill()}cx.restore()}}function drawSparks(){for(var i=0;i<sparks.length;i++){var s=sparks[i],skip=false;for(var z=0;z<zones.length;z++)if(inRect(s,zones[z])){skip=true;break}if(skip)continue;cx.fillStyle=rgba(s.col,s.life*.45);cx.beginPath();cx.arc(s.x,s.y,1+s.life*3,0,TAU);cx.fill()}}function drawDoors(){for(var i=0;i<doors.length;i++){var r=doors[i].getBoundingClientRect(),x=r.left+r.width/2,y=r.top+r.height/2,rad=r.width*.9,hot=hover===i?1:0,col=i===0?C.violet:i===1?C.gold:i===2?C.rose:i===3?C.gold:C.art,g=cx.createRadialGradient(x,y,0,x,y,rad*(1.4+hot*.5));g.addColorStop(0,rgba(col,.010+hot*.055+third*.008));g.addColorStop(1,'rgba('+col[0]+','+col[1]+','+col[2]+',0)');cx.fillStyle=g;cx.fillRect(x-rad*2,y-rad*2,rad*4,rad*4)}}function carveVoid(){cx.globalCompositeOperation='source-over';for(var i=0;i<zones.length;i++){var z=zones[i],rad=z.r*(z.door?.78:1.05),g=cx.createRadialGradient(z.cx,z.cy,0,z.cx,z.cy,rad);g.addColorStop(0,'rgba(7,4,3,.78)');g.addColorStop(.52,'rgba(7,4,3,.44)');g.addColorStop(1,'rgba(7,4,3,0)');cx.fillStyle=g;cx.fillRect(z.cx-rad,z.cy-rad,rad*2,rad*2)}}function draw(){step();drawBg();drawDoors();drawLinks();drawThird();drawSparks();drawNodes();carveVoid();requestAnimationFrame(draw)}doors.forEach(function(el,i){el.addEventListener('mouseenter',function(){hover=i;doors.forEach(function(d){d.classList.remove('on')});el.classList.add('on')});el.addEventListener('mouseleave',function(){hover=-1;el.classList.remove('on')})});addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;mouse.on=true},{passive:true});addEventListener('mouseleave',function(){mouse.on=false},{passive:true});addEventListener('resize',resize,{passive:true});addEventListener('scroll',refreshZones,{passive:true});cv.addEventListener('click',function(){shock=1;cycle=0});resize();draw();})();</script></body></html>
