function node(n,form,hit){var tune=hover>=0?doors[hover].dataset.tune:null,col=n.flock?C.blue:C.gold;if(tune==='research')col=n.flock?C.violet:C.blue;if(tune==='tools')col=n.flock?C.green:C.brass;if(tune==='harmonia')col=n.flock?C.rose:C.gold;if(tune==='human')col=n.flock?C.brass:C.gold;if(tune==='gallery')col=n.flock?C.art:C.rose;var b=.5+.5*Math.sin(n.phase),L=smooth(n.lock),size=n.size*(.78+b*.62)*(1+n.heat*.22+hit*.55+L*.20+third*.10),alpha=.22+b*.23+n.heat*.12+hit*.22+L*.12+third*.06;cx.save();cx.translate(n.x,n.y);cx.rotate(n.phase+n.i*.03);cx.strokeStyle=rgba(col,alpha*.78);cx.fillStyle=rgba(col,alpha);cx.lineWidth=.55+size*.18+L*.12;if(form.from==='phase'){cx.beginPath();cx.arc(-size*.72,0,size*.44,0,TAU);cx.arc(size*.72,0,size*.44,0,TAU);cx.stroke()}else if(form.from==='pulse'){cx.beginPath();cx.arc(0,0,size*1.15,0,TAU);cx.stroke();cx.beginPath();cx.arc(0,0,size*.35,0,TAU);cx.fill()}else if(form.from==='flock'){cx.beginPath();cx.moveTo(-size*1.4,-size*.25);cx.quadraticCurveTo(0,size*.45,size*1.4,size*.05);cx.stroke()}else if(form.from==='flower'){cx.beginPath();cx.moveTo(-size*1.55,0);cx.lineTo(size*1.55,0);cx.moveTo(0,-size*1.55);cx.lineTo(0,size*1.55);cx.stroke()}else if(form.from==='mirror'){cx.beginPath();cx.arc(0,0,size*1.25,0,TAU);cx.stroke();cx.fillStyle=rgba(C.rose,alpha*.24);cx.beginPath();cx.arc(0,0,size*.36,0,TAU);cx.fill()}else{cx.beginPath();cx.arc(0,0,size,0,TAU);cx.fill()}if(L>.55){cx.strokeStyle=rgba(C.rose,.025*L+third*.012);cx.beginPath();cx.arc(0,0,size*2.18,0,TAU);cx.stroke()}cx.restore();if(hit>.02){var gg=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,size*8);gg.addColorStop(0,rgba(C.rose,hit*.12));gg.addColorStop(1,'rgba(210,150,120,0)');cx.fillStyle=gg;cx.fillRect(n.x-size*8,n.y-size*8,size*16,size*16)}}
