// Position nodes on orbits
function positionNodes() {
  var scale = Math.min(W, H) / 3.0; // smaller on mobile
  if (W < 600) scale = Math.min(W, H) / 2.2; // tighter on phone
  var orbits = [0, scale * 0.32, scale * 0.32, scale * 0.58, scale * 0.58];
  var groupIdx = [0,0,0,0,0];
  var groupCount = [0,0,0,0,0];
  nodes.forEach(function(n) { groupCount[n.g]++; });

  nodes.forEach(function(n, i) {
    var g = n.g;
    var idx = groupIdx[g]++;
    var count = groupCount[g];

    if (g === 0 && idx === 0) {
      n.baseX = CX; n.baseY = CY; // K at center
    } else {
      var orbit = orbits[g];
      // Spread groups into quadrants
      var groupAngleBase = [0, -Math.PI/2, Math.PI/2, Math.PI, 0][g];
      var spread = Math.PI * 0.8;
      var angle = groupAngleBase - spread/2 + (idx / (count-1 || 1)) * spread;

      if (g === 0) { // inner orbit for framework
        orbit = scale * 0.15;
        angle = idx * Math.PI * 2 / (count - 1) + Math.PI/4;
      }

      n.baseX = CX + Math.cos(angle) * orbit;
      n.baseY = CY + Math.sin(angle) * orbit;
    }
    n.x = n.baseX;
    n.y = n.baseY;
    n.size = W < 600 ? (2 + n.k * 2) : (3 + n.k * 3);
    n.phase = Math.random() * Math.PI * 2;
  });
}

// ═══ SCROLL TRACKING ═══
addEventListener('scroll', function() {
  scrollY = pageYOffset;
  scrollMax = document.documentElement.scrollHeight - innerHeight;
  var frac = scrollMax > 0 ? scrollY / scrollMax : 0;

  // Map scroll to focus group
  // Mobile: start on framework (never show all at once — too crowded)
  // Desktop: start with all visible
  var isMobile = W < 600;
  if (isMobile) {
    // Mobile: framework first, then each group as you scroll
    if (frac < 0.16) focusGroup = 0; // start on framework, not all
    else if (frac < 0.33) focusGroup = 1;
    else if (frac < 0.50) focusGroup = 2;
    else if (frac < 0.67) focusGroup = 3;
    else focusGroup = 4;
  } else {
  // Desktop: show all first, then focus
  if (frac < 0.16) focusGroup = -1;
  else if (frac < 0.33) focusGroup = 0;
  else if (frac < 0.50) focusGroup = 1;
  else if (frac < 0.67) focusGroup = 2;
  else if (frac < 0.84) focusGroup = 3;
  else focusGroup = 4;
  }

  // The loop — when you hit bottom, scroll back to top but MORE ALIVE
  // Each cycle adds coupling. The spiral goes up. 1+1=3.
  if (frac > 0.98 && !wasAtBottom) {
    wasAtBottom = true;
    cycles++;
    aliveness = 1 + cycles * 0.3; // 30% more alive each cycle
    // Add more dust each cycle
    for (var di = 0; di < 15; di++) {
      dust.push({x:Math.random()*W, y:Math.random()*H, s:0.3+Math.random()*1.5,
        v:0.05+Math.random()*0.2, a:Math.random()*0.04+0.01, phase:Math.random()*6.28});
    }
    // Scroll back to top after a breath
    setTimeout(function() { window.scrollTo({top: 0, behavior: 'smooth'}); }, 600);
  }
  if (frac < 0.05) wasAtBottom = false;

  // Update zone labels
  document.querySelectorAll('.zone').forEach(function(z) {
    z.classList.toggle('active', parseInt(z.dataset.group) === focusGroup);
  });
});

// ═══ MOUSE TRACKING ═══

  var closestD = 40;
  nodes.forEach(function(n, i) {
    var dx = n.x - mouseX, dy = n.y - mouseY;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d < closestD) { closestD = d; hoverNode = i; }
  });

  // Update info panel
  var panel = document.getElementById('info-panel');
  if (hoverNode >= 0) {
    var nd = nodes[hoverNode];
    document.getElementById('info-name').textContent = nd.n;
    document.getElementById('info-desc').textContent = nd.desc;
    document.getElementById('info-link').href = nd.href;
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
});

});
cv.style.cursor = 'default';
addEventListener('mousemove', function() {
  cv.style.cursor = hoverNode >= 0 ? 'pointer' : 'default';
});

} // end desktop-only touch/click

// ═══ RENDER ═══
function render() {
  t += 0.008;

  // Soft fade instead of hard clear — gives trails
  cx.fillStyle = 'rgba(8,8,13,0.15)';
  cx.fillRect(0, 0, W, H);

  // Film grain
  if (Math.random() > 0.7) {
    for (var gi = 0; gi < 20; gi++) {
      var gx = Math.random() * W, gy = Math.random() * H;
      cx.fillStyle = 'rgba(139,69,19,' + (Math.random() * 0.008).toFixed(4) + ')';
      cx.fillRect(gx, gy, 1, 1);
    }
  }

  // Dust particles — warm motes drifting
  for (var di = 0; di < dust.length; di++) {
    var dp = dust[di];
    dp.phase += 0.01;
    dp.y -= dp.v;
    dp.x += Math.sin(dp.phase) * 0.3;
    if (dp.y < -10) { dp.y = H + 10; dp.x = Math.random() * W; }
    if (dp.x < 0) dp.x = W;
    if (dp.x > W) dp.x = 0;

    var da = dp.a * (0.5 + Math.sin(dp.phase * 2) * 0.5);
    cx.fillStyle = 'rgba(139,69,19,' + da.toFixed(4) + ')';
    cx.beginPath();
    cx.arc(dp.x, dp.y, dp.s, 0, Math.PI * 2);
    cx.fill();
  }

  // Update node positions — focused group spreads, others contract
  nodes.forEach(function(n, i) {
    var isFocused = (focusGroup === -1 || n.g === focusGroup);
    var targetScale = isFocused ? 1.0 * aliveness : 0.7;
    var targetAlpha = isFocused ? Math.min(1.0, 0.7 + cycles * 0.1) : 0.15;

    // Breathing
    n.phase += 0.02 + n.k * 0.01;
    var breathe = 1 + Math.sin(n.phase) * (0.15 + cycles * 0.05); // breathes deeper each cycle

    // Focused nodes spread out slightly
    if (isFocused && focusGroup !== -1) {
      var dx = n.baseX - CX, dy = n.baseY - CY;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      n.x += ((CX + dx * 1.15) - n.x) * 0.05;
      n.y += ((CY + dy * 1.15) - n.y) * 0.05;
    } else {
      n.x += (n.baseX - n.x) * 0.05;
      n.y += (n.baseY - n.y) * 0.05;
    }

    n._scale = (n._scale || 1) + (targetScale - (n._scale || 1)) * 0.08;
    n._alpha = (n._alpha || 1) + (targetAlpha - (n._alpha || 1)) * 0.08;
    n._breathe = breathe;
  });

  // Draw edges between same-group nodes
  cx.globalCompositeOperation = 'lighter';
  for (var i = 0; i < N; i++) {
    for (var j = i + 1; j < N; j++) {
      if (nodes[i].g !== nodes[j].g) continue;
      var a = nodes[i], b = nodes[j];
      var alpha = Math.min(a._alpha, b._alpha) * (0.06 + cycles * 0.02); // connections strengthen each cycle
      if (alpha < 0.005) continue;

      var col = a.color || groups[a.g].color;
      cx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + alpha.toFixed(3) + ')';
      cx.lineWidth = 0.5;
      cx.beginPath();
      cx.moveTo(a.x, a.y);
      cx.lineTo(b.x, b.y);
      cx.stroke();
    }
  }

  // Draw cross-group edges to K (center)
  var kNode = nodes[0];
  for (var i = 1; i < N; i++) {
    var n = nodes[i];
    var alpha = n._alpha * 0.02;
    if (alpha < 0.003) continue;
    cx.strokeStyle = 'rgba(139,69,19,' + alpha.toFixed(3) + ')';
    cx.lineWidth = 0.3;
    cx.beginPath();
    cx.moveTo(kNode.x, kNode.y);
    cx.lineTo(n.x, n.y);
    cx.stroke();
  }

  cx.globalCompositeOperation = 'source-over';

  // Draw nodes
  for (var i = 0; i < N; i++) {
    var n = nodes[i];
    var col = n.color || groups[n.g].color;
    var size = n.size * n._scale * n._breathe;
    var alpha = n._alpha;
    var isHover = (i === hoverNode);

    if (isHover) { size *= 2; alpha = 1; }

    // Ghost nodes flicker
    if (n.ghost) {
      alpha *= 0.3 + Math.sin(t * 3 + i * 7) * 0.15;
    }

    // Glow
    if (alpha > 0.1) {
      var grad = cx.createRadialGradient(n.x, n.y, 0, n.x, n.y, size * 4);
      grad.addColorStop(0, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (alpha * 0.08).toFixed(3) + ')');
      grad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
      cx.fillStyle = grad;
      cx.beginPath();
      cx.arc(n.x, n.y, size * 4, 0, Math.PI * 2);
      cx.fill();
    }

    // Node dot
    cx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + alpha.toFixed(3) + ')';
    cx.beginPath();
    cx.arc(n.x, n.y, size, 0, Math.PI * 2);
    cx.fill();

    // Label
    if (isHover || (alpha > 0.5 && size > 4)) {
      cx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (alpha * 0.7).toFixed(3) + ')';
      cx.font = (isHover ? '12' : '9') + 'px Georgia';
      cx.textAlign = 'center';
      cx.fillText(n.n, n.x, n.y - size - 6);
    }
  }

  // Stats
  document.getElementById('stats').textContent =
    N + ' nodes · ' + groups[focusGroup >= 0 ? focusGroup : 0].name +
    ' · K=' + (focusGroup >= 0 ? nodes.filter(function(n){return n.g===focusGroup}).length : N);

  requestAnimationFrame(render);
}
render();

// ═══ MOBILE CARDS — generated from the same node data ═══
if (W < 600) {
  var mc = document.getElementById('mobile-cards');
  var groupNames = ['The Framework', 'Biology', 'Physics', 'Applied', 'Foundation'];
  var currentGroup = -1;

  nodes.forEach(function(n) {
    if (n.g !== currentGroup) {
      currentGroup = n.g;
      var title = document.createElement('div');
      title.className = 'group-title';
      title.textContent = groupNames[currentGroup] || '';
      mc.appendChild(title);
    }

    var card = document.createElement('a');
    card.className = 'card';
    card.href = n.href;

    var h3 = document.createElement('h3');
    h3.textContent = n.n;
    card.appendChild(h3);

    if (n.locked) {
      var lock = document.createElement('div');
      lock.className = 'locked';
      lock.textContent = n.desc;
      card.appendChild(lock);
    } else {
      var p = document.createElement('p');
      p.textContent = n.desc;
      card.appendChild(p);
    }

    mc.appendChild(card);
  });
}

})();
</script>
<script src="/js/breathe.js?v=3"></script>
</body>
