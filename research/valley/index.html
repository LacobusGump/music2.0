<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Valley — GUMP Research</title>
<meta name="description" content="One landscape, no walls. Every piece of the GUMP archive — biology, cosmology, networks, the proofs, the music — laid into a single living place. Same coupling everywhere.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#f2f6ee;--muted:rgba(242,246,238,.74);--hair:rgba(242,246,238,.22);--gold:#ecc879;--gold2:#f8e6b0}
html,body{height:100%}
body{overflow:hidden;color:var(--paper);font-family:Georgia,"Times New Roman",serif;background:#0b1622;-webkit-font-smoothing:antialiased}
a{color:inherit}
.fut{font-family:Futura,"Century Gothic",sans-serif;letter-spacing:.16em;text-transform:uppercase}

/* full-viewport day/night backdrop (fills any letterbox) */
.backdrop{position:fixed;inset:0;transition:opacity 1.8s ease}
.bd-day{background:linear-gradient(180deg,#76b1d8,#aed8e2 46%,#e7eecf 72%,#efe6c4)}
.bd-night{opacity:0;background:linear-gradient(180deg,#060c1e,#0e1a34 46%,#1b3047 78%,#243a50)}
body.night .bd-day{opacity:0}
body.night .bd-night{opacity:1}

#stage{position:fixed;inset:0}
svg.land{position:absolute;inset:0;width:100%;height:100%;display:block}
.world{transition:filter 1.8s ease}
body.night .world{filter:brightness(.52) saturate(.74) hue-rotate(6deg)}
.sky-day,.cloud,.sun{transition:opacity 1.8s ease}
.sky-night,.stars,.moon{opacity:0;transition:opacity 1.8s ease}
body.night .sky-day,body.night .cloud,body.night .sun{opacity:0}
body.night .sky-night,body.night .stars,body.night .moon{opacity:1}
.star{animation:tw 4s ease-in-out infinite}
@keyframes tw{50%{opacity:.2}}

/* hotspots (inside the svg → locked to the art) */
.spot{cursor:pointer}
.spot .halo{transform-box:fill-box;transform-origin:center;animation:beat 2.8s ease-in-out infinite}
@keyframes beat{0%{transform:scale(.6);opacity:.5}70%,100%{transform:scale(2.3);opacity:0}}
.spot .dot{filter:url(#soft)}
.spot:hover .dot,.spot:focus-visible .dot{transform-box:fill-box;transform-origin:center;transform:scale(1.25)}
.spot .lab{font-family:Futura,"Century Gothic",sans-serif;font-size:15px;letter-spacing:.12em;text-transform:uppercase;
  text-anchor:middle;fill:#fff;paint-order:stroke;stroke:rgba(8,16,24,.55);stroke-width:3px;opacity:.55;transition:opacity .25s}
.spot:hover .lab,.spot:focus-visible .lab{opacity:1}
body.night .spot .lab{fill:#f4ead0}

/* chrome */
.top{position:fixed;z-index:30;top:16px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;pointer-events:none}
.top>*{pointer-events:auto}
.brand .k{font-size:11px;color:var(--muted)}
.brand h1{font-weight:400;font-size:clamp(28px,4.6vw,50px);line-height:.95;text-shadow:0 2px 20px rgba(0,0,0,.4)}
.brand p{max-width:31rem;margin-top:7px;font-size:13.5px;line-height:1.42;color:var(--muted);text-shadow:0 1px 9px rgba(0,0,0,.45)}
.tools{display:flex;gap:8px}
.btn{display:inline-grid;place-items:center;min-height:40px;padding:0 14px;border-radius:999px;border:1px solid var(--hair);
  background:rgba(8,16,22,.4);backdrop-filter:blur(8px);color:var(--paper);font-size:11px;cursor:pointer;text-decoration:none}
.btn:hover{border-color:rgba(248,230,176,.6)}
.btn .ic{margin-right:7px}.home{width:40px;padding:0}

/* panel */
.scrim{position:fixed;inset:0;z-index:40;display:none;background:rgba(4,10,14,.55);backdrop-filter:blur(3px)}
.scrim.on{display:block}
.panel{position:fixed;z-index:41;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);opacity:0;width:min(560px,92vw);
  max-height:86vh;overflow:auto;display:none;border:1px solid rgba(248,230,176,.34);border-radius:16px;padding:26px 26px 22px;
  background:linear-gradient(180deg,rgba(20,34,32,.97),rgba(9,17,20,.98));box-shadow:0 30px 80px rgba(0,0,0,.6);transition:opacity .25s,transform .25s}
.panel.on{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
.panel .x{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1px solid var(--hair);background:rgba(0,0,0,.25);color:var(--paper);cursor:pointer}
.panel .glyph{font-size:30px}.panel .pk{margin-top:4px;font-size:10.5px;color:var(--gold)}
.panel h2{font-weight:400;font-size:27px;color:var(--gold2);margin:2px 0 6px}
.panel .blurb{color:var(--muted);font-size:14.5px;line-height:1.5;margin-bottom:14px}
.panel .grp{margin-top:14px}.panel .grp>span{display:block;font-size:10px;color:rgba(242,246,238,.5);margin-bottom:8px}
.links{display:grid;gap:8px}
.links a{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-radius:10px;border:1px solid var(--hair);background:rgba(255,255,255,.03);text-decoration:none;font-size:15px;transition:.18s}
.links a:hover{border-color:rgba(248,230,176,.55);background:rgba(248,230,176,.07);transform:translateX(2px)}
.links a .g{font-size:9px;color:var(--gold);border:1px solid rgba(248,230,176,.4);border-radius:999px;padding:2px 7px}

/* index drawer */
.drawer{position:fixed;z-index:42;top:0;right:0;height:100%;width:min(420px,94vw);transform:translateX(102%);transition:transform .35s ease;
  background:linear-gradient(180deg,rgba(12,22,24,.98),rgba(8,15,17,.99));border-left:1px solid rgba(248,230,176,.24);display:flex;flex-direction:column;padding:18px}
.drawer.on{transform:none}
.drawer header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.drawer h3{font-weight:400;font-size:18px;color:var(--gold2)}
.search{display:flex;align-items:center;gap:8px;border:1px solid var(--hair);border-radius:10px;padding:0 12px;background:rgba(0,0,0,.3)}
.search input{flex:1;min-width:0;height:46px;border:0;outline:0;background:transparent;color:var(--paper);font:15px Georgia,serif}
.search input::placeholder{color:rgba(242,246,238,.4)}
#idxList{margin-top:12px;overflow:auto;display:grid;gap:7px;padding-right:4px}
#idxList a{display:block;padding:10px 12px;border:1px solid var(--hair);border-radius:9px;text-decoration:none;background:rgba(255,255,255,.02)}
#idxList a:hover{border-color:rgba(248,230,176,.5)}
#idxList a small{display:block;font-size:10.5px;color:rgba(242,246,238,.5);margin-top:3px}
.count{font-size:11px;color:var(--muted)}
@media(max-width:720px){.brand p{display:none}.spot .lab{opacity:.85}}
</style>
</head>

var NS='http://www.w3.org/2000/svg';
function el(n,a){var e=document.createElementNS(NS,n);for(var k in a)e.setAttribute(k,a[k]);return e;}

// stars
var sg=document.getElementById('stars');
for(var i=0;i<160;i++){var s=Math.random()*1.6+.7;var st=el('circle',{cx:(Math.random()*1600).toFixed(0),cy:(Math.random()*560).toFixed(0),r:s.toFixed(1),fill:'#fff'});st.setAttribute('class','star');st.style.animationDelay=(Math.random()*4)+'s';sg.appendChild(st);}

// hotspots inside the svg → perfectly locked to the painting
var spotsG=document.getElementById('spots');
ZONES.forEach(function(z){
  var g=el('g',{class:'spot',tabindex:'0',role:'button','aria-label':z.title,transform:'translate('+z.vbx+' '+z.vby+')'});
  g.appendChild(el('circle',{class:'halo',r:8,fill:'none',stroke:TONE[z.tone],'stroke-width':3}));
  g.appendChild(el('circle',{class:'dot',r:8,fill:TONE[z.tone]}));
  g.appendChild(el('circle',{r:3,fill:'#fff','fill-opacity':.85}));
  var t=el('text',{class:'lab',x:0,y:30});t.textContent=z.title;g.appendChild(t);
  g.addEventListener('click',function(){openZone(z);});
  g.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();openZone(z);}});
  spotsG.appendChild(g);
});

// panel
var scrim=document.getElementById('scrim'),panel=document.getElementById('panel');
function row(l){return '<a href="'+l[1]+'">'+l[0]+(l[2]?'<span class="g">gated</span>':'<span></span>')+'</a>';}
function openZone(z){
  document.getElementById('pGlyph').textContent=z.glyph;
  document.getElementById('pTitle').textContent=z.title;
  document.getElementById('pBlurb').textContent=z.blurb;
  var h='';z.groups.forEach(function(g){h+='<div class="grp"><span class="fut">'+g.name+'</span><div class="links">';g.links.forEach(function(l){h+=row(l);});h+='</div></div>';});
  document.getElementById('pLinks').innerHTML=h;
  scrim.classList.add('on');panel.classList.add('on');
}
function closePanel(){scrim.classList.remove('on');panel.classList.remove('on');}
scrim.addEventListener('click',closePanel);
document.getElementById('panelX').addEventListener('click',closePanel);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel();});

// day/night
var dn=document.getElementById('dayNight'),dnl=document.getElementById('dnLabel');
dn.addEventListener('click',function(){var n=document.body.classList.toggle('night');dnl.textContent=n?'day':'night';dn.querySelector('.ic').textContent=n?'☾':'☀';});

// index (every page, searchable)
var pages=[],seen={};
ZONES.forEach(function(z){z.groups.forEach(function(g){g.links.forEach(function(l){if(seen[l[1]])return;seen[l[1]]=true;pages.push({t:l[0],u:l[1],g:!!l[2],z:z.title,s:g.name});});});});
var idxList=document.getElementById('idxList'),q=document.getElementById('q'),count=document.getElementById('count');
function renderIdx(){var v=(q.value||'').toLowerCase().trim();var m=pages.filter(function(p){return !v||(p.t+' '+p.z+' '+p.s).toLowerCase().indexOf(v)!==-1;});idxList.innerHTML=m.map(function(p){return '<a href="'+p.u+'">'+p.t+(p.g?' · gated':'')+'<small>'+p.z+' — '+p.s+'</small></a>';}).join('');count.textContent=m.length+' of '+pages.length+' pages';}
var drawer=document.getElementById('drawer');
document.getElementById('openIdx').addEventListener('click',function(){drawer.classList.add('on');renderIdx();q.focus();});
document.getElementById('closeIdx').addEventListener('click',function(){drawer.classList.remove('on');});
q.addEventListener('input',renderIdx);renderIdx();
})();
</script>
