<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Valley — GUMP Research</title>
<meta name="description" content="One landscape. Every piece of the GUMP archive — biology, cosmology, networks, the proofs, the music — laid into a single living place. Same coupling, no walls.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#0c1418;--paper:#eaf2ea;--muted:rgba(234,242,234,.72);--hair:rgba(234,242,234,.22);
  --gold:#e9c479;--gold2:#f6e2ab;--leaf:#7fae6f;--water:#8fc6d6;--bloom:#e6a6c0;--stone:#c9bfa6;
}
html,body{height:100%}
body{
  overflow:hidden;color:var(--paper);
  font-family:Georgia,"Times New Roman",serif;background:#0c1418;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit}
.fut{font-family:Futura,"Century Gothic",sans-serif;letter-spacing:.16em;text-transform:uppercase}

/* ===== scene ===== */
#scene{position:fixed;inset:0;overflow:hidden;transition:filter 1.6s ease}
.sky{position:absolute;inset:0;transition:opacity 1.6s ease}
.sky.day{opacity:1;background:
  radial-gradient(120% 90% at 78% 8%,#fff5d8 0%,#ffe6ad 9%,transparent 34%),
  linear-gradient(180deg,#8fc3df 0%,#bfe0e6 38%,#e9efd6 60%,#f3e9c8 78%,#efe2bd 100%)}
.sky.night{opacity:0;background:
  radial-gradient(120% 90% at 22% 10%,#d9e6ef 0%,#9fb6cf 6%,transparent 26%),
  linear-gradient(180deg,#070d1c 0%,#0d1830 40%,#13243f 64%,#1c3147 82%,#223a4e 100%)}
body.night .sky.day{opacity:0}
body.night .sky.night{opacity:1}

svg.land{position:absolute;inset:0;width:100%;height:100%;display:block}
.starfield{position:absolute;inset:0;opacity:0;transition:opacity 1.6s ease;pointer-events:none}
body.night .starfield{opacity:1}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:tw 4s ease-in-out infinite}
@keyframes tw{50%{opacity:.25}}

/* sun/moon */
.orb{position:absolute;top:7%;right:18%;width:84px;height:84px;border-radius:50%;transition:all 1.6s ease}
.orb.sun{background:radial-gradient(circle at 42% 38%,#fff7df,#ffd86a 60%,#f5b94e);box-shadow:0 0 70px 24px rgba(255,221,120,.45)}
.orb.moon{top:9%;right:74%;opacity:0;background:radial-gradient(circle at 38% 34%,#f4f7ff,#cfdbea 62%,#9fb0c6);box-shadow:0 0 46px 10px rgba(180,205,235,.30)}
body.night .orb.sun{opacity:0}
body.night .orb.moon{opacity:1}

/* atmosphere shift at night */
body.night svg.land{filter:brightness(.46) saturate(.7) hue-rotate(8deg)}
svg.land{transition:filter 1.6s ease}

/* ===== chrome ===== */
.top{position:fixed;z-index:30;top:16px;left:18px;right:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:14px;pointer-events:none}
.top>*{pointer-events:auto}
.brand .k{font-size:11px;color:var(--muted)}
.brand h1{font-weight:400;font-size:clamp(26px,4.4vw,46px);line-height:.96;text-shadow:0 2px 18px rgba(0,0,0,.35)}
.brand p{max-width:30rem;margin-top:6px;font-size:13.5px;line-height:1.4;color:var(--muted);text-shadow:0 1px 8px rgba(0,0,0,.35)}
.tools{display:flex;gap:8px;align-items:center}
.btn{display:inline-grid;place-items:center;min-height:40px;padding:0 14px;border-radius:999px;border:1px solid var(--hair);
  background:rgba(8,16,20,.42);backdrop-filter:blur(7px);color:var(--paper);font-size:11px;cursor:pointer;text-decoration:none}
.btn:hover{border-color:rgba(246,226,171,.6)}
.btn .ic{margin-right:7px}
.home{width:40px;padding:0}

/* ===== hotspots ===== */
.spot{position:absolute;z-index:12;transform:translate(-50%,-50%);cursor:pointer;border:0;background:none;padding:0;color:var(--paper)}
.spot .ring{display:block;width:16px;height:16px;border-radius:50%;margin:0 auto;
  background:radial-gradient(circle at 40% 36%,#fff,var(--gold2) 40%,var(--gold) 70%,transparent 72%);
  box-shadow:0 0 0 0 rgba(246,226,171,.5);animation:beat 2.6s ease-in-out infinite}
.spot[data-tone=water] .ring{background:radial-gradient(circle at 40% 36%,#fff,#cdeef6 40%,var(--water) 72%,transparent 74%)}
.spot[data-tone=leaf]  .ring{background:radial-gradient(circle at 40% 36%,#fff,#cfe9b9 40%,var(--leaf) 72%,transparent 74%)}
.spot[data-tone=bloom] .ring{background:radial-gradient(circle at 40% 36%,#fff,#f5cfe0 40%,var(--bloom) 72%,transparent 74%)}
.spot[data-tone=stone] .ring{background:radial-gradient(circle at 40% 36%,#fff,#e7ddc4 40%,var(--stone) 72%,transparent 74%)}
@keyframes beat{0%,100%{box-shadow:0 0 0 0 rgba(246,226,171,.42)}50%{box-shadow:0 0 0 9px rgba(246,226,171,0)}}
.spot .lab{display:block;margin-top:7px;font-size:11px;white-space:nowrap;opacity:.0;transform:translateY(-3px);
  transition:.25s;text-shadow:0 1px 7px rgba(0,0,0,.6)}
.spot:hover .lab,.spot:focus-visible .lab{opacity:1;transform:none}
.spot:hover .ring{transform:scale(1.18)}

/* ===== panel ===== */
.scrim{position:fixed;inset:0;z-index:40;display:none;background:rgba(4,10,14,.55);backdrop-filter:blur(3px)}
.scrim.on{display:block}
.panel{position:fixed;z-index:41;top:50%;left:50%;transform:translate(-50%,-50%) scale(.97);opacity:0;
  width:min(560px,92vw);max-height:86vh;overflow:auto;display:none;
  border:1px solid rgba(246,226,171,.34);border-radius:16px;padding:26px 26px 22px;
  background:linear-gradient(180deg,rgba(20,32,30,.97),rgba(10,18,20,.98));box-shadow:0 30px 80px rgba(0,0,0,.6);
  transition:opacity .25s,transform .25s}
.panel.on{display:block;opacity:1;transform:translate(-50%,-50%) scale(1)}
.panel .x{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;border:1px solid var(--hair);
  background:rgba(0,0,0,.25);color:var(--paper);cursor:pointer}
.panel .glyph{font-size:30px}
.panel .pk{margin-top:4px;font-size:10.5px;color:var(--gold)}
.panel h2{font-weight:400;font-size:27px;color:var(--gold2);margin:2px 0 6px}
.panel .blurb{color:var(--muted);font-size:14.5px;line-height:1.5;margin-bottom:16px}
.panel .grp{margin-top:14px}
.panel .grp>span{display:block;font-size:10px;color:rgba(234,242,234,.5);margin-bottom:8px}
.links{display:grid;gap:8px}
.links a{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border-radius:10px;
  border:1px solid var(--hair);background:rgba(255,255,255,.03);text-decoration:none;font-size:15px;transition:.18s}
.links a:hover{border-color:rgba(246,226,171,.55);background:rgba(246,226,171,.07);transform:translateX(2px)}
.links a .g{font-size:9px;color:var(--gold);border:1px solid rgba(246,226,171,.4);border-radius:999px;padding:2px 7px}

/* ===== index drawer ===== */
.drawer{position:fixed;z-index:42;top:0;right:0;height:100%;width:min(420px,94vw);transform:translateX(102%);
  transition:transform .35s ease;background:linear-gradient(180deg,rgba(12,20,22,.98),rgba(8,14,16,.99));
  border-left:1px solid rgba(246,226,171,.24);display:flex;flex-direction:column;padding:18px}
.drawer.on{transform:none}
.drawer header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
.drawer h3{font-weight:400;font-size:18px;color:var(--gold2)}
.search{display:flex;align-items:center;gap:8px;border:1px solid var(--hair);border-radius:10px;padding:0 12px;background:rgba(0,0,0,.3)}
.search input{flex:1;min-width:0;height:46px;border:0;outline:0;background:transparent;color:var(--paper);font:15px Georgia,serif}
.search input::placeholder{color:rgba(234,242,234,.4)}
#idxList{margin-top:12px;overflow:auto;display:grid;gap:7px;padding-right:4px}
#idxList a{display:block;padding:10px 12px;border:1px solid var(--hair);border-radius:9px;text-decoration:none;background:rgba(255,255,255,.02)}
#idxList a:hover{border-color:rgba(246,226,171,.5)}
#idxList a small{display:block;font-size:10.5px;color:rgba(234,242,234,.5);margin-top:3px}
.count{font-size:11px;color:var(--muted)}

@media(max-width:720px){
  .brand p{display:none}
  .spot .lab{opacity:1;transform:none}
  .top{flex-direction:row;align-items:center}
}
</style>
</head>

// ---- stars ----
var sf=document.getElementById('stars'),html=[];
for(var i=0;i<150;i++){var s=Math.random()*2+1;html.push('<span class="star" style="left:'+(Math.random()*100)+'%;top:'+(Math.random()*64)+'%;width:'+s+'px;height:'+s+'px;animation-delay:'+(Math.random()*4)+'s"></span>');}
sf.innerHTML=html.join('');

// ---- hotspots ----
var spots=document.getElementById('spots');
ZONES.forEach(function(z){
  var b=document.createElement('button');b.className='spot';b.dataset.tone=z.tone;
  b.style.left=z.x+'%';b.style.top=z.y+'%';
  b.innerHTML='<span class="ring"></span><span class="lab fut">'+z.title+'</span>';
  b.addEventListener('click',function(){openZone(z);});
  spots.appendChild(b);
});

// ---- panel ----
var scrim=document.getElementById('scrim'),panel=document.getElementById('panel');
function linkRow(l){return '<a href="'+l[1]+'">'+l[0]+(l[2]?'<span class="g">gated</span>':'<span></span>')+'</a>';}
function openZone(z){
  document.getElementById('pGlyph').textContent=z.glyph;
  document.getElementById('pTitle').textContent=z.title;
  document.getElementById('pBlurb').textContent=z.blurb;
  var h='';z.groups.forEach(function(g){
    h+='<div class="grp"><span class="fut">'+g.name+'</span><div class="links">';
    g.links.forEach(function(l){h+=linkRow(l);});h+='</div></div>';
  });
  document.getElementById('pLinks').innerHTML=h;
  scrim.classList.add('on');panel.classList.add('on');
}
function closePanel(){scrim.classList.remove('on');panel.classList.remove('on');}
scrim.addEventListener('click',closePanel);
document.getElementById('panelX').addEventListener('click',closePanel);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel();});

// ---- day / night ----
var dn=document.getElementById('dayNight'),dnl=document.getElementById('dnLabel');
dn.addEventListener('click',function(){
  var night=document.body.classList.toggle('night');
  dnl.textContent=night?'day':'night';
  dn.querySelector('.ic').textContent=night?'☾':'☀';
});

// ---- index drawer (every page, searchable) ----
var pages=[],seen={};
ZONES.forEach(function(z){z.groups.forEach(function(g){g.links.forEach(function(l){
  if(seen[l[1]])return;seen[l[1]]=true;pages.push({t:l[0],u:l[1],g:!!l[2],z:z.title,s:g.name});});});});
var idxList=document.getElementById('idxList'),q=document.getElementById('q'),count=document.getElementById('count');
function renderIdx(){
  var v=(q.value||'').toLowerCase().trim();
  var m=pages.filter(function(p){return !v||(p.t+' '+p.z+' '+p.s).toLowerCase().indexOf(v)!==-1;});
  idxList.innerHTML=m.map(function(p){return '<a href="'+p.u+'">'+p.t+(p.g?' · gated':'')+'<small>'+p.z+' — '+p.s+'</small></a>';}).join('');
  count.textContent=m.length+' of '+pages.length+' pages';
}
var drawer=document.getElementById('drawer');
document.getElementById('openIdx').addEventListener('click',function(){drawer.classList.add('on');renderIdx();q.focus();});
document.getElementById('closeIdx').addEventListener('click',function(){drawer.classList.remove('on');});
q.addEventListener('input',renderIdx);
renderIdx();
})();
</script>
