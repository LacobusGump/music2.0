<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Unlocked — beGump Research</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06050a;color:#c4a088;font-family:Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;max-width:360px;padding:40px 24px;}
.orb{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#e8c07a,#b8753a 55%,#7a4520);box-shadow:0 0 28px rgba(201,164,74,0.4);margin:0 auto 24px;animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(0.95);}50%{transform:scale(1.05);}}
h1{font-family:Futura,"Century Gothic",sans-serif;font-weight:300;font-size:1.1em;color:#c9a44a;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px;}
p{font-size:0.8em;color:rgba(196,160,136,0.5);line-height:1.9;margin-bottom:24px;}
a.btn{display:inline-block;background:rgba(201,164,74,0.1);border:1px solid rgba(201,164,74,0.25);border-radius:8px;padding:11px 28px;color:#c9a44a;font-family:Futura,sans-serif;font-size:0.6em;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;}
#status{font-size:0.72em;color:rgba(201,164,74,0.5);margin-bottom:16px;min-height:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb"></div>
  <h1 id="h">Checking…</h1>
<!-- DATE_STAMP --><div style="font-family:'Courier New',monospace;font-size:0.68em;color:rgba(139,74,46,0.42);margin:2px 0 16px;letter-spacing:0.02em;">written 2026-05-23 &middot; last edited 2026-06-03</div><!-- /DATE_STAMP -->
  <div id="status"></div>
  <p id="msg" style="display:none;">The deep research is open.<br>It stays open on this browser.</p>
  <a class="btn" id="btn" href="/research/" style="display:none;">enter the atlas →</a>
</div>
<script>
var SECRET_KEY = 'gump3dollars2026';

function setCookie(n,v,days){
  var e=new Date(Date.now()+days*864e5).toUTCString();
  document.cookie=n+'='+v+';expires='+e+';path=/;SameSite=Lax';
}
function getCookie(n){
  var v=document.cookie.match('(^|;)\\s*'+n+'\\s*=\\s*([^;]+)');
  return v?v.pop():'';
}

var params = new URLSearchParams(window.location.search);
var k = params.get('k');

if(k === SECRET_KEY){
  setCookie('gump_paid','aXNhYWM',365);
  document.getElementById('h').textContent = 'Unlocked';
  document.getElementById('status').textContent = '\u2713 Access granted';
  document.getElementById('msg').style.display = 'block';
  document.getElementById('btn').style.display = 'inline-block';
  // Clean URL
  history.replaceState(null,'','/research/unlock/');
} else if(getCookie('gump_paid')==='aXNhYWM'){
  document.getElementById('h').textContent = 'Already open';
  document.getElementById('status').textContent = '\u2713 You\'re in';
  document.getElementById('msg').style.display = 'block';
  document.getElementById('btn').style.display = 'inline-block';
} else {
  document.getElementById('h').textContent = 'Nothing here';
  document.getElementById('status').textContent = '';
  document.getElementById('msg').innerHTML = 'Pay once to unlock the deep research.';
  document.getElementById('msg').style.display = 'block';
  document.getElementById('btn').href = 'https://buy.stripe.com/bJe14n0D60Wd10N2DKfIs0f';
  document.getElementById('btn').textContent = 'unlock for $3 \u2192';
  document.getElementById('btn').style.display = 'inline-block';
}
</script>
<script src="/js/playlist.js" defer></script>
<script src="/js/radio-bar.js" defer></script>
</body>
</html>
