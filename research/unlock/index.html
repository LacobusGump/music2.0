<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unlocked — beGump Research</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06050a;color:#c4a088;font-family:Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;max-width:360px;padding:40px 24px;}
.orb{width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#e8c07a,#b8753a 55%,#7a4520);box-shadow:0 0 28px rgba(201,164,74,0.4);margin:0 auto 24px;animation:breathe 3s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(0.95);opacity:0.8;}50%{transform:scale(1.05);opacity:1;}}
h1{font-family:Futura,'Century Gothic',sans-serif;font-weight:300;font-size:1.1em;color:#c9a44a;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px;}
p{font-size:0.8em;color:rgba(196,160,136,0.5);line-height:1.9;margin-bottom:24px;}
a.btn{display:inline-block;background:rgba(201,164,74,0.1);border:1px solid rgba(201,164,74,0.25);border-radius:8px;padding:11px 28px;color:#c9a44a;font-family:Futura,sans-serif;font-size:0.6em;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;transition:all 0.2s;}
a.btn:hover{background:rgba(201,164,74,0.18);}
#status{font-size:0.72em;color:rgba(201,164,74,0.4);margin-bottom:16px;min-height:20px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="orb"></div>
  <h1>Unlocked</h1>
  <div id="status">Verifying payment…</div>
  <p>The deep research is now open.<br>It stays open on this browser.</p>
  <a class="btn" href="/research/">enter the atlas →</a>
</div>
<script>
// Set the paid cookie client-side as fallback
// (Worker will set it server-side when deployed)
function setCookie(name, value, days) {
  var expires = new Date(Date.now() + days * 864e5).toUTCString();
  document.cookie = name + '=' + value + ';expires=' + expires + ';path=/;Secure;SameSite=Lax';
}

function getCookie(name) {
  var v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
  return v ? v.pop() : '';
}

// Check URL params — Stripe sends session_id on success
var params = new URLSearchParams(window.location.search);
var sessionId = params.get('session_id');

if (sessionId) {
  // Verify via our Worker endpoint
  fetch('/research/gate-verify/?session_id=' + sessionId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.paid) {
        setCookie('gump_paid', 'aXNhYWM', 365);
        document.getElementById('status').textContent = '✓ Payment confirmed';
      } else {
        document.getElementById('status').textContent = 'Could not verify — try refreshing';
      }
    })
    .catch(function() {
      // Worker not deployed yet — set cookie anyway (honor system until Worker is live)
      // In production this should only be set after real Stripe verification
      document.getElementById('status').textContent = '✓ Access granted';
      setCookie('gump_paid', 'aXNhYWM', 365);
    });
} else if (getCookie('gump_paid') === 'aXNhYWM') {
  document.getElementById('status').textContent = '✓ Already unlocked';
} else {
  // No session_id — direct visit
  document.getElementById('status').textContent = '';
}
</script>
</body>
</html>
