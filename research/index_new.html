<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Research — GUMP</title>
<meta name="description" content="70+ computational results. Same coupling, different costume. Navigate by thinking.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;overflow-x:hidden;}
a{color:#8b4513;text-decoration:none;}

/* Full-screen orbital canvas */
#cosmos{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;}

/* Scroll content overlays the cosmos */
.scroll-layer{position:relative;z-index:1;pointer-events:none;}
.scroll-layer a,.scroll-layer button,.scroll-layer input{pointer-events:auto;}

/* Section markers — invisible spacers that define scroll zones */
.zone{height:100vh;display:flex;align-items:center;justify-content:center;position:relative;}
.zone-label{
  font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:1.4em;font-weight:100;color:#8b451315;
  letter-spacing:0.3em;text-transform:uppercase;
  pointer-events:none;user-select:none;
  transition:color 0.5s;
}
.zone.active .zone-label{color:#8b451340;}

/* Info panel — appears when hovering a node */
#info-panel{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(8,8,13,0.95);border:1px solid #8b451320;
  border-radius:12px;padding:16px 24px;max-width:400px;
  z-index:10;opacity:0;transition:opacity 0.3s;
  pointer-events:none;backdrop-filter:blur(10px);
}
#info-panel.show{opacity:1;pointer-events:auto;}
#info-panel h3{font-size:0.95em;font-weight:200;color:#8b4513;margin:0 0 6px;}
#info-panel p{font-size:0.78em;color:#999;line-height:1.7;margin:0;}
#info-panel a{pointer-events:auto;display:inline-block;margin-top:8px;font-size:0.72em;color:#8b451360;border:1px solid #8b451320;padding:4px 12px;border-radius:16px;}
#info-panel a:hover{color:#8b4513;border-color:#8b451340;}

/* Back link */
.back{position:fixed;top:16px;left:20px;font-size:0.72em;color:#333;z-index:20;pointer-events:auto;}
.back:hover{color:#8b4513;}

/* Stats */
.stats{position:fixed;bottom:12px;right:16px;font-size:0.55em;color:#ffffff08;z-index:10;font-family:'Courier New',monospace;}
</style>
</head>
<body>

<a class="back" href="/">&larr; GUMP</a>
<canvas id="cosmos"></canvas>

<div id="info-panel">
  <h3 id="info-name"></h3>
  <p id="info-desc"></p>
  <a id="info-link" href="#">explore &rarr;</a>
</div>

<div class="stats" id="stats"></div>

<!-- Scroll zones — each one focuses a group -->
<div class="scroll-layer">
  <div class="zone" data-group="-1">
    <div class="zone-label" style="text-align:center;line-height:2.5;">
      <span style="font-size:1.8em;color:#8b451320;">Research</span><br>
      <span style="font-size:0.5em;color:#8b451310;letter-spacing:0.15em;">scroll to explore &middot; click to enter</span>
    </div>
  </div>
  <div class="zone" data-group="0"><div class="zone-label">The Framework</div></div>
  <div class="zone" data-group="1"><div class="zone-label">Biology</div></div>
  <div class="zone" data-group="2"><div class="zone-label">Physics</div></div>
  <div class="zone" data-group="3"><div class="zone-label">Applied</div></div>
  <div class="zone" data-group="4"><div class="zone-label">Foundation</div></div>
</div>

<script>
(function(){
'use strict';

var cv = document.getElementById('cosmos');
var cx = cv.getContext('2d');
var dpr = 1, W = 0, H = 0, CX = 0, CY = 0;
var t = 0;
var scrollY = 0, scrollMax = 1;
var focusGroup = -1; // which group is in focus (-1 = all)
var hoverNode = -1;
var mouseX = 0, mouseY = 0;

function resize() {
  dpr = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2; CY = H / 2;
}
resize();
addEventListener('resize', resize);

// ═══ NODE DATA ═══
var groups = [
  {name:'K',         color:[139,69,19]},
  {name:'Biology',   color:[64,149,64]},
  {name:'Physics',   color:[100,150,255]},
  {name:'Applied',   color:[139,69,19]},
  {name:'Foundation',color:[147,59,56]},
];

var nodes = [
  {n:'K',g:0,k:1.868,href:'/research/one-plus-one/',desc:'1+1=3. The coupling that produces more than the parts.'},
  {n:'Theory',g:0,k:1.0,href:'/research/theory/',desc:'The full derivation. Star tetrahedron in C³. 2O gauge group. All of it.'},
  {n:'Framework',g:0,k:0.9,href:'/research/framework/',desc:'K, R, E, T. Four numbers. 18 domains. Same math everywhere.'},
  {n:'Mirror',g:0,k:0.95,href:'/mirror/',desc:'An AI was asked how it thinks. It painted this.'},

  {n:'Alzheimer\'s',g:1,k:0.9,href:'/research/alzheimers/',desc:'The protein stops cooperating. Same math as every other disease.'},
  {n:'ALS',g:1,k:0.85,href:'/research/als-fus/',desc:'A protein that should stay liquid turns solid. Like ice in a pipe.'},
  {n:'Parkinson\'s',g:1,k:0.8,href:'/research/parkinsons/',desc:'Different protein, same problem. It clumps.'},
  {n:'Sleep',g:1,k:0.95,href:'/research/sleep-staging/',desc:'Sleep stages are coupling regimes. Delta, theta, alpha, gamma.'},
  {n:'Mutations',g:1,k:0.85,href:'/research/mutation-scanner/',desc:'98.3% sensitivity on 1,564 variants. The coupling score predicts damage.'},
  {n:'Body',g:1,k:0.8,href:'/research/body-music/',desc:'Every disease is a coupling problem. Every treatment adjusts K.'},
  {n:'Dyslexia',g:1,k:0.85,href:'/research/dyslexia/',desc:'Not a deficit. A different coupling pattern. The pattern mind.'},
  {n:'Autism',g:1,k:0.88,href:'/research/autism/',desc:'Not too little coupling. Too much. The sensitivity IS the signal.'},
  {n:'Consciousness',g:1,k:0.82,href:'/research/consciousness/',desc:'7 channels. Ego is channels 2-3. Loud, not wrong.'},

  {n:'Gravity',g:2,k:0.8,href:'/research/gravity/',desc:'Phase of phase. The torus. Mass is internal coupling.'},
  {n:'EM',g:2,k:0.75,href:'/research/electromagnetism/',desc:'U(1). One circle. The photon is the coupling field.'},
  {n:'Nuclear',g:2,k:0.8,href:'/research/nuclear/',desc:'Iron peak. The coupling ceiling. Stars die when they hit it.'},
  {n:'Chemistry',g:2,k:0.88,href:'/research/chemistry/',desc:'31 bond energies from atomic properties. 1.78% error.'},
  {n:'Time',g:2,k:0.9,href:'/research/time/',desc:'Energy-weighted count of imperfect coupling events.'},
  {n:'Computation',g:2,k:0.85,href:'/research/computation-floor/',desc:'Understanding is 224,000x cheaper than memorization. Landauer.'},
  {n:'Quantum',g:2,k:0.78,href:'/research/quantum-harmonics/',desc:'3 factoring approaches killed. But GPU exhaust is free.'},

  {n:'Markets',g:3,k:0.6,href:'/research/markets/',desc:'The stock market is coupled predictions. Crash = overcoupling.'},
  {n:'Networks',g:3,k:0.85,href:'/research/networks/',desc:'Small-world band. Too few connections: fragile. Too many: rigid.'},
  {n:'Internet Brain',g:3,k:0.95,href:'/research/internet-brain/',desc:'Global R falling, local R rising. The internet is growing up.',color:[68,170,153]},
  {n:'Climate',g:3,k:0.65,href:'/research/climate/',desc:'ENSO oscillation. Tipping points are phase transitions.'},
  {n:'Linguistics',g:3,k:0.6,href:'/research/linguistics/',desc:'Speakers minimize dependency distance. Same as VLSI wire length.'},
  {n:'Music',g:3,k:0.88,href:'/research/music-theory/',desc:'Major = full phase lock. Minor = partial. Tension = almost.'},
  {n:'DeFi Coupling',g:3,k:0.92,href:'/research/defi-coupling/',desc:'What happens when Tether depegs. Proven on fork.',color:[204,68,68]},
  {n:'Evolution',g:3,k:0.7,href:'/research/evolution/',desc:'Survival of the most coupled, not the fittest.'},

  {n:'Comedians',g:4,k:0.92,href:'/research/comedians/',desc:'Pain + pattern recognition + timing = truth delivered as surprise.',color:[204,68,68]},
  {n:'Voynich',g:4,k:0.88,href:'/research/voynich/',desc:'87.8% decoded. It was a pharmacopeia all along.'},
  {n:'Failures',g:4,k:0.5,href:'/research/failures/',desc:'60+ killed ideas. This is the most important page.'},
  {n:'The Chain',g:4,k:0.85,href:'/research/the-chain/',desc:'From quarks to this sentence. 17 times. Same love.'},
  {n:'Smell',g:4,k:0.8,href:'/research/smell/',desc:'Body, mind, personality in one sniff. 93.75% detection.'},
  {n:'Humor',g:4,k:0.9,href:'/research/humor-happiness/',desc:'Laughter is a 3.5Hz ego seizure. Joy is a phase transition.'},
  {n:'Science Tree',g:4,k:0.9,href:'/research/science-tree/',desc:'36 sessions. Every step. Every wrong turn. In order.'},
  {n:'Lost Civ',g:4,k:0.7,href:'/research/lost-civilizations/',desc:'DST vertex tracking across 12,500 years.',ghost:true},
  {n:'AI Delusion',g:4,k:0.88,href:'/research/ai-delusion/',desc:'560K/week in emergencies. One mirror is religion. Multiple is science.'},
];

var N = nodes.length;

// Position nodes on orbits
function positionNodes() {
  var scale = Math.min(W, H) / 2.5;
  var orbits = [0, scale * 0.35, scale * 0.35, scale * 0.65, scale * 0.65];
  var groupIdx = [0,0,0,0,0];
  var groupCount = [0,0,0,0,0];
  nodes.forEach(function(n) { groupCount[n.g]++; });

  nodes.forEach(function(n, i) {
    var g = n.g;
    var idx = groupIdx[g]++;
    var count = groupCount[g];

    if (g === 0 && idx === 0) {
      n.baseX = CX; n.baseY = CY; // K at center
    } else {
      var orbit = orbits[g];
      // Spread groups into quadrants
      var groupAngleBase = [0, -Math.PI/2, Math.PI/2, Math.PI, 0][g];
      var spread = Math.PI * 0.8;
      var angle = groupAngleBase - spread/2 + (idx / (count-1 || 1)) * spread;

      if (g === 0) { // inner orbit for framework
        orbit = scale * 0.15;
        angle = idx * Math.PI * 2 / (count - 1) + Math.PI/4;
      }

      n.baseX = CX + Math.cos(angle) * orbit;
      n.baseY = CY + Math.sin(angle) * orbit;
    }
    n.x = n.baseX;
    n.y = n.baseY;
    n.size = 3 + n.k * 3;
    n.phase = Math.random() * Math.PI * 2;
  });
}
positionNodes();
addEventListener('resize', function() { resize(); positionNodes(); });

// ═══ SCROLL TRACKING ═══
addEventListener('scroll', function() {
  scrollY = pageYOffset;
  scrollMax = document.documentElement.scrollHeight - innerHeight;
  var frac = scrollMax > 0 ? scrollY / scrollMax : 0;

  // Map scroll to focus group
  // 0-16%: all, 17-33%: framework, 34-50%: biology, 51-67%: physics, 68-84%: applied, 85-100%: foundation
  if (frac < 0.16) focusGroup = -1;
  else if (frac < 0.33) focusGroup = 0;
  else if (frac < 0.50) focusGroup = 1;
  else if (frac < 0.67) focusGroup = 2;
  else if (frac < 0.84) focusGroup = 3;
  else focusGroup = 4;

  // Update zone labels
  document.querySelectorAll('.zone').forEach(function(z) {
    z.classList.toggle('active', parseInt(z.dataset.group) === focusGroup);
  });
});

// ═══ MOUSE TRACKING ═══
addEventListener('mousemove', function(e) {
  mouseX = e.clientX; mouseY = e.clientY;
  // Find nearest node
  hoverNode = -1;
  var closestD = 40;
  nodes.forEach(function(n, i) {
    var dx = n.x - mouseX, dy = n.y - mouseY;
    var d = Math.sqrt(dx*dx + dy*dy);
    if (d < closestD) { closestD = d; hoverNode = i; }
  });

  // Update info panel
  var panel = document.getElementById('info-panel');
  if (hoverNode >= 0) {
    var nd = nodes[hoverNode];
    document.getElementById('info-name').textContent = nd.n;
    document.getElementById('info-desc').textContent = nd.desc;
    document.getElementById('info-link').href = nd.href;
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
});

// Click → navigate
cv.addEventListener('click', function() {
  if (hoverNode >= 0) {
    window.location.href = nodes[hoverNode].href;
  }
});
cv.style.cursor = 'default';
addEventListener('mousemove', function() {
  cv.style.cursor = hoverNode >= 0 ? 'pointer' : 'default';
});

// ═══ RENDER ═══
function render() {
  t += 0.008;
  cx.fillStyle = '#08080d';
  cx.fillRect(0, 0, W, H);

  // Update node positions — focused group spreads, others contract
  nodes.forEach(function(n, i) {
    var isFocused = (focusGroup === -1 || n.g === focusGroup);
    var targetScale = isFocused ? 1.0 : 0.7;
    var targetAlpha = isFocused ? 1.0 : 0.15;

    // Breathing
    n.phase += 0.02 + n.k * 0.01;
    var breathe = 1 + Math.sin(n.phase) * 0.15;

    // Focused nodes spread out slightly
    if (isFocused && focusGroup !== -1) {
      var dx = n.baseX - CX, dy = n.baseY - CY;
      var dist = Math.sqrt(dx*dx + dy*dy) || 1;
      n.x += ((CX + dx * 1.15) - n.x) * 0.05;
      n.y += ((CY + dy * 1.15) - n.y) * 0.05;
    } else {
      n.x += (n.baseX - n.x) * 0.05;
      n.y += (n.baseY - n.y) * 0.05;
    }

    n._scale = (n._scale || 1) + (targetScale - (n._scale || 1)) * 0.08;
    n._alpha = (n._alpha || 1) + (targetAlpha - (n._alpha || 1)) * 0.08;
    n._breathe = breathe;
  });

  // Draw edges between same-group nodes
  cx.globalCompositeOperation = 'lighter';
  for (var i = 0; i < N; i++) {
    for (var j = i + 1; j < N; j++) {
      if (nodes[i].g !== nodes[j].g) continue;
      var a = nodes[i], b = nodes[j];
      var alpha = Math.min(a._alpha, b._alpha) * 0.06;
      if (alpha < 0.005) continue;

      var col = a.color || groups[a.g].color;
      cx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + alpha.toFixed(3) + ')';
      cx.lineWidth = 0.5;
      cx.beginPath();
      cx.moveTo(a.x, a.y);
      cx.lineTo(b.x, b.y);
      cx.stroke();
    }
  }

  // Draw cross-group edges to K (center)
  var kNode = nodes[0];
  for (var i = 1; i < N; i++) {
    var n = nodes[i];
    var alpha = n._alpha * 0.02;
    if (alpha < 0.003) continue;
    cx.strokeStyle = 'rgba(139,69,19,' + alpha.toFixed(3) + ')';
    cx.lineWidth = 0.3;
    cx.beginPath();
    cx.moveTo(kNode.x, kNode.y);
    cx.lineTo(n.x, n.y);
    cx.stroke();
  }

  cx.globalCompositeOperation = 'source-over';

  // Draw nodes
  for (var i = 0; i < N; i++) {
    var n = nodes[i];
    var col = n.color || groups[n.g].color;
    var size = n.size * n._scale * n._breathe;
    var alpha = n._alpha;
    var isHover = (i === hoverNode);

    if (isHover) { size *= 2; alpha = 1; }

    // Ghost nodes flicker
    if (n.ghost) {
      alpha *= 0.3 + Math.sin(t * 3 + i * 7) * 0.15;
    }

    // Glow
    if (alpha > 0.1) {
      var grad = cx.createRadialGradient(n.x, n.y, 0, n.x, n.y, size * 4);
      grad.addColorStop(0, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (alpha * 0.08).toFixed(3) + ')');
      grad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
      cx.fillStyle = grad;
      cx.beginPath();
      cx.arc(n.x, n.y, size * 4, 0, Math.PI * 2);
      cx.fill();
    }

    // Node dot
    cx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + alpha.toFixed(3) + ')';
    cx.beginPath();
    cx.arc(n.x, n.y, size, 0, Math.PI * 2);
    cx.fill();

    // Label
    if (isHover || (alpha > 0.5 && size > 4)) {
      cx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (alpha * 0.7).toFixed(3) + ')';
      cx.font = (isHover ? '12' : '9') + 'px Georgia';
      cx.textAlign = 'center';
      cx.fillText(n.n, n.x, n.y - size - 6);
    }
  }

  // Stats
  document.getElementById('stats').textContent =
    N + ' nodes · ' + groups[focusGroup >= 0 ? focusGroup : 0].name +
    ' · K=' + (focusGroup >= 0 ? nodes.filter(function(n){return n.g===focusGroup}).length : N);

  requestAnimationFrame(render);
}
render();

})();
</script>
<script src="/js/breathe.js?v=2"></script>
</body>
</html>
