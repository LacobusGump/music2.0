<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=/research/sleep-staging/">
<title>Redirecting to Sleep</title>
<link rel="canonical" href="/research/sleep-staging/">
<script>
(function(){
  try{ if(localStorage.getItem('gump_key')==='hm') return; }catch(e){}
  document.addEventListener('DOMContentLoaded', function(){
    var style = document.createElement('style');
    style.id = 'g-hide';
    style.textContent = 'body{visibility:hidden!important;}';
    document.head.appendChild(style);

    var gate = document.createElement('div');
    gate.id = 'g-gate';
    gate.style.cssText = 'position:fixed;inset:0;background:#06050a;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:Georgia,serif;visibility:visible;';
    gate.innerHTML = '<div style="text-align:center;max-width:340px;padding:40px 24px;">'
      + '<div style="width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#e8c07a,#b8753a 55%,#7a4520);box-shadow:0 0 20px rgba(201,164,74,0.25);margin:0 auto 20px;animation:breathe 4s ease-in-out infinite;"></div>'
      + '<div style="font-family:Futura,Century Gothic,sans-serif;font-size:0.62em;letter-spacing:0.2em;color:#c9a44a;text-transform:uppercase;margin-bottom:8px;">' + document.title.replace(' \u2014 beGump','').replace(' \u2014 GUMP','') + '</div>'
      + '<p style="font-size:0.75em;color:rgba(196,160,136,0.45);line-height:1.8;margin-bottom:20px;">if you know, you know.</p>'
      + '<input id="g-pw" type="text" placeholder="\u2665" style="background:rgba(201,164,74,0.05);border:1px solid rgba(201,164,74,0.15);border-radius:8px;padding:10px 14px;color:#c4a088;font-family:Georgia,serif;font-size:0.88em;width:100%;text-align:center;outline:none;margin-bottom:10px;box-sizing:border-box;" onkeydown="if(event.key==='Enter')_gChk()">'
      + '<button onclick="_gChk()" style="background:rgba(201,164,74,0.08);border:1px solid rgba(201,164,74,0.18);border-radius:8px;padding:9px 22px;color:#c9a44a;font-family:Futura,Century Gothic,sans-serif;font-size:0.58em;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;width:100%;box-sizing:border-box;">enter</button>'
      + '<div id="g-err" style="font-size:0.68em;color:rgba(255,120,120,0.5);margin-top:8px;height:14px;"></div>'
      + '<a href="/research/" style="display:block;margin-top:18px;font-family:Futura,sans-serif;font-size:0.54em;letter-spacing:0.14em;color:rgba(201,164,74,0.22);text-decoration:none;">&larr; research</a>'
      + '</div>';
    document.body.appendChild(gate);

    var s2 = document.createElement('style');
    s2.textContent = '#g-gate{visibility:visible!important;}@keyframes breathe{0%,100%{transform:scale(0.94);opacity:0.7;}50%{transform:scale(1.06);opacity:1;}}';
    document.head.appendChild(s2);

    window._gChk = function(){
      var v = document.getElementById('g-pw').value.toLowerCase().trim();
      if(v==='hm.<3'||v.replace(/[^a-z0-9<3]/g,'')==='hm<3'){
        try{localStorage.setItem('gump_key','hm');}catch(e){}
        document.getElementById('g-hide').remove();
        gate.remove();
      } else {
        var err=document.getElementById('g-err');
        err.textContent='not quite';
        setTimeout(function(){err.textContent='';},2000);
      }
    };
  });
})();
</script>
</head>
<body style="background:#1a110d;color:#c4a088;font-family:Georgia,serif;padding:40px;text-align:center;">
<p>This page has moved. <a href="/research/sleep-staging/" style="color:#b8753a;">Click here</a> if not redirected.</p>
<script src="/js/harmonia-thread.js?v=2"></script>


</body>
</html>
