    leaves:[

    ], kills:[]},

const PETALS = [
  {from:'Music & Body',to:'Mind',label:'Music \u2194 Dyslexia',desc:'Rhythm retrains miscoupled clocks',color:0xbb88aa},
  {from:'Physics',to:'Mind',label:'Physics \u2194 Consciousness',desc:'The signal asks about what made it',color:0x9988cc},
  {from:'Ancients',to:'Framework',label:'Geometry \u2194 Ego',desc:'Found, built, claimed, buried, found again',color:0xdd9977},
  {from:'Framework',to:'Systems',label:'Coupling \u2194 Free Will',desc:'Connect, choose, break, reconnect',color:0x77bbcc},
];

// ══════════════════════════════════════════════
// SCENE — warm, alive, lit by fire
// ══════════════════════════════════════════════

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0806, 0.018);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 12, 28);
camera.lookAt(0,10,0);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.8;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0,10,0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 8;
controls.maxDistance = 60;
controls.maxPolarAngle = Math.PI*0.85;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;
controls.update();

// LIGHTING — warm firelight from below, cool starlight from above
const ambient = new THREE.AmbientLight(0x2a2018, 1.0);
scene.add(ambient);

const fireLight1 = new THREE.PointLight(0xff8830, 2.5, 25);
fireLight1.position.set(2, 1.5, 2);
scene.add(fireLight1);

const fireLight2 = new THREE.PointLight(0xff6600, 2.0, 20);
fireLight2.position.set(-2, 1, -1);
scene.add(fireLight2);

const fireLight3 = new THREE.PointLight(0xffaa44, 1.5, 18);
fireLight3.position.set(0, 2, -2);
scene.add(fireLight3);

const starLight = new THREE.PointLight(0xddeeff, 2.0, 50);
starLight.position.set(0, 25, 0);
scene.add(starLight);

const warmFill = new THREE.PointLight(0xc9a44a, 0.8, 35);
warmFill.position.set(0, 12, 8);
scene.add(warmFill);

// ══════════════════════════════════════════════
// GROUND — warm earth, lit by firelight
// ══════════════════════════════════════════════

const groundGeo = new THREE.CircleGeometry(40, 64);
const groundMat = new THREE.MeshStandardMaterial({color:0x1a1408, roughness:1, metalness:0});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.05;
scene.add(ground);

// ══════════════════════════════════════════════
// FIRE — knowledge. the lion's fear. the shepherd's tool.
// ══════════════════════════════════════════════

const fireCount = 300;
const fireGeo = new THREE.BufferGeometry();
const firePos = new Float32Array(fireCount*3);
const fireCol = new Float32Array(fireCount*3);
const fireSizes = new Float32Array(fireCount);
const fireSeeds = [];

for(let i=0;i<fireCount;i++){
  const a = Math.random()*Math.PI*2;
  const r = 1.5 + Math.random()*3;
  firePos[i*3] = Math.cos(a)*r;
  firePos[i*3+1] = Math.random()*2.5;
  firePos[i*3+2] = Math.sin(a)*r;
  const warmth = 0.5 + Math.random()*0.5;
  fireCol[i*3] = 1.0;
  fireCol[i*3+1] = 0.4 + warmth*0.4;
  fireCol[i*3+2] = warmth*0.15;
  fireSizes[i] = 0.08 + Math.random()*0.15;
  fireSeeds.push({a, r, speed:0.5+Math.random()*2, phase:Math.random()*Math.PI*2, life:Math.random()});
}

fireGeo.setAttribute('position', new THREE.BufferAttribute(firePos,3));
fireGeo.setAttribute('color', new THREE.BufferAttribute(fireCol,3));
fireGeo.setAttribute('size', new THREE.BufferAttribute(fireSizes,1));

const fireMat = new THREE.PointsMaterial({
  size:0.2, vertexColors:true, transparent:true, opacity:0.7,
  blending:THREE.AdditiveBlending, depthWrite:false,
});
const fire = new THREE.Points(fireGeo, fireMat);
scene.add(fire);

// Fire ring glow on ground
const fireRingGeo = new THREE.RingGeometry(1.5, 5, 32);
const fireRingMat = new THREE.MeshBasicMaterial({
  color:0xff6600, transparent:true, opacity:0.06, side:THREE.DoubleSide
});
const fireRing = new THREE.Mesh(fireRingGeo, fireRingMat);
fireRing.rotation.x = -Math.PI/2;
fireRing.position.y = 0.01;
scene.add(fireRing);

// ══════════════════════════════════════════════
// SEED — DST at the base, inside the fire
// ══════════════════════════════════════════════

const seedGroup = new THREE.Group();
const tetGeo = new THREE.TetrahedronGeometry(0.6);
const tetMat = new THREE.MeshStandardMaterial({
  color:0xc9a44a, emissive:0xc9a44a, emissiveIntensity:0.5,
  transparent:true, opacity:0.7, wireframe:true
});
const tet1 = new THREE.Mesh(tetGeo, tetMat);
const tet2 = new THREE.Mesh(tetGeo, tetMat.clone());
tet2.rotation.x = Math.PI;
seedGroup.add(tet1, tet2);
const seedGlow = new THREE.PointLight(0xc9a44a, 1.5, 8);
seedGroup.add(seedGlow);
seedGroup.position.y = 0.5;
scene.add(seedGroup);

// ══════════════════════════════════════════════
// TRUNK — warm brown, visible, alive
// ══════════════════════════════════════════════

const TH = 8, TS = 40;
function buildTrunk(){
  const pts=[];
  for(let i=0;i<=TS;i++){const t=i/TS; pts.push(new THREE.Vector3(Math.sin(t*2)*0.15, t*TH, Math.cos(t*3)*0.1));}
  const curve = new THREE.CatmullRomCurve3(pts);
  const frames = curve.computeFrenetFrames(TS, false);
  const pos=[],nrm=[],uvs=[],idx=[];
  const RS=8;
  for(let i=0;i<=TS;i++){
    const t=i/TS, r=0.55*Math.pow(1-t*0.65,0.8), p=curve.getPointAt(t);
    const N=frames.normals[i], B=frames.binormals[i];
    for(let j=0;j<=RS;j++){
      const v=(j/RS)*Math.PI*2, s=Math.sin(v), c=Math.cos(v);
      const nx=c*N.x+s*B.x, ny=c*N.y+s*B.y, nz=c*N.z+s*B.z;
      const bark=1+0.06*Math.sin(i*3+j*5)*Math.sin(i*7+j*2);
      pos.push(p.x+r*bark*nx, p.y+r*bark*ny, p.z+r*bark*nz);
      nrm.push(nx,ny,nz); uvs.push(j/RS, i/TS);
    }
  }
  for(let i=0;i<TS;i++) for(let j=0;j<RS;j++){
    const a=i*(RS+1)+j, b=a+RS+1;
    idx.push(a,b,a+1, b,b+1,a+1);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(nrm,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx);
  return new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:0x6a4a2a, roughness:0.85, metalness:0.05}));
}
const trunk = buildTrunk();
scene.add(trunk);

// ══════════════════════════════════════════════
// ROOTS — visible, warm, reaching out from fire
// ══════════════════════════════════════════════

for(let i=0;i<8;i++){
  const a=(i/8)*Math.PI*2+Math.random()*0.3;
  const pts=[];
  const len=3+Math.random()*4, depth=1.5+Math.random()*2;
  for(let j=0;j<=12;j++){
    const t=j/12;
    pts.push(new THREE.Vector3(
      Math.cos(a)*t*len+Math.sin(t*4)*0.3,
      -t*depth-Math.sin(t*Math.PI)*depth*0.3,
      Math.sin(a)*t*len+Math.cos(t*3+a)*0.2
    ));
  }
  const curve=new THREE.CatmullRomCurve3(pts);
  const geo=new THREE.TubeGeometry(curve,16,0.06+Math.random()*0.04,6,false);
  const mat=new THREE.MeshStandardMaterial({color:0x5a3a1a, roughness:0.9, metalness:0.1});
  scene.add(new THREE.Mesh(geo,mat));
}

// ══════════════════════════════════════════════
// BRANCHES + LEAVES + KILLS
// ══════════════════════════════════════════════

const interactive = [];

DOMAINS.forEach(domain => {
  const startY = TH*domain.h*0.85+1;
  const a = domain.angle;
  const branchLen = 4+domain.leaves.length*0.4;
  const pts=[];
  for(let i=0;i<=20;i++){
    const t=i/20;
    const out=t*branchLen*domain.lean*2;
    const up=startY+t*t*branchLen*(1-domain.lean)-(1-t)*t*1.5;
    pts.push(new THREE.Vector3(
      Math.cos(a)*out+Math.sin(t*3+a)*0.4*t,
      up,
      Math.sin(a)*out+Math.cos(t*2+a)*0.3*t
    ));
  }
  const curve=new THREE.CatmullRomCurve3(pts);
  const bGeo=new THREE.TubeGeometry(curve,16,0.14*(1-0.3*domain.h),6,false);
  const bMat=new THREE.MeshStandardMaterial({
    color:new THREE.Color(domain.color).multiplyScalar(0.6),
    roughness:0.8, metalness:0.1
  });
  const bMesh=new THREE.Mesh(bGeo,bMat);
  bMesh.userData={type:'branch',name:domain.name,desc:`${domain.leaves.length} findings, ${domain.kills.length} kills`};
  interactive.push(bMesh);
  scene.add(bMesh);

  // Leaves
  domain.leaves.forEach((leaf,li)=>{
    const lt=(li+1)/(domain.leaves.length+1);
    const bp=curve.getPointAt(Math.min(lt*0.9+0.1,0.99));
    const sa=a+(li-domain.leaves.length/2)*0.3;
    const sl=1.2+Math.random()*0.8;
    const sp=[];
    for(let j=0;j<=8;j++){
      const st=j/8;
      sp.push(new THREE.Vector3(
        bp.x+Math.cos(sa)*st*sl*0.6,
        bp.y+st*sl*0.8+Math.sin(st*Math.PI)*0.3,
        bp.z+Math.sin(sa)*st*sl*0.6
      ));
    }
    const sc=new THREE.CatmullRomCurve3(sp);
    const sg=new THREE.TubeGeometry(sc,6,0.035,4,false);
    scene.add(new THREE.Mesh(sg,new THREE.MeshStandardMaterial({color:new THREE.Color(domain.color).multiplyScalar(0.65),roughness:0.8})));

    const tp=sc.getPointAt(1);
    const lg=new THREE.SphereGeometry(0.1+Math.random()*0.06,6,4);
    const lm=new THREE.MeshStandardMaterial({
      color:domain.color, emissive:domain.color, emissiveIntensity:0.35,
      transparent:true, opacity:0.9
    });
    const lMesh=new THREE.Mesh(lg,lm);
    lMesh.position.copy(tp);
    lMesh.userData={type:'leaf',name:leaf.name,desc:leaf.desc,url:leaf.url};
    interactive.push(lMesh);
    scene.add(lMesh);
  });

  // Kills — broken red stubs
  domain.kills.forEach((kill,ki)=>{
    const kt=0.3+ki*0.15;
    const kp=curve.getPointAt(Math.min(kt,0.9));
    const ka=a+Math.PI*0.3*(ki%2===0?1:-1);
    const kpts=[];
    for(let j=0;j<=4;j++){
      const st=j/4;
      kpts.push(new THREE.Vector3(kp.x+Math.cos(ka)*st*0.8, kp.y+st*0.3-st*st*0.5, kp.z+Math.sin(ka)*st*0.8));
    }
    const kc=new THREE.CatmullRomCurve3(kpts);
    const kg=new THREE.TubeGeometry(kc,4,0.05,4,false);
    const km=new THREE.MeshStandardMaterial({color:0xee5555, emissive:0x551111, emissiveIntensity:0.3, roughness:0.9});
    const kMesh=new THREE.Mesh(kg,km);
    kMesh.userData={type:'kill',name:'Killed',desc:kill};
    interactive.push(kMesh);
    scene.add(kMesh);
  });

  // Label
  const lc=document.createElement('canvas');
  lc.width=256;lc.height=64;
  const ctx=lc.getContext('2d');
  ctx.font='16px Georgia';
  ctx.fillStyle='#'+new THREE.Color(domain.color).getHexString();
  ctx.textAlign='center';ctx.globalAlpha=0.8;
  ctx.fillText(domain.name,128,36);
  const lt=new THREE.CanvasTexture(lc);
  const ls=new THREE.Sprite(new THREE.SpriteMaterial({map:lt,transparent:true,opacity:0.6}));
  const mp=curve.getPointAt(0.6);
  ls.position.set(mp.x,mp.y+1.2,mp.z);
  ls.scale.set(3,0.75,1);
  scene.add(ls);
});

// ══════════════════════════════════════════════
// PETALS — loops that curve back. ideas connecting.
// ══════════════════════════════════════════════

PETALS.forEach(petal=>{
  const from=DOMAINS.find(d=>d.name===petal.from);
  const to=DOMAINS.find(d=>d.name===petal.to);
  if(!from||!to)return;
  const fy=TH*from.h*0.85+3, ty=TH*to.h*0.85+3, my=Math.max(fy,ty)+3;
  const fx=Math.cos(from.angle)*3, fz=Math.sin(from.angle)*3;
  const tx=Math.cos(to.angle)*3, tz=Math.sin(to.angle)*3;
  const pts=[
    new THREE.Vector3(fx,fy,fz),
    new THREE.Vector3((fx+tx)*0.5,my,(fz+tz)*0.5),
    new THREE.Vector3(tx,ty,tz)
  ];
  const curve=new THREE.CatmullRomCurve3(pts);
  const geo=new THREE.TubeGeometry(curve,20,0.04,4,false);
  const mat=new THREE.MeshStandardMaterial({
    color:petal.color, emissive:petal.color, emissiveIntensity:0.4,
    transparent:true, opacity:0.5
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.userData={type:'loop',name:petal.label,desc:petal.desc};
  interactive.push(mesh);
  scene.add(mesh);
});

// ══════════════════════════════════════════════
// THE STAR — Sirius. The library. Pulling everything up.
// ══════════════════════════════════════════════

const starGroup = new THREE.Group();
starGroup.position.y = TH+14;

const starCoreGeo = new THREE.IcosahedronGeometry(0.6,2);
const starCoreMat = new THREE.MeshStandardMaterial({
  color:0xffffff, emissive:0xffeedd, emissiveIntensity:3
});
starGroup.add(new THREE.Mesh(starCoreGeo, starCoreMat));

// Rays
for(let i=0;i<12;i++){
  const a=(i/12)*Math.PI*2;
  const rg=new THREE.CylinderGeometry(0.02,0.005,2+Math.random()*1.5,4);
  const rm=new THREE.MeshBasicMaterial({color:0xffeedd,transparent:true,opacity:0.25});
  const ray=new THREE.Mesh(rg,rm);
  ray.rotation.z=a; ray.rotation.x=Math.random()*0.6;
  ray.position.set(Math.cos(a)*0.8,Math.sin(a)*0.8,Math.sin(a*1.3)*0.3);
  starGroup.add(ray);
}

const sLight=new THREE.PointLight(0xffeedd,4,40);
starGroup.add(sLight);

// Halo
const haloGeo=new THREE.RingGeometry(1,3,32);
const haloMat=new THREE.MeshBasicMaterial({color:0xffeedd,transparent:true,opacity:0.08,side:THREE.DoubleSide});
const halo=new THREE.Mesh(haloGeo,haloMat);
starGroup.add(halo);

scene.add(starGroup);

// ══════════════════════════════════════════════
// PARTICLES — rising from fire toward star
// ══════════════════════════════════════════════

const pCount=120;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(pCount*3);
const pData=[];
for(let i=0;i<pCount;i++){
  const a=Math.random()*Math.PI*2;
  const r=1+Math.random()*6;
  const h=Math.random()*(TH+15);
  pPos[i*3]=Math.cos(a)*r;
  pPos[i*3+1]=h;
  pPos[i*3+2]=Math.sin(a)*r;
  pData.push({a,r,speed:0.003+Math.random()*0.008,phase:Math.random()*Math.PI*2,baseY:h,rise:0.002+Math.random()*0.005});
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({color:0xffcc66,size:0.1,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
const parts=new THREE.Points(pGeo,pMat);
scene.add(parts);

// ══════════════════════════════════════════════
// BACKGROUND STARS
// ══════════════════════════════════════════════

const bgCount=600;
const bgGeo=new THREE.BufferGeometry();
const bgPos=new Float32Array(bgCount*3);
for(let i=0;i<bgCount;i++){
  const theta=Math.random()*Math.PI*2;
  const phi=Math.acos(Math.random()*2-1);
  const r=50+Math.random()*40;
  bgPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
  bgPos[i*3+1]=Math.abs(r*Math.cos(phi))+5;
  bgPos[i*3+2]=r*Math.sin(phi)*Math.sin(theta);
}
bgGeo.setAttribute('position',new THREE.BufferAttribute(bgPos,3));
scene.add(new THREE.Points(bgGeo,new THREE.PointsMaterial({color:0xaabbcc,size:0.12,transparent:true,opacity:0.35})));

// ══════════════════════════════════════════════
// RAYCASTING
// ══════════════════════════════════════════════

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const tooltip=document.getElementById('tooltip');
let hovered=null;

renderer.domElement.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(interactive);
  if(hits.length>0){
    const obj=hits[0].object;
    if(obj.userData&&obj!==hovered){
      hovered=obj;
      const d=obj.userData;
      tooltip.querySelector('.tt-type').textContent=(d.type||'').toUpperCase();
      tooltip.querySelector('.tt-title').textContent=d.name||'';
      tooltip.querySelector('.tt-desc').textContent=d.desc||'';
      tooltip.style.display='block';
    }
    tooltip.style.left=Math.min(e.clientX+15,innerWidth-300)+'px';
    tooltip.style.top=Math.min(e.clientY+15,innerHeight-120)+'px';
  }else{tooltip.style.display='none';hovered=null;}
});

renderer.domElement.addEventListener('click',()=>{
  if(hovered&&hovered.userData.url)location.href=hovered.userData.url;
});

// ══════════════════════════════════════════════
// ANIMATE — fire flickers, particles rise, star pulls
// ══════════════════════════════════════════════

const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();

  // Fire particles — flicker upward, die, respawn
  const fp=fire.geometry.attributes.position.array;
  const fc=fire.geometry.attributes.color.array;
  for(let i=0;i<fireCount;i++){
    const s=fireSeeds[i];
    s.life+=0.008+Math.random()*0.01;
    if(s.life>1){
      s.life=0;
      s.a=Math.random()*Math.PI*2;
      s.r=1.5+Math.random()*3;
    }
    fp[i*3]=Math.cos(s.a+t*0.3)*s.r*(1-s.life*0.3);
    fp[i*3+1]=s.life*3+Math.sin(t*s.speed+s.phase)*0.3;
    fp[i*3+2]=Math.sin(s.a+t*0.3)*s.r*(1-s.life*0.3);
    // Fade from orange to transparent as they rise
    fc[i*3]=1.0*(1-s.life*0.5);
    fc[i*3+1]=(0.4+s.life*0.2)*(1-s.life*0.3);
    fc[i*3+2]=s.life*0.1;
  }
  fire.geometry.attributes.position.needsUpdate=true;
  fire.geometry.attributes.color.needsUpdate=true;

  // Fire lights flicker
  fireLight1.intensity=2.0+Math.sin(t*3.7)*0.8+Math.sin(t*7.1)*0.3;
  fireLight2.intensity=1.5+Math.sin(t*4.3+1)*0.7+Math.sin(t*6.3)*0.2;
  fireLight3.intensity=1.2+Math.sin(t*5.1+2)*0.6;
  fireRing.material.opacity=0.04+0.02*Math.sin(t*2);

  // Seed rotation
  tet1.rotation.y=t*0.4; tet1.rotation.x=t*0.25;
  tet2.rotation.y=-t*0.4; tet2.rotation.z=t*0.2;
  seedGlow.intensity=1.2+Math.sin(t*2)*0.4;

  // Star pulse
  starCoreMat.emissiveIntensity=2.5+0.5*Math.sin(t*1.5);
  halo.lookAt(camera.position);
  halo.material.opacity=0.06+0.03*Math.sin(t*1.2);

  // Particles rise from fire toward star
  const pp=parts.geometry.attributes.position.array;
  for(let i=0;i<pCount;i++){
    const d=pData[i];
    d.phase+=d.speed;
    d.baseY+=d.rise;
    if(d.baseY>TH+16){d.baseY=0;d.r=1+Math.random()*6;} // respawn at bottom
    pp[i*3]=Math.cos(d.phase)*d.r*(1-d.baseY/(TH+16)*0.5); // spiral inward as they rise
    pp[i*3+1]=d.baseY;
    pp[i*3+2]=Math.sin(d.phase)*d.r*(1-d.baseY/(TH+16)*0.5);
  }
  parts.geometry.attributes.position.needsUpdate=true;

  // Quote fades in
  const quote=document.getElementById('quote');
  if(t>3&&t<8)quote.style.opacity=Math.min((t-3)/3,1);
  else if(t>12)quote.style.opacity=Math.max(1-(t-12)/5,0);

  controls.update();
  renderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
