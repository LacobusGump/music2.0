function createRoot(angle, length, depth) {
  const pts = [];
  const segments = 12;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const x = Math.cos(angle) * t * length + Math.sin(t * 4) * 0.3;
    const y = -t * depth - Math.sin(t * Math.PI) * depth * 0.3;
    const z = Math.sin(angle) * t * length + Math.cos(t * 3 + angle) * 0.2;
    pts.push(new THREE.Vector3(x, y, z));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, 16, 0.08 * (1 - 0.5 * Math.random()), 6, false);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x3d2b1a,
    roughness: 0.9,
    metalness: 0.1,
  });
  return new THREE.Mesh(geo, mat);
}

// TRUNK — The main structure. Physics.

const TRUNK_HEIGHT = 8;
const TRUNK_SEGMENTS = 40;

function buildTrunk() {
  const pts = [];
  for (let i = 0; i <= TRUNK_SEGMENTS; i++) {
    const t = i / TRUNK_SEGMENTS;
    const x = Math.sin(t * 2) * 0.15;
    const y = t * TRUNK_HEIGHT;
    const z = Math.cos(t * 3) * 0.1;
    pts.push(new THREE.Vector3(x, y, z));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const radius = (i) => {
    const t = i / 20;
    return 0.6 * (1 - t * 0.6);
  };
  // Custom tube with tapering
  const frames = curve.computeFrenetFrames(TRUNK_SEGMENTS, false);
  const positions = [];
  const normals = [];
  const uvs = [];
  const indices = [];
  const radialSegments = 8;

  for (let i = 0; i <= TRUNK_SEGMENTS; i++) {
    const t = i / TRUNK_SEGMENTS;
    const r = 0.5 * Math.pow(1 - t * 0.7, 0.8);
    const p = curve.getPointAt(t);
    const N = frames.normals[i];
    const B = frames.binormals[i];

    for (let j = 0; j <= radialSegments; j++) {
      const v = (j / radialSegments) * Math.PI * 2;
      const sin = Math.sin(v);
      const cos = Math.cos(v);

      const nx = cos * N.x + sin * B.x;
      const ny = cos * N.y + sin * B.y;
      const nz = cos * N.z + sin * B.z;

      // Add bark texture variation
      const bark = 1 + 0.08 * Math.sin(i * 3 + j * 5) * Math.sin(i * 7 + j * 2);

      positions.push(p.x + r * bark * nx, p.y + r * bark * ny, p.z + r * bark * nz);
      normals.push(nx, ny, nz);
      uvs.push(j / radialSegments, i / TRUNK_SEGMENTS);
    }
  }

  for (let i = 0; i < TRUNK_SEGMENTS; i++) {
    for (let j = 0; j < radialSegments; j++) {
      const a = i * (radialSegments + 1) + j;
      const b = a + radialSegments + 1;
      indices.push(a, b, a + 1);
      indices.push(b, b + 1, a + 1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);

  const mat = new THREE.MeshStandardMaterial({
    color: 0x4a3520,
    roughness: 0.95,
    metalness: 0.05,
  });

  return new THREE.Mesh(geo, mat);
}

function createBranch(domain, index) {
  const group = new THREE.Group();

  // Branch starts from trunk at height proportional to domain.height
  const startY = TRUNK_HEIGHT * domain.height * 0.85 + 1;
  const angle = domain.angle;
  const lean = domain.lean;

  // Main branch curve — starts down toward root, then curves up toward star
  const pts = [];
  const branchLen = 4 + domain.leaves.length * 0.5;
  const segments = 20;

  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    // Start going outward and slightly down, then curve upward
    const outward = t * branchLen * lean * 2;
    const upward = startY + t * t * branchLen * (1 - lean) - (1 - t) * t * 1.5;
    const twist = Math.sin(t * 3 + angle) * 0.4 * t;

    pts.push(new THREE.Vector3(
      Math.cos(angle) * outward + twist,
      upward,
      Math.sin(angle) * outward + Math.cos(t * 2 + angle) * 0.3 * t
    ));
  }

  const curve = new THREE.CatmullRomCurve3(pts);
  const branchGeo = new THREE.TubeGeometry(curve, 16, 0.15 * (1 - 0.3 * domain.height), 6, false);
  const branchMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(domain.color).multiplyScalar(0.5),
    roughness: 0.85,
    metalness: 0.1,
  });
  const branchMesh = new THREE.Mesh(branchGeo, branchMat);
  branchMesh.userData = { type: 'branch', domain: domain.name, desc: `${domain.leaves.length} findings, ${domain.kills.length} kills` };
  interactiveObjects.push(branchMesh);
  group.add(branchMesh);

  // Sub-branches for each leaf
  domain.leaves.forEach((leaf, li) => {
    const lt = (li + 1) / (domain.leaves.length + 1);
    const branchPt = curve.getPointAt(Math.min(lt * 0.9 + 0.1, 0.99));

    // Sub-branch direction — outward and up
    const subAngle = angle + (li - domain.leaves.length / 2) * 0.3;
    const subLen = 1.2 + Math.random() * 0.8;
    const subPts = [];
    const subSegs = 8;

    for (let j = 0; j <= subSegs; j++) {
      const st = j / subSegs;
      subPts.push(new THREE.Vector3(
        branchPt.x + Math.cos(subAngle) * st * subLen * 0.6,
        branchPt.y + st * subLen * 0.8 + Math.sin(st * Math.PI) * 0.3,
        branchPt.z + Math.sin(subAngle) * st * subLen * 0.6
      ));
    }

    const subCurve = new THREE.CatmullRomCurve3(subPts);
    const subGeo = new THREE.TubeGeometry(subCurve, 6, 0.04, 4, false);
    const subMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(domain.color).multiplyScalar(0.6),
      roughness: 0.8,
    });
    const subMesh = new THREE.Mesh(subGeo, subMat);
    group.add(subMesh);

    // Leaf at the tip
    const tipPt = subCurve.getPointAt(1);
    const leafGeo = new THREE.SphereGeometry(0.12 + Math.random() * 0.06, 6, 4);
    const leafMat = new THREE.MeshStandardMaterial({
      color: domain.color,
      emissive: domain.color,
      emissiveIntensity: 0.2,
      transparent: true,
      opacity: 0.8,
    });
    const leafMesh = new THREE.Mesh(leafGeo, leafMat);
    leafMesh.position.copy(tipPt);
    leafMesh.userData = { type: 'leaf', name: leaf.name, desc: leaf.desc, url: leaf.url, domain: domain.name };
    interactiveObjects.push(leafMesh);
    leafGroup.add(leafMesh);
  });

  // Kills — broken branches (red, shorter, jagged end)
  domain.kills.forEach((kill, ki) => {
    const kt = 0.3 + ki * 0.15;
    const killPt = curve.getPointAt(Math.min(kt, 0.9));
    const killAngle = angle + Math.PI * 0.3 * (ki % 2 === 0 ? 1 : -1);
    const killPts = [];

    for (let j = 0; j <= 4; j++) {
      const st = j / 4;
      killPts.push(new THREE.Vector3(
        killPt.x + Math.cos(killAngle) * st * 0.8,
        killPt.y + st * 0.3 - st * st * 0.5,
        killPt.z + Math.sin(killAngle) * st * 0.8
      ));
    }

    const killCurve = new THREE.CatmullRomCurve3(killPts);
    const killGeo = new THREE.TubeGeometry(killCurve, 4, 0.06, 4, false);
    const killMat = new THREE.MeshStandardMaterial({
      color: 0xcc4444,
      emissive: 0x441111,
      emissiveIntensity: 0.2,
      roughness: 0.9,
    });
    const killMesh = new THREE.Mesh(killGeo, killMat);
    killMesh.userData = { type: 'kill', desc: kill, domain: domain.name };
    interactiveObjects.push(killMesh);
    killGroup.add(killMesh);

    // Broken end — small red particles
    const endPt = killCurve.getPointAt(1);
    const sparkGeo = new THREE.SphereGeometry(0.04, 4, 3);
    const sparkMat = new THREE.MeshBasicMaterial({ color: 0xcc4444 });
    for (let s = 0; s < 3; s++) {
      const spark = new THREE.Mesh(sparkGeo, sparkMat);
      spark.position.set(
        endPt.x + (Math.random() - 0.5) * 0.2,
        endPt.y + (Math.random() - 0.5) * 0.2,
        endPt.z + (Math.random() - 0.5) * 0.2
      );
      killGroup.add(spark);
    }
  });

  // Domain label
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 256;
  labelCanvas.height = 64;
  const ctx = labelCanvas.getContext('2d');
  ctx.font = '18px Georgia';
  ctx.fillStyle = '#' + new THREE.Color(domain.color).getHexString();
  ctx.textAlign = 'center';
  ctx.fillText(domain.name, 128, 36);

  const labelTex = new THREE.CanvasTexture(labelCanvas);
  const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true, opacity: 0.7 });
  const labelSprite = new THREE.Sprite(labelMat);
  const midPt = curve.getPointAt(0.6);
  labelSprite.position.set(midPt.x, midPt.y + 1.2, midPt.z);
  labelSprite.scale.set(3, 0.75, 1);
  labelSprite.visible = true;
  labelSprites.push(labelSprite);
  group.add(labelSprite);

  return group;
}

DOMAINS.forEach((domain, i) => {
  const branch = createBranch(domain, i);
  branchGroup.add(branch);
});

scene.add(branchGroup);
scene.add(leafGroup);
scene.add(killGroup);

// ══════════════════════════════════════════════
// PETALS — Loops that curve back
// ══════════════════════════════════════════════

const petalGroup = new THREE.Group();

PETALS.forEach(petal => {
  const fromDomain = DOMAINS.find(d => d.name === petal.from);
  const toDomain = DOMAINS.find(d => d.name === petal.to);
  if (!fromDomain || !toDomain) return;

  const fromY = TRUNK_HEIGHT * fromDomain.height * 0.85 + 3;
  const toY = TRUNK_HEIGHT * toDomain.height * 0.85 + 3;
  const midY = Math.max(fromY, toY) + 3;

  const fromX = Math.cos(fromDomain.angle) * 3;
  const fromZ = Math.sin(fromDomain.angle) * 3;
  const toX = Math.cos(toDomain.angle) * 3;
  const toZ = Math.sin(toDomain.angle) * 3;

  const pts = [
    new THREE.Vector3(fromX, fromY, fromZ),
    new THREE.Vector3((fromX + toX) * 0.5 + Math.random() * 2 - 1, midY, (fromZ + toZ) * 0.5 + Math.random() * 2 - 1),
    new THREE.Vector3(toX, toY, toZ),
  ];

  const curve = new THREE.CatmullRomCurve3(pts);
  const petalGeo = new THREE.TubeGeometry(curve, 20, 0.03, 4, false);
  const petalMat = new THREE.MeshStandardMaterial({
    color: petal.color,
    emissive: petal.color,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.4,
  });
  const petalMesh = new THREE.Mesh(petalGeo, petalMat);
  petalMesh.userData = { type: 'petal', name: petal.label, desc: petal.desc };
  interactiveObjects.push(petalMesh);
  petalGroup.add(petalMesh);
});

scene.add(petalGroup);

// ══════════════════════════════════════════════
// THE STAR — Sirius. The library. The source.
// ══════════════════════════════════════════════

const starGroup = new THREE.Group();
starGroup.position.y = TRUNK_HEIGHT + 14;

// Core
const starCoreGeo = new THREE.IcosahedronGeometry(0.5, 2);
const starCoreMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0xffeedd,
  emissiveIntensity: 2,
});
const starCore = new THREE.Mesh(starCoreGeo, starCoreMat);
starGroup.add(starCore);

// Rays
const rayCount = 8;
for (let i = 0; i < rayCount; i++) {
  const angle = (i / rayCount) * Math.PI * 2;
  const rayGeo = new THREE.CylinderGeometry(0.02, 0.005, 2 + Math.random(), 4);
  const rayMat = new THREE.MeshBasicMaterial({
    color: 0xffeedd,
    transparent: true,
    opacity: 0.3,
  });
  const ray = new THREE.Mesh(rayGeo, rayMat);
  ray.rotation.z = angle;
  ray.rotation.x = Math.random() * 0.5;
  ray.position.set(Math.cos(angle) * 0.8, Math.sin(angle) * 0.8, 0);
  starGroup.add(ray);
}

// Glow
const starLight = new THREE.PointLight(0xffeedd, 3, 30);
starGroup.add(starLight);

// Halo
const haloGeo = new THREE.RingGeometry(0.8, 2.5, 32);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0xffeedd,
  transparent: true,
  opacity: 0.06,
  side: THREE.DoubleSide,
});
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.lookAt(camera.position);
starGroup.add(halo);

scene.add(starGroup);

// ══════════════════════════════════════════════
// PARTICLES — Fireflies / coupling energy
// ══════════════════════════════════════════════

const particleCount = 80;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpeeds = [];

for (let i = 0; i < particleCount; i++) {
  const r = 2 + Math.random() * 8;
  const a = Math.random() * Math.PI * 2;
  const h = Math.random() * (TRUNK_HEIGHT + 12);
  particlePositions[i*3] = Math.cos(a) * r;
  particlePositions[i*3+1] = h;
  particlePositions[i*3+2] = Math.sin(a) * r;
  particleSpeeds.push({
    speed: 0.003 + Math.random() * 0.008,
    radius: r,
    phase: Math.random() * Math.PI * 2,
    ySpeed: (Math.random() - 0.3) * 0.01,
    baseY: h,
  });
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xc9a44a,
  size: 0.12,
  transparent: true,
  opacity: 0.5,
  blending: THREE.AdditiveBlending,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ══════════════════════════════════════════════
// BACKGROUND STARS
// ══════════════════════════════════════════════

const bgStarCount = 500;
const bgStarGeo = new THREE.BufferGeometry();
const bgStarPos = new Float32Array(bgStarCount * 3);
for (let i = 0; i < bgStarCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(Math.random() * 2 - 1);
  const r = 60 + Math.random() * 30;
  bgStarPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  bgStarPos[i*3+1] = Math.abs(r * Math.cos(phi)) + 5;
  bgStarPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
bgStarGeo.setAttribute('position', new THREE.BufferAttribute(bgStarPos, 3));
const bgStarMat = new THREE.PointsMaterial({ color: 0x888899, size: 0.15, transparent: true, opacity: 0.4 });
scene.add(new THREE.Points(bgStarGeo, bgStarMat));

// ══════════════════════════════════════════════
// GROWTH ANIMATION
// ══════════════════════════════════════════════

let growthProgress = 0;
let growing = true;
let autoRotate = false;
let showLabels = true;

// All meshes start invisible, reveal with growth
const allMeshes = [];
branchGroup.traverse(m => { if (m.isMesh) allMeshes.push({ mesh: m, threshold: 0.2 + Math.random() * 0.3 }); });
leafGroup.traverse(m => { if (m.isMesh) allMeshes.push({ mesh: m, threshold: 0.5 + Math.random() * 0.4 }); });
killGroup.traverse(m => { if (m.isMesh) allMeshes.push({ mesh: m, threshold: 0.4 + Math.random() * 0.3 }); });
petalGroup.traverse(m => { if (m.isMesh) allMeshes.push({ mesh: m, threshold: 0.6 + Math.random() * 0.3 }); });

// Start with everything hidden
allMeshes.forEach(item => {
  item.mesh.material.transparent = true;
  item.mesh.material.opacity = 0;
});
labelSprites.forEach(s => s.material.opacity = 0);
starGroup.visible = false;

// ══════════════════════════════════════════════
// RAYCASTING — Hover interaction
// ══════════════════════════════════════════════

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hoveredObject = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(interactiveObjects);

  if (intersects.length > 0) {
    const obj = intersects[0].object;
    if (obj.userData && obj !== hoveredObject) {
      hoveredObject = obj;
      const data = obj.userData;

      tooltip.querySelector('.tt-type').textContent = data.type ? data.type.toUpperCase() : '';
      tooltip.querySelector('.tt-title').textContent = data.name || data.domain || '';
      tooltip.querySelector('.tt-desc').textContent = data.desc || '';
      tooltip.querySelector('.tt-kills').textContent = '';

      tooltip.style.display = 'block';
    }
    tooltip.style.left = Math.min(e.clientX + 15, window.innerWidth - 300) + 'px';
    tooltip.style.top = Math.min(e.clientY + 15, window.innerHeight - 120) + 'px';
  } else {
    tooltip.style.display = 'none';
    hoveredObject = null;
  }
}

function onClick(e) {
  if (hoveredObject && hoveredObject.userData.url) {
    window.location.href = hoveredObject.userData.url;
  }
}

renderer.domElement.addEventListener('mousemove', onMouseMove);
renderer.domElement.addEventListener('click', onClick);

// Touch support
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    onMouseMove({ clientX: t.clientX, clientY: t.clientY });
  }
});

// ══════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════

document.getElementById('btn-grow').addEventListener('click', function() {
  growing = !growing;
  if (growing) {
    growthProgress = 0;
    allMeshes.forEach(item => item.mesh.material.opacity = 0);
    labelSprites.forEach(s => s.material.opacity = 0);
    starGroup.visible = false;
  }
  this.classList.toggle('active', growing);
});

document.getElementById('btn-rotate').addEventListener('click', function() {
  autoRotate = !autoRotate;
  controls.autoRotate = autoRotate;
  controls.autoRotateSpeed = 0.5;
  this.classList.toggle('active', autoRotate);
});

document.getElementById('btn-labels').addEventListener('click', function() {
  showLabels = !showLabels;
  labelSprites.forEach(s => s.visible = showLabels);
  this.classList.toggle('active', showLabels);
});

// ══════════════════════════════════════════════
// ANIMATION LOOP
// ══════════════════════════════════════════════

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Growth
  if (growing && growthProgress < 1) {
    growthProgress = Math.min(growthProgress + 0.003, 1);

    // Reveal meshes based on threshold
    allMeshes.forEach(item => {
      if (growthProgress > item.threshold) {
        const localProgress = Math.min((growthProgress - item.threshold) / 0.15, 1);
        item.mesh.material.opacity = localProgress * (item.mesh.userData.type === 'kill' ? 0.8 : 1);
      }
    });

    // Labels fade in late
    if (growthProgress > 0.6) {
      const labelAlpha = Math.min((growthProgress - 0.6) / 0.3, 0.7);
      labelSprites.forEach(s => s.material.opacity = showLabels ? labelAlpha : 0);
    }

    // Star appears last
    if (growthProgress > 0.85) {
      starGroup.visible = true;
      const starAlpha = (growthProgress - 0.85) / 0.15;
      starCoreMat.emissiveIntensity = starAlpha * 2;
      starLight.intensity = starAlpha * 3;
    }

    // Trunk grows
    trunk.scale.y = Math.min(growthProgress * 2, 1);

    // Seed pulses during early growth
    if (growthProgress < 0.3) {
      const pulse = 1 + 0.2 * Math.sin(t * 5);
      seedGroup.scale.setScalar(pulse);
      seedGlow.intensity = 1 + Math.sin(t * 5) * 0.5;
    } else {
      seedGroup.scale.setScalar(1);
      seedGlow.intensity = 0.3;
    }
  }

  // Seed rotation
  tet1.rotation.y = t * 0.3;
  tet1.rotation.x = t * 0.2;
  tet2.rotation.y = -t * 0.3;
  tet2.rotation.z = t * 0.15;

  // Star rotation + pulse
  starCore.rotation.y = t * 0.5;
  starCore.rotation.x = t * 0.3;
  if (starGroup.visible) {
    const starPulse = 1 + 0.05 * Math.sin(t * 2);
    starCore.scale.setScalar(starPulse);
    halo.lookAt(camera.position);
    halo.material.opacity = 0.04 + 0.02 * Math.sin(t * 1.5);
  }

  // Particles orbit upward
  const pPos = particles.geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const s = particleSpeeds[i];
    s.phase += s.speed;
    pPos[i*3] = Math.cos(s.phase) * s.radius;
    pPos[i*3+1] = s.baseY + Math.sin(t * 0.5 + s.phase) * 1.5;
    pPos[i*3+2] = Math.sin(s.phase) * s.radius;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // Leaves gently breathe
  leafGroup.children.forEach((leaf, i) => {
    if (leaf.material && leaf.material.emissiveIntensity !== undefined) {
      leaf.material.emissiveIntensity = 0.15 + 0.1 * Math.sin(t * 1.5 + i * 0.7);
    }
  });

  // Warm light follows camera slightly
  warmlight.position.x = camera.position.x * 0.3;
  warmlight.position.z = camera.position.z * 0.3;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
