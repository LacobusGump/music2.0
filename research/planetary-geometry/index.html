(function(){

<script>
(function(){
  'use strict';

  // Check cookie first (fast, no flash)
  function getCookie(name) {
    var v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
    return v ? v.pop() : '';
  }

  if (getCookie('gump_paid') === 'aXNhYWM') return;

  // Also check localStorage for hm.<3 password (backwards compat)
  try { if (localStorage.getItem('gump_key') === 'hm') return; } catch(e) {}

  // Hide body immediately
  var hideStyle = document.createElement('style');
  hideStyle.id = 'g-hide';
  hideStyle.textContent = 'body{visibility:hidden!important;}';
  document.head.appendChild(hideStyle);

  document.addEventListener('DOMContentLoaded', function() {
    // Double-check after DOM loads (cookie may have been set by redirect)
    if (getCookie('gump_paid') === 'aXNhYWM') {
      hideStyle.remove();
      return;
    }

    var gate = document.createElement('div');
    gate.id = 'g-gate';
    gate.style.cssText = [
      'position:fixed;inset:0;background:#06050a',
      'display:flex;align-items:center;justify-content:center',
      'z-index:99999;font-family:Georgia,serif;visibility:visible'
    ].join(';');

    gate.innerHTML =
      '<div style="text-align:center;max-width:360px;padding:40px 24px;">' +
        '<div style="width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#e8c07a,#b8753a 55%,#7a4520);box-shadow:0 0 20px rgba(201,164,74,0.25);margin:0 auto 20px;animation:breathe 4s ease-in-out infinite;"></div>' +
        '<div id="g-title" style="font-family:Futura,Century Gothic,sans-serif;font-size:0.62em;letter-spacing:0.2em;color:#c9a44a;text-transform:uppercase;margin-bottom:6px;">' +
          document.title.replace(/\s*[—\-].*$/, '').trim() +
        '</div>' +
        '<p style="font-size:0.72em;color:rgba(196,160,136,0.4);line-height:1.8;margin-bottom:6px;">deep research</p>' +

        // Pay button
        '<a id="g-pay" href="https://buy.stripe.com/bJe14n0D60Wd10N2DKfIs0f" ' +
          'style="display:block;background:rgba(201,164,74,0.1);border:1px solid rgba(201,164,74,0.3);border-radius:8px;padding:11px 22px;color:#c9a44a;font-family:Futura,Century Gothic,sans-serif;font-size:0.62em;letter-spacing:0.15em;text-transform:uppercase;text-decoration:none;margin-bottom:10px;transition:all 0.2s;"' +
          ' onmouseover="this.style.background=\'rgba(201,164,74,0.18)\'" onmouseout="this.style.background=\'rgba(201,164,74,0.1)\'">' +
          'unlock research — $3' +
        '</a>' +

        // Divider
        '<div style="font-size:0.6em;color:rgba(196,160,136,0.2);margin:10px 0;letter-spacing:0.1em;">or</div>' +

        // Password input
        '<input id="g-pw" type="text" placeholder="&#x2665;" autocomplete="off" ' +
          'style="background:rgba(201,164,74,0.04);border:1px solid rgba(201,164,74,0.12);border-radius:8px;padding:9px 14px;color:#c4a088;font-family:Georgia,serif;font-size:0.85em;width:100%;text-align:center;outline:none;margin-bottom:8px;box-sizing:border-box;" ' +
          'onkeydown="if(event.key===\'Enter\')_gChk()">' +
        '<button onclick="_gChk()" ' +
          'style="background:rgba(201,164,74,0.06);border:1px solid rgba(201,164,74,0.14);border-radius:8px;padding:8px 20px;color:#c9a44a;font-family:Futura,Century Gothic,sans-serif;font-size:0.56em;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;width:100%;box-sizing:border-box;">enter</button>' +
        '<div id="g-err" style="font-size:0.66em;color:rgba(255,120,120,0.5);margin-top:7px;height:14px;"></div>' +
        '<a href="/research/" style="display:block;margin-top:16px;font-family:Futura,sans-serif;font-size:0.52em;letter-spacing:0.13em;color:rgba(201,164,74,0.2);text-decoration:none;">&larr; research</a>' +
      '</div>';

    document.body.appendChild(gate);

    var s2 = document.createElement('style');
    s2.textContent = '#g-gate{visibility:visible!important;}@keyframes breathe{0%,100%{transform:scale(0.94);opacity:0.7;}50%{transform:scale(1.06);opacity:1;}}';
    document.head.appendChild(s2);

    window._gChk = function() {
      var v = document.getElementById('g-pw').value.toLowerCase().trim();
      if (v === 'hm.<3' || v.replace(/[^a-z0-9<3]/g, '') === 'hm<3') {
        try { localStorage.setItem('gump_key', 'hm'); } catch(e) {}
        hideStyle.remove();
        gate.remove();
      } else {
        var err = document.getElementById('g-err');
        err.textContent = 'not quite';
        setTimeout(function() { err.textContent = ''; }, 2000);
      }
    };

    // Poll for cookie (in case Stripe redirect happened in another tab)
    var pollCount = 0;
    var poll = setInterval(function() {
      if (getCookie('gump_paid') === 'aXNhYWM') {
        clearInterval(poll);
        hideStyle.remove();
        gate.remove();
      }
      if (++pollCount > 60) clearInterval(poll); // stop after 30s
    }, 500);
  });
})();

</script>

document.getElementById("pw").addEventListener("keydown",function(e){
  if(e.key==="Enter")unlock();
});

async function unlock(){
  var pw=document.getElementById("pw").value;
  var msg=document.getElementById("msg");
  try{
    var salt=Uint8Array.from(atob(SALT_B64),c=>c.charCodeAt(0));
    var enc=new TextEncoder();
    var keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveBits","deriveKey"]);
    var aesKey=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt:salt,iterations:ITERATIONS,hash:"SHA-256"},
      keyMaterial,
      {name:"AES-GCM",length:256},
      false,["decrypt"]
    );
    var raw=Uint8Array.from(atob(BLOB),c=>c.charCodeAt(0));
    var nonce=raw.slice(0,12);
    var ct=raw.slice(12);
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:nonce},aesKey,ct);
    var html=new TextDecoder().decode(pt);
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    msg.textContent="wrong frequency";
    msg.style.color="#a55530";
    document.getElementById("pw").value="";
    setTimeout(function(){msg.textContent="";msg.style.color="#8b451330";},2000);
  }
}
