  {n:'Failures',g:4,k:0.5,href:'/research/failures/',desc:'60+ killed ideas. This is the most important page.'},
  {n:'The Chain',g:4,k:0.85,href:'/research/the-chain/',desc:'From quarks to this sentence. 17 times. Same love.'},
  {n:'Smell',g:4,k:0.8,href:'/research/smell/',desc:'Body, mind, personality in one sniff. 93.75% detection.'},
  {n:'Humor',g:4,k:0.9,href:'/research/humor-happiness/',desc:'Laughter is a 3.5Hz ego seizure. Joy is a phase transition.'},
  {n:'Science Tree',g:4,k:0.9,href:'/research/science-tree/',desc:'38 sessions. Every step. Every wrong turn. In order.'},

var N = nodes.length;

// ── BUILD CARDS ──
var container = document.getElementById('card-container');
var allCards = [];
var groupEls = [];

for (var g = 0; g < groups.length; g++) {
  var section = document.createElement('div');
  section.className = 'group ' + groups[g].cls;
  section.setAttribute('data-group', g);

  var title = document.createElement('div');
  title.className = 'group-name ' + groups[g].cls;
  title.textContent = groups[g].name;
  section.appendChild(title);

  var grid = document.createElement('div');
  grid.className = 'card-grid';

  for (var i = 0; i < N; i++) {
    var nd = nodes[i];
    if (nd.g !== g) continue;

    var card = document.createElement('a');
    card.className = 'card' + (nd.ghost ? ' ghost' : '');
    card.href = nd.href;
    card.setAttribute('data-index', i);

    var h3 = document.createElement('h3');
    h3.textContent = nd.n;
    card.appendChild(h3);

    if (nd.locked) {
      var lock = document.createElement('div');
      lock.className = 'locked';
      lock.textContent = nd.desc;
      card.appendChild(lock);
    } else {
      var p = document.createElement('p');
      p.textContent = nd.desc;
      card.appendChild(p);
    }

    grid.appendChild(card);
    allCards.push({el: card, node: nd, section: section});
  }

  section.appendChild(grid);
  container.appendChild(section);
  groupEls.push(section);
}

// ── SEARCH ──
var searchInput = document.getElementById('search');
var statsBar = document.getElementById('stats-bar');
var noResults = document.getElementById('no-results');

searchInput.addEventListener('input', function() {
  var q = this.value.toLowerCase().trim();
  var visible = 0;
  var visibleGroups = {};

  for (var i = 0; i < allCards.length; i++) {
    var c = allCards[i];
    var match = !q ||
      c.node.n.toLowerCase().indexOf(q) !== -1 ||
      c.node.desc.toLowerCase().indexOf(q) !== -1;
    c.el.style.display = match ? '' : 'none';
    if (match) {
      visible++;
      visibleGroups[c.node.g] = true;
    }
  }

  // Hide empty group sections
  for (var g = 0; g < groupEls.length; g++) {
    groupEls[g].style.display = visibleGroups[g] ? '' : 'none';
  }

  statsBar.textContent = q ?
    (visible + ' result' + (visible !== 1 ? 's' : '')) :
    N + ' pages across 5 domains';
  noResults.style.display = (visible === 0 && q) ? 'block' : 'none';
});

// ── COSMOS CANVAS (ambient, behind everything) ──
var cv = document.getElementById('cosmos');
var cx = cv.getContext('2d');
var dpr = 1, W = 0, H = 0;
var t = 0;

function resize() {
  dpr = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// Dust particles
var dust = [];
for (var d = 0; d < 50; d++) {
  dust.push({
    x: Math.random() * 2000, y: Math.random() * 2000,
    s: 0.3 + Math.random() * 1.2,
    v: 0.03 + Math.random() * 0.1,
    a: Math.random() * 0.02 + 0.004,
    phase: Math.random() * Math.PI * 2
  });
}

// Ambient nodes — gentle floating dots (no interaction, pure atmosphere)
var cosmosNodes = [];
for (var i = 0; i < N; i++) {
  var nd = nodes[i];
  var col = nd.color || groups[nd.g].color;
  cosmosNodes.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    size: 1.5 + nd.k * 2.5,
    col: col,
    phase: Math.random() * Math.PI * 2,
    speed: 0.004 + Math.random() * 0.008
  });
}

function render() {
  t += 0.006;

  // Clear with trail
  cx.fillStyle = 'rgba(26,17,13,0.15)';
  cx.fillRect(0, 0, W, H);

  // Dust
  for (var di = 0; di < dust.length; di++) {
    var dp = dust[di];
    dp.phase += 0.006;
    dp.y -= dp.v;
    dp.x += Math.sin(dp.phase) * 0.2;
    if (dp.y < -10) { dp.y = H + 10; dp.x = Math.random() * W; }
    if (dp.x < 0) dp.x = W;
    if (dp.x > W) dp.x = 0;
    var da = dp.a * (0.5 + Math.sin(dp.phase * 2) * 0.5);
    cx.fillStyle = 'rgba(184,117,58,' + da.toFixed(4) + ')';
    cx.beginPath();
    cx.arc(dp.x, dp.y, dp.s, 0, Math.PI * 2);
    cx.fill();
  }

  // Cosmos nodes — gentle drift
  for (var i = 0; i < cosmosNodes.length; i++) {
    var cn = cosmosNodes[i];
    cn.phase += cn.speed;
    cn.x += cn.vx + Math.sin(cn.phase) * 0.15;
    cn.y += cn.vy + Math.cos(cn.phase * 0.7 + i) * 0.1;

    // Wrap
    if (cn.x < -20) cn.x = W + 20;
    if (cn.x > W + 20) cn.x = -20;
    if (cn.y < -20) cn.y = H + 20;
    if (cn.y > H + 20) cn.y = -20;

    // Fade based on scroll — stronger at top, ghost below
    var scrollFade = Math.max(0, 1 - (pageYOffset / (H * 0.8)));
    var alpha = 0.25 * scrollFade;
    if (alpha < 0.005) continue;

    // Glow
    var glowR = cn.size * 4;
    var grad = cx.createRadialGradient(cn.x, cn.y, 0, cn.x, cn.y, glowR);
    grad.addColorStop(0, 'rgba(' + cn.col[0] + ',' + cn.col[1] + ',' + cn.col[2] + ',' + (alpha * 0.08).toFixed(4) + ')');
    grad.addColorStop(1, 'rgba(' + cn.col[0] + ',' + cn.col[1] + ',' + cn.col[2] + ',0)');
    cx.fillStyle = grad;
    cx.beginPath();
    cx.arc(cn.x, cn.y, glowR, 0, Math.PI * 2);
    cx.fill();

    // Core
    cx.fillStyle = 'rgba(' + cn.col[0] + ',' + cn.col[1] + ',' + cn.col[2] + ',' + alpha.toFixed(4) + ')';
    cx.beginPath();
    cx.arc(cn.x, cn.y, cn.size, 0, Math.PI * 2);
    cx.fill();
  }

  // Faint edges between nearby nodes (atmosphere only)
  cx.globalCompositeOperation = 'lighter';
  var scrollFade2 = Math.max(0, 1 - (pageYOffset / (H * 0.6)));
  if (scrollFade2 > 0.05) {
    for (var i = 0; i < cosmosNodes.length; i++) {
      for (var j = i + 1; j < cosmosNodes.length; j++) {
        if (nodes[i].g !== nodes[j].g) continue;
        var a = cosmosNodes[i], b = cosmosNodes[j];
        var dx = a.x - b.x, dy = a.y - b.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 200) continue;
        var ea = 0.015 * scrollFade2 * Math.max(0, 1 - dist / 200);
        if (ea < 0.002) continue;
        cx.strokeStyle = 'rgba(184,117,58,' + ea.toFixed(4) + ')';
        cx.lineWidth = 0.4;
        cx.beginPath();
        cx.moveTo(a.x, a.y);
        cx.lineTo(b.x, b.y);
        cx.stroke();
      }
    }
  }
  cx.globalCompositeOperation = 'source-over';

  requestAnimationFrame(render);
}
render();

})();
