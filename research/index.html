.pulse-hrm{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;

  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (typeof organs !== 'undefined') layoutOrgans();
}
resize();
window.addEventListener('resize', resize);

// Build legend
var legendEl = document.getElementById('pulse-legend');
for (var g = 0; g < groups.length; g++) {
  var row = document.createElement('div');
  var dot = document.createElement('span');
  dot.className = 'dot';
  dot.style.background = groups[g].colorHex;
  row.appendChild(dot);
  row.appendChild(document.createTextNode(groups[g].name));
  legendEl.appendChild(row);
}

// === THE HEART -- Kuramoto oscillator ===
var phases = new Float64Array(N);
var omega = new Float64Array(N);
for (var i = 0; i < N; i++) {
  phases[i] = Math.random() * TAU;
  omega[i] = (0.4 + nodes[i].k * 0.6) * TAU * (0.3 + Math.random() * 0.4);
}

// === ORGAN LAYOUT -- five chambers ===
var organs = [];
var organCenters = [];
var cellPositions = [];

function layoutOrgans() {
  var cx0 = W / 2, cy0 = W < 600 ? H * 0.38 : H / 2;
  var spread = Math.min(W, H) * 0.28;

  var angles = [
    0,
    -Math.PI * 0.65,
    -Math.PI * 0.25,
    Math.PI * 0.25,
    Math.PI * 0.65,
  ];
  var distances = [0, spread, spread, spread, spread];

  organCenters = [];
  for (var g = 0; g < 5; g++) {
    organCenters.push({
      x: cx0 + Math.cos(angles[g]) * distances[g],
      y: cy0 + Math.sin(angles[g]) * distances[g]
    });
  }

  // Place cells within their organ -- golden angle spiral
  cellPositions = [];
  var GA = 2.39996322;

  for (var i = 0; i < N; i++) {
    var c = nodes[i];
    var oc = organCenters[c.g];
    var idx = 0;
    for (var j = 0; j < i; j++) { if (nodes[j].g === c.g) idx++; }
    var total = 0;
    for (var j = 0; j < N; j++) { if (nodes[j].g === c.g) total++; }

    var r = 12 + Math.sqrt(idx / Math.max(total, 1)) * (spread * 0.38);
    var a = idx * GA;
    cellPositions.push({
      x: oc.x + Math.cos(a) * r,
      y: oc.y + Math.sin(a) * r
    });
  }
}
layoutOrgans();

// === BLOOD VESSELS ===
var vessels = [];
for (var i = 0; i < N; i++) {
  for (var j = i + 1; j < N; j++) {
    var kDiff = Math.abs(nodes[i].k - nodes[j].k);
    var crossDomain = nodes[i].g !== nodes[j].g;

    if (crossDomain && kDiff < 0.06) {
      vessels.push({a: i, b: j, type: 'artery', strength: 1 - kDiff * 16});
    } else if (!crossDomain && kDiff < 0.04) {
      vessels.push({a: i, b: j, type: 'capillary', strength: 1 - kDiff * 25});
    }
  }
}

// Ensure arteries between every domain pair
for (var ga = 0; ga < 5; ga++) {
  for (var gb = ga + 1; gb < 5; gb++) {
    var hasArtery = false;
    for (var v = 0; v < vessels.length; v++) {
      if (vessels[v].type === 'artery') {
        var da = nodes[vessels[v].a].g, db = nodes[vessels[v].b].g;
        if ((da === ga && db === gb) || (da === gb && db === ga)) { hasArtery = true; break; }
      }
    }
    if (!hasArtery) {
      var bestI = -1, bestJ = -1, bestD = 999;
      for (var i = 0; i < N; i++) {
        if (nodes[i].g !== ga) continue;
        for (var j = 0; j < N; j++) {
          if (nodes[j].g !== gb) continue;
          var d = Math.abs(nodes[i].k - nodes[j].k);
          if (d < bestD) { bestD = d; bestI = i; bestJ = j; }
        }
      }
      if (bestI >= 0) vessels.push({a: bestI, b: bestJ, type: 'artery', strength: 0.5});
    }
  }
}

// === MOBILE DETECTION ===
var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 700;
// Mobile brightness multiplier: dims everything ~50%
var mobDim = isMobile ? 0.5 : 1.0;

// === BLOOD PARTICLES ===
var particles = [];
var MAX_PARTICLES = isMobile ? 150 : 300;

function spawnParticle() {
  if (particles.length >= MAX_PARTICLES) return;
  var v = vessels[Math.floor(Math.random() * vessels.length)];
  var forward = Math.random() > 0.5;
  particles.push({
    vessel: v,
    t: forward ? 0 : 1,
    speed: (0.002 + Math.random() * 0.004) * (forward ? 1 : -1),
    life: 1,
    size: v.type === 'artery' ? 2 + Math.random() * 2 : 1 + Math.random(),
  });
}
for (var i = 0; i < 120; i++) spawnParticle();

// === HEARTBEAT ===
var heartPhase = 0;
var heartRate = 0;
var globalR = 0;
var t = 0;

// === MOUSE/TOUCH INTERACTION ===
// Canvas always has pointer-events:none. We listen on document instead
// so scrolling is never blocked on mobile.
var mx = -999, my = -999;
var hoveredCell = -1;
var tipEl = document.getElementById('pulse-tip');
var tipName = tipEl.querySelector('.tn');
var tipDesc = tipEl.querySelector('.td');

// Track scroll state for interaction gating
var scrollY = 0;
window.addEventListener('scroll', function() { scrollY = window.pageYOffset; }, {passive:true});

// Desktop: mousemove on document for hover detection in hero
document.addEventListener('mousemove', function(e) {
  mx = e.clientX; my = e.clientY;
});
document.addEventListener('mouseleave', function() {
  mx = -999; my = -999; hoveredCell = -1;
  tipEl.style.opacity = '0';
});

// Desktop click: only navigate if hovering a cell in hero
document.addEventListener('click', function(e) {
  if (hoveredCell >= 0 && scrollY < H * 0.7) {
    // Don't intercept clicks on actual page elements (cards, search, links)
    var tag = e.target.tagName;
    if (tag === 'A' || tag === 'INPUT' || e.target.closest('.content') || e.target.closest('.back')) return;
    window.location.href = nodes[hoveredCell].href;
  }
});

// Mobile: tap detection that doesn't block scrolling
// Track touch start position/time. If touch ends quickly and hasn't moved much, it's a tap.
var touchStartX = 0, touchStartY = 0, touchStartTime = 0;
document.addEventListener('touchstart', function(e) {
  if (scrollY > H * 0.7) return; // not in hero
  var touch = e.touches[0];
  touchStartX = touch.clientX;
  touchStartY = touch.clientY;
  touchStartTime = Date.now();
  mx = touch.clientX;
  my = touch.clientY;
}, {passive:true});

document.addEventListener('touchend', function(e) {
  if (scrollY > H * 0.7) return;
  var elapsed = Date.now() - touchStartTime;
  var touch = e.changedTouches[0];
  var dx = Math.abs(touch.clientX - touchStartX);
  var dy = Math.abs(touch.clientY - touchStartY);

  // Short tap with minimal movement = cell tap (not a scroll gesture)
  if (elapsed < 300 && dx < 15 && dy < 15) {
    // Update mx/my for the draw loop to detect which cell
    mx = touch.clientX; my = touch.clientY;

    // Find nearest cell
    var bestI = -1, bestD = 35;
    for (var i = 0; i < N; i++) {
      var pos = cellPositions[i];
      if (!pos) continue;
      var ddx = mx - pos.x, ddy = my - pos.y;
      var dist = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dist < bestD) { bestD = dist; bestI = i; }
    }
    if (bestI >= 0) {
      // Don't intercept if tapping on a page element
      if (e.target.closest('.content') || e.target.closest('.back') || e.target.tagName === 'INPUT') return;
      e.preventDefault();
      window.location.href = nodes[bestI].href;
    }
  }
  // Reset mouse position after touch
  setTimeout(function() { mx = -999; my = -999; }, 100);
});

// === SIMULATION STEP ===
function step() {
  var mre = 0, mim = 0;
  for (var i = 0; i < N; i++) {
    mre += Math.cos(phases[i]);
    mim += Math.sin(phases[i]);
  }
  mre /= N; mim /= N;
  globalR = Math.sqrt(mre * mre + mim * mim);

  for (var i = 0; i < N; i++) {
    var coupling = nodes[i].k * Math.sin(Math.atan2(mim, mre) - phases[i]);
    phases[i] += 0.016 * (omega[i] + coupling);
  }

  heartPhase += 0.016 * (1 + globalR * 3);
  heartRate = 40 + globalR * 80;
}

// === DRAW ===
function draw() {
  t += 0.016;
  step();

  // Scroll-based fade: full opacity at top, fades as you scroll
  var scrollFade = Math.max(0, 1 - (scrollY / (H * 0.8)));
  var canvasOpacity = scrollFade;

  // Apply opacity to the canvas element
  cv.style.opacity = canvasOpacity.toFixed(3);

  // Interaction gating: only interactive in the hero viewport
  var inHero = scrollY < H * 0.7;

  // Fade legend and HRM with scroll
  legendEl.style.opacity = scrollFade.toFixed(3);
  document.getElementById('pulse-hrm').style.opacity = scrollFade.toFixed(3);
  if (!inHero) {
    tipEl.style.opacity = '0';
    hoveredCell = -1;
  }

  // Clear with trail
  cx.fillStyle = 'rgba(26,17,13,0.15)';
  cx.fillRect(0, 0, W, H);

  var heartBeat = Math.pow(Math.max(0, Math.sin(heartPhase * 2)), 4);
  var systole = 0.85 + heartBeat * 0.3;

  // === DRAW VESSELS ===
  cx.globalCompositeOperation = 'lighter';

  for (var v = 0; v < vessels.length; v++) {
    var vs = vessels[v];
    var pa = cellPositions[vs.a], pb = cellPositions[vs.b];
    if (!pa || !pb) continue;
    var ca = groups[nodes[vs.a].g].color;
    var cb = groups[nodes[vs.b].g].color;

    var mr = (ca[0] + cb[0]) >> 1;
    var mg = (ca[1] + cb[1]) >> 1;
    var mb = (ca[2] + cb[2]) >> 1;

    var pdiff = Math.abs(phases[vs.a] - phases[vs.b]) % TAU;
    if (pdiff > Math.PI) pdiff = TAU - pdiff;
    var sync = 1 - pdiff / Math.PI;

    var alpha, width;
    if (vs.type === 'artery') {
      alpha = sync * sync * 0.12 * vs.strength * systole * mobDim;
      width = 0.5 + sync * 2.5;
    } else {
      alpha = sync * sync * 0.04 * vs.strength * mobDim;
      width = 0.3 + sync * 0.8;
    }

    if (alpha < 0.005) continue;

    var midX = (pa.x + pb.x) / 2;
    var midY = (pa.y + pb.y) / 2;
    var dx = pb.x - pa.x, dy = pb.y - pa.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    var pullX = (W / 2 - midX) * 0.15;
    var pullY = (H / 2 - midY) * 0.15;
    var cpx = midX + pullX + (-dy / len) * len * 0.08;
    var cpy = midY + pullY + (dx / len) * len * 0.08;

    cx.strokeStyle = 'rgba(' + mr + ',' + mg + ',' + mb + ',' + alpha.toFixed(4) + ')';
    cx.lineWidth = width;
    cx.beginPath();
    cx.moveTo(pa.x, pa.y);
    cx.quadraticCurveTo(cpx, cpy, pb.x, pb.y);
    cx.stroke();

    if (vs.type === 'artery' && sync > 0.6) {
      var glowA = (sync - 0.6) * 0.06 * systole * mobDim;
      cx.strokeStyle = 'rgba(' + mr + ',' + mg + ',' + mb + ',' + glowA.toFixed(4) + ')';
      cx.lineWidth = width * 3;
      cx.beginPath();
      cx.moveTo(pa.x, pa.y);
      cx.quadraticCurveTo(cpx, cpy, pb.x, pb.y);
      cx.stroke();
    }
  }

  // === BLOOD PARTICLES ===
  if (Math.random() < 0.3 + globalR * 0.5) spawnParticle();

  for (var p = particles.length - 1; p >= 0; p--) {
    var pt = particles[p];
    pt.t += pt.speed * (1 + heartBeat * 2);

    if (pt.t <= 0 || pt.t >= 1) {
      particles.splice(p, 1);
      continue;
    }

    var vs = pt.vessel;
    var pa = cellPositions[vs.a], pb = cellPositions[vs.b];
    if (!pa || !pb) continue;

    var tt = pt.t;
    var midX = (pa.x + pb.x) / 2;
    var midY = (pa.y + pb.y) / 2;
    var dx = pb.x - pa.x, dy = pb.y - pa.y;
    var len = Math.sqrt(dx * dx + dy * dy) || 1;
    var pullX = (W / 2 - midX) * 0.15;
    var pullY = (H / 2 - midY) * 0.15;
    var cpx = midX + pullX + (-dy / len) * len * 0.08;
    var cpy = midY + pullY + (dx / len) * len * 0.08;

    var u = 1 - tt;
    var px = u * u * pa.x + 2 * u * tt * cpx + tt * tt * pb.x;
    var py = u * u * pa.y + 2 * u * tt * cpy + tt * tt * pb.y;

    var edgeFade = Math.min(tt * 5, (1 - tt) * 5, 1);
    var srcG = pt.speed > 0 ? nodes[vs.a].g : nodes[vs.b].g;
    var col = groups[srcG].color;
    var bright = (0.3 + heartBeat * 0.7) * edgeFade * mobDim;

    var grad = cx.createRadialGradient(px, py, 0, px, py, pt.size * 3);
    grad.addColorStop(0, 'rgba(' + Math.min(255, col[0] + 80) + ',' +
      Math.min(255, col[1] + 80) + ',' +
      Math.min(255, col[2] + 80) + ',' + (bright * 0.6).toFixed(3) + ')');
    grad.addColorStop(0.4, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (bright * 0.3).toFixed(3) + ')');
    grad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
    cx.fillStyle = grad;
    cx.fillRect(px - pt.size * 3, py - pt.size * 3, pt.size * 6, pt.size * 6);
  }

  // === CELLS -- hover detection gated to hero viewport ===
  var prevHovered = hoveredCell;
  hoveredCell = -1;
  var bestDist = 30;

  if (inHero) {
    for (var i = 0; i < N; i++) {
      var pos = cellPositions[i];
      if (!pos) continue;
      var dmx = mx - pos.x, dmy = my - pos.y;
      var dist = Math.sqrt(dmx * dmx + dmy * dmy);
      if (dist < bestDist) {
        bestDist = dist;
        hoveredCell = i;
      }
    }
  }

  // Draw all cells
  for (var i = 0; i < N; i++) {
    var pos = cellPositions[i];
    if (!pos) continue;
    var col = groups[nodes[i].g].color;
    var phase = phases[i];

    var breath = Math.sin(phase);
    var cellK = nodes[i].k;
    var baseSize = 2 + cellK * 3;
    var size = baseSize * (1 + breath * 0.2) * systole;
    var bright = (0.4 + Math.abs(breath) * 0.4 + heartBeat * 0.2) * mobDim;

    var hoverScale = 1;
    if (hoveredCell === i) {
      hoverScale = 1.8;
      bright = 1; // hover always full brightness even on mobile
    }

    // Glow
    var glowR = size * 4 * hoverScale;
    var glowDim = hoveredCell === i ? 1 : mobDim;
    var grad = cx.createRadialGradient(pos.x, pos.y, size * 0.2 * hoverScale, pos.x, pos.y, glowR);
    grad.addColorStop(0, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (bright * 0.25 * glowDim).toFixed(3) + ')');
    grad.addColorStop(0.3, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (bright * 0.08 * glowDim).toFixed(3) + ')');
    grad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
    cx.fillStyle = grad;
    cx.fillRect(pos.x - glowR, pos.y - glowR, glowR * 2, glowR * 2);

    // Core
    var hotFactor = Math.max(0, breath) * 0.3;
    var cr = Math.min(255, col[0] + (255 - col[0]) * hotFactor | 0);
    var cg = Math.min(255, col[1] + (255 - col[1]) * hotFactor | 0);
    var cb = Math.min(255, col[2] + (255 - col[2]) * hotFactor | 0);

    cx.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + Math.min(1, bright).toFixed(3) + ')';
    cx.beginPath();
    cx.arc(pos.x, pos.y, size * hoverScale, 0, TAU);
    cx.fill();
  }

  cx.globalCompositeOperation = 'source-over';

  // === TOOLTIP ===
  if (hoveredCell >= 0 && inHero) {
    document.body.style.cursor = 'pointer';
    var c = nodes[hoveredCell];
    tipName.textContent = c.n;
    tipDesc.textContent = c.desc;
    var tx = mx + 16, ty = my - 10;
    if (tx + 260 > W) tx = mx - 270;
    if (ty < 10) ty = 10;
    tipEl.style.left = tx + 'px';
    tipEl.style.top = ty + 'px';
    tipEl.style.opacity = '1';
    tipName.style.color = groups[c.g].colorHex;
  } else {
    document.body.style.cursor = '';
    tipEl.style.opacity = '0';
  }

  // === HEART RATE MONITOR ===
  var hrmEl = document.getElementById('pulse-hrm');
  var bpmStr = Math.round(heartRate) + ' bpm';
  var rStr = 'R=' + globalR.toFixed(3);
  hrmEl.textContent = bpmStr + '  ·  ' + rStr + '  ·  ' + N + ' cells';
  var hrmAlpha = 0.12 + heartBeat * 0.25;
  hrmEl.style.color = 'rgba(184,117,58,' + hrmAlpha.toFixed(2) + ')';

  // === ORGAN LABELS ===
  cx.globalAlpha = 0.04 + heartBeat * 0.02;
  cx.font = '400 ' + Math.max(10, Math.min(W, H) * 0.018) + 'px Futura,"Century Gothic",system-ui,sans-serif';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  for (var g = 0; g < 5; g++) {
    var oc = organCenters[g];
    if (!oc) continue;
    var col = groups[g].color;
    cx.fillStyle = 'rgb(' + col[0] + ',' + col[1] + ',' + col[2] + ')';
    var labelY = oc.y - (g === 0 ? 0 : Math.min(W, H) * 0.16);
    if (g >= 3) labelY = oc.y + Math.min(W, H) * 0.16;
    cx.fillText(groups[g].name.toUpperCase(), oc.x, labelY);
  }
  cx.globalAlpha = 1;

  // === CENTER GLOW -- the heart ===
  var heartGlow = cx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, 60 + heartBeat * 40);
  heartGlow.addColorStop(0, 'rgba(184,117,58,' + ((0.02 + heartBeat * 0.06) * mobDim).toFixed(3) + ')');
  heartGlow.addColorStop(0.5, 'rgba(184,117,58,' + ((0.005 + heartBeat * 0.02) * mobDim).toFixed(3) + ')');
  heartGlow.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = heartGlow;
  cx.fillRect(W / 2 - 120, H / 2 - 120, 240, 240);

  requestAnimationFrame(draw);
}

draw();

})();
</script>
<script src="/js/breathe.js?v=2"></script>
</body>
