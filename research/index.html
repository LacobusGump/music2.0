var _acc=0,_lms=performance.now();

function step(){
  t+=0.016;
  var anyHov=(hovC>=0||pinC>=0);

  // Update cluster brightness
  for(var c=0;c<NC;c++){
    var btgt=(c===hovC||c===pinC)?1.6:anyHov?0.38:1.0;
    cBright[c]+=(btgt-cBright[c])*0.07;
  }

  // ── Structural particles: breathe perpendicular to their line segment ──
  var sK=0.014,sDamp=0.962,sDrift=0.05;

function render(){

// ── Interaction ───────────────────────────────────────────────────────────────
var bubble=document.getElementById('bubble'),btitle=document.getElementById('btitle'),bsub=document.getElementById('bsub'),blinks=document.getElementById('blinks'),broom=document.getElementById('broom');
var openId=null;
var SP_CI={};SP.forEach(function(s,i){SP_CI[s.id]=i;});

function openPanel(s,ci){
  var cv2=col(s.c);bubble.style.setProperty('--bc',cv2['--bc']);bubble.style.setProperty('--bg',cv2['--bg']);
  broom.textContent=s.room;btitle.textContent=s.title;bsub.textContent=s.sub;
  blinks.innerHTML='';
  s.links.forEach(function(l){var a=document.createElement('a');a.href=l[1];a.textContent=l[0];if(l[2])a.className='gated';blinks.appendChild(a);});
  blinks.scrollTop=0;bubble.classList.add('on');
  openId=s.id;pinC=ci;
}
function closePanel(){
  bubble.classList.remove('on');openId=null;pinC=-1;
  document.querySelectorAll('.node.active').forEach(function(n){n.classList.remove('active');});
}
document.getElementById('bclose').addEventListener('click',function(e){e.stopPropagation();closePanel();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePanel();});
document.addEventListener('click',function(e){if(!bubble.contains(e.target)&&!e.target.classList.contains('node'))closePanel();});
bubble.addEventListener('click',function(e){e.stopPropagation();});

var whisp=document.getElementById('whisper');
document.querySelectorAll('.node').forEach(function(btn){
  var id=btn.dataset.id,ci=SP_CI[id];
  btn.addEventListener('mouseenter',function(){
    hovC=(ci!==undefined)?ci:-1;
    if(whisp&&ci!==undefined)whisp.textContent=SP[ci].title+' · '+SP[ci].sub.split('.')[0]+'.';
    document.querySelectorAll('.node:not(.active)').forEach(function(n){n.style.opacity='0.35';});
    btn.style.opacity='1';
  });
  btn.addEventListener('mouseleave',function(){
    hovC=-1;
    document.querySelectorAll('.node').forEach(function(n){n.style.opacity='';});
    if(pinC<0&&whisp)whisp.textContent='';
  });
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    var s=SP_MAP[id];if(!s)return;
    if(openId===id){closePanel();return;}
    if(openId)closePanel();
    document.querySelectorAll('.node.active').forEach(function(n){n.classList.remove('active');});
    btn.classList.add('active');
    openPanel(s,(ci!==undefined)?ci:0);
  });
  btn.addEventListener('touchstart',function(e){
    hovC=(ci!==undefined)?ci:-1;
    if(whisp&&ci!==undefined)whisp.textContent=SP[ci].title;
  },{passive:true});
});
})();
