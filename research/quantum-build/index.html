  function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);});}
  async function decrypt(pw){
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var raw=b2u(BLOB);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},key,raw.slice(12));
    return new TextDecoder().decode(pt);
  }
  function render(html){document.open();document.write(html);document.close();}
  async function tryKey(pw,save){
    try{var html=await decrypt(pw);if(save){try{localStorage.setItem(SAVESLOT,pw);}catch(e){}}render(html);return true;}
    catch(e){return false;}
  }
  var wrap=document.getElementById('g-wrap');
  (async function(){
    var slots=['gump_rk','gump_rk_priv'];
    for(var i=0;i<slots.length;i++){
      var v=null;try{v=localStorage.getItem(slots[i]);}catch(e){}
      if(v&&await tryKey(v,false))return;
    }
    wrap.style.visibility='visible';
    document.getElementById('g-pw').focus();
  })();
  function attempt(){
    var pw=document.getElementById('g-pw').value.trim();
    tryKey(pw,true).then(function(ok){
      if(!ok){var e=document.getElementById('g-err');e.textContent='not quite';document.getElementById('g-pw').value='';setTimeout(function(){e.textContent='';},2000);}
    });
  }
  document.getElementById('g-enter').addEventListener('click',attempt);
  document.getElementById('g-pw').addEventListener('keydown',function(e){if(e.key==='Enter')attempt();});
})();
