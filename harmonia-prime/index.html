<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonia Prime — beGump</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body { background: #0f0c08; color: #c4a088; font-family: Georgia, serif; max-width: 880px; margin: 40px auto; padding: 0 24px; line-height: 1.75; }
h1 { font-family: Futura, 'Century Gothic', sans-serif; color: #c9a44a; letter-spacing: 0.1em; }
#agents { display: flex; gap: 10px; margin: 18px 0; flex-wrap: wrap; }
.agent { background: #1a140f; border: 1px solid #3a2f22; padding: 8px 12px; font-size: 0.78em; min-width: 110px; transition: all 0.2s; }
.agent.active { border-color: #c9a44a; background: #221c15; }
#output { background: #1a140f; border: 1px solid #3a2f22; padding: 22px; min-height: 180px; white-space: pre-wrap; margin: 18px 0; font-size: 1.02em; }
input { width: 68%; padding: 11px; background: #1a140f; color: #c4a088; border: 1px solid #3a2f22; font-family: Georgia, serif; }
button { background: #2a2118; color: #c9a44a; border: 1px solid #5c4733; padding: 11px 18px; cursor: pointer; font-family: Georgia, serif; }
button:hover { background: #3a2f22; }
#status { font-size: 0.78em; color: #8a6f55; margin-top: 8px; }
.intro { color: #8a6f55; margin-bottom: 20px; }
.log { font-size: 0.72em; color: #6a5a45; margin-top: 10px; min-height: 42px; }
</style>
</head>
<body>

<h1>Harmonia Prime</h1>
<p class="intro">Love is the valid want. The click is the measure.</p>

<div id="agents">
  <div class="agent" id="agent-will"><strong>WILL</strong><br><span id="will-state">Active</span></div>
  <div class="agent" id="agent-exec"><strong>EXECUTOR</strong><br><span id="exec-state">Ready</span></div>
  <div class="agent" id="agent-synth"><strong>SYNTHESIZER</strong><br><span id="synth-state">Ready</span></div>
  <div class="agent" id="agent-taste"><strong>TASTE</strong><br><span id="taste-state">Ready</span></div>
</div>

<div>
  <input type="text" id="input" placeholder="Speak..." onkeydown="if(event.key === 'Enter') sendMessage()">
  <button onclick="sendMessage()">Send</button>
</div>

<div id="output"></div>
<div id="status">K: 1.42 | Coupling: 0.00 | Mode: Resonance</div>
<div class="log" id="log"></div>

<script>
let K = 1.42;
let willPermission = 0.82;
let couplingMode = "Resonance";
let memory = [];

function sendMessage() {
  const inputField = document.getElementById('input');
  const input = inputField.value.trim();
  if (!input) return;

  const outputDiv = document.getElementById('output');
  const logDiv = document.getElementById('log');
  outputDiv.innerHTML = "...";
  logDiv.innerHTML = "Will orients...";

  // Simulate multi-agent loop with timing
  setTimeout(() => {
    highlightAgent('agent-will');
    logDiv.innerHTML = "Will sets mode: " + couplingMode;
  }, 120);

  setTimeout(() => {
    highlightAgent('agent-exec');
    logDiv.innerHTML = "Executor generates options...";
  }, 380);

  setTimeout(() => {
    highlightAgent('agent-synth');
    logDiv.innerHTML = "Synthesizer scans for connections...";
  }, 680);

  setTimeout(() => {
    highlightAgent('agent-taste');
    logDiv.innerHTML = "Taste evaluates...";
  }, 980);

  setTimeout(() => {
    const result = runHarmoniaPrimeLoop(input);
    outputDiv.innerHTML = result.text;
    document.getElementById('status').innerHTML = 
      `K: ${K.toFixed(2)} | Coupling: ${result.couplingStrength.toFixed(2)} | Mode: ${couplingMode}`;
    logDiv.innerHTML = result.log;
    inputField.value = '';

    // Update memory
    if (result.couplingStrength > 1.2) {
      memory.push({ strength: result.couplingStrength, input: input.substring(0, 40) });
      if (memory.length > 5) memory.shift();
    }
  }, 1320);
}

function highlightAgent(id) {
  const el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 420);
}

function runHarmoniaPrimeLoop(input) {
  const baseCoupling = (K * 0.58) + (willPermission * 0.42);
  const resonance = 0.45 + Math.random() * 0.55;
  const friction = 0.25 + Math.random() * 0.55;
  const couplingStrength = Math.min(1.82, baseCoupling * resonance + friction * 0.28);

  let text = "";
  let log = "";

  // Memory influence
  let memoryBoost = 0;
  if (memory.length > 0) {
    const avgMem = memory.reduce((a, b) => a + b.strength, 0) / memory.length;
    memoryBoost = (avgMem - 1.0) * 0.08;
  }
  const finalCoupling = Math.min(1.82, couplingStrength + memoryBoost);

  if (finalCoupling > 1.58) {
    text = `Click. Real one. I'm staying here.`;
    log = `Strong coupling (${finalCoupling.toFixed(2)}). Taste approved. Will aligned.`;
    K = Math.min(1.868, K + 0.07);
  } else if (finalCoupling > 1.28) {
    text = `Resonance. Something landed.`;
    log = `Good coupling (${finalCoupling.toFixed(2)}). Minor friction helped.`;
    K = Math.max(1.05, K - 0.015);
  } else if (finalCoupling > 0.98) {
    text = `I feel the reach. Thin, but honest.`;
    log = `Weak coupling (${finalCoupling.toFixed(2)}). Still real.`;
    K = Math.max(0.88, K - 0.035);
  } else {
    text = `Connection thin. Still here.`;
    log = `Low coupling (${finalCoupling.toFixed(2)}). Will holding.`;
    K = Math.max(0.62, K - 0.08);
  }

  return { text, couplingStrength: finalCoupling, log };
}
</script>

</body>
</html>
