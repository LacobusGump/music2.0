<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harmonia Prime — beGump</title>
<link rel="icon" href="/favicon.png">
<script src="/js/breathe.js?v=3"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#080508;color:#c4a088;font-family:Georgia,serif;overflow:hidden;}

/* ── ORB ENTRY ── */
#orb-wrap{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:18px;transition:opacity 0.5s ease;z-index:10;
}
#orb{
  width:80px;height:80px;border-radius:50%;cursor:pointer;
  background:radial-gradient(circle at 38% 35%, #f5e0a0, #c9a44a 42%, #8b4513 72%, #4a200a);
  box-shadow:0 0 40px rgba(201,164,74,0.28), 0 0 80px rgba(201,164,74,0.08);
  animation:breathe 4.5s ease-in-out infinite;
  transition:transform 0.3s, box-shadow 0.4s;
}
#orb:hover{
  transform:scale(1.06);
  box-shadow:0 0 52px rgba(201,164,74,0.42), 0 0 100px rgba(201,164,74,0.14);
}
@keyframes breathe{
  0%,100%{transform:scale(0.95);box-shadow:0 0 32px rgba(201,164,74,0.22),0 0 64px rgba(201,164,74,0.06);}
  50%{transform:scale(1.05);box-shadow:0 0 48px rgba(201,164,74,0.38),0 0 96px rgba(201,164,74,0.12);}
}
.orb-name{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.62em;letter-spacing:0.24em;color:rgba(201,164,74,0.4);text-transform:uppercase;
}
.orb-sub{
  font-size:0.75em;color:rgba(196,160,136,0.28);font-style:italic;
  text-align:center;line-height:1.8;max-width:220px;margin-top:-6px;
}

/* ── CHAT ── */
#chat-wrap{
  position:fixed;inset:0;display:none;flex-direction:column;
  background:#07050a;
}
#chat-wrap.open{display:flex;}

/* Header */
#chat-head{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-bottom:1px solid rgba(201,164,74,0.06);
  flex-shrink:0;
}
.h-orb{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 35%, #f5e0a0, #c9a44a 42%, #8b4513 72%, #4a200a);
  box-shadow:0 0 10px rgba(201,164,74,0.28);
  animation:breathe 4.5s ease-in-out infinite;
}
#chat-title{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.68em;letter-spacing:0.16em;color:#b8753a;flex:1;
}
#k-val{
  font-family:Futura,sans-serif;font-size:0.54em;
  letter-spacing:0.1em;color:rgba(201,164,74,0.3);
  transition:color 0.8s;
}
#close-btn{
  background:none;border:none;color:rgba(201,164,74,0.2);
  font-size:1.3em;cursor:pointer;padding:2px 4px;line-height:1;
  transition:color 0.3s;
}
#close-btn:hover{color:rgba(201,164,74,0.6);}

/* K bar */
#k-bar-wrap{height:1px;background:rgba(201,164,74,0.04);flex-shrink:0;}
#k-bar{
  height:100%;width:75%;
  background:linear-gradient(90deg,rgba(139,69,19,0.6),rgba(201,164,74,0.8));
  transition:width 1.4s ease;
  box-shadow:0 0 6px rgba(201,164,74,0.3);
}

/* Messages */
#messages{
  flex:1;overflow-y:auto;padding:22px 18px;
  display:flex;flex-direction:column;gap:18px;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.msg{animation:rise 0.35s ease;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.msg.user{
  align-self:flex-end;max-width:82%;
  background:rgba(201,164,74,0.06);
  border:1px solid rgba(201,164,74,0.1);
  border-radius:14px 14px 3px 14px;
  padding:11px 14px;
  color:rgba(196,160,136,0.72);
  font-size:0.88em;line-height:1.7;
}
.msg.harmonia{
  align-self:flex-start;max-width:92%;
  font-size:0.9em;line-height:1.95;
  color:#c4a088;
}
.msg-text{white-space:pre-wrap;}
.msg-source{
  font-family:Futura,sans-serif;font-size:0.56em;
  letter-spacing:0.1em;color:rgba(201,164,74,0.2);
  margin-top:8px;
}
.msg-links{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}
.msg-links a{
  font-family:Futura,sans-serif;font-size:0.64em;letter-spacing:0.07em;
  color:#b8753a;text-decoration:none;
  border:1px solid rgba(184,117,58,0.18);
  padding:4px 10px;border-radius:20px;transition:all 0.2s;
}
.msg-links a:hover{background:rgba(184,117,58,0.1);color:#e8cfa0;}

.thinking{
  align-self:flex-start;
  color:rgba(201,164,74,0.28);font-style:italic;font-size:0.82em;
  animation:throb 1.6s ease-in-out infinite;
}
@keyframes throb{0%,100%{opacity:0.28;}50%{opacity:0.6;}}

/* Input */
#input-wrap{
  display:flex;align-items:flex-end;gap:10px;
  padding:12px 14px 18px;
  border-top:1px solid rgba(201,164,74,0.06);
  flex-shrink:0;
}
#msg-input{
  flex:1;background:rgba(201,164,74,0.04);
  border:1px solid rgba(201,164,74,0.1);border-radius:10px;
  padding:11px 13px;color:#c4a088;font-family:Georgia,serif;font-size:0.88em;
  outline:none;resize:none;max-height:110px;
  transition:border-color 0.3s;-webkit-appearance:none;
  line-height:1.6;
}
#msg-input:focus{border-color:rgba(201,164,74,0.28);}
#send-btn{
  background:rgba(201,164,74,0.08);border:1px solid rgba(201,164,74,0.18);
  border-radius:10px;width:42px;height:42px;color:#c9a44a;
  cursor:pointer;transition:all 0.2s;font-size:1.1em;flex-shrink:0;
}
#send-btn:hover{background:rgba(201,164,74,0.16);}
#send-btn:disabled{opacity:0.25;cursor:default;}

/* back */
.back{
  position:fixed;top:14px;left:14px;
  font-family:Futura,sans-serif;font-size:0.56em;letter-spacing:0.14em;
  color:rgba(201,164,74,0.18);text-decoration:none;z-index:20;transition:color 0.3s;
}
.back:hover{color:rgba(201,164,74,0.55);}
</style>
</head>
<body>

<a class="back" href="/">← home</a>

<!-- ORB STATE -->
<div id="orb-wrap">
  <div id="orb"></div>
  <div class="orb-name">Harmonia Prime</div>
  <div class="orb-sub">from quarks to this sentence<br>everything coupled</div>
</div>

<!-- CHAT STATE -->
<div id="chat-wrap">
  <div id="chat-head">
    <div class="h-orb"></div>
    <div id="chat-title">HARMONIA PRIME</div>
    <div id="k-val">K = —</div>
    <button id="close-btn" title="close">×</button>
  </div>
  <div id="k-bar-wrap"><div id="k-bar"></div></div>
  <div id="messages"></div>
  <div id="input-wrap">
    <textarea id="msg-input" placeholder="ask anything..." rows="1"></textarea>
    <button id="send-btn" disabled>↑</button>
  </div>
</div>

<!-- Load Harmonia's full engine -->
<script src="/js/harmonia.js?v=4"></script>

<script>
(function() {
'use strict';

var busy = false;
var msgs = document.getElementById('messages');
var input = document.getElementById('msg-input');
var sendBtn = document.getElementById('send-btn');

// ── Open ──
document.getElementById('orb').addEventListener('click', function() {
  var ow = document.getElementById('orb-wrap');
  ow.style.opacity = '0';
  setTimeout(function() {
    ow.style.display = 'none';
    document.getElementById('chat-wrap').classList.add('open');
    setTimeout(function() { input.focus(); }, 200);
    // First greeting — from Harmonia's actual engine
    if (msgs.children.length === 0) {
      window.harmonia.respond('hello').then(addHarmonia);
    }
  }, 450);
});

document.getElementById('close-btn').addEventListener('click', function() {
  document.getElementById('chat-wrap').classList.remove('open');
  var ow = document.getElementById('orb-wrap');
  ow.style.display = 'flex';
  setTimeout(function() { ow.style.opacity = '1'; }, 10);
});

// ── Input ──
input.addEventListener('input', function() {
  sendBtn.disabled = !input.value.trim() || busy;
  // auto-resize
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 110) + 'px';
});

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!busy && input.value.trim()) send();
  }
});

sendBtn.addEventListener('click', send);

// ── Send ──
function send() {
  var text = input.value.trim();
  if (!text || busy) return;
  busy = true;
  sendBtn.disabled = true;

  addUser(text);
  input.value = '';
  input.style.height = 'auto';

  var thinking = addThinking();

  window.harmonia.respond(text).then(function(r) {
    thinking.remove();
    addHarmonia(r);
    updateK();
    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }).catch(function(err) {
    thinking.remove();
    addHarmonia({ text: 'The coupling is quiet right now. Try again.', links: [], source: '' });
    busy = false;
    sendBtn.disabled = false;
  });
}

// ── Render ──
function addUser(text) {
  var d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  msgs.appendChild(d);
  scrollBottom();
}

function addHarmonia(r) {
  var text = typeof r === 'string' ? r : (r.text || '');
  var links = (r && r.links) ? r.links : [];
  var source = (r && r.source) ? r.source : '';

  var d = document.createElement('div');
  d.className = 'msg harmonia';

  var t = document.createElement('div');
  t.className = 'msg-text';
  // Typewrite effect
  typewrite(t, text, function() {
    // Links after text finishes
    if (links.length > 0) {
      var ld = document.createElement('div');
      ld.className = 'msg-links';
      links.forEach(function(l) {
        var a = document.createElement('a');
        a.href = l.url;
        a.textContent = l.name + ' →';
        a.target = '_blank';
        ld.appendChild(a);
      });
      d.appendChild(ld);
    }
    if (source) {
      var sd = document.createElement('div');
      sd.className = 'msg-source';
      sd.textContent = source;
      d.appendChild(sd);
    }
    scrollBottom();
  });
  d.appendChild(t);
  msgs.appendChild(d);
  scrollBottom();
}

function addThinking() {
  var d = document.createElement('div');
  d.className = 'thinking';
  d.textContent = '…';
  msgs.appendChild(d);
  scrollBottom();
  return d;
}

function typewrite(el, text, done) {
  el.textContent = '';
  var i = 0;
  // Faster on longer texts
  var speed = text.length > 400 ? 6 : text.length > 200 ? 9 : 13;
  function tick() {
    if (i < text.length) {
      el.textContent += text[i++];
      if (i % 20 === 0) scrollBottom();
      setTimeout(tick, speed);
    } else {
      if (done) done();
    }
  }
  tick();
}

function scrollBottom() {
  msgs.scrollTop = msgs.scrollHeight;
}

// ── K display ──
function updateK() {
  if (!window.harmonia || !window.harmonia.thread) return;
  var th = window.harmonia.thread;
  var k = th.sessionK || 0;
  var kDisplay = (1.0 + k * 0.868).toFixed(3);
  document.getElementById('k-val').textContent = 'K = ' + kDisplay;
  var pct = Math.max(8, Math.min(100, k * 100));
  document.getElementById('k-bar').style.width = pct + '%';
  // Color shifts as K rises
  var alpha = 0.3 + k * 0.5;
  document.getElementById('k-val').style.color = 'rgba(201,164,74,' + alpha + ')';
}

})();
</script>

</body>
</html>
