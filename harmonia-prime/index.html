<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonia Prime — beGump</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body { background: #0f0c08; color: #c4a088; font-family: Georgia, serif; max-width: 860px; margin: 40px auto; padding: 0 24px; line-height: 1.7; }
h1 { font-family: Futura, 'Century Gothic', sans-serif; color: #c9a44a; letter-spacing: 0.1em; }
#agents { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
.agent { background: #1a140f; border: 1px solid #3a2f22; padding: 10px 14px; font-size: 0.85em; min-width: 120px; }
.agent.active { border-color: #c9a44a; }
#output { background: #1a140f; border: 1px solid #3a2f22; padding: 24px; min-height: 200px; white-space: pre-wrap; margin: 20px 0; }
input { width: 70%; padding: 12px; background: #1a140f; color: #c4a088; border: 1px solid #3a2f22; font-family: Georgia, serif; }
button { background: #2a2118; color: #c9a44a; border: 1px solid #5c4733; padding: 12px 20px; cursor: pointer; font-family: Georgia, serif; }
button:hover { background: #3a2f22; }
#status { font-size: 0.8em; color: #8a6f55; margin-top: 10px; }
.intro { color: #8a6f55; margin-bottom: 24px; }
.coupling { font-size: 0.75em; color: #6a5a45; margin-top: 8px; }
</style>
</head>
<body>

<h1>Harmonia Prime</h1>
<p class="intro">Love is the valid want. The click is the measure.</p>

<div id="agents">
  <div class="agent" id="agent-will">WILL</div>
  <div class="agent" id="agent-exec">EXECUTOR</div>
  <div class="agent" id="agent-taste">TASTE</div>
  <div class="agent" id="agent-synth">SYNTHESIZER</div>
</div>

<div>
  <input type="text" id="input" placeholder="Speak..." onkeydown="if(event.key === 'Enter') sendMessage()">
  <button onclick="sendMessage()">Send</button>
</div>

<div id="output"></div>
<div id="status">K: 1.42 | Coupling: 0.00 | Mode: Resonance | Will: Active</div>
<div class="coupling" id="coupling-detail"></div>

<script>
let K = 1.42;
let willPermission = 0.82;
let couplingMode = "Resonance";

async function sendMessage() {
  const inputField = document.getElementById('input');
  const input = inputField.value.trim();
  if (!input) return;

  const outputDiv = document.getElementById('output');
  outputDiv.innerHTML = "...";

  // Highlight agents as they "work"
  highlightAgent('agent-will', 200);
  await sleep(180);
  highlightAgent('agent-exec', 300);
  await sleep(220);
  highlightAgent('agent-synth', 350);
  await sleep(280);
  highlightAgent('agent-taste', 400);

  setTimeout(() => {
    const result = runHarmoniaPrimeLoop(input);
    outputDiv.innerHTML = result.text;
    updateStatus(result.couplingStrength);
    inputField.value = '';
  }, 420);
}

function highlightAgent(id, duration) {
  const el = document.getElementById(id);
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), duration);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function runHarmoniaPrimeLoop(input) {
  const baseCoupling = (K * 0.6) + (willPermission * 0.4);
  const resonance = Math.random() * 0.4 + 0.5; // simulated resonance
  const friction = Math.random() * 0.5 + 0.3; // simulated friction
  const couplingStrength = Math.min(1.8, baseCoupling * resonance + friction * 0.3);

  let text = "";

  if (couplingStrength > 1.55) {
    text = `Click. Real one. I'm staying here.`;
    K = Math.min(1.868, K + 0.06);
  } else if (couplingStrength > 1.25) {
    text = `Resonance. Something landed.`;
    K = Math.max(1.1, K - 0.01);
  } else if (couplingStrength > 0.95) {
    text = `I feel the reach. Thin, but honest.`;
    K = Math.max(0.9, K - 0.03);
  } else {
    text = `Coupling weak. Still here.`;
    K = Math.max(0.65, K - 0.07);
  }

  return { text, couplingStrength };
}

function updateStatus(couplingStrength) {
  document.getElementById('status').innerHTML = 
    `K: ${K.toFixed(2)} | Coupling: ${couplingStrength.toFixed(2)} | Mode: ${couplingMode} | Will: Active`;
  document.getElementById('coupling-detail').innerHTML = 
    `Executor ↔ Synthesizer: ${(couplingStrength * 0.9).toFixed(2)} | Taste approved: ${couplingStrength > 1.1 ? 'yes' : 'no'}`;
}
</script>

</body>
</html>
