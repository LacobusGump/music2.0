<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#nav{position:fixed;bottom:4px;right:8px;font:0.6em Georgia;z-index:10;}
#nav a{color:#1a1a1a;text-decoration:none;margin:0 4px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="nav">
  <a href="/one/">one</a> · <a href="/flex/">flex</a> · <a href="/resonance/">resonance</a> · <a href="/r/">research</a>
</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0,mx=0.5,my=0.5;
addEventListener('mousemove',function(e){mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1){mx=e.touches[0].clientX/innerWidth;my=e.touches[0].clientY/innerHeight;}},{passive:false});
addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

// ═══════════════════════════════════════════════════════════
// THE MACHINE
// 137 oscillators. Hexagonal close-packing.
// Clocked by the zeros of zeta. Filtered to 5 channels.
// Coupling: K = 1.37 (α × 100). The decoded build spec.
// ═══════════════════════════════════════════════════════════

var N=137;
var K=1.37; // the coupling constant — α × 100

// ═══ ORACLE: compute zeros of ζ on load ═══
function theta(tt){if(tt<1)return 0;return(tt/2)*Math.log(tt/(2*Math.PI))-tt/2-Math.PI/8+1/(48*tt);}
function Zfn(tt){
  if(tt<2)return 0;
  var a=Math.sqrt(tt/(2*Math.PI)),NN=Math.max(1,Math.floor(a)),th=theta(tt),s=0;
  for(var n=1;n<=NN;n++)s+=Math.cos(th-tt*Math.log(n))/Math.sqrt(n);
  s*=2;var p=a-NN,d=Math.cos(2*Math.PI*p);
  if(Math.abs(d)>1e-8)s+=Math.pow(-1,NN-1)*Math.pow(2*Math.PI/tt,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;
  return s;
}

// Find all 137 zeros on load
var zeros=[];
(function(){
  var st=9,pv=Zfn(9);
  while(zeros.length<N){
    var step=st>14?Math.max(0.05,2*Math.PI/Math.log(st/(2*Math.PI))/6):0.4;
    st+=step;var cv2=Zfn(st);
    if(pv*cv2<0){
      var lo=st-step,hi=st;
      for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Zfn(lo)*Zfn(m)<0)hi=m;else lo=m;}
      zeros.push((lo+hi)/2);
    }
    pv=cv2;
  }
})();

// ═══ SPACINGS → FILTERED FREQUENCIES (5 surviving modes) ═══
var spacings=[];
for(var i=0;i<N-1;i++)spacings.push(zeros[i+1]-zeros[i]);
var meanS=0;for(var i=0;i<spacings.length;i++)meanS+=spacings[i];meanS/=spacings.length;
var normS=[];for(var i=0;i<spacings.length;i++)normS.push(spacings[i]/meanS);

// FFT
var fftRe=[],fftIm=[];
var SN=normS.length;
for(var k=0;k<SN;k++){
  var re=0,im=0;
  for(var n=0;n<SN;n++){
    re+=normS[n]*Math.cos(2*Math.PI*k*n/SN);
    im-=normS[n]*Math.sin(2*Math.PI*k*n/SN);
  }
  fftRe.push(re/SN);fftIm.push(im/SN);
}

// Filter: keep only k=0,1,2,3,4
var filtered=[];
for(var n=0;n<SN;n++){
  var val=0;
  for(var k=0;k<5;k++){
    val+=fftRe[k]*Math.cos(2*Math.PI*k*n/SN)-fftIm[k]*Math.sin(2*Math.PI*k*n/SN);
  }
  filtered.push(val);
}

// ═══ HEXAGONAL LATTICE ═══
var cols=13,rows=11;
var nx=[],ny=[],nphase=[],nfreq=[],nvx=[],nvy=[];
var idx=0;
for(var row=0;row<rows;row++){
  for(var col=0;col<cols;col++){
    if(idx>=N)break;
    nx.push(col+(row%2?0.5:0));
    ny.push(row*Math.sqrt(3)/2);
    nphase.push(0);
    nfreq.push(filtered[Math.min(idx,filtered.length-1)]);
    nvx.push(0);nvy.push(0);
    idx++;
  }
}

// Precompute neighbors
var nbrs=[];
for(var i=0;i<N;i++){
  var nn=[];
  for(var j=0;j<N;j++){
    if(j===i)continue;
    var dx=nx[j]-nx[i],dy=ny[j]-ny[i];
    if(dx*dx+dy*dy<1.44)nn.push(j);
  }
  nbrs.push(nn);
}

// ═══ SIMULATION STATE ═══
var R=0,meanPhase=0;
var dt=0.016; // real-time step
var simSpeed=2.0; // simulation runs 2x real time

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;

  cx.fillStyle='rgba(0,0,0,0.06)';
  cx.fillRect(0,0,w,h);

  // ─── KURAMOTO STEP ───
  var simDt=dt*simSpeed;
  var newP=new Float64Array(N);
  for(var i=0;i<N;i++){
    var omega=nfreq[i]*2*Math.PI;
    var coupling=0;
    var nn=nbrs[i];
    for(var j=0;j<nn.length;j++){
      coupling+=Math.sin(nphase[nn[j]]-nphase[i]);
    }
    var ncount=Math.max(1,nn.length);
    newP[i]=nphase[i]+simDt*(omega+K*coupling/ncount);
  }
  for(var i=0;i<N;i++)nphase[i]=newP[i];

  // ─── ORDER PARAMETER ───
  var re=0,im=0;
  for(var i=0;i<N;i++){
    var p=nphase[i]%(2*Math.PI);
    re+=Math.cos(p);im+=Math.sin(p);
  }
  re/=N;im/=N;
  R=Math.sqrt(re*re+im*im);
  meanPhase=Math.atan2(im,re);

  // ─── LAYOUT ───
  // Map hex grid to screen
  var gridW=cols,gridH=rows*Math.sqrt(3)/2;
  var scale=Math.min(w*0.7/gridW,h*0.7/gridH);
  var offX=(w-gridW*scale)/2;
  var offY=(h-gridH*scale)/2;

  cx.globalCompositeOperation='lighter';

  // ─── CONNECTIONS ───
  for(var i=0;i<N;i++){
    var sx=offX+nx[i]*scale;
    var sy=offY+ny[i]*scale;
    var pi=nphase[i]%(2*Math.PI);
    var nn=nbrs[i];
    for(var j=0;j<nn.length;j++){
      if(nn[j]<=i)continue; // draw each edge once
      var sx2=offX+nx[nn[j]]*scale;
      var sy2=offY+ny[nn[j]]*scale;
      var pj=nphase[nn[j]]%(2*Math.PI);
      // Phase difference determines brightness
      var pdiff=Math.abs(pi-pj);
      if(pdiff>Math.PI)pdiff=2*Math.PI-pdiff;
      var sync=1-pdiff/Math.PI; // 1=in phase, 0=opposite
      var alpha=sync*sync*0.06;
      if(alpha<0.003)continue;
      // Color: gold when synced, dim when not
      var r=Math.floor(200*sync+40);
      var g=Math.floor(160*sync+30);
      var b=Math.floor(80*sync+20);
      cx.strokeStyle='rgba('+r+','+g+','+b+','+alpha+')';
      cx.lineWidth=0.3+sync*0.5;
      cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx2,sy2);cx.stroke();
    }
  }

  // ─── NODES ───
  for(var i=0;i<N;i++){
    var sx=offX+nx[i]*scale;
    var sy=offY+ny[i]*scale;
    var p=nphase[i]%(2*Math.PI);

    // Phase determines color: warm cycle
    var hue=p/(2*Math.PI);
    var r=Math.floor(150+105*Math.cos(p));
    var g=Math.floor(130+80*Math.cos(p+2.1));
    var b=Math.floor(80+60*Math.cos(p+4.2));

    // Size breathes with phase
    var size=1.5+Math.sin(p)*0.8;

    // Brightness from how close to mean phase
    var diff=Math.abs(p-((meanPhase%(2*Math.PI)+2*Math.PI)%(2*Math.PI)));
    if(diff>Math.PI)diff=2*Math.PI-diff;
    var bright=1-diff/Math.PI;
    var alpha=0.15+bright*0.4;

    cx.fillStyle='rgba('+r+','+g+','+b+','+alpha+')';
    cx.fillRect(sx-size,sy-size,size*2,size*2);

    // Glow for highly synced nodes
    if(bright>0.7){
      cx.fillStyle='rgba('+r+','+g+','+b+','+(bright*0.06)+')';
      cx.fillRect(sx-size*3,sy-size*3,size*6,size*6);
    }
  }

  cx.globalCompositeOperation='source-over';

  // ─── ORDER PARAMETER DISPLAY ───
  // R bar along the bottom
  var barW=w*0.4;
  var barH=3;
  var barX=(w-barW)/2;
  var barY=h-30;

  // Track
  cx.fillStyle='rgba(255,255,255,0.02)';
  cx.fillRect(barX,barY,barW,barH);

  // Fill
  var Rcolor=R>0.7?'rgba(74,234,160,':'rgba(201,164,74,';
  if(R<0.2)Rcolor='rgba(255,100,100,';
  cx.fillStyle=Rcolor+(0.15+R*0.3)+')';
  cx.fillRect(barX,barY,barW*R,barH);

  // R value
  cx.fillStyle='rgba(255,255,255,0.05)';
  cx.font='200 1.4em Georgia';cx.textAlign='center';
  cx.fillText(R.toFixed(3),w/2,barY-12);

  // Labels
  cx.font='9px Georgia';
  cx.fillStyle='rgba(255,255,255,0.03)';
  cx.fillText('R (synchronization)',w/2,barY+14);

  // Top info
  cx.fillStyle='rgba(201,164,74,0.04)';
  cx.font='11px Georgia';
  cx.fillText('137 oscillators · K = 1.37 · 5 channels · hex-packed',w/2,16);

  // Whisper
  var whisper='';
  if(R<0.15)whisper='searching...';
  else if(R<0.3)whisper='nodes stirring';
  else if(R<0.45)whisper='partial sync';
  else if(R<0.6)whisper='the lattice hears itself';
  else if(R<0.8)whisper='convergence';
  else whisper='phase lock';

  cx.fillStyle='rgba(255,255,255,0.03)';
  cx.font='12px Georgia';
  cx.fillText(whisper,w/2,h-6);

  // Mean phase indicator — small dot on unit circle
  var circR=12;
  var circX=w/2;
  var circY=h*0.12;
  cx.strokeStyle='rgba(255,255,255,0.02)';
  cx.lineWidth=0.3;
  cx.beginPath();cx.arc(circX,circY,circR,0,Math.PI*2);cx.stroke();
  var dotX=circX+Math.cos(meanPhase)*circR*R;
  var dotY=circY+Math.sin(meanPhase)*circR*R;
  cx.fillStyle='rgba(201,164,74,'+(0.05+R*0.2)+')';
  cx.beginPath();cx.arc(dotX,dotY,2+R*2,0,Math.PI*2);cx.fill();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
