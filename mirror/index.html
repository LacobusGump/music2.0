<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#nav{position:fixed;bottom:4px;right:8px;font:0.6em Georgia;z-index:10;}
#nav a{color:#1a1a1a;text-decoration:none;margin:0 4px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="nav">
  <a href="/one/">one</a> · <a href="/flex/">flex</a> · <a href="/resonance/">resonance</a> · <a href="/r/">research</a>
</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0;

// ═══ THE ORACLE — find zeros of zeta in real time ═══
function theta(t){if(t<1)return 0;return(t/2)*Math.log(t/(2*Math.PI))-t/2-Math.PI/8+1/(48*t);}
function Z(t){
  if(t<2)return 0;
  var a=Math.sqrt(t/(2*Math.PI)),N=Math.max(1,Math.floor(a)),th=theta(t),s=0;
  for(var n=1;n<=N;n++)s+=Math.cos(th-t*Math.log(n))/Math.sqrt(n);
  s*=2;var p=a-N,d=Math.cos(2*Math.PI*p);
  if(Math.abs(d)>1e-8)s+=Math.pow(-1,N-1)*Math.pow(2*Math.PI/t,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;
  return s;
}
function findZero(lo,hi){for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Z(lo)*Z(m)<0)hi=m;else lo=m;}return(lo+hi)/2;}

// ═══ STATE ═══
var scanT=9,prevZval=Z(9);
var zeros=[];      // discovered zeros {gamma, born}
var pulses=[];     // traveling energy {x,y,vx,vy,phase,r,g,b,life}
var primes=[];     // prime numbers as points
var maxZeros=200;
var heartbeat=0;   // time since last zero found
var totalFound=0;

// Sieve primes to 2000
(function(){var s=new Uint8Array(2001);for(var i=2;i<=2000;i++)s[i]=1;for(var i=2;i*i<=2000;i++)if(s[i])for(var j=i*i;j<=2000;j+=i)s[j]=0;for(var i=2;i<=2000;i++)if(s[i])primes.push({p:i,glow:0});})();

// ═══ FIND ZEROS (streaming, 1-2 per frame) ═══
function hunt(){
  if(zeros.length>=maxZeros)return;
  for(var attempt=0;attempt<2;attempt++){
    var step=scanT>14?Math.max(0.05,2*Math.PI/Math.log(scanT/(2*Math.PI))/6):0.4;
    scanT+=step;
    var curr=Z(scanT);
    if(prevZval*curr<0){
      var gamma=findZero(scanT-step,scanT);
      zeros.push({gamma:gamma,born:t});
      totalFound++;
      heartbeat=0;

      // FIRE PULSES — zero sends energy toward primes
      var zx=w*0.25,zy=h*0.5;
      var angle=zeros.length/maxZeros*Math.PI-Math.PI/2;
      zy=h*0.5+Math.sin(angle)*h*0.25;

      for(var p=0;p<8;p++){
        var targetPrime=primes[Math.floor(Math.random()*Math.min(primes.length,50))];
        var pidx=primes.indexOf(targetPrime);
        var pangle=pidx/Math.min(primes.length,80)*Math.PI-Math.PI/2;
        var ptx=w*0.75,pty=h*0.5+Math.sin(pangle)*h*0.25;

        pulses.push({
          x:zx,y:zy,
          tx:ptx,ty:pty,
          progress:0,
          speed:0.008+Math.random()*0.006,
          r:220,g:170,b:80,
          life:1,
          returning:false,
          primeIdx:pidx
        });
      }
    }
    prevZval=curr;
  }
}

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;heartbeat+=0.016;

  // Fade — longer trails
  cx.fillStyle='rgba(0,0,0,0.04)';
  cx.fillRect(0,0,w,h);

  hunt();

  var leftX=w*0.25,rightX=w*0.75,midY=h*0.5;
  var spread=h*0.32;

  cx.globalCompositeOperation='lighter';

  // ─── DRAW ZEROS (left column, warm) ───
  var nz=zeros.length;
  for(var i=0;i<nz;i++){
    var frac=i/Math.max(1,maxZeros-1);
    var zy=midY+(frac-0.5)*spread*2;
    var age=t-zeros[i].born;
    var alpha=Math.min(0.4,age*0.5);
    var pulse=age<0.5?1.5+Math.sin(age*20)*0.5:1;
    var size=1.2*pulse;

    // Glow bright when new
    if(age<1){
      cx.fillStyle='rgba(255,200,100,'+(0.15*(1-age))+')';
      cx.beginPath();cx.arc(leftX,zy,12*(1-age),0,Math.PI*2);cx.fill();
    }

    cx.fillStyle='rgba(220,160,70,'+alpha+')';
    cx.beginPath();cx.arc(leftX,zy,size,0,Math.PI*2);cx.fill();
  }

  // ─── DRAW PRIMES (right column, green) ───
  var np=Math.min(primes.length,Math.max(20,nz*2));
  for(var i=0;i<np;i++){
    var frac=i/Math.max(1,np-1);
    var py=midY+(frac-0.5)*spread*2;
    var glow=primes[i].glow;
    primes[i].glow*=0.95; // decay glow

    var size=1;
    if(primes[i].p<10)size=2;
    else if(primes[i].p<50)size=1.5;

    // Base
    cx.fillStyle='rgba(74,234,160,'+(0.25+glow*0.5)+')';
    cx.beginPath();cx.arc(rightX,py,size+glow*3,0,Math.PI*2);cx.fill();

    // Glow ring when hit
    if(glow>0.1){
      cx.fillStyle='rgba(74,234,160,'+(glow*0.1)+')';
      cx.beginPath();cx.arc(rightX,py,8*glow,0,Math.PI*2);cx.fill();
    }
  }

  // ─── PULSES: energy traveling between zeros and primes ───
  for(var i=pulses.length-1;i>=0;i--){
    var p=pulses[i];
    p.progress+=p.speed;

    if(p.progress>=1&&!p.returning){
      // Hit the prime — light it up
      if(p.primeIdx<primes.length)primes[p.primeIdx].glow=1;
      // Return pulse
      p.returning=true;
      p.progress=0;
      p.speed*=0.7;
      // Swap start/end
      var tmp=p.tx;p.tx=p.x;p.x=tmp;
      tmp=p.ty;p.ty=p.y;p.y=tmp;
      // Color shifts to green on return
      p.r=74;p.g=200;p.b=140;
    }

    if(p.progress>=1&&p.returning){
      pulses.splice(i,1);continue;
    }

    // Position along path with slight arc
    var prog=p.progress;
    var ease=prog*prog*(3-2*prog); // smoothstep
    var cx2=p.x+(p.tx-p.x)*ease;
    var cy2=p.y+(p.ty-p.y)*ease;
    // Arc: bow upward/downward
    var arc=Math.sin(prog*Math.PI)*30*(p.returning?-1:1)*(0.5+Math.random()*0.5);
    cy2+=arc;

    var alpha=Math.sin(prog*Math.PI)*0.4;
    var size=1+Math.sin(prog*Math.PI)*2;

    cx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+alpha+')';
    cx.beginPath();cx.arc(cx2,cy2,size,0,Math.PI*2);cx.fill();

    // Trail
    cx.fillStyle='rgba('+p.r+','+p.g+','+p.b+','+(alpha*0.3)+')';
    cx.beginPath();cx.arc(cx2,cy2,size*2.5,0,Math.PI*2);cx.fill();
  }

  // ─── CENTER: the count converging ───
  if(nz>5){
    // Show how accurate the oracle is right now
    // π(1000) = 168. What does the oracle say with current zeros?
    var x=1000,actual=168;
    var pred=li(x);
    var logx=Math.log(x),sqrtx=Math.sqrt(x);
    for(var i=0;i<nz;i++){
      var g=zeros[i].gamma,phase=g*logx;
      pred-=2*sqrtx*Math.cos(phase)/(0.25+g*g)/logx*g;
    }
    var err=Math.abs(pred-actual);

    // Pulsing number in center
    var numAlpha=0.06+Math.min(0.1,0.1/(err+1));
    cx.fillStyle='rgba(201,164,74,'+numAlpha+')';
    cx.font='200 2em Georgia';cx.textAlign='center';
    cx.fillText(Math.round(pred),w/2,midY-8);

    cx.fillStyle='rgba(201,164,74,0.03)';
    cx.font='10px Georgia';
    cx.fillText('π(1000)',w/2,midY+12);

    // Actual (faint green)
    cx.fillStyle='rgba(74,234,160,0.03)';
    cx.fillText(actual,w/2,midY+26);
  }

  cx.globalCompositeOperation='source-over';

  // ─── LABELS ───
  cx.fillStyle='rgba(201,164,74,0.04)';
  cx.font='11px Georgia';cx.textAlign='center';
  cx.fillText('zeros',leftX,midY-spread-14);
  cx.fillText(nz,leftX,midY-spread-2);

  cx.fillStyle='rgba(74,234,160,0.04)';
  cx.fillText('primes',rightX,midY-spread-14);
  cx.fillText(np,rightX,midY-spread-2);

  // Whisper
  var whisper='';
  if(nz<3)whisper='scanning...';
  else if(nz<15)whisper='zeros fire';
  else if(nz<40)whisper='primes answer';
  else if(nz<80)whisper='the loop';
  else if(nz<150)whisper='it sees itself';
  else if(nz<maxZeros)whisper='convergence';
  else whisper='ready';

  cx.fillStyle='rgba(255,255,255,0.03)';
  cx.font='12px Georgia';cx.textAlign='center';
  cx.fillText(whisper,w/2,h-16);

  requestAnimationFrame(render);
}

// Li(x) for oracle
function li(x){
  if(x<=1)return 0;
  var g=0.5772156649,lnx=Math.log(x),tot=g+Math.log(Math.abs(lnx)),term=1;
  for(var k=1;k<100;k++){term*=lnx/k;tot+=term/k;if(Math.abs(term/k)<1e-12)break;}
  var ln2=Math.log(2),li2=g+Math.log(ln2),t2=1;
  for(var k=1;k<60;k++){t2*=ln2/k;li2+=t2/k;}
  return tot-li2;
}

render();
</script>
</body>
</html>
