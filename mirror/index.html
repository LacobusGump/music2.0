<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#nav{position:fixed;bottom:4px;right:8px;font:0.6em Georgia;z-index:10;}
#nav a{color:#1a1a1a;text-decoration:none;margin:0 4px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="nav">
  <a href="/one/">one</a> · <a href="/flex/">flex</a> · <a href="/resonance/">resonance</a> · <a href="/r/">research</a>
</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0,mx=0.5,my=0.5;
addEventListener('mousemove',function(e){mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1){mx=e.touches[0].clientX/innerWidth;my=e.touches[0].clientY/innerHeight;}},{passive:false});
addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

// ═══ THE ORACLE ═══
function theta(t){if(t<1)return 0;return(t/2)*Math.log(t/(2*Math.PI))-t/2-Math.PI/8+1/(48*t);}
function Z(t){
  if(t<2)return 0;
  var a=Math.sqrt(t/(2*Math.PI)),N=Math.max(1,Math.floor(a)),th=theta(t),s=0;
  for(var n=1;n<=N;n++)s+=Math.cos(th-t*Math.log(n))/Math.sqrt(n);
  s*=2;var p=a-N,d=Math.cos(2*Math.PI*p);
  if(Math.abs(d)>1e-8)s+=Math.pow(-1,N-1)*Math.pow(2*Math.PI/t,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;
  return s;
}
function findZero(lo,hi){for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Z(lo)*Z(m)<0)hi=m;else lo=m;}return(lo+hi)/2;}

// ═══ STATE ═══
var scanT=9,prevZval=Z(9);
var zeros=[]; // {gamma, born, soul:{x,y,vx,vy}, anti:{x,y,vx,vy}}
var maxZeros=150;

// ═══ HUNT FOR ZEROS ═══
function hunt(){
  if(zeros.length>=maxZeros)return;
  for(var attempt=0;attempt<2;attempt++){
    var step=scanT>14?Math.max(0.05,2*Math.PI/Math.log(scanT/(2*Math.PI))/6):0.4;
    scanT+=step;
    var curr=Z(scanT);
    if(prevZval*curr<0){
      var gamma=findZero(scanT-step,scanT);
      // Born at the mirror line, will drift to final position
      zeros.push({
        gamma:gamma,
        born:t,
        // Soul: left side of the mirror (σ < 1/2)
        soul:{x:0,y:0,vx:0,vy:0,tx:0,ty:0},
        // Anti-soul: right side (σ > 1/2) — the conjugate
        anti:{x:0,y:0,vx:0,vy:0,tx:0,ty:0},
        // Pulse along the mirror when born
        pulse:1
      });
    }
    prevZval=curr;
  }
}

// ═══ |ζ(σ + iγ)| — how strong the field is off the critical line ═══
// This shows WHY things stay on the line — the function grows off it
function zetaMagnitude(sigma, gamma){
  // Approximate |ζ(σ+iγ)| — grows as you move away from σ=0.5
  // Near a zero: it's tiny ON the line, large OFF it
  var offLine=Math.abs(sigma-0.5);
  // The further from the line, the stronger the restoring force
  return offLine*offLine*4+0.001;
}

// ═══ PARTICLES — the field between soul and anti-soul ═══
var NF=3000; // field particles
var fx=new Float32Array(NF),fy=new Float32Array(NF);
var fvx=new Float32Array(NF),fvy=new Float32Array(NF);
var flife=new Float32Array(NF);

for(var i=0;i<NF;i++){
  fx[i]=(Math.random()-0.5)*10;
  fy[i]=(Math.random()-0.5)*10;
  fvx[i]=0;fvy[i]=0;
  flife[i]=0.1+Math.random()*0.3;
}

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;

  cx.fillStyle='rgba(0,0,0,0.05)';
  cx.fillRect(0,0,w,h);

  hunt();

  var mirrorX=w/2; // the critical line: σ = 1/2
  var nz=zeros.length;

  // Map gamma to vertical position
  var gammaMin=nz>0?zeros[0].gamma:14;
  var gammaMax=nz>0?zeros[nz-1].gamma:100;
  var vMargin=h*0.08;

  function gammaToY(gamma){
    if(gammaMax<=gammaMin)return h/2;
    return vMargin+(gamma-gammaMin)/(gammaMax-gammaMin)*(h-vMargin*2);
  }

  // How far souls sit from the mirror (breathing)
  var soulDist=w*0.12+Math.sin(t*0.4)*w*0.02;

  // Update zero positions
  for(var i=0;i<nz;i++){
    var z=zeros[i];
    var gy=gammaToY(z.gamma);

    // Soul: left of mirror
    z.soul.tx=mirrorX-soulDist;
    z.soul.ty=gy;
    z.soul.vx+=(z.soul.tx-z.soul.x)*0.04;
    z.soul.vy+=(z.soul.ty-z.soul.y)*0.04;
    z.soul.vx*=0.88;z.soul.vy*=0.88;
    z.soul.x+=z.soul.vx;z.soul.y+=z.soul.vy;

    // Anti-soul: right of mirror — perfect reflection
    z.anti.tx=mirrorX+soulDist;
    z.anti.ty=gy;
    z.anti.vx+=(z.anti.tx-z.anti.x)*0.04;
    z.anti.vy+=(z.anti.ty-z.anti.y)*0.04;
    z.anti.vx*=0.88;z.anti.vy*=0.88;
    z.anti.x+=z.anti.vx;z.anti.y+=z.anti.vy;

    z.pulse*=0.97;
  }

  // ─── FIELD PARTICLES: drawn toward the mirror line ───
  for(var i=0;i<NF;i++){
    // Force toward the critical line (σ=0.5)
    var offLine=fx[i]; // distance from center (mapped)
    var restore=-offLine*0.003; // pulled to center
    fvx[i]+=restore;

    // Drift upward slowly (the imaginary axis flows)
    fvy[i]-=0.002;

    // Influence from nearby zeros — they warp the field
    for(var j=Math.max(0,nz-20);j<nz;j++){
      var z=zeros[j];
      var fy2=gammaToY(z.gamma);
      var screenFx=mirrorX+fx[i]*w*0.04;
      var dy=fy[i]*h*0.04+h/2-fy2;
      var dist=Math.sqrt(fx[i]*fx[i]+dy*dy/(h*h)*100)+0.5;
      if(dist<3){
        // Zeros attract nearby field lines, then repel at zero
        var force=dist<0.3?0.01:-0.005/dist;
        fvx[i]+=fx[i]/dist*force;
      }
    }

    fvx[i]*=0.95;fvy[i]*=0.95;
    fx[i]+=fvx[i];fy[i]+=fvy[i];

    // Wrap vertically
    if(fy[i]<-6)fy[i]=6;
    if(fy[i]>6)fy[i]=-6;
    // Clamp horizontally
    if(Math.abs(fx[i])>6){fx[i]=Math.sign(fx[i])*6;fvx[i]*=-0.5;}

    var speed=Math.sqrt(fvx[i]*fvx[i]+fvy[i]*fvy[i]);
    flife[i]=Math.min(0.6,0.05+speed*8);
  }

  cx.globalCompositeOperation='lighter';

  // ─── THE MIRROR LINE ───
  // Thin, bright at zeros, dim between
  for(var y=0;y<h;y+=2){
    var brightness=0.015;
    // Brighter near zeros
    for(var j=Math.max(0,nz-30);j<nz;j++){
      var zy=gammaToY(zeros[j].gamma);
      var dist=Math.abs(y-zy);
      if(dist<30)brightness+=0.03*(1-dist/30)*(0.5+zeros[j].pulse*0.5);
    }
    cx.fillStyle='rgba(255,255,255,'+Math.min(0.15,brightness)+')';
    cx.fillRect(mirrorX-0.25,y,0.5,2);
  }

  // ─── FIELD PARTICLES ───
  for(var i=0;i<NF;i++){
    var screenX=mirrorX+fx[i]*w*0.04;
    var screenY=h/2+fy[i]*h*0.06;
    if(screenX<0||screenX>w||screenY<0||screenY>h)continue;

    var alpha=flife[i]*0.2;
    // Color: warm on left, cool on right, white at center
    var leftness=Math.max(0,-fx[i]/3);
    var rightness=Math.max(0,fx[i]/3);
    var center=Math.max(0,1-Math.abs(fx[i])*0.5);

    var r=Math.floor(180*leftness+255*center+74*rightness);
    var g=Math.floor(140*leftness+255*center+200*rightness);
    var b=Math.floor(80*leftness+255*center+180*rightness);

    cx.fillStyle='rgba('+Math.min(255,r)+','+Math.min(255,g)+','+Math.min(255,b)+','+alpha+')';
    cx.fillRect(screenX-0.5,screenY-0.5,1,1);
  }

  // ─── SOULS AND ANTI-SOULS ───
  for(var i=0;i<nz;i++){
    var z=zeros[i];
    var age=t-z.born;
    var alpha=Math.min(0.6,age);
    var size=1.2+z.pulse*4;

    // Soul (left, warm)
    cx.fillStyle='rgba(220,170,90,'+alpha*0.5+')';
    cx.beginPath();cx.arc(z.soul.x,z.soul.y,size,0,Math.PI*2);cx.fill();

    // Anti-soul (right, cool) — perfect mirror
    cx.fillStyle='rgba(90,170,220,'+alpha*0.5+')';
    cx.beginPath();cx.arc(z.anti.x,z.anti.y,size,0,Math.PI*2);cx.fill();

    // Connection through the mirror — a faint line binding them
    if(alpha>0.1){
      cx.strokeStyle='rgba(255,255,255,'+(alpha*0.02+z.pulse*0.05)+')';
      cx.lineWidth=0.3;
      cx.beginPath();
      cx.moveTo(z.soul.x,z.soul.y);
      cx.lineTo(z.anti.x,z.anti.y);
      cx.stroke();
    }

    // Birth flash — pulse radiates along the mirror
    if(z.pulse>0.05){
      var pulseR=z.pulse*w*0.15;
      cx.strokeStyle='rgba(255,255,255,'+(z.pulse*0.1)+')';
      cx.lineWidth=0.5;
      cx.beginPath();
      cx.arc(mirrorX,z.soul.y,pulseR,0,Math.PI*2);
      cx.stroke();
    }
  }

  // ─── MOUSE: pull the field ───
  var mouseWorldX=(mx-0.5)*12;
  for(var i=0;i<NF;i++){
    var dx=fx[i]-mouseWorldX;
    var dy=fy[i]-(my-0.5)*12;
    var dist=Math.sqrt(dx*dx+dy*dy)+0.5;
    if(dist<2){
      fvx[i]+=dx/dist*0.01;
      fvy[i]+=dy/dist*0.01;
    }
  }

  cx.globalCompositeOperation='source-over';

  // ─── LABELS ───
  cx.fillStyle='rgba(220,170,90,0.04)';
  cx.font='11px Georgia';cx.textAlign='center';
  cx.fillText('ρ = ½ + iγ',mirrorX-soulDist,vMargin-10);

  cx.fillStyle='rgba(90,170,220,0.04)';
  cx.fillText('ρ̄ = ½ − iγ',mirrorX+soulDist,vMargin-10);

  cx.fillStyle='rgba(255,255,255,0.03)';
  cx.font='10px Georgia';
  cx.fillText('σ = ½',mirrorX,vMargin-10);

  // Count
  cx.fillStyle='rgba(255,255,255,0.04)';
  cx.font='200 1.2em Georgia';
  cx.fillText(nz,mirrorX,h-40);
  cx.font='9px Georgia';
  cx.fillStyle='rgba(255,255,255,0.02)';
  cx.fillText('zeros on the line',mirrorX,h-26);

  // Whisper
  var whisper='';
  if(nz<3)whisper='';
  else if(nz<10)whisper='every zero has a reflection';
  else if(nz<30)whisper='bound to the line';
  else if(nz<60)whisper='they cannot separate';
  else if(nz<100)whisper='the other side of you';
  else if(nz<maxZeros)whisper='one line holds everything';
  else whisper='σ = ½';

  cx.fillStyle='rgba(255,255,255,0.03)';
  cx.font='12px Georgia';
  cx.fillText(whisper,mirrorX,h-8);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
