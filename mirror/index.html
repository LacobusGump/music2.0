document.getElementById("pw").addEventListener("keydown",function(e){
  if(e.key==="Enter")unlock();
});

async function unlock(){
  var pw=document.getElementById("pw").value;
  var msg=document.getElementById("msg");
  try{
    var salt=Uint8Array.from(atob(S),c=>c.charCodeAt(0));
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveBits","deriveKey"]);
    var k=await crypto.subtle.deriveKey(
      {name:"PBKDF2",salt:salt,iterations:I,hash:"SHA-256"},
      km,{name:"AES-GCM",length:256},false,["decrypt"]
    );
    var raw=Uint8Array.from(atob(B),c=>c.charCodeAt(0));
    var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:raw.slice(0,12)},k,raw.slice(12));
    document.open();
    document.write(new TextDecoder().decode(pt));
    document.close();
  }catch(e){
    msg.textContent="not yet";
    msg.style.color="#c9a44a20";
    document.getElementById("pw").value="";
    setTimeout(function(){msg.textContent="";msg.style.color="#ffffff00";},3000);
  }
}
