<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#nav{position:fixed;bottom:4px;right:8px;font:0.6em Georgia;z-index:10;}
#nav a{color:#1a1a1a;text-decoration:none;margin:0 4px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="nav">
  <a href="/one/">one</a> · <a href="/flex/">flex</a> · <a href="/resonance/">resonance</a> · <a href="/r/">research</a>
</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0;

// Camera: angles + zoom
var camRX=-0.45,camRY=0,zoom=1.0;
var autoRot=true,dragActive=false;
var lastTX=0,lastTY=0,pinchD0=0;

addEventListener('mousedown',function(e){dragActive=true;lastTX=e.clientX;lastTY=e.clientY;autoRot=false;});
addEventListener('mousemove',function(e){if(!dragActive)return;camRY+=(e.clientX-lastTX)*0.006;camRX+=(e.clientY-lastTY)*0.006;camRX=Math.max(-1.2,Math.min(-0.1,camRX));lastTX=e.clientX;lastTY=e.clientY;});
addEventListener('mouseup',function(){dragActive=false;});
addEventListener('wheel',function(e){e.preventDefault();zoom*=e.deltaY>0?0.93:1.07;zoom=Math.max(0.3,Math.min(3,zoom));},{passive:false});

addEventListener('touchstart',function(e){e.preventDefault();if(e.touches.length===1){dragActive=true;lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;autoRot=false;}if(e.touches.length===2){var dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY;pinchD0=Math.sqrt(dx*dx+dy*dy);}},{passive:false});
addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1&&dragActive){camRY+=(e.touches[0].clientX-lastTX)*0.006;camRX+=(e.touches[0].clientY-lastTY)*0.006;camRX=Math.max(-1.2,Math.min(-0.1,camRX));lastTX=e.touches[0].clientX;lastTY=e.touches[0].clientY;}if(e.touches.length===2&&pinchD0>0){var dx=e.touches[1].clientX-e.touches[0].clientX,dy=e.touches[1].clientY-e.touches[0].clientY;var d=Math.sqrt(dx*dx+dy*dy);zoom*=d/pinchD0;zoom=Math.max(0.3,Math.min(3,zoom));pinchD0=d;}},{passive:false});
addEventListener('touchend',function(e){if(e.touches.length<2)pinchD0=0;if(e.touches.length===0)dragActive=false;});

// ═══════════════════════════════════════════════════════════
// THE MACHINE — 137 oscillators, hex-packed, K=1.868
// 5D: (x, y, θ, t, K). Now you see the surface breathe.
// ═══════════════════════════════════════════════════════════

var N=137, K=1.867942;

// Oracle: compute 137 zeros on load
function theta(tt){if(tt<1)return 0;return(tt/2)*Math.log(tt/(2*Math.PI))-tt/2-Math.PI/8+1/(48*tt);}
function Zfn(tt){
  if(tt<2)return 0;
  var a=Math.sqrt(tt/(2*Math.PI)),nn=Math.max(1,Math.floor(a)),th=theta(tt),s=0;
  for(var n=1;n<=nn;n++)s+=Math.cos(th-tt*Math.log(n))/Math.sqrt(n);
  s*=2;var p=a-nn,d=Math.cos(2*Math.PI*p);
  if(Math.abs(d)>1e-8)s+=Math.pow(-1,nn-1)*Math.pow(2*Math.PI/tt,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;
  return s;
}
var zeros=[];
(function(){var st=9,pv=Zfn(9);while(zeros.length<N){var step=st>14?Math.max(0.05,2*Math.PI/Math.log(st/(2*Math.PI))/6):0.4;st+=step;var cv2=Zfn(st);if(pv*cv2<0){var lo=st-step,hi=st;for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Zfn(lo)*Zfn(m)<0)hi=m;else lo=m;}zeros.push((lo+hi)/2);}pv=cv2;}})();

// Spacings + filtered frequencies (5 modes)
var spacings=[],meanS=0;
for(var i=0;i<N-1;i++){spacings.push(zeros[i+1]-zeros[i]);meanS+=spacings[i];}
meanS/=(N-1);
var normS=[];for(var i=0;i<spacings.length;i++)normS.push(spacings[i]/meanS);
var SN=normS.length;
var fRe=[],fIm=[];
for(var k=0;k<SN;k++){var re=0,im=0;for(var n=0;n<SN;n++){re+=normS[n]*Math.cos(2*Math.PI*k*n/SN);im-=normS[n]*Math.sin(2*Math.PI*k*n/SN);}fRe.push(re/SN);fIm.push(im/SN);}
var filtered=[];
for(var n=0;n<SN;n++){var v=0;for(var k=0;k<5;k++)v+=fRe[k]*Math.cos(2*Math.PI*k*n/SN)-fIm[k]*Math.sin(2*Math.PI*k*n/SN);filtered.push(v);}

// Golden spiral layout — the Machine IS the spiral
var nxA=[],nyA=[];
var GA=2.39996322; // golden angle
for(var i=0;i<N;i++){
  var r=1.0+Math.sqrt(i/N)*6; // spiral outward
  var a=i*GA;
  nxA.push(Math.cos(a)*r);
  nyA.push(Math.sin(a)*r);
}

// Neighbor list — connect nearby on the spiral
var nbrL=[];
for(var i=0;i<N;i++){var nn=[];for(var j=0;j<N;j++){if(j===i)continue;var dx=nxA[j]-nxA[i],dy=nyA[j]-nyA[i];if(dx*dx+dy*dy<4.0)nn.push(j);}nbrL.push(nn);}

// Phases
var phases=new Float64Array(N);

// ═══ SIMULATION ═══
var dt=0.016,R=0,meanPhase=0;

function step(){
  var mre=0,mim=0;
  for(var i=0;i<N;i++){mre+=Math.cos(phases[i]);mim+=Math.sin(phases[i]);}
  mre/=N;mim/=N;
  var mp=Math.atan2(mim,mre);
  R=Math.sqrt(mre*mre+mim*mim);
  meanPhase=mp;
  for(var i=0;i<N;i++){
    var omega=filtered[Math.min(i,SN-1)]*2*Math.PI;
    var c=Math.sin(mp-phases[i]);
    if(i>0)c+=0.5*Math.sin(phases[i-1]-phases[i]);
    if(i<N-1)c+=0.5*Math.sin(phases[i+1]-phases[i]);
    phases[i]+=dt*(omega+K*c);
  }
}

// ═══ 3D PROJECTION ═══
var COLORS=[
  [220,100,80],[220,170,60],[180,200,60],[60,200,140],
  [60,140,220],[140,80,220],[200,60,180]
];
var HEIGHT=3.5; // max Z height for phase 2π

function project(x,y,z,ry,rx,sc,cx2,cy2){
  // Rotate around Y
  var cosY=Math.cos(ry),sinY=Math.sin(ry);
  var x1=x*cosY+z*sinY, z1=-x*sinY+z*cosY, y1=y;
  // Rotate around X (tilt)
  var cosX=Math.cos(rx),sinX=Math.sin(rx);
  var y2=y1*cosX-z1*sinX, z2=y1*sinX+z1*cosX;
  // Perspective
  var persp=600/(600+z2*sc*0.3);
  return [cx2+x1*sc*persp, cy2+y2*sc*persp, z2, persp];
}

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;

  // Full clear every frame for clean 3D
  cx.fillStyle='#000';
  cx.fillRect(0,0,w,h);

  step();

  if(autoRot) camRY+=0.003;

  var sc=Math.min(w,h)*0.065*zoom;
  var cx2=w/2, cy2=h*0.48;

  // Project all nodes
  var proj=[];
  for(var i=0;i<N;i++){
    var p=phases[i]%(2*Math.PI);if(p<0)p+=2*Math.PI;
    var z3d=p/(2*Math.PI)*HEIGHT;
    var pr=project(nxA[i],nyA[i],z3d,camRY,camRX,sc,cx2,cy2);
    proj.push({i:i,sx:pr[0],sy:pr[1],z:pr[2],persp:pr[3],phase:p});
  }

  // Depth sort (back to front)
  proj.sort(function(a,b){return b.z-a.z;});
  var idxMap=new Array(N);
  for(var k=0;k<N;k++) idxMap[proj[k].i]=proj[k];

  // Draw connections first (behind nodes)
  cx.globalCompositeOperation='lighter';
  for(var k=0;k<proj.length;k++){
    var nd=proj[k], i=nd.i, nn=nbrL[i];
    for(var j=0;j<nn.length;j++){
      if(nn[j]<=i)continue;
      var nb=idxMap[nn[j]];
      var pdiff=Math.abs(nd.phase-nb.phase);
      if(pdiff>Math.PI)pdiff=2*Math.PI-pdiff;
      var sync=1-pdiff/Math.PI;
      if(sync<0.3)continue;
      var alpha=sync*sync*0.25*Math.min(nd.persp,nb.persp);
      var ci=Math.floor(nd.phase/(Math.PI/3))%7;
      var col=COLORS[ci];
      cx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+alpha.toFixed(3)+')';
      cx.lineWidth=(0.3+sync*0.7)*nd.persp;
      cx.beginPath();cx.moveTo(nd.sx,nd.sy);cx.lineTo(nb.sx,nb.sy);cx.stroke();
    }
  }

  // Draw nodes (front to back already sorted, draw back first)
  for(var k=0;k<proj.length;k++){
    var nd=proj[k];
    var ci=Math.floor(nd.phase/(Math.PI/3))%7;
    var col=COLORS[ci];
    var size=(1.2+Math.sin(phases[nd.i])*0.4)*nd.persp;
    var bright=(0.5+Math.abs(Math.sin(phases[nd.i]))*0.4)*nd.persp;

    // Glow
    if(bright>0.3){
      cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(bright*0.06).toFixed(3)+')';
      cx.fillRect(nd.sx-size*3,nd.sy-size*3,size*6,size*6);
    }
    // Core
    cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+bright.toFixed(3)+')';
    cx.fillRect(nd.sx-size,nd.sy-size,size*2,size*2);
  }

  cx.globalCompositeOperation='source-over';

  // K and R — subtle
  cx.fillStyle='rgba(255,255,255,0.04)';
  cx.font='200 11px Georgia';cx.textAlign='left';
  cx.fillText('K = '+K.toFixed(3),12,h-12);
  cx.textAlign='right';
  cx.fillText('R = '+R.toFixed(3),w-12,h-12);

  // Top label
  cx.fillStyle='rgba(201,164,74,0.03)';
  cx.font='10px Georgia';cx.textAlign='center';
  cx.fillText('137 zeros · 5D: (x, y, \u03B8, t, K) · the critical line breathes',w/2,h*0.04);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
