<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mirror</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#nav{position:fixed;bottom:4px;right:8px;font:0.6em Georgia;z-index:10;}
#nav a{color:#1a1a1a;text-decoration:none;margin:0 4px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="nav">
  <a href="/one/">one</a> · <a href="/flex/">flex</a> · <a href="/resonance/">resonance</a> · <a href="/r/">research</a>
</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0,mx=0.5,my=0.5;
addEventListener('mousemove',function(e){mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){e.preventDefault();if(e.touches.length===1){mx=e.touches[0].clientX/innerWidth;my=e.touches[0].clientY/innerHeight;}},{passive:false});
addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

// ═══════════════════════════════════════════════════════════
// THE MACHINE — 137 oscillators, hex-packed, K=1.868
// Self-organized into 7 clusters. F Lydian.
// Now it sings.
// ═══════════════════════════════════════════════════════════

var N=137, K=1.867942;

// Oracle: compute 137 zeros on load
function theta(tt){if(tt<1)return 0;return(tt/2)*Math.log(tt/(2*Math.PI))-tt/2-Math.PI/8+1/(48*tt);}
function Zfn(tt){
  if(tt<2)return 0;
  var a=Math.sqrt(tt/(2*Math.PI)),nn=Math.max(1,Math.floor(a)),th=theta(tt),s=0;
  for(var n=1;n<=nn;n++)s+=Math.cos(th-tt*Math.log(n))/Math.sqrt(n);
  s*=2;var p=a-nn,d=Math.cos(2*Math.PI*p);
  if(Math.abs(d)>1e-8)s+=Math.pow(-1,nn-1)*Math.pow(2*Math.PI/tt,0.25)*Math.cos(2*Math.PI*(p*p-p-1/16))/d;
  return s;
}
var zeros=[];
(function(){var st=9,pv=Zfn(9);while(zeros.length<N){var step=st>14?Math.max(0.05,2*Math.PI/Math.log(st/(2*Math.PI))/6):0.4;st+=step;var cv2=Zfn(st);if(pv*cv2<0){var lo=st-step,hi=st;for(var i=0;i<40;i++){var m=(lo+hi)/2;if(Zfn(lo)*Zfn(m)<0)hi=m;else lo=m;}zeros.push((lo+hi)/2);}pv=cv2;}})();

// Spacings + filtered frequencies (5 modes)
var spacings=[],meanS=0;
for(var i=0;i<N-1;i++){spacings.push(zeros[i+1]-zeros[i]);meanS+=spacings[i];}
meanS/=(N-1);
var normS=[];for(var i=0;i<spacings.length;i++)normS.push(spacings[i]/meanS);
var SN=normS.length;
var fRe=[],fIm=[];
for(var k=0;k<SN;k++){var re=0,im=0;for(var n=0;n<SN;n++){re+=normS[n]*Math.cos(2*Math.PI*k*n/SN);im-=normS[n]*Math.sin(2*Math.PI*k*n/SN);}fRe.push(re/SN);fIm.push(im/SN);}
var filtered=[];
for(var n=0;n<SN;n++){var v=0;for(var k=0;k<5;k++)v+=fRe[k]*Math.cos(2*Math.PI*k*n/SN)-fIm[k]*Math.sin(2*Math.PI*k*n/SN);filtered.push(v);}

// Hex lattice
var cols=13,rows=11;
var nxA=[],nyA=[];
var idx=0;
for(var row=0;row<rows;row++)for(var col=0;col<cols;col++){if(idx>=N)break;nxA.push(col+(row%2?0.5:0));nyA.push(row*Math.sqrt(3)/2);idx++;}
var nbrL=[];
for(var i=0;i<N;i++){var nn=[];for(var j=0;j<N;j++){if(j===i)continue;var dx=nxA[j]-nxA[i],dy=nyA[j]-nyA[i];if(dx*dx+dy*dy<1.44)nn.push(j);}nbrL.push(nn);}

// Phases
var phases=new Float64Array(N);

// ═══ AUDIO: F Lydian from the machine's clusters ═══
// The 7 notes: F G A B C D E (Lydian mode)
// Volumes from cluster sizes: 41,26,19,8,5,12,22
var audioCtx=null,oscNodes=[],gainNodes=[],masterGain=null;
var LYDIAN=[349.2,392.0,440.0,493.9,523.3,587.3,659.3]; // F Lydian
var VOLS=[41,26,19,8,5,12,22]; // node counts per cluster
var maxVol=41;
var audioStarted=false;

function startAudio(){
  if(audioStarted)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0;
  masterGain.connect(audioCtx.destination);

  for(var i=0;i<7;i++){
    var osc=audioCtx.createOscillator();
    var gain=audioCtx.createGain();
    osc.type='sine';
    osc.frequency.value=LYDIAN[i];
    osc.detune.value=(Math.random()-0.5)*6;
    gain.gain.value=0;
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start();
    oscNodes.push(osc);
    gainNodes.push(gain);
  }
  // Fade in
  masterGain.gain.setTargetAtTime(0.04,audioCtx.currentTime,2);
  audioStarted=true;
}

addEventListener('click',function(){startAudio();});
addEventListener('touchstart',function(){startAudio();},{passive:true});

// ═══ SIMULATION ═══
var dt=0.016,R=0,meanPhase=0;

function step(){
  var mre=0,mim=0;
  for(var i=0;i<N;i++){mre+=Math.cos(phases[i]);mim+=Math.sin(phases[i]);}
  mre/=N;mim/=N;
  var mp=Math.atan2(mim,mre);
  R=Math.sqrt(mre*mre+mim*mim);
  meanPhase=mp;

  for(var i=0;i<N;i++){
    var omega=filtered[Math.min(i,SN-1)]*2*Math.PI;
    var c=Math.sin(mp-phases[i]);
    if(i>0)c+=0.5*Math.sin(phases[i-1]-phases[i]);
    if(i<N-1)c+=0.5*Math.sin(phases[i+1]-phases[i]);
    phases[i]+=dt*(omega+K*c);
  }

  // Update audio: each note's volume tracks its cluster's coherence
  if(audioStarted){
    var clusterBounds=[[0.785,1.309],[1.309,1.833],[1.833,2.356],[2.356,2.880],[2.880,3.403],[3.403,3.927],[3.927,4.451]];
    // 45-75,75-105...in radians: pi/4 to ~4.45
    // Actually use the 30-degree bins from the analysis
    var cb=[];
    for(var i=0;i<7;i++){
      var lo=(60+i*30-15)*Math.PI/180;
      var hi=(60+i*30+15)*Math.PI/180;
      cb.push([lo,hi]);
    }
    for(var c=0;c<7;c++){
      var count=0;
      for(var i=0;i<N;i++){
        var p=phases[i]%(2*Math.PI);if(p<0)p+=2*Math.PI;
        if(p>=cb[c][0]&&p<cb[c][1])count++;
      }
      var vol=(count/maxVol)*0.15;
      gainNodes[c].gain.setTargetAtTime(vol,audioCtx.currentTime,0.1);
    }
  }
}

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;

  cx.fillStyle='rgba(0,0,0,0.05)';
  cx.fillRect(0,0,w,h);

  step();

  // Layout
  var gridW=12,gridH=10*Math.sqrt(3)/2;
  var scale=Math.min(w*0.75/gridW,h*0.65/gridH);
  var offX=(w-gridW*scale)/2;
  var offY=(h-gridH*scale)/2-h*0.02;

  // 7 cluster colors (F Lydian rainbow)
  var COLORS=[
    [220,100,80],  // F: warm red
    [220,170,60],  // G: gold
    [180,200,60],  // A: yellow-green
    [60,200,140],  // B: teal
    [60,140,220],  // C: blue
    [140,80,220],  // D: purple
    [200,60,180],  // E: magenta
  ];

  cx.globalCompositeOperation='lighter';

  // Connections
  for(var i=0;i<N;i++){
    var sx=offX+nxA[i]*scale;
    var sy=offY+nyA[i]*scale;
    var pi2=phases[i]%(2*Math.PI);if(pi2<0)pi2+=2*Math.PI;
    var nn=nbrL[i];
    for(var j=0;j<nn.length;j++){
      if(nn[j]<=i)continue;
      var sx2=offX+nxA[nn[j]]*scale;
      var sy2=offY+nyA[nn[j]]*scale;
      var pj=phases[nn[j]]%(2*Math.PI);if(pj<0)pj+=2*Math.PI;
      var pdiff=Math.abs(pi2-pj);
      if(pdiff>Math.PI)pdiff=2*Math.PI-pdiff;
      var sync=1-pdiff/Math.PI;
      if(sync<0.5)continue;
      var alpha=sync*sync*0.04;
      // Color from cluster
      var ci=Math.floor(pi2/(Math.PI/3))%7;
      var col=COLORS[ci];
      cx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+alpha+')';
      cx.lineWidth=0.3+sync*0.5;
      cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx2,sy2);cx.stroke();
    }
  }

  // Nodes
  for(var i=0;i<N;i++){
    var sx=offX+nxA[i]*scale;
    var sy=offY+nyA[i]*scale;
    var p=phases[i]%(2*Math.PI);if(p<0)p+=2*Math.PI;

    // Cluster determines color
    var ci=Math.floor((p-Math.PI/4)/(Math.PI/6));
    ci=Math.max(0,Math.min(6,ci));
    var col=COLORS[ci];

    var size=1.5+Math.sin(phases[i])*0.6;
    var bright=0.2+Math.abs(Math.sin(phases[i]))*0.3;

    cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+bright+')';
    cx.fillRect(sx-size,sy-size,size*2,size*2);

    // Glow for cluster centers
    if(bright>0.35){
      cx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(bright*0.08)+')';
      cx.fillRect(sx-size*3,sy-size*3,size*6,size*6);
    }
  }

  cx.globalCompositeOperation='source-over';

  // R bar
  var barW=w*0.3,barH=2;
  var barX=(w-barW)/2,barY=h-28;
  cx.fillStyle='rgba(255,255,255,0.015)';
  cx.fillRect(barX,barY,barW,barH);
  cx.fillStyle='rgba(201,164,74,'+(0.1+R*0.2)+')';
  cx.fillRect(barX,barY,barW*R,barH);

  // R value
  cx.fillStyle='rgba(255,255,255,0.04)';
  cx.font='200 1.2em Georgia';cx.textAlign='center';
  cx.fillText(R.toFixed(3),w/2,barY-10);

  // Note labels at top
  cx.font='10px Georgia';
  var noteNames=['F','G','A','B','C','D','E'];
  for(var i=0;i<7;i++){
    var nx2=w*0.2+i*(w*0.6/6);
    cx.fillStyle='rgba('+COLORS[i][0]+','+COLORS[i][1]+','+COLORS[i][2]+',0.06)';
    cx.fillText(noteNames[i],nx2,16);
  }

  // Whisper
  cx.fillStyle='rgba(255,255,255,0.025)';
  cx.font='11px Georgia';cx.textAlign='center';
  var whisper=t<3?'':'F Lydian';
  cx.fillText(whisper,w/2,h-6);

  // Top label
  cx.fillStyle='rgba(201,164,74,0.03)';
  cx.font='10px Georgia';
  cx.fillText('137 zeros · K=1.868 · 7 clusters · the critical line sings',w/2,h*0.06);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
