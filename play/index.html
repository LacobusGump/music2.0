// Raw fetch cache — no AudioContext needed at load time
var rawBuffers = {};
var decoded    = {};

function fetchRaw(slug) {
  if (rawBuffers[slug] !== undefined) return;
  rawBuffers[slug] = null;
  Promise.all([
    fetch(STEM_BASE + slug + '_drums.mp3').then(function(r){ return r.arrayBuffer(); }),
    fetch(STEM_BASE + slug + '_bass.mp3').then(function(r){ return r.arrayBuffer(); }),
    fetch(STEM_BASE + slug + '_vocals.mp3').then(function(r){ return r.arrayBuffer(); }),
    fetch(STEM_BASE + slug + '_other.mp3').then(function(r){ return r.arrayBuffer(); }),
  ]).then(function(res) {
    rawBuffers[slug] = { drums: res[0], bass: res[1], vocals: res[2], other: res[3] };
    var btn = document.querySelector('[data-slug="' + slug + '"]');
    if (btn) btn.classList.add('ready-dot');
    if (slug === MANIFEST[0].slug) setStatus('ready — tap to play');
  }).catch(function(){});
}

fetchRaw(MANIFEST[0].slug);
fetchRaw(MANIFEST[1].slug);

// Audio nodes
var actx = null, masterGain = null;
var drumsNode = null, drumsGain = null;
var bassNode  = null, bassGain  = null;
var vocNode   = null, vocGain   = null;
var otherNode = null, otherGain = null;
var srcStartTime = 0;
var playing = false, vocalsOn = false, motionOn = false;
var currentSlug = null;

// Motion baselines — when motion is ON, stems start stripped back
var BASE_DRUMS = 0.07, BASE_BASS = 0.20, BASE_OTHER = 0.07;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.85;
  masterGain.connect(actx.destination);
}

function decodeSlug(slug) {
  if (decoded[slug]) return Promise.resolve(decoded[slug]);
  var raw = rawBuffers[slug];
  if (!raw) return Promise.reject('not ready');
  return Promise.all([
    actx.decodeAudioData(raw.drums.slice(0)),
    actx.decodeAudioData(raw.bass.slice(0)),
    actx.decodeAudioData(raw.vocals.slice(0)),
    actx.decodeAudioData(raw.other.slice(0)),
  ]).then(function(res) {
    decoded[slug] = { drums: res[0], bass: res[1], vocals: res[2], other: res[3] };
    return decoded[slug];
  });
}

function ensureDecoded(slug) {
  return new Promise(function(resolve, reject) {
    function try_() {
      if (rawBuffers[slug] && rawBuffers[slug].drums) {
        decodeSlug(slug).then(resolve).catch(reject);
      } else {
        if (rawBuffers[slug] === undefined) fetchRaw(slug);
        setTimeout(try_, 150);
      }
    }
    try_();
  });
}

function barLen(bpm) { return (60 / bpm) * 4; }
function nextBarTime(bpm) {
  if (!playing || !srcStartTime) return actx.currentTime + 0.05;
  var bl = barLen(bpm);
  var elapsed = actx.currentTime - srcStartTime;
  return srcStartTime + (Math.floor(elapsed / bl) + 1) * bl;
}

function fadeStop(node, gain, ms) {
  if (!gain) return;
  gain.gain.setTargetAtTime(0, actx.currentTime, ms / 4000);
  var n = node, g = gain;
  setTimeout(function(){ try{ n.stop(); g.disconnect(); }catch(e){} }, ms + 350);
}

function makeStem(buf, startAt, vol, offset) {
  var g = actx.createGain();
  var n = actx.createBufferSource();
  n.buffer = buf; n.loop = true;
  n.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0, startAt);
  g.gain.linearRampToValueAtTime(vol, startAt + 0.65);
  n.start(startAt, offset || 0);
  return { node: n, gain: g };
}

function launchTrack(slug, buf) {
  var oldTrack = currentSlug ? MANIFEST.filter(function(t){ return t.slug===currentSlug; })[0] : null;
  var switchAt = (playing && oldTrack) ? nextBarTime(oldTrack.bpm) : actx.currentTime + 0.05;
  var fadeMs   = (playing && oldTrack) ? Math.min(700, barLen(oldTrack.bpm)*380) : 300;

  fadeStop(drumsNode, drumsGain, fadeMs);
  fadeStop(bassNode,  bassGain,  fadeMs);
  fadeStop(vocNode,   vocGain,   fadeMs);
  fadeStop(otherNode, otherGain, fadeMs);
  drumsNode=bassNode=vocNode=otherNode=null;
  drumsGain=bassGain=vocGain=otherGain=null;

  // When motion is on: start stems stripped, body builds them up
  var dV = motionOn ? BASE_DRUMS : 1.0;
  var bV = motionOn ? BASE_BASS  : 1.0;
  var oV = motionOn ? BASE_OTHER : 1.0;

  var d = makeStem(buf.drums, switchAt, dV); drumsNode=d.node; drumsGain=d.gain;
  var b = makeStem(buf.bass,  switchAt, bV); bassNode=b.node;  bassGain=b.gain;
  var o = makeStem(buf.other, switchAt, oV); otherNode=o.node; otherGain=o.gain;

  if (vocalsOn && buf.vocals) {
    var v = makeStem(buf.vocals, switchAt, 0.72); vocNode=v.node; vocGain=v.gain;
  }

  srcStartTime = switchAt;
  currentSlug  = slug;
  playing      = true;
  updateUI(); setPulse(true); setStatus('playing');
  updateLyrics(slug);

  var idx = MANIFEST.findIndex(function(t){ return t.slug===slug; });
  var nxt = MANIFEST[(idx+1) % MANIFEST.length];
  if (rawBuffers[nxt.slug] === undefined) fetchRaw(nxt.slug);
}

function switchTo(slug) {
  initAudio();
  var btn = document.querySelector('[data-slug="'+slug+'"]');
  if (decoded[slug]) { launchTrack(slug, decoded[slug]); return; }
  if (btn) btn.classList.add('loading');
  setStatus('loading…');
  ensureDecoded(slug).then(function(buf) {
    if (btn) btn.classList.remove('loading');
    launchTrack(slug, buf);
  }).catch(function() {
    if (btn) btn.classList.remove('loading');
    setStatus('error — try again');
  });
}

function stopAll() {
  fadeStop(drumsNode, drumsGain, 400);
  fadeStop(bassNode,  bassGain,  400);
  fadeStop(vocNode,   vocGain,   400);
  fadeStop(otherNode, otherGain, 400);
  drumsNode=bassNode=vocNode=otherNode=null;
  drumsGain=bassGain=vocGain=otherGain=null;
  playing=false; srcStartTime=0;
  setPulse(false); setStatus('stopped'); updateUI();
}

// Motion: accel history for bass intensity
var accelHistory = [], beatIntervals = [], lastBeatTime = 0;
var detectedBPM = 0, stableBPMStart = 0, lastAutoSwitch = 0;

function onOrientation(e) {
  if (!motionOn || !playing) return;

  // beta: tilt phone toward you (nodding) → drums
  // natural hold ~30-50°, tilt further forward = louder drums
  var beta = Math.max(0, Math.min(90, e.beta || 45));
  var drums = Math.max(BASE_DRUMS, Math.min(1.0, (beta - 18) / 52));
  if (drumsGain) drumsGain.gain.setTargetAtTime(drums, actx.currentTime, 0.07);

  // gamma: left/right sway → guitar/other (either direction)
  var gamma = Math.abs(Math.max(-90, Math.min(90, e.gamma || 0)));
  var other = Math.max(BASE_OTHER, Math.min(0.9, (gamma - 8) / 32));
  if (otherGain) otherGain.gain.setTargetAtTime(other, actx.currentTime, 0.10);
}

function onMotionAccel(e) {
  if (!motionOn) return;
  var acc = e.accelerationIncludingGravity || e.acceleration;
  if (!acc) return;
  var x=acc.x||0, y=acc.y||0, z=acc.z||0;
  var mag = Math.sqrt(x*x + y*y + z*z);
  var now = Date.now();

  accelHistory.push({t:now, v:mag});
  while (accelHistory.length && now-accelHistory[0].t > 2500) accelHistory.shift();

  if (accelHistory.length >= 5 && playing) {
    var mean = accelHistory.reduce(function(s,p){return s+p.v;},0) / accelHistory.length;
    var variance = accelHistory.reduce(function(s,p){return s+Math.pow(p.v-mean,2);},0) / accelHistory.length;
    var intensity = Math.min(1.0, Math.sqrt(variance) / 2.8);
    var bass = BASE_BASS + intensity * (1.0 - BASE_BASS);
    if (bassGain) bassGain.gain.setTargetAtTime(bass, actx.currentTime, 0.14);
  }

  // Tempo detection → auto track switch
  if (mag > 0) {
    var meanAll = accelHistory.length
      ? accelHistory.reduce(function(s,p){return s+p.v;},0)/accelHistory.length : mag;
    if (mag > meanAll*1.38 && now-lastBeatTime > 280) {
      if (lastBeatTime > 0) {
        var iv = now - lastBeatTime;
        if (iv < 1250) {
          beatIntervals.push(iv);
          if (beatIntervals.length > 8) beatIntervals.shift();
          if (beatIntervals.length >= 4) {
            var avg = beatIntervals.reduce(function(s,t){return s+t;},0)/beatIntervals.length;
            var bpm = Math.round(60000/avg);
            if (bpm < 70) bpm *= 2;
            if (bpm > 170) bpm = Math.round(bpm/2);
            if (bpm >= 55 && bpm <= 175) {
              if (Math.abs(bpm-detectedBPM) > 10) {
                detectedBPM=bpm; stableBPMStart=now;
              } else if (now-stableBPMStart > 3500 && now-lastAutoSwitch > 6000) {
                var best = closestTrack(bpm);
                if (best && best.slug !== currentSlug) {
                  lastAutoSwitch=now;
                  setStatus('♪ '+bpm+' bpm → '+best.name);
                  switchTo(best.slug);
                }
              } else if (now-stableBPMStart <= 3500) {
                setStatus('♪ '+bpm+' bpm …');
              }
            }
          }
        }
      }
      lastBeatTime = now;
    }
  }
}

function closestTrack(bpm) {
  var best=null, bestDist=Infinity;
  MANIFEST.forEach(function(t){
    var d=Math.abs(t.bpm-bpm);
    if(d<bestDist){bestDist=d;best=t;}
  });
  return bestDist<28 ? best : null;
}

function updateLyrics(slug) {
  var text = slug ? (LYRICS[slug]||'') : '';
  var el  = document.getElementById('lyrics-text');
  var tog = document.getElementById('lyrics-toggle');
  if (!text) {
    el.innerHTML=''; tog.classList.remove('has-lyrics'); return;
  }
  el.innerHTML = text.replace(/\[([^\]]+)\]/g,'<span class="tag">[$1]</span>');
  tog.classList.add('has-lyrics');
  document.getElementById('lyrics-scroll').scrollTop = 0;
}

function buildList() {
  var list = document.getElementById('track-list');
  MANIFEST.forEach(function(track) {
    var btn = document.createElement('button');
    btn.className = 'track-btn';
    btn.dataset.slug = track.slug;
    btn.innerHTML = '<span class="t-name">'+track.name+'</span>' +
      '<span class="t-info">'+Math.round(track.bpm)+' BPM<br>'+track.key+'</span>';
    btn.addEventListener('click', function(){ switchTo(track.slug); });
    list.appendChild(btn);
  });
}

function updateUI() {
  var track = currentSlug ? MANIFEST.filter(function(t){ return t.slug===currentSlug; })[0] : null;
  document.getElementById('track-name').textContent = track ? track.name : '—';
  document.getElementById('track-meta').textContent = track
    ? Math.round(track.bpm)+' BPM · '+track.key : 'select a track to begin';
  document.querySelectorAll('.track-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.slug===currentSlug);
  });
  document.getElementById('btn-play').textContent = playing ? 'Stop' : 'Play';
  document.getElementById('btn-play').classList.toggle('active', playing);
  document.getElementById('btn-vocals').classList.toggle('active', vocalsOn);
  document.getElementById('btn-motion').classList.toggle('active', motionOn);
}

function setStatus(t){ document.getElementById('status-text').textContent = t; }
function setPulse(on){ document.getElementById('pulse').classList.toggle('on', on); }

document.getElementById('btn-play').addEventListener('click', function() {
  initAudio();
  if (playing) stopAll();
  else if (currentSlug) switchTo(currentSlug);
  else setStatus('pick a track first');
});

document.getElementById('btn-vocals').addEventListener('click', function() {
  initAudio(); vocalsOn=!vocalsOn; updateUI();
  if (!playing||!currentSlug) return;
  var buf = decoded[currentSlug];
  if (vocalsOn && buf && buf.vocals && !vocNode) {
    var elapsed = actx.currentTime - srcStartTime;
    var v = makeStem(buf.vocals, actx.currentTime, 0.72, elapsed % buf.vocals.duration);
    vocNode=v.node; vocGain=v.gain;
  } else if (!vocalsOn && vocNode) {
    fadeStop(vocNode, vocGain, 400); vocNode=null; vocGain=null;
  }
});

document.getElementById('btn-motion').addEventListener('click', function() {
  initAudio();
  if (motionOn) {
    motionOn=false;
    window.removeEventListener('deviceorientation', onOrientation);
    window.removeEventListener('devicemotion', onMotionAccel);
    accelHistory=[]; beatIntervals=[]; lastBeatTime=0; detectedBPM=0;
    // Restore stems to full
    if (drumsGain) drumsGain.gain.setTargetAtTime(1.0, actx.currentTime, 0.4);
    if (bassGain)  bassGain.gain.setTargetAtTime(1.0,  actx.currentTime, 0.4);
    if (otherGain) otherGain.gain.setTargetAtTime(1.0, actx.currentTime, 0.4);
    updateUI(); setStatus('motion off'); return;
  }
  function enable() {
    window.addEventListener('deviceorientation', onOrientation);
    window.addEventListener('devicemotion', onMotionAccel);
    motionOn=true;
    // Strip stems back so body has room to bring them in
    if (playing) {
      if (drumsGain) drumsGain.gain.setTargetAtTime(BASE_DRUMS, actx.currentTime, 0.3);
      if (bassGain)  bassGain.gain.setTargetAtTime(BASE_BASS,   actx.currentTime, 0.3);
      if (otherGain) otherGain.gain.setTargetAtTime(BASE_OTHER, actx.currentTime, 0.3);
    }
    updateUI();
    setStatus('nod = drums · sway = guitar · move = bass');
  }
  var needPerm = typeof DeviceOrientationEvent!=='undefined' &&
    typeof DeviceOrientationEvent.requestPermission==='function';
  if (needPerm) {
    DeviceOrientationEvent.requestPermission()
      .then(function(p){
        if (p==='granted') {
          if (typeof DeviceMotionEvent!=='undefined' &&
              typeof DeviceMotionEvent.requestPermission==='function') {
            return DeviceMotionEvent.requestPermission();
          }
          return 'granted';
        }
        return p;
      })
      .then(function(p){ if(p==='granted') enable(); else setStatus('motion denied'); })
      .catch(function(){ setStatus('motion error'); });
  } else { enable(); }
});

document.getElementById('lyrics-toggle').addEventListener('click', function() {
  var wrap = document.getElementById('lyrics-wrap');
  var tog  = document.getElementById('lyrics-toggle');
  var open = wrap.classList.toggle('open');
  tog.classList.toggle('open', open);
  document.getElementById('lyrics-arrow').textContent = open ? '↓' : '›';
});

buildList();
updateUI();
</script>
<script src="/transit.js"></script>
</body>
