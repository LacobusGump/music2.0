<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:#0a0807;color:#c4a088;
  font-family:Georgia,serif;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

.back{
  position:fixed;top:env(safe-area-inset-top,0px);left:0;right:0;
  padding:14px 18px 0;
  display:flex;align-items:center;justify-content:space-between;
  z-index:20;pointer-events:none;
}
.back a{
  pointer-events:auto;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.58em;letter-spacing:0.13em;
  color:rgba(196,160,136,0.28);
  transition:color 0.3s;text-decoration:none;
}
.back a:hover{color:rgba(196,160,136,0.65)}
.back-title{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.52em;letter-spacing:0.30em;text-transform:uppercase;
  color:rgba(184,117,58,0.22);
}

#now-playing{
  flex-shrink:0;
  padding:calc(env(safe-area-inset-top,0px) + 52px) 24px 14px;
  border-bottom:1px solid #0f0d0b;
}
#track-name{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:clamp(1.2rem,5vw,1.55rem);
  font-weight:300;letter-spacing:0.04em;
  color:rgba(184,117,58,0.92);
  margin-bottom:5px;min-height:1.6em;
}
#track-meta{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.52em;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(139,74,46,0.45);
}

#stem-meter{
  flex-shrink:0;height:64px;
  padding:8px 24px 0;
  border-bottom:1px solid #0d0b09;
  display:flex;gap:5px;align-items:flex-end;
}
.s-bar-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  height:100%;
}
.s-bar{
  width:100%;max-width:32px;
  background:rgba(184,117,58,0.10);
  border-radius:1px;min-height:2px;
  transition:background 0.18s;
}
.s-bar.lit{
  background:rgba(184,117,58,0.72);
  box-shadow:0 0 5px rgba(184,117,58,0.18);
}
.s-lbl{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.34em;letter-spacing:0.10em;
  color:rgba(139,74,46,0.28);margin-top:4px;
  text-transform:uppercase;
}

#track-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.track-btn{
  display:flex;align-items:center;
  width:100%;padding:17px 24px;
  background:none;border:none;
  border-bottom:1px solid #0d0b09;
  cursor:pointer;text-align:left;
  color:rgba(139,74,46,0.45);
  transition:color 0.25s,background 0.15s;
  -webkit-appearance:none;
}
.track-btn:active{background:#0d0b09}
.track-btn.active{color:rgba(184,117,58,0.92);background:#0d0b09}
.track-btn.real .t-name{color:rgba(196,160,136,0.70)}
.track-btn.real.active .t-name{color:rgba(196,160,136,0.95)}
.t-name{flex:1;font-family:Georgia,serif;font-size:0.92em;line-height:1.3;color:inherit}
.t-info{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.48em;letter-spacing:0.18em;
  color:rgba(139,74,46,0.25);text-align:right;line-height:1.7;
}
.track-btn.active .t-info{color:rgba(139,74,46,0.55)}
.track-btn.loading .t-name::after{content:' …';color:rgba(184,117,58,0.35)}
.track-btn.ready-dot .t-info::before{content:'· ';color:rgba(184,117,58,0.30)}

#controls{
  flex-shrink:0;padding:13px 24px;
  border-top:1px solid #0f0d0b;display:flex;gap:9px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 13px);
}
.ctrl-btn{
  flex:1;padding:12px 6px;
  background:#0d0b09;border:1px solid #161310;
  color:rgba(139,74,46,0.42);
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.50em;letter-spacing:0.28em;text-transform:uppercase;
  cursor:pointer;border-radius:1px;
  transition:all 0.2s;-webkit-appearance:none;line-height:1;
}
.ctrl-btn:active{background:#111}
.ctrl-btn.active{background:#131108;color:rgba(184,117,58,0.88);border-color:rgba(184,117,58,0.18)}

#lyrics-wrap{
  flex-shrink:0;overflow:hidden;max-height:0;
  transition:max-height 0.35s ease;
  border-bottom:1px solid #0d0b09;
}
#lyrics-wrap.open{max-height:38vh}
#lyrics-scroll{
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 24px 18px;max-height:38vh;
}
#lyrics-text{
  font-family:Georgia,serif;font-size:0.72em;line-height:2.1;
  color:rgba(196,160,136,0.38);white-space:pre-wrap;
}
#lyrics-text .tag{color:rgba(139,74,46,0.28);font-style:italic}
#lyrics-toggle{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:8px 24px;background:none;border:none;
  border-bottom:1px solid #0d0b09;cursor:pointer;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.46em;letter-spacing:0.25em;text-transform:uppercase;
  color:rgba(139,74,46,0.30);-webkit-appearance:none;
}
#lyrics-toggle.has-lyrics{color:rgba(139,74,46,0.50)}
#lyrics-arrow{transition:transform 0.3s;display:inline-block}
#lyrics-toggle.open #lyrics-arrow{transform:rotate(180deg)}

#status-bar{
  flex-shrink:0;padding:8px 24px;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.48em;letter-spacing:0.28em;color:rgba(139,74,46,0.28);
  text-transform:uppercase;border-top:1px solid #0d0b09;
  display:flex;align-items:center;gap:8px;
}
.pulse{width:5px;height:5px;border-radius:50%;background:#161310;flex-shrink:0;transition:background 0.4s}
.pulse.on{background:rgba(184,117,58,0.65);animation:throb 1.4s ease-in-out infinite}
@keyframes throb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.30;transform:scale(0.55)}}
</style>
</head>
<body>

<div class="back">
  <a href="/">&larr; gump</a>
  <span class="back-title">GUMP</span>
</div>

<div id="now-playing">
  <div id="track-name">—</div>
  <div id="track-meta">loading&nbsp;…</div>
</div>

<div id="stem-meter"></div>

<button id="lyrics-toggle">lyrics <span id="lyrics-arrow">›</span></button>
<div id="lyrics-wrap"><div id="lyrics-scroll"><div id="lyrics-text"></div></div></div>

<div id="track-list"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-play">Play</button>
  <button class="ctrl-btn" id="btn-vocals">Vocals</button>
  <button class="ctrl-btn" id="btn-motion">Motion</button>
</div>

<div id="status-bar">
  <span class="pulse" id="pulse"></span>
  <span id="status-text">preloading&nbsp;…</span>
</div>

<script>
var STEM_BASE='/v5/stems/';

// ── MANIFEST ──────────────────────────────────────────────────────────────
// real:true = professional multi-stem track; body controls every layer
// stems array defines what files to load and in what order
var MANIFEST=[
  {name:'Love-forgets Best',slug:'Love_forgets_Best',bpm:100,key:'—',
   stems:['drums','bass','keyboard','backing','vocals','synth','fx'],real:true},
  {name:'Stay',slug:'Stay',bpm:100,key:'—',
   stems:['drums','bass','keyboard','backing','vocals','other'],real:true},
  {name:'True Blind',             slug:'True_blind',             bpm:143.6,key:'F# min',stems:['drums','bass','vocals','other']},
  {name:'1+1=3',                  slug:'1p1=3',                  bpm:136.0,key:'C min', stems:['drums','bass','vocals','other']},
  {name:'Gap Breath',             slug:'Gap_breath',             bpm:129.2,key:'Eb min',stems:['drums','bass','vocals','other']},
  {name:'Cheese Receipt',         slug:'Cheese_Receipt',         bpm:129.2,key:'C maj', stems:['drums','bass','vocals','other']},
  {name:'The 3',                  slug:'The_3',                  bpm: 99.4,key:'D min', stems:['drums','bass','vocals','other']},
  {name:'You There?',             slug:'You_there_',             bpm: 99.4,key:'C min', stems:['drums','bass','vocals','other']},
  {name:'Clean Glass',            slug:'Clean_Glass',            bpm: 95.7,key:'C min', stems:['drums','bass','vocals','other']},
  {name:'Dirty Glass',            slug:'Dirty_Glass',            bpm: 95.7,key:'C min', stems:['drums','bass','vocals','other']},
  {name:'Stale Cheese Receipt',   slug:'Stale_Cheese_Receipt',   bpm: 69.8,key:'C min', stems:['drums','bass','vocals','other']},
  {name:'Stay With Me in the Gap',slug:'Stay_with_me_in_the_gap',bpm: 66.3,key:'G min', stems:['drums','bass','vocals','other']},
];

// ── STEM MOTION CONFIG ────────────────────────────────────────────────────
// axis: beta=fwd lean, gamma=sway, accel=movement energy
//       vbeta=deep lean (vocals gate), auto=follows another stem
// in0/in1: sensor range that maps base→full
// tc: time constant for smooth transitions (WebAudio setTargetAtTime)
var SCFG={
  drums:   {axis:'beta',  in0:35,in1:70, base:0.40,full:1.00,tc:0.07},
  bass:    {axis:'accel',               base:0.25,full:0.90,tc:0.14},
  keyboard:{axis:'beta',  in0:18,in1:45, base:0.04,full:1.00,tc:0.12},
  backing: {axis:'gamma', in0:12,in1:55, base:0.04,full:0.85,tc:0.10},
  vocals:  {axis:'vbeta', in0:65,in1:85, base:0.00,full:0.90,tc:0.20},
  synth:   {axis:'accel',               base:0.04,full:0.90,tc:0.14},
  fx:      {axis:'auto',                base:0.04,full:0.90,tc:0.25},
  other:   {axis:'gamma', in0:8, in1:45, base:0.04,full:0.85,tc:0.10},
};

// ── STATE ─────────────────────────────────────────────────────────────────
var actx=null,masterGain=null;
var curNodes={},curGains={},displayGains={};
var srcStartTime=0,playing=false,vocalsOn=false,motionOn=false,currentSlug=null;
var rawBuffers={},decoded={};
var accelHistory=[],beatIntervals=[],lastBeatTime=0;
var detectedBPM=0,stableBPMStart=0,lastAutoSwitch=0;
var curBeta=45,curGamma=0,accelIntensity=0;
var meterRAF=null;
var SLBL={drums:'D',bass:'B',keyboard:'KEY',backing:'BACK',vocals:'VOX',synth:'SYN',fx:'FX',other:'OTHER'};

// ── HELPERS ───────────────────────────────────────────────────────────────
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function remap(v,i0,i1,o0,o1){return o0+(o1-o0)*clamp((v-i0)/(i1-i0),0,1);}
function currentTrack(){return MANIFEST.find(function(t){return t.slug===currentSlug;});}
function isReal(){var t=currentTrack();return!!(t&&t.real);}

// ── AUDIO INIT ────────────────────────────────────────────────────────────
function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();masterGain.gain.value=0.85;
  masterGain.connect(actx.destination);
  startMeterLoop();
}

// ── FETCH + DECODE ────────────────────────────────────────────────────────
function fetchRaw(slug){
  if(rawBuffers[slug]!==undefined)return;
  rawBuffers[slug]=null;
  var track=MANIFEST.find(function(t){return t.slug===slug;});
  var fetches=track.stems.map(function(s){
    return fetch(STEM_BASE+slug+'_'+s+'.mp3').then(function(r){return r.arrayBuffer();});
  });
  Promise.all(fetches).then(function(results){
    var obj={};
    track.stems.forEach(function(s,i){obj[s]=results[i];});
    rawBuffers[slug]=obj;
    var btn=document.querySelector('[data-slug="'+slug+'"]');
    if(btn)btn.classList.add('ready-dot');
    if(slug===MANIFEST[0].slug)setStatus('ready — tap to play');
  }).catch(function(){});
}

function decodeSlug(slug){
  if(decoded[slug])return Promise.resolve(decoded[slug]);
  var raw=rawBuffers[slug];
  if(!raw)return Promise.reject('not ready');
  var track=MANIFEST.find(function(t){return t.slug===slug;});
  var decodes=track.stems.map(function(s){return actx.decodeAudioData(raw[s].slice(0));});
  return Promise.all(decodes).then(function(results){
    var obj={};track.stems.forEach(function(s,i){obj[s]=results[i];});
    decoded[slug]=obj;return obj;
  });
}

function ensureDecoded(slug){
  return new Promise(function(resolve,reject){
    var track=MANIFEST.find(function(t){return t.slug===slug;});
    function try_(){
      var raw=rawBuffers[slug];
      if(raw&&track.stems.every(function(s){return raw[s];})){
        decodeSlug(slug).then(resolve).catch(reject);
      }else{
        if(raw===undefined)fetchRaw(slug);
        setTimeout(try_,150);
      }
    }
    try_();
  });
}

// ── PLAYBACK ──────────────────────────────────────────────────────────────
function barLen(bpm){return(60/bpm)*4;}
function nextBarTime(bpm){
  if(!playing||!srcStartTime)return actx.currentTime+0.05;
  var bl=barLen(bpm),e=actx.currentTime-srcStartTime;
  return srcStartTime+(Math.floor(e/bl)+1)*bl;
}

function makeStem(buf,startAt,vol,offset){
  var g=actx.createGain(),n=actx.createBufferSource();
  n.buffer=buf;n.loop=true;
  n.connect(g);g.connect(masterGain);
  g.gain.setValueAtTime(0,startAt);
  g.gain.linearRampToValueAtTime(vol,startAt+0.65);
  n.start(startAt,offset||0);
  return{node:n,gain:g};
}

function fadeStop(node,gain,ms){
  if(!gain)return;
  gain.gain.setTargetAtTime(0,actx.currentTime,ms/4000);
  var n=node,g=gain;
  setTimeout(function(){try{n.stop();g.disconnect();}catch(e){}},ms+350);
}

function stemInitVol(s){
  var cfg=SCFG[s];if(!cfg)return 1.0;
  // vocals: always controlled deliberately — by button (motion off) or deep lean (motion on)
  if(s==='vocals'){return(!motionOn&&vocalsOn)?0.9:0.0;}
  if(!motionOn)return 1.0;
  return cfg.base;
}

function setStemGain(s,val,tc){
  if(curGains[s])curGains[s].gain.setTargetAtTime(val,actx.currentTime,tc||0.07);
  displayGains[s]=val;
}

function launchTrack(slug,buf){
  var track=MANIFEST.find(function(t){return t.slug===slug;});
  var oldTrack=currentSlug?MANIFEST.find(function(t){return t.slug===currentSlug;}):null;
  var switchAt=(playing&&oldTrack)?nextBarTime(oldTrack.bpm):actx.currentTime+0.05;
  var fadeMs=(playing&&oldTrack)?Math.min(700,barLen(oldTrack.bpm)*380):300;

  // Fade out current nodes
  var dying=curNodes,dyingG=curGains;
  Object.keys(dying).forEach(function(s){fadeStop(dying[s],dyingG[s],fadeMs);});
  curNodes={};curGains={};displayGains={};

  track.stems.forEach(function(s){
    if(!buf[s])return;
    var vol=stemInitVol(s);
    var st=makeStem(buf[s],switchAt,vol);
    curNodes[s]=st.node;curGains[s]=st.gain;displayGains[s]=vol;
  });

  srcStartTime=switchAt;currentSlug=slug;playing=true;
  buildStemMeter(track);updateUI();setPulse(true);
  setStatus(motionOn?motionHint():'playing');
  updateLyrics(slug);

  var idx=MANIFEST.findIndex(function(t){return t.slug===slug;});
  var nxt=MANIFEST[(idx+1)%MANIFEST.length];
  if(rawBuffers[nxt.slug]===undefined)fetchRaw(nxt.slug);
}

function switchTo(slug){
  initAudio();
  var btn=document.querySelector('[data-slug="'+slug+'"]');
  if(decoded[slug]){launchTrack(slug,decoded[slug]);return;}
  if(btn)btn.classList.add('loading');
  setStatus('loading…');
  ensureDecoded(slug).then(function(buf){
    if(btn)btn.classList.remove('loading');
    launchTrack(slug,buf);
  }).catch(function(){
    if(btn)btn.classList.remove('loading');
    setStatus('error — try again');
  });
}

function stopAll(){
  Object.keys(curNodes).forEach(function(s){fadeStop(curNodes[s],curGains[s],400);});
  curNodes={};curGains={};displayGains={};playing=false;srcStartTime=0;
  buildStemMeter(currentTrack());setPulse(false);setStatus('stopped');updateUI();
}

// ── MOTION ────────────────────────────────────────────────────────────────
function applyMotionGains(){
  if(!playing||!currentSlug)return;
  var track=currentTrack();if(!track)return;

  track.stems.forEach(function(s){
    var cfg=SCFG[s];if(!cfg)return;
    var val;
    switch(cfg.axis){
      case'beta':
        val=Math.max(cfg.base,remap(curBeta,cfg.in0,cfg.in1,cfg.base,cfg.full));
        break;
      case'gamma':
        val=Math.max(cfg.base,remap(Math.abs(curGamma),cfg.in0,cfg.in1,cfg.base,cfg.full));
        break;
      case'accel':
        val=cfg.base+accelIntensity*(cfg.full-cfg.base);
        break;
      case'vbeta':
        val=vocalsOn?Math.max(0,remap(curBeta,cfg.in0,cfg.in1,0.0,cfg.full)):0.0;
        break;
      case'auto':
        // fx rises when synth is moving
        var driver=displayGains['synth']||0;
        val=driver>0.4?cfg.base+(driver-0.4)*(cfg.full-cfg.base)*1.4:cfg.base;
        val=clamp(val,cfg.base,cfg.full);
        break;
      default:return;
    }
    setStemGain(s,clamp(val,0,cfg.full),cfg.tc||0.07);
  });
}

function onOrientation(e){
  if(!motionOn||!playing)return;
  curBeta=clamp(e.beta||45,0,90);
  curGamma=clamp(e.gamma||0,-90,90);
  applyMotionGains();
}

function onMotionAccel(e){
  if(!motionOn)return;
  var acc=e.accelerationIncludingGravity||e.acceleration;
  if(!acc)return;
  var x=acc.x||0,y=acc.y||0,z=acc.z||0;
  var mag=Math.sqrt(x*x+y*y+z*z);
  var now=Date.now();
  accelHistory.push({t:now,v:mag});
  while(accelHistory.length&&now-accelHistory[0].t>2500)accelHistory.shift();
  if(accelHistory.length>=5&&playing){
    var mean=accelHistory.reduce(function(s,p){return s+p.v;},0)/accelHistory.length;
    var variance=accelHistory.reduce(function(s,p){return s+Math.pow(p.v-mean,2);},0)/accelHistory.length;
    accelIntensity=Math.min(1.0,Math.sqrt(variance)/2.8);
    applyMotionGains();
  }
  // BPM detection → auto track switch
  if(mag>0){
    var meanA=accelHistory.length?accelHistory.reduce(function(s,p){return s+p.v;},0)/accelHistory.length:mag;
    if(mag>meanA*1.38&&now-lastBeatTime>280){
      if(lastBeatTime>0){
        var iv=now-lastBeatTime;
        if(iv<1250){
          beatIntervals.push(iv);if(beatIntervals.length>8)beatIntervals.shift();
          if(beatIntervals.length>=4){
            var avg=beatIntervals.reduce(function(s,t){return s+t;},0)/beatIntervals.length;
            var bpm=Math.round(60000/avg);
            if(bpm<70)bpm*=2;if(bpm>170)bpm=Math.round(bpm/2);
            if(bpm>=55&&bpm<=175){
              if(Math.abs(bpm-detectedBPM)>10){detectedBPM=bpm;stableBPMStart=now;}
              else if(now-stableBPMStart>3500&&now-lastAutoSwitch>6000){
                var best=closestTrack(bpm);
                if(best&&best.slug!==currentSlug){
                  lastAutoSwitch=now;
                  setStatus('♪ '+bpm+' bpm → '+best.name);
                  switchTo(best.slug);
                }
              }else if(now-stableBPMStart<=3500){setStatus('♪ '+bpm+' bpm …');}
            }
          }
        }
      }
      lastBeatTime=now;
    }
  }
}

function closestTrack(bpm){
  var best=null,bestDist=Infinity;
  MANIFEST.forEach(function(t){var d=Math.abs(t.bpm-bpm);if(d<bestDist){bestDist=d;best=t;}});
  return bestDist<28?best:null;
}

function motionHint(){
  if(isReal())return'lean = harmony · nod = drums · sway = choir · move = synth';
  return'nod = drums · sway = guitar · move = bass';
}

// ── STEM METER ────────────────────────────────────────────────────────────
function buildStemMeter(track){
  var el=document.getElementById('stem-meter');
  el.innerHTML='';
  if(!track)return;
  track.stems.forEach(function(s){
    var wrap=document.createElement('div');wrap.className='s-bar-wrap';
    var bar=document.createElement('div');bar.className='s-bar';bar.id='sbar-'+s;bar.style.height='2px';
    var lbl=document.createElement('div');lbl.className='s-lbl';
    lbl.textContent=SLBL[s]||s.slice(0,4).toUpperCase();
    wrap.appendChild(bar);wrap.appendChild(lbl);el.appendChild(wrap);
  });
}

function updateStemMeter(){
  var track=currentTrack();if(!track)return;
  track.stems.forEach(function(s){
    var bar=document.getElementById('sbar-'+s);if(!bar)return;
    var val=displayGains[s]||0;
    bar.style.height=Math.max(2,Math.round(val*44))+'px';
    bar.classList.toggle('lit',val>0.12);
  });
}

function startMeterLoop(){
  if(meterRAF)return;
  function loop(){updateStemMeter();meterRAF=requestAnimationFrame(loop);}
  meterRAF=requestAnimationFrame(loop);
}

// ── UI ────────────────────────────────────────────────────────────────────
function updateLyrics(slug){
  var text=slug?(LYRICS[slug]||''):'';
  var el=document.getElementById('lyrics-text');
  var tog=document.getElementById('lyrics-toggle');
  if(!text){el.innerHTML='';tog.classList.remove('has-lyrics');return;}
  el.innerHTML=text.replace(/\[([^\]]+)\]/g,'<span class="tag">[$1]</span>');
  tog.classList.add('has-lyrics');
  document.getElementById('lyrics-scroll').scrollTop=0;
}

function buildList(){
  var list=document.getElementById('track-list');
  MANIFEST.forEach(function(track){
    var btn=document.createElement('button');
    btn.className='track-btn'+(track.real?' real':'');
    btn.dataset.slug=track.slug;
    var stemNote=track.real?(' · '+track.stems.length+' stems'):'';
    btn.innerHTML='<span class="t-name">'+track.name+'</span>'+
      '<span class="t-info">'+Math.round(track.bpm)+' BPM<br>'+track.key+stemNote+'</span>';
    btn.addEventListener('click',function(){switchTo(track.slug);});
    list.appendChild(btn);
  });
}

function updateUI(){
  var track=currentSlug?MANIFEST.find(function(t){return t.slug===currentSlug;}):null;
  document.getElementById('track-name').textContent=track?track.name:'—';
  document.getElementById('track-meta').textContent=track
    ?Math.round(track.bpm)+' BPM · '+track.key:'select a track to begin';
  document.querySelectorAll('.track-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.slug===currentSlug);
  });
  document.getElementById('btn-play').textContent=playing?'Stop':'Play';
  document.getElementById('btn-play').classList.toggle('active',playing);
  document.getElementById('btn-vocals').classList.toggle('active',vocalsOn);
  document.getElementById('btn-motion').classList.toggle('active',motionOn);
}

function setStatus(t){document.getElementById('status-text').textContent=t;}
function setPulse(on){document.getElementById('pulse').classList.toggle('on',on);}

// ── CONTROLS ──────────────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click',function(){
  initAudio();
  if(playing)stopAll();
  else if(currentSlug)switchTo(currentSlug);
  else setStatus('pick a track first');
});

document.getElementById('btn-vocals').addEventListener('click',function(){
  initAudio();vocalsOn=!vocalsOn;updateUI();
  if(!playing||!currentSlug)return;
  var buf=decoded[currentSlug];
  if(isReal()){
    // Real track: gate — motion handles the lean; direct set when motion off
    if(!motionOn)setStemGain('vocals',vocalsOn?0.9:0.0,0.3);
    else if(!vocalsOn)setStemGain('vocals',0.0,0.3);
  }else{
    // Demucs track: direct toggle
    if(vocalsOn&&buf&&buf.vocals&&!curNodes.vocals){
      var elapsed=actx.currentTime-srcStartTime;
      var st=makeStem(buf.vocals,actx.currentTime,0.72,elapsed%buf.vocals.duration);
      curNodes.vocals=st.node;curGains.vocals=st.gain;displayGains.vocals=0.72;
    }else if(!vocalsOn&&curNodes.vocals){
      fadeStop(curNodes.vocals,curGains.vocals,400);
      delete curNodes.vocals;delete curGains.vocals;displayGains.vocals=0;
    }
  }
});

document.getElementById('btn-motion').addEventListener('click',function(){
  initAudio();
  if(motionOn){
    motionOn=false;
    window.removeEventListener('deviceorientation',onOrientation);
    window.removeEventListener('devicemotion',onMotionAccel);
    accelHistory=[];beatIntervals=[];lastBeatTime=0;detectedBPM=0;accelIntensity=0;
    // Restore stems to full
    if(playing){
      var track=currentTrack();
      if(track){
        track.stems.forEach(function(s){
          var v=s==='vocals'?(vocalsOn?0.9:0.0):1.0;
          setStemGain(s,v,0.4);
        });
      }
    }
    updateUI();setStatus('motion off');return;
  }
  function enable(){
    window.addEventListener('deviceorientation',onOrientation);
    window.addEventListener('devicemotion',onMotionAccel);
    motionOn=true;
    if(playing){
      var track=currentTrack();
      if(track){
        track.stems.forEach(function(s){
          var cfg=SCFG[s];
          setStemGain(s,s==='vocals'?0.0:(cfg?cfg.base:0.3),0.3);
        });
      }
    }
    updateUI();setStatus(motionHint());
  }
  var needPerm=typeof DeviceOrientationEvent!=='undefined'&&
    typeof DeviceOrientationEvent.requestPermission==='function';
  if(needPerm){
    DeviceOrientationEvent.requestPermission().then(function(p){
      if(p==='granted'){
        if(typeof DeviceMotionEvent!=='undefined'&&
           typeof DeviceMotionEvent.requestPermission==='function'){
          return DeviceMotionEvent.requestPermission();
        }
        return'granted';
      }
      return p;
    }).then(function(p){if(p==='granted')enable();else setStatus('motion denied');})
    .catch(function(){setStatus('motion error');});
  }else{enable();}
});

document.getElementById('lyrics-toggle').addEventListener('click',function(){
  var wrap=document.getElementById('lyrics-wrap');
  var tog=document.getElementById('lyrics-toggle');
  var open=wrap.classList.toggle('open');
  tog.classList.toggle('open',open);
  document.getElementById('lyrics-arrow').textContent=open?'↓':'›';
});
