<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:#0a0807;color:#c4a088;
  font-family:Georgia,serif;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
body{display:flex;flex-direction:column;height:100vh;height:100dvh}

.back{
  position:fixed;top:env(safe-area-inset-top,0px);left:0;right:0;
  padding:14px 18px 0;
  display:flex;align-items:center;justify-content:space-between;
  z-index:20;pointer-events:none;
}
.back a{
  pointer-events:auto;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.58em;letter-spacing:0.13em;
  color:rgba(196,160,136,0.28);
  transition:color 0.3s;text-decoration:none;
}
.back a:hover{color:rgba(196,160,136,0.65)}
.back-title{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.52em;letter-spacing:0.30em;text-transform:uppercase;
  color:rgba(184,117,58,0.22);
}

#now-playing{
  flex-shrink:0;
  padding:calc(env(safe-area-inset-top,0px) + 52px) 24px 16px;
  border-bottom:1px solid #0f0d0b;
}
#track-name{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:clamp(1.2rem,5vw,1.55rem);
  font-weight:300;letter-spacing:0.04em;
  color:rgba(184,117,58,0.92);
  margin-bottom:5px;min-height:1.6em;
}
#track-meta{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.52em;letter-spacing:0.28em;text-transform:uppercase;
  color:rgba(139,74,46,0.45);
}

#track-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.track-btn{
  display:flex;align-items:center;
  width:100%;padding:17px 24px;
  background:none;border:none;
  border-bottom:1px solid #0d0b09;
  cursor:pointer;text-align:left;
  color:rgba(139,74,46,0.45);
  transition:color 0.25s,background 0.15s;
  -webkit-appearance:none;
}
.track-btn:active{background:#0d0b09}
.track-btn.active{color:rgba(184,117,58,0.92);background:#0d0b09}
.t-name{flex:1;font-family:Georgia,serif;font-size:0.92em;line-height:1.3;color:inherit}
.t-info{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.48em;letter-spacing:0.18em;
  color:rgba(139,74,46,0.25);text-align:right;line-height:1.7;
}
.track-btn.active .t-info{color:rgba(139,74,46,0.55)}
.track-btn.loading .t-name::after{content:' …';color:rgba(184,117,58,0.35)}
.track-btn.ready-dot .t-info::before{
  content:'· ';color:rgba(184,117,58,0.30);
}

#controls{
  flex-shrink:0;padding:13px 24px;
  border-top:1px solid #0f0d0b;display:flex;gap:9px;
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 13px);
}
.ctrl-btn{
  flex:1;padding:12px 6px;
  background:#0d0b09;border:1px solid #161310;
  color:rgba(139,74,46,0.42);
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.50em;letter-spacing:0.28em;text-transform:uppercase;
  cursor:pointer;border-radius:1px;
  transition:all 0.2s;-webkit-appearance:none;line-height:1;
}
.ctrl-btn:active{background:#111}
.ctrl-btn.active{background:#131108;color:rgba(184,117,58,0.88);border-color:rgba(184,117,58,0.18)}

#status-bar{
  flex-shrink:0;padding:8px 24px;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.48em;letter-spacing:0.28em;color:rgba(139,74,46,0.28);
  text-transform:uppercase;border-top:1px solid #0d0b09;
  display:flex;align-items:center;gap:8px;
}
.pulse{width:5px;height:5px;border-radius:50%;background:#161310;flex-shrink:0;transition:background 0.4s}
.pulse.on{background:rgba(184,117,58,0.65);animation:throb 1.4s ease-in-out infinite}
@keyframes throb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.30;transform:scale(0.55)}}
</style>
</head>
<body>

<div class="back">
  <a href="/music/">&larr; human art</a>
  <span class="back-title">GUMP</span>
</div>

<div id="now-playing">
  <div id="track-name">—</div>
  <div id="track-meta">loading&nbsp;…</div>
</div>

<div id="track-list"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-play">Play</button>
  <button class="ctrl-btn" id="btn-vocals">Vocals</button>
  <button class="ctrl-btn" id="btn-motion">Motion</button>
</div>

<div id="status-bar">
  <span class="pulse" id="pulse"></span>
  <span id="status-text">preloading&nbsp;…</span>
</div>

<script>
var STEM_BASE = '/v5/stems/';

var MANIFEST = [
  { name: "True Blind",               slug: "True_blind",               bpm: 143.6, key: "F# min" },
  { name: "1+1=3",                    slug: "1p1=3",                    bpm: 136.0, key: "C min"  },
  { name: "Gap Breath",               slug: "Gap_breath",               bpm: 129.2, key: "Eb min" },
  { name: "Cheese Receipt",            slug: "Cheese_Receipt",            bpm: 129.2, key: "C maj"  },
  { name: "The 3",                    slug: "The_3",                    bpm:  99.4, key: "D min"  },
  { name: "You There?",               slug: "You_there_",               bpm:  99.4, key: "C min"  },
  { name: "Clean Glass",              slug: "Clean_Glass",              bpm:  95.7, key: "C min"  },
  { name: "Dirty Glass",              slug: "Dirty_Glass",              bpm:  95.7, key: "C min"  },
  { name: "Stale Cheese Receipt",      slug: "Stale_Cheese_Receipt",      bpm:  69.8, key: "C min"  },
  { name: "Stay With Me in the Gap",  slug: "Stay_with_me_in_the_gap",  bpm:  66.3, key: "G min"  },
];

var NOTE_FREQ = {
  'C':261.63,'C#':277.18,'Db':277.18,'D':293.66,'D#':311.13,'Eb':311.13,
  'E':329.63,'F':349.23,'F#':369.99,'Gb':369.99,'G':392.00,
  'G#':415.30,'Ab':415.30,'A':440.00,'A#':466.16,'Bb':466.16,'B':493.88
};
var MINOR = [0,2,3,5,7,8,10];
var MAJOR = [0,2,4,5,7,9,11];

function keyToFreqs(k) {
  var parts = k.split(' ');
  var root = parts[0];
  var mode = parts[1];
  var base = NOTE_FREQ[root] || 261.63;
  var iv = (mode === 'maj' ? MAJOR : MINOR).concat(
    (mode === 'maj' ? MAJOR : MINOR).map(function(i){ return i+12; })
  );
  return iv.map(function(i){ return base * Math.pow(2, i/12); });
}

// Raw fetch cache — no AudioContext needed
var rawBuffers = {};
var decoded    = {};

function fetchRaw(slug) {
  if (rawBuffers[slug] !== undefined) return;
  rawBuffers[slug] = null; // mark in-flight
  Promise.all([
    fetch(STEM_BASE + slug + '_backing.mp3').then(function(r){ return r.arrayBuffer(); }),
    fetch(STEM_BASE + slug + '_melody.mp3').then(function(r){ return r.arrayBuffer(); }),
  ]).then(function(res) {
    rawBuffers[slug] = { backing: res[0], melody: res[1] };
    var btn = document.querySelector('[data-slug="' + slug + '"]');
    if (btn) btn.classList.add('ready-dot');
    if (slug === MANIFEST[0].slug) setStatus('ready — tap to play');
  }).catch(function(){});
}

// Preload first two tracks immediately
fetchRaw(MANIFEST[0].slug);
fetchRaw(MANIFEST[1].slug);

// Audio
var actx = null, masterGain = null, masterFilter = null;
var backingNode = null, backingGain = null;
var vocalNode = null, vocalGain = null;
var srcStartTime = 0;
var playing = false, vocalsOn = false, motionOn = false;
var currentSlug = null;
var targetFilterFreq = 8000, targetVocalGain = 0.72;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  // Chain: stems → masterGain → filter → destination
  masterFilter = actx.createBiquadFilter();
  masterFilter.type = 'lowpass';
  masterFilter.frequency.value = 8000;
  masterFilter.Q.value = 0.8;
  masterFilter.connect(actx.destination);
  masterGain = actx.createGain();
  masterGain.gain.value = 0.85;
  masterGain.connect(masterFilter);
}

function decodeSlug(slug) {
  if (decoded[slug]) return Promise.resolve(decoded[slug]);
  var raw = rawBuffers[slug];
  if (!raw) return Promise.reject('not ready');
  return Promise.all([
    actx.decodeAudioData(raw.backing.slice(0)),
    actx.decodeAudioData(raw.melody.slice(0)),
  ]).then(function(res) {
    decoded[slug] = { backing: res[0], melody: res[1] };
    return decoded[slug];
  });
}

function ensureDecoded(slug) {
  return new Promise(function(resolve, reject) {
    function try_() {
      if (rawBuffers[slug] && rawBuffers[slug].backing) {
        decodeSlug(slug).then(resolve).catch(reject);
      } else {
        if (rawBuffers[slug] === undefined) fetchRaw(slug);
        setTimeout(try_, 150);
      }
    }
    try_();
  });
}

function barLen(bpm) { return (60 / bpm) * 4; }
function nextBarTime(bpm) {
  if (!playing || !srcStartTime) return actx.currentTime + 0.05;
  var bl = barLen(bpm);
  var elapsed = actx.currentTime - srcStartTime;
  return srcStartTime + (Math.floor(elapsed / bl) + 1) * bl;
}

function fadeStop(node, gain, ms) {
  if (!gain) return;
  gain.gain.setTargetAtTime(0, actx.currentTime, ms / 4000);
  var n = node, g = gain;
  setTimeout(function(){ try{ n.stop(); g.disconnect(); }catch(e){} }, ms + 350);
}

function makeStem(buf, startAt, vol, offset) {
  var g = actx.createGain();
  var n = actx.createBufferSource();
  n.buffer = buf; n.loop = true;
  n.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0, startAt);
  g.gain.linearRampToValueAtTime(vol, startAt + 0.65);
  n.start(startAt, offset || 0);
  return { node: n, gain: g };
}

function launchTrack(slug, buf) {
  var oldTrack = currentSlug ? MANIFEST.filter(function(t){ return t.slug===currentSlug; })[0] : null;
  var newTrack = MANIFEST.filter(function(t){ return t.slug===slug; })[0];
  var switchAt = (playing && oldTrack) ? nextBarTime(oldTrack.bpm) : actx.currentTime + 0.05;
  var fadeMs   = (playing && oldTrack) ? Math.min(700, barLen(oldTrack.bpm)*380) : 300;

  fadeStop(backingNode, backingGain, fadeMs);
  fadeStop(vocalNode,   vocalGain,   fadeMs);
  backingNode = null; backingGain = null;
  vocalNode   = null; vocalGain   = null;

  var b = makeStem(buf.backing, switchAt, 1.0);
  backingNode = b.node; backingGain = b.gain;

  if (vocalsOn && buf.melody) {
    var v = makeStem(buf.melody, switchAt, 0.72);
    vocalNode = v.node; vocalGain = v.gain;
  }

  srcStartTime = switchAt;
  currentSlug = slug;
  currentScaleFreqs = keyToFreqs(newTrack.key);
  playing = true;
  updateUI(); setPulse(true); setStatus('playing');

  // Preload next
  var idx = MANIFEST.findIndex(function(t){ return t.slug===slug; });
  var nxt = MANIFEST[(idx+1) % MANIFEST.length];
  if (rawBuffers[nxt.slug] === undefined) fetchRaw(nxt.slug);
}

function switchTo(slug) {
  initAudio();
  var btn = document.querySelector('[data-slug="'+slug+'"]');
  if (decoded[slug]) { launchTrack(slug, decoded[slug]); return; }
  if (btn) btn.classList.add('loading');
  setStatus('loading…');
  ensureDecoded(slug).then(function(buf) {
    if (btn) btn.classList.remove('loading');
    launchTrack(slug, buf);
  }).catch(function() {
    if (btn) btn.classList.remove('loading');
    setStatus('error — try again');
  });
}

function stopAll() {
  fadeStop(backingNode, backingGain, 400);
  fadeStop(vocalNode,   vocalGain,   400);
  backingNode=null; backingGain=null; vocalNode=null; vocalGain=null;
  playing=false; srcStartTime=0;
  // Reset filter to open
  if (masterFilter) masterFilter.frequency.setTargetAtTime(8000, actx.currentTime, 0.3);
  setPulse(false); setStatus('stopped'); updateUI();
}

// Motion → filter cutoff (beta) + vocal blend (gamma)
var motionRafId = null;
function onOrientation(e) {
  if (!motionOn || !playing || !masterFilter) return;

  // beta: -90 (flat back) → +90 (tilted forward)
  // map to filter cutoff: 250Hz (dark) → 18000Hz (wide open)
  var beta = Math.max(-90, Math.min(90, e.beta || 0));
  var normB = (beta + 90) / 180; // 0→1
  targetFilterFreq = 250 * Math.pow(18000 / 250, normB);
  masterFilter.frequency.setTargetAtTime(targetFilterFreq, actx.currentTime, 0.08);

  // gamma: -90 (tilted left) → +90 (tilted right)
  // map to vocal gain: 0 (left) → 0.85 (right)
  if (vocalGain) {
    var gamma = Math.max(-90, Math.min(90, e.gamma || 0));
    var normG = (gamma + 90) / 180; // 0→1
    targetVocalGain = normG * 0.85;
    vocalGain.gain.setTargetAtTime(targetVocalGain, actx.currentTime, 0.12);
  }
}

// UI
function buildList() {
  var list = document.getElementById('track-list');
  MANIFEST.forEach(function(track) {
    var btn = document.createElement('button');
    btn.className = 'track-btn';
    btn.dataset.slug = track.slug;
    btn.innerHTML = '<span class="t-name">'+track.name+'</span>' +
      '<span class="t-info">'+Math.round(track.bpm)+' BPM<br>'+track.key+'</span>';
    btn.addEventListener('click', function(){ switchTo(track.slug); });
    list.appendChild(btn);
  });
}

function updateUI() {
  var track = currentSlug ? MANIFEST.filter(function(t){ return t.slug===currentSlug; })[0] : null;
  document.getElementById('track-name').textContent = track ? track.name : '—';
  document.getElementById('track-meta').textContent = track
    ? Math.round(track.bpm)+' BPM · '+track.key : 'select a track to begin';
  document.querySelectorAll('.track-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.slug===currentSlug);
  });
  document.getElementById('btn-play').textContent = playing ? 'Stop' : 'Play';
  document.getElementById('btn-play').classList.toggle('active', playing);
  document.getElementById('btn-vocals').classList.toggle('active', vocalsOn);
  document.getElementById('btn-motion').classList.toggle('active', motionOn);
}

function setStatus(t){ document.getElementById('status-text').textContent = t; }
function setPulse(on){ document.getElementById('pulse').classList.toggle('on', on); }

document.getElementById('btn-play').addEventListener('click', function() {
  initAudio();
  if (playing) stopAll();
  else if (currentSlug) switchTo(currentSlug);
  else setStatus('pick a track first');
});

document.getElementById('btn-vocals').addEventListener('click', function() {
  initAudio(); vocalsOn=!vocalsOn; updateUI();
  if (!playing||!currentSlug) return;
  var buf = decoded[currentSlug];
  if (vocalsOn && buf && buf.melody && !vocalNode) {
    var elapsed = actx.currentTime - srcStartTime;
    var v = makeStem(buf.melody, actx.currentTime, 0.72, elapsed % buf.melody.duration);
    vocalNode=v.node; vocalGain=v.gain;
  } else if (!vocalsOn && vocalNode) {
    fadeStop(vocalNode, vocalGain, 400); vocalNode=null; vocalGain=null;
  }
});

document.getElementById('btn-motion').addEventListener('click', function() {
  initAudio();
  if (motionOn) {
    motionOn=false;
    window.removeEventListener('deviceorientation', onOrientation);
    // Reset filter to open when motion disabled
    if (masterFilter) masterFilter.frequency.setTargetAtTime(8000, actx.currentTime, 0.4);
    updateUI(); setStatus('motion off'); return;
  }
  function enable() {
    window.addEventListener('deviceorientation', onOrientation);
    motionOn=true;
    // Auto-load vocals so gamma has something to blend
    if (!vocalsOn && playing && currentSlug) {
      vocalsOn=true;
      var buf=decoded[currentSlug];
      if (buf && buf.melody && !vocalNode) {
        var elapsed=actx.currentTime-srcStartTime;
        var v=makeStem(buf.melody,actx.currentTime,0,elapsed%buf.melody.duration);
        vocalNode=v.node; vocalGain=v.gain;
      }
    }
    updateUI();
    setStatus('fwd/back = filter · left/right = vocals');
  }
  if (typeof DeviceOrientationEvent!=='undefined' &&
      typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission()
      .then(function(p){ if(p==='granted') enable(); else setStatus('motion denied'); })
      .catch(function(){ setStatus('motion error'); });
  } else { enable(); }
});

buildList();
updateUI();
</script>
<script src="/transit.js"></script>
</body>
</html>
