<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>the 3 — GUMP</title>
<meta name="description" content="1+1=3. The third thing is not in either one. It lives in the approach.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#040303;}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;}
#back{position:fixed;top:18px;left:20px;font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.6em;letter-spacing:0.14em;color:rgba(201,164,74,0.2);
  text-decoration:none;z-index:10;transition:color 0.4s;}
#back:hover{color:rgba(201,164,74,0.6);}
#label{position:fixed;bottom:28px;left:0;right:0;text-align:center;
  font-family:Futura,'Century Gothic',sans-serif;font-size:0.56em;
  letter-spacing:0.22em;text-transform:uppercase;
  color:rgba(201,164,74,0.18);pointer-events:none;z-index:10;}
#eq{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:Futura,'Century Gothic',sans-serif;font-weight:100;
  font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:0.3em;
  color:rgba(201,164,74,0);pointer-events:none;z-index:10;
  transition:color 3s ease, text-shadow 3s ease;text-align:center;}
#eq.show{color:rgba(201,164,74,0.35);text-shadow:0 0 40px rgba(201,164,74,0.2);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">← gallery</a>
<div id="eq">1 + 1 = 3</div>
<div id="label">the 3 · the bridge · the thing neither contains</div>

<script>
(function(){
'use strict';
var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var eq = document.getElementById('eq');
var W, H, dpr;
var TAU = Math.PI * 2;

function resize(){
  dpr = Math.min(devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize', resize, {passive:true});

// Two bodies
var a = {x:0,y:0,vx:0,vy:0,phase:0};
var b = {x:0,y:0,vx:0,vy:0,phase:Math.PI};
var trailA = [], trailB = [];
var TRAIL = 180;
var K = 1.868;
var t = 0;
var threeShown = false;

function born(){
  var cx0 = W*0.5, cy0 = H*0.5;
  var r = Math.min(W,H)*0.28;
  a.x = cx0 - r; a.y = cy0; a.vx = 0; a.vy = -0.8;
  b.x = cx0 + r; b.y = cy0; b.vx = 0; b.vy = 0.8;
  trailA = []; trailB = [];
}
born();

function step(){
  var dx = b.x-a.x, dy = b.y-a.y;
  var dist = Math.sqrt(dx*dx+dy*dy)+0.001;

  // Gravitational-style coupling
  var force = K * 0.18 / (dist*0.006 + 0.08);
  a.vx += (dx/dist)*force*0.012;
  a.vy += (dy/dist)*force*0.012;
  b.vx -= (dx/dist)*force*0.012;
  b.vy -= (dy/dist)*force*0.012;

  // Gentle orbit injection — keep them dancing
  var ang = Math.atan2(dy,dx);
  var perp = 0.025;
  a.vx += Math.cos(ang+Math.PI/2)*perp;
  a.vy += Math.sin(ang+Math.PI/2)*perp;
  b.vx += Math.cos(ang-Math.PI/2)*perp;
  b.vy += Math.sin(ang-Math.PI/2)*perp;

  // Damping
  var damp = 0.9985;
  a.vx *= damp; a.vy *= damp;
  b.vx *= damp; b.vy *= damp;

  // Speed limit
  var maxV = 6;
  var spA = Math.sqrt(a.vx*a.vx+a.vy*a.vy);
  var spB = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
  if(spA > maxV){ a.vx *= maxV/spA; a.vy *= maxV/spA; }
  if(spB > maxV){ b.vx *= maxV/spB; b.vy *= maxV/spB; }

  a.x += a.vx; a.y += a.vy;
  b.x += b.vx; b.y += b.vy;

  // Boundary bounce
  var pad = 40;
  if(a.x<pad){a.x=pad;a.vx=Math.abs(a.vx)*0.7;}
  if(a.x>W-pad){a.x=W-pad;a.vx=-Math.abs(a.vx)*0.7;}
  if(a.y<pad){a.y=pad;a.vy=Math.abs(a.vy)*0.7;}
  if(a.y>H-pad){a.y=H-pad;a.vy=-Math.abs(a.vy)*0.7;}
  if(b.x<pad){b.x=pad;b.vx=Math.abs(b.vx)*0.7;}
  if(b.x>W-pad){b.x=W-pad;b.vx=-Math.abs(b.vx)*0.7;}
  if(b.y<pad){b.y=pad;b.vy=Math.abs(b.vy)*0.7;}
  if(b.y>H-pad){b.y=H-pad;b.vy=-Math.abs(b.vy)*0.7;}

  trailA.push({x:a.x,y:a.y});
  trailB.push({x:b.x,y:b.y});
  if(trailA.length > TRAIL) trailA.shift();
  if(trailB.length > TRAIL) trailB.shift();

  a.phase += 0.028;
  b.phase += 0.028;
}

function glow(x,y,r,r_,g_,b_,alpha){
  var grad = cx.createRadialGradient(x,y,0,x,y,r);
  grad.addColorStop(0,'rgba('+r_+','+g_+','+b_+','+alpha+')');
  grad.addColorStop(0.4,'rgba('+r_+','+g_+','+b_+','+(alpha*0.3).toFixed(4)+')');
  grad.addColorStop(1,'rgba('+r_+','+g_+','+b_+',0)');
  cx.fillStyle = grad;
  cx.beginPath(); cx.arc(x,y,r,0,TAU); cx.fill();
}

function draw(){
  t++;

  // Fade background
  cx.fillStyle = 'rgba(4,3,3,0.14)';
  cx.fillRect(0,0,W,H);
  cx.globalCompositeOperation = 'lighter';

  var dx = b.x-a.x, dy = b.y-a.y;
  var dist = Math.sqrt(dx*dx+dy*dy);
  var closeness = Math.max(0, 1 - dist/(Math.min(W,H)*0.7));
  var mx = (a.x+b.x)*0.5, my = (a.y+b.y)*0.5;

  // The 3 — the glow between
  if(closeness > 0.05){
    var c3 = closeness*closeness;
    glow(mx, my, 60+closeness*140, 201,164,74, c3*0.12);
    glow(mx, my, 30+closeness*80, 232,207,160, c3*0.08);
    if(closeness > 0.3){
      glow(mx, my, 20+closeness*40, 255,238,200, c3*0.05);
    }
  }

  // Connection line — the bridge
  if(closeness > 0.08){
    var segs = 24;
    for(var s=0; s<segs; s++){
      var t0 = s/segs, t1 = (s+1)/segs;
      var x0 = a.x + dx*t0, y0 = a.y + dy*t0;
      var x1 = a.x + dx*t1, y1 = a.y + dy*t1;
      var mid_t = (t0+t1)*0.5;
      var local_close = 1 - Math.abs(mid_t - 0.5)*2;
      var lineA = closeness * 0.06 * local_close;
      cx.strokeStyle = 'rgba(201,164,74,'+lineA.toFixed(4)+')';
      cx.lineWidth = 0.5 + closeness*2*local_close;
      cx.beginPath(); cx.moveTo(x0,y0); cx.lineTo(x1,y1); cx.stroke();
    }
  }

  // Trails
  cx.lineWidth = 1;
  for(var i=1; i<trailA.length; i++){
    var age = i/trailA.length;
    cx.strokeStyle = 'rgba(200,140,80,'+(age*0.06).toFixed(4)+')';
    cx.lineWidth = age*1.5;
    cx.beginPath();
    cx.moveTo(trailA[i-1].x, trailA[i-1].y);
    cx.lineTo(trailA[i].x, trailA[i].y);
    cx.stroke();
  }
  for(var i=1; i<trailB.length; i++){
    var age = i/trailB.length;
    cx.strokeStyle = 'rgba(80,130,210,'+(age*0.06).toFixed(4)+')';
    cx.lineWidth = age*1.5;
    cx.beginPath();
    cx.moveTo(trailB[i-1].x, trailB[i-1].y);
    cx.lineTo(trailB[i].x, trailB[i].y);
    cx.stroke();
  }

  // The two bodies — warm gold and cool blue
  var breatheA = 1 + 0.25*Math.sin(a.phase);
  var breatheB = 1 + 0.25*Math.sin(b.phase);
  var baseR = 4 + closeness*3;

  glow(a.x,a.y, (baseR+6)*breatheA*3, 220,160,80, 0.18+closeness*0.1);
  cx.globalCompositeOperation = 'source-over';
  cx.beginPath(); cx.arc(a.x,a.y, baseR*breatheA, 0,TAU);
  cx.fillStyle = 'rgba(230,175,90,'+(0.65+closeness*0.25)+')';
  cx.fill();

  cx.globalCompositeOperation = 'lighter';
  glow(b.x,b.y, (baseR+6)*breatheB*3, 80,140,220, 0.18+closeness*0.1);
  cx.globalCompositeOperation = 'source-over';
  cx.beginPath(); cx.arc(b.x,b.y, baseR*breatheB, 0,TAU);
  cx.fillStyle = 'rgba(100,160,230,'+(0.65+closeness*0.25)+')';
  cx.fill();

  cx.globalCompositeOperation = 'source-over';

  // Show equation when they get close
  if(closeness > 0.5 && !threeShown){
    threeShown = true;
    eq.classList.add('show');
    setTimeout(function(){ eq.classList.remove('show'); threeShown = false; }, 4000);
  }

  for(var i=0;i<3;i++) step();
  requestAnimationFrame(draw);
}

// Click to reset
cv.addEventListener('click', function(){ born(); });
cv.addEventListener('touchend', function(e){ e.preventDefault(); born(); });

draw();
})();
</script>
</body>
</html>
