<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.02);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.01, 200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lighting — bright enough to see everything
const amb = new THREE.AmbientLight(0x332244, 1.2);
scene.add(amb);
const key = new THREE.DirectionalLight(0xffeedd, 1.8);
key.position.set(5,10,7);
key.castShadow = true;
key.shadow.mapSize.set(1024,1024);
scene.add(key);
const fill = new THREE.DirectionalLight(0x6688cc, 0.8);
fill.position.set(-5,5,-3);
scene.add(fill);
const back = new THREE.DirectionalLight(0xc9a44a, 0.5);
back.position.set(0,3,8);
scene.add(back);
const bottom = new THREE.PointLight(0x886644, 0.5, 20);
bottom.position.set(0,0.5,0);
scene.add(bottom);
const rim = new THREE.PointLight(0xc9a44a, 0.4, 20);
rim.position.set(0,3,0);
scene.add(rim);

// Ground plane
const gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(80,80),
  new THREE.MeshStandardMaterial({color:0x0c0c0a,roughness:0.9})
);
gnd.rotation.x=-Math.PI/2; gnd.receiveShadow=true;
scene.add(gnd);

// ══════════════════════════════════════
// MATERIALS
// ══════════════════════════════════════

const goldMat = new THREE.MeshStandardMaterial({color:0xd4a520,metalness:0.8,roughness:0.2,emissive:0x332200,emissiveIntensity:0.15});
const goldBright = new THREE.MeshStandardMaterial({color:0xd4a520,metalness:0.85,roughness:0.15,emissive:0xc9a44a,emissiveIntensity:0.3});
const woodMat = new THREE.MeshStandardMaterial({color:0x7a5a3a,roughness:0.7,metalness:0.0,emissive:0x110800,emissiveIntensity:0.1});
const graniteMat = new THREE.MeshStandardMaterial({color:0xaa6655,roughness:0.5,metalness:0.08,emissive:0x110505,emissiveIntensity:0.1});
const graniteDark = new THREE.MeshStandardMaterial({color:0x7a4433,roughness:0.6,metalness:0.08,emissive:0x0a0302,emissiveIntensity:0.1});
const stoneMat = new THREE.MeshStandardMaterial({color:0xaa9988,roughness:0.8,metalness:0.0,emissive:0x0a0805,emissiveIntensity:0.05});
const bronzeMat = new THREE.MeshStandardMaterial({color:0xaa8822,metalness:0.65,roughness:0.25,emissive:0x221100,emissiveIntensity:0.1});
const lineMat = new THREE.LineBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.15});

// ══════════════════════════════════════
// CHAMBER BUILDERS
// ══════════════════════════════════════

function buildArk() {
  const g = new THREE.Group();
  const W=1.14, H=0.69, D=0.69;

  // Main box — gold outer shell
  const box = new THREE.Mesh(new THREE.BoxGeometry(W,H,D), goldMat.clone());
  box.position.y = H/2;
  box.castShadow = true;
  g.add(box);

  // Gold crown molding around top rim
  const rimW = 0.03;
  for(let i=0;i<4;i++){
    const isLong = i<2;
    const len = isLong ? W+rimW*2 : D+rimW*2;
    const rim = new THREE.Mesh(new THREE.BoxGeometry(len,0.04,rimW), goldBright);
    rim.position.y = H + 0.02;
    if(i===0) rim.position.z = D/2+rimW/2;
    else if(i===1) rim.position.z = -D/2-rimW/2;
    else if(i===2) { rim.rotation.y=Math.PI/2; rim.position.x = W/2+rimW/2; }
    else { rim.rotation.y=Math.PI/2; rim.position.x = -W/2-rimW/2; }
    g.add(rim);
  }

  // Four gold rings at feet
  const ringGeo = new THREE.TorusGeometry(0.04, 0.01, 8, 16);
  const corners = [[-1,-1],[1,-1],[-1,1],[1,1]];
  corners.forEach(([sx,sz])=>{
    const ring = new THREE.Mesh(ringGeo, goldBright);
    ring.position.set(sx*W*0.42, 0.06, sz*D*0.42);
    ring.rotation.y = Math.PI/2;
    g.add(ring);
  });

  // Carrying poles (acacia wood overlaid with gold)
  const poleGeo = new THREE.CylinderGeometry(0.02, 0.02, 2.0, 8);
  for(let sz of [-1,1]){
    const pole = new THREE.Mesh(poleGeo, goldMat);
    pole.rotation.z = Math.PI/2;
    pole.position.set(0, 0.06, sz*D*0.42);
    pole.castShadow = true;
    g.add(pole);
  }

  // Mercy seat (kapporet) — solid gold lid
  const lid = new THREE.Mesh(new THREE.BoxGeometry(W+0.02, 0.06, D+0.02), goldBright);
  lid.position.y = H + 0.03;
  lid.castShadow = true;
  g.add(lid);

  // Two cherubim — hammered gold, wings spread, facing each other
  for(let side of [-1,1]){
    const cherG = new THREE.Group();
    // Body (kneeling figure simplified)
    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.04, 0.18, 8), goldBright);
    body.position.y = 0.09;
    cherG.add(body);
    // Head
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 6), goldBright);
    head.position.y = 0.21;
    cherG.add(head);
    // Wings spread upward and toward center
    for(let wing of [-1,1]){
      const wingGeo = new THREE.PlaneGeometry(0.12, 0.16);
      const wingMesh = new THREE.Mesh(wingGeo, new THREE.MeshStandardMaterial({
        color:0xd4a520, metalness:0.85, roughness:0.1, side:THREE.DoubleSide
      }));
      wingMesh.position.set(wing*0.06, 0.18, -side*0.02);
      wingMesh.rotation.x = -side*0.4;
      wingMesh.rotation.z = wing*0.5;
      cherG.add(wingMesh);
    }
    cherG.position.set(side*W*0.35, H+0.06, 0);
    g.add(cherG);
  }

  // Glow between cherubim — the active field
  const glow = new THREE.PointLight(0xc9a44a, 1.2, 1.5);
  glow.position.set(0, H+0.2, 0);
  g.add(glow);
  g.userData.glow = glow;

  return g;
}

function buildTabernacle() {
  const g = new THREE.Group();
  const W=4.57, H=4.57, D=4.57;

  // Acacia wood frame boards (48 boards around 3 walls, gold covered)
  const boardW = W/10, boardH = H, boardD = 0.15;
  const boardMat = new THREE.MeshStandardMaterial({color:0xb8860b,metalness:0.4,roughness:0.3});

  // Back wall boards
  for(let i=0;i<10;i++){
    const b = new THREE.Mesh(new THREE.BoxGeometry(boardW*0.95, boardH, boardD), boardMat);
    b.position.set(-W/2+boardW/2+i*boardW, boardH/2, -D/2);
    b.castShadow = true;
    g.add(b);
  }
  // Side wall boards
  for(let side of [-1,1]){
    for(let i=0;i<10;i++){
      const b = new THREE.Mesh(new THREE.BoxGeometry(boardD, boardH, (D/10)*0.95), boardMat);
      b.position.set(side*W/2, boardH/2, -D/2+(D/10)/2+i*(D/10));
      b.castShadow = true;
      g.add(b);
    }
  }

  // Gold floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W,D), goldMat);
  floor.rotation.x = -Math.PI/2;
  floor.position.y = 0.01;
  g.add(floor);

  // Veil — blue, purple, scarlet curtain at entrance
  const veilMat = new THREE.MeshStandardMaterial({
    color:0x2a1540, transparent:true, opacity:0.5, side:THREE.DoubleSide,
    roughness:0.9
  });
  const veil = new THREE.Mesh(new THREE.PlaneGeometry(W*0.92, H*0.95), veilMat);
  veil.position.set(0, H*0.475, D/2-0.1);
  g.add(veil);

  // The Ark inside (smaller version)
  const ark = buildArk();
  ark.scale.setScalar(1);
  ark.position.set(0, 0.3, -D*0.15);
  g.add(ark);

  // Altar of incense (gold, small cube in front of veil)
  const altar = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.91, 0.46), goldMat);
  altar.position.set(0, 0.455, D*0.25);
  altar.castShadow = true;
  g.add(altar);

  // Ceiling beams (acacia + gold)
  for(let i=0;i<6;i++){
    const beam = new THREE.Mesh(new THREE.BoxGeometry(W, 0.1, 0.15), boardMat);
    beam.position.set(0, H, -D/2+D/6*i+D/12);
    g.add(beam);
  }

  // Wireframe for reference
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(W,H,D)), lineMat
  );
  edges.position.y = H/2;
  g.add(edges);

  return g;
}

function buildTemple() {
  const g = new THREE.Group();
  const W=9.14, H=9.14, D=9.14;

  // Stone walls — thick, massive
  const wallThick = 0.8;
  const wallMat = new THREE.MeshStandardMaterial({color:0x998877,roughness:0.85,metalness:0.0});

  // Back wall
  const back = new THREE.Mesh(new THREE.BoxGeometry(W+wallThick*2, H, wallThick), wallMat);
  back.position.set(0, H/2, -D/2-wallThick/2);
  back.castShadow = true;
  g.add(back);

  // Side walls
  for(let side of [-1,1]){
    const sw = new THREE.Mesh(new THREE.BoxGeometry(wallThick, H, D+wallThick), wallMat);
    sw.position.set(side*(W/2+wallThick/2), H/2, -wallThick/2);
    sw.castShadow = true;
    g.add(sw);
  }

  // Floor — stone with gold overlay
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W,D),
    new THREE.MeshStandardMaterial({color:0xb8960b,metalness:0.3,roughness:0.4}));
  floor.rotation.x = -Math.PI/2;
  floor.position.y = 0.01;
  g.add(floor);

  // Ceiling — cedar beams
  const cedarMat = new THREE.MeshStandardMaterial({color:0x6b3a2a,roughness:0.7});
  for(let i=0;i<8;i++){
    const beam = new THREE.Mesh(new THREE.BoxGeometry(W, 0.3, 0.4), cedarMat);
    beam.position.set(0, H, -D/2+D/8*i+D/16);
    g.add(beam);
  }

  // TWO BRONZE PILLARS — Jachin & Boaz (18 cubits = 8.2m tall)
  const pillarH = 8.2;
  for(let side of [-1,1]){
    // Column shaft
    const shaft = new THREE.Mesh(
      new THREE.CylinderGeometry(0.45, 0.50, pillarH, 20),
      bronzeMat
    );
    shaft.position.set(side*W*0.38, pillarH/2, D/2+1.5);
    shaft.castShadow = true;
    g.add(shaft);

    // Capital — ornate top (lily + pomegranate work)
    const capBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.6, 0.5, 1.0, 20),
      bronzeMat
    );
    capBase.position.set(side*W*0.38, pillarH+0.5, D/2+1.5);
    g.add(capBase);

    // Pomegranate ring
    for(let j=0;j<12;j++){
      const angle = j/12*Math.PI*2;
      const pom = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 4), bronzeMat);
      pom.position.set(
        side*W*0.38 + Math.cos(angle)*0.55,
        pillarH + 0.3,
        D/2+1.5 + Math.sin(angle)*0.55
      );
      g.add(pom);
    }

    // Lily work crown
    const lily = new THREE.Mesh(
      new THREE.ConeGeometry(0.7, 0.6, 8),
      new THREE.MeshStandardMaterial({color:0x9b7924,metalness:0.6,roughness:0.3})
    );
    lily.position.set(side*W*0.38, pillarH+1.3, D/2+1.5);
    g.add(lily);
  }

  // The Ark inside
  const ark = buildArk();
  ark.position.set(0, 0.3, -D*0.2);
  g.add(ark);

  // Reference wireframe
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(W,H,D)), lineMat
  );
  edges.position.y = H/2;
  g.add(edges);

  return g;
}

function buildKingsChamber() {
  const g = new THREE.Group();
  const W=10.47, H=5.82, D=5.23;
  const wallT = 1.0;

  // GRANITE WALLS — massive, precisely fitted blocks
  // Each wall made of multiple blocks to show construction
  const blockH = 1.164; // 5 courses, each H/5

  // Back wall blocks
  for(let row=0;row<5;row++){
    const nBlocks = 5 + (row%2); // alternating bond pattern
    for(let col=0;col<nBlocks;col++){
      const bw = W/nBlocks;
      const block = new THREE.Mesh(
        new THREE.BoxGeometry(bw-0.01, blockH-0.005, wallT),
        row%2===0 ? graniteMat : graniteDark
      );
      block.position.set(-W/2+bw/2+col*bw, blockH/2+row*blockH, -D/2-wallT/2);
      block.castShadow = true;
      g.add(block);
    }
  }

  // Side walls
  for(let side of [-1,1]){
    for(let row=0;row<5;row++){
      const nBlocks = 4 + (row%2);
      for(let col=0;col<nBlocks;col++){
        const bw = D/nBlocks;
        const block = new THREE.Mesh(
          new THREE.BoxGeometry(wallT, blockH-0.005, bw-0.01),
          row%2===0 ? graniteMat : graniteDark
        );
        block.position.set(side*(W/2+wallT/2), blockH/2+row*blockH, -D/2+bw/2+col*bw);
        block.castShadow = true;
        g.add(block);
      }
    }
  }

  // Floor — polished granite
  const floorMat = new THREE.MeshStandardMaterial({color:0x6b3322,roughness:0.4,metalness:0.1});
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(W,D), floorMat);
  floor.rotation.x = -Math.PI/2; floor.position.y=0.01; floor.receiveShadow=true;
  g.add(floor);

  // CEILING — 9 massive granite beams (~27 tonnes each)
  for(let i=0;i<9;i++){
    const beam = new THREE.Mesh(
      new THREE.BoxGeometry(W/9-0.02, 0.8, D+wallT*2),
      graniteDark
    );
    beam.position.set(-W/2+W/18+i*W/9, H+0.4, 0);
    beam.castShadow = true;
    g.add(beam);
  }

  // 5 RELIEVING CHAMBERS above ceiling
  for(let i=0;i<5;i++){
    const rH = H + 1.2 + i*1.5;
    // Two walls per chamber
    for(let side of [-1,1]){
      const rw = new THREE.Mesh(
        new THREE.BoxGeometry(wallT*0.5, 0.6, D),
        new THREE.MeshStandardMaterial({color:0x5a2a1a,roughness:0.7,transparent:true,opacity:0.4})
      );
      rw.position.set(side*(W/2+wallT*0.25), rH, 0);
      g.add(rw);
    }
    // Beam between
    const rb = new THREE.Mesh(
      new THREE.BoxGeometry(W+wallT, 0.15, D),
      new THREE.MeshStandardMaterial({color:0x5a2a1a,roughness:0.7,transparent:true,opacity:0.3})
    );
    rb.position.set(0, rH+0.3, 0);
    g.add(rb);
  }
  // Top gable (chevron roof of relieving chambers)
  const gable = new THREE.Mesh(
    new THREE.ConeGeometry(W*0.55, 2, 4),
    new THREE.MeshStandardMaterial({color:0x5a2a1a,roughness:0.7,transparent:true,opacity:0.2})
  );
  gable.position.set(0, H+8.5, 0);
  gable.rotation.y = Math.PI/4;
  g.add(gable);

  // SARCOPHAGUS — western end, granite, precise
  const sarcW=2.28, sarcH=1.05, sarcD=0.98, sarcT=0.15;
  // Outer box
  const sarc = new THREE.Mesh(new THREE.BoxGeometry(sarcW,sarcH,sarcD), graniteDark);
  sarc.position.set(W*0.25, sarcH/2, 0);
  sarc.castShadow = true;
  g.add(sarc);
  // Inner cavity (hollow)
  const sarcIn = new THREE.Mesh(
    new THREE.BoxGeometry(sarcW-sarcT*2, sarcH-sarcT, sarcD-sarcT*2),
    new THREE.MeshStandardMaterial({color:0x1a0805,roughness:0.9,side:THREE.BackSide})
  );
  sarcIn.position.set(W*0.25, sarcH/2+sarcT/2, 0);
  g.add(sarcIn);

  // The Ark fits inside the sarcophagus
  const ark = buildArk();
  ark.scale.setScalar(0.85);
  ark.position.set(W*0.25, sarcT+0.01, 0);
  g.add(ark);

  // TWO SHAFTS — narrow channels angled to sky
  const shaftMat = new THREE.MeshStandardMaterial({color:0x332211,roughness:0.8});
  // North shaft (~32° angle)
  const nShaft = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.22,20), shaftMat);
  nShaft.rotation.x = -0.56; // ~32°
  nShaft.position.set(0, H*0.55+5, -D/2-8);
  g.add(nShaft);
  // South shaft (~45° angle, aimed at Sirius)
  const sShaft = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.22,20), shaftMat);
  sShaft.rotation.x = 0.79; // ~45°
  sShaft.position.set(0, H*0.55+6, D/2+7);
  g.add(sShaft);

  // GRAND GALLERY approach (ascending passage)
  const galMat = new THREE.MeshStandardMaterial({color:0x443322,transparent:true,opacity:0.15});
  const galW=1.05, galH=8.6;
  // Corbelled walls (7 steps narrowing)
  for(let step=0;step<7;step++){
    const stepW = galW - step*0.08;
    const sw = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 1.2, 10),
      new THREE.MeshStandardMaterial({color:0x553322,transparent:true,opacity:0.12})
    );
    sw.rotation.x = 0.454; // 26° slope
    for(let side of [-1,1]){
      const s2 = sw.clone();
      s2.position.set(side*stepW/2, -3+step*0.8, D/2+7);
      g.add(s2);
    }
  }

  return g;
}

// ══════════════════════════════════════
// CHAMBER DATA
// ══════════════════════════════════════

const data = [
  {name:'THE ARK',dims:'2.5 × 1.5 × 1.5 cubits — 1.14 × 0.69 × 0.69 m',freq:'Capacitor: 0.42 nF — Field: ~52 V/m between cherubim',notes:'Gold-wood-gold. Conductor-dielectric-conductor. Fits inside the sarcophagus. "Don\'t touch" = safety warning.',build:buildArk,camDist:3,camH:1},
  {name:'THE TABERNACLE',dims:'10 × 10 × 10 cubits — 4.57 × 4.57 × 4.57 m',freq:'37.5 Hz — gamma threshold',notes:'Portable gold cube. Ark inside. Altar of incense in front of the veil. The room that houses the device.',build:buildTabernacle,camDist:12,camH:4},
  {name:"SOLOMON'S TEMPLE",dims:'20 × 20 × 20 cubits — 9.14 × 9.14 × 9.14 m',freq:'18.8 Hz — one octave below. Same blueprint, different key.',notes:'Permanent stone. Cedar-lined. Gold floor. Jachin & Boaz: two bronze pillars, 18 cubits tall, pomegranate capitals.',build:buildTemple,camDist:22,camH:7},
  {name:"KING'S CHAMBER",dims:'10.47 × 5.23 × 5.82 m — granite, 55% quartz',freq:'121 Hz measured. Harmonics: 33, 49.5, 86.9 Hz.',notes:'9 ceiling beams (27 tonnes each). 5 relieving chambers. 2 shafts aimed at sky. Sarcophagus holds the Ark. 804 tonnes of piezoelectric crystal.',build:buildKingsChamber,camDist:25,camH:8},
];

const groups = data.map(d => {
  const g = d.build();
  g.visible = false;
  scene.add(g);
  return g;
});

let current = 0;

function show(idx) {
  current = idx;
  groups.forEach((g,i) => g.visible = i===idx);
  const d = data[idx];
  document.getElementById('title').textContent = d.name;
  document.getElementById('dims').textContent = d.dims;
  document.getElementById('freq').textContent = d.freq;
  document.getElementById('notes').textContent = d.notes;
  camera.position.set(d.camDist*0.8, d.camH, d.camDist);
  controls.target.set(0, d.camH*0.4, 0);
  document.querySelectorAll('#ui button').forEach((b,i) => b.classList.toggle('active',i===idx));
}
window.show = show;
show(0);

// Animate
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Pulse the Ark glow in every scene that has one
  groups.forEach(g => {
    g.traverse(child => {
      if(child.userData && child.userData.glow){
        child.userData.glow.intensity = 0.8 + 0.5*Math.sin(t*1.5);
      }
    });
  });

  rim.position.copy(controls.target);
  rim.position.y += 2;
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
