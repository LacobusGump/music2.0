<!-- the blueprints -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>The Blueprints</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#999;font-family:Georgia,serif;overflow:hidden;}
canvas{display:block;}
#ui{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;}
#ui button{background:#0a0a14;border:1px solid #c9a44a30;color:#c9a44a80;padding:10px 20px;border-radius:6px;font-family:Georgia,serif;font-size:0.8em;cursor:pointer;letter-spacing:0.08em;transition:all 0.4s;}
#ui button:hover,#ui button.active{background:#c9a44a15;color:#c9a44a;border-color:#c9a44a60;}
#info{position:fixed;top:20px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none;}
#info h2{font-weight:100;color:#c9a44a;font-size:1.4em;letter-spacing:0.15em;margin-bottom:8px;}
#info .dims{color:#666;font-size:0.72em;letter-spacing:0.05em;line-height:2;}
#info .freq{color:#c9a44a80;font-size:0.85em;margin-top:8px;}
#back{position:fixed;top:20px;left:20px;color:#333;font-size:0.72em;text-decoration:none;z-index:10;}
#back:hover{color:#c9a44a;}
#scale{position:fixed;top:20px;right:20px;color:#333;font-size:0.62em;z-index:10;text-align:right;line-height:2;}
</style>
</head>
<body>
<a id="back" href="/33/">&larr; 33</a>
<div id="info">
  <h2 id="title">THE TABERNACLE</h2>
  <div class="dims" id="dims">10 × 10 × 10 cubits &mdash; 4.57 × 4.57 × 4.57 m</div>
  <div class="freq" id="freq">37.5 Hz</div>
</div>
<div id="scale">
  <div id="scale-text">1 cubit = 0.457 m<br>= &pi;/6 to 4 decimal places</div>
</div>
<div id="ui">
  <button id="btn-1" class="active" onclick="show(0)">Tabernacle</button>
  <button id="btn-2" onclick="show(1)">Solomon&rsquo;s Temple</button>
  <button id="btn-3" onclick="show(2)">King&rsquo;s Chamber</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.015);

const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 200);
camera.position.set(12, 8, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// Lighting
scene.add(new THREE.AmbientLight(0x1a1a2e, 0.4));
const warm = new THREE.PointLight(0xc9a44a, 0.8, 30);
warm.position.set(0, 8, 0);
scene.add(warm);
const moon = new THREE.DirectionalLight(0x4466aa, 0.3);
moon.position.set(-5, 10, 8);
scene.add(moon);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x0a0a08, roughness: 1 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.01;
scene.add(ground);

// ══════════════════════════════════════════════
// CHAMBER DATA
// ══════════════════════════════════════════════

const chambers = [
  {
    name: 'THE TABERNACLE',
    dims: '10 × 10 × 10 cubits — 4.57 × 4.57 × 4.57 m',
    freq: '37.5 Hz',
    scale: '1 cubit = 0.457 m = π/6',
    w: 4.57, h: 4.57, d: 4.57,
    color: 0xc9a44a,
    wallColor: 0x8b6914,
    notes: 'Portable. Gold-plated acacia wood. Ark inside = capacitor.'
  },
  {
    name: "SOLOMON'S TEMPLE",
    dims: '20 × 20 × 20 cubits — 9.14 × 9.14 × 9.14 m',
    freq: '18.8 Hz — one octave below the Tabernacle',
    scale: 'Same cubit. Double the dimensions. Half the frequency.',
    w: 9.14, h: 9.14, d: 9.14,
    color: 0x8888aa,
    wallColor: 0x554433,
    notes: 'Permanent stone. Two bronze pillars at entrance. Same blueprint, different key.'
  },
  {
    name: "KING'S CHAMBER",
    dims: '10.47 × 5.23 × 5.82 m — granite, 55% quartz',
    freq: '121 Hz measured — with harmonics at 33, 49.5, 86.9 Hz',
    scale: 'Not cubic. Rectangular. 2:1 length-to-width ratio.',
    w: 10.47, h: 5.82, d: 5.23,
    color: 0xcc6644,
    wallColor: 0x8b4433,
    notes: 'Granite = piezoelectric. 5 relieving chambers above. Shafts aimed at Sirius.'
  }
];

let currentGroups = [];
let currentIndex = 0;

function buildChamber(idx) {
  const c = chambers[idx];
  const group = new THREE.Group();

  const scale = 1; // 1 unit = 1 meter
  const w = c.w * scale;
  const h = c.h * scale;
  const d = c.d * scale;

  // Walls — wireframe + translucent panels
  const wallMat = new THREE.MeshStandardMaterial({
    color: c.wallColor,
    transparent: true,
    opacity: 0.15,
    side: THREE.DoubleSide,
    roughness: 0.8,
    metalness: 0.2,
  });

  const wireMat = new THREE.LineBasicMaterial({ color: c.color, transparent: true, opacity: 0.4 });

  // Floor
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(w, d), wallMat.clone());
  floor.rotation.x = -Math.PI/2;
  floor.position.y = 0;
  group.add(floor);

  // Walls
  const backWall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat);
  backWall.position.set(0, h/2, -d/2);
  group.add(backWall);

  const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(d, h), wallMat);
  leftWall.rotation.y = Math.PI/2;
  leftWall.position.set(-w/2, h/2, 0);
  group.add(leftWall);

  const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(d, h), wallMat);
  rightWall.rotation.y = -Math.PI/2;
  rightWall.position.set(w/2, h/2, 0);
  group.add(rightWall);

  // Ceiling
  const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(w, d), wallMat.clone());
  ceiling.rotation.x = Math.PI/2;
  ceiling.position.y = h;
  group.add(ceiling);

  // Wireframe edges
  const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d));
  const edges = new THREE.LineSegments(edgesGeo, wireMat);
  edges.position.y = h/2;
  group.add(edges);

  // ═══ CHAMBER-SPECIFIC FEATURES ═══

  if (idx === 0) {
    // TABERNACLE — Ark of the Covenant (capacitor)
    const arkW = 1.14, arkH = 0.69, arkD = 0.69; // 2.5 × 1.5 × 1.5 cubits
    const arkGeo = new THREE.BoxGeometry(arkW, arkH, arkD);
    const arkMat = new THREE.MeshStandardMaterial({
      color: 0xdaa520, metalness: 0.8, roughness: 0.2,
      emissive: 0xc9a44a, emissiveIntensity: 0.15
    });
    const ark = new THREE.Mesh(arkGeo, arkMat);
    ark.position.set(0, arkH/2 + 0.3, 0);
    group.add(ark);

    // Carrying poles
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x8b6914, roughness: 0.7 });
    for (let side of [-1, 1]) {
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 2.5, 8), poleMat);
      pole.rotation.z = Math.PI/2;
      pole.position.set(0, 0.5, side * arkD/2 * 1.1);
      group.add(pole);
    }

    // Cherubim (simplified — two wing shapes)
    const wingMat = new THREE.MeshStandardMaterial({ color: 0xdaa520, metalness: 0.9, roughness: 0.1 });
    for (let side of [-1, 1]) {
      const wing = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.8, 4), wingMat);
      wing.position.set(side * 0.3, arkH + 0.7, 0);
      wing.rotation.z = side * 0.3;
      group.add(wing);
    }

    // Glow between cherubim
    const cherGlow = new THREE.PointLight(0xc9a44a, 0.5, 3);
    cherGlow.position.set(0, arkH + 0.5, 0);
    group.add(cherGlow);

    // Curtain entrance (veil)
    const veilGeo = new THREE.PlaneGeometry(w * 0.8, h * 0.9);
    const veilMat = new THREE.MeshStandardMaterial({
      color: 0x2a1a4a, transparent: true, opacity: 0.3,
      side: THREE.DoubleSide
    });
    const veil = new THREE.Mesh(veilGeo, veilMat);
    veil.position.set(0, h * 0.45, d/2 - 0.1);
    group.add(veil);
  }

  if (idx === 1) {
    // SOLOMON'S TEMPLE — Two bronze pillars (Jachin & Boaz)
    const pillarMat = new THREE.MeshStandardMaterial({
      color: 0x8b6914, metalness: 0.6, roughness: 0.3
    });
    const pillarH = h * 0.8;
    for (let side of [-1, 1]) {
      const pillar = new THREE.Mesh(
        new THREE.CylinderGeometry(0.35, 0.4, pillarH, 16),
        pillarMat
      );
      pillar.position.set(side * w * 0.35, pillarH/2, d/2 + 0.5);
      group.add(pillar);

      // Capital (ornate top)
      const capital = new THREE.Mesh(
        new THREE.SphereGeometry(0.55, 12, 8),
        new THREE.MeshStandardMaterial({ color: 0xdaa520, metalness: 0.7 })
      );
      capital.position.set(side * w * 0.35, pillarH + 0.3, d/2 + 0.5);
      group.add(capital);
    }

    // Altar inside
    const altarMat = new THREE.MeshStandardMaterial({ color: 0xdaa520, metalness: 0.5, roughness: 0.3 });
    const altar = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.5), altarMat);
    altar.position.set(0, 0.4, -d * 0.2);
    group.add(altar);

    // Inner glow
    const innerGlow = new THREE.PointLight(0xc9a44a, 0.3, 8);
    innerGlow.position.set(0, h * 0.5, 0);
    group.add(innerGlow);
  }

  if (idx === 2) {
    // KING'S CHAMBER — Granite, sarcophagus, relieving chambers, shafts

    // Sarcophagus
    const sarcW = 2.28, sarcH = 0.87, sarcD = 0.98;
    const sarcMat = new THREE.MeshStandardMaterial({
      color: 0x8b4433, roughness: 0.6, metalness: 0.1
    });
    const sarc = new THREE.Mesh(new THREE.BoxGeometry(sarcW, sarcH, sarcD), sarcMat);
    sarc.position.set(w * 0.15, sarcH/2, 0);
    group.add(sarc);
    // Hollow inside
    const sarcInner = new THREE.Mesh(
      new THREE.BoxGeometry(sarcW - 0.15, sarcH - 0.1, sarcD - 0.15),
      new THREE.MeshStandardMaterial({ color: 0x1a0a08, roughness: 0.9 })
    );
    sarcInner.position.set(w * 0.15, sarcH/2 + 0.05, 0);
    group.add(sarcInner);

    // 5 Relieving chambers above (stacked granite beams)
    const beamMat = new THREE.MeshStandardMaterial({ color: 0x6b3422, roughness: 0.7, transparent: true, opacity: 0.3 });
    for (let i = 0; i < 5; i++) {
      const beamY = h + 0.5 + i * 1.2;
      const beam = new THREE.Mesh(new THREE.BoxGeometry(w * 0.95, 0.15, d * 0.95), beamMat);
      beam.position.y = beamY;
      group.add(beam);

      // Edges for each relieving chamber
      const relEdges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(w * 0.95, 1.0, d * 0.95)),
        new THREE.LineBasicMaterial({ color: c.color, transparent: true, opacity: 0.15 })
      );
      relEdges.position.y = beamY + 0.5;
      group.add(relEdges);
    }

    // Shafts (two narrow channels aimed at sky)
    const shaftMat = new THREE.MeshStandardMaterial({
      color: 0x332211, transparent: true, opacity: 0.4
    });
    // North shaft
    const nShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 15, 6), shaftMat);
    nShaft.rotation.x = -Math.PI * 0.22; // ~40° angle
    nShaft.position.set(0, h * 0.6 + 4, -d/2 - 5);
    group.add(nShaft);
    // South shaft
    const sShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 15, 6), shaftMat);
    sShaft.rotation.x = Math.PI * 0.25; // ~45° angle
    sShaft.position.set(0, h * 0.6 + 4, d/2 + 5);
    group.add(sShaft);

    // Shaft labels
    const shaftGlow1 = new THREE.PointLight(0x6699cc, 0.3, 8);
    shaftGlow1.position.set(0, h + 6, -8);
    group.add(shaftGlow1);
    const shaftGlow2 = new THREE.PointLight(0x6699cc, 0.3, 8);
    shaftGlow2.position.set(0, h + 6, 8);
    group.add(shaftGlow2);

    // Grand Gallery entrance (tall narrow passage)
    const galW = 1.05, galH = 8.6, galD = 47;
    const galMat = new THREE.MeshStandardMaterial({
      color: 0x443322, transparent: true, opacity: 0.1
    });
    const gallery = new THREE.Mesh(new THREE.BoxGeometry(galW, galH, 8), galMat);
    gallery.rotation.x = Math.PI * 0.14; // 26° slope
    gallery.position.set(0, -2, d/2 + 6);
    group.add(gallery);
    const galEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(galW, galH, 8)),
      new THREE.LineBasicMaterial({ color: 0x664422, transparent: true, opacity: 0.2 })
    );
    galEdges.rotation.x = Math.PI * 0.14;
    galEdges.position.set(0, -2, d/2 + 6);
    group.add(galEdges);
  }

  // Dimension labels — floating measurement lines
  // Height line
  const hLineMat = new THREE.LineBasicMaterial({ color: 0x444444 });
  const hPts = [new THREE.Vector3(-w/2 - 0.5, 0, d/2 + 0.5), new THREE.Vector3(-w/2 - 0.5, h, d/2 + 0.5)];
  const hLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(hPts), hLineMat);
  group.add(hLine);

  // Width line
  const wPts = [new THREE.Vector3(-w/2, 0, d/2 + 0.8), new THREE.Vector3(w/2, 0, d/2 + 0.8)];
  group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(wPts), hLineMat));

  return group;
}

// Build all three
const allGroups = chambers.map((_, i) => buildChamber(i));
allGroups.forEach(g => { g.visible = false; scene.add(g); });

function show(idx) {
  currentIndex = idx;
  allGroups.forEach((g, i) => g.visible = i === idx);

  const c = chambers[idx];
  document.getElementById('title').textContent = c.name;
  document.getElementById('dims').textContent = c.dims;
  document.getElementById('freq').textContent = c.freq;
  document.getElementById('scale-text').innerHTML = c.scale + '<br>' + c.notes;

  // Adjust camera for chamber size
  const maxDim = Math.max(c.w, c.h, c.d);
  camera.position.set(maxDim * 1.5, maxDim * 0.8, maxDim * 1.5);
  controls.target.set(0, c.h * 0.4, 0);

  // Update buttons
  document.querySelectorAll('#ui button').forEach((b, i) => b.classList.toggle('active', i === idx));
}

window.show = show;
show(0);

// Animation
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Gentle warm light pulse
  warm.intensity = 0.6 + 0.2 * Math.sin(t * 0.5);

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
