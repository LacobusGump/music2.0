<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>How It Works</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#999;font-family:Georgia,serif;overflow:hidden;}
canvas{display:block;}
#step-text{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;pointer-events:none;max-width:520px;}
#step-text .num{color:#c9a44a40;font-size:0.65em;letter-spacing:0.15em;margin-bottom:4px;}
#step-text .title{color:#c9a44a;font-size:1.1em;font-weight:100;letter-spacing:0.1em;margin-bottom:8px;}
#step-text .desc{color:#666;font-size:0.78em;line-height:1.9;}
#nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:10;}
#nav button{background:#0a0a14;border:1px solid #c9a44a30;color:#c9a44a80;padding:10px 24px;border-radius:6px;font-family:Georgia,serif;font-size:0.8em;cursor:pointer;transition:all 0.3s;letter-spacing:0.06em;}
#nav button:hover{background:#c9a44a15;color:#c9a44a;border-color:#c9a44a60;}
#nav button:disabled{opacity:0.2;cursor:default;}
#device-nav{position:fixed;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;}
#device-nav button{background:none;border:1px solid #c9a44a15;color:#444;padding:6px 14px;border-radius:6px;font-family:Georgia,serif;font-size:0.68em;cursor:pointer;transition:all 0.3s;}
#device-nav button:hover,#device-nav button.active{color:#c9a44a;border-color:#c9a44a40;}
#back{position:fixed;top:20px;left:20px;color:#333;font-size:0.72em;text-decoration:none;z-index:10;}
#back:hover{color:#c9a44a;}
#progress{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10;}
#progress .dot{width:8px;height:8px;border-radius:50%;background:#1a1a1a;border:1px solid #c9a44a20;transition:all 0.3s;}
#progress .dot.active{background:#c9a44a;border-color:#c9a44a;}
</style>
</head>
<body>
<a id="back" href="/33/">&larr; 33</a>
<div id="device-nav">
  <button class="active" onclick="setDevice(0)">The Ark</button>
  <button onclick="setDevice(1)">Tabernacle</button>
  <button onclick="setDevice(2)">King&rsquo;s Chamber</button>
</div>
<div id="step-text">
  <div class="num" id="s-num">STEP 1 OF 6</div>
  <div class="title" id="s-title"></div>
  <div class="desc" id="s-desc"></div>
</div>
<div id="progress"></div>
<div id="nav">
  <button id="btn-prev" onclick="prev()">&larr; Back</button>
  <button id="btn-next" onclick="next()">Next &rarr;</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.01,200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=0.9;
document.body.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;

scene.add(new THREE.AmbientLight(0x111122,0.3));
const keyLight=new THREE.DirectionalLight(0xffeedd,0.5);
keyLight.position.set(5,10,7);scene.add(keyLight);
scene.add(new THREE.DirectionalLight(0x4466aa,0.2).translateTo=-5);
const gnd=new THREE.Mesh(new THREE.PlaneGeometry(60,60),new THREE.MeshStandardMaterial({color:0x060606,roughness:1}));
gnd.rotation.x=-Math.PI/2;scene.add(gnd);

// Shared materials
const gold=new THREE.MeshStandardMaterial({color:0xd4a520,metalness:0.85,roughness:0.15});
const goldGlow=new THREE.MeshStandardMaterial({color:0xd4a520,metalness:0.9,roughness:0.1,emissive:0xc9a44a,emissiveIntensity:0.1});
const granite=new THREE.MeshStandardMaterial({color:0x8b4433,roughness:0.6,metalness:0.05});

// ══════════════════════════════════════
// STEP DEFINITIONS — Each device tells its story
// ══════════════════════════════════════

const devices = [
  // ═══ THE ARK ═══
  {
    name: 'The Ark',
    camDist: 3, camH: 1.2,
    steps: [
      {
        title: 'The Box',
        desc: 'Gold outside. Acacia wood in the middle. Gold inside. Conductor-dielectric-conductor. That\'s a capacitor. Same component in every radio, every phone, every circuit ever built.',
        build: (g) => {
          const box=new THREE.Mesh(new THREE.BoxGeometry(1.14,0.69,0.69),gold);
          box.position.y=0.345;g.add(box);
          // Crown molding
          const rim=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.04,0.04),goldGlow);
          rim.position.y=0.72;g.add(rim);
          const rim2=rim.clone();rim2.rotation.y=Math.PI/2;rim2.scale.x=0.69/1.2;g.add(rim2);
        }
      },
      {
        title: 'The Poles',
        desc: 'Four gold rings at the feet. Two poles through the rings. It\'s portable. You carry it. Wherever you go, the device goes with you.',
        build: (g) => {
          for(let s of[-1,1]){
            const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,2,8),gold);
            pole.rotation.z=Math.PI/2;pole.position.set(0,0.06,s*0.35);g.add(pole);
          }
          const ringGeo=new THREE.TorusGeometry(0.035,0.008,8,16);
          [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([x,z])=>{
            const r=new THREE.Mesh(ringGeo,goldGlow);
            r.position.set(x*0.48,0.06,z*0.3);r.rotation.y=Math.PI/2;g.add(r);
          });
        }
      },
      {
        title: 'The Lid',
        desc: 'Solid gold mercy seat on top. Seals the capacitor. The lid isn\'t decorative — it\'s the top plate of the capacitor. Gold-wood-gold, sealed.',
        build: (g) => {
          const lid=new THREE.Mesh(new THREE.BoxGeometry(1.18,0.06,0.73),goldGlow);
          lid.position.y=0.72;g.add(lid);
        }
      },
      {
        title: 'The Cherubim',
        desc: 'Two gold figures on top, facing each other, wings spread toward the center. Two electrodes. The field is strongest between them. "God speaks from between the cherubim."',
        build: (g) => {
          for(let s of[-1,1]){
            const body=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,0.2,8),goldGlow);
            body.position.set(s*0.4,0.85,0);g.add(body);
            const head=new THREE.Mesh(new THREE.SphereGeometry(0.035,8,6),goldGlow);
            head.position.set(s*0.4,0.98,0);g.add(head);
            for(let w of[-1,1]){
              const wing=new THREE.Mesh(
                new THREE.PlaneGeometry(0.12,0.18),
                new THREE.MeshStandardMaterial({color:0xd4a520,metalness:0.85,roughness:0.1,side:THREE.DoubleSide})
              );
              wing.position.set(s*0.4+w*0.06,0.93,-s*0.02);
              wing.rotation.x=-s*0.4;wing.rotation.z=w*0.5;g.add(wing);
            }
          }
        }
      },
      {
        title: 'The Field',
        desc: 'Charge builds on the capacitor. The field concentrates between the cherubim — two electrodes 50cm apart. ~52 V/m. Five times the threshold for brain entrainment. Don\'t touch.',
        build: (g) => {
          const glow=new THREE.PointLight(0xc9a44a,2,2);
          glow.position.set(0,0.9,0);g.add(glow);
          // Field lines (visible arcs between cherubim)
          for(let i=0;i<5;i++){
            const pts=[];
            const h=0.82+i*0.04;
            for(let t=0;t<=20;t++){
              const p=t/20;
              const x=(p-0.5)*0.7;
              const y=h+Math.sin(p*Math.PI)*0.08*(1+i*0.3);
              pts.push(new THREE.Vector3(x,y,(i-2)*0.03));
            }
            const line=new THREE.Line(
              new THREE.BufferGeometry().setFromPoints(pts),
              new THREE.LineBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.15+i*0.05})
            );
            g.add(line);
          }
        }
      },
      {
        title: 'The Warning',
        desc: '"Anyone who touches the Ark will die." Not a commandment. A safety warning. This is a charged capacitor generating a field strong enough to affect your brain. Touch it and you get shocked. The Bible is an owner\'s manual.',
        build: (g) => {
          // Danger halo
          const halo=new THREE.Mesh(
            new THREE.BoxGeometry(1.5,1.2,1.1),
            new THREE.MeshBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.03,side:THREE.BackSide})
          );
          halo.position.y=0.5;g.add(halo);
          // Sparks at contact points
          for(let i=0;i<8;i++){
            const spark=new THREE.Mesh(
              new THREE.SphereGeometry(0.01,4,3),
              new THREE.MeshBasicMaterial({color:0xffcc44})
            );
            const a=i/8*Math.PI*2;
            spark.position.set(Math.cos(a)*0.6,0.35+Math.random()*0.4,Math.sin(a)*0.4);
            spark.userData.sparkAngle=a;
            g.add(spark);
          }
        }
      },
    ]
  },

  // ═══ THE TABERNACLE ═══
  {
    name: 'Tabernacle',
    camDist: 10, camH: 4,
    steps: [
      {
        title: 'The Room',
        desc: 'A cube. 10 × 10 × 10 cubits. 4.57 meters per side. Acacia wood boards overlaid with gold. Three walls, open front with a curtain. The shape matters — a cube is the only room where the (1,1,1) standing wave mode has perfect three-fold symmetry.',
        build: (g) => {
          const W=4.57,H=4.57,D=4.57;
          const mat=new THREE.MeshStandardMaterial({color:0xb8860b,metalness:0.4,roughness:0.3});
          // Walls as boards
          for(let i=0;i<10;i++){
            const b=new THREE.Mesh(new THREE.BoxGeometry(W/10*0.95,H,0.12),mat);
            b.position.set(-W/2+W/20+i*W/10,H/2,-D/2);g.add(b);
          }
          for(let s of[-1,1])for(let i=0;i<10;i++){
            const b=new THREE.Mesh(new THREE.BoxGeometry(0.12,H,D/10*0.95),mat);
            b.position.set(s*W/2,H/2,-D/2+D/20+i*D/10);g.add(b);
          }
          // Gold floor
          const f=new THREE.Mesh(new THREE.PlaneGeometry(W,D),gold);
          f.rotation.x=-Math.PI/2;f.position.y=0.01;g.add(f);
          // Wireframe
          g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(W,H,D)),new THREE.LineBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.1})).translateY(H/2));
        }
      },
      {
        title: 'The Ark Goes Inside',
        desc: 'The Ark sits in the back of the room, behind the veil. The portable device inside the portable room. The device that plugs into the amplifier.',
        build: (g) => {
          const ark=new THREE.Mesh(new THREE.BoxGeometry(1.14,0.69,0.69),goldGlow);
          ark.position.set(0,0.645,-0.7);g.add(ark);
          const lid=new THREE.Mesh(new THREE.BoxGeometry(1.18,0.06,0.73),goldGlow);
          lid.position.set(0,1.02,-0.7);g.add(lid);
          // Cherubim glow
          const gl=new THREE.PointLight(0xc9a44a,1,3);
          gl.position.set(0,1.2,-0.7);g.add(gl);
        }
      },
      {
        title: 'The Incense',
        desc: 'Altar of incense in front of the veil. Specific recipe: stacte, onycha, galbanum, frankincense, salt. Not perfume. Fine particles that stay suspended in sound fields. The display medium. The salt is piezoelectric — it aligns in electric fields.',
        build: (g) => {
          // Altar
          const altar=new THREE.Mesh(new THREE.BoxGeometry(0.46,0.91,0.46),gold);
          altar.position.set(0,0.455,1.1);g.add(altar);
          // Smoke particles rising
          const smokeGeo=new THREE.BufferGeometry();
          const sPos=new Float32Array(200*3);
          for(let i=0;i<200;i++){
            sPos[i*3]=(Math.random()-0.5)*2;
            sPos[i*3+1]=Math.random()*4;
            sPos[i*3+2]=(Math.random()-0.5)*2;
          }
          smokeGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
          const smoke=new THREE.Points(smokeGeo,new THREE.PointsMaterial({color:0x888877,size:0.04,transparent:true,opacity:0.3}));
          smoke.position.set(0,0.5,0);
          smoke.userData.isSmoke=true;
          g.add(smoke);
        }
      },
      {
        title: 'The Sound',
        desc: 'Chanting. One voice in a gold cube. The walls reflect perfectly — gold is the best acoustic reflector. The room rings at 37.5 Hz. Right at the gamma threshold. The voice builds. The Q factor amplifies. One voice becomes a hundred.',
        build: (g) => {
          // Sound waves — concentric rings expanding from center
          for(let i=0;i<5;i++){
            const ring=new THREE.Mesh(
              new THREE.RingGeometry(0.3+i*0.6,0.35+i*0.6,32),
              new THREE.MeshBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.06-i*0.01,side:THREE.DoubleSide})
            );
            ring.position.y=2.3;
            ring.userData.waveRing=true;ring.userData.baseRadius=0.3+i*0.6;
            g.add(ring);
          }
        }
      },
      {
        title: 'The Standing Wave',
        desc: 'Sound bounces off all six surfaces. The waves interfere. At 37.5 Hz — the room\'s natural frequency — they lock into a STANDING WAVE. The smoke stops drifting and forms a pattern. Three planes of stillness intersecting at the center. Eight cells of alternating pressure.',
        build: (g) => {
          const W=4.57;
          // Three intersecting nodal planes
          const planeMat=new THREE.MeshBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.04,side:THREE.DoubleSide});
          const p1=new THREE.Mesh(new THREE.PlaneGeometry(W*0.9,W*0.9),planeMat);
          p1.position.set(0,W/2,0);g.add(p1); // horizontal
          const p2=new THREE.Mesh(new THREE.PlaneGeometry(W*0.9,W*0.9),planeMat);
          p2.position.set(0,W/2,0);p2.rotation.x=Math.PI/2;g.add(p2); // vertical front-back
          const p3=new THREE.Mesh(new THREE.PlaneGeometry(W*0.9,W*0.9),planeMat);
          p3.position.set(0,W/2,0);p3.rotation.y=Math.PI/2;g.add(p3); // vertical left-right
        }
      },
      {
        title: 'The Shape',
        desc: 'The (1,1,1) mode of a cube. Eight cells. Smoke collects at the nodes, clears at the antinodes. The pattern that forms is two interlocking tetrahedra. The star tetrahedron. The DST. The same shape every tradition drew. Because they SAW it. In this room. In the smoke. Not a vision. A standing wave.',
        build: (g) => {
          const s=1.8;
          // Star tetrahedron wireframe
          const tetGeo=new THREE.TetrahedronGeometry(s);
          const tetMat=new THREE.MeshBasicMaterial({color:0xc9a44a,wireframe:true,transparent:true,opacity:0.3});
          const t1=new THREE.Mesh(tetGeo,tetMat);t1.position.y=2.3;g.add(t1);
          const t2=new THREE.Mesh(tetGeo,tetMat.clone());t2.rotation.x=Math.PI;t2.position.y=2.3;g.add(t2);
          // Glow at center
          g.add(new THREE.PointLight(0xc9a44a,0.8,4).translateY(2.3));
        }
      },
    ]
  },

  // ═══ KING'S CHAMBER ═══
  {
    name: "King's Chamber",
    camDist: 20, camH: 6,
    steps: [
      {
        title: 'The Pyramid',
        desc: '85,000 square meters of limestone. 146 meters tall. Sitting in an atmospheric electric field of 100 V/m. The apex reaches 14,600 volts in fair weather. 1.4 million volts before a storm. The largest antenna ever built.',
        build: (g) => {
          // Pyramid wireframe
          const pyrGeo=new THREE.ConeGeometry(8,10,4);
          const pyrMat=new THREE.MeshBasicMaterial({color:0xc9a44a,wireframe:true,transparent:true,opacity:0.08});
          const pyr=new THREE.Mesh(pyrGeo,pyrMat);
          pyr.position.y=5;pyr.rotation.y=Math.PI/4;g.add(pyr);
          // Capstone glow
          g.add(new THREE.PointLight(0xc9a44a,0.5,8).translateY(10));
        }
      },
      {
        title: 'The Gallery',
        desc: 'Grand Gallery. 47 meters long. Narrows from 2.1m at the base to 1.05m at the top. Seven corbelled steps. That\'s an acoustic HORN. A waveguide that impedance-matches a large opening to a small chamber. Wind through the passages makes the pyramid a self-playing instrument.',
        build: (g) => {
          // Corbelled gallery (simplified cross-section)
          for(let i=0;i<7;i++){
            const w=1.05-i*0.08;
            for(let s of[-1,1]){
              const wall=new THREE.Mesh(
                new THREE.BoxGeometry(0.06,0.8,6),
                new THREE.MeshStandardMaterial({color:0x553322,transparent:true,opacity:0.15})
              );
              wall.rotation.x=0.45;
              wall.position.set(s*w/2,-2+i*0.6,8);
              g.add(wall);
            }
          }
          // Arrow showing sound flow
          for(let i=0;i<8;i++){
            const dot=new THREE.Mesh(
              new THREE.SphereGeometry(0.06,4,3),
              new THREE.MeshBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.2-i*0.02})
            );
            dot.position.set(0,-1+i*0.3,10-i*0.8);
            g.add(dot);
          }
        }
      },
      {
        title: 'The Chamber',
        desc: '10.47 × 5.23 × 5.82 meters. 804 TONNES of granite. 55% quartz. Quartz is piezoelectric — vibration produces electric fields. The room doesn\'t just resonate sound. It converts sound into electromagnetic fields at the resonance frequency.',
        build: (g) => {
          const W=10.47,H=5.82,D=5.23;
          // Granite blocks
          for(let row=0;row<5;row++){
            const nB=5+(row%2);
            for(let col=0;col<nB;col++){
              const bw=W/nB;
              const block=new THREE.Mesh(
                new THREE.BoxGeometry(bw-0.02,H/5-0.01,0.8),
                row%2?granite.clone():new THREE.MeshStandardMaterial({color:0x6b3322,roughness:0.6,metalness:0.05})
              );
              block.position.set(-W/2+bw/2+col*bw,H/10+row*H/5,-D/2-0.4);
              g.add(block);
            }
          }
          // Floor
          g.add(new THREE.Mesh(new THREE.PlaneGeometry(W,D),new THREE.MeshStandardMaterial({color:0x5a2a1a,roughness:0.5})).rotateX(-Math.PI/2).translateY(0.01));
          // Ceiling beams
          for(let i=0;i<9;i++){
            const beam=new THREE.Mesh(new THREE.BoxGeometry(W/9-0.02,0.6,D+1.6),new THREE.MeshStandardMaterial({color:0x5a2a1a,roughness:0.7}));
            beam.position.set(-W/2+W/18+i*W/9,H+0.3,0);g.add(beam);
          }
          g.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(W,H,D)),new THREE.LineBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.08})).translateY(H/2));
        }
      },
      {
        title: 'The Sarcophagus + Ark',
        desc: 'Granite box at the western end. 2.28 × 0.98 × 1.05 meters inside. The Ark is 1.14 × 0.69 × 0.69 meters. It fits. With clearance. This wasn\'t a coffin. It was a DEVICE MOUNT. Every "empty" sarcophagus held a gold box that tomb robbers took and melted.',
        build: (g) => {
          const W=10.47;
          // Sarcophagus
          const sarc=new THREE.Mesh(new THREE.BoxGeometry(2.28,1.05,0.98),granite);
          sarc.position.set(W*0.25,0.525,0);g.add(sarc);
          const sIn=new THREE.Mesh(new THREE.BoxGeometry(2,0.85,0.7),new THREE.MeshStandardMaterial({color:0x0a0503,roughness:0.9}));
          sIn.position.set(W*0.25,0.6,0);g.add(sIn);
          // Ark inside
          const ark=new THREE.Mesh(new THREE.BoxGeometry(1.14,0.69,0.69),goldGlow);
          ark.position.set(W*0.25,0.5,0);g.add(ark);
          g.add(new THREE.PointLight(0xc9a44a,1,3).translateY(1.2).translateX(W*0.25));
        }
      },
      {
        title: 'The Resonance',
        desc: 'Sound enters the chamber. Granite walls vibrate. Piezoelectric quartz converts vibration to electric field. Q factor = 100. The field builds with each reflection. 100 bounces = 100× amplification. The Ark charges. The cherubim field grows. 52 V/m between the electrodes.',
        build: (g) => {
          // EM field waves emanating from walls toward center
          for(let i=0;i<20;i++){
            const a=i/20*Math.PI*2;
            const dot=new THREE.Mesh(
              new THREE.SphereGeometry(0.08,4,3),
              new THREE.MeshBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.15})
            );
            dot.position.set(Math.cos(a)*4,2.9+Math.sin(a*3)*0.5,Math.sin(a)*2.5);
            dot.userData.emWave=true;dot.userData.angle=a;
            g.add(dot);
          }
          // Central bright glow (the Ark's field at full power)
          const core=new THREE.PointLight(0xc9a44a,2,8);
          core.position.set(2.6,1.5,0);g.add(core);
        }
      },
      {
        title: 'The Feedback Loop',
        desc: 'Your brain outputs electromagnetic fields at gamma frequencies. The granite walls catch them. Convert to acoustic. The room amplifies. Convert back to EM. The Ark concentrates the field. It hits your brain again. Amplified. Your own signal, returned to you 100× stronger. A laser for consciousness. You hear yourself think for the first time.',
        build: (g) => {
          // Feedback loop visualization — arrows circling
          const loopPts=[];
          for(let i=0;i<=40;i++){
            const t=i/40*Math.PI*2;
            loopPts.push(new THREE.Vector3(Math.cos(t)*3,2.9+Math.sin(t*2)*0.5,Math.sin(t)*2));
          }
          const loopLine=new THREE.Line(
            new THREE.BufferGeometry().setFromPoints(loopPts),
            new THREE.LineBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.25})
          );
          g.add(loopLine);

          // Person (simplified figure at the sarcophagus)
          const person=new THREE.Mesh(new THREE.CapsuleGeometry(0.2,0.8,4,8),
            new THREE.MeshStandardMaterial({color:0x886655,roughness:0.8}));
          person.position.set(2.6,1,1.5);g.add(person);

          // Brain waves from person
          for(let i=0;i<3;i++){
            const wave=new THREE.Mesh(
              new THREE.RingGeometry(0.2+i*0.3,0.25+i*0.3,16),
              new THREE.MeshBasicMaterial({color:0xc9a44a,transparent:true,opacity:0.1,side:THREE.DoubleSide})
            );
            wave.position.set(2.6,1.8,1.5);
            wave.lookAt(2.6,1.8,0);
            g.add(wave);
          }

          g.add(new THREE.PointLight(0xc9a44a,3,10).translateY(2.9));
        }
      },
    ]
  },
];

// ══════════════════════════════════════
// STATE + NAVIGATION
// ══════════════════════════════════════

let deviceIdx = 0;
let stepIdx = 0;
let builtLayers = [];

function clearLayers() {
  builtLayers.forEach(g => { scene.remove(g); });
  builtLayers = [];
}

function buildToStep(devIdx, step) {
  clearLayers();
  const dev = devices[devIdx];
  for (let i = 0; i <= step; i++) {
    const g = new THREE.Group();
    dev.steps[i].build(g);
    scene.add(g);
    builtLayers.push(g);
  }

  const s = dev.steps[step];
  document.getElementById('s-num').textContent = `STEP ${step+1} OF ${dev.steps.length}`;
  document.getElementById('s-title').textContent = s.title;
  document.getElementById('s-desc').textContent = s.desc;

  document.getElementById('btn-prev').disabled = step === 0;
  document.getElementById('btn-next').textContent = step === dev.steps.length - 1 ? 'Done' : 'Next →';

  // Progress dots
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  for (let i = 0; i < dev.steps.length; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i <= step ? ' active' : '');
    prog.appendChild(dot);
  }

  // Camera
  if (step === 0) {
    camera.position.set(dev.camDist*0.7, dev.camH, dev.camDist);
    controls.target.set(0, dev.camH*0.3, 0);
  }
}

function setDevice(idx) {
  deviceIdx = idx;
  stepIdx = 0;
  buildToStep(idx, 0);
  document.querySelectorAll('#device-nav button').forEach((b,i) => b.classList.toggle('active', i===idx));
}

function next() {
  const dev = devices[deviceIdx];
  if (stepIdx < dev.steps.length - 1) {
    stepIdx++;
    buildToStep(deviceIdx, stepIdx);
  }
}

function prev() {
  if (stepIdx > 0) {
    stepIdx--;
    buildToStep(deviceIdx, stepIdx);
  }
}

window.setDevice = setDevice;
window.next = next;
window.prev = prev;

setDevice(0);

// Animate
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Animate smoke particles, wave rings, EM waves, sparks
  builtLayers.forEach(g => {
    g.traverse(child => {
      if (child.userData.isSmoke && child.geometry) {
        const pos = child.geometry.attributes.position.array;
        for(let i=1;i<pos.length;i+=3) {
          pos[i] += 0.003;
          if(pos[i]>4) pos[i]=0;
        }
        child.geometry.attributes.position.needsUpdate = true;
      }
      if (child.userData.waveRing) {
        child.scale.setScalar(1 + 0.1*Math.sin(t*2+child.userData.baseRadius));
        child.material.opacity = 0.04 + 0.02*Math.sin(t*3);
      }
      if (child.userData.emWave) {
        const a = child.userData.angle + t*0.5;
        const r = 2 + 2*Math.sin(t*2+child.userData.angle*3);
        child.position.x = Math.cos(a)*r;
        child.position.z = Math.sin(a)*r*0.6;
      }
      if (child.userData.sparkAngle !== undefined) {
        child.material.opacity = 0.3 + 0.7*Math.random();
        child.scale.setScalar(0.5 + Math.random());
      }
    });
  });

  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
