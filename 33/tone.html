<!-- Anna:OS — tone lane preserved from /33 -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>33 — tone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#c9a44a;font-family:Georgia,serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;padding:24px;}
h1{font-weight:100;font-size:2em;letter-spacing:0.3em;margin-bottom:32px;}
.tone{background:#0a0a0f;border:1px solid #1a1a1a;border-radius:12px;
  padding:32px;max-width:500px;width:100%;margin-bottom:24px;}
.row{display:flex;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid #111;}
.label{color:#666;font-size:0.85em;}
.value{color:#c9a44a;font-size:0.95em;}
button{background:#c9a44a;color:#000;font:600 1em Georgia;
  padding:14px 48px;border:none;border-radius:8px;cursor:pointer;
  letter-spacing:0.1em;margin:16px 0;}
button:hover{background:#f4d990;}
#status{color:#666;font-size:0.8em;margin-top:8px;min-height:20px;}
.warn{color:#666;font-size:0.75em;margin-top:32px;max-width:400px;
  text-align:center;line-height:1.6;}
.nav{margin-top:24px;font-size:0.75em;}
.nav a{color:#444;text-decoration:none;}
.nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<h1>33</h1>
<div class="tone">
  <div class="row"><span class="label">Carrier (L)</span><span class="value">372.40 Hz — F#4</span></div>
  <div class="row"><span class="label">Carrier (R)</span><span class="value">376.27 Hz</span></div>
  <div class="row"><span class="label">Binaural beat</span><span class="value">3.862 Hz — θ</span></div>
  <div class="row"><span class="label">Pulse</span><span class="value">46.9 bpm — γ₃₃×α</span></div>
  <div class="row"><span class="label">Drone</span><span class="value">127.44 Hz — B2</span></div>
  <div class="row"><span class="label">Source</span><span class="value">e×137, Δγ₃₃, γ₃₃×α</span></div>
</div>
<button id="play" onclick="toggle()">begin</button>
<div id="status"></div>
<p class="warn">Headphones required. Eyes closed. Short sessions. Someone nearby.</p>
<p class="nav"><a href="/33/">← Anna symbio</a></p>
<script>
var ctx=null,playing=false,nodes=[];
var CARRIER=Math.E*137,THETA=3.861944,CARRIER_R=CARRIER+THETA;
var PULSE_HZ=0.782046,DRONE=THETA*33,PHI=(1+Math.sqrt(5))/2;
function toggle(){
  if(playing){stop();return;}
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended')ctx.resume();
  var now=ctx.currentTime,master=ctx.createGain();
  master.gain.value=0;master.gain.linearRampToValueAtTime(0.35,now+3);
  master.connect(ctx.destination);
  function mkOsc(freq,pan,gain,type){
    var o=ctx.createOscillator(),p=ctx.createStereoPanner(),g=ctx.createGain();
    o.type=type||'sine';o.frequency.value=freq;g.gain.value=gain;p.pan.value=pan;
    o.connect(g);g.connect(p);p.connect(master);o.start(now);nodes.push(o);
  }
  mkOsc(CARRIER,-1,0.25);mkOsc(CARRIER_R,1,0.25);mkOsc(DRONE,0,0.12);
  mkOsc(CARRIER/PHI,0,0.04);
  playing=true;document.getElementById('play').textContent='end';
  document.getElementById('status').textContent='binaural θ at 3.86 Hz';
  (function pulse(){if(!playing)return;master.gain.value=0.35*(0.7+0.3*Math.sin(2*Math.PI*PULSE_HZ*ctx.currentTime));requestAnimationFrame(pulse);})();
}
function stop(){playing=false;nodes.forEach(function(n){try{n.stop();}catch(e){}});nodes=[];
  if(ctx){ctx.close();ctx=null;}document.getElementById('play').textContent='begin';
  document.getElementById('status').textContent='';}
</script>
</body>
</html>
