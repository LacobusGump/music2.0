<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0a0806">
<title>GUMP — Play</title>
<meta name="description" content="Pick a style. Your world shapes the rest. You play the melody.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0806;touch-action:none;}

/* ── BOOT SCREEN ─────────────────────────────────────────────── */
#boot{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0a0806;
  padding:0 24px;
  transition:opacity 0.8s ease;
}
#boot.hidden{opacity:0;pointer-events:none;}

.boot-label{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.58em;letter-spacing:0.38em;
  color:rgba(201,164,74,0.32);text-transform:uppercase;
  margin-bottom:36px;
}

/* ── STYLE SELECTOR ─────────────────────────────────────────── */
#style-grid{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin-bottom:10px;
  max-width:380px;
}
.style-btn{
  background:none;
  border:1px solid rgba(201,164,74,0.14);
  border-radius:3px;
  padding:9px 14px 8px;
  cursor:pointer;
  text-align:center;
  transition:all 0.28s;
  min-width:62px;
}
.style-btn:hover{
  border-color:rgba(201,164,74,0.38);
  background:rgba(201,164,74,0.04);
}
.style-btn.selected{
  border-color:rgba(201,164,74,0.72);
  background:rgba(201,164,74,0.09);
}
.style-btn .sn{
  display:block;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.52em;letter-spacing:0.24em;
  color:rgba(201,164,74,0.68);text-transform:uppercase;
}
.style-btn.selected .sn{color:rgba(201,164,74,0.92);}

#style-sub{
  font-family:Georgia,serif;font-style:italic;
  font-size:0.58em;
  color:rgba(201,164,74,0.28);
  letter-spacing:0.05em;
  text-align:center;
  height:1.4em;
  margin-bottom:30px;
  transition:opacity 0.3s;
}

/* ── PLAY BUTTON ─────────────────────────────────────────────── */
#play-btn{
  background:none;
  border:1px solid rgba(201,164,74,0.25);
  border-radius:50%;
  width:108px;height:108px;
  color:rgba(201,164,74,0.68);
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.68em;letter-spacing:0.22em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.45s;
}
#play-btn:hover,#play-btn:active{
  border-color:rgba(201,164,74,0.58);
  background:rgba(201,164,74,0.07);
  color:rgba(201,164,74,0.95);
}

.boot-env{
  margin-top:26px;
  font-family:Georgia,serif;
  font-size:0.60em;
  color:rgba(201,164,74,0.20);
  line-height:2;
  text-align:center;
  max-width:280px;
}

/* ── MAIN CANVAS ─────────────────────────────────────────────── */
canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  display:block;
}

/* ── HUD ────────────────────────────────────────────────────── */
#hud{
  position:fixed;
  bottom:env(safe-area-inset-bottom,20px);
  left:0;right:0;
  padding:0 24px 22px;
  pointer-events:none;
  z-index:5;
  display:none;
}
#hud.show{display:block;}
.hud-key{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.88em;letter-spacing:0.22em;
  color:rgba(201,164,74,0.65);
  text-transform:uppercase;
  display:block;margin-bottom:4px;
}
.hud-env{
  font-family:Georgia,serif;
  font-size:0.60em;
  color:rgba(201,164,74,0.28);
  letter-spacing:0.06em;line-height:2;
}

/* ── CORNER NAV ─────────────────────────────────────────────── */
#corner{
  position:fixed;top:max(env(safe-area-inset-top,14px),14px);left:16px;
  z-index:20;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.52em;letter-spacing:0.14em;
  color:rgba(255,255,255,0.18);
}
#corner a{color:rgba(255,255,255,0.18);text-decoration:none;}
#corner a:hover{color:rgba(255,255,255,0.45);}

/* ── MOTION HINT ─────────────────────────────────────────────── */
#motion-hint{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  z-index:6;
  color:rgba(201,164,74,0.38);
  font-family:Georgia,serif;font-size:0.60em;
  text-align:center;line-height:1.8;
  pointer-events:none;
  display:none;
  transition:opacity 1s;
}

/* ── SAMPLE LOADER ──────────────────────────────────────────── */
#sample-btn{
  position:fixed;top:max(env(safe-area-inset-top,14px),14px);right:16px;
  z-index:20;
  background:none;border:1px solid rgba(201,164,74,0.16);border-radius:3px;
  padding:5px 10px 4px;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.46em;letter-spacing:0.14em;
  color:rgba(201,164,74,0.30);
  cursor:pointer;
  display:none;
  transition:all 0.3s;
}
#sample-btn:hover{ border-color:rgba(201,164,74,0.40);color:rgba(201,164,74,0.60); }
#sample-btn.show{ display:block; }

#sample-panel{
  position:fixed;top:50px;right:12px;
  z-index:20;
  background:rgba(10,8,6,0.94);
  border:1px solid rgba(201,164,74,0.20);
  border-radius:4px;
  padding:14px 16px 12px;
  display:none;
  width:220px;
}
#sample-panel.show{ display:block; }
#sample-panel .sp-title{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.46em;letter-spacing:0.22em;
  color:rgba(201,164,74,0.45);
  text-transform:uppercase;
  margin-bottom:10px;
}
.sp-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:7px;
}
.sp-label{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.42em;letter-spacing:0.14em;
  color:rgba(201,164,74,0.35);
  text-transform:uppercase;
  width:52px;flex-shrink:0;
}
.sp-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(201,164,74,0.16);flex-shrink:0;
}
.sp-dot.loaded{ background:rgba(120,200,140,0.70); }
.sp-btn{
  flex:1;
  background:none;border:1px solid rgba(201,164,74,0.14);border-radius:2px;
  padding:4px 8px;
  font-family:Georgia,serif;font-style:italic;
  font-size:0.42em;
  color:rgba(201,164,74,0.30);
  cursor:pointer;text-align:left;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:all 0.2s;
}
.sp-btn:hover{ border-color:rgba(201,164,74,0.35);color:rgba(201,164,74,0.65); }
.sp-note{
  font-family:Georgia,serif;font-size:0.38em;font-style:italic;
  color:rgba(201,164,74,0.20);
  text-align:center;
  margin-top:8px;
  line-height:1.6;
}
/* hidden file input */
#sample-file-input{ display:none; }
</style>
</head>
<body>

<div id="corner">
  <a href="/play/">&larr; home</a>
  &nbsp;&nbsp;v3&nbsp;&middot;&nbsp;<a href="/v1/">v1</a>
</div>

<!-- BOOT SCREEN -->
<div id="boot">
  <div class="boot-label">GUMP</div>

  <div id="style-grid"></div>
  <div id="style-sub">&nbsp;</div>

  <button id="play-btn">play</button>

  <div class="boot-env" id="boot-env">
    your world makes the music<br>
    you play the melody<br>
    <span style="opacity:0.55" id="boot-loc">reading your location&hellip;</span>
  </div>
</div>

<!-- CANVAS -->
<canvas id="viz"></canvas>

<!-- HUD -->
<div id="hud">
  <span class="hud-key" id="hud-key">—</span>
  <span class="hud-env"  id="hud-env">—</span>
</div>

<!-- MOTION HINT -->
<div id="motion-hint">tilt or drag to play melody</div>

<!-- SAMPLE LOADER -->
<button id="sample-btn">SAMPLES</button>
<div id="sample-panel">
  <div class="sp-title">Load Stems</div>
  <div class="sp-row"><div class="sp-label">Kick</div><div class="sp-dot" id="dot-kick"></div><button class="sp-btn" data-stem="kick" id="spb-kick">load file…</button></div>
  <div class="sp-row"><div class="sp-label">Snare</div><div class="sp-dot" id="dot-snare"></div><button class="sp-btn" data-stem="snare" id="spb-snare">load file…</button></div>
  <div class="sp-row"><div class="sp-label">Hihat</div><div class="sp-dot" id="dot-hihat"></div><button class="sp-btn" data-stem="hihat" id="spb-hihat">load file…</button></div>
  <div class="sp-row"><div class="sp-label">Bass</div><div class="sp-dot" id="dot-bass"></div><button class="sp-btn" data-stem="bass" id="spb-bass">load file…</button></div>
  <div class="sp-row"><div class="sp-label">Chords</div><div class="sp-dot" id="dot-chords"></div><button class="sp-btn" data-stem="chords" id="spb-chords">load file…</button></div>
  <div class="sp-note">wav · mp3 · aiff<br>your samples replace synthesis</div>
</div>
<input type="file" id="sample-file-input" accept="audio/*">

<!-- ENGINES -->
<script src="js/environ.js"></script>
<script src="js/style.js"></script>
<script src="js/band.js"></script>

<!-- APP -->
<script>
(function () {
'use strict';

// ── STATE ─────────────────────────────────────────────────────────────────

var actx          = null;
var masterGain    = null;
var masterComp    = null;
var masterLP      = null;
var masterSat     = null;
var masterLimiter = null;

var started       = false;
var animID        = null;
var selectedStyle = 'lofi';

var canvas = document.getElementById('viz');
var ctx2d  = canvas.getContext('2d');
var DPR    = Math.min(window.devicePixelRatio || 1, 2);
var W = 0, H = 0;

// Motion
var tiltGamma    = 0;
var tiltBeta     = 0;
var motionEnergy = 0;
var hasMotion    = false;
var touchActive  = false;
var touchNormX   = 0.5;
var lastAccel    = { x:0, y:0, z:0 };

// Visual
var beatFlash  = 0;
var barPhase   = 0;
var lastSection = '';

// ── RESIZE ────────────────────────────────────────────────────────────────

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx2d.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize, { passive: true });
resize();

// ── STYLE SELECTOR ────────────────────────────────────────────────────────

var grid = document.getElementById('style-grid');
var subEl = document.getElementById('style-sub');

Styles.all().forEach(function (s) {
  var btn = document.createElement('button');
  btn.className = 'style-btn' + (s.id === selectedStyle ? ' selected' : '');
  btn.dataset.style = s.id;
  btn.innerHTML = '<span class="sn">' + s.label + '</span>';
  btn.addEventListener('click', function () {
    selectedStyle = s.id;
    document.querySelectorAll('.style-btn').forEach(function (b) {
      b.classList.toggle('selected', b.dataset.style === s.id);
    });
    subEl.textContent = s.sub;
  });
  grid.appendChild(btn);
});

// Show initial sub-label
subEl.textContent = Styles.get(selectedStyle).sub;

// ── ENVIRON BOOT ──────────────────────────────────────────────────────────

Environ.init();
(function pollEnv() {
  var locEl = document.getElementById('boot-loc');
  if (Environ.loaded) {
    locEl.textContent = Environ.description() || 'defaults ready';
  } else {
    setTimeout(pollEnv, 400);
  }
})();

// ── SENSORS ──────────────────────────────────────────────────────────────

function _addMotionListeners() {
  window.addEventListener('deviceorientation', function (e) {
    tiltGamma = e.gamma || 0; tiltBeta = e.beta || 0; hasMotion = true;
  }, { passive: true });
  window.addEventListener('devicemotion', function (e) {
    var a = e.acceleration || e.accelerationIncludingGravity;
    if (a) {
      var dx = (a.x||0) - lastAccel.x, dy = (a.y||0) - lastAccel.y, dz = (a.z||0) - lastAccel.z;
      var shake = Math.sqrt(dx*dx + dy*dy + dz*dz);
      motionEnergy = motionEnergy * 0.85 + Math.min(1, shake * 0.12) * 0.15;
      lastAccel = { x:a.x||0, y:a.y||0, z:a.z||0 };
    }
  }, { passive: true });
}

function _requestMotion() {
  var isCriOS = /CriOS/.test(navigator.userAgent || '');
  if (typeof DeviceMotionEvent === 'undefined') { return; }
  if (typeof DeviceMotionEvent.requestPermission !== 'function') {
    _addMotionListeners(); return;
  }
  if (isCriOS) { _addMotionListeners(); return; }
  DeviceMotionEvent.requestPermission()
    .then(function (r) { if (r === 'granted') _addMotionListeners(); })
    .catch(function () {});
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().catch(function(){});
  }
}

// Touch
document.addEventListener('touchstart', function (e) {
  touchActive = true; touchNormX = e.touches[0].clientX / W;
}, { passive: true });
document.addEventListener('touchmove', function (e) {
  touchNormX = e.touches[0].clientX / W;
}, { passive: true });
document.addEventListener('touchend', function () { touchActive = false; }, { passive: true });

// Mouse (desktop)
document.addEventListener('mousedown', function (e) {
  if (!hasMotion) { touchActive = true; touchNormX = e.clientX / W; }
});
document.addEventListener('mousemove', function (e) {
  if (!hasMotion && touchActive) touchNormX = e.clientX / W;
});
document.addEventListener('mouseup', function () { if (!hasMotion) touchActive = false; });

// ── AUDIO BUILD ───────────────────────────────────────────────────────────

function _buildAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // Final limiter — brick wall, prevents clipping
  masterLimiter = actx.createDynamicsCompressor();
  masterLimiter.threshold.value = -2;
  masterLimiter.knee.value      = 2;
  masterLimiter.ratio.value     = 20;
  masterLimiter.attack.value    = 0.001;
  masterLimiter.release.value   = 0.08;
  masterLimiter.connect(actx.destination);

  // Air shelf — gentle high-frequency boost (presence, not harshness)
  masterLP = actx.createBiquadFilter();
  masterLP.type = 'highshelf'; masterLP.frequency.value = 8000; masterLP.gain.value = 1.5;
  masterLP.connect(masterLimiter);

  // Bus compressor — glue the mix together
  masterComp = actx.createDynamicsCompressor();
  masterComp.threshold.value = -14;
  masterComp.knee.value      = 8;
  masterComp.ratio.value     = 2.2;
  masterComp.attack.value    = 0.012;
  masterComp.release.value   = 0.24;
  masterComp.connect(masterLP);

  // Gentle bus saturation — even harmonics warm the whole mix (like tape)
  var n = 256, satCurve = new Float32Array(n);
  for (var i = 0; i < n; i++) {
    var x = (i * 2) / n - 1;
    satCurve[i] = (1 + 3.4) * x / (1 + 3.4 * Math.abs(x));
  }
  masterSat = actx.createWaveShaper();
  masterSat.curve      = satCurve;
  masterSat.oversample = '2x';
  masterSat.connect(masterComp);

  masterGain = actx.createGain();
  masterGain.gain.value = 0.68;
  masterGain.connect(masterSat);
}

// ── BOOT ──────────────────────────────────────────────────────────────────

function begin() {
  if (started) return;
  started = true;

  _buildAudio();

  var bootEl = document.getElementById('boot');
  bootEl.classList.add('hidden');
  setTimeout(function () { bootEl.style.display = 'none'; }, 900);
  document.getElementById('hud').classList.add('show');
  document.getElementById('sample-btn').classList.add('show');

  animID = requestAnimationFrame(loop);
  _requestMotion();

  var hasTouchScreen = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if (!hasMotion && hasTouchScreen) {
    var hintEl = document.getElementById('motion-hint');
    hintEl.style.display = 'block';
    setTimeout(function () {
      hintEl.style.opacity = '0';
      setTimeout(function () { hintEl.style.display = 'none'; }, 1000);
    }, 4000);
  }

  document.addEventListener('visibilitychange', function () {
    if (!document.hidden && actx && actx.state === 'suspended') actx.resume();
  });

  var p = actx.resume();
  function _startBand() { Band.init(actx, masterGain, Styles.get(selectedStyle)); }
  if (p && p.then) { p.then(_startBand).catch(_startBand); } else { _startBand(); }
}

document.getElementById('play-btn').addEventListener('click', begin);
document.getElementById('play-btn').addEventListener('touchend', function (e) {
  e.preventDefault(); begin();
}, { passive: false });
document.addEventListener('touchstart', function () {
  if (actx && actx.state === 'suspended') actx.resume();
}, { passive: true });

// ── MAIN LOOP ─────────────────────────────────────────────────────────────

var lastFrameTime = 0;

function loop(now) {
  animID = requestAnimationFrame(loop);
  var dt = Math.min(0.05, (now - lastFrameTime) / 1000);
  lastFrameTime = now;

  // Feed human data
  var moving = hasMotion
    ? Math.abs(tiltGamma) > 8 || motionEnergy > 0.15
    : touchActive;

  if (hasMotion) {
    Band.updateHuman(tiltGamma, tiltBeta, motionEnergy, moving);
  } else {
    Band.updateTouch(touchNormX, 0.5, touchActive);
  }

  // Beat flash on kick
  if (Band.beat === 0 || Band.beat === 8) beatFlash = Math.min(1, beatFlash + 0.85);
  beatFlash *= 0.87;

  barPhase = (Band.beat % 16) / 16;

  // HUD
  var style   = Styles.get(selectedStyle);
  var keyStr  = Environ.label();
  var sec     = Band.section || '';
  document.getElementById('hud-key').textContent =
    style.label + '  ·  ' + keyStr.toUpperCase() + (sec ? '  ·  ' + sec.toUpperCase() : '');
  var envDesc = Environ.description();
  document.getElementById('hud-env').textContent =
    Band.bpm + ' bpm' + (envDesc ? '  ·  ' + envDesc : '');

  draw(now, style);
}

// ── VISUAL ────────────────────────────────────────────────────────────────

function draw(now, style) {
  var t = now * 0.001;
  var mc = Environ.modeColor();

  // Trail fade
  ctx2d.fillStyle = 'rgba(10,8,6,0.54)';
  ctx2d.fillRect(0, 0, W, H);

  var cx = W / 2;
  var cy = H / 2 - 24;

  // Beat pulse ring
  var pulseR = 82 + beatFlash * 30;
  var pulseA = 0.07 + beatFlash * 0.15;
  var grad = ctx2d.createRadialGradient(cx, cy, 0, cx, cy, pulseR * 2.2);
  grad.addColorStop(0, 'rgba(201,164,74,' + Math.min(0.35, pulseA * 1.3).toFixed(3) + ')');
  grad.addColorStop(0.5, 'rgba(201,164,74,' + pulseA.toFixed(3) + ')');
  grad.addColorStop(1, 'rgba(10,8,6,0)');
  ctx2d.fillStyle = grad;
  ctx2d.beginPath(); ctx2d.arc(cx, cy, pulseR * 2.2, 0, Math.PI * 2); ctx2d.fill();

  // 4-bar progress arc
  var arcR  = 92;
  var arcEnd = (Math.floor(Band.beat / 16) % 4 + barPhase) / 4;
  ctx2d.strokeStyle = 'rgba(201,164,74,0.11)';
  ctx2d.lineWidth = 2;
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, arcR, -Math.PI / 2, Math.PI * 2 * arcEnd - Math.PI / 2);
  ctx2d.stroke();

  // Style color accent ring (subtle, static)
  var styleRgb = hexToRgb(style.color || '#c9a44a');
  ctx2d.strokeStyle = 'rgba(' + styleRgb + ',0.07)';
  ctx2d.lineWidth = 8;
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, arcR + 10, 0, Math.PI * 2);
  ctx2d.stroke();

  // Tilt / touch indicator
  var tiltNorm = hasMotion
    ? Math.max(-1, Math.min(1, tiltGamma / 45))
    : (touchActive ? (touchNormX - 0.5) * 2 : 0);
  var tiltX = cx + tiltNorm * arcR * 0.82;

  ctx2d.fillStyle = 'rgba(201,164,74,' + (0.32 + Math.abs(tiltNorm) * 0.42) + ')';
  ctx2d.beginPath();
  ctx2d.arc(tiltX, cy, 6.5 + Math.abs(tiltNorm) * 4, 0, Math.PI * 2);
  ctx2d.fill();

  ctx2d.strokeStyle = 'rgba(201,164,74,0.13)';
  ctx2d.lineWidth = 1.5;
  ctx2d.beginPath(); ctx2d.moveTo(cx, cy); ctx2d.lineTo(tiltX, cy); ctx2d.stroke();

  // Kac label bars (affine E7 reference — the 8 scale degrees)
  var kac = [1,2,3,4,3,2,1,2];
  for (var i = 0; i < 8; i++) {
    var kx  = cx - 210 + i * 60;
    var hgt = 48 + kac[i] * 22;
    var y1  = cy + 155;
    var y2  = y1 - hgt * (0.65 + Math.sin(t * 0.45 + i * 0.8) * 0.08);
    var ka  = 0.18 + (kac[i] / 4) * 0.24;
    if (i === Band.bar % 8) ka += 0.16;
    ctx2d.strokeStyle = 'rgba(201,164,74,' + ka + ')';
    ctx2d.lineWidth   = 1.5;
    ctx2d.beginPath(); ctx2d.moveTo(kx, y1); ctx2d.lineTo(kx, y2); ctx2d.stroke();
    ctx2d.fillStyle = 'rgba(201,164,74,' + (ka * 0.65) + ')';
    ctx2d.beginPath(); ctx2d.arc(kx, y2, 2.8 + kac[i] * 0.25, 0, Math.PI * 2); ctx2d.fill();
  }

  // Scale degree dots — tilt selects one
  var scaleIdx = Math.round((tiltNorm + 1) / 2 * 6);
  var sc = Environ.scale(1);
  for (var si = 0; si < sc.length; si++) {
    var sdx = cx - 145 + si * 48;
    var sdy = cy - 52 + Math.sin(t * 0.28 + si * 0.85) * 7;
    var isAct = (si === scaleIdx && (hasMotion ? Math.abs(tiltGamma) > 5 : touchActive));
    var sA = isAct ? 0.88 : 0.16;
    var sR = isAct ? 6 : 3;
    ctx2d.fillStyle = 'rgba(201,164,74,' + sA + ')';
    ctx2d.beginPath(); ctx2d.arc(sdx, sdy, sR, 0, Math.PI * 2); ctx2d.fill();
    if (isAct) {
      ctx2d.strokeStyle = 'rgba(201,164,74,0.22)';
      ctx2d.lineWidth = 1;
      ctx2d.beginPath(); ctx2d.arc(sdx, sdy, sR + 5 + Math.sin(t * 7.5) * 2, 0, Math.PI * 2); ctx2d.stroke();
    }
  }

  // Section label
  var sec = Band.section || '';
  if (sec) {
    ctx2d.fillStyle = 'rgba(201,164,74,0.18)';
    ctx2d.font = '200 10px Futura, Century Gothic, sans-serif';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(sec.toUpperCase() + '  ·  BAR ' + (Band.bar + 1) + ' / 4', cx, cy - 118);
  }
}

// Hex → "r,g,b" string for rgba()
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return r + ',' + g + ',' + b;
}

// ── SAMPLE LOADER ────────────────────────────────────────────────────────

var _pendingStem = null;
var sampleBtn    = document.getElementById('sample-btn');
var samplePanel  = document.getElementById('sample-panel');
var sampleInput  = document.getElementById('sample-file-input');

sampleBtn.addEventListener('click', function (e) {
  e.stopPropagation();
  samplePanel.classList.toggle('show');
});

document.querySelectorAll('.sp-btn').forEach(function (btn) {
  btn.addEventListener('click', function (e) {
    e.stopPropagation();
    _pendingStem = btn.dataset.stem;
    sampleInput.click();
  });
});

sampleInput.addEventListener('change', function () {
  var file = sampleInput.files[0];
  if (!file || !_pendingStem || !actx) return;
  var stem = _pendingStem;
  _pendingStem = null;
  sampleInput.value = '';

  var reader = new FileReader();
  reader.onload = function (ev) {
    actx.decodeAudioData(ev.target.result, function (buffer) {
      Band.setStem(stem, buffer);
      var dot = document.getElementById('dot-' + stem);
      var lbl = document.getElementById('spb-' + stem);
      if (dot) dot.classList.add('loaded');
      if (lbl) lbl.textContent = file.name.replace(/\.[^.]+$/, '');
    }, function () {
      alert('Could not decode audio file. Try wav or mp3.');
    });
  };
  reader.readAsArrayBuffer(file);
});

// Close panel on outside click
document.addEventListener('click', function () { samplePanel.classList.remove('show'); });
samplePanel.addEventListener('click', function (e) { e.stopPropagation(); });

})();
</script>
