<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>Bloom — The Cone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#phase{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  font:100 0.9em Georgia;color:#c9a44a50;letter-spacing:0.4em;
  text-transform:uppercase;transition:color 1s;pointer-events:none;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="phase"></div>
<script>
var cv = document.getElementById('C');
var gl = cv.getContext('webgl', {alpha:false, antialias:false});
if(!gl){document.body.innerHTML='<p style="color:#c9a44a;text-align:center;margin-top:40vh;font-family:Georgia">WebGL required</p>';throw'';}

var DPR = Math.min(devicePixelRatio||1, 2);
function resize(){
  cv.width = innerWidth*DPR; cv.height = innerHeight*DPR;
  gl.viewport(0,0,cv.width,cv.height);
}
resize(); addEventListener('resize',resize);

var N = 40000;
var PHI = 1.618033988749895;

// You are INSIDE the cone. Looking UP.
// Particles surround you. Close ones are big and bright.
// The spiral rises above you. The phase transitions pass through you.

var VS = `
attribute vec3 aPos;
attribute float aFreq;
attribute float aPhase;
attribute float aSize;
uniform float uTime;
uniform float uEye;
uniform vec2 uRes;

varying float vTemp;
varying float vAlpha;

#define PHI 1.618033988749895

void main() {
  float t = uTime;
  float theta = aPos.x;
  float h = aPos.y;
  float r0 = aPos.z;

  // Cone: wider at top, narrow at bottom
  float coneR = 0.15 + h * 2.0;

  // Spiral rotation: golden ratio speeds
  float spin = theta + t * (0.06 + h * 0.15) * aFreq;
  float gmod = 1.0 + 0.1 * sin(spin / PHI + aPhase);
  float radius = coneR * r0 * gmod;

  // World position
  float wx = radius * cos(spin);
  float wz = radius * sin(spin);
  float wy = h * 8.0; // tall cone

  // Camera: inside the cone, looking UP
  // Eye position rises slowly (the ascent)
  float eyeY = uEye * 8.0;
  float relY = wy - eyeY;

  // Gentle orbit
  float ca = t * 0.04;
  float vx = wx * cos(ca) - wz * sin(ca);
  float vz = wx * sin(ca) + wz * cos(ca);

  // Perspective: CLOSE. You're inside this.
  float dist = sqrt(vx*vx + relY*relY + vz*vz);
  float fov = 0.8;
  float aspect = uRes.x / uRes.y;

  // Project
  float pz = vz + 0.5; // slight forward offset
  float pd = max(0.1, dist * fov);

  gl_Position = vec4(
    vx / pd,
    relY / pd * aspect,
    0.0, 1.0
  );

  // Size: CLOSE particles are BIG
  float nearness = 1.0 / max(0.3, dist);
  gl_PointSize = aSize * nearness * 4.0;
  gl_PointSize *= (uRes.x > 600.0 ? 1.5 : 1.2);
  gl_PointSize = clamp(gl_PointSize, 0.5, 12.0);

  // Alpha: close = bright, far = dim
  vAlpha = clamp(nearness * 0.4, 0.02, 0.4);

  // Particles behind camera: invisible
  if (relY < -2.0) vAlpha = 0.0;

  vTemp = h;
}
`;

var FS = `
precision mediump float;
varying float vTemp;
varying float vAlpha;

void main() {
  vec3 col;
  float h = vTemp;

  // Color spectrum: the phases of matter on the cone
  if (h < 0.08) {
    col = vec3(0.06, 0.02, 0.15); // quantum: deep violet
  } else if (h < 0.18) {
    float t = (h-0.08)/0.1;
    col = mix(vec3(0.06, 0.02, 0.15), vec3(0.12, 0.2, 0.45), t); // solid: blue
  } else if (h < 0.35) {
    float t = (h-0.18)/0.17;
    col = mix(vec3(0.12, 0.2, 0.45), vec3(0.05, 0.45, 0.35), t); // liquid: teal
  } else if (h < 0.55) {
    float t = (h-0.35)/0.2;
    col = mix(vec3(0.05, 0.45, 0.35), vec3(0.85, 0.7, 0.3), t); // gas: gold
  } else if (h < 0.75) {
    float t = (h-0.55)/0.2;
    col = mix(vec3(0.85, 0.7, 0.3), vec3(1.0, 0.75, 0.35), t); // plasma: bright gold
  } else if (h < 0.9) {
    float t = (h-0.75)/0.15;
    col = mix(vec3(1.0, 0.75, 0.35), vec3(1.0, 0.95, 0.85), t); // light: white-gold
  } else {
    col = vec3(1.0, 0.98, 0.92); // edge: pure light
  }

  gl_FragColor = vec4(col, vAlpha);
}
`;

function compile(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

var prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

// Particles: golden angle packing on the cone
var pos = new Float32Array(N * 3);
var freq = new Float32Array(N);
var phase = new Float32Array(N);
var size = new Float32Array(N);

var GA = 2.39996322; // golden angle

for (var i = 0; i < N; i++) {
  var h = Math.pow(i / N, 0.6); // more particles at bottom (denser = colder)
  var theta = i * GA;
  var r = 0.15 + Math.random() * 0.85;

  pos[i*3]   = theta;
  pos[i*3+1] = h;
  pos[i*3+2] = r;
  freq[i]  = 0.3 + Math.random() * 1.7;
  phase[i] = Math.random() * Math.PI * 2;
  size[i]  = 0.5 + Math.random() * 2.5;
}

function makeBuf(data, attr, comp) {
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
  var loc = gl.getAttribLocation(prog, attr);
  if(loc>=0){gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,comp,gl.FLOAT,false,0,0);}
  return {buf:buf,loc:loc,comp:comp};
}

var bufs = [
  makeBuf(pos,'aPos',3),
  makeBuf(freq,'aFreq',1),
  makeBuf(phase,'aPhase',1),
  makeBuf(size,'aSize',1)
];

var uTime=gl.getUniformLocation(prog,'uTime');
var uEye=gl.getUniformLocation(prog,'uEye');
var uRes=gl.getUniformLocation(prog,'uRes');

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
gl.clearColor(0,0,0,1);

var phaseNames = ['quantum','solid','liquid','gas','plasma','light','edge','?'];
var phaseH = [0, 0.08, 0.18, 0.35, 0.55, 0.75, 0.9, 1.0];
var phaseEl = document.getElementById('phase');

var t = 0;

function rebind(b){
  gl.bindBuffer(gl.ARRAY_BUFFER, b.buf);
  if(b.loc>=0) gl.vertexAttribPointer(b.loc, b.comp, gl.FLOAT, false, 0, 0);
}

function frame() {
  t += 0.016;

  // Ascent: steady climb, slow, with breath
  var climb = (t * 0.0015) % 1.3;
  var breath = 0.02 * Math.sin(t * 0.25);
  var eye = Math.min(1.05, climb + breath);
  if (climb > 1.1) eye = 2.2 - climb + breath;

  // Phase label
  var pname = '';
  for (var i = phaseH.length-1; i >= 0; i--) {
    if (eye >= phaseH[i]) { pname = phaseNames[i]; break; }
  }
  phaseEl.textContent = pname;

  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uEye, eye);
  gl.uniform2f(uRes, cv.width, cv.height);

  for(var b=0;b<bufs.length;b++) rebind(bufs[b]);
  gl.drawArrays(gl.POINTS, 0, N);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
