<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>Bloom — The Cone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#phase{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font:100 0.8em Georgia;color:#c9a44a40;letter-spacing:0.3em;
  text-transform:uppercase;transition:opacity 1s;}
#fps{position:fixed;top:8px;left:12px;font:100 0.7em Georgia;color:#c9a44a30;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="phase">root</div>
<div id="fps"></div>
<script>
// ═══════════════════════════════════════════════════════════
// BLOOM — The Cone
// ═══════════════════════════════════════════════════════════
// The spiral on a cone. Temperature is the axis.
// Bottom: quantum, cold, dense, violet.
// Rising: solid → liquid → gas → plasma → light → edge.
// Each phase transition strips a coupling dimension.
// You ascend by watching. The cone breathes.

var cv = document.getElementById('C');
var gl = cv.getContext('webgl', {alpha:false, antialias:false});
if(!gl){document.body.innerHTML='<p style="color:#c9a44a;text-align:center;margin-top:40vh;font-family:Georgia">WebGL required</p>';throw'';}

var DPR = Math.min(devicePixelRatio||1, 2);
function resize(){
  cv.width = innerWidth*DPR; cv.height = innerHeight*DPR;
  gl.viewport(0,0,cv.width,cv.height);
}
resize(); addEventListener('resize',resize);

var N = 30000;
var PHI = 1.618033988749895;

var VS = `
attribute vec3 aPos;
attribute float aFreq;
attribute float aPhase;
attribute float aSize;
uniform float uTime;
uniform float uAscent;
uniform vec2 uRes;

varying float vTemp;
varying float vAlpha;
varying float vGlow;

#define PHI 1.618033988749895

void main() {
  float t = uTime;
  float theta = aPos.x;
  float h = aPos.y;
  float r0 = aPos.z;

  float viewH = uAscent;
  float relH = h - viewH;

  // Cone widens with height
  float coneR = 0.2 + h * 1.5;

  // Spiral: golden angle rotation, speed varies with height
  float spiralAngle = theta + t * (0.08 + h * 0.2) * aFreq;

  // Golden modulation
  float goldenMod = 1.0 + 0.12 * sin(spiralAngle / PHI + aPhase);
  float radius = coneR * r0 * goldenMod;

  // 3D
  float x = radius * cos(spiralAngle);
  float z = radius * sin(spiralAngle);
  float y = relH * 4.0;

  // Gentle camera orbit
  float ca = t * 0.03;
  float cx2 = x * cos(ca) - z * sin(ca);
  float cz2 = x * sin(ca) + z * cos(ca);

  // Perspective
  float depth = 2.0 + cz2 * 0.3 - y * 0.15;
  float scale = 1.2 / max(0.2, depth);

  float aspect = uRes.y / uRes.x;
  gl_Position = vec4(cx2 * scale, (y * 0.7) * scale * aspect, cz2 * 0.001, 1.0);

  // Phase transition glow
  float pd = min(abs(h-0.15), min(abs(h-0.35), min(abs(h-0.55), abs(h-0.8))));
  float phaseGlow = smoothstep(0.04, 0.0, pd);

  // Depth fade
  float depthFade = clamp(1.5 / max(0.5, depth), 0.1, 1.0);

  gl_PointSize = (aSize + phaseGlow * 2.5) * scale * depthFade;
  gl_PointSize *= (uRes.x > 600.0 ? 1.3 : 0.9);
  gl_PointSize = clamp(gl_PointSize, 0.5, 6.0);

  vTemp = h;
  vAlpha = 0.12 * depthFade * (0.6 + 0.4 * goldenMod);
  vAlpha *= (1.0 + phaseGlow * 0.5);
  vAlpha = clamp(vAlpha, 0.01, 0.25);
  vGlow = phaseGlow;
}
`;

var FS = `
precision mediump float;
varying float vTemp;
varying float vAlpha;
varying float vGlow;

void main() {
  vec3 col;
  float h = vTemp;

  if (h < 0.08) {
    // Quantum: deep violet. The root.
    col = mix(vec3(0.03, 0.01, 0.08), vec3(0.08, 0.03, 0.2), h/0.08);
  } else if (h < 0.18) {
    // Solid: crystalline blue-white
    float t = (h-0.08)/0.1;
    col = mix(vec3(0.08, 0.03, 0.2), vec3(0.15, 0.25, 0.45), t);
  } else if (h < 0.35) {
    // Liquid: flowing teal-green
    float t = (h-0.18)/0.17;
    col = mix(vec3(0.15, 0.25, 0.45), vec3(0.08, 0.4, 0.35), t);
  } else if (h < 0.55) {
    // Gas: warm gold
    float t = (h-0.35)/0.2;
    col = mix(vec3(0.08, 0.4, 0.35), vec3(0.78, 0.64, 0.29), t);
  } else if (h < 0.75) {
    // Plasma: hot orange-white
    float t = (h-0.55)/0.2;
    col = mix(vec3(0.78, 0.64, 0.29), vec3(0.95, 0.7, 0.3), t);
  } else if (h < 0.9) {
    // Approaching edge: brilliant white-gold
    float t = (h-0.75)/0.15;
    col = mix(vec3(0.95, 0.7, 0.3), vec3(1.0, 0.95, 0.85), t);
  } else {
    // The edge: pure light
    col = vec3(1.0, 0.97, 0.9);
  }

  // Phase transition rings glow brighter
  col += vGlow * vec3(0.2, 0.15, 0.05);

  gl_FragColor = vec4(col, vAlpha);
}
`;

function compile(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  return s;
}

var prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

// Particles: distributed on the cone using golden angle
var pos = new Float32Array(N * 3);
var freq = new Float32Array(N);
var phase = new Float32Array(N);
var size = new Float32Array(N);

var GOLDEN_ANGLE = 2.39996322; // 2π(2-φ)

for (var i = 0; i < N; i++) {
  var h = Math.pow(Math.random(), 0.8); // slight bias toward bottom (more structure there)
  var theta = i * GOLDEN_ANGLE; // golden angle packing = most uniform
  var r = 0.2 + Math.random() * 0.8;

  // Cluster more particles near phase transitions
  var nearTransition = Math.min(
    Math.abs(h-0.15), Math.abs(h-0.35),
    Math.abs(h-0.55), Math.abs(h-0.8)
  );
  if (nearTransition < 0.03) r *= 0.6; // tighter at transitions

  pos[i*3]   = theta;
  pos[i*3+1] = h;
  pos[i*3+2] = r;
  freq[i]  = 0.4 + Math.random() * 1.6;
  phase[i] = Math.random() * Math.PI * 2;
  size[i]  = 0.6 + Math.random() * 1.8;
}

function makeBuf(data, attr, comp) {
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
  var loc = gl.getAttribLocation(prog, attr);
  if(loc>=0){gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,comp,gl.FLOAT,false,0,0);}
  return {buf:buf,loc:loc,comp:comp};
}

var bPos=makeBuf(pos,'aPos',3);
var bFreq=makeBuf(freq,'aFreq',1);
var bPhase=makeBuf(phase,'aPhase',1);
var bSize=makeBuf(size,'aSize',1);

var uTime=gl.getUniformLocation(prog,'uTime');
var uAscent=gl.getUniformLocation(prog,'uAscent');
var uRes=gl.getUniformLocation(prog,'uRes');

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
gl.clearColor(0,0,0,1);

var phaseNames = ['quantum','solid','liquid','gas','plasma','light','edge','?'];
var phaseHeights = [0, 0.08, 0.18, 0.35, 0.55, 0.75, 0.9, 1.0];
var phaseEl = document.getElementById('phase');
var fpsEl = document.getElementById('fps');

var t = 0;
var frameCount = 0;
var lastFpsTime = performance.now();

function rebind(b){
  gl.bindBuffer(gl.ARRAY_BUFFER, b.buf);
  if(b.loc>=0) gl.vertexAttribPointer(b.loc, b.comp, gl.FLOAT, false, 0, 0);
}

function frame() {
  t += 0.016;
  frameCount++;

  // Slow ascent, breathes (sinusoidal wobble on top of linear climb)
  var climb = (t * 0.002) % 1.3;
  var breath = 0.03 * Math.sin(t * 0.3);
  var ascent = Math.min(1.05, climb + breath);
  if (climb > 1.1) ascent = 2.2 - climb + breath; // descend back

  // Phase label
  var pname = '?';
  for (var i = phaseHeights.length-1; i >= 0; i--) {
    if (ascent >= phaseHeights[i]) { pname = phaseNames[i]; break; }
  }
  phaseEl.textContent = pname;

  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uAscent, ascent);
  gl.uniform2f(uRes, cv.width, cv.height);

  rebind(bPos); rebind(bFreq); rebind(bPhase); rebind(bSize);
  gl.drawArrays(gl.POINTS, 0, N);

  var now = performance.now();
  if (now - lastFpsTime > 1000) {
    fpsEl.textContent = Math.round(frameCount*1000/(now-lastFpsTime));
    frameCount=0; lastFpsTime=now;
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
