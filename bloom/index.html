<!-- what is what? Does this preserve the wonder? -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>Bloom — The Cone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#label{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font:100 1em Georgia;color:#c9a44a;letter-spacing:0.4em;
  text-transform:uppercase;opacity:0.6;pointer-events:none;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="label"></div>
<script>
var cv = document.getElementById('C');
var gl = cv.getContext('webgl', {alpha:false, antialias:false});
if(!gl){document.body.innerHTML='<p style="color:#c9a44a;text-align:center;margin-top:40vh;font-family:Georgia">WebGL required</p>';throw'';}

var DPR = Math.min(devicePixelRatio||1, 2);
function resize(){
  cv.width = innerWidth*DPR; cv.height = innerHeight*DPR;
  gl.viewport(0,0,cv.width,cv.height);
}
resize(); addEventListener('resize',resize);

var N = 25000;

// APPROACH FIX: bright, big, centered, see the whole shape.
// No more ghost particles. These are SOLID.

var VS = `
attribute vec3 aPos;
attribute float aPhase;
uniform float uTime;
uniform float uEye;
uniform float uAspect;
varying vec3 vCol;

#define PHI 1.618033988749895

void main() {
  float t = uTime;
  float theta = aPos.x;
  float h = aPos.y;
  float r0 = aPos.z;

  // Cone shape
  float coneR = 0.1 + h * 1.0;
  float spin = theta + t * 0.08 * (0.5 + h * 0.5);
  float radius = coneR * r0;

  // World position
  float wx = radius * cos(spin);
  float wz = radius * sin(spin);
  float wy = (h - 0.5) * 2.0;

  // Camera: OUTSIDE, looking at the whole cone, slowly orbiting
  float camDist = 2.5;
  float camAngle = t * 0.06;
  float camY = (uEye - 0.5) * 0.8;

  // Rotate world by camera
  float rx = wx * cos(camAngle) - wz * sin(camAngle);
  float rz = wx * sin(camAngle) + wz * cos(camAngle);
  float ry = wy - camY;

  // Simple perspective
  float depth = camDist + rz;
  float pd = max(0.3, depth);
  float px = rx / pd;
  float py = ry / pd;

  gl_Position = vec4(px * 1.8, py * 1.8 * uAspect, rz * 0.01, 1.0);

  // Point size
  float nearScale = camDist / pd;
  gl_PointSize = (2.5 + nearScale * 3.0) * (uAspect > 1.5 ? 1.0 : 1.5);

  // PERCEPTION ZONE
  // Our slice of the spiral is IN FOCUS. Below: proven. Above: unknown.
  float distFromEye = abs(h - uEye);
  float inFocus = 1.0 - smoothstep(0.0, 0.35, distFromEye);

  // Above perception: particles dissolve (the unknown)
  float aboveFade = 1.0;
  if (h > uEye + 0.12) {
    aboveFade = 1.0 - smoothstep(0.0, 0.4, h - uEye - 0.12);
    gl_PointSize *= 0.5 + aboveFade * 0.5; // shrink into mystery
  }

  // Below perception: clear but receding (what we proved)
  float belowFade = 1.0;
  if (h < uEye - 0.25) {
    belowFade = 0.4 + 0.6 * (1.0 - smoothstep(0.0, 0.5, uEye - 0.25 - h));
  }

  gl_PointSize = clamp(gl_PointSize, 1.5, 14.0);

  // Color by height — VIVID phases
  if (h < 0.1) {
    vCol = mix(vec3(0.2, 0.08, 0.4), vec3(0.25, 0.12, 0.55), h/0.1);
  } else if (h < 0.25) {
    float tt = (h-0.1)/0.15;
    vCol = mix(vec3(0.25, 0.12, 0.55), vec3(0.2, 0.45, 0.7), tt);
  } else if (h < 0.45) {
    float tt = (h-0.25)/0.2;
    vCol = mix(vec3(0.2, 0.45, 0.7), vec3(0.12, 0.7, 0.55), tt);
  } else if (h < 0.65) {
    float tt = (h-0.45)/0.2;
    vCol = mix(vec3(0.12, 0.7, 0.55), vec3(0.95, 0.8, 0.35), tt);
  } else if (h < 0.85) {
    float tt = (h-0.65)/0.2;
    vCol = mix(vec3(0.95, 0.8, 0.35), vec3(1.0, 0.9, 0.55), tt);
  } else {
    float tt = (h-0.85)/0.15;
    vCol = mix(vec3(1.0, 0.9, 0.55), vec3(1.0, 1.0, 0.95), tt);
  }

  // In-focus zone GLOWS, edges dim
  vCol *= (0.5 + inFocus * 0.5) * aboveFade * belowFade;

  // Dim behind camera
  if (depth < 0.5) vCol *= 0.15;
}
`;

var FS = `
precision mediump float;
varying vec3 vCol;
void main() {
  // SOLID. Not ghost. Alpha 0.5 minimum.
  gl_FragColor = vec4(vCol, 0.55);
}
`;

function compile(type, src) {
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

var prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
gl.useProgram(prog);

var pos = new Float32Array(N * 3);
var phases = new Float32Array(N);
var GA = 2.39996322;

for (var i = 0; i < N; i++) {
  var h = Math.pow(i / N, 0.65);
  var theta = i * GA;
  var r = 0.2 + Math.random() * 0.8;

  pos[i*3]   = theta;
  pos[i*3+1] = h;
  pos[i*3+2] = r;
  phases[i]  = Math.random() * 6.28;
}

function makeBuf(data, attr, comp) {
  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, data, gl.STATIC_DRAW);
  var loc = gl.getAttribLocation(prog, attr);
  if(loc>=0){gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,comp,gl.FLOAT,false,0,0);}
  return {buf:buf,loc:loc,comp:comp};
}

var b1 = makeBuf(pos, 'aPos', 3);
var b2 = makeBuf(phases, 'aPhase', 1);

var uTime = gl.getUniformLocation(prog, 'uTime');
var uEye = gl.getUniformLocation(prog, 'uEye');
var uAspect = gl.getUniformLocation(prog, 'uAspect');

// NOT additive. Standard alpha blend. SOLID particles.
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
gl.clearColor(0, 0, 0, 1);

var labelEl = document.getElementById('label');
var phaseNames = ['quantum','solid','liquid','gas','plasma','light','edge','?'];
var phaseH = [0, 0.1, 0.25, 0.45, 0.65, 0.85, 0.95, 1.0];

var t = 0;

function rebind(b){
  gl.bindBuffer(gl.ARRAY_BUFFER, b.buf);
  if(b.loc>=0) gl.vertexAttribPointer(b.loc, b.comp, gl.FLOAT, false, 0, 0);
}

function frame() {
  t += 0.016;

  // Slow ascent with breathing
  var climb = (t * 0.0012) % 1.4;
  var eye = Math.min(1.1, climb);
  if (climb > 1.1) eye = 2.2 - climb;
  eye += 0.02 * Math.sin(t * 0.2);

  var pname = '';
  for (var i = phaseH.length-1; i >= 0; i--) {
    if (eye >= phaseH[i]) { pname = phaseNames[i]; break; }
  }
  labelEl.textContent = pname;

  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uEye, eye);
  gl.uniform1f(uAspect, cv.width / cv.height);

  rebind(b1); rebind(b2);
  gl.drawArrays(gl.POINTS, 0, N);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
