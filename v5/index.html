<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>GUMP · v5</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #0a0a0a;
  color: #e8e0d0;
  font-family: Georgia, serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-height: 100vh;
  overflow: hidden;
}
header {
  padding: 22px 24px 14px;
  border-bottom: 1px solid #161616;
  flex-shrink: 0;
}
header h1 {
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 10px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #444;
}
header h2 {
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #222;
  margin-top: 3px;
}
#now-playing {
  padding: 20px 24px 18px;
  border-bottom: 1px solid #161616;
  flex-shrink: 0;
  min-height: 76px;
}
#track-name {
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 22px;
  letter-spacing: 0.5px;
  color: #e8e0d0;
  margin-bottom: 6px;
  transition: opacity 0.3s;
}
#track-meta {
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 10px;
  color: #383838;
  letter-spacing: 3px;
  text-transform: uppercase;
}
#track-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.track-btn {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 17px 24px;
  background: none;
  border: none;
  border-bottom: 1px solid #0f0f0f;
  cursor: pointer;
  text-align: left;
  color: #333;
  transition: color 0.25s, background 0.15s;
  -webkit-appearance: none;
  position: relative;
}
.track-btn:active { background: #0d0d0d; }
.track-btn.active {
  color: #e8e0d0;
  background: #0d0d0d;
}
.t-name {
  flex: 1;
  font-family: Georgia, serif;
  font-size: 15px;
  line-height: 1.3;
  color: inherit;
}
.t-info {
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: #222;
  text-align: right;
  line-height: 1.6;
}
.track-btn.active .t-info { color: #444; }
.track-btn.loading .t-name::after {
  content: ' …';
  color: #444;
}
#controls {
  padding: 14px 24px;
  border-top: 1px solid #161616;
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}
.ctrl-btn {
  flex: 1;
  padding: 12px 6px;
  background: #0d0d0d;
  border: 1px solid #1a1a1a;
  color: #383838;
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 1px;
  transition: all 0.2s;
  -webkit-appearance: none;
  line-height: 1;
}
.ctrl-btn:active { background: #111; }
.ctrl-btn.active {
  background: #131313;
  color: #c8b89a;
  border-color: #2a2a2a;
}
#status-bar {
  padding: 9px 24px;
  font-family: Futura, 'Century Gothic', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  color: #252525;
  text-transform: uppercase;
  border-top: 1px solid #0f0f0f;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.pulse {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #1a1a1a;
  flex-shrink: 0;
  transition: background 0.4s;
}
.pulse.on {
  background: #7a6545;
  animation: throb 1.2s ease-in-out infinite;
}
@keyframes throb {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.35; transform: scale(0.65); }
}
</style>
</head>
<body>

<header>
  <h1>Grand Unified Music Project</h1>
  <h2>v5 · stems</h2>
</header>

<div id="now-playing">
  <div id="track-name">—</div>
  <div id="track-meta">select a track to begin</div>
</div>

<div id="track-list"></div>

<div id="controls">
  <button class="ctrl-btn" id="btn-play">Play</button>
  <button class="ctrl-btn" id="btn-vocals">Vocals</button>
  <button class="ctrl-btn" id="btn-motion">Motion</button>
</div>

<div id="status-bar">
  <span class="pulse" id="pulse"></span>
  <span id="status-text">ready</span>
</div>

<script>
var MANIFEST = [
  { name: "True Blind",               slug: "True_blind",               bpm: 143.6, key: "F# min" },
  { name: "1+1=3",                    slug: "1p1=3",                    bpm: 136.0, key: "C min"  },
  { name: "Gap Breath",               slug: "Gap_breath",               bpm: 129.2, key: "Eb min" },
  { name: "The 3",                    slug: "The_3",                    bpm:  99.4, key: "D min"  },
  { name: "You There?",               slug: "You_there_",               bpm:  99.4, key: "C min"  },
  { name: "Clean Glass",              slug: "Clean_Glass",              bpm:  95.7, key: "C min"  },
  { name: "Dirty Glass",              slug: "Dirty_Glass",              bpm:  95.7, key: "C min"  },
  { name: "Stale Cheese Receipt",      slug: "Stale_Cheese_Receipt",      bpm:  69.8, key: "C min"  },
  { name: "Stay With Me in the Gap",  slug: "Stay_with_me_in_the_gap",  bpm:  66.3, key: "G min"  },
];

var NOTE_FREQ = {
  'C':261.63,'C#':277.18,'Db':277.18,'D':293.66,'D#':311.13,'Eb':311.13,
  'E':329.63,'F':349.23,'F#':369.99,'Gb':369.99,'G':392.00,
  'G#':415.30,'Ab':415.30,'A':440.00,'A#':466.16,'Bb':466.16,'B':493.88
};
var MINOR = [0,2,3,5,7,8,10];

function keyToFreqs(keyStr) {
  var root = keyStr.split(' ')[0];
  var base = NOTE_FREQ[root] || 261.63;
  // two octaves
  var intervals = MINOR.concat(MINOR.map(function(i){ return i+12; }));
  return intervals.map(function(i){ return base * Math.pow(2, i/12); });
}

var actx = null, masterGain = null;
var buffers = {};
var backingNode = null, backingGain = null;
var vocalNode   = null, vocalGain   = null;
var srcStartTime = 0;
var playing = false, vocalsOn = false, motionOn = false;
var currentSlug = null;
var currentScaleFreqs = [];
var melodyOsc = null, melodyOscGain = null;
var lastNoteIdx = -1;

function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.85;
  masterGain.connect(actx.destination);
}

function loadBuffer(url) {
  return fetch(url)
    .then(function(r){ return r.arrayBuffer(); })
    .then(function(ab){ return actx.decodeAudioData(ab); });
}

function preload(track) {
  if (buffers[track.slug] && buffers[track.slug].backing) return Promise.resolve();
  buffers[track.slug] = null;
  setStatus('loading ' + track.name + '…');
  return Promise.all([
    loadBuffer('stems/' + track.slug + '_backing.mp3'),
    loadBuffer('stems/' + track.slug + '_melody.mp3'),
  ]).then(function(results) {
    buffers[track.slug] = { backing: results[0], melody: results[1] };
    setStatus('ready');
  }).catch(function() {
    setStatus('load error');
  });
}

function barLen(bpm) { return (60 / bpm) * 4; }

function nextBarTime(bpm) {
  if (!playing || srcStartTime === 0) return actx.currentTime + 0.05;
  var bl = barLen(bpm);
  var elapsed = actx.currentTime - srcStartTime;
  var bars = Math.floor(elapsed / bl);
  return srcStartTime + (bars + 1) * bl;
}

function fadeStop(node, gain, ms) {
  if (!gain) return;
  gain.gain.setTargetAtTime(0, actx.currentTime, ms / 4000);
  var n = node, g = gain;
  setTimeout(function(){ try{ n.stop(); g.disconnect(); }catch(e){} }, ms + 300);
}

function makeStem(buf, startAt, targetVol, offset) {
  var g = actx.createGain();
  var n = actx.createBufferSource();
  n.buffer = buf;
  n.loop = true;
  n.connect(g);
  g.connect(masterGain);
  g.gain.setValueAtTime(0, startAt);
  g.gain.linearRampToValueAtTime(targetVol, startAt + 0.7);
  n.start(startAt, offset || 0);
  return { node: n, gain: g };
}

function switchTo(slug) {
  var buf = buffers[slug];
  if (!buf || !buf.backing) { setStatus('still loading…'); return; }

  var oldTrack = MANIFEST.filter(function(t){ return t.slug === currentSlug; })[0];
  var newTrack = MANIFEST.filter(function(t){ return t.slug === slug; })[0];

  var switchAt = (playing && oldTrack) ? nextBarTime(oldTrack.bpm) : actx.currentTime + 0.05;
  var fadeMs   = (playing && oldTrack) ? Math.min(800, barLen(oldTrack.bpm) * 400) : 300;

  fadeStop(backingNode, backingGain, fadeMs);
  fadeStop(vocalNode,   vocalGain,   fadeMs);
  backingNode = null; backingGain = null;
  vocalNode   = null; vocalGain   = null;

  var b = makeStem(buf.backing, switchAt, 1.0);
  backingNode = b.node; backingGain = b.gain;

  if (vocalsOn && buf.melody) {
    var v = makeStem(buf.melody, switchAt, 0.72);
    vocalNode = v.node; vocalGain = v.gain;
  }

  srcStartTime = switchAt;
  currentSlug = slug;
  currentScaleFreqs = keyToFreqs(newTrack.key);
  playing = true;

  updateUI();
  setPulse(true);

  // Preload next in background
  var idx = MANIFEST.findIndex(function(t){ return t.slug === slug; });
  var next = MANIFEST[(idx + 1) % MANIFEST.length];
  if (!buffers[next.slug]) preload(next);
}

function stopAll() {
  fadeStop(backingNode, backingGain, 400);
  fadeStop(vocalNode,   vocalGain,   400);
  backingNode = null; backingGain = null;
  vocalNode   = null; vocalGain   = null;
  playing = false; srcStartTime = 0;
  stopMelodyOsc();
  setPulse(false);
  setStatus('stopped');
  updateUI();
}

// — Human melody —
function startMelodyOsc(freq) {
  stopMelodyOsc();
  if (!actx || !motionOn || !playing) return;
  melodyOsc = actx.createOscillator();
  melodyOscGain = actx.createGain();
  melodyOsc.type = 'sine';
  melodyOsc.frequency.value = freq;
  melodyOscGain.gain.setValueAtTime(0, actx.currentTime);
  melodyOscGain.gain.linearRampToValueAtTime(0.14, actx.currentTime + 0.04);
  melodyOsc.connect(melodyOscGain);
  melodyOscGain.connect(masterGain);
  melodyOsc.start();
}

function stopMelodyOsc() {
  if (melodyOscGain) melodyOscGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.08);
  if (melodyOsc) {
    var o = melodyOsc;
    setTimeout(function(){ try{ o.stop(); }catch(e){} }, 120);
  }
  melodyOsc = null; melodyOscGain = null;
}

function onOrientation(e) {
  if (!motionOn || !playing || !currentScaleFreqs.length) return;
  var beta = Math.max(-90, Math.min(90, e.beta || 0));
  var norm = (beta + 90) / 180;
  var idx = Math.min(Math.floor(norm * currentScaleFreqs.length), currentScaleFreqs.length - 1);
  if (idx !== lastNoteIdx) {
    lastNoteIdx = idx;
    startMelodyOsc(currentScaleFreqs[idx]);
  }
}

// — UI —
function buildList() {
  var list = document.getElementById('track-list');
  MANIFEST.forEach(function(track) {
    var btn = document.createElement('button');
    btn.className = 'track-btn';
    btn.dataset.slug = track.slug;
    btn.innerHTML =
      '<span class="t-name">' + track.name + '</span>' +
      '<span class="t-info">' + Math.round(track.bpm) + ' BPM<br>' + track.key + '</span>';

    btn.addEventListener('click', function() {
      initAudio();
      var b = btn;
      if (!buffers[track.slug] || !buffers[track.slug].backing) {
        b.classList.add('loading');
        preload(track).then(function() {
          b.classList.remove('loading');
          switchTo(track.slug);
        });
      } else {
        switchTo(track.slug);
      }
    });
    list.appendChild(btn);
  });
}

function updateUI() {
  var track = MANIFEST.filter(function(t){ return t.slug === currentSlug; })[0];
  document.getElementById('track-name').textContent = track ? track.name : '—';
  document.getElementById('track-meta').textContent = track
    ? Math.round(track.bpm) + ' BPM · ' + track.key
    : 'select a track to begin';
  document.querySelectorAll('.track-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.slug === currentSlug);
  });
  document.getElementById('btn-play').textContent = playing ? 'Stop' : 'Play';
  document.getElementById('btn-play').classList.toggle('active', playing);
  document.getElementById('btn-vocals').classList.toggle('active', vocalsOn);
  document.getElementById('btn-motion').classList.toggle('active', motionOn);
}

function setStatus(t) { document.getElementById('status-text').textContent = t; }
function setPulse(on) { document.getElementById('pulse').classList.toggle('on', on); }

document.getElementById('btn-play').addEventListener('click', function() {
  initAudio();
  if (playing) { stopAll(); }
  else if (currentSlug) { switchTo(currentSlug); }
  else { setStatus('pick a track first'); }
});

document.getElementById('btn-vocals').addEventListener('click', function() {
  initAudio();
  vocalsOn = !vocalsOn;
  updateUI();
  if (!playing || !currentSlug) return;

  var buf = buffers[currentSlug];
  if (vocalsOn && buf && buf.melody && !vocalNode) {
    var elapsed = actx.currentTime - srcStartTime;
    var offset = elapsed % buf.melody.duration;
    var v = makeStem(buf.melody, actx.currentTime, 0.72, offset);
    vocalNode = v.node; vocalGain = v.gain;
  } else if (!vocalsOn && vocalNode) {
    fadeStop(vocalNode, vocalGain, 400);
    vocalNode = null; vocalGain = null;
  }
});

document.getElementById('btn-motion').addEventListener('click', function() {
  initAudio();
  if (motionOn) {
    motionOn = false;
    stopMelodyOsc();
    lastNoteIdx = -1;
    updateUI();
    setStatus('motion off');
    return;
  }
  function enable() {
    window.addEventListener('deviceorientation', onOrientation);
    motionOn = true;
    updateUI();
    setStatus('tilt to play notes');
  }
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(function(p) {
        if (p === 'granted') enable();
        else setStatus('motion denied');
      })
      .catch(function() { setStatus('motion error'); });
  } else {
    enable();
  }
});

buildList();
updateUI();
</script>
</body>
</html>
