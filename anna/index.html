<!DOCTYPE html>
<html lang="en">
<head>

<title>Anna</title>

body{background:#07050f;color:#c4a088;font-family:Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:40px 24px;}

<div class="wrap">
  <h1>ANNA</h1>
