<style>
:root{--bg:#0a0a0f;--fg:#e8e4dc;--gold:#c9a44a;--dim:#555;--glow:#f4d990;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--fg);font-family:Georgia,serif;min-height:100vh;}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;}
#gate input{background:#111118;border:1px solid #222;color:var(--fg);font-family:Georgia;font-size:1em;padding:12px 20px;border-radius:12px;outline:none;text-align:center;width:280px;}
#gate input:focus{border-color:var(--gold);}
#gate .hint{color:#ffffff06;font-size:0.6em;margin-top:12px;letter-spacing:0.2em;}
#content{display:none;max-width:760px;margin:0 auto;padding:40px 24px 120px;line-height:1.9;}
h1{font:200 1.8em Georgia;color:var(--gold);text-align:center;letter-spacing:0.1em;margin-bottom:6px;}
h1 span{display:block;font-size:0.3em;color:var(--dim);letter-spacing:0.25em;margin-top:6px;}
h2{font:200 1.15em Georgia;color:var(--gold);letter-spacing:0.06em;margin:45px 0 14px;border-bottom:1px solid #ffffff08;padding-bottom:8px;}
h3{font:200 0.95em Georgia;color:var(--glow);margin:25px 0 8px;}
p{margin:10px 0;color:#ccc;font-size:0.92em;}
strong{color:var(--glow);font-weight:normal;}
em{color:#ffffff30;}
hr{border:none;border-top:1px solid #ffffff08;margin:30px 0;}
table{border-collapse:collapse;width:100%;margin:14px 0;font-size:0.85em;}
th,td{border:1px solid #ffffff10;padding:6px 10px;text-align:left;}
th{color:var(--gold);font-weight:normal;}
.math{font-family:Courier New,monospace;color:var(--gold);font-size:0.85em;background:#111118;padding:8px 14px;border-radius:6px;display:block;margin:12px 0;border-left:2px solid #c9a44a20;}
.whisper{color:#ffffff15;font-size:0.75em;text-align:center;margin:20px 0;letter-spacing:0.12em;font-style:italic;}
.tabs{text-align:center;margin:20px 0;}
.tab{color:var(--dim);cursor:pointer;margin:0 12px;font-size:0.85em;letter-spacing:0.08em;}
.tab.active{color:var(--gold);border-bottom:1px solid var(--gold);padding-bottom:2px;}
</style>
</head>

async function deriveKey(pwd){var enc=new TextEncoder();var h=await crypto.subtle.digest("SHA-256",enc.encode(pwd));var phi=new Float64Array([1.6180339887498948]);var pi2=new Float64Array([9.869604401089358]);for(var i=0;i<137;i++){if(i===33){var c=new Uint8Array(new Uint8Array(h).length+8);c.set(new Uint8Array(h));c.set(new Uint8Array(phi.buffer),new Uint8Array(h).length);h=await crypto.subtle.digest("SHA-256",c);}else if(i===28){var c=new Uint8Array(new Uint8Array(h).length+8);c.set(new Uint8Array(h));c.set(new Uint8Array(pi2.buffer),new Uint8Array(h).length);h=await crypto.subtle.digest("SHA-256",c);}else{h=await crypto.subtle.digest("SHA-256",h);}}return new Uint8Array(h);}
async function decrypt(enc,key){var stream=[];var block=key;while(stream.length<enc.length){block=new Uint8Array(await crypto.subtle.digest("SHA-256",block));for(var i=0;i<block.length;i++)stream.push(block[i]);}var r=new Uint8Array(enc.length);for(var i=0;i<enc.length;i++)r[i]=enc[i]^stream[i];return r;}
