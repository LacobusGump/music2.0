<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GUMP</title>
<meta name="description" content="">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#05060f;overflow:hidden;font-family:Futura,"Century Gothic",sans-serif;}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
svg{width:min(100vw,140vh);height:auto;display:block;}

/* a single breathing cue invites the click — no words */
@keyframes lamp{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes twk{0%,100%{opacity:.2}50%{opacity:.9}}
@keyframes drift{0%{transform:translateY(0)}50%{transform:translateY(-5px)}100%{transform:translateY(0)}}
.lamp{animation:lamp 3.4s ease-in-out infinite;}
.twk{animation:twk 3s ease-in-out infinite;}
.smoke{transform-box:fill-box;transform-origin:bottom center;animation:drift 6s ease-in-out infinite;}

/* the whole front is two doors. they swing open. */
.leaf{transform-box:fill-box;transition:transform 2.6s cubic-bezier(.55,.05,.25,1);}
.leaf-l{transform-origin:left center;}
.leaf-r{transform-origin:right center;}
.open .leaf-l{transform:perspective(2200px) rotateY(-112deg);}
.open .leaf-r{transform:perspective(2200px) rotateY(112deg);}
.leaf-shade{opacity:0;transition:opacity 1.2s;}
.open .leaf-shade{opacity:.5;}

/* interior fades up as the doors part */
.interior{opacity:0;transition:opacity 1.6s 1.1s;}
.open .interior{opacity:1;}
.ilabel{font-family:Futura,sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;fill:rgba(150,190,230,0.0);transition:fill 1s 1.6s;}
.open .ilabel{fill:rgba(170,205,240,0.45);}

/* music spots + hidden basement door appear only once you're inside */
.spot{cursor:pointer;}
.spot circle.h{opacity:0;transition:opacity .3s;}
.spot:hover circle.h{opacity:1;}
.spot .stag{opacity:0;transition:opacity .25s;}
.spot:hover .stag{opacity:1;}
.reveal{opacity:0;pointer-events:none;transition:opacity 1s 1.8s;}
.open .reveal{opacity:1;pointer-events:auto;}

/* step inside */
.enter{cursor:pointer;}
.enter rect{transition:fill .3s;}
.enter:hover rect{fill:rgba(120,200,255,0.16);}

/* the hidden door-to-nowhere — faint, you have to find it */
#secret{cursor:pointer;opacity:.0;transition:opacity .4s;}
.open #secret{opacity:.14;}
#secret:hover{opacity:.7;}

.hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);font-size:11px;letter-spacing:0.24em;text-transform:uppercase;color:rgba(150,190,230,0.28);pointer-events:none;transition:opacity .8s;}
.gone{opacity:0;}
</style>
</head>
<body>
<div class="stage" id="stage">
<svg id="house" viewBox="0 0 1000 820" role="img" aria-label="A house">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#070a22"/><stop offset="1" stop-color="#0c1030"/></linearGradient>
    <radialGradient id="moon" cx="0.4" cy="0.4" r="0.6"><stop offset="0" stop-color="#f6f1df"/><stop offset="1" stop-color="#9aa4c2"/></radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a3550"/><stop offset="1" stop-color="#26223c"/></linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a1c40"/><stop offset="1" stop-color="#1b1330"/></linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a2a14"/><stop offset="1" stop-color="#1a1208"/></linearGradient>
    <radialGradient id="lit" cx="0.5" cy="0.5" r="0.6"><stop offset="0" stop-color="rgba(255,210,140,0.9)"/><stop offset="1" stop-color="rgba(255,180,90,0.15)"/></radialGradient>
    <radialGradient id="iglow" cx="0.5" cy="0.4" r="0.75"><stop offset="0" stop-color="#241a12"/><stop offset="1" stop-color="#0c0a14"/></radialGradient>
    <clipPath id="lh"><rect x="0" y="0" width="500" height="820"/></clipPath>
    <clipPath id="rh"><rect x="500" y="0" width="500" height="820"/></clipPath>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="1000" height="700" fill="url(#sky)"/>
  <circle cx="838" cy="120" r="44" fill="url(#moon)" opacity="0.92"/>
  <g fill="#cde0ff"><circle class="twk" cx="120" cy="80" r="1.5"/><circle class="twk" cx="300" cy="50" r="1.2" style="animation-delay:.7s"/><circle class="twk" cx="700" cy="60" r="1.4" style="animation-delay:1.2s"/><circle class="twk" cx="920" cy="240" r="1.3" style="animation-delay:.4s"/><circle class="twk" cx="80" cy="260" r="1.2" style="animation-delay:1.5s"/><circle class="twk" cx="560" cy="40" r="1.1" style="animation-delay:.9s"/></g>
  <!-- ground -->
  <rect x="0" y="690" width="1000" height="130" fill="#0a1410"/>
  <rect x="0" y="690" width="1000" height="10" fill="#10241a"/>

  <!-- ============ INTERIOR (revealed when the doors open) ============ -->
  <g class="interior">
    <rect x="170" y="250" width="660" height="440" fill="url(#iglow)"/>
    <!-- floor split: ground floor + a faint stair down -->
    <line x1="170" y1="470" x2="830" y2="470" stroke="rgba(150,190,230,0.16)" stroke-width="2"/>
    <line x1="500" y1="250" x2="500" y2="690" stroke="rgba(150,190,230,0.12)" stroke-width="2"/>

    <text class="ilabel" x="335" y="288" text-anchor="middle">Family Room</text>
    <text class="ilabel" x="665" y="288" text-anchor="middle">The Parlor</text>
    <text class="ilabel" x="500" y="690" text-anchor="middle" style="font-size:9px;">a door to nowhere</text>

    <!-- PIANO — James's piano songs (family room) -->
    <g class="spot reveal" id="m-piano" tabindex="0">
      <circle class="h" cx="300" cy="410" r="40" fill="url(#lit)"/>
      <rect x="262" y="392" width="86" height="40" rx="4" fill="#15131c" stroke="rgba(255,210,140,0.5)" stroke-width="2"/>
      <rect x="262" y="392" width="86" height="13" rx="3" fill="#241a12"/>
      <g fill="#e8dcc4"><rect x="268" y="408" width="7" height="20"/><rect x="278" y="408" width="7" height="20"/><rect x="288" y="408" width="7" height="20"/><rect x="298" y="408" width="7" height="20"/><rect x="308" y="408" width="7" height="20"/><rect x="318" y="408" width="7" height="20"/><rect x="328" y="408" width="7" height="20"/><rect x="338" y="408" width="7" height="20"/></g>
      <g fill="#0a0810"><rect x="274" y="408" width="4" height="12"/><rect x="284" y="408" width="4" height="12"/><rect x="304" y="408" width="4" height="12"/><rect x="314" y="408" width="4" height="12"/><rect x="324" y="408" width="4" height="12"/></g>
      <text class="stag ilabel" x="300" y="382" text-anchor="middle" style="fill:#ffd98a;">the piano · his songs</text>
    </g>

    <!-- RADIO — the parlor -->
    <g class="spot reveal" id="m-radio" tabindex="0">
      <circle class="h" cx="665" cy="412" r="40" fill="url(#lit)"/>
      <rect x="628" y="392" width="74" height="42" rx="9" fill="#15131c" stroke="rgba(255,210,140,0.5)" stroke-width="2"/>
      <circle cx="648" cy="413" r="9" fill="#0c1430" stroke="#ffd98a" stroke-width="1.6"/><circle cx="648" cy="413" r="3" fill="#ffd98a" class="lamp"/>
      <g stroke="#ffd98a" stroke-width="1.8" class="lamp"><line x1="672" y1="406" x2="672" y2="420"/><line x1="682" y1="402" x2="682" y2="424"/><line x1="692" y1="406" x2="692" y2="420"/></g>
      <text class="stag ilabel" x="665" y="382" text-anchor="middle" style="fill:#ffd98a;">the radio · the album</text>
    </g>

    <!-- BASEMENT DRUMSET — the 7 beats, down the hidden stair -->
    <g class="spot reveal" id="m-drums" tabindex="0">
      <circle class="h" cx="500" cy="600" r="46" fill="url(#lit)"/>
      <ellipse cx="500" cy="618" rx="58" ry="10" fill="#000" opacity="0.3"/>
      <ellipse cx="500" cy="600" rx="34" ry="14" fill="#1b2b52" stroke="rgba(255,150,190,0.55)" stroke-width="2"/>
      <ellipse cx="500" cy="596" rx="34" ry="13" fill="#142046"/>
      <ellipse cx="462" cy="582" rx="15" ry="5" fill="#caa24a" opacity="0.85"/>
      <ellipse cx="540" cy="580" rx="13" ry="4.5" fill="#caa24a" opacity="0.8"/>
      <g fill="#ffb0d0"><circle cx="476" cy="600" r="2.4" class="lamp"/><circle cx="500" cy="604" r="2.4" class="lamp" style="animation-delay:.5s"/><circle cx="524" cy="600" r="2.4" class="lamp" style="animation-delay:1s"/></g>
      <text class="stag ilabel" x="500" y="566" text-anchor="middle" style="fill:#ffb0d0;">the kit · seven beats</text>
    </g>

    <!-- STEP INSIDE -->
    <g class="enter reveal" id="enter" tabindex="0" role="link" aria-label="Step inside">
      <rect x="412" y="320" width="176" height="40" rx="20" fill="rgba(120,200,255,0.06)" stroke="rgba(120,200,255,0.4)" stroke-width="1.5"/>
      <text x="500" y="345" text-anchor="middle" font-family="Futura,sans-serif" font-size="13" letter-spacing="2" fill="#bfe6ff">STEP INSIDE →</text>
    </g>

    <!-- the secret basement door -->
    <g id="secret" tabindex="0" role="link" aria-label="?">
      <rect x="476" y="640" width="48" height="48" rx="3" fill="#0a0810" stroke="rgba(150,190,230,0.5)" stroke-width="1.5"/>
      <circle cx="514" cy="664" r="2" fill="rgba(150,190,230,0.6)"/>
    </g>
  </g>

  <!-- ============ THE FACADE — two doors, drawn once, clipped into halves ============ -->
  <defs><g id="facadeArt">
    <!-- porch shadow -->
    <rect x="170" y="660" width="660" height="40" fill="#0c0a16"/>
    <!-- house body -->
    <rect x="200" y="300" width="600" height="390" fill="url(#body)" stroke="rgba(180,160,220,0.25)" stroke-width="2"/>
    <!-- clapboard lines -->
    <g stroke="rgba(0,0,0,0.18)" stroke-width="1"><line x1="200" y1="330" x2="800" y2="330"/><line x1="200" y1="360" x2="800" y2="360"/><line x1="200" y1="390" x2="800" y2="390"/><line x1="200" y1="420" x2="800" y2="420"/><line x1="200" y1="450" x2="800" y2="450"/><line x1="200" y1="480" x2="800" y2="480"/><line x1="200" y1="510" x2="800" y2="510"/><line x1="200" y1="540" x2="800" y2="540"/><line x1="200" y1="570" x2="800" y2="570"/><line x1="200" y1="600" x2="800" y2="600"/><line x1="200" y1="630" x2="800" y2="630"/><line x1="200" y1="660" x2="800" y2="660"/></g>
    <!-- main gable roof -->
    <polygon points="180,304 500,150 820,304" fill="url(#roof)" stroke="rgba(180,150,255,0.35)" stroke-width="2"/>
    <polygon points="500,150 820,304 760,304 500,196" fill="rgba(0,0,0,0.2)"/>
    <!-- turret (Victorian signature) -->
    <rect x="700" y="300" width="100" height="200" fill="#322c4a" stroke="rgba(180,160,220,0.25)" stroke-width="2"/>
    <polygon points="688,302 750,196 812,302" fill="#241636" stroke="rgba(180,150,255,0.35)" stroke-width="2"/>
    <circle cx="750" cy="190" r="4" fill="#9aa4c2"/>
    <!-- gable trim -->
    <polygon points="360,304 500,196 640,304" fill="none" stroke="rgba(200,170,255,0.18)" stroke-width="2"/>
    <!-- attic window -->
    <circle cx="500" cy="262" r="20" fill="url(#warm)" stroke="rgba(255,210,140,0.4)" stroke-width="2"/>
    <circle cx="500" cy="262" r="20" fill="url(#lit)" opacity="0.45" class="lamp"/>
    <!-- upper windows (lit) -->
    <g>
      <rect x="250" y="340" width="64" height="84" rx="3" fill="url(#warm)" stroke="rgba(255,210,140,0.4)" stroke-width="2"/><rect x="250" y="340" width="64" height="84" fill="url(#lit)" opacity="0.5" class="lamp"/><line x1="282" y1="340" x2="282" y2="424" stroke="#1a1208"/><line x1="250" y1="382" x2="314" y2="382" stroke="#1a1208"/>
      <rect x="420" y="340" width="64" height="84" rx="3" fill="url(#warm)" stroke="rgba(255,210,140,0.4)" stroke-width="2"/><rect x="420" y="340" width="64" height="84" fill="url(#lit)" opacity="0.42" class="lamp" style="animation-delay:1.2s"/><line x1="452" y1="340" x2="452" y2="424" stroke="#1a1208"/><line x1="420" y1="382" x2="484" y2="382" stroke="#1a1208"/>
      <rect x="718" y="332" width="64" height="84" rx="3" fill="url(#warm)" stroke="rgba(255,210,140,0.4)" stroke-width="2"/><rect x="718" y="332" width="64" height="84" fill="url(#lit)" opacity="0.4" class="lamp" style="animation-delay:.6s"/><line x1="750" y1="332" x2="750" y2="416" stroke="#1a1208"/>
    </g>
    <!-- bay window (ground, left) -->
    <g>
      <rect x="244" y="500" width="120" height="120" rx="2" fill="#2c2742" stroke="rgba(180,160,220,0.3)" stroke-width="2"/>
      <rect x="252" y="512" width="34" height="96" fill="url(#warm)" stroke="rgba(255,210,140,0.35)" stroke-width="1.5"/><rect x="252" y="512" width="34" height="96" fill="url(#lit)" opacity="0.42" class="lamp"/>
      <rect x="288" y="508" width="32" height="100" fill="url(#warm)" stroke="rgba(255,210,140,0.35)" stroke-width="1.5"/><rect x="288" y="508" width="32" height="100" fill="url(#lit)" opacity="0.5" class="lamp" style="animation-delay:.8s"/>
      <rect x="322" y="512" width="34" height="96" fill="url(#warm)" stroke="rgba(255,210,140,0.35)" stroke-width="1.5"/><rect x="322" y="512" width="34" height="96" fill="url(#lit)" opacity="0.42" class="lamp" style="animation-delay:1.4s"/>
    </g>
    <!-- parlor window (ground, right) -->
    <rect x="560" y="510" width="120" height="110" rx="3" fill="url(#warm)" stroke="rgba(255,210,140,0.4)" stroke-width="2"/><rect x="560" y="510" width="120" height="110" fill="url(#lit)" opacity="0.4" class="lamp" style="animation-delay:1s"/><line x1="620" y1="510" x2="620" y2="620" stroke="#1a1208" stroke-width="1.5"/><line x1="560" y1="565" x2="680" y2="565" stroke="#1a1208" stroke-width="1.5"/>
    <!-- porch + front door (the seam between the two leaves) -->
    <rect x="430" y="700" width="140" height="-6" fill="#0c0a16"/>
    <polygon points="438,500 562,500 540,470 460,470" fill="#241636"/>
    <rect x="452" y="500" width="96" height="190" rx="6" fill="#1a1426" stroke="rgba(200,170,255,0.3)" stroke-width="2"/>
    <rect x="462" y="512" width="76" height="178" rx="4" fill="url(#warm)" stroke="rgba(255,210,140,0.45)" stroke-width="2"/>
    <circle cx="500" cy="556" r="13" fill="url(#lit)" opacity="0.6" class="lamp"/>
    <line x1="500" y1="512" x2="500" y2="690" stroke="rgba(0,0,0,0.4)" stroke-width="2"/>
    <circle cx="488" cy="604" r="3.5" fill="#caa24a"/><circle cx="512" cy="604" r="3.5" fill="#caa24a"/>
    <!-- porch posts + steps -->
    <rect x="412" y="690" width="10" height="0" fill="#1a1426"/>
    <!-- chimney smoke -->
    <rect x="300" y="180" width="26" height="60" fill="#2a2238"/>
    <g class="smoke" opacity="0.5"><circle cx="313" cy="168" r="9" fill="#3a4258" filter="url(#soft)"/><circle cx="320" cy="150" r="7" fill="#3a4258" filter="url(#soft)"/></g>
  </g></defs>

  <!-- left half door -->
  <g class="leaf leaf-l"><use href="#facadeArt" clip-path="url(#lh)" style="display:block"/>
    <rect class="leaf-shade" x="0" y="150" width="500" height="550" fill="#000"/>
  </g>
  <!-- right half door -->
  <g class="leaf leaf-r"><use href="#facadeArt" clip-path="url(#rh)" style="display:block"/>
    <rect class="leaf-shade" x="500" y="150" width="500" height="550" fill="#000"/>
  </g>
</svg>
</div>
<div class="hint" id="hint">click the house</div>

<audio id="song" src="/v5/james/paast_that_raw.mp3" preload="auto"></audio>

<script>
(function(){
  'use strict';
  var stage=document.getElementById('stage'), house=document.getElementById('house'),
      song=document.getElementById('song'), hint=document.getElementById('hint'),
      opened=false;

  function open(){
    if(opened) return; opened=true;
    house.classList.add('open');
    hint.classList.add('gone');
    // the house obediently opens itself, into "Paast That Drop." — the kit, raw take.
    song.play().catch(function(){});
  }
  // first click anywhere on the closed house opens it
  stage.addEventListener('click', function(e){
    if(!opened){ open(); return; }
  });

  // once inside, the spots route
  function go(url){ return function(e){ e.stopPropagation(); window.location.href=url; }; }
  document.getElementById('enter').addEventListener('click', go('/research/'));
  document.getElementById('m-piano').addEventListener('click', go('/play/'));
  document.getElementById('m-radio').addEventListener('click', go('/radio/'));
  document.getElementById('m-drums').addEventListener('click', go('/radio/'));
  // the door to nowhere
  document.getElementById('secret').addEventListener('click', go('/research/math/'));

  // keyboard: enter opens / activates focused link
  document.addEventListener('keydown', function(e){
    if(e.key==='Enter'){ if(!opened){ open(); } }
  });
})();
</script>
</body>
</html>
