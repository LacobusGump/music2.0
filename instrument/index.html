<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GUMP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;}
body{background:#000;color:#999;font-family:Georgia,serif;
  height:100vh;height:100dvh;overflow:hidden;touch-action:none;}
#start{display:flex;align-items:center;justify-content:center;
  height:100vh;height:100dvh;flex-direction:column;gap:20px;}
#start button{background:none;border:1px solid #c9a44a30;color:#c9a44a;
  padding:20px 50px;border-radius:12px;font-family:Georgia,serif;
  font-size:1.2em;cursor:pointer;letter-spacing:0.15em;transition:all 0.4s;}
#start button:hover{border-color:#c9a44a;background:#c9a44a10;}
#start .sub{color:#333;font-size:0.7em;max-width:300px;text-align:center;line-height:1.8;}
#instrument{display:none;height:100vh;height:100dvh;position:relative;}
canvas{display:block;width:100%;height:100%;touch-action:none;}
#hud{position:fixed;top:12px;left:12px;font-size:0.6em;color:#333;
  font-family:'Courier New',monospace;line-height:1.8;pointer-events:none;z-index:10;}
</style>
</head>
<body>

<div id="start">
  <div style="color:#c9a44a30;font-size:0.65em;letter-spacing:0.2em;">GUMP</div>
  <button onclick="begin()">play</button>
  <div class="sub">hold your phone. tilt to shape the sound.<br>move to play. be still to listen.<br>the mic hears the world and tunes it to 33 Hz.</div>
</div>

<div id="instrument">
  <canvas id="viz"></canvas>
  <div id="hud"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// GUMP — the body is the instrument
//
// First principles:
// 1. One oscillator at 33 Hz (the pyramid fundamental)
// 2. Tilt reveals harmonics (the melody IS the overtones)
// 3. Motion adds energy (louder, brighter)
// 4. Stillness = the drone (the void)
// 5. Water bottle feel: momentum, overshoot, damping
// 6. Enable outcomes, don't make choices
//
// The harmonic series of 33 Hz:
//   33, 66, 99, 132, 165, 198, 231, 264 (≈ middle C)
//   330, 396, 462, 528 (≈ C5)
//
// Tilt forward = open the filter = bright = high harmonics
// Tilt back = close the filter = dark = fundamental only
// Left/right = detune slightly = warmth/chorus
// Shake = rhythmic energy = the groove
// Impact = percussive burst = the hit
// ═══════════════════════════════════════════════════════════

var actx, started = false;

// Audio nodes
var drone, droneGain, filter, filterGain, masterGain;
var sub, subGain;  // sub-bass sine at 33 Hz
var delay, feedback, delayGain;  // space

// Sensor state (smoothed — water bottle)
var tiltX = 0, tiltY = 0;        // current angle (degrees)
var targetX = 0, targetY = 0;    // raw sensor target
var velX = 0, velY = 0;          // velocity (for overshoot)
var energy = 0;                   // motion energy (0-1)
var targetEnergy = 0;
var impactCooldown = 0;

// Smoothing constants (water bottle)
var SPRING = 0.03;    // how fast it follows (lower = more lag)
var DAMPING = 0.85;   // how fast overshoot dies (lower = more bounce)
var ENERGY_ATTACK = 0.15;
var ENERGY_DECAY = 0.97;

// Musical constants
var FUNDAMENTAL = 33;  // Hz — the pyramid
var BASE_FILTER = 80;  // Hz — minimum filter cutoff (just above fundamental)
var MAX_FILTER = 4000; // Hz — maximum (bright, all harmonics)

function begin() {
  document.getElementById('start').style.display = 'none';
  document.getElementById('instrument').style.display = 'block';

  // ═══ AUDIO CONTEXT ═══
  actx = new (window.AudioContext || window.webkitAudioContext)();

  // Master output
  masterGain = actx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(actx.destination);

  // Delay/reverb (space)
  delay = actx.createDelay(1.0);
  delay.delayTime.value = 0.4;  // ~150 BPM echo
  feedback = actx.createGain();
  feedback.gain.value = 0.3;
  delayGain = actx.createGain();
  delayGain.gain.value = 0.15;
  delay.connect(feedback);
  feedback.connect(delay);
  delay.connect(delayGain);
  delayGain.connect(masterGain);

  // ═══ THE DRONE — sawtooth at 33 Hz ═══
  // Sawtooth contains ALL harmonics (1/n amplitude)
  // The filter controls which harmonics you hear
  // ═══ THE DRONE — triangle at 33 Hz ═══
  // Triangle has odd harmonics only (1, 3, 5, 7...) at 1/n² amplitude
  // Much gentler than sawtooth. The harmonics are there but quiet.
  // The filter reveals them without the raw buzz taking over.
  drone = actx.createOscillator();
  drone.type = 'triangle';
  drone.frequency.value = FUNDAMENTAL;

  // Filter — the voice of the instrument
  filter = actx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = BASE_FILTER;
  filter.Q.value = 3;  // resonance at cutoff — THIS is where harmonics sing

  filterGain = actx.createGain();
  filterGain.gain.value = 0.12;  // much quieter — let the harmonics do the talking

  drone.connect(filter);
  filter.connect(filterGain);
  filterGain.connect(masterGain);
  filterGain.connect(delay);

  // ═══ HARMONIC LAYER — sine oscillators at key overtones ═══
  // These are the notes you reveal. Each one fades in as tilt opens.
  // Controlled individually so they emerge cleanly above the drone.
  var harmonicFreqs = [66, 99, 132, 165, 198, 264, 330, 396, 528];
  var harmonicOscs = [];
  var harmonicGains = [];
  for (var i = 0; i < harmonicFreqs.length; i++) {
    var osc = actx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = harmonicFreqs[i];
    var g = actx.createGain();
    g.gain.value = 0;  // start silent, tilt reveals them
    osc.connect(g);
    g.connect(masterGain);
    g.connect(delay);
    osc.start();
    harmonicOscs.push(osc);
    harmonicGains.push(g);
  }

  // ═══ SUB-BASS — pure sine at 33 Hz ═══
  // Always present but gentle. The foundation. You feel this.
  sub = actx.createOscillator();
  sub.type = 'sine';
  sub.frequency.value = FUNDAMENTAL;
  subGain = actx.createGain();
  subGain.gain.value = 0.12;
  sub.connect(subGain);
  subGain.connect(masterGain);

  // ═══ MICROPHONE — hear the world, tune it to 33 Hz ═══
  // The phone listens to everything around you.
  // FFT finds which frequencies are present.
  // Each detected frequency maps to the nearest harmonic of 33.
  // The environment becomes the instrument.

  var micAnalyser = null;
  var micData = null;

  navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
    var micSource = actx.createMediaStreamSource(stream);
    micAnalyser = actx.createAnalyser();
    micAnalyser.fftSize = 2048;
    micAnalyser.smoothingTimeConstant = 0.8;
    micSource.connect(micAnalyser);
    // Don't connect to output — we don't want raw mic playback
    // We only READ the spectrum and drive our harmonics
    micData = new Uint8Array(micAnalyser.frequencyBinCount);
  }).catch(function(err) {
    // No mic permission — instrument still works with tilt only
    console.log('No mic access — tilt mode only');
  });

  // Start oscillators
  drone.start();
  sub.start();

  // ═══ SENSORS ═══
  if (window.DeviceOrientationEvent) {
    // iOS 13+ requires permission
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(function(state) {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', onOrientation);
        }
      });
    } else {
      window.addEventListener('deviceorientation', onOrientation);
    }
  }

  if (window.DeviceMotionEvent) {
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      DeviceMotionEvent.requestPermission().then(function(state) {
        if (state === 'granted') {
          window.addEventListener('devicemotion', onMotion);
        }
      });
    } else {
      window.addEventListener('devicemotion', onMotion);
    }
  }

  // Desktop fallback: mouse
  document.addEventListener('mousemove', function(e) {
    targetY = ((e.clientX / window.innerWidth) - 0.5) * 90;  // left-right → tilt
    targetX = ((e.clientY / window.innerHeight) - 0.5) * -90; // up-down → tilt
    targetEnergy = 0.3; // mouse is mild energy
  });

  // Touch for energy
  document.addEventListener('touchstart', function(e) {
    targetEnergy = 0.8;
    impactCooldown = 8;
  });

  started = true;
  initViz();
  update();
}

// ═══ SENSOR HANDLERS ═══

function onOrientation(e) {
  // beta: front/back tilt (-180 to 180). Phone flat face-up = 90.
  // gamma: left/right tilt (-90 to 90).
  if (e.beta !== null) targetX = e.beta;
  if (e.gamma !== null) targetY = e.gamma;
}

function onMotion(e) {
  var a = e.acceleration;
  if (a && a.x !== null) {
    var mag = Math.sqrt(a.x*a.x + a.y*a.y + a.z*a.z);
    targetEnergy = Math.min(mag / 15, 1);  // normalize to 0-1

    // Impact detection: sudden acceleration spike
    if (mag > 12 && impactCooldown <= 0) {
      triggerImpact(Math.min(mag / 20, 1));
      impactCooldown = 10;  // frames cooldown
    }
  }
}

function triggerImpact(intensity) {
  if (!actx) return;

  // ═══════════════════════════════════════════════════════════
  // DRUM MEMBRANE MODEL
  //
  // A circular membrane vibrates in modes (m,n) whose frequencies
  // are zeros of Bessel functions J_m. The ratios to the fundamental:
  //
  //   Mode (m,n)  Ratio   Character
  //   (0,1)       1.000   fundamental — the boom
  //   (1,1)       1.593   first asymmetric — the tone
  //   (2,1)       2.136   second asymmetric — brightness
  //   (0,2)       2.296   first radial overtone — body
  //   (3,1)       2.653   third asymmetric — shimmer
  //   (1,2)       2.917   mixed — complexity
  //   (4,1)       3.156   fourth asymmetric — air
  //   (2,2)       3.501   second mixed — sizzle
  //
  // Strike position determines which modes are excited:
  //   Center strike → radial modes (0,n) dominate → warm, boomy
  //   Edge strike → asymmetric modes (m>0) dominate → bright, complex
  //
  // The phone's tilt at moment of impact = strike position.
  // Higher modes decay faster. The fundamental rings longest.
  // This is why a drum hit starts bright and settles warm.
  // ═══════════════════════════════════════════════════════════

  var now = actx.currentTime;

  // Bessel modes: [ratio, m (nodal diameters), decay_rate]
  // m=0 are radial (center-excited), m>0 are asymmetric (edge-excited)
  var modes = [
    [1.000, 0, 1.0],   // (0,1) fundamental
    [1.593, 1, 1.8],   // (1,1)
    [2.136, 2, 2.5],   // (2,1)
    [2.296, 0, 2.2],   // (0,2)
    [2.653, 3, 3.2],   // (3,1)
    [2.917, 1, 3.0],   // (1,2)
    [3.156, 4, 3.8],   // (4,1)
    [3.501, 2, 3.5]    // (2,2)
  ];

  // Strike position from tilt: 0 = center, 1 = edge
  // normalBeta near 0 = natural hold = center strike
  // extreme tilt = edge strike
  var strikePos = Math.min(1, Math.sqrt(tiltX * tiltX + tiltY * tiltY) / 70);

  // Membrane fundamental frequency: rooted in 33 Hz but higher
  // A struck membrane's pitch sits above the drone
  var membraneF0 = FUNDAMENTAL * 3;  // 99 Hz — third harmonic territory

  // Duration scales with intensity — harder hit rings longer
  var baseDuration = 0.25 + intensity * 0.35;

  // Synthesize each mode as a decaying sinusoid
  var duration = baseDuration + 0.3;  // total buffer length with tail
  var bufferSize = Math.ceil(actx.sampleRate * duration);
  var buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  var data = buffer.getChannelData(0);

  for (var m = 0; m < modes.length; m++) {
    var ratio = modes[m][0];
    var nodalDiam = modes[m][1];
    var decayRate = modes[m][2];

    // Mode amplitude depends on strike position:
    // Center strike (strikePos≈0): m=0 modes are loud, m>0 modes are quiet
    // Edge strike (strikePos≈1): m>0 modes are loud, m=0 stays present
    var amp;
    if (nodalDiam === 0) {
      // Radial modes: strong at center, present everywhere
      amp = 1.0 - strikePos * 0.5;
    } else {
      // Asymmetric modes: scale with strike position and mode order
      // Higher m needs further from center to excite
      amp = Math.pow(strikePos, 0.3 + nodalDiam * 0.2);
    }

    // Natural amplitude falloff with frequency (1/ratio gives warmth)
    amp *= intensity / (1 + (ratio - 1) * 0.6);

    // Scale to reasonable level
    amp *= 0.18;

    // Mode frequency
    var freq = membraneF0 * ratio;

    // Decay time constant: fundamental rings for ~baseDuration,
    // higher modes die proportionally faster.
    // tau = baseDuration / decayRate — so fundamental (1.0) gets full duration,
    // mode (4,1) at decayRate 3.8 gets ~1/4 the ring time.
    var tau = baseDuration / decayRate;

    // Add this mode's contribution to the buffer
    var w = 2 * Math.PI * freq / actx.sampleRate;
    for (var i = 0; i < bufferSize; i++) {
      var t = i / actx.sampleRate;
      data[i] += amp * Math.sin(w * i) * Math.exp(-t / tau);
    }
  }

  // Tiny noise component for the initial transient (stick contact, ~2ms)
  // This is the physical reality: the first milliseconds of ANY impact
  // are broadband before modal vibration takes over
  var transientSamples = Math.ceil(actx.sampleRate * 0.003);
  for (var i = 0; i < transientSamples; i++) {
    var env = (1 - i / transientSamples);
    data[i] += (Math.random() * 2 - 1) * env * env * intensity * 0.15;
  }

  // Play it
  var source = actx.createBufferSource();
  source.buffer = buffer;

  var hitGain = actx.createGain();
  hitGain.gain.setValueAtTime(0.6, now);
  hitGain.gain.setTargetAtTime(0.001, now + baseDuration * 0.7, baseDuration * 0.15);

  source.connect(hitGain);
  hitGain.connect(masterGain);
  hitGain.connect(delay);
  source.start();
}

// ═══ MAIN LOOP ═══

function update() {
  if (!started) return;
  requestAnimationFrame(update);

  // ═══ WATER BOTTLE SMOOTHING ═══
  // Spring-damper system: position follows target with momentum
  var dx = targetX - tiltX;
  var dy = targetY - tiltY;
  velX = velX * DAMPING + dx * SPRING;
  velY = velY * DAMPING + dy * SPRING;
  tiltX += velX;
  tiltY += velY;

  // Energy: fast attack, slow decay
  if (targetEnergy > energy) {
    energy += (targetEnergy - energy) * ENERGY_ATTACK;
  } else {
    energy *= ENERGY_DECAY;
  }
  targetEnergy *= 0.9;  // target decays too (motion is transient)

  if (impactCooldown > 0) impactCooldown--;

  // ═══ MAP TILT TO SOUND ═══

  // Beta (front/back tilt): controls filter cutoff
  // Phone flat (beta≈90): mid-range
  // Phone tilted toward you (beta<90): darker, more fundamental
  // Phone tilted away (beta>90): brighter, more harmonics
  var normalBeta = (tiltX - 45) / 90;  // -1 to +1, 0 = 45° tilt (natural hold)
  normalBeta = Math.max(-1, Math.min(1, normalBeta));

  // Exponential mapping for filter (ears hear logarithmically)
  var filterTarget = BASE_FILTER * Math.pow(MAX_FILTER / BASE_FILTER, (normalBeta + 1) / 2);
  filter.frequency.setTargetAtTime(filterTarget, actx.currentTime, 0.05);

  // Gamma (left/right tilt): detune the drone slightly
  // Creates warmth/chorus. ±5 Hz max.
  var normalGamma = tiltY / 45;  // -1 to +1
  normalGamma = Math.max(-1, Math.min(1, normalGamma));
  var detune = normalGamma * 5;  // ±5 Hz
  drone.frequency.setTargetAtTime(FUNDAMENTAL + detune, actx.currentTime, 0.05);

  // ═══ MICROPHONE → HARMONICS ═══
  // Read the ambient spectrum. Map each band to nearest harmonic.
  // The world tunes itself to 33 Hz.
  var micLevels = new Array(9).fill(0);  // one per harmonic
  if (micAnalyser && micData) {
    micAnalyser.getByteFrequencyData(micData);
    var binHz = actx.sampleRate / micAnalyser.fftSize;
    var hFreqs = [66, 99, 132, 165, 198, 264, 330, 396, 528];

    for (var h = 0; h < hFreqs.length; h++) {
      // Find FFT bins near this harmonic (±20%)
      var lo = Math.floor(hFreqs[h] * 0.8 / binHz);
      var hi = Math.ceil(hFreqs[h] * 1.2 / binHz);
      var sum = 0, count = 0;
      for (var b = Math.max(0, lo); b <= Math.min(hi, micData.length - 1); b++) {
        sum += micData[b];
        count++;
      }
      var avg = count > 0 ? sum / count / 255 : 0;  // normalize 0-1
      // Smooth
      micLevels[h] = micLevels[h] * 0.85 + avg * 0.15;
    }
  }

  // ═══ HARMONIC REVEAL — each overtone fades in based on tilt + mic ═══
  // filterTarget tells us which harmonics should be audible
  // Each harmonic below the filter cutoff gets volume
  // Each one above stays silent
  // The transition is smooth — harmonics bloom as you tilt
  var harmonicFreqs = [66, 99, 132, 165, 198, 264, 330, 396, 528];
  for (var i = 0; i < harmonicGains.length; i++) {
    var freq = harmonicFreqs[i];
    // How far below the filter cutoff is this harmonic?
    var ratio = filterTarget / freq;
    // Sigmoid: smooth transition from 0 to 1 around ratio=1
    var vol = 1 / (1 + Math.exp(-6 * (ratio - 1)));
    // Scale by harmonic number (higher = quieter naturally)
    vol *= 0.08 / (1 + i * 0.3);
    // Scale by energy (moving = harmonics ring louder)
    vol *= (0.4 + energy * 0.6);
    // ADD mic input — the world's vibrations at this harmonic
    // Mic and tilt blend together. Both drive the same harmonics.
    vol += micLevels[i] * 0.06;
    harmonicGains[i].gain.setTargetAtTime(vol, actx.currentTime, 0.08);

    // Detune harmonics slightly with gamma tilt (warmth)
    harmonicOscs[i].frequency.setTargetAtTime(
      harmonicFreqs[i] + detune * (i + 2) * 0.3,
      actx.currentTime, 0.05
    );
  }

  // Drone filter: keep it present but quiet
  var droneVol = 0.06 + energy * 0.08;
  filterGain.gain.setTargetAtTime(droneVol, actx.currentTime, 0.05);

  // Filter Q — resonance peak at cutoff makes the "voice"
  var q = 2 + energy * 6;
  filter.Q.setTargetAtTime(q, actx.currentTime, 0.05);

  // Sub-bass: louder when still (the void), quieter when playing
  var subVol = 0.12 * (1 - energy * 0.4);
  subGain.gain.setTargetAtTime(subVol, actx.currentTime, 0.1);

  // Delay feedback — more space when active
  var fb = 0.2 + energy * 0.35;
  feedback.gain.setTargetAtTime(fb, actx.currentTime, 0.05);

  // ═══ VISUALIZATION ═══
  drawViz(normalBeta, normalGamma, energy, filterTarget);

  // ═══ HUD ═══
  document.getElementById('hud').innerHTML =
    'tilt ' + tiltX.toFixed(0) + '° ' + tiltY.toFixed(0) + '°<br>' +
    'filter ' + filterTarget.toFixed(0) + ' Hz<br>' +
    'energy ' + (energy * 100).toFixed(0) + '%<br>' +
    'K ' + (FUNDAMENTAL + detune).toFixed(1) + ' Hz';
}

// ═══ VISUALIZATION ═══
// Simple: a circle that responds to the sound
// Brighter when filter opens, larger when energy increases

var vizCanvas, vizCtx;

function initViz() {
  vizCanvas = document.getElementById('viz');
  vizCtx = vizCanvas.getContext('2d');
  resizeViz();
  window.addEventListener('resize', resizeViz);
}

function resizeViz() {
  var dpr = window.devicePixelRatio || 1;
  var r = vizCanvas.getBoundingClientRect();
  vizCanvas.width = r.width * dpr;
  vizCanvas.height = r.height * dpr;
  vizCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawViz(beta, gamma, energy, filterFreq) {
  var w = vizCanvas.width / (window.devicePixelRatio || 1);
  var h = vizCanvas.height / (window.devicePixelRatio || 1);
  var cx = w / 2 + gamma * w * 0.15;
  var cy = h / 2 - beta * h * 0.15;

  vizCtx.fillStyle = 'rgba(0,0,0,0.15)';
  vizCtx.fillRect(0, 0, w, h);

  var t = Date.now() * 0.001;

  // Harmonic brightness: how open is the filter?
  var openness = Math.log(filterFreq / BASE_FILTER) / Math.log(MAX_FILTER / BASE_FILTER);

  // Core circle
  var baseR = 30 + energy * 80;
  var pulse = 1 + 0.05 * Math.sin(t * FUNDAMENTAL * 0.1);
  var r = baseR * pulse;

  // Glow layers
  for (var layer = 4; layer >= 0; layer--) {
    var lr = r * (1 + layer * 0.8);
    var alpha = (0.03 + openness * 0.04) * (1 - layer * 0.18);
    var hue = 35 + openness * 15;  // warm gold → bright gold
    vizCtx.beginPath();
    vizCtx.arc(cx, cy, lr, 0, Math.PI * 2);
    vizCtx.fillStyle = 'hsla(' + hue + ',60%,' + (30 + openness * 30) + '%,' + alpha + ')';
    vizCtx.fill();
  }

  // Core
  vizCtx.beginPath();
  vizCtx.arc(cx, cy, r * 0.3, 0, Math.PI * 2);
  var coreAlpha = 0.3 + energy * 0.5;
  vizCtx.fillStyle = 'hsla(40,70%,' + (40 + openness * 40) + '%,' + coreAlpha + ')';
  vizCtx.fill();

  // Harmonic rings — one per audible harmonic
  var nHarmonics = Math.floor(filterFreq / FUNDAMENTAL);
  for (var i = 1; i <= Math.min(nHarmonics, 12); i++) {
    var hr = r * 0.3 + i * (r * 0.7 / 12);
    var ha = 0.02 + (1 - i / 12) * 0.06 * energy;
    vizCtx.beginPath();
    vizCtx.arc(cx, cy, hr, 0, Math.PI * 2);
    vizCtx.strokeStyle = 'hsla(40,50%,60%,' + ha + ')';
    vizCtx.lineWidth = 0.5;
    vizCtx.stroke();
  }
}
</script>
</body>
</html>
