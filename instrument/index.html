<style>

  <div class="sub">hold your phone. tilt to shape the sound.<br>move to play. be still to listen.</div>

<script>
// =============================================================================
// GUMP - the body is the instrument
//
// Architecture:
//   1. FUNDAMENTAL = 33 Hz (the pyramid)
//   2. 16 coupled harmonic partials with sympathetic resonance
//   3. 1/f timing: pink-noise modulated clocks for all events
//   4. FOR engine: the instrument's soul (solves for the OTHER)
//   5. Void state machine: stillness -> settling -> void -> transcendent
//   6. Spectral tension: consonance graph suggests what wants to play
//   7. Music Intelligence: Landauer cost, energy contour, contrary motion,
//      motif completion, R/K groove target, Mozart surprise, voice leading
//   8. Water bottle damping on everything: momentum, overshoot, settle
//   9. Bessel drum membrane (8 modes) on impact
//  10. Convolution reverb with real IR
//
// The body IS the composition. Tilt = melody. Motion = rhythm.
// Stillness = honored, not filled. The FOR engine fills what you leave empty.
// =============================================================================

var actx, started = false;
var FUNDAMENTAL = 33;
var TWO_PI = Math.PI * 2;
var hudTimer = 0;

// iOS: resume AudioContext when returning from background
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && actx && actx.state === 'suspended') actx.resume();
});

// =====================================================================
// 1/f NOISE GENERATOR (Voss-McCartney)
// Every timing decision in this instrument uses pink noise, not white.
// 1/f timing is what makes music feel human (Voss & Clarke 1975).
// =====================================================================
var pinkState = {b0:0,b1:0,b2:0,b3:0,b4:0,b5:0,b6:0};
function pinkSample() {
  var w = Math.random() * 2 - 1;
  pinkState.b0 = 0.99886 * pinkState.b0 + w * 0.0555179;
  pinkState.b1 = 0.99332 * pinkState.b1 + w * 0.0750759;
  pinkState.b2 = 0.96900 * pinkState.b2 + w * 0.1538520;
  pinkState.b3 = 0.86650 * pinkState.b3 + w * 0.3104856;
  pinkState.b4 = 0.55000 * pinkState.b4 + w * 0.5329522;
  pinkState.b5 = -0.7616 * pinkState.b5 - w * 0.0168980;
  var out = (pinkState.b0 + pinkState.b1 + pinkState.b2 + pinkState.b3 +
             pinkState.b4 + pinkState.b5 + pinkState.b6 + w * 0.5362) * 0.11;
  pinkState.b6 = w * 0.115926;
  return out;
}

// Smoothed 1/f value (for slow drift parameters)
var pinkSmooth = 0;
function pinkDrift() {
  pinkSmooth = pinkSmooth * 0.97 + pinkSample() * 0.03;
  return pinkSmooth;
}

// =====================================================================
// KURAMOTO HEART — inter-partial phase coupling
//
// Each of the 16 partials gets a phase (theta) that advances at its
// natural frequency. Partials couple through a consonance-weighted
// Kuramoto model. When they phase-lock, consonance emerges (the chord).
// When they drift, tension builds (the search). The tension-resolution
// cycle IS musical progression.
// =====================================================================

// Phase state for each partial
var kuramotoTheta = [];      // current phase of each partial
var kuramotoOmega = [];      // natural angular frequency of each partial
var kuramotoR = 0;           // order parameter (0=scattered, 1=locked)
var kuramotoRprev = 0;       // previous R for computing dR/dt
var kuramotoDRdt = 0;        // rate of change of R
var kuramotoPsi = 0;         // mean phase angle
var K_PARTIALS_BASE = 0.15;  // base coupling strength
var kPartials = K_PARTIALS_BASE; // current coupling (modulated by energy, 1/f)

// 16x16 consonance weight matrix W[i][j]
// Built from the simplicity of the frequency ratio between harmonics i+1 and j+1.
// Octave (2:1) = strongest. Unison excluded (i==j).
var kuramotoW = [];

function buildConsonanceMatrix() {
  kuramotoW = [];
  for (var i = 0; i < 16; i++) {
    kuramotoW[i] = [];
    var hi = i + 1; // harmonic number
    for (var j = 0; j < 16; j++) {
      if (i === j) { kuramotoW[i][j] = 0; continue; }
      var hj = j + 1;
      // Reduce ratio to simplest form by dividing by GCD
      var a = hi, b = hj;
      while (b) { var tmp = b; b = a % tmp; a = tmp; }
      var gcd = a;
      var p = hi / gcd, q = hj / gcd;
      // The ratio p:q — lower p+q = more consonant
      // Map known intervals to weights
      var w = 0.05; // default: weak but nonzero (everything talks)
      var r = (hj > hi) ? hj / hi : hi / hj; // ratio > 1
      // Check for known consonant intervals (with tolerance for integer harmonics)
      if (Math.abs(r - 2) < 0.001 || Math.abs(r - 4) < 0.001 ||
          Math.abs(r - 8) < 0.001 || Math.abs(r - 16) < 0.001)  w = 1.0;   // octaves
      else if (Math.abs(r - 1.5) < 0.001 || Math.abs(r - 3) < 0.001 ||
               Math.abs(r - 6) < 0.001 || Math.abs(r - 12) < 0.001) w = 0.85; // fifths (3:2, 3:1, 6:1, 12:1)
      else if (Math.abs(r - 4/3) < 0.001 || Math.abs(r - 8/3) < 0.002 ||
               Math.abs(r - 16/3) < 0.002) w = 0.70; // fourths
      else if (Math.abs(r - 1.25) < 0.001 || Math.abs(r - 2.5) < 0.001 ||
               Math.abs(r - 5) < 0.001 || Math.abs(r - 10) < 0.001) w = 0.55; // major thirds (5:4, 5:2, 5:1, 10:1)
      else if (Math.abs(r - 1.2) < 0.001 || Math.abs(r - 2.4) < 0.002) w = 0.45; // minor thirds (6:5, 12:5)
      else if (Math.abs(r - 5/3) < 0.002 || Math.abs(r - 10/3) < 0.002) w = 0.40; // major sixths
      else if (Math.abs(r - 1.6) < 0.001 || Math.abs(r - 3.2) < 0.002) w = 0.30; // minor sixths (8:5, 16:5)
      else {
        // For other ratios, use sum-of-terms heuristic: lower p+q = more consonant
        var complexity = p + q;
        if (complexity <= 5)       w = 0.60;
        else if (complexity <= 7)  w = 0.35;
        else if (complexity <= 10) w = 0.20;
        else if (complexity <= 14) w = 0.10;
        // else stays at 0.05
      }
      kuramotoW[i][j] = w;
    }
  }
}

// Initialize phases and frequencies for all 16 partials
function initKuramoto() {
  buildConsonanceMatrix();
  for (var i = 0; i < 16; i++) {
    kuramotoTheta[i] = Math.random() * TWO_PI; // random initial phase
    kuramotoOmega[i] = TWO_PI * FUNDAMENTAL * (i + 1); // natural angular freq
  }
}

// Update Kuramoto phases each frame
// dt is in seconds, but omega is in rad/s so the product is radians — correct.
// However, at 33 Hz fundamental, omega_1 = 207 rad/s, and at 60fps dt ~ 0.016s,
// that's 3.3 radians per frame for the fundamental alone. Higher harmonics wrap
// many times per frame. We track phase mod 2*pi. The COUPLING term is what
// matters musically — the slow drift of phase relationships.
function updateKuramotoPhases(dt) {
  var N = 16;
  var dtheta = [];

  for (var i = 0; i < N; i++) {
    var coupling = 0;
    for (var j = 0; j < N; j++) {
      if (i === j) continue;
      // Amplitude weighting: louder partials pull harder
      var aj = partialGains[j] ? partialGains[j].gain.value : 0;
      // Normalize amplitude influence (typical partial gain is 0-0.12)
      var ampWeight = Math.min(aj / 0.06, 2.0); // caps at 2x for loud partials
      coupling += kuramotoW[i][j] * ampWeight * Math.sin(kuramotoTheta[j] - kuramotoTheta[i]);
    }
    dtheta[i] = kuramotoOmega[i] + (kPartials / N) * coupling;
  }

  // Advance all phases
  for (var i = 0; i < N; i++) {
    kuramotoTheta[i] += dtheta[i] * dt;
    // Keep phase in [0, 2*pi) to prevent floating point drift over long sessions
    kuramotoTheta[i] = kuramotoTheta[i] % TWO_PI;
    if (kuramotoTheta[i] < 0) kuramotoTheta[i] += TWO_PI;
  }
}

// Compute the Kuramoto order parameter R and mean phase psi
// R = |1/N * sum(e^(i*theta_k))|
// But for harmonics at different frequencies, we need to compare phase
// relationships RELATIVE to their natural frequency. We normalize each
// partial's phase by its harmonic number to compare on the same footing.
// This way, partials that are phase-locked at their natural frequency ratio
// contribute to high R.
function computeOrderParameter() {
  var N = 16;
  var sumCos = 0, sumSin = 0;
  var totalWeight = 0;

  for (var i = 0; i < N; i++) {
    // Normalize phase to fundamental: theta_normalized = theta_i / (i+1)
    // This maps all partials to the same "fundamental cycle" for comparison.
    var normalizedPhase = kuramotoTheta[i] / (i + 1);
    // Weight by current amplitude (louder partials matter more to perceived consonance)
    var amp = partialGains[i] ? partialGains[i].gain.value : 0;
    var weight = amp + 0.001; // tiny floor to avoid division by zero
    sumCos += weight * Math.cos(normalizedPhase);
    sumSin += weight * Math.sin(normalizedPhase);
    totalWeight += weight;
  }

  if (totalWeight > 0) {
    sumCos /= totalWeight;
    sumSin /= totalWeight;
  }

  kuramotoRprev = kuramotoR;
  kuramotoR = Math.sqrt(sumCos * sumCos + sumSin * sumSin);
  kuramotoPsi = Math.atan2(sumSin, sumCos);
  // Smooth dR/dt to avoid jitter
  var rawDRdt = (kuramotoR - kuramotoRprev);
  kuramotoDRdt = kuramotoDRdt * 0.9 + rawDRdt * 0.1;
}

// =====================================================================
// SENSOR STATE (water bottle smoothing on everything)
// =====================================================================
var tiltX = 0, tiltY = 0;
var targetX = 0, targetY = 0;
var velX = 0, velY = 0;
var energy = 0, targetEnergy = 0;
var impactCooldown = 0;

// Water bottle constants
var SPRING = 0.03;
var DAMPING = 0.85;
var ENERGY_ATTACK = 0.15;
var ENERGY_DECAY = 0.97;

// =====================================================================
// VOID STATE MACHINE
// Stillness is a journey, not a state.
// The instrument deepens the longer you hold still.
// =====================================================================
var VOID_PRESENT = 0, VOID_SETTLING = 1, VOID_DEEP = 2, VOID_TRANSCENDENT = 3;
var voidState = VOID_PRESENT;
var voidTimer = 0;
var voidDepth = 0;       // 0-1 continuous
var voidBreathPhase = 0; // slow breath cycle
var VOID_SETTLE_TIME = 2;
var VOID_DEEP_TIME = 5;
var VOID_TRANSCEND_TIME = 15;

function updateVoidState(dt) {
  if (energy < 0.05) {
    voidTimer += dt;
  } else {
    voidTimer *= 0.5;
  }
  voidTimer = Math.max(0, Math.min(60, voidTimer));

  var targetDepth = 0;
  var newState = VOID_PRESENT;

  if (voidTimer >= VOID_TRANSCEND_TIME) {
    newState = VOID_TRANSCENDENT;
    targetDepth = 1;
  } else if (voidTimer >= VOID_DEEP_TIME) {
    newState = VOID_DEEP;
    targetDepth = 0.5 + 0.5 * (voidTimer - VOID_DEEP_TIME) / (VOID_TRANSCEND_TIME - VOID_DEEP_TIME);
  } else if (voidTimer >= VOID_SETTLE_TIME) {
    newState = VOID_SETTLING;
    targetDepth = 0.5 * (voidTimer - VOID_SETTLE_TIME) / (VOID_DEEP_TIME - VOID_SETTLE_TIME);
  }

  voidDepth += (targetDepth - voidDepth) * 0.02;
  voidState = newState;
  voidBreathPhase = (voidBreathPhase + dt * 0.15 * TWO_PI) % TWO_PI;
}

// =====================================================================
// FOR ENGINE - the instrument's soul
//
// Player is Group A. Instrument is Group B.
// B does NOT mirror A. B solves FOR A.
// Player dark -> soul brightens. Player frantic -> soul creates space.
// Player still -> soul breathes. Player loud -> soul retreats.
//
// Each FOR axis has its own water bottle (momentum, overshoot, damping).
// Kuramoto-style coupling: pull = K * sin(target - current)
// The FOR never converges. The trajectory IS the music.
// =====================================================================
var forBrightness = 0.5;
var forDensity = 0.5;
var forMotion = 0;
var forPhase = 0;
var forBreath = 0;

var FOR_K = 0.6;
var FOR_SPRING = 0.02;
var FOR_DAMPING = 0.88;
var FOR_BREATH_RATE = 0.4;
var FOR_NATURAL_FREQ = 0.7;

// =====================================================================
// MULTI-SCALE FOR ENGINE — three ears, not one
//
// Beat FOR:    K=0.6,  ~500ms   — complements each gesture
// Phrase FOR:  K=0.35, ~3s      — complements the trajectory
// Session FOR: K=0.15, ~30-60s  — learns the player's habits
//
// The three layers blend. Conflict is not averaged — it is felt.
// When all three agree, phase lock. When they disagree, tension.
// =====================================================================

// --- PHRASE LAYER STATE ---
var PHRASE_K = 0.35;
var PHRASE_TAU = 2.5;              // seconds, EWMA time constant
var PHRASE_SLOPE_THRESH = 0.02;    // minimum slope to count as building/settling
var PHRASE_BOUNDARY_SILENCE = 0.8; // seconds of low energy to trigger phrase boundary

var phraseBrightEWMA = 0.5;
var phraseDensityEWMA = 0.5;
var phraseBrightSlope = 0;
var phraseDensitySlope = 0;
var phraseBrightPrev = 0.5;
var phraseDensityPrev = 0.5;
var phraseLastSlopeTime = 0;

var phraseBrightness = 0.5;
var phraseDensity = 0.5;
var phraseMotionScale = 1.0;
var phraseBreathRate = 1.0;

var phraseSilenceTimer = 0;
var phraseBreathImpulse = 0;
var phraseBoundaryCount = 0;
var phraseStartTime = 0;
var phraseNoteCount = 0;
var phraseKmod = 1.0;              // Kuramoto coupling modifier from phrase trajectory

// --- SESSION LAYER STATE ---
var SESSION_K = 0.15;
var SESSION_TAU_ENERGY = 45;       // seconds, ultra-slow EWMA
var SESSION_TAU_BRIGHT = 30;       // seconds
var SESSION_BIAS_RATE = 0.001;     // rate of bias drift per frame
var SESSION_BIAS_MAX = 0.15;       // maximum bias magnitude

var sessionBrightEWMA = 0.5;
var sessionDensityEWMA = 0.5;
var sessionBrightBias = 0;
var sessionDensityBias = 0;
var sessionMotionBias = 1.0;
var sessionTime = 0;
var sessionNoteCount = 0;

// Interval tracking
var sessionIntervalHist = new Uint16Array(12);
var sessionLastPitch = -1;
var sessionPreferredIntervals = [7, 5, 4]; // default: P5, P4, M3

// Session energy arc
var sessionEnergySlope = 0;
var sessionEnergyPrev = 0;

// Coupling grain estimation
var sessionStateChangeTimes = [];
var sessionCouplingGrain = 1.0;    // seconds between major state changes
var sessionLastEnergyDir = 0;      // -1, 0, 1

// --- LAYER WEIGHTS (adapted by session layer) ---
var forBeatWeight = 0.55;
var forPhraseWeight = 0.30;
var forSessionWeight = 0.15;

// --- LAYER AGREEMENT (phase lock detection) ---
var forLayerAgreement = 0;

// =====================================================================
// SESSION PERSONALITY — the instrument evolves as you play
//
// Layer 1: GRAVITY WELLS — notes the player returns to become attractors.
//          The more you play a note, the deeper its gravity well.
//          After 5 minutes, the instrument pulls toward YOUR notes.
//
// Layer 2: REGISTER MIGRATION — if you consistently play high, the
//          instrument's natural register drifts up. Like a conversation
//          where both parties gradually raise their pitch.
//
// Layer 3: TEMPO METABOLISM — the instrument's natural pulse adapts to
//          yours. Fast player = faster FOR initiative. Slow = spacious.
//
// Layer 4: CONSONANCE DRIFT — the harmonic palette shifts based on what
//          intervals you favor. If you gravitate to minor thirds, the
//          instrument darkens. Perfect fifths = brightens.
//
// Layer 5: VOID DEPTH — how deep stillness goes depends on how active
//          you've been. More motion = deeper eventual void.
//          The instrument remembers your storms and offers proportional calm.
//
// Layer 6: COUPLING MEMORY — the K between player and soul drifts toward
//          the average K measured this session. Good coupling begets more.
//
// Layer 7: SURPRISE BUDGET — the Mozart surprise probability adapts.
//          If you respond positively to surprises (play more after one),
//          surprises get more frequent. If you go still, they get rarer.
// =====================================================================

// L1: Gravity wells — pitch class visit counts beyond the basic recentNotes
var gravityWells = new Float32Array(12); // depth of each well
var GRAVITY_LEARN_RATE = 0.005;
var GRAVITY_DECAY = 0.9998; // very slow decay per frame
var gravityActive = false; // activates after enough data

// L2: Register migration
var registerBias = 0; // -1 (low) to 1 (high), drifts toward player
var REGISTER_RATE = 0.0002;

// L3: Tempo metabolism
var tempoMetabolism = 1.0; // multiplier on FOR initiative timing
var onsetTimes = []; // recent onset timestamps

// L4: Consonance drift — which intervals the player prefers shapes the palette
var consonanceDrift = 0; // -1 (minor/dark) to 1 (major/bright)

// L5: Void depth scaling
var sessionPeakEnergy = 0;
var voidDepthScale = 1.0; // deeper void after bigger storms

// L6: Coupling memory
var couplingMemory = 0.5; // running average of session K
var COUPLING_MEMORY_RATE = 0.0001;

// L7: Surprise budget
var surpriseBudget = 0.15; // initial Mozart surprise probability
var surpriseResponsePositive = 0;
var surpriseResponseTotal = 0;
var lastSurpriseTime = 0;

function updateSessionPersonality(dt) {
  if (sessionTime < 30) return; // don't adapt in first 30 seconds

  // L1: Gravity wells deepen for played notes
  if (recentNotes.length > 0) {
    var lastPC = recentNotes[recentNotes.length - 1];
    gravityWells[lastPC] += GRAVITY_LEARN_RATE;
  }
  // Slow decay so wells are semi-permanent within a session
  for (var i = 0; i < 12; i++) gravityWells[i] *= GRAVITY_DECAY;
  gravityActive = sessionNoteCount > 20;

  // L2: Register drifts toward player's preferred range
  if (recentNotes.length > 3) {
    var avgPC = 0;
    for (var i = recentNotes.length - 4; i < recentNotes.length; i++) avgPC += recentNotes[i];
    avgPC /= 4;
    // High pitch classes (9-11) = high register, low (0-2) = low
    var playerRegister = (avgPC - 5.5) / 5.5; // normalize to -1..1
    registerBias += (playerRegister - registerBias) * REGISTER_RATE;
  }

  // L3: Tempo from recent onset density
  if (onsetTimes.length > 4) {
    // Trim to last 10 seconds
    var cutoff = sessionTime - 10;
    while (onsetTimes.length > 0 && onsetTimes[0] < cutoff) onsetTimes.shift();
    if (onsetTimes.length > 2) {
      var avgGap = (onsetTimes[onsetTimes.length-1] - onsetTimes[0]) / (onsetTimes.length - 1);
      // Map to metabolism: faster onsets = higher metabolism
      tempoMetabolism = Math.max(0.5, Math.min(2.0, 1.0 / Math.max(0.2, avgGap)));
    }
  }

  // L4: Consonance drift from interval histogram
  if (sessionNoteCount > 10) {
    var minorWeight = (sessionIntervalHist[3] + sessionIntervalHist[8]) || 0; // minor 3rd + minor 6th
    var majorWeight = (sessionIntervalHist[4] + sessionIntervalHist[7]) || 0; // major 3rd + perfect 5th
    var total = minorWeight + majorWeight || 1;
    consonanceDrift += ((majorWeight - minorWeight) / total - consonanceDrift) * 0.001;
    consonanceDrift = Math.max(-1, Math.min(1, consonanceDrift));
  }

  // L5: Void depth scales with peak energy (bigger storms = deeper calm)
  if (energy > sessionPeakEnergy) sessionPeakEnergy = energy;
  voidDepthScale = 1.0 + sessionPeakEnergy * 0.5;

  // L6: Coupling memory — running average of Kuramoto R
  couplingMemory += (kuramotoR - couplingMemory) * COUPLING_MEMORY_RATE;

  // L7: Surprise budget adapts to player response
  if (surpriseResponseTotal > 3) {
    var successRate = surpriseResponsePositive / surpriseResponseTotal;
    surpriseBudget += (successRate * 0.25 - surpriseBudget) * 0.002;
    surpriseBudget = Math.max(0.05, Math.min(0.35, surpriseBudget));
  }
}

// --- BEAT LAYER STATE (rename of existing FOR internals) ---
var beatBright = 0.5;
var beatDensity = 0.5;
var beatVelBright = 0;
var beatVelDensity = 0;
var beatPhase = 0;
var beatBreath = 0;
var beatMotion = 0;

// =====================================================================
// SPECTRAL TENSION ENGINE
// 12-note chromatic graph with consonance edges.
// Tracks what has played, reveals what WANTS to play.
// The music has direction. Notes resolve.
// =====================================================================
var CONSONANCE_INTERVALS = [
  [7, 1.5],  // P5
  [5, 1.33], // P4
  [4, 1.25], // M3
  [3, 1.2],  // m3
  [9, 1.1],  // M6
  [8, 1.0],  // m6
];
var consonanceEdges = new Set();
(function buildEdges() {
  for (var iv = 0; iv < CONSONANCE_INTERVALS.length; iv++) {
    var interval = CONSONANCE_INTERVALS[iv][0];
    for (var root = 0; root < 12; root++) {
      var b = (root + interval) % 12;
      consonanceEdges.add(Math.min(root,b) + ',' + Math.max(root,b));
    }
  }
})();

var recentNotes = [];
var MAX_RECENT = 12;

function feedNote(semi) {
  var pc = ((semi % 12) + 12) % 12;
  recentNotes.push(pc);
  if (recentNotes.length > MAX_RECENT) recentNotes.shift();
  // Feed session layer interval histogram
  sessionNoteCount++;
  phraseNoteCount++;
  if (sessionLastPitch >= 0) {
    var interval = Math.abs(pc - sessionLastPitch) % 12;
    if (interval > 6) interval = 12 - interval; // reduce to within tritone
    sessionIntervalHist[interval]++;
  }
  sessionLastPitch = pc;
}

function getTopTension() {
  // What note WANTS to play but hasn't?
  if (recentNotes.length < 2) return -1;
  var played = new Set(recentNotes.slice(-6));
  var bestNote = -1, bestScore = 0;
  for (var n = 0; n < 12; n++) {
    if (played.has(n)) continue;
    var connected = false;
    for (var p of played) {
      var key = Math.min(n,p) + ',' + Math.max(n,p);
      if (consonanceEdges.has(key)) { connected = true; break; }
    }
    var score = connected ? 1.5 : 0.3;
    // Session layer bias: boost notes at player's preferred intervals from last note
    if (sessionNoteCount > 5 && sessionLastPitch >= 0) {
      var dist = Math.abs(n - sessionLastPitch) % 12;
      if (dist > 6) dist = 12 - dist;
      for (var pi = 0; pi < sessionPreferredIntervals.length; pi++) {
        if (dist === sessionPreferredIntervals[pi]) {
          score += 0.4 - pi * 0.1; // top preferred interval gets +0.4
          break;
        }
      }
    }
    if (score > bestScore) { bestScore = score; bestNote = n; }
  }
  return bestNote;
}

// =====================================================================
// MUSIC INTELLIGENCE MODULE
//
// This is the brain that makes it compose, not just respond.
// Every note selection in the instrument routes through here.
//
// Seven scoring dimensions (from the research):
//   1. Landauer cost: cheaper intervals more likely (energy efficiency)
//   2. Energy contour: tension/release cycle shapes the journey
//   3. Contrary motion: FOR moves opposite to player (Bach)
//   4. Motif completion: finish what you started (thematic development)
//   5. R/K groove target: maintain the sweet spot (0.80-0.85)
//   6. Mozart surprise: mostly predictable, occasionally wrong-then-right
//   7. Voice leading: minimize movement, retain common tones (Tymoczko)
//
// The output is a frequency. The input is the state of everything.
// =====================================================================

// --- Landauer interval costs in nats (from music-theory research) ---
// Index = semitones from current note. Cost = information cost to process.
// Lower cost = more consonant = ear prefers it.
var LANDAUER_COST = [
  0.00,   // 0  unison
  6.91,   // 1  minor second
  4.52,   // 2  major second
  3.33,   // 3  minor third
  2.77,   // 4  major third
  2.20,   // 5  perfect fourth
  7.27,   // 6  tritone
  1.79,   // 7  perfect fifth
  4.09,   // 8  minor sixth
  3.58,   // 9  major sixth
  4.94,   // 10 minor seventh
  0.69    // 11 octave (minor second from octave = 1 semitone short)
];
// Note: index 11 = 11 semitones up = major seventh (not octave).
// Octave is 12 semitones = 0 mod 12 = unison. Fix the mapping:
// We measure intervals mod 12, so 0=unison/octave, and we use the
// LOWER of the two complementary intervals (e.g., 8 semitones or 4 semitones).
// The cost array is indexed by semitone distance (0-11).
// Correction: 11 semitones = major seventh, cost ~6.27 nats (close to m2 inversion)
LANDAUER_COST[11] = 6.27; // major seventh (inversion of minor second)

// --- Energy Contour Phase Machine ---
// The instrument breathes through tension-release cycles.
// Phase 0: HOME      (4-8s)  - consonant, grounded, low tension
// Phase 1: LIFT      (8-16s) - building K, partials reaching, tension rising
// Phase 2: CLIMAX    (2-4s)  - maximum tension, surprise allowed
// Phase 3: RELEASE   (4-8s)  - R catches up, consonance blooms, resolution
var miContourPhase = 0;       // 0=home, 1=lift, 2=climax, 3=release
var miContourTimer = 0;       // seconds in current phase
var miContourCycleCount = 0;  // how many full cycles completed

// Phase durations (randomized per cycle with 1/f)
var miPhaseDurations = [6, 12, 3, 6]; // home, lift, climax, release
var miPhaseTimers = [6, 12, 3, 6];    // current cycle's durations

// --- Surprise counter ---
var miNotesSinceSurprise = 0;
var miSurpriseThreshold = 12; // notes between surprises (randomized 8-16)
var miLastSurpriseNote = -1;  // the "wrong" note we played

// --- Contrary motion tracking ---
var miLastPlayerDirection = 0;  // -1 down, 0 neutral, 1 up
var miLastFORPitch = -1;        // last pitch the FOR/ping played (semitones)
var miLastPlayerPitch = -1;     // last pitch from player interaction

// --- Theme/motif development ---
var miThemeNotes = [];          // the current "theme" (up to 6 notes)
var miThemeAge = 0;             // how long since theme was established
var miThemeMaxAge = 45;         // seconds before theme evolves

// --- R/K tracking for groove target ---
var miRKratio = 0.8;            // smoothed R/K ratio
var MI_RK_TARGET = 0.82;       // sweet spot from research

function miUpdateContour(dt) {
  miContourTimer += dt;

  // Check phase transition
  if (miContourTimer >= miPhaseTimers[miContourPhase]) {
    miContourTimer = 0;
    miContourPhase = (miContourPhase + 1) % 4;

    if (miContourPhase === 0) {
      miContourCycleCount++;
      // Randomize next cycle's durations with 1/f variation
      miPhaseTimers[0] = 5 + Math.abs(pinkSample()) * 4;    // home: 5-9s
      miPhaseTimers[1] = 8 + Math.abs(pinkSample()) * 10;   // lift: 8-18s
      miPhaseTimers[2] = 2 + Math.abs(pinkSample()) * 3;    // climax: 2-5s
      miPhaseTimers[3] = 4 + Math.abs(pinkSample()) * 5;    // release: 4-9s
      // Surprise threshold resets per cycle
      miSurpriseThreshold = 8 + Math.floor(Math.abs(pinkSample()) * 8);
    }
  }

  // Update R/K ratio (smoothed)
  // R is the Kuramoto order parameter (0-1): realized coherence.
  // We normalize against the coupling strength: higher K SHOULD produce higher R.
  // The ratio tells us how much of the available coupling is being realized.
  // When R/K_normalized > 0.9, things are too locked (boring).
  // When R/K_normalized < 0.7, things are too loose (chaotic).
  // Sweet spot: 0.80-0.85.
  if (kPartials > 0.01) {
    // K_normalized: how much coupling is being applied relative to base
    var kNorm = Math.min(kPartials / K_PARTIALS_BASE, 5.0); // cap at 5x base
    // R/K: order achieved vs coupling applied. High K + low R = tension.
    var instantRK = kuramotoR / Math.max(0.1, kNorm * 0.2);
    instantRK = Math.max(0, Math.min(1, instantRK));
    miRKratio = miRKratio * 0.95 + instantRK * 0.05;
  }

  // Theme aging
  miThemeAge += dt;
  if (miThemeAge > miThemeMaxAge && miThemeNotes.length > 0) {
    // Theme evolves: shift it, invert it, or start fresh
    var evolution = Math.random();
    if (evolution < 0.3 && miThemeNotes.length >= 3) {
      // Inversion: flip the intervals
      var newTheme = [miThemeNotes[0]];
      for (var ti = 1; ti < miThemeNotes.length; ti++) {
        var interval = miThemeNotes[ti] - miThemeNotes[ti-1];
        newTheme.push(newTheme[newTheme.length-1] - interval);
      }
      miThemeNotes = newTheme;
    } else if (evolution < 0.6 && miThemeNotes.length >= 3) {
      // Retrograde: reverse the theme
      miThemeNotes = miThemeNotes.slice().reverse();
    } else {
      // Fresh start: keep first note as anchor
      miThemeNotes = miThemeNotes.length > 0 ? [miThemeNotes[0]] : [];
    }
    miThemeAge = 0;
    miThemeMaxAge = 30 + Math.abs(pinkSample()) * 30; // 30-60s next time
  }
}

// Get the energy contour bias for the current phase.
// Returns a value that biases note selection:
//   negative = prefer consonant (cheap intervals)
//   positive = prefer dissonant (expensive intervals)
function miGetContourBias() {
  var phaseProgress = miPhaseTimers[miContourPhase] > 0 ?
    miContourTimer / miPhaseTimers[miContourPhase] : 0;

  switch (miContourPhase) {
    case 0: // HOME - prefer consonance, mild drift toward tension at end
      return -0.6 + phaseProgress * 0.3;
    case 1: // LIFT - tension builds linearly
      return -0.3 + phaseProgress * 0.8;
    case 2: // CLIMAX - maximum tension, surprise welcome
      return 0.5 + phaseProgress * 0.3;
    case 3: // RELEASE - consonance returns, deepening
      return 0.5 - phaseProgress * 0.9;
    default: return 0;
  }
}

// Score a candidate note (0-11 pitch class) given the current musical state.
// Higher score = more likely to be chosen.
// fromFOR: true if this is FOR initiative / soul speaking
// lastPitchPC: pitch class of the last note played (0-11), or -1
// playerDirection: -1/0/1 direction of player's recent pitch movement
function miScoreNote(candidate, lastPitchPC, fromFOR, playerDirection) {
  if (lastPitchPC < 0) return 1.0; // no context yet, all notes equal

  var interval = Math.abs(candidate - lastPitchPC) % 12;
  if (interval > 6) interval = 12 - interval; // use smaller of complementary intervals
  var cost = LANDAUER_COST[Math.abs(candidate - lastPitchPC) % 12];

  var score = 0;

  // === 1. LANDAUER COST (base score) ===
  // Probability inversely proportional to cost.
  // Unison (0 nats) -> score 1.0
  // Tritone (7.27 nats) -> score ~0.14
  // This creates a natural preference for consonance.
  if (cost < 0.01) {
    score += 0.7; // unison: good but not always the best choice
  } else {
    score += 1.0 / (1.0 + cost * 0.3);
  }

  // === 2. ENERGY CONTOUR ===
  // Contour bias shifts the balance between consonant and dissonant
  var contourBias = miGetContourBias();
  if (contourBias > 0) {
    // Tension phase: boost expensive intervals, dampen cheap ones
    score += contourBias * (cost / 7.27) * 0.4;
  } else {
    // Resolution phase: boost cheap intervals more
    score += Math.abs(contourBias) * (1.0 - cost / 7.27) * 0.4;
  }

  // === 3. CONTRARY MOTION (Bach) ===
  // When FOR is choosing, prefer opposite direction from player
  if (fromFOR && playerDirection !== 0) {
    var noteDirection = candidate - lastPitchPC;
    if (noteDirection > 6) noteDirection -= 12;
    if (noteDirection < -6) noteDirection += 12;
    // Player going up? Prefer notes below current (negative direction)
    // Player going up fast? Prefer slow downward steps
    if (playerDirection > 0 && noteDirection < 0) {
      score += 0.35; // contrary motion bonus
      if (interval <= 2) score += 0.15; // stepwise contrary = best
    } else if (playerDirection < 0 && noteDirection > 0) {
      score += 0.35;
      if (interval <= 2) score += 0.15;
    }
    // Penalty for parallel fifths (both moving same direction by P5)
    if (noteDirection !== 0 && interval === 7 &&
        ((playerDirection > 0 && noteDirection > 0) ||
         (playerDirection < 0 && noteDirection < 0))) {
      score -= 0.5; // forbidden parallel fifth
    }
  }

  // === 4. MOTIF COMPLETION ===
  // If this note would complete a pattern from the theme, big bonus
  if (miThemeNotes.length >= 2) {
    var themePos = miThemeNotes.length % miThemeNotes.length;
    // Check if candidate matches next expected note in theme cycle
    if (miThemeNotes.length >= 3) {
      var expectedNext = miThemeNotes[miThemeNotes.length % 3]; // cycle through first 3
      // Transposition-invariant: check interval from last note
      if (miThemeNotes.length > 1) {
        var themeInterval = (miThemeNotes[1] - miThemeNotes[0] + 12) % 12;
        var candidateInterval = (candidate - lastPitchPC + 12) % 12;
        if (candidateInterval === themeInterval) {
          score += 0.45; // completing the theme pattern
        }
        // Inverted theme interval also gets a smaller bonus (development)
        if (candidateInterval === (12 - themeInterval) % 12) {
          score += 0.2;
        }
      }
    }
  }

  // === 5. R/K GROOVE TARGET ===
  // If R/K is too high (boring), prefer dissonant notes to shake things up
  // If R/K is too low (chaotic), prefer consonant notes to stabilize
  var rkDiff = miRKratio - MI_RK_TARGET;
  if (rkDiff > 0.05) {
    // Too locked: boost expensive intervals
    score += rkDiff * 3 * (cost / 7.27) * 0.3;
  } else if (rkDiff < -0.1) {
    // Too loose: boost cheap intervals
    score += Math.abs(rkDiff) * 3 * (1.0 - cost / 7.27) * 0.3;
  }

  // === 6. MOZART SURPRISE ===
  // Every 8-16 notes, one note should be "wrong" — an expensive interval
  // that resolves beautifully by being consonant with what comes NEXT.
  // (miNotesSinceSurprise is incremented in miChooseNote, not here)
  // Surprise threshold adapts to player's response (Session Personality L7)
  var effectiveThreshold = Math.round(miSurpriseThreshold * (1.0 / Math.max(0.1, surpriseBudget * 4)));
  if (miNotesSinceSurprise >= effectiveThreshold) {
    // Time for a surprise. Boost expensive intervals dramatically.
    if (cost > 4.0) {
      score += 0.6; // the minor sixth when the fifth was expected
    }
    // The surprise note should set up the NEXT note to resolve
    // (we handle this by checking if expensive intervals lead to cheap resolutions)
    // Minor sixth (8 semitones) resolves to perfect fifth (7) by half step
    if (interval === 8) score += 0.3; // m6 -> P5 resolution available
    if (interval === 6) score += 0.2; // tritone -> P5 resolution available
  }

  // === 7. VOICE LEADING (Tymoczko) ===
  // Prefer stepwise motion (seconds). Penalize large leaps unless during climax.
  if (interval <= 2) {
    score += 0.25; // stepwise: smooth voice leading
  } else if (interval >= 5 && miContourPhase !== 2) {
    score -= 0.15 * (interval - 4) / 7; // large leaps penalized outside climax
  }
  // During climax, leaps are expressive
  if (miContourPhase === 2 && interval >= 5) {
    score += 0.15;
  }

  // === SESSION PERSONALITY: GRAVITY WELLS ===
  // Notes the player returns to become attractors
  if (gravityActive) {
    score += gravityWells[candidate] * 2.0; // deep wells pull harder
  }

  // === SESSION PERSONALITY: CONSONANCE DRIFT ===
  // If player prefers minor intervals, darken the palette
  if (Math.abs(consonanceDrift) > 0.05) {
    if (consonanceDrift > 0 && (interval === 4 || interval === 7)) {
      score += consonanceDrift * 0.3; // boost major/perfect when player is bright
    } else if (consonanceDrift < 0 && (interval === 3 || interval === 8)) {
      score += Math.abs(consonanceDrift) * 0.3; // boost minor when player is dark
    }
  }

  // === SESSION PREFERENCE ===
  // Blend in the player's demonstrated interval preferences
  if (sessionNoteCount > 8 && sessionLastPitch >= 0) {
    var dist = Math.abs(candidate - sessionLastPitch) % 12;
    if (dist > 6) dist = 12 - dist;
    for (var pi = 0; pi < sessionPreferredIntervals.length; pi++) {
      if (dist === sessionPreferredIntervals[pi]) {
        score += 0.2 * (1 - pi * 0.25);
        break;
      }
    }
  }

  // === AVOID IMMEDIATE REPETITION ===
  if (candidate === lastPitchPC) {
    score -= 0.3;
  }

  // === AVOID NOTES PLAYED VERY RECENTLY ===
  if (recentNotes.length > 0) {
    var lastFew = recentNotes.slice(-4);
    var recency = 0;
    for (var ri = 0; ri < lastFew.length; ri++) {
      if (lastFew[ri] === candidate) recency += 0.15 * (ri + 1) / lastFew.length;
    }
    score -= recency;
  }

  return Math.max(0.01, score);
}

// Choose the best note using weighted random selection from scored candidates.
// Returns pitch class (0-11), or -1 if insufficient context.
// fromFOR: true if FOR initiative is choosing
function miChooseNote(fromFOR) {
  var lastPC = sessionLastPitch;
  if (lastPC < 0 && recentNotes.length > 0) {
    lastPC = recentNotes[recentNotes.length - 1];
  }
  if (lastPC < 0) return -1;

  // Determine player direction from recent notes
  var playerDir = 0;
  if (recentNotes.length >= 2) {
    var prev = recentNotes[recentNotes.length - 2];
    var curr = recentNotes[recentNotes.length - 1];
    var diff = curr - prev;
    if (diff > 6) diff -= 12;
    if (diff < -6) diff += 12;
    if (diff > 0) playerDir = 1;
    else if (diff < 0) playerDir = -1;
  }

  // Score all 12 pitch classes
  var scores = [];
  var totalScore = 0;
  for (var n = 0; n < 12; n++) {
    var s = miScoreNote(n, lastPC, fromFOR, playerDir);
    scores.push(s);
    totalScore += s;
  }

  // Weighted random selection (temperature-modulated)
  // During home/release: lower temperature (more predictable)
  // During lift/climax: higher temperature (more exploratory)
  var temperature = 1.0;
  if (miContourPhase === 0 || miContourPhase === 3) temperature = 0.6;
  if (miContourPhase === 2) temperature = 1.5;

  // Apply temperature: raise scores to power of 1/temperature
  var tempScores = [];
  var tempTotal = 0;
  for (var n = 0; n < 12; n++) {
    var ts = Math.pow(scores[n] / totalScore, 1.0 / temperature);
    tempScores.push(ts);
    tempTotal += ts;
  }

  // Weighted random selection
  var roll = Math.random() * tempTotal;
  var cumulative = 0;
  var chosen = 0;
  for (var n = 0; n < 12; n++) {
    cumulative += tempScores[n];
    if (roll <= cumulative) { chosen = n; break; }
  }

  // Increment surprise counter (once per note, not per candidate)
  miNotesSinceSurprise++;

  // Track surprise state
  if (miNotesSinceSurprise >= miSurpriseThreshold) {
    var chosenCost = LANDAUER_COST[Math.abs(chosen - lastPC) % 12];
    if (chosenCost > 4.0) {
      // A surprise was delivered
      miNotesSinceSurprise = 0;
      miLastSurpriseNote = chosen;
      miSurpriseThreshold = 8 + Math.floor(Math.abs(pinkSample()) * 8);
    }
  }

  // Update theme
  miThemeNotes.push(chosen);
  if (miThemeNotes.length > 6) miThemeNotes.shift();

  return chosen;
}

// Convert a pitch class (0-11) to a frequency in a target octave range.
// baseFreq: the harmonic center frequency
// octaveMultiplier: which octave register (e.g., 16 for high pings, 4 for mid)
// Returns frequency in Hz.
function miPCtoFreq(pc, baseFreq, octaveMultiplier) {
  // The pitch class relative to the root
  // Root = 0 = the harmonic center itself
  var semitones = pc; // already 0-11
  var freq = baseFreq * octaveMultiplier * Math.pow(2, semitones / 12);

  // 1/f micro-tuning (humanize): +/- ~5 cents
  freq *= (1 + pinkSample() * 0.003);

  return freq;
}

// Apply 1/f timing variation to a base interval.
// Returns the modified interval in seconds.
function miPinkTiming(baseInterval) {
  // Pink noise deviation: +/- 15% of base interval
  var deviation = pinkSample() * 0.15 * baseInterval;
  return Math.max(baseInterval * 0.5, baseInterval + deviation);
}

// =====================================================================
// MUSIC EVOLUTION ENGINE
//
// The instrument goes on its own musical journey. Four systems:
//   1. Melodic Memory:   circular buffer + motif detection + 1/f recall
//   2. Rhythmic Pulse:   emergent grid from player IOI, Euclidean patterns
//   3. Harmonic Journey:  tonal center modulation (33 -> related keys -> home)
//   4. FOR Initiative:   the soul speaks first when the player is still
//
// Built ON TOP of existing systems. The Kuramoto Heart, three-scale FOR,
// void state machine, and spectral tension engine all remain untouched.
// The evolution engine reads their state and adds musical agency.
// =====================================================================

// --- MELODIC MEMORY ---
// Circular buffer of recent melodic events (pitch, time, energy, source)
var melodyMemory = [];        // [{pitch, time, energy, fromFOR}]
var MELODY_MEMORY_SIZE = 16;
var melodyMotifs = [];        // detected motif patterns [{intervals, startIdx, count}]
var melodyLastMotifCheck = 0;

function melodyRecord(pitchHz, noteEnergy, fromFOR) {
  melodyMemory.push({
    pitch: pitchHz,
    time: sessionTime,
    energy: noteEnergy || 0.5,
    fromFOR: fromFOR || false
  });
  if (melodyMemory.length > MELODY_MEMORY_SIZE) melodyMemory.shift();
}

// Extract interval pattern from a slice of melody memory
// Returns array of semitone intervals (can be negative)
function melodyIntervals(arr, startIdx, len) {
  var intervals = [];
  for (var i = 1; i < len && startIdx + i < arr.length; i++) {
    var ratio = arr[startIdx + i].pitch / arr[startIdx + i - 1].pitch;
    // Convert ratio to semitones
    intervals.push(Math.round(12 * Math.log2(ratio)));
  }
  return intervals;
}

// Check if two interval patterns match (transposition-invariant)
function motifsMatch(a, b) {
  if (a.length !== b.length || a.length < 2) return false;
  for (var i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

// Scan melody memory for recurring motifs (3-4 note patterns)
function melodyDetectMotifs() {
  melodyMotifs = [];
  if (melodyMemory.length < 6) return;

  // Check motif lengths 3 and 4
  for (var mLen = 3; mLen <= 4; mLen++) {
    // The most recent mLen notes form the "query" pattern
    var queryStart = melodyMemory.length - mLen;
    if (queryStart < 0) continue;
    var queryIntervals = melodyIntervals(melodyMemory, queryStart, mLen);
    if (queryIntervals.length < 2) continue;

    // Search earlier in memory for matching patterns
    for (var s = 0; s <= melodyMemory.length - mLen * 2; s++) {
      var candidate = melodyIntervals(melodyMemory, s, mLen);
      if (motifsMatch(queryIntervals, candidate)) {
        melodyMotifs.push({
          intervals: queryIntervals,
          startIdx: s,
          count: mLen,
          recentIdx: queryStart
        });
      }
    }
  }
}

// Given the current state, choose the next note with motif awareness
// Returns a frequency in Hz, or -1 if no suggestion
function melodyChooseNext() {
  if (melodyMemory.length < 3) return -1;
  var last = melodyMemory[melodyMemory.length - 1];

  // Check if we're in the middle of completing a motif
  // Look for a motif where we've played the first N-1 notes and need the Nth
  for (var mLen = 4; mLen >= 3; mLen--) {
    if (melodyMemory.length < mLen) continue;
    var partialQuery = melodyIntervals(melodyMemory, melodyMemory.length - (mLen - 1), mLen - 1);
    if (partialQuery.length < 1) continue;

    // Search earlier memory for a longer pattern that starts with these intervals
    for (var s = 0; s <= melodyMemory.length - mLen - 1; s++) {
      var fullPattern = melodyIntervals(melodyMemory, s, mLen);
      if (fullPattern.length < mLen - 1) continue;

      // Check if the beginning matches
      var match = true;
      for (var i = 0; i < partialQuery.length; i++) {
        if (partialQuery[i] !== fullPattern[i]) { match = false; break; }
      }

      if (match) {
        // The completing interval is fullPattern[mLen-2]
        var completingInterval = fullPattern[mLen - 2];
        var completingFreq = last.pitch * Math.pow(2, completingInterval / 12);

        // 1/f variation: don't repeat exactly. Transform.
        // ±50 cents of pink noise on pitch
        var pinkCents = pinkSample() * 50;
        completingFreq *= Math.pow(2, pinkCents / 1200);

        return completingFreq;
      }
    }
  }

  return -1; // no motif completion available
}

// --- RHYTHMIC EVOLUTION ---
// Emergent pulse from player inter-onset intervals (IOI)
var rhythmPhase = 0;          // 0 = free, 1 = pulse emerging, 2 = groove
var rhythmGrid = 0;           // current grid period in seconds (0 = no grid)
var rhythmGridPhase = 0;      // where we are in the current grid cycle (0-1)
var rhythmIOIs = [];           // recent inter-onset intervals
var rhythmLastOnset = 0;      // time of last note onset
var rhythmIOIewma = 0;        // exponentially weighted mean IOI
var rhythmGridStrength = 0;   // how strongly notes attract to grid (0-1)
var rhythmEuclidean = [];     // Euclidean pattern slots (booleans)
var rhythmEuclideanLen = 0;   // cycle length in grid units
var rhythmEuclideanHits = 0;  // number of hits per cycle
var rhythmEuclideanStep = 0;  // current step in Euclidean cycle
var rhythmPhraseStretch = 1.0; // phrase FOR breathes the grid

function rhythmRecordOnset() {
  var now = sessionTime;
  // Feed session personality tempo metabolism
  onsetTimes.push(now);
  if (onsetTimes.length > 30) onsetTimes.shift();
  if (rhythmLastOnset > 0) {
    var ioi = now - rhythmLastOnset;
    if (ioi > 0.1 && ioi < 4.0) { // ignore very fast or very slow
      rhythmIOIs.push(ioi);
      if (rhythmIOIs.length > 24) rhythmIOIs.shift();
      // EWMA of IOI
      if (rhythmIOIewma === 0) {
        rhythmIOIewma = ioi;
      } else {
        rhythmIOIewma = rhythmIOIewma * 0.7 + ioi * 0.3;
      }
    }
  }
  rhythmLastOnset = now;
}

// Compute Euclidean rhythm: distribute k hits over n slots
function euclidean(n, k) {
  if (k <= 0 || n <= 0) return [];
  if (k >= n) { var all = []; for (var i = 0; i < n; i++) all.push(true); return all; }
  var pattern = [];
  for (var i = 0; i < n; i++) {
    pattern.push(Math.floor((i * k) / n) !== Math.floor(((i + 1) * k) / n) ? false : true);
  }
  // Bjorklund's algorithm via the accumulator method
  pattern = [];
  for (var i = 0; i < n; i++) {
    pattern.push(((i * k) % n) < k);
  }
  return pattern;
}

function rhythmUpdate(dt) {
  // Phase transitions based on session time
  var prevPhase = rhythmPhase;

  if (sessionTime < 30) {
    rhythmPhase = 0; // free
    rhythmGridStrength = 0;
  } else if (sessionTime < 120) {
    rhythmPhase = 1; // pulse emerging
    // Grid strength ramps from 0 to 0.6 over this phase
    rhythmGridStrength = Math.min(0.6, (sessionTime - 30) / 150);
  } else {
    rhythmPhase = 2; // groove
    rhythmGridStrength = Math.min(0.8, 0.6 + (sessionTime - 120) / 300);
  }

  // Establish grid from IOI data
  if (rhythmIOIs.length >= 4 && rhythmIOIewma > 0.15) {
    rhythmGrid = rhythmIOIewma;
  }

  // Advance grid phase
  if (rhythmGrid > 0) {
    rhythmGridPhase += dt / (rhythmGrid * rhythmPhraseStretch);
    if (rhythmGridPhase >= 1.0) {
      rhythmGridPhase -= 1.0;
      // Advance Euclidean step
      if (rhythmEuclideanLen > 0) {
        rhythmEuclideanStep = (rhythmEuclideanStep + 1) % rhythmEuclideanLen;
      }
    }
  }

  // Phrase FOR breathes the grid (building phrases speed up, settling slows down)
  rhythmPhraseStretch = 1.0 - phraseDensitySlope * 0.15;
  rhythmPhraseStretch = Math.max(0.9, Math.min(1.1, rhythmPhraseStretch));

  // Establish Euclidean pattern from note density
  if (rhythmPhase >= 2 && rhythmGrid > 0 && sessionNoteCount > 12) {
    // Estimate cycle length from coupling grain
    var cycleBeats = Math.round(sessionCouplingGrain / rhythmGrid);
    cycleBeats = Math.max(4, Math.min(16, cycleBeats));
    // Estimate hit density from phrase note rate
    var noteRate = phraseNoteCount / Math.max(1, sessionTime - phraseStartTime);
    var hits = Math.round(noteRate * rhythmGrid * cycleBeats);
    hits = Math.max(2, Math.min(cycleBeats - 1, hits));

    if (cycleBeats !== rhythmEuclideanLen || hits !== rhythmEuclideanHits) {
      rhythmEuclideanLen = cycleBeats;
      rhythmEuclideanHits = hits;
      rhythmEuclidean = euclidean(cycleBeats, hits);
    }
  }
}

// Returns timing bias for next ping: how much to attract toward grid
// Returns {bias: -1 to 1, isGridBeat: bool, shouldPlay: bool}
function rhythmGetTimingBias() {
  if (rhythmPhase === 0 || rhythmGrid === 0) {
    return {bias: 0, isGridBeat: false, shouldPlay: true};
  }

  // How close are we to the next grid beat?
  // gridPhase 0 = on beat, 0.5 = maximally off-beat
  var distFromBeat = rhythmGridPhase;
  if (distFromBeat > 0.5) distFromBeat = 1.0 - distFromBeat;

  var isNearBeat = distFromBeat < 0.15;
  var bias = 0;

  if (rhythmPhase >= 1) {
    // Attract toward beats with 1/f jitter
    bias = -Math.sin(rhythmGridPhase * TWO_PI) * rhythmGridStrength;
    // 1/f timing deviation (the human feel)
    bias += pinkSample() * 0.15;
  }

  // Euclidean gating in groove phase
  var shouldPlay = true;
  if (rhythmPhase >= 2 && rhythmEuclidean.length > 0) {
    shouldPlay = rhythmEuclidean[rhythmEuclideanStep];
    // Even on "off" beats, allow occasional notes (30% chance) for 1/f surprise
    if (!shouldPlay && Math.random() < 0.3) shouldPlay = true;
  }

  return {bias: bias, isGridBeat: isNearBeat, shouldPlay: shouldPlay};
}

// --- HARMONIC JOURNEY ---
// The tonal center moves. Related keys. Returns home.
var harmonicCenter = 33;       // current tonal center (starts at home)
var harmonicHome = 33;         // home key
var harmonicTarget = 33;       // where we're modulating to
var harmonicModCount = 0;      // how many modulations this session
var harmonicMaxMods = 3;       // max modulations per session
var harmonicLastModTime = 0;   // when last modulation happened
var harmonicModCooldown = 30;  // minimum seconds between modulations
var harmonicModulating = false; // currently in transition?
var harmonicModPhase = 0;      // 0-1 transition progress
var harmonicModDuration = 4;   // seconds to complete modulation
var harmonicReturning = false; // heading home?
var harmonicRStable = 0;       // how long R has been > 0.5

// Related keys by consonance (ratio from current center)
var harmonicRelations = [
  {ratio: 3/2, name: 'fifth up', weight: 1.0},
  {ratio: 4/3, name: 'fourth up', weight: 0.85},
  {ratio: 5/6, name: 'relative minor', weight: 0.7},
  {ratio: 5/4, name: 'major third', weight: 0.5},
  {ratio: 2/3, name: 'fifth down', weight: 0.9},
];

function harmonicUpdate(dt) {
  // Track R stability
  if (kuramotoR > 0.5) {
    harmonicRStable += dt;
  } else {
    harmonicRStable *= 0.9;
  }

  // Currently modulating? Advance the transition.
  if (harmonicModulating) {
    harmonicModPhase += dt / harmonicModDuration;

    if (harmonicModPhase >= 1.0) {
      // Modulation complete
      harmonicModPhase = 1.0;
      harmonicModulating = false;
      harmonicCenter = harmonicTarget;
      harmonicReturning = false;
      harmonicRStable = 0; // reset stability counter after arrival
    }

    // Smooth interpolation of center frequency (log-space for pitch)
    var logStart = Math.log2(harmonicCenter);
    var logEnd = Math.log2(harmonicTarget);
    // Ease-in-out curve
    var t = harmonicModPhase;
    var ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    var currentLog = logStart + (logEnd - logStart) * ease;
    var currentCenter = Math.pow(2, currentLog);

    // Apply to all oscillators
    harmonicApplyCenter(currentCenter);
    return;
  }

  // Should we modulate?
  if (harmonicModCount >= harmonicMaxMods) {
    // Check if it's time to return home
    if (!harmonicReturning && harmonicCenter !== harmonicHome &&
        sessionTime > 180 && harmonicRStable > 8) {
      harmonicStartMod(harmonicHome, true);
    }
    return;
  }

  // Conditions for modulation:
  // 1. R stable for >10 seconds (consonance established)
  // 2. Phrase boundary detected (natural transition point)
  // 3. Enough time since last modulation
  // 4. Session has been going for a while
  if (harmonicRStable > 10 &&
      sessionTime - harmonicLastModTime > harmonicModCooldown &&
      sessionTime > 60 &&
      phraseSilenceTimer > 0.3) {

    // Choose modulation target using session's preferred intervals
    var bestTarget = harmonicHome;
    var bestScore = -1;

    for (var i = 0; i < harmonicRelations.length; i++) {
      var rel = harmonicRelations[i];
      var candidateFreq = harmonicCenter * rel.ratio;
      // Keep in reasonable range (20-80 Hz for fundamentals)
      if (candidateFreq < 20 || candidateFreq > 80) continue;
      // Don't go back to where we just were
      if (Math.abs(candidateFreq - harmonicHome) < 1 && harmonicModCount > 0) continue;

      var score = rel.weight;
      // Boost by session interval preference
      var relInterval = Math.round(12 * Math.log2(rel.ratio));
      if (relInterval < 0) relInterval += 12;
      for (var si = 0; si < sessionPreferredIntervals.length; si++) {
        if (Math.abs(relInterval - sessionPreferredIntervals[si]) <= 1) {
          score += 0.3 * (1 - si * 0.2);
        }
      }
      // Add 1/f randomness to selection
      score += pinkSample() * 0.2;

      if (score > bestScore) {
        bestScore = score;
        bestTarget = candidateFreq;
      }
    }

    if (bestTarget !== harmonicCenter) {
      harmonicStartMod(bestTarget, false);
    }
  }
}

function harmonicStartMod(targetFreq, isReturn) {
  harmonicTarget = targetFreq;
  harmonicModulating = true;
  harmonicModPhase = 0;
  harmonicModCount++;
  harmonicLastModTime = sessionTime;
  harmonicReturning = isReturn;
  // Longer duration for the return home (feels like arrival)
  harmonicModDuration = isReturn ? 6 : 4;
}

function harmonicApplyCenter(centerFreq) {
  // Update the working fundamental — the main update loop reads this
  // every frame to compute partial frequencies, drone, sub, and pings.
  // No need to set oscillator frequencies directly here; the main loop
  // handles that with its own detuning/FOR/tilt contributions applied.
  FUNDAMENTAL = centerFreq;

  // Update Kuramoto natural frequencies to match the new center
  for (var i = 0; i < 16; i++) {
    kuramotoOmega[i] = TWO_PI * centerFreq * (i + 1);
  }

  // Void partials need direct update (they're not in the main loop's
  // partial frequency sweep since they're separate oscillators)
  if (actx) {
    var now = actx.currentTime;
    var voidRatios = [0.25, 0.5, 1, 4/3, 1.5, 2];
    for (var vi = 0; vi < voidPartials.length; vi++) {
      voidPartials[vi].frequency.setTargetAtTime(
        centerFreq * 4 * voidRatios[vi], now, 0.3
      );
    }
  }
}

// --- FOR INITIATIVE ---
// When the player is still, the soul speaks first.
// Gentle notes from memory. Simple intervals. Builds if player stays still.
var forInitiative = false;      // is the soul currently leading?
var forInitiativeTimer = 0;     // how long the soul has been leading
var forInitiativeIntensity = 0; // 0-1 how developed the solo is
var forInitiativeLastNote = 0;  // time of last initiative note
var forInitiativeBaseRate = 1.2; // seconds between initiative notes (slow, gentle)
var forInitiativeStartTime = 0;
var INITIATIVE_TRIGGER_TIME = 3; // seconds of void before soul speaks

function forInitiativeUpdate(dt) {
  // Check conditions: player in void state for >3 seconds
  if (voidTimer >= INITIATIVE_TRIGGER_TIME && energy < 0.05) {
    if (!forInitiative) {
      // Soul begins to speak
      forInitiative = true;
      forInitiativeTimer = 0;
      forInitiativeIntensity = 0;
      forInitiativeStartTime = sessionTime;
    }

    forInitiativeTimer += dt;
    // Intensity ramps slowly: 0 at start, peaks at ~0.7 after 30 seconds
    forInitiativeIntensity = Math.min(0.7, forInitiativeTimer / 45);

    // Should we play a note?
    var timeSinceLast = sessionTime - forInitiativeLastNote;
    // Note rate increases with intensity (starts slow, gets denser)
    var rate = forInitiativeBaseRate * (1 - forInitiativeIntensity * 0.5);

    // Music Intelligence: contour phase affects note rate
    // Home/release: slower, more space (the musician breathes)
    // Lift: gradually denser (building)
    // Climax: densest (urgent)
    if (miContourPhase === 0) {
      rate *= 1.3; // home: spacious
    } else if (miContourPhase === 1) {
      var liftProgress = miPhaseTimers[1] > 0 ? miContourTimer / miPhaseTimers[1] : 0;
      rate *= (1.2 - liftProgress * 0.4); // lift: starts spacious, tightens
    } else if (miContourPhase === 2) {
      rate *= 0.7; // climax: dense, urgent
    } else {
      rate *= 1.1; // release: easing
    }

    // 1/f timing variation (the human feel)
    rate = miPinkTiming(rate);
    rate = Math.max(0.3, rate);

    if (timeSinceLast > rate) {
      forInitiativePlayNote();
      forInitiativeLastNote = sessionTime;
    }
  } else {
    if (forInitiative) {
      // Player returned. Soul backs off.
      forInitiative = false;
      forInitiativeIntensity *= 0.5; // quick fade
    }
    forInitiativeTimer = 0;
  }
}

function forInitiativePlayNote() {
  if (!actx) return;
  var now = actx.currentTime;
  var center = harmonicCenter || FUNDAMENTAL;
  var vol = 0.015 + forInitiativeIntensity * 0.025;

  // ===================================================================
  // MUSIC INTELLIGENCE: the soul composes, not randomizes
  // ===================================================================
  var freq = -1;

  // First: try motif completion (thematic development)
  melodyDetectMotifs();
  if (melodyMotifs.length > 0 && Math.random() < 0.5) {
    freq = melodyChooseNext();
  }

  if (freq <= 0) {
    // Music Intelligence chooses the note
    var chosenPC = miChooseNote(true); // true = FOR is choosing

    if (chosenPC >= 0) {
      // Choose octave register based on intensity:
      // Early (quiet): mid register (4x). Developing: wide range. Full: high register too.
      var octaveMult, octChoices;
      if (forInitiativeIntensity < 0.2) {
        // Very early: stay in mid register, mostly roots and fifths
        octaveMult = 4 + Math.floor(Math.random() * 2) * 4; // 4 or 8
      } else if (forInitiativeIntensity < 0.4) {
        // Developing: wider range
        octChoices = [4, 8, 8, 16];
        octaveMult = octChoices[Math.floor(Math.random() * octChoices.length)];
      } else {
        // Full development: full range, prefer higher
        octChoices = [4, 8, 8, 16, 16, 16];
        octaveMult = octChoices[Math.floor(Math.random() * octChoices.length)];
      }

      freq = miPCtoFreq(chosenPC, center, octaveMult);

      // Keep in singing range (130-2000 Hz)
      while (freq < 130) freq *= 2;
      while (freq > 2000) freq /= 2;
    } else {
      // Fallback: perfect fifth above center in mid register
      freq = center * 6; // 3rd harmonic = P5 above octave
      while (freq < 200) freq *= 2;
      while (freq > 1500) freq /= 2;
    }
  } else {
    // Motif completion: keep in range
    while (freq < 130) freq *= 2;
    while (freq > 2000) freq /= 2;
  }

  // Duration: contour-aware
  // Home/release phases: longer, more sustained (the musician lingers)
  // Lift/climax: shorter, more urgent
  var baseDur;
  if (miContourPhase === 0 || miContourPhase === 3) {
    baseDur = 0.12 + forInitiativeIntensity * 0.25; // longer in consonant phases
  } else if (miContourPhase === 2) {
    baseDur = 0.06 + forInitiativeIntensity * 0.08; // short in climax
  } else {
    baseDur = 0.08 + forInitiativeIntensity * 0.15; // medium in lift
  }
  // 1/f timing variation
  var dur = miPinkTiming(baseDur);
  dur = Math.max(0.04, Math.min(0.5, dur));

  // Pitch slide: during release, notes slide DOWN slightly (resolution feel)
  // During lift, notes bend UP slightly (reaching feel)
  var pitchSlideRatio;
  if (miContourPhase === 3) {
    pitchSlideRatio = 0.96 + pinkSample() * 0.01; // slide down
  } else if (miContourPhase === 1) {
    pitchSlideRatio = 1.01 + pinkSample() * 0.005; // bend up slightly
  } else {
    pitchSlideRatio = 0.97 + pinkSample() * 0.01; // gentle fall (default)
  }

  // Create the note
  var osc1 = actx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(freq, now);
  osc1.frequency.exponentialRampToValueAtTime(
    Math.max(20, freq * pitchSlideRatio), now + dur
  );

  var env = actx.createGain();
  // Attack time: faster during climax, slower during home
  var attackTime = miContourPhase === 2 ? 0.008 : 0.025;
  env.gain.setValueAtTime(0.001, now);
  env.gain.linearRampToValueAtTime(vol, now + attackTime);
  // Sustain shape depends on contour phase
  if (miContourPhase === 0 || miContourPhase === 3) {
    // Home/release: gentle sustain, soft tail
    env.gain.setValueAtTime(vol * 0.8, now + dur * 0.4);
    env.gain.exponentialRampToValueAtTime(0.001, now + dur * 1.2);
  } else {
    // Lift/climax: sharper decay
    env.gain.setValueAtTime(vol * 0.6, now + dur * 0.2);
    env.gain.exponentialRampToValueAtTime(0.001, now + dur);
  }

  osc1.connect(env);
  env.connect(masterGain);
  env.connect(reverbSend);

  osc1.start(now);
  osc1.stop(now + dur * 1.3 + 0.02);

  // Shimmer layer: add harmonic shimmer that varies with contour phase
  if (forInitiativeIntensity > 0.15) {
    var osc2 = actx.createOscillator();
    // During release: pure octave shimmer (consonant bloom)
    // During lift: slightly detuned (tension shimmer)
    // During climax: fifth above (complex shimmer)
    var shimmerRatio;
    if (miContourPhase === 3 || miContourPhase === 0) {
      shimmerRatio = 2.0; // pure octave
    } else if (miContourPhase === 1) {
      shimmerRatio = 2.003 + pinkSample() * 0.005; // detuned octave
    } else {
      shimmerRatio = 3.0; // fifth above octave (twelfth)
    }
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(freq * shimmerRatio, now);
    var shimGain = actx.createGain();
    shimGain.gain.value = vol * (0.06 + forInitiativeIntensity * 0.08);
    osc2.connect(shimGain);
    shimGain.connect(env);
    osc2.start(now);
    osc2.stop(now + dur * 1.3 + 0.02);
  }

  // Record in melody memory
  melodyRecord(freq, vol, true);
  // Feed spectral engine
  var semi = Math.round(12 * Math.log2(freq / (center * 16)));
  feedNote(semi);
}

// AUDIO GRAPH
