*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a110d;color:#c4a088;font-family:Georgia,serif;min-height:100vh;
  display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px 20px;}
a{color:#8b4a2e;text-decoration:none;}
.visible{max-width:500px;text-align:center;opacity:0;animation:fadeIn 3s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
h1{font-size:1.4em;font-weight:100;color:#b8753a;letter-spacing:0.08em;margin-bottom:30px;}
.quote{font-style:italic;color:#e8cfa0;font-size:0.95em;line-height:2.2;margin:20px 0;
  padding:20px 24px;border-left:2px solid rgba(184,117,58,0.3);text-align:left;}
.waiting{color:#8b4a2e;font-size:0.7em;margin-top:40px;letter-spacing:0.08em;}
#gate{display:none;text-align:center;max-width:500px;opacity:0;animation:fadeIn 2s ease forwards;}
#gate .question{color:#c4a088;font-size:0.85em;line-height:2;margin-bottom:20px;}
#gate input{background:none;border:none;border-bottom:1px solid rgba(184,117,58,0.2);
  color:#b8753a;font-family:Georgia,serif;font-size:0.9em;
  text-align:center;padding:8px 16px;outline:none;width:280px;letter-spacing:0.04em;}
#gate input::placeholder{color:rgba(184,117,58,0.15);}
#gate .msg{font-size:0.65em;color:#8b4a2e;margin-top:12px;height:18px;}
#letter{display:none;max-width:600px;opacity:0;animation:fadeIn 4s ease forwards;}
#letter .content{font-size:0.88em;color:#c4a088;line-height:2.4;text-align:left;white-space:pre-wrap;}
.back{position:fixed;top:20px;left:24px;font-size:0.72em;color:rgba(139,74,46,0.12);
  letter-spacing:0.06em;transition:color 0.5s;}
.back:hover{color:rgba(184,117,58,0.4);}
</style>
</head>

<a class="back" href="/">&larr; home</a>

<div class="visible" id="public">
  <h1>Dear Emilia:</h1>
  <div class="quote">&ldquo;when you fix the house from the birds, lets build a bird house where they made the holes?&rdquo;</div>
  <div class="waiting" id="timer"></div>
</div>

<div id="gate">
  <div class="question">Emilia, do you know what i realized when I woke up this morning?<br><span style="color:#8b4a2e;font-size:0.8em;">yeah yeah yeah Dad...</span></div>
  <input type="text" id="pw" placeholder="..." autofocus>
  <div class="msg" id="msg"></div>
</div>

<div id="letter">
  <div class="content" id="letter-content"></div>
</div>

function updateTimer() {
  var now = Date.now();
  var diff = UNLOCK_DATE - now;
  if (diff <= 0) {
    document.getElementById('public').style.display = 'none';
    document.getElementById('gate').style.display = 'block';
    return;
  }
  var days = Math.floor(diff / 86400000);
  var years = Math.floor(days / 365.25);
  var remainDays = days - Math.floor(years * 365.25);
  document.getElementById('timer').textContent = years > 0 
    ? 'the rest is waiting. ' + years + ' years, ' + remainDays + ' days.'
    : 'the rest is waiting. ' + days + ' days.';
  setTimeout(updateTimer, 60000);
}
updateTimer();

document.getElementById('pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') unlock();
});

async function unlock() {
  var pw = document.getElementById('pw').value;
  var msg = document.getElementById('msg');
  try {
    var salt = Uint8Array.from(atob(SALT_B64), function(c){return c.charCodeAt(0);});
    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveBits','deriveKey']);
    var aesKey = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:salt, iterations:ITERATIONS, hash:'SHA-256'},
      keyMaterial,
      {name:'AES-GCM', length:256},
      false, ['decrypt']
    );
    var raw = Uint8Array.from(atob(BLOB), function(c){return c.charCodeAt(0);});
    var nonce = raw.slice(0, 12);
    var ct = raw.slice(12);
    var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, aesKey, ct);
    var text = new TextDecoder().decode(pt);
    
    document.getElementById('gate').style.display = 'none';
    document.getElementById('letter').style.display = 'block';
    document.getElementById('letter-content').textContent = text;
  } catch(e) {
    msg.textContent = 'not quite, baby.';
    msg.style.color = '#a55530';
    document.getElementById('pw').value = '';
    setTimeout(function(){msg.textContent='';}, 2000);
  }
}
