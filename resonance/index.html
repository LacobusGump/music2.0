<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resonance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none;}
#pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:8px 12px;pointer-events:auto;}
.pill{background:rgba(20,20,30,0.85);border:1px solid #222;color:#888;
  font:11px Georgia;padding:6px 12px;border-radius:20px;cursor:pointer;
  transition:all 0.3s;pointer-events:auto;white-space:nowrap;}
.pill:hover,.pill.active{border-color:#c9a44a;color:#c9a44a;}
.pill.disease{border-color:#f6666640;}
.pill.disease:hover,.pill.disease.active{border-color:#f66;color:#f66;}
#info{position:fixed;top:0;left:0;right:0;text-align:center;z-index:10;pointer-events:none;padding:16px;}
#title{color:#c9a44a;font:300 1.4em Georgia;letter-spacing:0.08em;opacity:0.7;}
#subtitle{color:#555;font:0.75em Georgia;margin-top:2px;letter-spacing:0.12em;}
#data{position:fixed;right:16px;top:50%;transform:translateY(-50%);z-index:10;
  pointer-events:none;text-align:right;font-family:Georgia;}
#data .row{margin:4px 0;opacity:0;transition:opacity 0.5s;}
#data .row.show{opacity:1;}
#data .label{color:#555;font-size:0.7em;letter-spacing:0.05em;}
#data .value{color:#e8e4dc;font-size:0.95em;font-weight:200;}
#data .value.accent{color:#c9a44a;}
#data .value.red{color:#f66;}
#data .value.green{color:#4aeaa0;}
#selectivity{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:5;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.8s;}
#selectivity.show{opacity:1;}
#sel-num{font:200 3em Georgia;letter-spacing:0.05em;}
#sel-word{color:#555;font:0.8em Georgia;letter-spacing:0.15em;}
#ref{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  color:#333;font:0.65em Georgia;z-index:10;pointer-events:none;
  text-align:center;max-width:90vw;opacity:0;transition:opacity 0.5s;}
#ref.show{opacity:1;}
#nav{position:fixed;bottom:2px;left:50%;transform:translateX(-50%);
  font:0.65em Georgia;z-index:10;text-align:center;}
#nav a{color:#222;text-decoration:none;margin:0 6px;}
#nav a:hover{color:#c9a44a;}
</style>
</head>
<body>
<canvas id="C"></canvas>

<div id="info">
  <div id="title">Resonance</div>
  <div id="subtitle">mechanical targeting from tissue stiffness</div>
</div>

<div id="data">
  <div class="row" id="r-freq"><div class="label">resonant frequency</div><div class="value red" id="v-freq">—</div></div>
  <div class="row" id="r-hfreq"><div class="label">healthy frequency</div><div class="value green" id="v-hfreq">—</div></div>
  <div class="row" id="r-stiff"><div class="label">stiffness</div><div class="value" id="v-stiff">—</div></div>
  <div class="row" id="r-carrier"><div class="label">carrier</div><div class="value accent" id="v-carrier">—</div></div>
  <div class="row" id="r-prf"><div class="label">PRF</div><div class="value accent" id="v-prf">—</div></div>
  <div class="row" id="r-duty"><div class="label">duty cycle</div><div class="value" id="v-duty">—</div></div>
  <div class="row" id="r-intensity"><div class="label">intensity</div><div class="value" id="v-intensity">—</div></div>
</div>

<div id="selectivity"><div id="sel-num"></div><div id="sel-word">selectivity</div></div>

<div id="ref"></div>

<div id="ui">
  <div id="pills"></div>
</div>

<div id="nav">
  <a href="/one/">one</a> · <a href="/deep/">deep</a> · <a href="/flex/">flex</a> · <a href="/r/">research</a>
</div>

<script>
// ═══ CANVAS ═══
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

// ═══ TISSUE DATABASE ═══
var TISSUES=[
  {id:'tumor_soft',name:'Soft Tumor',E:200,d:18,cat:'disease',healthy:'breast',h_E:2000,h_d:15,
   ref:'Mittelstein 2020 (Caltech) — oncotripsy selectively disrupts cancer cells by mechanical resonance'},
  {id:'breast_cancer',name:'Breast Carcinoma',E:4000,d:18,cat:'disease',healthy:'breast',h_E:2000,h_d:15,
   ref:'Mittelstein 2020 — tumor stiffness enables frequency-selective ablation'},
  {id:'liver_fibrosis',name:'Liver Fibrosis',E:12000,d:20,cat:'disease',healthy:'liver',h_E:2000,h_d:20},
  {id:'cirrhosis',name:'Cirrhosis',E:25000,d:20,cat:'disease',healthy:'liver',h_E:2000,h_d:20},
  {id:'plaque_soft',name:'Soft Plaque',E:50000,d:100,cat:'disease',healthy:'artery',h_E:10000,h_d:30},
  {id:'plaque_calc',name:'Calcified Plaque',E:1e8,d:100,cat:'disease',healthy:'artery',h_E:10000,h_d:30},
  {id:'amyloid',name:'Amyloid Fibril',E:2e9,d:0.1,cat:'disease',healthy:'brain',h_E:200,h_d:15,
   ref:'Leinenga 2015 — scanning ultrasound clears amyloid-β + restores memory in mice'},
  {id:'blood_clot',name:'Blood Clot',E:1000,d:2000,cat:'disease',healthy:'blood',h_E:4,h_d:7,
   ref:'Alexandrov 2004 — ultrasound-enhanced thrombolysis. Clinical standard'},
  {id:'kidney_stone',name:'Kidney Stone',E:5e10,d:5000,cat:'disease',healthy:'kidney',h_E:5000,h_d:20,
   ref:'Chaussy 1980 — ultrasound lithotripsy. Standard of care for 40+ years'},
  {id:'scar',name:'Scar Tissue',E:30000,d:30,cat:'disease',healthy:'skin',h_E:50000,h_d:20},
  {id:'brain',name:'Brain',E:200,d:15,cat:'healthy'},
  {id:'liver',name:'Liver',E:2000,d:20,cat:'healthy'},
  {id:'breast',name:'Breast',E:2000,d:15,cat:'healthy'},
  {id:'muscle',name:'Muscle',E:10000,d:50,cat:'healthy'},
  {id:'artery',name:'Artery',E:10000,d:30,cat:'healthy'},
  {id:'cartilage',name:'Cartilage',E:700,d:13,cat:'healthy'},
  {id:'kidney',name:'Kidney',E:5000,d:20,cat:'healthy'},
  {id:'fat',name:'Fat',E:500,d:80,cat:'healthy'},
];

var HEALTHY_MAP={};
TISSUES.forEach(function(t){if(t.cat==='healthy')HEALTHY_MAP[t.id]=t;});

// ═══ PHYSICS ═══
function resFreq(E,d_um){return(1/(Math.PI*d_um*1e-6))*Math.sqrt(E/1050);}

// ═══ PARTICLES ═══
var N_DISEASE=800,N_HEALTHY=800;
var particles=[];
var current=null;
var t=0;

function Spring(val){return{v:val,target:val,vel:0,update:function(k,damp){
  this.vel+=(this.target-this.v)*(k||0.04);this.vel*=(damp||0.88);this.v+=this.vel;return this.v;}};}

function initParticles(){
  particles=[];
  // Disease cluster (left of center)
  for(var i=0;i<N_DISEASE;i++){
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=0.3+Math.random()*1.2;
    particles.push({
      x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      homeX:Math.sin(b)*Math.cos(a)*r,homeY:Math.sin(b)*Math.sin(a)*r,homeZ:Math.cos(b)*r,
      vx:0,vy:0,vz:0,
      type:'disease',a:a,b:b,r:r,phase:Math.random()*Math.PI*2,
      size:0.6+Math.random()*0.8
    });
  }
  // Healthy cluster (right of center)
  for(var i=0;i<N_HEALTHY;i++){
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=0.3+Math.random()*1.2;
    particles.push({
      x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      homeX:Math.sin(b)*Math.cos(a)*r,homeY:Math.sin(b)*Math.sin(a)*r,homeZ:Math.cos(b)*r,
      vx:0,vy:0,vz:0,
      type:'healthy',a:a,b:b,r:r,phase:Math.random()*Math.PI*2,
      size:0.6+Math.random()*0.8
    });
  }
}
initParticles();

// ═══ STATE ═══
var driveFreq=new Spring(0);    // the ultrasound frequency we're sending
var diseaseRes=new Spring(0);   // disease resonant freq
var healthyRes=new Spring(0);   // healthy resonant freq
var selectivity=new Spring(1);
var sweeping=false;
var sweepPhase=0;
var resonanceHit=new Spring(0); // 0→1 when drive matches disease
var healthyCalm=new Spring(1);  // 1=calm, 0=shaking
var diseaseShake=new Spring(0); // amplitude of disease shaking
var breathe=new Spring(0);

// ═══ SELECT TISSUE ═══
function selectTissue(tissue){
  current=tissue;
  var f_d=resFreq(tissue.E,tissue.d);
  diseaseRes.target=f_d;
  driveFreq.target=f_d; // tune to disease frequency

  if(tissue.h_E){
    var f_h=resFreq(tissue.h_E,tissue.h_d);
    healthyRes.target=f_h;
    var sel=Math.max(f_d,f_h)/Math.min(f_d,f_h);
    selectivity.target=sel;
  } else {
    healthyRes.target=0;
    selectivity.target=1;
  }

  // Start sweep animation
  sweeping=true;
  sweepPhase=0;
  resonanceHit.target=0;resonanceHit.v=0;resonanceHit.vel=0;

  // Update data panel
  updateData(tissue,f_d);

  // Update pills
  var pills=document.querySelectorAll('.pill');
  pills.forEach(function(p){p.classList.remove('active');
    if(p.dataset.id===tissue.id)p.classList.add('active');});

  // Reference
  var refEl=document.getElementById('ref');
  if(tissue.ref){refEl.textContent=tissue.ref;refEl.classList.add('show');}
  else{refEl.classList.remove('show');}
}

function updateData(tissue,f_d){
  var depth=5; // cm default
  var carrier_MHz=Math.min(3,30/Math.max(depth,1));
  var duty=Math.min(0.5,0.2*(10/Math.max(depth,1)));
  var intensity=30*Math.exp(0.1*depth);
  var f_kHz=f_d/1000;

  document.getElementById('v-freq').textContent=f_kHz.toFixed(1)+' kHz';
  document.getElementById('v-stiff').textContent=tissue.E.toLocaleString()+' Pa';
  document.getElementById('v-carrier').textContent=carrier_MHz.toFixed(1)+' MHz';
  document.getElementById('v-prf').textContent=f_kHz.toFixed(1)+' kHz';
  document.getElementById('v-duty').textContent=(duty*100).toFixed(0)+'%';
  document.getElementById('v-intensity').textContent=intensity.toFixed(0)+' mW/cm²';

  document.getElementById('r-freq').classList.add('show');
  document.getElementById('r-stiff').classList.add('show');
  document.getElementById('r-carrier').classList.add('show');
  document.getElementById('r-prf').classList.add('show');
  document.getElementById('r-duty').classList.add('show');
  document.getElementById('r-intensity').classList.add('show');

  if(tissue.h_E){
    var f_h=resFreq(tissue.h_E,tissue.h_d);
    document.getElementById('v-hfreq').textContent=(f_h/1000).toFixed(1)+' kHz';
    document.getElementById('r-hfreq').classList.add('show');
  } else {
    document.getElementById('r-hfreq').classList.remove('show');
  }
}

// ═══ BUILD PILLS ═══
var pillsEl=document.getElementById('pills');
TISSUES.forEach(function(tissue){
  var pill=document.createElement('div');
  pill.className='pill'+(tissue.cat==='disease'?' disease':'');
  pill.dataset.id=tissue.id;
  pill.textContent=tissue.name;
  pill.addEventListener('click',function(e){e.preventDefault();selectTissue(tissue);});
  pill.addEventListener('touchstart',function(e){e.stopPropagation();selectTissue(tissue);},{passive:true});
  pillsEl.appendChild(pill);
});

// ═══ UPDATE PHYSICS ═══
function update(){
  t+=0.016;

  driveFreq.update(0.06,0.85);
  diseaseRes.update(0.06,0.85);
  healthyRes.update(0.06,0.85);
  selectivity.update(0.04,0.9);
  resonanceHit.update(0.03,0.92);
  breathe.v=Math.sin(t*0.8)*0.03;

  // Sweep: drive frequency sweeps up to match disease frequency
  if(sweeping){
    sweepPhase+=0.012;
    if(sweepPhase<1){
      // Sweep from low to target
      driveFreq.v=diseaseRes.v*sweepPhase*sweepPhase;
    } else {
      sweeping=false;
      resonanceHit.target=1;
    }
  }

  // How close is drive freq to disease resonance?
  var matchRatio=1;
  if(diseaseRes.v>0){
    matchRatio=Math.abs(driveFreq.v-diseaseRes.v)/diseaseRes.v;
  }
  var diseaseAmplitude=Math.max(0,1-matchRatio*5); // sharp resonance peak
  diseaseShake.target=diseaseAmplitude*1.8;
  diseaseShake.update(0.06,0.88);

  // Healthy tissue: how close is drive to healthy resonance?
  var healthyMatch=1;
  if(healthyRes.v>0){
    healthyMatch=Math.abs(driveFreq.v-healthyRes.v)/healthyRes.v;
  }
  var healthyAmplitude=Math.max(0,1-healthyMatch*5)*0.3;
  healthyCalm.target=1-healthyAmplitude;
  healthyCalm.update(0.04,0.9);

  // Update particles
  var w=W/DPR,h=H/DPR;
  var dCenterX=-w*0.15, hCenterX=w*0.15; // disease left, healthy right

  for(var i=0;i<particles.length;i++){
    var p=particles[i];

    if(p.type==='disease'){
      // Shake at resonance
      var shake=diseaseShake.v;
      var freq=driveFreq.v>0?Math.log(driveFreq.v+1)*0.003:0;
      var dx=Math.sin(t*freq*60+p.phase)*shake*0.4;
      var dy=Math.cos(t*freq*60+p.phase*1.3)*shake*0.4;
      var dz=Math.sin(t*freq*60+p.phase*0.7)*shake*0.3;

      // At high resonance, particles fly apart
      if(diseaseShake.v>1.2){
        var explode=(diseaseShake.v-1.2)*0.3;
        p.vx+=(p.homeX*explode+dx)*0.02;
        p.vy+=(p.homeY*explode+dy)*0.02;
        p.vz+=dz*0.02;
      }

      // Spring back to home + shake offset
      var tx=p.homeX+dx;
      var ty=p.homeY+dy;
      var tz=p.homeZ+dz+breathe.v*p.r;
      p.vx+=(tx-p.x)*0.08;
      p.vy+=(ty-p.y)*0.08;
      p.vz+=(tz-p.z)*0.08;
    } else {
      // Healthy: mostly still, gentle breathing
      var calm=healthyCalm.v;
      var tx=p.homeX*(1+breathe.v);
      var ty=p.homeY*(1+breathe.v);
      var tz=p.homeZ*(1+breathe.v);
      // Tiny vibration if drive happens to be near healthy freq
      var hShake=(1-calm)*0.15;
      tx+=Math.sin(t*20+p.phase)*hShake;
      ty+=Math.cos(t*20+p.phase*1.2)*hShake;
      p.vx+=(tx-p.x)*0.06;
      p.vy+=(ty-p.y)*0.06;
      p.vz+=(tz-p.z)*0.06;
    }

    p.vx*=0.9;p.vy*=0.9;p.vz*=0.9;
    p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
  }
}

// ═══ RENDER ═══
function render(){
  var w=W/DPR,h=H/DPR;

  // Fade trail
  cx.fillStyle='rgba(0,0,0,0.12)';
  cx.fillRect(0,0,w,h);

  update();

  // 3D projection
  var cosA=Math.cos(t*0.1),sinA=Math.sin(t*0.1);
  var fov=Math.min(w,h)*0.6;
  var dCenterX=w*0.32, hCenterX=w*0.68;
  var centerY=h*0.48;
  var scale=Math.min(w,h)*0.09;

  cx.globalCompositeOperation='lighter';

  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var x=p.x,y=p.y,z=p.z;

    // Rotate
    var rx=x*cosA+z*sinA;
    var rz=-x*sinA+z*cosA;
    var ry=y;

    // Project
    var f=fov/(fov+rz*scale+300);
    var cx0=p.type==='disease'?dCenterX:hCenterX;
    var sx=cx0+rx*scale*f;
    var sy=centerY+ry*scale*f;

    if(sx<-20||sx>w+20||sy<-20||sy>h+20)continue;

    var sz=Math.max(0.4,f*p.size*1.2);
    var alpha=f*0.35;

    if(p.type==='disease'){
      // Red, brighter when shaking
      var bright=Math.min(1,0.6+diseaseShake.v*0.3);
      var r=Math.floor(200+diseaseShake.v*55);
      var g=Math.floor(60+diseaseShake.v*20);
      var b=Math.floor(60);
      cx.fillStyle='rgba('+r+','+g+','+b+','+Math.min(1,alpha*bright)+')';
    } else {
      // Green, calm
      var calm=healthyCalm.v;
      cx.fillStyle='rgba(74,'+Math.floor(180+calm*54)+','+Math.floor(120+calm*40)+','+Math.min(1,alpha*0.8)+')';
    }

    cx.fillRect(sx-sz/2,sy-sz/2,sz,sz);
  }

  cx.globalCompositeOperation='source-over';

  // Labels under clusters
  if(current){
    cx.fillStyle='rgba(246,102,102,0.12)';
    cx.font='12px Georgia';cx.textAlign='center';
    cx.fillText(current.name,dCenterX,centerY+Math.min(w,h)*0.16);

    if(current.h_E){
      cx.fillStyle='rgba(74,234,160,0.12)';
      var hName=HEALTHY_MAP[current.healthy]?HEALTHY_MAP[current.healthy].name:'Healthy';
      cx.fillText(hName,hCenterX,centerY+Math.min(w,h)*0.16);
    }
  } else {
    // Idle state labels
    cx.fillStyle='rgba(246,102,102,0.06)';
    cx.font='12px Georgia';cx.textAlign='center';
    cx.fillText('diseased',dCenterX,centerY+Math.min(w,h)*0.16);
    cx.fillStyle='rgba(74,234,160,0.06)';
    cx.fillText('healthy',hCenterX,centerY+Math.min(w,h)*0.16);
  }

  // Selectivity display
  var selEl=document.getElementById('selectivity');
  if(current&&current.h_E&&!sweeping){
    var sel=selectivity.v;
    var col=sel>10?'#4aeaa0':sel>3?'#c9a44a':'#f66';
    document.getElementById('sel-num').textContent=sel.toFixed(0)+'×';
    document.getElementById('sel-num').style.color=col;
    selEl.classList.add('show');
  } else {
    selEl.classList.remove('show');
  }

  // Tissue coupling K — healthy tissue has strong coupling, diseased decouples
  if(current&&current.h_E&&!sweeping){
    var sel=selectivity.v;
    var K_healthy=sel>3?0.85:0.6; // strong coupling — cells oscillate together
    var K_disease=sel>3?0.12:0.3; // weak coupling — cells decouple
    cx.font='11px Georgia';cx.textAlign='center';
    cx.fillStyle='rgba(74,234,160,0.18)';
    cx.fillText('tissue coupling K = '+K_healthy.toFixed(2),hCenterX,centerY+Math.min(w,h)*0.20);
    cx.fillStyle='rgba(246,102,102,0.18)';
    cx.fillText('tissue coupling K = '+K_disease.toFixed(2),dCenterX,centerY+Math.min(w,h)*0.20);
    cx.fillStyle='rgba(90,85,75,0.14)';
    cx.font='10px Georgia';
    cx.fillText('K couples cells — high K = coherent tissue, low K = independent oscillators',w*0.5,centerY+Math.min(w,h)*0.24);
  }

  // Drive frequency indicator — thin horizontal line sweeping
  if(sweeping||diseaseShake.v>0.01){
    var waveY=h*0.85;
    var amp=4+diseaseShake.v*8;
    cx.strokeStyle='rgba(201,164,74,0.15)';
    cx.lineWidth=0.8;
    cx.beginPath();
    var freq=driveFreq.v>0?Math.log(driveFreq.v+1)*0.005:0.01;
    for(var i=0;i<w;i++){
      var yy=waveY+Math.sin(i*freq+t*3)*amp;
      if(i===0)cx.moveTo(i,yy);else cx.lineTo(i,yy);
    }
    cx.stroke();
  }

  requestAnimationFrame(render);
}

// Start with soft tumor selected
selectTissue(TISSUES[0]);
render();
</script>
</body>
</html>
