<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tools — GUMP</title>
<meta name="description" content="15 tools. Free. Local-first. pip install begump.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;min-height:100vh;overflow:hidden;}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}
.info{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  font-size:0.72em;color:#444;text-align:center;pointer-events:none;
  transition:opacity 0.5s;}
.hover-panel{position:fixed;top:50%;right:40px;transform:translateY(-50%);
  max-width:280px;padding:20px 24px;background:rgba(10,10,18,0.92);
  border:1px solid rgba(255,255,255,0.06);border-radius:12px;
  opacity:0;transition:opacity 0.4s;pointer-events:none;}
.hover-panel.show{opacity:1;}
.hover-panel h3{font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:1em;font-weight:200;color:#c9a44a;letter-spacing:0.06em;margin:0 0 8px;}
.hover-panel p{font-size:0.78em;color:#888;line-height:1.7;margin:0;}
.hover-panel .hint{font-size:0.65em;color:#555;margin-top:12px;font-style:italic;}
.back{position:fixed;top:20px;left:20px;font-size:0.72em;color:#444;z-index:10;}
.back:hover{color:#c9a44a;}
a{color:#c9a44a;text-decoration:none;}
</style>
</head>
<body>
<a class="back" href="/">&larr; GUMP</a>
<canvas id="cv"></canvas>
<div class="info">drag to rotate &middot; hover a node &middot; click to enter</div>
<div class="hover-panel" id="panel">
  <h3 id="panel-name"></h3>
  <p id="panel-desc"></p>
  <div class="hint">click to open</div>
</div>

<script>
var cv = document.getElementById('cv');
var cx = cv.getContext('2d');
var panel = document.getElementById('panel');
var panelName = document.getElementById('panel-name');
var panelDesc = document.getElementById('panel-desc');

// Tools as coupled nodes in 3D space
var tools = [
  {name:'Fold Watch', short:'Protein structure. 11.5M/sec. Keystones.', href:'/products/foldwatch/', group:0},
  {name:'Oracle', short:'Hidden frequencies. Prediction. Prime counting.', href:'/products/oracle/', group:1},
  {name:'Sensor', short:'K/R/E/T from any signal. Four numbers.', href:'/products/sensor/', group:1},
  {name:'Tune', short:'Coherence onset. Decoherence warning. No training.', href:'/docs/#tune', group:1},
  {name:'Dissonance', short:'Regime change detection. Where behavior shifted.', href:'/products/dissonance/', group:1},
  {name:'Trace', short:'Follow the money. Find the circle. Spectral forensics.', href:'/products/trace/', group:2},
  {name:'Knowledge', short:'Text to graph. What connects to what.', href:'/products/knowledge/', group:2},
  {name:'Org X-Ray', short:'Who is the real hub. Network centrality.', href:'/products/orgxray/', group:2},
  {name:'Accord', short:'Gap analysis. Compliance as coupling.', href:'/products/accord/', group:2},
  {name:'AI Trainer', short:'Detect grokking. When the model actually learns.', href:'/products/aitrainer/', group:3},
  {name:'Learn Engine', short:'When the student gets it. Phase transition in understanding.', href:'/products/learnengine/', group:3},
  {name:'Turbo', short:'K/R/E/T algebra. Four operators. Direct computation.', href:'/products/turbo/', group:3},
  {name:'Chip Fast', short:'Place gates. Isolate boundaries. Same Laplacian, both goals.', href:'/products/chipfast/', group:0},
  {name:'Sfumato', short:'Compression as understanding. Repetition vanishes.', href:'/products/sfumato/', group:3},
  {name:"Alan's Eye", short:'Color matching. OEM codes. Mix, blend, dry.', href:'/products/alans-eye/', group:2},
];

// Connections between related tools (coupling)
var edges = [
  [0, 12],  // FoldWatch ↔ ChipFast (same math)
  [1, 2],   // Oracle ↔ Sensor
  [2, 3],   // Sensor ↔ Tune
  [3, 4],   // Tune ↔ Dissonance
  [5, 7],   // Trace ↔ OrgXRay
  [6, 7],   // Knowledge ↔ OrgXRay
  [9, 10],  // AITrainer ↔ LearnEngine
  [2, 11],  // Sensor ↔ Turbo
  [0, 3],   // FoldWatch ↔ Tune (coherence in biology)
  [5, 12],  // Trace ↔ ChipFast (network math)
];

// Group colors
var groupColors = [
  [201, 164, 74],   // 0: gold (structure)
  [74, 153, 153],   // 1: teal (signal)
  [189, 110, 55],   // 2: copper (network)
  [120, 90, 160],   // 3: violet (learning)
];

// Each tool has TWO states: LIST position and CLOVER position
// transition blend goes 0 → 1 over time
var N = tools.length;
var transition = 0; // 0 = list, 1 = clover
var transitionStart = -1;
var TRANSITION_DURATION = 2.5; // seconds to morph

tools.forEach(function(t, i) {
  // CLOVER target position (four-leaf rose curve)
  var theta = (i / N) * Math.PI * 2;
  var r = Math.abs(Math.cos(2 * theta)) * 0.85 + 0.15;
  t.cloverX = r * Math.cos(theta);
  t.cloverY = r * Math.sin(theta);
  t.cloverZ = Math.sin(4 * theta) * 0.3;

  // LIST start position (stacked vertically, centered, flat)
  t.listX = 0;
  t.listY = (i - N/2 + 0.5) / (N/2) * 0.8; // spread vertically
  t.listZ = 0;

  // Current interpolated position
  t.x = t.listX;
  t.y = t.listY;
  t.z = t.listZ;
  t.sx = 0; t.sy = 0;
  t.size = 6;
  t.hover = false;
});

// Rotation state
var rotX = 0.3, rotY = 0;
var dragX = 0, dragY = 0, dragging = false;
var autoRotate = true;
var hoverIdx = -1;
var lastMx = -999, lastMy = -999;
var W, H;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Project 3D → 2D with rotation
function project(x, y, z) {
  // Rotate around Y
  var cosY = Math.cos(rotY), sinY = Math.sin(rotY);
  var x1 = x * cosY - z * sinY;
  var z1 = x * sinY + z * cosY;
  // Rotate around X
  var cosX = Math.cos(rotX), sinX = Math.sin(rotX);
  var y1 = y * cosX - z1 * sinX;
  var z2 = y * sinX + z1 * cosX;
  // Perspective
  var scale = 200 + z2 * 50;
  var fov = Math.min(W, H) * 0.35;
  return {
    sx: W/2 + x1 * fov / (scale/200),
    sy: H/2 + y1 * fov / (scale/200),
    depth: z2,
    scale: scale / 200
  };
}

function draw() {
  cx.fillStyle = '#08080d';
  cx.fillRect(0, 0, W, H);

  // Update transition — STAGGERED IN PAIRS
  // Pairs peel off one at a time: [0,7], [1,8], [2,9], [3,10], [4,11], [5,12], [6,13], [14]
  var now = Date.now() * 0.001;
  if (transitionStart < 0) transitionStart = now + 3; // start after 3s

  // Each pair gets its own transition with 0.4s delay between pairs
  var PAIR_DELAY = 0.4; // seconds between each pair launching
  var PAIR_DURATION = 1.8; // seconds for one pair to complete its morph

  // Global transition (max of all individual transitions)
  var maxT = 0;
  tools.forEach(function(t, i) {
    // Pair index: first half pairs with second half (0↔7, 1↔8, etc)
    var pairIdx = i < Math.ceil(N/2) ? i : i - Math.ceil(N/2);
    var pairStart = transitionStart + pairIdx * PAIR_DELAY;
    var elapsed = now - pairStart;
    if (elapsed > 0) {
      var raw = Math.min(elapsed / PAIR_DURATION, 1);
      t.t = raw < 0.5 ? 2*raw*raw : 1 - Math.pow(-2*raw+2, 2)/2; // ease in-out
    } else {
      t.t = 0;
    }
    if (t.t > maxT) maxT = t.t;
  });
  transition = maxT; // for global uses (rotation, etc)

  // Auto-rotate (ramps up as pairs launch)
  if (autoRotate && !dragging) {
    rotY += 0.002 * transition;
  }

  // Interpolate positions per-tool (each has its own t)
  tools.forEach(function(t) {
    var ease = t.t;
    t.x = t.listX + (t.cloverX - t.listX) * ease;
    t.y = t.listY + (t.cloverY - t.listY) * ease;
    t.z = t.listZ + (t.cloverZ - t.listZ) * ease;

    var p = project(t.x, t.y, t.z);
    t.sx = p.sx;
    t.sy = p.sy;
    t.depth = p.depth;
    t.screenScale = p.scale;
  });

  // Sort by depth (back to front)
  var order = tools.map(function(t, i) { return i; });
  order.sort(function(a, b) { return tools[a].depth - tools[b].depth; });

  // CENTER NODE: "Drop any data" — always at origin
  var centerP = project(0, 0, 0);
  var centerSize = 10 + Math.sin(now * 0.6) * 2;
  var centerHover = false;
  var cdx = (typeof lastMx !== 'undefined') ? lastMx - centerP.sx : 999;
  var cdy = (typeof lastMy !== 'undefined') ? lastMy - centerP.sy : 999;
  if (cdx*cdx + cdy*cdy < (centerSize+15)*(centerSize+15)) {
    centerHover = true;
    if (hoverIdx < 0) {
      panelName.textContent = 'Drop Any Data';
      panelDesc.textContent = "Don\u2019t know which tool? Drop anything \u2014 we figure it out.";
      panel.classList.add('show');
      cv.style.cursor = 'pointer';
    }
  }

  // Center glow
  var cgrd = cx.createRadialGradient(centerP.sx, centerP.sy, 0, centerP.sx, centerP.sy, centerSize * 4);
  cgrd.addColorStop(0, 'rgba(201,164,74,' + (centerHover ? 0.2 : 0.08) + ')');
  cgrd.addColorStop(1, 'rgba(201,164,74,0)');
  cx.fillStyle = cgrd;
  cx.beginPath(); cx.arc(centerP.sx, centerP.sy, centerSize * 4, 0, Math.PI*2); cx.fill();

  // Center blob (smaller, gold, pulsing)
  cx.beginPath();
  var cpts = 24;
  for (var ci = 0; ci <= cpts; ci++) {
    var ca = (ci/cpts) * Math.PI * 2;
    var cr = centerSize + Math.sin(ca * 5 + now * 1.5) * centerSize * 0.2 + Math.sin(ca * 3 - now * 2) * centerSize * 0.1;
    var cpx = centerP.sx + Math.cos(ca) * cr;
    var cpy = centerP.sy + Math.sin(ca) * cr;
    ci === 0 ? cx.moveTo(cpx, cpy) : cx.lineTo(cpx, cpy);
  }
  cx.closePath();
  var cbg = cx.createRadialGradient(centerP.sx - 2, centerP.sy - 2, 0, centerP.sx, centerP.sy, centerSize * 1.3);
  cbg.addColorStop(0, 'rgba(255,220,140,' + (centerHover ? 0.9 : 0.6) + ')');
  cbg.addColorStop(0.5, 'rgba(201,164,74,' + (centerHover ? 0.7 : 0.45) + ')');
  cbg.addColorStop(1, 'rgba(140,100,40,' + (centerHover ? 0.5 : 0.3) + ')');
  cx.fillStyle = cbg; cx.fill();

  // Center label (only when transition complete)
  if (transition > 0.8) {
    cx.font = '9px Futura, sans-serif';
    cx.fillStyle = 'rgba(201,164,74,' + (centerHover ? 0.9 : 0.35) + ')';
    cx.textAlign = 'center';
    cx.fillText('drop anything', centerP.sx, centerP.sy + centerSize + 14);
  }

  // Draw edges
  edges.forEach(function(e) {
    var a = tools[e[0]], b = tools[e[1]];
    var alpha = 0.06 + (hoverIdx === e[0] || hoverIdx === e[1] ? 0.15 : 0);
    cx.beginPath();
    cx.moveTo(a.sx, a.sy);
    cx.lineTo(b.sx, b.sy);
    cx.strokeStyle = 'rgba(201,164,74,' + alpha + ')';
    cx.lineWidth = 0.8;
    cx.stroke();
  });

  // Draw nodes — ferrofluid blobs
  var time = Date.now() * 0.001;
  order.forEach(function(idx) {
    var t = tools[idx];
    var col = groupColors[t.group];
    var baseSize = t.size * t.screenScale;
    var alpha = 0.3 + t.screenScale * 0.5;
    var isHover = idx === hoverIdx;

    if (isHover) { baseSize *= 1.8; alpha = 1.0; }

    // Blob only appears as THIS tool's transition progresses
    var myT = t.t || 0;
    var blobAlpha = alpha * myT;
    if (blobAlpha < 0.01) {
      // Still in list mode for this tool — just draw text
      var textAlpha2 = isHover ? 0.95 : 0.6;
      var textSize2 = 13;
      if (isHover) textSize2 = 15;
      cx.font = (isHover ? 'bold ' : '200 ') + textSize2 + 'px Futura, sans-serif';
      cx.fillStyle = 'rgba(232,228,220,' + textAlpha2 + ')';
      cx.textAlign = 'center';
      cx.fillText(t.name, t.sx, t.sy + 5);
      return;
    }
    alpha = blobAlpha;

    var lobes = isHover ? 8 : 6; // more detail on hover
    var spikes = isHover ? 12 : 7;

    // Outer glow — soft, large, breathing
    var breathe = 1 + Math.sin(time * 0.8 + idx * 1.7) * 0.15;
    var glowSize = baseSize * 3.5 * breathe;
    var grd = cx.createRadialGradient(t.sx, t.sy, baseSize * 0.3, t.sx, t.sy, glowSize);
    grd.addColorStop(0, 'rgba(' + col.join(',') + ',' + (isHover ? 0.25 : 0.08) * alpha + ')');
    grd.addColorStop(0.5, 'rgba(' + col.join(',') + ',' + (isHover ? 0.1 : 0.03) * alpha + ')');
    grd.addColorStop(1, 'rgba(' + col.join(',') + ',0)');
    cx.fillStyle = grd;
    cx.beginPath();
    cx.arc(t.sx, t.sy, glowSize, 0, Math.PI * 2);
    cx.fill();

    // Ferrofluid body — amorphous blob with shifting lobes
    cx.beginPath();
    var pts = 36;
    for (var i = 0; i <= pts; i++) {
      var angle = (i / pts) * Math.PI * 2;
      // Multiple frequency distortion (ferrofluid spikes)
      var r = baseSize;
      r += Math.sin(angle * spikes + time * 1.3 + idx * 2.1) * baseSize * 0.25;
      r += Math.sin(angle * (spikes - 2) - time * 0.9 + idx * 0.7) * baseSize * 0.15;
      r += Math.cos(angle * 3 + time * 2.1 + idx * 4.3) * baseSize * 0.1;
      // Pulse with breathing
      r *= breathe;

      var px = t.sx + Math.cos(angle) * r;
      var py = t.sy + Math.sin(angle) * r;
      if (i === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
    }
    cx.closePath();

    // Fill with radial gradient (metallic sheen)
    var sheenAngle = time * 0.5 + idx;
    var sheenX = t.sx + Math.cos(sheenAngle) * baseSize * 0.3;
    var sheenY = t.sy + Math.sin(sheenAngle) * baseSize * 0.3;
    var bodyGrd = cx.createRadialGradient(sheenX, sheenY, 0, t.sx, t.sy, baseSize * 1.5);
    // Bright highlight (metallic reflection point)
    var hiR = Math.min(255, col[0] + 80);
    var hiG = Math.min(255, col[1] + 80);
    var hiB = Math.min(255, col[2] + 80);
    bodyGrd.addColorStop(0, 'rgba(' + hiR + ',' + hiG + ',' + hiB + ',' + alpha * 0.9 + ')');
    bodyGrd.addColorStop(0.4, 'rgba(' + col.join(',') + ',' + alpha * 0.8 + ')');
    // Dark edge (depth)
    var loR = Math.max(0, col[0] - 60);
    var loG = Math.max(0, col[1] - 60);
    var loB = Math.max(0, col[2] - 60);
    bodyGrd.addColorStop(1, 'rgba(' + loR + ',' + loG + ',' + loB + ',' + alpha * 0.6 + ')');
    cx.fillStyle = bodyGrd;
    cx.fill();

    // Inner bright core (energy center)
    var coreSize = baseSize * 0.3 * (1 + Math.sin(time * 2 + idx * 3) * 0.3);
    var coreGrd = cx.createRadialGradient(t.sx, t.sy, 0, t.sx, t.sy, coreSize);
    coreGrd.addColorStop(0, 'rgba(255,255,255,' + alpha * 0.5 + ')');
    coreGrd.addColorStop(0.5, 'rgba(' + hiR + ',' + hiG + ',' + hiB + ',' + alpha * 0.3 + ')');
    coreGrd.addColorStop(1, 'rgba(' + col.join(',') + ',0)');
    cx.fillStyle = coreGrd;
    cx.beginPath();
    cx.arc(t.sx, t.sy, coreSize, 0, Math.PI * 2);
    cx.fill();

    // Tiny orbiting motes (like particles attracted to the blob)
    if (isHover || t.screenScale > 0.85) {
      var nMotes = isHover ? 5 : 2;
      for (var m = 0; m < nMotes; m++) {
        var mAngle = time * (1.5 + m * 0.4) + idx * 2 + m * Math.PI * 2 / nMotes;
        var mDist = baseSize * (1.8 + Math.sin(time * 3 + m) * 0.5);
        var mx = t.sx + Math.cos(mAngle) * mDist;
        var my = t.sy + Math.sin(mAngle) * mDist * 0.6; // elliptical orbit
        var mSize = 1.2 + Math.sin(time * 4 + m * 2) * 0.5;
        cx.beginPath();
        cx.arc(mx, my, mSize, 0, Math.PI * 2);
        cx.fillStyle = 'rgba(' + hiR + ',' + hiG + ',' + hiB + ',' + alpha * 0.4 + ')';
        cx.fill();
      }
    }

    // Label — fades as blob forms, stays as small tag in orbit
    var myT2 = t.t || 0;
    var textAlpha = isHover ? 0.95 : Math.max(0.3, 1.0 - myT2 * 0.5) * alpha;
    var textSize = 10 + (1 - myT2) * 3;
    if (isHover) textSize = 13;

    var textY = t.sy - baseSize * myT2 * 1.6 - 4 + (1 - myT2) * 2;

    cx.font = (isHover ? 'bold ' : '') + textSize + 'px Futura, sans-serif';
    cx.fillStyle = 'rgba(232,228,220,' + textAlpha + ')';
    cx.textAlign = 'center';
    cx.fillText(t.name, t.sx, textY);
  });

  // pip install badge (bottom center)
  cx.font = '11px "Courier New", monospace';
  cx.fillStyle = 'rgba(136,136,136,0.3)';
  cx.textAlign = 'center';
  cx.fillText('pip install begump', W/2, H - 30);

  requestAnimationFrame(draw);
}

// Interaction
cv.addEventListener('mousedown', function(e) {
  if (hoverIdx >= 0) {
    window.location.href = tools[hoverIdx].href;
    return;
  }
  // Check center node click
  var cp = project(0, 0, 0);
  var cdx = e.clientX - cp.sx, cdy = e.clientY - cp.sy;
  if (cdx*cdx + cdy*cdy < 625) { // 25px radius
    window.location.href = '/tryit/';
    return;
  }
  dragging = true;
  dragX = e.clientX;
  dragY = e.clientY;
  autoRotate = false;
});

cv.addEventListener('mousemove', function(e) {
  lastMx = e.clientX;
  lastMy = e.clientY;

  if (dragging) {
    rotY += (e.clientX - dragX) * 0.005;
    rotX += (e.clientY - dragY) * 0.005;
    rotX = Math.max(-1.2, Math.min(1.2, rotX));
    dragX = e.clientX;
    dragY = e.clientY;
  }

  // Hit test
  hoverIdx = -1;
  for (var i = 0; i < tools.length; i++) {
    var dx = e.clientX - tools[i].sx;
    var dy = e.clientY - tools[i].sy;
    var hitSize = tools[i].size * tools[i].screenScale + 12;
    if (dx*dx + dy*dy < hitSize * hitSize) {
      hoverIdx = i;
      break;
    }
  }

  cv.style.cursor = hoverIdx >= 0 ? 'pointer' : (dragging ? 'grabbing' : 'grab');

  // Panel
  if (hoverIdx >= 0) {
    panelName.textContent = tools[hoverIdx].name;
    panelDesc.textContent = tools[hoverIdx].short;
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
});

cv.addEventListener('mouseup', function() {
  dragging = false;
  setTimeout(function() { autoRotate = true; }, 3000);
});

cv.addEventListener('mouseleave', function() {
  dragging = false;
  hoverIdx = -1;
  panel.classList.remove('show');
  setTimeout(function() { autoRotate = true; }, 1000);
});

// Touch support
cv.addEventListener('touchstart', function(e) {
  var t = e.touches[0];
  dragX = t.clientX; dragY = t.clientY;
  dragging = true; autoRotate = false;
  e.preventDefault();
});
cv.addEventListener('touchmove', function(e) {
  var t = e.touches[0];
  rotY += (t.clientX - dragX) * 0.005;
  rotX += (t.clientY - dragY) * 0.005;
  rotX = Math.max(-1.2, Math.min(1.2, rotX));
  dragX = t.clientX; dragY = t.clientY;
  e.preventDefault();
});
cv.addEventListener('touchend', function() {
  dragging = false;
  setTimeout(function() { autoRotate = true; }, 3000);
});

draw();

// PHASE TRANSITION: list → constellation after 3 seconds of lingering
// The list stays functional — you can click items during the wait.
// After 3s: items scatter, canvas fades in, constellation takes over.
// Moving the mouse resets the timer (you're engaged, don't transition).

var transitionTimer = null;
var transitioned = false;

function triggerTransition() {
  if (transitioned) return;
  transitioned = true;

  // Scatter the list items (staggered)
  var items = document.querySelectorAll('#list .item');
  items.forEach(function(item, i) {
    setTimeout(function() {
      item.classList.add('scatter');
    }, i * 60);
  });

  // After items scatter, fade in canvas
  setTimeout(function() {
    document.getElementById('cv').classList.add('live');
    document.getElementById('list').classList.add('fade');
  }, items.length * 60 + 300);
}

function resetTransition() {
  if (transitioned) return;
  clearTimeout(transitionTimer);
  transitionTimer = setTimeout(triggerTransition, 3000);
}

// Start the timer
transitionTimer = setTimeout(triggerTransition, 3000);

// Mouse/touch activity on the LIST resets (user is reading)
document.getElementById('list').addEventListener('mousemove', resetTransition);
document.getElementById('list').addEventListener('touchstart', resetTransition);

// Make list items clickable
document.querySelectorAll('#list .item').forEach(function(item, i) {
  item.style.cursor = 'pointer';
  item.addEventListener('click', function() {
    window.location.href = tools[i].href;
  });
  item.addEventListener('mouseenter', function() {
    item.style.color = '#c9a44a';
  });
  item.addEventListener('mouseleave', function() {
    item.style.color = '#666';
  });
});

</script>
<script src="/js/breathe.js?v=2"></script>
<script src="/transit.js"></script>
</body>
</html>
