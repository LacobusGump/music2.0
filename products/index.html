<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tools — GUMP</title>
<meta name="description" content="19 tools. Free. pip install begump. Each one does one thing with coupling math.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;overflow-x:hidden;}
a{color:#c9a44a;text-decoration:none;}
#cosmos{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;}
.scroll-layer{position:relative;z-index:1;pointer-events:none;}
.scroll-layer a{pointer-events:auto;}
.zone{height:100vh;display:flex;align-items:flex-end;justify-content:center;padding-bottom:12vh;}
.zone-label{font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:1em;font-weight:100;color:#bd6e3710;
  letter-spacing:0.25em;text-transform:uppercase;
  pointer-events:none;user-select:none;transition:color 0.8s;}
.zone.active .zone-label{color:#bd6e3730;}
#info-panel{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(8,8,13,0.95);border:1px solid #bd6e3720;
  border-radius:12px;padding:16px 22px;max-width:440px;width:92%;
  z-index:10;opacity:0;transition:opacity 0.3s;
  pointer-events:none;backdrop-filter:blur(10px);}
#info-panel.show{opacity:1;pointer-events:auto;}
#info-panel h3{font-size:0.9em;font-weight:200;color:#bd6e37;margin:0 0 4px;
  font-family:Futura,'Century Gothic',system-ui,sans-serif;letter-spacing:0.06em;}
#info-panel p{font-size:0.72em;color:#888;line-height:1.7;margin:0;}
#info-panel a.try{pointer-events:auto;display:inline-block;margin-top:8px;font-size:0.7em;
  color:#bd6e3760;border:1px solid #bd6e3720;padding:4px 12px;border-radius:16px;}
#info-panel a.try:hover{color:#bd6e37;border-color:#bd6e3740;}
.back{position:fixed;top:16px;left:20px;font-size:0.72em;color:#333;z-index:20;pointer-events:auto;}
.pip{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  font-family:'Courier New',monospace;font-size:0.55em;color:#bd6e3715;z-index:10;pointer-events:auto;}
.pip a{color:#bd6e3730;}
@media(max-width:600px){
  .zone-label{font-size:0.75em;}
  #info-panel{max-width:88vw;padding:12px 16px;}
}
</style>
</head>
<body>
<a class="back" href="/">&larr; GUMP</a>
<a href="/products/index_old.html" style="position:fixed;top:16px;right:20px;font-size:0.6em;color:#bd6e3715;z-index:20;letter-spacing:0.08em;border:1px solid #bd6e3710;padding:4px 10px;border-radius:12px;pointer-events:auto;transition:all 0.3s;" onmouseenter="this.style.color='#bd6e3760'" onmouseleave="this.style.color='#bd6e3715'">list view</a>
<canvas id="cosmos"></canvas>

<div id="info-panel">
  <h3 id="info-name"></h3>
  <p id="info-desc"></p>
  <a class="try" id="info-link" href="#">try it &rarr;</a>
</div>

<div class="pip">pip install <a href="https://pypi.org/project/begump/">begump</a></div>

<div class="scroll-layer">
  <div class="zone" data-group="0"><div class="zone-label" style="text-align:center;line-height:2.5;"><span style="font-size:1.6em;color:#bd6e3715;">Tools</span><br><span style="font-size:0.5em;color:#bd6e3710;">19 tools &middot; scroll to explore &middot; tap to try</span></div></div>
  <div class="zone" data-group="1"><div class="zone-label">Analyze</div></div>
  <div class="zone" data-group="2"><div class="zone-label">Predict</div></div>
  <div class="zone" data-group="3"><div class="zone-label">Detect</div></div>
  <div class="zone" data-group="4"><div class="zone-label">Build</div></div>
</div>

<script>
(function(){
'use strict';
var cv=document.getElementById('cosmos'),cx=cv.getContext('2d');
var dpr=1,W=0,H=0,CX=0,CY=0,t=0;
var focusGroup=0,hoverNode=-1,cycles=0,aliveness=1,wasAtBottom=false,mouseX=0,mouseY=0;

function resize(){dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);CX=W/2;CY=H/2;}
resize();addEventListener('resize',resize);

var groups=[
  {name:'Core',color:[189,110,55]},
  {name:'Analyze',color:[100,180,100]},
  {name:'Predict',color:[100,150,255]},
  {name:'Detect',color:[204,68,68]},
  {name:'Build',color:[201,164,74]},
];

var nodes=[
  // Core (0) — the center
  {n:'K/R/E/T',g:0,href:'/products/sensor/',desc:'Drop any data — numbers, text, a CSV. Get back four numbers that tell you if it\'s healthy, breaking, or about to change. Works on heartbeats, stock prices, server logs, anything. The universal check engine light.'},

  // Analyze (1)
  {n:'Fold Watch',g:1,href:'/products/foldwatch/',desc:'Paste a protein sequence. See how it folds, where it breaks, whether a mutation is dangerous. 98.3% accuracy on real clinical data. Labs use tools like this to find drug targets. This one runs in your browser.'},
  {n:'Knowledge',g:1,href:'/products/knowledge/',desc:'Paste an article, your notes, a chapter. It maps every idea to every other idea and shows you connections you didn\'t see. Like a mind map that builds itself.'},
  {n:'Org X-Ray',g:1,href:'/products/orgxray/',desc:'Paste who talks to who (from Slack, email, meetings). See the real power structure — not the org chart, the actual coupling. Who\'s the bridge? Who\'s isolated? Who leaves and everything breaks?'},
  {n:'Pillar',g:1,href:'/docs/#pillar',desc:'Give it any signal — audio, sensor data, vibration. It tells you which frequencies are working together and which are solo. A drum hit: perfectly coupled (K=0.997). White noise: nothing coupled (K=0.16).'},
  {n:'Reflect',g:1,href:'/docs/#reflect',desc:'Paste any writing. Is the author exploring (opening up, getting less certain) or resolving (closing down, arriving at answers)? Detects the difference between genuine thinking and performed confidence.'},

  // Predict (2)
  {n:'Oracle',g:2,href:'/products/oracle/',desc:'Paste a sequence of numbers — stock prices, temperatures, anything that changes over time. It finds the hidden rhythm and shows you where it\'s going next. Not magic. Fourier math. But it feels like magic.'},
  {n:'Tune',g:2,href:'/docs/#tune',desc:'Is this system about to fail? Paste monitoring data. It finds the critical coupling point — the moment where the rhythm starts to break. Warns you before the crash, not after. Works in both directions.'},
  {n:'Octave',g:2,href:'/docs/#octave',desc:'Are you getting better or running on a treadmill? Track any metric over time. It watches whether your floor is rising (ascending), flat (stuck), or falling (regressing). Needs 9+ measurements to be honest.'},
  {n:'AI Trainer',g:2,href:'/products/aitrainer/',desc:'Paste your model\'s training loss. Did it actually learn, or is it memorizing? This finds the grokking moment — the phase transition from memorization to understanding. Works with PyTorch, TensorFlow, any logger.'},
  {n:'Learn Engine',g:2,href:'/products/learnengine/',desc:'Paste a student\'s quiz results (1s and 0s). When did they actually get it? Not the average — the MOMENT the coupling locked. Teachers: this shows you who grokked and who\'s performing.'},

  // Detect (3)
  {n:'Trace',g:3,href:'/products/trace/',desc:'Paste transactions (from, to, amount). It finds the circles — money that leaves and comes back. The shape of fraud is always a loop. This finds loops that humans miss because they span too many steps.'},
  {n:'Dissonance',g:3,href:'/products/dissonance/',desc:'Paste any metric over time. It finds the exact moment the behavior changed. Server went weird at 3:47am? This tells you. Works on any data that has a before and after.'},
  {n:'Accord',g:3,href:'/products/accord/',desc:'Paste your compliance requirements (SOC 2, HIPAA, any framework). It finds the gaps — what you say you do vs what\'s actually covered. Auditors charge $50K for this. This is free.'},
  {n:'FOR Machine',g:3,href:'/docs/#for-machine',desc:'The experiment: two groups of oscillators. One optimizes for itself. One optimizes for the other. Result: love is 1.6x more alive than ego. Not poetry. Measured. Across 20 random seeds.'},

  // Build (4)
  {n:'Turbo',g:4,href:'/products/turbo/',desc:'Write coupling math and it compiles to native code. 930x faster than Python. Four operators: K (coupling), R (sync), E (energy), T (tension). That\'s the whole language.'},
  {n:'Chip Fast',g:4,href:'/products/chipfast/',desc:'Place logic gates on a chip to minimize wire length. Same math as protein folding — the problem of arranging things so the connections are shortest. Works for circuits, floor plans, network layouts.'},
  {n:'Sfumato',g:4,href:'/products/sfumato/',desc:'Paste any text. See how much it compresses. Repetition IS coupling — the more a text repeats patterns, the smaller it gets. Try the same sentence twice and watch the ratio change.'},
  {n:"Alan's Eye",g:4,href:'/products/alans-eye/',desc:'Pick two colors. How close are they? What would you adjust to match? Named after Alan Turing — who saw patterns in everything, including color. Full tool has OEM codes, mix ratios, dry times.'},
];

var N=nodes.length;
var dust=[];
for(var d=0;d<40;d++)dust.push({x:Math.random()*2000,y:Math.random()*2000,s:0.3+Math.random(),v:0.05+Math.random()*0.12,a:0.005+Math.random()*0.02,p:Math.random()*6.28});

function positionNodes(){
  var scale=Math.min(W,H)/(W<600?2.2:3.0);
  var orbits=[0,scale*0.35,scale*0.35,scale*0.6,scale*0.6];
  var gi=[0,0,0,0,0],gc=[0,0,0,0,0];
  nodes.forEach(function(n){gc[n.g]++;});
  nodes.forEach(function(n,i){
    var g=n.g,idx=gi[g]++,count=gc[g];
    if(g===0){n.baseX=CX;n.baseY=CY;}
    else{
      var base=[0,-1.57,1.57,3.14,0][g],spread=2.4,angle=base-spread/2+(idx/(count-1||1))*spread;
      n.baseX=CX+Math.cos(angle)*orbits[g];n.baseY=CY+Math.sin(angle)*orbits[g];
    }
    n.x=n.baseX;n.y=n.baseY;n.size=W<600?3:4.5;n.phase=Math.random()*6.28;
  });
}
positionNodes();addEventListener('resize',function(){resize();positionNodes();});

addEventListener('scroll',function(){
  var frac=(document.documentElement.scrollHeight-innerHeight)>0?pageYOffset/(document.documentElement.scrollHeight-innerHeight):0;
  if(W<600){if(frac<0.2)focusGroup=0;else if(frac<0.4)focusGroup=1;else if(frac<0.6)focusGroup=2;else if(frac<0.8)focusGroup=3;else focusGroup=4;}
  else{if(frac<0.2)focusGroup=-1;else if(frac<0.4)focusGroup=1;else if(frac<0.6)focusGroup=2;else if(frac<0.8)focusGroup=3;else focusGroup=4;}
  // Loop — spiral up
var frac2=(document.documentElement.scrollHeight-innerHeight)>0?pageYOffset/(document.documentElement.scrollHeight-innerHeight):0;if(frac2>0.98&&!wasAtBottom){wasAtBottom=true;cycles++;aliveness=1+cycles*0.3;for(var di=0;di<15;di++)dust.push({x:Math.random()*W,y:Math.random()*H,s:0.3+Math.random()*1.5,v:0.05+Math.random()*0.2,a:Math.random()*0.04+0.01,p:Math.random()*6.28});setTimeout(function(){window.scrollTo({top:0,behavior:"smooth"});},600);}if(frac2<0.05)wasAtBottom=false;
document.querySelectorAll(".zone").forEach(function(z){z.classList.toggle('active',parseInt(z.dataset.group)===focusGroup);});
});

addEventListener('mousemove',function(e){
  mouseX=e.clientX;mouseY=e.clientY;
  hoverNode=-1;var cd=40;
  nodes.forEach(function(n,i){var dx=n.x-mouseX,dy=n.y-mouseY,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cd=d;hoverNode=i;}});
  var p=document.getElementById('info-panel');
  if(hoverNode>=0){var nd=nodes[hoverNode];document.getElementById('info-name').textContent=nd.n;document.getElementById('info-desc').textContent=nd.desc;document.getElementById('info-link').href=nd.href;p.classList.add('show');}else p.classList.remove('show');
});
cv.addEventListener('touchstart',function(e){e.preventDefault();var touch=e.touches[0];mouseX=touch.clientX;mouseY=touch.clientY;hoverNode=-1;var cd=50;nodes.forEach(function(n,i){var dx=n.x-mouseX,dy=n.y-mouseY,d=Math.sqrt(dx*dx+dy*dy);if(d<cd){cd=d;hoverNode=i;}});var p=document.getElementById('info-panel');if(hoverNode>=0){var nd=nodes[hoverNode];document.getElementById('info-name').textContent=nd.n;document.getElementById('info-desc').textContent=nd.desc;document.getElementById('info-link').href=nd.href;p.classList.add('show');}else p.classList.remove('show');},{passive:false});
cv.addEventListener('click',function(){if(hoverNode>=0)window.location.href=nodes[hoverNode].href;});
cv.style.cursor='default';addEventListener('mousemove',function(){cv.style.cursor=hoverNode>=0?'pointer':'default';});

function render(){
  t+=0.008;
  cx.fillStyle='rgba(8,8,13,0.15)';cx.fillRect(0,0,W,H);
  // Dust
  for(var di=0;di<dust.length;di++){var dp=dust[di];dp.p+=0.01;dp.y-=dp.v;dp.x+=Math.sin(dp.p)*0.3;if(dp.y<-10){dp.y=H+10;dp.x=Math.random()*W;}cx.fillStyle='rgba(189,110,55,'+(dp.a*(0.5+Math.sin(dp.p*2)*0.5)).toFixed(4)+')';cx.beginPath();cx.arc(dp.x,dp.y,dp.s,0,6.28);cx.fill();}
  // Grain
  if(Math.random()>0.7)for(var gi=0;gi<15;gi++){cx.fillStyle='rgba(189,110,55,'+(Math.random()*0.006).toFixed(4)+')';cx.fillRect(Math.random()*W,Math.random()*H,1,1);}

  // Update nodes
  nodes.forEach(function(n){
    var focused=(focusGroup===-1||n.g===focusGroup);
    var ts=focused?1*aliveness:0.6,ta=focused?1:0.12;
    n.phase+=0.02+0.01*Math.random();
    var breathe=1+Math.sin(n.phase)*(0.15+cycles*0.05);
    if(focused&&focusGroup!==-1){var dx=n.baseX-CX,dy=n.baseY-CY;n.x+=(CX+dx*1.15-n.x)*0.05;n.y+=(CY+dy*1.15-n.y)*0.05;}
    else{n.x+=(n.baseX-n.x)*0.05;n.y+=(n.baseY-n.y)*0.05;}
    n._s=(n._s||1)+(ts-(n._s||1))*0.08;n._a=(n._a||1)+(ta-(n._a||1))*0.08;n._b=breathe;
  });

  // Edges
  cx.globalCompositeOperation='lighter';
  for(var i=0;i<N;i++)for(var j=i+1;j<N;j++){if(nodes[i].g!==nodes[j].g)continue;var a=nodes[i],b=nodes[j],al=Math.min(a._a,b._a)*0.06;if(al<0.005)continue;var c=groups[a.g].color;cx.strokeStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';cx.lineWidth=0.5;cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();}
  // Edges to center
  var k=nodes[0];for(var i=1;i<N;i++){var n=nodes[i],al=n._a*0.02;if(al<0.003)continue;cx.strokeStyle='rgba(189,110,55,'+al.toFixed(3)+')';cx.lineWidth=0.3;cx.beginPath();cx.moveTo(k.x,k.y);cx.lineTo(n.x,n.y);cx.stroke();}
  cx.globalCompositeOperation='source-over';

  // Nodes
  for(var i=0;i<N;i++){var n=nodes[i],c=groups[n.g].color,sz=n.size*n._s*n._b,al=n._a,ih=(i===hoverNode);
    if(ih){sz*=2;al=1;}
    if(al>0.1){var gr=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,sz*4);gr.addColorStop(0,'rgba('+c[0]+','+c[1]+','+c[2]+','+(al*0.08).toFixed(3)+')');gr.addColorStop(1,'rgba('+c[0]+','+c[1]+','+c[2]+',0)');cx.fillStyle=gr;cx.beginPath();cx.arc(n.x,n.y,sz*4,0,6.28);cx.fill();}
    cx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+al.toFixed(3)+')';cx.beginPath();cx.arc(n.x,n.y,sz,0,6.28);cx.fill();
    if(ih||(al>0.5&&sz>3.5)){cx.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+(al*0.7).toFixed(3)+')';cx.font=(ih?'12':'9')+'px Georgia';cx.textAlign='center';cx.fillText(n.n,n.x,n.y-sz-6);}
  }
  requestAnimationFrame(render);
}
render();
})();
</script>
<script src="/js/breathe.js?v=2"></script>
</body>
</html>
