<style>
html,body{margin:0;min-height:100%;background:#06050a;color:#c4a088;font-family:Georgia,serif;}
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;}
#gate .in{text-align:center;max-width:360px;padding:40px 24px;}
.orb{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 35%,#e8c07a,#b8753a 55%,#7a4520);box-shadow:0 0 20px rgba(201,164,74,.25);margin:0 auto 20px;animation:breathe 4s ease-in-out infinite;}
@keyframes breathe{0%,100%{transform:scale(.94);opacity:.7}50%{transform:scale(1.06);opacity:1}}
.lbl{font-family:Futura,'Century Gothic',sans-serif;font-size:.62em;letter-spacing:.2em;color:#c9a44a;text-transform:uppercase;margin-bottom:6px}
.sub{font-size:.72em;color:rgba(196,160,136,.4);line-height:1.8;margin-bottom:16px}
#pw{background:rgba(201,164,74,.04);border:1px solid rgba(201,164,74,.12);border-radius:8px;padding:9px 14px;color:#c4a088;font-family:Georgia,serif;font-size:.85em;width:100%;text-align:center;outline:none;margin-bottom:8px;box-sizing:border-box}
#go{background:rgba(201,164,74,.06);border:1px solid rgba(201,164,74,.14);border-radius:8px;padding:8px 20px;color:#c9a44a;font-family:Futura,'Century Gothic',sans-serif;font-size:.56em;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;width:100%;box-sizing:border-box}
#err{font-size:.66em;color:rgba(255,120,120,.5);margin-top:7px;height:14px}
#lib{display:none;max-width:760px;margin:0 auto;padding:56px 24px 80px}
#lib h1{font-family:Futura,'Century Gothic',sans-serif;font-weight:300;font-size:1.15em;letter-spacing:.18em;text-transform:uppercase;color:#c9a44a;margin:0 0 6px}
#lib .note{font-size:.78em;color:rgba(196,160,136,.5);margin:0 0 32px;line-height:1.8}
#lib .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:2px 22px}
#lib a{display:block;padding:7px 0;color:#c4a088;text-decoration:none;font-size:.92em;border-bottom:1px solid rgba(201,164,74,.06);transition:color .2s}
#lib a:hover{color:#e8cfa0}
</style></head><body>

  function b2u(b){return Uint8Array.from(atob(b),function(c){return c.charCodeAt(0)})}
  async function open_(pw){
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2u(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var raw=b2u(BLOB);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:raw.slice(0,12)},key,raw.slice(12));
    return JSON.parse(new TextDecoder().decode(pt));
  }
  function reveal(data,pw){
    try{localStorage.setItem('gump_rk_priv',pw);localStorage.setItem('gump_rk',data.dk);}catch(e){}
    var g=document.getElementById('grid');
    data.items.forEach(function(it){
      var a=document.createElement('a');a.href=it[0];a.textContent=it[1];g.appendChild(a);
    });
    document.getElementById('gate').style.display='none';
    document.getElementById('lib').style.display='block';
  }
  async function attempt(){
    var pw=document.getElementById('pw').value.trim();
    try{var d=await open_(pw);reveal(d,pw);}
    catch(e){var el=document.getElementById('err');el.textContent='not quite';document.getElementById('pw').value='';setTimeout(function(){el.textContent=''},2000);}
  }
  document.getElementById('go').addEventListener('click',attempt);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')attempt()});
  // auto-open if key already on device
  var v=null;try{v=localStorage.getItem('gump_rk_priv')}catch(e){}
  if(v){open_(v).then(function(d){reveal(d,v)}).catch(function(){document.getElementById('pw').focus()});}
  else{document.getElementById('pw').focus();}
})();
</script></body></html>
