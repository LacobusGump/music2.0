<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="/favicon.png">
<title>still here</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#080605;overflow:hidden;touch-action:none}canvas{display:block;width:100vw;height:100vh}#back{position:fixed;top:20px;left:24px;z-index:10;font:12px Georgia,serif;letter-spacing:.08em;color:rgba(139,74,46,.22);text-decoration:none}#back:hover{color:rgba(232,207,160,.5)}#hint{position:fixed;left:0;right:0;bottom:30px;text-align:center;z-index:5;font:12px Georgia,serif;letter-spacing:.14em;color:rgba(232,207,160,.12);pointer-events:none;transition:opacity 2s,color 2s}
</style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="hint">still here</div>
<script>
(function(){
'use strict';
var cv=document.getElementById('c'),cx=cv.getContext('2d'),hint=document.getElementById('hint');
var W=0,H=0,dpr=1,t=0,last=performance.now(),lastMove=performance.now(),noise=null,motes=[],TAU=Math.PI*2;
function rgba(r,g,b,a){return 'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a)).toFixed(4)+')'}
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);motes=[];for(var i=0;i<55;i++){motes.push({x:Math.random()*W,y:Math.random()*H,p:Math.random()*TAU,r:10+Math.random()*70,o:.18+Math.random()*.6})}}
function makeNoise(){noise=document.createElement('canvas');noise.width=180;noise.height=180;var n=noise.getContext('2d'),img=n.createImageData(180,180);for(var i=0;i<img.data.length;i+=4){var v=Math.random()*10;img.data[i]=v;img.data[i+1]=v*.72;img.data[i+2]=v*.52;img.data[i+3]=12}n.putImageData(img,0,0)}
function moved(){lastMove=performance.now()}addEventListener('mousemove',moved,{passive:true});addEventListener('touchstart',moved,{passive:true});addEventListener('touchmove',moved,{passive:true});addEventListener('keydown',moved,{passive:true});addEventListener('click',moved,{passive:true});
function draw(now){var dt=Math.min((now-last)/1000,.05);last=now;t+=dt;var age=Math.min(1,t/6);var still=Math.min(1,(performance.now()-lastMove)/8500);var breath=.5+.5*Math.sin(t*.72);var micro=.5+.5*Math.sin(t*.19+1.7);
  cx.fillStyle='rgb('+Math.round(7+age*3+still*3)+','+Math.round(5+age*2)+','+Math.round(4+age)+')';cx.fillRect(0,0,W,H);if(!noise)makeNoise();cx.globalAlpha=.025+still*.020;cx.fillStyle=cx.createPattern(noise,'repeat');cx.fillRect(0,0,W,H);cx.globalAlpha=1;cx.globalCompositeOperation='lighter';
  for(var i=0;i<motes.length;i++){var m=motes[i];m.p+=dt*(m.o*.35+still*.18);m.x+=(W/2-m.x)*still*.00045;m.y+=(H/2-m.y)*still*.00045;var b=.5+.5*Math.sin(m.p);var rr=m.r*(.36+b*.28+still*.55);var a=(.003+age*.010+still*.035)*(b*.7+.3);var g=cx.createRadialGradient(m.x,m.y,0,m.x,m.y,rr);g.addColorStop(0,rgba(160,82,44,a*.55));g.addColorStop(.45,rgba(80,60,70,a*.16));g.addColorStop(1,rgba(80,60,70,0));cx.fillStyle=g;cx.beginPath();cx.arc(m.x,m.y,rr,0,TAU);cx.fill()}
  var px=W*.49+Math.sin(t*.17)*W*.018,py=H*.48+Math.cos(t*.13)*H*.014;var pr=Math.min(W,H)*(.13+breath*.035+still*.18);var pa=(.018+age*.018+still*.075)*(0.72+breath*.28);var p0=cx.createRadialGradient(px,py,0,px,py,pr*1.65);p0.addColorStop(0,rgba(184,92,48,pa*.42));p0.addColorStop(.28,rgba(140,70,42,pa*.20));p0.addColorStop(.72,rgba(80,42,30,pa*.05));p0.addColorStop(1,rgba(80,42,30,0));cx.fillStyle=p0;cx.beginPath();cx.arc(px,py,pr*1.65,0,TAU);cx.fill();
  if(still>.30){var rStill=(still-.30)/.70;var rx=px+Math.sin(t*.11+2)*pr*.28,ry=py+Math.cos(t*.09+1)*pr*.20;var rr2=pr*.42*rStill;var a2=rStill*.040*(.7+micro*.3);var g2=cx.createRadialGradient(rx,ry,0,rx,ry,rr2);g2.addColorStop(0,rgba(232,207,160,a2));g2.addColorStop(.35,rgba(184,117,58,a2*.35));g2.addColorStop(1,rgba(184,117,58,0));cx.fillStyle=g2;cx.beginPath();cx.arc(rx,ry,rr2,0,TAU);cx.fill();if(rStill>.45){var bx=(px+rx)/2,by=(py+ry)/2,br=rr2*.75,ba=(rStill-.45)*.025;var g3=cx.createRadialGradient(bx,by,0,bx,by,br);g3.addColorStop(0,rgba(232,207,160,ba));g3.addColorStop(1,rgba(232,207,160,0));cx.fillStyle=g3;cx.beginPath();cx.arc(bx,by,br,0,TAU);cx.fill()}}
  cx.globalCompositeOperation='source-over';var v=cx.createRadialGradient(W/2,H/2,Math.min(W,H)*.18,W/2,H/2,Math.max(W,H)*.70);v.addColorStop(0,'rgba(8,6,5,0)');v.addColorStop(.68,'rgba(6,4,3,.22)');v.addColorStop(1,'rgba(3,2,2,.78)');cx.fillStyle=v;cx.fillRect(0,0,W,H);hint.style.color=still>.55?'rgba(232,207,160,.22)':'rgba(232,207,160,.12)';hint.textContent=still>.62?'the room was already breathing':'still here';requestAnimationFrame(draw)}
resize();addEventListener('resize',resize,{passive:true});requestAnimationFrame(draw);
})();
</script>
</body>
</html>
