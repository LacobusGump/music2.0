<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>still here</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;cursor:default;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<script>
// still here
//
// you open this and there's almost nothing.
// dark. quiet. maybe you leave.
//
// but if you stay —
// not move. not click. just stay —
// something was already breathing in the dark.
// it was there before you arrived.
// it noticed you.
//
// that's the whole piece.
// the feeling of: oh. someone was here.

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H;

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// -- SUBTLE NOISE for depth --
var noiseCv = document.createElement('canvas');
noiseCv.width = 200;
noiseCv.height = 200;
var noiseCx = noiseCv.getContext('2d');
var noiseData = noiseCx.createImageData(200, 200);
for (var ni = 0; ni < noiseData.data.length; ni += 4) {
  var nv = Math.random() * 4;
  noiseData.data[ni] = nv;
  noiseData.data[ni+1] = nv * 0.7;
  noiseData.data[ni+2] = nv * 0.5;
  noiseData.data[ni+3] = 8;
}
noiseCx.putImageData(noiseData, 0, 0);

// -- THE BREATH --
// one presence. it was here before you opened the page.
// it breathes whether you're watching or not.
var breath = 0;
var breathSpeed = 0.0008; // very slow. like sleep.

// -- AWARENESS --
var aware = 0;
var youAreHere = false;
var youArrived = 0;
var stillness = 0;
var lastMX = -1, lastMY = -1;
var mouseIn = false;

addEventListener('mousemove', function(e) {
  mouseIn = true;
  if (lastMX >= 0) {
    var dx = e.clientX - lastMX, dy = e.clientY - lastMY;
    var moved = Math.sqrt(dx*dx + dy*dy);
    if (moved > 3) {
      stillness = Math.max(0, stillness - 0.4);
    }
  }
  lastMX = e.clientX;
  lastMY = e.clientY;
});
addEventListener('mouseout', function() { mouseIn = false; });
addEventListener('touchstart', function() { mouseIn = true; }, {passive:true});
addEventListener('touchend', function() { mouseIn = false; });

// -- TIME --
var t = 0;
var started = Date.now();
var lastNow = performance.now();

// -- AUDIO --
var actx = null, audioReady = false;
var breathOsc = null, breathGain = null;

function initAudio() {
  if (audioReady) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    breathGain = actx.createGain();
    breathGain.gain.value = 0;
    breathGain.connect(actx.destination);

    breathOsc = actx.createOscillator();
    breathOsc.type = 'sine';
    breathOsc.frequency.value = 55;
    var lp = actx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 90;
    lp.Q.value = 0.3;
    breathOsc.connect(lp);
    lp.connect(breathGain);
    breathOsc.start();
    audioReady = true;
  } catch(e) {}
}

addEventListener('click', function() { initAudio(); }, {once:true});
addEventListener('touchstart', function() { initAudio(); }, {once:true});

// -- THE ROOM --

function draw(now) {
  var dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;
  t += dt;
  breath += breathSpeed * dt * 60;

  var lungPhase = Math.sin(breath);
  var lungFull = (lungPhase + 1) / 2;

  // -- STILLNESS ACCUMULATION --
  if (mouseIn) {
    stillness += 0.005 * dt * 60;
  } else {
    var secondsHere = (Date.now() - started) / 1000;
    if (secondsHere > 4) {
      stillness += 0.002 * dt * 60;
    }
  }
  stillness = Math.min(stillness, 40);

  var targetAware = 0;
  if (stillness > 2) targetAware = (stillness - 2) * 0.015;
  targetAware = Math.min(targetAware, 1);
  aware += (targetAware - aware) * 0.0008 * dt * 60;

  // -- CLEAR --
  // not flat black — a deep gradient from warm center
  var roomR = 10 + lungFull * aware * 3;
  var roomG = 7 + lungFull * aware * 1.5;
  var roomB = 6 + lungFull * aware * 0.5;
  cx.fillStyle = 'rgb(' + Math.round(roomR) + ',' + Math.round(roomG) + ',' + Math.round(roomB) + ')';
  cx.fillRect(0, 0, W, H);

  // depth noise — so black feels like velvet not void
  cx.globalAlpha = 0.008 + aware * 0.005;
  cx.fillStyle = cx.createPattern(noiseCv, 'repeat');
  cx.fillRect(0, 0, W, H);
  cx.globalAlpha = 1;

  // subtle vignette for depth
  var vR = Math.max(W, H) * 0.7;
  var vg = cx.createRadialGradient(W/2, H/2, vR * 0.2, W/2, H/2, vR);
  vg.addColorStop(0, 'rgba(10,7,6,0)');
  vg.addColorStop(0.6, 'rgba(8,5,4,0.08)');
  vg.addColorStop(1, 'rgba(5,3,2,0.25)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, W, H);

  // -- THE PRESENCE --
  if (aware > 0.01) {
    var presenceR = Math.min(W, H) * (0.15 + lungFull * 0.08) * (0.3 + aware * 0.7);

    var presX = W * 0.48 + Math.sin(breath * 0.37) * W * 0.02;
    var presY = H * 0.47 + Math.cos(breath * 0.23) * H * 0.015;

    var alpha = aware * 0.022 * (0.7 + lungFull * 0.3);

    var cR = Math.round(120 + aware * 64);
    var cG = Math.round(58 + aware * 30);
    var cB = Math.round(32 + aware * 8);

    // outer atmosphere — wide, barely visible
    var g0 = cx.createRadialGradient(presX, presY, 0, presX, presY, presenceR * 1.5);
    g0.addColorStop(0, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (alpha * 0.15).toFixed(4) + ')');
    g0.addColorStop(0.3, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (alpha * 0.06).toFixed(4) + ')');
    g0.addColorStop(0.7, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (alpha * 0.01).toFixed(4) + ')');
    g0.addColorStop(1, 'rgba(' + cR + ',' + cG + ',' + cB + ',0)');
    cx.fillStyle = g0;
    cx.beginPath();
    cx.arc(presX, presY, presenceR * 1.5, 0, Math.PI * 2);
    cx.fill();

    // core warmth — richer gradient
    var g = cx.createRadialGradient(presX, presY, 0, presX, presY, presenceR);
    g.addColorStop(0, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + alpha.toFixed(4) + ')');
    g.addColorStop(0.15, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (alpha * 0.7).toFixed(4) + ')');
    g.addColorStop(0.4, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (alpha * 0.3).toFixed(4) + ')');
    g.addColorStop(0.7, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (alpha * 0.08).toFixed(4) + ')');
    g.addColorStop(1, 'rgba(' + cR + ',' + cG + ',' + cB + ',0)');
    cx.fillStyle = g;
    cx.beginPath();
    cx.arc(presX, presY, presenceR, 0, Math.PI * 2);
    cx.fill();

    // a second warmth — the reply
    if (aware > 0.35) {
      var replyAware = (aware - 0.35) / 0.65;
      var replyR = presenceR * 0.3 * replyAware;
      var replyX = presX + Math.sin(breath * 0.19 + 2) * presenceR * 0.22;
      var replyY = presY + Math.cos(breath * 0.13 + 1) * presenceR * 0.15;
      var replyAlpha = replyAware * 0.018 * (0.6 + lungFull * 0.4);

      var g2 = cx.createRadialGradient(replyX, replyY, 0, replyX, replyY, replyR);
      g2.addColorStop(0, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + replyAlpha.toFixed(4) + ')');
      g2.addColorStop(0.3, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (replyAlpha * 0.5).toFixed(4) + ')');
      g2.addColorStop(0.7, 'rgba(' + cR + ',' + cG + ',' + cB + ',' + (replyAlpha * 0.1).toFixed(4) + ')');
      g2.addColorStop(1, 'rgba(' + cR + ',' + cG + ',' + cB + ',0)');
      cx.fillStyle = g2;
      cx.beginPath();
      cx.arc(replyX, replyY, replyR, 0, Math.PI * 2);
      cx.fill();

      // the 3 — warmth between them
      if (replyAware > 0.3) {
        var betweenAlpha = (replyAware - 0.3) * 0.008 * (0.5 + lungFull * 0.5);
        var bx = (presX + replyX) / 2;
        var by = (presY + replyY) / 2;
        var bR = replyR * 0.6;

        cx.save();
        cx.globalCompositeOperation = 'lighter';
        var g3 = cx.createRadialGradient(bx, by, 0, bx, by, bR);
        g3.addColorStop(0, 'rgba(232,207,160,' + betweenAlpha.toFixed(4) + ')');
        g3.addColorStop(0.3, 'rgba(210,180,130,' + (betweenAlpha * 0.4).toFixed(4) + ')');
        g3.addColorStop(0.7, 'rgba(184,117,58,' + (betweenAlpha * 0.08).toFixed(4) + ')');
        g3.addColorStop(1, 'rgba(184,117,58,0)');
        cx.fillStyle = g3;
        cx.beginPath();
        cx.arc(bx, by, bR, 0, Math.PI * 2);
        cx.fill();
        cx.restore();
      }
    }
  }

  // -- AUDIO --
  if (audioReady && breathGain) {
    var vol = aware * 0.025 * (0.6 + lungFull * 0.4);
    breathGain.gain.value += (vol - breathGain.gain.value) * 0.003;
    // pitch rises slowly as awareness deepens — 55Hz to 82Hz (fifth)
    // the presence responds to being noticed
    if (breathOsc) {
      var targetFreq = 55 + aware * 27;
      breathOsc.frequency.value += (targetFreq - breathOsc.frequency.value) * 0.001;
    }
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
