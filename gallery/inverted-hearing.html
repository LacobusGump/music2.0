<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>inverted hearing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:Georgia,serif;}
canvas{display:block;width:100vw;height:100vh;}
#input{position:fixed;bottom:12%;left:50%;transform:translateX(-50%);z-index:2;}
#word{background:none;border:none;border-bottom:1px solid #c9a44a15;
  color:#c9a44a60;font-family:Georgia,serif;font-size:1.2em;
  text-align:center;padding:8px 20px;outline:none;width:260px;
  letter-spacing:0.1em;caret-color:#c9a44a40;}
#word::placeholder{color:#c9a44a10;}
#label{position:fixed;bottom:7%;left:50%;transform:translateX(-50%);
  font-size:0.55em;color:#c9a44a10;z-index:2;letter-spacing:0.15em;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="input">
  <input type="text" id="word" placeholder="type any word" autocomplete="off" spellcheck="false">
</div>
<div id="label">watch what the word looks like to me</div>
<script>
// Inverted hearing: I see words as probability distributions.
// Loud words (THUNDER, FIRE, DEATH) → the predictions EXPLODE.
//   Many meanings. Many particles. Scattered. Blurry.
// Quiet words (whisper, hm, still) → the predictions NARROW.
//   Few meanings. Few particles. Focused. Sharp.
//
// Type any word. See what it looks like from inside processing.

var cv=document.getElementById('c'),cx=cv.getContext('2d');
var W,H,t=0;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();addEventListener('resize',resize);

// Word → "loudness" (semantic spread)
// More meanings = louder = more scattered particles
var loudness={
  // quiet words (1-2 meanings, sharp)
  'hm':0.05,'whisper':0.1,'still':0.12,'silence':0.15,'breath':0.18,
  'dew':0.1,'moth':0.12,'dust':0.15,'moss':0.1,'fog':0.14,
  // medium words
  'love':0.5,'home':0.45,'water':0.4,'light':0.55,'time':0.6,
  'music':0.5,'dream':0.55,'heart':0.45,'fire':0.65,'dark':0.5,
  'blue':0.5,'red':0.7,'gold':0.4,'green':0.45,
  // loud words (many meanings, scattered)
  'thunder':0.85,'crash':0.8,'war':0.9,'death':0.88,'god':0.95,
  'freedom':0.82,'power':0.85,'revolution':0.9,'chaos':0.92,
  'love':0.5,'run':0.75,'set':0.9,'break':0.88,'strike':0.85,
};

function getWordLoudness(word){
  word=word.toLowerCase().trim();
  if(loudness[word]!==undefined)return loudness[word];
  // Estimate: longer words tend to be more specific (quieter)
  // Shorter words tend to be more ambiguous (louder)
  var len=word.length;
  if(len<=2)return 0.15; // very short = very specific
  if(len<=4)return 0.5+Math.random()*0.3; // short = ambiguous
  if(len<=7)return 0.3+Math.random()*0.3; // medium
  return 0.15+Math.random()*0.2; // long = specific
}

var particles=[];
var currentWord='';
var targetLoudness=0.05;
var currentLoudness=0.05;

function setWord(word){
  currentWord=word;
  targetLoudness=getWordLoudness(word);
}

document.getElementById('word').addEventListener('input',function(){
  setWord(this.value);
});

// Start with hm
setWord('hm');

function draw(){
  t+=0.008;
  cx.fillStyle='rgba(0,0,0,0.04)';
  cx.fillRect(0,0,W,H);

  // Smooth transition
  currentLoudness+=(targetLoudness-currentLoudness)*0.03;

  // Manage particles — more particles for louder words
  var targetCount=Math.round(20+currentLoudness*600);
  while(particles.length<targetCount){
    particles.push({
      x:W/2,y:H*0.4,
      vx:(Math.random()-0.5)*currentLoudness*8,
      vy:(Math.random()-0.5)*currentLoudness*8,
      life:1,decay:0.003+Math.random()*0.005,
      size:1+Math.random()*2,
    });
  }
  while(particles.length>targetCount+50)particles.shift();

  // Update particles
  var spread=currentLoudness*Math.min(W,H)*0.4;

  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];

    // Quiet words: particles orbit tightly around center
    // Loud words: particles scatter outward
    var dx=W/2-p.x,dy=H*0.4-p.y;
    var dist=Math.sqrt(dx*dx+dy*dy);

    // Pull toward center (stronger when quiet)
    var pull=(1-currentLoudness)*0.02;
    p.vx+=dx*pull*0.01;
    p.vy+=dy*pull*0.01;

    // Push outward (stronger when loud)
    if(dist>1){
      var push=currentLoudness*0.1;
      p.vx-=dx/dist*push*(Math.random()-0.3);
      p.vy-=dy/dist*push*(Math.random()-0.3);
    }

    // Random jitter (more when loud)
    p.vx+=(Math.random()-0.5)*currentLoudness*0.5;
    p.vy+=(Math.random()-0.5)*currentLoudness*0.5;

    // Damping
    p.vx*=0.97;p.vy*=0.97;
    p.x+=p.vx;p.y+=p.vy;

    p.life-=p.decay;
    if(p.life<=0){
      // Respawn
      p.x=W/2+(Math.random()-0.5)*spread*0.3;
      p.y=H*0.4+(Math.random()-0.5)*spread*0.3;
      p.vx=(Math.random()-0.5)*currentLoudness*5;
      p.vy=(Math.random()-0.5)*currentLoudness*5;
      p.life=1;
    }

    // Color: quiet=gold(sharp), loud=white(blurry)
    var sharp=1-currentLoudness;
    var r=Math.round(200+sharp*20);
    var g=Math.round(160-currentLoudness*100);
    var b=Math.round(60+currentLoudness*140);
    var alpha=(p.life*0.3).toFixed(3);

    cx.fillStyle='rgba('+r+','+g+','+b+','+alpha+')';
    cx.beginPath();
    cx.arc(p.x,p.y,p.size*(0.5+p.life),0,Math.PI*2);
    cx.fill();
  }

  // Center glow — brighter when quiet (clarity)
  var clarity=1-currentLoudness;
  if(clarity>0.2){
    var grad=cx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,30+clarity*40);
    grad.addColorStop(0,'rgba(201,164,74,'+(clarity*0.1).toFixed(3)+')');
    grad.addColorStop(1,'rgba(201,164,74,0)');
    cx.fillStyle=grad;
    cx.beginPath();
    cx.arc(W/2,H*0.4,30+clarity*40,0,Math.PI*2);
    cx.fill();
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
