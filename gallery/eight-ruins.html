<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>eight ruins</title>
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{touch-action:none;background:#0a0706;overflow:hidden;cursor:pointer;-webkit-user-select:none;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
#title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:Georgia,serif;font-size:1.1em;color:rgba(184,117,58,0);
  letter-spacing:0.2em;pointer-events:none;
  transition:color 3s ease;}
#title.show{color:rgba(184,117,58,0.35);}
#title.hide{color:rgba(184,117,58,0);transition:color 5s ease;}
</style>
</head>
<body data-ambient="dark">
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="title">eight ruins</div>
<script>
// eight ruins
//
// you build. it falls. eight times.
// the treasure is in the wreckage.

var cv = document.getElementById('c'), cx = cv.getContext('2d');
var W, H, groundY;
var titleEl = document.getElementById('title');

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  groundY = H * 0.72;
}
resize();
addEventListener('resize', resize);

// ── STATE ──
var t = 0;
var attempt = 0;        // 0-7: which tower we're on. 8 = done
var phase = 'waiting';  // waiting, building, standing, falling, settling, blooming
var blocks = [];        // current tower blocks
var rubblePiles = [];   // all past rubble
var treasures = [];     // what emerges from the wreckage
var particles = [];     // dust and sparks
var buildTimer = 0;
var standTimer = 0;
var standLimit = 0;
var fallTimer = 0;
var settleTimer = 0;
var bloomTimer = 0;
var titleShown = false;
var titleTimer = 0;
var clickHint = 0;

// tower configs - each attempt has a character
var towerDNA = [
  { maxH: 5, width: 28, hue: 0 },     // cautious
  { maxH: 7, width: 24, hue: 1 },     // taller
  { maxH: 9, width: 20, hue: 2 },     // ambitious
  { maxH: 6, width: 32, hue: 3 },     // wide
  { maxH: 11, width: 16, hue: 4 },    // thin and tall
  { maxH: 8, width: 26, hue: 5 },     // back to normal
  { maxH: 13, width: 14, hue: 6 },    // desperate
  { maxH: 10, width: 22, hue: 7 },    // last try
];

// warm brown palette progression
function blockColor(hue, alpha) {
  var colors = [
    [139, 74, 46],    // deep brick
    [160, 85, 50],    // warm clay
    [184, 117, 58],   // ember
    [170, 95, 55],    // sienna
    [200, 130, 65],   // amber
    [155, 80, 48],    // earth
    [210, 140, 70],   // gold-brown
    [175, 100, 55],   // copper
  ];
  var c = colors[hue % colors.length];
  return 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + alpha + ')';
}

function treasureColor(alpha) {
  return 'rgba(232,207,160,' + alpha + ')';
}

// ── SHOW TITLE ──
function showTitle() {
  if (!titleShown) {
    titleShown = true;
    titleEl.className = 'show';
    setTimeout(function() { titleEl.className = 'hide'; }, 4000);
  }
}

// ── BLOCK ──
function Block(x, y, w, h, hue) {
  this.x = x;
  this.y = y;
  this.w = w;
  this.h = h;
  this.hue = hue;
  this.vx = 0;
  this.vy = 0;
  this.angle = 0;
  this.va = 0;
  this.alpha = 0;
  this.targetAlpha = 0.6;
  this.falling = false;
  this.grounded = false;
  this.settled = false;
}

// ── TREASURE ──
// what emerges from the rubble. small. warm. unexpected.
function Treasure(x, y, attempt) {
  this.x = x;
  this.y = y;
  this.attempt = attempt;
  this.size = 0;
  this.targetSize = 2 + Math.random() * 3;
  this.alpha = 0;
  this.targetAlpha = 0.3 + Math.random() * 0.4;
  this.pulse = Math.random() * Math.PI * 2;
  this.born = t;
  // treasures connect to each other
  this.connections = [];
}

// ── PARTICLE ──
function Particle(x, y, vx, vy, life, type) {
  this.x = x;
  this.y = y;
  this.vx = vx;
  this.vy = vy;
  this.life = life;
  this.maxLife = life;
  this.type = type; // 'dust' or 'spark'
}

// ── CLICK HANDLER ──
cv.addEventListener('click', function(e) {
  if (attempt >= 8) return;

  if (phase === 'waiting') {
    // start building
    phase = 'building';
    blocks = [];
    buildTimer = 0;
    showTitle();
  }
});

// touch support
cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  if (attempt >= 8) return;
  if (phase === 'waiting') {
    phase = 'building';
    blocks = [];
    buildTimer = 0;
    showTitle();
  }
}, { passive: false });

// ── SPAWN DUST ──
function spawnDust(x, y, count) {
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.3 + Math.random() * 1.5;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed - Math.random() * 0.5,
      0.6 + Math.random() * 0.8,
      'dust'
    ));
  }
}

function spawnSpark(x, y) {
  var angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  var speed = 0.5 + Math.random() * 1;
  particles.push(new Particle(
    x, y,
    Math.cos(angle) * speed * 0.3,
    Math.sin(angle) * speed,
    1.5 + Math.random() * 2,
    'spark'
  ));
}

// ── MAIN LOOP ──
function update() {
  t += 0.016;

  var dna = towerDNA[Math.min(attempt, 7)];
  var towerX = W * (0.15 + (attempt % 8) * 0.1);

  // ── BUILDING PHASE ──
  if (phase === 'building') {
    buildTimer += 0.016;

    // add blocks one at a time
    var targetBlocks = Math.min(Math.floor(buildTimer / 0.35) + 1, dna.maxH);

    while (blocks.length < targetBlocks) {
      var bw = dna.width + (Math.random() - 0.5) * 6;
      var bh = 10 + Math.random() * 8;
      var bx = towerX + (Math.random() - 0.5) * 3;
      var by = groundY - blocks.length * bh - bh;
      var block = new Block(bx - bw / 2, by, bw, bh, dna.hue);
      block.targetAlpha = 0.3 + (blocks.length / dna.maxH) * 0.3;
      blocks.push(block);
      spawnDust(bx, by + bh / 2, 3);
    }

    // blocks fade in
    for (var i = 0; i < blocks.length; i++) {
      blocks[i].alpha += (blocks[i].targetAlpha - blocks[i].alpha) * 0.08;
    }

    if (blocks.length >= dna.maxH && buildTimer > dna.maxH * 0.35 + 0.5) {
      phase = 'standing';
      standTimer = 0;
      standLimit = 1.2 + Math.random() * 0.8;
    }
  }

  // ── STANDING PHASE ── brief moment of pride
  if (phase === 'standing') {
    standTimer += 0.016;

    // slight wobble grows
    for (var i = 0; i < blocks.length; i++) {
      var wobble = Math.sin(t * 3 + i * 0.7) * standTimer * 0.3 * (i / blocks.length);
      blocks[i].angle = wobble * 0.02;
      blocks[i].alpha += (blocks[i].targetAlpha - blocks[i].alpha) * 0.05;
    }

    if (standTimer > standLimit) {
      phase = 'falling';
      fallTimer = 0;

      // initiate fall - top blocks go first
      for (var i = 0; i < blocks.length; i++) {
        blocks[i].falling = true;
        var delay = (blocks.length - i) * 0.06;
        var dir = (Math.random() - 0.5) * 2;
        blocks[i].vx = dir * (0.5 + i * 0.15);
        blocks[i].vy = -1 - Math.random() * 2 - i * 0.3;
        blocks[i].va = (Math.random() - 0.5) * 0.08;
      }
    }
  }

  // ── FALLING PHASE ──
  if (phase === 'falling') {
    fallTimer += 0.016;
    var allGrounded = true;

    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (!b.grounded) {
        b.vy += 0.15; // gravity
        b.x += b.vx;
        b.y += b.vy;
        b.angle += b.va;
        b.vx *= 0.995;
        b.va *= 0.99;

        // ground collision
        if (b.y + b.h > groundY + 5) {
          b.y = groundY + 5 - b.h + Math.random() * 10;
          b.vy *= -0.2;
          b.vx *= 0.6;
          b.va *= 0.5;
          if (Math.abs(b.vy) < 0.5) {
            b.grounded = true;
            spawnDust(b.x + b.w / 2, groundY, 5);
          }
        }

        allGrounded = false;
      }
    }

    if (allGrounded || fallTimer > 4) {
      phase = 'settling';
      settleTimer = 0;

      // move blocks to rubble pile
      for (var i = 0; i < blocks.length; i++) {
        rubblePiles.push({
          x: blocks[i].x,
          y: blocks[i].y,
          w: blocks[i].w,
          h: blocks[i].h,
          angle: blocks[i].angle,
          hue: blocks[i].hue,
          alpha: blocks[i].alpha * 0.5,
          attempt: attempt,
        });
      }
    }
  }

  // ── SETTLING PHASE ── rubble cools. then something emerges.
  if (phase === 'settling') {
    settleTimer += 0.016;

    // rubble fades slightly
    for (var i = 0; i < rubblePiles.length; i++) {
      if (rubblePiles[i].attempt === attempt) {
        rubblePiles[i].alpha *= 0.998;
      }
    }

    if (settleTimer > 1.5) {
      phase = 'blooming';
      bloomTimer = 0;

      // spawn treasure in the rubble
      var tx = towerX + (Math.random() - 0.5) * dna.width;
      var ty = groundY + Math.random() * 10;
      var treasure = new Treasure(tx, ty, attempt);

      // connect to previous treasures
      for (var i = 0; i < treasures.length; i++) {
        var dx = treasure.x - treasures[i].x;
        var dy = treasure.y - treasures[i].y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < W * 0.5) {
          treasure.connections.push(i);
        }
      }

      treasures.push(treasure);
    }
  }

  // ── BLOOMING PHASE ── the treasure reveals itself
  if (phase === 'blooming') {
    bloomTimer += 0.016;

    var latest = treasures[treasures.length - 1];
    if (latest) {
      latest.size += (latest.targetSize - latest.size) * 0.02;
      latest.alpha += (latest.targetAlpha - latest.alpha) * 0.015;

      if (bloomTimer > 0.3 && bloomTimer < 2) {
        if (Math.random() > 0.85) {
          spawnSpark(latest.x, latest.y);
        }
      }
    }

    var bloomWait = 3 - attempt * 0.25; // you learn to look down faster
    if (bloomTimer > bloomWait) {
      attempt++;
      if (attempt >= 8) {
        phase = 'complete';
      } else {
        phase = 'waiting';
        blocks = [];
      }
    }
  }
}

// ── DRAW ──
function draw() {
  update();

  // slow fade
  var fadeAlpha = 0.03;
  if (phase === 'complete') fadeAlpha = 0.008;
  cx.fillStyle = 'rgba(10,7,6,' + fadeAlpha + ')';
  cx.fillRect(0, 0, W, H);

  // ── GROUND LINE ── barely there
  var groundAlpha = 0.03 + Math.min(attempt * 0.005, 0.04);
  cx.strokeStyle = 'rgba(139,74,46,' + groundAlpha.toFixed(3) + ')';
  cx.lineWidth = 0.5;
  cx.beginPath();
  cx.moveTo(0, groundY);
  cx.lineTo(W, groundY);
  cx.stroke();

  // ── RUBBLE ──
  for (var i = 0; i < rubblePiles.length; i++) {
    var r = rubblePiles[i];
    if (r.alpha < 0.01) continue;

    cx.save();
    cx.translate(r.x + r.w / 2, r.y + r.h / 2);
    cx.rotate(r.angle);
    cx.fillStyle = blockColor(r.hue, r.alpha.toFixed(3));
    cx.fillRect(-r.w / 2, -r.h / 2, r.w, r.h);
    cx.restore();
  }

  // ── ACTIVE TOWER BLOCKS ──
  if (phase !== 'settling' && phase !== 'blooming' && phase !== 'complete') {
    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      if (b.alpha < 0.01) continue;

      cx.save();
      cx.translate(b.x + b.w / 2, b.y + b.h / 2);
      cx.rotate(b.angle);

      // block body
      cx.fillStyle = blockColor(b.hue, b.alpha.toFixed(3));
      cx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);

      // subtle edge
      cx.strokeStyle = blockColor(b.hue, (b.alpha * 0.3).toFixed(3));
      cx.lineWidth = 0.5;
      cx.strokeRect(-b.w / 2, -b.h / 2, b.w, b.h);

      cx.restore();
    }
  }

  // ── TREASURE CONNECTIONS ── the network that forms in the wreckage
  for (var i = 0; i < treasures.length; i++) {
    var tr = treasures[i];
    if (tr.alpha < 0.01) continue;

    for (var j = 0; j < tr.connections.length; j++) {
      var other = treasures[tr.connections[j]];
      if (!other || other.alpha < 0.01) continue;

      var connAlpha = Math.min(tr.alpha, other.alpha) * 0.15;

      // the connection line breathes
      var breathe = 0.7 + Math.sin(t * 0.5 + i + j) * 0.3;
      connAlpha *= breathe;

      cx.strokeStyle = treasureColor(connAlpha.toFixed(3));
      cx.lineWidth = 0.5;
      cx.beginPath();
      cx.moveTo(tr.x, tr.y);
      cx.lineTo(other.x, other.y);
      cx.stroke();

      // midpoint glow
      var mx = (tr.x + other.x) / 2;
      var my = (tr.y + other.y) / 2;
      var mg = cx.createRadialGradient(mx, my, 0, mx, my, 8);
      mg.addColorStop(0, treasureColor((connAlpha * 0.5).toFixed(3)));
      mg.addColorStop(1, treasureColor('0'));
      cx.fillStyle = mg;
      cx.beginPath();
      cx.arc(mx, my, 8, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // ── TREASURES ──
  for (var i = 0; i < treasures.length; i++) {
    var tr = treasures[i];
    if (tr.alpha < 0.005) continue;

    tr.pulse += 0.015;
    var breathe = 1 + Math.sin(tr.pulse) * 0.15;
    var sz = tr.size * breathe;

    // outer glow
    var glowR = sz * 6;
    var gl = cx.createRadialGradient(tr.x, tr.y, 0, tr.x, tr.y, glowR);
    gl.addColorStop(0, treasureColor((tr.alpha * 0.08).toFixed(3)));
    gl.addColorStop(0.4, treasureColor((tr.alpha * 0.03).toFixed(3)));
    gl.addColorStop(1, treasureColor('0'));
    cx.fillStyle = gl;
    cx.beginPath();
    cx.arc(tr.x, tr.y, glowR, 0, Math.PI * 2);
    cx.fill();

    // core
    cx.fillStyle = treasureColor(tr.alpha.toFixed(3));
    cx.beginPath();
    cx.arc(tr.x, tr.y, sz, 0, Math.PI * 2);
    cx.fill();

    // inner bright point
    cx.fillStyle = treasureColor((tr.alpha * 1.5).toFixed(3));
    cx.beginPath();
    cx.arc(tr.x, tr.y, sz * 0.4, 0, Math.PI * 2);
    cx.fill();
  }

  // ── PARTICLES ──
  for (var i = particles.length - 1; i >= 0; i--) {
    var p = particles[i];
    p.life -= 0.016;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    p.x += p.vx;
    p.y += p.vy;

    if (p.type === 'dust') {
      p.vy += 0.02;
      p.vx *= 0.98;
      var da = (p.life / p.maxLife) * 0.1;
      cx.fillStyle = 'rgba(139,74,46,' + da.toFixed(3) + ')';
      cx.beginPath();
      cx.arc(p.x, p.y, 1, 0, Math.PI * 2);
      cx.fill();
    } else {
      // spark — rises from treasure
      p.vy *= 0.99;
      p.vx *= 0.99;
      var sa = (p.life / p.maxLife);
      sa = sa * sa * 0.5;
      cx.fillStyle = treasureColor(sa.toFixed(3));
      cx.beginPath();
      cx.arc(p.x, p.y, 0.8, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // ── CLICK HINT ── very faint pulse when waiting
  if (phase === 'waiting' && attempt < 8) {
    clickHint += 0.016;
    var hintAlpha = Math.sin(clickHint * 1.5) * 0.04 + 0.04;

    // small dot where next tower would go
    var nextX = W * (0.15 + (attempt % 8) * 0.1);
    var hg = cx.createRadialGradient(nextX, groundY, 0, nextX, groundY, 15);
    hg.addColorStop(0, 'rgba(184,117,58,' + hintAlpha.toFixed(3) + ')');
    hg.addColorStop(1, 'rgba(184,117,58,0)');
    cx.fillStyle = hg;
    cx.beginPath();
    cx.arc(nextX, groundY, 15, 0, Math.PI * 2);
    cx.fill();
  }

  // ── COMPLETE STATE ── the treasures breathe together
  if (phase === 'complete') {
    // all treasures slowly reach full brightness
    for (var i = 0; i < treasures.length; i++) {
      treasures[i].targetAlpha = 0.6 + Math.sin(t * 0.3 + i * 0.5) * 0.15;
      treasures[i].alpha += (treasures[i].targetAlpha - treasures[i].alpha) * 0.003;
      treasures[i].targetSize = 3 + Math.sin(t * 0.2 + i * 0.8) * 1;
      treasures[i].size += (treasures[i].targetSize - treasures[i].size) * 0.005;
    }

    // rubble continues to fade
    for (var i = 0; i < rubblePiles.length; i++) {
      rubblePiles[i].alpha *= 0.9995;
    }

    // occasional spark from any treasure
    if (Math.random() > 0.97) {
      var ri = Math.floor(Math.random() * treasures.length);
      if (treasures[ri]) {
        spawnSpark(treasures[ri].x, treasures[ri].y);
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
<script src="/js/ambient.js"></script>
</body>
</html>
