<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>the choosing</title>
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;touch-action:none;cursor:default;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font:0.72em Georgia,serif;
  color:rgba(139,74,46,0.12);text-decoration:none;z-index:10;
  letter-spacing:0.06em;transition:color 0.5s;}
#back:hover{color:rgba(184,117,58,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<script>
// the choosing
//
// what composing looks like from inside.
//
// not the sound. the decision.
// every note is a fork in the road.
// seven dimensions pull at each candidate.
// the safe choice glows steady — low cost, familiar.
// the surprising choice flickers — high Landauer cost,
// high information, high risk.
//
// when a note is chosen, the others die.
// that death is real. kT ln 2 per bit erased.
// the heat of the unchosen radiates outward.
//
// a motif builds. you'll see it return,
// same shape, different color. transformed
// by everything that happened between.
//
// move your hand up: bias toward surprise.
// move your hand down: bias toward safety.
// you are the composer's temperament.
//
// the piece never ends. it never repeats.
// but it remembers.

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H;

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// --- AUDIO CONTEXT (lazy) ---
var actx = null, masterGain = null;
function ensureAudio() {
  if (actx) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    masterGain = actx.createGain();
    masterGain.gain.value = 0.06;
    masterGain.connect(actx.destination);
  } catch(e) {}
}

// Play a note: frequency, duration, volume
function playNote(freq, dur, vol) {
  if (!actx) return;
  var osc = actx.createOscillator();
  var g = actx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol * 0.3, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  osc.connect(g);
  g.connect(masterGain);
  osc.start();
  osc.stop(actx.currentTime + dur + 0.05);
}

// --- THE SEVEN DIMENSIONS ---
// Each lens scores a candidate note differently
var lensNames = ['rhythm', 'melody', 'harmony', 'entropy', 'tension', 'memory', 'body'];
var lensColors = [
  [200, 80, 60],    // rhythm — warm red
  [220, 170, 60],   // melody — gold
  [60, 130, 200],   // harmony — blue
  [160, 60, 180],   // entropy — violet
  [200, 200, 80],   // tension — yellow-green
  [100, 180, 160],  // memory — teal
  [180, 100, 60]    // body — earth
];

// --- MUSICAL STATE ---
var SCALE = [0, 2, 4, 5, 7, 9, 11]; // major scale degrees
var BASE_FREQ = 220; // A3
var history = []; // chosen notes (pitch classes 0-11)
var historyFreqs = [];
var motifs = []; // detected recurring patterns
var chosenPath = []; // visual trail of chosen notes
var erasureParticles = []; // heat from unchosen notes
var currentCandidates = [];
var chosenNote = null;
var chooseTimer = 0;
var chooseDuration = 120; // frames between choices
var phaseInChoice = 0; // 0-1 progress through current choice
var surpriseBias = 0.5; // 0 = safe, 1 = surprise (mouse Y)
var mouseX = 0.5, mouseY = 0.5;
var totalChoices = 0;
var lastChosenPitch = 0;
var lastChosenY = H / 2;
var audioStarted = false;

// --- MOTIF DETECTION ---
// Look for 3-4 note patterns that repeat
function detectMotif() {
  if (history.length < 8) return;
  for (var len = 3; len <= 4; len++) {
    var recent = history.slice(-len);
    // search earlier history for same interval pattern
    var intervals = [];
    for (var i = 1; i < recent.length; i++) {
      intervals.push(recent[i] - recent[i-1]);
    }
    for (var start = 0; start < history.length - len * 2; start++) {
      var match = true;
      for (var j = 0; j < intervals.length; j++) {
        var hInterval = history[start + j + 1] - history[start + j];
        if (hInterval !== intervals[j]) { match = false; break; }
      }
      if (match) {
        // found a motif recurrence!
        var age = history.length - start;
        motifs.push({
          intervals: intervals.slice(),
          foundAt: totalChoices,
          age: age,
          alpha: 1.0,
          x: W * 0.3 + Math.random() * W * 0.4,
          y: H * 0.2 + Math.random() * H * 0.3,
          scale: 0.5 + Math.random() * 0.5,
          // color shift based on how far apart the occurrences are
          hueShift: Math.min(age / 20, 1)
        });
        return;
      }
    }
  }
}

// --- CANDIDATE GENERATION ---
function generateCandidates() {
  var candidates = [];
  var numCandidates = 5 + Math.floor(Math.random() * 3);
  var lastPitch = history.length > 0 ? history[history.length - 1] : 0;

  for (var i = 0; i < numCandidates; i++) {
    // pick a scale degree
    var degree = SCALE[Math.floor(Math.random() * SCALE.length)];
    // sometimes go to neighboring octave
    var octaveShift = 0;
    if (Math.random() < 0.3) octaveShift = Math.random() < 0.5 ? 12 : -12;
    var pitch = degree + octaveShift;

    // Score each lens
    var scores = [];

    // 0. Rhythm: prefers notes that continue a rhythmic pattern
    var rhythmScore = 0.5 + Math.sin(totalChoices * 0.7 + pitch * 0.3) * 0.3;

    // 1. Melody: prefers stepwise motion (small intervals)
    var interval = Math.abs(pitch - lastPitch);
    var melodyScore = Math.max(0, 1 - interval / 12);

    // 2. Harmony: prefers consonant intervals (octave, fifth, fourth, third)
    var consonance = [1.0, 0.1, 0.3, 0.5, 0.7, 0.8, 0.2, 0.95, 0.6, 0.65, 0.4, 0.15, 1.0];
    var harmonyScore = consonance[Math.abs(pitch - lastPitch) % 13] || 0.3;

    // 3. Entropy: prefers notes NOT recently used (information content)
    var recentCount = 0;
    var lookback = Math.min(history.length, 8);
    for (var j = history.length - lookback; j < history.length; j++) {
      if (history[j] % 12 === ((pitch % 12) + 12) % 12) recentCount++;
    }
    var entropyScore = 1 - recentCount / Math.max(lookback, 1);

    // 4. Tension: prefers dissonance when tension is building
    var tensionPhase = Math.sin(totalChoices * 0.15);
    var tensionScore = tensionPhase > 0 ? (1 - harmonyScore) : harmonyScore;

    // 5. Memory: prefers notes that would complete a known motif
    var memoryScore = 0.3;
    if (history.length >= 2) {
      var lastTwo = [history[history.length - 2] - history[history.length - 1],
                     pitch - (history.length > 0 ? history[history.length - 1] : 0)];
      for (var m = 0; m < motifs.length; m++) {
        if (motifs[m].intervals.length >= 2 &&
            motifs[m].intervals[0] === lastTwo[0] &&
            motifs[m].intervals[1] === lastTwo[1]) {
          memoryScore = 1.0;
          break;
        }
      }
    }

    // 6. Body: prefers notes in comfortable range, gravitates to center
    var bodyScore = Math.max(0, 1 - Math.abs(pitch) / 24);

    scores = [rhythmScore, melodyScore, harmonyScore, entropyScore, tensionScore, memoryScore, bodyScore];

    // Composite score: weighted by current bias
    // Safe = melody + harmony + body heavy
    // Surprise = entropy + tension heavy
    var safeWeight = 1 - surpriseBias;
    var surpriseWeight = surpriseBias;
    var weights = [
      0.12,                        // rhythm (neutral)
      0.22 * safeWeight + 0.05 * surpriseWeight,  // melody
      0.25 * safeWeight + 0.05 * surpriseWeight,  // harmony
      0.05 * safeWeight + 0.30 * surpriseWeight,  // entropy
      0.05 * safeWeight + 0.30 * surpriseWeight,  // tension
      0.18,                        // memory (neutral)
      0.13 * safeWeight + 0.05 * surpriseWeight   // body
    ];

    var totalScore = 0;
    for (var s = 0; s < 7; s++) totalScore += scores[s] * weights[s];

    // Landauer cost: how far from the previous note (bits of information)
    var landauerCost = Math.log2(1 + interval) * 0.3;

    // surprise = entropy score (how unexpected)
    var surprise = entropyScore * (1 - melodyScore) * 0.5 + 0.25;

    var freq = BASE_FREQ * Math.pow(2, pitch / 12);

    candidates.push({
      pitch: pitch,
      freq: freq,
      scores: scores,
      totalScore: totalScore,
      landauerCost: landauerCost,
      surprise: surprise,
      // visual position
      x: 0, y: 0,
      targetX: 0, targetY: 0,
      radius: 4 + totalScore * 8,
      alpha: 0,
      chosen: false,
      dying: false,
      deathTimer: 0
    });
  }

  // Position candidates in a constellation around center
  var cx0 = W * 0.35 + mouseX * W * 0.3;
  var cy0 = H * 0.5;
  for (var i = 0; i < candidates.length; i++) {
    var angle = (i / candidates.length) * Math.PI * 2 - Math.PI / 2;
    var r = 60 + candidates[i].surprise * 80;
    candidates[i].targetX = cx0 + Math.cos(angle) * r;
    candidates[i].targetY = cy0 + Math.sin(angle) * r;
    candidates[i].x = cx0;
    candidates[i].y = cy0;
  }

  // Sort by score — the winner will be chosen
  candidates.sort(function(a, b) { return b.totalScore - a.totalScore; });

  return candidates;
}

// --- ERASURE PARTICLES ---
// When a note dies (unchosen), it releases heat
function spawnErasure(x, y, cost, scores) {
  var count = Math.floor(3 + cost * 8);
  for (var i = 0; i < count; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 0.5 + Math.random() * 1.5;
    // color from the strongest lens
    var maxLens = 0;
    for (var s = 1; s < 7; s++) {
      if (scores[s] > scores[maxLens]) maxLens = s;
    }
    var col = lensColors[maxLens];
    erasureParticles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.008 + Math.random() * 0.012,
      r: col[0], g: col[1], b: col[2],
      size: 1 + Math.random() * 2
    });
  }
}

// --- LENS PULL LINES ---
// Show the seven dimensions pulling on each candidate
function drawLensPulls(candidate, phase) {
  if (phase < 0.2) return; // don't show pulls at very start
  var pullPhase = Math.min(1, (phase - 0.2) / 0.5);
  for (var s = 0; s < 7; s++) {
    var score = candidate.scores[s];
    if (score < 0.3) continue;
    var angle = (s / 7) * Math.PI * 2 - Math.PI / 2;
    var len = score * 35 * pullPhase;
    var ex = candidate.x + Math.cos(angle) * len;
    var ey = candidate.y + Math.sin(angle) * len;
    var col = lensColors[s];
    cx.beginPath();
    cx.moveTo(candidate.x, candidate.y);
    cx.lineTo(ex, ey);
    cx.strokeStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' +
      (score * 0.15 * pullPhase * candidate.alpha).toFixed(3) + ')';
    cx.lineWidth = 0.5 + score;
    cx.stroke();

    // tiny dot at end
    cx.beginPath();
    cx.arc(ex, ey, 1.5 * score, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' +
      (score * 0.25 * pullPhase * candidate.alpha).toFixed(3) + ')';
    cx.fill();
  }
}

// --- CHOSEN PATH (the melody trail) ---
function drawPath() {
  if (chosenPath.length < 2) return;
  cx.beginPath();
  cx.moveTo(chosenPath[0].x, chosenPath[0].y);
  for (var i = 1; i < chosenPath.length; i++) {
    cx.lineTo(chosenPath[i].x, chosenPath[i].y);
  }
  // fade from old to new
  var len = chosenPath.length;
  for (var i = 1; i < len; i++) {
    var age = (len - i) / len;
    var alpha = (1 - age) * 0.3;
    var p0 = chosenPath[i - 1];
    var p1 = chosenPath[i];
    cx.beginPath();
    cx.moveTo(p0.x, p0.y);
    cx.lineTo(p1.x, p1.y);

    // color by whether it was a surprise or safe choice
    var surprise = p1.surprise || 0;
    var r = Math.round(100 + surprise * 120);
    var g = Math.round(160 - surprise * 80);
    var b = Math.round(200 - surprise * 140);
    cx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(3) + ')';
    cx.lineWidth = 1 + (1 - age) * 1.5;
    cx.stroke();

    // node dot
    cx.beginPath();
    cx.arc(p1.x, p1.y, 2 + (1 - age) * 3, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (alpha * 1.5).toFixed(3) + ')';
    cx.fill();
  }
}

// --- MOTIF ECHOES ---
// When a motif recurs, draw its ghost
function drawMotifs() {
  for (var i = motifs.length - 1; i >= 0; i--) {
    var m = motifs[i];
    m.alpha -= 0.003;
    if (m.alpha <= 0) { motifs.splice(i, 1); continue; }

    // draw the interval pattern as a small constellation
    var intervals = m.intervals;
    var sx = m.x;
    var sy = m.y;
    var sc = m.scale * 20;

    cx.globalAlpha = m.alpha * 0.4;
    cx.beginPath();
    cx.moveTo(sx, sy);
    for (var j = 0; j < intervals.length; j++) {
      var nx = sx + (j + 1) * sc;
      var ny = sy - intervals[j] * sc * 0.3;
      cx.lineTo(nx, ny);
    }

    // hue shift shows transformation
    var hue = m.hueShift;
    var r = Math.round(184 + hue * 40);
    var g = Math.round(117 - hue * 60);
    var b = Math.round(58 + hue * 100);
    cx.strokeStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    cx.lineWidth = 1.5;
    cx.stroke();

    // glow at start
    cx.beginPath();
    cx.arc(sx, sy, 3, 0, Math.PI * 2);
    cx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    cx.fill();

    cx.globalAlpha = 1;
  }
}

// --- MOUSE / TOUCH ---
var hasInteracted = false;
function handleMove(x, y) {
  mouseX = x / W;
  mouseY = y / H;
  surpriseBias = 1 - mouseY; // top = surprise, bottom = safe
}

cv.addEventListener('mousemove', function(e) {
  handleMove(e.clientX, e.clientY);
});
cv.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  handleMove(t.clientX, t.clientY);
}, { passive: false });

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  ensureAudio();
}
cv.addEventListener('mousedown', startAudio);
cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  hasInteracted = true;
  startAudio();
}, { passive: false });
cv.addEventListener('click', startAudio);

// --- MAIN LOOP ---
var t = 0;
currentCandidates = generateCandidates();

function frame() {
  t++;
  chooseTimer++;
  phaseInChoice = Math.min(1, chooseTimer / chooseDuration);

  // Fade background
  cx.fillStyle = 'rgba(10,7,6,0.06)';
  cx.fillRect(0, 0, W, H);

  // --- Draw the chosen path ---
  drawPath();

  // --- Draw motif echoes ---
  drawMotifs();

  // --- Update and draw erasure particles ---
  for (var i = erasureParticles.length - 1; i >= 0; i--) {
    var p = erasureParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) { erasureParticles.splice(i, 1); continue; }
    cx.beginPath();
    cx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    cx.fillStyle = 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',' + (p.life * 0.35).toFixed(3) + ')';
    cx.fill();
  }

  // --- Animate candidates ---
  for (var i = 0; i < currentCandidates.length; i++) {
    var c = currentCandidates[i];

    if (c.dying) {
      c.deathTimer++;
      c.alpha = Math.max(0, 1 - c.deathTimer / 30);
      if (c.alpha <= 0) continue;
      // shrink
      cx.beginPath();
      cx.arc(c.x, c.y, c.radius * c.alpha, 0, Math.PI * 2);
      cx.fillStyle = 'rgba(184,117,58,' + (c.alpha * 0.1).toFixed(3) + ')';
      cx.fill();
      continue;
    }

    // ease toward target
    c.x += (c.targetX - c.x) * 0.06;
    c.y += (c.targetY - c.y) * 0.06;
    c.alpha = Math.min(1, c.alpha + 0.03);

    // breathing
    var breathe = 1 + Math.sin(t * 0.05 + i * 1.3) * 0.15;

    // the winner glows brighter as phase advances
    var isWinner = (i === 0);
    var winGlow = isWinner ? phaseInChoice : 0;

    // flicker for surprising candidates
    var flicker = 1;
    if (c.surprise > 0.5) {
      flicker = 0.7 + Math.sin(t * 0.3 + i * 7) * 0.3;
    }

    // Draw lens pull lines
    drawLensPulls(c, phaseInChoice);

    // Outer glow
    var glowR = c.radius * (2 + winGlow * 2) * breathe;
    var grad = cx.createRadialGradient(c.x, c.y, 0, c.x, c.y, glowR);
    var baseAlpha = (0.03 + winGlow * 0.08) * c.alpha * flicker;

    if (isWinner && phaseInChoice > 0.7) {
      // winner pulses gold
      grad.addColorStop(0, 'rgba(232,207,160,' + (baseAlpha * 2).toFixed(3) + ')');
      grad.addColorStop(0.5, 'rgba(184,117,58,' + (baseAlpha * 0.8).toFixed(3) + ')');
      grad.addColorStop(1, 'rgba(184,117,58,0)');
    } else {
      // scored color — blend of top two lenses
      var topLens = 0;
      for (var s = 1; s < 7; s++) {
        if (c.scores[s] > c.scores[topLens]) topLens = s;
      }
      var col = lensColors[topLens];
      grad.addColorStop(0, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (baseAlpha * 1.5).toFixed(3) + ')');
      grad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
    }
    cx.fillStyle = grad;
    cx.beginPath();
    cx.arc(c.x, c.y, glowR, 0, Math.PI * 2);
    cx.fill();

    // Core dot
    var coreAlpha = (0.3 + winGlow * 0.5) * c.alpha * flicker;
    cx.beginPath();
    cx.arc(c.x, c.y, c.radius * breathe * (0.3 + winGlow * 0.3), 0, Math.PI * 2);
    if (isWinner && phaseInChoice > 0.7) {
      cx.fillStyle = 'rgba(232,207,160,' + coreAlpha.toFixed(3) + ')';
    } else {
      cx.fillStyle = 'rgba(184,117,58,' + (coreAlpha * 0.6).toFixed(3) + ')';
    }
    cx.fill();

    // Competition lines between candidates (showing tension)
    if (i > 0 && phaseInChoice > 0.3 && phaseInChoice < 0.85) {
      var winner = currentCandidates[0];
      var tensionAlpha = Math.sin((phaseInChoice - 0.3) / 0.55 * Math.PI) * 0.06 * c.alpha;
      cx.beginPath();
      cx.moveTo(winner.x, winner.y);
      cx.lineTo(c.x, c.y);
      cx.strokeStyle = 'rgba(139,74,46,' + tensionAlpha.toFixed(3) + ')';
      cx.lineWidth = 0.5;
      cx.setLineDash([2, 4]);
      cx.stroke();
      cx.setLineDash([]);
    }
  }

  // --- CHOOSE ---
  if (chooseTimer >= chooseDuration) {
    chooseTimer = 0;
    totalChoices++;

    var winner = currentCandidates[0];
    if (winner) {
      // Record the choice
      history.push(winner.pitch);
      historyFreqs.push(winner.freq);

      // Play the note
      if (audioStarted && actx) {
        var vol = 0.3 + winner.totalScore * 0.5;
        var dur = 0.8 + winner.surprise * 1.5;
        playNote(winner.freq, dur, vol);

        // if motif completing, add a gentle harmonic
        if (winner.scores[5] > 0.8) {
          playNote(winner.freq * 1.5, dur * 0.6, vol * 0.15);
        }
      }

      // Add to visual path
      // Path flows left to right, wrapping
      var pathX;
      if (chosenPath.length === 0) {
        pathX = W * 0.08;
      } else {
        pathX = chosenPath[chosenPath.length - 1].x + W * 0.025;
        if (pathX > W * 0.92) pathX = W * 0.08; // wrap
      }
      var pathY = H * 0.5 - (winner.pitch / 24) * H * 0.35;

      chosenPath.push({
        x: pathX,
        y: pathY,
        pitch: winner.pitch,
        surprise: winner.surprise
      });

      // Keep path manageable
      if (chosenPath.length > 60) chosenPath.shift();

      // Kill unchosen candidates — spawn erasure heat
      for (var i = 1; i < currentCandidates.length; i++) {
        var c = currentCandidates[i];
        c.dying = true;
        spawnErasure(c.x, c.y, c.landauerCost, c.scores);
      }

      // Detect motifs
      detectMotif();

      // Vary the tempo slightly
      chooseDuration = 90 + Math.floor(Math.random() * 60);
      // faster during high tension
      var tensionPhase = Math.sin(totalChoices * 0.15);
      if (tensionPhase > 0.5) chooseDuration = Math.floor(chooseDuration * 0.7);
    }

    // Generate new candidates after a brief pause
    setTimeout(function() {
      currentCandidates = generateCandidates();
    }, 400);
  }

  // --- SURPRISE BIAS INDICATOR ---
  // A subtle vertical gradient on the right edge
  var biasGrad = cx.createLinearGradient(W - 3, 0, W - 3, H);
  biasGrad.addColorStop(0, 'rgba(160,60,180,' + (surpriseBias * 0.15).toFixed(3) + ')');
  biasGrad.addColorStop(0.5, 'rgba(184,117,58,0.02)');
  biasGrad.addColorStop(1, 'rgba(60,130,200,' + ((1 - surpriseBias) * 0.15).toFixed(3) + ')');
  cx.fillStyle = biasGrad;
  cx.fillRect(W - 2, 0, 2, H);

  // Current bias position — tiny dot
  cx.beginPath();
  cx.arc(W - 4, H * (1 - surpriseBias), 2, 0, Math.PI * 2);
  cx.fillStyle = 'rgba(184,117,58,0.2)';
  cx.fill();

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
