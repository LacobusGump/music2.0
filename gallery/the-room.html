<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>the room</title>
<meta name="description" content="Nothing happens. You were already here.">
<link rel="icon" href="/favicon.png">
<meta property="og:title" content="the room">
<meta property="og:description" content="Nothing happens. You were already here.">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{touch-action:none;background:#0d0907;overflow:hidden;cursor:default;
  -webkit-user-select:none;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 8s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.3);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<script>
// the room
//
// this piece does nothing.
//
// it doesn't react to your mouse.
// it doesn't reward your patience.
// it doesn't reveal a hidden message.
// it doesn't synchronize to your breath.
// it doesn't get brighter when you stay.
//
// it's just a room.
//
// the room has air. air has temperature.
// temperature has micro-fluctuations.
// those fluctuations follow 1/f statistics.
// you can't see them. but you're in them.
//
// over a very long time — minutes, not seconds —
// the room shifts. barely.
// the way a real room shifts when you sit in it long enough
// that your pupils dilate and the corners get softer
// and the silence stops being empty and starts being full.
//
// there is no interaction.
// there is no reward.
// the room was here before you opened it.
// it will be here after you leave.
//
// the only thing that changes is you.
// you walked in tense. if you stay,
// you'll leave slower than you arrived.
//
// that's not the piece doing something.
// that's what rooms do.

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// ═══ 1/f NOISE — the room's temperature ═══
// Voss-McCartney pink noise. Same as the instrument.
// Not random. Not smooth. The texture of real fluctuation.
var pk = {b0:0,b1:0,b2:0,b3:0,b4:0,b5:0,b6:0};
function pink() {
  var w = Math.random() * 2 - 1;
  pk.b0 = 0.99886 * pk.b0 + w * 0.0555179;
  pk.b1 = 0.99332 * pk.b1 + w * 0.0750759;
  pk.b2 = 0.96900 * pk.b2 + w * 0.1538520;
  pk.b3 = 0.86650 * pk.b3 + w * 0.3104856;
  pk.b4 = 0.55000 * pk.b4 + w * 0.5329522;
  pk.b5 = -0.7616 * pk.b5 - w * 0.0168980;
  var out = (pk.b0 + pk.b1 + pk.b2 + pk.b3 +
             pk.b4 + pk.b5 + pk.b6 + w * 0.5362) * 0.11;
  pk.b6 = w * 0.115926;
  return out;
}

// ═══ ULTRA-SLOW DRIFT CHANNELS ═══
// Three independent 1/f streams, each smoothed differently.
// These are the "air" in the room.
var drift = [0, 0, 0];
var driftSmooth = [0.997, 0.9985, 0.999]; // slower = larger-scale
var driftScale = [0.003, 0.0015, 0.001];

// ═══ BASE COLOR — barely not black ═══
// The room starts at #0d0907. Over ~10 minutes, the
// 1/f drift moves it through a space so small you won't
// notice unless you were here 10 minutes ago and looked away.
// The range is about 3 RGB values. Total. In each channel.
var baseR = 13, baseG = 9, baseB = 7;

// ═══ GRAIN — the room has texture ═══
// Not procedural noise. Actual per-pixel grain, but sparse
// and slow enough that it feels like dust in peripheral vision.
var grainCanvas = document.createElement('canvas');
var grainSize = 128;
grainCanvas.width = grainSize;
grainCanvas.height = grainSize;
var grainCtx = grainCanvas.getContext('2d');
var grainData = grainCtx.createImageData(grainSize, grainSize);

function regenerateGrain() {
  var d = grainData.data;
  for (var i = 0; i < d.length; i += 4) {
    // Very sparse: most pixels are transparent
    if (Math.random() > 0.03) {
      d[i] = d[i+1] = d[i+2] = 0;
      d[i+3] = 0;
    } else {
      var v = Math.random() > 0.5 ? 1 : -1;
      d[i]   = baseR + v * 3;
      d[i+1] = baseG + v * 2;
      d[i+2] = baseB + v * 2;
      d[i+3] = Math.floor(Math.random() * 8 + 2); // barely visible
    }
  }
  grainCtx.putImageData(grainData, 0, 0);
}

// ═══ TIME — the room breathes on a different clock ═══
// One full breath cycle: about 47 seconds.
// Why 47? It's prime. It won't sync with anything you're doing.
// You can't entrain to it. It's the room's rhythm, not yours.
var BREATH_PERIOD = 47;
var t = 0;
var frameCount = 0;

// ═══ CORNERS — a room has geometry ═══
// Very faint vignette. Not dramatic. Just: the corners are darker
// because that's where light doesn't reach.
// The vignette radius drifts with 1/f. Because real light sources
// flicker. Imperceptibly. But they do.
var vignetteR = 0;

// ═══ THE BACK BUTTON ═══
// Invisible for the first 30 seconds.
// Because if you need to leave, you need to stay long enough
// to forget you wanted to.
var backEl = document.getElementById('back');
var elapsed = 0;
var backShown = false;

// ═══ DRAW ═══
function draw() {
  var dt = 1/60;
  t += dt;
  elapsed += dt;
  frameCount++;

  // Update drifts (1/f channels)
  for (var i = 0; i < 3; i++) {
    drift[i] = drift[i] * driftSmooth[i] + pink() * driftScale[i];
  }

  // The room's color. Changes over minutes.
  // The total range of each channel: about +/- 2 from base.
  // You will not see this change. But if you screenshot now
  // and screenshot in 5 minutes, the hex codes will differ.
  var r = baseR + drift[0] * 2.5;
  var g = baseG + drift[1] * 2.0;
  var b = baseB + drift[2] * 1.5;

  // Room breath — sinusoidal at the prime period
  // Amplitude: about 0.4 of a single RGB value.
  // This is below conscious perception for most people.
  var breath = Math.sin(t * 2 * Math.PI / BREATH_PERIOD);
  r += breath * 0.4;
  g += breath * 0.25;
  b += breath * 0.15;

  // Clamp
  r = Math.max(5, Math.min(20, r));
  g = Math.max(3, Math.min(15, g));
  b = Math.max(2, Math.min(12, b));

  // Fill the room
  cx.fillStyle = 'rgb(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ')';
  cx.fillRect(0, 0, W, H);

  // Vignette — the room has corners
  vignetteR += (drift[0] * 0.5 - vignetteR) * 0.001;
  var maxDim = Math.max(W, H);
  var vigR = maxDim * (0.55 + vignetteR * 0.05);
  var grad = cx.createRadialGradient(W/2, H/2, vigR * 0.3, W/2, H/2, vigR);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(0.6, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,' + (0.15 + Math.abs(drift[1]) * 0.05).toFixed(4) + ')');
  cx.fillStyle = grad;
  cx.fillRect(0, 0, W, H);

  // Grain — regenerate slowly (every ~2 seconds)
  if (frameCount % 120 === 0) {
    regenerateGrain();
  }

  // Tile the grain across the canvas, but offset by drift
  // so it doesn't look like a repeating pattern
  if (grainData) {
    var ox = Math.floor(drift[0] * 50) % grainSize;
    var oy = Math.floor(drift[1] * 50) % grainSize;
    cx.globalAlpha = 0.3;
    for (var gy = -grainSize + oy; gy < H + grainSize; gy += grainSize) {
      for (var gx = -grainSize + ox; gx < W + grainSize; gx += grainSize) {
        cx.drawImage(grainCanvas, gx, gy);
      }
    }
    cx.globalAlpha = 1;
  }

  // ═══ THE THING THAT ISN'T THERE ═══
  // After 3 minutes, one pixel — just one — in the center of the
  // screen starts breathing. It's the same color as the room
  // plus about 2 values of brightness. If you're looking for it,
  // you might see it. If you're not, you won't.
  //
  // It's not a reward. It's not a reveal.
  // It's the room noticing it hasn't been alone for a while.
  // It doesn't know if you noticed. It doesn't care.
  if (elapsed > 180) {
    var age = (elapsed - 180) / 60; // minutes since appearance
    var fade = Math.min(1, age / 2); // takes 2 minutes to fully arrive
    var pulse = Math.sin(t * 2 * Math.PI / 31) * 0.5 + 0.5; // 31-second cycle
    var brightness = fade * (1.5 + pulse * 1.5);
    var pr = Math.round(r + brightness);
    var pg = Math.round(g + brightness * 0.7);
    var pb = Math.round(b + brightness * 0.5);
    cx.fillStyle = 'rgb(' + pr + ',' + pg + ',' + pb + ')';
    cx.fillRect(Math.floor(W/2), Math.floor(H/2), 1, 1);
  }

  // Show back button after 30 seconds
  if (!backShown && elapsed > 30) {
    backEl.style.color = 'rgba(139,74,46,0.08)';
    backShown = true;
  }

  requestAnimationFrame(draw);
}

// Start
regenerateGrain();
draw();

</script>
</body>
</html>
