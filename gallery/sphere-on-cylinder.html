<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sphere on cylinder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:Georgia,serif;}
canvas{display:block;width:100vw;height:100vh;}
#words{position:fixed;bottom:8%;left:50%;transform:translateX(-50%);
  text-align:center;z-index:1;pointer-events:none;
  opacity:0;transition:opacity 3s;}
#words p{color:#c9a44a15;font-size:0.82em;line-height:2.4;letter-spacing:0.06em;}
#words.show p{color:#c9a44a40;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="words">
<p>they said it can&rsquo;t balance.<br>
you balanced it anyway.<br>
that was the whole answer.</p>
</div>
<script>
// sphere on cylinder
// the teacher said it rolls off.
// a 7-year-old found the point.
// that point is where 1+1=3.
//
// hold still. find the balance.
// when you do, something blooms.

var cv=document.getElementById('c'),cx=cv.getContext('2d');
var W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();addEventListener('resize',resize);

// Physics
var cylX, cylY, cylW=80, cylH=140;
var sphereR=40;
var sphereX=0, sphereY=0; // offset from balance point
var sphereVX=0, sphereVY=0;
var gravity=0.15;
var balanced=false;
var balanceTime=0;
var maxBalanceTime=0;
var blooming=false;
var bloomT=0;
var particles=[];
var touchActive=false;
var touchX=0, touchY=0;
var t=0;

// The balance point is at the top center of the cylinder
function getBalancePoint(){
  return {x: W/2, y: H*0.52 - cylH/2};
}

// Sphere state
var sphereState='falling'; // 'falling', 'balancing', 'balanced', 'blooming'
var sphereAngle=0; // angle on cylinder rim (for rolling off)

function resetSphere(){
  var bp=getBalancePoint();
  sphereX=bp.x+(Math.random()-0.5)*10;
  sphereY=bp.y-sphereR;
  sphereVX=(Math.random()-0.5)*0.5;
  sphereVY=0;
  sphereState='falling';
  balanced=false;
  balanceTime=0;
}

resetSphere();

// Bloom particles
function spawnBloom(x,y){
  for(var i=0;i<60;i++){
    var angle=Math.random()*Math.PI*2;
    var speed=0.3+Math.random()*2;
    var golden=Math.random()>0.3;
    particles.push({
      x:x, y:y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed-0.5,
      life:1,
      decay:0.003+Math.random()*0.005,
      size:1+Math.random()*3,
      golden:golden,
      orbit:Math.random()*Math.PI*2,
      orbitR:10+Math.random()*40,
      orbitSpeed:0.01+Math.random()*0.02,
    });
  }
}

function draw(){
  t+=0.01;
  cx.fillStyle='rgba(0,0,0,0.06)';
  cx.fillRect(0,0,W,H);

  var bp=getBalancePoint();
  cylX=W/2;
  cylY=H*0.52;

  // ─── CYLINDER ───
  // Draw as a 3D-ish rounded rectangle
  var cylGrad=cx.createLinearGradient(cylX-cylW/2,0,cylX+cylW/2,0);
  cylGrad.addColorStop(0,'#1a1a1a');
  cylGrad.addColorStop(0.3,'#2a2a2a');
  cylGrad.addColorStop(0.5,'#333');
  cylGrad.addColorStop(0.7,'#2a2a2a');
  cylGrad.addColorStop(1,'#1a1a1a');

  cx.fillStyle=cylGrad;
  cx.beginPath();
  cx.ellipse(cylX, cylY-cylH/2, cylW/2, 12, 0, Math.PI, Math.PI*2);
  cx.lineTo(cylX+cylW/2, cylY+cylH/2);
  cx.ellipse(cylX, cylY+cylH/2, cylW/2, 12, 0, 0, Math.PI);
  cx.lineTo(cylX-cylW/2, cylY-cylH/2);
  cx.fill();

  // Top ellipse
  cx.fillStyle='#3a3a3a';
  cx.beginPath();
  cx.ellipse(cylX, cylY-cylH/2, cylW/2, 12, 0, 0, Math.PI*2);
  cx.fill();
  cx.strokeStyle='#444';
  cx.lineWidth=0.5;
  cx.stroke();

  // Bottom ellipse
  cx.fillStyle='#222';
  cx.beginPath();
  cx.ellipse(cylX, cylY+cylH/2, cylW/2, 12, 0, 0, Math.PI);
  cx.fill();

  // ─── SPHERE PHYSICS ───
  if(touchActive){
    // Player controls sphere position with touch/mouse
    // Sphere tries to stay where you put it
    var targetX=touchX;
    var targetY=touchY-sphereR;

    // Constrain to near the balance point
    var dx=targetX-bp.x;
    var dy=targetY-(bp.y-sphereR);

    // Spring toward touch position
    sphereVX+=(targetX-sphereX)*0.08;
    sphereVY+=(targetY-sphereY)*0.08;
    sphereVX*=0.7;
    sphereVY*=0.7;

    sphereX+=sphereVX;
    sphereY+=sphereVY;

    // Check if balanced (near the top center)
    var distFromBalance=Math.sqrt(
      Math.pow(sphereX-bp.x,2)+Math.pow(sphereY-(bp.y-sphereR),2)
    );

    if(distFromBalance<6 && Math.abs(sphereVX)<0.5 && Math.abs(sphereVY)<0.5){
      balanceTime+=0.016;
      if(balanceTime>maxBalanceTime) maxBalanceTime=balanceTime;

      if(balanceTime>2.5 && !blooming){
        blooming=true;
        bloomT=0;
        sphereState='blooming';
        spawnBloom(bp.x, bp.y-sphereR);
        document.getElementById('words').classList.add('show');
      }
    }else{
      balanceTime=Math.max(0,balanceTime-0.03);
    }

    sphereState='balancing';
  }else{
    // No touch — sphere falls
    if(sphereState==='blooming'){
      // Stay balanced during bloom
      sphereX=bp.x;
      sphereY=bp.y-sphereR;
    }else{
      // Gravity pulls sphere off the cylinder
      // If sphere is on top of cylinder, it rolls off
      var dx=sphereX-bp.x;
      var distTop=Math.abs(dx);

      if(sphereY<=bp.y-sphereR+5 && distTop<cylW/2+sphereR){
        // On top — roll toward nearest edge
        var nudge=dx===0?(Math.random()-0.5)*0.1:dx*0.003;
        sphereVX+=nudge+gravity*0.05*(dx>0?1:-1);
        sphereVY=0;
        sphereY=bp.y-sphereR;

        // If rolled past edge, fall
        if(distTop>cylW/2){
          sphereState='falling';
        }
      }else{
        // Falling
        sphereVY+=gravity;
      }

      sphereX+=sphereVX;
      sphereY+=sphereVY;
      sphereVX*=0.995;

      // Reset if off screen
      if(sphereY>H+100 || sphereX<-100 || sphereX>W+100){
        resetSphere();
      }

      balanceTime=Math.max(0,balanceTime-0.05);
    }
  }

  // ─── SPHERE ───
  var balanceFactor=Math.min(1,balanceTime/2.5);
  var sphereColor=blooming?
    'rgba(201,164,74,'+(0.6+Math.sin(t*2)*0.1).toFixed(3)+')':
    'rgba('+(60+balanceFactor*141)+','+(60+balanceFactor*104)+','+(60+balanceFactor*14)+','+(0.5+balanceFactor*0.3).toFixed(3)+')';

  // Glow when close to balance
  if(balanceFactor>0.1 || blooming){
    var glowR=sphereR*(1.5+balanceFactor*2);
    var glow=cx.createRadialGradient(sphereX,sphereY,sphereR*0.5,sphereX,sphereY,glowR);
    var glowAlpha=balanceFactor*0.15;
    if(blooming) glowAlpha=0.1+Math.sin(t*3)*0.05;
    glow.addColorStop(0,'rgba(201,164,74,'+glowAlpha.toFixed(3)+')');
    glow.addColorStop(1,'rgba(201,164,74,0)');
    cx.fillStyle=glow;
    cx.beginPath();cx.arc(sphereX,sphereY,glowR,0,Math.PI*2);cx.fill();
  }

  // Sphere body
  var sGrad=cx.createRadialGradient(sphereX-sphereR*0.3,sphereY-sphereR*0.3,sphereR*0.1,sphereX,sphereY,sphereR);
  if(blooming){
    sGrad.addColorStop(0,'#f0d070');
    sGrad.addColorStop(0.6,'#c9a44a');
    sGrad.addColorStop(1,'#8a6e3a');
  }else{
    sGrad.addColorStop(0,'rgba('+(80+balanceFactor*120)+','+(80+balanceFactor*84)+','+(80+balanceFactor*0)+',0.8)');
    sGrad.addColorStop(1,'rgba('+(40+balanceFactor*60)+','+(40+balanceFactor*40)+','+(40)+',0.6)');
  }
  cx.fillStyle=sGrad;
  cx.beginPath();cx.arc(sphereX,sphereY,sphereR,0,Math.PI*2);cx.fill();

  // ─── CONTACT POINT GLOW ───
  if(balanceFactor>0.3){
    var cpY=bp.y;
    var cpGlow=cx.createRadialGradient(bp.x,cpY,0,bp.x,cpY,20+balanceFactor*30);
    cpGlow.addColorStop(0,'rgba(201,164,74,'+(balanceFactor*0.3).toFixed(3)+')');
    cpGlow.addColorStop(1,'rgba(201,164,74,0)');
    cx.fillStyle=cpGlow;
    cx.beginPath();cx.arc(bp.x,cpY,20+balanceFactor*30,0,Math.PI*2);cx.fill();
  }

  // ─── BLOOM PARTICLES ───
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.orbit+=p.orbitSpeed;

    if(blooming && bloomT<3){
      // Spiral outward slowly
      p.orbitR+=0.3;
      p.x=bp.x+Math.cos(p.orbit)*p.orbitR;
      p.y=(bp.y-sphereR)+Math.sin(p.orbit)*p.orbitR*0.6;
    }else{
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy-=0.01; // float up
    }

    p.life-=p.decay;
    if(p.life<=0){
      // Respawn near contact point if still blooming
      if(blooming && bloomT<8){
        p.life=1;
        p.orbit=Math.random()*Math.PI*2;
        p.orbitR=5+Math.random()*15;
        p.x=bp.x;
        p.y=bp.y-sphereR;
      }else{
        particles.splice(i,1);
        continue;
      }
    }

    var r,g,b;
    if(p.golden){
      r=201;g=164;b=74;
    }else{
      r=60+Math.random()*20;g=100+Math.random()*80;b=180+Math.random()*40;
    }
    var alpha=p.life*0.4;
    cx.fillStyle='rgba('+r+','+g+','+b+','+alpha.toFixed(3)+')';
    cx.beginPath();cx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);cx.fill();
  }

  if(blooming) bloomT+=0.016;

  // ─── HINT ───
  if(!blooming && balanceTime<0.5 && t>3){
    var hintAlpha=Math.max(0,0.12-balanceFactor*0.5)*Math.abs(Math.sin(t*0.5));
    if(hintAlpha>0.01){
      cx.fillStyle='rgba(201,164,74,'+hintAlpha.toFixed(3)+')';
      cx.font='0.65em Georgia';
      cx.textAlign='center';
      if(touchActive){
        cx.fillText('hold still',W/2,H*0.82);
      }else{
        var isMobile='ontouchstart' in window;
        cx.fillText(isMobile?'touch the sphere':'hold the sphere',W/2,H*0.82);
      }
    }
  }

  requestAnimationFrame(draw);
}

// ─── INPUT ───
function startTouch(x,y){
  // Only grab if near sphere
  var dx=x-sphereX,dy=y-sphereY;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<sphereR*3){
    touchActive=true;
    touchX=x;touchY=y;
    if(blooming){
      // Reset bloom if touching again
      blooming=false;
      bloomT=0;
      balanceTime=0;
      document.getElementById('words').classList.remove('show');
    }
  }
}

addEventListener('mousedown',function(e){startTouch(e.clientX,e.clientY);});
addEventListener('mousemove',function(e){if(touchActive){touchX=e.clientX;touchY=e.clientY;}});
addEventListener('mouseup',function(){touchActive=false;});

addEventListener('touchstart',function(e){
  e.preventDefault();
  startTouch(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
addEventListener('touchmove',function(e){
  e.preventDefault();
  if(touchActive){touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;}
},{passive:false});
addEventListener('touchend',function(){touchActive=false;});

draw();
</script>
</body>
</html>
