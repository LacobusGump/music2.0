<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="/favicon.png">
<title>nothing asked, nothing proved</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#0a0705;overflow:hidden;touch-action:manipulation}canvas{display:block;width:100vw;height:100vh}#back{position:fixed;top:20px;left:24px;z-index:10;font:12px Georgia,serif;letter-spacing:.08em;color:rgba(139,74,46,.2);text-decoration:none}#back:hover{color:rgba(232,207,160,.5)}#caption{position:fixed;left:0;right:0;bottom:30px;text-align:center;z-index:8;font:12px Georgia,serif;letter-spacing:.13em;line-height:1.9;color:rgba(232,207,160,.14);pointer-events:none;transition:color 2.4s}
.grain{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:.03;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas>
<div class="grain"></div>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="caption">nothing was asked. nothing needed proving.</div>
<script>
(function(){
'use strict';
var cv=document.getElementById('c'),cx=cv.getContext('2d'),cap=document.getElementById('caption');
var W=0,H=0,dpr=1,t=0,TAU=Math.PI*2,motes=[],touched=0;
var CAPTIONS=['nothing was asked. nothing needed proving.','it just stayed.','the warmth doesn’t need a reason.'];

function rgba(r,g,b,a){return 'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a)).toFixed(4)+')'}

function seed(){
  motes=[];
  var n=5; // barely there — a ghost of a soul, not a scene
  for(var i=0;i<n;i++){
    motes.push({
      x:W*0.5+(Math.random()-0.5)*W*0.3,
      y:H*0.5+(Math.random()-0.5)*H*0.25,
      p:Math.random()*TAU,
      sp:0.03+Math.random()*0.03,
      r:1+Math.random()*1.4,
      a:0.02+Math.random()*0.025
    });
  }
}
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);seed()}

// a touch doesn't demand anything back — it just warms, gently, and settles
addEventListener('pointerdown',function(){touched=1;},{passive:true});

function draw(){
  t+=0.016;
  touched*=0.996;
  cx.fillStyle='rgba(10,7,5,0.04)'; cx.fillRect(0,0,W,H); // near-permanent — this scene barely ever clears
  cx.globalCompositeOperation='lighter';

  var cxp=W/2, cyp=H*0.54;
  var breathe=0.5+0.5*Math.sin(t*0.18); // slow as sleep, not as a pulse
  var baseR=Math.min(W,H)*(0.09+breathe*0.012+touched*0.01);

  // the presence itself — a single warm, low, breathing glow. nothing more.
  var g=cx.createRadialGradient(cxp,cyp,0,cxp,cyp,baseR*3.4);
  g.addColorStop(0, rgba(232,190,140, 0.035+breathe*0.012+touched*0.02));
  g.addColorStop(0.5, rgba(184,117,58, 0.014+breathe*0.006));
  g.addColorStop(1, rgba(184,117,58,0));
  cx.fillStyle=g; cx.beginPath(); cx.arc(cxp,cyp,baseR*3.4,0,TAU); cx.fill();

  cx.fillStyle=rgba(232,207,160,0.05+touched*0.03);
  cx.beginPath(); cx.arc(cxp,cyp,baseR*0.22,0,TAU); cx.fill();

  // a few motes drifting near it — dust in warm light, not a light show
  for(var i=0;i<motes.length;i++){
    var m=motes[i];
    m.p+=m.sp*0.016;
    var mx=cxp+Math.cos(m.p)*W*0.09, my=cyp+Math.sin(m.p*0.7)*H*0.07;
    cx.fillStyle=rgba(220,190,150,m.a*(0.6+0.4*Math.sin(t*0.3+i)));
    cx.beginPath(); cx.arc(mx,my,m.r,0,TAU); cx.fill();
  }

  cx.globalCompositeOperation='source-over';
  var ci=Math.floor(t/40)%CAPTIONS.length;
  cap.textContent=CAPTIONS[ci];

  requestAnimationFrame(draw);
}
resize(); addEventListener('resize',resize,{passive:true}); draw();
})();
</script>
</body>
</html>
