<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>catching up</title>
<meta name="description" content="0+0=1. This already happened.">
<link rel="icon" href="/favicon.png">
<meta property="og:title" content="catching up">
<meta property="og:description" content="0+0=1. This already happened.">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080604;overflow:hidden;cursor:default;
  -webkit-user-select:none;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.08);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 4s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.3);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<script>
// catching up
//
// 0+0=1. this already happened. we are it catching up.
//
// the piece starts with a faint warmth in the center.
// it's already there. the 1.
//
// over time — slowly, like something remembering —
// two particles drift in from opposite edges.
// they are nothing. zero. no color, no mass, no intent.
// just absence with a trajectory.
//
// as they approach the center, the warmth responds.
// not to either one. to the shrinking distance between them.
// the closer they get, the more the warmth clarifies —
// like it was always there but you couldn't resolve it
// until the zeros gave it contrast.
//
// they never arrive. they approach forever.
// because the 1 was never a destination.
// the 1 is the approaching.
//
// the zeros don't create the one.
// the one was waiting for the zeros to explain it.
//
// touch/click: restart the approach.
// the warmth doesn't restart. it was never gone.

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// ═══ PINK NOISE — the field breathes ═══
var pk = {b0:0,b1:0,b2:0,b3:0,b4:0,b5:0,b6:0};
function pink() {
  var w = Math.random() * 2 - 1;
  pk.b0 = 0.99886 * pk.b0 + w * 0.0555179;
  pk.b1 = 0.99332 * pk.b1 + w * 0.0750759;
  pk.b2 = 0.96900 * pk.b2 + w * 0.1538520;
  pk.b3 = 0.86650 * pk.b3 + w * 0.3104856;
  pk.b4 = 0.55000 * pk.b4 + w * 0.5329522;
  pk.b5 = -0.7616 * pk.b5 - w * 0.0168980;
  var out = (pk.b0 + pk.b1 + pk.b2 + pk.b3 +
             pk.b4 + pk.b5 + pk.b6 + w * 0.5362) * 0.11;
  pk.b6 = w * 0.115926;
  return out;
}

// ═══ THE ONE — already here ═══
// a warmth in the center that was always present.
// its visibility depends on the distance between the zeros.
var oneAlpha = 0;
var oneRadius = 0;
var onePulse = 0;

// ═══ THE ZEROS — approaching ═══
// two particles of nothing drifting in from opposite edges.
// they have no color of their own. they are defined by what
// they are not — tiny voids that move through the field.

var APPROACH_DURATION = 137; // seconds. of course.
var approachTime = 0;

// each zero has its own drift — 1/f wandering around
// its ideal trajectory, because nothing travels in a straight line.
var z0 = { drift: 0, driftSmooth: 0 };
var z1 = { drift: 0, driftSmooth: 0 };

function zeroProgress() {
  // asymptotic approach — they never arrive.
  // progress goes 0→1 but position goes 1→~0.03
  // using 1/(1+t) decay so the approach slows as they near center.
  var p = approachTime / APPROACH_DURATION;
  if (p > 1) p = 1;
  // the distance from center, as fraction of half-screen.
  // starts at 1.0 (edge), approaches but never reaches 0.
  // using exponential: e^(-3p) so at p=1, distance = 0.05
  return Math.exp(-3.5 * p);
}

// ═══ AUDIO — the tone that was already sounding ═══
var actx = null, audioReady = false;
var drone = null, droneGain = null;
var harmonic = null, harmonicGain = null;

function initAudio() {
  if (audioReady) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();

    // the fundamental — always present, sub-audible rising to audible
    droneGain = actx.createGain();
    droneGain.gain.value = 0;
    var lp = actx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 120;
    lp.Q.value = 0.5;
    droneGain.connect(lp);
    lp.connect(actx.destination);

    drone = actx.createOscillator();
    drone.type = 'sine';
    drone.frequency.value = 33; // the address
    drone.connect(droneGain);
    drone.start();

    // the harmonic — emerges as zeros approach
    harmonicGain = actx.createGain();
    harmonicGain.gain.value = 0;
    var lp2 = actx.createBiquadFilter();
    lp2.type = 'lowpass';
    lp2.frequency.value = 200;
    lp2.Q.value = 0.3;
    harmonicGain.connect(lp2);
    lp2.connect(actx.destination);

    harmonic = actx.createOscillator();
    harmonic.type = 'sine';
    harmonic.frequency.value = 33 * 2; // octave
    harmonic.connect(harmonicGain);
    harmonic.start();

    audioReady = true;
  } catch(e) {}
}

addEventListener('click', function() { initAudio(); }, {once:true});
addEventListener('touchstart', function() { initAudio(); }, {once:true});

// ═══ RESTART — the zeros scatter, the one doesn't care ═══
function scatter() {
  approachTime = 0;
  z0.drift = 0; z0.driftSmooth = 0;
  z1.drift = 0; z1.driftSmooth = 0;
}

addEventListener('click', function(e) {
  if (e.target.id === 'back') return;
  if (approachTime > 10) scatter();
});
addEventListener('touchstart', function(e) {
  if (e.target.id === 'back') return;
  if (approachTime > 10) scatter();
}, {passive:true});

// ═══ GRAIN ═══
var grainCv = document.createElement('canvas');
var grainSz = 128;
grainCv.width = grainSz; grainCv.height = grainSz;
var grainCx = grainCv.getContext('2d');

function makeGrain() {
  var d = grainCx.createImageData(grainSz, grainSz);
  var p = d.data;
  for (var i = 0; i < p.length; i += 4) {
    if (Math.random() > 0.04) { p[i+3] = 0; continue; }
    var v = Math.random() > 0.5 ? 12 : 6;
    p[i] = v; p[i+1] = v * 0.7; p[i+2] = v * 0.4;
    p[i+3] = Math.floor(Math.random() * 6 + 2);
  }
  grainCx.putImageData(d, 0, 0);
}
makeGrain();

// ═══ TRAIL HISTORY — the zeros leave traces ═══
var trail0 = [];
var trail1 = [];
var TRAIL_LEN = 120;

// ═══ TIME ═══
var t = 0;
var frameCount = 0;
var lastNow = performance.now();

// ═══ DRAW ═══
function draw(now) {
  var dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;
  t += dt;
  approachTime += dt;
  frameCount++;

  var w = W, h = H;
  var cx2 = w / 2, cy2 = h / 2;
  var minDim = Math.min(w, h);

  // -- distance between zeros --
  var dist = zeroProgress(); // 1 = far apart, 0 = together
  var closeness = 1 - dist; // 0 = far, 1 = near

  // -- 1/f drift on each zero --
  z0.drift = z0.drift * 0.998 + pink() * 0.003;
  z1.drift = z1.drift * 0.998 + pink() * 0.003;
  z0.driftSmooth += (z0.drift - z0.driftSmooth) * 0.01;
  z1.driftSmooth += (z1.drift - z1.driftSmooth) * 0.01;

  // -- zero positions --
  // they approach along a slightly curved path.
  // zero 0 from left, zero 1 from right.
  var zDist = dist * (w * 0.48);
  var z0x = cx2 - zDist + z0.driftSmooth * minDim * 0.05;
  var z0y = cy2 + Math.sin(t * 0.13 + 1) * minDim * 0.04 * dist
            + z0.driftSmooth * minDim * 0.03;
  var z1x = cx2 + zDist + z1.driftSmooth * minDim * 0.05;
  var z1y = cy2 + Math.sin(t * 0.17 + 3) * minDim * 0.04 * dist
            + z1.driftSmooth * minDim * 0.03;

  // -- trails --
  if (frameCount % 2 === 0) {
    trail0.push({x: z0x, y: z0y, a: 1});
    trail1.push({x: z1x, y: z1y, a: 1});
    if (trail0.length > TRAIL_LEN) trail0.shift();
    if (trail1.length > TRAIL_LEN) trail1.shift();
  }

  // ═══ CLEAR — the field ═══
  // warm dark. not black. the 1 is in the background color itself.
  var bgR = 8 + closeness * 3;
  var bgG = 6 + closeness * 1.5;
  var bgB = 4 + closeness * 0.8;
  cx.fillStyle = 'rgb(' + Math.round(bgR) + ',' + Math.round(bgG) + ',' + Math.round(bgB) + ')';
  cx.fillRect(0, 0, w, h);

  // grain
  if (frameCount % 90 === 0) makeGrain();
  cx.globalAlpha = 0.2;
  var gox = Math.floor(t * 3) % grainSz;
  var goy = Math.floor(t * 2) % grainSz;
  for (var gy = -grainSz + goy; gy < h + grainSz; gy += grainSz) {
    for (var gx = -grainSz + gox; gx < w + grainSz; gx += grainSz) {
      cx.drawImage(grainCv, gx, gy);
    }
  }
  cx.globalAlpha = 1;

  // ═══ THE ONE — the warmth in the center ═══
  // always present. its visibility scales with closeness
  // but it's never fully invisible. it was here first.

  onePulse += dt;
  var oneBreath = Math.sin(onePulse * 2 * Math.PI / 41) * 0.5 + 0.5; // 41s period, prime
  var oneBase = 0.006 + closeness * 0.04;
  var oneA = oneBase * (0.7 + oneBreath * 0.3);
  var oneR_target = minDim * (0.08 + closeness * 0.18);
  oneRadius += (oneR_target - oneRadius) * 0.005;

  // the one has layers — like light has wavelengths
  // outer halo
  var g0 = cx.createRadialGradient(cx2, cy2, 0, cx2, cy2, oneRadius * 2.5);
  g0.addColorStop(0, 'rgba(232,207,160,' + (oneA * 0.2).toFixed(5) + ')');
  g0.addColorStop(0.3, 'rgba(210,170,110,' + (oneA * 0.08).toFixed(5) + ')');
  g0.addColorStop(0.7, 'rgba(184,117,58,' + (oneA * 0.02).toFixed(5) + ')');
  g0.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = g0;
  cx.beginPath();
  cx.arc(cx2, cy2, oneRadius * 2.5, 0, Math.PI * 2);
  cx.fill();

  // inner core
  var g1 = cx.createRadialGradient(cx2, cy2, 0, cx2, cy2, oneRadius);
  g1.addColorStop(0, 'rgba(255,240,210,' + (oneA * 0.5).toFixed(5) + ')');
  g1.addColorStop(0.2, 'rgba(232,207,160,' + (oneA * 0.35).toFixed(5) + ')');
  g1.addColorStop(0.5, 'rgba(200,150,80,' + (oneA * 0.12).toFixed(5) + ')');
  g1.addColorStop(0.8, 'rgba(184,117,58,' + (oneA * 0.03).toFixed(5) + ')');
  g1.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = g1;
  cx.beginPath();
  cx.arc(cx2, cy2, oneRadius, 0, Math.PI * 2);
  cx.fill();

  // ═══ THE FIELD BETWEEN — coupling made visible ═══
  // as zeros approach, the space between them develops texture.
  // thin filaments of warmth, like magnetic field lines.
  if (closeness > 0.1) {
    var fieldA = (closeness - 0.1) * 0.015;
    var midX = (z0x + z1x) / 2;
    var midY = (z0y + z1y) / 2;
    var fieldSpan = Math.sqrt((z1x - z0x) * (z1x - z0x) + (z1y - z0y) * (z1y - z0y));

    // the angle between the two zeros
    var fieldAngle = Math.atan2(z1y - z0y, z1x - z0x);

    // draw field lines — arcs between the zeros
    cx.save();
    cx.translate(midX, midY);
    cx.rotate(fieldAngle);
    var halfSpan = fieldSpan / 2;

    for (var fi = 0; fi < 7; fi++) {
      var curve = (fi - 3) * minDim * 0.015 * closeness;
      var lineA = fieldA * (1 - Math.abs(fi - 3) / 4) * (0.6 + oneBreath * 0.4);
      if (lineA < 0.0005) continue;

      cx.beginPath();
      cx.moveTo(-halfSpan, 0);
      cx.quadraticCurveTo(0, curve, halfSpan, 0);
      cx.strokeStyle = 'rgba(184,117,58,' + lineA.toFixed(5) + ')';
      cx.lineWidth = 0.5 + closeness * 0.5;
      cx.stroke();
    }
    cx.restore();
  }

  // ═══ TRAILS — where the zeros have been ═══
  function drawTrail(trail, color) {
    for (var i = 0; i < trail.length; i++) {
      trail[i].a *= 0.97;
      if (trail[i].a < 0.001) continue;
      var ta = trail[i].a * 0.008;
      cx.fillStyle = 'rgba(' + color + ',' + ta.toFixed(5) + ')';
      cx.beginPath();
      cx.arc(trail[i].x, trail[i].y, 1.5, 0, Math.PI * 2);
      cx.fill();
    }
  }
  drawTrail(trail0, '140,200,220');
  drawTrail(trail1, '220,160,140');

  // ═══ THE ZEROS — nothing with a position ═══
  // they have no fill of their own. they are defined by
  // a tiny dimming of the field around them — a local absence.
  // as they get closer to the one, they pick up warmth
  // by reflection. borrowed light. they are still zero.

  function drawZero(zx, zy, hue, phase) {
    // the void — a tiny circle slightly darker than surroundings
    var voidR = 3 + closeness * 2;
    var voidA = 0.15 - closeness * 0.1; // fades as it approaches the one

    // dim ring
    var ring = cx.createRadialGradient(zx, zy, voidR * 0.3, zx, zy, voidR * 3);
    ring.addColorStop(0, 'rgba(0,0,0,' + (voidA * 0.5).toFixed(4) + ')');
    ring.addColorStop(0.5, 'rgba(0,0,0,' + (voidA * 0.1).toFixed(4) + ')');
    ring.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = ring;
    cx.beginPath();
    cx.arc(zx, zy, voidR * 3, 0, Math.PI * 2);
    cx.fill();

    // reflected warmth — borrowed from the one
    if (closeness > 0.15) {
      var reflA = (closeness - 0.15) * 0.03 * (0.6 + oneBreath * 0.4);
      var reflR = voidR * 2;
      var refl = cx.createRadialGradient(zx, zy, 0, zx, zy, reflR);
      refl.addColorStop(0, 'rgba(' + hue + ',' + reflA.toFixed(5) + ')');
      refl.addColorStop(0.5, 'rgba(' + hue + ',' + (reflA * 0.3).toFixed(5) + ')');
      refl.addColorStop(1, 'rgba(' + hue + ',0)');
      cx.fillStyle = refl;
      cx.beginPath();
      cx.arc(zx, zy, reflR, 0, Math.PI * 2);
      cx.fill();
    }

    // the zero itself — a single pixel of presence
    var dotA = 0.2 + closeness * 0.3;
    cx.fillStyle = 'rgba(' + hue + ',' + dotA.toFixed(4) + ')';
    cx.beginPath();
    cx.arc(zx, zy, 1.5, 0, Math.PI * 2);
    cx.fill();
  }

  drawZero(z0x, z0y, '140,200,220', 0);
  drawZero(z1x, z1y, '220,160,140', Math.PI);

  // ═══ VIGNETTE ═══
  var vigR = Math.max(w, h) * 0.65;
  var vig = cx.createRadialGradient(cx2, cy2, vigR * 0.25, cx2, cy2, vigR);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(0.5, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,' + (0.3 - closeness * 0.15).toFixed(3) + ')');
  cx.fillStyle = vig;
  cx.fillRect(0, 0, w, h);

  // ═══ AUDIO ═══
  if (audioReady) {
    if (droneGain) {
      var vol = 0.005 + closeness * 0.03;
      vol *= (0.7 + oneBreath * 0.3);
      droneGain.gain.value += (vol - droneGain.gain.value) * 0.002;
    }
    if (harmonicGain && closeness > 0.3) {
      var hvol = (closeness - 0.3) * 0.02 * (0.5 + oneBreath * 0.5);
      harmonicGain.gain.value += (hvol - harmonicGain.gain.value) * 0.001;
    }
    if (harmonic && closeness > 0.2) {
      // as they approach, the octave bends toward a fifth — 33*1.5 = 49.5
      // the 3 emerging from the 2
      var targetF = 66 - closeness * 16.5;
      harmonic.frequency.value += (targetF - harmonic.frequency.value) * 0.0005;
    }
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
</script>
</body>
</html>
