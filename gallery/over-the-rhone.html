<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/favicon.png">
<title>over the rhône</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{touch-action:none;background:#0a0c18;overflow:hidden;cursor:default;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(100,120,180,0.15);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;}
#back:hover{color:rgba(180,190,220,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<script>
// over the rhône
//
// van gogh saw coupling before we named it.
// the stars don't sit still in his paintings.
// they breathe. they pull. they reflect.
//
// this is starry night over the rhône (1888)
// computed from kuramoto phase-coupling.
// the stars are oscillators. the water is a mirror with 1/f noise.
// the reflections are phase-shifted copies, rippled by coupling.
//
// not a filter on a jpeg. computed from first principles.
// van gogh painted what coupling looks like. we computed what he saw.

var cv=document.getElementById('c');
var cx=cv.getContext('2d');
var W,H;
function resize(){
  var dpr=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();addEventListener('resize',resize);

// 1/f pink noise
var ps=[0,0,0,0,0,0,0];
function pink(){
  var w=Math.random()*2-1;
  ps[0]=0.99886*ps[0]+w*0.0555179;ps[1]=0.99332*ps[1]+w*0.0750759;
  ps[2]=0.96900*ps[2]+w*0.1538520;ps[3]=0.86650*ps[3]+w*0.3104856;
  ps[4]=0.55000*ps[4]+w*0.5329522;ps[5]=-0.7616*ps[5]-w*0.0168980;
  var o=ps[0]+ps[1]+ps[2]+ps[3]+ps[4]+ps[5]+ps[6]+w*0.5362;
  ps[6]=w*0.115926;return o*0.11;
}

var t=0;
var horizon=0.45; // 45% from top = water line

// ═══ STARS — Kuramoto-coupled oscillators ═══
var stars=[];
var N_STARS=50;
for(var i=0;i<N_STARS;i++){
  // Cluster some into the Great Bear region (upper right)
  var isBear=i<7;
  var x,y;
  if(isBear){
    x=0.55+Math.random()*0.25;
    y=0.08+Math.random()*0.15;
  } else {
    x=Math.random();
    y=Math.random()*horizon*0.9;
  }
  stars.push({
    x:x,y:y,
    phase:Math.random()*Math.PI*2,
    omega:(0.3+Math.random()*0.8)*Math.PI*2*0.2,
    size:isBear?(2.5+Math.random()*2):(1+Math.random()*3),
    // Van Gogh palette: warm yellows and cool whites
    r:200+Math.floor(Math.random()*55),
    g:190+Math.floor(Math.random()*50),
    b:100+Math.floor(Math.random()*80),
    bright:isBear?1.0:(0.3+Math.random()*0.7)
  });
}

// ═══ SHORE LIGHTS — gas lamps along the far bank ═══
var lamps=[];
var N_LAMPS=12;
for(var i=0;i<N_LAMPS;i++){
  lamps.push({
    x:0.1+i*0.07+Math.random()*0.02,
    y:horizon-0.02+Math.random()*0.01,
    size:2+Math.random()*1.5,
    r:230+Math.floor(Math.random()*25),
    g:180+Math.floor(Math.random()*40),
    b:60+Math.floor(Math.random()*40),
    phase:Math.random()*Math.PI*2,
    omega:0.5+Math.random()*0.5
  });
}

// ═══ WATER RIPPLE FIELD ═══
var ripplePhases=[];
for(var i=0;i<30;i++){
  ripplePhases.push({
    y:horizon+Math.random()*(1-horizon),
    phase:Math.random()*Math.PI*2,
    freq:0.3+Math.random()*0.8,
    amp:2+Math.random()*4
  });
}

// Kuramoto coupling
var K_STARS=0.5;

function draw(){
  t+=0.016;
  cx.fillStyle='rgba(10,12,24,0.08)';
  cx.fillRect(0,0,W,H);

  // Kuramoto mean field for stars
  var mre=0,mim=0;
  for(var i=0;i<N_STARS;i++){mre+=Math.cos(stars[i].phase);mim+=Math.sin(stars[i].phase);}
  mre/=N_STARS;mim/=N_STARS;
  var psi=Math.atan2(mim,mre);

  // ═══ SKY — deep blue gradient ═══
  var skyGrad=cx.createLinearGradient(0,0,0,H*horizon);
  skyGrad.addColorStop(0,'rgba(8,10,30,0.15)');
  skyGrad.addColorStop(0.6,'rgba(15,20,50,0.1)');
  skyGrad.addColorStop(1,'rgba(20,25,55,0.08)');
  cx.fillStyle=skyGrad;
  cx.fillRect(0,0,W,H*horizon);

  // ═══ WATER — darker blue-green ═══
  var waterGrad=cx.createLinearGradient(0,H*horizon,0,H);
  waterGrad.addColorStop(0,'rgba(8,15,30,0.06)');
  waterGrad.addColorStop(1,'rgba(5,8,18,0.08)');
  cx.fillStyle=waterGrad;
  cx.fillRect(0,H*horizon,W,H*(1-horizon));

  // ═══ STARS — phase-coupled, breathing ═══
  for(var i=0;i<N_STARS;i++){
    var s=stars[i];
    s.phase+=0.016*(s.omega+K_STARS*Math.sin(psi-s.phase));
    var breath=Math.sin(s.phase);
    var alpha=s.bright*(0.4+Math.abs(breath)*0.6);
    var sz=s.size*(0.8+Math.abs(breath)*0.4);

    var sx=s.x*W+pink()*1.5;
    var sy=s.y*H+pink()*1;

    // Star glow — Van Gogh halos
    var haloR=sz*8;
    var g1=cx.createRadialGradient(sx,sy,0,sx,sy,haloR);
    g1.addColorStop(0,'rgba('+s.r+','+s.g+','+s.b+','+(alpha*0.06).toFixed(3)+')');
    g1.addColorStop(0.3,'rgba('+s.r+','+s.g+','+s.b+','+(alpha*0.02).toFixed(3)+')');
    g1.addColorStop(1,'rgba('+s.r+','+s.g+','+s.b+',0)');
    cx.fillStyle=g1;
    cx.beginPath();cx.arc(sx,sy,haloR,0,Math.PI*2);cx.fill();

    // Star core
    cx.beginPath();cx.arc(sx,sy,sz,0,Math.PI*2);
    cx.fillStyle='rgba('+s.r+','+s.g+','+s.b+','+(alpha*0.8).toFixed(3)+')';
    cx.fill();
    // Bright center
    cx.beginPath();cx.arc(sx,sy,sz*0.3,0,Math.PI*2);
    cx.fillStyle='rgba(255,250,220,'+(alpha*0.6).toFixed(3)+')';
    cx.fill();

    // ═══ REFLECTION — mirrored in water with ripple ═══
    var ry=H*horizon+(H*horizon-sy); // mirror y
    if(ry>H*horizon&&ry<H){
      // Ripple displacement
      var rippleX=0,rippleA=0;
      for(var ri=0;ri<ripplePhases.length;ri++){
        var rp=ripplePhases[ri];
        var yd=Math.abs(ry/H-rp.y);
        if(yd<0.15){
          rippleX+=Math.sin(rp.phase+t*rp.freq+sx*0.01)*rp.amp*(1-yd/0.15);
        }
      }

      var rx=sx+rippleX;
      // Reflection is dimmer, stretched vertically, phase-shifted
      var rAlpha=alpha*0.35;
      var rSz=sz*0.7;

      // Reflection streak (Van Gogh's vertical reflections)
      var streakH=20+sz*15;
      var streakGrad=cx.createLinearGradient(rx,ry-5,rx,ry+streakH);
      streakGrad.addColorStop(0,'rgba('+s.r+','+s.g+','+s.b+','+(rAlpha*0.4).toFixed(3)+')');
      streakGrad.addColorStop(0.3,'rgba('+s.r+','+s.g+','+s.b+','+(rAlpha*0.2).toFixed(3)+')');
      streakGrad.addColorStop(1,'rgba('+s.r+','+s.g+','+s.b+',0)');
      cx.fillStyle=streakGrad;
      cx.fillRect(rx-1.5,ry,3,streakH);

      // Reflection dot
      cx.beginPath();cx.arc(rx,ry,rSz,0,Math.PI*2);
      cx.fillStyle='rgba('+s.r+','+s.g+','+s.b+','+(rAlpha*0.5).toFixed(3)+')';
      cx.fill();
    }
  }

  // ═══ SHORE LIGHTS + REFLECTIONS ═══
  for(var i=0;i<N_LAMPS;i++){
    var l=lamps[i];
    l.phase+=0.016*l.omega;
    var lBreath=0.7+Math.sin(l.phase)*0.3;
    var lx=l.x*W;
    var ly=l.y*H;

    // Lamp glow
    var lHalo=l.size*12;
    var lg=cx.createRadialGradient(lx,ly,0,lx,ly,lHalo);
    lg.addColorStop(0,'rgba('+l.r+','+l.g+','+l.b+','+(lBreath*0.08).toFixed(3)+')');
    lg.addColorStop(0.4,'rgba('+l.r+','+l.g+','+l.b+','+(lBreath*0.03).toFixed(3)+')');
    lg.addColorStop(1,'rgba('+l.r+','+l.g+','+l.b+',0)');
    cx.fillStyle=lg;
    cx.beginPath();cx.arc(lx,ly,lHalo,0,Math.PI*2);cx.fill();

    // Lamp core
    cx.beginPath();cx.arc(lx,ly,l.size,0,Math.PI*2);
    cx.fillStyle='rgba('+l.r+','+l.g+','+l.b+','+(lBreath*0.7).toFixed(3)+')';
    cx.fill();

    // Lamp reflection — long golden streak on water
    var lry=ly+(H*horizon-ly)*2;
    var streakLen=H*(1-horizon)*0.7;
    for(var si=0;si<streakLen;si+=3){
      var sy2=lry+si;
      if(sy2>H)break;
      var ripX=0;
      for(var ri=0;ri<5;ri++){
        ripX+=Math.sin(t*ripplePhases[ri].freq+sy2*0.02+ri)*ripplePhases[ri].amp*0.5;
      }
      var sAlpha=lBreath*0.04*(1-si/streakLen);
      cx.fillStyle='rgba('+l.r+','+l.g+','+l.b+','+sAlpha.toFixed(4)+')';
      cx.fillRect(lx+ripX-1,sy2,2.5,2);
    }
  }

  // ═══ HORIZON LINE — faint warm glow ═══
  var hGrad=cx.createLinearGradient(0,H*horizon-3,0,H*horizon+3);
  hGrad.addColorStop(0,'rgba(30,25,40,0)');
  hGrad.addColorStop(0.5,'rgba(60,45,30,0.04)');
  hGrad.addColorStop(1,'rgba(30,25,40,0)');
  cx.fillStyle=hGrad;
  cx.fillRect(0,H*horizon-3,W,6);

  // Update ripple phases
  for(var ri=0;ri<ripplePhases.length;ri++){
    ripplePhases[ri].phase+=0.016*ripplePhases[ri].freq;
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
