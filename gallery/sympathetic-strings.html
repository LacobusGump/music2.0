<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sympathetic strings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0706;overflow:hidden;touch-action:none}
canvas{display:block}
#back{position:fixed;top:20px;left:24px;font:0.72em Georgia,serif;
  color:rgba(139,74,46,0.12);text-decoration:none;z-index:10;
  letter-spacing:0.06em;transition:color 0.5s}
#back:hover{color:rgba(184,117,58,0.4)}
#hint{position:fixed;bottom:24px;left:0;right:0;text-align:center;
  font:0.65em Georgia,serif;color:rgba(139,74,46,0.18);
  letter-spacing:0.08em;transition:opacity 3s;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="hint">touch a string</div>
<script>
var cv=document.getElementById('c'),cx=cv.getContext('2d'),W,H;
var NUM=12,SEGS=40;
var ratios=[1,9/8,5/4,4/3,3/2,5/3,15/8,2,9/4,5/2,8/3,3];
var names=['1','9/8','5/4','4/3','3/2','5/3','15/8','2','9/4','5/2','8/3','3'];
var strings=[],coupling=[],actx=null,master=null,oscs=[];
var touching=false,dragIdx=-1,lastT=0,hintDone=false;

function init(){
  for(var i=0;i<NUM;i++)
    strings[i]={x:0,y:0,vy:0,energy:0,plucked:false,
      freq:ratios[i],gamma:0.003+ratios[i]*0.0008,modes:Math.max(1,Math.min(4,Math.round(ratios[i])))};
  buildCoupling();
}

function resize(){
  var dpr=Math.min(window.devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  var m=Math.max(W*0.06,24),u=W-m*2;
  for(var i=0;i<NUM;i++) strings[i].x=m+i/(NUM-1)*u;
}

function sympathy(fi,fj){
  var best=0;
  for(var h=1;h<=4;h++)for(var s=1;s<=3;s++){
    var t=fi*h/s,d=(fj-t)/t,w=0.012;
    var r=1/(1+d*d/(w*w))/(h*s);
    if(r>best)best=r;
  }
  return best;
}

function buildCoupling(){
  coupling=[];
  for(var i=0;i<NUM;i++){coupling[i]=[];
    for(var j=0;j<NUM;j++)
      coupling[i][j]=i===j?0:sympathy(ratios[i],ratios[j]);
  }
}

// Audio: lazy oscillator creation
function ensureAudio(){
  if(actx)return;
  try{
    actx=new(window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    master=actx.createGain();master.gain.value=0.08;
    master.connect(actx.destination);
    for(var i=0;i<NUM;i++)oscs[i]=null;
  }catch(e){}
}
function ensureOsc(i){
  if(!actx||oscs[i])return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.type='triangle';o.frequency.value=110*ratios[i];
  g.gain.value=0;o.connect(g);g.connect(master);o.start();
  oscs[i]={osc:o,gain:g};
}

// Interaction
function nearest(x){
  var best=-1,bd=50;
  for(var i=0;i<NUM;i++){var d=Math.abs(x-strings[i].x);if(d<bd){bd=d;best=i;}}
  return best;
}
function onDown(x,y){
  ensureAudio();touching=true;
  var i=nearest(x);
  if(i<0)return;
  dragIdx=i;
  var pull=Math.max(-3,Math.min(3,(y-H/2)/(H*0.25)));
  var s=strings[i];
  s.vy=Math.max(-5,Math.min(5,s.vy+pull*2));
  s.plucked=true;
  if(!hintDone){document.getElementById('hint').style.opacity='0';hintDone=true;}
}
function onMove(x,y){
  if(!touching||dragIdx<0)return;
  var pull=Math.max(-3,Math.min(3,(y-H/2)/(H*0.25)));
  var s=strings[dragIdx];
  s.vy=Math.max(-5,Math.min(5,s.vy+pull*0.08));
}
function onUp(){touching=false;dragIdx=-1;}

cv.addEventListener('touchstart',function(e){e.preventDefault();onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
cv.addEventListener('touchend',onUp);
cv.addEventListener('mousedown',function(e){onDown(e.clientX,e.clientY);});
addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
addEventListener('mouseup',onUp);

// Main loop
function frame(now){
  var dt=Math.min((now-(lastT||now))/1000,0.05);lastT=now;
  var sc=dt/0.016;

  // Physics
  for(var i=0;i<NUM;i++){
    var s=strings[i],w=s.freq*Math.PI*2*0.03;
    var f=-w*w*s.y-2*s.gamma*s.vy;
    for(var j=0;j<NUM;j++){
      if(coupling[i][j]<0.01)continue;
      f+=coupling[i][j]*strings[j].vy*0.6;
    }
    s.vy+=f*sc;
    if(!isFinite(s.vy)){s.vy=0;s.y=0;}
    s.vy=Math.max(-4,Math.min(4,s.vy));
    s.y+=s.vy*sc;
    s.y=Math.max(-1.5,Math.min(1.5,s.y));
    s.energy=s.y*s.y+s.vy*s.vy/(w*w+0.0001);
    if(s.energy<0.00001)s.plucked=false;
  }

  // Clear — full opaque for no ghosting on mobile
  cx.fillStyle='#0a0706';cx.fillRect(0,0,W,H);

  var topY=H*0.08,botY=H*0.92,span=botY-topY;

  // Coupling air — simple semi-transparent rectangles
  for(var i=0;i<NUM;i++)for(var j=i+1;j<NUM;j++){
    if(coupling[i][j]<0.08)continue;
    var sh=Math.sqrt(strings[i].energy*strings[j].energy)*coupling[i][j];
    if(sh<0.0001)continue;
    var a=Math.min(sh*40,0.06);
    if(a<0.003)continue;
    cx.fillStyle='rgba(200,160,110,'+a.toFixed(4)+')';
    var h=Math.min(30+sh*800,H*0.35);
    cx.fillRect(strings[i].x,H/2-h/2,strings[j].x-strings[i].x,h);
  }

  // Draw strings
  for(var i=0;i<NUM;i++){
    var s=strings[i],amp=Math.min(Math.sqrt(s.energy)*25,1);
    var sym=!s.plucked&&amp>0.015;
    var cr,cg,cb;
    if(sym){cr=210+amp*45;cg=160+amp*47;cb=120+amp*40;}
    else{cr=139+amp*93;cg=74+amp*133;cb=46+amp*114;}
    var la=0.12+amp*0.78;

    // Soft outer line
    cx.beginPath();
    cx.strokeStyle='rgba('+~~cr+','+~~cg+','+~~cb+','+(la*0.25).toFixed(3)+')';
    cx.lineWidth=3+amp*3;cx.lineCap='round';
    for(var k=0;k<=SEGS;k++){
      var fr=k/SEGS,py=topY+fr*span;
      var px=s.x+s.y*Math.sin(s.modes*Math.PI*fr)*100;
      k?cx.lineTo(px,py):cx.moveTo(px,py);
    }
    cx.stroke();

    // Sharp core line
    cx.beginPath();
    cx.strokeStyle='rgba('+~~cr+','+~~cg+','+~~cb+','+la.toFixed(3)+')';
    cx.lineWidth=1+amp;
    for(var k=0;k<=SEGS;k++){
      var fr=k/SEGS,py=topY+fr*span;
      var px=s.x+s.y*Math.sin(s.modes*Math.PI*fr)*100;
      k?cx.lineTo(px,py):cx.moveTo(px,py);
    }
    cx.stroke();

    // Anchor dots
    cx.fillStyle='rgba(139,74,46,'+(0.15+amp*0.35).toFixed(3)+')';
    cx.beginPath();cx.arc(s.x,topY,2,0,6.28);cx.fill();
    cx.beginPath();cx.arc(s.x,botY,2,0,6.28);cx.fill();

    // Ratio label
    if(amp>0.08){
      cx.font='10px Georgia';cx.textAlign='center';
      cx.fillStyle='rgba(196,160,136,'+(Math.min(amp,0.6)*0.5).toFixed(3)+')';
      cx.fillText(names[i],s.x,botY+18);
    }

    // Audio — create oscillator lazily when string first vibrates
    if(actx&&s.energy>0.0001){
      ensureOsc(i);
      if(oscs[i]){
        var vol=Math.min(Math.sqrt(s.energy)*4,0.25);
        var g=oscs[i].gain.gain;
        g.value+=(vol-g.value)*0.04;
      }
    }
  }

  // Ambient draft
  if(Math.random()<0.0006){
    var di=~~(Math.random()*NUM);
    strings[di].vy+=0.0003*(Math.random()-0.3);
  }

  requestAnimationFrame(frame);
}

init();resize();
addEventListener('resize',resize);
requestAnimationFrame(frame);
</script>
</body>
</html>
