<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>sympathetic strings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;cursor:default;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
#hint{position:fixed;bottom:24px;left:0;right:0;text-align:center;
  font-family:Georgia,serif;font-size:0.65em;color:rgba(139,74,46,0.18);
  letter-spacing:0.08em;transition:opacity 3s;z-index:10;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="hint">touch a string</div>
<script>
// sympathetic strings
//
// you pluck one. you didn't touch the others.
// but the ones tuned right start vibrating on their own.
//
// that's not metaphor. that's physics.
// the air between them carried the frequency.
// connection doesn't require contact.
// only attunement.
//
// the math: each string is a damped harmonic oscillator.
// when one vibrates, it radiates pressure into the shared medium.
// another string absorbs energy when its natural frequency
// matches a harmonic of the source. the transfer follows
// the lorentzian resonance curve: A ~ 1/((f-f0)^2 + gamma^2)
//
// the closer the tuning, the stronger the sympathy.

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H;
var hintEl = document.getElementById('hint');
var hintGone = false;

// mobile detection — disable GPU-heavy effects
var isMobile = ('ontouchstart' in window) || (innerWidth < 600);
var SEGS = isMobile ? 50 : 100;

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  layoutStrings();
}

// -- STRINGS --
// 12 strings tuned to just intonation ratios.
// not equal temperament. the way strings actually resonate.
var NUM = 12;
var strings = [];

// the ratios that make music possible — pure intervals
var ratios = [1, 9/8, 5/4, 4/3, 3/2, 5/3, 15/8, 2, 9/4, 5/2, 8/3, 3];
var ratioNames = ['1','9/8','5/4','4/3','3/2','5/3','15/8','2','9/4','5/2','8/3','3'];

function layoutStrings() {
  var margin = Math.max(W * 0.06, 24);
  var usable = W - margin * 2;
  for (var i = 0; i < NUM; i++) {
    if (!strings[i]) {
      strings[i] = {
        freq: ratios[i],
        ratio: ratios[i],
        y: 0, vy: 0, energy: 0, peakEnergy: 0,
        gamma: 0.003 + ratios[i] * 0.0008,
        wasPlucked: false,
        pluckFade: 0
      };
    }
    strings[i].x = margin + (i / (NUM - 1)) * usable;
  }
}

// -- COUPLING MATRIX --
// precomputed: how strongly string j drives string i
// based on lorentzian resonance at harmonics
var coupling = [];

function computeSympathy(fi, fj) {
  var best = 0;
  // check if fj is near any harmonic/subharmonic of fi
  for (var h = 1; h <= 4; h++) {
    for (var sub = 1; sub <= 3; sub++) {
      var target = fi * h / sub;
      var det = (fj - target) / target;
      // lorentzian: peaked at zero detuning
      var w = 0.012;
      var resp = 1.0 / (1.0 + det * det / (w * w));
      resp /= (h * sub); // higher harmonics couple weaker
      if (resp > best) best = resp;
    }
  }
  return best;
}

function buildCoupling() {
  coupling = [];
  for (var i = 0; i < NUM; i++) {
    coupling[i] = [];
    for (var j = 0; j < NUM; j++) {
      coupling[i][j] = (i === j) ? 0 : computeSympathy(strings[i].freq, strings[j].freq);
    }
  }
}

// -- AUDIO --
var actx = null, audioReady = false;
var masterGain = null;
var oscs = [];

function initAudio() {
  if (audioReady) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    masterGain = actx.createGain();
    masterGain.gain.value = 0.08;
    masterGain.connect(actx.destination);

    // Create oscillators one at a time with slight delay to not choke mobile
    for (var i = 0; i < NUM; i++) {
      var osc = actx.createOscillator();
      var g = actx.createGain();
      g.gain.value = 0;
      osc.type = 'triangle';
      osc.frequency.value = 110 * ratios[i];
      osc.connect(g);
      g.connect(masterGain);
      osc.start(actx.currentTime + i * 0.01); // stagger starts
      oscs.push({ osc: osc, gain: g });
    }
    audioReady = true;
  } catch(e) { console.warn('audio init failed'); }
}

// -- INTERACTION --
var touching = false;
var dragIdx = -1;

function nearestString(x) {
  var best = -1, bestD = 50;
  for (var i = 0; i < NUM; i++) {
    var d = Math.abs(x - strings[i].x);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function pluck(idx, strength) {
  var s = strings[idx];
  // Clamp strength to prevent physics explosion on mobile
  strength = Math.max(-3, Math.min(3, strength));
  s.vy += strength * (0.7 + Math.random() * 0.6);
  // Clamp velocity
  s.vy = Math.max(-5, Math.min(5, s.vy));
  s.wasPlucked = true;
  s.pluckFade = 1;
}

function onDown(x, y) {
  initAudio();
  touching = true;
  var idx = nearestString(x);
  if (idx >= 0) {
    dragIdx = idx;
    var pull = (y - H / 2) / (H * 0.25);
    pluck(idx, pull * 3);
    if (!hintGone) { hintEl.style.opacity = '0'; hintGone = true; }
  }
}
function onMove(x, y) {
  if (touching && dragIdx >= 0) {
    var pull = Math.max(-3, Math.min(3, (y - H / 2) / (H * 0.25)));
    strings[dragIdx].vy += pull * 0.08;
    strings[dragIdx].vy = Math.max(-5, Math.min(5, strings[dragIdx].vy));
  }
}
function onUp() { touching = false; dragIdx = -1; }

addEventListener('mousedown', function(e){ onDown(e.clientX, e.clientY); });
addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
addEventListener('mouseup', onUp);
addEventListener('touchstart', function(e){
  e.preventDefault();
  onDown(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
addEventListener('touchmove', function(e){
  e.preventDefault();
  onMove(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:false});
addEventListener('touchend', onUp);

// -- INIT --
layoutStrings();
buildCoupling();
resize();
addEventListener('resize', function() { resize(); buildCoupling(); });

// -- TIME --
var lastNow = performance.now();

// -- BACKGROUND TEXTURE (subtle noise) -- skip on mobile
var noiseCv = null;
if (!isMobile) {
  noiseCv = document.createElement('canvas');
  noiseCv.width = 128;
  noiseCv.height = 128;
  var noiseCx = noiseCv.getContext('2d');
  var noiseData = noiseCx.createImageData(128, 128);
  for (var i = 0; i < noiseData.data.length; i += 4) {
    var v = Math.random() * 8;
    noiseData.data[i] = v;
    noiseData.data[i+1] = v * 0.7;
    noiseData.data[i+2] = v * 0.5;
    noiseData.data[i+3] = 12;
  }
  noiseCx.putImageData(noiseData, 0, 0);
}

// -- MAIN LOOP --
function frame(now) {
  var dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;
  var dtScale = dt / 0.016; // normalized to ~60fps

  // -- PHYSICS --
  // each string: damped harmonic oscillator + sympathetic drive
  for (var i = 0; i < NUM; i++) {
    var s = strings[i];
    var omega = s.freq * Math.PI * 2 * 0.03;
    // restoring force
    var f = -omega * omega * s.y;
    // damping
    f -= 2 * s.gamma * s.vy;
    // sympathetic drive: sum of coupled velocities from other strings
    for (var j = 0; j < NUM; j++) {
      var c = coupling[i][j];
      if (c < 0.01) continue;
      // pressure wave: proportional to source velocity
      f += c * strings[j].vy * 0.6;
    }
    s.vy += f * dtScale;
    // Safety: NaN check + hard clamp
    if (isNaN(s.vy) || !isFinite(s.vy)) { s.vy = 0; s.y = 0; }
    s.vy = Math.max(-4, Math.min(4, s.vy));
    s.y += s.vy * dtScale;
    if (isNaN(s.y) || !isFinite(s.y)) { s.y = 0; s.vy = 0; }
    s.y = Math.max(-1.5, Math.min(1.5, s.y));
    // energy (kinetic + potential)
    s.energy = s.y * s.y + s.vy * s.vy / (omega * omega + 0.0001);
    s.peakEnergy = Math.max(s.peakEnergy * (1 - 0.0003 * dtScale), s.energy);
    // fade pluck marker
    if (s.pluckFade > 0) s.pluckFade *= (1 - 0.001 * dtScale);
    if (s.energy < 0.00001 && s.pluckFade < 0.01) s.wasPlucked = false;
  }

  // -- CLEAR with subtle depth --
  cx.fillStyle = 'rgba(10,7,6,0.18)';
  cx.fillRect(0, 0, W, H);

  // subtle noise texture for depth (skip on mobile)
  if (noiseCv) {
    cx.globalAlpha = 0.015;
    var pat = cx.createPattern(noiseCv, 'repeat');
    cx.fillStyle = pat;
    cx.fillRect(0, 0, W, H);
    cx.globalAlpha = 1;
  }

  var topY = H * 0.08;
  var botY = H * 0.92;
  var span = botY - topY;

  // -- COUPLING AIR --
  // visible pressure between vibrating strings that share harmonics
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  for (var i = 0; i < NUM; i++) {
    for (var j = i + 1; j < NUM; j++) {
      var c = coupling[i][j];
      if (c < 0.08) continue;
      var shared = Math.sqrt(strings[i].energy * strings[j].energy) * c;
      if (shared < 0.0001) continue;
      var alpha = Math.min(shared * 60, 0.08);
      if (alpha < 0.003) continue;

      var x1 = strings[i].x, x2 = strings[j].x;
      // rich color based on coupling strength
      var warmR = c > 0.5 ? 232 : 184;
      var warmG = c > 0.5 ? 207 : 117;
      var warmB = c > 0.5 ? 160 : 58;

      if (isMobile) {
        // simple flat fill instead of gradient on mobile
        cx.fillStyle = 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',' + (alpha * 0.5).toFixed(4) + ')';
        var h = Math.min(30 + shared * 1200, H * 0.4);
        cx.fillRect(x1, H/2 - h/2, x2 - x1, h);
      } else {
        var g = cx.createLinearGradient(x1, 0, x2, 0);
        g.addColorStop(0, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',0)');
        g.addColorStop(0.15, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',' + (alpha * 0.25).toFixed(4) + ')');
        g.addColorStop(0.35, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',' + (alpha * 0.7).toFixed(4) + ')');
        g.addColorStop(0.5, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',' + alpha.toFixed(4) + ')');
        g.addColorStop(0.65, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',' + (alpha * 0.7).toFixed(4) + ')');
        g.addColorStop(0.85, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',' + (alpha * 0.25).toFixed(4) + ')');
        g.addColorStop(1, 'rgba(' + warmR + ',' + warmG + ',' + warmB + ',0)');
        cx.fillStyle = g;
        var h = Math.min(30 + shared * 1200, H * 0.4);
        cx.fillRect(x1, H/2 - h/2, x2 - x1, h);
      }
    }
  }
  cx.restore();

  // -- STRINGS --
  for (var i = 0; i < NUM; i++) {
    var s = strings[i];
    var amp = Math.min(Math.sqrt(s.energy) * 25, 1);
    // is this string vibrating sympathetically (not directly touched)?
    var sympathetic = !s.wasPlucked && amp > 0.015;

    // visual modes — higher ratio strings show more standing wave nodes
    var modes = Math.round(s.ratio);
    if (modes < 1) modes = 1;
    if (modes > 4) modes = 4;

    // rich color gradient through the ember palette
    var cr, cg, cb;
    if (sympathetic) {
      // sympathetic strings glow warmer/lighter — they chose to vibrate
      cr = 210 + amp * 45;
      cg = 160 + amp * 47;
      cb = 120 + amp * 40;
    } else {
      // plucked: deep amber through gold
      cr = 139 + amp * 93;
      cg = 74 + amp * 133;
      cb = 46 + amp * 114;
    }

    var lineAlpha = 0.12 + amp * 0.78;

    // draw the string -- shadow blur on desktop, wider alpha lines on mobile
    cx.save();
    if (isMobile) {
      // no shadowBlur -- use wider line at lower alpha for soft look
      cx.beginPath();
      cx.strokeStyle = 'rgba(' + Math.round(cr) + ',' + Math.round(cg) + ',' +
        Math.round(cb) + ',' + (lineAlpha * 0.3).toFixed(3) + ')';
      cx.lineWidth = 3.0 + amp * 3;
      cx.lineCap = 'round';
      for (var k = 0; k <= SEGS; k++) {
        var frac = k / SEGS;
        var py = topY + frac * span;
        var env = Math.sin(modes * Math.PI * frac);
        var dx = s.y * env * 100;
        var px = s.x + dx;
        if (k === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
      }
      cx.stroke();
      // sharp core line on top
      cx.beginPath();
      cx.strokeStyle = 'rgba(' + Math.round(cr) + ',' + Math.round(cg) + ',' +
        Math.round(cb) + ',' + lineAlpha.toFixed(3) + ')';
      cx.lineWidth = 1.0 + amp * 1.0;
      for (var k = 0; k <= SEGS; k++) {
        var frac = k / SEGS;
        var py = topY + frac * span;
        var env = Math.sin(modes * Math.PI * frac);
        var dx = s.y * env * 100;
        var px = s.x + dx;
        if (k === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
      }
      cx.stroke();
    } else {
      cx.shadowColor = 'rgba(' + Math.round(cr) + ',' + Math.round(cg) + ',' + Math.round(cb) + ',' + (lineAlpha * 0.4).toFixed(3) + ')';
      cx.shadowBlur = 3 + amp * 6;
      cx.beginPath();
      cx.strokeStyle = 'rgba(' + Math.round(cr) + ',' + Math.round(cg) + ',' +
        Math.round(cb) + ',' + lineAlpha.toFixed(3) + ')';
      cx.lineWidth = 1.0 + amp * 1.5;
      cx.lineCap = 'round';
      cx.lineJoin = 'round';
      for (var k = 0; k <= SEGS; k++) {
        var frac = k / SEGS;
        var py = topY + frac * span;
        var env = Math.sin(modes * Math.PI * frac);
        var dx = s.y * env * 100;
        var px = s.x + dx;
        if (k === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
      }
      cx.stroke();
    }
    cx.restore();

    // glow at antinodes — soft radial gradients, multiple stops
    // on mobile: simpler single-stop glow, fewer draw calls
    if (amp > 0.04) {
      cx.save();
      cx.globalCompositeOperation = 'lighter';
      var glowSize = isMobile ? (6 + amp * 20) : (8 + amp * 40);
      var glowA = amp * 0.03;
      for (var m = 0; m < modes; m++) {
        var nodeFrac = (m + 0.5) / modes;
        var ny = topY + nodeFrac * span;
        var env2 = Math.sin(modes * Math.PI * nodeFrac);
        var ndx = s.y * env2 * 100;
        var nx = s.x + ndx;
        var absEnv = Math.abs(env2);

        if (isMobile) {
          // simple 2-stop gradient on mobile
          var gr = cx.createRadialGradient(nx, ny, 0, nx, ny, glowSize * absEnv + 4);
          var ga = sympathetic ? (glowA * absEnv * 1.5) : (glowA * absEnv * 0.8);
          gr.addColorStop(0, 'rgba(232,207,160,' + ga.toFixed(4) + ')');
          gr.addColorStop(1, 'rgba(184,117,58,0)');
          cx.fillStyle = gr;
          cx.beginPath();
          cx.arc(nx, ny, glowSize * absEnv + 4, 0, Math.PI * 2);
          cx.fill();
        } else {
          var gr = cx.createRadialGradient(nx, ny, 0, nx, ny, glowSize * absEnv + 4);
          if (sympathetic) {
            gr.addColorStop(0, 'rgba(232,207,160,' + (glowA * absEnv * 2.0).toFixed(4) + ')');
            gr.addColorStop(0.2, 'rgba(220,185,140,' + (glowA * absEnv * 1.2).toFixed(4) + ')');
            gr.addColorStop(0.5, 'rgba(200,160,120,' + (glowA * absEnv * 0.4).toFixed(4) + ')');
            gr.addColorStop(1, 'rgba(184,117,58,0)');
          } else {
            gr.addColorStop(0, 'rgba(232,207,160,' + (glowA * absEnv * 1.2).toFixed(4) + ')');
            gr.addColorStop(0.25, 'rgba(184,117,58,' + (glowA * absEnv * 0.6).toFixed(4) + ')');
            gr.addColorStop(0.6, 'rgba(139,74,46,' + (glowA * absEnv * 0.15).toFixed(4) + ')');
            gr.addColorStop(1, 'rgba(139,74,46,0)');
          }
          cx.fillStyle = gr;
          cx.beginPath();
          cx.arc(nx, ny, glowSize * absEnv + 4, 0, Math.PI * 2);
          cx.fill();
        }
      }
      cx.restore();
    }

    // bridge and nut (anchor dots) — soft not hard
    var dotA = 0.15 + amp * 0.35;
    cx.save();
    if (!isMobile) {
      cx.shadowColor = 'rgba(139,74,46,' + (dotA * 0.5).toFixed(3) + ')';
      cx.shadowBlur = 3;
    }
    cx.fillStyle = 'rgba(139,74,46,' + dotA.toFixed(3) + ')';
    cx.beginPath(); cx.arc(s.x, topY, 2, 0, Math.PI * 2); cx.fill();
    cx.beginPath(); cx.arc(s.x, botY, 2, 0, Math.PI * 2); cx.fill();
    cx.restore();

    // ratio label — fades in when vibrating
    if (amp > 0.08) {
      cx.font = '10px Georgia';
      cx.textAlign = 'center';
      cx.fillStyle = 'rgba(196,160,136,' + (Math.min(amp, 0.6) * 0.5).toFixed(3) + ')';
      cx.fillText(ratioNames[i], s.x, botY + 18);
    }
  }

  // -- AUDIO --
  if (audioReady) {
    for (var i = 0; i < NUM; i++) {
      var vol = Math.min(Math.sqrt(strings[i].energy) * 4, 0.25);
      var g = oscs[i].gain;
      g.gain.value += (vol - g.gain.value) * 0.04;
    }
  }

  // -- AMBIENT --
  // the room breathes. barely. sometimes a string shivers on its own.
  // not just the fundamental — any string can catch a draft.
  if (Math.random() < 0.0006) {
    var draftIdx = Math.floor(Math.random() * NUM);
    strings[draftIdx].vy += 0.0003 * (Math.random() - 0.3);
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
