<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>the shared beam</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;cursor:default;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
#hint{position:fixed;bottom:24px;left:0;right:0;text-align:center;
  font-family:Georgia,serif;font-size:0.62em;color:rgba(139,74,46,0);
  letter-spacing:0.08em;transition:color 3s;z-index:10;pointer-events:none;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="hint"></div>
<script>
// the shared beam
//
// 1665. christiaan huygens is sick in bed.
// two pendulum clocks hang on the same wooden beam.
// he watches them for hours because that is what you do when you are sick.
//
// they synchronize.
//
// not because they know about each other.
// not because they are trying.
// because the beam carries what one does to the other.
// tiny vibrations. imperceptible. but persistent.
//
// he called it "an odd kind of sympathy."
//
// grab one. throw it off. watch.
// the beam does not forget.
// it keeps whispering the other's rhythm
// until they find each other again.
//
// the math is real:
//   d^2 theta_1/dt^2 = -(g/L)sin(theta_1) - eps*(dtheta_1/dt - dtheta_2/dt) - gamma*dtheta_1/dt
//   d^2 theta_2/dt^2 = -(g/L)sin(theta_2) - eps*(dtheta_2/dt - dtheta_1/dt) - gamma*dtheta_2/dt
//
// eps is the coupling. the beam.
// the thing between them that neither one built.

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H;

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = cv.width = innerWidth * dpr;
  H = cv.height = innerHeight * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// -- PHYSICS --

var grav = 9.81;
var Len = 1.0;
var omega0 = Math.sqrt(grav / Len); // ~3.13 rad/s

// coupling through the beam. small but persistent.
// tuned so sync is visible in ~15-25 seconds.
var epsilon = 0.035;
var gamma = 0.008; // air friction, bearing friction

// pendulum 1: starts at one angle
var theta1 = 0.5;  // ~29 degrees
var dtheta1 = 0;

// pendulum 2: starts different angle, different phase
var theta2 = -0.35;
var dtheta2 = 1.2; // strong initial velocity, clearly out of phase

// beam dynamics (Newton's third law)
var beamDisp = 0;
var beamVel = 0;
var beamMass = 20;
var beamDamp = 0.03;

// time
var dt = 0.003;
var stepsPerFrame = 5;
var simTime = 0;

// -- INTERACTION --
var dragging = null;
var mx = 0, my = 0;
var hasInteracted = false;

// -- HISTORY --
var phaseHistory = [];
var maxHistory = 900;

var trail1 = [];
var trail2 = [];
var maxTrail = 90;

// -- HINT --
var hintEl = document.getElementById('hint');
var hintCount = 0;
var hcNoise = null;

function showHint(text, delay) {
  setTimeout(function() {
    hintEl.textContent = text;
    hintEl.style.color = 'rgba(139,74,46,0.3)';
    setTimeout(function() {
      hintEl.style.color = 'rgba(139,74,46,0)';
    }, 6000);
  }, delay);
}

showHint('two clocks. one beam. wait.', 3500);

// -- COORDINATE HELPERS --

function getW() { return innerWidth; }
function getH() { return innerHeight; }

function getBeamY() { return getH() * 0.25; }

function getPivot(which) {
  var w = getW(), h = getH();
  var by = getBeamY();
  var spacing = Math.min(w * 0.22, 140);
  var center = w / 2 + beamDisp * 60;
  if (which === 1) return { x: center - spacing, y: by };
  return { x: center + spacing, y: by };
}

function getArmLen() {
  return Math.min(getW(), getH()) * 0.32;
}

function getBobPos(which) {
  var pivot = getPivot(which);
  var th = which === 1 ? theta1 : theta2;
  var arm = getArmLen();
  return {
    x: pivot.x + Math.sin(th) * arm,
    y: pivot.y + Math.cos(th) * arm
  };
}

// -- INPUT --

function getInputPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function startDrag(e) {
  var pos = getInputPos(e);

  var bob1 = getBobPos(1);
  var bob2 = getBobPos(2);
  var d1 = Math.hypot(pos.x - bob1.x, pos.y - bob1.y);
  var d2 = Math.hypot(pos.x - bob2.x, pos.y - bob2.y);

  // generous touch target
  var threshold = Math.max(50, getArmLen() * 0.25);
  if (d1 < threshold && d1 <= d2) {
    dragging = 1;
  } else if (d2 < threshold) {
    dragging = 2;
  }

  if (dragging) {
    if (!hasInteracted) {
      hasInteracted = true;
      showHint('let go. watch them find each other.', 100);
    }
    initAudio();
  }
}

function moveDrag(e) {
  if (!dragging) return;
  e.preventDefault();
  var pos = getInputPos(e);
  var pivot = getPivot(dragging);
  var angle = Math.atan2(pos.x - pivot.x, pos.y - pivot.y);
  angle = Math.max(-1.3, Math.min(1.3, angle));

  if (dragging === 1) {
    theta1 = angle;
    dtheta1 = 0;
  } else {
    theta2 = angle;
    dtheta2 = 0;
  }
}

function endDrag() { dragging = null; }

cv.addEventListener('mousedown', startDrag);
cv.addEventListener('mousemove', moveDrag);
cv.addEventListener('mouseup', endDrag);
cv.addEventListener('mouseleave', endDrag);
cv.addEventListener('touchstart', function(e) { e.preventDefault(); startDrag(e); }, { passive: false });
cv.addEventListener('touchmove', function(e) { moveDrag(e); }, { passive: false });
cv.addEventListener('touchend', endDrag);
cv.addEventListener('touchcancel', endDrag);

// -- AUDIO --
var actx = null, audioReady = false;
var beamGain = null, beamOsc = null;

function initAudio() {
  if (audioReady) return;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();

    // the beam hum. only audible when they are nearly synchronized.
    beamGain = actx.createGain();
    beamGain.gain.value = 0;
    var lp = actx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 110;
    lp.Q.value = 0.4;
    beamOsc = actx.createOscillator();
    beamOsc.type = 'sine';
    beamOsc.frequency.value = 55; // A1. the note of a room.
    beamOsc.connect(lp);
    lp.connect(beamGain);
    beamGain.connect(actx.destination);
    beamOsc.start();

    audioReady = true;
  } catch(e) {}
}

addEventListener('click', function() { initAudio(); }, { once: true });
addEventListener('touchstart', function() { initAudio(); }, { once: true });

// tick sounds when pendulum crosses center
var prevSign1 = 0, prevSign2 = 0;

function tick(freq, vol) {
  if (!audioReady || !actx) return;
  try {
    var o = actx.createOscillator();
    var g = actx.createGain();
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.1);
    o.type = 'triangle';
    o.frequency.value = freq;
    o.connect(g);
    g.connect(actx.destination);
    o.start();
    o.stop(actx.currentTime + 0.12);
  } catch(e) {}
}

// -- PHYSICS STEP --

function step() {
  if (dragging) return;

  for (var i = 0; i < stepsPerFrame; i++) {
    // beam receives reaction from both pendulums
    var bf = -beamDamp * beamVel;
    bf += (Math.sin(theta1) * dtheta1 * dtheta1 + Math.cos(theta1) * (-omega0 * omega0 * Math.sin(theta1))) / beamMass;
    bf += (Math.sin(theta2) * dtheta2 * dtheta2 + Math.cos(theta2) * (-omega0 * omega0 * Math.sin(theta2))) / beamMass;

    beamVel += bf * dt;
    beamDisp += beamVel * dt;

    // coupling through the beam
    var c1 = -epsilon * (dtheta1 - dtheta2) - epsilon * 0.3 * beamVel;
    var c2 = -epsilon * (dtheta2 - dtheta1) + epsilon * 0.3 * beamVel;

    // full acceleration: gravity + coupling + damping
    var a1 = -omega0 * omega0 * Math.sin(theta1) + c1 - gamma * dtheta1;
    var a2 = -omega0 * omega0 * Math.sin(theta2) + c2 - gamma * dtheta2;

    // symplectic Euler
    dtheta1 += a1 * dt;
    dtheta2 += a2 * dt;
    theta1 += dtheta1 * dt;
    theta2 += dtheta2 * dt;

    simTime += dt;
  }

  // gentle energy maintenance (like the clock escapement)
  var amp1 = Math.sqrt(theta1 * theta1 + (dtheta1 / omega0) * (dtheta1 / omega0));
  var amp2 = Math.sqrt(theta2 * theta2 + (dtheta2 / omega0) * (dtheta2 / omega0));
  var target = 0.35;

  if (amp1 < target) {
    var nudge = (target - amp1) * 0.003;
    dtheta1 += nudge * (dtheta1 >= 0 ? 1 : -1);
  }
  if (amp2 < target) {
    var nudge = (target - amp2) * 0.003;
    dtheta2 += nudge * (dtheta2 >= 0 ? 1 : -1);
  }

  // tick on zero crossing
  var sign1 = theta1 > 0 ? 1 : -1;
  var sign2 = theta2 > 0 ? 1 : -1;
  if (sign1 !== prevSign1 && prevSign1 !== 0) tick(220, Math.min(0.03, amp1 * 0.06));
  if (sign2 !== prevSign2 && prevSign2 !== 0) tick(277, Math.min(0.03, amp2 * 0.06));
  prevSign1 = sign1;
  prevSign2 = sign2;
}

// -- DRAW --

function draw() {
  step();

  var w = getW(), h = getH();

  // clear with slight persistence for trails
  cx.fillStyle = 'rgba(10,7,6,0.22)';
  cx.fillRect(0, 0, w, h);

  // depth noise
  if(!hcNoise){
    hcNoise=document.createElement('canvas');
    hcNoise.width=128;hcNoise.height=128;
    var hnc=hcNoise.getContext('2d');
    var hnd=hnc.createImageData(128,128);
    for(var hni=0;hni<hnd.data.length;hni+=4){
      var hnv=Math.random()*5;
      hnd.data[hni]=hnv;hnd.data[hni+1]=hnv*0.7;
      hnd.data[hni+2]=hnv*0.5;hnd.data[hni+3]=9;
    }
    hnc.putImageData(hnd,0,0);
  }
  cx.globalAlpha=0.01;
  cx.fillStyle=cx.createPattern(hcNoise,'repeat');
  cx.fillRect(0,0,w,h);
  cx.globalAlpha=1;

  // -- THE BEAM --
  var by = getBeamY();
  var bLeft = w * 0.1;
  var bRight = w * 0.9;
  var bShift = beamDisp * 60;

  // beam with shadow for soft rendering
  cx.save();
  cx.shadowColor = 'rgba(139,74,46,0.08)';
  cx.shadowBlur = 8;
  cx.shadowOffsetY = 2;
  cx.strokeStyle = 'rgba(139,74,46,0.22)';
  cx.lineWidth = 3;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(bLeft + bShift, by);
  cx.lineTo(bRight + bShift, by);
  cx.stroke();
  cx.restore();

  // wall mounts
  cx.fillStyle = 'rgba(139,74,46,0.07)';
  cx.fillRect(bLeft + bShift - 2, by - 14, 4, 18);
  cx.fillRect(bRight + bShift - 2, by - 14, 4, 18);

  // -- TRAILS --
  var bob1 = getBobPos(1);
  var bob2 = getBobPos(2);

  trail1.push({ x: bob1.x, y: bob1.y });
  trail2.push({ x: bob2.x, y: bob2.y });
  if (trail1.length > maxTrail) trail1.shift();
  if (trail2.length > maxTrail) trail2.shift();

  // draw arc trails — shadow blur for anti-aliased softness
  cx.save();
  cx.lineCap = 'round';
  cx.lineJoin = 'round';

  if (trail1.length > 2) {
    cx.shadowColor = 'rgba(184,117,58,0.04)';
    cx.shadowBlur = 4;
    cx.beginPath();
    cx.moveTo(trail1[0].x, trail1[0].y);
    for (var i = 1; i < trail1.length; i++) {
      cx.lineTo(trail1[i].x, trail1[i].y);
    }
    cx.strokeStyle = 'rgba(184,117,58,0.045)';
    cx.lineWidth = 2;
    cx.stroke();
  }

  if (trail2.length > 2) {
    cx.shadowColor = 'rgba(196,160,136,0.04)';
    cx.shadowBlur = 4;
    cx.beginPath();
    cx.moveTo(trail2[0].x, trail2[0].y);
    for (var i = 1; i < trail2.length; i++) {
      cx.lineTo(trail2[i].x, trail2[i].y);
    }
    cx.strokeStyle = 'rgba(196,160,136,0.045)';
    cx.lineWidth = 2;
    cx.stroke();
  }
  cx.restore();

  // -- PENDULUM ARMS --
  var pivot1 = getPivot(1);
  var pivot2 = getPivot(2);

  cx.save();
  cx.shadowColor = 'rgba(139,74,46,0.12)';
  cx.shadowBlur = 3;
  cx.strokeStyle = 'rgba(139,74,46,0.3)';
  cx.lineWidth = 1.8;
  cx.lineCap = 'round';
  cx.beginPath();
  cx.moveTo(pivot1.x, pivot1.y);
  cx.lineTo(bob1.x, bob1.y);
  cx.stroke();

  cx.beginPath();
  cx.moveTo(pivot2.x, pivot2.y);
  cx.lineTo(bob2.x, bob2.y);
  cx.stroke();
  cx.restore();

  // -- BOBS --
  var amp1 = Math.sqrt(theta1 * theta1 + (dtheta1 / omega0) * (dtheta1 / omega0));
  var amp2 = Math.sqrt(theta2 * theta2 + (dtheta2 / omega0) * (dtheta2 / omega0));

  // bob 1 — rich multi-stop glow
  var r1 = 4 + amp1 * 3;
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  var g1 = cx.createRadialGradient(bob1.x, bob1.y, 0, bob1.x, bob1.y, r1 * 6);
  g1.addColorStop(0, 'rgba(232,207,160,0.3)');
  g1.addColorStop(0.08, 'rgba(184,117,58,0.25)');
  g1.addColorStop(0.2, 'rgba(184,117,58,0.1)');
  g1.addColorStop(0.45, 'rgba(139,74,46,0.03)');
  g1.addColorStop(0.7, 'rgba(139,74,46,0.008)');
  g1.addColorStop(1, 'rgba(139,74,46,0)');
  cx.fillStyle = g1;
  cx.beginPath();
  cx.arc(bob1.x, bob1.y, r1 * 6, 0, Math.PI * 2);
  cx.fill();
  cx.restore();

  // bob 1 core — soft edge
  var bc1 = cx.createRadialGradient(bob1.x, bob1.y, 0, bob1.x, bob1.y, r1 * 1.3);
  bc1.addColorStop(0, 'rgba(232,207,160,0.95)');
  bc1.addColorStop(0.6, 'rgba(232,207,160,0.7)');
  bc1.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = bc1;
  cx.beginPath();
  cx.arc(bob1.x, bob1.y, r1 * 1.3, 0, Math.PI * 2);
  cx.fill();

  // bob 2 — rich multi-stop glow
  var r2 = 4 + amp2 * 3;
  cx.save();
  cx.globalCompositeOperation = 'lighter';
  var g2 = cx.createRadialGradient(bob2.x, bob2.y, 0, bob2.x, bob2.y, r2 * 6);
  g2.addColorStop(0, 'rgba(232,207,160,0.3)');
  g2.addColorStop(0.08, 'rgba(196,160,136,0.25)');
  g2.addColorStop(0.2, 'rgba(196,160,136,0.1)');
  g2.addColorStop(0.45, 'rgba(139,74,46,0.03)');
  g2.addColorStop(0.7, 'rgba(139,74,46,0.008)');
  g2.addColorStop(1, 'rgba(139,74,46,0)');
  cx.fillStyle = g2;
  cx.beginPath();
  cx.arc(bob2.x, bob2.y, r2 * 6, 0, Math.PI * 2);
  cx.fill();
  cx.restore();

  // bob 2 core — soft edge
  var bc2 = cx.createRadialGradient(bob2.x, bob2.y, 0, bob2.x, bob2.y, r2 * 1.3);
  bc2.addColorStop(0, 'rgba(232,207,160,0.95)');
  bc2.addColorStop(0.6, 'rgba(232,207,160,0.7)');
  bc2.addColorStop(1, 'rgba(196,160,136,0)');
  cx.fillStyle = bc2;
  cx.beginPath();
  cx.arc(bob2.x, bob2.y, r2 * 1.3, 0, Math.PI * 2);
  cx.fill();

  // -- BEAM VIBRATION --
  // tiny particles along the beam showing the invisible coupling
  var beamActivity = Math.abs(beamVel);
  if (beamActivity > 0.00005) {
    for (var i = 0; i < 16; i++) {
      var frac = (i + 0.5) / 16;
      var px = bLeft + (bRight - bLeft) * frac + bShift;
      var py = by + Math.sin(simTime * 25 + i * 1.7) * beamActivity * 500;
      var pa = Math.min(0.18, beamActivity * 15);
      // soft particle with radial falloff
      var bpg = cx.createRadialGradient(px, py, 0, px, py, 3);
      bpg.addColorStop(0, 'rgba(184,117,58,' + pa.toFixed(4) + ')');
      bpg.addColorStop(0.5, 'rgba(184,117,58,' + (pa * 0.3).toFixed(4) + ')');
      bpg.addColorStop(1, 'rgba(184,117,58,0)');
      cx.fillStyle = bpg;
      cx.beginPath();
      cx.arc(px, py, 3, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // -- SYNC MEASUREMENT --
  // how in-phase are they?
  var phaseDiff = theta1 - theta2;
  var velProduct = dtheta1 * dtheta2;
  var velMag = Math.abs(dtheta1) * Math.abs(dtheta2) + 0.0001;
  var velCorr = velProduct / velMag; // -1 to +1

  // sync: 1 = perfect in-phase, 0 = perfectly anti-phase
  var sync = 0.5 + 0.5 * Math.cos(phaseDiff) * (0.4 + 0.6 * Math.max(0, velCorr));

  phaseHistory.push(sync);
  if (phaseHistory.length > maxHistory) phaseHistory.shift();

  // -- SYNC RIVER --
  // thin line at bottom showing convergence over time
  var riverY = h * 0.85;
  var riverH = h * 0.05;

  if (phaseHistory.length > 2) {
    cx.beginPath();
    for (var i = 0; i < phaseHistory.length; i++) {
      var x = (i / maxHistory) * w;
      var y = riverY - phaseHistory[i] * riverH;
      if (i === 0) cx.moveTo(x, y);
      else cx.lineTo(x, y);
    }
    // color by current sync level
    var cr = Math.round(100 + sync * 132);
    var cg = Math.round(50 + sync * 107);
    var cb = Math.round(30 + sync * 30);
    cx.save();
    cx.shadowColor = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (0.04 + sync * 0.06).toFixed(3) + ')';
    cx.shadowBlur = 3;
    cx.strokeStyle = 'rgba(' + cr + ',' + cg + ',' + cb + ',' + (0.08 + sync * 0.15).toFixed(3) + ')';
    cx.lineWidth = 1.8;
    cx.lineCap = 'round';
    cx.lineJoin = 'round';
    cx.stroke();
    cx.restore();
  }

  // -- THE GLOW BETWEEN --
  // when they sync, warmth appears in the space between them
  if (sync > 0.65) {
    var glowStrength = (sync - 0.65) / 0.35;
    var glowAlpha = glowStrength * glowStrength * 0.06;
    var midX = (bob1.x + bob2.x) / 2;
    var midY = (bob1.y + bob2.y) / 2;
    var glowR = Math.abs(bob1.x - bob2.x) * 0.6;

    cx.save();
    cx.globalCompositeOperation = 'lighter';
    var ggR = Math.max(glowR, 25);
    var gg = cx.createRadialGradient(midX, midY, 0, midX, midY, ggR);
    gg.addColorStop(0, 'rgba(232,207,160,' + (glowAlpha * 1.2).toFixed(4) + ')');
    gg.addColorStop(0.15, 'rgba(220,180,120,' + (glowAlpha * 0.6).toFixed(4) + ')');
    gg.addColorStop(0.4, 'rgba(184,117,58,' + (glowAlpha * 0.2).toFixed(4) + ')');
    gg.addColorStop(0.7, 'rgba(139,74,46,' + (glowAlpha * 0.05).toFixed(4) + ')');
    gg.addColorStop(1, 'rgba(139,74,46,0)');
    cx.fillStyle = gg;
    cx.beginPath();
    cx.arc(midX, midY, ggR, 0, Math.PI * 2);
    cx.fill();
    cx.restore();

    // connecting line — faint thread between the bobs when synced
    if (glowStrength > 0.4) {
      cx.save();
      cx.shadowColor = 'rgba(232,207,160,' + ((glowStrength - 0.4) * 0.03).toFixed(4) + ')';
      cx.shadowBlur = 4;
      cx.strokeStyle = 'rgba(232,207,160,' + ((glowStrength - 0.4) * 0.05).toFixed(4) + ')';
      cx.lineWidth = 0.8;
      cx.lineCap = 'round';
      cx.beginPath();
      cx.moveTo(bob1.x, bob1.y);
      cx.lineTo(bob2.x, bob2.y);
      cx.stroke();
      cx.restore();
    }
  }

  // -- AUDIO --
  if (audioReady && beamGain) {
    var targetVol = sync > 0.7 ? (sync - 0.7) * 0.06 : 0;
    beamGain.gain.value += (targetVol - beamGain.gain.value) * 0.003;
  }

  // -- LABEL --
  // Huygens' own words, appearing very slowly
  if (simTime > 12) {
    var la = Math.min(0.1, (simTime - 12) * 0.0008);
    cx.font = '10px Georgia';
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(139,74,46,' + la.toFixed(4) + ')';
    cx.fillText('an odd kind of sympathy', w / 2, h * 0.94);
  }

  // second hint after long watching
  if (simTime > 25 && !hasInteracted && hintCount === 0) {
    hintCount = 1;
    showHint('grab one.', 0);
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
