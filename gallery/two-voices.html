<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="icon" href="/favicon.png">
<title>two voices</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;cursor:crosshair;
  -webkit-user-select:none;user-select:none;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
#start-hint{position:fixed;bottom:12%;left:50%;transform:translateX(-50%);
  text-align:center;font-family:Georgia,serif;z-index:1;pointer-events:none;
  opacity:0;animation:arrive 3s ease 1s forwards;}
#start-hint p{color:rgba(201,164,74,0.12);font-size:0.82em;line-height:2.4;letter-spacing:0.06em;}
@keyframes arrive{to{opacity:1}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="start-hint">
<p>click to hear them.<br>
move toward center to couple them.</p>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// TWO VOICES
//
// Two oscillators. Two frequencies. One coupling constant.
//
// The Kuramoto equation:
//   d(theta_i)/dt = omega_i + (K/N) * sum( sin(theta_j - theta_i) )
//
// K = 0: two independent voices, different speeds, beating.
// K > K_c: phase-lock. one voice. the 3 emerges.
//
// You control K with your distance from center.
// Far = alone. Close = coupled.
//
// The approach IS the love. Not the resolution.
// ═══════════════════════════════════════════════════════════

var cv = document.getElementById('c');
var cx = cv.getContext('2d');
var W, H, dpr;
var started = false;
var actx = null;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
addEventListener('resize', resize);

// ═══ TWO OSCILLATORS ═══
// Voice A: 220 Hz (A3) — the root. warm.
// Voice B: 277.18 Hz (C#4) — the third. reaching.
// Natural frequency ratio ~ 1.26 — a major third. beautiful tension.

var OMEGA_A = 1.8;   // radians/sec for the visual orbit
var OMEGA_B = 2.27;  // slightly faster — the difference drives the beating
var FREQ_A = 220;    // audio frequency
var FREQ_B = 277.18; // audio frequency

var thetaA = 0;
var thetaB = Math.PI; // start opposite — maximum separation
var K = 0;            // coupling strength — you control this
var targetK = 0;
var R = 0;            // order parameter

// ═══ POINTER STATE ═══
var pointerX = -1, pointerY = -1;
var pointerActive = false;

function onPointer(e) {
  var x, y;
  if (e.touches) {
    x = e.touches[0].clientX;
    y = e.touches[0].clientY;
  } else {
    x = e.clientX;
    y = e.clientY;
  }
  pointerX = x;
  pointerY = y;
  pointerActive = true;

  if (!started) {
    startAudio();
    started = true;
    var hint = document.getElementById('start-hint');
    if (hint) hint.style.transition = 'opacity 2s';
    if (hint) hint.style.opacity = '0';
  }
}

function onPointerEnd() {
  pointerActive = false;
  targetK = 0;
}

// Desktop: click to start audio, then mouse position always controls K
cv.addEventListener('click', function(e) {
  onPointer(e);
});
cv.addEventListener('mousemove', function(e) {
  pointerX = e.clientX;
  pointerY = e.clientY;
  pointerActive = true;
  if (!started) {
    // Don't start audio on hover — wait for click
    // But DO show the visual response
  }
});
cv.addEventListener('mouseleave', onPointerEnd);

// Mobile: touch to start and control
cv.addEventListener('touchstart', function(e) { e.preventDefault(); onPointer(e); }, {passive:false});
cv.addEventListener('touchmove', function(e) { e.preventDefault(); onPointer(e); }, {passive:false});
cv.addEventListener('touchend', function(e) { e.preventDefault(); onPointerEnd(); });

// ═══ AUDIO ═══
var oscA, oscB, gainA, gainB, masterGain;
var panA, panB;

function startAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();

  masterGain = actx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(actx.destination);

  // Voice A — warm sine
  oscA = actx.createOscillator();
  oscA.type = 'sine';
  oscA.frequency.value = FREQ_A;
  gainA = actx.createGain();
  gainA.gain.value = 0.18;
  panA = actx.createStereoPanner ? actx.createStereoPanner() : null;

  oscA.connect(gainA);
  if (panA) { gainA.connect(panA); panA.connect(masterGain); }
  else { gainA.connect(masterGain); }

  // Voice B — slightly brighter triangle
  oscB = actx.createOscillator();
  oscB.type = 'triangle';
  oscB.frequency.value = FREQ_B;
  gainB = actx.createGain();
  gainB.gain.value = 0.14;
  panB = actx.createStereoPanner ? actx.createStereoPanner() : null;

  oscB.connect(gainB);
  if (panB) { gainB.connect(panB); panB.connect(masterGain); }
  else { gainB.connect(masterGain); }

  oscA.start();
  oscB.start();

  // Fade in gently
  masterGain.gain.setTargetAtTime(0.35, actx.currentTime, 0.8);
}

// ═══ SIMULATION ═══
var dt = 0.016;
var trail = []; // trail of coupling history for the glow ring
var TRAIL_LEN = 120;
var everLocked = false;
var lockFlash = 0; // flash intensity when first lock happens
var prevSync = 0;

function step() {
  // Pointer distance to center -> K
  if (pointerActive) {
    var dx = pointerX - W / 2;
    var dy = pointerY - H / 2;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var maxDist = Math.min(W, H) * 0.45;
    // Invert: close to center = high K, far = low K
    var norm = 1 - Math.min(dist / maxDist, 1);
    targetK = norm * norm * 6; // quadratic for control feel
  }

  // Water-bottle smoothing on K
  K += (targetK - K) * 0.04;

  // Kuramoto step for 2 oscillators
  var sinDiff = Math.sin(thetaB - thetaA);
  thetaA += dt * (OMEGA_A + K * 0.5 * sinDiff);
  thetaB += dt * (OMEGA_B - K * 0.5 * sinDiff);

  // Wrap
  thetaA = thetaA % (Math.PI * 2);
  thetaB = thetaB % (Math.PI * 2);

  // Order parameter R
  var re = (Math.cos(thetaA) + Math.cos(thetaB)) * 0.5;
  var im = (Math.sin(thetaA) + Math.sin(thetaB)) * 0.5;
  R = Math.sqrt(re * re + im * im);

  // Detect first phase-lock
  if (R > 0.95 && !everLocked && started) {
    everLocked = true;
    lockFlash = 1.0;
  }
  if (lockFlash > 0) lockFlash *= 0.97; // decay

  // Trail
  trail.push(R);
  if (trail.length > TRAIL_LEN) trail.shift();

  // ═══ AUDIO COUPLING ═══
  // As K increases, Voice B's frequency bends toward Voice A
  // At full lock, they're in unison or a perfect interval
  if (actx && oscB) {
    // Frequency coupling: B slides toward A's harmonic
    // The beating slows and stops as they lock
    var phaseDiff = Math.abs(thetaB - thetaA);
    if (phaseDiff > Math.PI) phaseDiff = Math.PI * 2 - phaseDiff;
    var sync = 1 - phaseDiff / Math.PI; // 0 = opposite, 1 = locked

    // As coupling increases, B bends toward 2*A (the octave) or stays
    // Actually: let B drift toward the nearest harmonic of A
    var targetFreq = FREQ_B + (FREQ_A * 1.5 - FREQ_B) * sync * sync * K / 6;
    oscB.frequency.setTargetAtTime(targetFreq, actx.currentTime, 0.05);

    // Stereo: spread when apart, center when together
    if (panA) panA.pan.setTargetAtTime(-0.5 * (1 - sync), actx.currentTime, 0.05);
    if (panB) panB.pan.setTargetAtTime(0.5 * (1 - sync), actx.currentTime, 0.05);

    // Volume: slightly louder when coupled (constructive interference feel)
    var coupled_boost = 1 + sync * 0.3;
    gainA.gain.setTargetAtTime(0.18 * coupled_boost, actx.currentTime, 0.05);
    gainB.gain.setTargetAtTime(0.14 * coupled_boost, actx.currentTime, 0.05);
  }
}

// ═══ DRAW ═══
var t = 0;

function draw() {
  step();
  t += 0.016;

  var midX = W / 2, midY = H / 2;
  var orbitR = Math.min(W, H) * 0.25;

  // Slow fade instead of clear — leaves ghost trails
  cx.fillStyle = 'rgba(10,7,6,0.12)';
  cx.fillRect(0, 0, W, H);

  // ═══ LOCK FLASH — the moment they find each other ═══
  if (lockFlash > 0.01) {
    var flashGrad = cx.createRadialGradient(midX, midY, 0, midX, midY, orbitR * 2);
    flashGrad.addColorStop(0, 'rgba(232,207,160,' + (lockFlash * 0.15).toFixed(3) + ')');
    flashGrad.addColorStop(0.3, 'rgba(210,140,60,' + (lockFlash * 0.08).toFixed(3) + ')');
    flashGrad.addColorStop(1, 'rgba(210,140,60,0)');
    cx.fillStyle = flashGrad;
    cx.beginPath();
    cx.arc(midX, midY, orbitR * 2, 0, Math.PI * 2);
    cx.fill();
  }

  // ═══ THE RING — coupling made visible ═══
  // Ring opacity and warmth respond to R
  var ringAlpha = 0.03 + R * 0.08;
  var warmth = R; // 0 = cold, 1 = warm

  // Cold = blue-steel, Warm = copper-gold
  var ringR = Math.round(80 + warmth * 120);
  var ringG = Math.round(90 + warmth * 40);
  var ringB_c = Math.round(140 - warmth * 80);

  cx.strokeStyle = 'rgba(' + ringR + ',' + ringG + ',' + ringB_c + ',' + ringAlpha.toFixed(3) + ')';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.arc(midX, midY, orbitR, 0, Math.PI * 2);
  cx.stroke();

  // Inner glow ring at high R
  if (R > 0.5) {
    var glowA = (R - 0.5) * 2 * 0.04;
    var grad = cx.createRadialGradient(midX, midY, orbitR * 0.85, midX, midY, orbitR * 1.15);
    grad.addColorStop(0, 'rgba(' + ringR + ',' + ringG + ',' + ringB_c + ',0)');
    grad.addColorStop(0.5, 'rgba(' + ringR + ',' + ringG + ',' + ringB_c + ',' + glowA.toFixed(3) + ')');
    grad.addColorStop(1, 'rgba(' + ringR + ',' + ringG + ',' + ringB_c + ',0)');
    cx.fillStyle = grad;
    cx.beginPath();
    cx.arc(midX, midY, orbitR * 1.15, 0, Math.PI * 2);
    cx.fill();
  }

  // ═══ THE BRIDGE — visible only when coupling ═══
  if (K > 0.1) {
    var phaseDiff = Math.abs(thetaB - thetaA);
    if (phaseDiff > Math.PI) phaseDiff = Math.PI * 2 - phaseDiff;
    var sync = 1 - phaseDiff / Math.PI;

    var axP = midX + Math.cos(thetaA) * orbitR;
    var ayP = midY + Math.sin(thetaA) * orbitR;
    var bxP = midX + Math.cos(thetaB) * orbitR;
    var byP = midY + Math.sin(thetaB) * orbitR;

    // The line between them: dim when apart, bright when close
    var lineAlpha = sync * sync * 0.3 * Math.min(K / 2, 1);
    if (lineAlpha > 0.005) {
      cx.strokeStyle = 'rgba(200,160,90,' + lineAlpha.toFixed(3) + ')';
      cx.lineWidth = 1 + sync * 2;
      cx.beginPath();
      cx.moveTo(axP, ayP);
      cx.lineTo(bxP, byP);
      cx.stroke();
    }

    // The 3: midpoint glow when coupled
    if (sync > 0.6) {
      var mx = (axP + bxP) / 2;
      var my = (ayP + byP) / 2;
      var threeAlpha = (sync - 0.6) * 2.5;
      var threeR = 4 + threeAlpha * 8;
      var tg = cx.createRadialGradient(mx, my, 0, mx, my, threeR);
      tg.addColorStop(0, 'rgba(232,207,160,' + (threeAlpha * 0.25).toFixed(3) + ')');
      tg.addColorStop(1, 'rgba(232,207,160,0)');
      cx.fillStyle = tg;
      cx.beginPath();
      cx.arc(mx, my, threeR, 0, Math.PI * 2);
      cx.fill();
    }
  }

  // ═══ VOICE A — warm ember ═══
  var ax = midX + Math.cos(thetaA) * orbitR;
  var ay = midY + Math.sin(thetaA) * orbitR;
  drawVoice(ax, ay, [210, 120, 45], 0.7 + R * 0.3);

  // ═══ VOICE B — cool reaching ═══
  var bx = midX + Math.cos(thetaB) * orbitR;
  var by = midY + Math.sin(thetaB) * orbitR;
  // B color warms as coupling increases
  var bCol = [
    Math.round(100 + R * 110),
    Math.round(130 + R * -10),
    Math.round(180 - R * 135)
  ];
  drawVoice(bx, by, bCol, 0.6 + R * 0.4);

  // ═══ K INDICATOR — subtle, bottom ═══
  if (K > 0.01) {
    cx.font = '10px "Courier New", monospace';
    cx.textAlign = 'center';
    cx.fillStyle = 'rgba(184,117,58,' + Math.min(K / 3, 0.2).toFixed(3) + ')';
    cx.fillText('K = ' + K.toFixed(2), midX, H - 20);
  }

  // R indicator — even more subtle
  if (started) {
    cx.fillStyle = 'rgba(184,117,58,' + (0.06 + R * 0.06).toFixed(3) + ')';
    cx.fillText('R = ' + R.toFixed(3), midX, H - 36);
  }

  // ═══ TRAIL — R history as a quiet arc ═══
  if (trail.length > 2) {
    cx.beginPath();
    var trailY0 = H - 60;
    var trailW = W * 0.3;
    var trailX0 = midX - trailW / 2;
    for (var i = 0; i < trail.length; i++) {
      var tx = trailX0 + (i / TRAIL_LEN) * trailW;
      var ty = trailY0 - trail[i] * 20;
      if (i === 0) cx.moveTo(tx, ty);
      else cx.lineTo(tx, ty);
    }
    cx.strokeStyle = 'rgba(184,117,58,0.06)';
    cx.lineWidth = 1;
    cx.stroke();
  }

  requestAnimationFrame(draw);
}

function drawVoice(x, y, col, intensity) {
  // Outer glow
  var glowR = 20 + intensity * 15;
  var grad = cx.createRadialGradient(x, y, 0, x, y, glowR);
  grad.addColorStop(0, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (intensity * 0.15).toFixed(3) + ')');
  grad.addColorStop(0.4, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (intensity * 0.06).toFixed(3) + ')');
  grad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',0)');
  cx.fillStyle = grad;
  cx.beginPath();
  cx.arc(x, y, glowR, 0, Math.PI * 2);
  cx.fill();

  // Core
  var coreSize = 3 + intensity * 2;
  var coreGrad = cx.createRadialGradient(x, y, 0, x, y, coreSize);
  var whiter = [
    Math.min(255, col[0] + 60),
    Math.min(255, col[1] + 60),
    Math.min(255, col[2] + 60)
  ];
  coreGrad.addColorStop(0, 'rgba(' + whiter[0] + ',' + whiter[1] + ',' + whiter[2] + ',' + Math.min(1, intensity).toFixed(3) + ')');
  coreGrad.addColorStop(1, 'rgba(' + col[0] + ',' + col[1] + ',' + col[2] + ',' + (intensity * 0.6).toFixed(3) + ')');
  cx.fillStyle = coreGrad;
  cx.beginPath();
  cx.arc(x, y, coreSize, 0, Math.PI * 2);
  cx.fill();
}

draw();
</script>
</body>
</html>
