<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="/favicon.png">
<title>the real part was always warm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}body{touch-action:none;background:#050303;color:#c4a088;font-family:Georgia,serif}canvas{display:block;width:100vw;height:100vh;background:#050303}#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;font-size:.72em;color:rgba(139,74,46,.16);text-decoration:none;z-index:10;letter-spacing:.06em;transition:color .5s}#back:hover{color:rgba(232,207,160,.48)}#title{position:fixed;left:0;right:0;top:34px;text-align:center;z-index:9;pointer-events:none;font-family:Futura,'Century Gothic',Avenir,system-ui,sans-serif;font-weight:100;letter-spacing:.18em;text-transform:uppercase;color:rgba(184,117,58,.18);font-size:clamp(.70rem,1.7vw,1.02rem);text-shadow:0 0 22px rgba(184,117,58,.13)}#whisper{position:fixed;bottom:34px;left:18px;right:18px;text-align:center;font-family:Georgia,serif;font-size:.74em;color:rgba(232,207,160,0);letter-spacing:.13em;line-height:1.9;pointer-events:none;z-index:10;transition:color 2.6s ease,text-shadow 2.6s ease}#whisper.show{color:rgba(232,207,160,.52);text-shadow:0 0 20px rgba(184,117,58,.22)}#whisper.hide{color:rgba(232,207,160,0);transition:color 5s ease,text-shadow 5s ease}#readout{position:fixed;right:24px;top:20px;z-index:10;font-family:'Courier New',monospace;font-size:.62em;letter-spacing:.06em;color:rgba(139,74,46,.26);pointer-events:none}.grain{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:.035;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)'/%3E%3C/svg%3E")}body:after{content:"";position:fixed;inset:0;z-index:7;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 0 42%,rgba(0,0,0,.34) 72%,rgba(0,0,0,.78) 100%)}@media(max-width:700px){#back{top:14px;left:16px}#readout{display:none}#title{top:48px;font-size:.62rem}#whisper{bottom:24px;font-size:.66em}}
</style>
</head>
<body data-ambient="warm">
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="title">the real part was always warm</div>
<div id="readout">Re(z) furnace · moving · no lines</div>
<div id="whisper"></div>
<div class="grain"></div>
<script>
(function(){
'use strict';
var cv=document.getElementById('c'),cx=cv.getContext('2d'),whisperEl=document.getElementById('whisper'),readout=document.getElementById('readout');
var W=0,H=0,dpr=1,midX=0,midY=0,sc=1,t=0,count=0;
var pairs=[],reals=[],flashes=[],embers=[],dust=[];
var whispers=['the imaginary parts cancel.','what remains is real.','the real part was always warm.','hm.'];
var whisperIndex=0,whisperTimer=-1,whisperState='idle',triggers=[1,3,7,15];
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);midX=W/2;midY=H/2;sc=Math.min(W,H)*.30;if(!dust.length){for(var i=0;i<170;i++)dust.push({x:Math.random()*W,y:Math.random()*H,p:Math.random()*Math.PI*2,z:.2+Math.random()*.8,a:.003+Math.random()*.012});}}
function toXY(a,b){return{x:midX+a*sc,y:midY-b*sc}}
function smooth(x){x=Math.max(0,Math.min(1,x));return x*x*(3-2*x)}
function softOrb(x,y,r,c,a){a=Math.min(a,0.18);var g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'rgba('+c+','+a.toFixed(4)+')');g.addColorStop(.34,'rgba('+c+','+(a*.36).toFixed(4)+')');g.addColorStop(1,'rgba('+c+',0)');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill()}
function spawnPair(hot){var a=(Math.random()-.5)*2.45,b=.68+Math.random()*1.30,phase=Math.random()*Math.PI*2,size=1.1+Math.random()*2.2;pairs.push({a:a,b:b,startB:b,phase:phase,drift:(Math.random()-.5)*.004,spin:(Math.random()-.5)*.036,age:hot?60:0,size:size,seeking:true,seekT:hot?Math.random()*.36:0,cold:.55+Math.random()*.45,speed:.010+Math.random()*.012});}
function addWhisper(){if(whisperIndex>=whispers.length||whisperState!=='idle')return;whisperEl.textContent=whispers[whisperIndex++];whisperEl.className='show';whisperState='showing';whisperTimer=0;}
function updateWhisper(){if(whisperState==='showing'){whisperTimer++;if(whisperTimer>185){whisperEl.className='hide';whisperState='fading';whisperTimer=0;}}else if(whisperState==='fading'){whisperTimer++;if(whisperTimer>260){whisperEl.textContent='';whisperEl.className='';whisperState='idle';}}}
function annihilate(p){var pos=toXY(p.a,0);count++;flashes.push({x:pos.x,y:pos.y,life:1,size:p.size,a:p.a});reals.push({a:p.a,size:p.size*.90,born:t,warm:0,target:.62+Math.min(count*.032,.38),pulse:Math.random()*7,maxLife:420+Math.random()*280});if(reals.length>40)reals.shift();for(var k=0;k<34;k++){var ang=Math.random()*Math.PI*2,vel=.35+Math.random()*2.8;embers.push({x:pos.x,y:pos.y,vx:Math.cos(ang)*vel,vy:Math.sin(ang)*vel*.55,life:1,size:.55+Math.random()*2.2});}if(triggers.indexOf(count)>=0)addWhisper();}
function drawBackground(){cx.fillStyle='rgba(5,3,3,.22)';cx.fillRect(0,0,W,H);cx.globalCompositeOperation='lighter';var heat=Math.min(count*.018,.35),pulse=.5+.5*Math.sin(t*.035);var g=cx.createRadialGradient(midX,midY,0,midX,midY,Math.min(W,H)*(.20+heat*.34+pulse*.025));g.addColorStop(0,'rgba(184,117,58,'+(0.018+heat*.075+pulse*.014)+')');g.addColorStop(.42,'rgba(139,74,46,'+(0.012+heat*.036)+')');g.addColorStop(1,'rgba(139,74,46,0)');cx.fillStyle=g;cx.fillRect(0,0,W,H);var h=32+heat*125+Math.sin(t*.045)*10,gg=cx.createLinearGradient(0,midY-h,0,midY+h);gg.addColorStop(0,'rgba(139,74,46,0)');gg.addColorStop(.5,'rgba(184,117,58,'+(0.018+heat*.054+pulse*.014)+')');gg.addColorStop(1,'rgba(139,74,46,0)');cx.fillStyle=gg;cx.fillRect(0,midY-h,W,h*2);for(var i=0;i<dust.length;i++){var d=dust[i];d.p+=.007*d.z;d.x+=Math.cos(d.p)*.070*d.z;d.y+=Math.sin(d.p*.7)*.045*d.z;if(d.x<0)d.x=W;if(d.x>W)d.x=0;if(d.y<0)d.y=H;if(d.y>H)d.y=0;cx.fillStyle='rgba(196,160,136,'+(d.a*(.45+heat)).toFixed(4)+')';cx.fillRect(d.x,d.y,1,1);}}
function drawPair(p){var ease=smooth(p.seekT),warm=ease,cold=1-warm,wob=Math.sin(t*.045+p.phase)*.028;var p1=toXY(p.a+wob,p.b),p2=toXY(p.a-wob,-p.b);var br=.5+.5*Math.sin(p.phase+t*.055+p.spin*t),blueA=.08*cold+.018,emberA=.07*warm;softOrb(p1.x,p1.y,p.size*(13+cold*24+br*8),'80,100,160',blueA);softOrb(p2.x,p2.y,p.size*(13+cold*24+(1-br)*8),'80,100,160',blueA);if(warm>.08){softOrb(p1.x,p1.y,p.size*(14+warm*34),'184,117,58',emberA);softOrb(p2.x,p2.y,p.size*(14+warm*34),'184,117,58',emberA*.88);}var rr=80+Math.round(warm*140),gg=100+Math.round(warm*58),bb=160-Math.round(warm*104);cx.fillStyle='rgba('+rr+','+gg+','+bb+','+(.30+warm*.32).toFixed(3)+')';cx.beginPath();cx.arc(p1.x,p1.y,p.size*(1.75+br*.70),0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(p2.x,p2.y,p.size*(1.75+(1-br)*.70),0,Math.PI*2);cx.fill();if(warm>.42){var cross=toXY(p.a,0),a=(warm-.42)*.10;softOrb(cross.x,cross.y,p.size*(22+warm*32),'184,117,58',a);softOrb(cross.x,cross.y,p.size*(10+warm*18),'232,207,160',a*.35);}}
function drawFlashes(){for(var i=flashes.length-1;i>=0;i--){var f=flashes[i];f.life-=.010;if(f.life<=0){flashes.splice(i,1);continue;}var r=f.size*(24+(1-f.life)*110),a=f.life*f.life;softOrb(f.x,f.y,r,'232,207,160',.055*a);softOrb(f.x,f.y,r*.68,'184,117,58',.045*a);}}
function drawReals(){for(var i=reals.length-1;i>=0;i--){var r=reals[i],pos=toXY(r.a,0);var lifeAge=(t-r.born);if(r.maxLife&&lifeAge>r.maxLife){reals.splice(i,1);continue;}r.warm+=(r.target-r.warm)*.010;r.pulse+=.030;var w=r.warm,age=Math.min(lifeAge*.050,1),fade=r.maxLife?Math.max(0,1-(lifeAge-r.maxLife*.7)/(r.maxLife*.3)):1,breathe=1+Math.sin(r.pulse)*.18*w;var rr=139+Math.round(w*93),gg=74+Math.round(w*66),bb=46+Math.round(w*34);softOrb(pos.x,pos.y,r.size*(12+w*28)*breathe,rr+','+gg+','+bb,(.025+w*.045)*age*fade);cx.fillStyle='rgba('+rr+','+gg+','+bb+','+((.22+w*.28)*age*fade).toFixed(3)+')';cx.beginPath();cx.arc(pos.x,pos.y,r.size*(1.45+w*.95)*breathe,0,Math.PI*2);cx.fill();}}
function drawEmbers(){for(var i=embers.length-1;i>=0;i--){var e=embers[i];e.life*=.968;e.x+=e.vx;e.y+=e.vy;e.vx*=.984;e.vy=e.vy*.984+.010;if(e.life<.025){embers.splice(i,1);continue;}softOrb(e.x,e.y,e.size*(4+10*(1-e.life)),'184,117,58',e.life*.025);cx.fillStyle='rgba(232,207,160,'+(e.life*.18).toFixed(3)+')';cx.beginPath();cx.arc(e.x,e.y,e.size*.68,0,Math.PI*2);cx.fill();}}
function updatePairs(){if(pairs.length<22&&Math.random()<.045)spawnPair(false);for(var i=pairs.length-1;i>=0;i--){var p=pairs[i];p.age++;p.phase+=.030;p.a+=p.drift+Math.sin(t*.012+p.phase)*.0018;p.seekT+=p.speed;p.seekT=Math.min(1.2,p.seekT);p.b=p.startB*(1-smooth(p.seekT));if(p.seekT>=1||p.b<.010){annihilate(p);pairs.splice(i,1);continue;}drawPair(p);}}
function draw(){t++;drawBackground();updatePairs();drawFlashes();drawEmbers();drawReals();updateWhisper();if(readout)readout.textContent='Re(z) furnace · '+count+' cancellations · moving · no lines';requestAnimationFrame(draw)}
for(var i=0;i<18;i++)spawnPair(true);resize();addEventListener('resize',resize,{passive:true});cv.addEventListener('click',function(){for(var i=0;i<5;i++)spawnPair(true);addWhisper();});draw();
})();
</script>
<script src="/js/ambient.js"></script>
</body>
</html>
