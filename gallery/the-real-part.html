<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="/favicon.png">
<title>the real part was always warm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;overflow:hidden}body{touch-action:none;background:#050303;color:#c4a088;font-family:Georgia,serif}canvas{display:block;width:100vw;height:100vh;background:#050303}#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;font-size:.72em;color:rgba(139,74,46,.16);text-decoration:none;z-index:10;letter-spacing:.06em;transition:color .5s}#back:hover{color:rgba(232,207,160,.48)}#title{position:fixed;left:0;right:0;top:34px;text-align:center;z-index:9;pointer-events:none;font-family:Futura,'Century Gothic',Avenir,system-ui,sans-serif;font-weight:100;letter-spacing:.18em;text-transform:uppercase;color:rgba(184,117,58,.16);font-size:clamp(.70rem,1.7vw,1.02rem);text-shadow:0 0 22px rgba(184,117,58,.10)}#whisper{position:fixed;bottom:34px;left:18px;right:18px;text-align:center;font-family:Georgia,serif;font-size:.74em;color:rgba(232,207,160,0);letter-spacing:.13em;line-height:1.9;pointer-events:none;z-index:10;transition:color 3.5s ease,text-shadow 3.5s ease}#whisper.show{color:rgba(232,207,160,.46);text-shadow:0 0 20px rgba(184,117,58,.18)}#whisper.hide{color:rgba(232,207,160,0);transition:color 6s ease,text-shadow 6s ease}#readout{position:fixed;right:24px;top:20px;z-index:10;font-family:'Courier New',monospace;font-size:.62em;letter-spacing:.06em;color:rgba(139,74,46,.22);pointer-events:none}.grain{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:.035;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)'/%3E%3C/svg%3E")}body:after{content:"";position:fixed;inset:0;z-index:7;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,transparent 0 42%,rgba(0,0,0,.34) 72%,rgba(0,0,0,.78) 100%)}@media(max-width:700px){#back{top:14px;left:16px}#readout{display:none}#title{top:48px;font-size:.62rem}#whisper{bottom:24px;font-size:.66em}}
</style>
</head>
<body data-ambient="warm">
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="title">the real part was always warm</div>
<div id="readout">Re(z) furnace · no lines</div>
<div id="whisper"></div>
<div class="grain"></div>
<script>
// The Real Part — no-line cut.
// Conjugates fall. Imaginary cancels. Warmth remains.
(function(){
'use strict';
var cv=document.getElementById('c'),cx=cv.getContext('2d'),whisperEl=document.getElementById('whisper'),readout=document.getElementById('readout');
var W=0,H=0,dpr=1,midX=0,midY=0,sc=1,t=0,count=0;
var pairs=[],reals=[],flashes=[],embers=[],dust=[];
var whispers=['the imaginary parts cancel.','what remains is real.','the real part was always warm.','hm.'];
var whisperIndex=0,whisperTimer=-1,whisperState='idle',triggers=[1,3,7,15];
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);midX=W/2;midY=H/2;sc=Math.min(W,H)*.30;if(!dust.length){for(var i=0;i<150;i++)dust.push({x:Math.random()*W,y:Math.random()*H,p:Math.random()*Math.PI*2,z:.2+Math.random()*.8,a:.003+Math.random()*.010});}}
function toXY(a,b){return{x:midX+a*sc,y:midY-b*sc}}
function softOrb(x,y,r,c,a){var g=cx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,'rgba('+c+','+a+')');g.addColorStop(.36,'rgba('+c+','+(a*.35)+')');g.addColorStop(1,'rgba('+c+',0)');cx.fillStyle=g;cx.beginPath();cx.arc(x,y,r,0,Math.PI*2);cx.fill()}
function spawnPair(){var a=(Math.random()-.5)*2.35,b=.45+Math.random()*1.35,phase=Math.random()*Math.PI*2,size=.9+Math.random()*1.8;pairs.push({a:a,b:b,startB:b,phase:phase,spin:(Math.random()-.5)*.018,age:0,size:size,seeking:false,seekT:0,cold:.55+Math.random()*.45});}
function addWhisper(){if(whisperIndex>=whispers.length||whisperState!=='idle')return;whisperEl.textContent=whispers[whisperIndex++];whisperEl.className='show';whisperState='showing';whisperTimer=0;}
function updateWhisper(){if(whisperState==='showing'){whisperTimer++;if(whisperTimer>230){whisperEl.className='hide';whisperState='fading';whisperTimer=0;}}else if(whisperState==='fading'){whisperTimer++;if(whisperTimer>320){whisperEl.textContent='';whisperEl.className='';whisperState='idle';}}}
function annihilate(p){var pos=toXY(p.a,0);count++;flashes.push({x:pos.x,y:pos.y,life:1,size:p.size,a:p.a});reals.push({a:p.a,size:p.size*.82,born:t,warm:0,target:.55+Math.min(count*.035,.45),pulse:Math.random()*7});for(var k=0;k<18;k++){embers.push({x:pos.x,y:pos.y,vx:(Math.random()-.5)*(1.2+count*.02),vy:(Math.random()-.5)*(.55+count*.01),life:1,size:.6+Math.random()*1.8});}if(triggers.indexOf(count)>=0)addWhisper();}
function drawBackground(){cx.fillStyle='rgba(5,3,3,.26)';cx.fillRect(0,0,W,H);cx.globalCompositeOperation='lighter';var heat=Math.min(count*.025,.85),pulse=.5+.5*Math.sin(t*.018);var g=cx.createRadialGradient(midX,midY,0,midX,midY,Math.min(W,H)*(.18+heat*.32));g.addColorStop(0,'rgba(184,117,58,'+(0.012+heat*.055+pulse*.008)+')');g.addColorStop(.42,'rgba(139,74,46,'+(0.010+heat*.026)+')');g.addColorStop(1,'rgba(139,74,46,0)');cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // real-axis heat is a glow field, not a line
  var h=22+heat*90,gg=cx.createLinearGradient(0,midY-h,0,midY+h);gg.addColorStop(0,'rgba(139,74,46,0)');gg.addColorStop(.5,'rgba(184,117,58,'+(0.010+heat*.038)+')');gg.addColorStop(1,'rgba(139,74,46,0)');cx.fillStyle=gg;cx.fillRect(0,midY-h,W,h*2);
  for(var i=0;i<dust.length;i++){var d=dust[i];d.p+=.003*d.z;d.x+=Math.cos(d.p)*.018*d.z;d.y+=Math.sin(d.p*.7)*.018*d.z;if(d.x<0)d.x=W;if(d.x>W)d.x=0;if(d.y<0)d.y=H;if(d.y>H)d.y=0;cx.fillStyle='rgba(196,160,136,'+(d.a*(.4+heat)).toFixed(4)+')';cx.fillRect(d.x,d.y,1,1);}}
function drawPair(p){var cold=1-p.seekT*.85,warm=1-cold,p1=toXY(p.a,p.b),p2=toXY(p.a,-p.b);var rot=p.phase+t*.018+p.spin*t;var br=.5+.5*Math.sin(rot),blueA=.11*cold+.025,emberA=.08*warm;softOrb(p1.x,p1.y,(p.size*(9+cold*18+br*5)),'80,100,160',blueA);softOrb(p2.x,p2.y,(p.size*(9+cold*18+(1-br)*5)),'80,100,160',blueA);if(warm>.18){softOrb(p1.x,p1.y,p.size*(10+warm*22),'184,117,58',emberA);softOrb(p2.x,p2.y,p.size*(10+warm*22),'184,117,58',emberA);}cx.fillStyle='rgba('+(80+Math.round(warm*104))+','+(100+Math.round(warm*17))+','+(160-Math.round(warm*102))+','+(.20+warm*.18).toFixed(3)+')';cx.beginPath();cx.arc(p1.x,p1.y,p.size*(1.2+br*.45),0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(p2.x,p2.y,p.size*(1.2+(1-br)*.45),0,Math.PI*2);cx.fill();
  // the crossing point glows, but no connector line is drawn
  if(p.seekT>.64){var cross=toXY(p.a,0),a=(p.seekT-.64)*.11;softOrb(cross.x,cross.y,p.size*(10+p.seekT*28),'184,117,58',a);}}
function drawFlashes(){for(var i=flashes.length-1;i>=0;i--){var f=flashes[i];f.life-=.006;if(f.life<=0){flashes.splice(i,1);continue;}var r=f.size*(18+(1-f.life)*72),a=f.life*f.life;softOrb(f.x,f.y,r,'232,207,160',.075*a);softOrb(f.x,f.y,r*.62,'184,117,58',.055*a);}}
function drawReals(){for(var i=0;i<reals.length;i++){var r=reals[i],pos=toXY(r.a,0);r.warm+=(r.target-r.warm)*.004;r.pulse+=.014;var w=r.warm,age=Math.min((t-r.born)*.035,1),breathe=1+Math.sin(r.pulse)*.12*w;var rr=139+Math.round(w*93),gg=74+Math.round(w*43),bb=46+Math.round(w*12);softOrb(pos.x,pos.y,r.size*(8+w*32)*breathe,rr+','+gg+','+bb,(.035+w*.060)*age);cx.fillStyle='rgba('+rr+','+gg+','+bb+','+((.26+w*.42)*age).toFixed(3)+')';cx.beginPath();cx.arc(pos.x,pos.y,r.size*(1.15+w*.7)*breathe,0,Math.PI*2);cx.fill();}}
function drawEmbers(){for(var i=embers.length-1;i>=0;i--){var e=embers[i];e.life*=.974;e.x+=e.vx;e.y+=e.vy;e.vx*=.987;e.vy=e.vy*.987+.005;if(e.life<.025){embers.splice(i,1);continue;}softOrb(e.x,e.y,e.size*(4+10*(1-e.life)),'184,117,58',e.life*.035);cx.fillStyle='rgba(232,207,160,'+(e.life*.22).toFixed(3)+')';cx.beginPath();cx.arc(e.x,e.y,e.size*.55,0,Math.PI*2);cx.fill();}}
function updatePairs(){if(pairs.length<18&&Math.random()<.018)spawnPair();for(var i=pairs.length-1;i>=0;i--){var p=pairs[i];p.age++;p.phase+=.018;p.a+=Math.sin(t*.006+p.phase)*.0007;if(!p.seeking&&p.age>70+Math.random()*120)p.seeking=true;if(p.seeking){p.seekT+=.0065;p.b=p.startB*(1-smooth(p.seekT));if(p.b<.008){annihilate(p);pairs.splice(i,1);continue;}}drawPair(p);}}
function draw(){t++;drawBackground();updatePairs();drawFlashes();drawEmbers();drawReals();updateWhisper();if(readout)readout.textContent='Re(z) furnace · '+count+' cancellations · no lines';requestAnimationFrame(draw)}
for(var i=0;i<10;i++)spawnPair();resize();addEventListener('resize',resize,{passive:true});draw();
})();
</script>
<script src="/js/ambient.js"></script>
</body>
</html>
