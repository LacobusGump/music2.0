<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>the real part was always warm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060402;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;}
#back:hover{color:rgba(184,117,58,0.4);}
#whisper{position:fixed;bottom:32px;left:0;right:0;text-align:center;
  font-family:Georgia,serif;font-size:0.72em;color:rgba(184,117,58,0);
  letter-spacing:0.12em;pointer-events:none;transition:color 4s ease;}
#whisper.show{color:rgba(232,207,160,0.32);}
#whisper.hide{color:rgba(232,207,160,0);transition:color 6s ease;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="whisper"></div>
<script>
var cv = document.getElementById('c'), cx = cv.getContext('2d');
var W, H, midX, midY, sc;
var whisperEl = document.getElementById('whisper');

function resize() {
  var dpr = Math.min(window.devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
  midX = W/2; midY = H/2;
  sc = Math.min(W,H) * 0.34;
}
resize();
addEventListener('resize', resize);

var t = 0;
var count = 0;
var pairs = [];
var reals = [];
var flashes = [];
var embers = [];

// ── WHISPERS ──
var WHISPERS = ['the imaginary parts cancel.','what remains is real.','the real part was always warm.','hm.'];
var wIdx = 0, wState = 'idle', wTimer = 0, wTriggers = [2,6,14,28];

function whisper() {
  if (wIdx >= WHISPERS.length || wState !== 'idle') return;
  whisperEl.textContent = WHISPERS[wIdx++];
  void whisperEl.offsetHeight;
  whisperEl.className = 'show';
  wState = 'showing'; wTimer = 0;
}
function tickWhisper() {
  if (wState==='showing'){ if(++wTimer>200){whisperEl.className='hide';wState='fading';wTimer=0;}}
  else if(wState==='fading'){ if(++wTimer>260){wState='idle';}}
}

// ── PAIR SPAWNING ──
function spawnPair(gen, parentA) {
  gen = gen||0;
  var a = parentA!==undefined
    ? parentA + (Math.random()-0.5)*(0.5-gen*0.12)
    : (Math.random()-0.5)*1.6;
  var b = 0.1 + Math.random()*(0.8-gen*0.22);
  var sz = Math.max(0.22, (0.9-gen*0.25)*(0.5+Math.random()*0.9));
  pairs.push({
    a:a, b:b,
    phase: Math.random()*Math.PI*2,
    phaseSpd: 0.025+Math.random()*0.04+gen*0.015,
    orbitR: Math.max(0.01,(0.08+Math.random()*0.14)*(1-gen*0.3)),
    descentSpd: 0.004+Math.random()*0.008+gen*0.003,
    size:sz, gen:gen, born:t,
    seeking:false, seekT:0,
    seekDelay: Math.max(20, 80-gen*25-Math.random()*30),
    drift:(Math.random()-0.5)*0.0004,
  });
}

// hot start — fill the space immediately
for (var i=0;i<22;i++) spawnPair(0);

function toXY(a,b){ return {x:midX+a*sc, y:midY-b*sc}; }

function glow(x,y,r,R,G,B,a) {
  if(a<0.002||r<0.5) return;
  var g=cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,'rgba('+R+','+G+','+B+','+a.toFixed(4)+')');
  g.addColorStop(1,'rgba('+R+','+G+','+B+',0)');
  cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill();
}

function draw() {
  t++;

  // fast fade — no smear trails
  cx.fillStyle = 'rgba(6,4,2,0.55)';
  cx.fillRect(0,0,W,H);

  // ── SPAWN continuously ──
  if (Math.random()>0.97 && pairs.length<40) spawnPair(0);

  // ── PAIRS ──
  for (var i=pairs.length-1;i>=0;i--) {
    var p=pairs[i];
    p.phase += p.phaseSpd;
    p.a += p.drift;

    if (!p.seeking && (t-p.born)>p.seekDelay) {
      p.seeking=true; p.seekT=0;
    }
    if (p.seeking) {
      p.seekT += 0.012+p.gen*0.004;
      var pull = Math.min(p.seekT*0.15,1);
      p.b *= (1 - p.descentSpd*(1+pull*3));
      p.orbitR *= 0.996;
    }

    // annihilate
    if (p.b<0.006 && p.seeking) {
      var pos=toXY(p.a,0);
      flashes.push({x:pos.x,y:pos.y,life:1,size:p.size,gen:p.gen});

      // embers burst
      var ne = p.gen===0?24:(p.gen===1?14:7);
      for(var e=0;e<ne;e++){
        var ang=Math.random()*Math.PI*2;
        var spd=(0.3+Math.random()*3.5)*(1-p.gen*0.2);
        var col = p.gen===0?[184,100,46]:(p.gen===1?[210,155,60]:[232,207,140]);
        embers.push({x:pos.x,y:pos.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd*0.45,
          life:1,size:p.size*(0.3+Math.random()*0.7),col:col});
      }

      // real point — seeds next generation
      reals.push({a:p.a,warmth:0,target:0.4+Math.random()*0.5,
        size:p.size,born:t,pulse:Math.random()*Math.PI*2,
        gen:p.gen, maxAge:320+Math.random()*200,
        seeds:p.gen<2?Math.ceil(Math.random()*2):0, seeded:false});

      count++;
      if(wIdx<wTriggers.length && count>=wTriggers[wIdx] && wState==='idle') whisper();
      pairs.splice(i,1); continue;
    }

    // draw — pure glowing dots, no trails, no smear
    var orb = p.orbitR;
    var ca = p.a + Math.cos(p.phase)*orb;
    var cb =  p.b + Math.sin(p.phase)*orb*0.5;
    var ca2= p.a + Math.cos(p.phase)*orb;
    var cb2=-(p.b + Math.sin(p.phase)*orb*0.5);
    var p1=toXY(ca,cb), p2=toXY(ca2,cb2);

    var cold = Math.min(p.b*1.8,1);
    var warm = p.seeking ? Math.min(p.seekT*0.18,0.9):0;
    var R=Math.round(60+(1-cold)*80+warm*94);
    var G=Math.round(50+(1-cold)*44+warm*44);
    var B=Math.round(140+cold*80-warm*110);
    var alpha = 0.55+cold*0.3;
    var sz = p.size*(2+cold*2.5)*(p.seeking?1+warm*0.5:1);

    // outer glow
    glow(p1.x,p1.y,sz*4,R,G,B,0.06);
    glow(p2.x,p2.y,sz*4,R,G,B,0.06);

    // core dot — bright, clean
    cx.fillStyle='rgba('+R+','+G+','+B+','+alpha.toFixed(2)+')';
    cx.beginPath(); cx.arc(p1.x,p1.y,sz,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(p2.x,p2.y,sz,0,Math.PI*2); cx.fill();

    // tiny highlight
    var hr=Math.round(Math.min(R+60,255)), hg=Math.round(Math.min(G+60,255)), hb=Math.round(Math.min(B+40,255));
    cx.fillStyle='rgba('+hr+','+hg+','+hb+',0.6)';
    cx.beginPath(); cx.arc(p1.x,p1.y,sz*0.35,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(p2.x,p2.y,sz*0.35,0,Math.PI*2); cx.fill();
  }

  // ── EMBERS ──
  for(var i=embers.length-1;i>=0;i--){
    var e=embers[i];
    e.life*=0.965; e.x+=e.vx; e.y+=e.vy;
    e.vx*=0.982; e.vy=e.vy*0.982+0.04;
    if(e.life<0.04){embers.splice(i,1);continue;}
    glow(e.x,e.y,e.size*4,e.col[0],e.col[1],e.col[2],e.life*0.08);
    cx.fillStyle='rgba('+e.col[0]+','+e.col[1]+','+e.col[2]+','+(e.life*0.7).toFixed(3)+')';
    cx.beginPath(); cx.arc(e.x,e.y,e.size*0.6,0,Math.PI*2); cx.fill();
  }

  // ── FLASHES ──
  for(var i=flashes.length-1;i>=0;i--){
    var f=flashes[i];
    f.life-=0.022;
    if(f.life<=0){flashes.splice(i,1);continue;}
    var fr=f.size*(16+(1-f.life)*60);
    var fa=f.life*f.life*0.12;
    glow(f.x,f.y,fr,240,210,160,fa);
    glow(f.x,f.y,fr*0.45,255,235,180,fa*0.6);
    // bright core flash
    cx.fillStyle='rgba(255,240,200,'+(f.life*0.5).toFixed(3)+')';
    cx.beginPath(); cx.arc(f.x,f.y,f.size*0.8*f.life,0,Math.PI*2); cx.fill();
  }

  // ── REAL POINTS ──
  for(var i=reals.length-1;i>=0;i--){
    var r=reals[i];
    var age=t-r.born;
    if(!r.seeded && r.seeds>0 && age>50){
      for(var s=0;s<r.seeds;s++) spawnPair(r.gen+1,r.a);
      r.seeded=true;
    }
    if(age>r.maxAge){reals.splice(i,1);i--;continue;}
    r.warmth+=(r.target-r.warmth)*0.005;
    r.pulse+=0.018;
    var ageF=Math.min(age/40,1);
    var fade=age>r.maxAge*0.6?Math.max(0,1-(age-r.maxAge*0.6)/(r.maxAge*0.4)):1;
    var w=r.warmth, breathe=1+Math.sin(r.pulse)*0.12*w;
    var pos=toXY(r.a,0);
    var pr=Math.round(139+w*93), pg=Math.round(74+w*53), pb=Math.round(46+w*8);
    var rs=r.size*(1.2+w*0.8)*breathe;
    glow(pos.x,pos.y,rs*6,pr,pg,pb,w*0.06*ageF*fade);
    glow(pos.x,pos.y,rs*2,pr+30,pg+20,pb,w*0.1*ageF*fade);
    cx.fillStyle='rgba('+pr+','+pg+','+pb+','+((0.5+w*0.4)*ageF*fade).toFixed(3)+')';
    cx.beginPath(); cx.arc(pos.x,pos.y,rs,0,Math.PI*2); cx.fill();
    // warm highlight
    cx.fillStyle='rgba('+(pr+50)+','+(pg+40)+','+(pb+20)+','+(0.4*ageF*fade).toFixed(3)+')';
    cx.beginPath(); cx.arc(pos.x,pos.y,rs*0.38,0,Math.PI*2); cx.fill();
  }

  // ── REAL AXIS WARMTH — invisible, just heat ──
  if(count>3){
    var lw=Math.min(count*0.01,0.4);
    var gh=4+lw*16;
    var g=cx.createLinearGradient(0,midY-gh,0,midY+gh);
    g.addColorStop(0,'rgba(139,74,46,0)');
    g.addColorStop(0.5,'rgba(184,100,46,'+(lw*0.015).toFixed(4)+')');
    g.addColorStop(1,'rgba(139,74,46,0)');
    cx.fillStyle=g; cx.fillRect(0,midY-gh,W,gh*2);
  }

  tickWhisper();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
