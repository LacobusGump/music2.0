<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>the real part was always warm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080604;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;}
#back:hover{color:rgba(184,117,58,0.4);}
#whisper{position:fixed;bottom:32px;left:0;right:0;text-align:center;
  font-family:Georgia,serif;font-size:0.72em;color:rgba(184,117,58,0);
  letter-spacing:0.12em;pointer-events:none;transition:color 4s ease;}
#whisper.show{color:rgba(232,207,160,0.28);}
#whisper.hide{color:rgba(232,207,160,0);transition:color 6s ease;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="whisper"></div>
<script>
// the real part was always warm
// conjugate pairs find each other without being told where to look.
// the imaginary parts cancel. what remains is real.
// real points seed new generations — smaller, warmer, closer to center.

var cv = document.getElementById('c'), cx = cv.getContext('2d');
var W, H, midX, midY, sc;
var whisperEl = document.getElementById('whisper');

function resize() {
  var dpr = Math.min(window.devicePixelRatio||1, 2);
  W = innerWidth; H = innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
  midX = W/2; midY = H/2;
  sc = Math.min(W,H) * 0.32;
}
resize();
addEventListener('resize', resize);

var t = 0;
var count = 0;
var pairs = [];
var reals = [];
var flashes = [];
var embers = [];

// ── WHISPERS ──
var whisperTexts = [
  'the imaginary parts cancel.',
  'what remains is real.',
  'the real part was always warm.',
  'hm.',
];
var whisperIndex = 0;
var whisperTriggers = [1, 4, 10, 20];
var whisperState = 'idle';
var whisperTimer = 0;

function triggerWhisper() {
  if (whisperIndex >= whisperTexts.length || whisperState !== 'idle') return;
  whisperEl.textContent = whisperTexts[whisperIndex++];
  void whisperEl.offsetHeight;
  whisperEl.className = 'show';
  whisperState = 'showing';
  whisperTimer = 0;
}

function updateWhisper() {
  if (whisperState === 'showing') {
    if (++whisperTimer > 220) { whisperEl.className = 'hide'; whisperState = 'fading'; whisperTimer = 0; }
  } else if (whisperState === 'fading') {
    if (++whisperTimer > 280) { whisperState = 'idle'; }
  }
}

// ── SPAWN ──
// generation: 0=first, 1=children, 2=grandchildren
// each gen: smaller, faster, closer to axis
function spawnPair(gen, parentA) {
  gen = gen || 0;
  var spread = gen === 0 ? 1.4 : (gen === 1 ? 0.7 : 0.35);
  var a = parentA !== undefined
    ? parentA + (Math.random()-0.5) * spread * 0.5
    : (Math.random()-0.5) * spread;
  var b = 0.12 + Math.random() * (0.7 - gen * 0.18);
  var sz = (1.0 - gen * 0.28) * (0.6 + Math.random() * 0.8);
  sz = Math.max(sz, 0.25);

  pairs.push({
    a: a,
    b: b,
    phase: Math.random() * Math.PI * 2,
    phaseSpeed: (0.008 + Math.random()*0.018) * (gen===0?1:1.4),
    orbitR: (0.06 + Math.random()*0.12) * (1 - gen*0.3),
    descentSpeed: 0.0008 + Math.random()*0.003 + gen*0.001,
    size: sz,
    gen: gen,
    born: t,
    seeking: false,
    seekT: 0,
    seekDelay: gen===0 ? (3+Math.random()*3) : (1.5+Math.random()*2),
    // each pair slowly wanders horizontally
    drift: (Math.random()-0.5) * 0.0003,
    // subtle vertical wobble
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.004 + Math.random()*0.006,
  });
}

// seed the void
for (var i = 0; i < 14; i++) spawnPair(0);

function toXY(a, b) {
  return { x: midX + a*sc, y: midY - b*sc };
}

function softGlow(x, y, r, R, G, B, alpha) {
  if (alpha < 0.001) return;
  var g = cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, 'rgba('+R+','+G+','+B+','+alpha.toFixed(4)+')');
  g.addColorStop(0.45,'rgba('+R+','+G+','+B+','+(alpha*0.2).toFixed(4)+')');
  g.addColorStop(1, 'rgba('+R+','+G+','+B+',0)');
  cx.fillStyle = g;
  cx.beginPath(); cx.arc(x,y,r,0,Math.PI*2); cx.fill();
}

function draw() {
  t += 0.006;

  // slow atmospheric fade — room breathes
  var warmth = Math.min(count * 0.008, 0.6);
  cx.fillStyle = 'rgba(8,6,4,' + (0.018 + warmth*0.004).toFixed(4) + ')';
  cx.fillRect(0,0,W,H);

  // ── SPAWN ──
  if (Math.random() > 0.994 && pairs.length < 32) {
    spawnPair(0);
  }

  // ── PAIRS ──
  for (var i = pairs.length-1; i >= 0; i--) {
    var p = pairs[i];
    p.phase += p.phaseSpeed;
    p.wobble += p.wobbleSpeed;
    p.a += p.drift + Math.sin(p.wobble * 0.7) * 0.0002;

    var age = (t - p.born) / 0.006; // in frames
    if (age > p.seekDelay * 167 && !p.seeking) {
      p.seeking = true; p.seekT = 0;
    }

    if (p.seeking) {
      p.seekT += 0.004 + p.gen * 0.002;
      var pull = Math.min(p.seekT * 0.08, 1);
      p.b *= (1 - p.descentSpeed * (1 + pull * 2));
      p.orbitR *= (1 - 0.0006 * (1 + pull));
    }

    // annihilate
    if (p.b < 0.008 && p.seeking) {
      var pos = toXY(p.a, 0);
      
      // flash
      flashes.push({ x:pos.x, y:pos.y, life:1, size:p.size, gen:p.gen });

      // embers — gen 0 sprays more
      var numEmbers = p.gen === 0 ? 18 : (p.gen === 1 ? 10 : 5);
      for (var e = 0; e < numEmbers; e++) {
        var ang = Math.random()*Math.PI*2;
        var spd = 0.2 + Math.random()*(p.gen===0?2.5:1.5);
        embers.push({
          x:pos.x, y:pos.y,
          vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd*0.5,
          life:1, size:p.size*(0.4+Math.random()*0.6),
          col: p.gen===0 ? [184,117,58] : (p.gen===1 ? [201,164,74] : [232,207,160])
        });
      }

      // real point remains
      reals.push({
        a: p.a, warmth:0,
        targetWarmth: 0.3 + Math.random()*0.5,
        size: p.size*1.05, born:t,
        pulse: Math.random()*Math.PI*2,
        gen: p.gen,
        maxAge: 500 + Math.random()*300,
        // seeds children?
        seeds: p.gen < 2 ? Math.floor(1 + Math.random()*2) : 0,
        seeded: false,
      });

      count++;
      if (whisperIndex < whisperTriggers.length && count >= whisperTriggers[whisperIndex] && whisperState==='idle') {
        triggerWhisper();
      }

      pairs.splice(i,1);
      continue;
    }

    // draw pair
    var orbit = p.orbitR * sc;
    var ca = p.a + Math.cos(p.phase) * p.orbitR;
    var cb =  p.b + Math.sin(p.phase) * p.orbitR * 0.55;
    var ca2= p.a + Math.cos(p.phase) * p.orbitR;
    var cb2=-(p.b + Math.sin(p.phase) * p.orbitR * 0.55);

    var pos1 = toXY(ca, cb);
    var pos2 = toXY(ca2, cb2);

    // color: cold blue → warm ember as they descend
    var coldness = Math.min(p.b * 1.5, 1);
    var warmFrac = p.seeking ? Math.min(p.seekT * 0.12, 0.7) : 0;
    var R = Math.round(65 + (1-coldness)*74 + warmFrac*60);
    var G = Math.round(55 + (1-coldness)*40 + warmFrac*22);
    var B = Math.round(130 + coldness*80 - warmFrac*84);
    var alpha = 0.08 + coldness*0.14;

    var r1 = p.size * (3 + coldness * 4);
    softGlow(pos1.x,pos1.y, r1*3, R,G,B, alpha*0.04);
    softGlow(pos2.x,pos2.y, r1*3, R,G,B, alpha*0.04);

    cx.fillStyle = 'rgba('+R+','+G+','+B+','+alpha.toFixed(3)+')';
    cx.beginPath(); cx.arc(pos1.x,pos1.y,r1*0.6,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(pos2.x,pos2.y,r1*0.6,0,Math.PI*2); cx.fill();

    // connection — only visible when very close, a thin warm thread
    if (p.seeking && p.b < 0.12) {
      var proximity = Math.max(0, 1 - p.b/0.12);
      var lineA = proximity * proximity * 0.04;
      var lr = Math.round(139 + (1-coldness)*45);
      var lg = Math.round(74 + (1-coldness)*43);
      var lb = Math.round(46 + (1-coldness)*12);
      cx.strokeStyle = 'rgba('+lr+','+lg+','+lb+','+lineA.toFixed(4)+')';
      cx.lineWidth = 0.4;
      cx.beginPath(); cx.moveTo(pos1.x,pos1.y); cx.lineTo(pos2.x,pos2.y); cx.stroke();
    }
  }

  // ── EMBERS ──
  for (var i = embers.length-1; i >= 0; i--) {
    var e = embers[i];
    e.life *= 0.972;
    e.x += e.vx; e.y += e.vy;
    e.vx *= 0.986; e.vy = e.vy*0.986 + 0.008;
    if (e.life < 0.03) { embers.splice(i,1); continue; }
    var ea = e.life * 0.18;
    softGlow(e.x,e.y, e.size*3, e.col[0],e.col[1],e.col[2], ea*0.05);
    cx.fillStyle = 'rgba('+e.col[0]+','+e.col[1]+','+e.col[2]+','+ea.toFixed(3)+')';
    cx.beginPath(); cx.arc(e.x,e.y,e.size*0.5,0,Math.PI*2); cx.fill();
  }

  // ── FLASHES ──
  for (var i = flashes.length-1; i >= 0; i--) {
    var f = flashes[i];
    f.life -= 0.006;
    if (f.life <= 0) { flashes.splice(i,1); continue; }
    var fr = f.size * (10 + (1-f.life)*28);
    var fa = f.life * f.life * 0.06;
    softGlow(f.x,f.y, fr, 232,207,160, fa);
    softGlow(f.x,f.y, fr*0.5, 184,117,58, fa*0.5);
  }

  // ── REAL POINTS ──
  for (var i = reals.length-1; i >= 0; i--) {
    var r = reals[i];
    var frameAge = (t - r.born) / 0.006;

    // seed children
    if (!r.seeded && r.seeds > 0 && frameAge > 40) {
      for (var s = 0; s < r.seeds; s++) {
        spawnPair(r.gen+1, r.a);
      }
      r.seeded = true;
    }

    if (frameAge > r.maxAge) { reals.splice(i,1); i--; continue; }

    r.warmth += (r.targetWarmth - r.warmth) * 0.003;
    r.pulse += 0.010;

    var age = Math.min(frameAge / 60, 1);
    var fade = frameAge > r.maxAge*0.65
      ? Math.max(0, 1-(frameAge-r.maxAge*0.65)/(r.maxAge*0.35))
      : 1;

    var w = r.warmth;
    var breathe = 1 + Math.sin(r.pulse) * 0.08 * w;
    var pos = toXY(r.a, 0);

    var pr = Math.round(139 + w*93);
    var pg = Math.round(74 + w*43);
    var pb = Math.round(46 + w*12);

    var gs = r.size * (4 + w*6) * breathe;
    softGlow(pos.x,pos.y, gs, pr,pg,pb, w*0.04*age*fade);
    cx.fillStyle = 'rgba('+pr+','+pg+','+pb+','+((0.18+w*0.32)*age*fade).toFixed(3)+')';
    cx.beginPath(); cx.arc(pos.x,pos.y, r.size*0.8*breathe,0,Math.PI*2); cx.fill();
  }

  // ── AMBIENT WARMTH ALONG REAL AXIS ──
  // builds very slowly — 3+ annihilations
  if (count > 2) {
    var lw = Math.min(count * 0.012, 0.45);
    var gh = 3 + lw*12;
    var g = cx.createLinearGradient(0,midY-gh,0,midY+gh);
    g.addColorStop(0,'rgba(139,74,46,0)');
    g.addColorStop(0.5,'rgba(184,117,58,'+(lw*0.008).toFixed(4)+')');
    g.addColorStop(1,'rgba(139,74,46,0)');
    cx.fillStyle = g;
    cx.fillRect(0,midY-gh,W,gh*2);
  }

  updateWhisper();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
