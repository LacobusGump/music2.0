<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>the real part was always warm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
#whisper{position:fixed;bottom:32px;left:0;right:0;text-align:center;
  font-family:Georgia,serif;font-size:0.72em;color:rgba(184,117,58,0);
  letter-spacing:0.12em;pointer-events:none;
  transition:color 4s ease;}
#whisper.show{color:rgba(232,207,160,0.28);}
#whisper.hide{color:rgba(232,207,160,0);transition:color 6s ease;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="whisper"></div>
<script>
// the real part was always warm
//
// complex numbers live in two dimensions.
// the real axis is horizontal. the imaginary axis is vertical.
//
// z = a + bi has a conjugate z* = a - bi.
// mirror images across the real axis.
//
// when they find each other:
//   (a + bi) + (a - bi) = 2a
//
// the imaginary parts cancel.
// what remains is real.
// the real part was always warm.

var cv = document.getElementById('c'), cx = cv.getContext('2d');
var W, H, midX, midY, sc;
var whisperEl = document.getElementById('whisper');

function resize() {
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);
  midX = W / 2;
  midY = H / 2;
  sc = Math.min(W, H) * 0.3;
}
resize();
addEventListener('resize', resize);

var t = 0;
var count = 0;

// ── DATA ──
var pairs = [];
var reals = [];
var flashes = [];

// ── WHISPER SYSTEM ──
var whisperTexts = [
  'the imaginary parts cancel.',
  'what remains is real.',
  'the real part was always warm.',
  'hm.',
];
var whisperIndex = 0;
var whisperCountTriggers = [1, 3, 6, 15]; // annihilation counts that trigger whispers
var whisperTimer = -1;
var whisperState = 'idle'; // idle, showing, fading

function triggerWhisper(text) {
  whisperEl.textContent = text;
  whisperEl.className = '';
  // force reflow
  void whisperEl.offsetHeight;
  whisperEl.className = 'show';
  whisperState = 'showing';
  whisperTimer = 0;
}

function updateWhisper() {
  if (whisperState === 'showing') {
    whisperTimer += 0.006;
    if (whisperTimer > 3.5) {
      whisperEl.className = 'hide';
      whisperState = 'fading';
      whisperTimer = 0;
    }
  } else if (whisperState === 'fading') {
    whisperTimer += 0.006;
    if (whisperTimer > 4) {
      whisperState = 'idle';
    }
  }
}

// ── PAIRS ──
var nextId = 0;

function spawnPair() {
  var a = (Math.random() - 0.5) * 1.6;
  var b = 0.15 + Math.random() * 0.75;
  var speed = 0.0015 + Math.random() * 0.005;
  var orbitR = 0.03 + Math.random() * 0.15;
  var sz = 0.7 + Math.random() * 1.3;
  var id = nextId++;

  pairs.push({
    id: id,
    a: a,
    b: b,
    phase: Math.random() * Math.PI * 2,
    orbitR: orbitR,
    speed: speed,
    size: sz,
    born: t,
    seeking: false,
    seekT: 0,
  });
}

// initial — sparse. the void starts cold.
for (var i = 0; i < 18; i++) spawnPair();

function toXY(a, b) {
  return { x: midX + a * sc, y: midY - b * sc };
}

function draw() {
  t += 0.005;

  // very slow fade — warm dark instead of cold black
  // the real axis breathes with accumulated warmth
  var roomPulse = Math.sin(t * 0.4) * 0.003 * Math.min(count * 0.08, 1);
  cx.fillStyle = 'rgba(10,7,6,' + (0.01 + Math.min(count * 0.001, 0.01) + roomPulse).toFixed(4) + ')';
  cx.fillRect(0, 0, W, H);

  // ── AXES ──
  // real axis warms from deep brick to ember as annihilations happen
  var rw = Math.min(count * 0.015, 0.8);
  var realAlpha = 0.01 + Math.min(count * 0.004, 0.12);
  cx.strokeStyle = 'rgba(' + Math.round(139 + rw * 45) + ',' + Math.round(74 + rw * 43) + ',' + Math.round(46 + rw * 12) + ',' + realAlpha.toFixed(3) + ')';
  cx.lineWidth = 0.5;
  cx.beginPath();
  cx.moveTo(0, midY);
  cx.lineTo(W, midY);
  cx.stroke();

  // imaginary axis stays cold blue — it belongs to the piece
  var imagAlpha = Math.max(0, 0.035 - count * 0.0012);
  if (imagAlpha > 0.002) {
    cx.strokeStyle = 'rgba(70,90,150,' + imagAlpha.toFixed(3) + ')';
    cx.beginPath();
    cx.moveTo(midX, 0);
    cx.lineTo(midX, H);
    cx.stroke();
  }

  // ── SPAWN ──
  if (Math.random() > 0.992 && pairs.length < 40) {
    spawnPair();
  }

  // ── UPDATE AND DRAW PAIRS ──
  for (var i = pairs.length - 1; i >= 0; i--) {
    var p = pairs[i];
    p.phase += p.speed;

    var age = t - p.born;

    // after a while, begin seeking
    var seekDelay = count === 0 ? 4.0 : (2.0 + Math.random() * 1.5);
    if (age > seekDelay && !p.seeking) {
      p.seeking = true;
      p.seekT = 0;
    }

    if (p.seeking) {
      p.seekT += 0.005;
      var s = Math.min(p.seekT * 0.12, 1);
      p.b *= (1 - 0.0015 * s);
      p.orbitR *= (1 - 0.0008 * s);
    }

    // ── CHECK ANNIHILATION ──
    if (p.b < 0.012 && p.orbitR < 0.015 && p.seeking) {
      var pos = toXY(p.a, 0);
      flashes.push({ x: pos.x, y: pos.y, life: 1, size: p.size });

      reals.push({
        a: p.a,
        warmth: 0,
        targetWarmth: 0.2 + Math.random() * 0.6,
        size: p.size * 1.1,
        born: t,
        pulse: Math.random() * Math.PI * 2,
      });

      count++;

      // whisper check
      if (whisperIndex < whisperCountTriggers.length &&
          count >= whisperCountTriggers[whisperIndex] &&
          whisperState === 'idle') {
        triggerWhisper(whisperTexts[whisperIndex]);
        whisperIndex++;
      }

      pairs.splice(i, 1);
      continue;
    }

    // ── DRAW ──
    var ca = p.a + Math.cos(p.phase) * p.orbitR;
    var cb = p.b + Math.sin(p.phase) * p.orbitR * 0.6;
    var ca2 = p.a + Math.cos(p.phase) * p.orbitR;
    var cb2 = -(p.b + Math.sin(p.phase) * p.orbitR * 0.6);

    var pos1 = toXY(ca, cb);
    var pos2 = toXY(ca2, cb2);

    // cold blue for the imaginary wandering — this stays
    var coldness = Math.min(p.b * 1.3, 1);
    // warming shifts toward ember, not gold
    var warmFrac = p.seeking ? Math.min(p.seekT * 0.15, 0.6) : 0;
    var alpha = 0.1 + coldness * 0.2;

    var cr = Math.round(65 + (1 - coldness) * 74 + warmFrac * 60);
    var cg = Math.round(55 + (1 - coldness) * 40 + warmFrac * 22);
    var cbb = Math.round(130 + coldness * 80 - warmFrac * 84);

    var pts = [pos1, pos2];
    for (var s = 0; s < 2; s++) {
      var pp = pts[s];

      var gl = cx.createRadialGradient(pp.x, pp.y, 0, pp.x, pp.y, p.size * 4.5);
      gl.addColorStop(0, 'rgba(' + cr + ',' + cg + ',' + cbb + ',' + (alpha * 0.05).toFixed(3) + ')');
      gl.addColorStop(1, 'rgba(' + cr + ',' + cg + ',' + cbb + ',0)');
      cx.fillStyle = gl;
      cx.beginPath();
      cx.arc(pp.x, pp.y, p.size * 4.5, 0, Math.PI * 2);
      cx.fill();

      cx.fillStyle = 'rgba(' + cr + ',' + cg + ',' + cbb + ',' + alpha.toFixed(3) + ')';
      cx.beginPath();
      cx.arc(pp.x, pp.y, p.size, 0, Math.PI * 2);
      cx.fill();
    }

    // connection thread — warms from brick to ember as they approach
    if (p.seeking && p.seekT > 0.8) {
      var lineAlpha = Math.min((p.seekT - 0.8) * 0.015, 0.05);
      var lw = 1 - coldness;
      var lr = Math.round(139 + lw * 45);
      var lg = Math.round(74 + lw * 43);
      var lb = Math.round(46 + lw * 12);
      cx.strokeStyle = 'rgba(' + lr + ',' + lg + ',' + lb + ',' + lineAlpha.toFixed(3) + ')';
      cx.lineWidth = 0.3;
      cx.beginPath();
      cx.moveTo(pos1.x, pos1.y);
      cx.lineTo(pos2.x, pos2.y);
      cx.stroke();

      // warm hint at the crossing point — ember glow
      var crossPos = toXY(p.a, 0);
      var crossAlpha = lineAlpha * lw * 1.5;
      if (crossAlpha > 0.001) {
        var gl2 = cx.createRadialGradient(crossPos.x, crossPos.y, 0, crossPos.x, crossPos.y, 5);
        gl2.addColorStop(0, 'rgba(184,117,58,' + crossAlpha.toFixed(3) + ')');
        gl2.addColorStop(1, 'rgba(184,117,58,0)');
        cx.fillStyle = gl2;
        cx.beginPath();
        cx.arc(crossPos.x, crossPos.y, 5, 0, Math.PI * 2);
        cx.fill();
      }
    }
  }

  // ── FLASHES ── annihilation burst: ember spark
  for (var i = flashes.length - 1; i >= 0; i--) {
    var f = flashes[i];
    f.life -= 0.005;
    if (f.life <= 0) { flashes.splice(i, 1); continue; }

    var fr = f.size * (12 + (1 - f.life) * 35);
    var fa = f.life * f.life * 0.09;

    var gl = cx.createRadialGradient(f.x, f.y, 0, f.x, f.y, fr);
    gl.addColorStop(0, 'rgba(232,207,160,' + fa.toFixed(3) + ')');
    gl.addColorStop(0.35, 'rgba(184,117,58,' + (fa * 0.4).toFixed(3) + ')');
    gl.addColorStop(1, 'rgba(139,74,46,0)');
    cx.fillStyle = gl;
    cx.beginPath();
    cx.arc(f.x, f.y, fr, 0, Math.PI * 2);
    cx.fill();

    // faint vertical ghost — where the imaginary lived (stays blue)
    if (f.life > 0.5) {
      var ghostH = fr * 1.5 * f.life;
      var ghostA = (f.life - 0.5) * 0.03;
      cx.fillStyle = 'rgba(80,100,160,' + ghostA.toFixed(3) + ')';
      cx.fillRect(f.x - 0.3, f.y - ghostH, 0.6, ghostH * 2);
    }
  }

  // ── REAL POINTS ── what remains: ember warmth
  for (var i = 0; i < reals.length; i++) {
    var r = reals[i];
    r.warmth += (r.targetWarmth - r.warmth) * 0.002;
    r.pulse += 0.012;

    var pos = toXY(r.a, 0);
    var w = r.warmth;
    var age = Math.min((t - r.born) * 0.4, 1);
    var breathe = 1 + Math.sin(r.pulse) * 0.1 * w;

    // ember progression: deep brick → warm ember → spark at full warmth
    var pr = Math.round(139 + w * 93);
    var pg = Math.round(74 + w * 43);
    var pb = Math.round(46 + w * 12);

    // glow
    var gs = r.size * (3 + w * 5) * breathe * age;
    if (gs > 0.5) {
      var gl = cx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, gs);
      gl.addColorStop(0, 'rgba(' + pr + ',' + pg + ',' + pb + ',' + (w * 0.05 * age).toFixed(3) + ')');
      gl.addColorStop(1, 'rgba(' + pr + ',' + pg + ',' + pb + ',0)');
      cx.fillStyle = gl;
      cx.beginPath();
      cx.arc(pos.x, pos.y, gs, 0, Math.PI * 2);
      cx.fill();
    }

    cx.fillStyle = 'rgba(' + pr + ',' + pg + ',' + pb + ',' + ((0.2 + w * 0.4) * age).toFixed(3) + ')';
    cx.beginPath();
    cx.arc(pos.x, pos.y, r.size * breathe, 0, Math.PI * 2);
    cx.fill();
  }

  // ── REAL AXIS WARMTH ──
  if (count > 3) {
    var lw2 = Math.min(count * 0.018, 0.6);
    var gh = 2 + lw2 * 10;
    var gl3 = cx.createLinearGradient(0, midY - gh, 0, midY + gh);
    gl3.addColorStop(0, 'rgba(139,74,46,0)');
    gl3.addColorStop(0.5, 'rgba(184,117,58,' + (lw2 * 0.012).toFixed(3) + ')');
    gl3.addColorStop(1, 'rgba(139,74,46,0)');
    cx.fillStyle = gl3;
    cx.fillRect(0, midY - gh, W, gh * 2);
  }

  updateWhisper();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
