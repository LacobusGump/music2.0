<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="/favicon.png">
<title>sfumato</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#090605;overflow:hidden;cursor:none;touch-action:none}canvas{display:block;width:100vw;height:100vh}#back{position:fixed;top:20px;left:24px;z-index:10;font:12px Georgia,serif;letter-spacing:.08em;color:rgba(139,74,46,.22);text-decoration:none;cursor:pointer}#back:hover{color:rgba(232,207,160,.5)}#whisper{position:fixed;left:0;right:0;bottom:34px;text-align:center;z-index:6;font:12px Georgia,serif;letter-spacing:.16em;color:rgba(232,207,160,.14);pointer-events:none;transition:color 2s,opacity 2s}#cursor{position:fixed;z-index:9;width:18px;height:18px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;background:radial-gradient(circle,rgba(232,207,160,.18),rgba(184,117,58,0));transition:opacity .8s}@media(hover:none){body{cursor:default}#cursor{display:none}}
</style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="cursor"></div>
<div id="whisper">137 glazes. no edge. stay.</div>
<script>
(function(){
'use strict';
var cv=document.getElementById('c'),cx=cv.getContext('2d'),cur=document.getElementById('cursor'),whisper=document.getElementById('whisper');
var W=0,H=0,dpr=1,t=0,TAU=Math.PI*2,GA=Math.PI*2/(((1+Math.sqrt(5))/2)*((1+Math.sqrt(5))/2));
var N=137,pts=[],mouse={x:0,y:0,on:false,still:0,lx:0,ly:0},noise=null;
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);build()}
function build(){pts=[];var s=Math.min(W,H);for(var i=0;i<N;i++){var a=i*GA,r=Math.sqrt(i/N)*s*.31,x=Math.cos(a)*r*.78,y=Math.sin(a)*r*.95;var face=0;
  var eyeL=Math.hypot(x+s*.055,y+s*.025),eyeR=Math.hypot(x-s*.055,y+s*.025); if(eyeL<s*.032)face+=(1-eyeL/(s*.032))*.75; if(eyeR<s*.032)face+=(1-eyeR/(s*.032))*.75;
  if(Math.abs(x)<s*.012&&y>-s*.02&&y<s*.07)face+=(1-Math.abs(x)/(s*.012))*.25;
  var mouth=Math.hypot(x/(s*.10),(y-s*.075)/(s*.035)); if(mouth<1)face+=(1-mouth)*.34;
  var oval=Math.hypot(x/(s*.19),y/(s*.25)); if(oval<1)face+=(1-oval)*.10;
  pts.push({x:W/2+x,y:H/2+y,p:Math.random()*TAU,o:.22+(Math.random()-.5)*.22,z:.7+Math.random()*1.2,face:Math.max(0,face),warm:0,tx:W/2+x,ty:H/2+y});}}
function rgba(r,g,b,a){return 'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a)).toFixed(4)+')'}
function makeNoise(){noise=document.createElement('canvas');noise.width=180;noise.height=180;var n=noise.getContext('2d'),img=n.createImageData(180,180);for(var i=0;i<img.data.length;i+=4){var v=Math.random()*12;img.data[i]=v;img.data[i+1]=v*.7;img.data[i+2]=v*.5;img.data[i+3]=10}n.putImageData(img,0,0)}
function onMove(x,y){mouse.on=true;var d=Math.hypot(x-mouse.lx,y-mouse.ly);mouse.still=d<1.2?Math.min(8,mouse.still+.045):Math.max(0,mouse.still-.22);mouse.x=x;mouse.y=y;mouse.lx=x;mouse.ly=y;cur.style.left=x+'px';cur.style.top=y+'px';cur.style.opacity='1'}
addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY)},{passive:true});addEventListener('mouseout',function(){mouse.on=false;cur.style.opacity='0'},{passive:true});addEventListener('touchstart',function(e){if(e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});addEventListener('touchmove',function(e){if(e.touches[0])onMove(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});
function draw(){t+=.016;var s=Math.min(W,H),base=Math.min(1,t/2.5),presence=mouse.on?Math.max(0,1-Math.hypot(mouse.x-W/2,mouse.y-H/2)/(s*.72))*.55+mouse.still*.055:.18+Math.min(.22,t*.006);var K=.18+presence;cx.fillStyle='rgba(9,6,5,.105)';cx.fillRect(0,0,W,H);if(!noise)makeNoise();cx.globalAlpha=.025;cx.fillStyle=cx.createPattern(noise,'repeat');cx.fillRect(0,0,W,H);cx.globalAlpha=1;cx.globalCompositeOperation='lighter';
  var center=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,s*.44);center.addColorStop(0,rgba(60,36,24,.035*base));center.addColorStop(.45,rgba(28,24,34,.018*base));center.addColorStop(1,rgba(10,7,6,0));cx.fillStyle=center;cx.fillRect(0,0,W,H);
  for(var i=0;i<pts.length;i++){var p=pts[i];p.p+=.004+p.o*.01+K*.002;p.warm+=(K*(.25+p.face)-p.warm)*.018;var breathe=.5+.5*Math.sin(p.p+t*.18);var drift=(1-p.warm)*18+p.z*5;var x=p.tx+Math.cos(p.p+i)*drift+Math.sin(t*.1+i)*3;var y=p.ty+Math.sin(p.p*.7+i)*drift*.72;var w=Math.min(1,p.warm+p.face*.35);var cr=54+w*150,cg=48+w*72,cb=62-w*18;var alpha=(.010+.038*w+.018*p.face+.012*breathe)*base;var rr=(18+p.z*38+w*34)*(1+breathe*.08);var g=cx.createRadialGradient(x,y,0,x,y,rr);g.addColorStop(0,rgba(cr,cg,cb,alpha));g.addColorStop(.18,rgba(cr,cg,cb,alpha*.68));g.addColorStop(.52,rgba(cr,cg,cb,alpha*.18));g.addColorStop(1,rgba(cr,cg,cb,0));cx.fillStyle=g;cx.beginPath();cx.arc(x,y,rr,0,TAU);cx.fill();if(w>.55){cx.fillStyle=rgba(232,207,160,(w-.55)*.08);cx.beginPath();cx.arc(x,y,1.2+p.z*.8,0,TAU);cx.fill()}}
  if(K>.48){var halo=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,s*.29);halo.addColorStop(0,rgba(232,207,160,(K-.48)*.030));halo.addColorStop(.38,rgba(184,117,58,(K-.48)*.020));halo.addColorStop(1,rgba(184,117,58,0));cx.fillStyle=halo;cx.fillRect(0,0,W,H);whisper.style.color='rgba(232,207,160,.24)'}
  cx.globalCompositeOperation='source-over';var v=cx.createRadialGradient(W/2,H/2,s*.18,W/2,H/2,Math.max(W,H)*.70);v.addColorStop(0,'rgba(9,6,5,0)');v.addColorStop(.7,'rgba(9,6,5,.26)');v.addColorStop(1,'rgba(5,3,2,.88)');cx.fillStyle=v;cx.fillRect(0,0,W,H);requestAnimationFrame(draw)}
resize();addEventListener('resize',resize,{passive:true});draw();
})();
</script>
</body>
</html>
