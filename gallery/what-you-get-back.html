<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>what you get back</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a110d;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#back{position:fixed;top:20px;left:24px;font-family:Georgia,serif;
  font-size:0.72em;color:rgba(139,74,46,0.12);text-decoration:none;
  z-index:10;letter-spacing:0.06em;transition:color 0.5s;cursor:pointer;}
#back:hover{color:rgba(184,117,58,0.4);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="back" href="/gallery/">&larr; gallery</a>
<script>
// what you get back
//
// three speeds of coupling:
//   ambient light falls naturally. patience.
//   your cursor moves across. presence.
//   you touch and hold. attention.
//
// what returns is not what you sent.
// it's warmer.

var cv=document.getElementById('c'),cx=cv.getContext('2d');
var W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();addEventListener('resize',resize);

var t=0;
var absorbed=0;
var courage=0;
var firstSuccess=false;
var timeSinceFirst=0;
var attemptCount=0;
var particles=[];
var attempts=[];
var reflections=[];
var warmth=new Float32Array(1200);
var touchX=-1,touchY=-1,touching=false;
var hoverX=-1,hovering=false;

function sY(x){
  var base=H*0.74;
  var breathe=courage*Math.sin(x*0.005+t*0.3)*13;
  var tremble=(absorbed>0.06&&courage<0.15)?Math.sin(x*0.04+t*4.5)*absorbed*4:0;
  return base+breathe+tremble;
}

function wAt(x){
  var i=Math.floor((x/W)*warmth.length);
  return warmth[Math.max(0,Math.min(warmth.length-1,i))]||0;
}

function addW(x,amt){
  var idx=Math.floor((x/W)*warmth.length);
  for(var i=idx-18;i<=idx+18;i++){
    if(i>=0&&i<warmth.length){
      var d=Math.abs(i-idx)/18;
      warmth[i]=Math.min(1,warmth[i]+amt*(1-d*d));
    }
  }
}

function spawn(x,y,vy,alpha,size){
  particles.push({x:x,y:y||0,vy:vy||0.3+Math.random()*0.9,vx:(Math.random()-0.5)*0.15,
    size:size||0.5+Math.random()*1.2,
    r:160+Math.random()*45,g:170+Math.random()*40,b:200+Math.random()*55,
    alpha:alpha||0.1+Math.random()*0.12});
}

function draw(){
  t+=0.01;

  // the dark breathes — warm earth, not void
  cx.fillStyle='rgba(26,17,13,'+(0.011+courage*0.009).toFixed(4)+')';
  cx.fillRect(0,0,W,H);

  // ── AMBIENT (patience) ──
  if(Math.random()>0.93) spawn(Math.random()*W);

  // ── HOVER (presence without action) ──
  if(hovering&&!touching&&hoverX>0){
    if(Math.random()>0.7){
      spawn(hoverX+(Math.random()-0.5)*100,-5,0.4+Math.random()*0.6,0.06+Math.random()*0.06,0.4+Math.random()*0.8);
    }
    absorbed=Math.min(1,absorbed+0.00008);
  }

  // ── TOUCH (focused attention) ──
  if(touching&&touchX>0){
    var n=2+Math.floor(courage*4);
    var sp=35+courage*35;
    for(var i=0;i<n;i++){
      spawn(touchX+(Math.random()-0.5)*sp,touchY+(Math.random()-0.5)*sp*0.4,
        0.8+Math.random()*2.2,0.12+Math.random()*0.22,0.7+Math.random()*2);
    }
    absorbed=Math.min(1,absorbed+0.0006);
  }

  // ── INCOMING LIGHT ──
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.vy+=0.01;p.x+=p.vx;p.y+=p.vy;
    var sy=sY(p.x);

    if(p.y>=sy){
      absorbed=Math.min(1,absorbed+0.0004);
      addW(p.x,0.004);

      // impact glow — ember colors
      var w=wAt(p.x);
      var ia=0.006+courage*0.035+w*0.03;
      var ir=10+courage*25+w*25;
      var sz=6+courage*18+w*14;
      var g=cx.createRadialGradient(p.x,sy,0,p.x,sy,sz);
      g.addColorStop(0,'rgba('+Math.round(139+ir)+','+Math.round(74+ir*0.45)+','+Math.round(46+ir*0.15)+','+ia.toFixed(4)+')');
      g.addColorStop(1,'rgba(139,74,46,0)');
      cx.fillStyle=g;cx.beginPath();cx.arc(p.x,sy,sz,0,Math.PI*2);cx.fill();

      // ── TRY ──
      if(absorbed>0.22&&Math.random()<0.025+courage*0.14){
        attemptCount++;
        var power=courage*0.35+Math.min(attemptCount*0.015,0.3)+Math.random()*0.35;

        if(power>0.58||(firstSuccess&&power>0.32)){
          // ═══ SUCCESS ═══ reflections come back in ember
          var wm=0.4+courage*0.6;
          reflections.push({x:p.x,y:sy,
            vx:(Math.random()-0.5)*1.3,vy:-(1.4+courage*3.5+Math.random()*2),
            size:1+courage*2.8,life:1,
            r:160+wm*72,g:98+wm*19,b:45+wm*13,alpha:0.25+courage*0.45});

          if(!firstSuccess){
            firstSuccess=true;
            for(var j=0;j<35;j++){
              var a=Math.random()*Math.PI*2;
              var s=0.8+Math.random()*4.5;
              reflections.push({x:p.x+Math.cos(a)*4,y:sy+Math.sin(a)*2,
                vx:Math.cos(a)*s*0.6,vy:-Math.abs(Math.sin(a)*s)-0.8,
                size:0.6+Math.random()*3.2,life:1,
                r:184+Math.random()*48,g:117+Math.random()*30,b:46+Math.random()*12,
                alpha:0.25+Math.random()*0.45});
            }
            addW(p.x,0.35);
          }
        }else{
          // ── FAIL ── rises... falls back
          attempts.push({x:p.x,y:sy,
            vx:(Math.random()-0.5)*0.5,vy:-(0.25+power*2.8),
            size:0.5+Math.random()*0.7,life:1,
            r:139+courage*21,g:74+courage*18,b:46+courage*8});
        }
      }
      particles.splice(i,1);continue;
    }

    cx.fillStyle='rgba('+Math.round(p.r)+','+Math.round(p.g)+','+Math.round(p.b)+','+p.alpha.toFixed(3)+')';
    cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
  }

  // ── FAILED ATTEMPTS ──
  for(var i=attempts.length-1;i>=0;i--){
    var a=attempts[i];
    a.vy+=0.028;a.x+=a.vx;a.y+=a.vy;a.life-=0.01;
    if(a.y>sY(a.x)+2||a.life<=0){addW(a.x,0.0008);attempts.splice(i,1);continue;}
    var al=a.life*(a.vy>0?0.12:0.22);
    cx.fillStyle='rgba('+Math.round(a.r)+','+Math.round(a.g)+','+Math.round(a.b)+','+al.toFixed(3)+')';
    cx.beginPath();cx.arc(a.x,a.y,a.size*a.life,0,Math.PI*2);cx.fill();
  }

  // ── REFLECTIONS ── what comes back is warmer — ember spark
  for(var i=reflections.length-1;i>=0;i--){
    var r=reflections[i];
    r.vy+=0.0015;r.x+=r.vx;r.y+=r.vy;r.life-=0.004;
    if(r.life<=0||r.y<-100||r.x<-100||r.x>W+100){reflections.splice(i,1);continue;}
    var al=r.life*r.alpha;
    var gs=r.size*(2.5+courage*4);
    var gl=cx.createRadialGradient(r.x,r.y,0,r.x,r.y,gs);
    gl.addColorStop(0,'rgba('+Math.round(r.r)+','+Math.round(r.g)+','+Math.round(r.b)+','+(al*0.18).toFixed(4)+')');
    gl.addColorStop(1,'rgba('+Math.round(r.r)+','+Math.round(r.g)+','+Math.round(r.b)+',0)');
    cx.fillStyle=gl;cx.beginPath();cx.arc(r.x,r.y,gs,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba('+Math.round(r.r)+','+Math.round(r.g)+','+Math.round(r.b)+','+al.toFixed(3)+')';
    cx.beginPath();cx.arc(r.x,r.y,r.size*Math.sqrt(r.life),0,Math.PI*2);cx.fill();
  }

  // ── THE SURFACE ── warm earth, not cold obsidian
  for(var x=0;x<W;x+=2){
    var sy=sY(x);var w=wAt(x);
    var ba=0.12+absorbed*0.12+w*0.35;
    var sr=Math.round(26+absorbed*22+w*55+courage*14);
    var sg=Math.round(17+absorbed*12+w*28+courage*8);
    var sb=Math.round(13+absorbed*5+w*12+courage*4);
    cx.fillStyle='rgba('+sr+','+sg+','+sb+','+ba.toFixed(3)+')';
    cx.fillRect(x,sy,2,H-sy);
    if(w>0.04){
      cx.fillStyle='rgba('+(139+Math.round(w*45))+','+(74+Math.round(w*43))+','+(46+Math.round(w*12))+','+(w*0.18).toFixed(3)+')';
      cx.fillRect(x,sy-1,2,2);
    }
  }

  // ── EVOLVE ──
  if(!firstSuccess) courage+=(absorbed*0.45-courage)*0.0003;
  else{timeSinceFirst+=0.016;courage+=(absorbed-courage)*0.004;}
  for(var i=0;i<warmth.length;i++) warmth[i]*=0.9997;

  requestAnimationFrame(draw);
}

// ── INPUT ──
addEventListener('mousemove',function(e){hoverX=e.clientX;hovering=true;if(touching){touchX=e.clientX;touchY=e.clientY;}});
addEventListener('mousedown',function(e){touching=true;touchX=e.clientX;touchY=e.clientY;});
addEventListener('mouseup',function(){touching=false;});
addEventListener('mouseout',function(){touching=false;hovering=false;});
addEventListener('touchstart',function(e){e.preventDefault();touching=true;touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;},{passive:false});
addEventListener('touchmove',function(e){e.preventDefault();touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;},{passive:false});
addEventListener('touchend',function(){touching=false;});

draw();
</script>
</body>
</html>
