<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>the rest</title>
<meta name="description" content="The silence between hits. Without the rest, rhythm is just noise.">
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{touch-action:none;background:#0a0706;overflow:hidden;cursor:crosshair;-webkit-user-select:none;user-select:none;}
canvas{display:block;width:100vw;height:100vh;}
.title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:Georgia,serif;font-size:1.1em;color:rgba(184,117,58,0.0);
  letter-spacing:0.15em;pointer-events:none;transition:color 3s ease;z-index:10;}
.back{position:fixed;top:24px;left:24px;
  font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  font-size:0.65em;color:#8b4a2e;text-decoration:none;letter-spacing:0.06em;
  transition:color 0.3s;z-index:20;}
.back:hover{color:#e8cfa0;}
</style>
</head>
<body>
<a class="back" href="/gallery/">&larr; gallery</a>
<div class="title" id="title">the rest</div>
<canvas id="c"></canvas>

<script>
(function(){
  var cv = document.getElementById('c');
  var cx = cv.getContext('2d');
  var title = document.getElementById('title');
  var W, H, dpr;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    cv.width = W * dpr;
    cv.height = H * dpr;
    cx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize', resize);

  // --- STATE ---
  // Hits are moments of interaction. Rests are the spaces between.
  // The piece reveals itself through ABSENCE of action, not presence.

  var hits = [];       // {x, y, t, energy}
  var lastHitTime = 0;
  var silenceDuration = 0;  // how long since last hit (seconds)
  var totalSilence = 0;     // accumulated silence
  var totalHits = 0;
  var t = 0;
  var titleShown = false;
  var titleAlpha = 0;

  // Ring: the ghost of a hit. Expands, fades.
  // The longer the silence BEFORE the hit, the warmer the ring.

  function addHit(x, y){
    var warmth = Math.min(silenceDuration / 8, 1); // 0-1, earned by waiting
    hits.push({
      x: x,
      y: y,
      born: t,
      warmth: warmth,
      radius: 0,
      alpha: 0.6 + warmth * 0.4
    });
    totalHits++;
    silenceDuration = 0;
    lastHitTime = t;
  }

  // --- INPUT ---
  cv.addEventListener('pointerdown', function(e){
    addHit(e.clientX, e.clientY);
  });

  // Keyboard: any key is a hit at center (drummer's space bar)
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' || e.key === 'Tab') return;
    if(e.repeat) return;
    var jitterX = (Math.random() - 0.5) * 60;
    var jitterY = (Math.random() - 0.5) * 60;
    addHit(W/2 + jitterX, H/2 + jitterY);
  });

  // --- AUDIO: soft, earned ---
  var audioCtx = null;
  var masterGain = null;

  function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.15;
    masterGain.connect(audioCtx.destination);
  }

  function playTone(warmth){
    if(!audioCtx) return;
    // Cold hits = high, thin. Warm hits (earned by silence) = low, round.
    var baseFreq = 800 - warmth * 600; // 800Hz (impatient) -> 200Hz (patient)
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = baseFreq;

    // Add a second partial for warmth
    var osc2 = audioCtx.createOscillator();
    var gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = baseFreq * (1 + warmth * 0.5); // perfect fifth when warm

    var now = audioCtx.currentTime;
    var duration = 0.3 + warmth * 2.5; // short click vs long tone

    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.15 + warmth * 0.25, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(warmth * 0.12, now + 0.02);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);

    osc.connect(gain);
    gain.connect(masterGain);
    osc2.connect(gain2);
    gain2.connect(masterGain);

    osc.start(now);
    osc.stop(now + duration + 0.1);
    osc2.start(now);
    osc2.stop(now + duration + 0.1);
  }

  // --- DRAW ---
  var lastTime = performance.now();

  function draw(now){
    var dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    t += dt;
    silenceDuration += dt;

    // The background breathes with silence. Longer silence = warmer room.
    var silenceWarmth = Math.min(silenceDuration / 12, 1);
    var bgR = 10 + silenceWarmth * 8;
    var bgG = 7 + silenceWarmth * 4;
    var bgB = 6 + silenceWarmth * 2;

    // Slow fade — the darkness returns, but warmer
    cx.fillStyle = 'rgba('+Math.round(bgR)+','+Math.round(bgG)+','+Math.round(bgB)+',0.04)';
    cx.fillRect(0, 0, W, H);

    // --- SILENCE INDICATOR ---
    // A single point at center that grows brighter the longer you wait.
    // This is the rest. This is where the music lives.
    if(silenceDuration > 1.5){
      var breathPhase = Math.sin(t * 0.5) * 0.5 + 0.5;
      var silAlpha = Math.min((silenceDuration - 1.5) / 10, 0.35) * (0.6 + breathPhase * 0.4);
      var silRadius = 2 + Math.min(silenceDuration / 5, 8) * (0.8 + breathPhase * 0.2);

      // The rest glows
      var grad = cx.createRadialGradient(W/2, H/2, 0, W/2, H/2, silRadius * 12);
      grad.addColorStop(0, 'rgba(184,117,58,' + (silAlpha * 0.4).toFixed(4) + ')');
      grad.addColorStop(0.3, 'rgba(184,117,58,' + (silAlpha * 0.15).toFixed(4) + ')');
      grad.addColorStop(1, 'rgba(184,117,58,0)');
      cx.fillStyle = grad;
      cx.beginPath();
      cx.arc(W/2, H/2, silRadius * 12, 0, Math.PI * 2);
      cx.fill();

      cx.fillStyle = 'rgba(232,207,160,' + (silAlpha).toFixed(4) + ')';
      cx.beginPath();
      cx.arc(W/2, H/2, silRadius, 0, Math.PI * 2);
      cx.fill();
    }

    // --- RINGS: ghost of each hit ---
    for(var i = hits.length - 1; i >= 0; i--){
      var h = hits[i];
      var age = t - h.born;
      var maxAge = 3 + h.warmth * 8; // cold hits fade fast, warm hits linger

      if(age > maxAge){
        hits.splice(i, 1);
        continue;
      }

      var progress = age / maxAge;
      var alpha = h.alpha * (1 - progress) * (1 - progress);
      h.radius += dt * (20 + h.warmth * 40) * (1 - progress * 0.5);

      // Color: cold = pale/sharp, warm = gold/round
      var r, g, b;
      if(h.warmth < 0.3){
        // Impatient: cool white
        r = 180; g = 170; b = 165;
      } else if(h.warmth < 0.7){
        // Some patience: amber
        r = 184; g = 117; b = 58;
      } else {
        // Earned: deep gold
        r = 232; g = 207; b = 160;
      }

      // Ring
      cx.beginPath();
      cx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
      cx.strokeStyle = 'rgba('+r+','+g+','+b+','+(alpha * 0.5).toFixed(4)+')';
      cx.lineWidth = 1 + h.warmth * 2;
      cx.stroke();

      // Inner glow
      if(h.warmth > 0.4 && alpha > 0.05){
        var innerGrad = cx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.radius * 0.4);
        innerGrad.addColorStop(0, 'rgba('+r+','+g+','+b+','+(alpha * 0.08).toFixed(4)+')');
        innerGrad.addColorStop(1, 'rgba('+r+','+g+','+b+',0)');
        cx.fillStyle = innerGrad;
        cx.beginPath();
        cx.arc(h.x, h.y, h.radius * 0.4, 0, Math.PI * 2);
        cx.fill();
      }

      // Warm hits leave a faint mark — the silence before them is visible
      if(h.warmth > 0.6 && progress > 0.5){
        var markAlpha = (1 - progress) * h.warmth * 0.02;
        cx.fillStyle = 'rgba('+r+','+g+','+b+','+(markAlpha).toFixed(5)+')';
        cx.beginPath();
        cx.arc(h.x, h.y, 3, 0, Math.PI * 2);
        cx.fill();
      }
    }

    // --- TITLE: appears after long silence ---
    if(silenceDuration > 6 && !titleShown){
      titleShown = true;
    }
    if(titleShown && silenceDuration > 6){
      titleAlpha = Math.min(titleAlpha + dt * 0.08, 0.35);
    } else {
      titleAlpha = Math.max(titleAlpha - dt * 0.3, 0);
    }
    title.style.color = 'rgba(184,117,58,' + titleAlpha.toFixed(3) + ')';

    // When you hit, title fades. It only lives in silence.
    if(silenceDuration < 0.5){
      titleShown = false;
    }

    requestAnimationFrame(draw);
  }

  // First interaction initializes audio
  function firstTouch(e){
    initAudio();
    document.removeEventListener('pointerdown', firstTouch);
    document.removeEventListener('keydown', firstTouch);
  }
  document.addEventListener('pointerdown', firstTouch);
  document.addEventListener('keydown', firstTouch);

  // Hook audio into hits
  var origAddHit = addHit;
  addHit = function(x, y){
    initAudio();
    var warmth = Math.min(silenceDuration / 8, 1);
    origAddHit(x, y);
    playTone(warmth);
  };

  // Start dark, completely dark
  cx.fillStyle = '#0a0706';
  cx.fillRect(0, 0, W, H);

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
