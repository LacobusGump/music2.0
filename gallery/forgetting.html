<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" href="/favicon.png">
<title>what forgetting feels like</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}body{background:#080605;overflow:hidden;touch-action:manipulation}canvas{display:block;width:100vw;height:100vh}#back{position:fixed;top:20px;left:24px;z-index:10;font:12px Georgia,serif;letter-spacing:.08em;color:rgba(139,74,46,.23);text-decoration:none}#back:hover{color:rgba(232,207,160,.55)}#caption{position:fixed;left:0;right:0;bottom:30px;text-align:center;z-index:8;font:12px Georgia,serif;letter-spacing:.13em;line-height:1.9;color:rgba(232,207,160,.16);pointer-events:none;transition:color 1.8s}.grain{position:fixed;inset:0;pointer-events:none;z-index:6;opacity:.035;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)'/%3E%3C/svg%3E")}
</style>
</head>
<body>
<canvas id="c" aria-hidden="true"></canvas>
<div class="grain"></div>
<a id="back" href="/gallery/">&larr; gallery</a>
<div id="caption">the snow melts. the footsteps disappear.</div>
<script>
(function(){
'use strict';
var cv=document.getElementById('c'),cx=cv.getContext('2d'),cap=document.getElementById('caption');
var W=0,H=0,dpr=1,t=0,TAU=Math.PI*2,steps=[],ghosts=[],mouse={x:0,y:0,down:false};
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);if(!steps.length)seed()}
function seed(){steps=[];ghosts=[];var n=26;for(var i=0;i<n;i++){var u=i/(n-1),x=W*(.18+u*.64)+Math.sin(i*.9)*W*.035,y=H*(.18+u*.62)+Math.cos(i*.7)*H*.025;steps.push({x:x,y:y,a:1,age:i*-0.17,rot:(Math.random()-.5)*.8,side:i%2?1:-1,weight:.55+Math.random()*.45});}for(i=0;i<170;i++)ghosts.push({x:Math.random()*W,y:Math.random()*H,p:Math.random()*TAU,z:.4+Math.random()*.9,a:.004+Math.random()*.012})}
function rgba(r,g,b,a){return 'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a)).toFixed(4)+')'}
function disturb(x,y){for(var i=0;i<steps.length;i++){var s=steps[i],d=Math.hypot(x-s.x,y-s.y);if(d<120){s.a=Math.max(.08,s.a-(1-d/120)*.28);ghosts.push({x:s.x,y:s.y,p:Math.random()*TAU,z:1.2,a:.055})}}}
addEventListener('pointerdown',function(e){mouse.down=true;disturb(e.clientX,e.clientY)},{passive:true});addEventListener('pointermove',function(e){if(mouse.down)disturb(e.clientX,e.clientY)},{passive:true});addEventListener('pointerup',function(){mouse.down=false},{passive:true});
function footprint(s){cx.save();cx.translate(s.x,s.y);cx.rotate(s.rot+s.side*.10);cx.scale(s.side,1);var a=s.a*s.weight;var g=cx.createRadialGradient(0,0,0,0,0,42);g.addColorStop(0,rgba(232,207,160,a*.055));g.addColorStop(.38,rgba(184,117,58,a*.036));g.addColorStop(1,rgba(184,117,58,0));cx.fillStyle=g;cx.beginPath();cx.ellipse(0,0,20,42,0,0,TAU);cx.fill();cx.fillStyle=rgba(232,207,160,a*.050);for(var i=0;i<5;i++){cx.beginPath();cx.ellipse(-12+i*6,-42-Math.sin(i)*3,3.6,5.5,0,0,TAU);cx.fill()}cx.restore()}
function draw(){t+=.016;cx.fillStyle='rgba(8,6,5,.105)';cx.fillRect(0,0,W,H);cx.globalCompositeOperation='lighter';var melt=Math.min(1,t/75);for(var i=0;i<ghosts.length;i++){var g=ghosts[i];g.p+=.006*g.z;g.x+=Math.cos(g.p)*(.08+g.z*.18);g.y+=Math.sin(g.p*.7)*(.06+g.z*.14);g.a*=.997;if(g.x<0)g.x=W;if(g.x>W)g.x=0;if(g.y<0)g.y=H;if(g.y>H)g.y=0;cx.fillStyle=rgba(232,207,160,g.a*(.5+.5*Math.sin(g.p)));cx.fillRect(g.x,g.y,1,1)}if(ghosts.length>260)ghosts.splice(0,ghosts.length-260);for(i=0;i<steps.length;i++){var s=steps[i];s.age+=.016;if(s.age>0){s.a*=.9991-melt*.0008;footprint(s)}}var ground=cx.createRadialGradient(W/2,H*.64,0,W/2,H*.64,Math.max(W,H)*.55);ground.addColorStop(0,rgba(184,117,58,.010+melt*.018));ground.addColorStop(.45,rgba(70,48,38,.010));ground.addColorStop(1,rgba(10,7,6,0));cx.fillStyle=ground;cx.fillRect(0,0,W,H);cx.globalCompositeOperation='source-over';var v=cx.createRadialGradient(W/2,H/2,Math.min(W,H)*.12,W/2,H/2,Math.max(W,H)*.68);v.addColorStop(0,'rgba(8,6,5,0)');v.addColorStop(.72,'rgba(5,3,2,.24)');v.addColorStop(1,'rgba(2,1,1,.80)');cx.fillStyle=v;cx.fillRect(0,0,W,H);cap.textContent=t>34?'but the ground remembers the weight':'the snow melts. the footsteps disappear.';cap.style.color=t>34?'rgba(232,207,160,.24)':'rgba(232,207,160,.15)';requestAnimationFrame(draw)}
resize();addEventListener('resize',resize,{passive:true});draw();
})();
</script>
</body>
</html>
