<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>the first frequency</title><meta name="description" content="A visual study of noise becoming signal."><link rel="icon" href="/favicon.png"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#030201;overflow:hidden}canvas{display:block;width:100vw;height:100vh}a{position:fixed;top:20px;left:24px;z-index:10;font:12px Georgia,serif;color:rgba(139,74,46,.18);letter-spacing:.08em;text-decoration:none}a:hover{color:rgba(232,207,160,.45)}.caption{position:fixed;bottom:28px;left:0;right:0;text-align:center;font:11px Georgia,serif;letter-spacing:.14em;color:rgba(196,160,136,.18);pointer-events:none}</style></head><body><canvas id="c" aria-hidden="true"></canvas><a href="/gallery/">← gallery</a><div class="caption">noise develops memory · the first preference appears</div><script>(function(){'use strict';var cv=document.getElementById('c'),cx=cv.getContext('2d'),W,H,dpr,t=0,TAU=Math.PI*2,N=520,grains=[],seeds=[];function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);if(!grains.length)init()}function init(){for(var i=0;i<N;i++)grains.push({x:Math.random()*W,y:Math.random()*H,p:Math.random()*TAU,v:Math.random()});for(i=0;i<137;i++){var a=i*2.39996322,r=Math.sqrt(i)/Math.sqrt(137)*Math.min(W,H)*.34;seeds.push({x:W/2+Math.cos(a)*r,y:H/2+Math.sin(a)*r,p:Math.random()*TAU})}}function clamp(x){return Math.max(0,Math.min(1,x))}function sm(a,b,x){x=clamp((x-a)/(b-a));return x*x*(3-2*x)}function draw(){t+=.016;var memory=sm(1,10,t),signal=sm(5,22,t),couple=sm(15,38,t);cx.fillStyle='rgba(3,2,1,'+(.17-memory*.09).toFixed(3)+')';cx.fillRect(0,0,W,H);cx.globalCompositeOperation='lighter';for(var i=0;i<grains.length;i++){var g=grains[i];g.p+=.008+memory*.008;g.v=g.v*.985+(Math.sin(g.p+i)*.5+.5)*memory*.025;g.x+=Math.cos(g.p)*(.10+memory*.24);g.y+=Math.sin(g.p*.7)*(.10+memory*.18);if(g.x<0)g.x=W;if(g.x>W)g.x=0;if(g.y<0)g.y=H;if(g.y>H)g.y=0;cx.fillStyle='rgba(184,117,58,'+(.012+g.v*.08).toFixed(4)+')';cx.fillRect(g.x,g.y,1,1)}for(i=0;i<seeds.length;i++){var s=seeds[i];s.p+=.004+signal*.016;s.x+=(W/2-s.x)*couple*.004;s.y+=(H/2-s.y)*couple*.004;var br=.5+.5*Math.sin(s.p),a=(signal*.05+br*.03*signal)*(1-i/190),r=1+br*2+couple*2,gr=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,r*9);gr.addColorStop(0,'rgba(232,207,160,'+(a*.7).toFixed(4)+')');gr.addColorStop(1,'rgba(184,117,58,0)');cx.fillStyle=gr;cx.fillRect(s.x-r*9,s.y-r*9,r*18,r*18);cx.fillStyle='rgba(232,207,160,'+Math.min(.8,a*2).toFixed(4)+')';cx.beginPath();cx.arc(s.x,s.y,r*.34,0,TAU);cx.fill()}var core=sm(20,42,t),R=28+core*Math.min(W,H)*.18,p=.5+.5*Math.sin(t*1.868),cg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,R);cg.addColorStop(0,'rgba(232,207,160,'+(core*(.08+p*.05)).toFixed(4)+')');cg.addColorStop(.38,'rgba(184,117,58,'+(core*.035).toFixed(4)+')');cg.addColorStop(1,'rgba(184,117,58,0)');cx.fillStyle=cg;cx.beginPath();cx.arc(W/2,H/2,R,0,TAU);cx.fill();cx.globalCompositeOperation='source-over';requestAnimationFrame(draw)}resize();addEventListener('resize',resize,{passive:true});draw();})();</script></body></html>
