<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#080504;color:#c4a088;font-family:Georgia,serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{touch-action:none;cursor:crosshair;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100vw;height:100vh}
body:after{content:"";position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(circle at 50% 50%,transparent 0 38%,rgba(0,0,0,.55) 100%),linear-gradient(180deg,rgba(8,5,4,.08),rgba(8,5,4,.36))}
.top{position:fixed;z-index:4;top:20px;left:24px;right:24px;display:flex;justify-content:space-between;align-items:flex-start;gap:18px;font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;pointer-events:none}.back,.hint{pointer-events:auto;color:rgba(196,160,136,.38);text-decoration:none;font-size:.62em;letter-spacing:.12em;text-transform:uppercase;transition:color .25s}.back:hover{color:rgba(232,207,160,.82)}.hint{text-align:right;color:rgba(139,74,46,.68)}
.readout{position:fixed;z-index:4;left:50%;top:22px;transform:translateX(-50%);width:min(360px,46vw);height:1px;background:rgba(184,117,58,.12)}.readout i{display:block;height:100%;width:50%;background:linear-gradient(90deg,rgba(184,117,58,.05),rgba(232,207,160,.86),rgba(184,117,58,.05));box-shadow:0 0 22px rgba(232,207,160,.28);transition:width .08s linear}
.title{position:fixed;z-index:3;left:50%;bottom:34px;transform:translateX(-50%);width:min(720px,calc(100vw - 36px));text-align:center;pointer-events:none}.kicker{font-family:Futura,'Century Gothic',system-ui,sans-serif;font-size:.55em;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,117,58,.58);margin-bottom:10px}.title h1{font-family:Futura,'Century Gothic',system-ui,sans-serif;font-size:clamp(1.35rem,4.6vw,2.8rem);font-weight:100;letter-spacing:.14em;line-height:1;text-transform:uppercase;color:rgba(232,207,160,.80);text-shadow:0 0 30px rgba(184,117,58,.20);margin-bottom:10px}.title p{font-size:.78em;line-height:1.9;color:rgba(196,160,136,.58)}.title b{font-weight:400;color:rgba(232,207,160,.82)}
.badge{position:fixed;z-index:3;left:50%;top:50%;transform:translate(-50%,-50%);font-family:Futura,'Century Gothic',system-ui,sans-serif;font-size:.52em;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,207,160,.22);pointer-events:none;mix-blend-mode:screen}
@media(max-width:640px){.top{top:16px;left:16px;right:16px}.hint{display:none}.readout{top:auto;bottom:22px;width:48vw}.title{bottom:46px}.title h1{font-size:1.35rem}.title p{font-size:.72em}.badge{display:none}}
@media(prefers-reduced-motion:reduce){body{cursor:default}.hint{display:none}}
</style>
</head>
<body>
<canvas id="c" aria-label="Two oscillators held apart by a rule. The gap between them rings."></canvas>
<div class="readout" aria-hidden="true"><i id="meter"></i></div>
<div class="top"><a class="back" href="/gallery/">&larr; gallery</a><div class="hint">move / touch to stress the gap</div></div>
<div class="badge">the rule holds</div>
<div class="title"><div class="kicker">high K / fixed distance / stored energy</div><h1>the distance that rings</h1><p>Two bodies want to couple. A rule keeps the gap open. <b>The distance becomes the instrument.</b></p></div>
<script>
(function(){
'use strict';
var cv=document.getElementById('c'),ctx=cv.getContext('2d'),meter=document.getElementById('meter');
var W=0,H=0,dpr=1,t=0,last=performance.now(),TAU=Math.PI*2;
var pointer={x:.5,y:.5,active:false},trailsA=[],trailsB=[],sparks=[],noise=[];
var reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);noise=[];var n=Math.max(80,Math.floor(W*H/18000));for(var i=0;i<n;i++)noise.push({x:Math.random()*W,y:Math.random()*H,r:.5+Math.random()*1.8,a:.02+Math.random()*.08,p:Math.random()*TAU})}
function setPointer(e){var p=e.touches?e.touches[0]:e;pointer.x=p.clientX/W;pointer.y=p.clientY/H;pointer.active=true}
addEventListener('resize',resize,{passive:true});addEventListener('pointermove',setPointer,{passive:true});addEventListener('pointerdown',setPointer,{passive:true});addEventListener('touchmove',setPointer,{passive:true});addEventListener('mouseleave',function(){pointer.active=false},{passive:true});resize();
function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function addTrail(arr,x,y){arr.push({x:x,y:y,a:1});if(arr.length>90)arr.shift()}
function drawTrail(arr,rgb){for(var i=1;i<arr.length;i++){var p=arr[i],q=arr[i-1];p.a*=.965;ctx.strokeStyle='rgba('+rgb+','+(p.a*.05).toFixed(4)+')';ctx.lineWidth=1.1+p.a*1.4;ctx.beginPath();ctx.moveTo(q.x,q.y);ctx.lineTo(p.x,p.y);ctx.stroke()}}
function glow(x,y,r,c0,c1){var g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c0);g.addColorStop(1,c1);ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill()}
function spark(x,y,stress){if(sparks.length>140)return;for(var i=0;i<2+stress*5;i++){sparks.push({x:x,y:y,vx:(Math.random()-.5)*(1+stress*4),vy:(Math.random()-.5)*(1+stress*4),a:.6+Math.random()*.4,r:.8+Math.random()*2})}}
function draw(now){
  var dt=Math.min((now-last)/1000,.05);last=now;if(reduced)dt=.016;t+=dt;
  var min=Math.min(W,H),cx=W/2,cy=H/2;
  var stressBase=pointer.active?clamp(1-Math.abs(pointer.x-.5)*1.55,0,1):(.52+.48*Math.sin(t*.21));
  var stress=clamp(.28+stressBase*.72,0,1);
  var gap=min*(.31-.085*stress);
  var wobble=min*(.035+.035*stress);
  var aPhase=t*(.75+stress*.85);
  var ax=cx-gap+Math.cos(aPhase*.92)*wobble*.45;
  var ay=cy+Math.sin(aPhase*1.13)*wobble+(pointer.y-.5)*min*.075*stress;
  var bx=cx+gap+Math.cos(aPhase*.84+2.1)*wobble*.45;
  var by=cy+Math.sin(aPhase*1.07+2.8)*wobble-(pointer.y-.5)*min*.075*stress;
  addTrail(trailsA,ax,ay);addTrail(trailsB,bx,by);
  meter.style.width=(stress*100).toFixed(1)+'%';

  ctx.fillStyle='rgba(8,5,4,.34)';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(var i=0;i<noise.length;i++){var n=noise[i],tw=.55+.45*Math.sin(t*.6+n.p);ctx.fillStyle='rgba(184,117,58,'+(n.a*tw).toFixed(4)+')';ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,TAU);ctx.fill()}
  drawTrail(trailsA,'184,117,58');drawTrail(trailsB,'232,207,160');

  var dx=bx-ax,dy=by-ay,dist=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx),mx=(ax+bx)/2,my=(ay+by)/2;
  ctx.save();ctx.translate(mx,my);ctx.rotate(ang);
  var waves=9,amp=min*(.020+.045*stress),ring=t*(5+stress*7);
  for(i=0;i<waves;i++){
    var off=(i-(waves-1)/2)/(waves-1),alpha=(.025+stress*.13)*(1-Math.abs(off)*.86);
    ctx.beginPath();
    for(var s=0;s<=96;s++){
      var f=s/96,x=-dist/2+dist*f,env=Math.sin(Math.PI*f),y=Math.sin(f*Math.PI*6+ring+i*.62)*amp*env+off*min*.07;
      if(s===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)
    }
    ctx.strokeStyle='rgba(232,207,160,'+alpha.toFixed(4)+')';ctx.lineWidth=.6+stress*1.3*(1-Math.abs(off));ctx.stroke();
  }
  var wallA=.045+stress*.18;
  ctx.strokeStyle='rgba(139,74,46,'+wallA.toFixed(4)+')';ctx.lineWidth=1;ctx.setLineDash([5,9]);ctx.beginPath();ctx.moveTo(0,-min*.18);ctx.lineTo(0,min*.18);ctx.stroke();ctx.setLineDash([]);
  ctx.restore();

  glow(mx,my,min*(.16+.12*stress),'rgba(232,207,160,'+(.055+stress*.12).toFixed(4)+')','rgba(184,117,58,0)');
  glow(mx,my,min*(.035+.035*stress),'rgba(255,232,190,'+(.10+stress*.20).toFixed(4)+')','rgba(232,207,160,0)');
  if(Math.random()<stress*.28)spark(mx+(Math.random()-.5)*dist*.45,my+(Math.random()-.5)*min*.08,stress);
  for(i=sparks.length-1;i>=0;i--){var sp=sparks[i];sp.x+=sp.vx;sp.y+=sp.vy;sp.vx*=.985;sp.vy*=.985;sp.a*=.955;if(sp.a<.02){sparks.splice(i,1);continue}ctx.fillStyle='rgba(232,207,160,'+(sp.a*.34).toFixed(4)+')';ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r,0,TAU);ctx.fill()}

  function body(x,y,rgb,phase){var breath=.55+.45*Math.sin(t*(2.4+stress*1.5)+phase);var r=min*(.035+.014*breath+.018*stress);glow(x,y,r*6,'rgba('+rgb+','+(.055+stress*.055).toFixed(4)+')','rgba('+rgb+',0)');glow(x,y,r*2.2,'rgba('+rgb+','+(.16+stress*.14).toFixed(4)+')','rgba('+rgb+',0)');ctx.fillStyle='rgba(255,236,198,'+(.38+stress*.34).toFixed(4)+')';ctx.beginPath();ctx.arc(x,y,r*.38,0,TAU);ctx.fill();ctx.strokeStyle='rgba(232,207,160,'+(.12+stress*.25).toFixed(4)+')';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(x,y,r*(1.45+breath*.14),0,TAU);ctx.stroke()}
  body(ax,ay,'184,117,58',0);body(bx,by,'232,207,160',2.1);

  ctx.globalCompositeOperation='source-over';
  var v=ctx.createRadialGradient(cx,cy,min*.10,cx,cy,Math.max(W,H)*.70);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(.64,'rgba(0,0,0,.05)');v.addColorStop(1,'rgba(0,0,0,.58)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);
  requestAnimationFrame(draw)
}
requestAnimationFrame(draw);
})();
</script>
</body>
</html>
