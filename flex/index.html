    var shellR = shells[s] * (0.4 + Math.min(W2,H2)/800);
    var shellT = Math.min(1, (t*3 - s)*2);

    // Fuzzy probability halo
    var cloudGrad = cx2.createRadialGradient(cx0,cy0,shellR*0.7,cx0,cy0,shellR*1.3);
    cloudGrad.addColorStop(0, crRgba(100,140,200, 0));
    cloudGrad.addColorStop(0.3, crRgba(130,160,210, shellT*0.06));
    cloudGrad.addColorStop(0.5, crRgba(160,180,220, shellT*0.1));
    cloudGrad.addColorStop(0.7, crRgba(130,160,210, shellT*0.06));
    cloudGrad.addColorStop(1, crRgba(100,140,200, 0));
    cx2.fillStyle = cloudGrad;
    cx2.beginPath(); cx2.arc(cx0,cy0,shellR*1.3,0,PI2); cx2.fill();

    // Probability dots orbiting in the cloud
    var nDots = 8 + s*6;
    for(var d=0; d<nDots; d++){
      var angle = d*PI2/nDots + crTime*(1.5-s*0.3);
      var wobble = Math.sin(angle*3+crTime*2+d)*shellR*0.15;
      var dr = shellR + wobble;
      var dx = cx0 + Math.cos(angle)*dr;
      var dy = cy0 + Math.sin(angle)*dr;
      var dotAlpha = (Math.sin(angle*2+crTime+d)*0.3+0.5)*shellT;
      cx2.fillStyle = crRgba(160,190,230, dotAlpha*0.5);
      cx2.beginPath(); cx2.arc(dx,dy,1.5,0,PI2); cx2.fill();
    }
  }
}

function crDrawMolecules(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;

  // Water molecule — the angle IS the coupling geometry (104.5 degrees)
  var bondLen = 50 + Math.min(W2,H2)*0.06;
  var bondAngle = 104.5 * Math.PI / 180;
  var halfAngle = bondAngle/2;

  // Oxygen center
  var ox = cx0, oy = cy0;

  // Hydrogen positions
  var h1x = ox + Math.cos(-halfAngle + Math.PI*0.5)*bondLen;
  var h1y = oy + Math.sin(-halfAngle + Math.PI*0.5)*bondLen;
  var h2x = ox + Math.cos(halfAngle + Math.PI*0.5)*bondLen;
  var h2y = oy + Math.sin(halfAngle + Math.PI*0.5)*bondLen;

  // Electron cloud halos
  var atoms = [[ox,oy,22,[200,60,60]],[h1x,h1y,14,[100,150,220]],[h2x,h2y,14,[100,150,220]]];

  // Shared electron regions (bonds) — glowing overlap
  for(var b=0; b<2; b++){
    var hx = b===0 ? h1x : h2x;
    var hy = b===0 ? h1y : h2y;
    var midx = (ox+hx)/2, midy = (oy+hy)/2;
    var sharedR = 16;
    var sg = cx2.createRadialGradient(midx,midy,0,midx,midy,sharedR);
    var pulse = Math.sin(crTime*2+b)*0.15+0.85;
    sg.addColorStop(0, crRgba(230,200,120, 0.35*pulse*t));
    sg.addColorStop(0.5, crRgba(210,170,90, 0.15*pulse*t));
    sg.addColorStop(1, crRgba(200,150,70, 0));
    cx2.fillStyle = sg;
    cx2.beginPath(); cx2.arc(midx,midy,sharedR,0,PI2); cx2.fill();

    // Bond line
    cx2.strokeStyle = crRgba(220,175,80, 0.3*t);
    cx2.lineWidth = 1.5;
    cx2.beginPath(); cx2.moveTo(ox,oy); cx2.lineTo(hx,hy); cx2.stroke();
  }

  // Draw atom halos
  for(var a=0; a<atoms.length; a++){
    var at = atoms[a];
    var haloR = at[2];
    var col = at[3];
    var hg = cx2.createRadialGradient(at[0],at[1],0,at[0],at[1],haloR);
    hg.addColorStop(0, crRgba(col[0],col[1],col[2], 0.5*t));
    hg.addColorStop(0.5, crRgba(col[0],col[1],col[2], 0.15*t));
    hg.addColorStop(1, crRgba(col[0],col[1],col[2], 0));
    cx2.fillStyle = hg;
    cx2.beginPath(); cx2.arc(at[0],at[1],haloR,0,PI2); cx2.fill();

    cx2.fillStyle = crRgba(col[0],col[1],col[2], 0.8*t);
    cx2.beginPath(); cx2.arc(at[0],at[1],3,0,PI2); cx2.fill();
  }

  // Angle label
  if(t > 0.5){
    cx2.font = '9px "Courier New",monospace';
    cx2.fillStyle = crRgba(184,117,58, (t-0.5)*0.5);
    cx2.textAlign = 'center';
    cx2.fillText('104.5\u00B0', cx0, cy0 - 30);
    cx2.textAlign = 'left';
  }
}

function crDrawCells(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var memR = 60 + Math.min(W2,H2)*0.06;

  // Membrane — the coupling creates a boundary
  var memPulse = Math.sin(crTime*1.5)*0.03+1;
  cx2.strokeStyle = crRgba(200,160,100, 0.4*t);
  cx2.lineWidth = 2;
  cx2.beginPath();
  // Wobbly circle for membrane
  for(var a=0; a<=64; a++){
    var angle = a*PI2/64;
    var wobble = Math.sin(angle*5+crTime*2)*2 + Math.sin(angle*3-crTime)*1.5;
    var r = memR*memPulse + wobble;
    var px = cx0 + Math.cos(angle)*r;
    var py = cy0 + Math.sin(angle)*r;
    if(a===0) cx2.moveTo(px,py);
    else cx2.lineTo(px,py);
  }
  cx2.closePath();
  cx2.stroke();

  // Interior glow — life
  var innerGrad = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,memR);
  innerGrad.addColorStop(0, crRgba(210,170,90, 0.08*t));
  innerGrad.addColorStop(0.7, crRgba(180,130,60, 0.03*t));
  innerGrad.addColorStop(1, crRgba(160,110,50, 0));
  cx2.fillStyle = innerGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,memR,0,PI2); cx2.fill();

  // Ions flowing through membrane
  var nIons = 12;
  for(var i=0; i<nIons; i++){
    var ionAngle = i*PI2/nIons + crTime*0.5;
    var ionPhase = Math.sin(crTime*2+i*1.7);
    var ionR = memR + ionPhase*15; // crossing membrane
    var ix = cx0 + Math.cos(ionAngle)*ionR;
    var iy = cy0 + Math.sin(ionAngle)*ionR;
    var inside = ionR < memR;

    var ionCol = inside ? [230,190,100] : [120,150,190];
    cx2.fillStyle = crRgba(ionCol[0],ionCol[1],ionCol[2], 0.6*t);
    cx2.beginPath(); cx2.arc(ix,iy,2,0,PI2); cx2.fill();
  }

  // Nucleus inside
  var nucGrad = cx2.createRadialGradient(cx0-5,cy0-5,0,cx0-5,cy0-5,memR*0.25);
  nucGrad.addColorStop(0, crRgba(200,150,80, 0.25*t));
  nucGrad.addColorStop(1, crRgba(180,120,60, 0));
  cx2.fillStyle = nucGrad;
  cx2.beginPath(); cx2.arc(cx0-5,cy0-5,memR*0.25,0,PI2); cx2.fill();
}

function crDrawOrganisms(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;

  // Neural network — nodes and edges
  var nNodes = 24;
  var nodes = [];
  var spread = Math.min(W2,H2)*0.25;

  for(var i=0; i<nNodes; i++){
    var angle = i*2.39996322; // golden angle
    var r = 10 + Math.sqrt(i/nNodes)*spread;
    nodes.push({
      x: cx0 + Math.cos(angle)*r,
      y: cy0 + Math.sin(angle)*r,
      phase: Math.random()*PI2,
      freq: 0.5 + Math.random()*2
    });
  }

  // Edges — connect nearby nodes
  for(var i=0; i<nNodes; i++){
    for(var j=i+1; j<nNodes; j++){
      var dx = nodes[j].x-nodes[i].x, dy = nodes[j].y-nodes[i].y;
      var dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < spread*0.6){
        // Signal propagation
        var signalPhase = Math.sin(crTime*nodes[i].freq + nodes[i].phase);
        var signalAlpha = (signalPhase*0.3+0.5)*0.15*t / (dist/spread+0.5);

        cx2.strokeStyle = crRgba(220,175,80, signalAlpha);
        cx2.lineWidth = 0.5;
        cx2.beginPath(); cx2.moveTo(nodes[i].x,nodes[i].y); cx2.lineTo(nodes[j].x,nodes[j].y);
        cx2.stroke();

        // Signal pulse traveling along edge
        if(signalPhase > 0.7){
          var pulseT = (signalPhase-0.7)/0.3;
          var px = nodes[i].x + dx*pulseT;
          var py = nodes[i].y + dy*pulseT;
          cx2.fillStyle = crRgba(255,220,140, 0.4*t);
          cx2.beginPath(); cx2.arc(px,py,1.5,0,PI2); cx2.fill();
        }
      }
    }
  }

  // Nodes
  for(var i=0; i<nNodes; i++){
    var nd = nodes[i];
    var fire = Math.sin(crTime*nd.freq+nd.phase);
    var brightness = fire*0.3+0.7;
    var sz = 2 + brightness*2;

    var col = fire > 0.5 ? [255,220,140] : [200,150,80];
    cx2.fillStyle = crRgba(col[0],col[1],col[2], brightness*0.7*t);
    cx2.beginPath(); cx2.arc(nd.x,nd.y,sz,0,PI2); cx2.fill();

    if(fire > 0.5){
      var glow = cx2.createRadialGradient(nd.x,nd.y,0,nd.x,nd.y,sz*4);
      glow.addColorStop(0, crRgba(255,220,140, 0.2*t));
      glow.addColorStop(1, crRgba(230,180,90, 0));
      cx2.fillStyle = glow;
      cx2.beginPath(); cx2.arc(nd.x,nd.y,sz*4,0,PI2); cx2.fill();
    }
  }
}

function crDrawPlanet(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var planetR = 40 + Math.min(W2,H2)*0.08;

  // Particles aggregating into sphere
  var nParts = 60;
  for(var i=0; i<nParts; i++){
    var angle = i*2.39996322 + crTime*0.1;
    var startR = planetR*3;
    var curR = startR - (startR-planetR*0.8)*Math.min(1, t*1.5 + Math.sin(i)*0.1);
    if(curR < planetR*0.8) curR = planetR*0.8;

    var px = cx0 + Math.cos(angle)*curR;
    var py = cy0 + Math.sin(angle)*curR*0.85; // slight squash

    var inPlanet = curR <= planetR;
    var alpha = inPlanet ? 0 : (0.3 + (1-t)*0.4);
    if(alpha > 0){
      cx2.fillStyle = crRgba(180,130,70, alpha);
      cx2.beginPath(); cx2.arc(px,py,1.5,0,PI2); cx2.fill();
    }
  }

  // Planet body
  var bodyAlpha = Math.min(1, t*1.5);
  // Core
  var coreGrad = cx2.createRadialGradient(cx0-planetR*0.2,cy0-planetR*0.2,0,cx0,cy0,planetR);
  coreGrad.addColorStop(0, crRgba(220,170,90, bodyAlpha*0.5));
  coreGrad.addColorStop(0.3, crRgba(180,120,50, bodyAlpha*0.35));
  coreGrad.addColorStop(0.6, crRgba(140,85,35, bodyAlpha*0.25));
  coreGrad.addColorStop(0.85, crRgba(100,65,25, bodyAlpha*0.2));
  coreGrad.addColorStop(1, crRgba(60,40,20, 0));
  cx2.fillStyle = coreGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,planetR,0,PI2); cx2.fill();

  // Atmosphere edge glow
  var atmoGrad = cx2.createRadialGradient(cx0,cy0,planetR*0.8,cx0,cy0,planetR*1.15);
  atmoGrad.addColorStop(0, crRgba(180,140,80, 0));
  atmoGrad.addColorStop(0.5, crRgba(160,120,60, bodyAlpha*0.08));
  atmoGrad.addColorStop(1, crRgba(140,100,50, 0));
  cx2.fillStyle = atmoGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,planetR*1.15,0,PI2); cx2.fill();

  // Geological layers hint — concentric circles
  if(t > 0.5){
    var layerT = (t-0.5)*2;
    cx2.strokeStyle = crRgba(220,170,80, layerT*0.08);
    cx2.lineWidth = 0.5;
    cx2.beginPath(); cx2.arc(cx0,cy0,planetR*0.35,0,PI2); cx2.stroke();
    cx2.beginPath(); cx2.arc(cx0,cy0,planetR*0.6,0,PI2); cx2.stroke();
  }
}

function crDrawSolarSystem(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var scale = Math.min(W2,H2)*0.3;

  // Star at center
  var starR = 12;
  var starGrad = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,starR*3);
  starGrad.addColorStop(0, crRgba(255,240,180, 0.9));
  starGrad.addColorStop(0.2, crRgba(255,220,140, 0.6));
  starGrad.addColorStop(0.5, crRgba(230,180,90, 0.15));
  starGrad.addColorStop(1, crRgba(200,150,70, 0));
  cx2.fillStyle = starGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,starR*3,0,PI2); cx2.fill();

  cx2.fillStyle = crRgba(255,240,200, 0.95);
  cx2.beginPath(); cx2.arc(cx0,cy0,starR,0,PI2); cx2.fill();

  // Planets in orbits
  var planets = [
    {r:0.25, speed:3.0, size:2, col:[180,130,80]},
    {r:0.4,  speed:2.2, size:3, col:[160,170,200]},
    {r:0.6,  speed:1.5, size:4, col:[80,140,180]},
    {r:0.8,  speed:1.0, size:3.5,col:[200,150,90]},
    {r:1.0,  speed:0.6, size:6, col:[210,180,130]}
  ];

  for(var i=0; i<planets.length; i++){
    var pl = planets[i];
    var orbitR = pl.r*scale;
    var orbitAlpha = Math.min(1, t*2 - i*0.15);
    if(orbitAlpha <= 0) continue;

    // Orbit ellipse
    cx2.strokeStyle = crRgba(184,117,58, 0.06*orbitAlpha);
    cx2.lineWidth = 0.5;
    cx2.beginPath();
    cx2.ellipse(cx0, cy0, orbitR, orbitR*0.85, 0, 0, PI2);
    cx2.stroke();

    // Planet
    var angle = crTime*pl.speed + i*1.2;
    var px = cx0 + Math.cos(angle)*orbitR;
    var py = cy0 + Math.sin(angle)*orbitR*0.85;

    var pGrad = cx2.createRadialGradient(px,py,0,px,py,pl.size*2.5);
    pGrad.addColorStop(0, crRgba(pl.col[0],pl.col[1],pl.col[2], 0.7*orbitAlpha));
    pGrad.addColorStop(0.5, crRgba(pl.col[0],pl.col[1],pl.col[2], 0.2*orbitAlpha));
    pGrad.addColorStop(1, crRgba(pl.col[0],pl.col[1],pl.col[2], 0));
    cx2.fillStyle = pGrad;
    cx2.beginPath(); cx2.arc(px,py,pl.size*2.5,0,PI2); cx2.fill();

    cx2.fillStyle = crRgba(pl.col[0],pl.col[1],pl.col[2], 0.9*orbitAlpha);
    cx2.beginPath(); cx2.arc(px,py,pl.size,0,PI2); cx2.fill();
  }
}

function crDrawGalaxy(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var galR = Math.min(W2,H2)*0.35;
  var nStars = 800;
  var nArms = 2;

  // Central bulge
  var bulgeGrad = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,galR*0.15);
  bulgeGrad.addColorStop(0, crRgba(255,230,170, 0.5*t));
  bulgeGrad.addColorStop(0.5, crRgba(230,190,110, 0.15*t));
  bulgeGrad.addColorStop(1, crRgba(200,150,80, 0));
  cx2.fillStyle = bulgeGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,galR*0.15,0,PI2); cx2.fill();

  // Spiral arms
  var rot = crTime*0.08;
  for(var i=0; i<nStars; i++){
    var armIdx = i % nArms;
    var armOffset = armIdx * Math.PI;
    var r = (i/nStars) * galR;
    // Logarithmic spiral
    var angle = armOffset + Math.log(r/10+1)*2.5 + rot;
    // Spread
    var spread = (0.1 + r/galR*0.3) * (Math.sin(i*137.5)*0.5+0.5);
    angle += (Math.sin(i*1.618)*2-1)*spread;

    var sx = cx0 + Math.cos(angle)*r;
    var sy = cy0 + Math.sin(angle)*r*0.7; // tilt

    var brightness = (1 - r/galR)*0.5 + 0.2;
    var blueShift = r/galR;
    var starCol = [
      Math.round(230 - blueShift*80),
      Math.round(190 - blueShift*30 + blueShift*40),
      Math.round(100 + blueShift*100)
    ];

    var starAlpha = brightness * t * (0.5 + Math.sin(i*2.3+crTime*0.5)*0.3);
    var starSz = 0.5 + brightness*1.5;

    cx2.fillStyle = crRgba(starCol[0],starCol[1],starCol[2], starAlpha);
    cx2.fillRect(sx-starSz*0.5, sy-starSz*0.5, starSz, starSz);
  }

  // Subtle spiral arm glow
  for(var arm=0; arm<nArms; arm++){
    cx2.beginPath();
    var armOffset = arm * Math.PI + rot;
    for(var s=0; s<100; s++){
      var r = (s/100)*galR;
      var angle = armOffset + Math.log(r/10+1)*2.5;
      var sx = cx0 + Math.cos(angle)*r;
      var sy = cy0 + Math.sin(angle)*r*0.7;
      if(s===0) cx2.moveTo(sx,sy);
      else cx2.lineTo(sx,sy);
    }
    cx2.strokeStyle = crRgba(220,180,100, 0.04*t);
    cx2.lineWidth = 8;
    cx2.stroke();
  }
}

function crDrawBlackHole(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var bhR = 25 + Math.min(W2,H2)*0.04;

  // Accretion disk — matter spiraling inward
  var nParts = 300;
  for(var i=0; i<nParts; i++){
    var baseAngle = i*PI2/nParts*3 + crTime*(2+Math.sin(i*0.3));
    var spiralR = bhR*1.2 + (i/nParts)*bhR*4;
    // Spiral inward over time
    var decayR = spiralR * (1 - t*0.3*Math.sin(i+crTime));
    if(decayR < bhR) continue;

    var px = cx0 + Math.cos(baseAngle)*decayR;
    var py = cy0 + Math.sin(baseAngle)*decayR*0.3; // disk is thin

    var heat = 1 - (decayR-bhR)/(bhR*4);
    heat = Math.max(0, Math.min(1, heat));
    var r = Math.round(100 + heat*155);
    var g = Math.round(50 + heat*140);
    var b = Math.round(20 + heat*80);
    var alpha = heat*0.5*t;

    cx2.fillStyle = crRgba(r,g,b, alpha);
    cx2.beginPath(); cx2.arc(px,py,1+heat*1.5,0,PI2); cx2.fill();
  }

  // Event horizon — pure black circle
  cx2.fillStyle = '#000000';
  cx2.beginPath(); cx2.arc(cx0,cy0,bhR,0,PI2); cx2.fill();

  // Edge ring — photon sphere
  var edgeGrad = cx2.createRadialGradient(cx0,cy0,bhR*0.9,cx0,cy0,bhR*1.2);
  edgeGrad.addColorStop(0, crRgba(0,0,0, 1));
  edgeGrad.addColorStop(0.3, crRgba(255,200,100, 0.4*t));
  edgeGrad.addColorStop(0.6, crRgba(230,160,60, 0.15*t));
  edgeGrad.addColorStop(1, crRgba(200,130,50, 0));
  cx2.fillStyle = edgeGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,bhR*1.2,0,PI2); cx2.fill();

  // Hawking radiation — faint particles leaking out
  if(t > 0.5){
    var hawkT = (t-0.5)*2;
    for(var i=0; i<8; i++){
      var angle = i*PI2/8 + crTime*0.3;
      var hr = bhR*1.3 + Math.sin(crTime*2+i)*bhR*0.4;
      var hx = cx0 + Math.cos(angle)*hr;
      var hy = cy0 + Math.sin(angle)*hr;
      cx2.fillStyle = crRgba(200,180,150, hawkT*0.15);
      cx2.beginPath(); cx2.arc(hx,hy,1,0,PI2); cx2.fill();
    }
  }
}

function crDrawReturn(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;

  // All scales simultaneously — dots within dots
  // Quark triangle (tiny, center)
  var innerR = 8;
  for(var i=0; i<3; i++){
    var a = crTime*0.4 + i*PI2/3;
    var qx = cx0 + Math.cos(a)*innerR;
    var qy = cy0 + Math.sin(a)*innerR;
    cx2.fillStyle = crRgba(230,190,100, 0.6*t);
    cx2.beginPath(); cx2.arc(qx,qy,1.5,0,PI2); cx2.fill();
  }

  // Atom shell
  var atomR = 30;
  cx2.strokeStyle = crRgba(130,160,210, 0.1*t);
  cx2.lineWidth = 0.5;
  cx2.beginPath(); cx2.arc(cx0,cy0,atomR,0,PI2); cx2.stroke();

  // Cell membrane
  var cellR = 60;
  cx2.strokeStyle = crRgba(200,160,100, 0.08*t);
  cx2.lineWidth = 0.5;
  cx2.beginPath(); cx2.arc(cx0,cy0,cellR,0,PI2); cx2.stroke();

  // Planet
  var planetR = 100;
  var pGrad = cx2.createRadialGradient(cx0,cy0,planetR*0.7,cx0,cy0,planetR);
  pGrad.addColorStop(0, crRgba(180,130,70, 0));
  pGrad.addColorStop(0.5, crRgba(180,130,70, 0.04*t));
  pGrad.addColorStop(1, crRgba(160,110,50, 0));
  cx2.fillStyle = pGrad;
  cx2.beginPath(); cx2.arc(cx0,cy0,planetR,0,PI2); cx2.fill();

  // Orbit ring
  var orbitR = 150;
  cx2.strokeStyle = crRgba(184,117,58, 0.05*t);
  cx2.lineWidth = 0.5;
  cx2.beginPath();
  cx2.ellipse(cx0, cy0, orbitR, orbitR*0.85, 0, 0, PI2);
  cx2.stroke();

  // Galaxy spiral hint
  var galR = Math.min(W2,H2)*0.4;
  var nStars = 200;
  for(var i=0; i<nStars; i++){
    var armIdx = i % 2;
    var armOff = armIdx * Math.PI + crTime*0.05;
    var r = (i/nStars)*galR;
    var angle = armOff + Math.log(r/10+1)*2.5;
    var sx = cx0 + Math.cos(angle)*r;
    var sy = cy0 + Math.sin(angle)*r*0.7;
    var brightness = (1-r/galR)*0.3;

    cx2.fillStyle = crRgba(220,190,130, brightness*t*0.4);
    cx2.fillRect(sx, sy, 1, 1);
  }

  // Central glow — everything breathing
  var breathe = Math.sin(crTime*0.8)*0.15+0.85;
  var centerGlow = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,60);
  centerGlow.addColorStop(0, crRgba(255,230,160, 0.25*t*breathe));
  centerGlow.addColorStop(0.3, crRgba(230,180,100, 0.1*t*breathe));
  centerGlow.addColorStop(0.7, crRgba(200,150,70, 0.03*t));
  centerGlow.addColorStop(1, crRgba(180,120,50, 0));
  cx2.fillStyle = centerGlow;
  cx2.beginPath(); cx2.arc(cx0,cy0,60,0,PI2); cx2.fill();

  // Coupling lines radiating out — golden threads
  for(var i=0; i<13; i++){
    var angle = i*PI2/13 + crTime*0.1;
    var lineLen = 30 + Math.sin(crTime+i)*20;
    var x1 = cx0 + Math.cos(angle)*20;
    var y1 = cy0 + Math.sin(angle)*20;
    var x2 = cx0 + Math.cos(angle)*(20+lineLen);
    var y2 = cy0 + Math.sin(angle)*(20+lineLen);

    cx2.strokeStyle = crRgba(220,175,80, 0.15*t*breathe);
    cx2.lineWidth = 0.5;
    cx2.beginPath(); cx2.moveTo(x1,y1); cx2.lineTo(x2,y2); cx2.stroke();
  }

  // "0+0=1" at center
  if(t > 0.4){
    var labelT = (t-0.4)/0.6;
    cx2.font = '11px Georgia,serif';
    cx2.fillStyle = crRgba(220,180,120, labelT*0.5*breathe);
    cx2.textAlign = 'center';
    cx2.fillText('0 + 0 = 1', cx0, cy0 + galR*0.5 + 30);
    cx2.textAlign = 'left';
  }
}

// ═══ MAIN CREATION DRAW ═══
function drawCreation(){
  if(crPlaying && !crDragging){
    crTime += 0.016 * crSpeed;
    if(crTime > crTotalDur) crTime = 0; // loop
  }

  var info = crGetStageAt(crTime);
  var stageIdx = info.idx;
  var localT = info.local;

  // Background — starts pure black, warms slightly
  var bg = crBgColor(stageIdx);
  cx.fillStyle = 'rgb('+bg[0]+','+bg[1]+','+bg[2]+')';
  cx.fillRect(0,0,W,H);

  // Crossfade: draw previous stage fading out, current stage fading in
  var fadeIn = Math.min(1, localT * 5);   // fade in over first 20% of stage
  var fadeOut = Math.min(1, (1-localT)*5); // fade out over last 20%

  // If we're in the first 20%, also draw previous stage fading out
  if(localT < 0.2 && stageIdx > 0){
    var prevAlpha = 1 - localT*5;
    cx.globalAlpha = prevAlpha;
    crDrawStage(stageIdx-1, 1.0, cx, W, H);
    cx.globalAlpha = 1;
  }

  // Draw current stage
  var stageAlpha = fadeIn;
  cx.globalAlpha = stageAlpha;
  crDrawStage(stageIdx, localT, cx, W, H);
  cx.globalAlpha = 1;

  // ═══ LABEL HANDLING ═══
  if(stageIdx !== crLastStageIdx){
    crLastStageIdx = stageIdx;
    crLabelAlpha = 0;
  }

  // Label fades in then out
  var labelFade;
  if(localT < 0.15) labelFade = localT/0.15;
  else if(localT < 0.5) labelFade = 1;
  else if(localT < 0.65) labelFade = 1 - (localT-0.5)/0.15;
  else labelFade = 0;

  var stage = CR_STAGES[stageIdx];
  crNameEl.textContent = stage.name;
  crSubEl.textContent = stage.sub;
  crLabelEl.style.color = 'rgba(184,117,58,' + (labelFade*0.7).toFixed(3) + ')';
  crSubEl.style.color = 'rgba(196,160,136,' + (labelFade*0.4).toFixed(3) + ')';

  // Progress bar
  var progress = crTime / crTotalDur;
  crFillEl.style.width = (progress*100).toFixed(1) + '%';

  // Stats
  statEl.innerHTML =
    'stage: ' + (stageIdx+1) + '/' + CR_STAGES.length + '<br>' +
    stage.name + '<br>' +
    '<span style="color:#8b4a2e">' + (crPlaying ? 'playing' : 'paused') + '</span>';
}

function crDrawStage(idx, t, cx2, W2, H2){
  switch(idx){
    case 0: crDrawVoid(t, cx2, W2, H2); break;
    case 1: crDrawFirstCoupling(t, cx2, W2, H2); break;
    case 2: crDrawQuarks(t, cx2, W2, H2); break;
    case 3: crDrawNucleons(t, cx2, W2, H2); break;
    case 4: crDrawAtoms(t, cx2, W2, H2); break;
    case 5: crDrawMolecules(t, cx2, W2, H2); break;
    case 6: crDrawCells(t, cx2, W2, H2); break;
    case 7: crDrawOrganisms(t, cx2, W2, H2); break;
    case 8: crDrawPlanet(t, cx2, W2, H2); break;
    case 9: crDrawSolarSystem(t, cx2, W2, H2); break;
    case 10: crDrawGalaxy(t, cx2, W2, H2); break;
    case 11: crDrawBlackHole(t, cx2, W2, H2); break;
    case 12: crDrawReturn(t, cx2, W2, H2); break;
  }
}

// ═══════════════════════════════════════════════════════════════
// 10. WHITE HOLE — time-reversal of collapse. Birth, not explosion.
// ═══════════════════════════════════════════════════════════════
var whN = 150;           // particle count (tuned for 60fps)
var whParticles = [];    // {x,y,z, vx,vy,vz, phase, omega, born, coupled, coupledTo, trail}
var whR = 0;             // global order parameter
var whPrevR = 0;
var whK = 1.2;           // coupling in the debris field
var whTime = 0;
var whCyclePhase = 0;    // 0=build, 1=erupt, 2=couple, 3=structure, 4=collapse
var whCycleT = 0;        // fractional progress within phase
var whSingularityR = 0;  // singularity visual radius
var whPressure = 0;      // internal pressure buildup
var whEruptionAge = 0;   // how long since last eruption
var whCorrelationSeeds = []; // memory from previous cycle
var whCycleCount = 0;
var whShockwave = 0;    // expanding ring radius (0 = none)
var whShockAlpha = 0;   // ring brightness
var whFlash = 0;        // birth flash intensity
var whPrevPhase = -1;   // for detecting phase transitions

var WH_CYCLE_NAMES = ['building','erupting','coupling','crystallizing','collapsing'];
var WH_CYCLE_DURS  = [3.0, 2.0, 5.0, 4.0, 3.0];

function initWhiteHole(){
  titleEl.textContent = 'White Hole';
  descEl.textContent = 'Every ending carries 7 seeds into the next beginning. The singularity is where inside and outside stop existing.';
  whParticles = [];
  whR = 0; whPrevR = 0;
  whK = 1.2;
  whTime = 0;
  whCyclePhase = 0;
  whCycleT = 0;
  whSingularityR = 6;
  whPressure = 0;
  whEruptionAge = 0;
  whCorrelationSeeds = [];
  whCycleCount = 0;
  whShockwave = 0;
  whShockAlpha = 0;
  whFlash = 0;
  whPrevPhase = -1;

  // Seed initial correlation memory (as if a previous universe collapsed)
  for(var i=0; i<7; i++){
    whCorrelationSeeds.push({
      angle: i * PI2 / 7 + Math.random()*0.3,
      phase: i * PI2 / 7,
      omega: 0.8 + Math.random()*0.4
    });
  }

  // K slider
  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label">K (debris coupling)</span>' +
    '<input type="range" id="whKSlider" min="0" max="4" step="0.01" value="1.2">' +
    '<span class="slider-val" id="whKVal">1.20</span>' +
    '</div>';
  document.getElementById('whKSlider').addEventListener('input', function(){
    whK = parseFloat(this.value);
    document.getElementById('whKVal').textContent = whK.toFixed(2);
  });
}

function whSpawnParticle(fromSeed){
  var seed = fromSeed || whCorrelationSeeds[Math.floor(Math.random()*whCorrelationSeeds.length)];
  var spread = 0.4 + Math.random()*0.6;
  var angle = seed.angle + (Math.random()-0.5)*spread;
  var elev = (Math.random()-0.5)*spread*0.8;

  // Velocity: outward from center, correlated with seed direction
  var speed = 0.8 + Math.random()*2.5;
  var cosE = Math.cos(elev), sinE = Math.sin(elev);

  var p = {
    x: 0, y: 0, z: 0,
    vx: Math.cos(angle)*cosE*speed,
    vy: Math.sin(angle)*cosE*speed,
    vz: sinE*speed,
    phase: seed.phase + (Math.random()-0.5)*0.5,
    omega: seed.omega + (Math.random()-0.5)*0.2,
    born: whTime,
    life: 1.0,
    coupled: false,
    localSync: 0
  };
  return p;
}

function stepWhiteHole(){
  var dt = 0.016;
  whTime += dt;

  // Advance cycle
  var totalDur = 0;
  for(var i=0; i<WH_CYCLE_DURS.length; i++) totalDur += WH_CYCLE_DURS[i];
  var cycleTime = whTime % totalDur;
  var acc = 0;
  for(var i=0; i<WH_CYCLE_DURS.length; i++){
    if(cycleTime < acc + WH_CYCLE_DURS[i]){
      if(whCyclePhase !== i && i === 0) whCycleCount++;
      whCyclePhase = i;
      whCycleT = (cycleTime - acc) / WH_CYCLE_DURS[i];
      break;
    }
    acc += WH_CYCLE_DURS[i];
  }

  // Detect phase transitions
  if(whCyclePhase !== whPrevPhase){
    // Eruption just started — trigger shockwave and flash
    if(whCyclePhase === 1){
      whShockwave = 1;
      whShockAlpha = 0.8;
      whFlash = 1.0;
    }
    whPrevPhase = whCyclePhase;
  }

  // Decay shockwave and flash
  if(whShockwave > 0){
    whShockwave += 4.0 * dt * 60; // expand fast
    whShockAlpha *= 0.96;
    if(whShockAlpha < 0.005){ whShockwave = 0; whShockAlpha = 0; }
  }
  if(whFlash > 0) whFlash *= 0.93;

  // ═══ PHASE 0: BUILD PRESSURE ═══
  if(whCyclePhase === 0){
    whPressure = whCycleT * whCycleT; // quadratic buildup
    whSingularityR = 3 + whPressure * 8;
    // Attract any remaining particles inward
    for(var i=whParticles.length-1; i>=0; i--){
      var p = whParticles[i];
      var dist = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
      if(dist > 0.5){
        var pull = 3.0 * dt;
        p.vx -= p.x/dist * pull;
        p.vy -= p.y/dist * pull;
        p.vz -= p.z/dist * pull;
      }
      p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
      p.vx *= 0.95; p.vy *= 0.95; p.vz *= 0.95;
      p.life -= dt*0.3;
      if(p.life <= 0 || dist < 2) whParticles.splice(i,1);
    }
  }

  // ═══ PHASE 1: ERUPTION ═══
  else if(whCyclePhase === 1){
    whPressure = 1 - whCycleT;
    whSingularityR = 3 + (1-whCycleT)*12;
    // Spawn particles in bursts, correlated by seeds
    var spawnRate = whCycleT < 0.4 ? 8 : (whCycleT < 0.7 ? 4 : 1);
    for(var s=0; s<spawnRate; s++){
      if(whParticles.length < whN){
        whParticles.push(whSpawnParticle());
      }
    }
    // Move all particles outward
    for(var i=0; i<whParticles.length; i++){
      var p = whParticles[i];
      p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
      // Slight deceleration
      p.vx *= 0.998; p.vy *= 0.998; p.vz *= 0.998;
      p.phase += p.omega * dt;
    }
  }

  // ═══ PHASE 2: COUPLING ═══
  else if(whCyclePhase === 2){
    whSingularityR = 3 + Math.sin(whTime*2)*1;
    whPressure = 0;
    // Kuramoto coupling between nearby particles
    var effectiveK = whK * whCycleT;
    for(var i=0; i<whParticles.length; i++){
      var p = whParticles[i];
      // Move (slowing down)
      p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
      p.vx *= 0.995; p.vy *= 0.995; p.vz *= 0.995;

      // Phase coupling with neighbors (single pass for sync + localSync)
      var syncSum = 0, nNeighbors = 0, localSyncSum = 0;
      for(var j=0; j<whParticles.length; j++){
        if(j===i) continue;
        var q = whParticles[j];
        var ddx=q.x-p.x, ddy=q.y-p.y, ddz=q.z-p.z;
        var d2 = ddx*ddx+ddy*ddy+ddz*ddz;
        if(d2 < 100){ // coupling radius
          var phaseDiff = q.phase - p.phase;
          syncSum += Math.sin(phaseDiff);
          nNeighbors++;
          // Compute localSync inline
          var pd = Math.abs(phaseDiff) % PI2;
          if(pd > Math.PI) pd = PI2 - pd;
          localSyncSum += 1 - pd/Math.PI;
          // Gentle spatial attraction between coupled particles
          if(d2 > 4){
            var attract = effectiveK * 0.01 * dt;
            p.vx += ddx/Math.sqrt(d2) * attract;
            p.vy += ddy/Math.sqrt(d2) * attract;
            p.vz += ddz/Math.sqrt(d2) * attract;
          }
        }
      }
      if(nNeighbors > 0){
        p.phase += dt * (p.omega + effectiveK * syncSum / nNeighbors);
        p.localSync = localSyncSum / nNeighbors;
      } else {
        p.phase += dt * p.omega;
        p.localSync = 0;
      }

      p.phase = ((p.phase % PI2) + PI2) % PI2;
    }
  }

  // ═══ PHASE 3: CRYSTALLIZE ═══
  else if(whCyclePhase === 3){
    whSingularityR = 2 + Math.sin(whTime*3)*0.5;
    // Strong coupling — structure forms
    var effectiveK2 = whK * 1.5;
    var nParts = whParticles.length;
    for(var i=0; i<nParts; i++){
      var p = whParticles[i];
      p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
      p.vx *= 0.99; p.vy *= 0.99; p.vz *= 0.99;

      // Only check forward neighbors (symmetric forces)
      var syncSum = 0, nNeighbors = 0, localSyncSum = 0;
      for(var j=i+1; j<nParts; j++){
        var q = whParticles[j];
        var ddx=q.x-p.x, ddy=q.y-p.y, ddz=q.z-p.z;
        var d2 = ddx*ddx+ddy*ddy+ddz*ddz;
        if(d2 < 100){
          var phaseDiff = q.phase - p.phase;
          var sinPD = Math.sin(phaseDiff);
          syncSum += sinPD;
          nNeighbors++;
          var pd = Math.abs(phaseDiff) % PI2;
          if(pd > Math.PI) pd = PI2 - pd;
          localSyncSum += 1 - pd/Math.PI;
          if(d2 > 4){
            var invD = 1/Math.sqrt(d2);
            var attract = effectiveK2 * 0.015 * dt;
            var fx = ddx*invD * attract;
            var fy = ddy*invD * attract;
            var fz = ddz*invD * attract;
            p.vx += fx; p.vy += fy; p.vz += fz;
            q.vx -= fx; q.vy -= fy; q.vz -= fz;
          }
          // Apply phase coupling to q symmetrically
          q.phase -= dt * effectiveK2 * sinPD * 0.5;
        }
      }
      if(nNeighbors > 0){
        p.phase += dt * (p.omega + effectiveK2 * syncSum / nNeighbors);
        p.localSync = p.localSync*0.7 + (localSyncSum / nNeighbors)*0.3;
      } else {
        p.phase += dt * p.omega;
        p.localSync *= 0.9;
      }
      p.phase = ((p.phase % PI2) + PI2) % PI2;
    }
  }

  // ═══ PHASE 4: COLLAPSE BACK ═══
  else if(whCyclePhase === 4){
    whPressure = whCycleT * 0.5;
    whSingularityR = 2 + whCycleT * 6;
    // Harvest correlation structure before collapse
    if(whCycleT < 0.1 && whCorrelationSeeds.length < 20){
      // Save current cluster phases as seeds for next cycle
      whCorrelationSeeds = [];
      var step = Math.max(1, Math.floor(whParticles.length/7));
      for(var i=0; i<whParticles.length; i+=step){
        var p = whParticles[i];
        var angle = Math.atan2(p.y, p.x);
        whCorrelationSeeds.push({
          angle: angle,
          phase: p.phase,
          omega: p.omega
        });
        if(whCorrelationSeeds.length >= 7) break;
      }
    }
    // Pull everything back in — SPIRAL, not straight
    for(var i=whParticles.length-1; i>=0; i--){
      var p = whParticles[i];
      var dist = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
      if(dist > 0.1){
        var pull = (1 + whCycleT * 5) * dt;
        // Radial pull inward
        p.vx -= p.x/dist * pull;
        p.vy -= p.y/dist * pull;
        p.vz -= p.z/dist * pull;
        // Tangential spin — accretion disk
        var spin = pull * 0.6;
        p.vx += -p.y/dist * spin;
        p.vy += p.x/dist * spin;
        // Flatten to disk as it spirals
        p.vz *= 0.97;
      }
      p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
      p.life -= dt * 0.2 * whCycleT;
      if(dist < 1.5 && whCycleT > 0.5){
        whParticles.splice(i,1);
      }
    }
  }

  // Compute global R
  var re=0, im=0;
  for(var i=0; i<whParticles.length; i++){
    re += Math.cos(whParticles[i].phase);
    im += Math.sin(whParticles[i].phase);
  }
  var n = whParticles.length || 1;
  re /= n; im /= n;
  var rawR = Math.sqrt(re*re+im*im);
  whR = whPrevR*0.92 + rawR*0.08;
  whPrevR = whR;
}

function drawWhiteHole(){
  // Clean clear — clarity over trails
  cx.fillStyle = '#0a0706';
  cx.fillRect(0,0,W,H);

  stepWhiteHole();

  var centerX = W*0.5, centerY = H*0.48;
  var sc = Math.min(W,H)*0.018;

  // 3D projection
  var cosA = Math.cos(dragAngleX), sinA = Math.sin(dragAngleX);
  var cosB = Math.cos(dragAngleY-0.2), sinB = Math.sin(dragAngleY-0.2);

  // ═══ AMBIENT FIELD — subtle depth ═══
  var ambGrad = cx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(W,H)*0.6);
  ambGrad.addColorStop(0, 'rgba(26,17,13,0.4)');
  ambGrad.addColorStop(0.5, 'rgba(15,10,7,0.2)');
  ambGrad.addColorStop(1, 'rgba(10,7,6,0)');
  cx.fillStyle = ambGrad;
  cx.fillRect(0,0,W,H);

  // ═══ SINGULARITY ═══
  var singPulse = 0.7 + Math.sin(whTime*4)*0.3;
  var singR = whSingularityR * singPulse;

  // Layer 1: wide atmospheric glow
  var atmo = cx.createRadialGradient(centerX,centerY,0,centerX,centerY,singR*14);
  var atmoA = whPressure*0.15 + 0.02;
  atmo.addColorStop(0, crRgba(255,220,160, atmoA));
  atmo.addColorStop(0.3, crRgba(184,117,58, atmoA*0.3));
  atmo.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = atmo;
  cx.beginPath(); cx.arc(centerX,centerY,singR*14,0,PI2); cx.fill();

  // Layer 2: gold halo
  var outerGlow = cx.createRadialGradient(centerX,centerY,0,centerX,centerY,singR*6);
  var glowIntensity = whPressure*0.5 + 0.08;
  outerGlow.addColorStop(0, crRgba(255,240,200, glowIntensity*singPulse));
  outerGlow.addColorStop(0.2, crRgba(240,200,120, glowIntensity*0.5));
  outerGlow.addColorStop(0.5, crRgba(210,140,60, glowIntensity*0.15));
  outerGlow.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = outerGlow;
  cx.beginPath(); cx.arc(centerX,centerY,singR*6,0,PI2); cx.fill();

  // Layer 3: bright corona
  var corona = cx.createRadialGradient(centerX,centerY,singR*0.3,centerX,centerY,singR*2.5);
  corona.addColorStop(0, crRgba(255,250,230, 0.9*singPulse));
  corona.addColorStop(0.3, crRgba(255,235,180, 0.5*singPulse));
  corona.addColorStop(0.7, crRgba(240,190,100, 0.15*singPulse));
  corona.addColorStop(1, 'rgba(230,180,100,0)');
  cx.fillStyle = corona;
  cx.beginPath(); cx.arc(centerX,centerY,singR*2.5,0,PI2); cx.fill();

  // Layer 4: white-hot core
  var coreGrad = cx.createRadialGradient(centerX,centerY,0,centerX,centerY,singR*0.8);
  coreGrad.addColorStop(0, crRgba(255,255,248, 0.95*singPulse));
  coreGrad.addColorStop(0.4, crRgba(255,245,220, 0.7*singPulse));
  coreGrad.addColorStop(0.8, crRgba(255,230,180, 0.3*singPulse));
  coreGrad.addColorStop(1, 'rgba(255,220,160,0)');
  cx.fillStyle = coreGrad;
  cx.beginPath(); cx.arc(centerX,centerY,singR*0.8,0,PI2); cx.fill();

  // ═══ BIRTH FLASH ═══
  if(whFlash > 0.01){
    var flashGrad = cx.createRadialGradient(centerX,centerY,0,centerX,centerY,Math.max(W,H)*0.4*whFlash);
    flashGrad.addColorStop(0, crRgba(255,252,240, whFlash*0.4));
    flashGrad.addColorStop(0.3, crRgba(255,240,200, whFlash*0.15));
    flashGrad.addColorStop(1, 'rgba(255,230,180,0)');
    cx.fillStyle = flashGrad;
    cx.fillRect(0,0,W,H);
  }

  // ═══ SHOCKWAVE RING ═══
  if(whShockwave > 0 && whShockAlpha > 0.01){
    var ringR = whShockwave * sc * 2;
    var ringW = 2 + whShockwave * 0.3;
    cx.strokeStyle = 'rgba(255,240,200,'+(whShockAlpha*0.5).toFixed(4)+')';
    cx.lineWidth = ringW;
    cx.beginPath(); cx.arc(centerX,centerY,ringR,0,PI2); cx.stroke();
    // Soft inner glow on ring
    cx.strokeStyle = 'rgba(230,190,110,'+(whShockAlpha*0.15).toFixed(4)+')';
    cx.lineWidth = ringW*3;
    cx.beginPath(); cx.arc(centerX,centerY,ringR,0,PI2); cx.stroke();
  }

  // ═══ PROJECT PARTICLES ═══
  var projected = [];
  for(var i=0; i<whParticles.length; i++){
    var p = whParticles[i];
    var x1 = p.x*cosA - p.y*sinA;
    var y1t = p.x*sinA + p.y*cosA;
    var y1 = y1t*cosB - p.z*sinB;
    var z1 = y1t*sinB + p.z*cosB;

    var persp = 400/(400 + z1*sc*0.5);
    projected.push({
      i: i,
      sx: centerX + x1*sc*persp,
      sy: centerY + y1*sc*persp,
      z: z1,
      persp: persp
    });
  }
  projected.sort(function(a,b){ return b.z - a.z; });

  // ═══ COUPLING THREADS ═══
  cx.globalCompositeOperation = 'lighter';
  var syncCount = 0;
  for(var k=0; k<projected.length; k++){
    var pr = projected[k];
    var p = whParticles[pr.i];
    if(p.localSync < 0.35) continue;

    for(var k2=k+1; k2<projected.length; k2++){
      var pr2 = projected[k2];
      var p2 = whParticles[pr2.i];

      var ddx=p2.x-p.x, ddy=p2.y-p.y, ddz=p2.z-p.z;
      var d2 = ddx*ddx+ddy*ddy+ddz*ddz;
      if(d2 > 100) continue;

      var pd = Math.abs(p.phase - p2.phase) % PI2;
      if(pd > Math.PI) pd = PI2 - pd;
      var sync = 1 - pd/Math.PI;
      if(sync < 0.55) continue;

      syncCount++;
      var s2 = sync*sync*sync; // cubic falloff — only strong bonds visible
      var pMin = Math.min(pr.persp, pr2.persp);
      var dFade = 1 - Math.sqrt(d2)/10; // distance fade

      var alpha = s2 * 0.3 * pMin * dFade;
      // Single warm gold — no color tiers
      cx.strokeStyle = 'rgba(230,190,110,'+alpha.toFixed(4)+')';
      cx.lineWidth = (0.3+s2*1.2)*pMin;
      cx.beginPath(); cx.moveTo(pr.sx,pr.sy); cx.lineTo(pr2.sx,pr2.sy); cx.stroke();
    }
  }
  cx.globalCompositeOperation = 'source-over';

  // ═══ DRAW PARTICLES ═══
  for(var k=0; k<projected.length; k++){
    var pr = projected[k];
    var p = whParticles[pr.i];

    var age = Math.min(1, (whTime - p.born)*0.4);
    var dist = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z);
    var sync = p.localSync || 0;

    // Color ramp: deep slate → warm ember → bright gold
    var cr, cg, cb;
    var t_sync = Math.min(1, sync);
    if(t_sync < 0.2){
      // Cold — dim slate, barely visible
      var t = t_sync * 5;
      cr = Math.round(35 + t*60);
      cg = Math.round(40 + t*35);
      cb = Math.round(65 - t*20);
    } else if(t_sync < 0.5){
      // Warming — ember territory
      var t = (t_sync-0.2)/0.3;
      cr = Math.round(95 + t*100);
      cg = Math.round(75 + t*45);
      cb = Math.round(45 + t*10);
    } else {
      // Coupled — bright gold
      var t = (t_sync-0.5)/0.5;
      cr = Math.round(195 + t*45);
      cg = Math.round(120 + t*70);
      cb = Math.round(55 + t*55);
    }

    // Depth + sync based brightness — uncoupled particles MUCH dimmer
    var depthDim = 0.3 + pr.persp * 0.7;
    var syncBright = sync < 0.2 ? 0.15 : (0.3 + sync*0.7);
    var bright = syncBright * age * depthDim;
    var breath = Math.sin(p.phase)*0.1 + 0.9;
    var sz = (1.0 + sync*2.2) * pr.persp * breath;

    // Glow ONLY on well-coupled, foreground particles (saves ~60% gradient calls)
    if(sync > 0.5 && pr.persp > 0.4 && bright > 0.3){
      var glowR2 = sz * (2 + sync*3);
      var grad = cx.createRadialGradient(pr.sx,pr.sy,sz*0.3,pr.sx,pr.sy,glowR2);
      grad.addColorStop(0, 'rgba('+cr+','+cg+','+cb+','+(bright*sync*0.18).toFixed(4)+')');
      grad.addColorStop(1, 'rgba('+cr+','+cg+','+cb+',0)');
      cx.fillStyle = grad;
      cx.beginPath(); cx.arc(pr.sx,pr.sy,glowR2,0,PI2); cx.fill();
    }

    // Velocity streak — eruption only (skip in coupling for perf)
    if(whCyclePhase === 1 && age < 0.5){
      var speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy + p.vz*p.vz);
      if(speed > 0.5){
        var tx = p.x - p.vx*2;
        var ty = p.y - p.vy*2;
        var tz = p.z - p.vz*2;
        var tx1 = tx*cosA - ty*sinA;
        var ty1t = tx*sinA + ty*cosA;
        var ty1 = ty1t*cosB - tz*sinB;
        var tpersp = 400/(400 + (ty1t*sinB + tz*cosB)*sc*0.5);
        var tsx = centerX + tx1*sc*tpersp;
        var tsy = centerY + ty1*sc*tpersp;

        cx.strokeStyle = 'rgba('+cr+','+cg+','+cb+','+(bright*0.35).toFixed(4)+')';
        cx.lineWidth = sz * 0.35;
        cx.beginPath(); cx.moveTo(pr.sx,pr.sy); cx.lineTo(tsx,tsy); cx.stroke();
      }
    }

    // Core dot — simple circle for dim particles, gradient for bright ones
    if(bright < 0.25){
      cx.fillStyle = 'rgba('+cr+','+cg+','+cb+','+bright.toFixed(4)+')';
      cx.beginPath(); cx.arc(pr.sx,pr.sy,sz*0.7,0,PI2); cx.fill();
    } else {
      var coreGrad2 = cx.createRadialGradient(pr.sx,pr.sy,0,pr.sx,pr.sy,sz);
      coreGrad2.addColorStop(0, 'rgba('+Math.min(255,cr+35)+','+Math.min(255,cg+25)+','+Math.min(255,cb+20)+','+bright.toFixed(4)+')');
      coreGrad2.addColorStop(0.5, 'rgba('+cr+','+cg+','+cb+','+(bright*0.6).toFixed(4)+')');
      coreGrad2.addColorStop(1, 'rgba('+cr+','+cg+','+cb+',0)');
      cx.fillStyle = coreGrad2;
      cx.beginPath(); cx.arc(pr.sx,pr.sy,sz,0,PI2); cx.fill();
    }

    // Hot white core on freshly erupted particles
    if(age < 0.2 && bright > 0.2){
      var hotAlpha = (0.2-age)/0.2 * 0.85 * depthDim;
      cx.fillStyle = 'rgba(255,252,240,'+hotAlpha.toFixed(4)+')';
      cx.beginPath(); cx.arc(pr.sx,pr.sy,sz*0.3,0,PI2); cx.fill();
    }
  }

  // ═══ R BAR ═══
  var barW3 = Math.min(W,H)*0.3;
  var barX3 = centerX - barW3/2;
  var barY3 = H - 50;
  var barH3 = 3;

  // Track background
  cx.fillStyle = 'rgba(184,117,58,0.04)';
  cx.beginPath();
  cx.roundRect(barX3, barY3, barW3, barH3, 1.5);
  cx.fill();

  // Fill
  var rClamped = Math.max(0.001, Math.min(1, whR));
  var rBarGrad2 = cx.createLinearGradient(barX3, barY3, barX3+barW3*rClamped, barY3);
  rBarGrad2.addColorStop(0, 'rgba(45,55,90,0.4)');
  rBarGrad2.addColorStop(0.5, 'rgba(184,117,58,0.6)');
  rBarGrad2.addColorStop(1, 'rgba(230,190,110,0.8)');
  cx.fillStyle = rBarGrad2;
  cx.beginPath();
  cx.roundRect(barX3, barY3, barW3*rClamped, barH3, 1.5);
  cx.fill();

  // 1/phi marker
  var threshX2 = barX3 + barW3 / PHI;
  cx.strokeStyle = 'rgba(130,160,70,0.2)';
  cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(threshX2, barY3-3); cx.lineTo(threshX2, barY3+barH3+3); cx.stroke();

  cx.font = '8px "Courier New",monospace';
  cx.fillStyle = 'rgba(130,160,70,0.3)';
  cx.textAlign = 'center';
  cx.fillText('1/\u03C6', threshX2, barY3+barH3+12);
  cx.textAlign = 'left';

  // ═══ CYCLE PHASE INDICATOR ═══
  cx.font = '9px Futura,"Century Gothic",system-ui,sans-serif';
  cx.fillStyle = 'rgba(184,117,58,0.25)';
  cx.textAlign = 'center';
  cx.fillText(WH_CYCLE_NAMES[whCyclePhase], centerX, H - 26);
  cx.textAlign = 'left';

  // ═══ STATS ═══
  var rColor2 = whR > 1/PHI ? '#7a9a6a' : '#8b4a2e';
  statEl.innerHTML =
    'R: <span style="color:'+rColor2+'">' + whR.toFixed(3) + '</span><br>' +
    'K: ' + whK.toFixed(2) + '<br>' +
    'N: ' + whParticles.length + '<br>' +
    'phase: ' + WH_CYCLE_NAMES[whCyclePhase] + '<br>' +
    'cycle: ' + whCycleCount + '<br>' +
    '<span style="color:#8b4a2e">locked: ' + syncCount + '</span>';
}


// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(){
  time += 0.016;

  if(activeViz === 'lorenz') drawLorenz();
  else if(activeViz === 'kuramoto') drawKuramoto();
  else if(activeViz === 'klag') drawKLag();
  else if(activeViz === 'machine') drawMachine();
  else if(activeViz === 'tetra') drawTetra();
  else if(activeViz === 'bifurcation') drawBifurcation();
  else if(activeViz === 'pendulum') drawPendulum();
  else if(activeViz === 'turing') drawTuring();
  else if(activeViz === 'creation') drawCreation();
  else if(activeViz === 'whitehole') drawWhiteHole();

  animId = requestAnimationFrame(loop);
}

// ═══ BOOT ═══
initLorenz();
loop();

})();
