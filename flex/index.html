<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flex — the shapes of the math</title>
<meta name="description" content="Deep mathematical visualizations. Attractors, phase spaces, coupling dynamics rendered beautifully. The shapes that keep showing up.">
<meta name="theme-color" content="#0a0706">
<link rel="icon" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;color:#c4a088;font-family:Georgia,serif;
  height:100vh;height:100dvh;overflow:hidden;
  display:flex;flex-direction:column;}

/* ═══ NAV BAR ═══ */
.nav{display:flex;align-items:center;gap:0;padding:10px 16px;flex-shrink:0;
  border-bottom:1px solid rgba(184,117,58,0.08);z-index:10;position:relative;}
.back{font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  font-size:0.62em;color:#8b4a2e;text-decoration:none;letter-spacing:0.06em;
  margin-right:16px;white-space:nowrap;transition:color 0.3s;}
.back:hover{color:#e8cfa0;}
.tabs{display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  font-size:0.6em;font-weight:400;letter-spacing:0.05em;
  color:#8b4a2e;background:none;border:1px solid rgba(139,74,46,0.12);
  border-radius:6px;padding:7px 13px;cursor:pointer;white-space:nowrap;
  transition:all 0.4s;user-select:none;-webkit-tap-highlight-color:transparent;}
.tab:hover{color:#c4a088;border-color:rgba(184,117,58,0.25);}
.tab.active{color:#b8753a;border-color:rgba(184,117,58,0.35);
  background:rgba(184,117,58,0.06);
  text-shadow:0 0 12px rgba(184,117,58,0.15);}

/* ═══ CANVAS AREA ═══ */
.stage{flex:1;min-height:0;position:relative;}
canvas#viz{width:100%;height:100%;display:block;}

/* ═══ INFO OVERLAY ═══ */
.info{position:absolute;bottom:16px;left:16px;right:16px;
  pointer-events:none;z-index:5;
  display:flex;justify-content:space-between;align-items:flex-end;}
.info-left{max-width:50%;}
.info-title{font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  font-size:0.82em;font-weight:400;letter-spacing:0.06em;
  color:#b8753a;margin-bottom:4px;
  text-shadow:0 0 20px rgba(10,7,6,0.9),0 0 40px rgba(10,7,6,0.7);}
.info-desc{font-size:0.62em;color:#c4a088;line-height:1.8;opacity:0.6;
  text-shadow:0 0 12px rgba(10,7,6,0.95),0 0 24px rgba(10,7,6,0.8);}
.info-right{text-align:right;max-width:45%;}
.info-stat{font-family:'Courier New',monospace;font-size:0.68em;color:#7a9a6a;
  text-shadow:0 0 12px rgba(10,7,6,0.95);line-height:1.6;}

/* ═══ CONTROLS OVERLAY ═══ */
.controls{position:absolute;top:12px;right:16px;z-index:5;
  display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.slider-wrap{display:flex;align-items:center;gap:8px;pointer-events:all;}
.slider-label{font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:0.55em;color:#8b4a2e;letter-spacing:0.04em;white-space:nowrap;
  text-shadow:0 0 12px rgba(10,7,6,0.95);}
.slider-val{font-family:'Courier New',monospace;font-size:0.6em;color:#7a9a6a;
  min-width:32px;text-align:right;
  text-shadow:0 0 12px rgba(10,7,6,0.95);}
input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:3px;
  background:rgba(184,117,58,0.15);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:12px;height:12px;border-radius:50%;
  background:#b8753a;border:none;cursor:pointer;
  box-shadow:0 0 6px rgba(184,117,58,0.3);}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;
  background:#b8753a;border:none;cursor:pointer;}

/* ═══ TAP AREA for rhythm viz ═══ */
.tap-zone{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  z-index:5;pointer-events:all;}
.tap-btn{font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:0.6em;color:#8b4a2e;letter-spacing:0.06em;
  border:1px solid rgba(139,74,46,0.2);border-radius:8px;
  background:rgba(10,7,6,0.6);padding:10px 24px;cursor:pointer;
  transition:all 0.15s;user-select:none;-webkit-tap-highlight-color:transparent;}
.tap-btn:hover{color:#b8753a;border-color:rgba(184,117,58,0.3);}
.tap-btn:active{background:rgba(184,117,58,0.1);transform:scale(0.96);}
.tap-btn.flash{background:rgba(184,117,58,0.15);color:#b8753a;}

/* Tooltip for star tetrahedron */
.tooltip{position:absolute;z-index:15;pointer-events:none;
  font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:0.6em;color:#b8753a;letter-spacing:0.04em;
  background:rgba(10,7,6,0.85);border:1px solid rgba(184,117,58,0.2);
  border-radius:6px;padding:6px 12px;white-space:nowrap;
  text-shadow:0 0 8px rgba(10,7,6,0.9);
  opacity:0;transition:opacity 0.3s;}
.tooltip.show{opacity:1;}
.tooltip .tt-label{color:#b8753a;font-weight:400;}
.tooltip .tt-sub{color:#c4a088;font-size:0.9em;opacity:0.6;display:block;margin-top:2px;}

/* ═══ CREATION VIZ OVERLAY ═══ */
.creation-bar{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  width:60%;max-width:500px;height:3px;background:rgba(184,117,58,0.08);
  border-radius:2px;z-index:6;pointer-events:all;cursor:pointer;display:none;}
.creation-fill{height:100%;background:rgba(184,117,58,0.4);border-radius:2px;
  transition:width 0.3s ease;}
.creation-stage-label{position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:6;pointer-events:none;
  font-family:Georgia,serif;font-size:1.1em;color:rgba(184,117,58,0);
  text-align:center;letter-spacing:0.08em;
  text-shadow:0 0 30px rgba(10,7,6,0.95),0 0 60px rgba(10,7,6,0.8);
  transition:color 0.8s ease;display:none;line-height:1.6;}
.creation-stage-label .stage-sub{display:block;font-size:0.55em;
  color:rgba(196,160,136,0);letter-spacing:0.04em;
  transition:color 0.8s ease 0.2s;}

/* Film grain */
body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9998;opacity:0.015;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");}

@keyframes up{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:600px){
  body{overflow-y:hidden;}
  .nav{padding:8px 10px;flex-wrap:nowrap;}
  .back{font-size:0.55em;margin-right:10px;}
  .tab{font-size:0.5em;padding:6px 9px;}
  .info-title{font-size:0.68em;}
  .info-desc{font-size:0.52em;}
  .info-stat{font-size:0.56em;}
  input[type=range]{width:70px;}
  .slider-label{font-size:0.48em;}
}
</style>
</head>
<body>

<div class="nav">
  <a class="back" href="/">GUMP</a>
  <div class="tabs">
    <button class="tab active" data-viz="lorenz">Lorenz</button>
    <button class="tab" data-viz="kuramoto">Kuramoto</button>
    <button class="tab" data-viz="klag">K-Lag</button>
    <button class="tab" data-viz="machine">Machine</button>
    <button class="tab" data-viz="tetra">Star Tetrahedron</button>
    <button class="tab" data-viz="bifurcation">Bifurcation</button>
    <button class="tab" data-viz="pendulum">Double Pendulum</button>
    <button class="tab" data-viz="turing">Turing Patterns</button>
    <button class="tab" data-viz="creation">Creation</button>
    <button class="tab" data-viz="whitehole">White Hole</button>
  </div>
</div>

<div class="stage">
  <canvas id="viz" role="img" aria-label="Mathematical visualization"></canvas>

  <!-- Info overlay — updated per viz -->
  <div class="info">
    <div class="info-left">
      <div class="info-title" id="vizTitle">Lorenz Attractor</div>
      <div class="info-desc" id="vizDesc">Deterministic chaos. Two wings of sensitivity to initial conditions.</div>
    </div>
    <div class="info-right">
      <div class="info-stat" id="vizStat"></div>
    </div>
  </div>

  <!-- Controls — injected per viz -->
  <div class="controls" id="vizControls"></div>

  <!-- Tap zone for K-Lag -->
  <div class="tap-zone" id="tapZone" style="display:none;">
    <button class="tap-btn" id="tapBtn">tap rhythm</button>
  </div>

  <!-- Tooltip for Star Tetrahedron -->
  <div class="tooltip" id="tooltip"></div>

  <!-- Creation viz overlays -->
  <div class="creation-bar" id="creationBar"><div class="creation-fill" id="creationFill"></div></div>
  <div class="creation-stage-label" id="creationLabel"><span id="creationName"></span><span class="stage-sub" id="creationSub"></span></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// FLEX — deep mathematical visualizations
//
// Ten systems. One canvas. All warm. All alive.
// No spinning 3D. Parallax from z-depth. Drag to tilt.
// ═══════════════════════════════════════════════════════════════
(function(){
'use strict';

var cv = document.getElementById('viz');
var cx = cv.getContext('2d');
var W, H, dpr;
var PHI = (1+Math.sqrt(5))/2;
var PI2 = Math.PI*2;

function resize(){
  var r = cv.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  W = r.width; H = r.height;
  cv.width = W*dpr; cv.height = H*dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize', resize);

// ═══ PALETTE ═══
var EMBER  = [184,117,58];
var COPPER = [210,120,45];
var GOLD   = [220,175,80];
var SIENNA = [165,90,35];
var HONEY  = [230,170,80];
var TEAK   = [170,105,45];
var MOSS   = [95,155,70];
var SAGE   = [130,160,70];
var COOL   = [60,80,120];   // uncoupled/cold
var SHELL  = [196,160,136]; // c4a088

// ═══ STATE ═══
var activeViz = 'lorenz';
var animId = null;
var mouseX = W/2, mouseY = H/2;
var mouseDown = false;
var dragStartX = 0, dragStartY = 0;
var dragAngleX = 0, dragAngleY = 0;
var baseDragX = 0, baseDragY = 0;
var time = 0;

// ═══ MOUSE / TOUCH ═══
cv.addEventListener('mousemove', function(e){
  var r = cv.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  if(mouseDown){
    dragAngleX = baseDragX + (e.clientX - dragStartX)*0.003;
    dragAngleY = baseDragY + (e.clientY - dragStartY)*0.003;
    dragAngleY = Math.max(-0.8, Math.min(0.8, dragAngleY));
  }
});
cv.addEventListener('mousedown', function(e){
  mouseDown = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  baseDragX = dragAngleX; baseDragY = dragAngleY;
});
window.addEventListener('mouseup', function(){ mouseDown = false; });

cv.addEventListener('touchmove', function(e){
  e.preventDefault();
  var t = e.touches[0];
  var r = cv.getBoundingClientRect();
  mouseX = t.clientX - r.left;
  mouseY = t.clientY - r.top;
  if(mouseDown){
    dragAngleX = baseDragX + (t.clientX - dragStartX)*0.003;
    dragAngleY = baseDragY + (t.clientY - dragStartY)*0.003;
    dragAngleY = Math.max(-0.8, Math.min(0.8, dragAngleY));
  }
}, {passive:false});
cv.addEventListener('touchstart', function(e){
  var t = e.touches[0];
  mouseDown = true;
  dragStartX = t.clientX; dragStartY = t.clientY;
  baseDragX = dragAngleX; baseDragY = dragAngleY;
  var r = cv.getBoundingClientRect();
  mouseX = t.clientX - r.left;
  mouseY = t.clientY - r.top;
});
cv.addEventListener('touchend', function(){ mouseDown = false; });

// ═══ TABS ═══
var tabs = document.querySelectorAll('.tab');
var titleEl = document.getElementById('vizTitle');
var descEl = document.getElementById('vizDesc');
var statEl = document.getElementById('vizStat');
var ctrlEl = document.getElementById('vizControls');
var tapZone = document.getElementById('tapZone');
var tooltip = document.getElementById('tooltip');

for(var i=0; i<tabs.length; i++){
  tabs[i].addEventListener('click', function(){
    for(var j=0; j<tabs.length; j++) tabs[j].classList.remove('active');
    this.classList.add('active');
    switchViz(this.getAttribute('data-viz'));
  });
}

function switchViz(name){
  activeViz = name;
  time = 0;
  dragAngleX = 0; dragAngleY = 0;
  baseDragX = 0; baseDragY = 0;
  ctrlEl.innerHTML = '';
  tapZone.style.display = 'none';
  tooltip.classList.remove('show');
  tooltip.style.opacity = '0';

  // Hide creation overlays when switching away
  var crBarHide = document.getElementById('creationBar');
  var crLabelHide = document.getElementById('creationLabel');
  if(crBarHide) crBarHide.style.display = 'none';
  if(crLabelHide) crLabelHide.style.display = 'none';

  if(name === 'lorenz') initLorenz();
  else if(name === 'kuramoto') initKuramoto();
  else if(name === 'klag') initKLag();
  else if(name === 'machine') initMachine();
  else if(name === 'tetra') initTetra();
  else if(name === 'bifurcation') initBifurcation();
  else if(name === 'pendulum') initPendulum();
  else if(name === 'turing') initTuring();
  else if(name === 'creation') initCreation();
  else if(name === 'whitehole') initWhiteHole();
}

// ═══════════════════════════════════════════════════════════════
// 1. LORENZ ATTRACTOR
// ═══════════════════════════════════════════════════════════════
var lorenzTrail = [];
var lorenzX, lorenzY, lorenzZ;
var lorenzMaxTrail = 6000;
var lorenzBreathPhase = 0;

function initLorenz(){
  titleEl.textContent = 'Lorenz Attractor';
  descEl.textContent = 'Deterministic chaos. Two wings of sensitivity to initial conditions.';
  lorenzX = 1; lorenzY = 1; lorenzZ = 1;
  lorenzTrail = [];
  lorenzBreathPhase = 0;
}

function stepLorenz(){
  // Mouse position subtly shifts parameters — the attractor breathes
  var mx = (mouseX/W - 0.5)*2;
  var my = (mouseY/H - 0.5)*2;

  // Breathing — subtle parameter oscillation
  lorenzBreathPhase += 0.008;
  var breathSigma = Math.sin(lorenzBreathPhase * 0.7) * 0.3;
  var breathRho = Math.sin(lorenzBreathPhase * 0.43) * 0.5;

  var sigma = 10 + mx*0.5 + breathSigma;
  var rho = 28 + my*0.5 + breathRho;
  var beta = 8/3;
  var dt = 0.005;

  // Multiple integration steps per frame for density
  for(var s = 0; s < 8; s++){
    var dx = sigma * (lorenzY - lorenzX);
    var dy = lorenzX * (rho - lorenzZ) - lorenzY;
    var dz = lorenzX * lorenzY - beta * lorenzZ;
    lorenzX += dx*dt;
    lorenzY += dy*dt;
    lorenzZ += dz*dt;

    lorenzTrail.push({x:lorenzX, y:lorenzY, z:lorenzZ});
    if(lorenzTrail.length > lorenzMaxTrail) lorenzTrail.shift();
  }

  statEl.innerHTML =
    'x: ' + lorenzX.toFixed(2) + '<br>' +
    'y: ' + lorenzY.toFixed(2) + '<br>' +
    'z: ' + lorenzZ.toFixed(2) + '<br>' +
    '<span style="color:#8b4a2e">\u03C3=' + sigma.toFixed(1) + ' \u03C1=' + rho.toFixed(1) + '</span>';
}

function drawLorenz(){
  cx.fillStyle = 'rgba(10,7,6,0.12)';
  cx.fillRect(0,0,W,H);

  stepLorenz();

  var len = lorenzTrail.length;
  if(len < 2) return;

  var centerX = W*0.5, centerY = H*0.5;
  // Projection: top-down-ish with tilt from drag
  var cosA = Math.cos(dragAngleX), sinA = Math.sin(dragAngleX);
  var cosB = Math.cos(dragAngleY-0.3), sinB = Math.sin(dragAngleY-0.3);
  var scale = Math.min(W,H) * 0.014;

  cx.lineCap = 'round';
  cx.lineJoin = 'round';

  // Draw trail with depth-dependent brightness and color
  for(var i = 1; i < len; i++){
    var p0 = lorenzTrail[i-1];
    var p1 = lorenzTrail[i];

    // 3D rotation
    var x0 = p0.x*cosA - p0.y*sinA;
    var y0t = p0.x*sinA + p0.y*cosA;
    var y0 = y0t*cosB - p0.z*sinB;
    var z0 = y0t*sinB + p0.z*cosB;

    var x1 = p1.x*cosA - p1.y*sinA;
    var y1t = p1.x*sinA + p1.y*cosA;
    var y1 = y1t*cosB - p1.z*sinB;
    var z1 = y1t*sinB + p1.z*cosB;

    // Parallax from depth (no perspective rotation, just size/brightness shift)
    var depth = (z0+z1)*0.5;
    var depthNorm = (depth + 50) / 100; // normalize roughly 0-1
    depthNorm = Math.max(0, Math.min(1, depthNorm));

    // Age fade
    var age = i / len;
    var alpha = age * age * (0.3 + depthNorm*0.5);

    // Color: deep (far) = sienna, close = gold/copper
    var r = Math.round(SIENNA[0] + (GOLD[0]-SIENNA[0])*depthNorm);
    var g = Math.round(SIENNA[1] + (GOLD[1]-SIENNA[1])*depthNorm);
    var b = Math.round(SIENNA[2] + (GOLD[2]-SIENNA[2])*depthNorm);

    // Recent points glow hot
    if(age > 0.95){
      var hot = (age - 0.95) / 0.05;
      r = Math.min(255, r + Math.round(hot*60));
      g = Math.min(255, g + Math.round(hot*40));
      b = Math.min(255, b + Math.round(hot*20));
      alpha = Math.min(1, alpha + hot*0.4);
    }

    var lw = 0.6 + depthNorm*1.2 + (age > 0.95 ? (age-0.95)/0.05*1.5 : 0);

    cx.strokeStyle = 'rgba('+r+','+g+','+b+','+alpha.toFixed(3)+')';
    cx.lineWidth = lw;
    cx.beginPath();
    cx.moveTo(centerX + x0*scale, centerY + y0*scale);
    cx.lineTo(centerX + x1*scale, centerY + y1*scale);
    cx.stroke();
  }

  // Head glow
  var head = lorenzTrail[len-1];
  var hx = head.x*cosA - head.y*sinA;
  var hyt = head.x*sinA + head.y*cosA;
  var hy = hyt*cosB - head.z*sinB;

  var grad = cx.createRadialGradient(
    centerX+hx*scale, centerY+hy*scale, 0,
    centerX+hx*scale, centerY+hy*scale, 12
  );
  grad.addColorStop(0, 'rgba(230,190,100,0.6)');
  grad.addColorStop(0.4, 'rgba(210,140,60,0.2)');
  grad.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = grad;
  cx.fillRect(centerX+hx*scale-12, centerY+hy*scale-12, 24, 24);
}


// ═══════════════════════════════════════════════════════════════
// 2. KURAMOTO PHASE SPACE
// ═══════════════════════════════════════════════════════════════
var kuraN = 33;
var kuraPhases, kuraOmega, kuraK, kuraR;
var kuraSlider;

function initKuramoto(){
  titleEl.textContent = 'Kuramoto Oscillators';
  descEl.textContent = 'N=33. Watch them synchronize as coupling strength increases.';

  kuraPhases = new Float64Array(kuraN);
  kuraOmega = new Float64Array(kuraN);
  kuraK = 0.5;
  kuraR = 0;

  // Natural frequencies — Lorentzian distribution for clean transition
  for(var i=0; i<kuraN; i++){
    kuraPhases[i] = Math.random() * PI2;
    // Cauchy distribution centered at 1.0
    kuraOmega[i] = 1.0 + Math.tan((Math.random()-0.5)*Math.PI*0.8)*0.5;
  }

  // Build K slider
  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label">K</span>' +
    '<input type="range" id="kSlider" min="0" max="4" step="0.01" value="0.5">' +
    '<span class="slider-val" id="kVal">0.50</span>' +
    '</div>';
  kuraSlider = document.getElementById('kSlider');
  kuraSlider.addEventListener('input', function(){
    kuraK = parseFloat(this.value);
    document.getElementById('kVal').textContent = kuraK.toFixed(2);
  });
}

function stepKuramoto(){
  var dt = 0.03;
  // Compute order parameter
  var re=0, im=0;
  for(var i=0; i<kuraN; i++){
    re += Math.cos(kuraPhases[i]);
    im += Math.sin(kuraPhases[i]);
  }
  re /= kuraN; im /= kuraN;
  kuraR = Math.sqrt(re*re + im*im);
  var meanPhase = Math.atan2(im, re);

  // Update phases — mean-field Kuramoto
  for(var i=0; i<kuraN; i++){
    kuraPhases[i] += dt * (kuraOmega[i] + kuraK * kuraR * Math.sin(meanPhase - kuraPhases[i]));
    // Wrap to [0, 2pi]
    kuraPhases[i] = ((kuraPhases[i] % PI2) + PI2) % PI2;
  }
}

function drawKuramoto(){
  cx.fillStyle = '#0a0706';
  cx.fillRect(0,0,W,H);

  for(var sub=0; sub<3; sub++) stepKuramoto();

  var centerX = W*0.5, centerY = H*0.45;
  var radius = Math.min(W,H)*0.28;

  // ═══ Phase circle ═══
  cx.strokeStyle = 'rgba(184,117,58,0.08)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.arc(centerX, centerY, radius, 0, PI2);
  cx.stroke();

  // Threshold ring at R = 1/phi
  var rThresh = 1/PHI;
  cx.strokeStyle = 'rgba(130,160,70,0.06)';
  cx.lineWidth = 1;
  cx.setLineDash([4,6]);
  cx.beginPath();
  cx.arc(centerX, centerY, radius*rThresh, 0, PI2);
  cx.stroke();
  cx.setLineDash([]);

  // ═══ Order parameter vector ═══
  var re=0, im=0;
  for(var i=0; i<kuraN; i++){
    re += Math.cos(kuraPhases[i]);
    im += Math.sin(kuraPhases[i]);
  }
  re /= kuraN; im /= kuraN;
  var meanPhase = Math.atan2(im, re);

  // R glow in center
  var rGlow = cx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius*kuraR*1.2);
  var warmR = Math.round(COOL[0] + (GOLD[0]-COOL[0])*kuraR);
  var warmG = Math.round(COOL[1] + (GOLD[1]-COOL[1])*kuraR);
  var warmB = Math.round(COOL[2] + (GOLD[2]-COOL[2])*kuraR);
  rGlow.addColorStop(0, 'rgba('+warmR+','+warmG+','+warmB+','+(kuraR*0.12).toFixed(3)+')');
  rGlow.addColorStop(1, 'rgba('+warmR+','+warmG+','+warmB+',0)');
  cx.fillStyle = rGlow;
  cx.fillRect(0,0,W,H);

  // Draw R vector
  var rEndX = centerX + Math.cos(meanPhase)*radius*kuraR;
  var rEndY = centerY + Math.sin(meanPhase)*radius*kuraR;
  cx.strokeStyle = 'rgba('+warmR+','+warmG+','+warmB+','+(0.15+kuraR*0.5).toFixed(3)+')';
  cx.lineWidth = 1.5;
  cx.beginPath();
  cx.moveTo(centerX, centerY);
  cx.lineTo(rEndX, rEndY);
  cx.stroke();

  // ═══ Oscillator dots on circle ═══
  for(var i=0; i<kuraN; i++){
    var angle = kuraPhases[i];
    var px = centerX + Math.cos(angle)*radius;
    var py = centerY + Math.sin(angle)*radius;

    // Phase difference from mean → color
    var pdiff = Math.abs(angle - meanPhase);
    if(pdiff > Math.PI) pdiff = PI2 - pdiff;
    var sync = 1 - pdiff/Math.PI;

    // Interpolate cool blue → warm gold based on sync
    var cr = Math.round(COOL[0] + (GOLD[0]-COOL[0])*sync);
    var cg = Math.round(COOL[1] + (GOLD[1]-COOL[1])*sync);
    var cb = Math.round(COOL[2] + (GOLD[2]-COOL[2])*sync);

    var sz = 3 + sync*3;

    // Glow for synced oscillators
    if(sync > 0.6){
      var glowGrad = cx.createRadialGradient(px,py,0,px,py,sz*4);
      glowGrad.addColorStop(0, 'rgba('+cr+','+cg+','+cb+','+(sync*0.2).toFixed(3)+')');
      glowGrad.addColorStop(1, 'rgba('+cr+','+cg+','+cb+',0)');
      cx.fillStyle = glowGrad;
      cx.fillRect(px-sz*4,py-sz*4,sz*8,sz*8);
    }

    // Connecting lines for close oscillators (visual coupling)
    for(var j=i+1; j<kuraN; j++){
      var a2 = kuraPhases[j];
      var diff = Math.abs(angle - a2);
      if(diff > Math.PI) diff = PI2 - diff;
      if(diff < 0.3){
        var px2 = centerX + Math.cos(a2)*radius;
        var py2 = centerY + Math.sin(a2)*radius;
        var lineSync = 1 - diff/0.3;
        cx.strokeStyle = 'rgba('+cr+','+cg+','+cb+','+(lineSync*0.08).toFixed(3)+')';
        cx.lineWidth = 0.5;
        cx.beginPath(); cx.moveTo(px,py); cx.lineTo(px2,py2); cx.stroke();
      }
    }

    cx.fillStyle = 'rgba('+cr+','+cg+','+cb+',0.85)';
    cx.beginPath(); cx.arc(px,py,sz,0,PI2); cx.fill();
  }

  // ═══ R bar at bottom ═══
  var barX = centerX - radius;
  var barY = centerY + radius + 40;
  var barW = radius*2;
  var barH = 6;

  // Bar background
  cx.fillStyle = 'rgba(184,117,58,0.06)';
  cx.fillRect(barX, barY, barW, barH);

  // Bar fill
  var fillGrad = cx.createLinearGradient(barX, barY, barX+barW*kuraR, barY);
  fillGrad.addColorStop(0, 'rgba('+COOL[0]+','+COOL[1]+','+COOL[2]+',0.6)');
  fillGrad.addColorStop(1, 'rgba('+warmR+','+warmG+','+warmB+',0.8)');
  cx.fillStyle = fillGrad;
  cx.fillRect(barX, barY, barW*kuraR, barH);

  // R label
  cx.font = '10px "Courier New",monospace';
  cx.fillStyle = '#7a9a6a';
  cx.textAlign = 'left';
  cx.fillText('R = ' + kuraR.toFixed(3), barX, barY + barH + 14);

  // Kc label
  cx.fillStyle = '#8b4a2e';
  cx.textAlign = 'right';
  cx.fillText('K = ' + kuraK.toFixed(2), barX + barW, barY + barH + 14);
  cx.textAlign = 'left';

  // 1/phi threshold marker on bar
  var threshX = barX + barW * rThresh;
  cx.strokeStyle = 'rgba(130,160,70,0.2)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(threshX, barY-3);
  cx.lineTo(threshX, barY+barH+3);
  cx.stroke();

  statEl.innerHTML =
    'R: ' + kuraR.toFixed(3) + '<br>' +
    'K: ' + kuraK.toFixed(2) + '<br>' +
    'N: ' + kuraN + '<br>' +
    '<span style="color:#8b4a2e">1/\u03C6 = ' + rThresh.toFixed(3) + '</span>';
}


// ═══════════════════════════════════════════════════════════════
// 3. K-LAG SPECTRUM VISUALIZER
// ═══════════════════════════════════════════════════════════════
var klagTaps = [];
var klagAutoCorr = new Float64Array(50);
var klagMaxLag = 50;
var klagAutoMode = true;
var klagAutoPhase = 0;

function initKLag(){
  titleEl.textContent = 'K-Lag Spectrum';
  descEl.textContent = 'Tap a rhythm or watch the auto-generator. Autocorrelation at lags 1-50.';
  tapZone.style.display = '';
  klagTaps = [];
  klagAutoCorr = new Float64Array(50);
  klagAutoMode = true;
  klagAutoPhase = 0;

  // Auto-generate a rhythm with phrase structure
  generateAutoRhythm();

  var tapBtn = document.getElementById('tapBtn');
  tapBtn.textContent = 'tap rhythm';
  tapBtn.onclick = function(){
    if(klagAutoMode){
      klagAutoMode = false;
      klagTaps = [];
      klagAutoCorr = new Float64Array(50);
      tapBtn.textContent = 'tap rhythm (tapping...)';
    }
    klagTaps.push(performance.now());
    tapBtn.classList.add('flash');
    setTimeout(function(){ tapBtn.classList.remove('flash'); }, 100);
    if(klagTaps.length > 2) computeAutoCorr();
  };

  // Add reset/auto controls
  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<button class="tap-btn" id="klagAuto" style="font-size:0.55em;padding:5px 12px;">auto</button>' +
    '</div>';
  document.getElementById('klagAuto').onclick = function(){
    klagAutoMode = true;
    klagTaps = [];
    generateAutoRhythm();
    tapBtn.textContent = 'tap rhythm';
  };
}

function generateAutoRhythm(){
  // Generate a rhythm with two-level phrase structure
  // Pattern: [x . . x . x . . | x . x . . x . .] repeated with slight variation
  klagTaps = [];
  var baseIOI = 200; // ms between smallest unit
  // Euclidean(8,3) → [x..x.x..] — the universal pattern
  var pattern = [1,0,0,1,0,1,0,0, 1,0,1,0,0,1,0,0];
  var t = 0;
  for(var rep=0; rep<6; rep++){
    for(var i=0; i<pattern.length; i++){
      if(pattern[i]){
        // Add subtle humanization
        klagTaps.push(t + (Math.random()-0.5)*15);
      }
      t += baseIOI;
    }
  }
  computeAutoCorr();
}

function computeAutoCorr(){
  if(klagTaps.length < 3) return;

  // Convert taps to IOI series
  var ioi = [];
  for(var i=1; i<klagTaps.length; i++){
    ioi.push(klagTaps[i] - klagTaps[i-1]);
  }

  // Normalize IOIs
  var mean = 0;
  for(var i=0; i<ioi.length; i++) mean += ioi[i];
  mean /= ioi.length;

  var normed = [];
  for(var i=0; i<ioi.length; i++) normed.push(ioi[i] - mean);

  // Autocorrelation at lags 1-50
  var maxLag = Math.min(klagMaxLag, normed.length - 1);
  var var0 = 0;
  for(var i=0; i<normed.length; i++) var0 += normed[i]*normed[i];
  if(var0 === 0) var0 = 1;

  for(var lag=0; lag<klagMaxLag; lag++){
    if(lag >= maxLag){
      klagAutoCorr[lag] = 0;
      continue;
    }
    var sum = 0;
    for(var i=0; i<normed.length - lag - 1; i++){
      sum += normed[i] * normed[i+lag+1];
    }
    klagAutoCorr[lag] = sum / var0;
  }
}

function drawKLag(){
  cx.fillStyle = '#0a0706';
  cx.fillRect(0,0,W,H);

  if(klagAutoMode){
    klagAutoPhase += 0.015;
    // Subtly vary the auto rhythm over time
    if(Math.sin(klagAutoPhase) > 0.99){
      generateAutoRhythm();
    }
  }

  var marginX = W*0.08;
  var marginTop = H*0.15;
  var marginBot = H*0.25;
  var plotW = W - marginX*2;
  var plotH = H - marginTop - marginBot;

  // Find max for scaling
  var maxVal = 0.01;
  for(var i=0; i<klagMaxLag; i++){
    if(Math.abs(klagAutoCorr[i]) > maxVal) maxVal = Math.abs(klagAutoCorr[i]);
  }

  // ═══ Mountain range ═══
  var barW = plotW / klagMaxLag;
  var zeroY = marginTop + plotH * 0.6; // Baseline

  // Mountain fill
  cx.beginPath();
  cx.moveTo(marginX, zeroY);
  for(var i=0; i<klagMaxLag; i++){
    var x = marginX + (i+0.5)*barW;
    var val = klagAutoCorr[i] / maxVal;
    var h = val * plotH * 0.55;
    if(i === 0){
      cx.lineTo(x, zeroY - h);
    } else {
      // Smooth curve
      var prevX = marginX + (i-0.5)*barW;
      var prevVal = klagAutoCorr[i-1] / maxVal;
      var prevH = prevVal * plotH * 0.55;
      var cpx = (prevX + x) / 2;
      cx.bezierCurveTo(cpx, zeroY - prevH, cpx, zeroY - h, x, zeroY - h);
    }
  }
  cx.lineTo(marginX + plotW, zeroY);
  cx.closePath();

  // Gradient fill
  var mGrad = cx.createLinearGradient(0, marginTop, 0, zeroY);
  mGrad.addColorStop(0, 'rgba(220,175,80,0.15)');
  mGrad.addColorStop(0.5, 'rgba(184,117,58,0.08)');
  mGrad.addColorStop(1, 'rgba(165,90,35,0.02)');
  cx.fillStyle = mGrad;
  cx.fill();

  // Mountain outline
  cx.beginPath();
  cx.moveTo(marginX, zeroY);
  for(var i=0; i<klagMaxLag; i++){
    var x = marginX + (i+0.5)*barW;
    var val = klagAutoCorr[i] / maxVal;
    var h = val * plotH * 0.55;
    if(i === 0){
      cx.lineTo(x, zeroY - h);
    } else {
      var prevX = marginX + (i-0.5)*barW;
      var prevVal = klagAutoCorr[i-1] / maxVal;
      var prevH = prevVal * plotH * 0.55;
      var cpx = (prevX + x) / 2;
      cx.bezierCurveTo(cpx, zeroY - prevH, cpx, zeroY - h, x, zeroY - h);
    }
  }
  cx.strokeStyle = 'rgba(220,175,80,0.5)';
  cx.lineWidth = 1.5;
  cx.stroke();

  // ═══ Peak glows ═══
  for(var i=0; i<klagMaxLag; i++){
    var val = klagAutoCorr[i] / maxVal;
    if(val > 0.3){
      var x = marginX + (i+0.5)*barW;
      var h = val * plotH * 0.55;
      var py = zeroY - h;

      var glow = cx.createRadialGradient(x, py, 0, x, py, 20 + val*15);
      var intensity = val * val;
      glow.addColorStop(0, 'rgba(230,190,100,'+(intensity*0.25).toFixed(3)+')');
      glow.addColorStop(0.5, 'rgba(184,117,58,'+(intensity*0.08).toFixed(3)+')');
      glow.addColorStop(1, 'rgba(184,117,58,0)');
      cx.fillStyle = glow;
      cx.fillRect(x-35, py-35, 70, 70);

      // Peak dot
      cx.fillStyle = 'rgba(230,190,100,'+(0.4+val*0.5).toFixed(3)+')';
      cx.beginPath(); cx.arc(x, py, 2+val*2, 0, PI2); cx.fill();
    }
  }

  // ═══ Bars (subtle vertical lines at each lag) ═══
  for(var i=0; i<klagMaxLag; i++){
    var x = marginX + (i+0.5)*barW;
    var val = klagAutoCorr[i] / maxVal;
    var h = val * plotH * 0.55;

    cx.strokeStyle = 'rgba(184,117,58,'+(0.05 + Math.abs(val)*0.15).toFixed(3)+')';
    cx.lineWidth = Math.max(1, barW*0.4);
    cx.beginPath();
    cx.moveTo(x, zeroY);
    cx.lineTo(x, zeroY - h);
    cx.stroke();
  }

  // Zero line
  cx.strokeStyle = 'rgba(184,117,58,0.1)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(marginX, zeroY);
  cx.lineTo(marginX + plotW, zeroY);
  cx.stroke();

  // Lag labels
  cx.font = '9px "Courier New",monospace';
  cx.fillStyle = '#8b4a2e';
  cx.textAlign = 'center';
  for(var i=0; i<klagMaxLag; i+=5){
    var x = marginX + (i+0.5)*barW;
    cx.fillText(''+(i+1), x, zeroY + 16);
  }
  cx.textAlign = 'left';
  cx.fillText('lag', marginX, zeroY + 30);

  // IOI visualization at bottom — show the rhythm as ticks
  var tickY = H - marginBot*0.5;
  if(klagTaps.length > 1){
    var tMin = klagTaps[0], tMax = klagTaps[klagTaps.length-1];
    var tRange = tMax - tMin;
    if(tRange > 0){
      for(var i=0; i<klagTaps.length; i++){
        var tx = marginX + ((klagTaps[i]-tMin)/tRange)*plotW;
        cx.strokeStyle = 'rgba(220,175,80,0.3)';
        cx.lineWidth = 1.5;
        cx.beginPath();
        cx.moveTo(tx, tickY - 6);
        cx.lineTo(tx, tickY + 6);
        cx.stroke();
      }
    }
  }

  statEl.innerHTML =
    'taps: ' + klagTaps.length + '<br>' +
    'lags: ' + klagMaxLag + '<br>' +
    '<span style="color:#8b4a2e">' + (klagAutoMode ? 'auto-rhythm' : 'your rhythm') + '</span>';
}


// ═══════════════════════════════════════════════════════════════
// 4. THE MACHINE — 137 oscillators on golden spiral
// ═══════════════════════════════════════════════════════════════
var machN = 137;
var machPhases, machOmega, machNx, machNy, machNbr, machNodeCol;
var machR = 0;
var machK = 1.868;
var machGA = 2.39996322;
var machSyncPairs = []; // cached list of synced pairs for golden threads
var machPrevR = 0; // for R smoothing
var machClusterIds; // which cluster each node belongs to

var MACH_PALETTE = [
  [210,120,45],[185,82,40],[190,145,60],[165,90,35],
  [95,155,70],[75,130,60],[220,155,65],[200,100,40],
  [140,170,75],[180,130,50],[160,75,35],[110,145,65],
  [230,170,80],[170,105,45],[130,160,70],[195,135,55],[145,85,40]
];

function initMachine(){
  titleEl.textContent = 'The Machine';
  descEl.textContent = '137 coupled oscillators on a golden spiral. K=K* (1.868). Watch them lock.';

  machPhases = new Float64Array(machN);
  machOmega = new Float64Array(machN);
  machNx = []; machNy = [];
  machNbr = [];
  machNodeCol = [];
  machSyncPairs = [];
  machPrevR = 0;
  machClusterIds = new Uint8Array(machN);

  // Layout on golden spiral
  for(var i=0; i<machN; i++){
    var r = 0.8 + Math.sqrt(i/machN)*5.5;
    var a = i*machGA;
    machNx.push(Math.cos(a)*r);
    machNy.push(Math.sin(a)*r);
    // Narrower frequency spread so coupling can actually overcome it
    // Centered around 1.0, spread ~ 0.5
    machPhases[i] = Math.random() * PI2;
    machOmega[i] = 1.0 + (Math.random()-0.5)*0.8;
    // Assign cluster (7 clusters by golden angle sectors)
    machClusterIds[i] = Math.floor(((a % PI2)+PI2)%PI2 / PI2 * 7);
    machNodeCol.push(MACH_PALETTE[Math.floor((i*PHI*7) % MACH_PALETTE.length)]);
  }

  // Build neighbor list — wider radius for rich coupling
  for(var i=0; i<machN; i++){
    var nn = [];
    for(var j=0; j<machN; j++){
      if(j===i) continue;
      var ddx = machNx[j]-machNx[i], ddy = machNy[j]-machNy[i];
      if(ddx*ddx+ddy*ddy < 5.0) nn.push(j);
    }
    machNbr.push(nn);
  }

  // K slider — 0 to 4, default at K*
  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label">K</span>' +
    '<input type="range" id="machKSlider" min="0" max="4" step="0.01" value="1.868">' +
    '<span class="slider-val" id="machKVal">1.87</span>' +
    '</div>';
  document.getElementById('machKSlider').addEventListener('input', function(){
    machK = parseFloat(this.value);
    document.getElementById('machKVal').textContent = machK.toFixed(2);
  });
}

function stepMachine(){
  // Compute order parameter R
  var mre=0, mim=0;
  for(var i=0; i<machN; i++){
    mre += Math.cos(machPhases[i]);
    mim += Math.sin(machPhases[i]);
  }
  mre /= machN; mim /= machN;
  var rawR = Math.sqrt(mre*mre+mim*mim);
  // Smooth R for visual stability
  machR = machPrevR*0.9 + rawR*0.1;
  machPrevR = machR;

  var dt = 0.02;

  // Update phases with LOCAL coupling (divide by neighbor count, not N)
  for(var i=0; i<machN; i++){
    var c = 0;
    var nn = machNbr[i];
    var nLen = nn.length;
    if(nLen > 0){
      for(var k=0; k<nLen; k++){
        c += Math.sin(machPhases[nn[k]] - machPhases[i]);
      }
      c /= nLen; // normalize by actual neighbor count
    }
    machPhases[i] += dt*(machOmega[i] + machK * c);
    // Wrap phase
    machPhases[i] = ((machPhases[i] % PI2) + PI2) % PI2;
  }
}

function drawMachine(){
  cx.fillStyle = '#0a0706';
  cx.fillRect(0,0,W,H);

  // Multiple physics steps per frame for visible dynamics
  for(var sub=0; sub<3; sub++) stepMachine();

  var sc = Math.min(W,H)*0.06;
  var centerX = W*0.5, centerY = H*0.48;

  // Projection — top-down with drag tilt
  var cosA = Math.cos(dragAngleX*0.5);
  var sinA = Math.sin(dragAngleX*0.5);
  var tiltY = -0.35 + dragAngleY;
  var cosT = Math.cos(tiltY), sinT = Math.sin(tiltY);

  // Global breath based on R — THIS is what makes R visible
  var globalBreath = 0.5 + machR*0.8;

  // Project all nodes
  var proj = [];
  for(var i=0; i<machN; i++){
    var p = machPhases[i] % PI2; if(p<0) p+=PI2;
    var z3d = p/PI2 * 3.2;

    var x1 = machNx[i]*cosA + z3d*sinA;
    var z1 = -machNx[i]*sinA + z3d*cosA;
    var y1 = machNy[i]*cosT - z1*sinT;
    var z2 = machNy[i]*sinT + z1*cosT;

    var persp = 500/(500 + z2*sc*0.3);
    var sx = centerX + x1*sc*persp;
    var sy = centerY + y1*sc*persp;
    proj.push({i:i, sx:sx, sy:sy, z:z2, persp:persp, phase:p});
  }
  proj.sort(function(a,b){ return b.z - a.z; });

  var idxMap = new Array(machN);
  for(var k=0; k<machN; k++) idxMap[proj[k].i] = proj[k];

  // ═══ CENTER GLOW — R as visible intensity ═══
  var glowRadius = 40 + machR*120;
  var rGlow = cx.createRadialGradient(centerX,centerY,0,centerX,centerY,glowRadius);
  var rIntensity = machR * machR; // quadratic for drama
  rGlow.addColorStop(0, 'rgba(220,175,80,'+(rIntensity*0.25).toFixed(3)+')');
  rGlow.addColorStop(0.3, 'rgba(210,140,60,'+(rIntensity*0.10).toFixed(3)+')');
  rGlow.addColorStop(0.6, 'rgba(184,117,58,'+(rIntensity*0.04).toFixed(3)+')');
  rGlow.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = rGlow;
  cx.beginPath(); cx.arc(centerX,centerY,glowRadius,0,PI2); cx.fill();

  // ═══ CONNECTIONS — golden threads for phase-locked pairs ═══
  cx.globalCompositeOperation = 'lighter';

  var syncCount = 0;
  for(var i=0; i<machN; i++){
    var nd = idxMap[i]; if(!nd) continue;
    var nn = machNbr[i];
    for(var j=0; j<nn.length; j++){
      if(nn[j] <= i) continue;
      var nb = idxMap[nn[j]]; if(!nb) continue;
      var pdiff = Math.abs(nd.phase - nb.phase);
      if(pdiff > Math.PI) pdiff = PI2 - pdiff;
      var sync = 1 - pdiff/Math.PI;
      if(sync < 0.3) continue;

      var s2 = sync*sync, s3 = s2*sync;
      var pMin = Math.min(nd.persp, nb.persp);

      // Color by sync level: low sync = dim copper, high sync = bright gold
      var colR, colG, colB;
      if(sync > 0.85){
        // GOLDEN thread — phase locked
        colR = 230; colG = 190; colB = 100;
        syncCount++;
      } else if(sync > 0.6){
        colR = 210; colG = 150; colB = 60;
      } else {
        colR = 165; colG = 90; colB = 35;
      }

      var alpha = s2 * 0.6 * pMin * globalBreath;
      cx.strokeStyle = 'rgba('+colR+','+colG+','+colB+','+alpha.toFixed(3)+')';
      cx.lineWidth = (0.3+s2*2.0)*pMin;
      cx.beginPath(); cx.moveTo(nd.sx,nd.sy); cx.lineTo(nb.sx,nb.sy); cx.stroke();

      // Extra glow layer for highly synced pairs
      if(sync > 0.8){
        var glowA = (sync-0.8)*5.0 * 0.15 * pMin * globalBreath;
        cx.strokeStyle = 'rgba(230,190,100,'+glowA.toFixed(3)+')';
        cx.lineWidth = (2+s2*5)*pMin;
        cx.beginPath(); cx.moveTo(nd.sx,nd.sy); cx.lineTo(nb.sx,nb.sy); cx.stroke();
      }
    }
  }

  // ═══ NODES ═══
  for(var k=0; k<proj.length; k++){
    var nd = proj[k];
    var col = machNodeCol[nd.i];

    // How synced is this node with its neighbors?
    var localSync = 0;
    var nn = machNbr[nd.i];
    if(nn.length > 0){
      for(var j=0; j<nn.length; j++){
        var pd = Math.abs(machPhases[nd.i] - machPhases[nn[j]]);
        if(pd > Math.PI) pd = PI2 - pd;
        localSync += 1 - pd/Math.PI;
      }
      localSync /= nn.length;
    }

    var breath = Math.sin(machPhases[nd.i]);
    var size = (2.0 + localSync*2.5 + breath*0.6) * nd.persp * globalBreath;
    var bright = (0.5 + localSync*0.7) * nd.persp;

    // Color shifts from cool (desync) to hot gold (synced)
    var syncCol;
    if(localSync > 0.7){
      // Hot gold — locked
      syncCol = [230,190,100];
    } else if(localSync > 0.4){
      // Warm copper
      var t = (localSync-0.4)/0.3;
      syncCol = [
        Math.round(col[0] + (230-col[0])*t),
        Math.round(col[1] + (190-col[1])*t),
        Math.round(col[2] + (100-col[2])*t)
      ];
    } else {
      // Original palette color, dimmer
      syncCol = col;
    }

    // Radial glow — bigger for synced nodes
    if(bright > 0.1 && nd.persp > 0.4){
      var glowR = size * (3 + localSync*5);
      var grad = cx.createRadialGradient(nd.sx,nd.sy,size*0.2,nd.sx,nd.sy,glowR);
      grad.addColorStop(0, 'rgba('+syncCol[0]+','+syncCol[1]+','+syncCol[2]+','+(bright*0.25).toFixed(3)+')');
      grad.addColorStop(0.3, 'rgba('+syncCol[0]+','+syncCol[1]+','+syncCol[2]+','+(bright*0.08).toFixed(3)+')');
      grad.addColorStop(1, 'rgba('+syncCol[0]+','+syncCol[1]+','+syncCol[2]+',0)');
      cx.fillStyle = grad;
      cx.fillRect(nd.sx-glowR, nd.sy-glowR, glowR*2, glowR*2);
    }

    // Core dot
    var cr = syncCol[0], cg = syncCol[1], cb = syncCol[2];
    if(nd.persp > 0.4){
      var coreGrad = cx.createRadialGradient(nd.sx,nd.sy,0,nd.sx,nd.sy,size);
      coreGrad.addColorStop(0, 'rgba('+Math.min(255,cr+40)+','+Math.min(255,cg+30)+','+Math.min(255,cb+20)+','+Math.min(1,bright*1.2).toFixed(3)+')');
      coreGrad.addColorStop(0.5, 'rgba('+cr+','+cg+','+cb+','+bright.toFixed(3)+')');
      coreGrad.addColorStop(1, 'rgba('+cr+','+cg+','+cb+','+(bright*0.2).toFixed(3)+')');
      cx.fillStyle = coreGrad;
    } else {
      cx.fillStyle = 'rgba('+cr+','+cg+','+cb+','+bright.toFixed(3)+')';
    }
    cx.beginPath(); cx.arc(nd.sx,nd.sy,size,0,PI2); cx.fill();
  }

  cx.globalCompositeOperation = 'source-over';

  // ═══ R bar at bottom ═══
  var barW2 = Math.min(W,H)*0.35;
  var barX2 = centerX - barW2/2;
  var barY2 = H - 60;
  var barH2 = 4;

  cx.fillStyle = 'rgba(184,117,58,0.06)';
  cx.fillRect(barX2, barY2, barW2, barH2);

  var rBarGrad = cx.createLinearGradient(barX2, barY2, barX2+barW2*machR, barY2);
  rBarGrad.addColorStop(0, 'rgba(60,80,120,0.5)');
  rBarGrad.addColorStop(0.5, 'rgba(184,117,58,0.7)');
  rBarGrad.addColorStop(1, 'rgba(230,190,100,0.9)');
  cx.fillStyle = rBarGrad;
  cx.fillRect(barX2, barY2, barW2*Math.min(1,machR), barH2);

  // 1/phi threshold marker
  var threshX = barX2 + barW2 / PHI;
  cx.strokeStyle = 'rgba(130,160,70,0.25)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(threshX, barY2-4);
  cx.lineTo(threshX, barY2+barH2+4);
  cx.stroke();

  cx.font = '9px "Courier New",monospace';
  cx.fillStyle = 'rgba(130,160,70,0.4)';
  cx.textAlign = 'center';
  cx.fillText('1/\u03C6', threshX, barY2+barH2+14);
  cx.textAlign = 'left';

  // Stats
  var rColor = machR > 1/PHI ? '#7a9a6a' : '#8b4a2e';
  statEl.innerHTML =
    'R: <span style="color:'+rColor+'">' + machR.toFixed(3) + '</span><br>' +
    'K: ' + machK.toFixed(3) + '<br>' +
    'N: ' + machN + '<br>' +
    'locked: ' + syncCount + '<br>' +
    '<span style="color:#8b4a2e">1/\u03C6 = ' + (1/PHI).toFixed(3) + '</span>';
}


// ═══════════════════════════════════════════════════════════════
// 5. STAR TETRAHEDRON
// ═══════════════════════════════════════════════════════════════
var tetraTime = 0;
var tetraHover = -1;

// Two interlocking tetrahedra
// Tetrahedron 1: pointing up
// Tetrahedron 2: pointing down (inverted)
// Labels for C3/2O framework
var TETRA_LABELS = [
  // Tetrahedron 1 (fire/up)
  {name:'K', sub:'coupling strength', var:'K*=1.868'},
  {name:'R', sub:'order parameter', var:'R threshold=1/\u03C6'},
  {name:'E', sub:'energy', var:'E=K\u00B7R\u00B7ln(N)'},
  {name:'T', sub:'temperature', var:'T=E/S'},
  // Tetrahedron 2 (water/down)
  {name:'\u03C3', sub:'symmetry group', var:'2O \u2282 SU(2)'},
  {name:'\u03C9', sub:'natural frequency', var:'\u03C9_i ~ Cauchy'},
  {name:'\u03C6', sub:'golden ratio', var:'(1+\u221A5)/2'},
  {name:'\u039B', sub:'Mangoldt weight', var:'\u039B(n)=ln p'}
];

function initTetra(){
  titleEl.textContent = 'Star Tetrahedron';
  descEl.textContent = 'Two interlocking tetrahedra. The geometry that keeps showing up in the framework.';
  tetraTime = 0;
  tetraHover = -1;

  // Show tooltip instructions
  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label" style="opacity:0.5;">hover vertices</span>' +
    '</div>';
}

function getTetraVertices(){
  // Star tetrahedron = two interlocking tetrahedra
  // Tetrahedron 1 (up): vertices of regular tetrahedron
  var s = Math.min(W,H)*0.18;
  var cx2 = W*0.5, cy2 = H*0.45;

  // Breathing
  var breathScale = 1 + Math.sin(tetraTime*0.5)*0.03;
  s *= breathScale;

  // 3D regular tetrahedron vertices
  // Centered at origin, then projected
  var sqrt2 = Math.sqrt(2), sqrt3 = Math.sqrt(3);

  // Tetra 1 (up)
  var t1 = [
    { x:0,         y:-1,        z:0 },
    { x:sqrt2*2/3, y:1/3,       z:0 },
    { x:-sqrt2/3,  y:1/3,       z:sqrt2/sqrt3 },
    { x:-sqrt2/3,  y:1/3,       z:-sqrt2/sqrt3 }
  ];

  // Tetra 2 (down) — inverted
  var t2 = [
    { x:0,         y:1,         z:0 },
    { x:-sqrt2*2/3,y:-1/3,      z:0 },
    { x:sqrt2/3,   y:-1/3,      z:-sqrt2/sqrt3 },
    { x:sqrt2/3,   y:-1/3,      z:sqrt2/sqrt3 }
  ];

  // Apply drag rotation + subtle auto rotation
  var autoAngle = tetraTime * 0.08;
  var rotY = dragAngleX + autoAngle;
  var rotX = dragAngleY - 0.2;

  function rot(v){
    // Rotate Y
    var cosY = Math.cos(rotY), sinY = Math.sin(rotY);
    var x1 = v.x*cosY + v.z*sinY;
    var z1 = -v.x*sinY + v.z*cosY;
    // Rotate X
    var cosX = Math.cos(rotX), sinX = Math.sin(rotX);
    var y1 = v.y*cosX - z1*sinX;
    var z2 = v.y*sinX + z1*cosX;
    // Project with parallax (NOT perspective rotation)
    var depth = z2;
    var depthFactor = 1 + depth*0.12; // subtle parallax
    return {
      sx: cx2 + x1*s*depthFactor,
      sy: cy2 + y1*s*depthFactor,
      z: z2,
      bright: 0.5 + (z2+1)*0.25
    };
  }

  var verts1 = t1.map(rot);
  var verts2 = t2.map(rot);

  return {up: verts1, down: verts2};
}

function drawTetra(){
  cx.fillStyle = '#0a0706';
  cx.fillRect(0,0,W,H);

  tetraTime += 0.016;

  var verts = getTetraVertices();
  var up = verts.up;
  var down = verts.down;

  // Edge definitions
  var edges1 = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];
  var edges2 = [[0,1],[0,2],[0,3],[1,2],[1,3],[2,3]];

  // ═══ Draw edges ═══
  function drawEdges(verts, edges, color, label){
    for(var i=0; i<edges.length; i++){
      var a = verts[edges[i][0]];
      var b = verts[edges[i][1]];

      var avgZ = (a.z + b.z)*0.5;
      var depth = (avgZ+1.5)/3; // normalize
      var breathPulse = Math.sin(tetraTime*0.8 + i*0.5)*0.15 + 0.85;

      var alpha = (0.15 + depth*0.2) * breathPulse;
      cx.strokeStyle = 'rgba('+color[0]+','+color[1]+','+color[2]+','+alpha.toFixed(3)+')';
      cx.lineWidth = 1 + depth*0.8;
      cx.beginPath();
      cx.moveTo(a.sx, a.sy);
      cx.lineTo(b.sx, b.sy);
      cx.stroke();

      // Glow line
      cx.strokeStyle = 'rgba('+color[0]+','+color[1]+','+color[2]+','+(alpha*0.3).toFixed(3)+')';
      cx.lineWidth = 3 + depth*2;
      cx.beginPath();
      cx.moveTo(a.sx, a.sy);
      cx.lineTo(b.sx, b.sy);
      cx.stroke();
    }
  }

  drawEdges(up, edges1, COPPER, 'fire');
  drawEdges(down, edges2, [120,140,180], 'water');

  // ═══ Draw vertices ═══
  function drawVerts(verts, startIdx, color){
    for(var i=0; i<verts.length; i++){
      var v = verts[i];
      var labelIdx = startIdx + i;
      var label = TETRA_LABELS[labelIdx];

      // Pulse based on framework variable
      var pulse = Math.sin(tetraTime * (1 + i*0.3)) * 0.3 + 0.7;
      var sz = 4 + pulse*3 + v.bright*2;

      // Glow
      var glowR = sz*5;
      var grad = cx.createRadialGradient(v.sx,v.sy,0,v.sx,v.sy,glowR);
      grad.addColorStop(0, 'rgba('+color[0]+','+color[1]+','+color[2]+','+(v.bright*0.2*pulse).toFixed(3)+')');
      grad.addColorStop(0.4, 'rgba('+color[0]+','+color[1]+','+color[2]+','+(v.bright*0.06).toFixed(3)+')');
      grad.addColorStop(1, 'rgba('+color[0]+','+color[1]+','+color[2]+',0)');
      cx.fillStyle = grad;
      cx.fillRect(v.sx-glowR, v.sy-glowR, glowR*2, glowR*2);

      // Core
      var coreGrad = cx.createRadialGradient(v.sx,v.sy,0,v.sx,v.sy,sz);
      var hotCol = [Math.min(255,color[0]+60), Math.min(255,color[1]+40), Math.min(255,color[2]+20)];
      coreGrad.addColorStop(0, 'rgba('+hotCol[0]+','+hotCol[1]+','+hotCol[2]+','+(v.bright*pulse).toFixed(3)+')');
      coreGrad.addColorStop(0.6, 'rgba('+color[0]+','+color[1]+','+color[2]+','+(v.bright*0.8).toFixed(3)+')');
      coreGrad.addColorStop(1, 'rgba('+color[0]+','+color[1]+','+color[2]+',0.1)');
      cx.fillStyle = coreGrad;
      cx.beginPath(); cx.arc(v.sx,v.sy,sz,0,PI2); cx.fill();

      // Label (always visible, small)
      cx.font = '11px Futura,"Century Gothic",system-ui,sans-serif';
      cx.fillStyle = 'rgba('+color[0]+','+color[1]+','+color[2]+','+(v.bright*0.7).toFixed(3)+')';
      cx.textAlign = 'center';
      cx.fillText(label.name, v.sx, v.sy - sz - 8);
      cx.textAlign = 'left';

      // Check hover
      var dx = mouseX - v.sx, dy = mouseY - v.sy;
      if(dx*dx+dy*dy < (sz+15)*(sz+15)){
        tetraHover = labelIdx;
      }
    }
  }

  // Check hover reset
  tetraHover = -1;

  drawVerts(up, 0, COPPER);
  drawVerts(down, 4, [120,150,190]);

  // ═══ Tooltip ═══
  if(tetraHover >= 0){
    var label = TETRA_LABELS[tetraHover];
    var allVerts = tetraHover < 4 ? up : down;
    var vIdx = tetraHover < 4 ? tetraHover : tetraHover - 4;
    var v = allVerts[vIdx];

    tooltip.innerHTML = '<span class="tt-label">' + label.name + '</span>' +
      '<span class="tt-sub">' + label.sub + '</span>' +
      '<span class="tt-sub" style="color:#7a9a6a;">' + label.var + '</span>';
    tooltip.style.left = (v.sx + 20) + 'px';
    tooltip.style.top = (v.sy - 20) + 'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }

  // ═══ Center intersection glow ═══
  var centerGlow = cx.createRadialGradient(W*0.5,H*0.45,0,W*0.5,H*0.45,30);
  var cPulse = Math.sin(tetraTime*0.6)*0.3+0.7;
  centerGlow.addColorStop(0, 'rgba(220,175,80,'+(0.06*cPulse).toFixed(3)+')');
  centerGlow.addColorStop(0.5, 'rgba(184,117,58,'+(0.02*cPulse).toFixed(3)+')');
  centerGlow.addColorStop(1, 'rgba(184,117,58,0)');
  cx.fillStyle = centerGlow;
  cx.fillRect(W*0.5-30,H*0.45-30,60,60);

  statEl.innerHTML =
    'vertices: 8<br>' +
    'edges: 12<br>' +
    '<span style="color:#8b4a2e">2O \u2282 SU(2)</span>';
}


// ═══════════════════════════════════════════════════════════════
// 6. BIFURCATION DIAGRAM — period-doubling route to chaos
// ═══════════════════════════════════════════════════════════════
var bifurImgData = null;
var bifurW = 0, bifurH = 0;
var bifurOrbitR = 3.2;
var bifurOrbitX = 0.5;
var bifurOrbitTrail = [];
var bifurHoverR = -1;

function initBifurcation(){
  titleEl.textContent = 'Bifurcation Diagram';
  descEl.textContent = 'Period-doubling route to chaos. The logistic map reveals universal structure.';
  bifurImgData = null;
  bifurOrbitTrail = [];
  bifurHoverR = -1;

  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label" style="opacity:0.5;">move mouse to explore r</span>' +
    '</div>';
}

function renderBifurcation(){
  // Render the full diagram to an offscreen buffer
  var rMin = 2.5, rMax = 4.0;
  var pw = Math.floor(W*dpr), ph = Math.floor(H*dpr*0.7);
  bifurW = pw; bifurH = ph;

  var buf = new Uint8ClampedArray(pw*ph*4);

  // Brightness accumulation buffer
  var accum = new Float32Array(pw*ph);
  var warmup = 200, samples = 300;

  for(var col=0; col<pw; col++){
    var r = rMin + (col/pw)*(rMax-rMin);
    var x = 0.5;

    // Warm up
    for(var i=0; i<warmup; i++){
      x = r*x*(1-x);
    }

    // Sample attractors
    for(var i=0; i<samples; i++){
      x = r*x*(1-x);
      var row = Math.floor((1-x)*ph*0.9 + ph*0.05);
      if(row >= 0 && row < ph){
        accum[row*pw+col] += 1.0;
      }
    }
  }

  // Find max for normalization
  var maxAcc = 1;
  for(var i=0; i<accum.length; i++){
    if(accum[i] > maxAcc) maxAcc = accum[i];
  }

  // Render with warm palette
  for(var y=0; y<ph; y++){
    for(var x=0; x<pw; x++){
      var idx = (y*pw+x)*4;
      var v = accum[y*pw+x] / maxAcc;
      if(v > 0){
        // Map density to color: sparse=dim copper, dense=gold, very dense=bright
        var intensity = Math.pow(v, 0.4); // gamma for visibility
        var r2, g, b;
        if(intensity < 0.3){
          // Dim red/copper
          r2 = Math.round(120 + intensity*200);
          g = Math.round(40 + intensity*80);
          b = Math.round(15 + intensity*30);
        } else if(intensity < 0.7){
          // Warm copper to gold
          var t = (intensity-0.3)/0.4;
          r2 = Math.round(180 + t*50);
          g = Math.round(100 + t*80);
          b = Math.round(30 + t*40);
        } else {
          // Bright gold
          var t = (intensity-0.7)/0.3;
          r2 = Math.round(230 + t*25);
          g = Math.round(180 + t*30);
          b = Math.round(70 + t*30);
        }
        var alpha = Math.min(255, Math.round(40 + intensity*215));
        buf[idx] = r2;
        buf[idx+1] = g;
        buf[idx+2] = b;
        buf[idx+3] = alpha;
      }
    }
  }

  bifurImgData = new ImageData(buf, pw, ph);
}

function drawBifurcation(){
  cx.fillStyle = '#0a0706';
  cx.fillRect(0,0,W,H);

  // Render diagram if needed
  if(!bifurImgData || bifurW !== Math.floor(W*dpr)){
    renderBifurcation();
  }

  // Draw the diagram
  var offY = H*0.08;
  var drawH = H*0.7;
  if(bifurImgData){
    // Use a temp canvas to scale
    var tmp = document.createElement('canvas');
    tmp.width = bifurW; tmp.height = bifurH;
    var tc = tmp.getContext('2d');
    tc.putImageData(bifurImgData, 0, 0);
    cx.drawImage(tmp, 0, offY, W, drawH);
  }

  var rMin = 2.5, rMax = 4.0;

  // ═══ Mouse interaction — show orbit at hovered r ═══
  var mx = mouseX / W;
  bifurHoverR = rMin + mx*(rMax-rMin);

  if(bifurHoverR >= rMin && bifurHoverR <= rMax){
    // Vertical cursor line
    cx.strokeStyle = 'rgba(230,190,100,0.15)';
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(mouseX, offY);
    cx.lineTo(mouseX, offY+drawH);
    cx.stroke();

    // Compute orbit at this r
    var x = 0.5;
    for(var i=0; i<300; i++) x = bifurHoverR*x*(1-x);

    // Collect unique attractor values
    var orbitSet = [];
    for(var i=0; i<64; i++){
      x = bifurHoverR*x*(1-x);
      orbitSet.push(x);
    }

    // Animate the orbit — show dots bouncing on the attractor
    bifurOrbitTrail.push(x);
    if(bifurOrbitTrail.length > 30) bifurOrbitTrail.shift();

    // Draw orbit dots on the diagram
    for(var i=0; i<orbitSet.length; i++){
      var dotY = offY + (1-orbitSet[i])*drawH*0.9 + drawH*0.05;
      var age = 0.3 + (i/orbitSet.length)*0.7;

      cx.fillStyle = 'rgba(230,190,100,'+age.toFixed(2)+')';
      cx.beginPath();
      cx.arc(mouseX, dotY, 2.5, 0, PI2);
      cx.fill();

      // Glow
      var g = cx.createRadialGradient(mouseX, dotY, 0, mouseX, dotY, 8);
      g.addColorStop(0, 'rgba(230,190,100,'+(age*0.3).toFixed(2)+')');
      g.addColorStop(1, 'rgba(230,190,100,0)');
      cx.fillStyle = g;
      cx.beginPath(); cx.arc(mouseX, dotY, 8, 0, PI2); cx.fill();
    }

    // r value label
    cx.font = '11px "Courier New",monospace';
    cx.fillStyle = '#b8753a';
    cx.textAlign = 'center';
    cx.fillText('r = '+bifurHoverR.toFixed(4), mouseX, offY - 6);
    cx.textAlign = 'left';
  }

  // ═══ Axis labels ═══
  cx.font = '9px "Courier New",monospace';
  cx.fillStyle = '#8b4a2e';
  cx.textAlign = 'left';
  cx.fillText('2.5', 4, offY+drawH+14);
  cx.textAlign = 'center';
  // Mark bifurcation points
  var bifs = [3.0, 3.449, 3.5441, 3.5644, 3.5688];
  var bifNames = ['period-2', 'period-4', 'period-8', 'period-16', 'chaos onset'];
  for(var i=0; i<bifs.length; i++){
    var bx = (bifs[i]-rMin)/(rMax-rMin)*W;
    cx.fillStyle = 'rgba(130,160,70,0.3)';
    cx.fillText(bifs[i].toFixed(bifs[i]===3.0?1:3), bx, offY+drawH+14);
    cx.strokeStyle = 'rgba(130,160,70,0.08)';
    cx.lineWidth = 1;
    cx.setLineDash([2,4]);
    cx.beginPath(); cx.moveTo(bx, offY); cx.lineTo(bx, offY+drawH); cx.stroke();
    cx.setLineDash([]);
  }
  cx.textAlign = 'right';
  cx.fillStyle = '#8b4a2e';
  cx.fillText('4.0', W-4, offY+drawH+14);
  cx.textAlign = 'left';

  // Label
  cx.font = '10px Futura,"Century Gothic",system-ui,sans-serif';
  cx.fillStyle = 'rgba(184,117,58,0.4)';
  cx.textAlign = 'center';
  cx.fillText('x(n+1) = r \u00B7 x(n) \u00B7 (1 - x(n))', W*0.5, offY+drawH+32);

  // Feigenbaum constant note
  cx.font = '9px "Courier New",monospace';
  cx.fillStyle = 'rgba(130,160,70,0.3)';
  cx.fillText('Feigenbaum \u03B4 = 4.669...', W*0.5, offY+drawH+46);
  cx.textAlign = 'left';

  // Determine period at hovered r
  var period = '1';
  if(bifurHoverR > 3.0) period = '2';
  if(bifurHoverR > 3.449) period = '4';
  if(bifurHoverR > 3.5441) period = '8';
  if(bifurHoverR > 3.5644) period = '16+';
  if(bifurHoverR > 3.5699) period = 'chaos';
  if(bifurHoverR > 3.8284) period = 'period-3 window';
  if(bifurHoverR > 3.8415) period = 'chaos';

  statEl.innerHTML =
    'r: ' + bifurHoverR.toFixed(4) + '<br>' +
    'regime: ' + period + '<br>' +
    '<span style="color:#8b4a2e">\u03B4 = 4.669...</span>';
}


// ═══════════════════════════════════════════════════════════════
// 7. DOUBLE PENDULUM — chaos from simplicity
// ═══════════════════════════════════════════════════════════════
var pendulums = []; // array of {th1, th2, w1, w2, trail, color}
var pendL1 = 1, pendL2 = 1;
var pendG = 9.81;
var pendTrailMax = 800;
var pendClickPending = false;

function initPendulum(){
  titleEl.textContent = 'Double Pendulum';
  descEl.textContent = 'Chaos from simplicity. Tiny differences, wildly different paths.';
  pendulums = [];

  // Spawn 3 pendulums with very slightly different initial conditions
  var baseAngle = Math.PI * 0.75;
  var colors = [
    [230,170,80],  // gold
    [210,120,45],  // copper
    [165,90,35]    // sienna
  ];
  for(var i=0; i<3; i++){
    pendulums.push({
      th1: baseAngle + i*0.001,  // 0.001 radian difference
      th2: baseAngle * 0.8,
      w1: 0, w2: 0,
      trail: [],
      color: colors[i]
    });
  }

  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label" style="opacity:0.5;">click to set angle</span>' +
    '</div>';

  // Click to reset with new angle
  pendClickPending = true;
}

function stepPendulum(p, dt){
  var m1=1, m2=1;
  var l1=pendL1, l2=pendL2, g=pendG;
  var th1=p.th1, th2=p.th2, w1=p.w1, w2=p.w2;
  var delta = th2-th1;
  var sinD = Math.sin(delta), cosD = Math.cos(delta);
  var s1 = Math.sin(th1), s2 = Math.sin(th2);

  var denom = 2*m1+m2-m2*Math.cos(2*delta);

  var a1 = (-g*(2*m1+m2)*s1 - m2*g*Math.sin(th1-2*th2) - 2*sinD*m2*(w2*w2*l2+w1*w1*l1*cosD)) / (l1*denom);
  var a2 = (2*sinD*(w1*w1*l1*(m1+m2)+g*(m1+m2)*Math.cos(th1)+w2*w2*l2*m2*cosD)) / (l2*denom);

  p.w1 += a1*dt;
  p.w2 += a2*dt;
  // Light damping for visual stability over long runs
  p.w1 *= 0.9999;
  p.w2 *= 0.9999;
  p.th1 += p.w1*dt;
  p.th2 += p.w2*dt;
}

function drawPendulum(){
  // Fade instead of clear for trail persistence
  cx.fillStyle = 'rgba(10,7,6,0.08)';
  cx.fillRect(0,0,W,H);

  var sc = Math.min(W,H)*0.16;
  var pivotX = W*0.5, pivotY = H*0.32;

  // Handle click — reset pendulums
  if(pendClickPending && mouseDown){
    var angle = Math.atan2(mouseY-pivotY, mouseX-pivotX) + Math.PI*0.5;
    var colors = [
      [230,170,80],
      [210,120,45],
      [165,90,35]
    ];
    for(var i=0; i<pendulums.length; i++){
      pendulums[i].th1 = angle + i*0.001;
      pendulums[i].th2 = angle*0.8;
      pendulums[i].w1 = 0;
      pendulums[i].w2 = 0;
      pendulums[i].trail = [];
      pendulums[i].color = colors[i % colors.length];
    }
  }

  // Physics: multiple substeps for stability
  var substeps = 8;
  var dt = 0.004;
  for(var s=0; s<substeps; s++){
    for(var i=0; i<pendulums.length; i++){
      stepPendulum(pendulums[i], dt);
    }
  }

  // Draw each pendulum
  for(var i=0; i<pendulums.length; i++){
    var p = pendulums[i];
    var col = p.color;

    // Joint and tip positions
    var x1 = pivotX + Math.sin(p.th1)*sc*pendL1;
    var y1 = pivotY + Math.cos(p.th1)*sc*pendL1;
    var x2 = x1 + Math.sin(p.th2)*sc*pendL2;
    var y2 = y1 + Math.cos(p.th2)*sc*pendL2;

    // Store trail point (tip position)
    p.trail.push({x:x2, y:y2});
    if(p.trail.length > pendTrailMax) p.trail.shift();

    // ═══ Draw trail ═══
    if(p.trail.length > 1){
      for(var j=1; j<p.trail.length; j++){
        var age = j / p.trail.length;
        var alpha = age * age * 0.5;
        cx.strokeStyle = 'rgba('+col[0]+','+col[1]+','+col[2]+','+alpha.toFixed(3)+')';
        cx.lineWidth = 0.5 + age*1.5;
        cx.beginPath();
        cx.moveTo(p.trail[j-1].x, p.trail[j-1].y);
        cx.lineTo(p.trail[j].x, p.trail[j].y);
        cx.stroke();
      }
    }

    // ═══ Draw rods ═══
    // Only draw rods prominently for first pendulum, subtle for others
    var rodAlpha = (i === 0) ? 0.5 : 0.15;

    cx.strokeStyle = 'rgba('+col[0]+','+col[1]+','+col[2]+','+rodAlpha+')';
    cx.lineWidth = 2;
    cx.beginPath();
    cx.moveTo(pivotX, pivotY);
    cx.lineTo(x1, y1);
    cx.stroke();

    cx.beginPath();
    cx.moveTo(x1, y1);
    cx.lineTo(x2, y2);
    cx.stroke();

    // ═══ Draw joints ═══
    if(i === 0){
      // Pivot
      cx.fillStyle = 'rgba(184,117,58,0.4)';
      cx.beginPath(); cx.arc(pivotX, pivotY, 3, 0, PI2); cx.fill();

      // Joint
      cx.fillStyle = 'rgba('+col[0]+','+col[1]+','+col[2]+',0.6)';
      cx.beginPath(); cx.arc(x1, y1, 4, 0, PI2); cx.fill();
    }

    // Tip with glow
    var tipGlow = cx.createRadialGradient(x2, y2, 0, x2, y2, 15);
    tipGlow.addColorStop(0, 'rgba('+col[0]+','+col[1]+','+col[2]+','+(i===0?0.4:0.15)+')');
    tipGlow.addColorStop(1, 'rgba('+col[0]+','+col[1]+','+col[2]+',0)');
    cx.fillStyle = tipGlow;
    cx.beginPath(); cx.arc(x2, y2, 15, 0, PI2); cx.fill();

    cx.fillStyle = 'rgba('+col[0]+','+col[1]+','+col[2]+','+(i===0?0.9:0.4)+')';
    cx.beginPath(); cx.arc(x2, y2, 3, 0, PI2); cx.fill();
  }

  // ═══ Divergence measurement ═══
  if(pendulums.length >= 2){
    var p0 = pendulums[0], p1 = pendulums[1];
    var divergence = Math.abs(p0.th1-p1.th1) + Math.abs(p0.th2-p1.th2) + Math.abs(p0.w1-p1.w1) + Math.abs(p0.w2-p1.w2);
    var logDiv = divergence > 0.0001 ? Math.log10(divergence).toFixed(2) : '-inf';

    statEl.innerHTML =
      '\u0394\u03B8: ' + divergence.toFixed(4) + '<br>' +
      'log\u2081\u2080(\u0394): ' + logDiv + '<br>' +
      '<span style="color:#8b4a2e">3 paths, \u0394\u03B8\u2080=0.001 rad</span>';
  }
}


// ═══════════════════════════════════════════════════════════════
// 8. REACTION-DIFFUSION (Turing Patterns)
// ═══════════════════════════════════════════════════════════════
var rdW, rdH, rdU, rdV, rdU2, rdV2;
var rdScale = 3; // each sim cell = 3x3 pixels
var rdK = 0.062; // kill rate — maps to K (coupling)
var rdF = 0.035; // feed rate — maps to T (temperature)
var rdDu = 0.16, rdDv = 0.08;
var rdInited = false;
var rdSweepPhase = 0;
var rdSweepActive = false;
var rdTmpCv = null, rdTmpCx = null;

function initTuring(){
  titleEl.textContent = 'Turing Patterns';
  descEl.textContent = 'Gray-Scott reaction-diffusion. K=coupling (diffusion). T=noise (feed rate). Touch to seed.';
  rdInited = false;
  rdSweepPhase = 0;
  rdSweepActive = false;

  // Compute grid size
  rdW = Math.floor(W/rdScale);
  rdH = Math.floor(H/rdScale);
  if(rdW < 10) rdW = 10;
  if(rdH < 10) rdH = 10;

  rdU = new Float32Array(rdW*rdH);
  rdV = new Float32Array(rdW*rdH);
  rdU2 = new Float32Array(rdW*rdH);
  rdV2 = new Float32Array(rdW*rdH);

  // Initialize: U=1 everywhere, V=0 except seed regions
  for(var i=0; i<rdW*rdH; i++){
    rdU[i] = 1.0;
    rdV[i] = 0.0;
  }

  // Seed: several random spots
  for(var s=0; s<8; s++){
    var sx = Math.floor(rdW*0.2 + Math.random()*rdW*0.6);
    var sy = Math.floor(rdH*0.2 + Math.random()*rdH*0.6);
    var sr = 3 + Math.floor(Math.random()*3);
    for(var dy=-sr; dy<=sr; dy++){
      for(var dx=-sr; dx<=sr; dx++){
        if(dx*dx+dy*dy <= sr*sr){
          var ix = (sx+dx+rdW)%rdW;
          var iy = (sy+dy+rdH)%rdH;
          rdU[iy*rdW+ix] = 0.5 + Math.random()*0.1;
          rdV[iy*rdW+ix] = 0.25 + Math.random()*0.1;
        }
      }
    }
  }

  rdK = 0.062;
  rdF = 0.035;

  // Controls: K (coupling) and T (noise) sliders
  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<span class="slider-label">K (coupling)</span>' +
    '<input type="range" id="rdKSlider" min="0.03" max="0.07" step="0.001" value="0.062">' +
    '<span class="slider-val" id="rdKVal">0.062</span>' +
    '</div>' +
    '<div class="slider-wrap">' +
    '<span class="slider-label">T (noise)</span>' +
    '<input type="range" id="rdFSlider" min="0.01" max="0.08" step="0.001" value="0.035">' +
    '<span class="slider-val" id="rdFVal">0.035</span>' +
    '</div>' +
    '<div class="slider-wrap">' +
    '<button class="tap-btn" id="rdSweep" style="font-size:0.55em;padding:5px 12px;">sweep</button>' +
    '</div>';

  document.getElementById('rdKSlider').addEventListener('input', function(){
    rdK = parseFloat(this.value);
    document.getElementById('rdKVal').textContent = rdK.toFixed(3);
  });
  document.getElementById('rdFSlider').addEventListener('input', function(){
    rdF = parseFloat(this.value);
    document.getElementById('rdFVal').textContent = rdF.toFixed(3);
  });
  document.getElementById('rdSweep').addEventListener('click', function(){
    rdSweepActive = !rdSweepActive;
    this.textContent = rdSweepActive ? 'stop sweep' : 'sweep';
  });

  rdInited = true;
}

function stepTuring(){
  var w = rdW, h = rdH;
  var dt = 0.8;
  var Du = rdDu, Dv = rdDv;
  var f = rdF, k = rdK;

  for(var y=0; y<h; y++){
    var ym = (y-1+h)%h, yp = (y+1)%h;
    for(var x=0; x<w; x++){
      var xm = (x-1+w)%w, xp = (x+1)%w;
      var idx = y*w+x;
      var u = rdU[idx], v = rdV[idx];

      // 5-point Laplacian
      var lapU = rdU[ym*w+x] + rdU[yp*w+x] + rdU[y*w+xm] + rdU[y*w+xp] - 4*u;
      var lapV = rdV[ym*w+x] + rdV[yp*w+x] + rdV[y*w+xm] + rdV[y*w+xp] - 4*v;

      var uvv = u*v*v;
      var newU = u + dt*(Du*lapU - uvv + f*(1-u));
      var newV = v + dt*(Dv*lapV + uvv - (f+k)*v);
      // Clamp to prevent numerical blowup
      rdU2[idx] = newU < 0 ? 0 : newU > 1 ? 1 : newU;
      rdV2[idx] = newV < 0 ? 0 : newV > 1 ? 1 : newV;
    }
  }

  // Swap buffers
  var tmp = rdU; rdU = rdU2; rdU2 = tmp;
  tmp = rdV; rdV = rdV2; rdV2 = tmp;
}

function drawTuring(){
  // Touch/click to seed
  if(mouseDown && rdInited){
    var gx = Math.floor(mouseX/rdScale);
    var gy = Math.floor(mouseY/rdScale);
    var sr = 4;
    for(var dy=-sr; dy<=sr; dy++){
      for(var dx=-sr; dx<=sr; dx++){
        if(dx*dx+dy*dy <= sr*sr){
          var ix = (gx+dx+rdW)%rdW;
          var iy = (gy+dy+rdH)%rdH;
          if(ix >= 0 && ix < rdW && iy >= 0 && iy < rdH){
            rdU[iy*rdW+ix] = 0.5 + Math.random()*0.1;
            rdV[iy*rdW+ix] = 0.25 + Math.random()*0.1;
          }
        }
      }
    }
  }

  // Sweep mode: slowly change K across screen
  if(rdSweepActive){
    rdSweepPhase += 0.0005;
    var sweep = Math.sin(rdSweepPhase)*0.015;
    rdK = 0.062 + sweep;
    rdF = 0.035 + sweep*0.3;
    var kSlider = document.getElementById('rdKSlider');
    var fSlider = document.getElementById('rdFSlider');
    if(kSlider){
      kSlider.value = rdK;
      document.getElementById('rdKVal').textContent = rdK.toFixed(3);
    }
    if(fSlider){
      fSlider.value = rdF;
      document.getElementById('rdFVal').textContent = rdF.toFixed(3);
    }
  }

  // Multiple sim steps per frame
  for(var s=0; s<6; s++) stepTuring();

  // Render to offscreen canvas at sim resolution, then scale up
  if(!rdTmpCv || rdTmpCv.width !== rdW || rdTmpCv.height !== rdH){
    rdTmpCv = document.createElement('canvas');
    rdTmpCv.width = rdW; rdTmpCv.height = rdH;
    rdTmpCx = rdTmpCv.getContext('2d');
  }
  var imgData = rdTmpCx.createImageData(rdW, rdH);
  var data = imgData.data;

  for(var gy=0; gy<rdH; gy++){
    for(var gx=0; gx<rdW; gx++){
      var v = rdV[gy*rdW+gx];
      var u = rdU[gy*rdW+gx];
      var idx = (gy*rdW+gx)*4;

      // Color map: V concentration determines pattern
      var vn = Math.max(0, Math.min(1, v*4));
      var un = Math.max(0, Math.min(1, 1-u));

      var r, g, b;
      if(vn < 0.1){
        r = Math.round(10 + un*15);
        g = Math.round(7 + un*8);
        b = Math.round(6 + un*5);
      } else if(vn < 0.4){
        var t = (vn-0.1)/0.3;
        r = Math.round(10 + t*150);
        g = Math.round(7 + t*65);
        b = Math.round(6 + t*20);
      } else if(vn < 0.7){
        var t = (vn-0.4)/0.3;
        r = Math.round(160 + t*60);
        g = Math.round(72 + t*80);
        b = Math.round(26 + t*35);
      } else {
        var t = (vn-0.7)/0.3;
        r = Math.round(220 + t*35);
        g = Math.round(152 + t*38);
        b = Math.round(61 + t*39);
      }

      data[idx] = r;
      data[idx+1] = g;
      data[idx+2] = b;
      data[idx+3] = 255;
    }
  }

  rdTmpCx.putImageData(imgData, 0, 0);
  // Disable smoothing for crisp pixel look
  cx.imageSmoothingEnabled = false;
  cx.drawImage(rdTmpCv, 0, 0, W, H);
  cx.imageSmoothingEnabled = true;

  // ═══ Labels ═══
  // Regime indicator
  var regime = 'forming...';
  if(rdK < 0.05) regime = 'stripes (high K)';
  else if(rdK < 0.055) regime = 'maze';
  else if(rdK < 0.065) regime = 'spots + stripes';
  else regime = 'spots (low K)';

  statEl.innerHTML =
    'K: ' + rdK.toFixed(3) + '<br>' +
    'T: ' + rdF.toFixed(3) + '<br>' +
    'regime: ' + regime + '<br>' +
    '<span style="color:#8b4a2e">Du=' + rdDu + ' Dv=' + rdDv + '</span>';
}


// ═══════════════════════════════════════════════════════════════
// 9. CREATION — the full sequence, 0+0=1 to black holes
// ═══════════════════════════════════════════════════════════════
var crTime = 0;        // global clock
var crStage = 0;       // float: stage + fractional progress
var crPlaying = true;
var crSpeed = 1.0;
var crDragging = false;
var crParticles = [];  // persistent particles across stages
var crLabelAlpha = 0;
var crLabelTarget = 0;
var crLastStageIdx = -1;
var crBarEl, crFillEl, crLabelEl, crNameEl, crSubEl;

var CR_STAGES = [
  {name:'The Void',          sub:'nothing. vacuum fluctuations.',            dur:3.5},
  {name:'0 + 0 = 1',         sub:'the first coupling.',                      dur:4.5},
  {name:'Quarks',             sub:'strong coupling. confinement.',            dur:4.0},
  {name:'Nucleons',           sub:'nuclear coupling. binding energy.',        dur:3.5},
  {name:'Atoms',              sub:'electromagnetic coupling. probability.',   dur:3.5},
  {name:'Molecules',          sub:'chemical coupling. shared electrons.',     dur:3.5},
  {name:'Cells',              sub:'biological coupling. the first self.',     dur:3.5},
  {name:'Organisms',          sub:'neural coupling. information.',            dur:3.5},
  {name:'Planet',             sub:'gravitational coupling. aggregation.',     dur:3.5},
  {name:'Solar System',       sub:'orbital coupling. phase-lock.',            dur:3.5},
  {name:'Galaxy',             sub:'galactic coupling. the spiral.',           dur:4.0},
  {name:'Black Hole',         sub:'maximum coupling. K approaches infinity.', dur:4.0},
  {name:'The Return',         sub:'everything coupled. everything breathing.',dur:5.0}
];

var crTotalDur = 0;
for(var i=0;i<CR_STAGES.length;i++) crTotalDur += CR_STAGES[i].dur;

function initCreation(){
  titleEl.textContent = 'Creation';
  descEl.textContent = 'Every coupling step. One continuous journey.';
  crTime = 0;
  crStage = 0;
  crPlaying = true;
  crParticles = [];
  crLabelAlpha = 0;
  crLabelTarget = 0;
  crLastStageIdx = -1;

  crBarEl = document.getElementById('creationBar');
  crFillEl = document.getElementById('creationFill');
  crLabelEl = document.getElementById('creationLabel');
  crNameEl = document.getElementById('creationName');
  crSubEl = document.getElementById('creationSub');

  crBarEl.style.display = 'block';
  crLabelEl.style.display = 'block';

  // Click on bar to scrub
  crBarEl.onmousedown = function(e){
    crDragging = true;
    crPlaying = false;
    crScrub(e);
  };
  crBarEl.onmousemove = function(e){ if(crDragging) crScrub(e); };
  window.addEventListener('mouseup', function(){ crDragging = false; });
  crBarEl.ontouchstart = function(e){
    crDragging = true; crPlaying = false;
    crScrub(e.touches[0]);
    e.preventDefault();
  };
  crBarEl.ontouchmove = function(e){
    if(crDragging) crScrub(e.touches[0]);
    e.preventDefault();
  };
  crBarEl.ontouchend = function(){ crDragging = false; };

  ctrlEl.innerHTML =
    '<div class="slider-wrap">' +
    '<button class="tap-btn" id="crPlayBtn" style="font-size:0.55em;padding:5px 12px;">pause</button>' +
    '</div>' +
    '<div class="slider-wrap">' +
    '<span class="slider-label">speed</span>' +
    '<input type="range" id="crSpeedSlider" min="0.2" max="3" step="0.1" value="1">' +
    '<span class="slider-val" id="crSpeedVal">1.0</span>' +
    '</div>';

  document.getElementById('crPlayBtn').addEventListener('click', function(){
    crPlaying = !crPlaying;
    this.textContent = crPlaying ? 'pause' : 'play';
  });
  document.getElementById('crSpeedSlider').addEventListener('input', function(){
    crSpeed = parseFloat(this.value);
    document.getElementById('crSpeedVal').textContent = crSpeed.toFixed(1);
  });
}

function crScrub(e){
  var rect = crBarEl.getBoundingClientRect();
  var frac = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  crTime = frac * crTotalDur;
}

function crGetStageAt(t){
  var acc = 0;
  for(var i=0; i<CR_STAGES.length; i++){
    if(t < acc + CR_STAGES[i].dur) return {idx:i, local:(t-acc)/CR_STAGES[i].dur};
    acc += CR_STAGES[i].dur;
  }
  return {idx:CR_STAGES.length-1, local:1};
}

// ═══ PALETTE helpers ═══
function crLerp(a,b,t){ return a+(b-a)*t; }
function crRgba(r,g,b,a){ return 'rgba('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+','+a.toFixed(4)+')'; }

// Warm bg color by stage (black → slightly warm)
function crBgColor(stageIdx){
  var t = stageIdx / (CR_STAGES.length-1);
  var r = Math.round(10 + t*6);
  var g = Math.round(7 + t*4);
  var b = Math.round(6 + t*2);
  return [r,g,b];
}

// ═══ STAGE DRAW FUNCTIONS ═══

function crDrawVoid(t, cx2, W2, H2){
  // Vacuum fluctuations — faint noise dots
  var count = Math.floor(20 + t*60);
  for(var i=0; i<count; i++){
    var seed = i*137.508 + crTime*0.3;
    var px = (Math.sin(seed*1.1+i)*0.5+0.5)*W2;
    var py = (Math.cos(seed*0.7+i*1.3)*0.5+0.5)*H2;
    var flicker = Math.sin(seed*3.7)*0.5+0.5;
    var alpha = flicker * 0.04 * t;
    cx2.fillStyle = crRgba(140,100,70, alpha);
    cx2.fillRect(px,py,1,1);
  }
}

function crDrawFirstCoupling(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;

  // Two points of nothing approaching each other
  var sep = (1-t)*(1-t) * Math.min(W2,H2)*0.25;
  var p1x = cx0 - sep, p2x = cx0 + sep;

  // Vacuum noise still visible
  crDrawVoid(0.3, cx2, W2, H2);

  // The two points
  var pointAlpha = 0.3 + t*0.7;
  for(var side=-1; side<=1; side+=2){
    var px = cx0 + side*sep;
    var grad = cx2.createRadialGradient(px,cy0,0,px,cy0,6+t*8);
    grad.addColorStop(0, crRgba(200,150,80, pointAlpha*0.8));
    grad.addColorStop(0.5, crRgba(180,120,50, pointAlpha*0.3));
    grad.addColorStop(1, crRgba(180,120,50, 0));
    cx2.fillStyle = grad;
    cx2.beginPath(); cx2.arc(px,cy0,6+t*8,0,PI2); cx2.fill();
  }

  // The line between them — coupling
  if(t > 0.2){
    var lineT = (t-0.2)/0.8;
    cx2.strokeStyle = crRgba(220,175,80, lineT*0.5);
    cx2.lineWidth = 0.5 + lineT*1.5;
    cx2.beginPath();
    cx2.moveTo(p1x, cy0);
    cx2.lineTo(p2x, cy0);
    cx2.stroke();
  }

  // The meeting point — warm dot at center when close enough
  if(t > 0.6){
    var dotT = (t-0.6)/0.4;
    var dotR = 2 + dotT*12;
    var grad2 = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,dotR);
    grad2.addColorStop(0, crRgba(255,220,140, dotT*0.9));
    grad2.addColorStop(0.3, crRgba(230,180,90, dotT*0.5));
    grad2.addColorStop(0.7, crRgba(200,140,60, dotT*0.15));
    grad2.addColorStop(1, crRgba(180,120,50, 0));
    cx2.fillStyle = grad2;
    cx2.beginPath(); cx2.arc(cx0,cy0,dotR,0,PI2); cx2.fill();
  }
}

function crDrawQuarks(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var triR = 30 + t*20;
  var colors = [[200,60,60],[60,180,60],[60,80,220]]; // RGB color charge
  var names = ['r','g','b'];

  // Subtle rotation
  var rot = crTime*0.4;

  // Draw gluon field — threads between quarks that get thicker when pulled
  for(var i=0; i<3; i++){
    var a1 = rot + i*PI2/3;
    var a2 = rot + ((i+1)%3)*PI2/3;
    var x1 = cx0 + Math.cos(a1)*triR;
    var y1 = cy0 + Math.sin(a1)*triR;
    var x2 = cx0 + Math.cos(a2)*triR;
    var y2 = cy0 + Math.sin(a2)*triR;

    // Gluon as wavy line
    var segments = 20;
    cx2.beginPath();
    cx2.moveTo(x1, y1);
    for(var s=1; s<=segments; s++){
      var st = s/segments;
      var lx = x1 + (x2-x1)*st;
      var ly = y1 + (y2-y1)*st;
      var nx = -(y2-y1), ny = (x2-x1);
      var nl = Math.sqrt(nx*nx+ny*ny)||1;
      nx /= nl; ny /= nl;
      var wave = Math.sin(st*8 + crTime*3)*3*(1-Math.abs(st-0.5)*2);
      cx2.lineTo(lx + nx*wave, ly + ny*wave);
    }
    cx2.strokeStyle = crRgba(220,175,80, 0.25 + t*0.15);
    cx2.lineWidth = 1 + t*1;
    cx2.stroke();
  }

  // Draw quarks — three colored dots in a triangle
  for(var i=0; i<3; i++){
    var a = rot + i*PI2/3;
    var qx = cx0 + Math.cos(a)*triR;
    var qy = cy0 + Math.sin(a)*triR;

    // Color cycling — charge shifts between quarks
    var colorIdx = (i + Math.floor(crTime*2)) % 3;
    var col = colors[colorIdx];

    var grad = cx2.createRadialGradient(qx,qy,0,qx,qy,8);
    grad.addColorStop(0, crRgba(col[0],col[1],col[2], 0.9));
    grad.addColorStop(0.5, crRgba(col[0]*0.7,col[1]*0.7,col[2]*0.7, 0.4));
    grad.addColorStop(1, crRgba(col[0]*0.5,col[1]*0.5,col[2]*0.5, 0));
    cx2.fillStyle = grad;
    cx2.beginPath(); cx2.arc(qx,qy,8,0,PI2); cx2.fill();

    cx2.fillStyle = crRgba(col[0],col[1],col[2], 0.85);
    cx2.beginPath(); cx2.arc(qx,qy,3,0,PI2); cx2.fill();
  }

  // Confinement label at bottom
  if(t > 0.4){
    var confT = (t-0.4)/0.6;
    cx2.font = '9px "Courier New",monospace';
    cx2.fillStyle = crRgba(184,117,58, confT*0.35);
    cx2.textAlign = 'center';
    cx2.fillText('confinement: pull harder, force grows stronger', cx0, cy0 + triR + 35);
    cx2.textAlign = 'left';
  }
}

function crDrawNucleons(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;
  var sep = 40 - t*15; // coming together
  var triR = 18;
  var rot = crTime * 0.3;

  // Two triangles — proton (red-tinted) and neutron (blue-tinted)
  var nucleons = [
    {ox:-sep*0.5, oy:0, tint:[210,140,70]},
    {ox:sep*0.5,  oy:0, tint:[130,150,190]}
  ];

  for(var n=0; n<2; n++){
    var nuc = nucleons[n];
    var ncx = cx0+nuc.ox, ncy = cy0+nuc.oy;

    // Triangle of quarks
    for(var i=0; i<3; i++){
      var a1 = rot + i*PI2/3 + n*0.5;
      var a2 = rot + ((i+1)%3)*PI2/3 + n*0.5;
      var x1 = ncx + Math.cos(a1)*triR;
      var y1 = ncy + Math.sin(a1)*triR;
      var x2 = ncx + Math.cos(a2)*triR;
      var y2 = ncy + Math.sin(a2)*triR;

      cx2.strokeStyle = crRgba(nuc.tint[0],nuc.tint[1],nuc.tint[2], 0.2);
      cx2.lineWidth = 1;
      cx2.beginPath(); cx2.moveTo(x1,y1); cx2.lineTo(x2,y2); cx2.stroke();
    }

    for(var i=0; i<3; i++){
      var a = rot + i*PI2/3 + n*0.5;
      var qx = ncx + Math.cos(a)*triR;
      var qy = ncy + Math.sin(a)*triR;
      cx2.fillStyle = crRgba(nuc.tint[0],nuc.tint[1],nuc.tint[2], 0.7);
      cx2.beginPath(); cx2.arc(qx,qy,3,0,PI2); cx2.fill();
    }
  }

  // Binding energy glow between them
  if(t > 0.3){
    var beT = (t-0.3)/0.7;
    var glowR = 20 + beT*30;
    var grad = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,glowR);
    grad.addColorStop(0, crRgba(230,190,100, beT*0.2));
    grad.addColorStop(0.5, crRgba(200,150,70, beT*0.08));
    grad.addColorStop(1, crRgba(180,120,50, 0));
    cx2.fillStyle = grad;
    cx2.beginPath(); cx2.arc(cx0,cy0,glowR,0,PI2); cx2.fill();
  }
}

function crDrawAtoms(t, cx2, W2, H2){
  var cx0 = W2*0.5, cy0 = H2*0.5;

  // Nucleus — small bright dot
  var nucR = 4;
  var grad = cx2.createRadialGradient(cx0,cy0,0,cx0,cy0,nucR*3);
  grad.addColorStop(0, crRgba(255,220,140, 0.9));
  grad.addColorStop(0.3, crRgba(230,180,100, 0.5));
  grad.addColorStop(1, crRgba(200,150,70, 0));
  cx2.fillStyle = grad;
  cx2.beginPath(); cx2.arc(cx0,cy0,nucR*3,0,PI2); cx2.fill();

  cx2.fillStyle = crRgba(255,230,160, 0.9);
  cx2.beginPath(); cx2.arc(cx0,cy0,nucR,0,PI2); cx2.fill();

  // Electron probability clouds — NOT Bohr circles, fuzzy halos
  var shells = [50, 90, 140];
  for(var s=0; s<Math.min(3, Math.floor(t*3)+1); s++){
