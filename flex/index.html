<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spectral Engine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#stats{position:fixed;top:12px;right:12px;color:#ffffff08;font:10px monospace;z-index:10;text-align:right;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="stats"></div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

var w,h,t=0,mx=0.5,my=0.5,frame=0,lastT=performance.now();
addEventListener('mousemove',function(e){mx=e.clientX/innerWidth;my=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){e.preventDefault();mx=e.touches[0].clientX/innerWidth;my=e.touches[0].clientY/innerHeight;},{passive:false});
addEventListener('touchstart',function(e){e.preventDefault();},{passive:false});

// ═══ 10,000 PARTICLES — the flex ═══
var N=10000;
var px=new Float32Array(N),py=new Float32Array(N),pz=new Float32Array(N);
var vx=new Float32Array(N),vy=new Float32Array(N),vz=new Float32Array(N);
var pr=new Uint8Array(N),pg=new Uint8Array(N),pb=new Uint8Array(N);
var plife=new Float32Array(N);

// Initialize: scattered sphere
for(var i=0;i<N;i++){
  var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=1+Math.random()*3;
  px[i]=Math.sin(b)*Math.cos(a)*r;
  py[i]=Math.sin(b)*Math.sin(a)*r;
  pz[i]=Math.cos(b)*r;
  vx[i]=(Math.random()-0.5)*0.01;
  vy[i]=(Math.random()-0.5)*0.01;
  vz[i]=(Math.random()-0.5)*0.01;
  // Color from position (warm palette)
  var hue=(a/Math.PI/2)*60+20; // 20-80 range (gold to amber)
  pr[i]=Math.floor(150+r*25);
  pg[i]=Math.floor(120+r*15);
  pb[i]=Math.floor(80+r*10);
  plife[i]=0.3+Math.random()*0.7;
}

// ═══ PHYSICS: gravitational + electromagnetic + spring ═══
function update(){
  t+=0.016;
  var attractX=(mx-0.5)*6;
  var attractY=(my-0.5)*6;

  // Global rotation
  var cosR=Math.cos(t*0.2),sinR=Math.sin(t*0.2);

  // Mode oscillates between shapes
  var mode=t*0.15;
  var shape=Math.floor(mode)%5;
  var blend=mode-Math.floor(mode);
  blend=blend*blend*(3-2*blend); // smoothstep

  for(var i=0;i<N;i++){
    var x=px[i],y=py[i],z=pz[i];

    // Target based on shape
    var tx,ty,tz;
    var fi=i/N;

    if(shape===0){
      // Sphere
      var a=fi*Math.PI*2*50,b=fi*Math.PI;
      var r=2;
      tx=Math.sin(b)*Math.cos(a)*r;
      ty=Math.sin(b)*Math.sin(a)*r;
      tz=Math.cos(b)*r;
    }
    else if(shape===1){
      // DNA double helix
      var tt=fi*Math.PI*20;
      var strand=i%2;
      tx=Math.cos(tt+strand*Math.PI)*1.5;
      ty=(fi-0.5)*8;
      tz=Math.sin(tt+strand*Math.PI)*1.5;
    }
    else if(shape===2){
      // Torus (the S¹ × S¹)
      var u=fi*Math.PI*2*20,v=fi*Math.PI*2;
      var R=2.5,rr=0.8;
      tx=(R+rr*Math.cos(v))*Math.cos(u);
      ty=rr*Math.sin(v);
      tz=(R+rr*Math.cos(v))*Math.sin(u);
    }
    else if(shape===3){
      // Wave function (standing wave surface)
      var gx=(i%100)/100*8-4;
      var gy=Math.floor(i/100)/100*8-4;
      var psi=Math.sin(gx*1.5)*Math.sin(gy*1.5)*2;
      tx=gx;ty=psi;tz=gy;
    }
    else{
      // Galaxy spiral
      var arm=i%3;
      var dist=fi*4;
      var angle=dist*1.5+arm*Math.PI*2/3;
      tx=Math.cos(angle)*dist;
      ty=(Math.random()-0.5)*0.15;
      tz=Math.sin(angle)*dist;
    }

    // Spring toward target
    var k=0.02;
    vx[i]+=(tx-x)*k;vy[i]+=(ty-y)*k;vz[i]+=(tz-z)*k;

    // Mouse attraction
    vx[i]+=(attractX-x)*0.001;
    vy[i]+=(attractY-y)*0.001;

    // Damping
    vx[i]*=0.95;vy[i]*=0.95;vz[i]*=0.95;

    // Move
    px[i]+=vx[i];py[i]+=vy[i];pz[i]+=vz[i];

    // Rotate globally
    var rx=px[i]*cosR+pz[i]*sinR;
    var rz=-px[i]*sinR+pz[i]*cosR;

    // Color shift based on velocity
    var speed=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]+vz[i]*vz[i]);
    plife[i]=Math.min(1,0.3+speed*20);
  }
}

// ═══ RENDER ═══
var imgData;
function render(){
  w=W/DPR;h=H/DPR;frame++;

  // Fade
  cx.fillStyle='rgba(0,0,0,0.08)';
  cx.fillRect(0,0,w,h);

  update();

  var cx0=w/2,cy0=h/2;
  var fov=Math.min(w,h)*0.7;
  var cosA=Math.cos(t*0.2+(mx-0.5)*2),sinA=Math.sin(t*0.2+(mx-0.5)*2);
  var cosB=Math.cos((my-0.5)*1.5),sinB=Math.sin((my-0.5)*1.5);

  // Batch render — no sorting, use additive blending
  cx.globalCompositeOperation='lighter';

  for(var i=0;i<N;i++){
    var x=px[i],y=py[i],z=pz[i];

    // Rotate
    var x1=x*cosA+z*sinA;var z1=-x*sinA+z*cosA;
    var y1=y*cosB-z1*sinB;var z2=y*sinB+z1*cosB;

    // Project
    var f=fov/(fov+z2*50+200);
    var sx=cx0+x1*50*f;
    var sy=cy0+y1*50*f;

    if(sx<-10||sx>w+10||sy<-10||sy>h+10)continue;

    var size=Math.max(0.5,f*1.5*plife[i]);
    var alpha=f*plife[i]*0.4;

    cx.fillStyle='rgba('+pr[i]+','+pg[i]+','+pb[i]+','+Math.min(1,alpha)+')';
    cx.fillRect(sx-size/2,sy-size/2,size,size); // rect faster than arc
  }

  cx.globalCompositeOperation='source-over';

  // Shape name whisper
  var names=['sphere','helix','torus','wave','galaxy'];
  var shape=Math.floor(t*0.15)%5;
  cx.fillStyle='rgba(201,164,74,0.04)';
  cx.font='13px Georgia';cx.textAlign='center';
  cx.fillText(names[shape],w/2,h-30);

  // Stats
  var now=performance.now();
  var fps=Math.round(1000/(now-lastT));lastT=now;
  if(frame%10===0)document.getElementById('stats').textContent=N.toLocaleString()+' particles · '+fps+'fps · no libraries';

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
