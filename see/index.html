<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>See — Direct Comprehension</title>
<style>
:root{--bg:#0a0a0f;--fg:#e8e4dc;--accent:#c9a44a;--dim:#444;--green:#4aeaa0;--red:#f66;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--fg);font-family:Georgia,serif;overflow-x:hidden;}
#search-wrap{position:fixed;top:0;left:0;right:0;z-index:100;background:#0a0a0fdd;
  backdrop-filter:blur(12px);padding:12px 16px;display:flex;gap:8px;max-width:700px;margin:0 auto;}
#q{flex:1;background:#0d0d14;border:1px solid #222;color:var(--fg);font-family:Georgia,serif;
  font-size:1.1em;padding:10px 16px;border-radius:24px;outline:none;}
#q:focus{border-color:var(--accent);}
#q::placeholder{color:#333;}
.page{max-width:700px;margin:0 auto;padding:60px 16px 80px;}
#canvas-wrap{position:relative;width:100%;aspect-ratio:1;margin:0 auto;}
canvas{display:block;width:100%;height:100%;border-radius:12px;}
#info{margin-top:16px;}
.title{font-size:2.5em;font-weight:200;color:var(--accent);text-align:center;}
.subtitle{text-align:center;color:var(--dim);font-size:0.85em;margin:4px 0 16px;}
.viz-section{margin:16px 0;}
.viz-label{color:var(--dim);font-size:0.75em;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;}
.bar-row{display:flex;align-items:center;gap:8px;margin:3px 0;}
.bar-name{color:#777;font-size:0.8em;width:80px;text-align:right;}
.bar-track{flex:1;height:6px;background:#111;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s;}
.bar-val{color:var(--dim);font-size:0.75em;width:50px;}
.connections{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.conn{padding:4px 12px;border-radius:16px;font-size:0.78em;cursor:pointer;
  background:#111;border:1px solid #1a1a2a;color:#888;}
.conn:hover{border-color:var(--accent);color:var(--accent);}
.health-bar{height:10px;border-radius:5px;margin:8px 0;overflow:hidden;background:#111;}
.health-fill{height:100%;border-radius:5px;transition:width 0.8s;}
.foot{text-align:center;color:#333;font-size:0.7em;margin-top:32px;}
a{color:var(--accent);}
</style>
</head>
<body>

<div id="search-wrap">
<input id="q" placeholder="type anything — element, molecule, disease..."
  oninput="onType(this.value)" onkeydown="if(event.key==='Enter')commitSearch()" autocomplete="off">
<div id="suggest" style="position:absolute;top:100%;left:16px;right:16px;background:#0d0d14;
  border:1px solid #222;border-top:none;border-radius:0 0 8px 8px;display:none;z-index:101;
  max-height:200px;overflow-y:auto;"></div>
</div>

<div class="page">
<div id="canvas-wrap"><canvas id="viz"></canvas></div>
<div id="info"></div>
<div class="foot">
<a href="/wave/">Wave Table</a> · <a href="/health/">Health</a> · <a href="/harmonia/">Compute</a> · <a href="/r/">Research</a>
</div>
</div>

<script>
// ═══ THE CONDUCTOR (full engine) ═══
var CONFIGS={1:[[1,0,1]],2:[[1,0,2]],3:[[1,0,2],[2,0,1]],4:[[1,0,2],[2,0,2]],
5:[[1,0,2],[2,0,2],[2,1,1]],6:[[1,0,2],[2,0,2],[2,1,2]],7:[[1,0,2],[2,0,2],[2,1,3]],
8:[[1,0,2],[2,0,2],[2,1,4]],9:[[1,0,2],[2,0,2],[2,1,5]],10:[[1,0,2],[2,0,2],[2,1,6]],
11:[[1,0,2],[2,0,2],[2,1,6],[3,0,1]],12:[[1,0,2],[2,0,2],[2,1,6],[3,0,2]],
13:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,1]],14:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,2]],
15:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,3]],16:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,4]],
17:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,5]],18:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,6]],
19:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,6],[4,0,1]],20:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,6],[4,0,2]]};
var NAMES={1:'Hydrogen',2:'Helium',3:'Lithium',4:'Beryllium',5:'Boron',6:'Carbon',7:'Nitrogen',
8:'Oxygen',9:'Fluorine',10:'Neon',11:'Sodium',12:'Magnesium',13:'Aluminium',14:'Silicon',
15:'Phosphorus',16:'Sulfur',17:'Chlorine',18:'Argon',19:'Potassium',20:'Calcium'};
var SYMS={1:'H',2:'He',3:'Li',4:'Be',5:'B',6:'C',7:'N',8:'O',9:'F',10:'Ne',
11:'Na',12:'Mg',13:'Al',14:'Si',15:'P',16:'S',17:'Cl',18:'Ar',19:'K',20:'Ca'};
var SYM2Z={};for(var z in SYMS)SYM2Z[SYMS[z]]=parseInt(z);
SYM2Z['Hydrogen']=1;SYM2Z['Carbon']=6;SYM2Z['Oxygen']=8;SYM2Z['Iron']=26;
SYM2Z['Nitrogen']=7;SYM2Z['Sodium']=11;SYM2Z['Chlorine']=17;SYM2Z['Gold']=79;

function calc(Z){
  var c=CONFIGS[Z];if(!c)return null;
  var v=c[c.length-1],vn=v[0],vl=v[1],vc=v[2],sh=0;
  for(var i=0;i<c.length;i++){var n=c[i][0],l=c[i][1],cnt=c[i][2];
    if(n===vn&&l===vl){var s=n===1?0.3:(0.35+0.06*Math.max(0,cnt-2));sh+=s*(cnt-1);}
    else if(n===vn)sh+=0.85*cnt;
    else if(n===vn-1){if(vl===0)sh+=0.85*cnt;
    else{var ti=0;for(var j=0;j<c.length;j++)if(c[j][0]===n)ti+=c[j][2];sh+=(0.85+0.015*Math.max(0,ti-2))*cnt;}}
    else sh+=cnt;}
  var Zf=Math.max(.1,Z-sh),ne=vn;
  if(vl===1)ne=vn+.4+.12*(vc-1);else if(vl===0&&vc===2&&vn>1)ne=vn+.15;
  var r=ne*ne/Zf,rA=r*.529,IE=13.6*Zf*Zf/(ne*ne),ms=2*vl+1;
  if(vc===ms&&vl>0)IE+=1.1;if(vc===ms+1&&vl>0)IE-=1.6;
  if(vc>1&&vc<=ms&&vl>0)IE+=(vc-1)*.2;if(vl===0&&vc===2)IE-=1.5;
  var u=Math.min(vc,ms)-Math.max(0,vc-ms);
  return{Z:Z,sym:SYMS[Z],name:NAMES[Z],Zeff:Zf,neff:ne,IE:IE,r:rA,vdw:rA*1.7,
    EN:Math.min(4,.359*Zf/(r*r)*10+.744),hard:IE/2,soft:2/IE,
    alpha:r*r*r*.529*.529*.529,unpaired:u,mag:Math.sqrt(u*(u+2))};
}

var MOLECULES={
  'water':{formula:'H₂O',atoms:['H','H','O'],bonds:[{a:'H',b:'O',type:'polar covalent'}],
    role:'Universal solvent. IR absorption enables life. Peak at 3400 cm⁻¹.'},
  'salt':{formula:'NaCl',atoms:['Na','Cl'],bonds:[{a:'Na',b:'Cl',type:'ionic'}],

  'co2':{formula:'CO₂',atoms:['C','O','O'],bonds:[{a:'C',b:'O',type:'polar covalent'}],
    role:'Greenhouse gas. Absorbs at 4.3 μm and 15 μm. Climate driver.'},
  'glucose':{formula:'C₆H₁₂O₆',atoms:['C','C','C','C','C','C','O','O','O','O','O','O','H','H','H','H','H','H','H','H','H','H','H','H'],
    bonds:[],role:'Energy currency of life. Glycation at 1715 cm⁻¹ causes aging.'},
  'caffeine':{formula:'C₈H₁₀N₄O₂',atoms:['C','C','C','C','C','C','C','C','N','N','N','N','O','O'],
    bonds:[],role:'Adenosine receptor antagonist. Blocks sleep signal.'},
  'aspirin':{formula:'C₉H₈O₄',atoms:['C','C','C','C','C','C','C','C','C','O','O','O','O'],

};

// ═══ CANVAS VISUALIZATION ═══
var cv=document.getElementById('viz'),cx=cv.getContext('2d');
var CW,CH;
function resize(){
  var wrap=document.getElementById('canvas-wrap');
  var w=wrap.clientWidth;CW=cv.width=w*2;CH=cv.height=w*2;
  cx.setTransform(2,0,0,2,0,0);
}
resize();window.addEventListener('resize',resize);

var animFrame=0;
function drawElement(d){
  var w=CW/2,h=CH/2;
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,w,h);
  animFrame++;

  // Central orb — size from radius, color from IE
  var orbR=30+d.r*15;
  var hue=40-d.IE*1.5;// gold→red for high IE
  var cx0=w/2,cy0=h*0.4;

  // Electron cloud glow
  for(var ring=3;ring>=0;ring--){
    var R=orbR+ring*20;
    var alpha=0.08-ring*0.015;
    var grad=cx.createRadialGradient(cx0,cy0,0,cx0,cy0,R);
    grad.addColorStop(0,'rgba(201,164,74,'+alpha+')');
    grad.addColorStop(1,'rgba(201,164,74,0)');
    cx.fillStyle=grad;cx.beginPath();cx.arc(cx0,cy0,R,0,Math.PI*2);cx.fill();
  }

  // Core
  var coreGrad=cx.createRadialGradient(cx0,cy0,0,cx0,cy0,orbR);
  coreGrad.addColorStop(0,'rgba(244,217,144,0.3)');
  coreGrad.addColorStop(0.6,'rgba(201,164,74,0.15)');
  coreGrad.addColorStop(1,'rgba(201,164,74,0)');
  cx.fillStyle=coreGrad;cx.beginPath();cx.arc(cx0,cy0,orbR,0,Math.PI*2);cx.fill();

  // Orbiting electrons (unpaired = visible)
  for(var e=0;e<Math.min(d.unpaired+2,8);e++){
    var angle=animFrame*0.02+e*Math.PI*2/(d.unpaired+2);
    var eR=orbR+15+e*8;
    var ex=cx0+Math.cos(angle)*eR;
    var ey=cy0+Math.sin(angle)*eR;
    cx.fillStyle=e<d.unpaired?'#4aeaa0':'#c9a44a40';
    cx.beginPath();cx.arc(ex,ey,3,0,Math.PI*2);cx.fill();
  }

  // Symbol
  cx.fillStyle='#fff';cx.font='bold 32px Georgia';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(d.sym,cx0,cy0);

  // Wave underneath — Z_eff sawtooth
  cx.strokeStyle='#c9a44a30';cx.lineWidth=1;cx.beginPath();
  for(var i=0;i<w;i++){
    var t=i/w*4*Math.PI+animFrame*0.01;
    var y=cy0+orbR+40+Math.sin(t*d.Zeff)*10;
    if(i===0)cx.moveTo(i,y);else cx.lineTo(i,y);
  }
  cx.stroke();

  requestAnimationFrame(function(){if(currentType==='element')drawElement(d);});
}

function drawDisease(d){
  var w=CW/2,h=CH/2;
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,w,h);
  animFrame++;

  var cx0=w/2,cy0=h*0.4;

  // Healthy wave
  cx.strokeStyle='#4aeaa040';cx.lineWidth=2;cx.beginPath();
  for(var i=0;i<w;i++){
    var t=i/w*6*Math.PI;
    var y=cy0-30+Math.sin(t)*20;
    if(i===0)cx.moveTo(i,y);else cx.lineTo(i,y);
  }
  cx.stroke();

  // Disease wave (shifted)
  cx.strokeStyle='#f6640060';cx.lineWidth=2;cx.beginPath();
  for(var i=0;i<w;i++){
    var t=i/w*6*Math.PI+0.3;
    var y=cy0+30+Math.sin(t*1.1)*20;
    if(i===0)cx.moveTo(i,y);else cx.lineTo(i,y);
  }
  cx.stroke();

  // Interference pattern (the difference)
  cx.strokeStyle='#c9a44a';cx.lineWidth=1.5;cx.beginPath();
  for(var i=0;i<w;i++){
    var t=i/w*6*Math.PI;
    var healthy=Math.sin(t)*20;
    var disease=Math.sin(t*1.1+0.3)*20;
    var diff=disease-healthy;
    var y=cy0+80+diff*1.5;
    if(i===0)cx.moveTo(i,y);else cx.lineTo(i,y);
  }
  cx.stroke();

  // Labels
  cx.fillStyle='#4aeaa060';cx.font='11px Georgia';cx.textAlign='left';
  cx.fillText('healthy frequency',10,cy0-55);
  cx.fillStyle='#f6640060';cx.fillText('disease frequency',10,cy0+5);
  cx.fillStyle='#c9a44a';cx.fillText('difference = the target',10,cy0+55);

  // Target crosshair
  if(d.freq>100){
    var targetX=w/2+Math.sin(animFrame*0.03)*30;
    cx.strokeStyle='#f66';cx.lineWidth=1;
    cx.beginPath();cx.arc(targetX,cy0+80,15,0,Math.PI*2);cx.stroke();
    cx.beginPath();cx.moveTo(targetX-20,cy0+80);cx.lineTo(targetX+20,cy0+80);cx.stroke();
    cx.beginPath();cx.moveTo(targetX,cy0+60);cx.lineTo(targetX,cy0+100);cx.stroke();
  }

  requestAnimationFrame(function(){if(currentType==='disease')drawDisease(d);});
}

function drawMolecule(d){
  var w=CW/2,h=CH/2;
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,w,h);
  animFrame++;
  var cx0=w/2,cy0=h*0.4;

  // Draw atoms as orbs
  var positions=[];
  var n=d.atoms.length;
  for(var i=0;i<Math.min(n,12);i++){
    var angle=i*Math.PI*2/Math.min(n,12)+animFrame*0.005;
    var R=40+Math.min(n,12)*5;
    var x=cx0+Math.cos(angle)*R;
    var y=cy0+Math.sin(angle)*R;
    positions.push({x:x,y:y,sym:d.atoms[i]});
    var Z=SYM2Z[d.atoms[i]]||6;
    var el=calc(Z);
    var orbSize=el?8+el.r*5:10;
    cx.fillStyle='rgba(201,164,74,0.2)';
    cx.beginPath();cx.arc(x,y,orbSize,0,Math.PI*2);cx.fill();
    cx.fillStyle='#c9a44a';cx.font='10px Georgia';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(d.atoms[i],x,y);
  }

  // Draw bonds
  for(var i=0;i<positions.length-1;i++){
    cx.strokeStyle='#ffffff10';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(positions[i].x,positions[i].y);
    cx.lineTo(positions[i+1].x,positions[i+1].y);cx.stroke();
  }

  requestAnimationFrame(function(){if(currentType==='molecule')drawMolecule(d);});
}

// ═══ SEARCHABLE INDEX — everything in one list ═══
var ALL_ITEMS=[];
// Elements
for(var z in NAMES)ALL_ITEMS.push({type:'element',label:SYMS[z]+' — '+NAMES[z],key:NAMES[z].toLowerCase(),sym:SYMS[z],Z:parseInt(z)});

for(var d in DISEASES)ALL_ITEMS.push({type:'disease',label:d.charAt(0).toUpperCase()+d.slice(1),key:d,id:d});

// Bonus keywords → diseases
var ALIASES={
  'althimerz':'alzheimer','alzheimers':'alzheimer','alzhiemers':'alzheimer','dementia':'alzheimer',
  'adhd':'anxiety','panic':'anxiety','stress':'anxiety','worry':'anxiety',
  'tumor':'cancer','tumour':'cancer','oncology':'cancer','carcinoma':'cancer','melanoma':'cancer',
  'parkinsons':'parkinson','tremor':'parkinson','parkinson\'s':'parkinson',
  'diabetic':'diabetes','sugar':'diabetes','glucose':'diabetes','insulin':'diabetes',
  'heartattack':'heart disease','cholesterol':'heart disease','atherosclerosis':'heart disease',
  'stroke':'heart disease','cardiovascular':'heart disease',
  'joint':'arthritis','knee':'arthritis','hip':'arthritis','rheumatoid':'arthritis',

  'addict':'addiction','drugs':'addiction','alcohol':'addiction','smoking':'addiction',
  'sad':'depression','depressed':'depression','hopeless':'depression','suicidal':'depression',

  'immune':'autoimmune','lupus':'autoimmune','ms':'autoimmune','hashimoto':'autoimmune',
};
for(var a in ALIASES)ALL_ITEMS.push({type:'alias',label:a+' → '+ALIASES[a],key:a,target:ALIASES[a]});

function fuzzyMatch(query, target){
  // Levenshtein-ish: how many chars match in order
  var q=query.toLowerCase(),t=target.toLowerCase();
  if(t.indexOf(q)>=0)return 100-t.indexOf(q); // substring = strong
  if(q.indexOf(t)>=0)return 80;
  // Count matching chars in order
  var qi=0,matches=0;
  for(var ti=0;ti<t.length&&qi<q.length;ti++){
    if(t[ti]===q[qi]){matches++;qi++;}
  }
  return matches/Math.max(q.length,1)*60;
}

var suggestEl=document.getElementById('suggest');
var topMatch=null;

function onType(val){
  val=val.trim();
  if(val.length<1){suggestEl.style.display='none';topMatch=null;return;}
  var ql=val.toLowerCase();

  // Score all items
  var scored=[];
  ALL_ITEMS.forEach(function(item){
    var s=fuzzyMatch(ql,item.key);
    if(item.sym&&fuzzyMatch(ql,item.sym.toLowerCase())>s)s=fuzzyMatch(ql,item.sym.toLowerCase());
    if(s>20)scored.push({item:item,score:s});
  });
  scored.sort(function(a,b){return b.score-a.score;});
  scored=scored.slice(0,6);

  if(scored.length===0){suggestEl.style.display='none';topMatch=null;return;}

  topMatch=scored[0].item;

  // Auto-search top match as you type (live preview)
  doSearch(topMatch);

  // Show suggestions
  var h='';
  scored.forEach(function(s,i){
    var bg=i===0?'#1a1a10':'transparent';
    var col=i===0?'var(--accent)':'#777';
    var typeTag=s.item.type==='element'?'⚛':'';
    if(s.item.type==='disease')typeTag='♥';
    if(s.item.type==='molecule')typeTag='⬡';
    if(s.item.type==='alias')typeTag='→';
    h+='<div style="padding:8px 12px;cursor:pointer;color:'+col+';background:'+bg+
      ';font-size:0.9em;" onmousedown="pickSuggestion('+i+')" data-idx="'+i+'">'+
      '<span style="margin-right:6px;opacity:0.5;">'+typeTag+'</span>'+s.item.label+'</div>';
  });
  suggestEl.innerHTML=h;
  suggestEl.style.display='block';
  suggestEl._scored=scored;
}

function pickSuggestion(idx){
  var scored=suggestEl._scored;
  if(!scored||!scored[idx])return;
  var item=scored[idx].item;
  document.getElementById('q').value=item.label.split(' — ')[0].split(' (')[0];
  suggestEl.style.display='none';
  doSearch(item);
}

function commitSearch(){
  suggestEl.style.display='none';
  if(topMatch){doSearch(topMatch);return;}
  var q=document.getElementById('q').value.trim();
  if(q)search(q);
}

function doSearch(item){
  if(item.type==='element'&&CONFIGS[item.Z]){currentType='element';showElement(calc(item.Z));}
  else if(item.type==='disease'){currentType='disease';showDisease(item.id,DISEASES[item.id]);}
  else if(item.type==='molecule'){currentType='molecule';showMolecule(item.id,MOLECULES[item.id]);}
  else if(item.type==='alias'){
    var target=item.target;
    if(DISEASES[target]){currentType='disease';showDisease(target,DISEASES[target]);}
  }
}

function search(q){
  q=q.trim();if(!q)return;
  var ql=q.toLowerCase();
  var qcap=q.charAt(0).toUpperCase()+q.slice(1).toLowerCase();

  // Element FIRST — exact symbol match (highest priority)
  var Z=SYM2Z[q]||SYM2Z[qcap];
  // Also try exact lowercase-to-symbol (e.g. "fe" → "Fe")
  if(!Z){var sym2=q.charAt(0).toUpperCase()+q.slice(1).toLowerCase();if(SYM2Z[sym2])Z=SYM2Z[sym2];}
  // Also try full name match
  if(!Z)for(var z in NAMES)if(NAMES[z].toLowerCase()===ql){Z=parseInt(z);break;}
  if(Z&&CONFIGS[Z]){currentType='element';showElement(calc(Z));return;}

  // Disease — exact word match only (not substring)
  for(var d in DISEASES){
    if(ql===d||ql===d+'s'||d.indexOf(ql)===0||(ql.length>=4&&d.indexOf(ql)>=0)){
      currentType='disease';showDisease(d,DISEASES[d]);return;
    }
  }

  // Molecule — exact match only
  for(var m in MOLECULES){
    if(ql===m||ql===m+'s'){
      currentType='molecule';showMolecule(m,MOLECULES[m]);return;
    }
  }

  // Number? Count primes
  var n=parseFloat(q);
  if(!isNaN(n)&&n>1){currentType=null;showPrimes(n);return;}

  // Fuzzy disease search (relaxed)
  for(var d in DISEASES){if(ql.length>=3&&d.indexOf(ql)>=0){currentType='disease';showDisease(d,DISEASES[d]);return;}}

  // Fuzzy molecule search (relaxed)
  for(var m in MOLECULES){if(ql.length>=3&&m.indexOf(ql)>=0){currentType='molecule';showMolecule(m,MOLECULES[m]);return;}}
}

function bar(name,value,max,color){
  var pct=Math.min(100,value/max*100);
  return '<div class="bar-row"><span class="bar-name">'+name+'</span>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+';"></div></div>'+
    '<span class="bar-val">'+value.toFixed(2)+'</span></div>';
}

function showElement(d){
  drawElement(d);
  var h='<div class="title">'+d.sym+'</div>';
  h+='<div class="subtitle">'+d.name+' · Z='+d.Z+' · Z<sub>eff</sub>='+d.Zeff.toFixed(2)+' · n<sub>eff</sub>='+d.neff.toFixed(2)+'</div>';

  h+='<div class="viz-section"><div class="viz-label">Properties from Z alone</div>';
  h+=bar('IE',d.IE,25,'var(--accent)');
  h+=bar('Radius',d.r,3,'var(--green)');
  h+=bar('EN',d.EN,4,'#4ECDC4');
  h+=bar('Hardness',d.hard,12,'#9B59B6');
  h+=bar('Softness',d.soft,0.5,'#E67E22');
  h+=bar('α',d.alpha,50,'#3498DB');
  h+=bar('μ',d.mag,4,'#E74C3C');
  h+='</div>';

  h+='<div class="viz-section"><div class="viz-label">Bonds with</div><div class="connections">';
  for(var z=1;z<=20;z++){if(z===d.Z||!CONFIGS[z])continue;
    var other=calc(z);var ed=Math.abs(d.EN-other.EN);
    var type=ed>1.7?'ionic':ed>0.4?'polar':'covalent';
    var col=type==='ionic'?'var(--accent)':type==='polar'?'#4ECDC4':'var(--green)';
    h+='<div class="conn" style="border-color:'+col+'" onclick="search(\''+other.sym+'\')">'+other.sym+' <span style="color:'+col+';font-size:0.7em;">'+type+'</span></div>';
  }
  h+='</div></div>';

  h+='<div class="viz-section"><div class="viz-label">Health connection</div>';
  h+='<div style="color:#777;font-size:0.85em;">Body IR at 9.3 μm maintains bonds involving '+d.sym+'. ';
  if(d.Z===6)h+='Carbon is in EVERY biological molecule. The backbone of life.';
  if(d.Z===8)h+='Oxygen drives cellular respiration. Without it, ATP stops, IR stops, everything stops.';
  if(d.Z===7)h+='Nitrogen is in every amino acid, every protein, every enzyme.';
  if(d.Z===1)h+='Hydrogen bonds hold DNA together, fold proteins, make water liquid.';
  if(d.Z===15)h+='Phosphorus is in DNA backbone (1080 cm⁻¹) and ATP. The energy and information carrier.';
  if(d.Z===16)h+='Sulfur disulfide bonds hold proteins in shape. Breaking them = misfolding = disease.';
  if(d.Z===11)h+='Sodium is the nerve signal carrier. Every thought is a sodium wave.';
  if(d.Z===19)h+='Potassium balances sodium. Together they create the resting potential of every cell.';
  if(d.Z===20)h+='Calcium is bone, muscle contraction, and cell signaling. The structural + signal element.';
  h+='</div></div>';

  document.getElementById('info').innerHTML=h;
}

function showDisease(name,d){
  drawDisease(d);
  var h='<div class="title" style="color:var(--red);">'+name.charAt(0).toUpperCase()+name.slice(1)+'</div>';
  h+='<div class="subtitle">'+d.sig+' · '+d.freq+' cm⁻¹ · '+d.lam+' μm · '+d.sel+'× selectivity</div>';

  h+='<div class="viz-section"><div class="viz-label">Mechanism</div>';
  h+='<div style="color:#999;font-size:0.9em;">'+d.mech+'</div></div>';

  h+='<div class="viz-section"><div class="viz-label">What maintains health</div>';
  h+='<div style="color:var(--green);font-size:0.9em;">'+d.maintains+'</div></div>';

  h+='<div class="viz-section"><div class="viz-label">What breaks it</div>';
  h+='<div style="color:var(--red);font-size:0.9em;">'+d.breaks+'</div></div>';

  h+='<div class="viz-section"><div class="viz-label">Frequency intervention</div>';
  h+='<div style="color:var(--accent);font-size:0.9em;">'+d.rx+'</div></div>';

  h+='<div class="connections">';
  for(var dd in DISEASES){if(dd!==name)h+='<div class="conn" onclick="search(\''+dd+'\')">'+dd+'</div>';}
  h+='</div>';

  document.getElementById('info').innerHTML=h;
}

function showMolecule(name,d){
  drawMolecule(d);
  var h='<div class="title">'+d.formula+'</div>';
  h+='<div class="subtitle">'+name+'</div>';
  h+='<div style="color:#999;font-size:0.9em;margin:12px 0;">'+d.role+'</div>';

  if(d.bonds.length){
    h+='<div class="viz-section"><div class="viz-label">Bonds</div>';
    d.bonds.forEach(function(b){
      var col=b.type==='ionic'?'var(--accent)':b.type==='polar covalent'?'#4ECDC4':'var(--green)';
      h+='<div style="color:'+col+';font-size:0.9em;">'+b.a+' — '+b.b+': '+b.type+'</div>';
    });
    h+='</div>';
  }

  h+='<div class="connections">';
  var unique=[];d.atoms.forEach(function(a){if(unique.indexOf(a)<0)unique.push(a);});
  unique.forEach(function(a){h+='<div class="conn" onclick="search(\''+a+'\')">'+a+'</div>';});
  h+='</div>';

  document.getElementById('info').innerHTML=h;
}

function showPrimes(x){
  // Count using the oracle
  document.getElementById('info').innerHTML='<div class="title" style="font-size:1.5em;">Computing π('+x.toLocaleString()+')...</div>';
  // Simplified prime count for the demo
  var count=0;if(x<=100000)for(var i=2;i<=x;i++){var p=true;for(var j=2;j*j<=i;j++)if(i%j===0){p=false;break;}if(p)count++;}
  else count=Math.round(x/Math.log(x));
  document.getElementById('info').innerHTML='<div class="title">π('+x.toLocaleString()+') ≈ '+count.toLocaleString()+'</div><div class="subtitle">primes below '+x.toLocaleString()+'</div>';
}

// Start with carbon
search('C');
document.getElementById('q').focus();
</script>
