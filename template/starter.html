<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1a110d">
<title>Your Title Here</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a110d;color:#c4a088;font-family:Georgia,serif;min-height:100vh;}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.page{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:60px 20px 80px;}
h1{font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  font-size:1.8em;font-weight:400;color:#b8753a;letter-spacing:0.06em;text-align:center;
  opacity:0;animation:up 1.2s ease forwards;}
p{line-height:1.9;font-size:0.85em;color:#999;margin:16px 0;
  opacity:0;animation:up 1s ease 0.3s forwards;}
a{color:#a0622d;text-decoration:none;}a:hover{color:#e8cfa0;}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9998;opacity:0.018;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="page">
  <h1>Your Title Here</h1>
  <p>Replace this with your content. The background is alive. The grain is real. The aesthetic is yours. Change the colors, change the words, keep the warmth.</p>
</div>
<script>
(function(){
var cv=document.getElementById('bg'),cx=cv.getContext('2d'),W,H,dpr,PHI=(1+Math.sqrt(5))/2;
function resize(){dpr=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);}
resize();addEventListener('resize',resize);
var motes=[];for(var i=0;i<20;i++)motes.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-.5)*.08,vy:(Math.random()-.5)*.08,s:Math.random()*1.5+.4,base:Math.random()*.06+.025,flicker:Math.random()*.5+.5,phase:Math.random()*100,warm:Math.random()});
var t=0;
(function draw(){t+=.016;cx.clearRect(0,0,W,H);for(var i=0;i<motes.length;i++){var m=motes[i];m.x+=m.vx;m.y+=m.vy;if(m.x<0)m.x=W;if(m.x>W)m.x=0;if(m.y<0)m.y=H;if(m.y>H)m.y=0;var f=Math.sin(t*m.flicker+m.phase)*Math.sin(t*m.flicker*PHI+m.phase*.7)*.5+.5;var a=m.base*f;var r=184+m.warm*16|0,g=117+m.warm*30|0,b=58+m.warm*20|0;var gl=cx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.s*5);gl.addColorStop(0,'rgba('+r+','+g+','+b+','+(a*.4)+')');gl.addColorStop(.4,'rgba('+r+','+g+','+b+','+(a*.1)+')');gl.addColorStop(1,'rgba('+r+','+g+','+b+',0)');cx.fillStyle=gl;cx.fillRect(m.x-m.s*5,m.y-m.s*5,m.s*10,m.s*10);cx.beginPath();cx.arc(m.x,m.y,m.s*.6,0,Math.PI*2);cx.fillStyle='rgba('+Math.min(255,r+40)+','+Math.min(255,g+30)+','+Math.min(255,b+20)+','+(a*1.2)+')';cx.fill();}requestAnimationFrame(draw);})();
})();
</script>
</body>
</html>
