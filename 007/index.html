<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Feed</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0a0a0a;color:#e0ddd5;
  max-width:480px;margin:0 auto;padding:16px;
  font-size:15px;line-height:1.6;
}
h1{font-size:22px;font-weight:200;letter-spacing:0.06em;color:#fff;margin-bottom:4px}
.subtitle{font-size:11px;color:#665;letter-spacing:0.12em;margin-bottom:24px}

/* Sections */
.section{
  background:#ffffff06;border-radius:12px;
  padding:20px;margin-bottom:16px;
  border:1px solid #ffffff0a;
}
.section-title{
  font-size:11px;font-weight:600;letter-spacing:0.15em;
  text-transform:uppercase;color:#ffd6a060;margin-bottom:12px;
}

/* BTC */
.btc-price{font-size:36px;font-weight:200;color:#ffd6a0;letter-spacing:0.02em}
.btc-change{font-size:14px;margin-top:4px}
.btc-up{color:#4ecb71}
.btc-down{color:#e55}
.btc-detail{font-size:12px;color:#776;margin-top:8px}
.btc-alert-row{
  display:flex;gap:8px;margin-top:12px;align-items:center;
}
.btc-alert-row input{
  background:#ffffff0a;border:1px solid #ffffff15;border-radius:6px;
  color:#e0ddd5;padding:6px 10px;font-size:13px;width:100px;
  font-family:inherit;outline:none;
}
.btc-alert-row input:focus{border-color:#ffd6a040}
.btc-alert-row button{
  background:#ffd6a015;border:1px solid #ffd6a025;border-radius:6px;
  color:#ffd6a0;padding:6px 12px;font-size:12px;cursor:pointer;
  font-family:inherit;letter-spacing:0.05em;
}
.btc-alert-row button:active{background:#ffd6a030}
.alert-status{font-size:11px;color:#665;margin-top:6px}

/* News */
.news-item{
  padding:12px 0;border-bottom:1px solid #ffffff08;
}
.news-item:last-child{border-bottom:none}
.news-source{font-size:10px;color:#ffd6a060;letter-spacing:0.1em;text-transform:uppercase}
.news-headline{
  font-size:14px;font-weight:400;color:#ddd;margin-top:4px;
  text-decoration:none;display:block;line-height:1.5;
}
.news-headline:hover{color:#ffd6a0}
.news-time{font-size:11px;color:#554;margin-top:2px}

/* Twitter handles */
.handle-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.handle-tag{
  background:#1da1f215;border:1px solid #1da1f225;border-radius:16px;
  padding:4px 12px;font-size:12px;color:#1da1f2;
  display:flex;align-items:center;gap:6px;
}
.handle-remove{
  cursor:pointer;opacity:0.5;font-size:10px;
}
.handle-remove:hover{opacity:1}
.add-handle{
  display:flex;gap:6px;margin-bottom:12px;
}
.add-handle input{
  flex:1;background:#ffffff0a;border:1px solid #ffffff15;border-radius:6px;
  color:#e0ddd5;padding:6px 10px;font-size:13px;
  font-family:inherit;outline:none;
}
.add-handle input::placeholder{color:#443}
.add-handle button{
  background:#1da1f215;border:1px solid #1da1f225;border-radius:6px;
  color:#1da1f2;padding:6px 12px;font-size:12px;cursor:pointer;
  font-family:inherit;
}
.tweet-embed{
  background:#ffffff04;border-radius:8px;padding:12px;margin-bottom:8px;
  border:1px solid #ffffff08;
}
.tweet-author{font-size:12px;color:#1da1f2;font-weight:500}
.tweet-text{font-size:13px;color:#bbb;margin-top:4px;line-height:1.5}
.tweet-time{font-size:10px;color:#554;margin-top:4px}
.tweet-link{color:#1da1f280;text-decoration:none;font-size:11px}
.tweet-link:hover{color:#1da1f2}

/* Settings */
.settings-toggle{
  font-size:11px;color:#554;cursor:pointer;text-align:center;
  padding:8px;letter-spacing:0.1em;
}
.settings-toggle:hover{color:#998}
.settings-panel{display:none;margin-top:12px}
.settings-panel.show{display:block}

/* Loading */
.loading{color:#554;font-size:13px;font-style:italic}
.error{color:#e55;font-size:12px}

/* Last updated */
.last-updated{
  text-align:center;font-size:10px;color:#443;
  margin-top:16px;letter-spacing:0.08em;
}
</style>
</head>
<body>

<h1>daily feed</h1>
<div class="subtitle" id="dateDisplay"></div>

<!-- BTC SECTION -->
<div class="section">
  <div class="section-title">bitcoin</div>
  <div class="btc-price" id="btcPrice">...</div>
  <div class="btc-change" id="btcChange"></div>
  <div class="btc-detail" id="btcDetail"></div>
  <div class="btc-alert-row">
    <input type="number" id="alertAbove" placeholder="alert above">
    <input type="number" id="alertBelow" placeholder="alert below">
    <button onclick="setAlerts()">set</button>
  </div>
  <div class="alert-status" id="alertStatus"></div>
</div>

<!-- NEWS SECTION -->
<div class="section">
  <div class="section-title">top stories</div>
  <div id="newsContainer"><span class="loading">loading headlines...</span></div>
</div>

<!-- TWITTER SECTION -->
<div class="section">
  <div class="section-title">twitter / x</div>
  <div class="handle-list" id="handleList"></div>
  <div class="add-handle">
    <input type="text" id="handleInput" placeholder="@username" onkeypress="if(event.key==='Enter'){event.preventDefault();addHandle();}">
    <button id="addBtn">+ add</button>
  </div>
  <div id="tweetContainer"><span class="loading">add handles to see tweets</span></div>
</div>

<div class="last-updated" id="lastUpdated"></div>

<script>
// ── CONFIG (saved to localStorage) ────────────────────────────────
var CONFIG_KEY = 'dailyfeed_config';
var config = loadConfig();

function loadConfig() {
  try {
    var saved = JSON.parse(localStorage.getItem(CONFIG_KEY) || '{}');
    return {
      handles: saved.handles || ['@elonmusk', '@bitcoin', '@APNews'],
      alertAbove: saved.alertAbove || null,
      alertBelow: saved.alertBelow || null,
    };
  } catch(e) {
    return { handles: ['@elonmusk', '@bitcoin', '@APNews'], alertAbove: null, alertBelow: null };
  }
}

function saveConfig() {
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(config)); } catch(e) {}
}

// ── DATE ──────────────────────────────────────────────────────────
var now = new Date();
document.getElementById('dateDisplay').textContent =
  now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

// ── BITCOIN ──────────────────────────────────────────────────────
var lastBtcPrice = 0;

function fetchBTC() {
  fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true&include_market_cap=true')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var btc = data.bitcoin;
      var price = btc.usd;
      var change = btc.usd_24h_change;
      lastBtcPrice = price;

      document.getElementById('btcPrice').textContent = '$' + price.toLocaleString('en-US', {maximumFractionDigits: 0});

      var changeEl = document.getElementById('btcChange');
      var sign = change >= 0 ? '+' : '';
      changeEl.textContent = sign + change.toFixed(2) + '% (24h)';
      changeEl.className = 'btc-change ' + (change >= 0 ? 'btc-up' : 'btc-down');

      var vol = btc.usd_24h_vol;
      var cap = btc.usd_market_cap;
      document.getElementById('btcDetail').textContent =
        'vol $' + (vol/1e9).toFixed(1) + 'B · cap $' + (cap/1e12).toFixed(2) + 'T';

      checkAlerts(price);
      updateTimestamp();
    })
    .catch(function(e) {
      document.getElementById('btcPrice').textContent = 'error';
    });
}

function checkAlerts(price) {
  if (!('Notification' in window)) return;

  if (config.alertAbove && price >= config.alertAbove) {
    notify('BTC above $' + config.alertAbove.toLocaleString(), 'Currently $' + price.toLocaleString());
  }
  if (config.alertBelow && price <= config.alertBelow) {
    notify('BTC below $' + config.alertBelow.toLocaleString(), 'Currently $' + price.toLocaleString());
  }
}

function notify(title, body) {
  if (Notification.permission === 'granted') {
    new Notification(title, { body: body, icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">₿</text></svg>' });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function setAlerts() {
  var above = document.getElementById('alertAbove').value;
  var below = document.getElementById('alertBelow').value;
  config.alertAbove = above ? parseFloat(above) : null;
  config.alertBelow = below ? parseFloat(below) : null;
  saveConfig();

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  var status = [];
  if (config.alertAbove) status.push('alert above $' + config.alertAbove.toLocaleString());
  if (config.alertBelow) status.push('alert below $' + config.alertBelow.toLocaleString());
  document.getElementById('alertStatus').textContent = status.length ? status.join(' · ') : '';
}

// Populate saved alerts
if (config.alertAbove) document.getElementById('alertAbove').value = config.alertAbove;
if (config.alertBelow) document.getElementById('alertBelow').value = config.alertBelow;
setAlerts();

// Fetch immediately + every 60 seconds
fetchBTC();
setInterval(fetchBTC, 60000);


// ── NEWS (free RSS-to-JSON via rss2json) ─────────────────────────
function fetchNews() {
  // Try multiple RSS-to-JSON services for reliability
  var feeds = [
    {url: 'https://feeds.bbci.co.uk/news/world/rss.xml', name: 'BBC'},
    {url: 'https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', name: 'NYT'},
    {url: 'https://www.reddit.com/r/worldnews/.rss', name: 'Reddit'},
  ];

  var allItems = [];
  var completed = 0;

  feeds.forEach(function(feed) {
    // Try rss2json first, then allorigins as CORS proxy fallback
    fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed.url) + '&count=5')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.status === 'ok' && data.items) {
          data.items.forEach(function(item) {
            allItems.push({
              title: item.title,
              link: item.link,
              source: feed.name,
              pubDate: new Date(item.pubDate),
            });
          });
        }
      })
      .catch(function() {
        // Silently fail — other feeds may succeed
      })
      .finally(function() {
        completed++;
        if (completed === feeds.length) {
          if (allItems.length === 0) {
            // All RSS failed — show direct links instead
            document.getElementById('newsContainer').innerHTML =
              '<a class="news-headline" href="https://news.google.com" target="_blank">Google News →</a>' +
              '<a class="news-headline" href="https://www.bbc.com/news" target="_blank" style="margin-top:8px">BBC News →</a>' +
              '<a class="news-headline" href="https://www.reuters.com" target="_blank" style="margin-top:8px">Reuters →</a>';
          } else {
            renderNews(allItems);
          }
        }
      });
  });
}

function renderNews(items) {
  // Sort by date, newest first, take top 10
  items.sort(function(a, b) { return b.pubDate - a.pubDate; });
  var top = items.slice(0, 10);

  var container = document.getElementById('newsContainer');
  if (top.length === 0) {
    container.innerHTML = '<span class="error">could not load headlines</span>';
    return;
  }

  var html = '';
  top.forEach(function(item) {
    var ago = timeAgo(item.pubDate);
    var source = item.source.replace('BBC News', 'BBC').replace('NYT > ', '').replace('Reuters: ', '');
    html += '<div class="news-item">' +
      '<div class="news-source">' + escHtml(source) + '</div>' +
      '<a class="news-headline" href="' + escHtml(item.link) + '" target="_blank">' + escHtml(item.title) + '</a>' +
      '<div class="news-time">' + ago + '</div>' +
      '</div>';
  });
  container.innerHTML = html;
}

fetchNews();


// ── TWITTER / X ──────────────────────────────────────────────────
// Since Twitter API is expensive and restricted, we use nitter.net
// RSS feeds (public, no auth needed) via rss2json to get tweets.
// Falls back to showing direct links if RSS fails.

function renderHandles() {
  var container = document.getElementById('handleList');
  var html = '';
  config.handles.forEach(function(h, i) {
    html += '<span class="handle-tag">' + escHtml(h) +
      ' <span class="handle-remove" onclick="removeHandle(' + i + ')">×</span></span>';
  });
  container.innerHTML = html;
}

function addHandle() {
  var input = document.getElementById('handleInput');
  var handle = input.value.trim();
  if (!handle) return;
  if (handle[0] !== '@') handle = '@' + handle;
  if (config.handles.indexOf(handle) === -1) {
    config.handles.push(handle);
    saveConfig();
    renderHandles();
    fetchTweets();
  }
  input.value = '';
}

function removeHandle(i) {
  config.handles.splice(i, 1);
  saveConfig();
  renderHandles();
  fetchTweets();
}

// Twitter/X — direct links to profiles. No API needed.
// Each handle becomes a tappable card that opens their x.com feed.
function fetchTweets() {
  var container = document.getElementById('tweetContainer');
  if (config.handles.length === 0) {
    container.innerHTML = '<span class="loading">add handles to see tweets</span>';
    return;
  }

  var html = '';
  config.handles.forEach(function(handle) {
    var username = handle.replace('@', '');
    html += '<a class="tweet-embed" href="https://x.com/' + escHtml(username) + '" target="_blank" style="text-decoration:none;display:block">' +
      '<div class="tweet-author">@' + escHtml(username) + '</div>' +
      '<div class="tweet-text" style="color:#776">tap to view latest on X →</div>' +
      '</a>';
  });
  container.innerHTML = html;
}

renderHandles();
fetchTweets();

// Wire up add button with proper event listener (not onclick — works on iOS)
document.getElementById('addBtn').addEventListener('touchend', function(e) { e.preventDefault(); addHandle(); });
document.getElementById('addBtn').addEventListener('click', function() { addHandle(); });


// ── UTILITIES ────────────────────────────────────────────────────
function timeAgo(date) {
  var seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 60) return 'just now';
  var minutes = Math.floor(seconds / 60);
  if (minutes < 60) return minutes + 'm ago';
  var hours = Math.floor(minutes / 60);
  if (hours < 24) return hours + 'h ago';
  var days = Math.floor(hours / 24);
  return days + 'd ago';
}

function escHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function updateTimestamp() {
  document.getElementById('lastUpdated').textContent =
    'updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
updateTimestamp();
</script>

</body>
</html>
