<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Creation — the coupling sequence</title>
<meta name="description" content="The universe coupling itself into existence. Every scale. Every mechanism. 0+0=1.">
<meta name="theme-color" content="#000000">
<link rel="icon" href="/favicon.png">
<script src="/js/audio.js"></script>
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{font-family:Georgia,serif;color:#c4a088;cursor:default;
  -webkit-tap-highlight-color:transparent;user-select:none;}

canvas#cv{position:fixed;top:0;left:0;width:100%;height:100%;display:block;z-index:0;}

/* ═══ TOP BAR ═══ */
.top{position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,transparent 100%);}
.top a,.top button{pointer-events:all;}
.back{font-family:Futura,'Century Gothic',Avenir,'Avenir Next',system-ui,sans-serif;
  font-size:0.62em;color:#8b4a2e;text-decoration:none;letter-spacing:0.06em;
  transition:color 0.3s;}
.back:hover{color:#e8cfa0;}
.top-right{display:flex;align-items:center;gap:14px;}

/* Audio controls */
.audio-btn{background:none;border:1px solid rgba(139,74,46,0.2);border-radius:6px;
  padding:5px 10px;cursor:pointer;
  font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:0.55em;color:#8b4a2e;letter-spacing:0.04em;transition:all 0.3s;}
.audio-btn:hover{color:#b8753a;border-color:rgba(184,117,58,0.3);}
.audio-btn.active{color:#b8753a;border-color:rgba(184,117,58,0.35);}
input[type=range]{-webkit-appearance:none;appearance:none;width:60px;height:3px;
  background:rgba(184,117,58,0.15);border-radius:2px;outline:none;cursor:pointer;
  vertical-align:middle;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:10px;height:10px;border-radius:50%;
  background:#b8753a;border:none;cursor:pointer;
  box-shadow:0 0 4px rgba(184,117,58,0.3);}
input[type=range]::-moz-range-thumb{width:10px;height:10px;border-radius:50%;
  background:#b8753a;border:none;cursor:pointer;}

/* ═══ STAGE LABEL — center screen ═══ */
.stage-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:10;pointer-events:none;text-align:center;
  transition:opacity 0.8s ease;}
.stage-name{font-family:Georgia,serif;font-size:1.6em;letter-spacing:0.1em;
  color:rgba(184,117,58,0);
  text-shadow:0 0 40px rgba(10,7,6,0.95),0 0 80px rgba(10,7,6,0.8);
  transition:color 0.8s ease;}
.stage-sub{display:block;font-size:0.5em;letter-spacing:0.04em;margin-top:8px;
  color:rgba(196,160,136,0);transition:color 0.8s ease 0.2s;}

/* ═══ PROGRESS BAR — bottom ═══ */
.progress-wrap{position:fixed;bottom:0;left:0;right:0;z-index:15;
  padding:0 0 20px;pointer-events:none;
  background:linear-gradient(0deg,rgba(0,0,0,0.5) 0%,transparent 100%);}
.progress-inner{max-width:700px;margin:0 auto;padding:0 24px;}

/* Stage dots */
.stage-dots{display:flex;justify-content:space-between;margin-bottom:8px;
  padding:0 2px;}
.stage-dot{width:6px;height:6px;border-radius:50%;
  background:rgba(184,117,58,0.12);transition:all 0.4s;cursor:pointer;pointer-events:all;
  position:relative;}
.stage-dot:hover{background:rgba(184,117,58,0.4);transform:scale(1.5);}
.stage-dot.active{background:rgba(184,117,58,0.6);box-shadow:0 0 8px rgba(184,117,58,0.2);}
.stage-dot.passed{background:rgba(184,117,58,0.3);}
.stage-dot .dot-tip{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:9px;color:#8b4a2e;letter-spacing:0.04em;white-space:nowrap;
  opacity:0;transition:opacity 0.3s;pointer-events:none;}
.stage-dot:hover .dot-tip{opacity:1;}

/* Bar */
.progress-bar{width:100%;height:3px;background:rgba(184,117,58,0.08);
  border-radius:2px;cursor:pointer;pointer-events:all;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,rgba(184,117,58,0.3),rgba(220,175,80,0.5));
  border-radius:2px;transition:width 0.1s linear;position:relative;}
.progress-fill::after{content:'';position:absolute;right:-3px;top:-3px;
  width:9px;height:9px;border-radius:50%;background:#b8753a;
  box-shadow:0 0 6px rgba(184,117,58,0.4);}

/* Controls row */
.controls-row{display:flex;justify-content:center;align-items:center;gap:16px;
  margin-top:10px;}
.ctrl-btn{background:none;border:1px solid rgba(139,74,46,0.15);border-radius:6px;
  padding:4px 12px;cursor:pointer;pointer-events:all;
  font-family:Futura,'Century Gothic',system-ui,sans-serif;
  font-size:0.52em;color:#8b4a2e;letter-spacing:0.04em;transition:all 0.3s;}
.ctrl-btn:hover{color:#b8753a;border-color:rgba(184,117,58,0.3);}
.ctrl-btn.active{color:#b8753a;}
.speed-label{font-family:'Courier New',monospace;font-size:0.55em;color:#7a9a6a;
  pointer-events:none;}

/* Film grain */
body::after{content:"";position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9998;opacity:0.012;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");}

@media(max-width:600px){
  .stage-name{font-size:1.1em;}
  .stage-sub{font-size:0.45em;}
  .top{padding:8px 12px;}
  .progress-inner{padding:0 16px;}
  .stage-dot{width:5px;height:5px;}
  .stage-dot .dot-tip{display:none;}
}
</style>
</head>
<body>

<!-- Top navigation -->
<div class="top">
  <div><a class="back" href="/">GUMP</a> <a class="back" href="/flex/" style="margin-left:12px;">FLEX</a></div>
  <div class="top-right">
    <input type="range" id="volSlider" min="0" max="100" value="40" title="Volume" style="pointer-events:all;">
    <button class="audio-btn" id="audioBtn">sound: off</button>
  </div>
</div>

<!-- Stage label overlay -->
<div class="stage-label">
  <div class="stage-name" id="stageName"></div>
  <span class="stage-sub" id="stageSub"></span>
</div>

<!-- Canvas -->
<canvas id="cv" role="img" aria-label="Creation sequence visualization"></canvas>

<!-- Progress bar + controls -->
<div class="progress-wrap">
  <div class="progress-inner">
    <div class="stage-dots" id="stageDots"></div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" id="playBtn">pause</button>
      <span class="speed-label">speed</span>
      <input type="range" id="speedSlider" min="20" max="300" value="100"
        style="width:80px;pointer-events:all;">
      <span class="speed-label" id="speedVal">1.0x</span>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CREATION — the coupling sequence, standalone, full compute
//
// 13 stages. Every coupling mechanism visible.
// 0+0=1 at every scale.
// ═══════════════════════════════════════════════════════════════
(function(){
'use strict';

var cv = document.getElementById('cv');
var cx = cv.getContext('2d');
var W, H, dpr;
var PI2 = Math.PI*2;
var PHI = (1+Math.sqrt(5))/2;
var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
var particleScale = isMobile ? 0.5 : 1.0;

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize', resize);

// ═══ STAGES ═══
var STAGES = [
  {name:'The Void',        sub:'nothing. vacuum fluctuations.',               dur:4.0},
  {name:'0 + 0 = 1',       sub:'the first coupling.',                         dur:5.0},
  {name:'Quarks',           sub:'strong coupling. confinement.',               dur:5.0},
  {name:'Nucleons',         sub:'nuclear coupling. pion exchange.',            dur:4.5},
  {name:'Atoms',            sub:'electromagnetic coupling. probability clouds.',dur:5.0},
  {name:'Molecules',        sub:'chemical coupling. shared electrons.',        dur:5.0},
  {name:'Cells',            sub:'biological coupling. ion channels.',          dur:4.5},
  {name:'Neural',           sub:'action potentials. the signal IS the coupling.',dur:5.0},
  {name:'Gravity',          sub:'spacetime curvature. field lines converging.',dur:4.5},
  {name:'Galaxy',           sub:'differential rotation. the spiral is the signature.',dur:5.5},
  {name:'Black Hole',       sub:'maximum coupling. K approaches infinity.',    dur:5.5},
  {name:'The Return',       sub:'everything coupled. everything breathing.',   dur:6.0}
];

var totalDur = 0;
for(var i=0;i<STAGES.length;i++) totalDur += STAGES[i].dur;

// Build stage dots
var dotsEl = document.getElementById('stageDots');
for(var i=0;i<STAGES.length;i++){
  var dot = document.createElement('div');
  dot.className = 'stage-dot';
  dot.dataset.idx = i;
  var tip = document.createElement('span');
  tip.className = 'dot-tip';
  tip.textContent = STAGES[i].name;
  dot.appendChild(tip);
  dotsEl.appendChild(dot);
}
var dotEls = dotsEl.querySelectorAll('.stage-dot');

// ═══ STATE ═══
var time = 0;
var playing = true;
var speed = 1.0;
var dragging = false;
var lastStageIdx = -1;
var audioStarted = false;
var audioCtx = null;
var masterGain = null;
var droneOsc = null;
var droneGain = null;
var volume = 0.4;

// Coupling flash system
var flashes = []; // {x,y,r,alpha,maxR}

// ═══ UI ELEMENTS ═══
var stageNameEl = document.getElementById('stageName');
var stageSubEl = document.getElementById('stageSub');
var progressFill = document.getElementById('progressFill');
var progressBar = document.getElementById('progressBar');
var playBtn = document.getElementById('playBtn');
var speedSlider = document.getElementById('speedSlider');
var speedVal = document.getElementById('speedVal');
var audioBtn = document.getElementById('audioBtn');
var volSlider = document.getElementById('volSlider');

// ═══ CONTROLS ═══
playBtn.addEventListener('click', function(){
  playing = !playing;
  this.textContent = playing ? 'pause' : 'play';
});

speedSlider.addEventListener('input', function(){
  speed = this.value / 100;
  speedVal.textContent = speed.toFixed(1) + 'x';
});

// Progress bar scrubbing
function scrub(clientX){
  var rect = progressBar.getBoundingClientRect();
  var frac = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  time = frac * totalDur;
}
progressBar.addEventListener('mousedown', function(e){ dragging=true; playing=false; playBtn.textContent='play'; scrub(e.clientX); });
window.addEventListener('mousemove', function(e){ if(dragging) scrub(e.clientX); });
window.addEventListener('mouseup', function(){ dragging=false; });
progressBar.addEventListener('touchstart', function(e){ dragging=true; playing=false; playBtn.textContent='play'; scrub(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
window.addEventListener('touchmove', function(e){ if(dragging) scrub(e.touches[0].clientX); }, {passive:true});
window.addEventListener('touchend', function(){ dragging=false; });

// Stage dots click
for(var i=0;i<dotEls.length;i++){
  dotEls[i].addEventListener('click', function(){
    var idx = parseInt(this.dataset.idx);
    var acc = 0;
    for(var j=0;j<idx;j++) acc += STAGES[j].dur;
    time = acc + 0.01;
  });
}

// Canvas click — flash coupling event
cv.addEventListener('click', function(e){
  if(!audioStarted) initAudio();
  var rect = cv.getBoundingClientRect();
  var x = e.clientX - rect.left;
  var y = e.clientY - rect.top;
  addFlash(x, y, 80);
  if(audioStarted) pingNote(getStageAt(time).idx);
});

// ═══ AUDIO ═══
function initAudio(){
  if(audioStarted) return;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = volume;
    masterGain.connect(audioCtx.destination);

    // 33 Hz drone
    droneOsc = audioCtx.createOscillator();
    droneOsc.type = 'sine';
    droneOsc.frequency.value = 33;
    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0;
    droneOsc.connect(droneGain);
    droneGain.connect(masterGain);
    droneOsc.start();

    audioStarted = true;
    audioBtn.textContent = 'sound: on';
    audioBtn.classList.add('active');
  }catch(e){}
}

audioBtn.addEventListener('click', function(){
  if(!audioStarted){
    initAudio();
  } else {
    if(droneGain.gain.value > 0){
      droneGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
      audioBtn.textContent = 'sound: off';
      audioBtn.classList.remove('active');
    } else {
      droneGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.3);
      audioBtn.textContent = 'sound: on';
      audioBtn.classList.add('active');
    }
  }
});

volSlider.addEventListener('input', function(){
  volume = this.value / 100;
  if(masterGain) masterGain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.05);
});

function pingNote(stageIdx){
  if(!audioCtx) return;
  // Harmonic series from 33 Hz
  var harmonics = [33, 66, 99, 132, 165, 198, 231, 264, 330, 396, 462, 528];
  var freq = harmonics[Math.min(stageIdx, harmonics.length-1)];

  var osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  var g = audioCtx.createGain();
  g.gain.value = 0.15;
  g.gain.setTargetAtTime(0, audioCtx.currentTime + 0.05, 0.3);
  osc.connect(g);
  g.connect(masterGain);
  osc.start();
  osc.stop(audioCtx.currentTime + 1.5);
}

function updateDrone(stageIdx){
  if(!audioCtx || !droneGain) return;
  // Drone gets richer as stages progress
  var t = stageIdx / (STAGES.length-1);
  var targetVol = 0.04 + t*0.12;
  droneGain.gain.setTargetAtTime(targetVol, audioCtx.currentTime, 0.5);
  // Shift drone frequency slightly with stage
  droneOsc.frequency.setTargetAtTime(33 + t*4, audioCtx.currentTime, 0.5);
}

// ═══ FLASH SYSTEM ═══
function addFlash(x, y, maxR){
  flashes.push({x:x, y:y, r:0, alpha:0.8, maxR:maxR||60, speed:2});
}

function updateFlashes(){
  for(var i=flashes.length-1; i>=0; i--){
    var f = flashes[i];
    f.r += f.speed;
    f.alpha *= 0.94;
    if(f.alpha < 0.01) flashes.splice(i,1);
  }
}

function drawFlashes(){
  for(var i=0; i<flashes.length; i++){
    var f = flashes[i];
    var grad = cx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r);
    grad.addColorStop(0, rgba(255,230,160, f.alpha*0.6));
    grad.addColorStop(0.3, rgba(230,180,90, f.alpha*0.3));
    grad.addColorStop(0.7, rgba(200,150,70, f.alpha*0.08));
    grad.addColorStop(1, rgba(180,120,50, 0));
    cx.fillStyle = grad;
    cx.beginPath(); cx.arc(f.x,f.y,f.r,0,PI2); cx.fill();
  }
}

// ═══ HELPERS ═══
function rgba(r,g,b,a){ return 'rgba('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+','+(a<0?0:a>1?1:a).toFixed(4)+')'; }
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,mn,mx){ return v<mn?mn:v>mx?mx:v; }

function getStageAt(t){
  var acc = 0;
  for(var i=0; i<STAGES.length; i++){
    if(t < acc + STAGES[i].dur) return {idx:i, local:(t-acc)/STAGES[i].dur};
    acc += STAGES[i].dur;
  }
  return {idx:STAGES.length-1, local:1};
}

// Background color — warms progressively
function bgColor(stageIdx){
  var t = stageIdx / (STAGES.length-1);
  return [Math.round(t*10), Math.round(t*7), Math.round(t*6)];
}

// Seeded random for consistent particles
function seeded(i, offset){
  var s = Math.sin(i*127.1 + (offset||0)*311.7)*43758.5453;
  return s - Math.floor(s);
}

// ═══════════════════════════════════════════════════════════════
// STAGE 0: THE VOID
// ═══════════════════════════════════════════════════════════════
function drawVoid(t){
  var count = Math.floor((40 + t*200) * particleScale);
  for(var i=0; i<count; i++){
    var seed = i*137.508 + time*0.2;
    var px = (Math.sin(seed*1.1+i)*0.5+0.5)*W;
    var py = (Math.cos(seed*0.7+i*1.3)*0.5+0.5)*H;
    var flicker = Math.sin(seed*3.7)*Math.cos(seed*2.3+i)*0.5+0.5;
    var alpha = flicker * 0.06 * t;

    // Occasional brighter quantum fluctuation
    if(Math.sin(seed*7.1+time*2) > 0.97){
      alpha *= 3;
      var gr = cx.createRadialGradient(px,py,0,px,py,4);
      gr.addColorStop(0, rgba(180,140,80, alpha));
      gr.addColorStop(1, rgba(140,100,60, 0));
      cx.fillStyle = gr;
      cx.beginPath(); cx.arc(px,py,4,0,PI2); cx.fill();
    }

    cx.fillStyle = rgba(140,100,70, alpha);
    cx.fillRect(px,py,1,1);
  }

  // Virtual particle pairs — brief arcs that appear and vanish
  var nPairs = Math.floor(6 * t * particleScale);
  for(var i=0; i<nPairs; i++){
    var life = (Math.sin(time*1.3+i*2.7)*0.5+0.5);
    if(life < 0.3) continue;
    var pcx = W*(0.2 + seeded(i,1)*0.6);
    var pcy = H*(0.2 + seeded(i,2)*0.6);
    var arcR = 8 + life*12;
    var arcAngle = time*2 + i*1.618;

    cx.strokeStyle = rgba(160,120,70, life*0.08*t);
    cx.lineWidth = 0.5;
    cx.beginPath();
    cx.arc(pcx, pcy, arcR, arcAngle, arcAngle+Math.PI, false);
    cx.stroke();

    // Two dots at arc ends
    var d1x = pcx + Math.cos(arcAngle)*arcR;
    var d1y = pcy + Math.sin(arcAngle)*arcR;
    var d2x = pcx + Math.cos(arcAngle+Math.PI)*arcR;
    var d2y = pcy + Math.sin(arcAngle+Math.PI)*arcR;
    cx.fillStyle = rgba(200,160,90, life*0.15*t);
    cx.beginPath(); cx.arc(d1x,d1y,1.5,0,PI2); cx.fill();
    cx.fillStyle = rgba(120,140,180, life*0.15*t);
    cx.beginPath(); cx.arc(d2x,d2y,1.5,0,PI2); cx.fill();
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 1: 0+0=1 — THE FIRST COUPLING
// ═══════════════════════════════════════════════════════════════
function drawFirstCoupling(t){
  var cx0 = W*0.5, cy0 = H*0.5;

  // Background vacuum still visible
  drawVoid(0.4);

  // Two points of nothing approaching each other
  var sep = (1-t)*(1-t) * Math.min(W,H)*0.25;
  var p1x = cx0 - sep, p2x = cx0 + sep;

  // Field lines between — the pull is visible before contact
  if(t > 0.1){
    var fieldT = (t-0.1)/0.9;
    var nLines = 12;
    for(var i=0; i<nLines; i++){
      var offset = (i - nLines/2 + 0.5) * 8;
      var curve = offset * (1-fieldT) * 0.5;
      cx.strokeStyle = rgba(200,160,80, fieldT*0.08*(1-Math.abs(offset)/50));
      cx.lineWidth = 0.5;
      cx.beginPath();
      cx.moveTo(p1x, cy0+offset);
      cx.quadraticCurveTo(cx0, cy0+offset+curve, p2x, cy0+offset);
      cx.stroke();
    }
  }

  // The two points — glowing warm
  var pointAlpha = 0.3 + t*0.7;
  for(var side=-1; side<=1; side+=2){
    var px = cx0 + side*sep;
    var glowR = 8 + t*14;
    var grad = cx.createRadialGradient(px,cy0,0,px,cy0,glowR);
    grad.addColorStop(0, rgba(230,190,100, pointAlpha*0.9));
    grad.addColorStop(0.3, rgba(210,160,70, pointAlpha*0.5));
    grad.addColorStop(0.6, rgba(190,130,50, pointAlpha*0.15));
    grad.addColorStop(1, rgba(180,120,50, 0));
    cx.fillStyle = grad;
    cx.beginPath(); cx.arc(px,cy0,glowR,0,PI2); cx.fill();
  }

  // The coupling line — thickens as they approach
  if(t > 0.15){
    var lineT = (t-0.15)/0.85;
    cx.strokeStyle = rgba(230,190,100, lineT*0.6);
    cx.lineWidth = 0.5 + lineT*2;
    cx.beginPath();
    cx.moveTo(p1x, cy0);
    cx.lineTo(p2x, cy0);
    cx.stroke();
  }

  // The birth flash — when they meet
  if(t > 0.7){
    var flashT = (t-0.7)/0.3;
    var flashEase = 1 - (1-flashT)*(1-flashT);
    var flashR = 4 + flashEase*60;
    var flashAlpha = (1-flashEase*0.7);

    var grad2 = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,flashR);
    grad2.addColorStop(0, rgba(255,240,180, flashAlpha*0.95));
    grad2.addColorStop(0.15, rgba(255,220,140, flashAlpha*0.7));
    grad2.addColorStop(0.35, rgba(230,180,90, flashAlpha*0.3));
    grad2.addColorStop(0.6, rgba(200,140,60, flashAlpha*0.1));
    grad2.addColorStop(1, rgba(180,120,50, 0));
    cx.fillStyle = grad2;
    cx.beginPath(); cx.arc(cx0,cy0,flashR,0,PI2); cx.fill();

    // Radiant lines burst
    if(flashT < 0.5){
      var burstT = flashT*2;
      var nRays = 16;
      for(var i=0; i<nRays; i++){
        var a = i*PI2/nRays + time*0.1;
        var r1 = 10 + burstT*30;
        var r2 = r1 + 20 + burstT*40;
        cx.strokeStyle = rgba(255,230,160, (1-burstT)*0.3);
        cx.lineWidth = 1;
        cx.beginPath();
        cx.moveTo(cx0+Math.cos(a)*r1, cy0+Math.sin(a)*r1);
        cx.lineTo(cx0+Math.cos(a)*r2, cy0+Math.sin(a)*r2);
        cx.stroke();
      }
    }

    // Trigger coupling flash once
    if(t > 0.71 && t < 0.73 && flashes.length === 0){
      addFlash(cx0, cy0, 120);
      if(audioStarted) pingNote(1);
    }
  }

  // "0 + 0 = 1" text emerges at the very end
  if(t > 0.85){
    var textT = (t-0.85)/0.15;
    cx.font = '13px Georgia,serif';
    cx.fillStyle = rgba(220,180,120, textT*0.5);
    cx.textAlign = 'center';
    cx.fillText('something from nothing', cx0, cy0 + 60);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 2: QUARKS — strong coupling, confinement
// ═══════════════════════════════════════════════════════════════
function drawQuarks(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var triR = 35 + t*25;
  var colors = [[210,70,70],[70,200,70],[70,90,230]]; // RGB color charge
  var rot = time*0.35;

  // Confinement field — background potential well
  var wellR = triR * 3;
  var wellGrad = cx.createRadialGradient(cx0,cy0,triR*0.5,cx0,cy0,wellR);
  wellGrad.addColorStop(0, rgba(40,25,15, 0.15*t));
  wellGrad.addColorStop(0.5, rgba(30,18,10, 0.08*t));
  wellGrad.addColorStop(1, rgba(20,12,8, 0));
  cx.fillStyle = wellGrad;
  cx.beginPath(); cx.arc(cx0,cy0,wellR,0,PI2); cx.fill();

  // Gluon field lines — curved, thickening when quarks are far
  for(var i=0; i<3; i++){
    var a1 = rot + i*PI2/3;
    var a2 = rot + ((i+1)%3)*PI2/3;
    var x1 = cx0 + Math.cos(a1)*triR;
    var y1 = cy0 + Math.sin(a1)*triR;
    var x2 = cx0 + Math.cos(a2)*triR;
    var y2 = cy0 + Math.sin(a2)*triR;

    // Multiple gluon field lines per connection (not just one thread)
    var nFieldLines = 5;
    for(var fl=0; fl<nFieldLines; fl++){
      var spread = (fl - nFieldLines/2 + 0.5) * 3;
      var segments = 30;
      cx.beginPath();
      for(var s=0; s<=segments; s++){
        var st = s/segments;
        var lx = x1 + (x2-x1)*st;
        var ly = y1 + (y2-y1)*st;
        var nx = -(y2-y1), ny = (x2-x1);
        var nl = Math.sqrt(nx*nx+ny*ny)||1;
        nx /= nl; ny /= nl;

        // Spring oscillation — gets STRONGER (wider) when stretched
        var stretchFactor = triR/40; // thickens with distance
        var wave = Math.sin(st*10 + time*3 + fl*0.8)*4*stretchFactor*(1-Math.abs(st-0.5)*1.5);
        var px = lx + nx*(wave+spread);
        var py = ly + ny*(wave+spread);
        if(s===0) cx.moveTo(px,py);
        else cx.lineTo(px,py);
      }

      // Field lines get brighter when stretched (confinement!)
      var intensity = 0.12 + (triR/60)*0.15 + t*0.08;
      var colorMix = fl/nFieldLines;
      var c1 = colors[i], c2 = colors[(i+1)%3];
      var cr = lerp(c1[0],c2[0],colorMix)*0.5 + 110;
      var cg = lerp(c1[1],c2[1],colorMix)*0.3 + 75;
      var cb = lerp(c1[2],c2[2],colorMix)*0.2 + 40;
      cx.strokeStyle = rgba(cr, cg, cb, intensity*(1-Math.abs(fl-nFieldLines/2+0.5)/nFieldLines));
      cx.lineWidth = 0.8 + stretchFactor*0.3;
      cx.stroke();
    }
  }

  // Draw quarks — three colored dots with halos
  for(var i=0; i<3; i++){
    var a = rot + i*PI2/3;
    var qx = cx0 + Math.cos(a)*triR;
    var qy = cy0 + Math.sin(a)*triR;

    // Color cycling — charge exchange
    var colorIdx = (i + Math.floor(time*1.5)) % 3;
    var col = colors[colorIdx];

    // Glow halo
    var haloR = 14;
    var hgrad = cx.createRadialGradient(qx,qy,0,qx,qy,haloR);
    hgrad.addColorStop(0, rgba(col[0],col[1],col[2], 0.85));
    hgrad.addColorStop(0.3, rgba(col[0]*0.8,col[1]*0.8,col[2]*0.8, 0.4));
    hgrad.addColorStop(0.6, rgba(col[0]*0.5,col[1]*0.5,col[2]*0.5, 0.12));
    hgrad.addColorStop(1, rgba(col[0]*0.3,col[1]*0.3,col[2]*0.3, 0));
    cx.fillStyle = hgrad;
    cx.beginPath(); cx.arc(qx,qy,haloR,0,PI2); cx.fill();

    // Core dot
    cx.fillStyle = rgba(col[0],col[1],col[2], 0.95);
    cx.beginPath(); cx.arc(qx,qy,4,0,PI2); cx.fill();

    // Bright center
    cx.fillStyle = rgba(Math.min(255,col[0]+80),Math.min(255,col[1]+80),Math.min(255,col[2]+80), 0.7);
    cx.beginPath(); cx.arc(qx,qy,1.5,0,PI2); cx.fill();
  }

  // Gluon exchange particles — small dots traveling along the field lines
  for(var i=0; i<3; i++){
    var a1 = rot + i*PI2/3;
    var a2 = rot + ((i+1)%3)*PI2/3;
    var x1 = cx0 + Math.cos(a1)*triR;
    var y1 = cy0 + Math.sin(a1)*triR;
    var x2 = cx0 + Math.cos(a2)*triR;
    var y2 = cy0 + Math.sin(a2)*triR;

    // Two gluons per line, traveling opposite directions
    for(var g=0; g<2; g++){
      var gT = ((time*2 + i*1.1 + g*0.5) % 1);
      var gx = x1 + (x2-x1)*gT;
      var gy = y1 + (y2-y1)*gT;
      var nx = -(y2-y1), ny = (x2-x1);
      var nl = Math.sqrt(nx*nx+ny*ny)||1;
      nx /= nl; ny /= nl;
      var wave = Math.sin(gT*10 + time*3)*3*(1-Math.abs(gT-0.5)*1.5);
      gx += nx*wave;
      gy += ny*wave;

      cx.fillStyle = rgba(255,220,120, 0.6*t);
      cx.beginPath(); cx.arc(gx,gy,2,0,PI2); cx.fill();
    }
  }

  // Confinement label
  if(t > 0.5){
    var confT = (t-0.5)*2;
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, confT*0.3);
    cx.textAlign = 'center';
    cx.fillText('pull harder \u2192 force grows stronger', cx0, cy0 + triR + 50);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 3: NUCLEONS — pion exchange
// ═══════════════════════════════════════════════════════════════
function drawNucleons(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var sep = 55 - t*20;
  var triR = 18;
  var rot = time*0.25;

  // Two nucleon clusters
  var nucs = [
    {ox:-sep*0.5, oy:0, tint:[220,160,80], label:'p'},  // proton
    {ox:sep*0.5,  oy:0, tint:[140,160,200], label:'n'}   // neutron
  ];

  for(var n=0; n<2; n++){
    var nuc = nucs[n];
    var ncx = cx0+nuc.ox, ncy = cy0+nuc.oy;

    // Nucleon glow
    var nucGlow = cx.createRadialGradient(ncx,ncy,0,ncx,ncy,triR*2);
    nucGlow.addColorStop(0, rgba(nuc.tint[0],nuc.tint[1],nuc.tint[2], 0.12*t));
    nucGlow.addColorStop(0.5, rgba(nuc.tint[0],nuc.tint[1],nuc.tint[2], 0.04*t));
    nucGlow.addColorStop(1, rgba(nuc.tint[0],nuc.tint[1],nuc.tint[2], 0));
    cx.fillStyle = nucGlow;
    cx.beginPath(); cx.arc(ncx,ncy,triR*2,0,PI2); cx.fill();

    // Quarks inside each nucleon
    for(var i=0; i<3; i++){
      var a1 = rot + i*PI2/3 + n*0.5;
      var a2 = rot + ((i+1)%3)*PI2/3 + n*0.5;
      var x1 = ncx + Math.cos(a1)*triR;
      var y1 = ncy + Math.sin(a1)*triR;
      var x2 = ncx + Math.cos(a2)*triR;
      var y2 = ncy + Math.sin(a2)*triR;

      // Gluon field
      cx.beginPath();
      var segs = 16;
      for(var s=0; s<=segs; s++){
        var st = s/segs;
        var lx = x1+(x2-x1)*st;
        var ly = y1+(y2-y1)*st;
        var nx2 = -(y2-y1), ny2 = (x2-x1);
        var nl = Math.sqrt(nx2*nx2+ny2*ny2)||1;
        var wave = Math.sin(st*8+time*3)*2*(1-Math.abs(st-0.5)*2);
        if(s===0) cx.moveTo(lx+nx2/nl*wave,ly+ny2/nl*wave);
        else cx.lineTo(lx+nx2/nl*wave,ly+ny2/nl*wave);
      }
      cx.strokeStyle = rgba(nuc.tint[0],nuc.tint[1],nuc.tint[2], 0.2*t);
      cx.lineWidth = 0.8;
      cx.stroke();

      // Quark dots
      var qa = rot + i*PI2/3 + n*0.5;
      var qx = ncx + Math.cos(qa)*triR;
      var qy = ncy + Math.sin(qa)*triR;
      cx.fillStyle = rgba(nuc.tint[0]+30,nuc.tint[1]+20,nuc.tint[2]+10, 0.75*t);
      cx.beginPath(); cx.arc(qx,qy,3,0,PI2); cx.fill();
    }
  }

  // THE PION — particle bouncing between proton and neutron
  var pionPhase = (time*1.8) % 2;
  var pionT = pionPhase < 1 ? pionPhase : 2-pionPhase; // bounce back and forth
  var pionDir = pionPhase < 1 ? 1 : -1;
  var pionX = cx0 + lerp(-sep*0.5, sep*0.5, pionT);
  var pionY = cy0 + Math.sin(pionT*Math.PI)*-20; // arc upward

  // Pion trail
  cx.strokeStyle = rgba(230,200,120, 0.15*t);
  cx.lineWidth = 1;
  cx.setLineDash([3,4]);
  cx.beginPath();
  cx.moveTo(cx0-sep*0.5, cy0);
  cx.quadraticCurveTo(cx0, cy0-25, cx0+sep*0.5, cy0);
  cx.stroke();
  cx.setLineDash([]);

  // Pion dot
  var pionGlow = cx.createRadialGradient(pionX,pionY,0,pionX,pionY,8);
  pionGlow.addColorStop(0, rgba(255,230,140, 0.9*t));
  pionGlow.addColorStop(0.4, rgba(230,190,90, 0.4*t));
  pionGlow.addColorStop(1, rgba(200,150,60, 0));
  cx.fillStyle = pionGlow;
  cx.beginPath(); cx.arc(pionX,pionY,8,0,PI2); cx.fill();
  cx.fillStyle = rgba(255,240,170, 0.95*t);
  cx.beginPath(); cx.arc(pionX,pionY,2.5,0,PI2); cx.fill();

  // Binding energy glow in the space between
  var beT = clamp(t*1.5-0.2, 0, 1);
  var glowR = 25 + beT*35;
  var beGrad = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,glowR);
  beGrad.addColorStop(0, rgba(240,200,110, beT*0.12));
  beGrad.addColorStop(0.4, rgba(210,160,70, beT*0.05));
  beGrad.addColorStop(1, rgba(180,120,50, 0));
  cx.fillStyle = beGrad;
  cx.beginPath(); cx.arc(cx0,cy0,glowR,0,PI2); cx.fill();

  // Labels
  if(t > 0.4){
    var labelAlpha = (t-0.4)*0.5;
    cx.font = '9px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, labelAlpha);
    cx.textAlign = 'center';
    cx.fillText('\u03C0 exchange: the coupling IS the particle', cx0, cy0 + 65);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 4: ATOMS — EM coupling, probability clouds
// ═══════════════════════════════════════════════════════════════
function drawAtoms(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var scale = Math.min(W,H)*0.0012;

  // Nucleus — hot bright center
  var nucR = 5;
  var nucGrad = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,nucR*4);
  nucGrad.addColorStop(0, rgba(255,240,180, 0.95));
  nucGrad.addColorStop(0.2, rgba(255,220,140, 0.7));
  nucGrad.addColorStop(0.5, rgba(230,180,100, 0.25));
  nucGrad.addColorStop(1, rgba(200,150,70, 0));
  cx.fillStyle = nucGrad;
  cx.beginPath(); cx.arc(cx0,cy0,nucR*4,0,PI2); cx.fill();
  cx.fillStyle = rgba(255,240,200, 0.95);
  cx.beginPath(); cx.arc(cx0,cy0,nucR,0,PI2); cx.fill();

  // EM field lines — radial, curving slightly
  var nFieldLines = 16;
  var fieldAlpha = clamp(t*2-0.2, 0, 0.12);
  for(var i=0; i<nFieldLines; i++){
    var angle = i*PI2/nFieldLines + time*0.05;
    var r1 = nucR*2;
    var r2 = 60 + 100*scale;
    cx.strokeStyle = rgba(180,140,80, fieldAlpha);
    cx.lineWidth = 0.4;
    cx.beginPath();
    cx.moveTo(cx0+Math.cos(angle)*r1, cy0+Math.sin(angle)*r1);
    cx.lineTo(cx0+Math.cos(angle)*r2, cy0+Math.sin(angle)*r2);
    cx.stroke();
  }

  // Electron probability clouds — multiple shells with density shading
  var shells = [
    {r:55*scale, spread:15*scale, nDots:Math.floor(24*particleScale), color:[100,150,220], name:'1s'},
    {r:100*scale, spread:20*scale, nDots:Math.floor(40*particleScale), color:[120,170,230], name:'2s'},
    {r:150*scale, spread:30*scale, nDots:Math.floor(60*particleScale), color:[80,130,210], name:'2p'}
  ];

  for(var s=0; s<shells.length; s++){
    var shell = shells[s];
    var shellR = shell.r + 40;
    var shellAppear = clamp(t*3.5 - s*0.8, 0, 1);
    if(shellAppear <= 0) continue;

    // Probability density cloud — radial gradient showing where electron likely is
    var cloudGrad = cx.createRadialGradient(cx0,cy0,shellR-shell.spread,cx0,cy0,shellR+shell.spread);
    cloudGrad.addColorStop(0, rgba(shell.color[0],shell.color[1],shell.color[2], 0));
    cloudGrad.addColorStop(0.3, rgba(shell.color[0],shell.color[1],shell.color[2], shellAppear*0.04));
    cloudGrad.addColorStop(0.5, rgba(shell.color[0],shell.color[1],shell.color[2], shellAppear*0.08));
    cloudGrad.addColorStop(0.7, rgba(shell.color[0],shell.color[1],shell.color[2], shellAppear*0.04));
    cloudGrad.addColorStop(1, rgba(shell.color[0],shell.color[1],shell.color[2], 0));
    cx.fillStyle = cloudGrad;
    cx.beginPath(); cx.arc(cx0,cy0,shellR+shell.spread,0,PI2); cx.fill();

    // Probability density dots — NOT orbits, probability blobs
    for(var d=0; d<shell.nDots; d++){
      var angle = d*PI2/shell.nDots + time*(1.2-s*0.25);
      var wobbleR = Math.sin(angle*3+time*1.5+d*0.7)*shell.spread;
      var wobbleA = Math.sin(angle*2+time+d*1.1)*0.15;
      var dr = shellR + wobbleR;
      var da = angle + wobbleA;
      var dx = cx0 + Math.cos(da)*dr;
      var dy = cy0 + Math.sin(da)*dr;

      // Brightness varies — probability density
      var density = Math.sin(angle*2+time*0.7+d*0.5)*0.35+0.65;
      var dotAlpha = density * shellAppear * 0.5;
      var dotR = 1 + density*1.5;

      // Halo around each electron probability dot
      var dotGrad = cx.createRadialGradient(dx,dy,0,dx,dy,dotR*3);
      dotGrad.addColorStop(0, rgba(shell.color[0]+30,shell.color[1]+30,shell.color[2]+20, dotAlpha*0.6));
      dotGrad.addColorStop(0.5, rgba(shell.color[0],shell.color[1],shell.color[2], dotAlpha*0.15));
      dotGrad.addColorStop(1, rgba(shell.color[0],shell.color[1],shell.color[2], 0));
      cx.fillStyle = dotGrad;
      cx.beginPath(); cx.arc(dx,dy,dotR*3,0,PI2); cx.fill();

      cx.fillStyle = rgba(shell.color[0]+40,shell.color[1]+40,shell.color[2]+30, dotAlpha*0.8);
      cx.beginPath(); cx.arc(dx,dy,dotR,0,PI2); cx.fill();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 5: MOLECULES — shared electron clouds
// ═══════════════════════════════════════════════════════════════
function drawMolecules(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var scale = Math.min(W,H)/700;

  // Water molecule — 104.5 degree angle
  var bondLen = 65*scale;
  var bondAngle = 104.5 * Math.PI/180;
  var halfAngle = bondAngle/2;

  var ox = cx0, oy = cy0 - 10;
  var h1x = ox + Math.cos(-halfAngle + Math.PI*0.5)*bondLen;
  var h1y = oy + Math.sin(-halfAngle + Math.PI*0.5)*bondLen;
  var h2x = ox + Math.cos(halfAngle + Math.PI*0.5)*bondLen;
  var h2y = oy + Math.sin(halfAngle + Math.PI*0.5)*bondLen;

  var atoms = [
    {x:ox, y:oy, r:26*scale, col:[210,70,70], name:'O'},
    {x:h1x, y:h1y, r:16*scale, col:[100,160,230], name:'H'},
    {x:h2x, y:h2y, r:16*scale, col:[100,160,230], name:'H'}
  ];

  // BONDING ORBITAL OVERLAP — the shared electron region
  // This is the key: atoms don't touch, electrons couple them
  for(var b=0; b<2; b++){
    var hx = b===0 ? h1x : h2x;
    var hy = b===0 ? h1y : h2y;
    var midx = (ox+hx)/2, midy = (oy+hy)/2;

    // Direction along bond
    var dx = hx-ox, dy = hy-oy;
    var dist = Math.sqrt(dx*dx+dy*dy)||1;
    var ux = dx/dist, uy = dy/dist;

    // Shared electron cloud — elongated along bond axis
    // Draw as many overlapping circles along the bond
    var nCloudPts = Math.floor(20*particleScale);
    for(var c=0; c<nCloudPts; c++){
      var cT = c/nCloudPts;
      var cx2 = ox + dx*cT;
      var cy2 = oy + dy*cT;
      // Cloud is thickest in the middle of the bond
      var thickness = Math.sin(cT*Math.PI) * 14*scale;
      var cloudAlpha = Math.sin(cT*Math.PI) * 0.06 * t;
      // Oscillating density
      var pulse = Math.sin(time*2+cT*4+b)*0.3+0.7;

      var cGrad = cx.createRadialGradient(cx2,cy2,0,cx2,cy2,thickness);
      cGrad.addColorStop(0, rgba(240,210,130, cloudAlpha*pulse));
      cGrad.addColorStop(0.5, rgba(220,180,90, cloudAlpha*pulse*0.4));
      cGrad.addColorStop(1, rgba(200,150,60, 0));
      cx.fillStyle = cGrad;
      cx.beginPath(); cx.arc(cx2,cy2,thickness,0,PI2); cx.fill();
    }

    // Electron probability dots moving within the shared cloud
    var nSharedE = Math.floor(8*particleScale);
    for(var e=0; e<nSharedE; e++){
      var eT = ((time*0.8 + e*0.125 + b*0.5) % 1);
      var ex = ox + dx*eT;
      var ey = oy + dy*eT;
      var perp = Math.sin(time*3+e*1.7)*Math.sin(eT*Math.PI)*8*scale;
      ex += -uy*perp;
      ey += ux*perp;
      cx.fillStyle = rgba(255,230,150, 0.5*t);
      cx.beginPath(); cx.arc(ex,ey,1.5,0,PI2); cx.fill();
    }

    // Bond line
    cx.strokeStyle = rgba(230,190,100, 0.25*t);
    cx.lineWidth = 1.5;
    cx.beginPath(); cx.moveTo(ox,oy); cx.lineTo(hx,hy); cx.stroke();
  }

  // Draw atom electron clouds + cores
  for(var a=0; a<atoms.length; a++){
    var at = atoms[a];

    // Electron cloud around each atom
    var cloudR = at.r * 1.5;
    var cloudGrad = cx.createRadialGradient(at.x,at.y,at.r*0.3,at.x,at.y,cloudR);
    cloudGrad.addColorStop(0, rgba(at.col[0],at.col[1],at.col[2], 0.15*t));
    cloudGrad.addColorStop(0.5, rgba(at.col[0],at.col[1],at.col[2], 0.06*t));
    cloudGrad.addColorStop(1, rgba(at.col[0],at.col[1],at.col[2], 0));
    cx.fillStyle = cloudGrad;
    cx.beginPath(); cx.arc(at.x,at.y,cloudR,0,PI2); cx.fill();

    // Atom core
    var coreGrad = cx.createRadialGradient(at.x,at.y,0,at.x,at.y,at.r*0.6);
    coreGrad.addColorStop(0, rgba(at.col[0]+40,at.col[1]+40,at.col[2]+40, 0.7*t));
    coreGrad.addColorStop(0.5, rgba(at.col[0],at.col[1],at.col[2], 0.3*t));
    coreGrad.addColorStop(1, rgba(at.col[0],at.col[1],at.col[2], 0));
    cx.fillStyle = coreGrad;
    cx.beginPath(); cx.arc(at.x,at.y,at.r*0.6,0,PI2); cx.fill();

    // Center dot
    cx.fillStyle = rgba(at.col[0]+60,at.col[1]+60,at.col[2]+60, 0.85*t);
    cx.beginPath(); cx.arc(at.x,at.y,3,0,PI2); cx.fill();
  }

  // Angle label
  if(t > 0.5){
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, (t-0.5)*0.4);
    cx.textAlign = 'center';
    cx.fillText('104.5\u00B0 \u2014 the atoms don\u2019t touch. electrons couple them.', cx0, cy0 + bondLen + 40);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 6: CELLS — ion channels, membrane coupling
// ═══════════════════════════════════════════════════════════════
function drawCells(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var memR = 70 + Math.min(W,H)*0.08;

  // Membrane — double lipid bilayer, wobbly
  var memPulse = Math.sin(time*1.2)*0.02+1;
  for(var layer=0; layer<2; layer++){
    var layerR = memR*memPulse + (layer-0.5)*4;
    cx.strokeStyle = rgba(200,160,100, (0.3-layer*0.1)*t);
    cx.lineWidth = 1.5;
    cx.beginPath();
    for(var a=0; a<=80; a++){
      var angle = a*PI2/80;
      var wobble = Math.sin(angle*6+time*2)*2.5 + Math.sin(angle*4-time*1.3)*1.5 + Math.cos(angle*9+time*3)*0.8;
      var r = layerR + wobble;
      var px = cx0 + Math.cos(angle)*r;
      var py = cy0 + Math.sin(angle)*r;
      if(a===0) cx.moveTo(px,py);
      else cx.lineTo(px,py);
    }
    cx.closePath();
    cx.stroke();
  }

  // Interior glow — life
  var innerGrad = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,memR);
  innerGrad.addColorStop(0, rgba(220,180,100, 0.06*t));
  innerGrad.addColorStop(0.5, rgba(190,140,70, 0.03*t));
  innerGrad.addColorStop(1, rgba(160,110,50, 0));
  cx.fillStyle = innerGrad;
  cx.beginPath(); cx.arc(cx0,cy0,memR,0,PI2); cx.fill();

  // ION CHANNELS — the mechanism! Na+ in, K+ out
  var nChannels = 8;
  for(var i=0; i<nChannels; i++){
    var chAngle = i*PI2/nChannels + 0.3;
    var chx = cx0 + Math.cos(chAngle)*memR*memPulse;
    var chy = cy0 + Math.sin(chAngle)*memR*memPulse;

    // Channel gate — opening and closing
    var gatePhase = Math.sin(time*1.5+i*1.2);
    var isOpen = gatePhase > 0;
    var openness = isOpen ? gatePhase : 0;

    // Draw channel pore
    var gateSize = 4 + openness*3;
    cx.strokeStyle = rgba(180,150,90, 0.4*t);
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(chx,chy,gateSize,0,PI2); cx.stroke();

    if(isOpen && openness > 0.3){
      // Fill with glow when open
      cx.fillStyle = rgba(255,220,120, openness*0.15*t);
      cx.beginPath(); cx.arc(chx,chy,gateSize,0,PI2); cx.fill();

      // Ions flowing through!
      var nIonsPerChannel = 3;
      for(var ion=0; ion<nIonsPerChannel; ion++){
        var ionPhase = ((time*2+i*0.7+ion*0.33)%1);
        var isNa = (i%2===0); // alternate Na+ and K+
        var ionDir = isNa ? -1 : 1; // Na+ in, K+ out

        var ionDist = ionDir * (ionPhase*30 - 15);
        var ix = chx + Math.cos(chAngle)*ionDist;
        var iy = chy + Math.sin(chAngle)*ionDist;

        var ionCol = isNa ? [230,190,80] : [100,160,220]; // Na+=gold, K+=blue
        cx.fillStyle = rgba(ionCol[0],ionCol[1],ionCol[2], openness*0.7*t);
        cx.beginPath(); cx.arc(ix,iy,2,0,PI2); cx.fill();

        // Ion label
        if(ion===0 && t > 0.3){
          cx.font = '7px "Courier New",monospace';
          cx.fillStyle = rgba(ionCol[0],ionCol[1],ionCol[2], openness*0.3*t);
          cx.textAlign = 'center';
          cx.fillText(isNa?'Na+':'K+', ix, iy-6);
          cx.textAlign = 'left';
        }
      }
    }
  }

  // Nucleus inside
  var nucGrad = cx.createRadialGradient(cx0-8,cy0-8,0,cx0-8,cy0-8,memR*0.22);
  nucGrad.addColorStop(0, rgba(210,160,90, 0.2*t));
  nucGrad.addColorStop(0.5, rgba(180,130,70, 0.08*t));
  nucGrad.addColorStop(1, rgba(160,110,50, 0));
  cx.fillStyle = nucGrad;
  cx.beginPath(); cx.arc(cx0-8,cy0-8,memR*0.22,0,PI2); cx.fill();

  // DNA hint inside nucleus
  if(t > 0.4){
    var dnaAlpha = (t-0.4)*0.3;
    cx.strokeStyle = rgba(200,170,100, dnaAlpha);
    cx.lineWidth = 0.8;
    for(var strand=0; strand<2; strand++){
      cx.beginPath();
      for(var s=0; s<20; s++){
        var sy = cy0-8 + (s-10)*2;
        var sx = cx0-8 + Math.sin(s*0.8+time*1.5+strand*Math.PI)*4;
        if(s===0) cx.moveTo(sx,sy);
        else cx.lineTo(sx,sy);
      }
      cx.stroke();
    }
  }

  if(t > 0.6){
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, (t-0.6)*0.3);
    cx.textAlign = 'center';
    cx.fillText('each channel opening is a coupling event', cx0, cy0 + memR + 35);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 7: NEURAL — action potential propagation
// ═══════════════════════════════════════════════════════════════
function drawNeural(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var scale = Math.min(W,H)/700;

  // THE AXON — a long fiber across the screen
  var axonY = cy0;
  var axonLeft = W*0.15;
  var axonRight = W*0.85;
  var axonLen = axonRight - axonLeft;

  // Axon body
  cx.strokeStyle = rgba(180,140,80, 0.25*t);
  cx.lineWidth = 3;
  cx.beginPath();
  cx.moveTo(axonLeft, axonY);
  cx.lineTo(axonRight, axonY);
  cx.stroke();

  // Myelin sheaths — segments along the axon
  var nSegments = 8;
  var segLen = axonLen / (nSegments*1.3);
  for(var s=0; s<nSegments; s++){
    var sx = axonLeft + (s+0.3)*axonLen/nSegments;
    var sWidth = segLen*0.7;

    cx.fillStyle = rgba(160,130,80, 0.06*t);
    cx.beginPath();
    cx.ellipse(sx, axonY, sWidth/2, 10, 0, 0, PI2);
    cx.fill();
    cx.strokeStyle = rgba(180,140,80, 0.12*t);
    cx.lineWidth = 0.8;
    cx.stroke();
  }

  // ACTION POTENTIAL — the signal IS the coupling, traveling along the axon
  var nSignals = 3;
  for(var sig=0; sig<nSignals; sig++){
    var sigPhase = ((time*0.6 + sig*0.33) % 1);
    var sigX = axonLeft + sigPhase * axonLen;

    // Depolarization wave — the voltage spike
    var waveWidth = 40*scale;
    var waveHeight = 35*scale;

    // Draw the voltage trace above the axon
    cx.strokeStyle = rgba(255,220,120, 0.5*t);
    cx.lineWidth = 1.5;
    cx.beginPath();
    for(var w=-30; w<=30; w++){
      var wx = sigX + w*2;
      if(wx < axonLeft || wx > axonRight) continue;
      var wNorm = w/30;
      var voltage = Math.exp(-wNorm*wNorm*4) * waveHeight;
      // Action potential shape: sharp rise, slower fall
      if(wNorm > 0) voltage *= Math.exp(-wNorm*2);
      if(w===-30) cx.moveTo(wx, axonY - 20 - voltage);
      else cx.lineTo(wx, axonY - 20 - voltage);
    }
    cx.stroke();

    // Glow at the wavefront
    var sigGlow = cx.createRadialGradient(sigX, axonY, 0, sigX, axonY, 25);
    sigGlow.addColorStop(0, rgba(255,230,150, 0.3*t));
    sigGlow.addColorStop(0.4, rgba(230,180,90, 0.1*t));
    sigGlow.addColorStop(1, rgba(200,150,70, 0));
    cx.fillStyle = sigGlow;
    cx.beginPath(); cx.arc(sigX, axonY, 25, 0, PI2); cx.fill();

    // Ion flow at wavefront — Na+ rushing in
    var nIons = Math.floor(6*particleScale);
    for(var ion=0; ion<nIons; ion++){
      var ionAngle = -Math.PI/2 + (ion-nIons/2)*0.3;
      var ionDist = 6 + Math.sin(time*4+ion*1.3)*8;
      var ix = sigX + Math.cos(ionAngle)*ionDist;
      var iy = axonY + Math.sin(ionAngle)*ionDist;
      cx.fillStyle = rgba(230,200,100, 0.4*t);
      cx.beginPath(); cx.arc(ix,iy,1.5,0,PI2); cx.fill();
    }
  }

  // Soma (cell body) on the left
  var somaR = 20*scale;
  var somaGrad = cx.createRadialGradient(axonLeft-15,axonY,0,axonLeft-15,axonY,somaR);
  somaGrad.addColorStop(0, rgba(230,190,120, 0.3*t));
  somaGrad.addColorStop(0.5, rgba(200,150,80, 0.12*t));
  somaGrad.addColorStop(1, rgba(180,120,60, 0));
  cx.fillStyle = somaGrad;
  cx.beginPath(); cx.arc(axonLeft-15,axonY,somaR,0,PI2); cx.fill();

  // Dendrites on the left
  var nDendrites = 5;
  for(var d=0; d<nDendrites; d++){
    var dAngle = Math.PI + (d-nDendrites/2)*0.6;
    var dLen = 25 + seeded(d,5)*15;
    var dx = axonLeft-15 + Math.cos(dAngle)*dLen;
    var dy = axonY + Math.sin(dAngle)*dLen;
    cx.strokeStyle = rgba(200,160,90, 0.2*t);
    cx.lineWidth = 1;
    cx.beginPath();
    cx.moveTo(axonLeft-15,axonY);
    cx.lineTo(dx,dy);
    cx.stroke();

    // Synaptic terminal dots
    cx.fillStyle = rgba(220,180,100, 0.3*t);
    cx.beginPath(); cx.arc(dx,dy,2.5,0,PI2); cx.fill();
  }

  // Synaptic terminal on the right
  var termX = axonRight + 15;
  cx.fillStyle = rgba(230,190,110, 0.2*t);
  cx.beginPath(); cx.arc(termX,axonY,8,0,PI2); cx.fill();

  // Synaptic cleft — gap
  cx.strokeStyle = rgba(180,140,80, 0.1*t);
  cx.setLineDash([2,3]);
  cx.lineWidth = 0.5;
  cx.beginPath();
  cx.moveTo(termX+10, axonY-12);
  cx.lineTo(termX+10, axonY+12);
  cx.stroke();
  cx.setLineDash([]);

  // Neurotransmitter dots crossing the cleft
  var ntPhase = (time*1.5) % 1;
  if(ntPhase > 0.3 && ntPhase < 0.8){
    var ntT = (ntPhase-0.3)/0.5;
    for(var n=0; n<4; n++){
      var nx = termX + 4 + ntT*12;
      var ny = axonY + (n-1.5)*5;
      cx.fillStyle = rgba(255,220,130, (1-ntT)*0.5*t);
      cx.beginPath(); cx.arc(nx,ny,1.5,0,PI2); cx.fill();
    }
  }

  // Neural NETWORK below — many interconnected neurons
  var nNodes = Math.floor(40*particleScale);
  var netY = cy0 + 80;
  var netSpread = Math.min(W,H)*0.25;

  for(var i=0; i<nNodes; i++){
    var angle = i*2.39996322; // golden angle
    var r = 10 + Math.sqrt(i/nNodes)*netSpread;
    var nx = cx0 + Math.cos(angle)*r;
    var ny = netY + Math.sin(angle)*r*0.6;
    var fire = Math.sin(time*seeded(i,3)*3+seeded(i,4)*PI2);

    // Connections
    for(var j=i+1; j<Math.min(nNodes,i+6); j++){
      var a2 = j*2.39996322;
      var r2 = 10 + Math.sqrt(j/nNodes)*netSpread;
      var jx = cx0 + Math.cos(a2)*r2;
      var jy = netY + Math.sin(a2)*r2*0.6;
      var dist = Math.sqrt((jx-nx)*(jx-nx)+(jy-ny)*(jy-ny));
      if(dist < netSpread*0.4){
        var edgeAlpha = 0.05*t / (dist/netSpread+0.5);
        cx.strokeStyle = rgba(200,160,80, edgeAlpha);
        cx.lineWidth = 0.3;
        cx.beginPath(); cx.moveTo(nx,ny); cx.lineTo(jx,jy); cx.stroke();
      }
    }

    // Node
    var brightness = fire*0.3+0.7;
    var sz = 1 + brightness*1.5;
    cx.fillStyle = rgba(fire>0.5?255:200, fire>0.5?220:150, fire>0.5?140:80, brightness*0.5*t);
    cx.beginPath(); cx.arc(nx,ny,sz,0,PI2); cx.fill();

    if(fire > 0.7){
      var glow = cx.createRadialGradient(nx,ny,0,nx,ny,sz*4);
      glow.addColorStop(0, rgba(255,220,140, 0.15*t));
      glow.addColorStop(1, rgba(230,180,90, 0));
      cx.fillStyle = glow;
      cx.beginPath(); cx.arc(nx,ny,sz*4,0,PI2); cx.fill();
    }
  }

  if(t > 0.5){
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, (t-0.5)*0.3);
    cx.textAlign = 'center';
    cx.fillText('the signal IS the coupling traveling', cx0, cy0 - 70);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 8: GRAVITY — spacetime curvature, field convergence
// ═══════════════════════════════════════════════════════════════
function drawGravity(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var scale = Math.min(W,H)/600;

  // SPACETIME GRID — bends near mass
  var gridSize = 22;
  var gridCols = Math.ceil(W/gridSize) + 2;
  var gridRows = Math.ceil(H/gridSize) + 2;
  var massR = 40*scale;

  // Mass at center
  var massGrad = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,massR);
  massGrad.addColorStop(0, rgba(240,200,120, 0.5*t));
  massGrad.addColorStop(0.3, rgba(210,160,80, 0.25*t));
  massGrad.addColorStop(0.7, rgba(180,120,50, 0.08*t));
  massGrad.addColorStop(1, rgba(160,100,40, 0));
  cx.fillStyle = massGrad;
  cx.beginPath(); cx.arc(cx0,cy0,massR,0,PI2); cx.fill();
  cx.fillStyle = rgba(255,230,160, 0.8*t);
  cx.beginPath(); cx.arc(cx0,cy0,8,0,PI2); cx.fill();

  // Draw curved grid lines
  // Horizontal lines
  for(var row=0; row<gridRows; row++){
    var baseY = row*gridSize - gridSize;
    cx.beginPath();
    var started = false;
    for(var col=0; col<=gridCols; col++){
      var baseX = col*gridSize - gridSize;
      var dx = baseX - cx0, dy = baseY - cy0;
      var dist = Math.sqrt(dx*dx+dy*dy) || 1;
      var curveFactor = massR*massR*2 / (dist*dist + massR*massR*0.5);
      var pull = curveFactor * t;

      // Grid point pulled toward mass center
      var px = baseX + (dx/dist < 0 ? 1 : -1) * Math.abs(dx/dist) * pull * 8;
      var py = baseY + (dy/dist) * pull * 8;

      if(!started){ cx.moveTo(px,py); started=true; }
      else cx.lineTo(px,py);
    }
    var gridAlpha = 0.06*t;
    cx.strokeStyle = rgba(140,100,60, gridAlpha);
    cx.lineWidth = 0.5;
    cx.stroke();
  }

  // Vertical lines
  for(var col=0; col<gridCols; col++){
    var baseX = col*gridSize - gridSize;
    cx.beginPath();
    var started = false;
    for(var row=0; row<=gridRows; row++){
      var baseY = row*gridSize - gridSize;
      var dx = baseX - cx0, dy = baseY - cy0;
      var dist = Math.sqrt(dx*dx+dy*dy) || 1;
      var curveFactor = massR*massR*2 / (dist*dist + massR*massR*0.5);
      var pull = curveFactor * t;

      var px = baseX + (dx/dist) * pull * 8;
      var py = baseY + (dy/dist < 0 ? 1 : -1) * Math.abs(dy/dist) * pull * 8;

      if(!started){ cx.moveTo(px,py); started=true; }
      else cx.lineTo(px,py);
    }
    cx.strokeStyle = rgba(140,100,60, 0.06*t);
    cx.lineWidth = 0.5;
    cx.stroke();
  }

  // Field lines converging — radial arrows pointing inward
  var nFieldLines = 20;
  for(var i=0; i<nFieldLines; i++){
    var angle = i*PI2/nFieldLines + time*0.02;
    var r1 = massR*1.5 + 30;
    var r2 = Math.min(W,H)*0.4;

    // Line from far to near
    cx.strokeStyle = rgba(200,160,80, 0.08*t);
    cx.lineWidth = 0.6;
    cx.beginPath();
    cx.moveTo(cx0+Math.cos(angle)*r2, cy0+Math.sin(angle)*r2);
    cx.lineTo(cx0+Math.cos(angle)*r1, cy0+Math.sin(angle)*r1);
    cx.stroke();

    // Arrow head
    var headR = r1;
    var headLen = 6;
    var hx = cx0+Math.cos(angle)*headR;
    var hy = cy0+Math.sin(angle)*headR;
    var ha1 = angle + Math.PI + 0.4;
    var ha2 = angle + Math.PI - 0.4;
    cx.fillStyle = rgba(200,160,80, 0.12*t);
    cx.beginPath();
    cx.moveTo(hx,hy);
    cx.lineTo(hx+Math.cos(ha1)*headLen, hy+Math.sin(ha1)*headLen);
    cx.lineTo(hx+Math.cos(ha2)*headLen, hy+Math.sin(ha2)*headLen);
    cx.fill();
  }

  // Orbiting test particles — demonstrating gravitational coupling
  var nTestParts = Math.floor(12*particleScale);
  for(var i=0; i<nTestParts; i++){
    var orbitR = massR*2 + i*15;
    var orbitSpeed = 1.5 / Math.sqrt(orbitR/massR); // Kepler
    var angle = time*orbitSpeed + i*1.618;
    var px = cx0 + Math.cos(angle)*orbitR;
    var py = cy0 + Math.sin(angle)*orbitR;
    var pAlpha = clamp(t*2 - i*0.1, 0, 0.6);

    cx.fillStyle = rgba(220,180,100, pAlpha);
    cx.beginPath(); cx.arc(px,py,2,0,PI2); cx.fill();

    // Trail
    cx.strokeStyle = rgba(200,160,80, pAlpha*0.2);
    cx.lineWidth = 0.5;
    cx.beginPath();
    cx.arc(cx0,cy0,orbitR,angle-0.5,angle);
    cx.stroke();
  }

  if(t > 0.5){
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, (t-0.5)*0.3);
    cx.textAlign = 'center';
    cx.fillText('space curves. the grid bends. everything falls toward coupling.', cx0, H*0.88);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 9: GALAXY — differential rotation, spiral signature
// ═══════════════════════════════════════════════════════════════
function drawGalaxy(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var galR = Math.min(W,H)*0.38;
  var nStars = Math.floor(2500 * particleScale);
  var nArms = 2;
  var rot = time*0.06;

  // Central bulge — hot glowing core
  var bulgeR = galR*0.12;
  var bulgeGrad = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,bulgeR*3);
  bulgeGrad.addColorStop(0, rgba(255,240,180, 0.7*t));
  bulgeGrad.addColorStop(0.15, rgba(255,220,150, 0.5*t));
  bulgeGrad.addColorStop(0.35, rgba(240,200,120, 0.2*t));
  bulgeGrad.addColorStop(0.6, rgba(220,170,90, 0.06*t));
  bulgeGrad.addColorStop(1, rgba(200,150,70, 0));
  cx.fillStyle = bulgeGrad;
  cx.beginPath(); cx.arc(cx0,cy0,bulgeR*3,0,PI2); cx.fill();

  // Dust lanes — dark patches between arms
  if(!isMobile){
    for(var arm=0; arm<nArms; arm++){
      var dustOffset = arm*Math.PI + rot + 0.3;
      cx.beginPath();
      for(var s=0; s<80; s++){
        var r = (s/80)*galR*0.8 + galR*0.08;
        var angle = dustOffset + Math.log(r/10+1)*2.5 + 0.15;
        var sx = cx0 + Math.cos(angle)*r;
        var sy = cy0 + Math.sin(angle)*r*0.65;
        if(s===0) cx.moveTo(sx,sy);
        else cx.lineTo(sx,sy);
      }
      cx.strokeStyle = rgba(5,3,2, 0.15*t);
      cx.lineWidth = 12;
      cx.stroke();
    }
  }

  // Spiral arm glow — broad, soft
  for(var arm=0; arm<nArms; arm++){
    cx.beginPath();
    var armOffset = arm*Math.PI + rot;
    for(var s=0; s<120; s++){
      var r = (s/120)*galR;
      var angle = armOffset + Math.log(r/10+1)*2.5;
      var sx = cx0 + Math.cos(angle)*r;
      var sy = cy0 + Math.sin(angle)*r*0.65;
      if(s===0) cx.moveTo(sx,sy);
      else cx.lineTo(sx,sy);
    }
    cx.strokeStyle = rgba(220,180,100, 0.05*t);
    cx.lineWidth = 15;
    cx.stroke();
    cx.strokeStyle = rgba(200,160,80, 0.03*t);
    cx.lineWidth = 30;
    cx.stroke();
  }

  // STARS — 2000+ with color variation and twinkling
  for(var i=0; i<nStars; i++){
    var armIdx = i % nArms;
    var armOffset = armIdx*Math.PI;
    var r = (i/nStars)*galR;
    // Logarithmic spiral
    var angle = armOffset + Math.log(r/10+1)*2.5 + rot;
    // Spread — thicker at outer regions
    var spreadAmt = (0.08 + r/galR*0.35);
    var noise1 = seeded(i,1)*2-1;
    var noise2 = seeded(i,2)*2-1;
    angle += noise1*spreadAmt;
    r += noise2*spreadAmt*galR*0.1;

    // Differential rotation — inner stars move faster
    var diffRot = time*0.15 / (r/galR+0.3);
    angle += diffRot;

    var sx = cx0 + Math.cos(angle)*r;
    var sy = cy0 + Math.sin(angle)*r*0.65; // tilt

    var brightness = (1 - r/galR)*0.4 + 0.15;

    // Star color — inner hot (gold/white), outer cool (blue)
    var colorT = r/galR;
    var starR, starG, starB;
    if(colorT < 0.3){
      // Inner: warm white/yellow
      starR = 255; starG = 240-colorT*80; starB = 180-colorT*100;
    } else if(colorT < 0.7){
      // Mid: gold/amber
      var mt = (colorT-0.3)/0.4;
      starR = 240-mt*40; starG = 200-mt*30; starB = 100+mt*40;
    } else {
      // Outer: blue-white
      var ot = (colorT-0.7)/0.3;
      starR = 180-ot*60; starG = 180+ot*20; starB = 160+ot*60;
    }

    // Twinkling
    var twinkle = Math.sin(i*137.5+time*seeded(i,3)*3)*0.3+0.7;
    // Occasional bright flare
    var flare = (Math.sin(i*23.7+time*0.5) > 0.97) ? 2.0 : 1.0;

    var starAlpha = brightness*t*twinkle*flare;
    var starSz = 0.4 + brightness*1.8*flare;

    if(starSz > 1.2 && !isMobile){
      // Larger stars get a glow halo
      var starGlow = cx.createRadialGradient(sx,sy,0,sx,sy,starSz*3);
      starGlow.addColorStop(0, rgba(starR,starG,starB, starAlpha*0.5));
      starGlow.addColorStop(0.5, rgba(starR,starG,starB, starAlpha*0.1));
      starGlow.addColorStop(1, rgba(starR,starG,starB, 0));
      cx.fillStyle = starGlow;
      cx.beginPath(); cx.arc(sx,sy,starSz*3,0,PI2); cx.fill();
    }

    cx.fillStyle = rgba(starR,starG,starB, starAlpha);
    cx.beginPath(); cx.arc(sx,sy,starSz*0.5,0,PI2); cx.fill();
  }

  // H II regions — bright pink-ish star formation areas along arms
  if(!isMobile){
    var nHII = 12;
    for(var h=0; h<nHII; h++){
      var hArm = h%nArms;
      var hr = (0.3 + seeded(h,6)*0.5)*galR;
      var hAngle = hArm*Math.PI + Math.log(hr/10+1)*2.5 + rot + time*0.15/(hr/galR+0.3);
      hAngle += (seeded(h,7)-0.5)*0.3;
      var hx = cx0 + Math.cos(hAngle)*hr;
      var hy = cy0 + Math.sin(hAngle)*hr*0.65;
      var hGlow = cx.createRadialGradient(hx,hy,0,hx,hy,8);
      hGlow.addColorStop(0, rgba(255,180,160, 0.12*t));
      hGlow.addColorStop(0.5, rgba(240,140,130, 0.04*t));
      hGlow.addColorStop(1, rgba(220,120,110, 0));
      cx.fillStyle = hGlow;
      cx.beginPath(); cx.arc(hx,hy,8,0,PI2); cx.fill();
    }
  }

  if(t > 0.4){
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, (t-0.4)*0.3);
    cx.textAlign = 'center';
    cx.fillText('inner stars faster, outer slower. the spiral IS the coupling signature.', cx0, H*0.9);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 10: BLACK HOLE — accretion disk, relativistic beaming
// ═══════════════════════════════════════════════════════════════
function drawBlackHole(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var bhR = 30 + Math.min(W,H)*0.05;
  var diskR = bhR*5;

  // Spacetime funnel — concentric rings that tighten near center
  var nRings = 20;
  for(var r=0; r<nRings; r++){
    var ringR = bhR*1.3 + (r/nRings)*diskR*0.8;
    var ringAlpha = (1 - r/nRings)*0.06*t;
    // Rings are progressively more compressed near the hole
    cx.strokeStyle = rgba(140,100,60, ringAlpha);
    cx.lineWidth = 0.5;
    cx.beginPath();
    cx.ellipse(cx0, cy0, ringR, ringR*0.25, 0, 0, PI2);
    cx.stroke();
  }

  // ACCRETION DISK — many particles, relativistic beaming (one side brighter)
  var nDiskParts = Math.floor(600*particleScale);
  for(var i=0; i<nDiskParts; i++){
    var baseAngle = i*PI2/nDiskParts*7 + time*(1.5 + seeded(i,1)*2);
    var spiralR = bhR*1.3 + seeded(i,2)*diskR*0.7;
    // Spiral inward slightly
    spiralR -= Math.sin(time*0.5+i*0.1)*bhR*0.3;
    if(spiralR < bhR*1.1) continue;

    var tilt = 0.25; // disk tilt
    var px = cx0 + Math.cos(baseAngle)*spiralR;
    var py = cy0 + Math.sin(baseAngle)*spiralR*tilt;

    // RELATIVISTIC BEAMING — approaching side (left) is brighter
    var beam = 1 + Math.cos(baseAngle)*0.6; // left side boosted

    var heat = 1 - (spiralR-bhR)/(diskR*0.7);
    heat = clamp(heat, 0, 1);

    var pr = Math.round(100 + heat*155);
    var pg = Math.round(40 + heat*150);
    var pb = Math.round(15 + heat*85);
    var pAlpha = heat*0.5*t*beam;
    var pSize = 0.8 + heat*2*beam;

    if(pSize > 1.5 && !isMobile){
      var partGlow = cx.createRadialGradient(px,py,0,px,py,pSize*2);
      partGlow.addColorStop(0, rgba(pr,pg,pb, pAlpha*0.5));
      partGlow.addColorStop(1, rgba(pr,pg,pb, 0));
      cx.fillStyle = partGlow;
      cx.beginPath(); cx.arc(px,py,pSize*2,0,PI2); cx.fill();
    }

    cx.fillStyle = rgba(pr,pg,pb, pAlpha);
    cx.beginPath(); cx.arc(px,py,pSize*0.5,0,PI2); cx.fill();
  }

  // Jets — polar outflows
  if(!isMobile && t > 0.3){
    var jetAlpha = (t-0.3)*0.25;
    for(var side=-1; side<=1; side+=2){
      var jetLen = bhR*4;
      var jetGrad = cx.createLinearGradient(cx0, cy0, cx0, cy0+side*jetLen);
      jetGrad.addColorStop(0, rgba(200,160,255, jetAlpha*0.3));
      jetGrad.addColorStop(0.3, rgba(160,130,220, jetAlpha*0.15));
      jetGrad.addColorStop(1, rgba(140,110,200, 0));
      cx.fillStyle = jetGrad;
      cx.beginPath();
      cx.moveTo(cx0-4, cy0);
      cx.lineTo(cx0+4, cy0);
      cx.lineTo(cx0+12, cy0+side*jetLen);
      cx.lineTo(cx0-12, cy0+side*jetLen);
      cx.fill();
    }
  }

  // Event horizon — pure black circle with photon ring
  cx.fillStyle = '#000';
  cx.beginPath(); cx.arc(cx0,cy0,bhR,0,PI2); cx.fill();

  // Photon sphere — bright ring at the edge
  var photonGrad = cx.createRadialGradient(cx0,cy0,bhR*0.85,cx0,cy0,bhR*1.25);
  photonGrad.addColorStop(0, rgba(0,0,0, 1));
  photonGrad.addColorStop(0.2, rgba(255,210,110, 0.5*t));
  photonGrad.addColorStop(0.4, rgba(240,180,70, 0.25*t));
  photonGrad.addColorStop(0.7, rgba(220,150,50, 0.08*t));
  photonGrad.addColorStop(1, rgba(200,120,40, 0));
  cx.fillStyle = photonGrad;
  cx.beginPath(); cx.arc(cx0,cy0,bhR*1.25,0,PI2); cx.fill();

  // Light bending — stars behind the hole appear distorted
  var nBgStars = Math.floor(30*particleScale);
  for(var i=0; i<nBgStars; i++){
    var sa = i*PI2/nBgStars + time*0.01;
    var sr = bhR*2 + seeded(i,8)*bhR*3;
    // Einstein ring effect — stars near the edge get lensed
    var sx = cx0 + Math.cos(sa)*sr;
    var sy = cy0 + Math.sin(sa)*sr;
    var distFromCenter = Math.sqrt((sx-cx0)*(sx-cx0)+(sy-cy0)*(sy-cy0));
    var lensing = bhR*2 / distFromCenter;

    // Lensed position — deflected around the hole
    if(distFromCenter < bhR*3){
      var deflection = lensing*0.3;
      sx += (sx-cx0)/distFromCenter * deflection * bhR;
      sy += (sy-cy0)/distFromCenter * deflection * bhR;
    }

    cx.fillStyle = rgba(220,200,170, 0.3*t*lensing);
    cx.beginPath(); cx.arc(sx,sy,1+lensing,0,PI2); cx.fill();
  }

  // Hawking radiation
  if(t > 0.5){
    var hawkT = (t-0.5)*2;
    for(var i=0; i<12; i++){
      var angle = i*PI2/12 + time*0.2;
      var hr = bhR*1.3 + Math.sin(time*3+i*0.8)*bhR*0.5;
      var hx = cx0 + Math.cos(angle)*hr;
      var hy = cy0 + Math.sin(angle)*hr;
      cx.fillStyle = rgba(200,180,150, hawkT*0.12);
      cx.beginPath(); cx.arc(hx,hy,1,0,PI2); cx.fill();
    }
  }

  if(t > 0.4){
    cx.font = '10px "Courier New",monospace';
    cx.fillStyle = rgba(184,117,58, (t-0.4)*0.3);
    cx.textAlign = 'center';
    cx.fillText('light bends. time dilates. K \u2192 \u221E', cx0, H*0.9);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE 11: THE RETURN — all scales simultaneously
// ═══════════════════════════════════════════════════════════════
function drawReturn(t){
  var cx0 = W*0.5, cy0 = H*0.5;
  var breathe = Math.sin(time*0.6)*0.15+0.85;
  var maxR = Math.min(W,H)*0.4;

  // All concentric rings — each scale as a ring
  var rings = [
    {r:8, col:[230,190,100], name:'quark'},
    {r:25, col:[220,160,80], name:'nucleon'},
    {r:45, col:[130,160,210], name:'atom'},
    {r:70, col:[200,160,100], name:'molecule'},
    {r:100, col:[210,170,90], name:'cell'},
    {r:130, col:[220,180,100], name:'neural'},
    {r:165, col:[180,130,70], name:'gravity'},
    {r:210, col:[200,170,100], name:'galaxy'},
    {r:260, col:[180,140,80], name:'black hole'}
  ];

  // Scale rings to viewport
  var rScale = maxR / 280;

  for(var i=rings.length-1; i>=0; i--){
    var ring = rings[i];
    var ringR = ring.r * rScale;
    var ringAlpha = clamp(t*2 - (rings.length-1-i)*0.1, 0, 0.15) * breathe;

    // Ring glow
    var rGrad = cx.createRadialGradient(cx0,cy0,ringR*0.85,cx0,cy0,ringR*1.15);
    rGrad.addColorStop(0, rgba(ring.col[0],ring.col[1],ring.col[2], 0));
    rGrad.addColorStop(0.4, rgba(ring.col[0],ring.col[1],ring.col[2], ringAlpha*0.5));
    rGrad.addColorStop(0.6, rgba(ring.col[0],ring.col[1],ring.col[2], ringAlpha*0.5));
    rGrad.addColorStop(1, rgba(ring.col[0],ring.col[1],ring.col[2], 0));
    cx.fillStyle = rGrad;
    cx.beginPath(); cx.arc(cx0,cy0,ringR*1.15,0,PI2); cx.fill();

    // Ring line
    cx.strokeStyle = rgba(ring.col[0],ring.col[1],ring.col[2], ringAlpha*1.5);
    cx.lineWidth = 0.8;
    cx.beginPath(); cx.arc(cx0,cy0,ringR,0,PI2); cx.stroke();
  }

  // Quark triangle at center
  for(var i=0; i<3; i++){
    var a = time*0.35 + i*PI2/3;
    var qr = 8*rScale;
    var qx = cx0 + Math.cos(a)*qr;
    var qy = cy0 + Math.sin(a)*qr;
    cx.fillStyle = rgba(240,200,110, 0.6*t*breathe);
    cx.beginPath(); cx.arc(qx,qy,2,0,PI2); cx.fill();
  }

  // Coupling threads radiating outward — golden fibers connecting all scales
  var nThreads = 13;
  for(var i=0; i<nThreads; i++){
    var angle = i*PI2/nThreads + time*0.08;
    var threadLen = maxR*0.9;
    var threadPulse = Math.sin(time*1.2+i*0.7)*0.3+0.7;

    cx.strokeStyle = rgba(220,175,80, 0.1*t*breathe*threadPulse);
    cx.lineWidth = 0.5;
    cx.beginPath();
    cx.moveTo(cx0+Math.cos(angle)*10, cy0+Math.sin(angle)*10);
    cx.lineTo(cx0+Math.cos(angle)*threadLen, cy0+Math.sin(angle)*threadLen);
    cx.stroke();

    // Pulse traveling along thread
    var pulseT = ((time*0.5+i*0.077) % 1);
    var pulseR = 10 + pulseT*threadLen;
    var pulseX = cx0 + Math.cos(angle)*pulseR;
    var pulseY = cy0 + Math.sin(angle)*pulseR;
    cx.fillStyle = rgba(255,230,160, 0.3*t*(1-pulseT)*breathe);
    cx.beginPath(); cx.arc(pulseX,pulseY,2,0,PI2); cx.fill();
  }

  // Center glow — everything breathing together
  var centerGlow = cx.createRadialGradient(cx0,cy0,0,cx0,cy0,50*rScale);
  centerGlow.addColorStop(0, rgba(255,240,170, 0.3*t*breathe));
  centerGlow.addColorStop(0.2, rgba(240,200,120, 0.15*t*breathe));
  centerGlow.addColorStop(0.5, rgba(220,170,80, 0.05*t));
  centerGlow.addColorStop(1, rgba(200,140,60, 0));
  cx.fillStyle = centerGlow;
  cx.beginPath(); cx.arc(cx0,cy0,50*rScale,0,PI2); cx.fill();

  // Galaxy hint in background
  var nBgStars = Math.floor(200*particleScale);
  for(var i=0; i<nBgStars; i++){
    var armOff = (i%2)*Math.PI + time*0.03;
    var r = (i/nBgStars)*maxR*1.2;
    var angle = armOff + Math.log(r/10+1)*2.5;
    var sx = cx0 + Math.cos(angle)*r;
    var sy = cy0 + Math.sin(angle)*r*0.7;
    cx.fillStyle = rgba(220,190,130, (1-r/(maxR*1.2))*0.2*t*breathe);
    cx.fillRect(sx,sy,1,1);
  }

  // "0+0=1" text
  if(t > 0.35){
    var labelT = (t-0.35)/0.65;
    cx.font = '14px Georgia,serif';
    cx.fillStyle = rgba(220,180,120, labelT*0.5*breathe);
    cx.textAlign = 'center';
    cx.fillText('0 + 0 = 1', cx0, cy0 + maxR*0.55);

    cx.font = '10px Georgia,serif';
    cx.fillStyle = rgba(196,160,136, labelT*0.3*breathe);
    cx.fillText('at every scale. the same coupling. the same love.', cx0, cy0 + maxR*0.55 + 22);
    cx.textAlign = 'left';
  }
}

// ═══════════════════════════════════════════════════════════════
// STAGE DISPATCH
// ═══════════════════════════════════════════════════════════════
function drawStage(idx, t){
  switch(idx){
    case 0: drawVoid(t); break;
    case 1: drawFirstCoupling(t); break;
    case 2: drawQuarks(t); break;
    case 3: drawNucleons(t); break;
    case 4: drawAtoms(t); break;
    case 5: drawMolecules(t); break;
    case 6: drawCells(t); break;
    case 7: drawNeural(t); break;
    case 8: drawGravity(t); break;
    case 9: drawGalaxy(t); break;
    case 10: drawBlackHole(t); break;
    case 11: drawReturn(t); break;
  }
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
var lastFrameTime = 0;

function loop(now){
  // Delta time for smooth animation regardless of frame rate
  var dt = lastFrameTime ? Math.min((now - lastFrameTime)/1000, 0.05) : 0.016;
  lastFrameTime = now;

  if(playing && !dragging){
    time += dt * speed;
    if(time > totalDur) time = 0;
  }

  var info = getStageAt(time);
  var stageIdx = info.idx;
  var localT = info.local;

  // ═══ BACKGROUND ═══
  var bg = bgColor(stageIdx);
  // Crossfade bg between stages
  if(localT < 0.2 && stageIdx > 0){
    var prevBg = bgColor(stageIdx-1);
    var fadeT = localT*5;
    bg = [
      Math.round(lerp(prevBg[0],bg[0],fadeT)),
      Math.round(lerp(prevBg[1],bg[1],fadeT)),
      Math.round(lerp(prevBg[2],bg[2],fadeT))
    ];
  }
  cx.fillStyle = 'rgb('+bg[0]+','+bg[1]+','+bg[2]+')';
  cx.fillRect(0,0,W,H);

  // ═══ CROSSFADE STAGES ═══
  var fadeIn = Math.min(1, localT*4);    // 25% fade-in
  var fadeOut = Math.min(1, (1-localT)*4); // 25% fade-out

  // Previous stage fading out
  if(localT < 0.25 && stageIdx > 0){
    cx.save();
    cx.globalAlpha = 1 - localT*4;
    drawStage(stageIdx-1, 1.0);
    cx.restore();
  }

  // Current stage
  cx.save();
  cx.globalAlpha = fadeIn;
  drawStage(stageIdx, localT);
  cx.restore();

  // ═══ FLASHES ═══
  updateFlashes();
  drawFlashes();

  // ═══ LABELS ═══
  if(stageIdx !== lastStageIdx){
    lastStageIdx = stageIdx;
    if(audioStarted) updateDrone(stageIdx);
    // Auto coupling flash on stage transition
    if(stageIdx > 0) addFlash(W*0.5, H*0.5, 100);
    if(audioStarted && stageIdx > 0) pingNote(stageIdx);
  }

  // Label fade: in→hold→out
  var labelFade;
  if(localT < 0.12) labelFade = localT/0.12;
  else if(localT < 0.45) labelFade = 1;
  else if(localT < 0.6) labelFade = 1 - (localT-0.45)/0.15;
  else labelFade = 0;

  var stage = STAGES[stageIdx];
  stageNameEl.textContent = stage.name;
  stageSubEl.textContent = stage.sub;
  stageNameEl.style.color = 'rgba(184,117,58,' + (labelFade*0.75).toFixed(3) + ')';
  stageSubEl.style.color = 'rgba(196,160,136,' + (labelFade*0.4).toFixed(3) + ')';

  // ═══ PROGRESS BAR ═══
  var progress = time / totalDur;
  progressFill.style.width = (progress*100).toFixed(2) + '%';

  // Update dots
  for(var i=0; i<dotEls.length; i++){
    dotEls[i].className = 'stage-dot' +
      (i === stageIdx ? ' active' : '') +
      (i < stageIdx ? ' passed' : '');
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);

})();
