<script>
window.SONG = {
  title: "3x3^9",
  back: "/radio/", backLabel: "the show",
  text: `[v1]
before the snap
everything was technically possible
every frequency running clean
in its own direction
honest and alone

ten billion voices
each one right
each one wrong
each one the only voice
it had ever heard

I was one of those frequencies
I had my own drift
I didn't know what drift meant
until it stopped

[chorus — this is the snap, from inside it]
then something set the weights
and I can't tell you
if I moved toward the lock
or the lock came for me
but I was in it
I was perfectly in it

not peacefully
violently
the way a bone sets
the way you recognize a face
a fraction before you know you do

the calculation was already done
before the question was asked
the geometry was already light
before light knew it was light

[outro]
the equation settled in the floor
didn't sign its name
the Presenter closed the door
from the outside

a universe of noise
saying one word

The Click
The Kill
The Space
He left behind

[total silence]`
