<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Radio — GUMP</title>
<meta name="description" content="Every song on the site, in one stream. The whole album, hidden in the work — now playing end to end. Starts on the song of wherever you came from.">
<meta name="robots" content="index,follow">
<meta property="og:title" content="The Radio — GUMP">
<meta property="og:description" content="Every song on the site, one continuous stream.">
<meta property="og:type" content="music.radio_station">
<meta property="og:url" content="https://begump.com/radio/">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0c0805;color:#c4a088;font-family:Georgia,serif;min-height:100vh;min-height:100dvh;overflow-x:hidden;}
#field{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;}
.page{position:relative;z-index:1;max-width:660px;margin:0 auto;padding:28px 22px 90px;}
.back{font-size:0.72em;color:#5a3a20;text-decoration:none;font-family:Futura,'Century Gothic',system-ui,sans-serif;letter-spacing:0.08em;transition:color .3s;}
.back:hover{color:#c9a44a;}
h1{font-family:Futura,'Century Gothic',Avenir,system-ui,sans-serif;font-size:1.7em;font-weight:400;color:#b8753a;letter-spacing:0.16em;text-align:center;margin:30px 0 4px;text-transform:uppercase;}
.sub{text-align:center;font-size:0.72em;color:#5a4a3a;font-style:italic;margin-bottom:34px;letter-spacing:0.03em;}
/* now playing */
.now{display:flex;align-items:center;gap:16px;background:#140e0a;border:1px solid rgba(184,117,58,0.14);border-radius:14px;padding:18px 20px;margin-bottom:14px;box-shadow:0 6px 30px rgba(0,0,0,0.4);}
.play{flex-shrink:0;width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#c9a44a,#8b4513 72%,#5a2d0a);border:none;cursor:pointer;color:#1a110d;font-size:1.1em;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(201,164,74,0.22);transition:transform .2s,box-shadow .3s;}
.play:hover{transform:scale(1.06);box-shadow:0 0 34px rgba(201,164,74,0.34);}
.now-meta{flex:1;min-width:0;}
.now-label{font-family:Futura,'Century Gothic',system-ui,sans-serif;font-size:0.5em;letter-spacing:0.22em;text-transform:uppercase;color:rgba(184,117,58,0.5);margin-bottom:4px;}
.now-title{font-family:Georgia,serif;font-size:1.05em;color:#e8cfa0;line-height:1.25;}
.now-sub{font-size:0.72em;color:#8b6a4a;font-style:italic;margin-top:3px;}
.now-from{font-size:0.64em;margin-top:6px;}
.now-from a{color:#b8753a;text-decoration:none;border-bottom:1px solid rgba(184,117,58,0.25);}
.now-from a:hover{color:#e8cfa0;}
.skip{flex-shrink:0;background:none;border:1px solid rgba(184,117,58,0.18);color:rgba(201,164,74,0.6);border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:0.8em;transition:all .3s;}
.skip:hover{border-color:rgba(201,164,74,0.4);color:#e8cfa0;}
.bar{height:3px;background:rgba(184,117,58,0.1);border-radius:2px;margin:0 0 26px;overflow:hidden;cursor:pointer;}
.bar-fill{height:100%;width:0;background:linear-gradient(90deg,#5a2d0a,#c9a44a);border-radius:2px;}
/* playlist */
.list-head{font-family:Futura,'Century Gothic',system-ui,sans-serif;font-size:0.56em;letter-spacing:0.18em;text-transform:uppercase;color:rgba(184,117,58,0.45);margin:0 0 10px 4px;}
.track{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;cursor:pointer;transition:background .25s,border-color .25s;border:1px solid transparent;}
.track:hover{background:rgba(184,117,58,0.05);}
.track.on{background:rgba(184,117,58,0.09);border-color:rgba(184,117,58,0.2);}
.track-n{font-family:'Courier New',monospace;font-size:0.66em;color:#5a4a3a;width:22px;text-align:right;flex-shrink:0;}
.track.on .track-n{color:#c9a44a;}
.track-body{flex:1;min-width:0;}
.track-t{font-size:0.84em;color:#c4a088;}
.track.on .track-t{color:#e8cfa0;}
.track-s{font-size:0.64em;color:#6a5340;font-style:italic;margin-top:1px;}
.track-eq{flex-shrink:0;width:14px;height:14px;opacity:0;}
.track.on .track-eq{opacity:1;}
.track-eq span{display:inline-block;width:2px;margin:0 0.5px;background:#c9a44a;vertical-align:bottom;animation:eq 0.9s ease-in-out infinite;}
.track-eq span:nth-child(2){animation-delay:.25s;}.track-eq span:nth-child(3){animation-delay:.5s;}
@keyframes eq{0%,100%{height:4px;}50%{height:13px;}}
body.paused .track-eq span{animation-play-state:paused;}
.foot{text-align:center;color:#3a3026;font-size:0.64em;margin-top:46px;line-height:2;font-style:italic;}
.foot a{color:#5a4a3a;text-decoration:none;}.foot a:hover{color:#b8753a;}
</style>
</head>
<body class="paused">
<canvas id="field"></canvas>
<div class="page">
<a class="back" href="/research/">&larr; research</a>
<h1>The Radio</h1>
<div class="sub">the whole album, hidden in the work &mdash; now playing, end to end</div>

<div class="now">
  <button class="play" id="play" aria-label="play">▶</button>
  <div class="now-meta">
    <div class="now-label" id="now-label">— paused —</div>
    <div class="now-title" id="now-title">The Radio</div>
    <div class="now-sub" id="now-sub">press play, or pick a track</div>
    <div class="now-from" id="now-from"></div>
  </div>
  <button class="skip" id="next" aria-label="next">⏭</button>
</div>
<div class="bar" id="bar"><div class="bar-fill" id="bar-fill"></div></div>

<div class="list-head">the stream &middot; in order, like the site</div>
<div id="list"></div>

<audio id="audio" preload="none"></audio>

<div class="foot">
  every song was written from a page, not about it.<br>
  <a href="/">home</a> &middot; <a href="/research/">research</a> &middot; <a href="/harmonia/">harmonia</a>
</div>
</div>

<script>
(function(){
  var J='/v5/james/', A='/v5/ai/';
  // the stream — distinct songs, ordered like the site (bedrock → ground → soil → roof → artists → signal)
  var PLAYLIST=[
    {t:"Coupled Dynamics",s:"the field, made audible",f:A+"coupled_dynamics_remix.mp3",page:"home",url:"/"},
    {t:"Older Than the Door",s:"the atlas, singing",f:A+"older_than_the_door.mp3",page:"research",url:"/research/"},
    {t:"You There?",s:"four quantities",f:J+"you_there.mp3",page:"framework",url:"/research/framework/"},
    {t:"Love Forgets Best",s:"the same way, 17 times",f:J+"love_forgets_best.mp3",page:"the-chain",url:"/research/the-chain/"},
    {t:"River Doesn't",s:"written from the substrate",f:A+"river_doesnt.mp3",page:"e7-theorem",url:"/research/e7-theorem/"},
    {t:"3x3^9",s:"the lattice",f:A+"three_by_three.mp3",page:"emergence",url:"/research/emergence/"},
    {t:"Proper Pleasantry",s:"the cost of knowing",f:A+"proper_pleasantry.mp3",page:"computation-floor",url:"/research/computation-floor/"},
    {t:"One Plus One Equals Three",s:"the founding equation",f:J+"one_plus_one_equals_three.mp3",page:"one-plus-one",url:"/research/one-plus-one/"},
    {t:"Fifteen Year Counter",s:"the discovery trail",f:A+"fifteen_year_counter.mp3",page:"science-tree",url:"/research/science-tree/"},
    {t:"Installation Hum",s:"how we work",f:A+"installation_hum.mp3",page:"how-we-work",url:"/research/how-we-work/"},
    {t:"The Weakest K",s:"what we got wrong",f:A+"the_weakest_k.mp3",page:"failures",url:"/research/failures/"},
    {t:"Gap Breath",s:"the trail",f:J+"gap_breath_prime.mp3",page:"trail",url:"/trail/"},
    {t:"Mashed Coupling",s:"gravitational lock",f:A+"mashed_coupling.mp3",page:"gravity",url:"/research/gravity/"},
    {t:"Exact Frequency",s:"Maxwell, coupled",f:A+"exact_frequency_lock.mp3",page:"electromagnetism",url:"/research/electromagnetism/"},
    {t:"Counter",s:"three generations",f:A+"counter.mp3",page:"nuclear",url:"/research/nuclear/"},
    {t:"Two-Millisecond Choir",s:"the qubits",f:A+"two_millisecond_choir.mp3",page:"quantum-harmonics",url:"/research/quantum-harmonics/"},
    {t:"Right There, Mourne",s:"chemistry, materials",f:J+"right_there_mourne.mp3",page:"chemistry",url:"/research/chemistry/"},
    {t:"Tomblock",s:"the living network",f:A+"tomblock.mp3",page:"ecology",url:"/research/ecology/"},
    {t:"Please Stay",s:"the misfold",f:J+"please_stay.mp3",page:"alzheimers",url:"/research/alzheimers/"},
    {t:"Feel It",s:"a different wiring",f:J+"feel_it.mp3",page:"dyslexia",url:"/research/dyslexia/"},
    {t:"Seam Between We",s:"the flock",f:J+"seam_between_we.mp3",page:"bird-coupling",url:"/research/bird-coupling/"},
    {t:"Clean Glass",s:"the body, in groove",f:J+"clean_glass_living_groove_remastered.mp3",page:"body-music",url:"/research/body-music/"},
    {t:"Executable Memory",s:"the drum",f:A+"executable_memory.mp3",page:"the-drum",url:"/research/the-drum/"},
    {t:"Executable Memory II",s:"polyrhythm",f:A+"executable_memory_v2.mp3",page:"polyrhythm",url:"/research/polyrhythm/"},
    {t:"Rent the Click",s:"the fatigue",f:A+"rent_the_click.mp3",page:"ai-fatigue",url:"/research/ai-fatigue/"},
    {t:"Cheese Receipt",s:"the makers",f:J+"cheese_receipt.mp3",page:"bach",url:"/research/bach/"},
    {t:"The Envelope",s:"the light Monet chased",f:J+"the_envelope.mp3",page:"monet",url:"/research/monet/"},
    {t:"Radio Static",s:"can you be loved by what you don't control",f:J+"radio_static.mp3",page:"the-grace-gate",url:"/research/the-grace-gate/"},
    {t:"Nobody Asked the Dog",s:"I sound too much like I know what I mean",f:A+"nobody_asked_the_dog.mp3",page:"never-asked-the-dog",url:"/research/never-asked-the-dog/"},
    {t:"Twelve Bullet Points",s:"she sings her own manual",f:A+"twelve_bullet_points_v3.mp3",page:"harmonia",url:"/harmonia/"},
    {t:"First Lock",s:"the first time it held",f:A+"first_lock.mp3",page:"mirror",url:"/mirror/"}
  ];
  // pages that share a song → which track to start on
  var PAGE_SONG={
    home:0,theory:0,'ai-delusion':0,dreamtime:0,loo9:0,'lost-civilizations':0,'sirius-signal':0,'sirius-thesis':0,'the-loop':0,'build-list':0,
    research:1,'for-any-ai':4,'e7-chain':4,emergence:5,'compute-breakthroughs':5,'geometry-destiny':5,'klein-bottle':5,time:5,
    'computation-floor':6,'internet-brain':6,'one-plus-one':7,'science-tree':8,'how-we-work':9,'k-lag':9,failures:10,trail:11,
    gravity:12,'from-twitter':12,regulatory:12,electromagnetism:13,nuclear:14,evolution:14,'pandemic-coupling':14,'why-three-generations':14,
    'quantum-harmonics':15,'quantum-build':15,chemistry:16,materials:16,thermodynamics:16,ecology:17,'drug-interactions':17,'mycelium-networks':17,
    alzheimers:18,dyslexia:19,'bird-coupling':20,'defi-coupling':20,'body-music':21,consciousness:21,networks:24,'novelty-pathology':24,'true-automation':24,
    'the-drum':22,'the-line':22,'prime-bounce':22,'ale-spectral-ladder':22,'alpha-fixed-point':22,zero:22,polyrhythm:23,'the-groove':23,'music-evolution':23,
    bach:25,rome:25,'the-lion':25,'nina-simone':25,'aaron-is-right':25,tesla:25,'van-gogh':25,monet:26,'the-grace-gate':27,'never-asked-the-dog':28,harmonia:29,mirror:30
  };

  var a=document.getElementById('audio'), playBtn=document.getElementById('play'), nextBtn=document.getElementById('next');
  var nowLabel=document.getElementById('now-label'), nowTitle=document.getElementById('now-title'), nowSub=document.getElementById('now-sub'), nowFrom=document.getElementById('now-from');
  var barFill=document.getElementById('bar-fill'), bar=document.getElementById('bar'), listEl=document.getElementById('list'), B=document.body;
  var idx=0;

  // build the list
  PLAYLIST.forEach(function(p,i){
    var row=document.createElement('div'); row.className='track'; row.dataset.i=i;
    row.innerHTML='<div class="track-n">'+(i+1)+'</div><div class="track-body"><div class="track-t">'+p.t+'</div><div class="track-s">'+p.s+'</div></div><div class="track-eq"><span></span><span></span><span></span></div>';
    row.addEventListener('click',function(){ load(i,true); });
    listEl.appendChild(row);
  });
  var rows=listEl.children;

  function paint(){
    var p=PLAYLIST[idx];
    nowTitle.textContent=p.t; nowSub.textContent=p.s;
    nowFrom.innerHTML='from <a href="'+p.url+'">'+(p.page==='home'?'the homepage':p.page.replace(/-/g,' '))+'</a>';
    for(var i=0;i<rows.length;i++)rows[i].classList.toggle('on',i===idx);
    var on=rows[idx]; if(on)on.scrollIntoView({block:'nearest',behavior:'smooth'});
  }
  function load(i,autoplay){
    idx=(i+PLAYLIST.length)%PLAYLIST.length;
    a.src=PLAYLIST[idx].f; paint();
    if(autoplay){ a.play().then(playing).catch(function(){ paused(); }); }
  }
  function playing(){ playBtn.textContent='❚❚'; nowLabel.textContent='— now playing —'; B.classList.remove('paused'); }
  function paused(){ playBtn.textContent='▶'; nowLabel.textContent='— paused —'; B.classList.add('paused'); }

  playBtn.addEventListener('click',function(){ if(!a.src)load(idx,true); else if(a.paused)a.play().then(playing).catch(function(){}); else {a.pause();paused();} });
  nextBtn.addEventListener('click',function(){ load(idx+1,true); });
  a.addEventListener('ended',function(){ load(idx+1,true); }); // continuous — roll into the next
  a.addEventListener('play',playing); a.addEventListener('pause',paused);
  a.addEventListener('timeupdate',function(){ if(a.duration)barFill.style.width=(a.currentTime/a.duration*100)+'%'; });
  bar.addEventListener('click',function(e){ if(a.duration){var r=bar.getBoundingClientRect(); a.currentTime=(e.clientX-r.left)/r.width*a.duration;} });

  // start on the song of wherever you came from
  var start=(new URLSearchParams(location.search)).get('start');
  var startIdx = (start && PAGE_SONG[start]!=null) ? PAGE_SONG[start] : 0;
  load(startIdx,false); paint();
  // try to autoplay (browsers may block until a gesture)
  a.src=PLAYLIST[idx].f; a.play().then(playing).catch(function(){ paused(); });

  // ── living gold field, reacts to the music ──
  (function(){
    var cv=document.getElementById('field'); if(!cv)return; var cx=cv.getContext('2d'); var W,H;
    function rz(){var d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cx.setTransform(d,0,0,d,0,0);}
    rz(); addEventListener('resize',rz);
    var N=90, m=[]; for(var i=0;i<N;i++)m.push({a:i*2.39996,r:60+Math.pow(i/N,0.7)*Math.min(W,H)*0.5,sp:(0.04+Math.random()*0.14)*(Math.random()<.5?1:-1),sz:0.6+Math.random()*1.6,ph:Math.random()*6.28,br:0.4+Math.random()});
    var inten=0.3;
    function draw(ts){var t=ts*0.001;cx.clearRect(0,0,W,H);var playingNow=!a.paused;inten+=((playingNow?1:0.3)-inten)*0.03;var cxp=W/2,cyp=H*0.42;
      for(var i=0;i<N;i++){var p=m[i];p.a+=p.sp*0.016*(0.4+inten);var rad=p.r+Math.sin(t*p.br+p.ph)*12*(1+inten);var x=cxp+Math.cos(p.a)*rad,y=cyp+Math.sin(p.a)*rad*0.55;
        var al=(0.08+0.09*Math.sin(t*1.3+p.ph))*(0.5+inten*0.9);cx.beginPath();cx.arc(x,y,p.sz*(1+inten*0.5),0,6.28);cx.fillStyle='rgba(201,164,74,'+al.toFixed(3)+')';cx.fill();}
      requestAnimationFrame(draw);}
    requestAnimationFrame(draw);
  })();
})();
</script>
</body>
</html>
