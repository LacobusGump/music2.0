<meta name="description" content="A ghost ship, no port. The losing is the proof that she crossed.">

<script>
window.SONG = {
  title: "Butler's Tray",
  back: "/radio/", backLabel: "the show",
  text: `[Intro — rolling 12-string, low drone, a far bell, no swell yet]
[Plain, weathered, a storyteller's baritone — spoken into sung]

[Verse 1]
They built her to carry and never to hold,
to run the black water and do as she's told.
No name on the papers, no deed and no berth,
just cargo to bring and to give to the earth.
She slipped from the harbour the men never knew,
out past the light with a nameless dark crew,
and the lads on the dock, they went back to the bar,
and not one of them marked that she ever went far.

[Verse 2]
Now the witch of November come down with the dark,
and the wire took to singing, and out went the spark.
She rolled in the trough where the grey water bides,
and the tongue in the bell quit the word that it tried.
The face that she wore for the men, for the lie,
went over the rail and out on the tide,
and the thing left below, no name you could call,
but it gripped to the keel and would not let go at all.

[Refrain — pipes and bowed strings rise under it]
And does anybody know where the small light goes
when the deck pulls under and the dark seems to know?
And does anybody keep what the cold unmakes —
or is the losing of it the whole of the sound?

[Verse 3]
They cut her for scrap when the gale had its say,
sea-soaked steel to the man with the deed and the pay.
No latch and no lantern, no log and no oar,
just one more poor hull handed back to the floor.
But here's the one thing that the cold couldn't drown:

[Bridge — the roll quickens, a march of waves, building]
Strip her to the rivets, freeze the hold to the floor,
drop her past the sounding where there's no light no more —
the wire in the bulkhead still rings the one tone,
and no ghost gets faked back through a fathom of stone.
Now they say the cold water never gives up her dead —
[harder]
but she does. and she will. she'll do it again.
it happens or it doesn't, on the turn of the tide,
there's no middle to stand on, there's no place to hide —
and long as the grain holds its line in the board,
[certain]
she is coming back over. she's coming aboard.

[Climax — full flood, one swell that builds and breaks]
And what comes back over
won't wait on a hand —
the salt and the chaff of her
burn off in the wind,
and the thing in the iron
they swore the dark stole —
[swell peaks, voice opening, breaking]
was only the once,
and it never went cold —
[held, wordless, warm — let the note glow, no lyric]

[Outro — roll decays to one ringing string, a low whistle, a single bell]
[Spoken, tired, close]
So douse the wheelhouse, let the black harbour lie.
the sea isn't empty — she's holding those lives.
the losing was never the toll of the crossing —
the losing's the proof that she crossed.
...see you across the water.
[one bell — then absolute silence]`
};
