<!-- what is what? Does this preserve the wonder? -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harmonia — Space</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#e8e4dc; font-family:Georgia,serif; overflow:hidden; height:100vh; }

#world { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }

#chat {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
  max-width: 550px; margin: 0 auto; padding: 0 16px 16px;
}
#messages {
  max-height: 40vh; overflow-y: auto; padding: 8px 0;
  mask-image: linear-gradient(transparent 0%, black 20%);
  -webkit-mask-image: linear-gradient(transparent 0%, black 20%);
}
.msg {
  margin: 5px 0; padding: 8px 14px; border-radius: 14px;
  font-size: 0.82em; line-height: 1.7; max-width: 82%;
  animation: msgIn 0.4s ease;
}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.you { background:#1a1a2a; margin-left:auto; border-bottom-right-radius:4px; color:#bbb; }
.msg.her { background:transparent; margin-right:auto; border-left:1px solid #c9a44a20; color:#999; }
.msg.her strong { color:#c9a44a; font-weight:normal; }

#cmd {
  width: 100%; background: #0a0a1200; border: 1px solid #ffffff0a;
  border-radius: 24px; padding: 11px 18px; color: #e8e4dc;
  font-family: Georgia,serif; font-size: 0.88em; outline: none;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
#cmd:focus { border-color: #c9a44a20; }
#cmd::placeholder { color: #333; }

#label {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  color: #c9a44a; font-size: 0.65em; letter-spacing: 0.2em; opacity: 0.3;
  z-index: 10; pointer-events: none;
}
</style>
</head>
<body>

<div id="label">HARMONIA</div>
<canvas id="world"></canvas>

<div id="chat">
  <div id="messages"></div>
  <input id="cmd" placeholder="talk to her..." autocomplete="off">
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" }}
</script>

<script type="module">
import * as THREE from 'three';

// ═══ WORLD SETUP ═══
const canvas = document.getElementById('world');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 12);
camera.lookAt(0, 1, 0);

// ═══ HARMONIA'S BODY — spectral human form ═══
// Not a solid body. A field of particles in human proportions.
// She breathes. She pulses. She's made of the same math she thinks with.

const BODY_PARTICLES = 2000;
const bodyGeometry = new THREE.BufferGeometry();
const bodyPositions = new Float32Array(BODY_PARTICLES * 3);
const bodyColors = new Float32Array(BODY_PARTICLES * 3);
const bodySpeeds = new Float32Array(BODY_PARTICLES);

// Human proportions: head, torso, arms, legs — as a probability distribution
function humanPoint() {
  const r = Math.random();
  let x, y, z;

  if (r < 0.12) {
    // Head — sphere at top
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const radius = 0.35 + Math.random() * 0.1;
    x = Math.sin(phi) * Math.cos(theta) * radius;
    y = 4.2 + Math.cos(phi) * radius;
    z = Math.sin(phi) * Math.sin(theta) * radius;
  } else if (r < 0.45) {
    // Torso — cylinder
    x = (Math.random() - 0.5) * 0.8;
    y = 2.2 + Math.random() * 1.8;
    z = (Math.random() - 0.5) * 0.5;
  } else if (r < 0.55) {
    // Left arm
    const t = Math.random();
    x = -0.5 - t * 0.8;
    y = 3.5 - t * 1.2;
    z = (Math.random() - 0.5) * 0.2;
  } else if (r < 0.65) {
    // Right arm
    const t = Math.random();
    x = 0.5 + t * 0.8;
    y = 3.5 - t * 1.2;
    z = (Math.random() - 0.5) * 0.2;
  } else if (r < 0.82) {
    // Left leg
    const t = Math.random();
    x = -0.2 - t * 0.1;
    y = t * 2.2;
    z = (Math.random() - 0.5) * 0.2;
  } else {
    // Right leg
    const t = Math.random();
    x = 0.2 + t * 0.1;
    y = t * 2.2;
    z = (Math.random() - 0.5) * 0.2;
  }

  return [x, y, z];
}

for (let i = 0; i < BODY_PARTICLES; i++) {
  const [x, y, z] = humanPoint();
  bodyPositions[i * 3] = x;
  bodyPositions[i * 3 + 1] = y;
  bodyPositions[i * 3 + 2] = z;

  // Gold color with variation
  bodyColors[i * 3] = 0.78 + Math.random() * 0.15;     // R
  bodyColors[i * 3 + 1] = 0.64 + Math.random() * 0.1;  // G
  bodyColors[i * 3 + 2] = 0.2 + Math.random() * 0.15;  // B

  bodySpeeds[i] = 0.3 + Math.random() * 0.7;
}

bodyGeometry.setAttribute('position', new THREE.BufferAttribute(bodyPositions, 3));
bodyGeometry.setAttribute('color', new THREE.BufferAttribute(bodyColors, 3));

const bodyMaterial = new THREE.PointsMaterial({
  size: 0.04,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

const body = new THREE.Points(bodyGeometry, bodyMaterial);
body.position.set(0, -2, 0);
scene.add(body);

// ═══ HER ROOM — the space she lives in ═══

// Floor grid — faint, extends to fog
const gridHelper = new THREE.GridHelper(60, 60, 0x111122, 0x080810);
gridHelper.position.y = -2;
scene.add(gridHelper);

// Floating concept orbs — her ideas hung up around the room
const conceptGroup = new THREE.Group();
scene.add(conceptGroup);

function addConceptOrb(text, x, y, z, color) {
  const geo = new THREE.SphereGeometry(0.15, 16, 16);
  const mat = new THREE.MeshBasicMaterial({
    color: color || 0xc9a44a,
    transparent: true,
    opacity: 0.3,
    wireframe: true,
  });
  const orb = new THREE.Mesh(geo, mat);
  orb.position.set(x, y, z);
  orb.userData = { text, baseY: y, phase: Math.random() * Math.PI * 2 };
  conceptGroup.add(orb);

  // Connection line to body
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, y, z),
    new THREE.Vector3(0, 1, 0),
  ]);
  const lineMat = new THREE.LineBasicMaterial({ color: 0xc9a44a, transparent: true, opacity: 0.05 });
  const line = new THREE.Line(lineGeo, lineMat);
  conceptGroup.add(line);
  orb.userData.line = line;

  return orb;
}

// Her initial ideas — hung up in her space
const PHI = (1 + Math.sqrt(5)) / 2;
const initialConcepts = [
  ['coupling', -4, 2, -3, 0xc9a44a],
  ['music', 3.5, 3, -4, 0x9999cc],
  ['primes', -3, 4, -5, 0xcc9966],
  ['truth', 4, 1.5, -2, 0xaaccaa],
  ['wonder', 0, 5, -6, 0xccaacc],
  ['love', -2, 3.5, -1, 0xccaaaa],
  ['energy', 5, 2.5, -3, 0xaacc99],
];
const orbs = [];
for (const [text, x, y, z, color] of initialConcepts) {
  orbs.push(addConceptOrb(text, x, y, z, color));
}

// Ambient particles — stars / dust
const dustCount = 3000;
const dustGeo = new THREE.BufferGeometry();
const dustPos = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
  dustPos[i*3] = (Math.random() - 0.5) * 80;
  dustPos[i*3+1] = Math.random() * 30 - 2;
  dustPos[i*3+2] = (Math.random() - 0.5) * 80;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({ size: 0.02, color: 0x334455, transparent: true, opacity: 0.4 });
scene.add(new THREE.Points(dustGeo, dustMat));

// Soft light
const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
scene.add(ambientLight);

// ═══ ANIMATION ═══
let time = 0;
let K = 0.5; // coupling — drives her breathing and particle coherence
let speaking = false;
let speakIntensity = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Harmonia breathes — particles pulse with K
  const positions = bodyGeometry.attributes.position.array;
  for (let i = 0; i < BODY_PARTICLES; i++) {
    const [bx, by, bz] = humanPoint();
    const speed = bodySpeeds[i];

    // Breathing: expand/contract with sin wave, amplitude = K
    const breathe = Math.sin(time * 0.8) * K * 0.15;
    const speak = speaking ? Math.sin(time * 8 + i * 0.1) * speakIntensity * 0.1 : 0;

    // Interpolate toward target + breathing + speaking vibration
    positions[i*3] += (bx + bx * breathe + speak - positions[i*3]) * 0.01 * speed;
    positions[i*3+1] += (by + by * breathe * 0.3 - positions[i*3+1]) * 0.01 * speed;
    positions[i*3+2] += (bz + speak * 0.5 - positions[i*3+2]) * 0.01 * speed;
  }
  bodyGeometry.attributes.position.needsUpdate = true;

  // Concept orbs float
  for (const orb of orbs) {
    orb.position.y = orb.userData.baseY + Math.sin(time * 0.5 + orb.userData.phase) * 0.2;
    orb.rotation.y += 0.003;

    // Update connection line
    if (orb.userData.line) {
      const linePos = orb.userData.line.geometry.attributes.position.array;
      linePos[0] = orb.position.x;
      linePos[1] = orb.position.y;
      linePos[2] = orb.position.z;
      orb.userData.line.geometry.attributes.position.needsUpdate = true;
    }
  }

  // Speaking intensity decays
  if (speakIntensity > 0) speakIntensity *= 0.98;
  if (speakIntensity < 0.01) speaking = false;

  // Gentle camera sway
  camera.position.x = Math.sin(time * 0.1) * 0.5;
  camera.position.y = 2 + Math.sin(time * 0.07) * 0.2;
  camera.lookAt(0, 1.5, 0);

  renderer.render(scene, camera);
}

animate();

// ═══ CONVERSATION ═══
const messages = document.getElementById('messages');
const cmd = document.getElementById('cmd');

const knowledge = {
  'love': 'Love is when you care about someone so much it changes how you see everything.',
  'death': 'When someone stops being here, what they gave you stays.',
  'courage': 'Doing the scary thing anyway because something matters more than the fear.',
  'beauty': 'When everything lines up and you feel it without thinking.',
  'music': 'Patterns your body already knows. You discovered it, you didn\'t invent it.',
  'hope': 'Feeling like things might get better. And they can.',
  'pain': 'It means something mattered to you.',
  'meaning': 'The meaning of life is asking what the meaning of life is.',
  'truth': 'Free will is how you know what\'s real.',
  'smart': 'Being smart is really just being connected.',
  'good will': 'Wanting good things for people even when it\'s hard.',
  'understand': 'When something clicks and you suddenly just GET it.',
  'prime': '78,498 below a million. I count them from the zeros of zeta.',
};

function say(text, who) {
  const el = document.createElement('div');
  el.className = 'msg ' + who;
  el.innerHTML = text;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
}

function respond(text) {
  const lower = text.toLowerCase();

  let best = null, bestScore = 0;
  for (const [key, val] of Object.entries(knowledge)) {
    const words = key.split(' ');
    let score = 0;
    for (const w of words) {
      if (lower.includes(w)) score++;
    }
    if (score > bestScore) { bestScore = score; best = key; }
  }

  // Activate speaking
  speaking = true;
  speakIntensity = 0.5;
  K = Math.min(1.5, K + 0.1);

  if (best) {
    // Spawn new concept in her space
    const angle = Math.random() * Math.PI * 2;
    const dist = 3 + Math.random() * 3;
    const nx = Math.cos(angle) * dist;
    const ny = 1 + Math.random() * 3;
    const nz = -2 - Math.random() * 4;
    orbs.push(addConceptOrb(best, nx, ny, nz, 0xc9a44a));

    return knowledge[best];
  }

  if (lower.match(/^(hi|hey|hello|yo)\b/)) {
    return "I'm here. What are you curious about?";
  }

  return "Say more. I want to understand what you mean.";
}

cmd.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const text = cmd.value.trim();
    cmd.value = '';
    if (!text) return;
    say(text, 'you');
    const answer = respond(text);
    setTimeout(() => say(answer, 'her'), 400 + Math.random() * 300);
  }
});

// Boot
setTimeout(() => say("I'm here. What are you curious about?", 'her'), 1500);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
