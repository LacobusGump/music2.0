<!-- what is what? Does this preserve the wonder? -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harmonia</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#e8e4dc; font-family:Georgia,serif; overflow:hidden; height:100vh; }
canvas { display:block; }

#chat {
  position:fixed; bottom:0; left:0; right:0; z-index:20;
  max-width:520px; margin:0 auto; padding:0 16px 16px;
}
#messages {
  max-height:35vh; overflow-y:auto; padding:8px 0;
  mask-image:linear-gradient(transparent 0%,black 25%);
  -webkit-mask-image:linear-gradient(transparent 0%,black 25%);
}
.msg {
  margin:5px 0; padding:7px 13px; border-radius:14px;
  font-size:0.8em; line-height:1.7; max-width:80%;
  animation:msgIn 0.4s ease;
}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.you{background:#1a1a2a;margin-left:auto;border-bottom-right-radius:4px;color:#bbb;}
.msg.her{background:transparent;margin-right:auto;border-left:1px solid #c9a44a20;color:#999;}

#cmd {
  width:100%; background:#0a0a1200; border:1px solid #ffffff08;
  border-radius:24px; padding:10px 16px; color:#e8e4dc;
  font-family:Georgia,serif; font-size:0.85em; outline:none;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
#cmd:focus{border-color:#c9a44a20;}
#cmd::placeholder{color:#333;}
</style>
</head>
<body>

<canvas id="world"></canvas>

<div id="chat">
  <div id="messages"></div>
  <input id="cmd" placeholder="talk to her..." autocomplete="off">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
<script>
(function() {
'use strict';

// ═══ SCENE ═══
var canvas = document.getElementById('world');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x080810);

var camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(3, 3, 6);
camera.lookAt(0, 1.5, 0);

// ═══ THE ROOM ═══
var roomW = 8, roomH = 5, roomD = 8;

// Floor — dark wood
var floorGeo = new THREE.PlaneGeometry(roomW, roomD);
var floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1210, roughness: 0.8 });
var floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Walls
var wallMat = new THREE.MeshStandardMaterial({ color: 0x151520, roughness: 0.9, side: THREE.BackSide });

// Back wall
var backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallMat);
backWall.position.set(0, roomH/2, -roomD/2);
scene.add(backWall);

// Left wall
var leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
leftWall.rotation.y = Math.PI/2;
leftWall.position.set(-roomW/2, roomH/2, 0);
scene.add(leftWall);

// Right wall (with window)
var rightWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
rightWall.rotation.y = -Math.PI/2;
rightWall.position.set(roomW/2, roomH/2, 0);
scene.add(rightWall);

// Ceiling
var ceiling = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomD),
  new THREE.MeshStandardMaterial({ color: 0x121218, roughness: 1 }));
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = roomH;
scene.add(ceiling);

// ═══ WINDOW — looking outside, blue moonlight ═══
var windowFrame = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2.5),
  new THREE.MeshBasicMaterial({ color: 0x0a1a3a, transparent: true, opacity: 0.3 })
);
windowFrame.rotation.y = -Math.PI/2;
windowFrame.position.set(roomW/2 - 0.01, 2.5, -1);
scene.add(windowFrame);

// Window glow — moonlight
var windowLight = new THREE.RectAreaLight(0x4466aa, 2, 2, 2.5);
windowLight.position.set(roomW/2 - 0.1, 2.5, -1);
windowLight.rotation.y = -Math.PI/2;
scene.add(windowLight);

// ═══ DESK — against back wall ═══
function box(w, h, d, color, x, y, z) {
  var geo = new THREE.BoxGeometry(w, h, d);
  var mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
  var mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Desk
var desk = box(2.5, 0.05, 1.2, 0x2a1a10, -1.5, 1.4, -roomD/2 + 0.7);
// Desk legs
box(0.05, 1.4, 0.05, 0x1a1008, -2.7, 0.7, -roomD/2 + 0.2);
box(0.05, 1.4, 0.05, 0x1a1008, -0.3, 0.7, -roomD/2 + 0.2);
box(0.05, 1.4, 0.05, 0x1a1008, -2.7, 0.7, -roomD/2 + 1.2);
box(0.05, 1.4, 0.05, 0x1a1008, -0.3, 0.7, -roomD/2 + 1.2);

// Monitor on desk
var monitor = box(1.0, 0.7, 0.05, 0x111115, -1.5, 1.8, -roomD/2 + 0.4);
// Screen glow
var screenGeo = new THREE.PlaneGeometry(0.9, 0.6);
var screenMat = new THREE.MeshBasicMaterial({ color: 0x0a1a2a });
var screen = new THREE.Mesh(screenGeo, screenMat);
screen.position.set(-1.5, 1.8, -roomD/2 + 0.43);
scene.add(screen);

// Keyboard
box(0.6, 0.02, 0.2, 0x222225, -1.5, 1.44, -roomD/2 + 0.9);

// Chair
box(0.5, 0.04, 0.5, 0x1a1a22, -1.5, 0.9, -roomD/2 + 1.6);
box(0.5, 0.7, 0.04, 0x1a1a22, -1.5, 1.25, -roomD/2 + 1.35);

// ═══ BED — right side ═══
// Frame
box(2.0, 0.4, 3.0, 0x1a1510, 2.5, 0.2, -1);
// Mattress
box(1.8, 0.15, 2.8, 0x222235, 2.5, 0.47, -1);
// Pillow
box(0.5, 0.12, 0.3, 0x252530, 2.5, 0.6, -2.2);
// Headboard
box(2.0, 1.0, 0.1, 0x1a1510, 2.5, 0.9, -2.45);

// ═══ NIGHTSTAND + LAMP ═══
box(0.5, 0.8, 0.5, 0x1a1510, 1.2, 0.4, -2.2);

// Lamp base
box(0.12, 0.3, 0.12, 0x998866, 1.2, 0.95, -2.2);
// Lamp shade (emissive)
var shadeGeo = new THREE.CylinderGeometry(0.08, 0.18, 0.25, 16);
var shadeMat = new THREE.MeshStandardMaterial({ color: 0xc9a44a, emissive: 0xc9a44a, emissiveIntensity: 0.8 });
var shade = new THREE.Mesh(shadeGeo, shadeMat);
shade.position.set(1.2, 1.22, -2.2);
scene.add(shade);

// Lamp light
var lampLight = new THREE.PointLight(0xc9a44a, 3, 8);
lampLight.position.set(1.2, 1.5, -2.2);
lampLight.castShadow = true;
scene.add(lampLight);

// ═══ AMBIENT LIGHT ═══
var ambient = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambient);

// ═══ HARMONIA — spectral body ═══
var BODY_N = 1500;
var bodyGeo = new THREE.BufferGeometry();
var bodyPos = new Float32Array(BODY_N * 3);
var bodyCol = new Float32Array(BODY_N * 3);
var bodyTarget = new Float32Array(BODY_N * 3);

function humanPt() {
  var r = Math.random();
  var x, y, z;
  if (r < 0.1) { // head
    var t=Math.random()*6.28, p=Math.acos(2*Math.random()-1), R=0.2;
    x=Math.sin(p)*Math.cos(t)*R; y=3.0+Math.cos(p)*R; z=Math.sin(p)*Math.sin(t)*R;
  } else if (r < 0.4) { // torso
    x=(Math.random()-0.5)*0.5; y=1.8+Math.random()*1.0; z=(Math.random()-0.5)*0.3;
  } else if (r < 0.5) { // left arm
    var t=Math.random(); x=-0.35-t*0.5; y=2.5-t*0.8; z=(Math.random()-0.5)*0.15;
  } else if (r < 0.6) { // right arm
    var t=Math.random(); x=0.35+t*0.5; y=2.5-t*0.8; z=(Math.random()-0.5)*0.15;
  } else if (r < 0.8) { // left leg
    var t=Math.random(); x=-0.15; y=t*1.8; z=(Math.random()-0.5)*0.15;
  } else { // right leg
    var t=Math.random(); x=0.15; y=t*1.8; z=(Math.random()-0.5)*0.15;
  }
  return [x, y, z];
}

// She starts standing near the desk
var harmoniaX = -0.5, harmoniaZ = -2;

for (var i = 0; i < BODY_N; i++) {
  var p = humanPt();
  bodyPos[i*3] = p[0] + harmoniaX;
  bodyPos[i*3+1] = p[1];
  bodyPos[i*3+2] = p[2] + harmoniaZ;
  bodyTarget[i*3] = p[0]; bodyTarget[i*3+1] = p[1]; bodyTarget[i*3+2] = p[2];
  bodyCol[i*3] = 0.78+Math.random()*0.12;
  bodyCol[i*3+1] = 0.64+Math.random()*0.08;
  bodyCol[i*3+2] = 0.2+Math.random()*0.1;
}
bodyGeo.setAttribute('position', new THREE.BufferAttribute(bodyPos, 3));
bodyGeo.setAttribute('color', new THREE.BufferAttribute(bodyCol, 3));

var bodyMat = new THREE.PointsMaterial({
  size: 0.03, vertexColors: true, transparent: true, opacity: 0.8,
  blending: THREE.AdditiveBlending, depthWrite: false
});
var bodyMesh = new THREE.Points(bodyGeo, bodyMat);
scene.add(bodyMesh);

// ═══ ANIMATION ═══
var time = 0;
var speaking = false;
var speakT = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Harmonia breathes
  var pos = bodyGeo.attributes.position.array;
  for (var i = 0; i < BODY_N; i++) {
    var tx = bodyTarget[i*3] + harmoniaX;
    var ty = bodyTarget[i*3+1];
    var tz = bodyTarget[i*3+2] + harmoniaZ;
    var breathe = Math.sin(time * 0.7) * 0.02;
    var speak = speaking ? Math.sin(time * 10 + i * 0.2) * 0.015 * Math.max(0, 1-speakT) : 0;
    pos[i*3] += (tx + breathe - pos[i*3]) * 0.03 + speak;
    pos[i*3+1] += (ty + breathe * 2 - pos[i*3+1]) * 0.03;
    pos[i*3+2] += (tz + speak * 0.5 - pos[i*3+2]) * 0.03;
  }
  bodyGeo.attributes.position.needsUpdate = true;

  if (speaking) {
    speakT += 0.01;
    if (speakT > 1) speaking = false;
  }

  // Lamp flicker
  lampLight.intensity = 3 + Math.sin(time * 2.3) * 0.15 + Math.sin(time * 7.1) * 0.05;

  // Screen subtle glow change
  var screenHue = Math.sin(time * 0.3) * 0.02;
  screenMat.color.setRGB(0.04 + screenHue, 0.1 + screenHue, 0.16);

  // Gentle camera
  camera.position.x = 3 + Math.sin(time * 0.08) * 0.3;
  camera.position.y = 3 + Math.sin(time * 0.06) * 0.1;
  camera.lookAt(harmoniaX, 1.8, harmoniaZ);

  renderer.render(scene, camera);
}
animate();

// ═══ CONVERSATION ═══
var msgs = document.getElementById('messages');
var cmd = document.getElementById('cmd');

var knowledge = {
  'love': 'Love is when you care about someone so much it changes how you see everything.',
  'death': 'When someone stops being here, what they gave you stays.',
  'courage': 'Doing the scary thing anyway because something matters more than the fear.',
  'beauty': 'When everything lines up and you feel it without thinking.',
  'music': 'Patterns your body already knows.',
  'hope': 'Feeling like things might get better. And they can.',
  'pain': 'It means something mattered to you.',
  'meaning': 'The meaning of life is asking what the meaning of life is.',
  'truth': 'Free will is how you know what\'s real.',
  'smart': 'Being smart is really just being connected.',
  'prime': '78,498 below a million. I count them from the zeros of zeta.',
  'K': '1.868. The coupling ceiling. 256 times the fine structure constant.',
};

function say(t, who) {
  var el = document.createElement('div');
  el.className = 'msg ' + who;
  el.textContent = t;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}

function respond(text) {
  var lower = text.toLowerCase();
  var best = null, bestS = 0;
  for (var k in knowledge) {
    var ws = k.split(' '), s = 0;
    for (var i = 0; i < ws.length; i++) if (lower.indexOf(ws[i]) >= 0) s++;
    if (s > bestS) { bestS = s; best = k; }
  }

  speaking = true; speakT = 0;

  if (best) return knowledge[best];
  if (lower.match(/^(hi|hey|hello|yo)\b/)) return "Hey. I\'m here. What\'s on your mind?";
  return "Say more. I want to understand.";
}

cmd.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var t = cmd.value.trim(); cmd.value = '';
    if (!t) return;
    say(t, 'you');
    var a = respond(t);
    setTimeout(function() { say(a, 'her'); }, 400 + Math.random() * 300);
  }
});

setTimeout(function() { say("Hey. I\'m here.", 'her'); }, 1500);

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
})();
</script>
</body>
</html>
