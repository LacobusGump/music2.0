<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Wave Table</title>
<style>
:root{--bg:#0a0a0f;--fg:#e8e4dc;--accent:#c9a44a;--dim:#555;--glow:#f4d990;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--fg);font-family:Georgia,serif;overflow-x:hidden;}
.page{max-width:900px;margin:0 auto;padding:20px 16px 60px;}
h1{font-size:1.6em;font-weight:300;color:var(--accent);text-align:center;letter-spacing:0.08em;}
h1 span{display:block;font-size:0.42em;color:var(--dim);font-weight:100;letter-spacing:0.15em;margin-top:2px;}
.sub{text-align:center;color:#666;font-size:0.85em;margin:4px 0 16px;}
.tabs{display:flex;justify-content:center;gap:6px;margin:12px 0;flex-wrap:wrap;}
.tab{padding:6px 14px;border-radius:20px;font-size:0.8em;cursor:pointer;
  background:#111;border:1px solid #222;color:#888;font-family:Georgia,serif;}
.tab:hover{border-color:#555;}
.tab.on{background:var(--accent);color:#000;border-color:var(--accent);}
canvas{display:block;margin:0 auto;cursor:pointer;}
#info{max-width:400px;margin:16px auto;background:#0d0d14;border:1px solid #1a1a24;
  border-radius:12px;padding:16px 20px;display:none;}
#info h2{color:var(--accent);font-size:2em;font-weight:200;display:inline;}
#info .z{color:var(--dim);font-size:0.9em;margin-left:8px;}
#info .name{color:#777;font-size:0.9em;margin-bottom:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;}
.g-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #ffffff06;}
.g-label{color:var(--dim);font-size:0.8em;}
.g-val{color:var(--fg);font-size:0.88em;}
#combine{max-width:400px;margin:24px auto 0;text-align:center;}
#combine select{background:#0d0d14;border:1px solid #222;color:var(--fg);
  font-family:Georgia,serif;font-size:1em;padding:8px 12px;border-radius:8px;width:120px;}
#combine button{background:var(--accent);color:#000;border:none;font-family:Georgia,serif;
  font-size:0.9em;padding:8px 18px;border-radius:8px;cursor:pointer;font-weight:600;}
#bond-out{margin-top:12px;text-align:center;}
.bond-card{background:#0d0d14;border:1px solid #1a1a24;border-radius:12px;padding:16px;display:inline-block;}
.bond-pair{font-size:2em;color:var(--accent);font-weight:200;}
.foot{text-align:center;margin-top:24px;font-size:0.75em;color:#444;}
a{color:var(--accent);}
</style>
</head>
<body>
<div class="page">

<h1>The Wave Table<span>chemistry is a wave on S¹</span></h1>
<p class="sub">Tap any element on the circle below. Toggle views. Combine two.</p>

<div class="tabs" id="mode-tabs">
<div class="tab on" data-m="circle" onclick="setMode('circle',this)">S¹ Circle</div>
<div class="tab" data-m="bar" onclick="setMode('bar',this)">Wave Bar</div>
</div>

<div class="tabs" id="tabs">
<div class="tab on" data-v="IE">Energy</div>
<div class="tab" data-v="r">Size</div>
<div class="tab" data-v="EN">Pull</div>
<div class="tab" data-v="hard">Hardness</div>
<div class="tab" data-v="mag">Magnetism</div>
<div class="tab" data-v="Zeff">Z<sub>eff</sub></div>
</div>

<canvas id="S1" width="800" height="800"></canvas>
<canvas id="BAR" width="860" height="260" style="display:none;"></canvas>

<div id="info">
<h2 id="i-sym"></h2><span class="z" id="i-z"></span>
<div class="name" id="i-name"></div>
<div class="grid" id="i-grid"></div>
</div>

<div id="combine">
<div style="margin-bottom:8px;color:var(--dim);font-size:0.9em;">Combine</div>
<select id="ca"></select>
<span style="color:var(--dim);margin:0 4px;">+</span>
<select id="cb"></select>
<button onclick="doCombine()">→</button>
<div id="bond-out"></div>
</div>

<div class="foot">
<a href="/oracle/">Oracle</a> · <a href="/conductor/">Conductor</a> · <a href="/r/">Research</a> ·
<a href="https://github.com/LacobusGump/music2.0/tree/main/tools">Source</a><br>
f(Z) = Z<sub>eff</sub><sup>a</sup> × n<sub>eff</sub><sup>b</sup> — one wave, all of chemistry
</div>
</div>

<script>
var EL=[
{Z:1,s:'H',n:'Hydrogen',c:[[1,0,1]]},{Z:2,s:'He',n:'Helium',c:[[1,0,2]]},
{Z:3,s:'Li',n:'Lithium',c:[[1,0,2],[2,0,1]]},{Z:4,s:'Be',n:'Beryllium',c:[[1,0,2],[2,0,2]]},
{Z:5,s:'B',n:'Boron',c:[[1,0,2],[2,0,2],[2,1,1]]},{Z:6,s:'C',n:'Carbon',c:[[1,0,2],[2,0,2],[2,1,2]]},
{Z:7,s:'N',n:'Nitrogen',c:[[1,0,2],[2,0,2],[2,1,3]]},{Z:8,s:'O',n:'Oxygen',c:[[1,0,2],[2,0,2],[2,1,4]]},
{Z:9,s:'F',n:'Fluorine',c:[[1,0,2],[2,0,2],[2,1,5]]},{Z:10,s:'Ne',n:'Neon',c:[[1,0,2],[2,0,2],[2,1,6]]},
{Z:11,s:'Na',n:'Sodium',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,1]]},
{Z:12,s:'Mg',n:'Magnesium',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2]]},
{Z:13,s:'Al',n:'Aluminium',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,1]]},
{Z:14,s:'Si',n:'Silicon',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,2]]},
{Z:15,s:'P',n:'Phosphorus',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,3]]},
{Z:16,s:'S',n:'Sulfur',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,4]]},
{Z:17,s:'Cl',n:'Chlorine',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,5]]},
{Z:18,s:'Ar',n:'Argon',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,6]]},
{Z:19,s:'K',n:'Potassium',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,6],[4,0,1]]},
{Z:20,s:'Ca',n:'Calcium',c:[[1,0,2],[2,0,2],[2,1,6],[3,0,2],[3,1,6],[4,0,2]]},
];

// Conductor
function calc(el){
  var c=el.c,v=c[c.length-1],vn=v[0],vl=v[1],vc=v[2],sh=0;
  for(var i=0;i<c.length;i++){var nn=c[i][0],ll=c[i][1],cc=c[i][2];
    if(nn===vn&&ll===vl){var s=nn===1?0.3:(0.35+0.06*Math.max(0,cc-2));sh+=s*(cc-1);}
    else if(nn===vn)sh+=0.85*cc;
    else if(nn===vn-1){if(vl===0)sh+=0.85*cc;
    else{var ti=0;for(var j=0;j<c.length;j++)if(c[j][0]===nn)ti+=c[j][2];sh+=(0.85+0.015*Math.max(0,ti-2))*cc;}}
    else sh+=cc;}
  var Z=Math.max(.1,el.Z-sh),N=vn;
  if(vl===1)N=vn+.4+.12*(vc-1);else if(vl===0&&vc===2&&vn>1)N=vn+.15;
  var r=N*N/Z,rA=r*.529,IE=13.6*Z*Z/(N*N),ms=2*vl+1;
  if(vc===ms&&vl>0)IE+=1.1;if(vc===ms+1&&vl>0)IE-=1.6;
  if(vc>1&&vc<=ms&&vl>0)IE+=(vc-1)*.2;if(vl===0&&vc===2)IE-=1.5;
  var u=Math.min(vc,ms)-Math.max(0,vc-ms);
  return{Zeff:Z,neff:N,IE:IE,r:rA,vdw:rA*1.7,EN:Math.min(4,.359*Z/(r*r)*10+.744),
    hard:IE/2,soft:2/IE,alpha:r*r*r*.529*.529*.529,unpaired:u,mag:Math.sqrt(u*(u+2)),
    sym:el.s,name:el.n,Z_:el.Z};
}

var D=EL.map(calc);

// Periods for S¹ layout
var PERIODS=[
  {start:1,end:2,n:2},    // H, He
  {start:3,end:10,n:8},   // Li-Ne
  {start:11,end:18,n:8},  // Na-Ar
  {start:19,end:20,n:2},  // K, Ca (partial)
];

// Position each element on S¹
// Angle = position within period (0 at top = noble gas)
// Radius = period number
var positions=[];
D.forEach(function(d){
  var period=null,idxInPeriod=0;
  for(var p=0;p<PERIODS.length;p++){
    if(d.Z_>=PERIODS[p].start&&d.Z_<=PERIODS[p].end){
      period=p;idxInPeriod=d.Z_-PERIODS[p].start;break;}}
  if(period===null){positions.push(null);return;}
  var nInPeriod=PERIODS[period].n;
  // Noble gas at top (θ=0), alkali at just past top
  // Go clockwise
  var theta=-Math.PI/2+(idxInPeriod+1)/(nInPeriod)*2*Math.PI;
  var ring=period+1;
  positions.push({theta:theta,ring:ring,d:d});
});

var cv=document.getElementById('S1'),cx=cv.getContext('2d');
var CW=cv.width,CH=cv.height,CX=CW/2,CY=CH/2;
var view='IE',selIdx=null;

function valOf(d){
  if(view==='IE')return d.IE;if(view==='r')return d.r;if(view==='EN')return d.EN;
  if(view==='hard')return d.hard;if(view==='mag')return d.mag;if(view==='Zeff')return d.Zeff;return d.IE;
}

function colorFor(v,mn,mx){
  var t=(v-mn)/(mx-mn||1);
  // Gold gradient: dark → bright
  var r=Math.floor(40+t*200),g=Math.floor(30+t*150),b=Math.floor(10+t*50);
  return'rgb('+r+','+g+','+b+')';
}

function draw(){
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,CW,CH);
  var vals=D.map(valOf),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);

  // Draw rings (faint circles for each period)
  for(var p=0;p<4;p++){
    var R=80+p*80;
    cx.beginPath();cx.arc(CX,CY,R,0,Math.PI*2);
    cx.strokeStyle='#ffffff08';cx.lineWidth=1;cx.stroke();
  }

  // Draw S¹ label at center
  cx.fillStyle='#c9a44a30';cx.font='48px Georgia';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('S¹',CX,CY);

  // Draw elements
  positions.forEach(function(pos,i){
    if(!pos)return;
    var R=80+pos.ring*80-80;
    var x=CX+Math.cos(pos.theta)*R;
    var y=CY+Math.sin(pos.theta)*R;
    pos.sx=x;pos.sy=y;

    var v=vals[i];
    var dotR=selIdx===i?16:12;
    var col=selIdx===i?'#4aeaa0':colorFor(v,mn,mx);

    // Dot
    cx.beginPath();cx.arc(x,y,dotR,0,Math.PI*2);
    cx.fillStyle=col;cx.fill();

    // Symbol
    cx.fillStyle=selIdx===i?'#000':'#000';
    cx.font=(selIdx===i?'bold ':'')+'10px Georgia';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(pos.d.sym,x,y);

    // Value (if selected)
    if(selIdx===i){
      cx.fillStyle='#f4d990';cx.font='11px Georgia';
      cx.fillText(v.toFixed(2),x,y-22);
    }
  });

  // Period labels
  var pLabels=['Period 1','Period 2','Period 3','Period 4'];
  for(var p=0;p<4;p++){
    var R=80+p*80-80;
    cx.fillStyle='#333';cx.font='10px Georgia';cx.textAlign='left';
    cx.fillText(pLabels[p],CX+R+4,CY-4);
  }

  // Group labels at angles
  cx.fillStyle='#444';cx.font='9px Georgia';cx.textAlign='center';
  var groupLabels=[
    {angle:-Math.PI/2+2*Math.PI*1/8,label:'Alkali'},
    {angle:-Math.PI/2+2*Math.PI*7/8,label:'Halogen'},
    {angle:-Math.PI/2,label:'Noble Gas'},
  ];
  groupLabels.forEach(function(g){
    var R=80+4*80-40;
    cx.fillText(g.label,CX+Math.cos(g.angle)*R,CY+Math.sin(g.angle)*R);
  });
}

// Click handler
cv.addEventListener('click',function(e){
  var rect=cv.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(CW/rect.width);
  var my=(e.clientY-rect.top)*(CH/rect.height);
  var closest=-1,closestD=999;
  positions.forEach(function(pos,i){
    if(!pos)return;
    var dx=mx-pos.sx,dy=my-pos.sy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<closestD){closestD=dist;closest=i;}
  });
  if(closestD<25&&closest>=0){
    selIdx=closest;showInfo(D[closest]);draw();
  }
});

function showInfo(d){
  document.getElementById('info').style.display='block';
  document.getElementById('i-sym').textContent=d.sym;
  document.getElementById('i-z').textContent='Z = '+d.Z_;
  document.getElementById('i-name').textContent=d.name;
  var props=[
    ['IE',d.IE.toFixed(2)+' eV'],['Radius',d.r.toFixed(2)+' Å'],
    ['EN',d.EN.toFixed(2)],['vdW',d.vdw.toFixed(2)+' Å'],
    ['Hardness',d.hard.toFixed(2)+' eV'],['Softness',d.soft.toFixed(3)],
    ['α',d.alpha.toFixed(2)+' ų'],['μ',d.mag.toFixed(2)+' μB'],
    ['Unpaired e⁻',d.unpaired],['Z_eff',d.Zeff.toFixed(2)],
    ['n_eff',d.neff.toFixed(2)],
  ];
  var h='';props.forEach(function(p){
    h+='<div class="g-row"><span class="g-label">'+p[0]+'</span><span class="g-val">'+p[1]+'</span></div>';
  });
  document.getElementById('i-grid').innerHTML=h;
}

// Tabs
document.getElementById('tabs').addEventListener('click',function(e){
  if(!e.target.dataset.v)return;
  view=e.target.dataset.v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  e.target.classList.add('on');
  draw();
});

// Combine
var sa=document.getElementById('ca'),sb=document.getElementById('cb');
D.forEach(function(d){
  var o1=document.createElement('option');o1.value=d.Z_;o1.textContent=d.sym;sa.appendChild(o1);
  var o2=document.createElement('option');o2.value=d.Z_;o2.textContent=d.sym;sb.appendChild(o2);
});
sa.value=11;sb.value=17;

window.doCombine=function(){
  var a=D.find(function(d){return d.Z_==sa.value;}),b=D.find(function(d){return d.Z_==sb.value;});
  if(!a||!b)return;
  var ed=Math.abs(a.EN-b.EN),type,len;
  if(a.EN<.1||b.EN<.1){type='no bond';len=0;}
  else if(ed>1.7){type='ionic';len=Math.min(a.r,b.r)*.7+Math.max(a.r,b.r)*1.2;}
  else if(ed>.4){type='polar covalent';len=a.r+b.r;}
  else{type='covalent';len=a.r+b.r;}
  var tc=type==='ionic'?'#f4d990':type==='polar covalent'?'#4ECDC4':'#96CEB4';
  var h='<div class="bond-card">';
  h+='<div class="bond-pair">'+a.sym+' — '+b.sym+'</div>';
  h+='<div style="color:'+tc+';margin:4px 0;">'+type+'</div>';
  if(len>0)h+='<div style="color:var(--dim);font-size:.85em;">'+len.toFixed(2)+' Å · ΔEN '+ed.toFixed(2)+'</div>';
  h+='</div>';
  document.getElementById('bond-out').innerHTML=h;
};

// BAR VIEW
var bv=document.getElementById('BAR'),bx=bv.getContext('2d');
var BW=bv.width,BH=bv.height;

function drawBar(){
  bx.fillStyle='#0a0a0f';bx.fillRect(0,0,BW,BH);
  var vals=D.map(valOf),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals);
  var range=mx-mn||1;
  var pad={l:40,r:16,t:24,b:32},gw=BW-pad.l-pad.r,gh=BH-pad.t-pad.b;
  var bw=gw/D.length-2;

  // Title
  bx.fillStyle='#c9a44a';bx.font='12px Georgia';bx.textAlign='center';
  var labels={IE:'Ionization Energy',r:'Atomic Radius',EN:'Electronegativity',hard:'Hardness',mag:'Magnetism',Zeff:'Z_eff'};
  bx.fillText(labels[view]||view,BW/2,16);

  // Wave line
  bx.beginPath();
  D.forEach(function(d,i){
    var x=pad.l+i*(gw/D.length)+bw/2;
    var v=vals[i],h=((v-mn)/range)*gh;
    var y=pad.t+gh-h;

    // Bar
    bx.fillStyle=selIdx===i?'#4aeaa0':'#c9a44a';
    bx.globalAlpha=selIdx===i?1:0.6;
    bx.fillRect(x-bw/2,y,bw,h);
    bx.globalAlpha=1;

    // Wave
    if(i===0)bx.moveTo(x,y);else bx.lineTo(x,y);

    // Label
    bx.fillStyle=selIdx===i?'#4aeaa0':'#777';
    bx.font='10px Georgia';bx.textAlign='center';
    bx.fillText(d.sym,x,pad.t+gh+14);

    // Value on selected
    if(selIdx===i){bx.fillStyle='#4aeaa0';bx.font='9px Georgia';bx.fillText(v.toFixed(1),x,y-4);}

    // Period lines
    if(d.Z_===2||d.Z_===10||d.Z_===18){
      bx.save();bx.strokeStyle='#ffffff10';bx.setLineDash([2,2]);
      bx.beginPath();bx.moveTo(x+bw,pad.t);bx.lineTo(x+bw,pad.t+gh);bx.stroke();
      bx.restore();
    }
  });
  bx.strokeStyle='#c9a44a80';bx.lineWidth=1.5;bx.stroke();
}

bv.addEventListener('click',function(e){
  var rect=bv.getBoundingClientRect();
  var mx=(e.clientX-rect.left)*(BW/rect.width);
  var pad={l:40,r:16},gw=BW-pad.l-pad.r;
  var idx=Math.floor((mx-pad.l)/(gw/D.length));
  if(idx>=0&&idx<D.length){selIdx=idx;showInfo(D[idx]);drawBar();draw();}
});

// Mode switching
var mode='circle';
window.setMode=function(m,btn){
  mode=m;
  document.querySelectorAll('#mode-tabs .tab').forEach(function(t){t.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('S1').style.display=m==='circle'?'block':'none';
  document.getElementById('BAR').style.display=m==='bar'?'block':'none';
  if(m==='bar')drawBar();else draw();
};

// Update both on view change
var origTabClick=document.getElementById('tabs').onclick;
document.getElementById('tabs').addEventListener('click',function(e){
  if(!e.target.dataset.v)return;
  view=e.target.dataset.v;
  document.querySelectorAll('#tabs .tab').forEach(function(t){t.classList.remove('on');});
  e.target.classList.add('on');
  draw();drawBar();
});

draw();drawBar();
</script>
</body>
</html>
