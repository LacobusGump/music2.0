<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0706">
<title>The Open Orbit — 2O Spectral Determinant — beGump</title>
<meta name="description" content="A1 gives −0.036747. Target is −0.035999. The 2O computation is running. Magnitude is in range. The sign remains the open question.">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0706;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#label{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font:100 0.9em Georgia;color:#c9a44a;letter-spacing:0.35em;
  text-transform:uppercase;opacity:0.55;pointer-events:none;
  text-shadow:0 0 20px rgba(10,7,6,0.9);
}
#home{
  position:fixed;top:18px;left:20px;
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.58em;letter-spacing:0.12em;
  color:rgba(184,117,58,0.4);text-decoration:none;
  z-index:100;transition:color 0.3s;
}
#home:hover{color:#c9a44a;}
#meta{
  position:fixed;bottom:68px;left:50%;transform:translateX(-50%);
  font-family:'Courier New',monospace;font-size:0.62em;color:#7a6640;
  letter-spacing:0.08em;opacity:0.65;pointer-events:none;
  text-align:center;line-height:1.7;white-space:nowrap;
}
#claim{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%);
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.58em;letter-spacing:0.09em;
  color:#c9a44a;opacity:0.55;pointer-events:none;
  text-align:center;white-space:nowrap;
  text-shadow:0 0 12px rgba(10,7,6,0.9);
}
</style>
</head>
<body>
<a id="home" href="/music/">&larr; human</a>
<canvas id="C"></canvas>
<div id="label">The Open Orbit</div>
<div id="claim">A₁ = −0.036747 · Target = −0.035999 · Cycle 9: −0.04372 · Sign correct · Gap −0.008</div>
<div id="meta"></div>

<script>
(function(){
'use strict';

var cv = document.getElementById('C');
var ctx = cv.getContext('2d', {alpha: true});
var meta = document.getElementById('meta');
var W = 0, H = 0;
var DPR = Math.min(window.devicePixelRatio || 1, 2);

// 2O group data — affine E7(1) McKay correspondence
var kac = [1, 2, 3, 4, 3, 2, 1, 2];
var classWeights = [1, 18, 8, 8, 6, 6, 1, 1];

// Current best computation results — Cycle 9 (May 2026)
var A1_CLOSED   = -0.036747;
var TARGET      = -0.035999;
var RESOLUTION  = -0.097992; // G/h = 48/18 first-principles (old normalization killed)
var OSCILLATORY =  0.000007; // ~7e-6 after per-class eta regularization (negligible)
var ORBIFOLD    =  0.007046; // full 8-irrep McKay-weighted (old sin² proxy killed)
var CROSSTERM   = -0.013310; // intrinsic McKay-adjacency (osc-slaved version killed)
var ESTIMATE    = -0.043720; // best 3-front Cycle 9 (correct sign; gap -0.00772)

var lastMetaUpdate = -1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width = W * DPR;
  cv.height = H * DPR;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize, {passive: true});
resize();

function draw(now) {
  var time = now * 0.000012;

  // Gentle breathing — makes the estimate feel alive without changing the data
  var estimate = ESTIMATE + Math.sin(now / 18000) * 0.0008;

  var cx = W / 2;
  var cy = H / 2 + 30;

  ctx.fillStyle = 'rgba(10,7,6,0.65)';
  ctx.fillRect(0, 0, W, H);

  // 8 Kac nodes — affine E7 resolution labels [1,2,3,4,3,2,1,2]
  for (var i = 0; i < 8; i++) {
    var x = cx - 220 + i * 63;
    var hgt = 80 + kac[i] * 38;
    var y1 = cy + 180;
    var y2 = y1 - hgt * (0.6 + Math.sin(time * 0.4 + i) * 0.08);
    var a = 0.3 + (kac[i] / 4) * 0.35;
    ctx.strokeStyle = 'rgba(201,164,74,' + a + ')';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y1);
    ctx.lineTo(x, y2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(201,164,74,' + (a * 0.6) + ')';
    ctx.beginPath();
    ctx.arc(x, y2, 3.5 + kac[i] * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 8 conjugacy class agents orbiting (2O has 8 conjugacy classes)
  var orbitR = 175;
  for (var j = 0; j < 8; j++) {
    var phase = (j / 8) * Math.PI * 2 + time * (0.3 + (j % 3) * 0.05);
    var r = orbitR + Math.sin(time * 0.7 + j) * 18;
    var ox = cx + Math.cos(phase) * r;
    var oy = cy - 40 + Math.sin(phase) * r * 0.65;
    var w = classWeights[j];
    var size = 2.5 + w * 0.12;
    ctx.fillStyle = 'rgba(184,117,58,0.08)';
    ctx.beginPath();
    ctx.arc(ox, oy, size * 2.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(184,117,58,' + (0.55 + (w / 18) * 0.35) + ')';
    ctx.beginPath();
    ctx.arc(ox, oy, size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Central sum field — running spectral determinant estimate
  var sumR = 68 + Math.sin(time * 0.9) * 4 + (estimate + 0.01) * 180;
  var grad = ctx.createRadialGradient(cx, cy - 20, sumR * 0.4, cx, cy - 20, sumR * 1.8);
  grad.addColorStop(0, 'rgba(184,117,58,0.12)');
  grad.addColorStop(0.6, 'rgba(184,117,58,0.03)');
  grad.addColorStop(1, 'rgba(10,7,6,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy - 20, sumR * 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(201,164,74,0.75)';
  ctx.beginPath();
  ctx.arc(cx, cy - 20, sumR, 0, Math.PI * 2);
  ctx.fill();

  // Tension ring — shows distance remaining to target
  var tension = Math.abs(estimate - TARGET) * 420;
  ctx.strokeStyle = 'rgba(139,74,46,' + (0.25 + Math.min(0.5, tension * 0.008)) + ')';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy - 20, 52 + tension * 0.6, 0, Math.PI * 2);
  ctx.stroke();

  // Target horizon
  ctx.strokeStyle = 'rgba(201,164,74,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 210, cy + 95);
  ctx.lineTo(cx + 210, cy + 95);
  ctx.stroke();
  ctx.fillStyle = 'rgba(201,164,74,0.5)';
  ctx.fillRect(cx - 1.5, cy + 92, 3, 6);

  // Meta numbers — update at ~4 fps, not 60 fps
  if (now - lastMetaUpdate > 250) {
    meta.innerHTML =
      'A₁ closed ' + A1_CLOSED.toFixed(6) +
      '   Target ' + TARGET.toFixed(6) + '<br>' +
      '<span style="opacity:0.55">Resolution ' + RESOLUTION.toFixed(5) +
      '  ·  Orbifold ' + ORBIFOLD.toFixed(5) +
      '  ·  Cross ' + CROSSTERM.toFixed(5) + '</span><br>' +
      '<span style="opacity:0.4">Cycle 9 estimate ' + estimate.toFixed(5) + '  (3-front, correct sign)</span>';
    lastMetaUpdate = now;
  }

  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
})();
</script>
</body>
</html>
