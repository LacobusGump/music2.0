<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Body — The Human Machine</title>
<style>
:root{--bg:#0a0a0f;--fg:#e8e4dc;--accent:#c9a44a;--dim:#444;--green:#4aeaa0;--red:#f66;--blue:#4ea8de;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--fg);font-family:Georgia,serif;overflow-x:hidden;touch-action:manipulation;}
#search-wrap{position:fixed;top:0;left:0;right:0;z-index:100;background:#0a0a0fee;
  backdrop-filter:blur(12px);padding:10px 16px;max-width:800px;margin:0 auto;}
#q{width:100%;background:#0d0d14;border:1px solid #222;color:var(--fg);font-family:Georgia,serif;
  font-size:1em;padding:10px 16px;border-radius:24px;outline:none;}
#q:focus{border-color:var(--accent);}
#q::placeholder{color:#333;}
.page{max-width:800px;margin:0 auto;padding:52px 0 40px;}
#body-wrap{position:relative;width:100%;max-width:400px;margin:0 auto;aspect-ratio:0.4;cursor:pointer;}
canvas{display:block;width:100%;height:100%;}
#layers{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#0a0a0fee;
  backdrop-filter:blur(12px);padding:8px 16px;max-width:800px;margin:0 auto;
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}
.layer-btn{padding:5px 12px;border-radius:16px;font-size:0.75em;cursor:pointer;
  background:#111;border:1px solid #222;color:#666;font-family:Georgia,serif;}
.layer-btn.on{border-color:var(--accent);color:var(--accent);background:#1a1a10;}
#detail{max-width:800px;margin:0 auto;padding:0 16px;}
#detail-content{background:#0d0d14;border:1px solid #1a1a2a;border-radius:12px;
  padding:16px 20px;display:none;margin-top:8px;}
.detail-title{font-size:1.6em;font-weight:200;color:var(--accent);}
.detail-sub{color:var(--dim);font-size:0.85em;margin:4px 0 12px;}
.detail-section{margin:12px 0;}
.detail-label{color:var(--dim);font-size:0.7em;text-transform:uppercase;letter-spacing:0.1em;}
.detail-text{color:#999;font-size:0.9em;line-height:1.6;margin-top:4px;}
.detail-text.simple{color:var(--fg);font-size:1em;line-height:1.7;}
.bar-row{display:flex;align-items:center;gap:6px;margin:3px 0;}
.bar-name{color:#666;font-size:0.75em;width:70px;text-align:right;}
.bar-track{flex:1;height:5px;background:#111;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s;}
.toggle-depth{display:inline-block;padding:4px 12px;border-radius:12px;font-size:0.75em;
  cursor:pointer;border:1px solid #333;color:#666;margin:8px 4px 0 0;}
.toggle-depth.on{border-color:var(--accent);color:var(--accent);}
.heal-step{padding:8px 12px;margin:4px 0;border-radius:8px;background:#111;border-left:3px solid var(--dim);}
.heal-step.active{border-left-color:var(--green);}
a{color:var(--accent);}
</style>
</head>
<body>

<div id="search-wrap">
<input id="q" placeholder="search — cancer, knee, depression, bone fracture..."
  oninput="bodySearch(this.value)" autocomplete="off">
</div>

<div class="page">
<div id="body-wrap"><canvas id="C"></canvas></div>
<div id="detail"><div id="detail-content"></div></div>
</div>

<div id="layers">
<div class="layer-btn on" onclick="setLayer('anatomy',this)">Anatomy</div>
<div class="layer-btn" onclick="setLayer('blood',this)">Blood Flow</div>
<div class="layer-btn" onclick="setLayer('frequency',this)">Frequency</div>
<div class="layer-btn" onclick="setLayer('healing',this)">Healing</div>
</div>

<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H;
function resize(){var wrap=document.getElementById('body-wrap');W=cv.width=wrap.clientWidth*2;H=cv.height=wrap.clientWidth*2/0.4;cx.setTransform(2,0,0,2,0,0);}
resize();window.addEventListener('resize',resize);

var layer='anatomy',selectedRegion=null,highlight=null,showPhysics=false;

// ═══ BODY REGIONS ═══
var REGIONS=[
  {id:'brain',label:'Brain',x:0.5,y:0.06,w:0.12,h:0.06,
    simple:'Your command center. 86 billion neurons firing electrical signals.',
    physics:'Neural oscillators coupled at K. Healthy: flexible switching between gamma (40Hz) and alpha (10Hz). Disease: locked in one mode.',
    blood:0.15, stiffness:200, resonance:9.3,
    conditions:['depression','anxiety','alzheimer','parkinson','migraine','epilepsy','addiction'],
    healing:'Neuroplasticity — new connections form when you learn, move, and sleep. The brain rewires itself every day.',
  },
  {id:'eyes',label:'Eyes',x:0.5,y:0.08,w:0.08,h:0.02,
    simple:'Light enters. Signals sent to brain. You see.',
    physics:'Photoreceptors convert photons to electrical signals via rhodopsin conformational change at ~500nm.',
    blood:0.08, stiffness:1000, resonance:15,
    conditions:['macular degeneration','glaucoma','diabetic retinopathy'],
    healing:'Retinal cells don\'t regenerate. Prevention: blood sugar control + UV protection.',
  },
  {id:'heart',label:'Heart',x:0.48,y:0.22,w:0.08,h:0.07,
    simple:'Pumps blood everywhere. Beats 100,000 times a day. The delivery truck for your whole body.',
    physics:'Cardiomyocytes coupled at K→∞ (gap junctions). Pacemaker cells set ω. SA node: 60-100 Hz. The most tightly coupled oscillator in the body.',
    blood:0.05, stiffness:10000, resonance:39.1,
    conditions:['heart disease','arrhythmia','heart attack','heart failure'],
    healing:'Heart muscle barely regenerates. After heart attack: scar forms. Prevention is everything. Exercise strengthens the pump.',
  },
  {id:'lungs',label:'Lungs',x:0.5,y:0.22,w:0.16,h:0.10,
    simple:'Oxygen in, CO₂ out. Every breath feeds every cell.',
    physics:'Gas exchange across 70m² of alveolar surface. O₂ diffuses down concentration gradient. CO₂ diffuses out. Pure physics.',
    blood:0.10, stiffness:2000, resonance:20,
    conditions:['asthma','copd','pneumonia','lung cancer','covid'],
    healing:'Alveoli can regenerate from stem cells. Quitting smoking: lungs measurably improve within weeks.',
  },
  {id:'liver',label:'Liver',x:0.42,y:0.32,w:0.10,h:0.07,
    simple:'Your filter. Cleans blood, processes nutrients, makes bile. The only organ that can regrow from 25%.',
    physics:'Hepatocytes: highest metabolic rate of any cell. Stiffness increases with fibrosis (2→12→25 kPa). Elastography measures this.',
    blood:0.25, stiffness:2000, resonance:22,
    conditions:['fatty liver','hepatitis','cirrhosis','liver cancer'],
    healing:'The liver regenerates. Even after removing 75%, it grows back in weeks. Unique among organs.',
  },
  {id:'stomach',label:'Stomach & Gut',x:0.5,y:0.36,w:0.12,h:0.08,
    simple:'Digests food. But also: 70% of your immune system lives here. Your gut talks to your brain.',
    physics:'Gut microbiome: 100 trillion bacteria. Their metabolites (butyrate, serotonin) are signaling molecules. The gut-brain axis is bidirectional coupling.',
    blood:0.15, stiffness:1000, resonance:15,
    conditions:['ibs','crohn','ulcer','leaky gut','gut health','microbiome'],
    healing:'Gut lining replaces itself every 3-5 days. Fastest regenerating tissue. Fiber feeds the good bacteria.',
  },
  {id:'kidneys',label:'Kidneys',x:0.5,y:0.35,w:0.14,h:0.05,
    simple:'Filter your blood. Make urine. Control blood pressure. You have two — can survive with one.',
    physics:'1 million nephrons per kidney. Each a tiny filter operating by pressure gradients. Stiffness: 5 kPa healthy, increases with disease.',
    blood:0.20, stiffness:5000, resonance:35,
    conditions:['kidney disease','kidney stones','uti'],
    healing:'Nephrons don\'t regenerate. Protect what you have: hydrate, control blood pressure, limit NSAIDs.',
  },
  {id:'spine',label:'Spine',x:0.5,y:0.32,w:0.06,h:0.20,
    simple:'23 discs cushion 33 vertebrae. Protects the spinal cord. When discs wear out: back pain.',
    physics:'Discs are avascular after age 20 — same problem as cartilage. No blood = no maintenance = degeneration. Stiffness drops as disc degenerates.',
    blood:0.02, stiffness:700, resonance:20,
    conditions:['back pain','herniated disc','sciatica','spinal stenosis','scoliosis'],
    healing:'Discs barely heal. Movement pumps nutrients in (like cartilage). Core strength reduces load. Prevention > cure.',
  },
  {id:'shoulder',label:'Shoulder',x:0.35,y:0.18,w:0.06,h:0.06,
    simple:'Most mobile joint in the body. That flexibility comes at a cost: easier to injure.',
    physics:'Ball-and-socket joint. Rotator cuff = 4 muscles holding the ball in place. Tendons are collagen — Amide I at 1660 cm⁻¹.',
    blood:0.08, stiffness:5000, resonance:35,
    conditions:['rotator cuff','frozen shoulder','dislocation'],
    healing:'Tendons heal slowly (limited blood supply). PRP can help. Gradual loading rebuilds collagen alignment.',
  },
  {id:'hip',label:'Hip',x:0.42,y:0.46,w:0.06,h:0.06,
    simple:'Ball-and-socket joint that bears your full weight. Built to last — when the cartilage holds.',
    physics:'Cartilage: 2-4mm thick, avascular, E≈700 Pa. Same failure mode as knee. Load: 3-5× body weight walking.',
    blood:0.05, stiffness:700, resonance:20,
    conditions:['hip arthritis','hip fracture','hip replacement','bursitis'],
    healing:'Same as knee: movement pumps synovial fluid. PRP may help. Weight management critical.',
  },
  {id:'knee',label:'Knee',x:0.44,y:0.58,w:0.06,h:0.07,
    simple:'The biggest joint. Cartilage cushions bone-on-bone. No blood supply to cartilage — that\'s why it wears out.',
    physics:'Avascular cartilage: E≈700 Pa, resonance ~20 kHz. No blood = no IR delivery = no maintenance. Synovial fluid is the ONLY nutrient path. Movement pumps it.',
    blood:0.01, stiffness:700, resonance:20,
    conditions:['knee arthritis','torn meniscus','acl tear','knee pain','osteoarthritis'],
    healing:'PRP delivers growth factors (WAKE). Movement pumps synovial fluid (FEED). Heat increases local circulation (SUPPORT). Rest lets cells build (GROW). Repeat.',
  },
  {id:'ankle',label:'Ankle & Foot',x:0.45,y:0.72,w:0.06,h:0.08,
    simple:'26 bones per foot. Absorbs impact of every step. Achilles tendon: strongest tendon in the body.',
    physics:'Achilles tendon: E≈1.2 GPa. Collagen fibers aligned along force direction. Plantar fascia: E≈350 MPa.',
    blood:0.04, stiffness:1200000000, resonance:1000,
    conditions:['plantar fasciitis','achilles','ankle sprain','fracture'],
    healing:'Tendons: slow healing (6-12 months). Gradual loading essential. Too much too soon = re-injury. Eccentric exercises proven for Achilles.',
  },
  {id:'skin',label:'Skin',x:0.5,y:0.4,w:0.20,h:0.30,
    simple:'Your largest organ. 2 square meters. Barrier against everything. Replaces itself every 27 days.',
    physics:'Epidermis regenerates from stem cells in basal layer. Dermis: collagen + elastin matrix. E≈50 kPa. IR therapy FDA-cleared for wound healing.',
    blood:0.10, stiffness:50000, resonance:110,
    conditions:['eczema','psoriasis','skin cancer','wound','burn','aging skin'],
    healing:'Skin heals well (good blood supply). Chronic wounds fail when circulation is poor (diabetes, age). Warmth + moisture + nutrition = faster healing.',
  },
  {id:'blood',label:'Blood & Immune',x:0.5,y:0.30,w:0.20,h:0.20,
    simple:'5 liters of blood. Red cells carry oxygen. White cells fight invaders. Platelets seal wounds.',
    physics:'Blood: non-Newtonian fluid, E≈4 Pa. Clots: E≈1000 Pa (250× stiffer). This stiffness contrast enables sonothrombolysis.',
    blood:1.0, stiffness:4, resonance:3,
    conditions:['anemia','leukemia','blood clot','immune','autoimmune','allergy'],
    healing:'Blood regenerates from bone marrow stem cells. 200 billion red cells made per day. Sleep is when immune cells are built.',
  },
  {id:'bones',label:'Bones',x:0.5,y:0.40,w:0.14,h:0.30,
    simple:'206 bones. Living tissue — constantly rebuilding. Osteoblasts build. Osteoclasts remove. Balance = health.',
    physics:'Cortical bone: E≈15 GPa. Resonance very high. LIPUS at 1 kHz pulse promotes healing — FDA cleared since 1994. 38% faster fracture healing.',
    blood:0.05, stiffness:15000000000, resonance:120000,
    conditions:['fracture','osteoporosis','bone cancer'],
    healing:'Bones heal in 4 phases: inflammation (day 1-5), soft callus (week 1-3), hard callus (week 3-12), remodeling (month 3-12+). LIPUS accelerates all phases. Weight bearing helps.',
  },
];

// ═══ CONDITION → REGION MAPPING ═══
var COND_MAP={};
REGIONS.forEach(function(r){
  (r.conditions||[]).forEach(function(c){
    if(!COND_MAP[c])COND_MAP[c]=[];
    COND_MAP[c].push(r.id);
  });
});

// ═══ DRAW BODY ═══
function draw(){
  var w=W/2,h=H/2;
  cx.fillStyle='#0a0a0f';cx.fillRect(0,0,w,h);

  // Body silhouette
  cx.save();cx.translate(w*0.5,h*0.04);
  var s=Math.min(w*0.9,h*0.92);

  // Head
  drawOval(0,-s*0.01,s*0.08,s*0.06,'brain');
  // Neck
  cx.fillStyle=regionColor('spine',0.2);cx.fillRect(-s*0.02,s*0.05,s*0.04,s*0.03);
  // Torso
  drawTorso(s);
  // Arms
  drawArm(-1,s);drawArm(1,s);
  // Legs
  drawLeg(-1,s);drawLeg(1,s);

  // Region labels on hover/select
  if(selectedRegion){
    var r=REGIONS.find(function(r){return r.id===selectedRegion;});
    if(r){
      var rx=(r.x-0.5)*s*2,ry=r.y*s*2.2;
      cx.strokeStyle=var_accent();cx.lineWidth=1.5;cx.setLineDash([4,4]);
      cx.strokeRect(rx-r.w*s,ry-r.h*s*0.5,r.w*s*2,r.h*s*2);
      cx.setLineDash([]);
    }
  }

  cx.restore();

  // Frequency overlay
  if(layer==='frequency'){
    cx.globalAlpha=0.15;
    for(var i=0;i<w;i+=3){
      var y=h*0.5+Math.sin(i*0.05+Date.now()*0.002)*h*0.3;
      cx.fillStyle='#c9a44a';cx.fillRect(i,y,2,2);
    }
    cx.globalAlpha=1;
  }
}

function var_accent(){return'#c9a44a';}

function regionColor(id,alpha){
  if(highlight){
    var regions=COND_MAP[highlight]||[];
    if(regions.indexOf(id)>=0)return'rgba(255,100,100,'+(alpha+0.3)+')';
  }
  if(selectedRegion===id)return'rgba(74,234,160,'+(alpha+0.2)+')';
  if(layer==='blood'){
    var r=REGIONS.find(function(r){return r.id===id;});
    var bf=r?r.blood:0.1;
    return'rgba(200,50,50,'+(bf*0.8+0.1)+')';
  }
  return'rgba(201,164,74,'+alpha+')';
}

function drawOval(x,y,rx,ry,id){
  cx.fillStyle=regionColor(id,0.25);
  cx.beginPath();cx.ellipse(x,y,rx,ry,0,0,Math.PI*2);cx.fill();
  cx.strokeStyle=regionColor(id,0.5);cx.lineWidth=1;cx.stroke();
}

function drawTorso(s){
  cx.fillStyle=regionColor('heart',0.15);
  cx.beginPath();
  cx.moveTo(-s*0.12,s*0.08);cx.lineTo(s*0.12,s*0.08);
  cx.lineTo(s*0.10,s*0.38);cx.lineTo(-s*0.10,s*0.38);
  cx.closePath();cx.fill();
  cx.strokeStyle=regionColor('stomach',0.3);cx.lineWidth=1;cx.stroke();
  // Heart dot
  cx.fillStyle=regionColor('heart',0.6);
  cx.beginPath();cx.arc(-s*0.02,s*0.16,s*0.02,0,Math.PI*2);cx.fill();
  // Lung outlines
  cx.strokeStyle=regionColor('lungs',0.3);
  cx.beginPath();cx.ellipse(-s*0.06,s*0.15,s*0.04,s*0.06,0,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.ellipse(s*0.06,s*0.15,s*0.04,s*0.06,0,0,Math.PI*2);cx.stroke();
}

function drawArm(side,s){
  var x=side*s*0.14;
  cx.strokeStyle=regionColor('shoulder',0.4);cx.lineWidth=s*0.03;cx.lineCap='round';
  cx.beginPath();cx.moveTo(x,s*0.10);cx.lineTo(x*1.5,s*0.25);cx.lineTo(x*1.3,s*0.40);cx.stroke();
}

function drawLeg(side,s){
  var x=side*s*0.06;
  cx.strokeStyle=regionColor('knee',0.4);cx.lineWidth=s*0.035;cx.lineCap='round';
  cx.beginPath();cx.moveTo(x,s*0.38);cx.lineTo(x*1.2,s*0.55);
  // Knee dot
  cx.stroke();
  cx.fillStyle=regionColor('knee',0.5);
  cx.beginPath();cx.arc(x*1.2,s*0.55,s*0.015,0,Math.PI*2);cx.fill();
  // Lower leg
  cx.strokeStyle=regionColor('ankle',0.4);
  cx.beginPath();cx.moveTo(x*1.2,s*0.55);cx.lineTo(x*0.9,s*0.75);cx.stroke();
  // Foot
  cx.beginPath();cx.moveTo(x*0.9,s*0.75);cx.lineTo(x*0.9+side*s*0.04,s*0.76);cx.stroke();
}

// ═══ CLICK HANDLER ═══
cv.addEventListener('click',function(e){
  var rect=cv.getBoundingClientRect();
  var mx=(e.clientX-rect.left)/rect.width;
  var my=(e.clientY-rect.top)/rect.height;
  // Find closest region
  var best=null,bestD=999;
  REGIONS.forEach(function(r){
    var dx=mx-r.x,dy=my-r.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<Math.max(r.w,r.h)*1.5&&d<bestD){bestD=d;best=r;}
  });
  if(best){selectedRegion=best.id;showDetail(best);draw();}
});

// ═══ DETAIL PANEL ═══
function showDetail(r){
  var el=document.getElementById('detail-content');
  el.style.display='block';
  var h='';
  h+='<div class="detail-title">'+r.label+'</div>';

  // Simple view (mom layer)
  h+='<div class="detail-section">';
  h+='<div class="detail-text simple">'+r.simple+'</div>';
  h+='</div>';

  // Physics toggle
  h+='<div class="toggle-depth '+(showPhysics?'on':'')+'" onclick="togglePhysics()">show the physics</div>';

  if(showPhysics){
    h+='<div class="detail-section" style="margin-top:12px;">';
    h+='<div class="detail-label">Physics</div>';
    h+='<div class="detail-text">'+r.physics+'</div>';
    h+='</div>';
    h+='<div class="detail-section">';
    h+='<div class="detail-label">Mechanical Properties</div>';
    var f_kHz=r.resonance;
    h+='<div class="bar-row"><span class="bar-name">Stiffness</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,Math.log10(r.stiffness+1)*10)+'%;background:var(--accent);"></div></div></div>';
    h+='<div class="bar-row"><span class="bar-name">Blood flow</span><div class="bar-track"><div class="bar-fill" style="width:'+r.blood*100+'%;background:var(--red);"></div></div></div>';
    h+='<div class="bar-row"><span class="bar-name">Resonance</span><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,Math.log10(f_kHz+1)*15)+'%;background:var(--blue);"></div></div></div>';
    h+='<div style="color:var(--dim);font-size:0.75em;margin-top:4px;">Stiffness: '+r.stiffness.toLocaleString()+' Pa | Resonance: '+f_kHz+' kHz</div>';
    h+='</div>';
  }

  // Healing
  h+='<div class="detail-section">';
  h+='<div class="detail-label">How it heals</div>';
  h+='<div class="detail-text">'+r.healing+'</div>';
  h+='</div>';

  // Related conditions
  if(r.conditions&&r.conditions.length){
    h+='<div class="detail-section"><div class="detail-label">Related</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">';
    r.conditions.forEach(function(c){
      h+='<span style="padding:3px 10px;border-radius:12px;font-size:0.75em;background:#111;border:1px solid #222;color:#777;cursor:pointer;" onclick="bodySearch(\''+c+'\');document.getElementById(\'q\').value=\''+c+'\';">'+c+'</span>';
    });
    h+='</div></div>';
  }

  el.innerHTML=h;
}

function togglePhysics(){
  showPhysics=!showPhysics;
  if(selectedRegion){
    var r=REGIONS.find(function(r){return r.id===selectedRegion;});
    if(r)showDetail(r);
  }
}

// ═══ SEARCH ═══
function bodySearch(q){
  q=q.trim().toLowerCase();if(!q){highlight=null;selectedRegion=null;document.getElementById('detail-content').style.display='none';draw();return;}

  // Check conditions
  var found=false;
  for(var c in COND_MAP){
    if(c.indexOf(q)>=0||q.indexOf(c)>=0){
      highlight=c;found=true;
      // Select first matching region
      var firstRegion=REGIONS.find(function(r){return r.id===COND_MAP[c][0];});
      if(firstRegion){selectedRegion=firstRegion.id;showDetail(firstRegion);}
      draw();return;
    }
  }

  // Check region names
  REGIONS.forEach(function(r){
    if(r.id.indexOf(q)>=0||r.label.toLowerCase().indexOf(q)>=0){
      highlight=null;selectedRegion=r.id;showDetail(r);found=true;
    }
  });
  if(found){draw();return;}

  // Fuzzy aliases
  var ALIASES={
    'headache':'migraine','head':'brain','mind':'brain','think':'brain','memory':'alzheimer',
    'breath':'lungs','breathing':'lungs','chest':'heart','pump':'heart','beat':'heart',
    'tummy':'stomach','belly':'stomach','digest':'stomach','food':'stomach','poop':'stomach',
    'pee':'kidneys','urine':'kidneys','filter':'kidneys',
    'back':'spine','neck':'spine','disc':'spine','posture':'spine',
    'arm':'shoulder','wrist':'shoulder','hand':'shoulder',
    'leg':'knee','walk':'knee','run':'knee','step':'ankle',
    'cut':'skin','scratch':'skin','rash':'skin','itch':'skin',
    'tired':'blood','energy':'blood','sick':'blood','cold':'blood','flu':'blood',
    'break':'bones','broken':'bones','crack':'bones','osteo':'bones',
    'sad':'depression','worry':'anxiety','nervous':'anxiety','panic':'anxiety',
    'sugar':'diabetes','weight':'stomach','fat':'stomach',
    'tumor':'cancer','lump':'cancer',
    'clot':'blood clot','stroke':'blood clot',
    'stiff':'knee','sore':'muscle','ache':'spine',
  };

  if(ALIASES[q]){bodySearch(ALIASES[q]);return;}

  highlight=null;draw();
}

// ═══ LAYER SWITCHING ═══
function setLayer(l,btn){
  layer=l;
  document.querySelectorAll('.layer-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');draw();
}

// ═══ ANIMATION ═══
function animate(){draw();requestAnimationFrame(animate);}
animate();
</script>
</body>
</html>
