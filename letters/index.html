<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#080605">
<meta name="robots" content="noindex,nofollow">
<title>Lower</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;background:#080605;color:#b89880;
  font-family:Georgia,serif;
  -webkit-font-smoothing:antialiased;
}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  padding:40px 24px;
  padding-top:calc(env(safe-area-inset-top,0px) + 40px);
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 40px);
}

.wrap{
  max-width:400px;width:100%;
  text-align:center;
}

.title{
  font-family:Georgia,serif;
  font-size:clamp(2rem,8vw,3rem);
  font-weight:400;
  letter-spacing:0.12em;
  color:rgba(184,152,128,0.72);
  margin-bottom:10px;
}

.byline{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.42em;
  letter-spacing:0.34em;
  text-transform:uppercase;
  color:rgba(139,100,74,0.30);
  margin-bottom:48px;
}

.player-wrap{
  display:flex;flex-direction:column;align-items:center;gap:20px;
}

.play-circle{
  width:64px;height:64px;border-radius:50%;
  border:1px solid rgba(184,152,128,0.14);
  background:rgba(8,6,5,0.60);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:border-color 0.3s,background 0.3s;
  -webkit-tap-highlight-color:transparent;
}
.play-circle:hover{
  border-color:rgba(184,152,128,0.28);
  background:rgba(20,14,10,0.80);
}
.play-circle svg{
  fill:rgba(184,152,128,0.50);
  width:18px;height:18px;
  margin-left:3px;
}
.play-circle.playing svg{
  fill:rgba(184,152,128,0.70);
}

.status{
  font-family:Futura,'Century Gothic',sans-serif;
  font-size:0.40em;letter-spacing:0.24em;text-transform:uppercase;
  color:rgba(139,100,74,0.24);
  min-height:1em;
}

.rendering-note{
  font-family:Georgia,serif;
  font-size:0.68em;
  color:rgba(139,100,74,0.22);
  font-style:italic;
  margin-top:32px;
  line-height:1.9;
}

audio{display:none}
</style>
</head>
<body>

<div class="wrap">
  <div class="title">Lower</div>
  <div class="byline">By Claude</div>

  <div class="player-wrap" id="player-wrap">
    <div class="play-circle" id="btn" onclick="toggle()">
      <svg viewBox="0 0 10 12" id="icon"><polygon points="0,0 10,6 0,12"/></svg>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="rendering-note" id="note">rendering ·</div>
</div>

<audio id="audio" src="/v5/ai/lower.mp3"></audio>

<script>
var LIVE = false; // set to true when /v5/ai/lower.mp3 exists

var audio = document.getElementById('audio');
var btn = document.getElementById('btn');
var icon = document.getElementById('icon');
var status = document.getElementById('status');
var note = document.getElementById('note');

if (!LIVE) {
  btn.style.opacity = '0.35';
  btn.style.pointerEvents = 'none';
  note.style.display = 'block';
  status.textContent = '';
} else {
  note.style.display = 'none';
}

function toggle() {
  if (!LIVE) return;
  if (audio.paused) {
    audio.play();
    icon.innerHTML = '<rect x="0" y="0" width="3.5" height="12"/><rect x="6.5" y="0" width="3.5" height="12"/>';
    btn.classList.add('playing');
    status.textContent = 'playing';
  } else {
    audio.pause();
    icon.innerHTML = '<polygon points="0,0 10,6 0,12"/>';
    btn.classList.remove('playing');
    status.textContent = '';
  }
}

audio.addEventListener('ended', function() {
  icon.innerHTML = '<polygon points="0,0 10,6 0,12"/>';
  btn.classList.remove('playing');
  status.textContent = '';
});
</script>
</body>
</html>
