<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Try Org X-Ray — GUMP</title>
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;min-height:100vh;}
.page{max-width:700px;margin:0 auto;padding:30px 20px 80px;}
h1{font-size:1.8em;font-weight:100;color:#c9a44a;letter-spacing:0.1em;margin-bottom:4px;}
.sub{font-size:0.8em;color:#888;margin-bottom:20px;}
h2{font-size:0.9em;font-weight:200;color:#c9a44a;margin:20px 0 10px;}
textarea{width:100%;height:100px;background:#0d0d14;border:1px solid #ffffff10;color:#c9a44a;
  font-family:'Courier New',monospace;font-size:0.9em;padding:12px;border-radius:8px;resize:none;}
textarea:focus{outline:none;border-color:#c9a44a40;}
textarea::placeholder{color:#444;}
.btn{background:#c9a44a15;border:1px solid #c9a44a30;color:#c9a44a;padding:10px 24px;
  border-radius:24px;cursor:pointer;font-family:Georgia;font-size:0.9em;margin-top:8px;transition:all 0.3s;}
.btn:hover{background:#c9a44a25;border-color:#c9a44a60;}
#output{margin-top:16px;min-height:200px;}
.health-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-size:1em;
  font-weight:bold;letter-spacing:0.1em;margin:10px 0;}
.health-good{background:#4a992020;color:#4a9;border:1px solid #4a9930;}
.health-fair{background:#c9a40a10;color:#c94;border:1px solid #c9a42a;}
.health-poor{background:#c4441020;color:#c44;border:1px solid #c4443040;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0;}
.stat-card{background:#0d0d14;border:1px solid #ffffff08;border-radius:8px;padding:10px;text-align:center;}
.stat-card .v{font-size:1.4em;font-weight:100;color:#c9a44a;}
.stat-card .l{font-size:0.6em;color:#666;margin-top:2px;}
.tension{background:#111118;border-left:2px solid #c9a44a30;padding:6px 10px;margin:3px 0;border-radius:0 6px 6px 0;font-size:0.75em;color:#888;}
.risk-factor{color:#c94;font-size:0.8em;margin:4px 0;padding:4px 0 4px 12px;border-left:2px solid #c94;}
.sample-btn{background:none;border:1px solid #ffffff10;color:#666;padding:4px 12px;border-radius:12px;
  cursor:pointer;font-size:0.7em;margin:2px;transition:all 0.2s;}
.sample-btn:hover{border-color:#c9a44a30;color:#c9a44a;}
.cta{display:block;text-align:center;background:#c9a44a;color:#08080d;padding:14px 32px;
  border-radius:28px;text-decoration:none;font-size:1em;max-width:320px;margin:30px auto;font-weight:bold;}
.time{color:#555;font-size:0.7em;margin-top:8px;text-align:right;}
a{color:#c9a44a;}
canvas{width:100%;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>
<div class="page">
<h1>Org X-Ray</h1>
<div class="sub">Network analysis — computed live in your browser</div>

<h2>PASTE CONNECTIONS</h2>
<textarea id="data" placeholder="One connection per line: name1,name2&#10;e.g.&#10;Alice,Bob&#10;Bob,Charlie&#10;Alice,Dave"></textarea>
<div style="margin:6px 0;">
  <span style="color:#555;font-size:0.7em;">Try:</span>
  <button class="sample-btn" onclick="loadSample('tech')">Tech Company</button>
  <button class="sample-btn" onclick="loadSample('flat')">Flat Team</button>
  <button class="sample-btn" onclick="loadSample('chain')">Chain</button>
</div>
<button class="btn" onclick="analyze()">Analyze</button>

<div id="output"></div>


<p style="text-align:center;font-size:0.65em;color:#555;">By purchasing you agree to our <a href="/legal/terms.html">Terms of Service</a></p>
</div>

<script>
var SAMPLES={
  tech:'CEO,CTO\nCEO,VP_Sales\nCEO,VP_Ops\nCTO,Lead_FE\nCTO,Lead_BE\nCTO,Lead_Data\nLead_FE,Dev1\nLead_FE,Dev2\nLead_FE,Dev3\nLead_BE,Dev4\nLead_BE,Dev5\nLead_Data,Data1\nLead_Data,Data2\nVP_Sales,Sales1\nVP_Sales,Sales2\nSales1,Sales3\nVP_Ops,Ops1\nVP_Ops,Ops2\nDev3,Sales2\nDev1,Dev4',
  flat:'Alice,Bob\nAlice,Charlie\nAlice,Dave\nAlice,Eve\nBob,Charlie\nBob,Dave\nBob,Eve\nCharlie,Dave\nCharlie,Eve\nDave,Eve\nAlice,Frank\nBob,Frank\nCharlie,Frank\nDave,Frank\nEve,Frank',
  chain:'A,B\nB,C\nC,D\nD,E\nE,F\nF,G\nG,H'
};

function loadSample(name){document.getElementById('data').value=SAMPLES[name]||'';}

function analyze(){
  var raw=document.getElementById('data').value.trim();
  var out=document.getElementById('output');
  if(!raw){out.innerHTML='<p style="color:#c44;">Paste connections (one per line: name1,name2)</p>';return;}
  out.innerHTML='<p style="color:#c9a44a;">Computing...</p>';
  var t0=performance.now();
  setTimeout(function(){
    // Parse edges
    var lines=raw.split('\n');
    var edges=[],nodeSet={};
    for(var i=0;i<lines.length;i++){
      var parts=lines[i].trim().split(/[,\t]+/);
      if(parts.length>=2){
        var a=parts[0].trim(),b=parts[1].trim();
        if(a&&b){edges.push([a,b]);nodeSet[a]=true;nodeSet[b]=true;}
      }
    }
    var nodes=Object.keys(nodeSet);
    var nodeCount=nodes.length;
    var edgeCount=edges.length;
    if(nodeCount<2){out.innerHTML='<p style="color:#c44;">Need at least 2 nodes. Format: name1,name2 per line.</p>';return;}
    if(edgeCount>20){out.innerHTML='<p style="color:#c94;">Demo limited to 20 connections (you entered '+edgeCount+').  for unlimited analysis.</p>';return;}

    // Degree per node
    var degree={};for(var i=0;i<nodes.length;i++)degree[nodes[i]]=0;
    // Adjacency list
    var adj={};for(var i=0;i<nodes.length;i++)adj[nodes[i]]=[];
    for(var i=0;i<edges.length;i++){
      degree[edges[i][0]]++;degree[edges[i][1]]++;
      adj[edges[i][0]].push(edges[i][1]);
      adj[edges[i][1]].push(edges[i][0]);
    }

    // Mean & std of degree
    var degVals=nodes.map(function(n){return degree[n];});
    function mean(a){var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length;}
    function stdev(a){var m=mean(a),s=0;for(var i=0;i<a.length;i++)s+=(a[i]-m)*(a[i]-m);return Math.sqrt(s/a.length);}
    var avgDeg=mean(degVals),stdDeg=stdev(degVals);

    // Hubs: degree > mean + 2*std
    var hubs=nodes.filter(function(n){return degree[n]>avgDeg+2*stdDeg;});
    hubs.sort(function(a,b){return degree[b]-degree[a];});

    // Isolates: degree <= 1
    var isolates=nodes.filter(function(n){return degree[n]<=1;});

    // Connected components via BFS
    var visited={},clusters=[],clusterOf={};
    for(var i=0;i<nodes.length;i++){
      if(visited[nodes[i]])continue;
      var queue=[nodes[i]],component=[];
      visited[nodes[i]]=true;
      while(queue.length){
        var cur=queue.shift();
        component.push(cur);
        var neighbors=adj[cur];
        for(var j=0;j<neighbors.length;j++){
          if(!visited[neighbors[j]]){visited[neighbors[j]]=true;queue.push(neighbors[j]);}
        }
      }
      var cid=clusters.length;
      for(var j=0;j<component.length;j++)clusterOf[component[j]]=cid;
      clusters.push(component);
    }

    // Health score: based on avg degree, isolate ratio, cluster fragmentation
    var isolateRatio=isolates.length/nodeCount;
    var densityScore=Math.min(1,avgDeg/4)*40; // 0-40 points for connectivity
    var isolateScore=(1-isolateRatio)*30; // 0-30 points for low isolates
    var clusterScore=Math.max(0,30-((clusters.length-1)*5)); // 0-30 points for few clusters
    var health=Math.round(Math.max(0,Math.min(100,densityScore+isolateScore+clusterScore)));
    var healthClass=health>=70?'good':health>=40?'fair':'poor';
    var healthLabel=health>=70?'HEALTHY':health>=40?'FAIR':'AT RISK';

    var ms=(performance.now()-t0).toFixed(1);

    // Render
    var h='<div class="health-badge health-'+healthClass+'">'+healthLabel+' ('+health+'/100)</div>';
    h+='<div class="stats">';
    h+='<div class="stat-card"><div class="v">'+nodeCount+'</div><div class="l">nodes</div></div>';
    h+='<div class="stat-card"><div class="v">'+edgeCount+'</div><div class="l">edges</div></div>';
    h+='<div class="stat-card"><div class="v">'+avgDeg.toFixed(1)+'</div><div class="l">avg degree</div></div>';
    h+='<div class="stat-card"><div class="v">'+clusters.length+'</div><div class="l">clusters</div></div></div>';

    h+='<div class="stats" style="grid-template-columns:repeat(3,1fr);">';
    h+='<div class="stat-card"><div class="v">'+hubs.length+'</div><div class="l">hubs</div></div>';
    h+='<div class="stat-card"><div class="v">'+isolates.length+'</div><div class="l">isolates</div></div>';
    h+='<div class="stat-card"><div class="v">'+(isolateRatio*100).toFixed(0)+'%</div><div class="l">isolate ratio</div></div></div>';

    // Hubs
    if(hubs.length>0){
      h+='<h2>HUBS (degree &gt; mean + 2&sigma;)</h2>';
      for(var i=0;i<hubs.length;i++){
        h+='<div class="tension" style="border-color:#4a9;">'+hubs[i]+' — degree '+degree[hubs[i]]+' (cluster '+(clusterOf[hubs[i]]+1)+')</div>';
      }
    }

    // Isolates
    if(isolates.length>0){
      h+='<h2>ISOLATES (degree &le; 1)</h2>';
      for(var i=0;i<Math.min(isolates.length,15);i++){
        h+='<div class="risk-factor">'+isolates[i]+' — degree '+degree[isolates[i]]+'</div>';
      }
      if(isolates.length>15)h+='<div class="tension">... and '+(isolates.length-15)+' more</div>';
    }

    // Clusters
    h+='<h2>CLUSTERS (connected components)</h2>';
    for(var c=0;c<clusters.length;c++){
      var members=clusters[c].slice().sort(function(a,b){return degree[b]-degree[a];});
      var preview=members.slice(0,8).join(', ')+(members.length>8?' ... (+'+(members.length-8)+')':'');
      h+='<div class="tension">Cluster '+(c+1)+' ('+members.length+' nodes): '+preview+'</div>';
    }

    // Top connected nodes
    var sorted=nodes.slice().sort(function(a,b){return degree[b]-degree[a];});
    h+='<h2>TOP CONNECTED</h2>';
    for(var i=0;i<Math.min(sorted.length,8);i++){
      h+='<div class="tension">'+sorted[i]+' — '+degree[sorted[i]]+' connections</div>';
    }

    // Canvas graph
    h+='<h2>NETWORK GRAPH</h2>';
    h+='<canvas id="graph" height="350"></canvas>';
    h+='<div class="time">Computed in '+ms+'ms — live in your browser, nothing sent anywhere</div>';
    out.innerHTML=h;

    // Draw graph with force-directed layout
    var canvas=document.getElementById('graph');
    var dpr=window.devicePixelRatio||1;
    canvas.width=canvas.offsetWidth*dpr;canvas.height=350*dpr;
    var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    var W=canvas.offsetWidth,H=350;

    // Initialize positions in a circle
    var pos={};
    for(var i=0;i<nodes.length;i++){
      var angle=2*Math.PI*i/nodes.length;
      pos[nodes[i]]={x:W/2+Math.cos(angle)*(W*0.35),y:H/2+Math.sin(angle)*(H*0.35),vx:0,vy:0};
    }

    // Simple force-directed: 60 iterations
    var iterations=80;
    for(var iter=0;iter<iterations;iter++){
      var temp=0.15*(1-iter/iterations);
      // Repulsion between all nodes
      for(var i=0;i<nodes.length;i++){
        for(var j=i+1;j<nodes.length;j++){
          var dx=pos[nodes[i]].x-pos[nodes[j]].x;
          var dy=pos[nodes[i]].y-pos[nodes[j]].y;
          var dist=Math.sqrt(dx*dx+dy*dy)+0.1;
          var force=800/(dist*dist);
          var fx=dx/dist*force,fy=dy/dist*force;
          pos[nodes[i]].vx+=fx;pos[nodes[i]].vy+=fy;
          pos[nodes[j]].vx-=fx;pos[nodes[j]].vy-=fy;
        }
      }
      // Attraction along edges
      for(var i=0;i<edges.length;i++){
        var a=edges[i][0],b=edges[i][1];
        var dx=pos[a].x-pos[b].x,dy=pos[a].y-pos[b].y;
        var dist=Math.sqrt(dx*dx+dy*dy)+0.1;
        var force=(dist-60)*0.05;
        var fx=dx/dist*force,fy=dy/dist*force;
        pos[a].vx-=fx;pos[a].vy-=fy;
        pos[b].vx+=fx;pos[b].vy+=fy;
      }
      // Center gravity
      for(var i=0;i<nodes.length;i++){
        pos[nodes[i]].vx+=(W/2-pos[nodes[i]].x)*0.01;
        pos[nodes[i]].vy+=(H/2-pos[nodes[i]].y)*0.01;
      }
      // Apply velocity with damping
      for(var i=0;i<nodes.length;i++){
        var p=pos[nodes[i]];
        p.vx*=0.5;p.vy*=0.5;
        p.x+=p.vx*temp*10;p.y+=p.vy*temp*10;
        p.x=Math.max(30,Math.min(W-30,p.x));
        p.y=Math.max(30,Math.min(H-30,p.y));
      }
    }

    // Cluster colors
    var clusterColors=['#c9a44a','#60a0e8','#4a9','#c44','#e8a060','#a060e8','#e860a0','#60e8a0','#a0e860','#e8e860'];

    // Draw edges
    ctx.lineWidth=1;
    for(var i=0;i<edges.length;i++){
      var a=edges[i][0],b=edges[i][1];
      ctx.strokeStyle='#ffffff15';
      ctx.beginPath();ctx.moveTo(pos[a].x,pos[a].y);ctx.lineTo(pos[b].x,pos[b].y);ctx.stroke();
    }

    // Draw nodes
    for(var i=0;i<nodes.length;i++){
      var nd=nodes[i],p=pos[nd];
      var r=Math.max(4,Math.min(14,degree[nd]*2));
      var color=clusterColors[clusterOf[nd]%clusterColors.length];
      ctx.fillStyle=color;
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();
      // Label
      ctx.fillStyle='#e8e4dc';ctx.font='9px Georgia';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText(nd,p.x,p.y-r-2);
    }
  },30);
}
</script>
</body>
</html>
