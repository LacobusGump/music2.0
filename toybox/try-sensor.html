<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Try Universal Sensor — GUMP</title>
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;min-height:100vh;}
.page{max-width:700px;margin:0 auto;padding:30px 20px 80px;}
h1{font-size:1.8em;font-weight:100;color:#c9a44a;letter-spacing:0.1em;margin-bottom:4px;}
.sub{font-size:0.8em;color:#888;margin-bottom:20px;}
h2{font-size:0.9em;font-weight:200;color:#c9a44a;margin:20px 0 10px;}
textarea{width:100%;height:80px;background:#0d0d14;border:1px solid #ffffff10;color:#c9a44a;
  font-family:'Courier New',monospace;font-size:0.9em;padding:12px;border-radius:8px;resize:none;}
textarea:focus{outline:none;border-color:#c9a44a40;}
textarea::placeholder{color:#444;}
.btn{background:#c9a44a15;border:1px solid #c9a44a30;color:#c9a44a;padding:10px 24px;
  border-radius:24px;cursor:pointer;font-family:Georgia;font-size:0.9em;margin-top:8px;transition:all 0.3s;}
.btn:hover{background:#c9a44a25;border-color:#c9a44a60;}
#output{margin-top:16px;min-height:200px;}
.regime-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-size:1em;
  font-weight:bold;letter-spacing:0.1em;margin:10px 0;}
.regime-locked{background:#4a992020;color:#4a9;border:1px solid #4a9930;}
.regime-coherent{background:#60a0e820;color:#60a0e8;border:1px solid #60a0e830;}
.regime-transitional{background:#c9a40a10;color:#c94;border:1px solid #c9a42a;}
.regime-volatile{background:#c4441020;color:#c44;border:1px solid #c4443040;}
.regime-diffuse{background:#88888810;color:#888;border:1px solid #88888830;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0;}
.stat-card{background:#0d0d14;border:1px solid #ffffff08;border-radius:8px;padding:10px;text-align:center;}
.stat-card .v{font-size:1.4em;font-weight:100;color:#c9a44a;}
.stat-card .l{font-size:0.6em;color:#666;margin-top:2px;}
.stat-card.k-card .v{color:#e8a060;}
.stat-card.r-card .v{color:#60a0e8;}
.stat-card.t-card .v{color:#c44;}
.stat-card.e-card .v{color:#4a9;}
.tension{background:#111118;border-left:2px solid #c9a44a30;padding:6px 10px;margin:3px 0;border-radius:0 6px 6px 0;font-size:0.75em;color:#888;}
.sample-btn{background:none;border:1px solid #ffffff10;color:#666;padding:4px 12px;border-radius:12px;
  cursor:pointer;font-size:0.7em;margin:2px;transition:all 0.2s;}
.sample-btn:hover{border-color:#c9a44a30;color:#c9a44a;}
.cta{display:block;text-align:center;background:#c9a44a;color:#08080d;padding:14px 32px;
  border-radius:28px;text-decoration:none;font-size:1em;max-width:320px;margin:30px auto;font-weight:bold;}
.time{color:#555;font-size:0.7em;margin-top:8px;text-align:right;}
a{color:#c9a44a;}
canvas{width:100%;border-radius:8px;margin-top:10px;}
</style>
</head>
<body>
<div class="page">
<h1>Universal Sensor</h1>
<div class="sub">Time series analysis — computed live in your browser</div>

<h2>PASTE YOUR DATA</h2>
<textarea id="data" placeholder="Comma-separated numbers (e.g. 72.1, 72.3, 71.8, 72.0, 73.5, 72.2, ...)"></textarea>
<div style="margin:6px 0;">
  <span style="color:#555;font-size:0.7em;">Try:</span>
  <button class="sample-btn" onclick="loadSample('heartbeat')">Heartbeat</button>
  <button class="sample-btn" onclick="loadSample('crash')">Stock Crash</button>
  <button class="sample-btn" onclick="loadSample('noise')">Random Noise</button>
  <button class="sample-btn" onclick="loadSample('temp')">Stable Temp</button>
</div>
<button class="btn" onclick="analyze()">Analyze</button>

<div id="output"></div>

<a class="cta" href="https://buy.stripe.com/bJeeVd1Ha8oFbFr6U0fIs02">Get Universal Sensor — $2,999/mo</a>
<p style="text-align:center;font-size:0.65em;color:#555;">By purchasing you agree to our <a href="/legal/terms.html">Terms of Service</a></p>
</div>

<script>
function genHeartbeat(){
  var d=[];for(var i=0;i<200;i++)d.push((Math.sin(i*0.15)*30+Math.sin(i*0.45)*10+70+Math.random()*2).toFixed(1));
  return d.join(', ');
}
function genCrash(){
  var d=[];for(var i=0;i<150;i++){
    if(i<100)d.push((100+i*0.5+Math.random()*3).toFixed(1));
    else if(i<110)d.push((150-(i-100)*12+Math.random()*5).toFixed(1));
    else d.push((30+Math.random()*8).toFixed(1));
  }return d.join(', ');
}
function genNoise(){
  var d=[];for(var i=0;i<200;i++)d.push((Math.random()*100).toFixed(1));
  return d.join(', ');
}
function genTemp(){
  var d=[];for(var i=0;i<200;i++)d.push((72+(Math.random()-0.5)*0.6).toFixed(1));
  return d.join(', ');
}

function loadSample(name){
  var el=document.getElementById('data');
  if(name==='heartbeat')el.value=genHeartbeat();
  else if(name==='crash')el.value=genCrash();
  else if(name==='noise')el.value=genNoise();
  else if(name==='temp')el.value=genTemp();
}

function analyze(){
  var raw=document.getElementById('data').value.trim();
  var out=document.getElementById('output');
  var vals=raw.split(/[,\s]+/).map(Number).filter(function(v){return !isNaN(v);});
  if(vals.length<5){out.innerHTML='<p style="color:#c44;">Need at least 5 numbers.</p>';return;}
  if(vals.length>100){out.innerHTML='<p style="color:#c94;">Demo limited to 100 data points (you entered '+vals.length+'). <a href="https://buy.stripe.com/bJeeVd1Ha8oFbFr6U0fIs02" style="color:#c9a44a;">Get Universal Sensor</a> for unlimited analysis.</p>';return;}
  out.innerHTML='<p style="color:#c9a44a;">Computing...</p>';
  var t0=performance.now();
  setTimeout(function(){
    var n=vals.length;

    // Differences
    var diffs=[];for(var i=1;i<n;i++)diffs.push(vals[i]-vals[i-1]);

    // Helpers
    function mean(a){var s=0;for(var i=0;i<a.length;i++)s+=a[i];return s/a.length;}
    function stdev(a){var m=mean(a),s=0;for(var i=0;i<a.length;i++)s+=(a[i]-m)*(a[i]-m);return Math.sqrt(s/a.length);}

    // K: autocorrelation lag-1, scaled to 0-3
    var vm=mean(vals),vnum=0,vden=0;
    for(var i=0;i<n-1;i++)vnum+=(vals[i]-vm)*(vals[i+1]-vm);
    for(var i=0;i<n;i++)vden+=(vals[i]-vm)*(vals[i]-vm);
    var ac1=vden>0?vnum/vden:0;
    var K=Math.max(0,Math.min(3,(ac1+1)*1.5));

    // R: phase coherence from differences
    var cx=0,cy=0;
    for(var i=0;i<diffs.length;i++){var angle=Math.atan2(diffs[i],1);cx+=Math.cos(angle);cy+=Math.sin(angle);}
    var R=Math.sqrt(cx*cx+cy*cy)/diffs.length;

    // T: std of differences
    var T=stdev(diffs);

    // E: energy = mean absolute value
    var E=0;for(var i=0;i<n;i++)E+=Math.abs(vals[i]);E/=n;

    // Trend: first-half mean vs second-half mean
    var half=Math.floor(n/2);
    var m1=mean(vals.slice(0,half)),m2=mean(vals.slice(half));
    var vsd=stdev(vals);
    var trendDelta=vsd>0?(m2-m1)/vsd:0;
    var trend=trendDelta>0.3?'RISING':trendDelta<-0.3?'FALLING':'STABLE';

    // Anomalies: rolling window 20% of data, threshold 3.5 * local_std
    var winSize=Math.max(5,Math.floor(n*0.2));
    var anomalies=[];
    for(var i=0;i<n;i++){
      var ws=Math.max(0,i-Math.floor(winSize/2)),we=Math.min(n,i+Math.ceil(winSize/2));
      var win=vals.slice(ws,we);
      var lm=mean(win),ls=stdev(win);
      if(ls>0&&Math.abs(vals[i]-lm)>3.5*ls)anomalies.push(i);
    }

    // Regime
    var regime,regimeClass;
    if(K>1&&R>0.618){regime='LOCKED';regimeClass='locked';}
    else if(R>0.618){regime='COHERENT';regimeClass='coherent';}
    else if(R>0.3){regime='TRANSITIONAL';regimeClass='transitional';}
    else if(T>vsd*0.8){regime='VOLATILE';regimeClass='volatile';}
    else{regime='DIFFUSE';regimeClass='diffuse';}

    var ms=(performance.now()-t0).toFixed(1);

    // Render
    var h='<div class="regime-badge regime-'+regimeClass+'">'+regime+'</div>';
    h+='<div class="stats">';
    h+='<div class="stat-card k-card"><div class="v">'+K.toFixed(3)+'</div><div class="l">K (coupling)</div></div>';
    h+='<div class="stat-card r-card"><div class="v">'+R.toFixed(3)+'</div><div class="l">R (order)</div></div>';
    h+='<div class="stat-card e-card"><div class="v">'+E.toFixed(1)+'</div><div class="l">E (energy)</div></div>';
    h+='<div class="stat-card t-card"><div class="v">'+T.toFixed(3)+'</div><div class="l">T (tension)</div></div></div>';

    h+='<div class="stats" style="grid-template-columns:repeat(3,1fr);">';
    h+='<div class="stat-card"><div class="v">'+trend+'</div><div class="l">trend</div></div>';
    h+='<div class="stat-card"><div class="v">'+anomalies.length+'</div><div class="l">anomalies</div></div>';
    h+='<div class="stat-card"><div class="v">'+n+'</div><div class="l">points</div></div></div>';

    h+='<h2>ANALYSIS</h2>';
    h+='<div class="tension">Autocorrelation (lag-1): '+ac1.toFixed(4)+' — '+(ac1>0.5?'strong persistence':ac1>0?'mild persistence':'anti-correlated / noisy')+'</div>';
    h+='<div class="tension">Phase coherence: '+R.toFixed(4)+' — '+(R>0.618?'highly coherent':R>0.3?'partially coherent':'incoherent')+'</div>';
    h+='<div class="tension">Tension (diff std): '+T.toFixed(4)+' — '+(T<vsd*0.2?'very smooth':T<vsd*0.5?'moderate':'rough / jumpy')+'</div>';
    h+='<div class="tension">Trend delta: '+trendDelta.toFixed(3)+' ('+trend.toLowerCase()+')</div>';
    if(anomalies.length>0){
      h+='<div class="tension" style="border-color:#c44;">Anomalies at indices: '+anomalies.slice(0,20).join(', ')+(anomalies.length>20?' ... (+'+(anomalies.length-20)+' more)':'')+'</div>';
    }

    h+='<h2>TIME SERIES</h2>';
    h+='<canvas id="chart" height="200"></canvas>';
    h+='<div class="time">Computed in '+ms+'ms — live in your browser, nothing sent anywhere</div>';
    out.innerHTML=h;

    // Draw chart
    var canvas=document.getElementById('chart');
    var dpr=window.devicePixelRatio||1;
    canvas.width=canvas.offsetWidth*dpr;canvas.height=200*dpr;
    var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
    var W=canvas.offsetWidth,H=200;
    var vmin=Math.min.apply(null,vals),vmax=Math.max.apply(null,vals);
    var range=vmax-vmin||1;
    var pad=10;
    function xPos(i){return pad+(W-2*pad)*i/(n-1);}
    function yPos(v){return H-pad-(H-2*pad)*(v-vmin)/range;}

    // Grid
    ctx.strokeStyle='#ffffff08';ctx.lineWidth=1;
    for(var g=0;g<5;g++){var gy=pad+(H-2*pad)*g/4;ctx.beginPath();ctx.moveTo(pad,gy);ctx.lineTo(W-pad,gy);ctx.stroke();}

    // Line
    ctx.strokeStyle='#c9a44a';ctx.lineWidth=1.5;ctx.beginPath();
    for(var i=0;i<n;i++){var x=xPos(i),y=yPos(vals[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();

    // Anomaly circles
    var anomSet={};anomalies.forEach(function(a){anomSet[a]=true;});
    ctx.fillStyle='#c44';
    for(var i=0;i<n;i++){
      if(anomSet[i]){ctx.beginPath();ctx.arc(xPos(i),yPos(vals[i]),4,0,Math.PI*2);ctx.fill();}
    }
  },30);
}
</script>
</body>
</html>
