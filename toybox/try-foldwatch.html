<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Try Fold Watch — GUMP</title>
<link rel="icon" href="/favicon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#08080d;color:#e8e4dc;font-family:Georgia,serif;min-height:100vh;}
.page{max-width:700px;margin:0 auto;padding:30px 20px 80px;}
h1{font-size:1.8em;font-weight:100;color:#c9a44a;letter-spacing:0.1em;margin-bottom:4px;}
.sub{font-size:0.8em;color:#888;margin-bottom:20px;}
h2{font-size:0.9em;font-weight:200;color:#c9a44a;margin:20px 0 10px;}
textarea{width:100%;height:60px;background:#0d0d14;border:1px solid #ffffff10;color:#c9a44a;
  font-family:'Courier New',monospace;font-size:0.9em;padding:12px;border-radius:8px;resize:none;}
textarea:focus{outline:none;border-color:#c9a44a40;}
textarea::placeholder{color:#444;}
.btn{background:#c9a44a15;border:1px solid #c9a44a30;color:#c9a44a;padding:10px 24px;
  border-radius:24px;cursor:pointer;font-family:Georgia;font-size:0.9em;margin-top:8px;transition:all 0.3s;}
.btn:hover{background:#c9a44a25;border-color:#c9a44a60;}
#output{margin-top:16px;min-height:200px;}
.risk-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-size:1em;
  font-weight:bold;letter-spacing:0.1em;margin:10px 0;}
.risk-low{background:#4a9920;color:#4a9;border:1px solid #4a930;}
.risk-medium{background:#c9a40a10;color:#c94;border:1px solid #c9a42a;}
.risk-high{background:#c4410;color:#c44;border:1px solid #c4430;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0;}
.stat-card{background:#0d0d14;border:1px solid #ffffff08;border-radius:8px;padding:10px;text-align:center;}
.stat-card .v{font-size:1.4em;font-weight:100;color:#c9a44a;}
.stat-card .l{font-size:0.6em;color:#666;margin-top:2px;}
.seq-view{background:#0a0a12;border-radius:8px;padding:12px;margin:10px 0;overflow-x:auto;
  font-family:'Courier New',monospace;font-size:0.75em;line-height:2.2;letter-spacing:0.1em;}
.aa{display:inline-block;width:1.3em;text-align:center;border-radius:2px;margin:0 1px;}
.aa-H{background:#e8a06020;color:#e8a060;}
.aa-E{background:#60a0e820;color:#60a0e8;}
.aa-C{background:#44444420;color:#888;}
.agg{background:#c4440030;outline:1px solid #c44440;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{outline-color:#c44440;}50%{outline-color:#c44480;}}
.risk-factor{color:#c94;font-size:0.8em;margin:4px 0;padding:4px 0 4px 12px;border-left:2px solid #c94;}
.tension{background:#111118;border-left:2px solid #c9a44a30;padding:6px 10px;margin:3px 0;border-radius:0 6px 6px 0;font-size:0.75em;color:#888;}
.sample-btn{background:none;border:1px solid #ffffff10;color:#666;padding:4px 12px;border-radius:12px;
  cursor:pointer;font-size:0.7em;margin:2px;transition:all 0.2s;}
.sample-btn:hover{border-color:#c9a44a30;color:#c9a44a;}
.cta{display:block;text-align:center;background:#c9a44a;color:#08080d;padding:14px 32px;
  border-radius:28px;text-decoration:none;font-size:1em;max-width:320px;margin:30px auto;font-weight:bold;}
.time{color:#555;font-size:0.7em;margin-top:8px;text-align:right;}
a{color:#c9a44a;}
</style>
</head>
<body>
<div class="page">
<h1>Fold Watch</h1>
<div class="sub">Protein sequence screening — computed live in your browser</div>

<h2>PASTE A SEQUENCE</h2>
<textarea id="seq" placeholder="Enter amino acid sequence (e.g. FVNQHLCGSHLVEALYLVCGERGFFYTPKT)"></textarea>
<div style="margin:6px 0;">
  <span style="color:#555;font-size:0.7em;">Try:</span>
  <button class="sample-btn" onclick="loadSample('insulin')">Insulin B</button>
  <button class="sample-btn" onclick="loadSample('amyloid')">Amyloid-β 42</button>
  <button class="sample-btn" onclick="loadSample('collagen')">Collagen</button>
  <button class="sample-btn" onclick="loadSample('silk')">Spider Silk</button>
  <button class="sample-btn" onclick="loadSample('lysozyme')">Lysozyme</button>
</div>
<button class="btn" onclick="analyze()">Analyze</button>

<div id="output"></div>

<a class="cta" href="https://buy.stripe.com/aFa5kDbhKbAR6l7cekfIs06">Get Fold Watch — $8,500/mo</a>
<p style="text-align:center;font-size:0.65em;color:#555;">By purchasing you agree to our <a href="/legal/terms.html">Terms of Service</a></p>
</div>

<script>
var SAMPLES = {
  insulin: 'FVNQHLCGSHLVEALYLVCGERGFFYTPKT',
  amyloid: 'DAEFRHDSGYEVHHQKLVFFAEDVGSNKGAIIGLMVGGVVIA',
  collagen: 'GPPGPPGPPGPPGPPGPPGPP',
  silk: 'GAGAGSGAGAGSGAGAGSGAGAGSGAGAGSGAGAGSGAGAGS',
  lysozyme: 'KVFGRCELAAAMKRHGLDNYRGYSLGNWVCAAKFESNFNTQATNRNTDGST'
};
var HYDRO={A:0.70,R:0.00,N:0.11,D:0.11,C:0.78,E:0.11,Q:0.11,G:0.46,H:0.14,I:1.00,L:0.92,K:0.07,M:0.71,F:0.81,P:0.32,S:0.41,T:0.45,W:0.40,Y:0.36,V:0.97};
var HELIX={A:1.42,R:0.98,N:0.67,D:1.01,C:0.70,E:1.51,Q:1.11,G:0.57,H:1.00,I:1.08,L:1.21,K:1.16,M:1.45,F:1.13,P:0.57,S:0.77,T:0.83,W:1.08,Y:0.69,V:1.06};
var SHEET={A:0.83,R:0.93,N:0.89,D:0.54,C:1.19,E:0.37,Q:1.10,G:0.75,H:0.87,I:1.60,L:1.30,K:0.74,M:1.05,F:1.38,P:0.55,S:0.75,T:1.19,W:1.37,Y:1.47,V:1.70};
var AGG={I:0.9,V:0.85,L:0.8,F:0.75,Y:0.6,W:0.5,A:0.4,M:0.4,C:0.3,T:0.2,S:0.1,G:0.1,P:0.0,N:0.0,Q:0.0,D:-0.2,E:-0.2,K:-0.3,R:-0.3,H:-0.1};
var CHARGE={R:1,K:1,H:0.1,D:-1,E:-1};
var VALID='ACDEFGHIKLMNPQRSTVWY';

function loadSample(name){document.getElementById('seq').value=SAMPLES[name]||'';}

function analyze(){
  var seq=document.getElementById('seq').value.toUpperCase().replace(/[^A-Z]/g,'');
  var out=document.getElementById('output');
  if(seq.length<5){out.innerHTML='<p style="color:#c44;">Need at least 5 residues.</p>';return;}
  if(seq.length>50){out.innerHTML='<p style="color:#c94;">Demo limited to 50 residues (you entered '+seq.length+'). <a href="https://buy.stripe.com/aFa5kDbhKbAR6l7cekfIs06">Get Fold Watch</a> for unlimited analysis.</p>';return;}
  for(var i=0;i<seq.length;i++)if(VALID.indexOf(seq[i])<0){out.innerHTML='<p style="color:#c44;">Invalid amino acid: '+seq[i]+'</p>';return;}
  out.innerHTML='<p style="color:#c9a44a;">Computing...</p>';
  var t0=performance.now();
  setTimeout(function(){
    var n=seq.length;
    // Secondary structure
    var hr=[],sr=[];
    for(var i=0;i<n;i++){
      var s=Math.max(0,i-3),e=Math.min(n,i+4),seg=seq.substring(s,e),hs=0,ss=0;
      for(var j=0;j<seg.length;j++){hs+=HELIX[seg[j]]||1;ss+=SHEET[seg[j]]||1;}
      hs/=seg.length;ss/=seg.length;
      if(seq[i]==='P')hs*=0.2;if(seq[i]==='G')hs*=0.6;
      hr.push(hs);sr.push(ss);
    }
    var hn=new Array(n).fill(false),run=-1;
    for(var i=0;i<n;i++){if(hr[i]>1.05&&hr[i]>sr[i]){if(run<0)run=i;if(i-run+1>=4)for(var k=run;k<=i;k++)hn[k]=true;}else run=-1;}
    var sn=new Array(n).fill(false);run=-1;
    for(var i=0;i<n;i++){if(sr[i]>1.05&&!hn[i]){if(run<0)run=i;if(i-run+1>=3)for(var k=run;k<=i;k++)sn[k]=true;}else run=-1;}
    var ss_pred=[];for(var i=0;i<n;i++)ss_pred.push(hn[i]?'H':sn[i]?'E':'C');
    var hp=Math.round(ss_pred.filter(function(s){return s==='H';}).length/n*100);
    var sp=Math.round(ss_pred.filter(function(s){return s==='E';}).length/n*100);
    var cp=100-hp-sp;
    // Aggregation
    var agg_r=[];
    for(var i=0;i<n;i++){
      var s=Math.max(0,i-3),e=Math.min(n,i+4),sc=0;
      for(var j=s;j<e;j++)sc+=AGG[seq[j]]||0;sc/=(e-s);
      if(sc>0.35){if(!agg_r.length||agg_r[agg_r.length-1].e<i-1)agg_r.push({s:i,e:i,sc:sc});
      else{agg_r[agg_r.length-1].e=i;agg_r[agg_r.length-1].sc=Math.max(agg_r[agg_r.length-1].sc,sc);}}
    }
    // Disulfide
    var cys=[];for(var i=0;i<n;i++)if(seq[i]==='C')cys.push(i);
    var ssb=[];for(var i=0;i<cys.length;i++)for(var j=i+1;j<cys.length;j++)if(Math.abs(cys[i]-cys[j])>=4)ssb.push([cys[i],cys[j]]);
    // Charge
    var nc=0;for(var i=0;i<n;i++)nc+=CHARGE[seq[i]]||0;
    // Risk
    var rf=[];
    if(agg_r.length>2)rf.push(agg_r.length+' aggregation-prone regions');
    if(cp>70)rf.push(cp+'% coil');
    var pp=Math.round(seq.split('').filter(function(c){return c==='P';}).length/n*100);
    if(pp>10)rf.push(pp+'% proline');
    var risk=rf.length>=3?'HIGH':rf.length>=1?'MEDIUM':'LOW';
    var ms=(performance.now()-t0).toFixed(1);
    // Render
    var h='<div class="risk-badge risk-'+risk.toLowerCase()+'">'+risk+' MISFOLDING RISK</div>';
    h+='<div class="stats">';
    h+='<div class="stat-card"><div class="v">'+n+'</div><div class="l">residues</div></div>';
    h+='<div class="stat-card"><div class="v">'+hp+'%</div><div class="l">helix</div></div>';
    h+='<div class="stat-card"><div class="v">'+sp+'%</div><div class="l">sheet</div></div>';
    h+='<div class="stat-card"><div class="v">'+cp+'%</div><div class="l">coil</div></div></div>';
    h+='<div class="stats">';
    h+='<div class="stat-card"><div class="v">'+ssb.length+'</div><div class="l">S-S bonds</div></div>';
    h+='<div class="stat-card"><div class="v">'+(nc>0?'+':'')+nc.toFixed(1)+'</div><div class="l">charge</div></div>';
    h+='<div class="stat-card"><div class="v">'+agg_r.length+'</div><div class="l">agg regions</div></div>';
    h+='<div class="stat-card"><div class="v">'+rf.length+'</div><div class="l">risk factors</div></div></div>';
    // Sequence view
    h+='<h2>SEQUENCE + STRUCTURE</h2><div class="seq-view">';
    var aset={};agg_r.forEach(function(r){for(var k=r.s;k<=r.e;k++)aset[k]=true;});
    for(var i=0;i<n;i++){var cls='aa aa-'+ss_pred[i];if(aset[i])cls+=' agg';h+='<span class="'+cls+'">'+seq[i]+'</span>';}
    h+='<br>';for(var i=0;i<n;i++)h+='<span class="aa aa-'+ss_pred[i]+'">'+ss_pred[i]+'</span>';
    h+='<br><span style="font-size:0.85em;color:#555;"><span style="color:#e8a060;">H</span>=helix <span style="color:#60a0e8;">E</span>=sheet <span style="color:#888;">C</span>=coil <span style="color:#c44;">■</span>=aggregation</span></div>';
    if(rf.length){h+='<h2>RISK FACTORS</h2>';rf.forEach(function(f){h+='<div class="risk-factor">⚠ '+f+'</div>';});}
    if(agg_r.length){h+='<h2>AGGREGATION REGIONS</h2>';agg_r.forEach(function(r){h+='<div class="tension">Residues '+(r.s+1)+'-'+(r.e+1)+': '+seq.substring(r.s,r.e+1)+' (score: '+r.sc.toFixed(2)+')</div>';});}
    if(ssb.length){h+='<h2>DISULFIDE CANDIDATES</h2>';ssb.forEach(function(b){h+='<div class="tension">Cys'+(b[0]+1)+' — Cys'+(b[1]+1)+' ('+Math.abs(b[1]-b[0])+' residues apart)</div>';});}
    h+='<div class="time">Computed in '+ms+'ms — live in your browser, nothing sent anywhere</div>';
    out.innerHTML=h;
  },30);
}
</script>
</body>
</html>
