<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deep — Spectral Density</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  color:#c9a44a40;font:12px Georgia;z-index:10;pointer-events:none;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="label">4000 particles · pure canvas · no WebGL · no libraries · 60fps</div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0,mouseX=0.5,mouseY=0.5;
addEventListener('mousemove',function(e){mouseX=e.clientX/innerWidth;mouseY=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){mouseX=e.touches[0].clientX/innerWidth;mouseY=e.touches[0].clientY/innerHeight;});

// ═══ 3D ENGINE — pure math, no libraries ═══
function rotY(x,y,z,a){var c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}
function rotX(x,y,z,a){var c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function project(x,y,z,cx0,cy0,fov){var f=fov/(fov+z+5);return[cx0+x*f,cy0+y*f,f];}

// ═══ PARTICLE SYSTEMS ═══
var N=4000;
var particles=[];

// Orbital shells — electrons in probability clouds
function initAtom(){
  particles=[];
  // Nucleus
  for(var i=0;i<50;i++){
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    var r=Math.random()*0.3;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'nucleus',vx:0,vy:0,vz:0,life:1});
  }
  // 1s orbital (spherical cloud)
  for(var i=0;i<600;i++){
    var r=1+Math.random()*0.8;
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'1s',vx:(Math.random()-0.5)*0.01,vy:(Math.random()-0.5)*0.01,vz:(Math.random()-0.5)*0.01,
      orbit:r,angle_a:a,angle_b:b,speed:0.3+Math.random()*0.2,life:1});
  }
  // 2s orbital (larger sphere with node)
  for(var i=0;i<600;i++){
    var r=2.2+Math.random()*1.0;
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    // Node at r≈1.5 — probability dip
    var nodeR=1.8;var prob=Math.abs(r-nodeR)>0.3?1:0.1;
    if(Math.random()>prob)continue;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'2s',orbit:r,angle_a:a,angle_b:b,speed:0.15+Math.random()*0.1,life:1});
  }
  // 2p orbital (dumbbell shape along y-axis)
  for(var i=0;i<800;i++){
    var r=1.5+Math.random()*1.5;
    var a=Math.random()*Math.PI*2;
    var y_sign=Math.random()>0.5?1:-1;
    var y_dist=Math.random()*r;
    var xz_r=Math.sqrt(Math.max(0,r*r-y_dist*y_dist))*0.3;
    particles.push({x:Math.cos(a)*xz_r,y:y_sign*y_dist,z:Math.sin(a)*xz_r,
      type:'2p',orbit:r,angle_a:a,speed:0.2+Math.random()*0.15,life:1});
  }
  // 2p orbital (dumbbell along x-axis)
  for(var i=0;i<800;i++){
    var r=1.5+Math.random()*1.5;
    var a=Math.random()*Math.PI*2;
    var x_sign=Math.random()>0.5?1:-1;
    var x_dist=Math.random()*r;
    var yz_r=Math.sqrt(Math.max(0,r*r-x_dist*x_dist))*0.3;
    particles.push({x:x_sign*x_dist,y:Math.cos(a)*yz_r,z:Math.sin(a)*yz_r,
      type:'2px',orbit:r,angle_a:a,speed:0.18+Math.random()*0.12,life:1});
  }
  // Wave function ripples (the field)
  for(var i=0;i<1000;i++){
    var r=3+Math.random()*4;
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'field',orbit:r,angle_a:a,angle_b:b,speed:0.05+Math.random()*0.05,
      phase:Math.random()*Math.PI*2,life:1});
  }
  // Photon streams (energy coming in/out)
  for(var i=0;i<150;i++){
    var z_start=-8+Math.random()*16;
    particles.push({x:(Math.random()-0.5)*0.3,y:(Math.random()-0.5)*0.3,z:z_start,
      type:'photon',vz:0.05+Math.random()*0.05,life:1,phase:Math.random()*Math.PI*2});
  }
}

initAtom();

// ═══ PHYSICS UPDATE — spectral speed ═══
function update(){
  t+=0.016;
  var rotSpeedY=(mouseX-0.5)*2;
  var rotSpeedX=(mouseY-0.5)*1;

  for(var i=0;i<particles.length;i++){
    var p=particles[i];

    if(p.type==='nucleus'){
      // Slight jitter
      p.x+=(Math.random()-0.5)*0.005;
      p.y+=(Math.random()-0.5)*0.005;
      p.z+=(Math.random()-0.5)*0.005;
    }
    else if(p.type==='1s'||p.type==='2s'){
      // Orbit around nucleus
      p.angle_a+=p.speed*0.02;
      p.angle_b+=p.speed*0.007;
      var r=p.orbit+Math.sin(t*p.speed+p.angle_a)*0.1;
      p.x=Math.sin(p.angle_b)*Math.cos(p.angle_a)*r;
      p.y=Math.sin(p.angle_b)*Math.sin(p.angle_a)*r;
      p.z=Math.cos(p.angle_b)*r;
    }
    else if(p.type==='2p'||p.type==='2px'){
      p.angle_a+=p.speed*0.015;
      var wave=Math.sin(t*0.5+p.orbit)*0.15;
      p.x+=wave*0.01;p.z+=wave*0.01;
    }
    else if(p.type==='field'){
      // Pulsing wave field
      p.phase+=0.02;
      var pulse=Math.sin(p.phase+p.orbit*0.5)*0.3;
      var r=p.orbit+pulse;
      p.x=Math.sin(p.angle_b)*Math.cos(p.angle_a)*r;
      p.y=Math.sin(p.angle_b)*Math.sin(p.angle_a)*r;
      p.z=Math.cos(p.angle_b)*r;
      p.life=0.3+pulse*0.5;
    }
    else if(p.type==='photon'){
      p.z+=p.vz;
      p.x+=Math.sin(t*3+p.phase)*0.02;
      p.y+=Math.cos(t*3+p.phase)*0.02;
      if(p.z>8)p.z=-8;
      if(p.z<-8)p.z=8;
      // Glow near nucleus
      var dist=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z);
      p.life=dist<1.5?2:0.5;
    }
  }
}

// ═══ RENDER — 3D projected to 2D canvas ═══
function render(){
  w=W/DPR;h=H/DPR;
  // Fade instead of clear (trails)
  cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(0,0,w,h);

  update();

  var cx0=w/2,cy0=h/2;
  var fov=Math.min(w,h)*0.6;
  var rotA=t*0.3+(mouseX-0.5)*3;
  var rotB=(mouseY-0.5)*1.5;

  // Sort by z for depth ordering
  var projected=[];
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var r1=rotY(p.x,p.y,p.z,rotA);
    var r2=rotX(r1[0],r1[1],r1[2],rotB);
    var pr=project(r2[0]*80,r2[1]*80,r2[2],cx0,cy0,fov);
    projected.push({px:pr[0],py:pr[1],scale:pr[2],type:p.type,life:p.life,z:r2[2]});
  }
  projected.sort(function(a,b){return a.z-b.z;});

  // Draw
  for(var i=0;i<projected.length;i++){
    var p=projected[i];
    var s=p.scale;
    var size,color;

    if(p.type==='nucleus'){
      size=4*s;color='rgba(255,200,100,'+(0.9*s)+')';
    } else if(p.type==='1s'){
      size=2*s;color='rgba(201,164,74,'+(0.4*s*p.life)+')';
    } else if(p.type==='2s'){
      size=1.5*s;color='rgba(74,234,160,'+(0.3*s*p.life)+')';
    } else if(p.type==='2p'){
      size=1.5*s;color='rgba(78,168,222,'+(0.35*s*p.life)+')';
    } else if(p.type==='2px'){
      size=1.5*s;color='rgba(222,78,168,'+(0.35*s*p.life)+')';
    } else if(p.type==='field'){
      size=1*s;color='rgba(201,164,74,'+(0.08*Math.max(0,p.life))+')';
    } else if(p.type==='photon'){
      size=1.5*s*p.life;color='rgba(255,255,200,'+(0.6*s*Math.min(p.life,1))+')';
    }

    if(size<0.3)continue;
    cx.fillStyle=color;
    cx.beginPath();cx.arc(p.px,p.py,Math.max(0.5,size),0,Math.PI*2);cx.fill();
  }

  // Title
  cx.fillStyle='rgba(201,164,74,0.08)';
  cx.font='48px Georgia';cx.textAlign='center';
  cx.fillText('C',cx0,cy0);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
