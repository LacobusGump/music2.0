<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta http-equiv="cache-control" content="no-cache, must-revalidate">
<meta http-equiv="expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deep — Look Inside</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;touch-action:none;}
#bar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;
  gap:4px;padding:10px;z-index:10;background:linear-gradient(transparent,#000000cc);}
.pill{padding:6px 14px;border-radius:16px;font:0.8em Georgia;cursor:pointer;
  background:transparent;border:1px solid #ffffff0a;color:#ffffff20;transition:all 0.3s;}
.pill:hover,.pill.on{border-color:#c9a44a40;color:#c9a44a80;}
#title{position:fixed;top:16px;left:50%;transform:translateX(-50%);width:min(90vw,400px);
  pointer-events:none;z-index:10;text-align:center;transition:opacity 1s;}
#title h1{font:1.4em Georgia;font-weight:200;color:#c9a44a60;letter-spacing:0.08em;margin:0;}
#title p{font:0.8em Georgia;color:#ffffff0c;margin-top:4px;line-height:1.5;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="title"><h1 id="t-name"></h1><p id="t-desc"></p></div>
<div id="bar"></div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);

var w,h,t=0,mouseX=0.5,mouseY=0.5,zoom=1,P=[],bloomT=0;
addEventListener('mousemove',function(e){mouseX=e.clientX/innerWidth;mouseY=e.clientY/innerHeight;});
var lastTD=0;
document.addEventListener('touchstart',function(e){e.preventDefault();
  if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;lastTD=Math.sqrt(dx*dx+dy*dy);}
  if(e.touches.length===1){mouseX=e.touches[0].clientX/innerWidth;mouseY=e.touches[0].clientY/innerHeight;}
},{passive:false});
document.addEventListener('touchmove',function(e){e.preventDefault();
  if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);
    if(lastTD>0){zoom*=d/lastTD;zoom=Math.max(0.3,Math.min(8,zoom));}lastTD=d;}
  if(e.touches.length===1){mouseX=e.touches[0].clientX/innerWidth;mouseY=e.touches[0].clientY/innerHeight;}
},{passive:false});
document.addEventListener('touchend',function(e){if(e.touches.length===0)lastTD=0;},{passive:false});
cv.addEventListener('wheel',function(e){e.preventDefault();zoom*=e.deltaY>0?0.93:1.07;zoom=Math.max(0.3,Math.min(8,zoom));},{passive:false});

function rotY(x,y,z,a){var c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}
function rotX(x,y,z,a){var c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function proj(x,y,z,cx0,cy0,fov){var f=fov/(fov+z+8);return[cx0+x*f,cy0+y*f,f];}

// ═══ SCENES — each blooms from center ═══
var SCENES={
  atom:{
    title:'Inside an Atom',
    desc:'Electrons exist as clouds of probability. The gold shell hugs the nucleus. The colored lobes reach outward — that\'s where bonds form.',
    build:function(){
      P=[];
      // Nucleus
      for(var i=0;i<60;i++){var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=Math.random()*0.25;
        P.push({tx:Math.sin(b)*Math.cos(a)*r,ty:Math.sin(b)*Math.sin(a)*r,tz:Math.cos(b)*r,
          c:[220,190,140],orbital:true,shell:0,spd:0.005});}
      // 1s
      for(var i=0;i<400;i++){var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=0.6+Math.random()*0.3;
        P.push({tx:Math.sin(b)*Math.cos(a)*r,ty:Math.sin(b)*Math.sin(a)*r,tz:Math.cos(b)*r,
          c:[185,160,115],orbital:true,shell:1,spd:0.025,a:a,b:b});}
      // 2s with node
      for(var i=0;i<400;i++){var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=1.3+Math.random()*0.4;
        if(Math.abs(r-1.1)<0.15&&Math.random()>0.15)continue; // NODE
        P.push({tx:Math.sin(b)*Math.cos(a)*r,ty:Math.sin(b)*Math.sin(a)*r,tz:Math.cos(b)*r,
          c:[115,165,140],orbital:true,shell:2,spd:0.018,a:a,b:b});}
      // 2p lobes
      var axes=[[1,0,0],[0,1,0],[0,0,1]];
      var colors=[[95,135,175],[170,105,145],[145,145,100]];
      for(var ax=0;ax<3;ax++){for(var i=0;i<200;i++){
        var dir=axes[ax],col=colors[ax];
        var sign=Math.random()>0.5?1:-1;
        var along=sign*(0.5+Math.random()*1.2);
        var perp=Math.sqrt(Math.max(0,1.5-Math.abs(along)*0.5))*0.2*Math.random();
        var pa=Math.random()*Math.PI*2;
        var px=dir[0]*along+(1-Math.abs(dir[0]))*Math.cos(pa)*perp;
        var py=dir[1]*along+(1-Math.abs(dir[1]))*Math.sin(pa)*perp;
        var pz=dir[2]*along+(1-Math.abs(dir[2]))*Math.cos(pa+1)*perp;
        P.push({tx:px,ty:py,tz:pz,c:col,orbital:true,shell:2,spd:0.012,a:pa,b:0});
      }}
      // Orbital ring guides (structural lines)
      for(var ring=0;ring<3;ring++){for(var i=0;i<80;i++){
        var a=i/80*Math.PI*2,r=[0.7,1.4,1.6][ring];
        P.push({tx:Math.cos(a)*r,ty:0,tz:Math.sin(a)*r,
          c:[100,90,70],spd:0,shell:ring,sz:0.4});
      }}
    }
  },
  dna:{
    title:'Inside DNA',
    desc:'Two strands twisted around each other. The bridges between them spell out the code of life. Every cell in your body reads this.',
    build:function(){
      P=[];
      for(var i=0;i<3000;i++){
        var tt=i*0.015,strand=i%2,r=1.2;
        var hx=Math.cos(tt+strand*Math.PI)*r;
        var hy=(i/3000-0.5)*7;
        var hz=Math.sin(tt+strand*Math.PI)*r;
        P.push({tx:hx,ty:hy,tz:hz,c:strand?[170,150,105]:[110,155,128],
          spd:0.003,a:tt,b:strand*Math.PI,helix:true});
        // Base pairs every 20
        if(i%40<2&&strand===0){
          for(var j=0;j<8;j++){var f=j/7;
            var bx=Math.cos(tt)*r*(1-f*2),bz=Math.sin(tt)*r*(1-f*2);
            var isAT=(Math.floor(i/40))%2===0;
            P.push({tx:bx,ty:hy,tz:bz,c:isAT?[180,160,110]:[100,150,120],spd:0,sz:0.7});
          }
        }
      }
      // Backbone lines
      for(var strand=0;strand<2;strand++){for(var i=0;i<200;i++){
        var tt=i/200*Math.PI*15,r=1.2;
        P.push({tx:Math.cos(tt+strand*Math.PI)*r,ty:(i/200-0.5)*7,tz:Math.sin(tt+strand*Math.PI)*r,
          c:[80,70,55],spd:0,sz:0.3});
      }}
    }
  },
  cell:{
    title:'Inside a Living Cell',
    desc:'A membrane holds everything in. The bright core is the nucleus — your DNA lives there. The small clusters are mitochondria, the power plants.',
    build:function(){
      P=[];
      // Membrane
      for(var i=0;i<1200;i++){var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=3+Math.random()*0.12;
        P.push({tx:Math.sin(b)*Math.cos(a)*r,ty:Math.sin(b)*Math.sin(a)*r,tz:Math.cos(b)*r,
          c:[150,120,135],spd:0.008,a:a,b:b,membrane:true,r0:r});}
      // Nucleus
      for(var i=0;i<400;i++){var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI,r=0.8+Math.random()*0.3;
        P.push({tx:Math.sin(b)*Math.cos(a)*r,ty:Math.sin(b)*Math.sin(a)*r,tz:Math.cos(b)*r,
          c:[210,185,140],spd:0.005,a:a,b:b});}
      // Mitochondria
      for(var m=0;m<6;m++){var mx=Math.cos(m*Math.PI/3)*1.8,mz=Math.sin(m*Math.PI/3)*1.8,my=(Math.random()-0.5)*0.8;
        for(var i=0;i<60;i++){var a=Math.random()*Math.PI*2;
          P.push({tx:mx+Math.cos(a)*0.35,ty:my+Math.sin(a)*0.15,tz:mz+(Math.random()-0.5)*0.25,
            c:[120,165,135],spd:0.02,a:a,b:0});}}
      // ER ribbons
      for(var i=0;i<400;i++){var tt=i/400*Math.PI*8,r=1.3+Math.sin(tt*3)*0.4;
        P.push({tx:Math.cos(tt)*r,ty:Math.sin(tt*0.5)*0.4,tz:Math.sin(tt)*r,
          c:[160,145,110],spd:0.01,a:tt,b:0,sz:0.6});}
    }
  },
  galaxy:{
    title:'A Galaxy',
    desc:'Billions of stars held by gravity, spinning. Three spiral arms. The glow at the center is where the oldest, densest stars live.',
    build:function(){
      P=[];
      for(var i=0;i<3000;i++){
        var arm=i%3,dist=Math.random()*4.5;
        var angle=dist*1.3+arm*Math.PI*2/3+Math.random()*0.25;
        var y=(Math.random()-0.5)*0.2*(1+dist*0.15);
        var c=dist<0.5?[230,200,150]:dist<2?[190,170,130]:dist<3.5?[140,130,110]:[100,95,85];
        P.push({tx:Math.cos(angle)*dist,ty:y,tz:Math.sin(angle)*dist,
          c:c,spd:0.4/(dist+0.3),a:angle,galactic:true,dist:dist});
      }
      // Core glow
      for(var i=0;i<200;i++){var a=Math.random()*Math.PI*2,r=Math.random()*0.35;
        P.push({tx:Math.cos(a)*r,ty:(Math.random()-0.5)*0.08,tz:Math.sin(a)*r,
          c:[240,215,170],spd:0.001,sz:1.5});}
    }
  },
  wave:{
    title:'A Quantum Wave',
    desc:'Energy trapped between walls can only vibrate at specific frequencies. These are the allowed shapes. Nothing in between is possible.',
    build:function(){
      P=[];
      for(var n=1;n<=4;n++){
        var col=[[185,160,115],[115,165,140],[95,135,175],[170,105,145]][n-1];
        for(var i=0;i<500;i++){
          var x=(i/500-0.5)*8;
          var psi=Math.sin(n*Math.PI*(x/8+0.5));
          var y=psi*(1.2+Math.random()*0.2)+(n-2.5)*0.15;
          var z=(Math.random()-0.5)*0.3;
          P.push({tx:x,ty:y,tz:z,c:col,spd:0.01*n,a:x,b:n,sz:Math.abs(psi)*0.8+0.3});
        }
      }
      // Walls
      for(var i=0;i<100;i++){
        P.push({tx:-4,ty:(i/100-0.5)*4,tz:(Math.random()-0.5)*0.3,c:[200,180,150],spd:0,sz:0.5});
        P.push({tx:4,ty:(i/100-0.5)*4,tz:(Math.random()-0.5)*0.3,c:[200,180,150],spd:0,sz:0.5});
      }
    }
  }
};

// ═══ BLOOM TRANSITION ═══
function loadScene(name){
  var scene=SCENES[name];if(!scene)return;
  scene.build();
  // All particles start at center
  P.forEach(function(p){p.x=0;p.y=0;p.z=0;p.life=0;p.sz=p.sz||1;});
  bloomT=0;
  document.getElementById('t-name').textContent=scene.title;
  document.getElementById('t-desc').textContent=scene.desc;
  document.getElementById('title').style.opacity='1';
  setTimeout(function(){document.getElementById('title').style.opacity='0';},4000);
  // Highlight pill
  document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('on');});
  var btn=document.querySelector('.pill[data-s="'+name+'"]');
  if(btn)btn.classList.add('on');
}

// ═══ BUILD PILLS ═══
var bar=document.getElementById('bar');
['atom','dna','cell','galaxy','wave'].forEach(function(name){
  var btn=document.createElement('div');
  btn.className='pill';btn.dataset.s=name;
  btn.textContent=SCENES[name].title.replace('Inside ','').replace('A ','');
  btn.onclick=function(){loadScene(name);};
  bar.appendChild(btn);
});

// ═══ RENDER ═══
function render(){
  w=W/DPR;h=H/DPR;t+=0.016;bloomT+=0.016;

  cx.fillStyle='rgba(0,0,0,0.07)';cx.fillRect(0,0,w,h);

  var cx0=w/2,cy0=h/2,fov=Math.min(w,h)*0.5*zoom;
  var rA=t*0.12+(mouseX-0.5)*3,rB=(mouseY-0.5)*1.5;
  var breath=Math.sin(t*0.6)*0.03;

  // Update
  for(var i=0;i<P.length;i++){
    var p=P[i];
    // Bloom: spring from center to target
    var bloom_ease=Math.min(1,bloomT*0.8);
    p.x+=(p.tx*bloom_ease-p.x)*0.04;
    p.y+=(p.ty*bloom_ease-p.y)*0.04;
    p.z+=(p.tz*bloom_ease-p.z)*0.04;
    p.life=Math.min(1,bloomT*1.5);

    // Orbital motion
    if(p.orbital&&p.shell>0){
      p.a=(p.a||0)+p.spd;
      var r=p.shell===1?0.65:p.shell===2?1.35:1.6;
      r+=breath;
      p.tx=Math.sin((p.b||0)+p.a*0.3)*Math.cos(p.a)*r;
      p.ty=Math.sin((p.b||0)+p.a*0.3)*Math.sin(p.a)*r;
      p.tz=Math.cos((p.b||0)+p.a*0.3)*r;
    }
    // Helix rotation
    if(p.helix){p.a+=0.003;p.tx=Math.cos(p.a+p.b)*(1.2+breath);p.tz=Math.sin(p.a+p.b)*(1.2+breath);}
    // Galaxy rotation
    if(p.galactic){p.a+=p.spd*0.008;p.tx=Math.cos(p.a)*(p.dist||1);p.tz=Math.sin(p.a)*(p.dist||1);}
    // Membrane breathing
    if(p.membrane){var mr=(p.r0||3)+breath;p.tx=Math.sin(p.b)*Math.cos(p.a)*mr;p.ty=Math.sin(p.b)*Math.sin(p.a)*mr;p.tz=Math.cos(p.b)*mr;}
  }

  // Project + sort
  var sorted=[];
  for(var i=0;i<P.length;i++){
    var p=P[i];if(p.life<0.01)continue;
    var r1=rotY(p.x,p.y,p.z,rA),r2=rotX(r1[0],r1[1],r1[2],rB);
    var pr=proj(r2[0]*55,r2[1]*55,r2[2],cx0,cy0,fov);
    sorted.push({px:pr[0],py:pr[1],s:pr[2],c:p.c,life:p.life,sz:p.sz||1,z:r2[2]});
  }
  sorted.sort(function(a,b){return a.z-b.z;});

  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var sz=p.sz*p.s,al=p.life*p.s*0.5;
    if(sz<0.15||al<0.003)continue;
    cx.fillStyle='rgba('+p.c[0]+','+p.c[1]+','+p.c[2]+','+Math.min(1,al)+')';
    cx.beginPath();cx.arc(p.px,p.py,Math.max(0.3,sz),0,Math.PI*2);cx.fill();
  }

  requestAnimationFrame(render);
}

loadScene('atom');
render();
</script>
</body>
</html>
