<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deep — Spectral Density</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;}
canvas{display:block;width:100vw;height:100vh;}
#label{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  color:#c9a44a40;font:12px Georgia;z-index:10;pointer-events:none;}
</style>
</head>
<body>
<canvas id="C"></canvas>
<div id="label"><span id="fps"></span> · <span id="pcount"></span> particles · pure canvas · no libraries</div>
<div id="mode-label" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);
  color:#c9a44a20;font:14px Georgia;z-index:10;pointer-events:none;letter-spacing:0.2em;"></div>
<script>
var cv=document.getElementById('C'),cx=cv.getContext('2d');
var W,H,DPR;
function resize(){DPR=devicePixelRatio||1;W=cv.width=innerWidth*DPR;H=cv.height=innerHeight*DPR;cx.setTransform(DPR,0,0,DPR,0,0);}
resize();addEventListener('resize',resize);
var w,h,t=0,mouseX=0.5,mouseY=0.5;
var state={anim:0,lastFrame:0};
addEventListener('mousemove',function(e){mouseX=e.clientX/innerWidth;mouseY=e.clientY/innerHeight;});
addEventListener('touchmove',function(e){mouseX=e.touches[0].clientX/innerWidth;mouseY=e.touches[0].clientY/innerHeight;});

// ═══ 3D ENGINE — pure math, no libraries ═══
function rotY(x,y,z,a){var c=Math.cos(a),s=Math.sin(a);return[x*c+z*s,y,-x*s+z*c];}
function rotX(x,y,z,a){var c=Math.cos(a),s=Math.sin(a);return[x,y*c-z*s,y*s+z*c];}
function project(x,y,z,cx0,cy0,fov){var f=fov/(fov+z+5);return[cx0+x*f,cy0+y*f,f];}

// ═══ PARTICLE SYSTEMS ═══
var N=4000;
var particles=[];

// Orbital shells — electrons in probability clouds
function initAtom(){
  particles=[];
  // Nucleus
  for(var i=0;i<50;i++){
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    var r=Math.random()*0.3;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'nucleus',vx:0,vy:0,vz:0,life:1});
  }
  // 1s orbital (spherical cloud)
  for(var i=0;i<600;i++){
    var r=1+Math.random()*0.8;
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'1s',vx:(Math.random()-0.5)*0.01,vy:(Math.random()-0.5)*0.01,vz:(Math.random()-0.5)*0.01,
      orbit:r,angle_a:a,angle_b:b,speed:0.3+Math.random()*0.2,life:1});
  }
  // 2s orbital (larger sphere with node)
  for(var i=0;i<600;i++){
    var r=2.2+Math.random()*1.0;
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    // Node at r≈1.5 — probability dip
    var nodeR=1.8;var prob=Math.abs(r-nodeR)>0.3?1:0.1;
    if(Math.random()>prob)continue;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'2s',orbit:r,angle_a:a,angle_b:b,speed:0.15+Math.random()*0.1,life:1});
  }
  // 2p orbital (dumbbell shape along y-axis)
  for(var i=0;i<800;i++){
    var r=1.5+Math.random()*1.5;
    var a=Math.random()*Math.PI*2;
    var y_sign=Math.random()>0.5?1:-1;
    var y_dist=Math.random()*r;
    var xz_r=Math.sqrt(Math.max(0,r*r-y_dist*y_dist))*0.3;
    particles.push({x:Math.cos(a)*xz_r,y:y_sign*y_dist,z:Math.sin(a)*xz_r,
      type:'2p',orbit:r,angle_a:a,speed:0.2+Math.random()*0.15,life:1});
  }
  // 2p orbital (dumbbell along x-axis)
  for(var i=0;i<800;i++){
    var r=1.5+Math.random()*1.5;
    var a=Math.random()*Math.PI*2;
    var x_sign=Math.random()>0.5?1:-1;
    var x_dist=Math.random()*r;
    var yz_r=Math.sqrt(Math.max(0,r*r-x_dist*x_dist))*0.3;
    particles.push({x:x_sign*x_dist,y:Math.cos(a)*yz_r,z:Math.sin(a)*yz_r,
      type:'2px',orbit:r,angle_a:a,speed:0.18+Math.random()*0.12,life:1});
  }
  // Wave function ripples (the field)
  for(var i=0;i<1000;i++){
    var r=3+Math.random()*4;
    var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
    particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
      type:'field',orbit:r,angle_a:a,angle_b:b,speed:0.05+Math.random()*0.05,
      phase:Math.random()*Math.PI*2,life:1});
  }
  // Photon streams (energy coming in/out)
  for(var i=0;i<150;i++){
    var z_start=-8+Math.random()*16;
    particles.push({x:(Math.random()-0.5)*0.3,y:(Math.random()-0.5)*0.3,z:z_start,
      type:'photon',vz:0.05+Math.random()*0.05,life:1,phase:Math.random()*Math.PI*2});
  }
}

// ═══ SCENE MODES — fold the idea ═══
var sceneMode=0;
var SCENES=['atom','dna','galaxy','wave','life'];
var sceneTimer=0;
var transitionAlpha=1;

function initScene(mode){
  particles=[];
  transitionAlpha=0;

  if(mode==='atom'){
    initAtom();
  }
  else if(mode==='dna'){
    // DNA double helix — two strands spiraling
    for(var i=0;i<2000;i++){
      var t_pos=i/2000*Math.PI*12;  // 6 full turns
      var strand=i%2;
      var r=1.5;
      var x=Math.cos(t_pos+strand*Math.PI)*r;
      var z=Math.sin(t_pos+strand*Math.PI)*r;
      var y=(i/2000-0.5)*8;
      particles.push({x:x,y:y,z:z,type:strand?'2p':'2px',
        orbit:t_pos,speed:0.1,life:1,angle_a:t_pos});
      // Base pairs connecting strands (every ~20 particles)
      if(i%40<2&&strand===0){
        for(var j=0;j<10;j++){
          var frac=j/9;
          var bx=Math.cos(t_pos)*r*(1-frac*2);
          var bz=Math.sin(t_pos)*r*(1-frac*2);
          var col=((i/40)%4<2)?'1s':'2s';  // AT vs GC pairs = different colors
          particles.push({x:bx,y:y,z:bz,type:col,orbit:0,speed:0,life:0.8,angle_a:0,angle_b:0});
        }
      }
    }
    // Ambient field
    for(var i=0;i<500;i++){
      var r=3+Math.random()*3;var a=Math.random()*Math.PI*2;var b=Math.random()*Math.PI;
      particles.push({x:Math.sin(b)*Math.cos(a)*r,y:(Math.random()-0.5)*10,z:Math.sin(b)*Math.sin(a)*r,
        type:'field',orbit:r,angle_a:a,angle_b:b,speed:0.03,phase:Math.random()*Math.PI*2,life:0.5});
    }
  }
  else if(mode==='galaxy'){
    // Spiral galaxy — the large-scale structure
    for(var i=0;i<3000;i++){
      var arm=i%3;  // 3 spiral arms
      var dist=Math.random()*5;
      var angle=dist*1.5+arm*Math.PI*2/3+Math.random()*0.3;
      var x=Math.cos(angle)*dist;
      var z=Math.sin(angle)*dist;
      var y=(Math.random()-0.5)*0.3*(1+dist*0.2);  // thin disk, thicker at edges
      var type=dist<0.5?'nucleus':dist<2?'1s':dist<3.5?'2s':'field';
      particles.push({x:x,y:y,z:z,type:type,orbit:dist,angle_a:angle,
        speed:0.5/(dist+0.5),life:Math.random(),angle_b:0,phase:0});
    }
    // Central black hole glow
    for(var i=0;i<200;i++){
      var r=Math.random()*0.4;var a=Math.random()*Math.PI*2;
      particles.push({x:Math.cos(a)*r,y:(Math.random()-0.5)*0.1,z:Math.sin(a)*r,
        type:'photon',vz:0,life:2,phase:a});
    }
  }
  else if(mode==='wave'){
    // Standing wave — the Schrödinger equation visualized
    for(var i=0;i<3000;i++){
      var x=(i/3000-0.5)*10;
      var n=Math.floor(Math.random()*4)+1;  // quantum number
      var psi=Math.sin(n*Math.PI*(x/10+0.5));
      var y=psi*(1+Math.random()*0.3);
      var z=(Math.random()-0.5)*0.5;
      var type=n===1?'1s':n===2?'2s':n===3?'2p':'2px';
      particles.push({x:x,y:y,z:z,type:type,orbit:n,speed:0.1*n,
        life:Math.abs(psi),angle_a:x,angle_b:0,phase:0});
    }
    // Potential walls
    for(var i=0;i<200;i++){
      var side=i%2?-5:5;
      particles.push({x:side,y:(i/200-0.5)*4,z:(Math.random()-0.5)*0.5,
        type:'photon',vz:0,life:1,phase:0});
    }
  }
  else if(mode==='life'){
    // Cell — membrane + organelles
    // Membrane (spherical shell)
    for(var i=0;i<1500;i++){
      var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
      var r=3+Math.random()*0.15;
      particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
        type:'2px',orbit:r,angle_a:a,angle_b:b,speed:0.02,life:0.6,phase:0});
    }
    // Nucleus (inner sphere)
    for(var i=0;i<500;i++){
      var a=Math.random()*Math.PI*2,b=Math.random()*Math.PI;
      var r=1+Math.random()*0.3;
      particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
        type:'nucleus',orbit:r,angle_a:a,angle_b:b,speed:0.01,life:1,phase:0});
    }
    // Mitochondria (small ellipsoids scattered)
    for(var m=0;m<5;m++){
      var mx=Math.cos(m*Math.PI*2/5)*2,mz=Math.sin(m*Math.PI*2/5)*2,my=(Math.random()-0.5);
      for(var i=0;i<100;i++){
        var a=Math.random()*Math.PI*2;
        particles.push({x:mx+Math.cos(a)*0.4,y:my+Math.sin(a)*0.2,z:mz+(Math.random()-0.5)*0.3,
          type:'2s',orbit:0,speed:0.05,life:0.8,angle_a:a,angle_b:0,phase:0});
      }
    }
    // ER (ribbons)
    for(var i=0;i<500;i++){
      var t_pos=i/500*Math.PI*6;
      var r=1.5+Math.sin(t_pos*3)*0.5;
      particles.push({x:Math.cos(t_pos)*r,y:Math.sin(t_pos*0.7)*0.5,z:Math.sin(t_pos)*r,
        type:'1s',orbit:r,speed:0.03,life:0.4,angle_a:t_pos,angle_b:0,phase:0});
    }
    // Free particles (cytoplasm)
    for(var i=0;i<400;i++){
      var r=Math.random()*2.8;var a=Math.random()*Math.PI*2;var b=Math.random()*Math.PI;
      particles.push({x:Math.sin(b)*Math.cos(a)*r,y:Math.sin(b)*Math.sin(a)*r,z:Math.cos(b)*r,
        type:'field',orbit:r,angle_a:a,angle_b:b,speed:0.05+Math.random()*0.05,
        phase:Math.random()*Math.PI*2,life:0.2});
    }
  }
}

function nextScene(){
  sceneMode=(sceneMode+1)%SCENES.length;
  initScene(SCENES[sceneMode]);
  document.getElementById('mode-label').textContent=SCENES[sceneMode].toUpperCase();
}

// Click/tap to switch scenes
cv.addEventListener('click',nextScene);

initAtom();
document.getElementById('mode-label').textContent='ATOM';

// Auto-advance every 12 seconds
setInterval(nextScene,12000);

// ═══ PHYSICS UPDATE — spectral speed ═══
function update(){
  t+=0.016;
  var rotSpeedY=(mouseX-0.5)*2;
  var rotSpeedX=(mouseY-0.5)*1;

  for(var i=0;i<particles.length;i++){
    var p=particles[i];

    if(p.type==='nucleus'){
      // Slight jitter
      p.x+=(Math.random()-0.5)*0.005;
      p.y+=(Math.random()-0.5)*0.005;
      p.z+=(Math.random()-0.5)*0.005;
    }
    else if(p.type==='1s'||p.type==='2s'){
      // Orbit around nucleus
      p.angle_a+=p.speed*0.02;
      p.angle_b+=p.speed*0.007;
      var r=p.orbit+Math.sin(t*p.speed+p.angle_a)*0.1;
      p.x=Math.sin(p.angle_b)*Math.cos(p.angle_a)*r;
      p.y=Math.sin(p.angle_b)*Math.sin(p.angle_a)*r;
      p.z=Math.cos(p.angle_b)*r;
    }
    else if(p.type==='2p'||p.type==='2px'){
      p.angle_a+=p.speed*0.015;
      var wave=Math.sin(t*0.5+p.orbit)*0.15;
      p.x+=wave*0.01;p.z+=wave*0.01;
    }
    else if(p.type==='field'){
      // Pulsing wave field OR galaxy rotation
      if(SCENES[sceneMode]==='galaxy'){
        p.angle_a+=p.speed*0.01;
        p.x=Math.cos(p.angle_a)*p.orbit;
        p.z=Math.sin(p.angle_a)*p.orbit;
        p.life=0.3+Math.sin(t+p.orbit)*0.2;
      } else {
        p.phase+=0.02;
        var pulse=Math.sin(p.phase+p.orbit*0.5)*0.3;
        var r=p.orbit+pulse;
        p.x=Math.sin(p.angle_b)*Math.cos(p.angle_a)*r;
        p.y=Math.sin(p.angle_b)*Math.sin(p.angle_a)*r;
        p.z=Math.cos(p.angle_b)*r;
        p.life=0.3+pulse*0.5;
      }
    }
    else if(p.type==='photon'){
      p.z+=p.vz;
      p.x+=Math.sin(t*3+p.phase)*0.02;
      p.y+=Math.cos(t*3+p.phase)*0.02;
      if(p.z>8)p.z=-8;
      if(p.z<-8)p.z=8;
      // Glow near nucleus
      var dist=Math.sqrt(p.x*p.x+p.y*p.y+p.z*p.z);
      p.life=dist<1.5?2:0.5;
    }
  }
}

// ═══ RENDER — 3D projected to 2D canvas ═══
function render(){
  w=W/DPR;h=H/DPR;
  state.anim++;
  // Fade instead of clear (trails)
  cx.fillStyle='rgba(0,0,0,0.12)';cx.fillRect(0,0,w,h);

  update();

  var cx0=w/2,cy0=h/2;
  var fov=Math.min(w,h)*0.6;
  var rotA=t*0.3+(mouseX-0.5)*3;
  var rotB=(mouseY-0.5)*1.5;

  // Sort by z for depth ordering
  var projected=[];
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var r1=rotY(p.x,p.y,p.z,rotA);
    var r2=rotX(r1[0],r1[1],r1[2],rotB);
    var pr=project(r2[0]*80,r2[1]*80,r2[2],cx0,cy0,fov);
    projected.push({px:pr[0],py:pr[1],scale:pr[2],type:p.type,life:p.life,z:r2[2]});
  }
  projected.sort(function(a,b){return a.z-b.z;});

  // Draw
  for(var i=0;i<projected.length;i++){
    var p=projected[i];
    var s=p.scale;
    var size,color;

    if(p.type==='nucleus'){
      size=4*s;color='rgba(255,200,100,'+(0.9*s)+')';
    } else if(p.type==='1s'){
      size=2*s;color='rgba(201,164,74,'+(0.4*s*p.life)+')';
    } else if(p.type==='2s'){
      size=1.5*s;color='rgba(74,234,160,'+(0.3*s*p.life)+')';
    } else if(p.type==='2p'){
      size=1.5*s;color='rgba(78,168,222,'+(0.35*s*p.life)+')';
    } else if(p.type==='2px'){
      size=1.5*s;color='rgba(222,78,168,'+(0.35*s*p.life)+')';
    } else if(p.type==='field'){
      size=1*s;color='rgba(201,164,74,'+(0.08*Math.max(0,p.life))+')';
    } else if(p.type==='photon'){
      size=1.5*s*p.life;color='rgba(255,255,200,'+(0.6*s*Math.min(p.life,1))+')';
    }

    if(size<0.3)continue;
    cx.fillStyle=color;
    cx.beginPath();cx.arc(p.px,p.py,Math.max(0.5,size),0,Math.PI*2);cx.fill();
  }

  // Fade in transition
  if(transitionAlpha<1)transitionAlpha=Math.min(1,transitionAlpha+0.02);

  // FPS counter
  if(state.anim%30===0){
    document.getElementById('fps').textContent=Math.round(1000/(performance.now()-(state.lastFrame||performance.now())))+'fps';
    document.getElementById('pcount').textContent=particles.length;
  }
  state.lastFrame=performance.now();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
